body:
  text: 吳越國長講律臨壇賜紫清涼大師景霄纂大門第二約自行中卷四篇文分三別云云云四至卷中者通號如前卷中者卷者如前中者謂上衆行綱領既存凡欲秉持衆法須自行清淨故居衆行後共行之前稱之為中也注文兩釋及能作人名等並同上卷之首云云列四篇名目者上既先示中卷後列四篇即顯中卷自行文中收此四篇事法隨要何事可以撿而依行也次牒篇釋中分二今當第一云篇至十六者先明來意上之一十二篇明其衆法雖已善成然於戒體重輕理須備識備識之要莫先篇聚之名題欲達重輕須知來報之遠近故於衆行十二篇後有此篇來問自行四篇何故此居其首答為遵戒體正是此篇欲令僧尼奉禁不違先示名字果報故在初也次釋名者先略次廣且略者篇者五篇聚含六七莫非章品嘉號分段別在一位三功定其輕重次廣者依戒疏先解篇字四門初位五篇并辨篇義二置名翻譯三但五不立四六所以四先後次第且初位立五篇者一僧四尼八為波羅夷二僧十三尼十七為僧殘篇三僧一百二十尼二百八為波逸提篇四僧四尼八為提舍尼篇五僧尼各有一百為突吉羅篇次釋篇義總有四師第一師云相形輕重階降不類名篇謂初篇滅擯治二篇從僧悔乃至第五輕重有殊今云二十法聚前後列位有何輕重耶然篇字有二一從人是偏頗義二從竹乃篇章之篇今是篇章之篇也第二師云今言篇者取流類均等為篇凡立篇字必具三均如初四戒同號波羅夷是名功齊須滅擯治是體均罪非方便是究竟均乃至第五篇三均皆具也今云若爾者俗書亦有名應具三均否第三火疏主云今言篇者始從四棄終於七滅則為八篇文字衆處得名篇也第四今師云今立篇義莫非章品之嘉名分段之別號縱使聚從五立義具三均篇名在七本同雜攝故知篇聚通於本支五七位罪定其均雜第二置名翻譯翻譯如鈔自明今辨置名有何義故置此五名答疏云大聖如來深鑑物情濁世根鈍須立粗刑逗彼明機聞名息過如俗本禁蒲鞭示耻季世深酷乃徒流可以通望三但五非四六者疏云如昔解云藥法有五對此五藥故立五篇若爾後明七聚可有七藥明七毗尼可有七爭故知不爾且對病設藥不定或病多而藥少如四輪摧八難或病少而藥多如七滅珍四爭是或藥均等即此五篇今更立義蓋是如來一方化儀對根之教宜聞說五也四次第先後者先約所防若據所防本無次第但隨先犯者即先制若准僧祇初之四戒即有次第餘皆無次第今立五篇次第者疏云蓋是大聖臨滅度時欲使教法傳世有儀故命持律廣開斯要所以結集文云一切僧尼及諸揵度所有教法聚在一處文誠驗矣於五篇中正死之罪宜加先勒有餘之罪其即第二如是漸降乃至第五欲使僧尼觀過興猒先粗後細斷除業非克出道益理數也次能防者初篇之體能持行本入道正原若壞初本後四條枝無由生行故知初篇行立衆行隨生最須奉修故須先立第二衆法綱網須成必事乖違何能匡化故須次立身口法式行越威儀自行不成何能淨業故立第三雖三業無瑕深為行淨若染世塵醫其正法未能榮顯故須第四自行外化後乃修明若不敬順三寶禁約四儀授說乖方便說法網故須第五趣道正行上並疏文次解聚字亦具四門初位七聚并解聚義二離分品位之意三解七聚得名不同四明諸罪隱顯之相初位立七聚者夷為一殘為二蘭為三提為四舍尼為五吉為六惡說為七並如律文增七中說總收諸篇方便以之為聚成究竟者以之為篇亦是一家不可抑也云何名聚古云衆罪非一號之為聚若如此釋五罪可爾偷蘭惡說聚在何處今解以名義收但有罪相輕重不動或七或五統以收之隨名東罪用通攝篇聚上並疏文二離分品位之意者疏云大聖立教為顯時心或約結集業以收武立名相以東罪隨其所通得解便止如陰界入隨迷故分可以例曉罪雖聚聚一位三階定其輕重取究竟者莫不齊五故有五聚五犯五制五品五篇五部等定其來報年劫遠近者莫不齊六故有六種犯聚六種犯是也言其果由因成自有因而不感果者莫不齊七故有七犯聚七種犯母論七篇等三辨得名如鈔自述云云四隱顯相者疏問曰我本立相如篇所明偷蘭惡說何為不敘答斯出聖心非凡判決律中所列多云二百五十戒為行正宗故此戒本斯成大數至於餘罪不入戒本非余所解不可情求有人解曰二百五十且以數求比丘感戒量同法界可不然也偷蘭一罪不在戒本者豈不以體相不倫因果難定故單抽出用在聚收所以先後通塞不定今就通論俱名為戒是故律曰最初犯戒若就相說齊號威儀故律亦非威儀也大據輕重分之前三聚過相粗者能治名戒偷蘭即在第三下四過輕能治之行名曰威儀若據均雜往分前四是均下三為雜偷蘭雜中之重故居第五也上並疏文上依戒疏解篇聚兩字竟名報者名即波羅夷等報即果報如下引經廣彰是也餘如常解云云依篇釋初總意中云出至相者出俗五衆者形法兩超故名出俗僧二尼三都五衆也並據有戒言之若但剃髮即是形同而無勝法未出俗也所以為世良田者望其自他有二初約自己以釋由無出故久受輪回今有淨出能超生死及得涅槃即是能生善種號曰良田次約他釋由有出供光潔世人於此信敬行施增長無量功德即詺此五衆為世間良善福田也是以智論云等者引此證上戒體為性得號良田是以二字覆牒上義下詞也彼義同解性相義云性與相何別有兩師釋第一云望自體邊是性望他緣邊為相此解則性與相不異第二云性與相不同猶如沙門受持禁戒為性剃髮染衣為相又如火然為性煙𦦨為相近為性遠為相今引此師義證上文也玄記作四句料簡一有性無性如淨名等示有妻子常修梵行故二有相無性如十三難無戒沙彌三俱有即善好比丘內含戒德外具容儀四俱非即俗流是也云今至失者水潔其心者謂戒法嚴凝令心清淨故喻水潔持戒之心也云問其德者謂世有五德一燥而不輕二濕而不重三不隱瑕四不容垢五常有明也比丘持戒之心資成五分法身之德亦爾故將至次喻也生善種號福田者上則三乘因種田出戒淨下為六道福田亦爾不然縱拒自貽伊戚者不然者謂不是上來離閏氷潔之人也縱推者縱恣放逸拒逆佛制之文也自貽伊戚者自己貽遺失也伊誰也戚憂也謂縱恣三毒拒逆佛制自遺失其善種福田誰受憂戚也儒書曰此是趙宣子自嗟之語也趙盾字宣子是晉靈公之宰相為人忠貞其靈公無道不能治化而盾數曾致諫不受而公好食態掌肉遣厨宰意之過時不熟公忿發以銅杖叩煞車載而出以菜覆之路逢趙盾之念言菜疏但合外入何得內出遂顧問之乃觀菜下見一死尸使人具述前事盾遂入朝責云食是小事何得煞人公耻怒乃夜令刺客鋤麑左傳云鋤性也麑名也今作霓或作此倪者非也入盾宅內彼至宅已見盾具衣冠瞻星月輪朝時夙夜不寢是忠臣彼念曰我若不遵王命便為不忠若枉煞無罪之人復是不仁不臣不仁俱成妨也遂乃觸槐而死此依家求云觸槐有云自刎而終恐非也弟趙穿然君曰今鈔外此意道比丘縱恣放逸拒逆佛戒失於善種此是自作自受不干他事便招六聚之辜罪也波羅夷乃至吉羅等此是因也報入二入之獄是受果所云獄者地獄也此總攝罪人之所夏曰夏臺般名羑音有里周時曰囹圄亦號黃砂內典舊云泥梨此云無處謂生彼有情無有去處無有救處新梵云捺落迦此云苦器若云那落迦此云受苦者即是有情上且總名次別列謂八熱八寒成十六也據本根以言於八熱中每獄為有十六小獄以為眷屬故俱舍云此下過二萬無間深廣同上七捺落迦八增皆十六謂煻煨屎糞鋒刃列阿增各住彼四門此八熟也餘八寒地獄言此下等者於此南州地下過二萬踰繕那有一獄梵云阿鼻旨那此云無間深廣各二萬由旬於上二萬由旬中有餘七獄一等活乃至極熱論中從下至上今從上說下初於此地下五百由旬是地面次五百由旬是琰摩王宮下一萬九千由旬安餘七獄一云重疊而有二云傍布而居云云一等活謂彼有情惡業力故感諸苦具而生彼既得已更相殘害悶絶義說為死又暫過涼風所吹尋復蘇醒如本等前活故名為等活又解空中有聲唱云等活有情因此聲故欲然復活如是死已復生業盡方出以是因緣名為等活或有云嶽卒踏地唱活故云二黑繩者謂彼有情彼獄卒將黑繩絣之或為四分五分八分或種種圖𦘕隨其絣𦘕之處若鑿若刷若割以是因緣故號黑繩或有云有情曾苦逼時身形而脉出如繩三衆合謂彼有情彼獄卒驅入兩鐵山間兩山逼之又衆共和合鐵槽壓之以是因緣故名衆合四號叫衆苦所逼異類悲號怨發叫聲名號叫五大叫劇苦所逼大酷聲悲叫稱怨故云大叫號六炎熱謂諸有情彼獄卒置熱䥫地上在右之𤍿又以鐵串炙之諸毛孔中悉皆火起以是因緣故云炎熱七極熱若內若外自身他身俱出猛火互相燒害極過於前故云極熱八無間者謂果事時身無間或無樂間苦等上根本次遊增者一煻煨增謂此增內煻煨沒膝有情遊彼才下足時皮肉與骨俱燋爛墜舉足還生二屎糞增者謂此增內屎糞泥滿於中多有娘姬吒蟲長一尺餘觜利似針身白頭黑有情遊彼皆被此蟲鑽皮破骨匝食其髓三鋒刃增者於中有三一者刀刃以為大道有情遊彼才下之時皮肉與血俱斷碎墜舉足還生二釰葉林上純以銛利釰刃為葉有情遊彼風吹葉墜斬割支體骨肉零落有烏駮㺃摣掣而食三䥫刺林謂此林上有利鐵刺長十六指有情被通上下樹時其刺銛利鏡刺有鐵觜鳥探啄罪人眼睛及與心肝爭競而食俱舍云刀刃路等三種雖殊而俱是鐵故一增攝也知之四列河增謂此增內滿熱醎水有情入中或浮或沒或逆或順被蒸被煮骨肉靡爛設欲逃避於南岸上有諸獄卒手執刀鎗禦捍令回無由得出俱舍云此阿似才前三如㘞四答面四問何名為增答俱舍云此是增上被形害處故說為增又解謂諸有情從根本出重遭此苦故說為增四門各四每獄各十六八獄共一百二十八并本八熱成一百三十六皆名熱地獄次八寒一頞部陀此云皰寒風逼身故生於皰二尼剌部陀此皰列三頞指吒四臛臛婆五虎虎婆六溫羅此云青蓮花七特摩此云紅蓮花八摩訶特摩此云大紅蓮花前二隨身立名中三從聲立號後三從色彰名皆是寒地獄故此之八獄在前八四面皇居也若依大乘瑜伽論說八熱上七獄各深一萬成七萬第八無間深四萬二千并前成十一萬二千八獄相去各二千又成一萬六千計去無間獄底一十二萬八千由旬廣如論說其外更有孤獨地獄各別業指或多或二或一所止差別多種不定或近江河山邊曠野或在地下空及餘處諸地獄器安布如是本處在下彼流不定傍生住處謂水陸空本處大海後漸餘處諸鬼本處琰摩王國從此展轉散居餘處或有端正臭大威德受諸富樂如自在天或有飢虗顏㒵醜陋如是等類廣說如經問諸獄卒是有情否答兩解一說云非若爾何能動作答有情業力感故如成劫風風雖非情亦能成劫二解云有情故頌曰心常德忿毒好集諸惡業見他苦欣悅死作琰摩卒據此頌文豈是非情若爾何緣火不燒答此定由業力所隔礙故或可感異大種故不被燒云云問二八根本之獄壽量云何答俱舍云等活等十六如次六欲天壽量一晝夜壽量亦同彼今先將人間計天上後將天上計地獄故頌曰人中五十年下天一晝夜乘斯壽五百上五倍倍增謂人間五十年四天王宮一晝夜彼天以三十日為月十二月為年具足壽五百歲為等活地獄一晝夜此地獄亦以三十日為月十二月為年具足壽亦五百歲人間一百年忉利一晝夜彼亦三十日為月十二月為年具足壽一千歲為黑繩地獄一晝夜彼以三十日為月十二月為年具足壽亦一千歲人間二百年夜摩天宮一晝夜彼亦以三十日為月十二月為年具足歲壽二千歲為衆合地獄一晝夜彼亦以三十日為月十二月為年具足壽二千歲人間四百年襯史陀天一晝夜彼亦以三十日為月十二月為年具足壽四千歲為號叫地獄一晝夜彼亦以三十日為月十二月為年具足壽四千歲人間八百年樂變化天一晝夜彼亦以三十日為月十二月為年具足壽八千歲為大號叫地獄一晝夜彼亦以三十日為月十二月為年具足壽亦八千歲人間一千六百年他化自在天一晝夜彼亦以三十日為月十二月為年具足壽一萬六千歲為炎熱地獄一晝夜彼亦三十日為月十二月為年具足壽亦一萬六千歲七極熱壽半劫八無間中劫念俱舍瑜伽二論並同次辨八寒頌云如一婆訶麻百年除一盡後後倍二十謂婆訶是梵語一云船可受二十碩者滿中麻有人過百年除去一粒除盡油麻為第一寒氷地獄壽量後七二十船倍倍增第二寒氷二十船第三四十船第四六十船第五八十船第六一百船第七百二十船第八百四十船皆約百年除一粒云云更有大乘義如彼自述五篇明犯者舉彼犯法也違犯持行自成者違犯即不作惡故自然成於二持此據增五文也七聚彰持者彰明也謂明於持行順持諸犯冥失者順持即謹守戒行一切過犯冥然不容此據增七文也云而至也者新答者創入法也率多愚魯者率者總也不用順勵也愚者癡不了教也魯者鈍也未識條例等者謂未識五篇七聚之條例寧辨得二持兩犯云憲章爾雅云憲法也章篇也隨戒昏同霧遊者謂隨一一戒夷殘提吉昏昧不了同霧中遊行之人無所分別也罪報類之觀海者既不識相不知犯罪輕重類如觀海之人罔測海之分齊致使順流長逝者良為上來無知不達於教造種種非法順生死流不沒沈輪故云長逝逝由往也貪蜜渧忘歸者寶云大師引丘中喻如人犯罪於己己令將罪人付惡醉象象逐遂罪人怕怖而走遇一枯井數枝乘騰入於井內彼人尋騰入井井底有三龍四面有四蛇仰觀井上狂象已臨又有黑白二鼠嚙藤之次見有遊蜂餘蜜渧入以口承得暫時衆怖俱息上喻下合身如枯井為老所逼終至於死象喻無常藤喻命根三龍即三毒四蛇即四相二鼠即日月蜜渧喻五欲但貪五欲不懼三毒四相推遷日月相催命根即斷之忘歸也為成重業犯不知悔隨業受生三塗下墜豈能超越五欲之境悟涅槃理及本還原故云知反也毗尼母等者謂愚教縱情造罪受苦在於當來非現在也非謂面元出果報母論云比丘受人信施不如法者為施主所墮謂不如法修道心生放逸因此當墜三塗受報若當來不受者現世食則破腹衣乃離身故也云然焉焉者正明方一此篇意也業隨心結者善生中明八種心結業輕重輕重之業皆是隨心謂心能造業作善作惡皆不離心也故律云犯即問心無心不犯此正約心為業因也報逐心成者舉果酬因也由上八種輕重之心當來受報重輕逐今日心而成就也必先張因果者張二持兩犯之因果先引了論八種護戒即張持之因果下引目連問經等明犯之因果廣明相號者下文廣明五篇七聚相狀名號也觀果知因者謂欲使行人觀持戒得等涅槃之果破戒得地獄劫數長短之果知有持破善惡二因也云就至相者如文云初中至報者所以犯戒果報極大者玄云釋疑故來恐人疑云何故犯戒之罪極重而不輕耶由戒護下釋也謂戒是萬善因基故文云依因此戒能生禪定及苦集智慧等出生善中最為第一即為一切善法之所住處持功德如序云住持佛法群籍於茲息唱等是故違損招報不輕也云明了至八種者戒護多種者舊經論名護新經論云律儀若云護者冥諦疏云有四義一能隔惡事二能守護六根門令或心業不起三能防守以人令出凡位入聖位故猶斯多義故名護也若云根律儀者根即眼等六根律儀即能防護六根故名根律儀也在心名護者論云離意地惡名護在身口名戒者論云離身口惡名戒有護不必有戒者引論四句文也一是護非戒此護護心不起諸念縱對五塵由心不起未假防於身口不得稱戒故曰有護不必有戒若身口不造諸惡必由念智捨心故曰有戒其必是護二是戒非護雖有受體起不正思惟而無護心不動身口未必犯戒三亦戒亦護以要假念等方能流至身口防非四非戒非護若動發身口必起不正思惟故此四句中鈔引第一第三兩句也經中等者了論疏中通指諸經名有此八喻皆喻得戒護人也云一至一切惡者謂此八皆是八法喻通舉論疏云王能王制伏一切人民由此而生王種中後必得王故為民所敬也法合者王喻大聖子喻諸比丘從法而生故云生子民喻一切衆生也紹王位者喻諸比丘因持戒故得成佛也第二法喻中由戒定慧解脫解脫知見五分法身圓滿也第三法喻中論云如意寶珠亦云無價寶珠謂畜此珠所要諸物並皆如意故若言無價者謂無有人為珠作價唯珠自作價欲買此珠以錢物著珠上珠若透出價未於當若珠不出與珠將去固有人問云此珠體是何物答解一云此珠是龍腦中出也若有此珠毒不能害水火不能焚漂等此解未見教文說二云此是過去諸佛舍利變作此珠與人受用今云舍利是定果色不可變故又舍利是無漏不可變為有漏故三云准觀佛三昧經轉輪王取金翅鳥心名為如意珠所求皆遂也且依此解為正第四法喻中王喻比丘子可喻戒即喻比丘惜戒而得成佛前段明他敬此段明自敬兩處各別思之第五法喻中由有一目愛之甚重由有此目得至於彼則不墮沒今有戒目則能離生死坑至涅槃果也第六法喻中貧人愛少資糧則能活命今戒為資良能法身慧命也第七法喻中欲塵者玄云宮人綵女也餘二可知無量功德者合上足財如持一戒招生十利等如國足財王便生愛戒護有多功德心便愛戒也心安無憂悔者合上欲出國有宮綵王便生愛戒護之人法喜如其宮人慈悲可喻綵女得戒護人心無憂悔生長正法者合上正法也國有正法王生愛樂比丘持戒能生定慧三十七種等正法即愛此戒也第八法喻中良藥能治病戒能除世間一切惡法之病不應棄捨戒之良藥也云如是至罪者都結可知云二至報者如文云初至絡者篇聚之名如前已辨五篇七聚之數然於吉中須分身口身為惡作口為惡說故分為六更加偷蘭即成七也吉為二者此是約義科分也正結罪科上樹六法者吉分為兩聚懺法同是一吉聚攝也結正罪科既合為一但有六聚故云上樹六法即不分身口為七也此上六名無正譯者玄云佛化中天隨緣制戒結夷殘等罪此先無其名目是故不可翻譯但就義意翻之也云初言波羅夷者標梵名也云增至故者僧祇義當極惡者此約義譯也以四分無義翻故引祇律惡無過此故云極也此罪最惡約此義邊翻為極惡也三意釋之者釋上極惡義也退沒者望其道果應得不得不無其分名退沒也不共住者同上釋極惡也不如意處者由是地獄之異名衆苦逼身非心所願也猶與魔鬪便墮負處者多論云如二人鬪一勝一負比丘愛戒欲出生死與四魔共鬪若犯亦此戒則墮負處外難云夫言犯戒總是墮負何局此耶答餘篇若犯亦合名墮負但尋悔即滅非永墮故不與負名斷人頭者約喻也此從行法非用為名者謂上言斷頭非比丘故此約得道無由唯約初戒說第二戒如斷多羅樹不復更生為喻也三戒如針鼻缺不堪復用四戒如破大石為兩片不可還合今且約淫戒舉喻餘亦例之也故偈云等者證成衆法絶分義如上卷標餘中已辨云問至犯者准此而言者謂准此上來斷頭之言也必無重犯者謂初犯已再犯無過也戒亦非有者謂身若有戒即有重重而犯身若無戒即如白衣一般雖作無犯今既舉喻由如斷頭必無舉犯顯戒非有也戒之有無此入諍論者玄云涅槃經中有二十雙諍論此當第七也文云我於經中說若有犯四重已不名比丘已失比丘不復能生善芽種子譬如燋種不生果實我諸弟子不解我意唱言失戒又云我為純陀說四種比丘一者畢竟到道阿羅漢人斷煩惱盡故也二者示道二果人能示人正法也三者受道初果人已下能領受聖道故也四者污道犯戒人也我諸弟子不解我意唱言不失問上言失戒又云不失俱云不解我意如何和會耶答夫戒有二種一是受體二是力用言由如燋種不生果實而諸比丘便言火體是不解我意後言污道比丘謂言猶能更生善芽種子有力用故此亦是不解我意者犯重比丘受體仍在但是污戒失於力用即不生諍論也雜心中解有戒非無者彼論第二立四種捨謂作法命終斷善二形若據大乘瑜伽加犯重捨雜心論主不許此義故云有戒非無餘義如上卷受中已辨說若論重犯律自明斷者如四分云如前後亦爾等云云此別脫戒由境緣別者謂識其有重犯之所以謂於發戒之時一一境上別之發得別脫戒故今若犯者還隨境別犯不得頓也云如至羅者寧可一時發一切戒者謂許總發不許總犯故有寧可之詞也且如淫戒等者亦多論文也諸戒既多不可遍攝略抽淫之一戒餘戒未盡言之故有且如二字也女人身上二十一戒謂約貪等三毒三單三雙一合成七毒將此七歷女子非處有三一處既有七三處故成二十一也男子十四者男子非處有二二七成十四戒也稱本受體者謂本初受時發得無作之體遍周法界今雖污於一淫餘戒儼然既未毀犯故稱本體也餘文可解云問至言者問意者既言有戒應當足數答中有四意初據理答二如得下引得作法答三但由下明不足意四斷頭下顯喻簡別意謂不階聖果不無戒第二云至初受者問意者犯淫許不失體但名犯戒有何典據答中上已明示者如上引涅槃雜心二文也如下懺法中說者謂下悔六聚中引祇犯重比丘與季悔已比丘不淨食彼不淨食比丘亦不淨既云同有不淨豈非戒體常在等云云惶懾者支涉反說文云怖懼也雷同者如天雷聲一列同聞也玄記云准百喻經說昔有一人有二百五十頭牛常供水草隨時餧之時有虎噉却一頭其主作念數既不全何用餘者遂驅臨岸一時推下盡皆致死上是喻下法合愚癡比丘亦復如是既失一戒餘亦破之等儼然者不改動之貌也云故至哉者先嚴淨識者嚴潔之淨識即屬其心也五塵者色聲等境也欲染不生對境時無染污心生也由前方便者要由行人預前加功防護起對治心也自懷藏疾者如人有疾衣覆不治名為藏疾犯過隱而不懺亦復如是自他俱負者謂犯罪人曾受信施為施所負即自負也衆僧同知公然共作法事事不成辦即他負也云問至慧者問意可知答中四處得死者一腦二咽喉三心四腰也此四不必並損但隨一處人命不存法合可委云云云十至故者如文云四至記者後四如別說者指尼別行中觸八覆隨也云十至者十誦重者犯不同者是上句且標舉也此律是下句釋也即呼十誦為此律此依寶科鈔句若搜玄及諸記中皆云不同此律此律即是四分對於他宗雙辨也寶不許此即破句讀文也前已說四分重犯義了今此正釋十稱中義如何名為對辨不得見有此字便云是四分知之此律同名之罪有重犯者初篇四戒同一夷名則有重犯謂前淫犯夷後盜亦夷同種無犯者如前犯淫後作但吉也故十誦云波離問佛頗有比丘行淫不得夷不答有若先破戒者是此則同種無重犯也僧祇亦爾此據初篇者簡濫也謂適來所述同種無犯十律亦且據初篇以言若二篇已下同種總有重犯故文云等引彼文證上二篇同種有重犯義也玄云此是十誦二十二安居法文也文學悔沙彌尼夏中犯殘請比丘與覆藏六夜本日治出罪等以此為請日之緣既云本日治即知有重犯謂藏藏藏壞本日治六夜六夜壞又本日治重重有犯重重有本日治故知二篇已下同種並有重犯也餘如別部中說如下卷諸部中引也云明了至本義者律中說罪有五部者謂了論引正量部律也五部者依彼律立名部解云此間為篇者真諦解也此間即吳地也謂僧祇番在吳中案此方俗書立篇名也問既此為篇今何名部鈔答云今依本義立名部也謂但自依本律之中義立名部不取篇名有二義者一成就義二隨順義下文自列今且標舉一成就根本義者謂根本夷罪不自而成假他蘭吉三今方便為因方成就得其果也二隨順根本義者謂部宗根本之罪不許懺悔今三方便成就根本了此方便不滅根本既不可滅方便隨根亦不許懺故云隨順也若依四分攬因成果了但有根本即無方便蓋為部別有殊若二篇已下根本許懺方便隨根本亦可懺也云第至此部者第一波羅夷部者標名也有十六者舉數也解云一一各有四部者四戒是根本每一戒有三方便豈非四部四四成十六罪也一遠方便者此約內心起期業以說若率爾心即隨類大乘也相見如何謂前是女境內起惡心擬期身往造前境雛未下床進步然起此心時即結吉故瑞聖據內心息處結者非也二次方便等者此約下床進步運動之時結非謂息心之時結也對人者一人也三近亦便等者期行淫事者此謂釋疑故來恐人疑云摩觸合得僧殘何故但結蘭耶故今釋云期行非事故摩觸等云云意道下篇摩觸結殘者此據標心但摩觸不為行非故云戲樂也今此約標心本為作非故至境所摩觸但是非家方便蘭不成根本僧殘對人懺者玄云謂對衆僧懺非謂對一人也此解不然彼疏抄中自解云對一人何得妄加云衆人耶此近蘭亦據正動用時結不取息時第四等者至犯位如毛頭即結也前三方便等者釋成就義也若根本未成等釋上隨順義餘三即盜絡妄例取初戒可知不勞具解云四分至更述者古今皆去此是和會之文也四分但言成者夷不成者蘭謂成根本者即結夷罪此則不疑若不成根即結蘭罪此文未了夫言蘭罪合有輕重今但云蘭不分二種罪體輕重故不了也若准十誦倫蘭分輕重者彼云第二次方便犯偷蘭四人小衆懺唯此罪體輕也第三近方便偷蘭五人已上僧中悔罪體重也明了論唯結一品蘭者即如前文所引也次方便是吉對一人悔近方便犯蘭亦對一人悔也但第三近蘭即無第二次蘭故云一品也然偷蘭吉羅體通彼此者先敘諸記中義云然者是也是十誦次蘭了論次吉兩名雖殊罪體並是對人更無輕重故云體通彼此十誦此了論也今師將了論次方便吉換他十誦次蘭居其第二方便中用類其輕重不別故已上記文今難云既言彼了論次吉與此十誦次蘭名殊體是一者何故前文引了論第二方便吉是對一人悔下文引十誦次方便蘭是四人小衆懺唯此四人與一人罪體輕重全乖何得體通彼此古今諸德例依此解未曉其非有智之人情細思審今依天台所稟別申正解謂前引四分但云不成根本者偷蘭遮全不分其次方便及近方便二種蘭體輕重是四分律文不了且置之不論鈔主遂於外部之中檢㝵二本教文俱有說處第一十誦文中有三方便次方便是蘭近方便亦蘭此且分其兩品與四分有殊也又次蘭是四人近蘭是五人此又云其輕重與四分有異也第二明了論中亦有三種方便次方便是吉近方便是蘭次吉是對人近蘭亦對首也此說律論各有未審今師取何為定鈔文釋云然偷蘭吉羅體通彼此類解應無然是也是了論近方便蘭與次方便吉名雖有別約體不殊二俱對人故云體通彼此此謂近蘭彼謂次吉今師意道此為四八不分輕重故引他文今此了論但有一品之蘭第二又是吉罪兼又蘭吉二罪之體輕重不分若依此文未可依準是以此中釋破也如下懺法中更述者至下文一向准十誦律文二義因旋足可依用一者罪體分其重輕二者兩亦蘭罪名字顯然今此未明待後云說故云如下等云云若爾前來所引了論用作何為答但要他上半結罪行相之文不取下半罪體思之云二至聚者牒梵名也云善至也者從境立名者僧為能懺之境殘是所治之罪體僧能除之故云從境也便成上解者四分中亦號僧殘師同上婆沙中解也上言非全淨用顯不絶意今約四分云有餘即結歸行法不絶受稱也殘有咽喉者顯升殺也應與波利婆沙者謂與覆藏法也此從所治遇為名也謂犯殘已雖無心悔遇僧抑令強為加法亦得清淨夷則不爾出彼自心若自無心強與加法不成清淨也鄰重罪者摩觸等鄰淫戒無主房等鄰盜戒等可知云云云若至說者六異七同者此且約僧說若約尼對僧則有十異一言人二度賊女乃至第十發四諍今約僧說即六異七同七同者媒嫁二謗四違諫此七僧尼同犯六異者謂漏失尼犯提摩觸尼犯夷二房尼犯蘭廣如別說者如尼別行中說何故漏失但提乃至二房但得蘭與僧有異如此道理此不繁述也云明了至勝者僧伽胝尸沙者即是僧伽婆尸沙但梵音有異耳五十二罪者三方便并根本成四總來五十二也此乃正量部名者謂上言僧伽胝沙是正量部中之名緣了論釋二十部中正量部律故有三義一殘義二救義三勝義且標起三名解釋如下自述薩婆多有一義正量部同者於三義中但有殘云一義與正量同若救義勝義多宗艮元又多宗雖有此僧殘義與正量同及論解義與正量又別若多宗將戒定慧三學以解僧伽義若戒定慧同即成僧若三不同即乖僧也解云者了疏解也由見衆人和合是僧伽義者據理云由戒見衆人和合是僧伽義今文中缺戒字也由此二不同者由戒及見不同即非僧義也不由定慧者正斥彼多宗也謂明僧義偏約戒見和同定慧二學漸次修或縱然未具亦成僧體佛所立戒故言戒同者疏文自釋上戒同也謂佛所立是波羅提木叉戒比丘若受即成僧體反此不成故云同戒也同一正見等者釋上見同也謂識三歸同觀四諦於此七境所緣不異故云見同婆尸沙等者了疏番為殘也若人犯此罪才犯重即向僧發露欲悔除故僧艮不得與此人共位須以別房安置僧中有上中下三品受用房舍先與大僧大僧不用與中僧中僧不用艮與犯僧殘人住又三品僧中皆受用房舍無有餘殘即隨與一住處須廢屋上令露以表犯殘人在中若三品之淨僧必不住此無覆屋內也更有衣服飲食例此可知摩那埵等者番為悅衆意此人六日六夜事事隨順僧教僧咸歡喜故云悅衆意也阿浮呵那等者番為呼入衆僧作羯磨許其仍舊成清淨人也外難曰此中本說殘義何以明出摩那及阿浮呵那二義耶答此中意顯有殘之罪由僧與之由於此法得清淨故因說殘之一義便明六夜出罪二法也或依古來云多宗亦有三義一殘二摩那三阿浮那但三義中初一義艮與正量同餘二義即與正量別今云不然若許將引二添前多宗三義者了論既中豈無六夜及出罪二義耶無理甚矣故不合取正量有三多宗但有一縱明六夜出罪蓋是因便故說思之已上總是解第一義竟第二救義第三勝義是正量中餘二義也多宗並無如文可解不取諸家妄說云三至聚者牒名也云善至過界者偷蘭名大者謂過於麁故云大也障善道者謂是所障罪是能障若犯此罪能障四沙門道復能與大罪為因故體是鄙穢故也粗惡者論云於粗惡過生也聲論等者彼云薩偷羅外國語應云薩偷蘭祇夜偷蘭番為大祇夜番為罪故番大罪外難此蘭可能大於四重耶答罪名似輕據本即重只如初篇雖犯懺即免地獄破僧等犯逆蘭僧中悔竟猶尚一劫受阿鼻苦重罪方便者即如上能成初二兩篇罪斷善根者了疏約調達破僧事成此人於佛起極重罪必斷善也具茲二義故云云云如牛突籬足喻破出家域外故法合也然過名亦通者謂聚之罪若犯之時並是不依佛制總念言過也此罪最初犯為過者謂取能成根本邊名初罪不具初義故不得名過若爾起心吉最初應合名過答此據動身口運同邊說初若起心仁在內心未現身口雖得名初不得彰過也諸記對此因定前後中多解一云次方便為初中近方便為後中次依法寶唯取近方便蘭為初中波羅夷為後中以了論中唯結一品蘭罪今須順宗解我也若依搜玄但云方便蘭為初中夷罪為中亦不尅定次蘭近蘭等自是一途云然至也者然是也罪通正從從即因蘭亦云方便或號從生正者果蘭亦名獨頭亦名正罪亦號自性也體通輕重者因果二蘭俱含輕重鈔下自釋云初篇近方便重二篇遠方便輕果中即破僧盜四出血等重俱身用髮石蓋等輕七聚六聚等者六七聚中俱有此罪故曰並含或在上下抑有由者抑者案也案其律文皆有由致律中已下鈔自釋也不同古師云為因故三為果故五且三中亦有果因何故妄說如初二篇遠近方便者示名也玄云初篇遠近二方便第二篇近方便近之一字總收二篇近方便罪俱重同在戒內收也或在提舍尼等者謂釋在五威儀所攝如二為下示名取悟也裸身用髮者謂裸形見佛用人髮為繩犯輕蘭也然戒與威儀通別字舉者然是也是上言戒分收威儀攝案其律文有通別互舉者言戒不言威儀不言戒何等是耶如律中比丘犯初篇佛呵言何故最初犯戒乃至犯吉亦呵云故犯戒等威儀通者非唯犯吉名非威儀乃至犯淫盜等亦云何故最初犯威儀等今鈔云戒戒並非威儀釋通互舉也若別互舉者鈔中自明今且案律遮法中舉犯罪人來佛向破戒耶破何等戒為波羅夷為僧殘為偷蘭遮耶若言破威儀者破何等威儀為波逸提為提舍尼惡作惡說耶此則上二名戒下四曰威儀鈔自釋云過相粗著能治名戒過輕能治之行曰威儀鈔分三四是別互舉也若就切雜等者下三者蘭惡作惡說也為雜者通輕及因是雜義也通輕艮輕重雜及即因果雜下皆然也云四至聚者牒名也云義至致者今師約教義香故引十誦釋成墮義玄曰十誦並作此解更無別釋今師據此教義為墜也外難六聚所犯皆合名墮何故此罪獨名為墮耶答有通局舉例由似五塵俱名為色及論得名唯局眼所見獨名色也此約總中受其別號今亦如然不足疑也尼薩耆者聲論番為盡捨有義一捨財二捨相續心三捨罪今正取捨財若不盡捨還滅相染則不成故云盡捨餘之九十單悔別人者謂九十無財可捨故云單悔不假僧懺故曰別人也若罪體同一品懺者玄云三十若捨衣了但對一人懺與九十單提白名一品懺尼二百八戒等者尼二百八中捨唯取三十因財生犯制以捨墮餘一百七十八但對別人故云餘入別懺也種相同異如別顯者若種相同者在僧釋相中明異者指下卷尼別行中顯也餘文可知云明了至有二吉羅者波羅逸尼柯者是正量部名也三百六十罪者一百二十根本上答有二吉為因故成都數有三百六十也三義解之者解上應功用也波羅夜質胝柯者此是多論名也餘如文云五至也者向彼悔者彼即是境故從對治境以立名應發露者亦是向彼故釋成也悔過之詞者詞云大德我犯可呵法等云云與僧全別者一無病乞蘇二乞油三乞石蜜四乞黑石蜜五乞酪六乞乳七乞魚八乞肉律文注曰上四比丘吉下提四也波胝提舍尼者正量部名也十二罪者四根本八方便成十二也云六突吉羅聚者牒名也云善至也者突吉者惡也謂此論中但總番為惡作未明惡說之義至下解也式叉迦羅尼番為應當學者式叉云學迦羅尼云應當即是學應當彼則先所後能梵音似倒今翻譯者先能後所乃云應當學也何故此篇獨名應當學者答餘戒易持而罪重犯懺是難此戒難持而易犯常須念學也又若就所防彰名應云衆突吉羅今隱其所防就能持行為目故云衆學也論其所學實毛上四非獨此篇但人情琰薄重罪能持輕便不敬所以大聖觀機持須勸免故與學名戒疏又問何不顯數但云衆學解云威儀微細量等塵沙何有定數故總目之為衆學也胡僧者謂是當時譯律梵僧也守戒者守護堅持戒品也如駛雨下者駛即疾也如空中疾雨十誦中諸比丘得天眼見諸比丘犯罪如駛雨下見已便遮諸比丘說戒因此鬪諍不得布薩以此白佛佛言但以肉眼等云云豈非已下今師結判也云此至述之者尼法指問大僧者謂尼第五篇還有一百戒同大僧也外難戒本篇昔但云衆學今砂後云一百衆學豈非相違答且約人之善犯舉一百之言若約境明之且通法界故云衆學亦不相違也或云突吉羅等者謂律文數有七聚次第也六即云突羅七即云惡說然吉羅單名作故見論云突者惡也吉羅者作也是惡作義如疏述之者此明六七二聚惡作惡說不同首及南山咸以具義辨吉羅也玄云鈔依首疏彼云聚雖有七得名有五初之二從法立名第二偷蘭從不善體立號第四聚就惡果以立稱第五聚從對治境以標名六七二聚就具辨也云明了至通下用者非四部所攝者謂前四篇中雖有結隨應自攝入前四中今辨第五雖亦名吉乃非前四中所攝所餘諸罪者餘果吉也故了論疏云前四部罪三方便二方便當部部者取乞篇也自攝不入第五是以簡之非四部攝共學對者下文當釋及婆藪斗律者此翻只類鈔下文云多明輕戒謂是吉羅彼論自引此律古今諸師多云此名者如律中揵度謂輕戒聚在一處故以為名也一切皆是第五攝者謂前收所餘諸羅罪及婆藪斗律果罪通攝歸第五篇也獨柯多者正量部中喚突吉羅為獨柯多但梵名不同耳意是惡作番之者謂正量部宗云身口但是具無犯唯意地結發業本起心之時即名惡作故云意是惡作用翻獨柯多也突瑟几理多者薩婆多部名也身口二業翻惡作者身作口說俱名惡作也同翻一名義兩別者今師結判也多宗用身口業翻惡作正量部用意業翻惡作故云兩別玄云此是了疏自引多宗天也分輕重者標也重名獨柯多者意道若通而說之第五部諸罪總名獨柯多若出中輕重兩分重者即名獨柯多輕名學對為分別故立此輕重二名也學對者對上輕罪須學識知責心對治所作之罪也梵音息叉柯羅尼中天國俗音云息供柯羅尼佉叉兩異此方約義俱翻為學對此間不解分別輕重者此問四分律不解分別輕云學對重云獨柯多也通名衆學謬者意道若解分別輕重重則對首輕則責心既不解分別輕重喚作衆學即無其兩懺但一例責心是謬也若但心起等者了論云遠近二方便者如欲上初動身語思是遠方便二進趣向前是近方便上樹過人即是究竟餘戒准此若懺根本方便隨滅者了疏問云重罪若已作根本方便隨根本不可別懺今此輕罪已作根本方便可別懺不亦隨根本不可別懺由方便皆成根本故根本是可懺者若懺根本方便隨滅也重罪重責心等者了疏問輕重罪違方便雖同未動身口輕重懸殊云何責心同滅答雖同責心之有憂劣若悔重罪方便方前所起之心是大須除自改責悔過方滅此即重罪重責心之若輕罪方便但云不應起如此心微自呵責即得滅也此即輕重罪輕責心也懺法亦通下用者此遠方便隨罪輕重二種責心悔法亦通問下懺六聚篇中用也下懺篇中不更出遠方便重罪重責心輕罪輕責心但准此而用也不同古記云通沙彌三衆用云四至者者謂四分戒本及以律文二處通途束攬二百五十以為隨戒牒牒綱要也謂戒境亘廣豈知數量通途束攬二百五十為綱要故此句是結前文餘不盡者餘外也二百五十已外更有未明故云不盡此句生後意也云其至述者二不定者屏露兩殊名之為二諸罪之中未審實犯故云不定枉境以言者枉其女境覆露二處之言通該六聚者說由遍也然此生時莫是已作淫事了生不此是初衆莫是摩觸粗語等不此是殘聚故云通該六聚也若論罪體生疑不信是突吉羅者此是古師首等立之今師因彼故戒疏云房室私禮俗所常行而比丘無侶獨一女人同處而坐令他疑惱罪相難分故約生疑結罪也上是疏文外難曰既云狂境以言通說六聚皆不可定今云結吉豈不定耶答所言不定者但為女人與比丘屏露之處本委六聚之中為犯何罪故云不定今結吉者位據出家人不應行非法之處令他生疑斯罪是定故結吉也若爾體既是吉文中彰其三罪二罪者何鈔答云夫彰三罪二罪但舉生疑之事非取此為罪體也廣如疏述首疏也彼門曰七聚之中無不定聚名何得結吉答若作此難我反問汝七聚之中無不應爾及如法治未審此名何罪耶答不應爾及如沽名吉羅罪今却難伊不應爾等既犯吉不入聚收我二不定六聚中雖無結吉何失復有古人不許結吉有犯即入篇收理合無罪今師意云有罪無罪先須結吉據不合令他生疑若別有犯即然後依篇治對也云七至焉者七滅諍中等者七是藥四諍是病今用七毗尼之藥以滅四諍之病即七藥能滅四諍是所滅能所雙彰故云七滅諍也罪亦通有者謂僧若知法不與他滅諍犯吉尼有智不與他滅諍犯提既僧尼各有罪故故云通有也但為競出四諍等者一言諍二各諍三犯諍四事諍七藥除殘者一現前謂三法人界也五法謂人僧法事界也此三五法皆約現前為衆藥之本二者憶念三不疑四自言五多人語六罪處七草覆地文義廣者律文所說之義至廣至多理相又除者道理相狀難委即是幽除也從勞宜釋者以今時不行即從煩録出文內縱依文述少多終未窮其理盡能也共成通戒者謂僧有七若尼律中收七為一戒以五篇七聚僧尼同用故云通戒也云問至律儀者五篇七聚何義離合者意道篇與聚若為差別或合或離又復聚中六七不同有何義意上來所明但云六聚而未言七也五篇之名出僧祗律當宗壇五文中但云五種僧制五犯聚其六七二聚即四分下文並出第四僧文為下文也今且分七五不同者答上問五篇七聚離合也一名均者如初篇四戒名夷罪是名均也二體均者皆須舉治也三究竟均者罪非方便名為究竟必若不具但入聚攝不入篇也而六七差別亦有義意者答上七聚與六聚離合意也六中含吉以同體者雖則身口有異俱名吉羅故云含突吉羅即合為一也七中離惡說過多者非第六吉離取惡說為第七聚即合出因果輕重一切惡說攝在聚中故過多也第二段問答如文第三段問意可知答中約指為言者謂二百五十五百兩列揩定之數約略指此為部通言未必依數者諸部通而言之即云五百二百五十未必一一依此實數𫏖徑者小道曰𫏖大道曰徑尼律只列三百四十八可得指此而為所防故知須約方境而護也已上廣明篇聚義竟第二大改辨來報中云二果者如文云初至輕者玄云起業要因貪嗔癡煩惱生故云要犯三毒而生也如下懺法中具明業相者指下懺六聚中云由妄覆心便結妄業業有輕重定不定別等必約三性而生者起過之業隨緣萬別綩明日起不過三性謂善惡無記此三能為起罪之由也意業為本者就三業中身口獨不能成善惡要假意成也或由見起者謂是邪見撥無因果也謂非佛制此戒者玄云智論中毀假若言非佛說但諸耶見多又卒人說者是也或不信此報者玄云如伊羅本龍過去迦葉佛時故壞伊蘭樹葉死墮龍中風動樹時腦血流注釋迦出世未記脫時令待慈尊汝可問也謂不信壞此樹葉得罪故重了疏云若不信是佛制及破戒有報或由癡生謂非是佛制及破戒感此報即重也餘如文云今隨至相者約三性并犯戒輕重也云一至說者前境違重者謂前境是人具緣違教故重也如下智論說者指頭陀比丘煞畜因緣也云二至陳者識智教相是學教人或復暗學是不學教人濁重貪嗔癡者謂因執不可回轉是決微之心不信惡因招於惡果等卷末說陳者指懺篇也云三至報者非即如上者謂簡異也無記雖同此恆懷護持之人忘誤而造不即如上無非攝護之人作即結業也玄又解上雖明其忘誤無業未明所作何非鈔不更別之明之故指所作之非即如上也即鈔文中如比丘下並是非相前為方便令後無記心中成其業也並如論中等者指成論文下略出也云問至犯者問意道夫云無記者善惡性中無可記莂號為無記無記不成業何得當來受報若有果報明知無記無來結業也答中非記果者謂此果通無記心中成不是無記心中得此果也故云非記果也謂非善惡名為無記若眠睡時亦名無記然與作善惡稍別名前作方便後入無記通所結業若無方便直入夢眠中起者即應無業故成論云夢起劣弱不能結業也故知夢眠不成業果也二者不感總報者三途名為總報也頭陀比丘等者即頭陀經也糞鬼者五百問上卷云昔有比丘為僧知事手指柱物言取是物因不懺悔死墮餓鬼也取糞有時有一羅漢夜上廁聞呻吟聲問其所由云先出伽藍為僧執事持不淨食與衆故墮餓鬼所以呻嚘聲者答云餓急欲死通又蟲噉身痛故爾意欲食糞而不能得以諸餓鬼推排不能進前羅漢言我爭奈何鬼言為我懺悔呪願羅漢即為向僧中說僧為呪願由此始得食糞穢也如成論中睡眠是無記報者此證前業無記心中成也此據前有方便說故問如前無記有不犯等者問意可知答中前已略明者謂指前文云唯除恆壞護持忘誤而吉若是此吉心即不成業兢尼愎反勵者悚懼也亦是敬順之㒵真諦云譬如茅草急縱而拔之即斷若寬執而拔又損手今亦如然受戒急護便得解脫若寬慢護即傷法身之手也餘如文云然至息者綿積者綿遠也謂受苦時長也生報莫窮者謂犯多罪生生受報無有休息故曰莫窮沉輪報義總有四種一現報二生報三後報四不定報言現報者現在作善作惡現身受報生報者此生作善作惡來生受報玄曰捨此身已次生即受更不隔生後報者從地獄出墮畜生身或得為人諸根不具皆後報也不定者過緣不受等如下述之既無三善可附者無貪嗔癡名為三善反此為三惡即受地獄餓鬼畜生無有盡時故云輪也以此經生者以此三惡道經生可為歎息息者大呼之㒵也云引證成報者引目連經證據前來果報不謬也云如至歲者九百千歲者寶云若依實算合是九百萬謂人間一萬八千年為彼天一年彼五百今一萬八千年便是九百萬歲今云九百千者疑是譯家筆慢也或依玄記云存於小數由來大數合之前言三億大數合竟即萬萬為億由存大數故少今應將吉九百千歲作大數計之即少可呵二億也九千九百九十九萬一百六十千歲云涅槃至量者數有大小鈔會上經文不同也寶云目連經如下天九百是少涅槃經如刀利天八百萬是多如何和會此謂已下鈔文和會也涅槃經存小數目連經存大數也所言小數者名苑云十十為百十百為千十千為萬十萬為億十億曰兆十兆為凉十凉為說十說為壤十壤為溝十溝為澗十澗為一正十正為載此並是小數大數者皇帝算經云有上中下下數十萬為億中數百萬為億上數萬萬為億曰兆萬萬億兆曰京萬萬京為說乃至載等云云云自至却者勸信護持也如文云今至悲者黃葉者是天文二乘教也鹿野者玄云具足應云波羅佚斯柯舊云波羅余若翻此言則有多種或仙人墮處或名施鹿林亦名仙人苑亦號鹿苑等若言仙人隨處者以古有仙在此見女色遂失通而墮故若言施鹿林者准智論讚精進度中說云如波羅奈國梵摩達王游獦於此林中見二群鹿各有其主一是釋迦文菩薩鹿王身七寶色一是提婆鹿王其菩薩鹿王見王衆中射獦生大慈心徑至王前人王見來擬射煞此鹿直進無所畏也王敕從者攝弓箭無得奪其來者之意鹿王既到人王之前遂白王曰大王今日以遊獦小事故群鹿一時受無量苦縱一時射煞其肉多亦無甲若以供膳我自差次送一鹿以供王厨王善其言聽如其意自後二鹿群主大集差次各當一日時提婆群中有一牝鹿大德引爾雅云音憂雌鹿異名也牝者雅云鹿次音加雄鹿異名也云云有子次當王厨白其鹿主我身今日應當送死而我懷子子非次也乞垂料理使死得次鹿王怒之云誰不惜命次到但去何得辭也其鹿思惟我王不人不以理怒不察我等之心橫見怪責不足告也乃到菩薩鹿處具白適來之言菩薩鹿王問云汝王何言鹿云我王不仁反生嗔怒大王仁慈及於一切特來歸投如我今日天地雖廣無所控告菩薩思惟此吉可慜我若不念狂煞其一子若非次差次未到之如何遣去唯我自代即可先妨遂令其鹿却反本群至於此日菩薩鹿王自送身去徑至王前衆人見之怪其自來次事白王王命問云汝群諸鹿盡何速耶鹿王言大王仁及群人無犯者但有滋茂何有盡時我異部群中一鹿懷子垂産身當殂割子亦并命來投於我以慜其非分受差若歸而不救何異木石是身不久必不免死慈救在厄功德無量若也無慈與虎狼何異王聞此言乃從座起而說偈言我實是畜獸名曰人頭鹿汝雖是畜狩號曰鹿頭人其王遂發善心不喫鹿肉乃放此諸鹿於彼林中以是因緣故云施鹿林或云放鹿林等世尊成道後趣彼林中為五俱鄰宣四諦小乘之法此時有八萬諸天在旁聽之總發菩提之心故云大道也雙林者諸經論云𤘽尸那城西門外有一大河梵名河利跋提河此云金河中有金故從事彰名也如來在日多向此河邊說法涅槃已後息唱金河河喻生死也水喻煩惱也金喻涅槃也佛於此涅槃以表生死河中有大涅槃故其雙樹在此河西岸八隻四雙佛入滅時四雙變白以表示涅槃四雙常清以表示常樂我淨告滅者謂佛於此處首北面西背東足南右脅而臥入涅槃也背東者東主春能生成萬物佛既與衆生緣盡表不榮感也面西者西主秋秋是萬物將藏之時表佛於一切衆生合得度者皆已度訖未度者已作得度之因首北者北表冬是四時之未寂靜之義佛化緣既畢入於寂靜涅槃也右脅臥者右是一切作務時用之先以表佛於衆緣盡休作務也謂如來當此雙林告滅之時本為顯於常樂我淨大乘圓頓之教此時須跋陀羅等十仙道但證小乘無學之果也故知已下今師即可上文但悟解在出人心不關教有大小之指若由教者說大乘時合證大果等云云三毒勃興者謂明此三心能害人善根慧命故稱毒鈔中勃字蒲沒反廣雅中訓盛也心便者准智論問云煩惱因何名為便答生死相續中常隨衆生故名便者喻如乳母隨於小兒如涅槃相續如是次第相續增長故名為便且如貪與喜相應喜是受樂是貪心便苦為嗔使捨為癡使今言三毒勃興即以苦樂受捨為使也三毒既由於心心若不起三毒不興今若欲令心不起者有何方計鈔中釋云先以戒提不令心動次以定縛令澄停此心得其空寂後以慧煞即起無漏慧觀斷盡煩惱如是三學如鼎三足不可闕也今有不肖之人者肖者廣雅云似也說文云骨肉不相似曰不肖即子不似父等是輕戒慢弄小乘真經自重我之所學大乘之教也八十部者謂八十誦律也尸波羅蜜者此翻為戒即六度中一也六度豈是小乘耶不入耳者不肖之人耳也云故至等者百喻經者彼云譬如一師有二弟子其師有患遣二弟子各當一腳隨時案摩餘文如鈔云云不染其風者謂并得淨心地為利衆生現行十惡內無染心雖剛和光而不同塵若地前初心大士要同聲聞律儀謂未能離染濁過失不許逆行他也羅剎乞浮囊者此總喻五篇也初全乞喻四重乞半三分之一四分之一乃至微塵意道并吉羅尚護何況其餘如戒不煞等者智論云持戒能生檀波羅蜜此云布施布者遍也運心寬廣故施者惠也輕己惠他故有三種一財施二法施三無畏施以持戒自撿不假一切衆生即是財施又為既法開悟是法施又一切有情皆畏於死今持淨戒不煞名無畏施也云以至夫者玄云以此辨輕重等持證之即知前云聲聞之法於我大乘棄同糞土此言過分故云言過其實褒者讀美也佛藏等者案彼經云佛告舍利弗譬如黃門非男非女破戒比丘亦亦復如是不名出家不名在家又如蝙蝠欲捕鳥即入穴為鼠欲捕鼠即騰空為鳥而實無其大鳴之用其身𭊴穢但樂暗冥破戒之輩亦然既不入布薩自盜即非比丘又不為王便多不名白衣又不持淨戒即非比丘復剃髮染衣不名白衣又身有二犯之臰如彼蝙蝠又十輪云佛言若有衆生起於粗惡愚癡惡口離邪見貪著名稱說是大乘人亦讚歎大乘教他讀誦自不調伏然於大乘道如此之人雖得人身亦失二乘之果常趣惡道不欲親近諸有智人而唱是言我是大乘佛言譬如有驢披師子皮自以為師子有人違見亦謂師子驢未明時無能別既𧐠聲已遠近皆知實非師子諸人見已皆悉唾之此是弊驢非師子也如上之人亦復如是既造十惡燒滅人種非是聲聞辟支佛器雕壞種子誑惑他言我是大乘佛因說偈俍戾喜破戒若聞讚大乘詐稱為并驢披師子皮云云俟者侍也彼經自廣明譏呵不待此中陳顯塵豪者如調達化五百愚夫之類此亦恐同於彼故曰廣明通引二喻及旅諸教由恐不悟同斯塵染生死未窮故悲歎也已上釋第十三篇竟別義持犯釋相篇十四將釋此篇大分為二初牒名次釋云隨戒至十四者先明來意者前篇所辨篇聚名相違犯果報業位已彰上士隨依曉鏡心自欲便順持無犯細行由多若不隨事曲陳行相難識若斯之義故此明之釋名者順受曰隨對境禁防名戒名就境說無量無邊今約制論則二百五十一解其持犯之相也餘如常說次注文辨來意外難曰適來已辨來意今何又辨答前是講解之時相生來意今是製作衆辨此篇之意爾不重也准律條部以正本持犯未具下更列之者欲明此篇之意先述條部來意謂此篇倣他條部故正本持犯未具者二十揵度是正持犯說事未周故云未具彼離一一條仲上文問佛佛一一為部決疑情故云條部也下更列之者條部在二十揵度之後須列故也今為諸篇未足別生一位者古來及今淮南等記皆云二十九篇為諸篇未足由似揵度說事未周今別生隨相一位由如條部不異也若依此解良恐倣律不成也律文條部寂在二十揵度後今若持二十九篇為諸篇者隨相一位合居第三十也今依玄記正解云諸篇者即篇聚中五篇為諸篇也前促略翻唐梵之名義且未曾一一隨戒條辨二持二犯具闕相狀故曰諸篇未足由似彼二十犍度下更列之者更向篇聚後之列二百五戒一一釋其持犯相狀便同條部毗尼之似也此局雅聞問別生一位何鈔答云便條理隨相等云云解釋欲便牒五篇一一解釋疏理戒相持犯歷然揩摸法式軌則全定次依篇解判總意中云比丘至也者比丘者戒疏云梵天本音也苾芻者戒疏云傳訛也因草以立謂西國有草名曰苾芻此草具四德五義堪喻出家之士四德者衆草生時此草水生表佛未出世時一切外道邪徒興盛二此草生時衆草即滅沒三不容垢表無破戒塵垢故四引夢滋多表師資無絶所言五德者一莖芋端直表內心質直二香氣遠勝表戒香普薰三體性柔耎表於慈悲四不皆曰表不違佛制五冬夏長青表始終不變具上諸義故以彰名若云比丘此云怖魔果中能斷或二云乞士出家已乞食自濟身乞法以濟神等云云二百五十者舉數也意道此篇於此數下辨成持犯具闕之相令揩式軌定也略記八萬四千者仁王經云衆生未成佛并為煩惱衆生已成佛煩惱為并謂未成佛前有八萬四千塵勞門今對治彼故說八萬四千波羅蜜門未審八萬四千云何配屬先須配八萬四千塵勞門後配波羅蜜門初配塵勞門者真諦三藏依婆沙正義根本煩惱有十所謂貪嗔癡慢疑身見邊見見取邪見戒禁一一皆有九今隨眠即成十個十個成百一一有九今隨眠便成一千後分亦一千并本一百即成二千一百已起二千一百未起二千一百都成四千二百配五頻衆生貪嗔癡著我思覺一類有四千二百五類四五二十成二萬二五如十成一十總成二萬一千更配四類衆生多貪二萬一千餘王亦爾豈八萬四千此依法寶正義若依玄記一一皆有十今隨眠即是錯算數有剩也次配波羅蜜門者偈曰光耀至鶴林三百五十說六塵并四大二萬又一千貪嗔癡等分八萬四千說三百五十說者謂約前後都計三百五十度說法每一度皆說六波羅蜜三六一十八是一千八百又五十度五六三十是三百并前一千八百是二千一百將此二千一百配衆耳鼻舌身意六塵更有也水火風四大成十於此十中每一配二千一百十位中總成二萬一千更配四類衆生一類二萬一千豈非八萬四千也問此四類與上五類衆生何別答上五種是草說今四類據雙雙以論等分即一時起大德曰人多迷此即須知之廣說無量無邊者約境也無量無邊律儀者從境而起也在家人不具尸波羅蜜者以優婆塞是五戒八戒時但發身三口一四支不如出家人七支全具故云不具也尸波羅蜜即是戒度云依至焉者依之修行善識種相者謂依戒修行善識達罪種謂淫盜煞等識犯不犯及因果至果則輕相攬因成果了則重相也發生定慧尅剪煩惱者謂既識達已順而修行以戒淨故三昧現前則發生定定能生慧慧破煩惱名尅剪也暗於所緣隨流染惑者謂心為能緣戒相萬境為所緣若不了達識知名之為暗遂乃破戒遂生死流被五塵所涉名染惑也豈能反流生死方更流論苦趣者玄曰居不受戒隨俗為惡則是沉淪今若受戒所莫斷或出經高升樂境今却違戒翻為戒欺不能反生死流重加違制之罪故云方更沉淪苦趣也所以依教出相具顯持犯者謂其依律教出持犯相也准此行之粗無禍害者唯此行持庶由望也便望後人不生禍害禍害即犯戒招𠎝也云今至之者今但隨戒別指者謂隨二百五十戒一一別明持犯具闕對戒指示也直陳進不者謂對古來即於釋相之首廣作義門今師恐有繁詞又非急要但直論二持為進二犯為不更不別撰義草也通明心境具在方軌持犯中者謂簡此篇對一一戒子細別說若通持善惡二心對於萬境以說總義即如下篇所述也然戒是生死舟航等者謂生死瀑流之河須假戒舟方能度也若爾者沉沒其中何能出離又皆論云受持禁戒為性是出家五衆之宗必須受之以為要也身若無戒萬行無生種種福田豈預其分受者法界為量持者麟角猶多者祥瑞志云麟是瑞獸也博物志反名苑集云麒麟即牝牡之稱麒主陰即牝麟主陽即牡大德曰今人多一時呼麒麟兩字蓋是不識也猶如孤樆二家亦不合一時喚此麟形如馬有一角京房云是肉角非骨也尾似牛腳似人牛𤠸蹄顯有五色腹下黃高一丈二尺壽二千歲三千年一現此獸有德行不折草木不踏蟲蟻不入羅網不入窨開之中亦號為似人之獸若王有德則現堯時魯獲麟於野又儒書麟是瑞獸之長也大凡物類皆有其長如裸蟲三百六十六人為其長蟲三百六十六龜為長羽蟲三百六十六鳳凰為長毛蟲三百六十六麟為長也此獸稀現現時頭上但有一角無二並生次消文者上言受者法界為量寶云約受時於一切境上總作斷惡之心即發戒周遍也持者麟角猶者即隨行之中從一二條而已是二十也此但據一人身上受隨之時發戒及持戒條數以辨多少玄記云受人多則法界為量持人少如麟角猶言是多大德曰此非解也全成剩點之㒵良由未曉本詮故得隨塵生染者本詮者即本意也原佛制戒為調三毒令盡修道益故戒經曰戒淨有智慧便得第一道實由未曉此意故隨六塵之境起染濁心故云隨塵生染也此既聖賢問有欽序等者正生起下文之意也賢謂賢和大乘三賢小乘七賢聖謂正也大乘十聖小乘四聖皆共欽仰於戒結集之時先明律藏也序謂序述諸羅漢作論序述律文解說義理等是也何得抑忍不論者鈔主意云大小二乘聖人上乃讚說序述毗尼我等今日制造此鈔釋其戒相持犯不可抑遏忍而不論亦須讚述宣筆舒之者不事義章名為宣筆舒展也純也之者送句之詞也云略至不同者略分四別者一戒法者戒謂警禁之義法謂方法軌則也體通出離之道者本也意云此之戒法本是三乘之人修行趣聖出離之道不局聲聞故云通也又下文云上品持戒得佛道等戒體者納法在己名之為體即作無作出生衆行之本者一切衆行莫不由戒為本故經云戒為一切善法之所住處即衆行之本戒行者依戒而行因之為行方便修成順本受者如比丘三衣益理受持䠒跪加法並是方便順於受體等云云戒相者相狀也犯不犯之相狀即今所明云就至同者如文云初至之者聖道本基者三乘菩提名為聖道以戒為本故稱為基得生諸禪定者是彼論中自引經也從戒生禪定此通約戒辨也禪謂色界四地定謂無色界四地乃至首楞嚴定等云云及滅苦智慧者苦謂苦諦滅是滅諦由我淨故離集無苦修八支聖道則證滅也智慧者無生慧也如是智慧皆以戒為本基次引證文如鈔云二至久住者大用者有住持佛法之功用也並有勝能者謂會正之極勿先於戒攝亂歸真莫先於定斷惑證理莫先慧故云並有勝能也明義各別者毗尼明於戒義餘二明定慧義也理須略舉明毗尼等義三寶隆安者隆者興盛也安者住也戒能紹隆三寶不斷絶是安住義九道師訓者諸解極多今存正義三乘兼六趣為九也鈔前文云下為六道福田上則三乘因種以為良諸證行讀者憑附也萬行雖多皆附於戒故下文云發趣萬行戒為宗生賢聖依者大小二乘雖殊並依於戒而住必宗於戒者結歸勝德也次引律文及論證成易知所以爾者微詞也泛明化跡者泛由廣也廣明如來出現隨其機宜化衆生之蹤跡眷狀云詩書六經是先王之陳去呼訓勝也跡也通顯因果者通途顯其善惡二因感苦樂二果也事隨理通者是說一事皆就理中通釋以理事不相礙故事是俗諦理是真諦事即真之俗理即俗之真理事不二故云言無所寄寄由酌也理事一如隨說無妨促取衆生悟解之邊亦無酌定或說有佛或無佛或說求三辨或不可以身得不可心以得云云意實深遠幽遂昏怙未達者無明酒醉隨染六塵未能達了深遠之意也雖欲進修鮮得其要者謂雖然有依大乘修行之者少得其真實之指要多滯筌相者大德同筌字竹不作即筌曰第字也若從言即是詮量字也從全即銓平字也今竹下全是取莫之具莫入即順出即逆謂安筌本意求莫得莫便乃忘筌今將能詮教喻筌文下意旨喻莫尋能詮之名言貴得所詮之旨今既得旨便忘言今滯著能詮之言迷於所詮之旨故曰由迷教旨並皆粗現者謂對理教定慧為言今律教約事離過行成儀相外彰名為粗現形服異世者剃髮染衣與俗有別法則軌用有儀者約所秉之法促心念等終乎白四今今不同不許二文雜名有儀也住既與俗不同者僧四念處住俗乃六塵是不同也或有云僧是伽藍內住等不正等也雜行條然自別者衆自共三對境離惡所防既多故名雜行俗人對境多起過非僧乃對治與俗條別由世隨相有者因上來辨經論二藏事隨理通律藏粗現何故與餘仁有殊耶今即釋云由世隨相有謂真理中無名無相淫盜煞妄時與非時掘地壞生非威儀等名之與事由世間人隨其相現而有此諸名相故佛制法遂其世相譏嫌之邊而成故曰法遂相成也便能綱維不墜者謂從佛制戒之後俗人於法生信即得三寶久住不滅是不墜義又以法能資人等者謂自行成立義德外彰便能秉持徑仰衆之行故曰親衆行即是法假人弘也故律序曰聖衆若言和合世尊所稱譽以衆和合故佛法得久住證上住持功德法久住義也云三略解名義者謂解三種梵名兼釋三種種義也云依至名者依彼梵本具立三名者後是西天也三名即毗尼尸羅波羅提木叉也云初至脫為十八法中毗尼與律二名不並者律第五調達破僧戒中云破僧者謂十八法一法非法二律非律三犯非犯四若輕若重非重五有殘無殘六粗惡非惡七常行非常行八制非制無說非說已上九正九部都成十八法至狗腅彌揵度中明十八法便云毗尼非毗尼即不見更有律非律故知前言律處不著毗尼今言毗尼處不更云律但二處彰略互舉二名不並增一七種律者此是增七文中呼為七種律儀又增一中云七種律也謂七毗尼者謂由說也滅爭揵度云七毗尼增文中呼為七種律此七種律說為七毗尼引此四處之文皆是互舉故知將律翻毗尼者得本意也或以滅翻等者古師多將滅以翻毗尼從功能號為者古近能滅爭遠得滅果皆是功能也終非正譯者今師意不許也戒疏云若言毗尼有滅爭及滅果之功便翻為滅者只如水有滅火之能莫須喚水為滅不故以律翻等者結販正也譯二言尸羅者梵音也此翻為戒者此律無文促取智論明戒度之文以譯也六度所說良證可知者引論暗證也所言六度者六數也度者濟度即梵語檀那此云布施布者遍也心寬廣故施者惠也輟己惠他故即有二種一財二法三無畏施二梵語尸羅此云戒警禁曰戒即有三種一攝律儀二攝善法三饒益有情三梵語羼提此云忍辱被他加惡名辱於辱能忍受名忍亦有三種一耐怨害忍二安受苦忍三諦察法忍四梵語毗梨耶此云精進度精謂精勤進謂升進亦有三種一被甲精進二攝善精進三利樂精進五梵語禪那此云定心一境性曰定或云靜慮謂於諸境心不散亂亦有三種一安住靜慮二引發靜慮三辨事慮六梵語般若此云智慧觀察決斷名智推求簡擇名慧亦有三種一加行無分別慧二根本無分別慧三後三得無分別慧已上六種若具七最勝所攝受者一一能越生死瀑河得到涅槃彼岸今鈔引此六度者意證前來尸羅翻為戒也故云良證可知也三言波羅提木叉此云處處解脫者意和記云此謂從一切情非情處發得戒即約所戒處總是解脫據因為言若梵語撥剌底此云別別解脫謂於二百五十戒上別別防非而得解脫據果次說也云顯至終者謂律是能詮之教次依教起行行是戒既有其行終必尅果即以教為始以解脫果為終是以云一化始終明究竟解脫也云次明其義者前既翻三種唐梵之名今依此名而釋義理云初至也者戒疏云法者從教為名斷割重輕開遮持犯非法不定也云問至解者問意道修多羅毗曇二藏亦明行法何不標其法名獨是毗尼得法也答中先取法名引生後二者謂先能生後故取法名後不能生前故不與法字玄云准智論法有二義一持自性義二軌生物解義是以論云軌生物解名之為法此則三藏俱同今律藏偏彰法者於總中立別也別有二義一者多諸軌則決判輕重二能引生後之定慧由戒淨故定慧現前所得法名餘二不然故不彰於法也所以前標律者微詞也意云律戒解脫此之三種名雖不同莫不總為調於三毒何故三中最先標律耶微竟由出家等者釋也顯內法亦異者謂沙門斷三毒修三學故云異也外道俗流濫同聖跡者玄云謂出家外道身無戒法與俗同流因飢餓故偷入佛法之中輒自剃落與真故家人相濫故也若是尋常俗流即條然自別何得有濫大德云不正也外道自是出家外道如西天九十六等緣起如律中也俗流即是白衣本非外道或有俗人猒苦輒自偷形入佛法中無師出家之類此上二種既盜入佛法中總是濫同聖跡須知此分開說之若言外道便是俗流促成一義故不可也無由取別妙以法除者謂賊之人濫同聖跡不可𩔱間分其差別促先將三衣益唐梵之名間淨及何法持此衣鉢及六念等彼若不解便知非實依法驅之除濫之妙莫先於律於三之內先顯律名即顯此律有除之法及諸軌則之法等云云餘如常解者所稟指戒疏筆義分義鈔不更明且顯法義法義之外曰餘即是上來兩種也此為正玄返引別意全不相當言二至也者類通法界廣如後明者指下戒體門中發戒緣境處說也秦言性善者謂於法界境上起於善心發無作善以此善為性也善生等五義一一如鈔不勞更辨云云惡律儀不律儀等者如屠兒獄中等家父子代代相承為此惡業本不須受促蟲此家時自然得此惡律儀也若祖父本是十善已後生子絲自樂作此惡業即約彼發心辨此煞具之時惡戒隨此心時得也此則以戒從教立名者善惡二戒即是其行律儀即是其教合言善惡律儀此則所詮戒行從能證教立名也此因從果為號者謂戒無是其因木叉是果今云木叉者戒也此是果上立其因名故云此因云云云三至說者隨分果者戒疏云緣通萬境行亦通遍持行陵犯則名得脫隨相解脫者謂身口七支對境防非非若不起隨一一相皆名解脫遠趣戒德戒者果時解脫也因戒尅聖者因持淨戒尅由獲也三乘聖果望彼絶纍者謂今凡時望後得聖時為彼也無三毒煩惱故云絶纍由遵戒本者由遵仰正戒以為基本餘如後體門中敘說也云四具緣不同者牒名也云若至舉者若論末代唯羯磨一受簡於餘受當代不行故藉因托緣便能畏立者要假藉受人發心為必托人僧界法衣鉢具足緣也便能長立者玄記引多論云有六義一時長通現未二處遍三方除北州三報兼男女四位說凡聖五所枝無數六多坐作法以斯諸義佛法始終名為長立其受緣相如上卷一門者指第八篇廣辨因緣相狀云云受是比丘大綱者羯磨受法聖制從緣緣集則功成緣差則戒體無立若受不得即無福田之義也佛法根本者秉宣大法皆由戒淨法從此生然後成佛故云根本更略標舉者對上卷已辨受之具緣能受所對已說今於此中再標舉之顯其所為處大也云依至不得者受者三根無染者為約彌沙名受者三根無染即據十師無三根染濁被他受戒者見聞疑等通望十師等者適來將沙彌對十師以言今除受人促於十中自相望以說也目者似也少也少似有三根即不可故境非足數者十師為境若具上三根即不足也心不具法者雖無三根為他見聞於教不多曉了證他受戒亦是不得言語不具者脫漏一句如乃至一字也前後不次者文詞雖足無其次序或將前向後等是說不明了者雖不缺字前後依其次第呼喚奔鹵不令人會等是如足數中者應來不來應與欲不與欲現前得呵人呵等廣如前述云云云又至也者餘十二難同者此文亦有錯解今存正義鈔云同者同不得戒及不得作和上故毗尼母中具列十三難事並云不得作和上所以爾者是人身無戒故辨禪無漏一切不得者良由破戒業故障定不發禪戒亦無漏固宜無也故云一切不得無難因緣等者既無難緣據僧之義廣狹不同今無難准有難者作法受戒並是非法不成故也共比丘同戒者雙證有受有持也戒疏云共比丘者約所受體同若犯重則不同也同戒者戒疏云佛所制戒隨行通行促受無隨亦無戒護以受持同故等者轉釋上義可知多論問云乃至無心得者問意云從初羯磨至三番竟時於其中間四心之中何心得戒通是得戒者答也戒疏中引多論云皆須先有求戒善心合掌禮僧白羯磨起諸教業相續善心成就是名善心得其不善心謂嗔恚心是不善也及無記心謂睡眠等是無記也無心者如五位無心一人無想定二生無想文三入滅定四悶絶五種睡不夢時是無心也今言受戒時無心者如耶合沙彌正受戒時入滅盡定皆藉前有方便求戒善心聞單白後入餘心者云判得戒也若爾者領解之詞也何故律云以下正將四分來難多宗也適言由心中有不善心亦許得戒何故律云嗔恚等人不得戒也准律中有俗人家中相嫌便來伽藍求出家諸比丘使為剃髮受戒後却還家諸比丘問其因由彼答云我本無心故家以暫嗔心故耳諸比丘徒以此白佛佛言嗔恚人受不得戒也又有睡者律云有白衣至僧防內眠諸比丘與彼受戒其人睡覺却還家亦以白佛佛言睡人不得更有狂人亦爾爾答曰作之時具上四心等者謂約羯磨至竟以來皆名是後前善不得者釋通上來依自之時四心之中餘不可爾何故善心不得鈔牒斯意故云前善心不得者謂泛緣等者釋通也謂據他無心緣戒促泛緣念誦施食等雜善故不得戒也更難若爾既言無心莫同適來五位無心不鈔又釋通云不類餘無心也此促無其緣戒戒心名為無心不類前來五位是一向無心也云五至法者優劣者優是強勝義劣是𣷫劣義此門將木叉戒對禪無漏戒辨優劣道理由立此門者立此優劣門也知戒是勝者謂知木叉戒勝發生定慧尅獲三乘道果一切萬行皆因此戒入道之前緣也便能護持無失於相者行人知戒有此功能便及護持令身口七支免生過失成其持相不生犯相也婆論者婆是薩婆多非謂婆沙論也玄云此中都有五義四義對二辨第五促對禪戒以明論文如此初約有佛時勝以佛出世時稀疏故勝禪者謂有漏四禪外道亦不假佛法在世故劣無漏戒者謂苦忍已去人無漏心不為煩惱之所漏泄故云無漏也一切時有不論佛在滅後及總無佛法之時如無漏戒緣覺亦有以緣覺出無佛世又如涅槃云初果之人雖生惡國道力不作惡等性戒成就一一證無漏之後經生不失豈非一切時有也次約攝境寬狹以辨勝劣禪無漏者唯有情發非情草木等不發遮戒於有情中修得無漏者始終得戒未修不發狹故不如也三約慈心以說多論云於一切衆生境上起慈慜心得木叉戒禪無漏戒不用慈心得從猒離心中得為明勝劣慈心能為成佛之因發四弘願等則勝為促猒離劣故不如四約功用辨勝劣玄云夫能雖持佛法七衆在世間三乘果相續不斷並己木叉為根本謂七衆同受此戒故禪無漏等不爾故劣三道者准毗羅三昧經云佛出世故有三道即人天涅槃今木叉佛出故有被及七衆為三業希之正因住持三寶令不斷絶受木叉者近得人天遠得涅槃為此義故勝於餘二也五約內外辨若禪戒者外道修德四禪四無色定時即能發之故云外道亦有此中不出無漏者謂佛弟子受木叉竟亦得無漏故不出也善見等者論云波羅提木叉者名無等學諸光明中日光為王諸山之中須彌為最一切世間學中波羅提木叉為最如來出世便有此法若無佛出則無有人竪立此法故勝鬘經云聲聞乘中亦無此戒緣覺乘中亦無此戒并乘中亦無戒唯佛乘中獨有此戒由佛能制故也云六重受者謂木叉戒一受已後為更許重重增之為一受已真揩摸永足不可增因此有兩宗所執不同如下自陳今且漂起故云云釋中云依至定者依薩婆多宗者謂多宗中自有兩師義今且敘第一師二戒定不許重受也戒不重發亦不重受者良以不許重發是以不許重受此通五八十具於此四位之中每位唯得一度受如曾受五戒竟更不得再受五戒餘三亦爾故彼論云木叉戒無重得譬如富貴家子不須重著瓔珞也不重發者且如初受五戒時向情境上已發不煞等無表境後若受時不煞先表不異於前不可更發也若先受五戒了今受八戒即無妨也故心論云五外方十十外方具如本末是下品心受五戒竟次起中品心受十戒前煞等五仍下品心定更不發或於五戒外所發者方是中品也後發上品心受具戒者前受十戒仍本中品於十戒外發者方是上品故云戒不重發亦不重受也罪不重犯者將不重犯顯戒不重發也如前引十誦云同名之罪則有重犯同種之罪則無重犯依本常定者正明不重之義也云故羅漢心中下品戒者引文誠證也故婆沙論云年二十苾芻得上品律儀羅漢比丘得下品戒依本常定也若許重發即羅漢轉為上品戒也云若至耶者欲明重受先難前宗若爾兩字領解之詞適言不重發不重受先是下品心受得下品戒依此一品便永定者故云若爾也何故戒有羸者正難前師不重發道理也云答至體者多宗初師答意云律文中戒羸不羸者對隨中以言何開受體謂隨行對治心強則肌若元無攝護身口雖未作對此說說為羸我今不重發等自約受體為言云何將隨行來難故不可也云亦可至微者此敘多宗第二義也彼宗九師翻定本宗兩戒成實雙建二理故有亦可之言作戒隨心一品定者法寶俱舍中說作戒從剎那得不從因得謂剎那剎那相續念念不絶第三羯磨業成時便落謝不可追及無重發之義即印定之故云隨心一品也與成宗作戒尼發亦同也又問如那含沙彌單白未竟便入無心具作戒不答順正理師許有促劣故不具足謂初作白時亦有剎那促為中間便入無心間隔是以剎那不續故劣若云全無即不可也下品戒依本定者約作戒說亦有何乖成宗戒許重發者據無作論故云亦可也謂其作戒第二羯磨業成就時一念落謝本所要期上中下心隨在何心成就落謝即隨此心豈不為期一品常定事體謝往即無重發若論無依不隨上中下心未四捨前長時防非致其隨行肌羸不定可得為其重發之義隨行若增以隨資受受體肌而圓滿隨行若微以隨資受受體乃羸據此受隨相資肌義不定今亦重增上品無作即可成其上品也鈔引此師意歸成實只恐不許無作有重發義必許之無作既有重發重受作戒亦有重發之理何疑據上立珿作戒𪷛落謝無重發義可爾何妨重受前受由是下品常定後更重受發上品心亦隨此心作戒而成上品前得不失隨勝受名也云故至也者有人言等者由是問重發義也答中一日之中受七善律儀者彼論問曰律儀幾時可得答有人受一日齊是初律儀即日受優婆塞是第二即日出家作沙彌是第三即日受具是第四即日得禪是第五即日無色定是第六即日無漏是第七律儀准南錯破鈔此未達意也隨德道處更得儀者准論本文得無漏已下偏釋無漏律儀謂得初果發得律儀乃至第四果更得律儀離七數外又別新得故云更得也難曰適言一日受善律儀律儀既乃各別何得言重明文中答云本得不失舊戒由存勝者受名別加斷號豈非重也且如先下品心受五戒次起中品心受十戒於前下品五戒增為中品別發得中品五戒此約體由僧也後起上品心受具戒時增前中品十戒為上品別發得上品二百四十戒亦體由僧也若准多宗先下品心受五戒次起中品心受十戒別發得十體外僧也次起上品心受且時別發得二百五十上品戒亦體外增故於一苾芻身中二百六十五戒同時而轉若不如是捨比丘戒時合為自衣也云云今成宗既許體內僧何妨本是下品心受具戒今增為中品上品亦得云云其七善者體文雖云一日中受七善律儀未如名字今更列也五戒者優婆塞戒亦號近事戒八戒者八關齊戒亦云近住戒也十戒者沙彌戒也具戒者大比丘尼戒名無願毗尼也禪戒者謂四禪根本色界具足諸支定慧功等名禪戒也定戒者不具諸支定多慧少名之定也道共者謂戒與道俱亦名無漏戒謂見道中苦忍初剎那心已去得之也云如至不失者師資傳五卷梁僧祐撰此傳即亦有重受之理與成論及婆沙第二十卷亦同本夏不失者前是下始時夏今是僧為上品勝劣雖殊本夏仍舊也此增修者說云若今時疑恐先來衣鉢不具僧數不足俗乎未滿慮當時受不得是以再受即不在此例知云經至次者僧傳者高僧傳也祇桓寺者是楊州今弘寧縣是也晉宋陳並都江左也慧照等者是求增勝之人僧伽跋摩者中天三藏為辨受戒之者更求增勝者發上品心顯勝者受者也依本臘次者顯本得不失也云震嶺受緣者牒名也先辨來意謂上六門通說戒法功用等已知未審佛教何時流到此方戒法何人相傳誰人先受等故此明之震者國名嶺者山號西天呼此為震旦或云真丹栴丹指那此云大漢國今存異名或云震宮如前序中已述荒嶺存于闐國西南二千餘里嶺國通標為簡溫故並如序中廣明也受者納法為義緣者緣由言余至中者嗟古臆說也餘戒也泛聞其說不定其人先無從始者不知初受何時依何羯磨何人先德俱不悉知縱今等者設今受時何數有鬪衣鉢不全等是乖於緣其據先無從始之理亦合得戒不用生疑但有奉戒之心作網法意即得此是所聞之語也忽聞下今師嗟歎也喟然者說文云大息也即歎息之聲雷霆者爾雅云疾雷曰霆霹霽也七曜者日月及五星並有照燭之能名曜東方歲木之精南方熒惑火之精西方太白金之精北方辰星水之精中方鎮星土之精振動也麗明也雷霆與七曜張振地麗天而盲聾二人不能聞見由其𨷂二根非震曜之咎比今寡學者不能知戒緣由如盲聾之人也管識者小見也厝置也言其見小如管窺天妄豈如上兔無從始之語故具引至不得者破少乖緣具等之言也此土受具下破無從始之語縱緣境有濫者緣為能秉法僧及界衣鉢假借羯磨落非等境謂沙彌自有遮難得不得等並如受戒篇中已明次正明初言所至犯者通標僧尼未全律範初句標可知欲用僧尼得戒時節先明佛法到此之時故云自漢明等也自從也漢即後漢國名明即帝號迦謂迦葉摩騰竺法蘭舉二姓對漢明帝也謂佛在周第四昭王二十四年生至第五穆王五十二年入滅盡同四十八主歸秦秦得六主歸前漢云云十三帝歸後漢第一光武帝第二明帝改號弘始元年得四年改為永平至五年或云三年或云七年帝夢金人第長丈六項佩圓光自西而至威光赫奕照於殿庭乃回集羣臣共詳此夢時有通人傅毅奏曰臣謹案周書異記云西域有臣曰佛周昭王時生穆王時滅生滅之時皆有瑞應未至此方入滅之時此土牛後天陰山川振動白虹十二道貫於太微連夜不滅穆王乃問群臣時大臣扈多奏曰西方有聖人入滅滅後千年教法合傳此土穆王令鐫之於石埋在南郡天祠之前臣今次用子排之已過千歲陛下所夢必是其徵帝聞大悅至七年發漢渡十八人蔡情於反秦景博士王遵等往迎請佛教行至月支國遇迦竺二尊者將四十二章等經白氈𦘕釋迦佛像以白馬馱欲來此土遂與漢使相隨永平十年丁卯到此洛陽鴻臚寺安置至十一年於雍門外別造僧坊名白馬寺乃漢土寺之初至十四年正月五嶽道士進表請與西來胡僧捔試表大略云臣聞太上元形無名無極無上虗無自然大道元首自從造化道教從生無上無形之尊道之元父千聖同遵百王不易今陛下道邁義萬軒德過堯舜光澤四海八表歸仁臣等竊見階下弃本逐末求教西域所事者並是胡師所說不參華夏復諸胡人用翻其語託同似漢雖翻此言恐非所用今請諸山道士多有聰明智慧博通經史無星已來凡是符書呪述無不備明或有餐風餌氣或有驅榮見神或白日升天或隱形於地或治水不溺或入火不燒乞與比試若也不如任當痛決等云云帝允其言問騰蘭二尊者云有何排擬二僧曰龍吟雲起非蚯蚓之所能虎嘯風生豈跛驢所及雷門之下布鼓難明臨歒即旋何必預搔待癢帝遂今排比於雍門外道來置三壇壇開二十四門時南嶽褚善信東嶽劉正念西嶽桓文度北嶽集得心中獄呂慧通及霍山天因白鹿五臺等十八山道士六百九十人共賫靈寶真文太上王訣元皇符籙九百九卷置一壇又以二十七家子書茆成子等置一壇又以食饌之物置於一壇道安置佛像經教明帝仰行殿在南於正月十五日悉皆雲集時道道祭日臣等上祭太極太道元始天尊衆仙百靈今胡神亂夏人主信邪正教失蹤玄風墜緒今敢置經於壇上次太取驗欲聞示蒙心得辨真僞言說二教一時以火焚之于時道教被焚經火化道士相顧失色所有步刀履火之術驅䇿鬼神之方悉不能行褚善信自感而死時取教被焚宛然如故光明五色直上空中盤旋如蓋覆於大衆摩騰覩斯相已踊身虗空作十八變出梵音聲說偈嘆曰狐非師子類燈非日月明池無巨海納丘無嵩嶽榮法雲垂世界善種得開萠顯通希法處處化衆生又為大衆說施戒功德等時四嶽道士六百二十人皆來出家京官司空陽城侯劉善㻐等四百餘人及陰夫人王掶姊等百九十人婦女阿潘等一百二十人皆求出家數盈千明帝皆聽乃於城外置崇臺等七寺安僧城興聖等三寺安尼遂敕城華燃燈表佛教已行破其昏暗今正月半燃燈即其古事從永平十年丁卯佛法初來至今天復三年癸亥計八百三十七年矣迄至曹魏等者至漢第四十帝末歸於魏朝曹丕登位改為黃初元年魏國既多今以姓簡故云曹魏佛法至此一百五十五年已來出家者衆故云極盛未稟歸戒者但受三歸五戒而已未稟受十戒三歸及於具戒但剃髮被縵條異於俗類故云剪落殊俗當時雖有齊設但一時陳列飯食屈僧就座而餐同於祭祀故云事同祠祀云後有至也者明僧得戒時也後有者至黃初三年有三藏曇摩迦羅到此僧高傳云其人聰敏質貌壞瑋尋讀一覽文義悉通善四圍陀妙五明論圖識變運無所不說因入僧坊見法勝毗曇尋討莫知旨趣因嘆佛法鈎深遂即出家學通三藏來至許欲流通教法未及遂情更經三十年至第三少帝時改號為嘉平元年至六年被司馬仲達廢帝為齊王高貴御公攝改號為正始元年曇摩上表於御公遂辨異戒事云云中夏者即九州之中陽翟是若據瞻部州地分屬邊坊今約大唐得名夏故戒疏云此方嵩嶽亦號中華且據軒轅局談中表即舊洛陽城也改先妄習者改事同祠祀之妄習出僧祇戒心者法時譯出僧祗戒本是律中制戒之本如人之心與人諷念又有曇諦等者當時又有安息國曇諦律師到此念出四分羯磨為此云僧尼受戒故云受戒之初也朱士行為首從嘉平元年甲午亦名正元元年至今天復三年癸亥凡經六百五十年矣逆推去永平丁卯佛法初來時經百八十七年方得具戒次明尼衆言比丘重受者夫尼衆得戒有二若魏朝一衆受者同於大僧如上所辨若論二衆作法即在江南宋時是本吳也且明吳地有佛時自開闢之後至兩漢已來國無二王並皆一統雖有諸小國總名諸侯為一大國所管至漢末魏初方鼎分天下魏曹丕登位之後改號黃初元年有劉備身長七尺五寸曾與魏主同討黃巾有功纍授益州官至黃初二年分兩川以為蜀同至三年有孫權方顯大口目有神光亦同討黃巾有功纍授刑州官遂分江南以為吳國自立年改黃武元年至六年改為黃龍云云得四年改嘉永云云得六年改為赤烏元年至十年魏國有僧姓康名僧會康居國人欲狹道振江左建立圖寺乃杖鍚東遊來于建業於石頭城外營立茆茨音設像行道時吳人初見僧儀覩形未知其道遂奏吳主曰胡人入境自稱沙門形服異常事應檢察吳主曰朕聞漢明夢神曰佛彼之所事豈其遺風至此乃詔問云率土之內莫非王臣何得獨改形容如此會日我師本生西國號曰釋迦文滅後千年教法流於此土遺形舍利神耀無方可以祈求與衆生作福吳主合置道場祈請限七日又限二七日並無所見又限三七日亦無所得會語諸法屬曰宣尼有言文王既沒文不在茲乎法雲垂降而吾等無感何假王憲當以誓死為期遂更虗祈至夜五更忽聞道場瓶中有聲乃得一粒舍利明且進上吳主光明赫奕令置盤中舍利所衝盤皆有損又令力士擊之招槌皆損舍利無虧因而生信遂為造寺號為建初因改其地為佛陀里由茲吳地佛法流行至今天復三年癸亥六百五十七年吳逆推去吳國初災時已十六年年矣其魏國得五主四十五年禪歸西晉其吳國得四主五十九年被西晉元帝改為一統西晉得四主五十二年為前趙劉聰滅晉家有五王琅耶南頓西陽鼓城汝南獲濟江表於吳國舊都琅耶王承制立為東晉初元帝二明帝至第三成帝咸康年中有彭城婦女阿神東晉神嵩尚書之女見僧法始經中有比丘尼字問之云云因請出家名為淨檢初於智山邊受三歸五戒而已後至第五穆帝升平元年檢等四人泛舟于泗於法泰邊准五分愛道初緣從一衆受大戒倣大僧戒本撰尼戒本令念此即江南尼衆一衆受戒之物也鈔並略不敘也其來晉得十一帝一百三十遂歸於宋至第三文帝元嘉六年有求跋那摩至此是接鈔文也此云功德鎧至南陽州上元是譯善生戒等諸經明二十四戒其年又難提高人從從師子國載得八尼至都於影福寺置安或云景福也見此土有大尼怪問云既未有梵尼來於誰邊受戒故鈔云何得二衆受戒此土惠果淨者答曰准五分愛道初緣從大僧一衆得此答文鈔略名尼傳云果雖此答而心有疑又將此事問求那三藏亦如尼所問此問辨鈔文亦略摩曰下是求那答惠果尼即成其說也意曰尼從大僧羯磨言下得戒先令作本法為受之方便全生信心未是得戒但大僧作法如法即是得戒准僧合有此四鈔略中二但有初八尼問後求那答也諸尼苦求更受即惠果淨音諸尼求再從二衆作法答曰下求那許可如文其令面尼學語等者以八尼初到未善方言又人數未足適遇難提却回本國八尼將書更請尼來足數故云也至元嘉下發信之後更有僧伽跋摩明間律論冒涉流砂到此宋地流沙者其砂如河水流故准般若論序云冒氷霜而涉葱嶺犯風熱而渡砂河亦名莫賀迮磧八百餘里上絶飛禽下無走獸唐三藏親經此過今衆鎧亦經此來云云初求那雖許尼再受至九年九月二十八日卒於南林寺故云未備而終也俄而下不久之間難提却回請得鐵索羅等三人到此人數既足於十一年甲戌之春請衆鎧為羯磨闍梨於南林寺求那壇上與二衆受戒凡經一十一日法事所度者三百餘人至今天復三年癸亥得四百七十年矣逆推去永平丁卯佛法初來經三百六十七年方得二衆受戒其跋摩三藏至十九年隨舶船升西不知終日鐵索羅等五人卒於此土塔在廣南餘者却婦西國上明傳記有僧尼俗有一受言出至鏡者結也高僧傳十三卷梁嘉祥寺慧皎撰名僧傳三十一卷梁寶昌奉敕撰僧史十卷南齊王棟栖撰僧録十五卷隨費長房撰晉雜録百七十卷寶昌撰有問云高名何別卷寡得適時名而不高實行潛光高而不名故分二別龜鏡者龜知過未鏡鑒現在又龜有靈能知鏡有明能照今引諸傳記誠證足知漢境僧尼得戒緣由時代分明如龜如鏡也收科云云云二至量者四門分之者舉數也一戒體下列名也戒體相狀者辨作無作二戒體性相狀受隨同異者受納登壇之時跪禮於萬境上作斷惡修善之心等云云隨有二種謂順前體持衣說淨為作其衣任運有無作生并此二種同異也緣境闊狹者謂過現未三發者則寬若促現現在發者即狹發戒數量者謂約情境數量多少也云初中至多少者初中兩字牒前戒體相狀五門是標一辨也下列也云初至離者五門之首故云初中也別解脫戒人並受之者法寶云此約能秉之人說也意道凡有佛法流處便有人謂他作師受戒故云人並受之或有約沙彌說者非也及論明識上可三五者謂明識八法調理九法往還遮難是非緣境心量如是之相明識者少百人之中正可三五所以爾者鈔文釋云皆由先無通敏等云云敏者達也先無通方之達又不肯咨詢請問於人在傳云訪問於善為咨咨親曰詢咨問善道詢問親戚之義致令兩字躡上之詞由上不敏不詢則致令正為他人受戒之時多昏體相昏暗問難之體及以發戒之相盲夢心中者喻不識盲人不親見色促相承言之如云此物甚白由似於靈盲者既不見雪如何得知又夢中所見不得其實今昏體相如盲夢之人心故將此作喻也緣成而已者為促有十僧結界衣鉢具足秉於羯磨信此等緣而成就也及論得不眇同河漢者眇者爾雅云遠見也河漢者玄曰在地曰河在天曰漢蓋取天地隔遠之義若依寶云河是黃河漢是河上氣也遠處看之亦似於水即水漢不分之貌所以爾者緣黃河徒崑崙山下覆流出此水水直從阿耨池流來謂西土地形高故號天傾西北地缺以東南低故有人云與天河連者全是地錯也寶曰昔有張騫音軒尋河至崑崙山疊石涯却轉去緣此水從此山下覆流而出遠處看之似從天上來故儒書云阿崑崙等今鈔昔此意顯上昏教之人不委得戒爾得齊限不分由同河漢也諸門示現者玄記取法體行相為諸門此釋似有妨上句既隨相之首今若指法體等為諸門即須移此改變在戒法第一門之前安置也今所稟取第四戒相之前名隨相之者即此戒體自有九科并戒行不少名為諸門也指示顯現後人令曉方軌即收得前後意足准知己身得戒成不者將此檢驗行人身有戒無戒云云名不有戒曰成然後持犯方可修離者為身若有戒即有二持之善可修二犯之𠎝可離若本來無體上無持可修無犯可離也言問至盡者問意曰別解脫之戒從緣發生全緣境既多戒有幾種答意者此明境多令戒亦多故羯磨疏云戒本防非非通萬境戒隨境攝則無量也引善生經五種為量證戒多義也今以義推等者約義明也作義者謂約受時於諸惡境作斷惡修善心於諸境作修學意名為作戒前境雖多今以義收無非作戒又問是色心為體無作義者於羯磨後任運防非義同前境遍周法界無作俱能防諸境非又同是非色非心為境雖至多但以二教之名道攝無不盡也云二至義者牒名也言初至量者問意云何不立一作戒不然立一無作不然更合立作二不得單立無作若單立一作戒促在一念非通一形何能防非又不可長時作者一受已難義非數作故須無作長時防也若單立無作起無所從者無作是果作戒是因因能生果所以無作藉作而起心不孤然自發是以二法相藉不得立一何為不三者為者故也適來但答不得立一須立於二未答不三今更牒起前來難詞也體相道理相違等者謂約作體作相無作相二種體相道理相違不可合也下句自釋體相相違一作無作別者釋相相違作是運動動是作相無作非運動無作即無相相與無相道理相違二心非心別者釋體別也作戒是色心無作非色心又作要須與色心俱無心不成戒體無作四心三性不假緣成是以別也餘可知云二至靈者二引證者調前文中唯得立二是爾師約義明之今更廣引請教戒定有二種有無一三之說也若淳重心者此明二戒之日淳是厚義濃厚善心復須殷重身口是作無教是無作若輕浮心不具二戒之因但有其作無無作也初一念色有身口發及以無教者明二戒雙教現無立一理也此約第三番羯磨欲意之時名為初念當此之時便有作戒故曰有身口教復有受中無作故云及以無教也此並約羯磨欲竟竟時也若羯磨竟名第二念當此之時但有無隨作戒故言唯有無數作既落謝故云無其教也則作無作長短有別不可合為三也次辨注文者兩解一搜玄作和會以此言教即釋是作此言無教即是無作故云不可教示於他既言不可教示即顯無也彼教此作雖殊無義未曾有別次依法寶作簡濫解此言教者即是作之異名不是教他之教也兩說俱正鈔引涅槃經有三意初標列證有二種二是人下證單立作戒不能防非名不具足三即如下鈔指多論釋不具足所以並如文可委次引善生或為作色無無作色者身三口四意三業中若輕心造則但有作不發無作若重心造具作無作也十善反之極香臰物者極香喻善作戒極臰物前惡作戒彼質雖無餘氣猶在喻淳重發善惡無作也瓦未者執時既非香𭊴置之餘氣亦無喻輕淳心但有作無無作也以上等者結文可知去次至名者此間作及無作名也言答至便者所言作者標也謂身口方便造趣營為名之為作如陶家輪者舉喻也謂報色身善惡鼓動起身方便色即䠒跪合掌取此方便色名為戒作故舉陶家輪平動轉時亦名作也雜心等者彼云作者身動身方便身是報色動身方便䠒跪合掌是方便也玄對此廣引古解繁而不敘云言至作者無作者標也一發續現者准多論此無作者與其作戒初一念中俱時而有從初有時盡於一形相續不斷故云一發續現亦討作戒作伏謝往無作不滅而是一發續現之義若依成宗第一剎那發生第三剎那已後相續不斷名一發續現始末恆有者謂獲得時為始臨四時為末中間縱人惡無記中無作亦不失故云惟有四心者成論云識想受行為四也三性者善不善無記也不藉緣辨者謂無作一發已後更不改緣任運常在不問作戒也身動滅已者作戒亦落謝准有無作與餘識俱者與餘識心俱時而為謂受得後望餘善心及惡無記名為餘識無作常存故云俱也是法隨生者謂是無作隨彼善惡無記心不失故曰隨生非謂別更有法斬新生也發正記破鈔云但釋無作義全未見釋名者不然也鈔文釋向義下即顯其名也如前又云動轉是作義即此動轉之時名之為作便是釋名也又無作中四心三性始未恆有是釋無作義不藉緣辨即無作名不細看文粗心妄破息之成論無作品等彼自問曰何法名無作答曰心生罪福睡眠悶等是時常生故名無作論云如此罪福者即善惡律儀謂作善惡以為因各發無作雖睡悶等無作常有不失故云常生云何至也者如文第三出體狀文二言三出體狀者牒名也疏云體謂業體正是戒法所依本也經論所談善惡業者名也今述作無作者業之體也混名從體也離實談名異也多論陳體教無教成論雜心作無作皆略名詮體義說動靜難顯其相也釋中二初言二論不同者總標二論謂成實婆多也多論是一切有部名為成實論分通本業經部是假名宗今四分曇無德部教雖小乘義通大乘與成宗同計故下文云依成宗出體其多宗出體非此所論宗故但標而已答據東塔疏全依多宗出體蓋是迷宗之失也若相部與鈔同意成宗雖然不依於多宗先向疏中具列多宗戒體後別成宗今南山云既非所承鈔中亦不更引但果有標舉鈔雖不敘今依羯磨疏先出多宗有部戒體六門分別一有為無為分別二三聚分別三三色分別四本報方便分別五三性分別六始終分別初門者先辨有宗法類次辨有宗無為有宗七十五法束為五位一色位有十一謂五根五境無表二心位唯意識心王一法三心所位分六一通大地有十受相思觸欲念慧與作意勝解三摩地二大善地十信不放逸輕安捨慚愧無貪無嗔不害勤三大不善地有二無愧無慚四大煩惱有六癡放逸懈怠不信昏沉掉舉五小煩惱有十忿覆慳嫉惱害恨諂誑憍六不定地有八尋伺貪嗔疑慢睡眠惡作四不相應十四得非得同分無想果無想定滅盡定命根生住異滅名身文身五無為有三虗空擇滅非擇滅此化列其名數釋名體如別所明於此五位中前四是有為後一是無為今此二戒唯是有為以做緣成得此業體四相所遷有失壞故問何以非無為答虗空無為以無礙為性色於中行不為能礙所礙故擇滅無為由慧力簡擇得故非擇滅無為於緣問位中顯得故今此二戒非此三體性故不是無為位也二於有為中三聚分別一色聚攝十一色二心聚攝心王及四十六心所三非色非心聚即十四不相應也今此二戒唯在色聚不能緣慮故非心聚故疏云若以心為業體者心念煞盜亦應成犯但以中根力劣不約心論且就身口發無作體還防身口粗現業非既在色狀故非第三聚攝也三於色聚中約三色分別此十一色義求為三一可見有對色謂色境為眼所見名可見假極微成名有對二不可見有對謂眼等五根聲香味觸此九非眼所見名不可見皆假極微成有對礙故名有對三不可見無對色謂無表也非眼所見極微成故問五根現為眼所見何以名不可見答現見根者但是浮塵假根屬顯形二色攝真根不可見但以比量智如根如蒲桃減耳如卷擇先鼻如雙爪甲舌如偃月刀身根遍一切處皆依今假假住故名不可見然皆假極微成名有對也四塵亦然今此身表是可知見有對色語表是不可見有對色無表即不可見無對色問無表何非有對耶夫有對有三一障礙有對如五根五境互相對礙如手礙手如石礙石二境界有對謂五根與七心心所同能取色等五境為境所拘礙故三所緣有對誦七心心所皆能緣境亦為境所拘故今無表非前三義故名無對心伽二論亦然四於三色中本報方便分別謂報色方便色本聲方便聲且身表戒是方便色非報色以報色體唯無記要須於報色上別為大種造成方便色能跪禮等為作戒體故論云身表許別形謂有部宗自相傳許故問報與方便何別答或一或異如上釋名中已明如水波喻或一者鼓動報色成方便色故如波不離水或異者任運酬因是報色長短等是方便色二報色唯記方便通三性三報由往業生方便現緣起如水波濕動二別也今取方便色為身作體語表者方便聲非本聲夫言聲者無報得聲故俱舍云聲無異熟生法酬因而起一得永定聲則不爾故無報聲問若爾者何故經云善修遠離麁惡語言感得大梵音聲相又如賢愚經說昔有國王欲造塔有臣諫王令滅層級而於塔上自施鍾鈴後得為人出家身形短小即録囊也聲相清美人皆樂聞此乃施鍾鈴所感豈非是報得耶答由施聲鍾鈴因但得發聲處咽喉如法非是感聲凡是報法得已不斷斷已不續又不隨欲轉聲斷而伏續又隨欲轉有云聲屬第三傳一是業生從業生大種發聲又云屬第五傳一業二異熟大種三長養大種四等流大種五緣繫發聲故聲非報德也今語表戒但是於本聲上屈曲音韻陳詞乞戒是方便聲也身口無表非報非方便以從表戒生表戒是方便明知無表非二色故涅槃經說菩提王子疑比丘餘二性中何不失戒乃問佛佛言從於作色發無作色以是無作色因緣故其心雖在西無記中本所受戒不名漏失非異色因不作異色因果故上經文言非異色因者方便色是異色報色為異色家因今言非異色因即非報色也不作異色因果者方便色是異色因家之果即非方便色也證知無作非二色五就方便色聲中三性分別謂善不善無記也其身作是色色有顯形二色別顯色唯無記形色通三性今身表是形色唯善性也語表是聲聲有三種一不執受聲非情上聲二因受聲言全等聲三因俱聲鐘鼓等聲前一唯無記後二通三性今語表戒取後二中善聲也新經論八種聲一有報受大種為因有情名可意聲二有報大種受為因有情名不可意聲三有執受大種為因非有情名可意聲四有執受大種為因非有情名不可意聲無執為顏翻之亦四今語表戒即第一聲也身口二無表若也通論即通二性今唯取善性六於善性中始終分別自有二師一云此善作中義通始終核論成業據終非始始從請師至二羯磨要心未適善而非戒第三唱已剎那思滿即善是戒第二師云始終通收並作戒體若准一念前緣不如亦應感戒然既不爾故知通收以身口色體為發戒緣身表色者始終相續為眼所見語表之業非耳所聞若准第三當時無聲應無語表故知通緣至三說滿論家尅取成就為言今師意存第二師始終通取故疏云戒是有為緣成之法不請不乞後戒無從理須如前通始終善生經立獨樂喻桑榆為體巧匠成以繩結之擲於地上繩來離上時獨自能轉上吟下合桑榆是報色匠成喻方便與繩俱轉喻於作離繩獨轉喻無作意在始終通取以上之六門依多宗出體二戒是色問表戒表是色決定不疑無表是色者有宗以何為色義有宗答曰變礙故名變為色改變壞為慳壞如多求王求寶等云云礙謂質礙也難云根境極微成變礙可名色無表非極微無表應非色因此有宗三師道釋一雜心師云無表體雖無變礙以從表色生故如樹影也影依於樹生樹色影亦色無表從表生表色無表色世親論主不許此說以有二過故一無表非變礙二舉喻不齊若據此喻即雖云影從樹上起樹滅影亦滅無表依表生表滅無表在今既表滅之時無表在何得將二俱滅法來喻我一滅一不滅法耶滅既不等色豈同乎正理論師為雜心師救云若爾者別立一滅一不滅喻即齊量云無量表是有法是色為宗因云從表至故喻如文匠種子堂等子生依於父父滅子無存無表從表生表滅無表在此是從匠人成第生依於種亦爾却自立義破雜心師云別脫從表生表色無表色定道定律儀不從表所生無表應非色雜心師絶救也第二有部古師釋云所依四大種一切名為色能依依所依相從亦名色以無表依四大種造成故大種既是色無表亦是色世親云五識依五根五識應名色量云五識是有法是色為宗因云所依變礙故喻如無表云云所依有變礙有變礙故名為色五識所依亦變礙同彼無表應名色彼救云不然五識依五根云云但能為緣助生五識如水土與芽並為增上緣故不能隨五根名色以親依無間滅落謝意根故無表依大種云云是親依如影依樹光依珠寶故隨所依名色世雜却難云如汝所說且非快順毗婆沙宗初奪彼云以汝宗顯形二色各有大種所造若爾云影依於松光依珠寶者即顯色依形色豈不違宗次縱破云設依此喻然無表不同彼依以大種滅時無表不滅珠寶滅時影光隨滅喻又不齊從此絶救第三世親自釋云亦以依大種名色也若爾與第二師何別答無別但自通前五識依根非色難即為第三師義也謂五識依根不定或依五根即名有變礙或依無間滅落謝意根即名無變礙能依以所依根不定故不相從名色無表依大種定故相從得名色故俱舍云大種所造性由此說無表若爾有宗以變礙名色今無表體實無變礙何得名色正理師答云從多分說故但以變礙解色未必色皆有變礙十一色中十有變礙一無變礙如世疾食疾行名馬呼牛為地眠孔為地叫亦爾皆從多分說故無表亦名色也上依多宗二戒皆以色為體文中為接新學恐繁紙墨故不廣明等云云二依宗釋中初依宗約論總標言今至釋者本宗者四分宗也成論於佛滅後八百九十年有訶梨跋摩是鳩摩羅多弟子於經部出家遂造此論二十二卷二百二品見解雖殊意明經部今四分分通大乘宗計相同依此以出體也相疏亦同新疏却依有宗出體彼計四分律是二十部中法藏部本從一切有部中流出故今破云彼四分百年時曇無德部雖名法藏但是名同廣如分部門中具明不可依承也言先明作戒體者以無作從作生故先明也釋中二師初約色心為體二又有下第二師以假實色為體有作三師科者准論亦無的指三師文處然中有約身口業不取心者或有約心不論身口而成業者或有約其身口是具心力助成者今依抄及羯磨疏意但作二師以初師為正義言論云至體者正立宗以色心為體也論第七業相品云作業者非直音聲要以力心助成身業亦爾抄文略其大意也非直意聲者謂直聲無詮表故要由心力於直聲上引起名句文身言詞屈曲有所表彰方成口業若但以思心為作體者思屬內心不能詮表不成業體今取口業與思共為作體以口業由思方引起作戒由口業而成二串相藉合為體也論云身業亦爾者不取無記色身不能造作善惡故要由心力鼓論報色身方有跪禮之儀以為作戒體言論其至具者明身口是具釋成身口業思為體義也業相品云身是作業之具隨心力故業成非直是身口業亦爾非直音聲以心力隨音聲語言所集善惡意業亦如是上論文謂身口但是造善之具不能自成於業要由心使方成如弓刀念珠但為物具須假人力為業惡也云云害所以至體者先徵意云但能見屈禮口陳詞句正是其業何用於心故論三業品自徵云所以者何身口能成辨事如人發心煞此衆生要以身口能成其業非但意業得煞生罪云何而言是造業具非善惡體上論文也如人無心下釋通也故論云經中佛說心為法本心尊心導心念善惡意差別故離心無身口業不離意業有身口報若意依身口行善不善方名身口業乃至若無心者雖煞父母亦無逆罪上略論文故知下漏結心為體非不用於身口為具也言文至業者第九三業輕重品文也離心無思者由心起身口業故謂心王心所雖不同時無別體故離心王外無別有思破異宗也如多宗心王起時別有心所思故云云無身口業者破外道計身口二乘不假心成如說欲從對生非從心起等證前作體由心力助成也言若指至性者斥破軍立也以實色聲為體然是也若但報色聲為作戒體者是義不是十四種色者五根五云四大皆是無記不能為善惡故云非罪福性何得成善作體也又色是色陰收作戒行陰攝不可將無記色為言作體上第一師義也問此與前多宗何別答俱舍云身表許別形謂宗於報色身上別有四大造成方便色為作戒體今成宗直以報色為具心力助成故合為作戒體一有心無心別二報色造色別言又有至也者第二師約假實色為體也相續是假色聲是實相續簡一念實色聲為眼耳所得取第二念已去相續也善簡不善跪禮是善色乞戒是善聲以此為體法入所攝者謂初念實色聲唯無記色入所攝從第二念後跪禮陳詞是假色聲謂善惡相是假故在法入所攝意識所得者跪乞詞善色聲相為他師僧意中所緣故第六識攝意識有三種分別一自性二計度三隨念前五識但有自性分別無餘二故意識能緣善色聲故意識攝也是罪福性者論第七不相應行品結成善色聲為體也若實色聲是無記不能成業非罪福性今跪禮陳詞是福性揮奉惡罵是罪性此第二師義問此與多宗何別答多宗是實色聲此師相續假色聲也問與第一師義何別答初師是實色聲為具要須心力助成此師不論心但取相續色聲為體若究理窮原無心不能相續亦同初師意如傀儡之喻可知問於成論二師何者為正答准羯磨疏以初為正故疏云依其成實當四分宗作戒者謂此宗中分通大乘業由心起色是依報心是正因故明作戒色心為體是則兼緣顯正相從為體由作初起必假色心心道冥昧止可名通故約色心窮出體性上疏文又准前立二所以中云心非心別又下出無作體以非色非心為體證知作戒色心為體又文中引初師為正義也上作戒竟二出作體二云云言言無作體者標也疏云謂白四所發形期業體一成續現經流四心不藉緣辨任運起故名無作也上疏文謂由立誓斷惡修善要期一形至三法立是時發生能為善種名無作也非色非心為體者正出體也且約五蘊說非一蘊之色非四蘊之心能清色心革凡成聖不與色心相應故云非色非心也故疏云作與無作位體別者由此宗中分通大乘業由心起色是依報心是正因故明作戒色心為體由作初起必假色心無作後發異於前緣故強日之非色非心耳言非至成也者約義總標也塵為色聲香味觸五塵大謂能造地水火風四大謂成宗色性非善惡隨發心假名善惡若色聲體一向無記今無作是善性故非此色言以至色者五義證也形段者長短高下等十四者五根五塵四大也二十者顯色十二青黃赤白光影明暗烟雲塵霧唯無記性形色有八長短高下方圓邪正通三性也色可慳壞若有情色具慳壞二義如婆沙云諸欲若不逐慳壞如箭中去半能令諸根萎悴如多求王等云云若非情色但有壞義次崩權改變故質礙者如山河石壁等皆是質礙五識所得者五塵為五識所取如眼識得可見有對色耳識得不可見有對聲等云云今無作皆無此義證知非色也言言至心者標證非心也緣為假緣慮謂思慮念境分別無此義故言亦至此者五證也一慮知者心是思量分別故二明暗者意識若隨眼等五識取境即明如白日觀物若獨意識不與五識俱自單緣境者不能分別境之別相即暗如夢中緣境也三三性者今無作唯善性四心有廣略者遍緣三世境則廣但緣現在則略或登山遠望則廣若攝心歸針峯則略五報法者心有利鈍若上根人心有七竅狀如蓮華若鈍者或一或二或無與心王為所依處是報得法故又有說云五陰成身乃蘊是心心是報得法故俱舍云六分意根此七心界亦異熟生性則報法也今無作是現造作生故言故以至體者結歸法聚收也第三聚者先明法數成宗四聚收八十四法一色聚十四法謂五根五塵四大故論云色者四大及四大所因成法也二心聚初識了總相二想取像三受領納四行遷流造作有三十六心所分為六位通數有十謂觸思念欲喜信勤憶覺觀善品有十謂無貪無嗔無癡慙愧定慧猗捨不放逸垢有六謂慳害恨諂誑憍纏有十謂無慚愧嫉慳追悔睡眠掉舉昏沉忿覆五鈍使謂貪嗔癡慢疑五利使為身見邊見邪見見取戒禁取三不相應聚有十七法謂得非得同分命根無想定無想果滅盡定生住異滅名身文身句身老死凡夫法無作四無違聚有三謂虗空擇滅非擇滅略標名而已今無作在第三不相應聚收此十七不相應中十六是假唯無作是實故論云自問云無表不可見應無答能感當來果報有其實業故知實也次辨三科段者行陰法處法界收也故論云是心不相應行陰所攝所以者何作所起故無作是作起故是行陰攝上論文無作雖無遷流造作義然從作戒生故論云作行無作行別攝處故云云次下引證言文至故者成論自引經也第七無作品問曰何法名無作答因心生罪福睡眠悶等是時常生是名無作外人難云作業現可見如布施得福煞生得罪故其無作業不可見故應無此義論主引經答云若無無作則無離煞等法云何為因得生天上人答曰以善心為因故生天也因此論主引此經證無作非心也精進人即持戒人得壽長等者謂有無作為生天因長時防非不絶則感得長壽多福若唯是善心即起滅無恆不定常有忽起惡心即不能獲其多福壽長天果故知須有無作為因也言又至也者證非心非無作也謂意地但有根律儀無木叉戒律儀不訪意地故若起不善無記心時亦名持戒故知下意云在餘心時名持戒者不是別有善戒更發得無作防非但由往日無作業體非心今雖起惡心猶名持戒故云無有作也思之故疏云無作生作生今行不善心何得兼起又發無作也言涅槃至足者兩正非色無形者無方圓等相非觸對者謂身能覺觸餘根能對礙今無作雖非此類善修觀行方便無犯即得清淨故云具足言十至色者證成非色如文言故至色者證成非色合云非色非心文存略故又皆許非心故偏結非色也問既非色心為是何耶答種子義以成宗分通大乘以善五蘊建立善種子薰習藏識長時不滅故名持戒此種子非青黃赤白等色又不能緣慮故非色心然能感招當果也疏問曰此識藏種子則應能為未來後習何得說言形終戒謝答種由思生要朝是願云約盡形形終戒失又問如上所辨須識宗徒律是小乘豈壞大辭牟楯自口如何會通答大小俱心律儀不異何呪四分通明佛乘故沓婆王種猒無學身來堅固法施生成佛相召為佛子等上疏文故今分依大乘以無作為種子義上出持矣次辨二戒前後云四至教者初解第一師准多論解如牛二角生則同者玄云此多宗立若據成宗破因果品亦云如角並生今且依多宗立理也初一念色喻如頭作與無作一時而生是羯磨竟一剎那時如牛二角無前後故下引多論釋成初一念色有身口教及以無教第二念中唯有無教無其教也羯磨疏云現作善未捨之但有作無作第二念中成就過去作無作也作已過去唯有無作故知作無作戒一時生也已上疏文云後至起者羯磨疏云作戒前生無作事息方有謂不一時也故成論第七無作品問云幾時從生無作耶答從第二心生無作第二心者即是第二念生也下引善生文證成上義世間之法有因即有果者謂此二種戒體是有為世間法故有因有果謂方便心異作時心異衆緣和合得名為作如因水鏡等者舉喻顯也水鏡為因面像為果以作為因緣發生無作作已過去唯無作在羯磨疏云又如成論第二念傾名為無作故知作前為初念無作戒為第二念也云論至也者和會也先引羯磨疏起後列鈔文答通疏問曰者依後解前云何通謂作生無後起依此後解前云初一念中俱有二教何以通會問竟舉鈔答中有二初正會前文二亦是下轉釋不妨仍後生義論云者牒上初解同時生義作時俱作無作者謂前文中云同時生者此是作俱無作並是形俱戒因不是形俱戒體第三羯磨竟時根本業道思願成就作與無作於一剎那一時圓滿故云具作無作此則如牛二角生則同時並是戒因不妨形俱無作仍後更生故云前後而起亦是當一念竟時二戒謝後無作生也轉釋未妨仍後生義謂形俱無作生時亦與多宗第三羯磨一念竟時二戒謝後第二念中形俱無作生也與前第二念中唯有無作不別何故前謝後生玄云謂戒是有為生滅之法前不滅後法不生由前滅故後方生也羯磨疏中與此和會不別又疏云今解一時非前後起豈有作絶無作方生由本登壇願心形限即因成也至後剎那二戒俱滿故云作時具作無作是也且約一受三時無作初因時無作此與作俱非乖俱體不妨形俱因成未現二果時無作有二一是作俱同上明也二是形俱方為本體以三法竟示現之時三果後無作以通形終約時分二本通三也云五泛解多少者泣者廣也廣明無作都幾有種云依如多論八種無作者謂大約而言有其八也云一至惡者科雖都為一段今依數便分為八一至生者羯磨疏云隨作善惡起身口須有業相續隨作同生作休業止能牽於後不由起心任運相感故曰作俱若准多宗初一念中作與無作同時而起故曰齊生二至失者羯磨疏云如限一生長時不絶即有業量隨心任運形謝戒失即蘭作法形在亦失也若惡律儀形滅失者同善律儀也三至之者玄記科為四節初立義宗二僧塔下指所施物三除三下明其緣謝四惡緣下類例明也事在者於其事上常有無作功德長生除三因緣者抄依婆沙雜心等說除三緣闕也一前事毀破者衣已壞無作便失二此人死者約施物人若此人也三若起邪見者謂本國正見是以布施無作隨生今起邪心撥無因果無作即謝舉例由如比丘邪見失戒相似無此三者謂若無其前來三緣無作常有惡緣同之者遍來具舉善事一面以言若惡事弓刀等類亦有惡無作例善可解云云外人難前言此人若死無作不生即與智論有異也准智論中昔有人施塔礎初舉反謂柱石也死得生天後人換之天宮振動天眼觀已遂化為人下勸莫換損我天福其人依語天福如本云何前言此人若死無作失耶答解有二初玄云前文所引是婆沙雜心等小乘見但局一形乃云若死無作便滅智論是大乘不局一形見解遠故次依法寶解但是施礎為生天因故感天宮振動若論無作形滅之時已失與多宗不異恐未及前搜玄解思之四至知者准成論第十一三障品云食壇越衣亦是壇越得無量福今抄云禪定禪謂四無量心慈悲喜捨禪皆具足不相違也惡緣弓刀例此者謂約捉用時無作增長例前善事故曰可知此門約用與前稍異耳五至造者身造口業發口無作如大妄語云是聖人者起來彼應聲便起此即身造口業口造身業者如深河誑淺等何名異緣如上妄語本合以口為緣今以身造異本緣故如人受食合是身業今有寶器并不喜沙門等緣乃令置地口加三受是口作身業又如長衣說淨本是口業令將來說淨物著判先說淨衣上是身造口業也若依成論身口牙造者多論不立身口牙造名為異緣且如身造口業但發口無作不發身業故非牙造今依成論所立即通牙發也六至罪者成論無作品云如教煞人隨彼煞時者得煞罪也如此煞罪身是正緣口教他方便助成身業而發無作名助緣也七至生者要期與願抄立為一要期亦名願也古今諸記皆引成論之文或同或異異者言願俱如有人發願云我當作會若作衣施無作常生此局當時也要期者如受八齊法要心所期一日一夜或受五戒要期一形如誓而受亦名願也此局現作次辨同者論云又此無作亦名願生既云亦名即是同義若是要期必是願俱若有願俱非是要期也八至惡者隨心者隨是能隨謂無作戒也心是所隨謂定慧心也法爾七支無表隨心轉與定慧心俱時而生故名心俱即以心為因無作為果故俱舍頌云別解脫律儀依表是表果隨心轉律儀依心是心果故以隨心無表是心果也問此隨心有幾律儀耶答有定共道二種儀也就其定共隨心無作中更分有漏無結文自顯問既云定共道共何故抄云定慧心耶答若據成論文單云入定無慧字今云慧者是無漏道共攝也故多論云靜慮無漏二種律儀在定道心亦成就亦現行出定道心唯成熟不現行也出入常有善心轉勝者此引成論標破多宗也適來多宗解云入定及無漏心表則轉勝出定并有漏心無作則無成宗不爾出入恆有善心轉勝意道入定及無漏心名曰善心其無作在此心時轉增勝故論又問曰有人云入定時有禪律儀出定則無此言虗實答出入恆有是人得實不作惡法與破戒相違若入善心則轉勝故此言隨心者牒起也隨生無心乃至非謂隨定慧者正破多宗也彼云隨定慧心則有出此二心便無此則不爾生死位中必在觀故道共之戒形滅不失即顯無漏定道二戒常隨非謂一面隨定慧也別脫不爾唯隨身者簡異也謂別解脫唯隨一形命根根斷時失所依故其戒則失不同隨心戒也即涅槃云等者敘成隨心也初果生惡國者謂證初果人由反受天人若依之身或生多煩惱處名惡國也道力不作惡者道即無漏道共之戒巧力也彼生惡國之中不隨彼為惡者不是波羅提木叉戒力制伏不作但由無漏道共戒力任持任運不作惡也以此而論即知經生失木叉戒也外人難曰既云初果不作惡何故有其自妻豈非犯性戒耶即如西天給孤等聖總有身妻云云答俗人五戒中但制邪行不制自妻既不作邪行亦是不作惡云云此釋且據初證果者次經生聖人得五不作惡即邪行并自妻並皆斷故名不作惡此據隔生聖人說之方為太理云上至業者斷料簡界繫也此八種中前七通善惡唯局欲六界有善惡故上界則無也繫者繫縛之法後一無作者指隨心無作也唯局善性外難云此善性與前七中通善性處何別答前是散善此是定善條然別也若是世禪局上二界者謂色界四禪及無色界四空處此八地有漏定繫縛之法故云局上二界也若出道法非三界業者此約無漏定及道俱無表不屬界繫所故云非三界業也問未審有漏定與無漏定何異答有漏定據捨說如欣上是取猒下是捨既有取捨未免轉回故是有漏漏者泄也泄煩或心故外道亦證得云云若無漏定無取捨心了知一切空虗幻有即是無漏心中修習通超界繫不為煩惑之所漏泄故也餘廣如論述云二受隨同異者牒名也立此門大意只為破古師所執也古云受中作戒即是隨中作戒受中無作便是隨中無作即受隨更無別體譬似一楯帝釋也能捍衆歒今師破此故立異同意釋中云二至不定者二種無作者一受二隨也受謂一形壇場所隨護受體對事方生所得雖殊同名無作遂以五種光辨於同異也注文釋二種無作名同也受則易知隨中難識方便善成是隨中作戒謂作業成稱本清淨是無作也義同體同如抄分明不更解也四歒對同者古今意別古云受是懸防隨則對境防非之義是同不用論他懸與不懸也只如受中雖有懸體若論防非還幼臨時對境與隨中對境何殊故云一等若依古解受是懸防隨是歒對却落向下異中所攝如何說得同之道理然雖略辨受隨防非一等而未知二種無作對事正防非時則是其作云何却名無作歒對防非此義稍難須敘說故羯磨疏云以受體形期過防邊為護體故即名詺音本體有防非能能實隨行隨行起護本相依持也隨無作者對非與治與作齊等此無作者非是作俱無作謂起對防即有善行隨觀並生作用既謝此善常在故名此業為隨無作與非對歒故與受同若依古文解無作者事息方有此非對防止是作戒上是疏文或有舉防城喻等寄在臨時敘說云云五多品同者羯磨疏云以受可重發故無作有疏龜上中下多品隨中隨心則濃談業理亦洗淳亦多品也依多論中受一隨多緣者彼宗中不通重故止歸隨行通優劣也云異至條者總發者羯磨疏云但發願故於萬境不造惡故法界為量可一念緣豈非總發隨約實行非頓唯漸故別也長短不同者疏云受體形期懸擬防故說之為長隨無作者從行善生與方便俱心止住故名為短今指事說如持三衣手執口陳是方便色了衣如非是方便心無作業與此色心俱起對事則有事止則謝故短謂衣境等名事止不是作法了名事止也寬狹者疏云受體相續至命終來四心問起本戒不失故說為寬隨無作者唯局善性防非惡無記無故名狹也根條兩別者受無作是根本隨無作托受而生名曰枝條云二至知者二種作者疏云如初請師乃八緣相三羯磨未竟已前運動方便名之為作即此作時心防境名戒隨中作戒既受戒已依境起行為護受故名之為隨於境起謹順本受體名作不作不有要由作生正對鏡時故名戒也云有至也者受總隨別者疏云受作總斷發心萬境普願遮防隨作別斷以行約境生境通色心不可緣盡心所及處方有行生即詺此行號之為隨作以心不兩緣境無頓現故也受本隨條者疏云受為行本隨後而生因為條也懸對治者疏云受始壇場可即非現但懸遮約也隨作對境起治由其觀能不為陵踐也一品定者疏云受作心因一品定也若本下因終至無學更無增故中上二心例之亦爾多品者疏云以境有優劣心有濃淡故隨境對起心有輕分成三品不同次引證文年少者凡夫也羅漢雖斷三界煩惱得成聖位據其本戒仍下品定也云三至勵者寬狹者此約三世以明不唯情非情說也發戒方法者謂受戒中辨緣境數量寬狹發不發是受法則但心隨境起謂受戒時但令受戒人緣境起心故曰心隨境起謂上三種是受戒中故今廣論對略明令知戒德高廣者對上但心隨境起作斷惡心亦使持有男勵者對上發戒顯今令持亦令已受者識知體相使持心勇勵也言就中分四者謂就發戒寬狹中自分四門也鏡水云此中有兩宗義成宗即廣多宗即狹今此開章已下所列四科並是成宗義若多宗向下略引學者須知多有人力拒開反至向下釋義之時經經將多宗義解成宗文此皆為未認得宗旨致成混亂思之云一至緣者疏云但約現在念念雖謝不無續起即以此心為戒因本上言相續者准成宗謂一剎那不具五蘊謂四剎那方具識相受行四心各一剎那若色即隨四心一剎那中同時而起由色心別色等四心不得同時要須四剎那方具引亦約受戒人心念念緣境心心相緣故曰相續心中緣也云二至爾者境通三世者過現未也若過未二境上不發者三世諸佛戒不齊等以三世諸佛戒齊等故致緣三世而發如怨家境雖過去乃至死尸者為如有人持刀欲往前所煞害怨家怨家昨日已死但為尸在今惡心不息便斬截此死尸即是過去境佛言雖然怨家已命終亦不合起惡心傷害得偷蘭罪故疏云得害死尸非非過去也又涅槃第十五云善男子若人斬害死尸以是業緣墮地獄不迦葉白佛言應墮地獄何以故一切衆生因惡心故墮也現在怨家子等者即約現境也未來諸境可以准知者謂在母胎中亦得名未來境或可約未來一切諸怨境可以准知故緣等者即成上義也成論問為但於現在等者彼問曰為但從現在衆生得戒為從三世衆生得答皆從三世衆所得如人供養過去所尊者謂是過去諸佛為人天之所尊重故所尊一興供養千返生天故云是亦有福律儀亦爾還從過去境上發也故成論云過去迦葉佛時有無量人已入涅槃像此等緣亦發戒品若不發者則釋迦弟子境戒應減謂羅漢離分段入滅而有無漏五分法身此體之上亦發得戒故知三世佛弟子戒悉齊等云三至得者現在相續心中得者此約能領戒心准在現在相續心中能領也又曇無得宗不在過未心得戒以非衆生數故然現在心中亦不得約一剎那謂五蘊假名衆生識想受行次第而起既於一心不具五蘊則不說為衆生若無衆生說誰得戒故約現在相續心中得也又過未二心屬法處故非能願也言四至可防者對此須知今古意初古德云戒從三世發還防三世非二首律師云戒從三世發唯防未起非三南山云戒從三世發防於二世非即過未為二也今師意云違戒起非非已落謝名為過去又非若不起名防未來非現在剎耶不住故無非可防也故羯磨疏云現在起不名有罪才起落謝即名過非故論云疾焰過鐸奔流度刃刃之上下一毫亦為已未現在刃上念念不住云問至解者寶云此同大疏約戒本分為二為問初盡衆學防未起非二七滅爭下殄已起罪今若有非過去合是毗尼殄除何得云戒防過去非耶答中先依古答境雖過去者是過去境非非過去者是未起非者謂四諍事起即落謝是境過去若明闌教相之人不為除殄則有吉羅今猶戒防望對治邊非則不起故云非非過去但約境過去說防過非非謂戒防過去非也猶是等者此是今師述上道理無是戒防未起非即顯過去之非未能防斷虗言防二世非也又解下今師自釋於過去境上起非違戒有防除義即戒防過去非故戒疏云望令不犯防未起非若犯已懺還令戒㳯防已起非已未雙防俱名持戒餘如疏解者更依今義毗尼亦殄二世非故戒疏云今解毗尼亦殄過未如四諍對除是殄已起明觀正斷應起不起即絶未非准此戒防二世非毗尼亦防二世非也搜玄文引䠰取意似乖如彼所述云然至增減故者重釋所緣三世境也謂斷惡心要緣三世境發戒心准現在一念也緣境三世者此從境說言三世也得罪現在等者謂得罪實准現在境可惱害故過未二境唯可起於煞心即惡心不息不能普周故須約境說其三世發也此約一期三世若據得戒唯現在者謂因上言緣境三世得罪現在者便明得戒唯在一念不同發戒此明能領戒心唯現一念過去已謝未來未至不能領納言一念者此約剎那三世在一念相續心中得與發戒不同也成論慈悲布施乃至皆與樂意者疏云修慈心緣三世境起慈悲心慈能與樂悲能拔苦戒法緣三例通三世可同慈行於三世境作斷惡心皆與樂意其戒也又云慈功修物等者疏慈悲備物局現境起過未已謝慈功於境無益戒則不爾必須普周方名戒業謂以慈悲心運其功力周備於物現境有益論文中略但言過去已謝鈔據義周添其未字以惡心戒有增減者謂以惡心不息即非普緣又復衆生流轉不定則令隨所防戒亦有增減何以故能非能牙轉生故如下廣辨云云云問至非者問意云現境是所緣此即是現非何得但言防過未不防現非耶答中若無持心便成罪業者即落在過去收也若有正念過則不生者謂未非不起除斯二外現在即無非可防然又以等者以隨資受乃至故防未非此釋防未非所以也若無其受等者通伏難也外難云前言若論受體受獨不能防但是防具要須隨行制御若爾用受何為難了可引抄答如文易解云若爾至之者若爾領解也前來云戒防於過去之非既若以隨資受對歒防非應無過非得起若有非起了過去無來戒不能防答中要須隨中方便秉執攝持制約七支拒抗塵境方名防非如城池弓刀等者舉喻也城墻防外賊此喻受體懸防也更須假人備擬防捍則免損城壁此喻隨中防護也後彼此相須闕一不可池防內起如水不令外出受體懸防身口不令外犯更觀行擬捍隄防即喻於隨不令戒池損壞也擬捍則止持弓刀本擬御賊喻受本擬防非對境與治方便是隨喻人執持擊賊也則喻作持也餘戒疏解者疏云作持戒者妙在方便約上非緣對境相陵如兩陳戰乃至對境防護順於二持名之為御又疏羯磨云如世弓刀深能御歒終須執持乃陷前陳也言四至也者略如上者指上緣境寬狹門也何以知耶既言略明上但約三世境中情境以說若於非情令未曾明故云略也古來多指受戒篇者殊非文意也問上既略明今何更述抄文答云以世俗多迷等謂今時僧尼近離俗情多分昏迷教法詮敘者餘平敘述也更難前來發戒門中廣論即云欲使持者有勇勵今此故廣餘敘意在於何所引鈔答云意存識相知法等云云謂此廣明意存兩用一則自濟識相護持二則教他故云兼也云然至戒者隨境無量者境多故發戒亦多既在定數故云無量也要者妙也所立雖少攝事乃多也情者凡有心識之者總號情也上至如來下至蠢動有命之者將此情字攝得一切情境豈非要妙耶非情者上至須彌山下至一草葉等凡是無心者總是非情將一非情字收之並盡有者俗諦無者真諦攝相皆盡者謂法界之境雖廣至多不離有無情非二境舉此四名收攝一切相杖包罪皆盡任境而彰者任者隨也上之所說總相而談若隨前境而彰恐繁紙墨故云略說也即大約納格而談故地水火風等者此舉六界攝一切盡色聲香等者外之塵五攝一切諸法乃至過未三世等者謂有為諸法三世收之普盡法界者謂一切法各有界分故法有二義一自體法二軌生法此諸法界與真如等無處不通相即差殊體常是一故總言是法界等法攝境斯盡云云六趣衆生者趣者至也到也唯約有情辨之一天趣外典云蒼蒼曰天頂高而四垂形如覆有穹崇之㒵昊內教云是有情身光明皎潔或可尊高神用自在衆所祈告故名為天即二十八天等欲界六天一四天王二忉利三夜摩四兜卛五樂變化六他化自在色界都有四初禪有三天一梵衆二梵輔三梵王亦名中間禪也二禪三天一少光二無量光三極光三禪三天一少淨二無量淨三遍淨四禪八天一無雲二福生三廣果四無煩五無熱六善現七善見八色究竟已上依經部色界四禪共立十七天也若據多宗但十六天攝大梵王歸梵輔天中有高樓閣名梵王天一主所居更無別地如尊坐處四衆圍繞又攝無想歸廣果云云天中有高樓閣名無想天非別有地故不別立也問經部何故開為兩天答彼云梵王梵輔所坐之處雖同據壽今身形不等梵王身形高廣容止威儀言語光明與梵衆別又開無想與廣果亦別壽命身形長短不等或依上座部立十八天亦開梵王自為一天無想廣果各別立也餘廣如論述云云無色四天一空處二識處三無所有處非想非非想處也已上辨天趣二人趣者外典云人者仁也有多智慧曰人莊子云能穿牛鼻絡馬首等內教云四大州有情東毗提訶州此番為勝身身形勝於剡部人故舊云弗于建提婆訛也二南瞻部因樹立名或因果立號廣如前述或云閻浮剡浮炎浮皆訛也三西瞿陀尼州此云牛貨彼處以牛為貨故舊瞿耶尼訛也四北俱盧州此云勝處亦云勝生等蘊單越訛也上辨人趣三地獄趣者梵云捺落迦此云受苦者根本獄有十六八熱八寒并及遊增都有一百三十六廣如卷首述之四鬼趣外典云掃也歸於後趣故內教云梵云閇戾多此云鬼謂多悕求以存自濟身心輕躁多怯劣故就此之中自有三品更分九類初下品鬼名無財於中有三一拒謂拒熾猛焰常從口出二𭊴口口中常臰故三針咽咽如針小頭如大山次中品鬼名為少財亦三品一針毛身上毛利如針行時自㓨痛故二𭊴毛毛臰自不喜聞以手拔之受苦痛故三大癭謂咽垂大癭自㓨食膿後上品鬼名為多財於中亦分三種一得弃恆得祭祀所弃之食二得失常得街巷中遺失之食三勢力謂夜叉羅剎毗舍闍等二辨鬼趣竟五畜生趣舊云畜許之者為人畜養新云旁生行業身形見解旁故六修羅趣此云非天亦云諂曲法寶云三昧經云光音天初生此地入海洗浴不淨墮泥為卵經八千年生女千頭少一二十四手其女入水戲水精入身為胎經八千年生一男千手缺一居大海邊也即是修羅也問既有六趣今諸教中何但云五耶答緣此修羅一趣開合不定若依俱舍攝歸畜趣以修羅是師子種故若據大乘瑜伽攝歸天趣以修羅是毗質多天苗𧜟故或依伽陀經是鬼趣以修羅居七金山故已上辨六趣因便問答之趣外中陰四生者先辨中陰後釋四生初辨中陰者羯磨疏問曰六趣之外更發得戒不答偈曰如來非趣攝中陰亦復然問如來不屬趣理不在疑中陰有情何故亦非趣攝答准俱舍云趣是趣生至於便故今中有未至彼當來所應至處暫時傳識故不入趣也故論頌云未至應至處故中有名生或有釋云中有是化生以是不入趣也今難云諸天亦是化生何故亦入趣攝不曾看尋教文致斯濫上且略辨中陰在趣外之所以也次釋名者舊呼為中陰今云中有未審何名中有復以何為體今舉論頌答云死生二有中五蘊名中有於生死二身兩位中間有謂如今身形號為本有才捨執持名為死有至當受生號為生有今此即據死有之後又未至受生之處是生有之前於此二有中間暫時駐泊號為中有也此中有有情以異熟五蘊為體問何故不通四蘊答無色無中有故謂時且至此從義門下恐太繁不用亦得次略引義門料簡者頌云同淨天眼見釋曰同者同類中有得相見又上能見下趣中有下不能見上趣也淨天眼者修得諸淨天眼方見故頌曰業通疾具根釋曰謂於業神通中最速疾故於所往處更不見有餘物但見受生和合因緣不簡遠近剎那便至也具根者一切中有皆具五根及男女二根故頌云無對不可轉釋曰對謂對礙一切中有所往受生處假所金剛䥫石不能為礙故不可轉者一切中有起已更不可回人中有不可改為餘趣中有與大乘不同知之頌云食香非久住釋曰謂中有所食之物唯是好香據有福德者說若福德者但食𭊴物望彼當分雖𭊴亦香非久住者極遲不過七日法爾如此喻如七葉樹若七七日本受生處未和合即且往相似處受生也頌云倒心趣欲境濕化染香處釋曰明受生也若胎卵二中有身見父母受欲時起顛倒心而便受生若濕生中有身受生緣會不簡遠近皆聞香氣染著已而便受生若化生中有受生緣會不簡遠近亦是聞香便受生也頭首上三橫地獄頭歸下釋曰天中有頭向上腳下以上升故三橫者人鬼畜東西南北而去故云橫也地獄即𨲙歸下以趣下故亦據多分說然於天中亦有橫者謂據當地受生說亦有頭墆下却生下天故餘廣如論非此加之已上略辨中陰竟後辨四生者頌云於中有四生有情為卵等人傍生具四地獄及諸天中有唯化生鬼通胎化二釋曰於中者三界中也有四生者謂胎卵濕化也人自有四生卵生者如毗舍佉母生四十二卵卵各一子般羅王妃生五百卵卵各一子濕生者如菴婆女從樹濕氣生此方王梵至亦爾胎而可知化生却初時人是也旁生亦四者卵生雞鴨等濕生如蚊蝄等化生無而欻有如如諸遊等龍與金翅鳥各有四云云地獄諸天中有二類唯是化生鬼有二一化二胎如餓鬼母白目連言我夜生五百子隨生皆自食晝生五百食盡而無飽引證胎生也問上既明六趣何更說四生答六趣雖寬不攝佛及中有四生雖狹一切皆收故更明也今於上來所引諸境皆須一一作斷惡修善之心一一境上皆發得戒也此且寫一面終故須子細勘之云上至證者上來懸舉結前也次引之證生後也即下引俱舍等云云云俱舍至定者此是舊譯論文分別業品有此說也下引婆沙亦是論中自引戒從一切衆生得定分因不定者此是立宗有於三義一從一切衆生得定二分不定三因不定分不定者分者支也舊云分新云支如比丘戒要具七支五八十戒唯是四支即得不定也因不定者貪等三心是戒生因盡斷得戒即定上中下品亦為戒生因即不定兩處相望成不定也已上且立宗竟云何以故者徵詞也何故戒疏從一切境得定分及因不定耶云不得從一種衆生得故者意云戒要須從一切衆生盡息惡心方得七支戒此義定也不從一種者及顯義也云分至也者謂七支戒名一切分是定義四分者即四支謂身三口一兩處相望故成不定云因至一切得者謂以心為戒因親生戒故若無貪嗔癡三善根為戒因者即不可也假此三名從一切得名若但無貪癡猶有嗔在即非一切故要須總無此三方得戒也不相離故者以癡為貪嗔母二藉癡生故不相離若上中下意等者此明因不定如一人身中三品之心必不俱起若起上品即無中下若起中品即無餘二故因不定也羯磨疏云約前三義取上中下為因作其四句一有人從一切衆生得戒不從一切因謂隨一品意受五八十戒二有人從一切衆生得戒從一切分不從一切因即一品受比丘戒三有人從一切衆生得戒從一切分得從一切因得謂三品受五十具四從一切衆生得戒後一切因得不從一切分得謂三品受五八十戒故知從一切境得戒桓定分因則不定故論頌云戒從請有情因支說不定云若不從至故者鈔有五節意初條上義宗二何以故下徵三由遍下釋四云何下結五惡意下通此改重解上文戒從一切衆生得定若一境上由擬煞盜欺誑即是惡意不死也云若至戒者標也釋中云一至事者某衆生離煞者謂家畜不煞野畜便煞親不煞怨則煞二某分能持者如二百五十戒隨簡一不持即是不發戒三某處能持謂自國不煞他國則煞四某時持八戒限一日一夜餘皆盡形或冬月水無蟲能持夏水有蟲即不能持五某緣不持者謂若他鬪戰即不能持者以來害我情難忍故言此至戒者結文也論云如是受者但得律儀相似妙行今鈔云得善不得戒意亦同也第二約非所能境辨其牙生發戒失戒所以文分為二初舉非所能境問答非疑二毗婆沙下總約草木衆生牙轉不失釋成上義初又分四初別發家立非所能境問二由不害下總發家敘三縱下別發家徵四惡下總發家釋此依玄科若法寶科似誤今相承不依也四段今初云於非所能境云何得戒者此是別發起問也欲釋此文先明總別所以名為總謂於有情中不論凡聖人天可煞不可煞物須作斷惡心一一境上皆發戒也所云別發者於情境中若是我可煞盜誑等境上即作斷惡心於此境上發得戒體若非我所煞境即不發戒故云別已上俱約有情據遍不遍而分總別也已上分總別已竟也次消文所以有此文者謂前來五義之中初云若不從一切衆生得戒則無也因此義故便生斯問也別發師難云若要從一切衆生得戒者如他方聖人上界諸天等且非是我所煞之境我又非其能煞之人縱有煞亦不得何用於彼境上發戒耶故云於所非能境上云得戒問竟第二總發師答分三初歸宗直答若二從下行別發師有增減過三若爾下領上增減失重顯得捨非此亦依玄科也初中云由不害一切命方得者直答也謂凡論得戒者須向一切有情境上作拔苦與樂之心約此心邊何簡所能非所能一一總發得戒故云由不害等云云云若至故者總發行他別發過也總發云汝若從所能境上則發戒非所能境不發者便有損減過也何以故下句出過云能非能牙轉生故玄云論文是增減字則有二義抄故云損減但據一邊說只有一義謂此所能境命過却生彼所能處此戒則合減若彼非所能境處有情死却生此所能境中戒則合增故是增減義也諸記相承引羯磨疏謂獵者持猪羊戒死生獐鹿中戒則減也或鹿生羊中戒則增也屠者持樟鹿戒死生猪羊中戒則減也或猪生樟中戒則增也鈔言損減且約屠獵二人牙生一邊而說彼此俱是損減謂彼死此生則彼損此死彼生則此減此是牙生若約轉生一邊說者彼此並得言增若彼猪羊生此𤡊中此鹿則增若此樟鹿生彼羊中彼羊則增論文約能牙轉兩邊俱言鈔據牙生一邊而說云若爾至成者若爾兩字領會前意作出過之綜由也離得捨因緣得戒捨戒此義自成者總發師云夫得戒者必須具緣闕緣不可夫捨戒者要須對人作法及邪見二形命終方成捨戒汝別發師適來立理既云非所能境上不發者成彼死生此此死生彼不唯有斷增減之過亦作五受之外別立衆生生此得戒四捨之外更立衆生此死失戒故云得戒此義自成顯別師散有此二過云縱離得捨因緣有何過者別發師牒前過非重徵何過謂縱是非所能生所能中離得戒因緣縱是所能死生非所能中離捨戒因緣今但於所能境得戒有何過謂非所能境生此所能境我亦於此得戒若所能境死生彼縱然失戒既非煞境不作離煞之心有何過耶云惡至周者總發師釋也謂於所能煞境則斷惡心於非所能不作離煞之心心則不死不成普遍周圓之義也云毗婆汝至耶者此文躡前牙轉生義却難從一切得亦令有能非牙轉生義也婆沙中有師難云如草木等未有有時或時枯減豈非增減能非能互轉生亦爾如有人冬受戒時草木皆枯戒應減也春間草木既生戒應增也彼論解云衆生前後有草木永不有若爾衆生入般永不有故知戒則減也謂衆生有輪轉受報生不定故言前後有能非能互轉生故草雖枯葉永無輪轉異故云永不有共發一遮戒無有能持不能持互轉生也若爾衆生入般亦永不有戒即應拭謂阿羅漢化火焚身不受生死輪轉亦永不有得成戒減為通此妨故作句數料簡也云義至失者玄云抄主義約四句解之一心謝境不謝者謂能受戒人斷或皆盡更無煩惱是心謝以無犯戒之心而情非二境在是境不謝二境謝心不謝者謂有情入滅草木已死是境謝受戒人且未斷煩惱是心不謝戒在不失此之一句為證前文衆生入般雖盡亦發得戒但成就在身而不現行如刀在匣中用不用別也三心境俱不謝者謂比丘未斷煩惱是心不謝情非情境在故是境不謝戒在可知四心境俱謝者下自釋云根轉之時是心謝不同戒失是境謂如尼轉根為僧是心謝其有不同之戒即言人四獨紡績等則失是境謝僧反說即是也大德云東塔不許抄文云不同戒失謂尼受戒時懸發得僧戒在身尼戒則現行僧戒則不現行後時或轉根為僧僧戒却現行若再復尼形尼戒亦在不言更受若言失者後却轉成尼時莫須更受尼戒不彼自釋云可改失字為其隱字但言不同戒隱隱是不現行義也大德云鈔據無用之邊義同於失理亦無乖若取無妨之邊隱字亦妙云薩至仰者彼論第一云於非情則別發戒於一一塵一一草菜花等皆發得表無表戒若依婆沙宗約非情類共發一無表三千世界者一小千二中千界三大千故俱舍云四洲日月蘇迷盧欲天梵世各一千名一小千界此小千千倍說名為中千此千倍大千皆一成壞釋云一千今四大洲一千今日月一千今須彌一千今六欲一千今梵世歒得一今第二禪量名曰小千界此小千千倍者十倍是一萬百倍是十萬千倍是百萬將十萬為億百萬為十億即十億四大洲十億日月十億初禪更兼一千今第二禪方歒一今第三禪量名曰中千界此千倍大千者前來千倍豈非百萬勤為十億今又倍此百萬便成萬萬將此萬萬還以十萬為億便是百億即百億四大洲百億日月百億須彌百億六欲百億初禪更兼百萬第二禪百萬即十億也第一千今第三禪方歒得一今第四禪量名曰大千界已上算法絶為要妙諸處抄記似為周遮餘如鈔云云云多至流者此段約有情并器世間合辨也從初至非想並是器世間次從於一切衆生上是有情世間也可煞不可煞者最初舉煞也謂諸入滅盡定慈定中陰如來輪王佛使等此定不可煞又如最後身菩薩母壞菩薩反諸天他方人等亦不可煞上言入定不可煞者如大力鬼打身子子定起竟頭痛佛言汝若不入定當如微玄汝由定力故小痛也佛使者如耆婆入火取呪之類是乃至可欺等者謂越却中間淫盜故云乃至也可欺者是妄語戒諸得他心聖人天眼即不欺三因緣者無貪無嗔無癡三善根者皆發得戒又以此推等者謂上來既明一切情非情上發得戒推求此義故知僧位高人天福德桓流也奉戒德瓶者准智論尸羅度中明持戒人所要皆獲破戒之者一切皆失故舉喻云譬如有人常供養天帝其人貧窮一心供養滿十二年求乞富貴天帝敏之自現其身問求何事彼具述所求天帝遂與一器號曰德瓶即語之言所須之物從此瓶出其人得已隨意所欲無所不得造作屋舍七寶具足乃會親賓親賓問曰汝先貧窮今日何得臣富彼乃具答其由兼將德瓶出示其客其人憍逸立瓶上舞瓶則破壞所有財物一時都失今將戒喻瓶虗空大地情非情一切境上皆遍發戒於一戒上招生十利功德於一一功德上復有十種正行因戒而生故將其戒因之為瓶瓶中能感無量功德若人奉此戒瓶欲求人天沙門釋梵緣覺聲聞乃至如來無不如意若人德戒不護如彼瓶破失諸功德則也聖跡者三乘聖人皆持禁戒今受能持乃至遵聖跡跡謂教跡等云云明了四萬二千者此論釋正量部即是五分律中僧尼戒數故彼論頌云倍二十一千福河流善法水洗除垢汗釋曰倍二十一千者是四十四十二二千千是四萬二千也此四萬二千是其功德之福流注善法不絶如河故云福河流善法也此能洗滌破戒煩惱垢穢令淨如水故水洗除垢汗解云已下是真諦疏解也疏云戒及十利十種正行悉願學之今受後與願心俱一時同起故云恆流以此正行洗破戒煩惱塵垢不令坌其法身故喻如河念念不絶即是恆流之義婆藪斗律者了疏云此云品類律多說犯罪緣起制諸輕戒吉羅也優婆提舍者疏中番為正教謂此律正說是罪非罪制諸重戒並是了疏中自引此律已上明僧尼戒也別戒九十九者唯約比丘尼說如紡績言人等與大僧不同名為別戒總其戒數有四百二十戒一一有攝僧等十功德一一功德能生十種正行謂信進念定慧及無貪等三善根并身口二護者謂能防守身口不護起過失故云身口二護足前八成十也合數者一戒即百十戒即千百戒即萬四百戒即成四萬又二十戒後是二千故云四萬二千又解等者亦是了論疏家重釋謂三羯磨竟時四萬二千善法滿足無一戒不生更無願求名無願也學處者謂一切所應學知名學處也若下衆十戒由戒未具名為有願據斯心求者斯由此也福德恆流者僧尼身上戒德常流不斷云問至二千者大約而說僧有二百五十尼有五百則戒數各別何以論中約無願毗尼直言四萬二千此亦是了論家自問也一解等者且約二衆現行以答以僧尼現行戒數者即今文中列婆藪斗律戒二百優婆提舍戒百二十一比丘尼別戒九十九所以共有四萬二千若取實理僧尼各隨本戒僧二百五十戒合有二萬五千𧛈河尼三百三十八戒合有三萬四千八百也又釋等者第二約轉根義解也比丘懸發謂尼不同之戒是合明四萬二千如尼變為僧即發僧所防故知並先發也猶如器伏有用時有不用時不可言無也
