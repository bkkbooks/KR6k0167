body:
  text: 吳越國長講律臨壇賜紫清涼大師景霄纂今當犯已能悔持犯即懺篇文分二初牒名次依文釋初云懺至十六者先來意上明持犯以被專精之人脫有已犯之流理須治救故前文後有此文來次釋名者梵語懺摩唐言悔往悔以悔責為義往以往謝彰名即是追變昔心顯成犯聚經稱懺悔唐梵雙標今云懺名存其略梵六聚者所悔之罪也法者詮教悔犯規猷篇者章品嘉名云云依文釋中開科云云云夫至故者結成罪種者違教而犯對犯之時皆須起心進趣境所方成根本故曰結成也罪種若據小乘多論有得連持不斷流至未來牽受苦報今此抄宗四分云通大乘許有種子薰此種子當招苦報故也理須懺除者理是道理既是中下根器對境任運施為犯業既成必須洗滌由得清淨形清心淨者懺了七支皎潔名曰形清斷彼相續之心故云心淨又釋懺無六聚之罪故曰形清藏識罪種既消故言心淨心應同僧法者即入羯磨説戒二種之中共住故故薩婆多等者彼自引大莊嚴論問曰何法重於地何法高於空何法多於草何法疾於風彼自答云戒德重於地我慢高於空妄想多於草心法疾如風謂世風雖疾由不如心一念之中頓緣法界曾所見處緣無不遍也次引涅槃經文證可知云然至不信受者然是也遂往也謂往故之師並立懺法不少故云並施悔法也增減隱顯者增謂增益即顯減謂損減即隱寶云故師取非親尼衣販賣衣入手犯已若不説淨十一日更有犯長此即妄生增益更顯犯長之𠎝又如初篇四戒皆開悔過就中非戒難因難提為學悔之緣聽許懺悔餘三例之但譯律之家慮繁不更重申懺法故人見律三戒下無懺詞便云唯淫開懺以不損境餘三惱境懺悔不開也搜玄云增中有隱闕減中有隱顯者也臆課多者此謂適來所解增減隱顯蓋是𮌎臆課虗而説其例不少故名為多將此課虗之事照其律教云且元文與他悔罪不出有違教之咎故曰撿行違律也有犯不能悔者此明能犯人覆罪不肯懺也又不能如法懺者此約懺主愚教不能與他如法懺也即反顯前來增減隱顯定非是為愚人已下結成愚教可知云今至也者今欲定其綱位者定綱定位也標今異昔欲者悕求準的曰定綱是綱宗位則行位舉通局二懺之綱定三種之行位且如利根人立理懺之綱鈍根本立事懺之綱此二通俗又六聚護持五篇遵學如是之類名曰小乘若有𠎝違還依篇聚而懺綱宗既是篇聚懺罪豈得不依三位三綱歷然今準的之故曰定其綱位也格其心境者此句正境正心格者正也如利根人依理懺竟了心無心即是正心達一切境本來空寂即是正境又鈍根人依事懺悔所造之罪即是正心想佛誦經即名正境又約律懺心境想當犯於前罪是正心犯竟依首懺除為正境如是正心正境三位差別歷然若不格之恐懺法通漫故使是非鏡其耳目者三位依宗行懺則是若有差互為非鑒此是非喻同於鏡見罪即知如目聞犯即識似耳也得失明其能所者識懺罪滅為得懺之不除名失如是得失何以明之但觀能懺之者是何行人復觀所懺依何法則據此定知故云明其能所也則何患妄業不除妄心無犯者患訓憂也謂約上之三位皆有妄業只似利根之人寂滅是其真心動念皆成妄業鈍根之者緣其勝境即是善心鄙惡攀緣便為妄業又律行之士護持受體即是真心約體有違皆成妄業既各歸宗旨而懺何憂妄業不除各守本修妄心自然無犯故下結云即為聖歎故文曰下證上如法可知次開章中云今至懺者大略有二者大途約略開其兩章雖理有大小事有通局今總以理事分之故云大略有二也一則理懺者謂約得其理觀者説若依成論從五停心觀乃至無生得其諦理名為理觀二事懺者謂依佛名方等諸經懺之則為事懺也云此之二懺通道含俗者料簡上來理事通局二意也出家五衆根有上下上則依理下則約事故云通道又俗人通修理觀及與事懺以俗人中根亦有利鈍與道衆不別故云含俗也云若論至後列者此於事上選出律懺一向是局故云唯云云由犯托受生等者出局之所以也謂出家人犯戒須論受體當初若登壇受戒得無表之體隨中對境進趣造作即有違制等罪反顯無戒及俗衆既無受體可違不可輒依律懺也還依初受者既污戒體造作過罪今若洗除仍前清淨還與初受戒時未犯不別故曰還依云云次第治之者若犯初篇作滅殯治乃至吉羅責心對首也此約成果以辨次第若未成果或起心時或進趣境所有吉及蘭亦須依而懺滌篇聚立儀悔法準此者謂成根本隨五篇收未成果前通入聚攝一一準之以為方軌次第如下鈔文頒列也言若至別者如文云理至遣者智利者智慧利根也觀彼罪性者謂體性是空故經云若見罪性即與福無二無二之性是名真性由妄覆心便結妄業者由於虗妄以覆真心心是無生智妄業是貪等煩惱被此煩惱蓋覆真心無生之智不起遂於妄上廣造諸惡也故羯磨疏云以妄覆真不令明淨方須修顯名法身佛以妄覆真絶於智用故勤觀察大智由生即攝善法名報身佛以妄覆真妄緣憎愛故有彼我生死輪回今返妄源知生心起不妄違惱將護前生是則名為攝衆生戒名化身佛也還須識妄本性無生者謂利智之人識虗妄無體體是真如如本無生滅今違此無上不可得豈有妄焉念念分心業隨迷遣者謂妄業不可頓除要須念念隨覺即妄業亦隨覺遣除也又解念念分心者示覺觀也即剎那剎那念念相續常勤分別知心性空妄業此時隨此除遣云若論至諸經所明者愚鈍者愚癡魯鈍總下根也由未見理示倒常行者謂未見性空之理橫執蘊處界有真示故不順緣理稱之為倒念念不離故曰常行由茲我倒常行妄業翳心者是其妄業即翳其真性本無之心逐色聲香名隨境纏附貪等妄心才動即造作遷流故云動必起行此既從貪等三毒而生不免三界輪回故云行纏三有也為説真觀心昏智迷者唯識理性名真觀也鈍根之徒未曾慣習耳聞此真勝義觀行心中昏昧情智俱迷也止得嚴淨道場等者正辨事懺方軌事懺者依佛名方等是也即禮佛名經經上有六番懺悔三番出意以表再三三六即十八度懺悔等今天台禪林寺是法華懺也準羯磨疏凡修事懺須具五緣一先請十方佛以作證明為我心微假強緣故如諸佛等常在目前等云云二誦經呪為妙藥三説己罪名四立誓五如教明證當緣塵境或夢或覺非是妄心之所變又非魔鬼之所或若是魔者我之所行未出塵境依教如是明證所緣必不緣惡事也業有輕重等者善生經云業有四種一者時報俱定謂造罪時三時俱有尤害即結業定重也二時定報不定者時定謂順現順生順後三時定受報故不可不受也報不定者若定業三寶亦不能救若不定業若能懺悔修身戒心慧遇善知識是人能轉後世業重罪現世輕受或可不受等三報定時不定四時報俱不定易知不解或有轉報者釋上重業定受或有輕受者釋上輕業不定受謂今生事相修行力強能排此定重之業後生而受即經中生報後報或是也若今生事相修行力強能排此輕不定業現世輕受即下文云頭目等痛飢餓等如經云若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業即為消滅也云理至醉者既在智人則多方便者謂能修理觀則號智人此人恆以般若為先故云方便隨所施為恆觀無性者此方便是慧明慧生觀一切法恆無性故相既空妄我自然無托所作之事則非我生我心既空誰為罪福之主故勝鬘經云我心既空罪福無生即斯義也分見分思分除分滅者謂三乘人同觀無性之理即能觀之智證有淺即分見空理妄業分除分思無性妄業分滅鈔舉醒覺之喻疏舉磨鏡之喻意同如醒則無有醉如覺則無有眠故造醉如眠於其夢中種種事覺後都無所作可得醉亦然也次辨理觀云然至種者然是也是理觀多途大綱要略不出三種下文自列云一至小乘者諸法性空無我者諸者不一之義法謂軌生物解也性空即小乘人作性空觀亦名拆色明空觀謂蘊處界而成此身妄執為性今小乘觀三科法中且論五蘊一是色四是心觀心至剎那觀色至極微也喻如茶瓶青色咽小腹大是性妄執為有今細末磨為塵咽小腹大之性今何所在有情之身亦復如是五蘊成之蘊謝即死其身似瓶五蘊假合色蘊既滅餘四不存網而推之我在何所作斯觀行頓除我之理觀照心性名為小乘云二至小乘菩薩者此是大乘位中小菩薩修相空觀大乘五位中是加行位也諸法者謂外道凡夫執我法差別行解非一故云諸法也本相是空者凡情妄執實我實法聖人達無故云本相是空唯情妄見者情謂凡情妄謂虗妄見謂執見良由外道凡夫妄情執著大我如虗空遍一切處小乘如芥子潛轉身中作諸事業因此沉輪生死今此加行位小菩薩作諸業無罪可除不假懺滌照此理用者此者指法之詞理者道理此菩薩達我法二執非實之道理故照是照達小菩薩加行智能照達諸法無我無人之相是空用是相用九十四有為法是唯識相用此菩薩雖觀二空未忘能所猶滯相故下自引論云云云三至等者諸法外塵本無者諸法是所緣之境二執差別也外簡內心塵者染污淨法名為塵境凡情緣境有所貪著染污名塵此境元是虗妄故云本無也實唯有識者實者真實也唯者簡除義亦是專局義也有則對無立名識者了別為義故華嚴云若人欲了知三世一切佛應觀法界性一切唯心造此理深妙者此理即唯識真性法空真如名為此理凡夫及二乘不知故云深妙也唯意緣知者意者智也初地菩薩二空真智契會真如達唯識性故云唯意緣知是大菩薩等者從初地至十地總名大菩薩所言十地者一歡喜二離垢三發光四炎慧五難勝六現前七遠行八不動九善慧十法雲並作真唯識觀斷十障修十勝行治二十愚證十真如乃至大寶華王座上成等正覺既達悟法空無罪可作不假懺除等故云是大菩薩佛果正行也故攝論唯識通四位者問準論文都有五位一資糧二加行三見道四修道五究竟今此何以但云四位答就五位中資糧一位未作唯識觀今引論文略明行相初資糧位者資謂資助糧謂糧食謂此菩薩欲求佛位二轉依果先於因位修六度萬行資助己身故號資糧也故唯識云乃至未起識求住唯識性於二取隨眠由未能伏滅謂從十信初心至第十回向中間四十心皆資糧位攝故云乃至也未起識者此位未求見道不起順決擇觀空之智故云未起識也求住唯識性者即加行位觀名等是空作唯識觀趣入見道住唯識性此位但求佛果不求見道未名求住唯識性也於二取隨眠者二謂能取所取即二障染污心心所相見二分此之二分薰成種子名二取也隨謂隨逐有情眠謂眠伏藏識也由未能伏滅者謂此菩薩少居定位多在外門事相散心修菩薩行未能達了二取是空故不能伏滅此菩薩有能伏觀行所伏障染等廣如大論非此所明也第二加行位者加謂加功行謂萬行是通名也故論云現前立少物謂是唯識性以有所得故非實住唯識言少物者謂真如相分也謂此菩薩現前安立真如相分謂是唯識真勝性以加行位菩薩作似三性觀未得真實智故便認此相分以作唯識性此相未除遣以滯相觀心而有所得非真安住真唯識性若滅此相方實安住依如是義更有四別名即暖等云云及所伏障染廣如論説此略不云第三見道位道者引也出生為義體是無漏智能引出生一切功德故見論有二一真見道二相見道且真見道者故論云若時於所緣智都無所得爾時住唯識離二取相故謂菩薩起根本智正緣真如時故云若時於所緣也智都無所得者根本智緣真如時無能取分別心故云智都無所得爾時住唯識者實智冥合當爾之時名為正住唯識真勝義性以離能取所故又此位亦名通達位通者體也達者會也菩薩以無分別智親契會真如名通達也亦名一心真見道一心為簡三心及十六心也真者實也為簡於相此中實斷二障實證二空等云云二相見道者相謂行相即後得智倣學真見道時有斯分別行相故或可相謂相分後得智緣真如時有相分故即三心十六心等廣如論述第四修道者修謂修習道謂道德體是無分別智此位菩薩出見道後為求二轉依果而數數修習無分別智斷障修行名為修道故論云無得不思議是出世間知捨二分粗重故便證得轉依謂離所取故云無得離能取故名不思議是出世間智者二取隨眠為世間此十地無分別智能斷於彼獨得出名也捨二分粗重者即二障種子性無堪任立重名二空之智名為細而能斷彼名為捨也便證得轉依者謂十地菩薩能捨二麁重障所以便能證轉依因中二障為有漏法所依捨茲二障以成法報二身捨煩惱障得法身捨所知障得報身果位將此菩提涅槃為無漏法所依故云捨二云云第五究竟位者即佛位三身四智菩提名為究竟故論云此即無漏界不思議善常安樂解脫身大牟尼名法解茲一偈即是大乘總相三身廣在論文固非此述謂前五位是大乘等修行次第階升今抄所云且據作唯識觀行以言故通四位也已上並依論抄略敘要急以消鈔文也云以至遣者以此三理者以用也即小乘小菩薩大菩薩也任智強弱者謂隨今比丘能觀之智智有深淺也隨事觀緣者隨於力分觀照為緣則何罪而不遣也云故華嚴至消者引證如文云然至明者事懺罪業福是順生者謂事懺虗浮禮佛誦經但得人天之果未免轉輪回是順生之流也理懺妄本道則逆流者若修理觀徹見真如心境既空罪福無主則是見道此無漏道則逆出死流也一入一出條然自分者無漏聖道生死不拘謂之出福是有違屬生死所拘謂之入故云自分愚智兩明者理懺見自心中之道謂之智事懺假外緣勝境便亂心不生謂之愚鈔具顯彰故曰兩明也虗實雙顯者理觀分見分除得直見道謂之實事懺妄業根本不除但能轉不定業令輕受故名為虗在文兩言故云雙顯故諸行者等者勸勵意也若樂罪時須修事懺者謂妄心不滅懺已還生禮誦有漏善根人天之報以此世報順生死流望其輪轉故云罪也若樂福時須修理觀者謂依唯識等觀志求見道即逆生死流既免輪回得其佛果菩提無漏之福行此懺者得此福也理通深淺等者謂證有淺深非謂從前有此深淺之理如來小乘及大小菩薩三位明也云若是至中者若是五衆犯罪者出家人也則理事兩緣者諸記中皆言依律懺時不妨緣於理觀故云理事兩緣有不許此釋以心無並慮不可正行事懺時更能緣於理故今故但約出家之人多間理觀先依律懺却違制罪説然後觀心達理故下文云篇聚依教自滅業道依自靖思等然或有行得之人亦不妨故今且據多分而説思之事則順教無違唯識者謂依篇聚懺順其律教不乖唯識之道理也理則達妄外塵本無者謂理不妨於空外塵是事此事虗妄本來是無今若達之其體不立故攝論等者唯識義不失證上事懺事即是空不違唯識亦不無能取所取者證理不礙事如從僧乞懺䠒跪禮拜口陳詞句是事即色鞭心悔責即屬心如此色心俱不可得所禮僧衆是境屬於外塵如此外塵本亦無實即事不礙理唯識義不失修理觀時徹見空理不妨事緣能取之心所取之境內心本空外相無實當爾之時無能取所取此據理以論若約事邊能所宛然是有故云亦不無能取所取也若非五衆者謂不是五衆即在家之人也福道兩經者福謂佛名方等道即理觀三乘所證次第淺深也必欲識論非鈔意者抄意為接初機若廣述在家理事兩經福道之行恐涉繁廣非成略意故指廣文如彼説也云次至位者謂前料簡於事分出局懺一科若論律懺唯局道衆前既簡出今更標舉前科如此懺之所依故云依律等也云初至法者標也云觀至中者此經云八萬四千劫與罪報經九百二十一億六十千歲不同者玄云或可機見數有大小致此不定也不取別解一毀無十方佛者問小乘薩婆多不信有十方佛莫同此不答不然多宗但信有釋迦佛一佛普能利益非謂總不信也故戒本云合十指爪掌供養釋師子若四分宗通信有也故文云稽首禮諸佛今此一向不信故罪重也二斷學般若者般若是佛師三世諸佛皆從此生今斷學者便佛種斷滅也三不信因果者論云信為道原功德之母如水清珠能清濁水今既不信因果豈能生於諸善功德也四用僧物極重於三寶物者僧物即約常住僧三寶中僧據常途僧説也餘文可解云涅槃至地獄者生報即受者準經論中一者現報二者生報三者後報所言現報謂今生作罪便招報是也生報者捨此身已於第二生中即受故後報者於後後生中受也今於三生中是第二生報即受斯苦也猶未捨遠者謂此類人雖則破戒而披法衣能示人天伏藏心猶有信遠遠亦有得道之期若犯四重下即反上文意也一闡提者一闡者此言信也提者此名不具意道此人信不具故名一闡提崿記云翻譯人謬準理合言阿闡提阿之言無闡提云信即是無信也云何名業能得現報者徵意也意道今生作惡是業理合當來受斯惡報今欲回此當生之報便現世受如何得耶謂懺悔已下鈔文正釋如文可知云四至儀者諸師廢立互有是非者謂前所列律文但云都無覆心古師解言初篇四戒唯淫開懺以不損境餘三不開即反上義也又就初戒中若犯已不得一念有覆藏以即開悔罪若暫有覆心即懺罪不出以律文中只言初戒得悔是立不説餘三是廢若無覆心許懺為是有一念覆不許懺悔縱懺不出為非第二古師云四戒俱開懺悔以律文翻譯之人存略但向淫戒下出法餘三例然今則四戒有犯並須懺悔是主即顯前師下三不開為廢然則四戒之中雖俱許懺仍須從前未經一念覆藏方開為是若暫經覆不得懺悔懺悔則非已上二師互説各有廢立是非故云諸師云云今括其接誘理無滯結等者今師自釋並異於前也括謂搜括律文以佛接誘為意理無滯結者初師不許下三戒悔及初戒都無覆心是滯結不通之貌也又有古師四戒雖開然亦不許有暫覆隱悔罪不出是滯結故但使已下今師意四戒並許懺罪與第二師同然但臨乞時無覆心即得懺不論犯罪後當覆不覆也以律文中都字正約犯後臨乞時説故云都無覆心也外難曰初篇犯竟臨乞須無覆心有則不許何故第二僧殘縱有覆藏亦開懺悔可引鈔答云不同僧殘等云云謂若犯十個夷罪到衆要須俱乞十盡方可作法得成若覆一罪其法不就若犯僧殘十罪但將一乞餘覆皆成以非根本得足數故不障法事對明異相夷是無餘不得僧法殘是有餘得強加法故文云應強與波利婆沙結成夷殘覆乞不同須立懺儀也云先至法者開兩章也云僧祇至如彼者據學悔初緣是難提比丘犯淫已啼哭不欲離袈裟此人得世定七舉後依林中還習本定被魔化作端正女人在前立遂起欲心遂之魔行到死馬邊即便不現欲心不止因共死馬行非竟而生悔心此人悔罪之時僧誠其心作大火坑語云汝能投身於火懺可得滅彼便投身傍人捉住因與學悔懺法也著安陀會者現卑下相也擔糞者表苦後也須八百日日數滿已後洗浴著僧伽梨入塔觀像求於好相若見好相然後誦戒八百遍等云云云律中至已者如文云僧至持者如文云佛言至隨意者唯加不得衆中誦律等者謂前來奪三十五事中已有不聽誦故今此開得誦非謂新加也云若重死至之者如文云上至懺者且者未盡之詞也不同等者異古意也云二至法者標也云略至別者下自列釋也云至也者覆藏者就所治情過受稱首云從隱過以彰名也別住者就能治為義情過者有二則冒涉清衆之過謂內藏瑕纍外現清白內冒僧倫欺法律故隨隱日作法補行伏在下座折挫心體也二無暫情過既已犯罪不思露悔心無著愧故餘如文云二至法者如後正懺悔法在前者謂後正懺之時且先依法懺覆藏吉已僧與別住覆藏羯磨今文立在第二者其實合在初明也云三至耳者如文云四至也者善持起去者謂同伽論於不善處舉著善處是名阿浮訶那今既懺滌為善法所得起得去是解脫義也又釋為善法所持隨中無作戒法續生名之為起僧殘罪滅名之為去云二至義者非別人法故曰衆中約律準論正法中須主懺之綱網故先引明文示之格正也後云正儀云格義也云初中至方者此標了論正文也若欲為人懺罪須依五種方法故云釋至也者總標出殘罪意也提舍那此云發露羯磨也謂有人欲懺殘罪故云求得出離能為出罪者名此人也若能出罪人為彼作羯磨先須憶持五種方也一觀僧殘等者知定成殘不成殘二簡擇等者謂成覆不成覆業三聚學處者真諦云羯磨是業多羯磨集在一處名聚四部者四人五人十人二十人即如瞻波法中明用僧分齊是也四觀業相應等者法有三品為用何法或單白等隨事難易也地立者於四種中各有處乖故云地立也宿住者即別住也摩捺多者六夜也等者等取本日出罪斯之五方等結也於此五若曉明即可為人出罪方猶法者軌儀法則也云釋此至門者將前五法若欲解判便了五門如下列也云所以至五方者犯罪之時如人倒地不起今悔第二白法無作還生如從地起今若懺悔約止廣障殘罪不得相續戒體還得如受時清淨持時清淨即對事起觀護其受體第一白法從來不犯已能悔是第二白法也餘可知云第一至知者若人已受大比丘戒者受戒成就緣若如來已制此戒者制廣教緣若人不至癡若法者無重病壞心緣將此三緣統收一十三戒也於餘略説相亦如是者約失精一戒明之餘十二戒犯相比説廣説如波羅提木叉論者彼論有六千頌廣説罪相又具説十三事相故指彼本論廣明也了論但釋失精一戒不具足説十三故略也準論解律者準了論解律文也上來等者結上通別兩緣失犯一戒須假通別二緣即成具犯若通別二緣之中一緣有闕即非究竟五衆罪者五篇也引此須知有罪無罪恐藥病兩不相叫也云第二至懺者謂雖犯此殘罪要憶識不疑了了知犯殘故作覆心起僧殘罪見方是被藏隨其日夜多少也若人等者了疏云若人雖受具戒學而未知不識罪相名為不知犯罪竟由病等緣心亂忘却所作罪名不憶有人體羸作此罪時於中眠熟覺後見不淨出心疑不知是夢中不知是覺時此名疑也有人心顛倒作此謂言不破戒故曰起非罪見也云準至不同者準上論文解其律本須分十門明成覆不成覆等相也釋中十段前五不解可知第六段中云業待時差者此是兩種入定是業差餘者為待時差也文中曰略據理合云待時人方也待時謂如今國土飢荒軍戈未息待平𭓶也待人者如今此地並是愚人待有智人我方説也待方者此地無佛法待到有佛法方所等非覆者已後修擬説在非發露者目下未向人説也餘並如文云第三至法者業聚學處者真諦云多羯磨法聚在一處名為業聚又制戒令誦不誦獲罪名為學處意令簡擇別住羯磨用幾人乃至出罪用僧多少等四部等衆者四人五人十人二十人也前二四人者別住六夜也後一二十衆者出罪也異此不成者滅四及二十不得行時假境説者謂假前僧為所對境也説者前一下至有一人者謂約正行覆藏時界內下至有一清淨比丘亦得若並無人即不成次一局對僧者謂六夜法要對四人方得行之出罪一席法者無其再會一生便罷故云一席也云第四至之者法位雖三者別住六夜出罪三也如前後説之者前則懺夷篇後則引十誦犯殘已乞別住等僧次第與也云第五至也者一日夜等藏不藏者謂若覆一日夜則行一日夜若覆百日夜故云等舉一日等餘日例準也地立宿住摩捺多者地義如下釋宿住即別住也摩捺多謂摩那埵也地者處所之名者了疏中三義解地一諾處為地二約位名地三約別住名地也四位者別住六夜本日出罪為四也正立懺儀云第至九者可知也云一至故者一名多種住別異者一名謂同僧殘多種謂十三之別住別異者十三殘中種類有四初五條戒是淫家種類二房是盜種類三汙家惡行是煞種類餘是妄語種類故云住別異也更有古義不録第二三四五並一一如文云六至也者相從者謂以短從長故曰長短相從也要須乞清淨五年十年者四分但言清淨已來治何名清淨下遂釋云壇場受時已來是也此文由是未了雖云受後名為清淨不云年數如何得知行覆滿之時節此既全無分齊日下行十誦正文云云如鈔也十誦衆中三諫等者先是且難云摩觸等戒私屏而作不向人説衆人不知必定成覆違僧諫戒三諫不受僧衆同知犯殘今不發露應不成覆即引鈔答釋云云云七至等總別懺法者此約犯數既多總別懺之俱得知數者知犯罪多少也不知數者雖覆而不知犯之多少也等者等取知與不知相雜覆者有覆心也不覆者曾發露也等者覆與不覆相雜也上依一流消鈔足為雅當也若依玄記云等覆不等覆如犯十四非五罪同覆經一年即是等覆若犯十罪於中覆一罪經一年餘罪或三月五月即是不等也似破鈔句況下向覆字在上知之一名多種者一僧殘名有多淫盜種類故云多種也大德對此即將上來知不知等及覆不覆等歷成三九句也初九句者一知數覆二不知數覆三知數不知數覆四知數不覆五不知數不覆六知數不知數不覆七知數覆不覆八不知數覆不覆九知不知數覆不覆二九以不知數為頭第三九以知不知數為頭歷之各成九句比前可解云云同用一羯磨懺者謂律文許總懺也又云等者重引律文釋成總義若作法時次第牒名種各言覆日長短共秉法行別住消長者了短者亦了僧祇總別各得者準祇四句一多罪一得法如月一日犯一殘覆經十日二日又犯一殘覆經九夜乃至第十日又犯一殘覆經一夜今同一懺是總也二一罪多得法如犯一殘覆經多日今只記得三二日乞法行了復更記得餘日又重乞經於多遍名多得法三一罪一得法四分罪多得法可知六夜出罪例上總別皆聽下引十誦釋成總懺義也雖三三總懺若記得數須具聞罪數即同篇合懺故云八至所被者如文云初中至云者慨古愛反披心曰慨或云悲喜交流曰慨又云高聲諫罪曰慨也餘可解云大至已者乞法可知云次明至謹誦者注文若準律文等者依曇諦古本但三三犯僧殘不三三漏失等不成也云九明至法標章如文云羯磨至三説者如文云其至中者謂彼篇中廣明七五不同指廣如彼也云律至故者有客來遣出者謂客比丘到來要房乃遣行別住人出佛言不應遣出亦不應去既不出不去彼人即擬同此房者應答云不得二人共宿也若與共宿不成別住餘可知云善見至不成者二十五夜者謂決前文雖云白停不云日之多少是不了也隨一事闕皆失一夜者問一日併犯八事為併失八夜但失一夜答但失一夜謂一日中無多夜故但別犯不應吉也問一日重犯一事失幾夜答初違一事即失一夜後若重犯亦無夜可失但犯吉也云白清淨至説者應求彼僧更行者勵疏云行別住不局當界但取日滿也云鈔者至之者諸師立理互加同異者初師云要行覆藏日足方乞六二師云先乞覆藏行縱不滿即乞六夜出罪亦得三師云不行覆藏但行六夜出罪第四師云不行別住六夜直爾出罪即得故曰互加同異也今取成行之師等者寶云即前第二首律師也云云用彼徵此者用彼十誦不行別住罪上除滅徵此四分行日不滿何損大途結茲道理須相準也云二至法標名也云初明至三乞者乞詞如文云上至持者如前作法者如覆藏中索欲問和安慰等如前文也云彼至出罪者準段大德僧為異者據理應云準改僧為異但言大德也常在僧中宿者謂界內要須有四人及已上方行六夜故云僧中宿也注文非謂等者簡濫可知云此至述者別述者刪補羯磨中明也云三至法者標也云先至三説者乞詞如文云羯至時者如文云與至等者無憂華者憂曇花也割斷者相續後犯也鳩鴿等者是煩惱餘報多欲人死入地獄從彼出受此報後得人身為黃門二形之類餘犯例知臨時約勒也云三至儀者番名釋義並如前文初罪相者廣辨因果罪體輕重相狀也二懺儀者正立懺罪儀則也云初中分二者就罪相中分也云一至同者從生者謂從初二兩篇下生也初篇生重者謂夷家近方便也謂身口等者辨相也一切僧中悔者謂五人已上是一切僧中也初篇生輕者夷家次方便也二篇生重者殘家近方便也界外四比丘悔者準十誦四人猶名小衆此是僧法界內或僧多難集故令出界若易集及有戒場亦不必出界非謂定須在界外懺也思之僧殘生輕者殘家次方便也一比丘前悔者即封首法如提不異故云同也云二至之者自性者不從初二篇下而生故名自性獨頭者非他方便也類前從生三位輕重故云亦分三也云何名重者徵也食具者謂僧家可食之物有資身之益既未入口但名為具故律云食具已辦十誦云辦供具訖四僧物中是十方常住熟食等是有釋云常住器物貯食之具者錯也十方現前物者如己人物體通十方羯磨之後攝入現前今此據未作法前盜得蘭也偷四錢者未滿五也非人重物者五錢已上等大衆懺者一切僧中如上五人已上等是也云何名中者徵也破羯僧者要一界內同時秉羯磨名破羯磨僧若前後作法不成破僧也盜三錢已下等者即二錢一錢等一有衣等者謂摩觸互有衣也作僧殘境界者喜出他精也小衆懺者四人是也云何名下者徵也畜用人髮灌下部僧尼同犯蘭剃三處毛及犯提也露身行者準衣犍度中時有比丘露身往佛所白言此是頭陀端嚴之法願佛聽許佛言是外道法犯偷蘭遮玄云準緣起見佛故制不妨不見佛但露身不犯已上記文所稟破云露形見佛本為啓白聽許長時裸身佛既不聽違者犯偷蘭罪今不論見佛不見佛但使露形即犯思之著外道衣者如樹皮衣等是也畜石鉢者非附道器難以擎持故制不許破塔者與裂破三衣等同罪體並是下品用一人悔外難準俱舍破塔者攝在惡逆衆生上品治之合是重蘭何故祇文在下品攝答祇是人塔故輕俱舍約佛塔故重初二篇教人犯蘭者鈔意恐人疑云教他作非及漏失等應是從生之罪故此釋云並是究竟也輕重同上者若教他作初篇如初篇下方便近蘭五人已上僧中悔若教他作二篇如二篇下近方便重蘭界外四比丘悔若教他犯初篇下重蘭能教重蘭四人中悔二篇下重蘭一人中悔故云輕重同上懺之雖教他作方便蘭能教之人却得果蘭也云二至法者如文云初至分七者如文云今至三乞者可知云二至三説者諸詞如文云三至是懺並單白和僧法如文云四至中者前後懺中者前謂懺殘篇後説破戒餘習以多故欲後受鳩鴿等身今既懺淫重蘭餘習一種故指同前説也云五至説者餘詞如後中説者謂前引論文悔如波逸提法故此中略出餘指後也彼云願大德憶我清淨戒身具足是也云六至離者誡責內心令生厭離也云答至七者此自言立誓詞也理合云第七立誓今取上文語勢相續是以却將第七兩字安下句故云上至之者律論各題者謂律增一中波離問佛年少在上座前懺悔具幾法佛言五法一修敬儀偏露等二説罪名相種三我犯如是罪從長老懺四答言責汝心生厭離五彼人答爾論文有四如前所引律五論四正是各題及論附其懺罪等事兩處之皆不整頓律有修儀無乞詞謂乞白兩法律所未明捨罪如提律文即有而不言互用罪名種相呵責立誓論文中無即兩處文俱不整頓今鈔引論之四及律之三共成七法故云通引實為此鈔之用故云誠用想後學人更無紊亂且據一罪者淫方便蘭也餘準之者已外蘭罪大約準比云第二至同上者縱有四人止同小法者此悔蘭滿四不同僧法以悔主非數只得口和邊人猶同二三人法引祇可知云第三至並同者謂一人法中除乞問邊人但有餘五法耳云上來至不憶者三懺者夷殘蘭為三也事希者非謂犯罪事希下句云罪多懺少懺少即是事希脫隱而不出成疏略者分疏適來既言罪多懺少即何假更出文耶智人犯過等者意道懺少即是愚人約此不懺之邊即不要出文亦得今或有智士犯了便懺捨此無文豈非疏略今雖出文文則繁廣若論罪事實未總敘故遺漏也必若懺滌足為準量者謂文雖未總述必若有人悔犯依此足得以為準式審量類例用之亦不欠少下四篇人喜犯等者故於懺首曲更條件於是非罪名顯於頭緒令識也同篇合懺異聚別悔者同是一篇之罪各題名而合懺提吉聚異依聚別懺滌罪入法者謂牒犯長離衣非時食等罪名入羯磨法隨三提罪一一稱之若忘者云不憶數也云又見至述者是非未分輒為悔主者謂於教不了名為未分專輒為其懺主或云衆學諸罪者即非須云不齊整著安陀會上樹遇人頭等即是預是罪者即非若歷別牒即是或有迷忘者即非若云覆頭入白衣舍蹲坐白衣舍各不憶數即是或二篇同懺者提與吉同也或無犯言犯即無病有藥施不相當或犯重而云輕即有藥有病施不相當如此已下通結上文非法與他悔罪不出等明逾水鏡者水有滌垢之能如懺主心達於教相與他懺罪罪無不盡鏡有監照之用如懺主心能照其所悔之罪能所分明逾於火鏡故舉為喻也律宗約相者約相事制罪違相心事俱非者如長衣事相過日不説淨得提是重若言懺吉是輕即違長衣提重能犯之人心不實所懺之罪事又非即心與事俱非何成順教也三報皆同一懺者謂定報不定報定不定報大乘家達見真如性相俱不可得一時消滅今不類彼餘如戒本羯磨疏者彼處廣明大衆小衆人數多少非急録不也云第四至九十者如文云初至法者且於三十中分此三段也云又至相者捨僧法中分為四段也云一至是非者如文云初中至懷者不須對境者此但自斬破不對僧俗二境捨也兩種寶戒必捨俗人者一畜二貨要與俗人比丘沙彌俱不許畜提也乞鉢一戒要本住處者謂污染當界僧故罰當處僧中行非法乞求時他問何處僧便言某寺人俗士譏言某寺有如是人豈非污一衆耶又不通戒場非僧住處故鉢須入僧厨場既故下聽也人含僧別者各有意致者謂上諸捨不同各有意旨由致故戒疏云蠶綿非法躰是損生若不斬壞此貪何竭二寶躰貴壞行長貪非出家人之所畜故令捨與俗乞鉢一戒污本處故求集留僧庫罰當界行餘二十六躰非此患故制道俗捨還復本用故非鈔者懷者鈔意務在𡞞約不在繁文此意既繁是以不録也云二至隨相者乞衣受衣此之兩戒有犯不犯若從非親乞即犯親則不犯又如失三衣失三受三即犯受二不犯失二受二即犯受一不犯並在隨相此略不述云就至過者如文云長至五種者鈔明長相有五如下列之今明長躰亦有五種一長鉢二長藥三十日衣四一月衣五急施衣問既云長相不過五種今此列者皆非是長耶答反顯也謂將非長以釋於長若非此五王即長所收舉例猶如欲辨如法羯磨先顯七非羯磨不落此七之中便名如法云一至中者準律三文幞名盛衣鉢袋名貯器並不須説反顯不是受持鉢及幞袋等過日不説即是長相也有説不説者此因便明畜長人也據律約應量不應量衣明説不説下卷指二衣篇述云二是至畜者普腳説文云草履也十六板器者二釜二瓶四瓫四蓋四杓云三隨重至不須者被躰雖輕從用故重故云隨重物若準畜寶戒六七金錢綿褥得提違淨施故即合説淨今言大氊帳等不須説淨似有相違然前言須淨施者約三肘應量言之今云不須者據過量者不須説俱是重故云四至一過者謂取尼衣入手已犯捨墮即是不淨之財既不應淨法無長過也不同昔解等者謂古人取祗律意販賣衣等入手犯竟停過十日又犯長罪若捨之時須兩度捨先作販賣捨後還財竟更作過日不淨作捨今鈔不爾財無再捨罪不雙結單犯別捨如犯販賣衣更無犯長但犯一提故云單犯不染餘長故云別捨也不同他律者文中自解也云五至亦無犯長者他寄未入者他人將寄我未入我手遂經多日後物至來乃言此物與大德先雖在身邊多時不名犯又準羯磨疏我物寄他邊他遂遠行不在不得説淨亦不犯共物未分者謂約別活屬主未定故如是已下通結上文兼旁破古也云相染之文如上已明者如隨相三十戒初明也此依法寶科此段文搜玄科向上句云亦無犯長相染之文者錯誤甚也云二至也者謂離衣宿隨所離者犯捨今須牒名入捨不得籠通云三衣又雖列是三衣出法語非要盡捨三也云三至通成者三種之中準約買之一種以論故云且也雖非犯長乃入買易皆犯捨墮者如上比丘自紙買筆與俗人爭價上下得物雖非犯長但是比丘買易此物不作淨語皆犯捨墮田宅人等躰是重物既無淨施可違不入捨也犯長相染者此未約忘直論捨衣盡不盡若犯長衣要須盡捨若有留者相染不成捨也若取尼衣販賣衣則無相染故曰通成云二至須知者謂捨衣多者如此五十件衣物等類也忘喜相染者忘謂迷忘喜曲數也迷忘數數相染故決若捨衣竟謂作法僧中捨畢有將決字向上句者不為穩也若還衣已者僧中悔罪白二還彼已説淨訖者將此所還之衣對首説諍了忽見忘物者謂忽爾尋見忘物未曾捨者前捨説淨二法兩成者捨衣得成説淨法亦成故曰二法兩成也後所忘物更將捨墮者謂是忘物今既見已但將往僧中捨之然後説淨即得若還財未説而見忘物者謂捨衣已還財竟而未説淨忽歸點撿見其遺忘之物並即相染者謂前衣雖捨懺竟未有淨法即被遣忘後衣染之仍須一時更捨故曰通將入犯長捨之也前財雖是乞衣等者謂前所捨者雖是敗賣從非親乞衣取尼等衣等由今曾捨成淨後從僧得還事同新得不名販博隨所忌者染之故不得説還作長捨也忌者施他者羯磨疏云有人不見忌物作心施人何得染也答卿心粗也見便生分物之解即是染竟後方施人又是佛制犯捨墮衣不許與人文云應捨己然後與他也其所忌物等者謂所忌之物若是長衣便能染他捨還之衣若所忌是販賣等則不能染捨還之物故云此無相染謂十日等衣則皆是長所忌故通相染也餘可知云三至衣者其衣物三處束幞者所以爾者一由離衣當日還主敬須受持也二敗博等更須經宿方還主故三恐有長忌相染故須分三若都作一束一時捨之者還衣之時亦一時還還既一時若見長物恐一時被長忌相染所以別捨也須一一捨者四分文也若準多論許連束一捨是長有染者既有三束各別前捨之時有忌若所忌是長衣即能染己捨雜物故云是長有染也雜捨則通者所忌若是販博衣等雜捨則不能染己捨雜衣由此雜衣入手已犯躰非能染故云則通通皆成捨故前文云若雜捨衣有盡不盡犯長相染餘捨通成若所忌是離衣亦不能染雜捨及長衣故云染亦不得也餘文可解云四至一説者僧集已先須索欲問和和已方可捨衣若不先索欲和僧輒捨未知僧許已不故須先和後捨猶似結界嗢相之時不別以律云等者羯磨疏云此尼薩耆下明對境捨梵本如此唐言盡捨對於三境一與僧二衆多人三一人俱別衆若爾既開別人故不得別衆答制在僧中雖開別人界還僧法不可別也唯制不開則犯捨極多求僧叵得思淨無路故隨方面三境通行不許別衆望僧生重隨人立捨且濟時要可不好耶上並疏文次下捨詞如文云二明至法者如文云今至如疏者此謂長財之捨不同餘雜罪者謂若犯長財雜捨衣懺罪而心不捨還犯若餘雜捨縱心不捨亦成捨也以受取故犯不同貯畜也若取通理者謂取律論通除道理要斷後畜為先故文中下即取通理意也謂決捨與他他不還無盜重明知捨心斷後畜也若不成者不還元來得重今言吉者是失法之𠎝也四分一律宗是大乘等者此經部宗心緣理觀故曰靈通物不干情乃云無係古詣反謂心通故於物不係也語無虛唱靈故發言誠捨不靈也物拘情則無滯結若依等者如五分十誦等文永捨非暫故分處任僧也或入常住者如五分云五數具捨入常住唯本主不得坐臥或入四方者十誦云二寶少者永捨多者捨付同心淨人令作四方僧臥具罪僧中悔多論販賣亦作四方僧臥具或觀所須者了論云長衣月望衣雨衣急施衣遇限鉢捨與僧問須者應還得用若自無用永捨入僧也或棄山水者十誦云寶少者永捨五分云二寶捨與僧僧差人永棄不得記處作絶捨心僧祗善見金銀若無淨人可擲去僧羯磨善一比丘知五法者便閇目擲坑水中不應記處也即同此律斬壞者乞蠶綿作臥具制令斬壞塗吝也入厨者乞長鉢一惡者僧中行之餘好者制入僧厨也施僧施俗者七日內藥即施僧食過七日藥即施俗及守園人也兩相勞擾者謂勞僧勞己唯見現在浮財養身即是見狹不求出離之道即非通遠世人多貪財利今初作法口言捨之即口雖世表及至捨罪後僧還還取如此之行實痛陋矣今若不捨要必皈無者謂身死後必屬於僧也捨身任業一毫莫隨者如昔國王為寶所誰是也如下廣述不思大事者出家本意只為菩提涅槃今不思度也任世送給者隨任世情積畜至於老死是任世送終以此積畜財物經於一生無行良因故云虗遇也僧能除罪者以衆僧是良藥能遣自身之罪行紹佛蹤者懺竟斷相續心隨順四依節捨之行也何得已下誡勸之詞薩婆多等者彼云一衣已捨罪已悔畜心未斷若更得衣是後衣隨前衣得捨墮二衣已捨罪已悔求衣心不斷乃至一月得所求衣及意外衣皆犯捨已上兩句言罪已悔者事中雖悔罪實不滅由心不斷故三衣已捨罪已悔畜心斷即日得衣不犯四衣已捨罪已悔畜心斷後日更求得衣不犯中間心斷又隔日故五地了時衣捨罪已悔心亦斷向暮更求得衣吉其心難斷此同日故六衣已捨罪未悔畜心斷正使多日得衣犯吉已上四句由心斷故不染後衣也今鈔文初句即合彼論中第三第四兩句為一也若抄第二句即合彼論文五六兩句為一也鈔第三句即令彼論文初二兩句為一句也餘句如疏者疏明句即語廣鈔中棷要文略義廣云三明至七者如文云一至悔者注文若遇限有則三三之者謂根本畜過十日名為遇限若未得十日但是被他染則不得云遇限故云餘不遇限也即是所染之衣云二情至可不者亦不同等者五分文中時有一比丘病犯罪語一比丘言大德不犯罪彼答云不亦犯罪不得悔便命終諸比丘念言佛若聽向有罪比丘悔過免此比丘帶罪而死佛言從今已後聽向有犯者悔但不得對同犯者懺也復有一比丘病犯罪故向同犯者悔彼不敢受因此命終諸比丘作是念若佛聽向同犯人病悔比丘亦免帶罪而死佛言從今後聽向同犯人悔也古見彼律開許便引此為據今師破云此妄引五分等云云云三至悔者如文云四至法者如文云當至也者涅槃文證者若有受畜八不淨物不非彼師彼非我弟子等引此證之不許也出在大論者智論也破戒衣食等者謂販賣犯長是破戒衣殘宿惡觸是破戒食若破戒衣先受地獄正報後從地獄出別受死毛蟲鳥之身無毛蟲即蚯蚓之徒無毛鳥即寒號鳥是也身既無毛日中不出夜里方出作忍寒聲等廣如俗書中説之若破戒食從地獄出別受𧏙蜋蟲及噉糞鬼等云次至三請已者次説罪名者標也名有三種者顯數也一根本提者離衣畜長等罪也從生根本三吉者一覆藏吉二默妄吉三著用吉此三從根本提上生故號從生能生餘六又名根本云何六品者徵也謂覆前三吉各得一品覆吉成三隨夜展轉又各得一吉添前成六此言六者但約品論非謂六罪也所以詺此六品為從生者謂從前三品吉上生故今據具足出法為言若無此九不必通臨時制度上依法寶且消鈔文次敘搜玄明九品結罪行相彼云恐人未悟更為作之言九品者如早朝衣犯捨得提即須發露由不即露得覆藏一吉又不露此吉經第一夜又得一吉後更隨夜展轉覆文得一吉成三次明著用得一吉覆此吉第一夜又得一吉後隨夜又吉成三次默妄得一吉覆此吉經第一夜又得一吉隨夜又一吉成三并前合九品也已上記文大德云若據鈔文列其九品適來所述理合如然後造羯磨疏文依古但出八品不合有九所以爾者且如朝來衣已犯捨得根本提即合發露今既不露雖有覆心未經明相何得結他覆藏之吉儻經明相又成經夜覆藏自屬從生所攝以此推之根本覆藏吉羅全無結罪分齊不同覆他粗罪初夜知中夜不説便結犯此是罪上覆隱不約明相以論今是財已覆藏理須於時結罪進退商咯其妨不無今敘疏中八品行相者如早朝衣已犯竟有覆藏心未結其犯才經明相名經夜覆藏至第二夜名隨衣覆藏唯有二品此之二品但號從生直從根本提罪上生更無根本覆藏吉也若著用默妄下各有經夜隨夜成六將斯六品添前二品豈非八品吉羅若爾鈔文何故五九答法寶云依十誦文也古今章記之中不曾露述但依前釋癰滯去多學人細思方為通達餘如文云二正悔罪者標也云應言至爾者如文云二至要者三小罪者謂覆吉著用吉默忘吉對提得小名也根本著用捨墮者此著用捨墮衣吉是前六品之根本也律中善見俱結罪名者律論俱號覆藏突吉結説戒默妄文亦同此者説戒乃云默妄突吉羅故云同此餘文可委云五至三説者本罪者謂提罪也如上犯數者指第一門對乞懺處注云長言衆多別罪不憶數若言一二亦須述數多少若三衣一向知數正是此文也安樂者建得禪果適形心也云六至離者如文二十立誓可知云大段至法者大段簡諸小科也餘如下述云初至文者如上論文者多論云衣已捨罪已悔畜心斷當日得本財等三句文也云今至與之者修舊法者前修諸師舊來立法也律云等者謂僧多難集及主欲建行亦有衆少而不知為難集也須作展轉羯磨屏處付者謂懺罪比丘既捨衣已明日欲遠行本不能集得僧還衣今又不得直付即於當座令作展轉羯磨將此衣付與捨懺人親友比丘其親友既領得衣已屏處還本主也律云應向彼者彼是捨衣人隨彼與者與之顯是他親友也云若非至持者如文云律中至廣述者四分約捨不還結吉以決心捨故不還無童但失法吉若依他部如前解者祇云一捨已後無反還求或入常住等云云如僧殘不異等者律文悔殘先悔覆吉後懺根本若先懺本罪後悔覆藏吉罪不出也準彼徵此理自明矣如上卷中者指足數第一為他所量不入僧數三非僧也別篇自現者畜此且明畜長離衣其餘畜貨二寶如下二衣篇述若浣添擔劈斬壞等如隨戒篇當戒自現也云二至三者衆多者簡非僧也有三者四人為一二三人為二後一人為三云初對至羯磨者謂四人法亦有四門捨財捨心捨罪還衣於此四中前二後一同對五第三捨罪有少別也四人悔罪初捨財時亦云大德僧以四人成衆故還財時亦然唯受懺時一為懺主故餘非僧有口和之別與前五人法不同餘皆不異乃至一人豈有須畜者謂捨心也僧別雖異捨心皆同豈對一人不作斷相續意也若論捨罪者準前對僧法有七於七中除乞懺一唯六種也以對別故無白文也餘詞同上者但於六十第三白和改白為口問邊人以替之也如刪補羯磨者彼云若向四人懺者捨財同上乃至還衣得作直作直付羯磨如上四人不可作展轉法也云對至並同者二三人中既是別人故云衆多大德也捨心上已明捨罪有六與上四人並同之云二部至得者謂四人為一部二三人為一部謂前觀業聚學處中呼僧為部也前須羯磨即四人僧作直羯磨付之自他是僧者懺主是自為僧所量不足僧數今還衣時不別牒名懺主他三人成僧得作羯磨還也後別人法即二三人也云對一人述者大略可知者捨財還衣捨罪無邊人故但具五法即是大略如上謹誦即得故曰可知謂一人無乞及問邊但五也云二至法者如文云當至前亦名隨犯多少者或犯四五是多或犯一二為少也總別者同篇合懺是總一一各懺為別同前三十中謂九十中有因財起過者如過量坐具白色袈娑不作三種染壞色則有覆藏著用默妄等三品經衣隨夜等九品也羯磨疏八如前明之六品者如餘妄語赴不因財便無著用但有六品也四品者或覆藏得三又經説戒默妄而未經夜覆并前但四品也三品者未經説戒也但有覆三二品者謂覆未經隨夜故但二品也云二至不閇者天道門不閇者不障聖道故若不懺者障於聖道地獄門開天道門閇云五至持者云與波逸提同一説為異者古云殘二十衆蘭罪大衆三十戒五人單提一人提舍尼一人與提同一説為異也今依律戒等者今師所解與昔全別也謂律文但出懺提舍屋之名闕其詞句致古人之虗説今師依戒本文自立懺法詞句謂中四戒中具足順列也僧祇懺法云者有解云即合言大德我犯可呵法等但為詞句與四分不異不更具列故鈔指同云餘詞大同四分四分律本既不出文即知戒條中便是懺法也前人向見罪者懺主問也答言見者懺罪人答也慎勿更作者誡敕也頂戴持者立誓也如此往復之語四分戒文即無唯祇律中剩有此語令抄主取為異相行事可以依之此擇妙窮原旨自古未論思之不同從玄云僧祗律文自指四分又不知律復之文勢故云六至法者標如文云此至條別例者立意開章也云突至遠者不分二懺之法者謂律但有故誤兩犯無對首心念二懺法則鈔引諸論取二懺之法也輕者責心重者對首所犯既有輕重若唯一懺即懺法阻礙不通今引諸文二懺有殊理通顯矣比來諸師等者從古至今也相沿者永習不改謹依律文故誤二罪皆責心滅又引增五分文云小罪不從悔此文未了者若單引此文未為決了須論解之者謂須依明了多論所解也人言易毀者同皆責心是人言也既無典據不在依準是易毀也聖論難違者多了二論等文真是聖言量不可不準故難違也云今至儀者可知云初至二懺者謂由識知故藏實非誤也諸篇方便從夷至吉篇聚輕重雖殊方便吉羅既是發心欲作皆是故犯所攝獨頭中有故誤二犯亦如前論中對首責心二懺云問至元者問意云五篇方便吉前前合重後後合輕云何齊責心一説對人懺大德又云鈔文似難曉上言齊責心一説對人者此據欲對首時先責心了對人一説非謂責心懺竟更須對人述意多也更有不體文旨輒添不字便言云何齊責心一説不斷人悔非之甚也思之答中初意輕重生處雖別且吉羅名同造業起心即有差別既同名吉羅可一處治之如律中但云故作犯突吉羅於中不分輕重差降此是結罪無階降也論中徑云故作對人一説此則悔罪無階降也如初述者名報篇引了論重罪重責心輕者輕責心對人一説也又云下第二答意也謂吉羅通與六聚為因據體合有輕重今但言吉羅合輕重通優劣也心有濃淡者上篇下吉起心濃下篇中吉起心既濃淡不同結業亦重輕二別據此區分應須別悔即初篇下吉重責心對人悔下中輕吉輕責心對人悔下篇中義指可為允當也云次明懺悔者標也云先對故作分二者故作簡誤為也先懺方便後悔根本故分二也云前至之者如捨墮中者先悔從生覆藏等九品或六品四品三二一等後懺根本不得以同名等者斥古非也雖然吉羅名同根本從生且異不可抑令懺律文自分六聚不可抑之者謂律增文自分六聚皆是根本今此覆等既是從生無非聚攝不可抑止根本共從生相合懺也云次至也者不同僧祇等者簡外宗彼即從生吉與根本墮合悔所以廣誦今此不然故不許也云次明誤作吉標也云先至犯者如文云次至此者如文云譏至吉者文有二意初陳露詞句二此下斷簡是非發露詞句及料等云云云疑至悔者如文云大論至披者大論者智論也四分增五文波離問佛年少比丘在上座前懺悔具幾法佛言五法如抄云云又問長老在年少前悔具幾佛言有四除禮餘同上説此卷正宗戒體者謂此中卷四篇宗於戒體云云略敘四篇之事等五衆同須者戒已下文並合下三衆也舒軸等者乍觀文相似繁然説事尚未周備此亦是自謙之意理實無其欠少幸上下細披者誡勸恐新意情疏未能精練勸從篇聚至於此篇子細平披自關也然此段鈔合在中卷篇聚之首科出文勢隔遠恐人迷意且向此卷末科之終遠文旨也收科云云不更具列也從八萬減至十增還至八萬為一增減名一小劫如是二十個增減名半中劫成住壞空各二十都八十為一大劫大轆轤劫釋南山行事鈔記盡二衣一篇竟下卷共行通號如前也卷下者所詮共行是二之餘約詮行文居二行之末故稱卷下也注文兩解亦如前取捨列十二篇名目者約卷首共行所分也以表示此卷所明之事隨要何者尋撿行用衆別共行故云共行云二衣至十七者牒篇名也來意玄云上篇持犯彰專精之人以辨懺儀明犯已能悔既二行善成理宜靜緣修道但以有待之形假資方立資中之要勿過食衣故次明之問衣與食同是資緣何故先衣後食答醜形外露無時不須食是由資復有時節故先衣後食也釋名者制聽兩別故稱為二有障蔽之用曰衣制聽二名是總安陀會等及百一諸長是別篇字已下如常解之云夫至保言者形是有情異熟身也居者止住之處也世者器世間也纍者患也須衣須食湯藥房舍衆具等是患纍也故仲尼云吾豈孤孤者哉焉能繫而不食又老子云夫大患者莫若於身有使吾無身吾有何患又佛説小乘之人皆以此苦衣身為患所以修行求無餘依涅槃化大梵之同於虗空亦為於此也必假威儀者屈身府仰行住坐臥須得衣服方可生人善心故曰威儀也障蔽塵染等者醜惡寒苦名之為弊毗祭反既是醜惡假衣障之有本中作敝字玄云與上障義同也塵謂六塵今此一蘊偏屬色塵也染是情染局在於心如洗浴時露形生欲等故知須得衣服遮蔽故曰勿遇衣服也受用有方不生咎戾者受有方如三衣一百加法受持有於法則若諸長物説淨而畜等用有方如五條作園中時用七條入衆用大衣入宮用等咎者罪也戾是小罪如三衣百一既乃加法而無不受持之吉長衣已説淨而無犯長之提罪用時如三衣常隨身而無離衣提罪百一不離宿而無違教之吉受之與用既有方軌法則輕重之罪從何而生必領納乖或者三衣鉢百一物不受持諸長衣鉢不淨施即乖於教文法式有輕重之罪便自陷深𮘧者此乃自己所作不是他人而與故云自陷也如犯一吉九百千歲墮地獄犯一提罪二十一億三十千歲墮於惡道故名深𮘧云故至解者開章也云何至也者辨制聽名也通諸一化者一佛化境界有三千凡有出家人處即須依教受持若有故違背同制罪等隨報開許者謂中下機劣故開百一及長乃至被褥房舍莊嚴之具等玄記引戒疏通明六種根報恐違鈔意也逆順無過者謂逆聽教即據上行之人不畜之者以説順聽教即約中下根人貯畜依法受持説淨等一切不犯通道者謂假此衣修行通達佛道濟乏者施時不敢後須難得故今若受取得濟疲乏云既至例者如文云今解初制者牒舉也云前至法者如文云制至故者未曾有法者三衣名相由佛出世乃現自此已前曠劫所無故云未曾有也九十六種外道者多論云外道有六師有十五弟子師別有法與弟子不同各成異見六師六十五六三十并本六師即為九十六種外道此等諸外道無此三衣名也三時者西國無秋以制三衣遮形也亦為諸蟲者若不著三衣則不免蚊虻之所唼嚙亦為遮形故住於中道者俗則太奢外道太儉各執一邊佛制三衣離此二邊表於中道外道裸身無耻者謂西土有外道名離繫子亦名無慚以橫我無始時來不得解脫只為著衣蓋覆其形今但裸身或以灰塗身必得解脫今為異彼故也白衣多貪故重重著之為異外道刀截者西土又有一類外道披於全段白㲲以表全未離欲貪今異彼人故令割截意表斷惑則知是慙愧人衣相故四無量者慈悲喜捨慈謂慈善悲謂悲愍喜謂喜悅捨謂平等廣如前釋慈悲之服者鈔主準其所修之行而詔其衣則慈悲者之所服也懷抱於結使等者準拘睒彌犍度中因比丘鬪諍佛呵責已而説偈云雖有袈裟服懷抱於結使不能除怨害彼不應袈裟結使已除滅持戒自莊嚴調伏於怨仇渠牛反讎也彼則應袈裟三衣能障寒者如下文云初夜蓋下衣中夜蓋中衣後夜蓋上衣等是也不能有慙愧者三衣各用有儀五條道行時用等若但制一衣染淨同用不能令他生於慙愧善心故不中入聚落者若常著一衣垢穢不堪入王宮聚落今若制三即僧伽梨可著入王城聚落也不生善者若在道行反披高牒敬護如塔幽顯所敬也威儀不清淨者四儀受用各有所在若一衣常著則不能淨潔故今若制三便具上來五種之意也賢聖沙門標識者僧祇云有一外道父母在佛法中出家其有外道子寒時無衣其母遂脫多羅僧與之彼得衣已著入酒店招世譏責諸比丘尼以過白佛言沙門衣者賢聖標幟若更與外道著者犯提文中幟字合從心作昌志反認也今多從火作者非也有則請改鉢是出家人器者謂見執鉢乞食資身便知是佛弟子必非俗也故晉桓帝令僧依俗設拜盧山遠大師上表諫云袈裟無領非朝宗之服孟無足非廊廟之器等多為寒故制三種者五分云佛從毗舍離國行到庶鉢羅塔時冬大寒著一衣露宿初夜過已覺寒復著一衣中夜已過覺寒又著一夜不復寒苦便作此念未來諸比丘若不耐寒著此三衣足以之明旦集僧見述昨夜之意四分亦爾故云當宗外部多為寒故制三等云次釋名至體者以謂西國多是毛作故下文有黑白毛臥具等此土多是布絹為之注文中袈裟從色得名者謂本所著衣不名袈娑西國有草名袈裟草取此為染作壞色故是以從染處立此衣名也故羯磨疏云然袈裟者本番染色實非衣名律云應作袈裟色即壞色也何干名體下文染作袈裟色者鈔下文明色中引四分衣法云上色染衣當壞作袈裟色指此文也味有袈裟味者六味之中有袈娑味即淡味可是衣耶此土所翻通臥具者謂通翻三衣為臥具也羯磨疏云十誦翻為敷具謂衣相狀似㲲褥等四分翻為臥具者彼衣有多重數或三四等猶如此土被相不別故戒疏云三衣翻為臥具略得其相而失其旨即三十中臥具等者蠶綿黑白減六年等皆是三衣並翻為臥具皆為此土先無其衣不可對譯但取相重三肘五肘同此臥具相翻之也義翻多種者大集經曰離染服賢愚經名出世服四分律名三法服或名痟瘦服由損煩惱故又法華云者如來衣等上來所引不少非多何耶大衣等者據別相説或約義或就數等如鈔列之若就條數等者四分衣法云諸比丘不知當作幾條佛言應作五條不應作六應作七不應作八應作九不應作十乃至十九條不應二十條等鈔從多至少也律中無五七九名等者簡濫也律文但云從今已去聽諸比丘作割截安陀會多羅僧僧伽梨且不言五條是安多會乃至九條是僧伽梨等今時呼七條為多羅九條為僧伽梨但是人之詺字也若就通相者對前條數得通相名如漫通三衣云通相也隨力所辨者衣段多則作多條數少則作少條數若更不足當揲葉又無應漫作等隨用分三者既云漫衣更無異相但隨上中下衣之用而分三也非無大分宗體者漫衣雖隨用分三然據衣大家分位宗體量之廣狹各別謂漫僧伽梨亦須宗其條葉僧伽梨之量廣狹又不得但言漫衣應云漫僧伽梨餘二準此云三至等者功謂功能用謂勝用大悲經等者彼第三云佛告阿難於當來世法欲滅時當有比丘及比丘尼於我法中出家平牽現臂而共遊行從酒家至酒家或作非梵行波羅彼雖以酒因緣於此賢劫皆當涅槃此賢劫中有千佛出世我為第四次即彌勒當補我處乃至最後搆至如來如是次第汝應當知已上經文鈔引由略也文中云性是沙門者持戒人也污沙門行者犯戒人也形是沙門者全無戒體即如十三難白衣之例上言樓至者此云啼泣諸家多分説云是寺門前金剛神者誤也寶曰大寶積經文咸有緣起今且準正法念經所説昔有國王名為𡱝勇王有二夫人第一夫人生千子皆修行俱合得成佛其王城欲千子成道前後遂將千著置金瓶中舉著紫金樓上令千子抽之俱留孫得第一釋迦得第四乃至樓至得第一千彼作念云一切有情皆被諸兄度盡我有何人得度遂乃啼泣父王告之衆生界無盡不用悲泣又此樓至亦云胡盧支此云愛子謂王之小子甚愛惜故其第二夫人有二子一名正念二名法意聞千兄次第成佛遂乃發願言我不成佛一願為梵王請千兄轉法輪一願為密迹金剛護千兄教法已上所列並是經文準此金剛神是第二夫人次子法意太子且非樓至如來化身也知之悲華經等按彼云釋迦因中曾為梵志名為寶海於寶藏佛法中敬信三寶四事供隨發菩提心彼佛授記過恆沙阿僧祇劫入第二恆河沙劫後分賢劫之中當得成佛爾時梵志聞佛記莂遂發誓願袈裟五功德如抄列也時彼佛申金色臂磨梵志頂讚言善哉大丈夫如汝所言呼為大悲菩薩文中第四段衆生違返尋生悲心者如財盜僧物僧雖捉得其賊僧法必死之事不應告人豈非念袈裟力生悲心耶第五段經云四寸著身戰諍俱息是慈力問若在兵陳持少分便得勝忽兩邊俱有其事云何答若二俱持兵士和同彼此不相侵也云二至不同者如文云一至等者可知云二至故者辨財體也綾羅錦綺縱然後厚孰為有文像故不許用羯磨疏云錦色綺耀動心神約細薄生疏不得綃音葉説文云絹生絹也免金翅鳥難者僧祗云過去世時大海邊有睒婆梨樹上有金翅鳥此鳥身大兩翅相去五十由旬以龍為食欲食龍時先以翅鼓海水令開龍身則現即取食之諸龍常懼故求袈裟著宮門上鳥見袈裟心生恭敬便不敢食其龍及鳥各有四生如常所述云云云三色如者標也云四分至也者衣法中緣起因六群上色者五方正色也注染有正翻者下文云秦言染等是也若作五納等者舍利弗得上色碎段衣財欲作五納衣白佛佛聽云亦得廣長之物裁作亦許之棧者青赤謂木蘭色也紺者合也青赤相含亦是木蘭之異名也除三衣者謂上色等若作三衣要必染壞若但將三色點不得作三衣故除也皂木蘭一切得受者是如法色所以得受不純大色者謂非全是五大色但染色不成就故云不純也亦得點作餘衣與上淺青意亦不別袈裟秦言染者前文云染有正翻是指此段也謂所著三衣不名袈裟但將此草染為壞色故知從染色以立名耳如結愛等者舉例也謂真淨之心妄被色等五塵所染愛結使生此二名染況青等正色不色覆之即無正色非染何也即顯正翻是其染義真紫下明非法色不許用從聽用下明如法色許用注文和會木蘭色四分在秦地翻彼有木蘭皮似乾施皮以酢漿浸之搗取汁染成赤黑色祇律在宗朝吳中翻彼無此皮故假作此色今師以親見為憑如善見説者袈裟赤色鮮明即此木蘭染色也遺教法律經等者行古引經許著五大色之失亦名遺教法律三昧經文此經明五部各著一色僧祇著黃五分著青四分著皂迦葉遺著木蘭十誦著絳色此是偽注不入正録古師引用今師判作無知羯磨疏引真諦云中國僧雖五部亦色皆同一也故此非之善見下引證赤色也寶曰瓦鉢貫在肩青色謂孔咽青翠色也下句云袈裟赤色鮮明此因便相從行文無意只為證袈裟赤色也玄記以青色字屬下句者失文意思之云四量至肘者下衣極成迮小者長七尺六寸故是準也十祇各立三品量者十誦云佛聽比丘立三種衣謂上中下也上衣長五肘下衣長四肘廣二肘半此二中間名中衣也或依僧祇一衣之中有三品量僧伽梨上者長五肘廣三肘中者長五肘一不舒手廣三肘一不舒手下者長四肘半廣三肘一不舒手多羅僧三品大國安陀會上者長五肘半廣二肘中者長三肘一不舒手廣二肘一不舒手下者長四肘廣二肘不舒手上二律文依量成受過量不成受急於四分大小持戒通文故鉢不取也今準多論通其三衣各有品數長廣並如文中若過若減皆成受持以可截續故與四分度身而衣緩義同故取之注文説時在受後者謂三衣量外不可截除量外是長必須説淨要先加法受竟後即説淨若先説後受持夫淨法也五分肘量等者文中既云隨身量必不依肘明知不取量外説淨文羯磨疏中意亦同此故彼云義同五分隨身最好今準多論若過之文與四分度身五分隨身緩義相當也云五條至之者辨條數多少也如疏鈔者是首疏是義鈔今且依羯磨疏云所以但使者以沙門行慈仁育為本同世陽作故非偶也如易中隻主陽偶主陰陽乃生陰乃煞今服此衣表發生萬善故數準隻也無正教制開者謂今雖經三十三條大衣未曾見聖教制之開比丘受持著用聖迹記等者彼云菩薩夜半逾城出家行十二由旬到跋伽婆仙人所處林淨以刀剃髮持上妙衣貿粗布僧伽梨於尼連河側六年苦行等引此文意佛既但著十三條衣又布粗示少欲法以此為準今時隨力辨之何須二十五條況更無三十三條等云六至者者辨堤數也水之塘曰堤四分文不了者但通云十隔等今鈔所引但定五七肘量長短大衣準同亦不云提數是不了今須依他部明之如文問何故但增長而不加廣者答業疏云所以示長短者由世道稻畦陀水處高下致別沙門服衣現長短者亦以法服敬田為利所有聖增而凡滅喻長多而短少也不為怨賊所剝者即免遭劫剝也或有仰利字釋既有多種之賤不任賊用故非彼利也云七至定義者辨重數也若以新衣重絳作時吉過限墮者謂制令一重新二重故今三重純新由正作時違法得吉又濫充三衣數不説淨過十日犯提中間侮摘却吉者雖然摘却猶有方便吉也隨意多少者謂糞掃不限重數故不名離衣者雖復留一兩重其衣體隨身故無離宿過羯磨疏云大衣必須重復今多單作是非法服得作受持服用得罪作受持得成單衣受戒得戒但得不應也若死前令本界內者前師判云既摘衣裏留安界內合屬界內輕物分之後師斷云合賞看病人以本是一衣故律師云後是定義也律師即論主也以本是一受持衣者病人既得具合攝得異界物故下文云云衣餘處𦃦來此賞若此德不具即隨彼分之云八作衣方法者標也云四分至等者五條得攝葉者律中恐葉邊速破塵垢入中故開不割截而令攝作上二衣亦遠破不開但令編邊作鳥足縫等僧祗等者是初緣也佛制一日作成走針略綴且受持不爾恐犯長罪故中含等者引事證上文也四分等者是第二開緣也尼有伴故提僧無伴故吉薩婆多等者是最後開緣也指作多日故不犯長此全未有衣相不同前後受後方説等上二並初緣恐犯長有過之物不合作三衣為初未制十日故制其速成後一開緣指作無長故不論作衣日多少也五分等者彼律明縫葉非四分標也注文意亦云縫著謂五分中有帖葉作四分下者褶葉於他部不應以四分是後開五分是前制又其葉並塞上開下令一條中有二隔一半上開一半下開自是非法也阿難奉教作衣等者謂四分有文文非巧勝故四分云阿難教諸比丘此是長條此是短條此一縫此第二縫此是中條兩向文只如此也今取他部之又彼云佛以千二百五十人遊行南方從山下見火田塍畔念言諸比丘應像此作衣問阿難汝見此火田不答見又報阿難諸比丘宜如是作衣汝作能不答能作便教諸比丘或一長一短或兩長一短或三長一短左條左靡右條右靡中條兩向靡作竟將來見佛佛言汝有大智慧聞我略説作便如法此名割截不共衣之與外道異怨家盜賊所不復取羯磨疏問曰如來初問善來陳如等五人衣三已備又阿難羯磨五人戒已有袈裟何故今始教阿難為諸比丘倣以世田而作衣耶答以其善來言教處變成衣難倣效故今倣世田可為軌則所以稱為福田之衣也田用成水長嘉苗養形今法衣之田弘四利之水增三善心之苗養法身之慧命也已上疏文若得不足等者明衣財少開作下衣之緣準五分衣法中比丘得一衣作安陀會太長作上二衣又少佛言若不足應三長一短須不足應兩長一短作又不足聽怗葉作乃至不足聽作縵安陀會此復是一緣時比丘復得一衣佛言聽作割截僧伽梨衣少不足聽作憂多羅僧復不足聽作縵安陀會鈔主意云律中本是大衣少故開作下衣也下例成之者謂上是大衣少故開作縵安陀曾今還作大衣受如下二衣作若不足例上大衣成也餘如文中云僧祇至俗者狹如麥者此約麥葉如蒲葉大不得橫葉相當縫衣葉者謂諸比丘對頭縫衣佛言不得橫葉相當即對頭異名也即頭長短相同不得頭頭相對故後衣宣脫應作馬齒縫者恐葉邊雪即攝葉邊向內以線却判於外邊或橫判或竪判如馬齒闊大故云馬齒縫也急時如前分別者謂多人助成粗行隱竟受後更判等準律中恐葉起押葉丁字有三又是鳥足縫今時但直判半寸已下者是先作淨者即點淨也安紉者以先無須安之若不安紉受不成也此肉縵衣之相隨量大小正從如前前去緣四指施者䩙胡犬反耳也準是而前故鈎相貌似鼎耳也紉即背上長條條頭作結故云紉也或云以條結其鈎䩙令續不斷故之紉也羯磨疏云逼緣邊四指內安鈎反向後八指取約以覆左肩故有遠近也又四指八指據從緣內邊量也又防外道者初緣比丘不却剎被外道抽線衣散故制却判應摘與僧者謂此物既縫著則非袈裟所攝若衣主死此補衣物合摘與僧同輕物故衣體與著病人故文中兩與也三衣揲四角者羯磨疏云相助為力又云應安鈎紉者謂鈎紉下安揲助力恐牽鈎紉衣易破故障垢膩處者謂數洗本衣恐速壞故但摘補者足死淨潔故十誦糞掃衣等者彼律云有一比丘有糞掃衣聞佛結戒不許著不制截衣入聚落思惟我有糞掃衣破裂當補怗安鈎蘭施緣即持針線近祇桓門邊補帖安緣用當割截佛經行見問作何事彼具述之佛言善作糞掃衣補帖應當割截衣也作鈎蘭者詺揲緣條葉由屈鈎轉名鈎蘭也上安揲成受持者辨衣相也若成五條受持若七條乃至九若過衣相成就依其怗教正從二品受持也十誦明文等者鈔又別更牒舉準貧得著易知云三至也者如文云初至疏四中者四分但云三衣應受等者既有捨受明知有法有衣不持犯吉故昔有人等古師雖解引又類例不等注文僧祗一夜通會者謂於一夜隨何時會即得不要明相四分緩急不等也今依十誦以受持相類者謂持護明相與四分相當持既相當取文受衣乃成類也大衣正有十八品者從九條至二十五條謂割有九揲葉亦九二九是十八也從有六品者取七條正有二品謂割截揲葉五條正有三謂割截揲葉攝葉并縵衣一故有六也正從合明二十四也七條正有二品如上從有二十二取大衣十八五條三并縵衣一合而言之亦成二十四也五條正有三如上從有二十一謂大衣十八七條二并縵衣合而言之亦成二十四三個二十四即七十二種縵通三處者謂前明縵衣云不無大分宗體理合通正從三處次作衣法中亦然今言合為一者且據十誦明文有縵僧伽梨受持法今引用十誦且合為一也如疏鈔鈔中者首疏義鈔也今準羯磨疏問云三衣受法名體不同得互加不答準五分中若得衣財先作割截乃至不足作安陀會割之又不足揲葉作等餘不繁述云今至也者異古人也古師皆先受大衣次七條後五條今師約從微至著并取著之方法故先受五條最後大衣也云加至衣者若褶葉者持皆從一長一短下云屈褶衣持等餘同十誦者玄云謂五條中據其當宗但有上來三種若依十誦更有縵衣四分但云若得縵衣廣長若割截作便少令揲葉作即已不云聞作縵安陀會若準五分即有開文彼無持處故不取今指十誦為縵大衣具有明文受持故曰餘同十誦更有非解不録云若至之者謂要須先牒安陀會為本後取從二十五條來替此舉割截九品中最上衣為法引此文意是十誦第二十一卷受戒法文也揲葉準圓者若有揲葉九品中最上者亦云四長一短揲葉衣持乃至七條準改之者亦云乃至兩長一短割戳衣持等云若至改者文有二意初牒上諸從總顯通三二今據大衣下約縵大衣示其受法謂上從中據安陀會為言若為餘作從並準改之若多羅以大衣等為從應改云此多羅僧二十五條衣受四長一短割截衣持若大衣以餘衣為從者應此僧伽梨五條衣受干長短割截衣持縵改名為別者謂縵無別相但改各即得安陀會者應云是縵安陀會乃至是縵多羅僧等下引十誦出法據大衣如文云若中主法者文顯正品割截受法注明揲葉及從準前可解云若上至明者謂上衣割截總有九品不可定指故云若干條受若干長短等揲葉亦然下之二衣少故其相易明故依條堤別顯故羯磨疏云前之兩衣條數揩定更無延促也云上至哉者正辨説多少也兼欲顯縵衣通正品意耳既許將來受戒豈是從衣謂在受前受之即知是衣得受戒用也然彼律受戒法中云應教云汝效我語我某等如謂在受前故無比丘之稱也未割截者即是縵衣若衣古師云未割截是一端白氎全匹段者豈得將此受作三衣而來受戒耶正言如上不成者謂明色中引諸律論並非法不成受也云次至毗尼者四分無文何以不取諸部獨取僧祇者謂捨義同故取也羯磨疏云四分有疑應捨僧祗夜往會衣不能得遂佛令遙捨以輕易重如捨戒法一説成捨受體根本尚乃一説便成衣是隨行何勞三説則顯祗四疑捨會不得二種急義相當一説之意又同所以取也云若尼至等者玄云十誦厥修羅亦是四分祇文梵音異耳覆肩衣者正是橫披尼不得露肩佛制令著僧中準局阿難佛制令著以端正意生他染也今一切僧多著雖無教可準義亦不妨注文不言肘量應成者今尼作上二衣既不依本量則不牒肘數但言如法作應成也故羯磨疏云大姊一心念我比丘尼某甲此僧祇文如法作我受持三説覆肩衣受法準改之僧祇下料簡餘二不同之相餘衣結罪蓋是因便故第二心念云二至準者此依五分故令三説準業疏但界無人開自心念已成後設有人不勞更作不同説淨復若值人仍須重説四科簡中牒名可知釋文有三一云初至長者大科初至不説者不成者明受捨成不相如文自顯次諸受持下乃至抄疏已來明受法不失相廣邊即上下竪也量既少故八指即失受長邊謂橫兩頭也量既多是以一揲手外方可失受具有四礙下並指如離衣戒及義鈔首疏等文云云薩婆多下辨不持無離衣宿罪以闕緣故不同見論未受亦有離衣之罪也若本説淨下明將説淨物作三衣受持淨法即失後若別受餘衣替此衣此衣更須説淨也二補治浣染云二至呵者段段得二罪者犯長提并不點諍吉謂不與衣體相合故通二種淨法者注羯磨疏云衣和合淨色和合淨故母論云若衣納未説淨點淨縫衣著已淨者名衣和合淨若色非法縫著如法者是名色和合淨不須更自別淨鈔中引文與此不異謂和前已淨之色令其後衣與色連合成淨善具下明補相可知復線却判者文過也編邊步彌反桄張呪音律令卑補者律不定孔之大小失受等可同見論如上分齊也兩用無損者緣雖不斷若中間破如善見明失若中聞未穿而緣斷即準多論失也赫色云逆治者玄云赤色土也大德云蒿本作諸字道理即後人錯書堵土局也非呵者護非人之心亦為舉幽而況顯也三受用擎舉標名可知科中云十至不犯者初引十誦及治禪病經明敬用天衣之法文相自明大德云蒿本是奔車象馬後人錯晝逸字也二從十誦下明隨益隨身法非時不行者知不能生善破戒見等即制不行羽翮相隨者大德引尚書云腹下細毛名毳翅閲頭最長毛是羽入肉之管為之翮今取此二不暫相離之義也但護離宿者明白日不隨身即乖羽翮喻矣從明言善不辨有緣開留一衣法著一等者受功德時五條偏袒於內是著更以七條安上是披一許留大衣也餘如文云僧祇至之者約脫著明也園中衣者即五條也梵云僧伽藍摩此云衆園秦人好略直言伽藍今單言園者如祗桓本是祗陀太子之園須達布金買苑作寺譯者取新意也注文此謂僧伽梨者準南記云既言僧伽梨是園中衣即非僧伽藍園合是王宮園菀沙門入彼著大衣也此解違文太甚或有解云僧伽梨是王園衣恐其筆誤合是安陀會衣此殊未見其理大德云斯注文者為簡異故前云入聚落衣恐人疑云莫是七條名入聚落衣否今云此謂僧伽梨是入王宮聚落之時披著非謂常逾白衣聚落七條也理合在聚落衣下注之今在園中衣下明之致難見意思之內衣著即涅槃僧及五分中舍勒最在內著齊兩角者上下兩角須齊也如羊耳者要須屈頭手中執之不得令出如羊耳相西牒枕之者如下引中含世尊有時四牒憂多羅僧以敷床上序字非也擘僧伽梨作枕右脅而臥足足相纍又智論云佛四牒多羅僧敷下以僧伽梨枕頭等諸家見此文意皆云敷七條安背下臥如構耨之類故云臥七條中非也大德云但是蓋臥舉例如今時云臥被中豈可將被安背下耶經文語到據理合言七條中臥也餘如文云舍利弗至成佛者約恭敬以辨也舍利弗問佛於何時中令其偏袒等佛言隨供養時應須偏袒以便作事故作福田時應覆兩肩現福田相故云修供養如見佛時問訊師僧時等作福田時者謂王請食坐禪誦經巡行樹下又見生善有可觀也入鐵甲地獄者我慢輕佛故獲大佛言三千下明為難開不著決正下明敬衣開亂別人無過三千下亦著衣向背法奮番反音揚也挑已同反謂不挑前角於肩上即垂肘前如象鼻也小衣是五條不曾襯身著者許暫披入衆不著受食犯墮者據律但得非威儀得成受食論約非法不成還同未受食故結提也次引十誦即成但云得罪不定言隨又但云袈裟不云三衣也令有德人暫著者即令衣主獲福故玄云鈔至凡得新衣皆先安佛前燒香供養次與有德披後方自著也婆四吒女者雜含云此女有七子六子相續命終念子發狂發狂裸形被髮而走至菴婆園遙見佛遂得本心慚愧蹲坐佛令阿難取多羅僧與著已為説法生信後第七子又命終都不啼泣化夫及身投佛出家得成羅漢師子敬袈裟人者賢愚第二十三云昔此洲有王名提毗有辟支佛在山坐禪野獸咸來親附有一師子名堅誓身毛金色時獵師欲取之乃剃髮披袈裟內佩弓箭師子遂來相近因睡以箭中之師子尋覺欲害此人見著袈裟念言此人不久得解脫便説偈言耶羅羅婆奢沙婆訶説已而終獵師剝皮奉王王念言我昔曾見書中説畜生身金色者必是菩薩問云死時有何瑞應獵師具述上來所説八字王召仙人解之仙云耶羅羅者言剃頭著染衣當於生死疾得解脫婆奢沙者剃髮染衣人皆是賢聖之相近得涅槃婆訶者云剃頭著袈裟者當為一切人所敬仰王令作七寶高車張師子皮表示一切散華供養後與金箜盛皮起塔供養佛言師子豈異人乎我身是也王者彌勒仙人舍利弗獵師調婆達多我於過去敬著袈裟之人今得成佛也二作法攝衣界分二初牒名指略二至疏吉揲衣界者首疏云加法結後去之雖遠之猶屬人故云攝衣或名不失衣戒界人無離衣之罪故此但明加羯磨者謂中卷離衣戒云若論作法下卷明之正指此段若自然護衣此不明也大義如鈔別疏者玄云抄是義鈔疏即羯磨疏或可有疏彼有五種戈門明於得失恐繁不述云今至也者簡其結處也三種者一界大無藍二界與藍等三界小於藍約儀通合為界大藍小處須結文同無藍故不別列也院外勢內者謂僧住房之外十三步勢分明內得護衣出此勢分雖是界內不得護衣所以爾者謂界是稱人不攝衣故是以失也此處須結之界大藍小處亦爾餘二不須者謂藍大及藍界等若衣藍護猶有勢分若結衣界只得依藍已外無勢分却成失衣故相疏云有法無無法故有又首疏云開不重開故不須結也云諸家至之者立法不同者凡結衣界依僧界起今僧界上或有男女居止曰村未審結衣界時如何取捨因此有兩師立義解判有異初師云若現為村現除懸不結即顯為村處地上永無法起所以爾者謂以唱出故已後村去欲此置衣即解已重結若結時僧界上無村便須改律文謂羯磨云除村今既界內無村有何除也即是無事有法結亦不成東塔疏依此師第二師半依古半依今若現為村現除懸不結與初師同若現無村現結懸除亦不要改律文詞句抄云有立無村結法者正當此義也今解下今師不論有村準律依論俱結以結除其妨難者顯除意也故業疏云既依界結遍標內地同有攝衣不由村來衣界便解不由村在衣界不遍已上疏文但是男女所居多生染謗故權不許置衣非謂永無衣界現除懸結者以現有村恐成障礙不許置衣是現除村去後許護是懸結也現結懸除者謂現無村住皆許置衣是現結後若村來於村處不得安衣是懸除也若村去後依前許護直由下正成立今除村義蓋以男女在界同居是四礙之數取衣恐成障礙故不許置非謂不無衣界以衣界依持僧界起故如錑金師以藥引金之喻顯也今男女住處既是僧界亦有衣界古人若云實有村在界者須於四相中隨有一相儻於露地權居復有何相即知本無村體暫言除也故業疏問云本既無村而言除者豈非無病有藥答此攝衣界在同住地所言除者除衣障礙不除村體若無男女任意著衣豈在院宇本無不結等五分下指五分成上現結懸結義故業疏云若本無村結不失界竟村後入者不須更結先已結故此現結若本有村結衣界已村移出界即此空處有攝衣界此懸結薩婆多下成上現除懸結義文但列四等取第五為除淫四分下本結衣界界內有村安衣在村往彼取衣女人衣解形露招譏佛因制除村界外也加法中云加至持者村外界者業疏云除村是村體村外即勢分謂勢分內亦不得置衣結解二法並如文可委二坐具法西土本音尼師壇此云坐具為護僧家臥具并己三衣故制云四分至坐者先定尺量也注中禁禁列反𨆃半字也尚䟝桁音同準唐尺下寶云且姬周一尺二寸為唐一尺更將周七寸二分為唐六寸又將周七分二釐為唐六分更有周八釐在總計唐家一尺六寸六分更有周八釐即唐家七分弱合是弱字鈔多作強字者抄寫錯耳亦不合作強解十誦下明重數趣爾者卛爾也自無心欣念曰猒似他遍作曰課欽婆羅者毛作也屈頭量者饒尺也縮量者煞時量尉了剩有也次灑量者乾已長大此皆犯故鼻奈耶下新物作以故物揲即同四分揲相也不揲即已者止也以自無故物又無求處不揲無犯注文二重為本等者為作本制新物二重若毛衣作者本合一重今既潤大恐牒作二重亦不違本制故注云恐過故牒本應受單者不分觸淨故非佛制者以佛不制捨入僧不同離三衣宿也今但犯吉僧祇下明答縷有對頭却到者先作本量後以增者安緣外帖廣長兩邊使兩邊應平判之互滅過者彼戒中有長應量廣過廣應量長過邊應量中過中應量邊過皆犯鈔取其意也緣外增者諸律皆云更增即知向緣外添也準益縷下今準益縷邊不截但通量取長五廣四作一緣不犯者即同七百中過量坐具不截而畜亦不合犯謂更增一尺者是新益之縷但通向心中不衣本制量外重增名不截也準此不犯者則跋闍過量不截亦不合犯及質也跋闍者結集後跋闍問佛聽作十事數圖有廣文一兩指抄食二村間不作餘食法三寺中得別衆作法四得聽可五得常住六得和合七與鹽共宿八飲闍樓羅酒九畜不截坐具十畜錢寶當時已集閻浮七百僧斷不許依行今若準行即跋闍之類也十誦作不益縷淨者但依本量小作即是淨不接頭墮者謂不截量重增但通量作名不接頭也注文意謂今若通量取增數入本量中通長五廣四而作或通長而不通廣或道廣而不通長或長廣皆通者並地故云並結提罪一邊頭裨者將半𢷡於緣外各一頭添也上準律正文而敘後得冥告按感通傳云顯慶舉中仲春月在本院行道有王瓊張歟等彼云某本是南天王韋將軍使者親𫎇付屬擁護三天下佛法今故來此與師言論師所制行事抄文坐具增加長廣其意如何師答云教不徒設於本制外廣長各增半搩據文是一廣一長非謂四周長廣彼云原佛本制坐具之意用表塔基之相僧服袈裟在上以喻法身之塔塔基既不偏邪坐具寧容長短縱使四周安緣不違半搩之文但以番譯語略但云半搩今即十字而論便是四周之義已上傳文準此合將半搩四面增添各得五寸即似兩重緣也云薩至法者初引多論明益縷際者非是今時坐具謂別作一敷具置尼師壇衣護僧臥具長四廣三後於長邊更添一搩即長六廣三也四分明坐具法異者斥破上之所引不同但用增法者但依前四分各半搩增法也僧祇下辨受用法先簡用處差見下明受捨法離宿但吉如文僧祇下明行坐用之軌儀長牒者上下竪牒也中疊者屈攝半疊也當中掩之者謂堂中褶今觸處在內淨面分賢愚經明安著處玄云彼第十云舍衛國波斯匿王大臣須達為兒娉婦至王城因見佛聞法證果欲請佛歸舍衛佛令舍利弗指受住處遂以金買祇陀太子園作寺六師嫉忌詣王請與舍利弗試法舍利以坐具於肩上入衆升坐六師弟子名勞度叉化蓮華池山龍牛夜叉鬼等佛弟子化猛風象金翅師子毗沙門等對之彼既不如遂啼心降伏出家故也今在左臂非法者此乃初意據教明之次準感通傳得天人指示云此非師之過蓋後開之教不到此方今但改前迷宜促後悟無佛初度五人受及迦葉兄弟並制袈裟在於臂上西土王臣皆被金疊於肩上故佛衣臂上為異俗流頞比丘威儀度物其時坐具由在左臂後徒侶漸多年少比丘威容端美入城乞食多為女愛因制衣角在左肩後為風飄佛令以重物鎮之比丘不達佛意廣造鎮肩之物莊飾不少為俗譏慊佛呵云我令以重物鎮者是尼師壇何得別造非法因茲坐具為鎮三衣在左臂上爾時如來升天為梵王説法後有外道號達摩多自稱一切智伺諸比丘入城乞食外道求論比丘與論外道不如波旬問云汝所被衣名字何等沙門云忍辱之服又問有行功能答云上制天魔下降外道又問肩上弓布名為何等答是尼師壇又問有何用處沙門云擬坐而用外人曰忍服稱可貴有大威靈尼布是坐下之衣豈可却居其上若是汝師教汝師未足尊高若是汝自為之汝師何不指教汝後時如來從天却下比丘白佛因制移在左臂衣下後因風吹衣離身制安鈎紉於上也準斯所説今在左臂正合軌儀若據律經由存初意也三水袋法牒如文云勿至也者制意也厥者其也慈悲之心其在於此背者似也即不持戒人多於下明漉法如前説者即上多論作餘井等是也形如勾者字合從金作玄云莫作鈎字應言如物有柄可執今截作者是此形也宏槨者外作井等字形木槨也漉瓶即陰陽瓶也以絹縵底而漉水安沙囊中如淋灰法等云云云此至中者誡勸也謂此是性戒尚不能持其餘邪命威儀即可知也第二聽門牒名等一二科如文云初至異者初引本宗通明百一諸長受淨不同百一者百是舉其極數大蓋出法為言一是於此百中每事畜一故非謂百一之人通開畜長諸淨若不畜百一人對三衣坐具外便是長物則無百一之稱也似寶者玄云如水精琥珀等為數珠入百一數不須説淨餘者即似寶重皆名餘也器謂瓶鋺等非器即銅鐵片等皆施俗人僧祇下明開百一意如文五分下明百一物體單覆衣者緣中為臥僧臥具垢污因制為護僧臥具故聽畜敦僧臥具上指如注文中辨若似衣者餘一切衣也波利迦羅即百一通名此云助身衣也其色者玄云諸衣之色目非謂青黃等顏色注當法為言者當衆目對作法雜衣隨多少者此云補衣帛也不受無過者衣鉢必須受持餘百一等若不受亦不結罪如前文云作與不作一切無罪也沙彌上下二衣者如沙彌篇云一多羅一安陀會除錢穀米者須捨與俗對俗説作意不説即犯不同長衣得當衆開十日故除也二長衣中開科可知先明長相云初至也者約本開辨也一日成者準彼文云大衣五日成七條四日五條二日長衣一日以易作故謂三衣財體終無犯長義已外方名長財僧祇支法并注是番名四分下辨相其相如覆膊後光師裁作上狹下廣衣也十誦下制著入聚意如文僧祇祇支下明肘量注文猶為覆肩之量者準肘量作似覆肩衣相有師改法等者説後魏有僧祇師出疏明造衣法只衣四分上狹下廣而作但云如法作不牒肘量大小也涅槃僧下初引僧祇等明著法西土縵條將以繞腰腰繩繞上而來佛教比丘不令大高齊膝太下齊踝垂前兩角如魚尾偏一角如象鼻或隴起如多羅葉等三千中一不持下著上者即倒著也得繫腳者摘復破繫兩膝邊反褶者不以帶束但反褶上轉而已當二三四條者四分六群作廣長腰帶佛言不應作廣三指繞腰三周若得成已者應二條等若亂聽縫合等如文輔篇記中不許作條字應作牒謂得已成者壞乃二三四牒云為一若三四牒亂以縫合之今律文錯書條字也後歧間過等者免身形露故抅修羅無正番故引五分明其衣相即貫頭衣也云今明至也者隨方辨相也偏袒者即今偏衫右邊也準竺道祖録云魏宮人見僧自恣時裸膞不生善乃作施僧縫在左邊祇支連合成故從相號曰褊衫大德許新作者統領得舉坐具例云云𧝡膞者亦似褊衫但於左邊背上添葉如覆膊一幅短來𧝡向右膊上大德云北地戍叉多著此衣意簡大尼及沙彌尼也後人移安褊衫左袖上呼為播衣也即祇支中流出褊衫褊衫中流出𧝡膞𧝡膞中流出播子然其曳幡蓋出家偽亦無所表西土論師但執赤幡故也方裙者梁朝郡后施僧即宮人上馬所著大裙折腰開似於方相諸裙者更為隨時所作者臂衣即臂袖衣也衣即納靿袴等皆是此方隨時而作西土本無次十誦下明制不合著相褊衫袖衣者即小袖也復衣即綿絮衣也貫頭衣是女人裙兩袖衣俗人𢮿膊是褶者諸説各殊並未識相今準衣服名義録云此上古之裳也周武王時以布為之名褶敬王時以纏為之但不縫口蓋庶人著也羅章帝時以綾為之加下緣謂之口改名為袴於端午日賜與百寮水煞綾袴意表清正理民等云云今時即無或恐有者亦不合故行騰即引經玄云以經其踝上騰擲而行身輕故也被避我所制者制即三衣一體今避而不依及畜諸長多物名作餘事中含下明接中下之機資身修道即增長善法許畜反此不得如文四分下明僧及別人所畜用物王送貴價衣準前即法衣也不得在上引者菩提王子請佛及僧敦陳貴衣在地請佛蹈上佛令阿難却之為未來比丘故禪帶者謂坐禪久倦將以束身助力腰帶即上三四條縫合者是不還則已者五分有俗人被賊剝來比丘處借衣白佛佛言檢借若還應不還則已已止也四分下約皮物辨邊方五事者迦旃延在阿盤提國為億耳受戒三年方得僧是因請五事如文中云云白木條等律云東方有國名曰白木條白木條外邊便聽南方有塔名靜善靜善外便聽西方有山名師利佛佛人種外便聽北方有國名柱柱便聽貢職圖者圖寫高職任人及附諸國來貢物數圖云西方白木條國貢朱駿白馬一匹玉象一軀等即驗知此處在彼之東屬邊方也餘文可委云律至畜者更約皮革以明六群畜犬皮師子虎豹獺野豬野貓狐等皮佛言不應畜文中獺者他輅反形如小犬居水食魚律或作狚丁曷似𤣀未首今多作狙七餘反説文云小後也不得乞生皮者六群見好班駮犢子從乞剝牛人信敬乃剝與之牛母遂到祇桓吼叫因制也若作帳軒不得者準衣法但言不得不論皮與衣也禪帶五相一廣一尺二長八尺三頭有鈎四當三四重五不得用金鈎旋後轉向前勾兩膝來全不動故名善助也護衣者若約障塵染義𧙕亦是衣若以著𧙕踐地後坐時便觸身上衣故聽畜草履并法也護臥具者無污法衣故開著也褊袒有廢者西土以脫履褊袒為敬儀皮革中因此道行脫草履取水與師或時失或為毒蟲嚙白佛佛言不用脫及褊袒故云有廢即隨便遇物與師不要脫草褊袒也四種寶履者金銀琉璃及寶莊者餘文可解二作淨法中初牒名別敘可知釋中有六云初至耳者明制意也方便施者大慈設教作斯淨法恆作屬他之心自無貯畜之過又得衣物資身福利施主免世譏嫌故非真也如昔一時等者玄引分別功德論云天須菩提本是王種五百生中常生天上今從天下生在王家果報物妙後投佛出家聞説四依心不堪忍便欲還家阿難留住一宿即往王家借種種寶物莊嚴備具於中止宿須得道果佛告阿難夫衣亦可親亦不可親善著好衣益道即可親若損道心即不可親或從好衣得道或從五納得道故知悟解在心不拘形服地持亦有施法者彼云菩薩先於一切所畜資具為作淨故以清淨四捨與十方諸佛菩薩如比丘將現衣物捨與和尚闍梨亦為作淨故涅槃亦爾者經云雖聽受畜以不淨物要須淨施篤信檀越等二簡施主牒名可知前明上三施主者謂衣藥鉢請道衆為施主寶珠等請俗為施主鈔據此門分科云前至淨者簡前三主也隨得一人者謂展轉五即通淨衆若至加法隨意的指一人作彼人物護持也不言對沙彌者此約真實淨必是當衆今彼守護不類展轉於五中隨一即得也非時類者既是宿得恐取衣難故不能讚人者謂此人自小乘戒見他淨施不犯長罪即好名稱今意不欲前人有此名稱故不得請也應淨施五衆者謂此展轉通於五衆者謂但五中隨與一人也玄云此人自身不作淨施五衆者不合請不成正解不應與有本加輕字非也白衣者父兄弟及餘俗人等不合施他也次將五四既屬二施如文可委不得稱二三人者恐淨主身云六衣物混亂不記色目也將他淨物不還者跋難陀淨施弟子衣後嗔和尚不肯還衣因奪故爭白佛因制須簡好人注對首受淨者即所對作淨人也得戒沙彌即學悔人是五法人者二正行二行竟并本日治以上等人不足數故不生鬪爭者恐上惡人認此物便致淨也云踐至説者明錢寶對俗也如後所説者下引多論説詞也二請法標名可知云先至須者明須請不須請也多論但有請意諸部無文五分但言隨至與之即似不請三種請法並如文云云云次至明淨者明合説進不隨也謂其錢寶為開幾日穀等為要説不要説故引多論一切皆須十日説也四作淨法先明心念云五至轉者先依五分羯磨疏云既不對人捨心難盡且令轉換得延時限終須對説方始究竟上是疏文淨施某甲從彼取用者作屬彼意從彼邊取用至十日後却標心從彼取還在身邊貯畜又得十日後又將施與彼人捨故受新者謂將施他名捨故却從彼取如初得又名受新準此文意但約一衣説也內心下釋上僧祇犯吉所以律中下明捨故受新法也律中者牒上五分文也應是不説淨者大德云羯磨疏中通約三根人説今此言不説淨者是上中二根人也此類之人從來不畜長物無所説淨今或有人施三衣等受已即成長也元本受持三衣即不畏犯長無奈長者過日犯捨所以十日內更互轉易作新方便也注文或説淨等者對下根人説也染得本是畜長比丘衣即合對首説淨今既無人可對恐過日有犯且令心念展轉互易仍待有人對説方始休息捨故受新與説淨雖不同十日一易無別故令展轉也此解不違抄云非羯磨疏更有不正義不録次明對首展轉法云至至此者對面約對首人展轉約施主説玄云準羯磨疏中有三展轉一肘主將付所對作人二對首人遙指施主三淨主不知却付財主作淨主物畜皆為除嗔患故此説淨法依古文也云外至之者五十祇為三也律初緣以親對淨主作淨被他古物因諍佛言別對人但稱彼名字後語彼知是第二緣也後彼既知疑恐犯長因制不用令知即三緣也云善至寫者真實説淨也前引見論但通明意耳次從若正作法下依四分加法二法總總衣法中文故注云云云二至遍者辨成不相如文云五至屬者漫標説也注文常記施主者以施主不定或命終等恐失淨法所以常記革履説淨如文云錢寶至明者辨錢寶説淨法也使俗人知者雖開説淨不得自畜文雖不説理合所使俗掌之如三十戒明者指忩寶二戒也五存亡中云五至故者必準論律者若不知死活可準僧祇三由旬內若知所在乃依多論異國方失若定知死及休道即依五分此二律一論文義雙明也餘文可解云六至中者明失不之相有七段文稱無歲比丘者祇云波離問佛長衣何人邊作淨佛言五衆邊作又問相去遠近作淨佛言齊三由旬知存亡又問若沙彌邊作淨若受具如何佛言但稱無歲比丘名又問若死如何佛言得停十日於餘人邊作淨也注文中斥古言展轉不失之過古云展轉不對面作非正主故不失今破云未見祇正律以二並非施主故二皆失也若不知存亡者此約展轉主若是真實主常須在近如要取物用故今云三由旬者偏據展轉者論也二寶施俗者一金銀二錢也被師呵責不得作淨者謂施主是弟子曾被師呵後却求作淨即是相違故不合應通別求餘人作之物不入僧者謂真實施主暫與主持準此皆是假名施也前古人云真實是財正主死後通請展轉非不要通請者為謬也若真實是正主已後物合入僧既不入僧即知是假也注文等者和會前文也謂前云不得稱二三人五分又云五衆似有相違今通會云雖通言五衆於五內無須的指一人亦與前云不得稱二三人僧祇下約多忌明其失相謂衣財有説未説相離難分今一時捨一時更説謂不得重説故須先捨再説若不捨淨法得罪毗尼納未二淨者説也點雖和合不成者謂將五大上色自互和合不成色和合淨若將五大色及錦和如法色即成色和合淨也二糞掃衣牒名可知云制至奪者體是賤物者多論文也不與在家和合者既不求衣必不交遊聚落會二離寒暑三離激發四離四方通使非法求衣即四邪五邪也云言至故者辨體也十中闕第九王職衣玄曰西土棄之此方棄僧俗不同所以不出神廟中衣離處者若未離處猶囑非人為主故冢間者或褁死人或隨送死尸而棄彼也求願衣者或往鬼神所或水邊樹下路側等求願了即棄也往還者褁死人送竟將來施比丘不得取未壞死人衣者四分比丘道行見未壞死人衣即取持去死人起逐至祇桓門外倒地因制除皮髮二繩者一為招譏二多出細蟲故本無共要者準律有兩句一共要二遙占友艷反占護也要中兩句一不共要先取者得二共要雖先得亦須共分鈔文當初句也遙占亦二句時有比丘往冢取糞掃衣才遙見衣便作占心語第二比丘云此是我衣第二比丘便疾走往取因茲喧爭佛言糞掃衣先主屬先取者鈔舉此句次句二人俱遙占俱往雖共爭佛言隨多少共分注文屬前移者律云若已移雖屬前移者玄曰謂比丘先曾移動此物已屬已定但未及將歸偶共一比丘收拾遙掃衣物將先因藏衣之所遙見即言彼是我衣汝不得取即判屬前移者後人不合也避神主面者即約守護主也三無主衣者或隨所在懸樹或樹下水傍無守護主名無主衣四土衣者棄在糞壤中為土所污故三檀越施者牒名也寶云具足梵語陀那鉢衣或云檀那亦云檀越皆訛略也此番為施主如律因耆婆為緣後即國王大臣施僧佛言並開受等云言至也者為安居故施名時即一月五月反此名非時也如文可解云今至別者大德云立此四種之施皆約施人心通局以設謂俗人將物來不解自別僧即須審觀前境施心只如非時將來即須問彼為施此寺現在僧為普施一切僧若言但施現在僧即名非時現前若云並施一切僧乃曰非時僧得又如時中施主將物來施僧亦須準問為施此界坐夏僧為通施一切安居僧若言但施此僧即名非現前若云普施即號時僧得一切臨時處分不越四門也云就至二者可知云初至分者四法定者即此隨籌是也不得異處受衣者因跋難陀此處安居已又往異處受衣故制引此為證前處定乃至安居未竟下證前時定破為二部者約邪正以辨分為二分三衣施佛等謂毗蘭若婆羅門請佛及僧安居竟施此衣疊引此證前法定不要羯磨留夏食等者施主供僧夏竟為剩比丘欲分佛言隨施主心若不許不得分也云二至取者須僧羯磨者大德云破古師也古云但同時現前直爾而同分不須作法所以爾者謂律依法中無羯磨文但有興心作念不要強加羯磨及飾宗同此今難云律曉有心念之法無約無僧即反顯為僧豈無羯磨今師必須羯磨攝入現前若直分之恐違教也下引三節之文總為證其有法從律云下是第一節又據文中自有三段初有比丘未分夏衣便去去後僧遂分衣不留他分彼還來便嗔責云我在此安居合得分待我去後便分諸比丘生疑不知成分不佛者言成分二云時比丘未分衣有事出界去漫屬人令為我受衣彼不與受比丘擬白佛佛言成分但彼不合漫喻三云有比丘受彼屬後遂忘為他受分生疑問佛佛言成分但是受囑者過以其夏坐有功合得分故準此三段之文既一一皆言成分證有法者即含稱分也上引第一節文云二從又下云引第二節有法聞也律時有比丘獨一園住夏竟有人持物來施開心念受餘比丘來不應通分準此一人既開心法反顯二人即合對首四人已上理須羯磨也三若時中下引第三節有法文也律云七月十六日有人施物舊住人見客未散有慳嫉心不肯分之留至八月十六日待客去後作非時現前分佛遂罰彼貪心却作非時僧得普召十方共分此物準此既時中不作法分便非時令作羯磨反顯時中若分亦合有法五分難事破安居者彼云有一外道弟子於佛法中出家彼親族言如何捨羅漢道於沙門釋子中出家當還取之又念云彼若知者或逃避可安居時往取必獲無擬彼聞白佛佛聽破安居去便從一住處至一住處不知何處住衣佛言住日多處取若二處日等各取半準此是逢難移夏許受衣也二非時中二標也云初至之者此同今俗家設會設物也大價衣者即貴價堪直錢物令斬截破分等云云隨僧和合與者以二種僧得施主望僧而施故由僧也準如律文若僧和合等與若不和與半又不聽應三分與一若不與不應分準此先和平等分漸減二非時僧得云以至分者通三時者不局夏也如亡人輕物法者寶曰此不云羯磨文指下分亡人輕物中相同此也但少異耳若分亡人輕物中即此云住處比丘今過所有衣物現前僧應分若非時僧得中即云此住處現前僧應分餘並同也所以此不出文者謂律非時僧得亦有羯磨亡人輕物亦有羯磨然亡人物中雖有文非巧勝信事之者相承但依非時僧得施法文分亡人輕物古人現見非時僧得羯磨與亡人物同遂執云亡人物既輕重兩分今非時僧得若有重輕亦須兩制新章疏云同此見也今云非時僧得與亡人輕物四別一存亡人別非時僧得現存故捨不捨別非時僧得是施主自捨亡人物是別人代捨三通局別非時通七亡人物唯五四獲福別非時僧得施人現在準經七分全收五衆故既亡人四三獲一所以亡人之物重入常住輕入現前非時僧得檀越標心施一切僧豈局重輕並同一攝隨施主意也問律制作法但分輕物今施或有重物不可作法分重耶答準律但不許分金銀錢珠瓔珞等餘被褥蚊蟵帳子等不言不許斷重故知通也相部流與抄同律云下律初緣未差人未作法但分而已後有客來通須童分令僧疲極因令作法攝入現前不及法者即不得分云二至故者上明一部且據僧論若有施主尼亦同上今説若普施二部僧若互闕者便互為正立若唯僧無尼三衆即僧為正若唯尼無僧二衆即尼為正四種者即時非時各現前及僧得也總分七句一雖施二部僧而僧多尼少二無大尼但有下二衆三無大尼式叉但有沙彌尼四無二三衆唯僧自攝鈔後舉此第四句五僧少尼多六無比丘但有沙彌七全無僧二衆但尼為正主鈔舉此第七句注二衆互受者約福田義通故開互取也及在座打犍槌者謂僧雖未散已作法攝入現前若有客後到不合得分今若欲與應須打槌和僧乞與若不和僧便成盜現前僧物故若有餘嚫物者此亦五百問文也永不還呪領取者玄云謂此人在僧中同受衣施未及分物便即遠行今留彼分彼既已遠永不還來即於此物已作捨心今將此分通與後人願其在道安穩故云呪願或可呪願本施主如律云若為利故施此利必當得等一偈也或來取犯墮者是回僧物故死犯棄者準約重物望常住結今引此文通辨前時施義前是作法分竟白乞後是留行者分不來得與後人也四亡人物牒名如文云既至重者立意也小人所利者大士貴之以道小人保之以財老子云在仲天之糞必不栖於桑有方外之心必不談於名利仲尼云君子喻於義小人喻於利釋門高節不合塵纍於浮財出家濟遠者極救六趣四生願俱出離三有故經勞海樂者三僧祗劫苦行名經勞證得佛果是海樂俗譽非慕等者名譽利養是俗所欣非僧攀慕若存求道之心不為六塵拘礙融和也會也素本也若情性未能融會於道即本非清淨潔白之流唯貪於利故也然上下等者上達者前修諸古德各著述章疏處量輕重以濟機器如序中云世中持律略有六焉等是下達者後來習學之疏雖受行此法而順懷自然別也俱須兩順等者立法須兩順一順受體二順本宗隨行受法此約二達立法兩順也受法亦須兩順本受之宗二順本體隨行此約下達受法已説故鈔著俱字意收上下也如此所行方能通得一道隨戒淨行也指南者車名也博物志云黃常戰蚩尤於緣音車鹿之野左河中向北也尤作百里霧使兵士迷方失所時有智臣造指南車數里鼓其草上有人手常指南以定方所鼓乃一里一聲經曰五里一聲者借也後漢能手子依舊樣作成迄今聖駕出時常有此二種物也今云指南意取稽古定義呈顯也至極也古德皆言自己所判各為定義至極之説每有遲疑者儀曰但為物類難收諸部互缺現有儲畜教不備載約文附事監委縱思指事渾然眇同河漢云今至物者如文十中第一云初至物者初徵詞二以出家六和下明不入佛法之意依位受之者儀云生則依僧獲利死後還及入僧二僧壞受用之資兩施荷福流之潤亦不入俗非福田故陳如等者祇云緣起因曠野牧牛羊家夫婦敬信常供乳酪陳如忽於一日自猒此身在世何益便持衣鉢著林樹下頭枕象團右脅著地而入涅槃其牧牛家至時不見來生疑往看之見在樹下謂云睡眠至邊立聽不聞喘息以手捫以其身已冷即知入滅遂聚薪草闍維供養收取衣鉢送上於王王評此衣價直五錢依法斷還沙門等云云跋難陀者波斯匿王云其人無子息物合官佛遣使問王乃至親屬等來爭佛一一問彼如文中也云云二分法不同牒名可知一糞掃取者彼律二十一云比丘為水漂死衣鉢挂界內樹枝上比丘見謂入僧界內應屬僧不取取白佛佛言糞掃取二入常時現僧者十誦云學悔人死當時現前僧應分文中隨更互直取者謂當時現前更無別人故得更互直取若有守戒及殯者準守戒約取以是持戒人合攝故云三至分者隨邪正二部自分也若背正向邪或去己到彼或在中道皆屬標心所向處得若邪人在正部中死即喚彼邪人來取若無人來應作四方僧敷具不得分若正在邪死亦爾四入功能僧者可知五入二部僧者僧尼二也五分云若比丘住處非安居時比丘命終無比丘者比丘尼應分尼死亦爾五衆先來得者準下文須執促作屬己以方成難見不得六入面所向處者準多論有比丘將衣鉢行向彼寺未至彼於二界中間死佛言隨所去處僧得首疏云若不知所去處隨面向何方而死屬彼寺僧得鈔亦同之若無此二隨近處僧得七入和尚者若準四分直入和尚以順育息重也鈔取他部約利促僧得故八入所親者如文九隨所在處者舉十誦為例故云如也彼云牟羅比丘死衣鉢本寄阿難三處共爭如文判以寄人下一句今師語也寄處不寄人者有比丘但借彼房自鎖閇物不令他主管但名寄處死後隨物處僧得也上九直爾分之者且約初緣言之若後分之即有作法者如第六七九皆須作法今對下一清衆故云直爾第十者一和簡邪正二部清衆簡擯舉等人搜玄云清字簡擯舉人衆字簡異上來一人也不及前科第三同活中云三至物者有三初明供給衣食弟子假冒而取犯重者輕物約作法已論若重物定得重罪餘可知若師本契下第二段明共活任情少多者謂諸浮財任在者情懷處分若亡人隨身自受用衣鉢等物一切入僧若師徒共契下三段明共財此若一死亡著衣服隨身定者入僧生人亦爾隨身所有一任自收餘有共財即須分半入僧生人自收一半若不同活下通明非相能所俱犯者能屬處判之人約知説所謂所取物者約假冒也並據輕物者約未作法得蘭作法已滿五得重四囑授中牒名如文釋中云一至也者順本初受者順初受時四依行故生福上處者將財付他生有漏福得上處天堂言不善下熊説文云意也即倍意不除妄將囑搜等三不囑善中空無無漏者出家本期無漏道果今傷未得四不囑善中展轉互生者前以欲捨是開展施心後起慳心轉其前意即是互生如隨相説者玄云誤指也愛衣如下對施中愛銅鋺如瞻病法如下具述二差別者人與物相對辨也一人物俱現者是受愛物人物是所與物得名囑授雖人物俱現若物重不可轉者及轉物布成筒絹成束等但名囑也如絹匹及衣服寶念珠等親付與名授不必要囑也三人物互現者人在病者前物在餘處或物在病人邊也四非囑授準式者如上一和清衆死羯磨分也三重單中者云三至長者最後人得者最後受囑得即命終定無改轉故後人得也財主犯重者即病人回物與後人望前人邊得盜罪善生下引證如文四成不中云四至之者墓者亦云墳聚土為主不取林樹茂也棺者皇帝時為郭子玄欲合葬父母公限所禁不許露衆乃七日號哭不絶城主感其孝心為造木器由是官許故云棺木刃周禮云周尸曰棺也棺是貌義不欲令孝子見其形壞故而藏之槨也周禮曰周棺曰槨謂棺是周尸屬內槨是周棺屬外古門一槨盛兩棺合葬故文選祭古冢文曰一槨既啓雙棺猶存者悲也以録先人德行令讀者悲傷起於孝王封太山時置李斯書也下有龜表靈知千年事意表久久不墜之戈上為捕牢即海獸身有文彩二頭四足亦號虬龍碣者竭也謂五品已上用六品已下用竭上無捕牢頭炎也下無龜有石砧也有云奏過者有孔曰不奏過無孔為者非也亦有奏過者作碣有橫孔過若犯王法等以定知死時決成故聞前浮漫者同前待死後與我寫經等石不成也四分下引證中還置病人邊等不成者無證據故作淨成者有對首人與證故餘文可解五貧債中牒名如文云先至心者先以義分也須依本物者謂欠重還輕輕入常住若負輕收得重物買取輕分若負重下輕前交洛戈不同共僧之法者謂本負重今雖追得輕亦須入常住不得同於輕物十方現前僧共有以此本是重物故須入常住也全無所得便止者謂常住負亡人輕物常住貧靈又無人為還又無覔處使止不犯云十至得者引教斷也應歸者歸還三寶也注文釋成前戈須依本物而斷乃至越其常住常住田園等物取四方現前僧物皆同於上十誦有比丘貸四方僧物私用死後不知如何佛言以財物計直輸四方僧餘殘現前僧應分等四方僧客比丘貸物用等且爾賖酒不還等者時有比丘欠酒僧死後來覔諸比丘不與彼云當出汝惡名聲佛言應為還之注文至時隨緣者現前和之與還為勝若無現前物將常住物還債息者謂亡人債息即亡人在日出物與他求利有多處不同亡後共爭因有五斷第一句十誦五十七末文跋難陀將衣鉢寄餘處身在餘處死兩處共爭佛言衣鉢界內現前僧應分謂彼界才死此僧即攝二句負債處者出息出錢處也負債處界內應分以所負之物在彼界故物主既亡物無別屬入彼僧也三句謂跋難陀付而異界同友比丘保掌任持生舉與人求利名保任處即今行頭為他犯錢放課等是諸界比丘來此保任比丘處取錢詺彼取錢界為出息處死後三處共爭皆言我界合得佛判保任處僧得謂此物由保任人作主故亦同寄阿難處斷上正解古云是契券上保人名為保任處搜玄破云律文自為券書處三句券書上豈無保人名字既判券書處僧得明知非也若但有券書無保此券無證於理何憑若但為保無券空保用何揀物又保人無意只為保實非靈揀物不得四句質物處僧得者質胎所在處也謂比丘有錢出云質前人也來此取錢詺取錢人界為取錢處其質胎別在界中為質物處身在異界死名死處佛判質物處僧得謂此質物與僧同處故若是輕得錢來贖應市輕物僧分若是重質以錢來贖須入常住若不來贖隨質輕重判五句券出處僧者券者支分契也半分曰券契者要約也謂比丘將錢出息與他彼人來此取錢名取錢處其半分券書別在一界名半分書處身在餘處死名死處三處共爭判半分書處僧得謂有契半券分在此界中與僧同處故持此券依數徵彼物也玄云此之五句輕重俱揀下文引十誦云有比丘病衆僧分食看病人為取飯來比丘已死不知云何佛言若先後得飯應還本處若請得飯後無應同比丘物已上律文鈔注云令現前僧分處入重準此驗前五句皆言界內前比丘分者令現前分處入輕入重非謂一向入輕也二約義重斷云此至與者上但通辨五處僧得不論物在何處是不了今云物俗處得以劵書徵之以彼非福田若物在僧界中即隨物處僧得也除羯磨法者如前云欲將此界僧食濟及彼僧須羯磨和與之以僧物不許出界故若負物在俗等者謂前五句但約僧界明之若負物在俗邊律雖無文不可此約義兩斷若約無爭即同四分無住處命過斷之隨於五衆先來攝得輕物若論重物隨先來者送寺若多人共爭各執道理不同則準十誦五斷謂物在俗家比丘寺內聚落中先為僧共死處比丘諍即依十誦初斷物處僧斷若白衣家負比丘債比丘寺中死兩處僧共諍亦負債處僧得或保任及質物半劵書等三處僧共諍亦質物保任處劵書所僧得或同前人處得二寄斷者如上分法第九隨在處得中寄處不寄人物處僧得若寄人不寄處人處得本文約僧界為言今約在俗家者如比丘將物寄張比丘此人自將又轉李檀越舍本主於寺死三處有僧皆言我合得便判與張比丘界內僧得以寄人不寄處若彼比丘在亡人家內住知此家堅蜜借房自鎖同物不令房主主持此比丘於寺中死兩處有僧共諍依前寄物處僧得以寄物處有僧先揀故毗尼母下證前律文不了若物在俗處索未得者可依十誦依券徵錢五百問下明將物借人前人死後欲取時須白僧不白得吉僧知不還犯重自他俱犯者約僧中能斷律主為自所是衆僧為他皆有隱欺之罪上依搜玄皆約僧中以辨自他也寶云若僧不與強取為自他僧知而不還為他二俱有犯也此亦自是一途祗云下本文是收亡者物時有比丘言我亦有物在中故有斯判今準索債亦同此判今準索債亦同此判恐後靈偽又無好人證明不得與也六定輕重牒如文云然至罪者定宗也未融者未能融會四部律文但隨己情而斷難可信用隨別住何部者玄云亡人既也不憶看病又不可知約亡人在生時隨何部行事即驗知生前受體以判重輕為是反此即非止且一解今依天台所稟云隨別住者即是攝僧界也既不委云比丘是何部律受戒今但且依此別住界中衆僧等尋常行事處判輕重之律若知他受體元是十誦僧祇等即須依彼以定輕重也以不得自垢心行等者四分入重物多輕少十誦入輕多重少今既是四分受體便妄引十誦判重入輕必是十誦受體即合準判入輕今妄引四分並入重此等皆是內心別有所為之處是以如此判量故云妄興與奪也故儀云然以人情忌狹擁結非無若知事者則親常住輕亦重收若有別僧則私利己重亦輕攝等云云當平呼自行之者謂實從四分得戒當體四分自己宗中以論輕重行事也此依大德所解也諸記之中皆云當去聲寺即本寺也謂處人知於僧務意為寺家多判輕入重等非解也縱鈔文多作寺字即錯書蒿本內但是字自知之此由貧等者謂不開聖教結犯但是斷量之人貪心上結也云今於至決者立意標章也如序中列者即第四門六師也三階處決者於六師中第一師唯用四分第三師先準四分通取諸部相添第五師通用律藏今此但作三段階級云一至奪者此初師為第一階也唯有重輕二別者律衣法中云一僧伽藍二屬僧伽藍園田果樹三別房四屬別房物五銅鋺銅瓶銅盆斧鑿燈臺六多諸重物七繩床枕褥八伊梨延陀耄羅耄耄羅氍氀九寸伽藍人十車輿十一澡罐錫杖扇十二鐵皮竹陶木作器剃刀十三衣鉢坐具針筒等判云前十二是重後一準輕縱使從用重輕亦皆揀盡也俱夜羅者鍵𨩲小助鉢用故道俗衣服等者玄問云既是俗服何在輕收答此雖是俗服蓋是王臣所著法衣同氍氀量入輕亦無與二者此師但依四分而斷不取外宗都絶是非故云無二不可四分無處抒其令用外宗又不可奪其不用故云也云二至重者標第二師即第二階也義決有無者如四分判被單入重今類準五分單敷襯身衣即合入輕此於重中傍出輕也又四分別小甄入輕若隨床機者即須入重此於輕中傍出輕也已外皆此例之云初略分三者且依四分自分三別玄記錯科本衣云一至輕衣鉢如鳥二翼此定入輕云二至律者皆妨廢道業此定入重注文可解云三至同者許一畜物中則不定準物乃妨義合輕重者玄云如中品人開畜一百供身具即須聽畜物中有似寶道具則含輕重若據似寶體即重作念珠等即輕也或有云蚊蟵等是重已外隨身服用是輕亦得此則判為不同者首勵等疏各有處量輕重儀互説不定等是也長於上根四衣行但三衣人則成妨道於受用邊即成餘長若於中下根人客得濟形資道有益故開自分三位云今至別者標可知云一至重者體性是重故如文云二至輕者體性是輕故莫問多少者破古也古云多則入重如百匹等少則入輕今云可資身修道故一向入輕云三至斷者此等體重名事重常須隨身故從用入輕如布絹所作即事輕不合畜故名用如大小帳者古人謂此是律第八章伲梨延陀耄羅耄耄羅等故輕重儀敘古云初則伲梨延陀可非障相次則耄耄諸羅豈非大小帳帳似於帽故今師破云用此可司一何笑聞聲即判曾未討其字源隨語便番即音定其物體此則勇於取類拙出事實且伊梨延陀名為鹿也經明佛膞相如伊梨延陀鹿王之膞斯則鹿之皮色耄羅耄耄羅者並是獸名狀虎豿之屬皮厚無耎而可坐之于闐已西諸國並有此方既無故存梵名也餘不具録今言大小帳雖綾絹所成妨故入重枕扇者西土多以羊毛為之床席者即床上之席西土多以為席此皆體性從用入重也云但以至説者類準中標章立意也教網具周者諸部律中雖具周足明其輕重今亦引文顯示通收己物聚作七門若斷輕重可依此判注中準用等者以十誦瓦木等皆約舛敷大小判之亦可類用也第一標如文云四至也者坐臥褥者皆內約以治為骨綿襯於外通以布帛縵之若但一邊縵者入輕氀相同袈裟者又猶未了準輕重伐正是袈裟以西土多寒將此為衣也乃至皮作亦然者同上氍氀許畜故入輕攝被是重物等破古斷被同氍氀入輕也今師云被不開畜全是俗懷不可為例故引祇中僧伽梨例上氍氀寒處聽著被及被單入重者且依四分斷也若依五分獨被單類同單敷入輕收薄軟入輕者堪為衣服故氍氀綿繡等五綵色分明不論肘量皆入重也王大價衣者律衣法中瓶沙王持所著貴價欽婆羅衣又送所著大價氍氀佛言應淨施畜種種好衣者律但云諸優婆塞遣人大送種種好衣並不分別衣名及羅穀等是不明了不妨含於等者今師義斷既是大價好衣必是大貴絞稜等也又下文聽著大價疏衣何簡綾羅紗穀也上且依律斷也後至乾封二年暮春月冥盛天人與師言論云王衣俗眼類在輕收雖隨律斷又非明了蓋翻譯者過非學者失如氍氀體量乃是三衣中國不開偏被寒土大價衣者西土諸王多重佛教外治國政則服俗衣內道法行便懷道服感著大衣同僧服者其價極貴或出萬金故耆婆施佛一衣價直十萬而請清信士女逮及菩薩在家咸著三衣乃至色有諸天亦此服大師開斯所説方省前迷故儀云今以近事用微遠教如梁高祖親依佛教三衣錫杖而受持之登座講説脫於帝服又廢貞觀年中宗皇帝以所著七條施勝光寺珍法師價直三萬及終後還追入內又貞觀十二年吳中進二僧一名道泰二名慧宜大宗以所著七條示之令制詩先成者與此衣及作詩一齊成遂令學七評於勝劣云俱一等因令將衣於市俗價直六十萬乃進衣却出絹入付百段等餘廣如儀及述疏也引此文證即知王衣定是法服文中且依律斷蓋來了也云僧至輕者類分也二種腰帶者一禪帶即善助二腰帶劫具單敦者西土木綿堪作織衣將此襯身上著三衣準此下前依四分斷被單入重今準五分單敦可類入輕儀云被單既不同被等縵三衣可從輕限毛㲔者儀云以毛織作布上為畟方丈旃若過量大者準儀云為重輕薄須條理鞭厚過三衣量如上斷重軟薄堪所裁從無論大小多少入輕㲪類同錦繡者儀云此土本無其物皆從西北塞外而來若聚毛編織而出毛頭通有文像人獸等狀者名曰氍氀若以經紬班毛似此方錦者名㲪用為地敦壁障等以有綺色分明如錦繡入重也雖是小旃下更斷相隨入重五大色下古判真緋等色入重黃白入輕今師難云若爾律文何判絹布入輕以絹布顏色白故從白色下及質也若爾氍氀下雖也意道若五大色入輕者何以氍氀但約量判不言色耶答中意謂氍氀已離綺錯之色故約量判入輕若綵錯分明合掃重捧準五分又下證成純色入輕可知絲磨義準入輕者準著見線既入輕隨身要故絲磨準綿亦合入輕若然合繭則有蟲磨舍音皆內有骨入重衣袋注云前至臍等者謂從肩至腰臍謂串肩上行故準五分入輕連袋者兩頭縫合中間口也一切俗服等者儀云若色未改相狀俗衣入重為絶懷俗意也必壞色相者聽分此但相乖而堪附道故開改用補方巾袋者畟方五色合成也鉢袋繡綺若不隨鉢者入重第二標名可知云四至用者瓶盆繩床木床水瓶灌杖扇斧鑿燈臺車輿五作器皆入重故律云證上五種是能造物作具若所造物則含輕重不同古人俱入重收注云佛則不判者不判俱入重但云彼分鐵等作器佛言不應分屬四方僧自今已去聽分剃刀無判俱入重文剃刀常用故入輕錢寶長貪故入重下文者衣法下文也十三章門無判錢處今準下糞掃衣中準合入重云十至屬者類分也香爐且約輕小隨身者入輕若準下文猶為三斷壁上鈎者即鶚爪也禪鎮者如擯楖坐禪又安頂上上者匙匙也鉢支者坐鉢箞也戶牌者門鈎上榜子也如前小者指此水精等作器小者如上入輕𡜥周半計可唐斗一舛六合六夕強也竹筥者居呂反大直口名筐綃綪筐也小菴口名筥過量白鉢者此非鉢盂之鉢也從準此下明鉢盂之鉢若過三斗量亦入重以不許用故引見論針䤼應分者因便明也本為明針送終調度入重者為自己故戶鈎準輕者傍出輕重也前斷入輕今隨內戶入重俱夜羅器者四分但云小鉢鍵𨩲今凡是鋺鉢總名俱夜羅此云助鉢器鋺準十誦應量入輕若梁灰綊紵布作成皆重香爐三斷如文數珠別屬者對上諸物無定故云別屬以輕所隨身別人定故入輕若有寶裝則入重高座準儀中為講法等置破隨本處安之已外通有損生之具即令毀除似寶男子莊嚴具有施者入重伎樂等亦等入重如是諸義廣在儀中此不具述也第三云第至之者是第一第二章內皆是重物猶有輕物者謂已後非主仍是本輕物應分以是為己故不同為別屬也若無法者謂無三時分房法也在生時畜別房則成別屬已後不為主即許時常住赭土即赤土也餘可知四至斷者事者生皮曰革熱皮曰韋牛靴斜靴者儀云若平頭𩍓短入輕異俗故即知𩍓長入重諸部類明也經律在此明者以是樹皮作故紙筆墨準儀今且約少許入輕若販賣及寫俗書等入重若為別寫藏教者如本與之十誦準斷者儀云其澡豆器或以銅鐵綊紵木皮等既常所洗濯鉢具要資準量入輕若重大難持入重第五云五至也者畜誦六畜牛馬豬羊雞犬也既養其生即須養具皆入重可知第六段云六至也者三節文一四分下主己奴在斷即第九章門也可解云云謂別人私有住處亦號伽藍此中為奴即各僧伽藍人畢陵伽別有小寺等其主若死淨人皆入重奴所有物皆屬本奴任目收管二若僧家奴下因便辨僧淨人死所有衣物付其親屬若無親屬即入常住三私奴死者約主在奴亡也義準有二者謂同活不同活二也若同下鈔文據同活奴如親子息今奴既死其物一住即主自收隨意而用或設供造像等皆得奴羯磨含注疏云同活即任生者籌量也若不同下直至注文已來明不同活也謂即主但供衣食不共同活己與同活者屬彼奴定彼若死後任他親屬來收必親族全無即物入常住也注文引滅殯例可解云云若僧供給則不同者謂常住僧供給之者死後物還歸常住上文所解並作法寶也若搜玄記中科鈔文與上不同彼云若不同活直爾主攝兩句為一段即解云此是但供衣食者已後衣物並得直捧無別處分大德破云若爾便與前自取入己隨住處分之文不別恐違抄意也下引母論證如文後終依律者生時既放死後依律不合更收入常住以生前放他已成故若生前不放終後須依律入常住今回文應云終後依律也七云七至爾者若據儀中已成九等入輕今此皆重引十誦意者彼云一比丘病衆僧分依時看病人為取取向己即死佛言若先死後得食還本處若請食後應同死物分之注令現前分處入重者同分己物依輕重兩斷衣準可知故云亦爾云餘至也者指同儀中所説謂此鈔七例與彼儀中十門所判大意不殊使後學者彼此具知故云通解云三至鏡者第三階通用諸教也廢立正文者四分別澡瓶入重今廢四分却依十誦約舛量正文在輕以隨身用故又廢四分扇木入重準祇律却判入輕五部相類而用如別卷者指輕重儀也已外更有竺子鈔不明之準儀中定在重收以類俗傘蓋而判不可檀判輕入知之龜鏡者謂取明鑒之義也七賞勞法中初牒可知次標如文云初至心者不如實語者看病者本是好心今病人道他愛我衣鉢也少能堪能者小小自作由得今不作抑他看病者為之云次至益者明行滿也己身於善法增益者且依搜玄科句也謂雖看他病不廢自己之業即誦經生禪等業若廢己業雖辨他事德亦不具大德將已字屬上句通作以字呼下句云身於善法增益謂全約病者之身於善法中增長利益全不關看病者事也此解勝也云有至中者結也與究竟者準五分文時有看病者或為病人求藥物外行或私行出外後病人命過有衣鉢賞勞不知與何人佛言應與究竟者祇中邪命人不合賞者謂本不為慜他意存衣鉢也犯王法者知他必死亦不合賞云次至敏者明所與物敏由達也如文三衣不與計判等者不與受持連合故樀分持行者謂同是一衣故合賞也其六物名體諸律不同願律師將三衣合為一盛衣褋為二鉢為三鉢袋為四坐具為五針筒為六此依四分律除濟袋加針筒也飾宗云三衣成一鉢成二坐具成三針筒成四盛衣成五貯器成六今南山云三衣是三鉢是四坐具是五計筒是六也盛衣貯器但是隨衣鉢物非六正數思之尼六物於五衣外更添針筒是六也四句中越其德缺物貝勾故著乃字隨事商度者通明下三句中一句須羯磨餘二句但商量口和云簡人至之者五分有比丘病看病人多不知誰合得衣佛答如文勞畢竟不滿者餘衆無按摩功俗人闕説法功即不滿也準此下今師約義明也十誦已下雜辨如文八分時節云八至之者尸起護物者十誦云俱薩羅一比丘死僧在尸前分物尸起語云莫分我物因制云云第九分法牒名列位可知云初至少者集財物也次加法牒名可知云初至法之者若五人得作二法者謂賞勞人及五德雖不足僧數猶有四人住若四人但得直分云今至法者辨前緣法式等一切準此注一同此例者同此鳴鐘捨衣問負債囑授等例非上緣者非上來閇戶限究專緣即其心自淨捨衣詞句律中具牒六緣今鈔準非時僧施云所有若衣若非衣若依羯磨文改云所有衣物亦得或有外界死即稱彼住處或自家及座磑等處死應云無住處一切臨時酌量注文準論不必須集者論云六物在餘處若看病得具須索此賞之若德不具及無看病人即隨彼分故云不必須集既不須集捨衣時但通云所有衣物皆得準上斷已者如上同活囑授負債三段中具説次定輕重如上第六內次問送囊物有者囊替三唱和還者謂律不許理過五錢時有死者露形者招人譏嫌以此白佛因許將衣覆根不得露形者諸比丘又不知將何等佛言聽以喜僧遮之諸比丘不取自檀此是十方僧物佛言聽和僧已用遮身不白不得此五分正文也古德行事準文似有不穩今南山準五百問論之文如抄所引是也云云東陽幽云準論雖爾要須主作捨心不作捨心理亦不可如捨墮時捨心之例也此釋抄矣云五德至受者自伐其功者書云自功曰伐自矜曰賢今若對衆自若德具即成自伐也若不若具又不得賞物也進退既俱成妨即一切在僧首秉法之人若結不結隨意者四分説戒法中初結説戒堂小後僧多不容欲再結佛言僧得自在結與不結今文勢雖殊但取文下自在之義與不與由僧亦不必對衆問他具不具等餘文可知云然後至也者羯中牒物名雖四處不同意表有物不定然至臨時亦須楷定不可參差云次明至法者料簡是非也律令白二差人者古今三師不同初師具立三法一差人二付衣三分衣彼執律文云持衣與一比丘令白二分之今破云此思文不可也第二師但存前二謂於第二付衣法中具合付分二義故第三師但存付分一法不預差人今抄主意取第二師何以知之文中云律令白二差人即是依第二也違法通得者破第三師也謂律云當差一人令分今既不差豈非違法若論付衣法中既具合付分二語口差亦合得成故云通得搜玄問云既依第二師鈔文何不見出差人之法答謂律但令差人不出詞句故鈔闕之今行事時但先白二差之即得其羯磨如常秉之先知不具德等者謂上雖明德具賞法等然其作法之時先須明委知德之有無沙彌合分法等又須知沙彌合與幾許等引多論文證具德合捧得異界僧物若此德不具者但和現前物與之注文意云須博通諸部量德為無方和現物也若三肘五肘外等者謂約己者將絹帛指作三衣肘量外有長物隨多少和乞好沙彌內外衣者即裾及五條也云今至持者據當時但依第三師全不差人差行事注中文少不具者謂律賞勞法下注云若僧中羯磨差一人令分己者衣物羯磨與此無別唯加僧輿某甲比丘衣某甲當還與僧字又前賞勞法中但列六物後注但云衣則攝不盡今取非時施文則捧物皆盡也羯磨如文云作至中者對大僧分法也擲籌者令不見者書作人名一一擲向衣上隨名收物頭不偏頗也善見下若分破行無其好惡即不要拋籌徒衆有法者謂己者衣多僧具只和名為有法必須依分之不合別回作功德凡夫凡解必不能過他聖人之心但依佛制即是順教矣外界下明與不及羯磨人分也可知云次至中者四律謂四分十祇皆爾非謂局四分一律也乃至者越其半與三中與一等如疏鈔者玄云指義鈔及大疏也彼云淨人雖於僧有勞且非出家之士故比沙彌更少問僧寺中或有女淨人合得分否答若據道理僧寺畜女人即非法律如別所論今此且據賞勞義過亦合得分問或在界外為僧勾當得此物否答內外雖殊勞伇無別亦合和僧乞與少許云如是至過者結勸也顏厚謂無著客不唯終始者生時為始不持一物來死後為終亦不合持一物去不作此思惟也或可思受時四衣之行今多貪貯見彼死後分衣欲令各省己身減於貪意也云若至成者四人直分法也口和賞云諸大德憶念今持此已比丘衣鉢與某甲看病比丘三説分法可知作此法已下文並今師義準注文引律非時證上義謂律中佛令與一人分之今為無人準論開作直分法捧入現前今雖作法分猶未得入己若有人來理須作展轉又前為無人故準論開聽今既有人須依律再分為定舉例如二人作自恣法事已通為三人到界即改前法也為人無相不成者謂後有人來不得用前聞法故上來辨僧法竟次首云二至從者二人口和賞者注羯磨云大德僧聽我等持是只比丘衣鉢等與某者看病比丘三説餘如文直付者示應説云大德己比丘某衣鉢等與大德者病賞勞如是語之便直付物非謂全不陳詞名直付也直明彼此三語受共分者以律不出詞句詔此言為直付今鈔指説詞如論也後明心念法云三至也者南山云作此三説已以手執物故後來人不得若不執後有人即須分之律中但云此是我分去聲今加得字是鈔結也問答中辨非衣相又衣法中諸比丘畏慎不敢與比丘尼非衣鉢囊革展囊等佛言聽與文和先將衣施僧佛令作非時施法令與比丘尼非衣等並不出相通而述之者但非著者皆名非衣無妨彼尼此僧非所著者俱非衣始也第十牒名如文云若至成者鈔文從初至正制已來約己者有別屬物須歸本寺私莊易知私寺者即造私邑道場等處即如律中為多相識比丘多為造僧伽藍即是私寺多有屬僧伽藍田園即是私莊如在此二處身死為人守掌者重物歸己者本等輕物據此現前僧分雖是自然處非俗人家以有人掌録不比白衣含非是福田恐損施獲罪即許五衆先來者得今此不同故云亦不得尼衆分也重物入己者本寺者如此方係名僧玄曰據理亦合云若有比丘掌録一句己下文曰若無比丘守護國白衣家法故知此段合有比丘守護文中略也既無本寺此中重物任守護比丘送近寺常住以僧理平等許通攝之寺無僧法者無布薩羯磨行持知法人等亦不合捧故律云若一寺一林有五律師持律聽受一切供養今雖雖作法僧界無知法律人行持律故出家以法為本依法受利今既無法故不合捧若無比丘守掌下明己者本無定住處既是自然又無人收掌即同四分五衆先來者得故母論云若比丘獨在聚落中白衣舍命終彼有五衆隨何者先來檀越應用此物與之若無者隨何等近應施近寺衆僧也準此文即與白衣家法相似也諸記中相承總收上文事意不越四種處判今略搜玄大旨一已人有本住寺今別自有私寺及莊及物在餘莊居處名有比丘或家人掌護重物歸己者本寺以守掌人知他有本寺故二若己者無本住寺自置私寺莊居及物在諸常住居莊等處亦有人掌録重物入居莊物處常住隨近通攝若寺無僧法亦不合取三已者雖有本寺及無定住處在私莊寺及諸常住莊居處死又無比丘及家人主持即將輕物判與先來五衆重名即隨先來者送寺若知已者有本寺須送歸他本寺也四若重物在白衣家多人各執道理共爭者即準十誦五句及五人處二寄如上明之四分下證文可知無住處即非作法僧界白衣家即俗人舍是準此下南山約義如文當部亦不須加法者當衆來見便執作屬己意不同二人共住一人死作心念也隨情遠近者隨先見者情或送本寺常住或近處掌住等僧祇下辨同界別受也祇盜戒中知識比丘互相餉致受寄比丘隨道行見異比丘從前來借問知所寄處比丘已死受寄他比丘默然待異比丘離見聞處獨受得越注文當都直斷不成以有人作無人想故義同無法量願等者證上同界別受不成又辨入界之時節注文約捧僧界廣遠客到不知須借問是何時入山驗知羯磨前到等云云今觀文勢似有相違據鈔可引是僧祇文要知客比丘入界時節及法前後不定奪作法成不與成次引律有人無想別衆分衣不成量四分衣也設有疑妨未審如何釋通耶表舉説戒更例如正説戒外界比丘為説戒故來一心專志法事即成若勾當別緣正作法時入界法事不就今此分衣之法準此可知衆法理齊足可依準思之次問答中間衣本在界中今將出外分得否初準四分衣法中比丘人間遊行大得僧應分難分不取將出界佛言應唱令來某處分之應作相量影等集人若自來遣人來應分準此文是許出界也今引此例亡物體通十方令作法揀入現前亦如彼現前僧得體通十方不別若準局現前現前物不合作相集也既令普召十方僧即表情不礙也遣人來亦與分者請本是界中分物今將出界分此人有事不來故聽與分非謂一切皆與也諸部結犯者十誦將僧得施出界得結應與異比丘分五分云僧得可分衣一比丘持至戒場上獨受佛言不應犯吉現前僧應分祇中比丘持己人衣出界心念或三語取佛言越毗尼並言不應不云得成注文準僧祇二十八中分安居僧得物為囑來取者文云應誰取某甲分若有取者應問彼囑者云若二人先是同意常相為取者應與謂坐夏為功來取不虗應和與分證上遣使亦得分也次引十誦云不同白衣家者恐白衣用非福田故先來與分今是僧尼互寄互不相揀故令索取本羅自分次問答中謂比丘在白衣舍己有物無來攝俗人遂將入僧界內覔僧付與既不見僧却將歸舍此物雖曾入界僧尼來至後分時猶得同五衆先來之判更有別解非正不録也收科結合云云已上二衣篇竟吳越國天長寺講律臨壇崇福普濟戒光大德賜紫志貞寫此記了巳歲記焉
