body:
  text: 吳越國長講律臨壇賜紫清涼大師景霄纂第二門分二初標名釋言第至意者標門名也先辨來意上以遮性五例辨其教興夫教不孤然必有輕重故前文云教不孤起起必因人人既不同教亦非一隨機有於多種寧無輕重者乎今若不明憑何處判故次辨也釋名者第者居也二者增數制謂所制教謂能詮輕者輕微重謂粗重即此四分所制之教有於輕重意謂意旨故云第二云云釋中之輕重至難者裁裁量斷謂割謂所制教文文中輕重難以裁斷量斷割所以然者唯似五篇升降前重後輕又於一事之上或制教意輕而罪重或制教意重而罪輕或俱重俱輕不定且如性戒煞人得夷最重非人得蘭漸輕畜生得提最輕遮中𫲃房得殘即重斷草掘地得提漸輕此皆是佛在日應病施張今以凡情不易裁量斷割故云難也言何至方者兩字徵也謂上已歎輕重之教難以裁量然且未述難之道理欲釋下文故先難徵起故言何者原彼能施之教原本也又心怒於總曰原彼者宗記云此方望西土謂佛在日制教在於西國也夷可將人望教以釋彼此亦得人為此教為彼也能施之教者施謂施設若據理佛能為設教人教却是所施今云能施者但對所教之機説也云云教主窮機之人者教主是佛佛在人中或道後得智中能見一切根機者悉基故曰窮機云云推此又此所為之人者又重也推者尋也所為即六群十群等是也人惟應藥之器者玄云推者想也想於六群等緣起之人並是應如來教藥之器或可惟字惜訓是亦得云云所以藥病相扣所以兩字躡上而生由前教主窮達物機故無虗受之損藥即教病即機相者相當扣謂扣擊如洪鐘之待扣義類相常隨彼病緣者差別也利閏無方者謂利益閏及方由比也更無比故如前六群等類從制已後奉於教藥不敢有違利閏之門不可比喻故經云應病與藥令得服行乃至見聞無不蒙益此段鈔文都有六句上二句原教窮機下四句推機應教言豈可至也者結歸難斷意也謂上重輕之意皆是大聖在日觀機援法或重輕佛智所宣豈可以凡夫情懷言論測度得知當初所制之教故云豈可云云言雖至成者雖然兩字縱奪之詞若縱之則重輕教旨難知若奪之亦有得知之理問據何教有得知之理鈔自釋云重覆核共遠標實被於來裔重爯也核者研核又實也遠謂遠謂遠詮標者表也毗尼之教軌範僧尼萬二千年咸皆有分鈔主披覽研核尋求文意故云重核等云云上依文記解又宗云標者示也意道此之律教不局佛在且期之間實亦有心標示此教至于今日也實被裔者被由及也來者後來裔者苗裔又云衣襟下垂訓裔也又云子孫相繼曰苗裔今師既乃推求文意即知此教被及未來所以亦有得知制教重輕之道理若爾便請引教證之可引鈔答云在文自顯何假證成知制教重輕之道理若爾便請引教證之故律序云時世飢饉乞求難得目連縱運通往北洲取自然粳米佛呵云汝有神通可爾諸神通足又復如何目連曰我以神力接之令往佛言汝若在世可然未來比丘自無神通又無他接招世譏嫌便云不如佛在世時比丘等云云又律文列十利最末後云令正法久住等此皆是在當部律文中自顯所勞更引別教證成也二依位證明中言今至七者謂上再核覆核前文通被末代今日僧尼既皆有分亦可序述裁量又云今序斯大略大以簡小為義略謂綱格之談不越七般輕重收之皆盡也一興厭漸頓者此有多種一約受捨以明興心受中漸頓但受五戒十戒名漸一切皆受為類又厭心捨中有漸有頓捨具戒作沙彌是漸捨具戒為白衣為頓次就持犯四行約起心明者興心成二持厭心成兩犯人衆惡皆斷諸善咸修名二持心頓少分斷惡修善是二持心漸衆惡皆作諸善悉止名二犯心頓少分作惡止善名二犯心漸漸即教意輕頓即教意重一切興厭漸頓皆在此明上依復云所解甚為雅當若依繼宗記中將制戒以辨據喜犯者為興希作者為厭罪重處名頓罪輕處名漸等廣釋如彼云云今詳此説却成第二結正業文意與此稍乖也二結正業科者謂僧尼各有五篇名為正業簡於因業前前重後後輕如殺人結夷正業殺非人結蘭五業此蘭雖非開五篇數且是根本罪也殺畜結提正業又如一女境上自有五種輕重正業科如與其行淫結夷正業摩觸結殘正業同行同坐結提正業蘭若難處受食結提舍尼正業共作務非儀減結吉羅正業皆前重後輕也三報果不同者謂過去修因感過去因名為報果約男女報既不同為僧為尼亦有差別立教致有輕重如僧報強故但一部中受戒懺罪捨戒後許七返重來夏中有緣開三法受日教意即輕尼報弱故須二部僧中受戒懺罪捨戒後不許重來夏中有緣但開清七日教意即重又如僧漏失得殘意教重尼得提教意輕僧摩觸得殘教意輕尼得提教意重云云四攝趣優劣者約所對境明輕重也如人趣優殺盜皆夷教意即重也非人次劣殺盜皆蘭教意次輕畜趣最劣殺提盜舌教意最輕也五起情虗實者此對所為之機情之虗實也實即輕虗即重如自知得聖是實許向同意比丘説不犯若向未受具人得提教意即輕若實無所得自稱得過人法誑他是心虗故結夷教意重又調達五邪三寶心虗故違諫得殘即重利吒比丘説欲不障道以心實故違諫結提即輕故六開制互立者此所為之據起四迷與不迷立教亦有輕重如境想五句初句心境相當結五篇根本即重下四句心不當境境不稱心但結方便教意即輕就後四句中且約殺戒説如人非人疑想二句是境非人疑想是開心後二句非人人想疑非人是開境人想是制心一切境想句皆如此例云云及如壞生戒無淨人時得自淨果是開即不制有淨人即不許是制不開又如離衣戒從外婦會衣入界不得聽捨衣是開輕無制重入界得即不許遙捨是制重無開輕一切開制並在此例互立者遽互而立也開輕中無制重云云中無開輕等是互立也七約行彰異者前六皆約一事對教以明今所被機所為之行有異辨輕重也如喧靜一儀者氣事解也喧謂聚落靜即蘭若如上行居蘭若許六夜離衣教意即輕中下之流居聚落聚落無難一宿離衣即犯教意即重又如上行人制在冢間樹下三衣一益教意亦重中下根久許住房舍畜百一諸長開結淨厨等教意即輕若對犯以明上行人罪輕中下人違教罪重已上七例須有輕重意知之第三結云凡此諸例凡者不一牒上七例懷者情懷即佛情懷之中本制教有輕重者莫越斯七也據斷之宗體者宗謂宗主體謂綱骨今師既披尋律藏知此教被於未來遂作七例之得知佛制之本懷今時處量依此以為宗主恐條流未委特立此開門為大綱也第三門初標次釋初言第言至意者先辨來意謂上明輕重兩意為四分處判之宗然須識宗歸宗判處故以辨也釋名者對謂能對之人即處判之主事即所對隨行之事衆自共能所雙彰故云對事也諸記之中皆對前七例輕重之事此釋恐成局也約教者有兩釋搜玄約當宗之律教宗記中約五部不同之教今意取前解為正所以爾者前來第一門中云唯就當宗以辨又第二門七例亦但據當宗此門雖通辨五部辨不同究理尋文亦據四分律教受隨相類縱明外部亦是傍兼故知唯局本宗處量斷割思之釋中言自佛法東流幾六百載者自從也幾音祈近也後漢永平十年丁卯至唐武德九年已經五百五十九年近於六百此以甲子排之有處説云五百六十四年欠三十六年不滿六百未詳也載者唐虞曰載唐是陶唐堯氏虞是有虞舜氏又時之終皆載於簡故又釋十數之終曰載則顯數有始終也又周時曰年年者禾下千千犯也謂禾犯於一熟故夏時歲歲者星名也故儒書云東方甲乙木歲星十二月一度轉南方丙丁火或星六十日一轉西方庚辛金太白星三十日一轉北方辰星不轉中央戊己土鎮星三年一轉謂夏時取其歲星周天一匝氣候改節故云歲也高時日𣏌𣏌者取其祭祀時候一改子孫追其先祖以為祭祀之節今文中云載者隨言取便亦無別理也言諸師至説者此明四分律流行時古德迷宗判處之失也故羯磨疏云自金河已後名教互張然諸講士偏競不倫各尚季宗鮮懷通量僧祇大興關內十誦江表流行雖有沙門曇諦念得四分羯磨本來律本來至江表關內康四分羯磨各用僧祇十誦以為隨行非準宗骨顛倒亦乃緣急隨情使受隨相乖名為穿鑿名謂已判為是化斥為非故云判是非也競封同異者競者爭競封者執也競執依四分羯磨得戒是同名執小誦或僧祇以為隨行是異其數頗多故云不可稱説言良至趣者出異執之所以也謂前來判割是非競封同異為於何取可引鈔文通云良由已下云云良者多也實也由謂因由尋謂討尋宗謂宗途旨謂意旨玄云不識五部之意旨致使隨行行事昏暗乖受體依四分得戒隨中依僧祇通衣護衣不許轉敬受事訖日出界四錢三角成重或依十誦廢淨地八十小錢成重受七夜并三十九夜受戒時和尚破戒或不現前黃門為和尚云云在十人之外並得或依五分直聲念戒等總是昏於本趣也有解云不識成論是四分宗旨多論是十誦家宗旨致行事昏於本趣者非也言故至責者勸季師承也由前昏暗不依宗途今須明間方識本趣故須兩字躡上生下學謂習學師謂師承故儒書説古有董遇字學真好學常言三餘之意冬是歲餘夜是日餘雨是政餘此之三途可以為學又易星而知之者上矣學而知之者次矣又云玉不琢而不成器人不學而不知道終日不食終夜不𮄊以思無益不如學也又如項託七歲為孔子之師曾興洙四三學士以師夫子等云云必約經遠者謂非一時半日鄉音釣二十時也而已須積日追功所以儒有三冬佛開五夏如漢時有東方朔字夢蔓倩三冬而學學通萬卷之書五音六律陰陽異術悉皆周備佛教之內五夏依師如南山大師聽首疏二十遍五部律教及諸經論凡不精通方能執持律典佩帶真正之文既如本異宗計不同依宗行事方無疑滯毀呵也譏嫌也豈可也淪沒也小笑曰嗤形言曰責免遭呵毀譏嫌亦不倫沒於嗤笑責及之地也言今判至隨者正辨依宗判處也還約其受體者須依本受以明隨行也言體既四分而受等者謂且此約此土僧尼於曹魏之時因曇諦三藏念出四分羯磨納戒在身隨行之中只合依承四分不合以十誦僧祇五分判四分宗之持犯故曰豈得明隨此且約一面説若更通釋如依十誦得戒亦須自依十誦以判隨行若依祇五亦然但名歸宗途莫令混亂即得云云言猶恐至癡者猶尚也謂前約事通説須依本受明隨猶恐後來學者未能曉明故更再垂指示也言大綱者即處判之大意也謂輒將下正示分齊也輒者專擅也古人以僧祇十誦為己所學者判他四分受體持犯蓋是曹魏之時僧尼雖依曇諦念出四分羯磨得戒未有廣律本流行至東晉時後秦弘始六年弗多羅初翻十誦盛行江表至十二年方譯四分律其時全未有人流傳至東晉熙年中又翻僧祇關內古德皆學十誦僧祇為己所學者依僧祇判四錢三角結重許其通夜護衣斥夏中受事説日出界或依十誦七夜三十九夜斷盜約八十文元魏以前例皆如是後因法聰律師忽考戒體元興知從四分得戒方改前迷如歸本趣南山或恐今時猶有類所以重更示也云云脫罹𠎝失其唯不學愚癡者脫者忽也罹遭也𠎝罪也意云儻有如斯錯判皆由於教未明不曉本異二宗緩急是非意旨所遭罪失皆是不學無知等問或有學十誦者判他四分銅器入輕望損常住義邊莫不犯重不答有兩解一云不犯重謂無儒偏心判與還準律教為憑但得不學無知枝條罪也上依搜玄解也二云犯根本説更加不學無知今詳二解之中初釋為勝後義違鈔不取言今至觀者結成通格也標今異昔通者總也格正也於此一部文中立二般定格前二十九篇四分律師行四分事之定格第三十篇四分律師行他部事之定格較由明也寶云車後橫木名較較正也準者準則均平又準的也通明五部學人以此判處一門共成明則須依本受明隨以判持犯也一披者顯不再展此門即條即領披此一門之條知下諸篇行事本異宗別如裘之毛此門如裘之領釋者解也散也然是也大觀者由明也易有觀對大明之象尋此一門之條見下諸篇行事大意如懸明鏡在於高臺似登高山望見萬物無不分曉也寶又釋云觀者按觀如道流住處曰觀亦取登升著望之如彼述之云云第四門文二初標以釋言第五意者標也謂前門已明處判須依本受為宗今或本受宗中文義未周須準用於他部然其引用取捨有準憑故立此門以為軌範故以辨也問前既斥古迷宗判處將異部明隨今此立此門以為軋範故以辨也復用外宗與昔何別答不然前是棄本從末當律自有不依此先準當宗足為處判若宗中欠少方引他宗亦取義勢相關緩急相類者以為補益故也釋名者諸者不一也部者類也除四分外五分十祇并大小乘隨經隨論記傳凡有説律之處與律相應皆含在諸字中收部類均等通引用也釋中言統至文者統由通也通明一大毗尼教藏佛在日對機所制雖未詮上文墨且是一藏毗尼佛滅後結集之時詮上具文亦是大教藏之教結集已後百載之中五聖任持與上不異故云本實一文也言但至立者但者專局之詞也悟者悟入也根機既殊悟入亦別是不同也諸計即五師惜計因鞠多下有五弟子情見不同所以分或五部也嶽立者山嶽也約字釋山下安獄管攝鬼神之所有一百二十川原才巖峭峻者封為嶽也即此方有五嶽東嶽泰山在兗州南嶽衡山在衡州西嶽華山在華州北嶽洹山在洹州今改為鎮幽定州以避國譯中嶽嵩山在洛州寶云有人難云五嶽在此方五師分部在西土彼無五嶽何故言嶽立耶今云不然分部雖在彼制鈔且在此土時舉此方五獄類彼西國五師或可五數是齊故舉為喻謂彼五師頓起各競情見不同如此方五山爭高兢聳故云云言所以至典者釋成別之所以也樂欲者即五師受樂悕須之心也成立己宗者成五師自己之宗也問既隨樂欲成立己宗未審向何處取文鈔答云競稱大衆之文等云云競者爭也採拾也覽也摩訶僧祇此云大衆即八十誦約法為名非謂大乘之大衆也用集一家之典者如薩婆多於大藏內取情見之文用集為十誦一家之典餘皆此例云云未要舉事辨言故至顯者結成互缺也故有者因由義也由於前來各隨情見採取律文分為五宗故有四般闕少是以著故有二字也言輕重異勢者謂所行事是一五部互有重輕如四分發尼諍戒得提是重五分犯吉是輕四分盜五錢得夷即重十誦犯蘭為輕十誦疑人邊得夷即重四分但蘭是輕輕重不同便是異勢故無別理也持犯分途者四分先説淨初後作三衣不須捨淨成持十誦不捨淨得吉成犯又四分戒戒下文皆結下三衆罪成犯五分不結成持故曰持犯分途有無遞出者四分有多敬塔戒十誦無十誦有可分別聚落界四分無五分有輕三師提及水界四分無遞互而出故曰云云廢興互顯者四分興歌聲念戒五分廢四分興結淨地十誦廢互顯即遞出但語別耳上衣正解但據校條五部對以辨除僧祇是根本部不同諂記所釋二別中立本會取諸文初言今立至不同謂由前準未分之時同是一大藏毗尼百載將末既隨分出致令事法不全今依四分行持不周須引他宗補闕猶如未分之前無同一體也四分為本者準下第十門中云曇無德部四分律鈔所宗即以此律為本或本內有事無事等引他部故云不可不用不同古來局執也二引用為憑言故至知者舉論總標也所言善見者謂五百羅漢共造斯論解四分律善能分別令義易見故云善見夫造論文西域有二別一釋論二宗論若釋即依一本教文從始至末以第解釋龍樹菩薩造大智解六百卷般若經又如天親造般若論解金剛經等若宗論即不解釋但依一本聖教為宗宗有繁處即刪除有欠處即引諸教文補益如大莊嚴論并瑜伽論是也今茲善見本是釋論後改作宗論鈔依此論規摸似彼西土宗論也彼論之中謂諸羅漢本擬造論次第釋四分文至淫戒早是六卷若終一部必慮文繁所以商量改為宗論故彼云法師曰律本已具我當分別解説法師曰於戒本中於句義中於難問中若欲知者有四分毗尼諸大德有神通者抄出令人知已上論文今略解之言法師者謂律師也五百羅漢解法之人號法師也曰者論詞也律本已具者意道四分律已自具足不用更造釋論一一解也我當分別解説者今擬改為宗論也所言有神通者一解云三明六通二解云有神智心通也言抄出令人知者謂衆議抄取一本宗論令人學知也二依論別釋四法言一本至也者先敘本論文爾語集衆問曰何謂為法四也答曰一本二隨本三法師語四意用是謂四也人問何謂本答一切律藏又問何謂為隨本答四大處也又問何謂為法師語答曰集衆五百羅漢時仙先説本五百羅漢廣分別流通是法師語又問何謂意用答曰置本置隨本置法師語以意方便度用度以修多羅廣説度以阿毗曇廣説以毗尼廣説是名意用已上論文鈔中引文意存省約隨標便解也言一切律藏者即四分律二十犍度其文不少故云一切非謂通八十誦律為一切也二隨本準論是四大處匂然釋此四大處不同準論即在初戒中明今約義遍通諸戒今且於性戒中對非戒辨餘戒例之斯之四句前二句是戒本通緣句後二是戒本別緣句第一第三是犯第二第四是不犯句第一佛告諸比丘我説不淨性戒體是惡故而不制癡狂心亂時開作前事故然此隨入不淨雖有開文有一念心憶識今作事時是比丘以便入犯位故於淨不入是名不淨有一念心憶身是比丘不入開文是名不淨也第二佛告諸比丘我説不淨同上而不制然此隨入淨是名淨作前事時無一念知是比丘順開文故名淨也第三佛諸比丘我説聽淨而不制初戒遇怨逼緣許與境合名不制也然此隨入不淨三時中一念生染樂心即名不淨於淨不入於汝輩不淨謂生染樂心入開文名於淨不入也第四告諸比丘我説聽淨而不制同上然此隨入淨於汝輩淨作前事時無染樂心入於開數無犯故名淨自餘性戒前二句通緣並同後二句別緣即異如盜戒作無主想親厚想殺戒作杭木想等是別緣也遮戒亦同於上如斷草野火燒寺等是別緣酒戒藥治不差醫言須酒開飲是別緣若初咽得差再咽即違開文是於淨不入犯提是名不淨若未差許再咽是隨入淨不犯是名淨逼諸戒皆爾今文存略但標隨本二句不別句也三法師語者即五百羅漢之言今文中言云即論主也一句鈔主指上諸羅漢是造論之主故四以意度用三藏者文亦存略但通云三藏如前廣引論可委已上依論記釋如斯也三重解意用言先至法者據論文重釋第四意用也故彼論云引義云何莫輒取文而行應先觀根本觀句義一一分別共相度量後觀法師語若文句等者而取若觀不等者莫取是名自意用已上論文今鈔但略引云先觀根本即是律文次及句義即曰大處也後觀法師語即五百羅漢之言謂度量三藏所説與此文義相應可用不相應即止故云莫取注文廣明律師法者彼論第六云律師有三法然後成就一於戒本諷誦通利二堅持不離三從師次第受持不令忘失具茲三法是名律師言正文如此者結示正文也謂指見論正文故以合鈔倣彼論文四法上雖依論所辨如然未委鈔家四法何者是也今須略名謂南山欲制疏文解四分律遂心口相詢若著述疏文便須次第一一具釋其文繁廣與古何殊今改為鈔文但宗他四分也一本者謂四分一律是造鈔所宗之本也二隨本者謂律中釋諸戒句義處有記中將四繁為隨本者恐不然也三法師語者謂今師有置兩序及三十篇次第辨解釋律文明行事處知五百羅漢分別流通也繼宗將首疏或蒿本為法師語也四意用者謂以意句三藏中捈取相應之文補此一宗之闕令行事用足免有滯疑之處也次明取是非科曰云云言然至惑者謂欲辨取文大意先歎取捨意難然字玄記訓是也行者行用藏者藏置故論語云用之即行是取捨之即藏是置謂於文中要者引來鈔內是行不要置而不論是藏引云不易故云實難此約剛繁難也取捨非易者謂於四分本宗若不足取他部文補闕又更是難如四分無持衣文祇十皆有未知取何捨何即是故云非易此據補闕難也且述其大詮以程無惑者且者未盡之談也述者敘述其者助語之詞大者綱格之談詮者所詮之意且説取之取大綱意也以者用也程示也惑者疑惑也用示學人免生疑惑也言謂此至求者此宗即曇無德宗文義俱圓者如中國十人邊地五人受戒是文圓皆須清淨和合是義圓約受曰戒事更無缺少當部受戒揵度自己周足何須更向他部之內尋求十誦和上在十人之外并白衣為和上和上不現前等又如羯磨單白白二白四三法綱骨緣地自足是文圓作白如白作羯磨如羯磨增減不成是義圓約所被事無缺即當部自己周足何假求於他部十誦無準之文又如受日事隨緣長短三品受之是文圓不得差互是義圓約受日之事無缺即當部受日法中自己周足何假更求外部十誦三十九夜及僧祇事訖之文等已上並是不取文之大詮言餘有至一部者此段正辨取文大全也餘有者餘外也除前文義但圓之外更有四句須取他文言四句者一律文不了二事在廢前三有義無文有事今初句云律文不了者如四分自恣法中明五德處只言差受自恣人不言數是一不了又羯磨文中但云僧差比丘某甲不標二人是二不了下文引十祇並令差二人作法方為決了又如當部安居法中明夏中有船上人斫材人放牛人押油人請比丘安居佛言聽之詮不言先作住意是一不了又夏中分作雨明移去佛言聽去全不言信樂并衣食豐足處等是二不了下文引五分云諸依如上人先謂作往意得依安居若中間移徒聽隨信樂衣食豐足處去方為決了又如隨相中與未受具人同誦戒律中但云諸天仙人所説同誦皆犯全不説云為佛印可者是三不了下文引祇律若餘人所説得佛印可者同誦即犯方成決了諸例頗有恐繁不具録第二句事在廢前者如律部皆許魚肉為正食若準夫等經並廢斷之彼云夫食肉者斷大慈種水陸空行有命者怨故不令食肉引是能廢之教廢前律文第三句有義無文者謂四分捨戒法中云夫捨戒者皆須解知若對顛狂啞聾具二睡眠等人皆不成捨此是有義也而瞻波不足數文中只列二十八人已外並無啞聾等不足之文即無文也鈔下文引十誦睡眠啞聾等人並不足攝補我四分關少故第四句無文有事者謂四分中但有結界之事無六相集僧遠近之文下引六本教文於四分行事六本者可分別依十誦不可分別依僧蘆無難蘭若依雜寶藏有難依善見論道行依多論水界依五分如下對文自辨也言又至取者又者重也謂此改向前四句取文中重述也雖於四分欠闕許引他文然於所引部類之中應須簡擇相應之文方引不相應者亦不引之故云又所引部類也義勢相關者表云如十誦持衣護明相與四分同護明相關又如十誦啞聾之人不足數與四分對彼捨戒不得義勢相關又毗尼母論許轉欲至於七返與四分許轉欲亦義勢相關可引將來補闕故云可用證成必緩急重輕者謂四分無文外宗雖有然與四分義勢不相關亦不得輒取也今將前緩急重輕分為四段解判第一段緩者如十祇並有持衣之文十誦與四分同護明相是義勢相關即如來可用證成若僧祇通夜護衣即大緩故不取也餘皆例此二急者如藥法中辨處分淨四分雖有許處分之文且無僧住之近制限祇五二律各有限約之文五分云若僧住曾經明相即處分不成此與四分義勢相關可用證成若準僧祇云僧住不許過初夜即太急故不取餘準此例三重者四分但云三衣不加法受持得吉羅而無離宿得罪文然多見二論各有其文多云俱有缺衣壞威儀吉羅之罪即與四分義勢相關可用證成若依見論離未加法三衣宿亦犯提此太重故不取餘皆例之四輕者如盜戒中四分不辨盜六界罪之輕重了論十誦各有斯文了論盜六界並結夷重即與四分燒埋壞色之義勢相關可用證成若十誦律俱得偷蘭此太輕故不取諸皆例言是非條別準論不取者寶云謂前緩急重輕若望彼宗即自為是若對我四分義勢不等即名為非與此既乃不同執計條然亦別準善見論云與文句不等者不取也若準搜玄義約勢功等可引用為是若緩急重輕不引用為非者全無理也思之三引證言故至之者律第四分增四文也彼文云佛告諸比丘有四廣大説一若比丘作如是語長老我於某村某城親從佛聞受持此是法是毗尼是佛所説若聞彼説不應讚歎亦不應呵應審定文句已應撿挍尋究修多羅毗尼撿挍法律若不相應違背於法應語彼云汝所説者非佛所説或是長老不審得佛語不須復誦亦莫教諸比丘今應棄捨若聞彼説與教相應語云長老所説是所説是佛所説審得佛語自讀誦并教諸比丘勿令忘失此是初廣説二從僧中上座聞三從知法毗尼摩夷衆多比丘聞四從知法一比丘聞亦如是將斯四法驗人邪正知是非所説事多故云廣説廣説無四但約四種人邊聞以立名也引此文意證前依論引受相應不相應也言十誦墨印等者意道非唯四分有文十誦亦同斯説故云義亦同之彼云文云何故佛説四墨印答欲説真實法相故未來比丘當了知知是佛説非佛説等前四廣説就能説人邊得名後四墨印約所説教文立稱古來多作語墨字解違他律文也故十誦云若言我從佛聞乃至一比丘聞未應讚毀應向三藏聖教中印定既云三藏聖教教是能詮書於紙墨即須用教印之義同於四説也言若此至沒者結成有益也若如也以用也若如前依善見用文之意義勢相應方取者此則能取之心照所取數境所取數境又照能取之心故云心境相照也心謂鈔主善取之心境謂三藏教中與四分相應之事法也舉動施為皆令見論規摸法則規摸也猷法也繁略取中者如四分無集僧來處之文鈔遂廣引六本教文來補雖繁亦中又如四分闕持衣文俱引十誦一文雖略亦中故云繁略取衷理何晦沒者理謂義理晦者暗也沒者沉也淪也心境既各虗然義理終無暗晦故俗中所計月缺也盈而復缺謂之月月初為朔朔者生也蘇也月生謂之望望前望後月末謂之晦晦由暗也意顯上所引文必無暗昧言若至教者此改文意恐有人疑忘前既不許古人引他部文今師著述又還引外部莫相違否故作此文遮局見之偏執也若不等者鏡明也覽採也隅者角也謂若不明間採覽他部但依四分一文乃是愚滯一角之小見如下六師中初師不別也涉事等者涉謂關涉若不取他文涉持衣事集僧等事不周以四分中無文説故也挍文文無可據者挍勘也如有衣不加受法結界之時不集僧將此勘撿教文文無準據也遂師心臆見者臆謂𮌎臆即淺見也凡所説事不憑教文信己情懷名為臆見故各競是非者繼宗記云一師作得三衣但手持而已直云不用加法一師云何不離宿即是受持亦不假手持之也手持者謂己為是將不手持者為非不手持者謂己為是將手持者為非故曰各競是非互指為迷者手持者指不手持人為迷不手持人指手持者為迷也此釋可以依承若準搜玄將僧祇通夜護衣之人對全不加法者以解乖文意也誠由無教者誠實也宗記云謂指上之二師互指為迷遽相非斥者實由無教文為據若解依必教能引用十誦之文亦不手持及不離宿之説也諸記中皆云寶目四分律教之中無説處致令互執者此非解也言若至事者此改文謂四分文中或有一事律文雖有限約且無對處行事之文今引他部文來限約元依四分若向依他部文即還成他部之事又準律中或有一事雖有限約而無對事之文今若取他部文來他部中無此限約亦須於所引文中加此四分限約云云今指事釋表云如集僧篇中引十誦律可分別聚落隨聚落界是僧寶界補於四分行事下注文云齊行來處即十誦下文於聚落外加十三步分齊此十三步分齊內人由制令集今若依四分聚落界只約院相內以為限約院墻外邊縱有比丘不集無過鈔主雖引十誦可分別集僧之文限約無依我四分但盡院相內集若依他文院相外十三步分齊內有人更須集之即還用他部文以成他部事也又如離衣戒中引他宗四種自然護衣界補於四分欠少若在彼宗但齊界體防護以部外衣界無勢分故今依四分須加勢分故下文云即以此量十五自然通著今若引彼文來不加十三步勢分即是還用他部文以成他部事也言或至用者玄云此改文與前段不同前約四分有其限分而無對事之文遂引他部然雖引用須解臨時順四分宗而加減今引文者四分但有其事若至行事之際律且而文不唯無文亦無其義三十一於他部文中二處並有其文俱堪行事不可取一捨一今須總引將來任於後人簡擇行用也言二律者謂離四分外別明二律不得將四分對他宗為二也如受戒篇中明受衣鉢時四分不明時節若準他部有二種教文各有説處初準五分令教授師受前為受後方進具若準僧祇令羯磨師受後為受既言二如鳥翼制必相隨恐有闕衣理須為受是則二律具明今鈔一時引來任其行用故下文云若依諸部此處即為受衣鉢或在衆中戒師為受四分無文亦隨爾存上之或字顯不定之談也或二經之內文義雙明者如僧網篇明治罰惡比丘處四分但明七九法不言許王臣謫罰然於經中説皆不定初準十論不許王臣治罰故下文云若比丘內外有善相識聞廣博生信處多如牛黃石香等喻不聽王臣治罰次準涅槃大集許治謂愚暗自纏是非不曉開於道俗三門者即許治之故鈔下文雙引將來隨意採用也或二論文義雙明者如二衣篇補治浣染處四分但云三衣破應令早補而不出破相之大小若準善見云長邊一搩手廣邊八指內穿不失餘處夷如指爪大即失有橫縷者不失若依多論但緣不斷即不失即二論雙明今鈔並引安文中意顯若緣斷即準多論若中間破即準見論分齊也或一律一論之內文義雙明如二衣篇説藥鉢主四分不云須請不須請若準多論須請故文云應求多聞人等若死若至他國更求清淨者若準五分於五衆中但隨意與之觀斯文勢似當時漫標不要預須定請豈非文義雙明今總引來臨機酌度故下文云若德望高遠不可附反依五分用若可召請者必前請之此是隨意採用也或二律一論之內文義雙明如二衣篇辨淨施主存巳處四分無文若準僧祇齊三由旬內如存巳若準五分知在世在道即不失多論云若死至他國更求清淨者作今鈔雙引安文中任後人隨時而用也次結成非濫言然至也者此段文意上來雖已辨取文規摸與四分義勢相關即取之若緩急重輕不等者即準論不取具已委明然更有一種之由未曾申述謂凡引外部皆先披尋三藏教文親自覆疏書安鈔內非謂從人傳得派爾之詞恐有此疑故重敘説然者是也引用三藏聖教親自手披目閲謂鈔主欲著述先著三遍藏經有處説云七遍都引用一百七十餘本教文並皆一一刊定文句等問縱是傳聞復有何爽鈔答云恐傳聞濫真故恐疑也從人傳聞疑有泛濫混真正故即蕪穢真宗之例問此文云引用聖教親自披閲與下第十門中云每所引用先加覆撿何別答此據引文補闕以明下就本宗刪繁以説不同搜玄釋此前後兩段賓主不分也又問此門中云傳聞濫真是去濫意與第十門去濫傳真意復有別答此簡不是從人傳聞之濫非下辨藏教為文之濫其理全別也二約人執法宗計差別言又至焉者謂從元魏朝初興四分至今於中有引用他文或有不引用者故於此辨通局又自古諸師其數雖多若見解異同莫過六意也言一至極者列六師也第一最局注文如持衣等例者謂四分無持衣受藥之文蓋是欠少此師見律無文便云若比丘作得己衣但頂戴手持既成不必有其詞句等云云二當部缺文等者此師見四分云若疑應捨已更受即知欠闕持文即解取十誦加法之文補於四分行事也繼宗記云然此師於四分無文有事解取他部相當文來望初師即稍通若四分有義無文即未解取他部文來補闕又似狹局或有釋云此師雖解引文未解取外部義也此釋甚非若論其義非關此門之意也思之第三師并注文等者此師見四分有義無文善解取他部文來補闕望前第二又通也第四師并注文者此師取文又大過分背宗取異故第五通取五藏等者師師凡是小乘教文與律相應處背引用也言五藏者一長阿含肇云開抑修途所説記長遠故又善見云集衆法之最長故曰長含也二增一阿含一上增一加於法數故三中阿含祇云阿難誦法句之中故四雜阿含文句義等雜而説所以皆名阿含者肇序云梵語阿含此翻法歸謂此言為萬善之凝府總持之園苑衆法之所歸猶如巨海百川皆會故以立名也五雜藏者分別功德論云或非人説或佛弟子或諸天説或説宿世因緣三無數劫等所生之義之非一故云雜藏注文如長含等者準四分律文因跋難陀度外道出家受戒已後却歸本道又更重來佛言此人內外俱破故不許度若但破外來投內者即先四月試之觀其所以察其所由若心專正方許度也後準長含中説佛度裸形迦葉諸比丘亦準前四月試之迦葉云我今任經四歲試之心終不退佛言我曾有言乖觀其人耳後度須跋陀之時佛言阿難我涅槃後若有外道出家勿更四月試之若小稽留也恐生本見故所以律無不試之文此第五師引彼長含補於行事第六師終窮等者此師最通也注文約僧坊無煙者楞伽經云若有僧伽藍舍煙火不斷作種種食是名不淨食如實修行人不應食此食又云酒肉蔥蒜薤蕜之屬悉不嘗之五辛者慈蔥胡蔥是也三蒚蔥即山蔥四大蒜五興渠者有多釋若準菩薩戒疏云興渠是梵語此翻藝薹或云阿魏菜或有解云即老考子也更有解云葉似韭根似蒜人又云根似馬鞭葉如馬蹄云京芥或云此土無但存梵語耳諸説不定未可的指也八淨賤者謂田宅園林種殖根栽貯畜穀帛畜諸僮僕養繫畜生錢寶重物像今飾床及諸重物涅槃經中名八毒蛇十餘處文悉皆禁斷言此等至差者謂上六師執見雖異皆是真正之言無非佛意但申見解通局故有六種不同初師唯局後師唯通中間四師相望通局搜玄云初師但執四分為局二師取外引用為通二師取文未足為局三師廣引為通三師但須宗明義為局四師異宗廢己為通四師雖取異宗太遇又未兼經部為局五師兼取五藏通五師雖取五藏猶是小乘經教為局六師終窮至極為通通局不同故云兩見不同諸家錯解思之參初今反差惻居反已上六師通局所執不同見解既有短長蓋是不齊之貌也言此至也者宗歸長見也意存第三第六者玄云第三師用解律文意足第六師兼取大乘意足此二最長故鈔存也餘亦參取者餘外也降此第三第六之外更有四師或機要時宜相當亦參雜而分取也得失者寶記云第二第五是得第一第四是失第二得中有取不取如中下根須得持衣加藥之文即取若上根面王不畜餘衣亦不要加法文即不取第五得中有取不取若外道捨邪歸正定不須四月試試之若恐心未專亦須四月觀之即不取也第一是失有取不取如今一類比丘須得受持衣法即不取若似上根不要即乃分取第四是失有取不取若中上機須得淨厨安食間綏之時須歌詠聲念戒不取若上根人但長乞食不要淨厨或盛夏嚴冬戒文尚乃略之豈更歌聲吟詠亦須分取也搜玄記中解此一科頗雜亂不敘之上且申正義也隨機者謂隨上中下等機及外道之根機也知時者謂宜也玄記云隨六師機宜者非也今文通釋四師中得取失不取隨機取不隨機不取知時取不知時不取也上來收科云第四門已竟第五門分二初標言第五文義決通意者來意謂前雖用他部相應之文補此四分闕少或有一事復是今時要用三藏聖教文義俱無不可拱手而沐故須約義補闕故次辨也次釋名者文者謂能詮之教文義者今師之義決者擇也無壅名通意者意指此中文之與義主句不同依若諸家對此即有四句若文闕將文決文若義闕將義決義有文無義將義決決文若有義無文將文決義或依繼宗記對此但立兩句一有文無義即將義決文二若有義無文即將義決義若下文文義俱闕但是舉例決通不得言將文決文將義決義也若就理有而成事即名就理決通不得言將文決義等云今詳茲二説各是一途究理尋源並無妨礙門第所解道理極明且不要論只如初釋於四句中將文決文將文決義既還用文莫濫他第四門意不答曰不然此中雖云用文蓋是相似之文類例以義意而用即義補中收且非正當之文何得有濫凡欲約義決擇先須引聖教之文若不引文如何取義故須據文中之義顯非臆見之談進退評量相同明鏡思之上雙明之隨情引用也釋中言夫至文者理本絶名者初總釋次別釋且總者謂性空理上本絶名言離四句絶百非不可以智知不知可以識識諸法寂滅相不可以言宣故曰理本絶名也今為顯斯至極之理假立等涅槃真如之號以表宗之極處故云立名標其宗極也次約律説者謂真如理上本無淨戒之名故曰理本絶名若不立名無由顯其戒德為令識相防護改惡從善故向真理之上假建立此淨戒之名為比丘萬行之所歸宗途極處故云立標其宗極也名隨事顯者謂行無別號隨事顯名如制止淫盜等事制作衣鉢等事聽作房衣等事如此事既多名亦非一皆隨善惡境事而顯故對此事而有斯文也二生起決通之由初標言然至周者考者窮考再三思審也斯律者即是上來名隨夷顯之律也言謂能詮言教事即所對之事周者定也大聖降生本為説法化度有情被及前事只是夏中受日事上便有五種言事並周短緣七日次半月更三十夜九及事訖之文又如羯磨有心念對首中間直白白二白四以此推之教文本來已自周備也云云言但為至缺者欲釋此文應先問曰教文既自周備皆是佛之所宣何故今日事法却有疏遺更有用今師義決可引鈔答但為等云云年是周朝之號代者世代子繼父為一代故渺邈者説文云遠視貌也以今望佛在世曰名綿遠故聲者音聲彩者光彩靡者無也追者及也意道從佛滅後至今年代綿遠不觀如來三十二相之光彩不聞説法之音聲追攀無及也法為平聲呼時移者為被也移者遷移法被時所遷移日漸一日如毱多問尼之例其時百歲尚然何免至今去聖時已更遙所以事多殘缺也已上且是一重二分部見殊加以等者加者重也於前非上更增此重故云加以捃去聲托也拾採也不次取文故五師者曇無等云云由其百載之後五師情見各殊乃於大藏毗尼捃托採拾與己見解相應者自作一部或樂八十錢成重或樂五錢結重不許云四錢三角以是根本僧所故或廢淨地直聲念戒等因茲教法又見陵夷此二重也三重由至立者翻譯失旨也於前非上更加此一故云重由也翻謂翻彼梵書以就唐之字譯者譯彼梵語以就此土秦言據斯翻譯各殊故或有解云譯者轉也謂轉域外之語與此乖違故云失旨如善見云摩夷者譯為二部波羅提木叉即將梵語翻梵語又摩夷是論波羅提木叉是戒家所感之果也妄生搆立者謂翻時不體彼意但以自己情懷構置竪立如袈裟翻為臥具略取其相失其指也又如擺灑三昧等若準諸經論中引彌天安法師述翻譯有五失三不易恐繁又非急要廣在吉記中敘述此不具録也已上三重殘缺也言至濫又者抄寫濫傳也於前三失之上更加此一故云又為也執筆抄文上於紙素故云抄寫文字差殊為錯全行全句脫名漏有未翻時錯即梵策本錯或正翻時錯如唐三藏譯婆沙論了付光法師講覺文不次遂白三藏知尋撿梵文果欠一葉不翻或翻了錯即今抄寫時也今將錯設莫越三般一字同聲異錯如説戒中對同犯者發露即當去聲呼懺悔古云即當平聲懺悔又如相平聲相去聲樂字通三呼行字通四音度去聲度入聲差字通四音等皆是字同聲異也二字異聲同錯如訃請字與奔赴字別而聲同云云又如耄耄羅字與巾帽字同音也三體別義殊錯如三衣中引律明大衣量至十九條云若復遇是亦應畜律文錯書不字等云云相承傳濫者一本傳虗萬人宗濫寫烏成馬魚成魯涅槃為七大等並是茲茲例也言所以至多者結成者所以兩字躡上而生由上來遭斯四種殘缺教文不同所以至於急要行持之時當部不説披撿諸教又乃無文遂致紛紜使學者情懷思慮非一故曰良多由茲生起決通之意也繼宗記中約古師思慮良多等云云言今至見者摽今異昔也總者對別立名會謂和會之者語詞以由用也者大見簡偏局之小執也今師以義決擇令行事俱通與大毗尼不引也言若文至謗者此段鈔文正辨以義決通之樞要前來諸文且是生起決通之由向後諸文又是成時決通之理若正明綱轄是此一科也今且略科配鈔文初從文義俱闕直至而成事已來是舉例就理決通若諸家即云將文決文將義決義收鈔文兩句也次從或在文雖具乃至以理為正故也引即有文無義將義決文從義雖必立直至以息餘謗是有義無文將義決義諸家即云將文決義也初言若文義俱闕則可舉一以例諸者今意且準宗記舉例決通也欲委此文大意諸有一事四分并外部等文義俱無今便將他部中別事類側引來決擇今行事無壅次舉事釋者如律文中有羯磨法文但制五夏令誦不論正將法被前事時為須暗誦為復執文讀之亦得三藏教中文義俱闕古來行事見教無文多將羯磨之文對衆白讀令舉一例諸者遂舉戒本須念文義以例羯磨亦須暗念不許明讀故下文中鈔自問起世有白羯磨非法成不答曰不成是定雖無明決可以義求然羯磨戒本作法相似戒本既令誦持羯磨豈得白讀故四分僧祇半月無人念戒應差向他處誦竟還本處説之不得重説乃至一人説一篇已更一人説又若不能者但説法誦經而已準此而言即戒本不許讀也今師又俗中舉呪術讀文被事皆不成就但以法貴專審令皆文誦等又佛法中誦呪者加寺遂成未聞讀呪而能附事令舉斯例羯磨正被事之時必定須或有云舉戒本一文例諸番羯磨故云例諸此非解也又如夏中或有閏月為要依為不用三藏之中文義俱闕令舉他部受雨衣為例故顯有閏必定須依也諸並在此例不及一一敘之或就理有而成事者就理決通也此文大意亦有三五條事蓋是當今行用當宗他部文義俱無今師遂約道理決擇令通免生疑滯故若爾前句云文義俱闕此句既居當宗他部俱無亦成義俱闕若為取別答文義俱闕稍同理例決通全異前將別事以例成此據道理合有全是今師義加也如下不足數中明醉人不解人露他隔障等理下合足數然於三藏文義並無所以爾者以佛制出家僧尼不得飲酒故無醉人又制從受戒後便須習學故無不解人等今時或淨戒之人暫服藥酒及學未知之類露地或有障隔為堪足否是今師義並不足也故下文自語不解顛倒異言不解之人是不足攝等斯皆就理決也有鈔本中剩有前字即成前文義俱闕事謂於三藏文義俱無但就道理合有與前文義俱闕不殊故指同前故曰而成前事表云蒿本中無不合溱足未為雅當言或在文雖具者在文雖具足有文於義有闕是無義便以義定之即足將義來決文也次舉事釋如無主房戒但云長佛十二搩手內廣七搩手而不論長短尺寸然於僧祇佛一搩手長二尺四寸明了論同之五分云二尺善見云中人三搩手為佛一搩手多論凡人一肘半等皆是在文雖具而不知依何定量既倍搩手同之約義但取五分二尺也雖定尺數然尺復有五種不同如用何者又成於義有闕今以義約律中鉢量取姬周斗今此尺量亦合取姬周應法度尺為定此即是將義決文也故論云者即善見論理謂道理如上來約佛倍人之道理搩手合依五分二尺即是以理為正也更舉結界中大界量釋亦得恐繁不録言義雖必立等者如律中重受日義必立既列諸多緣事皆聽受日又且約父母信樂不信樂自有四重等即是重義然且無正許重重受日之文古人見律無文便立夏但開三法不許重重受故今師遂統開五分五百問論明了論文許有重受五分云若有諸若無請一切聽受七日既云一切明知許重又五百問云先請七日出界行後行不須更受滿七日已乃復重受又引明了論文七日有難隨意行善解三種九品類等方息得古人之謗問上言統開諸部為是文為是義答呼為文亦得呼為義亦得又問若呼為義其理可然若名為文莫成第四用諸部文意否答不然第四門中約正當之文今上所引立五分了論等且非重受分明之文但向他文中取重重之義所以不濫若諸記中將此句為將文決義理亦不失今依宗記直取文下之義便科為將義決義亦善也思之言然文至境者然是已誠實也廢除也立取也謂上四句決通難為廢除古義立取今文廢古自讀羯磨立今須念等廢古逢見教文即用立今五分二尺為況廢古一夏三度受日立今重重開受如此廢立實難也白非者約義訓不是曉會持犯根原名深明律相解制聽之本意是善達開遮若不是上二類者故云不然也如讀羯磨結界不成得不舉無之罪是纍於自心於此與人受戒辨事等並不得是無益於他境乃至如夏中但許三度請日不明教相亦結不學無知是纍於自心不心不能辨他生善滅惡等緣是因無益於他境也言故律至釋者引證也當部律第六十卷增十二爭論文也彼云佛告諸比丘長老所説文義俱同文異義同文同義異文義俱異皆云莫共鬪爭若善者不諍不善者便爭解者不爭不解者爭善訓於解初文義俱同者竪義者云僧尼二部戒本各有五篇是文同俱防七非是義同論義者云男女二別既分二種當知文義俱不相應因生爭論若善者應云文義雖同僧尼形報有別又患不可共説涉人疑嫌故須別立戒本也文同義異者律當第三句鈔取語順故回作第二句也立義異者云如減年戒數胎閏受戒犍度中亦開胎閏是文同戒本中開和上提犍度中弟子得戒是義異論義者云文既是同義云何異因茲起爭三文異義同者律當第二句立義者云飲用雖水制二戒是異文俱為護命是義同論義者云文既是異義云何同因茲起爭四文義俱異者立義者云如紡績言人等戒及教誡日暮等戒僧尼位別兩戒各異論義者云僧亦合有紡績等戒尼亦合有日暮等戒何得不通若善者云僧雖紡績且不喜為尼是正功所以偏制尼雖有誡教遇時不生譏謗故不制也具舒進止者具在律文舒張進止今鈔引安文內但為證前決通意難不更勞於紙墨敘述解釋起盡之文也今將鈔文類律四句一文義俱同者如小三界與戒場並制結解是文同三小界翻結成解戒場例此亦合如然是義同今師引三小界翻結成解文決戒場翻結成解實當不易二文同義異者如護復護衣總制明相是文同護衣防缺衣之過護夏防損命招機是義異今引護衣文決護夏事若非深達即不可知三文異義同者如房量鉢量是文異既取姬周斗量房亦合取姬周尺量將此異文決通義同若非善達造次難知四文義俱異者如尼受戒及懺僧殘受隨文異受戒獲益懺罪除𠎝是義異隨中懺罪既須各結界決其初受之時亦須各結受隨既等何不結之洞達方知常途難曉同者須進異則須止在於下文此恐繁詞不勞敘釋也言然至迹者然字是即定之詞決比也判斷也謂上四句各有是非非則除之是則依用如此取捨須是明間五部律文意旨兼通大小隨律之經如前第四門後六師乃可究此決通之教也迹者老子云詩書禮樂春秋六經乃先王之陳音陳勝也迹今密取彼意以教為理迹尋理等云云言故至律者證也一本起也者即起過人處等二結戒者對緣初制也三隨結者有二一跋闍心異隨結跋闍子念言須提那子樂佛法其戒即肥作事故犯我今不樂佛法戒羸作事應不犯佛隨結云戒羸不自悔亦犯二林間境殊隨結者比丘念言人境勝故應犯畜生劣故應不犯遂於林中共畜行非佛隨結云乃至共畜生皆犯隨事而結故云隨結三中一二戒戒皆有於中隨結有無不定言并至也者義解者謂律中淶滿足戒本解云若比丘者八種比丘等是毗尼者七毗尼五百七百結集能定是非生善滅惡故增一者即律增文從一至二十二等皆一一而增故開遮者開謂開聽遮謂制止也經重者成果為重在因為輕也如五大色者釋開遮也東青南赤西白北黑中黃更有五上染東碧南紫西縹軟治天青黃之色也北緣中紅如此之色並不許著是遮青黑木闌三名為非色許著名淨即開籌度思量本是前三事未即義解毗尼等依而用之言明了至説者亦同上十誦也一緣起等因飢餓等二人即須提那三立戒即制戒四分別立戒即義解是五決判是非者明三處行非輕重等相於此五相精通各解律者心無怖畏不復著他顏色也文略同上者前二如律本起第三如律結戒第四第五與十誦隨結似有不同故云文略同上廣如了論中自説故云廣彼説也上來收科云云第五門已竟第六門分初標言第至意者先明來意謂前五門辨能詮之教已圓然未審其教文所詮何等故次辨也釋名者教即能詮教下旨趣為所詮也釋中言詮至犯者初約所宗律本詮釋謂教之文文雖浩博即一部律文也浩者大也博者遮廣也六十卷二十揵度實為廣大也若掫所詮大意不離持犯謂二部戒本廣明持二十揵度廣明作持翻二持成兩犯故云止明持犯次為鈔文釋者謂三十篇若通而明之順此一部行事即成持違即成犯若別明者篇聚釋相方軌三篇廣明持犯餘二十七篇廣明作持翻持成犯趣者意趣不越四若據古來但為約律文釋不向鈔中明者非也或有人但約鈔明不許向律本上釋意道本鈔於內明三十篇大綱若就律文上解之似涉他古人將持犯為所詮故今意不然凡論一事皆先案所宗究理搜文莫過持犯蓋是宗中順違之行猶似下文云律宗其唯持犯不可所以持犯為宗何不恐濫所詮耶細而詳之殊無理也請依前文雙申二解方周備故思之言然至外者然是也境通內外者內謂內心外謂外事問境者細約心得名今此內心如何得為境耶答搜玄記中有兩解一約內心相緣亦得為境謂納法在身名為戒體依教防護起不放逸心有無貪等三善行心後起對此不放逸心此三善行心得為境若違教起放逸心使有貪等三毒心後起對此放逸心即此三毒心得名境也放逸不放逸為能起三毒三善為所起能所相因得名為境今詳此解恐與大乘相濫不取今依第二釋約他人內心為我犯境準下持犯篇中自有約心為境如觀許等想染心衣食此即他人心望自己為境如知池善觀滅爭今更發起得提望善觀之心即為我心之境又知他物已許僧回入己得提取彼許僧總即為我所對之境又尼受染心衣食知彼染心與我衣食取得殘取彼染心為此之境已上且釋境通於內若境通外者即煞盜等事衣鉢等事是外境也鈔文既標境通內外解釋之時理須分開先明內境後明外境更有維南及近代繼宗等記並約行人自己心為內者但釋得能持犯心既不以內心為境即違鈔文甚矣今多依茲解迷意云云次則明成業處所言內至違者欲釋此文應先難起上來既云境通內外未審內以何心外以何事為境耶可引鈔釋云內謂行心之結業外謂情事之順違鈔文至此自釋內外字正明成業處也行心者簡識想受三心也前三無記不能成業流至第四行心方能遷流造作結成二持兩犯之業果者宗分通大乘成業極速須四剎那謂心王外別無心所思心王若起定不同時如初剎那識是心王但了總相二起想取像三起受領約此三體是無記未能結業直對第四行方成其業不同有宗心王外別有心所起必同時也前文將他人心為內境至此釋時還須納他人第四行心方結我心持犯業果不得雷同言外謂情事之順違者情事通收情事非情事及情非合事於此三事順三行心違三毒行心成持反之成犯如堀地懷生造房等事於此事上順教成持違則或犯也言但令至也者但謂專但教謂能詮行即所詮循者諸家訓解絶多今準説文訓從也謂教與行相從所行之處將教驗之如鏡照面行既約復須將教驗行故曰相修也始終者且據一期始終説初受時日始四捨為終於中專精不犯即為持也或對隨中一一戒説如殺戒前境是人作杭木想名姑斷命時亦作杭木想為終於中更不轉想既是迷忘不結前犯即為持也餘戒例此言若生至也者辨犯相也生來者創獲戒時從白四教法化生也便起心不學非謂從胎出已名生故律序云從佛戒所生爾乃為真生猶如鴦掘摩如來所記莂鴦掘摩羅此言指鬘本是外道受邪師教令殺千人取指為鬘得羅漢果已損九百九十九人唯少一人遂擬害母佛觀根熟往至其前彼使欲害佛彼云住大沙門淨飯王太子我是鴦堀摩今當稅一指佛告云汝癡人自不住我常住彼問已便覺悟求佛出家波斯匿王尋討擬殺至佛處覔佛言鴦堀摩羅生來未曾造罪王曰此人殺害極多何言未曾犯罪佛言入我法中未曾犯故引此文證前受戒了為生來也於法無聞者既生來止心不學於持犯輕重之法無因會解也義兼福罰者十誦云波離問佛為善心犯不善心犯無記心犯佛言亦有善心犯如新受戒人塔上除草是準此善心義兼福罰為淨塔得福是善懷生得提是罰更有修造惡義兼福罰求利販賣是惡得財造像是善善心得少分福不免違教得罪是罰善惡心為因福與罰是果更有多釋非正不録也今欲科罰等者但驗前所為之事與佛制相應便犯不問事情虗實者事即所作之事人謂能作之人情懷虗之與實並犯淨塔善心為實亦犯販賣惡心為虗故犯有約知有罪為實不知有罪為虗者非解也此通名持犯者結也以一行心對一律藏所攝諸戒等戒行相循行心與犯教相應成犯與持教相應成持今可回文應言此名通持犯謂通説一切戒上心境持犯蓋是方軌篇之大綱也言若結至果者別明也謂結五篇根本正罪窮究諸治罰初篇不肯懺悔須作滅殯治若肯懺作學悔治僧殘有覆先治覆奪三十五事等束其方便如初戒未至根本時有一吉二蘭即成就根本若至果位既攬因成就果即隨順根本義不同他部因成果已更有本時方便言便至濫者示處判之方也量者審量據謂憑據核者研核謂審量所犯之罪憑據所作之事研核取其實情如盜戒審於盜罪憑據盜事研核其人為復如起心為己進步為動物離本處未為作恣心取為作親厚想為作無主想等如是一一窮彼犯人實情方可治罰使不違於理教即詮事理之教也又須審量犯者之情若故心違教年與不學人俱結五篇根本是判重得於理教若學生不可學迷作前事便準境想開之此亦得於理教晈照者分明貌也如上從初起心吉乃至無主想取如此斷割分明可見如日著物分曉故云晈照穢草亂於良田曰蕪濁水濕於清流曰濫若不明輕重如良田為稊稗荒穢水流不分今於教明間免有斯過此別明持犯者亦可回文應言此名別持犯對五篇一一別明如非盜殺等不隨相篇唯此以為大綱上來第六門竟第七門分二初標言第七至意者先明來意謂前五門辨能詮文第六門又辨所詮持犯已知然其引用教文雖多不越化制二教行之宗體分齊混然對所被機有何通局故次辨也釋名者通物曰道以心通達三乘菩提心即是道約修行去聲立名即出家五衆也俗者一日風俗謂隨時改轉不恆故二曰聾俗滯事迷理故三日塵俗為六塵所拘故或可事務煩黷喻似於塵即在家二衆也舊梵云優婆塞此翻為清信男優婆夷引云清信女新梵云塢婆索迦塢婆翻為近索迦云事索是男聲即翻近事男謂五人等戒堪能親近承事苾芻大阿羅漢若云塢婆斯迦斯迦斯是女聲即翻近事女亦受戒品業行清潔堪能承事大苾芻尼阿羅漢故七部者俗二道五部類也通局者化教通制教局意即門下所詮之旨故曰也云云釋中言顯理至二者總標諸教也若總相説者為顯菩提顯涅槃真理之教故云顯理也追機不少故曰多途所以俱舍云牟尼説法蘊數有八十千等若別相説者為人天機顯五戒十善之理為聲聞機顯四諦理為緣覺機顯十二因緣之理為菩薩機顯三聚淨戒之理此顯理教雖則衆多若以情意求之不越化行收之並盡故云大分二也七衆通者取佛出現化儀名為化教局內衆者偏據所行三行目為行教故言一謂至述者通於道俗者標所被機也但泛明因果下約教辨也但者偏局之詞泛者一云不尅定之談也二解訓廣也如儒書云泛愛衆君子運廣愛之心今取後解即廣明因果邪正而行業不可得知勝因生人天惡業墜三途等八萬四千波羅蜜門一切善法為因能獲天人三業等果一切煩惱惡業因即招三途惡業果識達邪正者四諦之法為正二十五諦為邪正見為正六十二見為邪四依為正五邪為邪八支聖道為正撥無因果為邪擇滅涅槃為正冥諦涅槃為邪母緣為宗為正自然為宗為邪篇聚之戒為正雞狗等戒為邪意欲令人識知了達棄耶從正也科其行業等者科分也即分別所行之行分別所作之業如淨名居士入諸淫舍示欲之過等又如無猒足王治國以殺害化人善財生疑執彼善財手示以宮殿百千光明云我得如幻三昧至於蟲蟻尚無殺心况於人也又如婆須密多女示色化等云云只似此土齊梁之時有志公杯渡社順之輩皆逆化於時應迹同凡難為測度雖非化教所明且舉茲為例故顯其來報等者謂報通善惡如經中記諸弟子當來作佛等是善報若明惡報即經云殺生之羅墜於地獄餓鬼畜生受諸苦報等如此善惡二種果報分明曉了易見故云明了易述也言二至𠎝者辨制教功用也毗尼事相非行不成教能詮之故云行教亦云制教以教禁制令斷惡修善故唯局於內衆者明所被機也定其取捨者初出家時身無遮難可以受戒為取反上不得為捨又隨行中二持之行須依為取兩犯之行須離為捨若犯僧殘已下可救名取犯四重罪永棄為捨又治罰中七法名取九法權棄名捨立其綱致者綱喻也如綱如網舉綱目整今立五篇七聚之綱舉二百五十戒網目也顯於持犯者戒戒之下有通別二緣緣具戒持又狂亂等緣不犯等決於疑滯者於言教不了名疑於事羅不通為滯既興廣教持犯自分輕重等文無不顯達即免生疑滯也又如條部文波離以疑事一一問佛佛為割決疑情令無壅也又如戒後下皆有境想四句五句之文皆為決於疑滯也指事曲宣者謂隨指一事委曲宣説如初戒造他境有一人非人畜生就人中有男子黃門二種非畜亦爾成云每境非處有二成十二也又人中有童女婦女二形三種非畜亦爾成九每境非處有三成二十七也兼前十二成四十九對覺境睡眠新死少境四境以論成一百五十六句又配褁隔等四句成六百二十四句並是犯句也若怨逼等緣配六染樂句都成三千七百四十四句並是犯餘戒例爾如此一戒指事一披即知不在再展故云文無重攬之義也結罪明斷者如欲作前事時初起斯業心結遠方便欲取境時名次方便臨成根本時結近方便若對果位結根本更起慶快心又結後心吉隨其作時皆制與罪如此結罪分明斷割故云結罪明斷也事有再科𠎝者且如大僧二百五十戒中若向七文性戒有違於制罪上更有業道都成二重之過故云再科也非謂約枝條不學無知罪以説也言然至矣者縱奪之詞二教即化制也修者説文云行也環者圓也謂二教中皆有淫盜殺妄教文環圓次第不無相濫如化教經論本詮定慧於中亦有明其戒學律藏本詮於戒其中亦有明定慧處罪二教循環相濫今如何簡得令無有濫耶可引鈔通云舉宗以判理自彰矣此文兩解初依順正記云經論化教之中雖明戒律似有濫於行教然正詮定慧為宗縱説律等文亦是兼助故又律文行教之中雖明定慧似濫他化教然律藏正以戒為宗縱有定慧之文亦是兼助今但舉二教正宗收攝傍詮理自彰矣已上記文意謂不然此文是標鈔下句自釋若於標中約正詮傍理以解乍著道理頗至分明然下句鈔文却成無用故取也今依搜玄釋之欲解下文應先問曰上言舉宗似判其理自彰未委舉宗如何甄別可別鈔釋云謂內心違順託理為宗等云云鈔文自釋何勞預解謂化教初心為體以理為宗行教以身口七支為體以事為宗若內心所發善惡未動身口便結其犯即準化教而斷以理為宗理即真如寂靜之理理是心本若起三毒於理有乖便結其犯即依化教也言外用施為等者謂若動身口有所運為造作前事即準行教以判以事為宗謂小乘不制意地發心未犯待作七非方結其罪即準行教此言違順者須即貪違是嗔貪嗔才發便於理有違若違順俱無方順於理體若違理造非成犯順理修善成持即理自彰矣斯為足義言然至罪者約二教辨罪單也意道不準約宗以判二教不同然其結罪亦各差別若違化教只有業道一罪是單違行教者更加違制之𠎝是重平聲言故至明者證也彼經明二人同造一罪輕重如何乃至佛言受戒重不受者輕即業上加制便重單有業罪即輕善生經文彼自廣明今此但引他文為證上來出家之人業道之上更增違制不論餘義也言所以至別者立門意也所以兩字蓋是徵詞更由重也分者判也此文古今有其多解初依搜玄云此徵為躡前善生經文謂前引經文受戒者罪重不受者罪輕彼文已自廣明何用今師於此更重分判故云所以更分者今云不然南山本為分判二教結罪不同故引他經文為證不可躡此證文以興徵意良不可也次準繼宗記云此為徵三十篇也意云向下三十篇對文自引他制二教有何所以於此更分今云搜此以明其文以倒不取也二準法寶云據前諸門以釋謂前已辨能詮教周圓向下諸篇但依二教行事即得何用於此更分判耶已上記文諸方講人皆依此釋余十五年中亦同斯述近詳文勢其義極乖此段鈔意本為重徵前大若言約諸門已棄能詮教已圓者且前諸門但是律文制教並未治敘化教之文鈔既未彰何得此中云所以更分故知不爾今有新理故略明之但據此門以興徵意謂前文略辨二教中於制教科內云事有棄科之𠎝即業罪上更加違制罪反顯化教但有業道無制可違豈非度分根了適又於重單文中云然犯化教但受業道違行教者重增聖制豈不是重分判耶只於此文二教兩度明罪有無莫不文太繁不恐後人疑慮故作段徵之故云所以更分者即引鈔釋云恐迷二教二宗二體差別不知化教以心為體以理為宗令犯化教罪不肯依大乘事懺及大小理懺又恐不知行教以身口七支為體以事為宗犯行教者有違制之𠎝不肯依小乘事懺便云我是大乘不開小教等恐有慈迷故立一門蠲簡辨其二途差別若出家人是五衆者犯身口七非性戒先依行教懺除違制五篇然後依大乘事懺等求除業道之罪故下文云篇聚依教自滅業道任自靜思若犯遮戒但懺違制之𠎝便成清淨如下篇中俱具明通局疑恐迷惑故立此門也上來收科云第七門已竟也第八門分二初標言第至意者先明來意謂上準明二教宗體行業不同然於道中僧尼有別相對行事有異有同前既未明故此當辨釋名者僧存略梵尼是女聲男女位殊故云二部部者類也若同戒同制事法一種曰通或輕重不同有無事缺等為塞意即所詮之旨也釋中言然至詳用者並明通意也同戒者謂初篇四戒二篇七戒三十中十八戒九十中六十九戒一百衆學七戒爭等云云同制者集僧與欲結戒持衣加藥等並僧同制也即情非情等事法即心念對首衆法一百八十四等如此事法相狀並同相字或平聲呼為得若爾何故下篇準明大僧行事不別出尼之儀式鈔答云行用儀式等云云進趣施為謂之行用人法如非謂之儀式同僧法者謂除尼衆篇外餘二十九篇故曰諸門繼宗記云除尼及沙彌篇外二十八篇及諸門者非也言若至相者如尼以僧及俗男為境犯相僧以俗女及尼為境犯相在二衆戒本目明若隱難知者如隨相篇具辨如尼淫處有三以七毒歷之得二十一句等二辨塞意初標云余有約位之戒者謂準尼家不同之戒故下文云今簡取唯別者共為此科等云云言謂至異者列也三種不同一輕重不同如摩觸戒僧犯殘輕尼犯夷重漏失戒僧犯殘重尼犯輕二有無互缺有僧尼無或尼有僧無故云互缺僧有輒教日暮譏教等戒於尼即無尼有言人四獨紡績等戒於僧即無三犯同緣異者如僧尼畜長鉢不説淨皆提是犯同尼但一宿成犯僧開十日是緣異僧尼與外道食皆提是犯同尼與女外道食不犯是緣異已上玄解躬又云與年未滿人受具二衆並犯提是犯同僧即以十七群為緣尼因十八童女是緣異也此解亦通言而至中者簡取盛行難知緣下別立篇同一當世盛行而種相易知或雖種相難知當世不因行者皆止而不釋也及別行衆行等法者別行即七法自行即相攝及八敬等法衆行即受説安恣并懺僧殘須來僧中等皆於尼別行篇具述云云言此但至疏者結略指歸也謂分若干戒僧有尼無若干戒是僧宗類等言由未顯來詮者顯明也來詮有兩釋一搜玄云謂制戒之由能犯人名字犯罪處所僧制呵等如是緣起並未曾彰顯此未成解今依宗記云來詮者即來由意旨前未宣釋即有何由致僧尼互有不同何以犯同其緣復異如此未由意致鈔未論之指有首疏敘述也疏自問云大僧畜鉢何故開十日尼唯一宿答尼制有伴有人對首故僧即反之若爾何以長衣尼𠎝開十日答尼雖有伴容有同活共財之義既俱是財主説淨不成須別待人故開十日鉢唯一口必無共義是以隨得便須説淨此犯同緣異來詮也又僧是上衆故有教尼尼是下衆受僧之教又僧無伴便招嫌疑有二不定尼制有伴涉嫌疑故無不定餘並例此有無互缺之業登也又尼受觸得重為其煩惱垢重既受觸身必作大惡僧若觸境無陵逼過不假染防故犯殘也此輕重不同之來詮如此來由意旨鈔指疏述也上來收科云云第八門已竟第九門分二初標言第至意者先明來意上雖明僧尼行事異同然於二部之下有餘三衆雖則未圓具戒且是內衆所收戒戒下文皆結其犯未委所行三行與僧有何同異前既未明故此辨也釋名下三衆者一沙彌二沙彌尼三式叉尼隨行者即隨中之行共有為同各別為異意即意旨釋中言二衆至十者沙彌是古梵語此云息慈謂息世染之情以慈濟群生故也初入佛法多存俗情故須息惡行慈也若準新梵云㗌囉摩拏路迦此云勤䇿男㗌囉摩拏里迦此云勤䇿女謂此二衆創入佛法須假大僧大尼勤人之所䇿勵故今鈔文存舊梵語故稱沙彌也同大僧無作者謂能領心相所發業體一同大僧具發七支無表以非色非心為體準大小揵度中沙彌得戒具列七支則所發業體同僧也或依俱舍及善生經但發四文身三口一也故彼經云十戒無義語兩舌惡口是義不然我今受持淨口業故俱得七支又智論云佛法貴如實語故以不妄為先自餘通攝不待言及準此亦許發七支故又雜心云並須息緣情非情發故下文云十戒三衆情與非情同大僧發今列十者以非具位且就力分故唯説十雖但説十餘須分學由如大僧但説四重之例又此十戒即為具體故報恩經云由如樹葉春夏青秋黃冬白隨持異故樹葉即不異而始終是一葉故戒亦同然隨時有異也十戒者淫盜殺妄五不飲酒六不華鬘香塗身七不歌儛倡伎故往觀聽八不坐高廣大床九不非時食十不捉錢寶言就至末者辨行同位別也塵沙惡境皆能防護顯無作之體不別即行同也居第五篇者皆結吉羅名居第五篇就位在諸末者戒戒之下皆結云比丘比丘尼波羅夷式叉摩那沙彌沙彌尼突吉羅是謂為犯下篇皆如此並在其未位列言自外至明者行法不同者行謂五德法即十數破外道等并別堂説戒持衣説淨自稱沙彌名等法此與大僧尼全別故曰不同也取捨有異者若供養三寶得開摘花壞生名取反此不得是捨大僧尼無此事故云有異又釋若犯淫盜殺妄滅殯不許受具名捨不同大僧尼懺竟却得入衆若犯餘吉羅得受具名取也各就別篇者僧沙彌尼沙彌尼沙彌與僧沙彌同處亦如沙彌篇若異處如尼衆篇未具辨也二式叉法中言式至發者梵語式叉摩那此翻為學法女且約童女出家年至十八曾受沙彌尼戒為彼集僧令對尼僧乞學法尼僧遙以羯磨被之後召入衆為説六法名字一不得受染心男子摩觸防大淫戒二不盜人四錢防大盜戒三不斷畜生命防大殺戒四不小妄語防大妄語五不得飲酒六不得非時食前四是性後二是遮戒體更不重發者破古也古云六法女於十戒上別發六條戒以由羯磨受故又於六法有犯故今師云不然只於前十戒之內重䇿前六令彼習學戒體更不重發也今以轉根義證知兩戒可發如僧受戒時得比丘戒成就亦現行懸發得尼戒但成就不現行若轉根為尼便是比丘尼不須更受尼戒尼轉根為僧亦爾示今沙彌受戒時發得沙彌戒成就亦現行懸發得沙彌尼戒但成就不現行若轉根為女人當體便是沙彌尼不須更受沙彌戒也若式叉尼轉根為男子但號僧沙彌且不呼為僧式叉明知不別發戒也若準玄記古人受六法時更發得式叉無表體今師云但是舊來沙彌十戒體非謂新納式叉體故云戒體更不重發也準斯所釋其理過分古來亦無此執上已是述云云言自餘至顯者隨戒起行名為隨行同諸三衆者一同比丘二同比丘尼三同沙彌尼已上正義或依諸記中大尼為一沙彌為二沙彌尼為三者非也既受六法時戒體更不重發即自己當體便是沙彌尼何須更列故知無理言必有不同等者謂得與大尼授食自從沙彌尼俗人受食不得與沙彌尼過三夜不得與大尼過三夜等如下篇説之收科之上九門竟第十門分二初標言第至意者先明來意謂前五門辨能詮教第六明所詮旨七八九之三門明二教通局并所被之機意足然未審所引教文為是正翻實録為是人造偽經又鈔之一字因何而興前既未明故次辨也釋名者宗記云鈔者兩字鈔字屬此所於能作之主引用正文即下所用引三藏題目等去濫者即下引偽經名目是傳真者皆是要當之文科酌者科分也酌度也意即門下之旨也釋中初標章云初明引用正經即第一判用正文也次明世中偽説即第二去濫也後明鈔興本意即第三傳真科酌也釋中言僧祇律者先引律部後引餘二從親至踈又於律中先引祇文以是根本故此律是釋法顯後中天竺國天王寺將來晉義熙十四年於揚州道場寺譯四十卷成文若準諸記中對此廣引大集經文又搜玄判此僧祇是大天部律並非正也若引經分部如玄談中自明若言僧祇是大天律者即違鈔文反戒疏廣如別破之也曇無德部此云法藏等四分律鈔所宗故後秦姚興弘始十二年覺明三藏於逍遙園中翻譯六十卷薩婆多部此云一切者即十誦律晉弗若多羅於後弘始六年譯未畢而終後有西國流支與羅什共譯畢五十七卷成部未及刪定廬山遠大師致書與秦主請出江表流行後有卑摩羅叉三藏於壽州名閏寺又譯善誦律四卷添前六十一卷彌沙塞部此云不著有西觀五分律也釋法顯從師子國將來宗景平元年佛陀什於楊州龍光寺釋卷三十迦葉遺部即解脫但有戒本一卷後魏興和二年般若流支於建鄴譯其廣律文梵策雖到未曾翻也婆粗富羅部者全無律本到此今依大集經文合有此部故吏有異該廣如玄談中明次別論名毗尼母論八卷正云失譯方云符蘭譯善見論十八卷躬云前齊武帝永平六年外國祇跋陀羅與此僧𭲆依音譯廣州竹林寺摩得伽論十卷宋元嘉十二年僧伽跋摩於廣陵平等寺譯薩婆多論九卷失譯從論主立名并傳五卷名開西江東師資傳梁僧祐撰毗奈耶律十卷亦名論或號戒因緣經秦耶舍與竺佛念翻譯明了論一卷陳朝真諦譯自出疏四卷五百問法兩卷後秦卑摩羅叉答慧觀法師五百問事也云云出要律儀二十卷梁武帝纂出律中要事以律教開王得聞故言餘衆部者謂二部九部十一部十八部二十部等也言并至律者列餘二藏也雖已列論名是釋律論或宗律論如此方疏鈔無別故入律部攝之今此言二論者但是執計宗途之論非解律者故別標出云云名隨經律者謂隨經論中有解律處故如涅槃中禁斷魚肉八不淨物等又增一經中阿難擊揵捶等並是也據理合云隨律經隨律論等今言隨經律取語順故並具入正鍵者指上所引大乘經論等皆在三寶録中簡非偽濫也費長房者漢時亦有同姓名者但解陰陽術數不間佛法今此是後同時名僧遇武帝毀二教乃依例服儒後至隋文帝登位不更披剃遂於開皇年中撰三寶録一十五卷計三百八紙題云代歷三寶録今續有開元録二十卷智升法師於玄宗朝撰收五千四十八卷至德宗朝更有貞元録四十卷收三藏教文五千四百餘卷今鈔不舉者以當時未有也次列諸師名目情見不同故言異執法聰律師元魏朝人本是僧祇學者因老戒本體元從四分而得遂息唱僧祇創弘四分手披講解未制章疏也道覆律師北齊人聰講出疏六卷釋四分文章疏文始起也光律師北齊定州人姓楊氏年十二隨欠至中嶽遇見佛陀蜜三藏即與受三婦見其目有神光乃度為沙彌執卷攬文由若昔習凡聽經論一遍入神時人號為聖沙彌年滿受具依覆聽律覆雖有疏但科律本未有義章先遂別著疏文十軸解判多事文筆乃披出業師呵之吾本度汝意在修證如何驅驅事世語乎後改疏但作四卷一百二十紙故云二度出疏也理隱樂三師者並北齊人也洪理抄二卷曇隱抄四卷道樂抄四卷云云遵統師者洪遵僧統他綜反相州人也學承暉後年才十臘開闡律宗四遠望風堂盈于計齊主以其德望高遠𥮵授為斷事沙門後制疏八卷大業四年終京興善寺春秋七十有九淵律師者洪淵學承遵後有未詳卷數也雲暉願三師者並光之門人也道雲兼是光學士依承製疏九卷抄一卷道暉略雲所制別為疏七卷法願隨并州大興國寺製疏十卷是非抄二卷洪勝二師者道洪相州人學承雲後法勝皆出抄未群多少也首律師者鈔主受戒和尚兼承稟姓皇甫氏安定人玄晏先生之後初投相州雲門寺智旻和上出家受具之時於佛塔前諸祈顯證感得佛降摩頂身心安恭方知感戒初聽洪律師講七百從侶莫後超論唐初詔入京勑住東禪定寺貞觀八年勑量弘福寺今崇先是製疏二十卷五部區分抄二十卷貞觀九年四月二十三日終礪律師者法礪也即相疏主姓學氏本趙郡人因官遂住相州出家於日光寺依靈裕律師受具依洪學律唐武德六年製疏十卷附往京崇福寺西塔院與道誠律師講因號西塔疏等云云貞觀九年十月終於日光寺春秋六十有七基律師者未詳氏族并所述卷軸也言已外下結餘未盡之者曇瑗者陳朝金陵人也初講十誦後學四分也僧祐者鈔主第二生也梁朝人姓俞氏住金陵鍾山定林寺初學十誦後學四分著述不少天監七年終靈祐者隋朝相州演空寺姓趙氏定人年登七歲便欲出家父母不許喟然嘆曰七歲不得出家一生壞矣年至十五壞火畢辭母往趙郡應學寺寶禪師處求受度受具已後學通律藏製疏五卷至後周武帝時隨例服儒隋文帝時却仍緇位大業元年終演空寺餘不具録已下等者約處明之江表即東西兩浙開內即同業等州長安城也江南即號州洛州緇青等是蜀部即神錦部類數州敘南三川等云云一如義鈔者指略也即集義鈔亦是鈔主製三卷成軸未容傳寫被海東僧擅將去後重造羯磨疏贊處具如彼述云云次明世中偽經者人造不真曰偽以非實録故也若依搜玄作四句分別一偽經二失譯三疑偽四正譯今云此一句是偽經既非失疑何勞更立句法云云如是等人造經論總五百四十餘卷者舉都數也非謂現定鈔中有如許卷代代漸出等者顯非一時頓起故多附世情者謂多分帶附今時隨方世俗之情全不開於聖旨故隋朝久已焚除者於長房録不收者集向尚書者前一時焚藝也愚藂猶自濫用者蓋是其時收捨不盡者猶有無知之輩濫引用之也問因何得知是偽經答夫言翻譯皆有時氏及三藏同譯人從衆執筆回文及置大使并本判官譯訖開奏勸許流行方入目録所載便知是偽也且述與律相應者謂前來鈔文中所列題目與律相濫恐人疑誤錯引用之故偏於文中順列若不與律相應之偽經既無人引用故去不列也三明鈔興本意者諸記皆問云前發記序已并作鈔之意竟今何更明答前但通明制作一部文之大意謂攬前修疏抄不濟時宜遂發情壞而興著述然未委此一部之文名之曰鈔鈔之一字因何而興又據何文裁量聖旨故次辨已釋中言夫至也者總略明也固者實也令者使也謂實依佛語使我芟除條虬抄纂要詞撮略正文直顯其義此即刪繁意也包括諸意者包者含也羅也覽也括者攝也撿也若於當部不足即包覽收攝要當之成文斯三軸行事同足此即補問意也準上所明鈔者且是略義也言餘至論者謙詞也余我也智謂情智也螢者書云腐草化為螢也耀者照耀謂佛之智喻如日光無幽不燭菩薩智如月光聲聞智如星光凡夫智如螢光自身照尚不周豈能燭物鈔主意云我既是凡夫便同螢耀此謙智淺也量實踈庸者量謂器量心遊理外曰踈也庸常也下小人之稱故輕陵也悔慢也猷法也言教也豈敢將螢燭之智踈庸之量裁剸當部聖言包羅三藏教法舉動施為便成輕陵悔弄涉於謗讟故曰動成戲論諸家皆引智論中四謗之義夫一切法不可定執言無是損減若定執言有是增益謗亦無相違謗非有無戲論謗鈔主意道我今智淺量微刪略聖言動成謗法故略舉後一戲論謗名也佛所説法離於四謗説有非增益如言圓成萬德是有故説無非損減如説遍計我人是無故亦無非相違如説乳中酪性遇緣攢得即有不遇緣説無非有非無不成戲論如説煩惱於佛身中非有於凡夫身內非無又涅槃於佛已證故非無凡夫不得故非有今師著述倣此亦離四謗當部繁處刪除非損減常部無文取他部補闕非增益凡所引用皆是義執相開非相違緩急重輕不取非戲論也言雖然至本者結歸宗本引用有憑雖然者縱奪之詞地意道智淺識徵淺不合裁量聖教恐成戲論且縱也然其習學皆有所永今刪剪聖言不名戲論奪也所承者謂鈔主稟承大疏主習學茲律二十來遍固非道聽途説無其師授也承必知本者此四分無從大毗尼藏中來原其律中許不具説文句即是刪繁本意不名戲論也言每所至證者正明刪繁意也每所引用者謂二十九篇凡所引用本宗之教先加覆撿者於四分律本親自披尋覆其虗實如欲制受戒篇先先覆撿受戒揵度諸篇並例此覆檢諸犍度於一事之廢立意多者謂隨對所行事揵度之內多有廢典今且約受戒法中具明便有五受十受廢立之意餘篇例此説之云云諸師所存情見繁廣者古人皆依律制疏次第解釋律文既繁章疏亦廣今並刪略者今師制受戒篇唯論羯磨一受餘四皆略不明一事既然諸篇例此同問若於當部刪除繁處但略取要當之文或依此行事未周何成追機之益鈔答云止存文證此句正生下補闕之意也只如羯磨受戒但依四分行事未周即須廣引諸部教之證成令行事周足已上依繼宗記解雖不平書記本但略彼大意云云消之妙得其原可為承稟不同搜玄引三師之義等言及教至顯者辨教通餘論指別所明也如明戒體通成多二論鈔準依成宗出體多論不是崇承即名餘論又如四果四諦十二因緣等通俱舍婆沙論亦名餘論理相難知者如多宗以色為體六門分別四果修證小乘五位十二因緣起須明三世因果如斯等義若非通明教相難可究窮必若於此廣明恐新學之人未學並指如義鈔後別著兩疏彼置章門以辨也問前總序後段中云若思不瞻於時事固有闕於行詮則略標指趣以廣於後謂許後別為撰文即羯磨等今此又云教通餘論乃至指如義抄兩處文勢如何會通有人云前約總以論後據別以説者未成解也今云前序中但約當宗事相如羯磨七非十三章門處量輕重等例雖是事相恐新學神思未周故於鈔中略明若廣説即如疏并輕重儀説今此約外部論中法相道理難知通解者方究其文新學之人何能曉了故指如義鈔今羯磨疏文廣辨兩處文勢似同理事自他殊異思之次明補闕意言而抄至意者謂前刪除當部繁文之外但依四分行事未周不可拱手而休須引他文補闕然其引用不書盡起之文但取的當之言回改文詞令人易會兼又與四分相應𡞞少而引故云但取文義堪來入宗等其外間文則不全取故云非鈔者之意如標宗中引地持三十二相無差別因皆持戒所感此但為證成戒德故略引證若子細而明彼中無為何事而有斯文又為對治何等説時何人獲益此即是不盡之文也又如集中云阿難升講堂擊犍捶此是如來信鼓等引此文者但為證成比丘亦許打鐘若委細論未審其時有何法事而升講堂擊犍捶等非鈔意下篇凡引外部文處皆為證事並同前解云云言故至之者引律證也準律説戒法中諸比丘因節會受請欲為他説法裁量文句不敢自專以事白佛佛許不具説文句等又準母論亦有斯文彼云諸比丘問佛云若説法時從修多羅乃至優婆提舍隨意所説十二部經欲示此義復有疑心若次第説文恐生疲猒欲抄撰要言妙詞直説不知如何佛言皆得以斯文證並是佛聽故也言庶至福者明鈔之所為也庶者説文云冀也冀訓望也臨機者臨前生善滅惡等機披文便明不要咨請訪問他人也即事即行者即對前集僧簡衆等事便可施行不疑被事成不成之罪福此即利用義也言猶至矣者遮詮不急之文也謂述此一部之文繁處須繁為是當今要用略處須略蓋當世不行猶恐後人見鈔略處不知非急不明便添間詞以安文內如善來之例等即致此鈔之文非所要也真宗蕪穢者此鈔堪為濟世行事號曰真宗若加不急之詞如野草混於良田名蕪穢也行者致迷者行持修行去聲之者生迷云若是疏又不見解律文若是鈔又不合有間繁之説由茲疑惑也鳥鼠之喻等者佛藏經中本喻破戒比丘蝙蝠身有翅口有齒能飛騰解入穴有人捕鳥時便入穴便云是鼠口有齒故有捉鼠便飛空去是鳥有翅故非鼠又非鳥不似一物故破戒之人形貌同僧行業如俗猶同鳥鼠故本文雖爾今但喻鈔非開惡比丘故茲此也存在也隨彼加添之日便成鳥鼠之喻也上釋十門義也次都結言此至論者通收前來十門故曰十條總束諸門者三十篇為諸門也十門是能收束三十篇是所收束例科分折者類例也分別也辨折也十門是能分折十門是所分折三十篇中不越此十條大意皆盡也若攬收不盡等者諸記相承皆謂此十門為大綱篇篇皆具十意如網諸篇行事如網目若於十門收不盡者非其大綱在下諸篇自述即諸篇首皆總意既隨篇各別非此所明故云自下別論也古今皆依此諸自是一途或依湖州仲平座言科此兩句生起三行之意謂上兩句結上十門明攬收下三十篇大意將盡然於十條中攬收一部鈔文雖詮三行未盡未約三行判文故此兩句生起今意存斯解妙得其原思之第二舉三行判宗初言夫宅至位者今師制作文同鈞鎖結引萬端義等聯還始終不絶十門既畢生下正示行事之文故有有此段又總序後約行分文今據所詮時卷判行能所條別更有妄解不録問總序後排衆行為先今此將自行在先何故不定答前約能詮教以分謂能秉法僧欲行持佛法先須集僧簡衆等故衆行居初今約行詮行以分須自行精潔方堪秉御故自行居首二處所列各有意也夫者如常説宅者居也身者形也佛者覺也海是喻也世海浩渺深廣大小衆生共居佛海覺池深廣大小賢聖同供止住故餐味流者餐噉也味者滋味法者十二分教解脫之法能軌生物解故經云法喜禪悅食解脫味為漿等形廁僧伍者形者身形廁者居也次者入也僧衆也伍者行伍也上言宅佛海是佛寶也餐昧法流是法寶也形廁僧伍是僧寶也才受具後便具三寶之義今身所行之行列上亦三故曰行唯三位也意顯此三行準三寶義立遵仰正戒者謂篇聚及懺篇識達持犯即隨相及方軌篇體謂戒體相謂犯不犯相具在四篇故云具矣自行既成者結前外德彰用者生後衆行謂前明戒既清淨復識持犯即自行已成德相外彰堪秉持教法辨於衆務須依上卷一十二篇廣衆行為綱為領即四現前如網之綱如裘之領乃徑整一切衆務也自他兩德成相多途者一解云如下二衣四藥中持衣加藥是對首法或要受持衣藥須得他人來成於我謂前人既是淨行足得我對首之數是他有德故云他德又他要持衣等須我成他我行既淨堪足他對首之數故名自德二解云他來成我自行名自德我往成他自行名他德今云衣藥可爾如頭陀及諸行不假他成既聞彼此相成之義如何辨自他兩德已上兩釋俱非不取今依玄記正解上句是躡前下句是生後也謂中卷是自德上卷是他德此躡前文也次生後共行云成相多途意道上中兩行説事未盡更須得共行以辨故曰多途如持衣如藥説淨攝衣攝食十二頭陀受三歸五八戒等並是前二行中説未盡處此中明之在文端直如裘之毛如網之目攬之自顯通收三行方為盡矣言此至委者結三收以文無文不委三千威儀八萬細行雖多但將此三行收之皆盡三卷既明三行義即三卷通明萬行義亦盡也言然至疑者然則兩字含進退兩意也謂約三行分成三卷若令三行不離即難故更明也事類相投更難量擬者事謂謂衆自共三行之事也類者流類投者尋若將衆行流類投寄上卷自行流類投寄中卷共行流類投寄下卷此難更甚於前故曰更難量擬量者斟量擬者比擬問如何是難分之相答若單分三行配於三卷即亦不難今蓋為三卷諸篇之中各有參雜致不易也且如上卷本是衆行唯四人已上之法號為衆行今標宗中辨法體行相四門受戒中有六念等法即是自行義又羯磨中明對首即共行義心念法又是自行義豈非衆行中亦有自共二行相雜又中卷中本是自行其間明造房乞白二反違諫白四等是衆行義對首懺吉作餘食法捨請白入衆聚落等是共行義豈非中卷自行中亦有衆共二行相雜又下卷本是共行其間結衣食界是衆行義心念持衣説淨十二頭陀五觀等是自行義豈非下卷共行中亦有衆自二行相雜今若科分斟量比擬實當不易故曰更當量擬前惣序後明立篇目難此約將卷判行極難也言若長至碎者應先問云若每卷之中皆有三行相混雜者處判誠難今但約三卷收三行通途解釋得不可引鈔答云若長途等云云意道若通途辨於行事者隨於一行之中卒難尋撿故云寄於討論更問若爾但向三卷文中凡有衆自共三行處逐行延科出得不鈔答云必隨相等云云意道若存篇題不以三行分判隨有衆自共處璩名科出者即每卷之中三行却成雜亂故云過在繁碎更問上言長途而已恐披撿者難欲隨相曲分復成繁碎兩種既並非如何即是言今至依者鈔答通也結上所分之意用簡上非二之等宜約略者謂隨前事宜前十二篇隨明衆務之事宜應判此上卷一十二篇文為衆行中之四篇隨明戒體持犯之相宜應判此中卷四篇為自行下之一十四篇隨明機要之務宜應判此下卷十四篇為共行故云隨宜約略通結指歸者謂通結前上卷十二篇指歸衆行其間雖有自共兩行隨增勝説衆行既多且判歸衆行通結中卷四篇指歸自行其間縱有衆共二行亦從多而判且指歸自行通結下卷十四篇指歸共行其間縱有衆自二行亦從多判且指歸共行故云通結指歸使舉領提綱等者古以毛為裘毛附於領舉領則毛端古以綱持網提綱則目整今以上卷衆行為綱為領中卷內凡有明衆行處如毛如目又中卷自行為綱上下二卷內凡有明於自行處如毛如目又下卷共行為綱為上中二卷內凡有明共行處如毛如目今但舉上卷衆行之綱領中下二卷所有衆行之文毛目自然端整皆屬上卷衆行攝也餘二皆倒此説之云云若不依此解者即成繁亂載舒載覽等者載者終也舒者展也攬者披攬也謂四時事終可以載於簡或可十億曰載大數之終意令後人從卷始迄于卷終舒展披攬故若依毛詩載者則舒攬隨有前事隨撿依行也上來收科云云惣當十門別序已竟四分律南山行事鈔記卷第二吳越天長寺大德賜紫志貞丁巳歲記吳越國真身寺傳律沙門靖安照遠丁巳歲記
