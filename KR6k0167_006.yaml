body:
  text: 吳越國長講律臨壇賜紫清涼大師纂第五羯磨篇大分為二初牒名二釋初云羯磨至五者先辨來意已上四篇明能秉之僧既彰所秉之法未練然於羯磨非相難分剛骨混然緣本相濫若不細辨何得委知故製此篇以呈無或心釋文名者通辨二字亦是旁破古非古人云單白白四即名羯磨對首心念別人所秉不名羯磨今云始從心念終乎白四俱名羯磨此中總収一百八十四法如非之相故云通辨也羯磨二字翻譯解判如下自述或有本中有相字即相狀也篇者章品嘉名第五者次前之數也注文云明了論疏翻方為業者謂真諦疏中正翻為業即是業聚相應夅處業聚者即羯磨法聚也所作是業等者即約羯磨所辨前事故名為業亦可義翻為所作反解上來業也猶似盡人以盡為業則以筆墨五彩填治方可成就於本業今此亦然須得人僧界等離非就如所作成就方可成於僧家所作之業故將所作解其業用問既云羯磨翻為業者此何不言業篇耶答業字有濫故存梵名謂世間作業不出四種一士二農三工四商謂有官官者曰士耕犂鋤褥者曰農巧藝者曰工典販者曰商已上四種皆云為業今標業名即濫上諸云俗業鏡水亦可恐生俗疑將謂沙門由有業也即濫他三途惡業故存梵語亦生善也百論等者准此論中一向呼為事也若約義求翻為辨事者此由是古人解也何以得知故羯磨疏云自古至今翻為辨事今師承上語勢下遂解云施造遂法必有成濟之功焉謂此羯磨疏能辨生善滅惡之事施設造作必有成就達濟之功能也釋中總意云僧至聞者僧為秉御之人此句屬人也觀其文勢亦似結前意也秉法制御也所統其唯羯磨者屬法也似生起下文之意統由通也其准二字偏局之譚方能枝群述之重累者方由則也拔者濟拔也群述即一切有情之類也皆善作惡名為述也重累者重字玄記平呼謂業道上更加違制之罪累故云重累法寶上聲呼謂初篇四重無間之𠎝此羯磨法能拔故羯磨疏云滅惡之大勿過懺重若不洗過生報便招由茲羯磨拔濟也二解俱正出界分之深根者界者三界分者分齊欲色無色煩惱輕重多少不同名為界分皆由三毒為本曰深根今出家之人受戒之後依戒修行翻三毒成三善離於界繫皆由羯磨之力故云出界云云德寔無涯者謂羯磨有出生死之德寔由實也此德遍於法界故曰無涯一者困時無涯等虗空遍法界情非二境皆發得戒四智菩薩法身成就一一之相與虗空等二果時無涯量同太虗共佛齊位也威難與大者如國王之威最大放赦能除現世之𠎝無間之業佛不能救羯磨懺除能令九百二十一億六十千歲阿鼻地獄苦報欲然清淨如是威故難與大也而世尊栖光等者既由已也栖息也如鳥暮宿於林日栖栖字從木木上能栖今從手者非也欲明如來晦跡雙林息身智之光將二千載故云既久也謂佛雖滅遺法尚在可得而聞故涅槃經云如來於雙樹間入大寂定眾不見故唯有三藏教法遠流末𧜟猶可得聞也云但至焉者上二句標身心非下兩句辨行失但為二字偏局之詞陶者患也染習也俗風者名利五塵之景也情流鄙薄者情壞也流浪也鄙嗇所力交受也薄淡也謂身喜陶染名利俗風懷情之中於佛法多愛淡薄也言成瓦礫者碎石曰礫發言無准不生貴重教法之心喻同瓦礫妄參真淨之文者作白如白日真不容七非石淨今以瓦礫之言妄秉真淨之教也行乃塵庸者塵染庸常與俗同業虗沾在三之故者古記云君父師為三也玄云和上戒師教授師為三也已上二說初釋太疎次解太局今依法寶約三寶為三上既云行乃塵庸虗沽在三寶之中占他一僧寶之數也致使羯磨之教無辨事之功此事白然不成故在納非之科目並由人法等者人不學戒律是人無宗不依三行於束身口七支是人無轄不依羯磨綱骨是法無宗顛倒增減文句秉之是法轄人之與法得失不分事之成不混同一致故同歸焉云故律云乃至學者引文證也文有二初證非二勸學初文四分五十七云時佛告諸比丘汝等諦聽若比丘說相似文句違法毗尼此比丘令多人不得利益作諸苦業以滅正法若比丘隨順文句勿令增減違法毗丘尼當如是學諸比丘聞歡喜受持上律文多見人破句讀文失於義味今重標舉鈔云若作羯磨此都舉起不如白法作白一句不如羯磨法作羯磨二句違法毗尼者有人云須知此段具二毗尼作白不如白作羯磨不如羯磨此違毗尼漸漸令戒毀壞以滅正法此是違法毗尼也當如是學者結勸也云雖至非法者欲釋此文先且准起云前足數法中僧通真偽真者本分成法偽者體非但約相淨不知亦得成法今法莫不例人通於真偽已不鈔答云雖復等是也亦由似也似一字便是非法不論知與不知冥然被事不就鏡水大德云不但脫一字即成濫非或呼喚不真亦名非法也如剛骨中初句聽字本合去聲呼是此舉耳勑聽即耳識家所得次句聽字理合乎呼謂聽許所作之事即意識所得今若呼召乖違亦成非法思之云今至式者今欲尅剪浮言玄云今欲尅定剛骨之教剪截增減浮言法寶云不爾謂古人每於一番羯磨皆辨七非是浮言也發揚聖教者謂今師隨順文句如白作白即是發揚聖教統辨進不者統由通也通辨一百八十四番羯磨由漸總具十門故云統辨具十為進不具十為不總識科分者約四現前說也謂法事人界將一人法字収一切法將一事字攝一切事將一今人字攝一切人將一今界字攝一切界故云總識科分也後有事條案文准式者玄云若約法下竪則三橫則八就緣約相一百八十四並名為法人界事倒然如是事條則是後有及七非并一一牒羯磨而解皆按律文故云准式已上記文鏡水大德不許此解謂本來立篇意却向律文上說全不相當今云後有事條者南山既𠜂剪古人浮濫之言尅定律文真淨剛骨先列十緣次明四現前并曲解羯磨後作三法科簡記已後或有所被事條起來但按此一篇鈔文以為大途準繩法式須怙抄文釋義不開他律文之事舉例由如受戒篇總意云至機依准相似可以思之開章中云就至磨者列科但讀文過未勞解說也云初至門者謂於具緣門中故云初中統明羯磨由漸者通明一百八十四法想有由漸有人除心念對首外說通明者非也且分十門者舉數也云一法至定者古來無此緣何以得知故羯磨疏云諸家皆略此緣律制稱量豈專壇立法不孤起成必在緣故前標舉思擇是非故云搆量前事如秤稱雜物斗量五糓之類斯皆是審定之義今此亦然也問所為之事未審有幾種耶鈔文答云事則有三種即人法事也人謂受戒懺罪者羯磨疏云然雖所受法應是法収但此法起時依人故從能受者立號法謂說戒自恣者羯磨疏云然說恣等非淨不預理在為人僧別通行遵教法故專在法也事謂地衣等者羯磨疏云地即結界淨地等衣即受功德衣結攝衣界雖人法事三種不同皆是稱量前事或具或單乍離乍合者諸記解判取意不同繁而不緣今依搜玄正解或者不定之譚謂人法事三一序皆作名或具三中但作一名單乍者忽也若准羯磨疏云時離時合准就懺罪中解同篇合懺名時合別懺名時離且具中乍離者三中各作一也乍合者三中各作多也單中乍離者一中只作一乍合者一中自作多如結界是事於此事中結多種界是必先早陳是非須定者欲作上來諸事早須陳情要思擇審定故也准此今時凡有一種事緣起來先須早送牋疏不得臨時忩連一者屬於輕怠教法二又臨事多述今師時立一緣意在於此也知之云二約處乃至事者唯結界一法者據理合有七種結界皆於自然處起何故文中但言一法耶寶云界雖有七莫非俱是一類自然地上結作之者故云一法所言七法者人法二同法食二同食同法別戒場三小界成七也此七總是一種流類也餘之羯磨等者除此七外曰餘並須作法界上秉宣自然弱故不合云三至等者方軌法則也敫座謂鋪陳床蓐打相即作鳴鍾等量僧多少觀時制度明打頞不定之徒並如第二篇已說了云四至者劣進止者如眾法說戒四人為進三人為止乃至出罪二十人為進十人為止簡德優劣者如教授尼具十德為優多此為劣如差懺謝白衣具八德是優多此為劣自恣及舉罪須具五德為優不具為劣等云至五說者文有二初和眾之儀二示知同列之相初文詞句如鈔中云云此是告約之詞然其上座但依位坐如此陳告有人行事或因說戒前別有受日等事便從本位起立陳詞者不知教相也須知等者此眾中上座和僧了眾僧嘿然即作前事若有呵舉即不得作此是別眾現前得呵人呵人非所攝如前別眾法附中明明云六至說者文亦二意初約沙彌聞鐘一時隨僧集秉法人遣時依次出若念戒至明人能護戒即依前集來也餘有已下約大僧說既許預於法席然須六十法簡言如是數篇說也云七至列者究緣是非者謂窮究前緣三寶等正緣為是非法破戒等緣為非也成不者遇緣不說得成有准不往僧所不論僧中知與不知並皆不得為不並如第四篇說也云八至令者陳本意者謂元其所為之事也作乞詞者是本意也如今受戒有其乞詞等者等取餘三皆本意也二違心立治等者如呵責揵度中與呵責等羯磨違前心故則無乞詞作舉者僧中德人言某甲比丘犯罪作憶念者謂某處某時共某人作某罪等令他追憶往事故名憶念證知者要須知法智人證正其罪證據前人令彼心中不緣別犯狂等無心不能領法舉至僧中為作證正三僧剏立法等者即結界唱相即是陳意四常等者半月誦戒秉白即是陳意已上四種初乞二舉三竪標曰告令並陳本意也就四中前二為別後二為僧云九至之者羯磨疏云大眾詳集言必有由和告之情義須顯也云十至也者必雙牒事法者然布薩誡說戒唯是羯磨所被事也羯磨是法磨須答云說戒羯磨然答有通別玄記對此引羯磨疏云或一事多得法為別如受戒等三白一羯磨各問答或多事一答為通如捨墮也或多事別若為別如犯多墮各懺者或是一事一答為通如受戒一也約人眾多約法有四清足一答終盡夜分並得成就或累事總答如一席上欲作多法應即答云稱衣羯磨攝食羯磨雖一時答後歷別作理亦無妨自餘行事一答作一可以准知云上來至法者總被一切作羯磨者指上所列十緣總通也通被一切羯磨所言一切者玄云約僧法一百三十四法即具此十緣為一切也若依江西通収對首心念都一百八十四法以說今取此解為正或具九緣等者如結界無與欲受日差造無乞詞但俱九也如是例准可知廣如別法者指羯磨疏云一百八十四法皆須具十適來文中或具九緣猶半依古義也今依天台所稟若依今師總具十者如結界雖無欲詞或至此時秉法者亦須問云結解不許傳欲僧盡標盡界集不將此替之亦成十也又受日雖無乞詞上座或因說戒前待戒師索欲了且約勒令住遂告彼云某甲請日何不起來此亦當去聲乞詞豈非成十餘例准也外難僧法羯磨具十不疑只如心念對首如何得具答亦得具十今且舉發露一法一座上發露諸罪事可不二須知處所通一切處三須知法則觀時進不四須集僧唯一人作五須知和合身口意和六須知簡眾不對餘眾我自足七須知悕須發露之事八陳本意九心問十答發露既爾餘並類同乃至對首何為不具並如疏中故云廣如別法不同玄記指羯磨疏彼以五門料簡一相攝二有無三先後四成壞五廢立不應道理知之云二至壞者所言立法通局者總論四種通局也謂法事界人也初約法者寶云如眾法無人時許對首心念名通有人時不得名局二約事者寶云如呵責須作呵責是通不許互作名局此情事也二房無妨難二處是通者有不聽名局此非情事人病衣重許離是通互缺不聽是局此情非令事也玄云人病衣重必兩具情非情為通自餘不得合明即事局不云三約界者寶云作法界秉得心念對首僧法是通於上重結大界及戒場不得是局自然界唯作心念對首及結大界戒場是通自餘不得是局玄記云作法界通秉三法是界通自然唯秉對首心念是界局准此但各據一面以釋不正四約人者四人辨一切羯磨是通就事用人不同都有七種差別是局也初明相攝分齊者謂將適來法事人界四名通収一切故云相捧分齊至解釋中更分為二先說相捧次說分齊初就法上說者夫言法有多種竪則有三心念對首眾法橫則有八但心念眾法心念但對首眾法對首單白白二白四就緣約相一百八十四法至多今總捧歸一今法字之下故云相捧也分齊者心念非對首對首非眾法但心念非對首心念非眾法心念但對首非眾法對首非單白云云非白二非白四就緣約相一百八十四一一互不相通故云分齊也二就事者凡有事多種竪則有三情非情情非合事橫則有八但心念事對首心念事眾法心念事但對首事眾法對首事單白事白二事白四事就緣約相一百八十四事至多今總捧歸一个事字之下故云相捧也分齊者各不相通為分齊也三約人者人有多種竪則有二一別二僧橫則有三一一人僧二眾多人僧三僧僧就事別明則有七種始從一人終至二十總捧歸一个人字之下故名相攝分齊者一人非二人二人非三人等乃至二十人各不相通號為分齊四就界者界有多種竪則有二一自然二作法橫則有七自然中有四聚落蘭若道行水界作法中有三人大界戒場三小界就緣約相則有十三作法有七戒一場二人法二同三法食二同四法同食別五受戒小界六說戒小界七自恣小界自然有六一可分別聚落二不可分別三無難蘭若四有難五道行六水界今據總攝歸一个界字之下故名相攝也分齊者各不相通如前例解已上釋相捧分齊也竟二別舉成壞者謂法不孤起終須四緣隨義明非不過七種成壞如下廣述此未繁敘次開科云就至解者標列也云第至位者若展開則多今大約分三位故云且也云三名者標也謂心念對首眾法據理合列製作慮繁故略標不列也云心念者欲釋其義且標名目釋中云事至事者事微小者釋但心念也謂六念懺輕吉是也或界無人等者相從通解眾法及對首二種心念也如說恣本是眾法今無僧唯獨己亦須心如持衣說淨本是對首今無人可對亦開心念也令自行成等者謂令比丘自己之行成就免有違教諸罪如生故云無犯戒事也發心等者且先難起上來既云心念應是內心生念不在口言今時或有口陳莫不違於教不可引鈔答云云竟云發在內心明記前境仍須口自傳於內情令耳聽聞非謂全不法言但意生念名心念也云毗尼至不成者證上文也說不分明尚乃作法不成豈況一向不說云言至也者解對首也謂非心念之緣者不是心念微小之事緣得二人相對作法即釋但對首義也及界無僧並令對首者謂相從釋眾法對首也如說恣本是僧法今只有二人亦須作法即成眾法對首此通二三人者二人無眾法對首三人是眾法展轉對首或至四人或者小定也諸多法事四人即成僧若自恣由是展轉對首一人五德三人非僧如下說者明人中說也或有指自恣篇中說謂各共面對等者釋對首之得名也先難云何名對首可引文釋也兩人名各同作一法名者要須對面表背不成故也若據古來解云二人合掌相對故云對首若爾應合作手足之字也思之云眾至法者解眾法可委云上至八種上句結前下句生後謂心念有三對首有二眾法有三可解若准羯磨疏於對首法中更開小眾即云人謂懺蘭等云言至念者但心念者標也准得自說有人亦成者釋名也數列𦭨者舉事列數名目也羯磨疏云事既恒須數則勞擾故開獨秉不假他成上疏文因有人問五觀既是心念法得入此別人羯磨數不准南贊座主云亦得入心念羯磨攝大德云非也夫羯磨須自耳聞如六念者等說不明了由成非法今五觀但是一期觀行方法如利根人喫食口口作念着衣着着作念豈要口中陳詞耳聽開等此但呼為心念觀行之法實非羯磨之數云二至也者拘釋名中應先問四既稱心念何得復言對首抄云謂本是對首也故羯磨疏云本唯對首未開心念從本為名故云對首心念且列已下顯數也如文云三至衣者初釋名中亦應問起既稱心念何復言眾法抄云謂本是已下釋也羯磨疏云雖是僧秉通濟別人恐濫餘法還須依宗故云眾法心念舉事中外部受得施者十誦二十八云有一比丘春白一處住多得現前僧分應分物作是念得僧可分物我今一人非僧是衣物應云何受佛言有此因緣應心生口言是衣物僧所得應分今屬我我護我受用如是作念是名羯磨餘比丘來不得與若不如是說不應受苦受得吉應共餘比丘分若二比丘作展轉分乃至三四人亦爾及亡人衣者僧祇第三云有受寄比丘隨道行見異比丘從前程來便問云汝何處來彼云某處來彼又問識某比丘不彼云識又問平安不彼云已死此衣物屬現前者若受寄比丘知法當作念言何為與是比丘遂哩捨異比丘去離見聞處即心念受受已是比丘作念故得越毗尼即有四并前十四種也云二至首者標列可知云初至爾者界謂作法自然皆無別處故羯磨疏云事局中下不勞僧眾苦情引證便成作業總依諸部有二十九者受三十捨三祇受捨十坐具受捨准見於不合淨施安加受之百一受捨十捨請捨戒依止盋藥衣說淨四分受藥義加受七日十安居乃至自發露四分捨行白行十白僧殘諸行五白入聚落尼白入僧寺祗尼教授作殘食法四問鈔標二十九據列數有三十三十一或有二十八何不定耶答玄云各有意致若二十八者謂約二部同相者說便除尼白入僧等寺尼請教授餘食法故二十八若二十九者除尼白入僧寺及教授若三十者即合白僧殘諸行法及白行行法為一故三十也若三十一者更加二尼名為溢位二眾通論成三十一上標二十九且據僧言下列三十一者約尼合辨問白僧殘諸行法與白行行法何別答相同時別也餘不繁述更有記中和會前來二十九三十一者謂除安加坐具受捨即二十九并此即三十一恐少道理云二至中者羯磨疏云本是僧秉別人非分道在兼濟故通於對有則對多無則對少眾法對首合有此一今鈔此處無至後明二三人中須向邊人是斯義也已上三十五加捨墮三十六通前心念十四成五十也云次至三者羯磨疏云就眾法中離成三相者若據和白處齊前事得遂義則不分但以僧情難一事分大小隨務裁法故開三品云一至四者單白中事輕小者如捨墮諸白出功德衣及行鉢等或常所行者說恣是也嚴制者如蘭陀身口二綺惱僧用舊持新等白僧嚴制違犯提也又斷事遣不誦戒毗尼者出總是嚴制也一說告僧便成法事者事既非重不勞再告只要一白也次釋白二中由事參涉者參雜也涉謂開涉謂參雜單白開涉羯磨疏云若非常務情和稍難如受日差遣處分結界故須一白牒事陳情一羯磨量其可不等彼釋白四中事通大小者寶云如受懺治舉諸諫等利大諫習近諫勒習近等則小情容乖訛舛謬也受懺是順情呵諫是違情此約事說乖舛若約僧受戒是大事可責通大小或有許不許等是僧情乖舛故須白四恒記約一羯磨所被事中自含大小如受戒一事十三難是大事障戒不生十六遮是小則不障戒事既含大小故須一白告僧三法良可故白四也此解甚非不勞斥破云若至法者略言如此者玄引羯磨疏云僧法羯磨略有一百三十四者總舉也非謂捧盡也更張由有者羯磨疏云有人細尋更加十法又出僧尼互不同法及同事者歷數為二百六十一若隨相顯法亘同事境不可收盡也或有云分兩衣分結闍尼蒲闍尼等羯磨未敢仰也若通前二者心念對首二也三種心念都有十四二種對首并加小眾懺隨一有三十六都五十并前一百三十四豈非一百八十四法問答除妨中云問至一者問意者謂大約常聞有百一羯磨何以得知准伽論云波離問佛有幾種羯磨佛言有百一又問有幾單白幾白二幾白四佛答云單白有二十四白二有三十白四有三十七都計百一適來列數僧法便有一百三十四何得明違答中此乃總標非定如數者謂今古相傳云百一羯磨者此是大剛之數未必但有百一舉例如百一供身具豈可便有一百一个耶亦是總名之數也亦可引用十誦彼則定有百一者進退重釋也若依他宗即如前來波離問佛佛一一答之則揩定於數實有百一變顯當宗僧往且有一百二十四更若展張由更有在亦未必一定於此等云云云上至義抄者上明攝法分齊者觀文勢似結前也即須明非相者理合於此依解文中廣辨七非之相今抄何不見敘述下句釋云鈔意為始學人等今師為接初學之機本圖文顯披尋易會故不事義章一一分判對辨進不若欲通要委明已後別撰義抄於彼中細說如今義抄雖無羯磨疏替處彼文廣敘進不之相今略引少許明之且舉白四一法通約事約人約界說者對事唯有情對人須成僧對界須作法就作法中三小界唯受戒小界是白四餘二不通如是事人界三一一分對是即為進非即名不若欲如是通知請披尋義抄中云曉今鈔慮煩新學且略不明云今至二者直論是非者謂不依羯磨疏內將法對事人界一一分對故曰直論是非也謂上三法者心念對首眾法也離則八種者即但心念乃至白四也具明別相者具是一別一別明於相狀竟一事差互等者如但心念法只要自說戒非是對首心念乃至白二非白四等若交互而作於八條之內隨一條交雜即是非法被事不成今文中言不應八條約總相說也細尋此門上下橫括者此門者捧法分齊一門也門中列一百八十四羯磨法也上下者法㝡在初為上次事次人次界為下橫括者將事人界三橫列搜羅也今且舉心念法中六念一法說者法在初為上次列人界界於下橫列搜之即將事橫搜通於三種於三種中日月衣鉢是非情事夏數受緣是情非情合事念身康羸唯是情事將人橫搜羅云唯是一人獨康便名心念將界橫搜作法自然並無別眾此一疏既爾餘皆例然也庶無差貳者玉篇云庶頭也切韻中訓冀也差者差別貳者爾雅云疑也鈔文所列羯磨疏繁略雖殊大途意云不別頭後人細尋此門免生疑惑故云庶無差貳也云問至羯磨者問意云前一百八十四法通呼為羯磨者若百三十四僧法可爾且心念對首何故亦名羯磨耶答中四分三語及白衣說法中言是羯磨者准受戒揵度中佛初成道八年前三歸度人舍利弗問佛三歸是羯磨不佛答是受是善作羯磨也白衣說法者准說戒犍者度中為俗人說法受五八戒波離問佛佛言是名善受是名羯磨次約事中云二就事明者標也上既辨羯磨之法法不孤起必有所為之事客有濫非故此明之識知紕謬云謂至不成者言謂羯磨所被不重明者此且簡定所明也謂前辨法科中心念對首僧法都列一百八十四且法不孤起必有所被之事事亦合有一百八十四適來並含在法中了此更不重舉明之也即辨非者此句正明非相也所被通情非情者如受懺是情結說界等是非情並令是實者約前所被之事境一一如法也片無錯涉者片似也錯涉即交互也已上事法既如法皆得成遂若一緣有差等者即隨前境謬濫錯涉事之與法皆不就也次微起云何者等適來既云一緣有差悉不成就未妄如何名為一緣有差欲解下文故先徵起何者是也云如至法者玄云此人揵度中客呵文也彼云汝曹善聽若比丘犯二僧殘二俱覆藏雖作覆心未經明相憶一罪不憶一罪彼比丘俱從僧乞覆藏羯磨僧遂與彼二罪覆藏彼行覆時為客三藏問知已呵言汝憶者與覆善不憶者不成應與摩那埵眾僧不善教無事與法得吉即無病設藥非也有約二比丘犯殘一比丘憶一比丘不憶以解者未詳也云如瞻至例之者准瞻波揵度波離白佛應作呵責乃作殯出如是展轉乃至如草覆地是如法不佛言不應爾即成三百六非也謂將十八法各為頭歷之各得十七句所云十八句者一呵責二僧上三殯出四遮不至白衣家五不見舉六不懺舉七惡邪不捨舉八覆藏九六夜十本日治十一出罪十二現前毗尼十三憶念毗十四不癡毗尼十五自然治十六多不見相十七不見罪相十八如草覆地今將第一呵責為頭歷諸句一遍即成十七如是互為頭各得十七都成三百六句總是非相可知且約一事等者抄文且舉呵責一事為首已外乃至七毗尼例言也云如實至自言者此依滅諍揵度實犯自言不犯約六聚作四十二句一句為頭得六且第一云實犯夷自言犯殘一實犯夷自言犯蘭二實犯夷自言犯提三實犯夷自言犯提舍尼四實犯夷自言犯惡作五實犯夷自言犯惡說六第二將實犯殘為頭遍歷亦六句第三實犯蘭為頭亦六句第四將實犯提為頭亦六句第五將提舍為頭亦六句第六將惡作為頭亦六句第七將惡說為頭亦六句總成四十二句非也實不犯自言犯者約七聚互作四十九句且第一云寔不犯波羅夷自言我犯夷一實犯夷自言犯殘二實犯夷自言犯蘭三實犯夷自言犯提四實犯夷自言犯提舍尼五實犯夷自言犯惡作六實犯夷自言犯惡說七第二不犯實為頭殘自言我犯夷亦七句第三實不犯蘭為頭亦七句第四實不犯提為頭亦七句第五實不犯提舍尼為頭亦七句第六實不犯惡作為頭亦七句第七實不犯惡說為頭亦七句總成四十九句非也若據律文先作三十九句後作四十二句今順鈔不依律次第先列四十二次列四十九句也並名非法者總結也若實言實方為相稱者明如法也此中含兩如法反前兩非法四十二四十九句也而彼自言等者臣者伏也所為平呼即所作事也所作是夷還伏犯夷等汎者浮漫不真之㒵實犯夷便云殘等不名自言也只要略消文玄記甚廣引律慮繁不述云非至具者二房妨難者有主無主房要無妨准作處分羯磨得成若互有俱有雖與處分羯磨皆不成也離衣枝必兩具者人是情衣杖是非情要人病衣重作法得成名兩具衣輕有病衣重無病加法不得又人老病開杖為兩具若雖老不病或雖病不老亦不成云此至矣者結勸也上之所述總是律本誠實之文臨行事之時不得暗晴昧葬鹵也云次約人云三至人者上文所辨事法皆如然須假人秉法辨事人若有闕事法無成故次辨之共成濟也一有三人者僧為二三人為兩後一人為三云初至不得辨僧也僧中有四者謂四人五人十人二十人也如前說者集僧篇中閑僧分齊科中明此宗四種論僧等是也唯秉羯磨者蘭心念等法界中有人並須集者文言界中不但作法俱收自然隨二界限約內有人總集或一人不來即名別眾如是數說者第三簡眾篇後別眾法附科中說也但得御眾法者但字偏局義也御者秉御也眾僧法也除此外對心念不假曰人今若四人作六念及持衣等却成非法故云決定不得云二至改法者辨二三人也具立二法者眾法對首但對首二也兩界無僧盡集作之者釋上眾法對首也本是眾法只為無僧對首而作今若自然作法二界有僧不召他來一向私二人共作即不得有別眾也若二界並無僧即聽對首文言兩界無盡集者據總相說也或在自然集僧若無僧即對首或在作法且盡法界召集若無即開對首客有不定人多述意也若數滿四即改法者謂本是眾法如說戒等今既成僧即僧法釋然自恣雖滿四亦成展轉對首未成僧法五人已上方得白若自恣也云若至之者若作對首之法者解但對首也兩人各作不相礙者謂兩比丘各自面對而作不集界內眾僧無別眾過不障法事必有邊人有須問者約問邊以科簡也三十捨懺須問邊人者羯磨疏云捨墮至四法通僧別捨財還衣僧中作法正悔本罪須問邊三故須問也九十單墮但對即得者疏云罪非僧除故不問也亦有通須問者重釋簡也古記云三十九十一時料簡總問邊人故着通字不正玄記云重釋三十約邊有人須問即顯無人不要問此文重於有人中約處相通須問必若成別不須問上記文鏡水大德破云此懺捨墮之法本是眾法今只為僧數不足方開對首今若有邊人在覆處障外露地尋外既在界中不集他來自是別眾何問與不問今准法寶重明九十謂適來且一往而言九十單墮但對即得是不要問今或可邊人在露地尋內覆處障內亦須問之故云亦有通須問者鈔下遂釋云謂同覆處尋內等是也必在外有障不在通問者必在外謂露地尋外也有障者覆處有隔也此二處邊人即不在問也此解妙盡其原思之若心念一向非分等者此簡一向問不論障內外及尋內外也必有隨緣作者隨心念念事緣作之云至同別者一人心念獨在界中者此謂但心念也若眾法心念對首心念並界無人者謂此二根本一是眾法一是對首今只獨自故開心念說戒便成眾法心念今既獨己開心念持衣等即是對首心念並須自然作法二界內更無人方成此情法若有一人非法別眾者界內成僧今便心念說戒不集他來成別或界內更有一人不召他來對首亦獨自作成別眾故所秉如前法中者眾法有四對首有七如前法中列之若但心念不論同別者但得自作故不論覆處露地尋內曰同覆處障外露地尋外為別者並不同如此論量也次約界中云四約界者牒名也上來人法事三雖備要由界生故次明之以程非相釋中云四至三種者四種自然者聚落蘭若適行水界羯磨法中等者謂於此四中約羯磨一百三十四番之中唯得秉結界白二法是僧家執御也已外等者但對首并但心念為二法也及一二三人眾中雜法者古今解者取意皆非今依玄記云此法本來合是眾僧秉故曰眾中也事通心念對首眾多人及眾秉之名為雜法改其其餘法不通非雜法也只如說恣受僧得施及亡人衣羯磨疏中更加捨懺始從一人或至二三故知不謬開一人心念開二人對首開眾多人展轉對首四人自恣未是僧法皆須盡集云二至五位者作法攝僧者自然地弱秉法未盡必須作法僧界故次明之亦通二人者僧為一別為二法通三者心念對首眾法云就至位者向此作法界中分為五个階位又於五中略分三別一小界二戒場三大界云一至也者准事受戒小界者惡比丘作別眾留難也緣起總如結界篇敘此未可述之二因難自恣亦爾三數人說戒謂數知現集之人數如下文云爾許比丘集等此小已下釋上開結之義也但作一法者一席法也一者但為現在不通未來二但據暫時不通久遠故云一席也後必閑豫謂非難緣之時不許之云已下證上一席非久固也云四至等者四戒場者標名也釋友義如後篇中本為等者略敘開結之緣起也除說戒者未戒場本為非時集說戒既是時集何得開之玄云必有難緣亦開於上說戒除自恣者自恣本是安居處戒場不許人住既非安居之處何得於中自恣玄云有難准上開之除乞捨懺者此乞鉢行懺罸令用舊持新奪好鉢入僧厨捨一惡者僧中展轉取最下者與之令持今戒場既無僧厨故不許也除分亡人物六人輕物利通十方大界同集今許於楊今避容自分豈非是盜除受日者受日本約安居處戒場既不許安居故不可於上受日持解界者本於大界體內解之今戒場隔尺八自然不可遙解除結衣界者本為捧衣屬人故須結之戒塲本不是僧居如何妄結衣界又解衣界依大界起今戒場隔尺八自然故不合也除淨地者淨地本防宿煑場既無僧有何宿煑何得輙結又淨地依大界起上既不許結之有何解法除受功德衣者本為夏勞受衣場非坐夏之處又非守衣之所故須除也云五大界者此空標名不解釋謂前來已釋了故前文云亦通二人法通三種此不異前不可更說此正義有人疑云鈔但標不釋莫是忩俁却一段釋文不又有人引下科簡一段之釋大界者俱未曉鈔意也云就中至知者就中二字就前作法界中開則為五合則為三是也通塞者如三種小界但作得受戒說恣為通已外不得是塞戒場但許受懺是通適來到出十種之法不得是塞大界一切法事總作得是通重結大界及戒場三小界不得是塞隨相可知者隨前所列之相不難故可知也大段第二成壞門云二至壞者寶云前來約法事人界四種歷別已明今於此中重對法上橫八以辨成壞之相是即名成非即名壞也云法至解者法不孤起者謂上心念對首眾法不孤然自起終須四緣者謂法事人界四也既有所秉法必有所被事須假能秉人又憑作法自然之界闕一不可也隨義明非不過七種者謂約人法事三綺互成七即三單三雙一合為七也此中七非從律文中來今若要通明須先辨律文云羯磨疏引瞻波法七非之義分為四門一列數二釋名三辨體四總別今於此四中下二如疏明之且列數釋名字者先列數一非法非毗尼羯磨二非法別處三非法和合四如法別眾五法相似別眾六法相似和合七呵不止非列敷竟次釋名云非法非毗尼羯磨者疏解曰作無軌則不稱教理名為非法不能生善滅惡名非毗尼被事云時亦得名羯磨此一中具三非人法事總非也一人舉一人乃至僧舉僧是人非一白眾多白一羯磨眾多羯磨是法非有病無藥無病施不相當是事非也二非法別眾者謂本為此事作白乃為彼事作羯磨此約作法差互名非法也同一界住應未者不來應與欲不與欲來現前得呵人呵是別眾也此具二非人法俱也三非法和合者非法義如前釋和合者應來者來應與欲者與欲未現前人不呵此但有非法非一種也四如法別眾者應作單白今作單白本作白二今作白二本作白四今作白別眾者應來人不來應與欲人不與欲此但有人非一種五法相似別眾者先作羯磨後作白即約作法時顛倒故名相似別眾如前說此具人非法非二種也六法相似和合者相似如前解和合應來者來等亦如前此但有法非一也七呵不止者應呵者心同故呵康法者不止便成非也此但具法非一也不同心乖故現前人呵即是人非故思之外難曰前來鈔云法不孤起終須四緣所謂法事人界今辨非中何不見說着界非答隱在事非中也或可令有界非略故不說又難四於上三非中人法二非多事非絕少者何答非起約情故在人也秉法在人多生偽濫故人法多倍於事故上兩重問答並是羯磨疏據理七非之相令依律如是次第明之鈔主且依善見論文始從但心念終乎白四心辨非相然其根緒不出適來所述也先就但心念等就橫八中且明但心念法具辨七非之相此正依見論第十七說戒法中作之乃至白四八位一一位中皆俱七也云初至之者謂以此法對人作者謂輕吉羅罪只要責心自滅今對首悔成人非捧也口不言了者要假口說令自耳聞今不如是法不稱教者前後錯亂顛倒等類是法非也重吉羅責心悔者解事非也寶云重吉本體是對首家事不是但心念事今將對首事作心念事秉責心治他重罪事不得是事非也六念等事一一妄牒等者如初念大月為小月白月為黑月一日為二日乃至第六念無病云有病等並是妄牒一一皆得違教之吉也四人法非不妨事如者重吉對首輕吉責心是事如也二非可知五者人事非不妨法如者口說了明是法如也餘二非可知六事法非不妨人是者謂自作心念等是餘二非易知七具三非者如前總具也餘則例解者此上且約輕吉六念以明自餘說戒發露等例解云二至可知者數同於上者指前但心念七非之數也隨事對法謂前約法辨對首心念中有七種即安居持衣說淨等事作對首心念之法故云隨事對法各有別相者謂此於七中一一各具非法也且舉安居者且者未盡之詞對首心念都有七不可總舉來辨非今抽取安居一法具明七非之相餘六例此可解界中有人別眾而作者解上人非也謂本是但對首法只為無人方開心念今既有清淨比丘不召他來一向自作是別眾捧也自不依他者謂夏中不依第五律師犯提亦人非也口說錯脫文非明了等者解上法非也謂陳詞時錯悞脫漏之類也時非夏限者解上事非也四月十六日是夏初一日今十五日由屬眷分結夏不成處有難緣等者謂虎狼師子惡獸令難或有黃門婬女等梵難佛制不許在此安居今既故違即不依佛制也四非已下等鈔指略也即三雙一合類取前文可知云三至例之者界內別眾者解人非也說戒根本是眾法無人之時方開心念今既有人獨自如作是別眾捧自犯六聚者諸有犯不得說戒今自有犯即不合說不陳三說者解法非也謂心念說戒雖不秉單白理合口陳三說云今僧十五日說戒我某甲清淨三說今不陳此或有漏忘者雖陳詞而脫漏說戒清淨等字眾具有闕者解事非也舍羅燈火等是眾具今闕此故非正法者未至半月或雖是半月晨起不待客等四非已下等者易知云四至知者但對首者唯對二人作也其例盖多今舉一事如持衣等是也所對之人犯戒非法者解人非也前對首者破戒不足我別法之數也或雖是清淨戒一坐一立相中有乖故云非法有呵者呵謂心乖故呵呵成別眾是人非捧陳受非正者解法非也謂十五條三長一短今云兩長一短陳說詞句不當此衣故云非正或呵不止者謂前人見錯遂發言呵呵而不止成法非也上來有呵者呵即約心乖故呵是人非今呵不止即法非捧五大色衣及以上染等者解事非也青黃赤白黑是五大色也真緋正紫碧綠等是上染也四邪五邪敗博是不淨也四非已下如前解也云五至例者眾法對首者根本是僧秉法今無僧故開對其例盖多且舉自恣一種四人秉法第五受欲者解人非也謂界有五人合成眾法今一人與欲四人作展轉對首或非淨戒知而同法者前是破戒人明白知委即不合與同法若不知即無過互不相陳等者解法非也對首自恣理合更互陳詞如四人作法一人別說云三大德一心念今日眾僧自恣我某甲清淨三說今不如互陳說不明了者或雖陳詞詞句不了律云不得竊語自恣等時非夏末等者解事非也謂佛令安居竟自恣今夏末竟而作是事非也眾難不具者若有惡比丘來即知彼十四日來十三日自恣十五日來十四日自恣雖非夏末即許反上不許四非已下等者易知曰六至可解者單白所被乃有多種今文中且舉捨墮一法辨非餘例准也而各不同者謂約前所被不同若論其非不異界內別眾者謂或在大界中有人不集戒場上即不爾非清淨者懺主必須根本俗人已來不犯五戒乃至出家後不犯重禁方受彼懺今反上成人非也輕重同法等者解法非也如懺長衣應量結提是重不應量者准論結吉是輕今同捨合懺也持犯不分者釋上輕重義也應量過限結提據律文是犯減量雖過限多論結吉律並不犯却得成持今若相合懺之則不分持犯二別也妄陳言說者犯長云離衣等例財非合捨者解事非也羯磨疏云衣財散落染淨不分通將入捨以事非也上是疏文法寶又解非由不也如蚕綿但自斬壞不合捨也有過不陳者隨犯長離衣敗賣取非親尼衣過限之類理合一一陳之今並不說界非作法者然此捨墮理通二界今且據單白所被必是僧法成就須是法界自然不合也衣物不集者謂臨作法時収捨院中衣物不盡不一時聚集列於僧中妄輙托人者或捨衣了歸房中忽見本物恐有相染便云此捨與某甲等亦不得也下文云已作屬己前生後乃恐染而捨此非淨施佛判不成等四非已下等者可知云七至知者白二中者謂有諸多白二鈔約結界一法辨也不盡標盡相等者解人非也𢮱謂自然界小作法標遠故須盡標集也相謂者作法標狹自然相遠故盡相集界內別眾者四處六相自然界內有人不來得呵人呵人者心乖故呵也唱相不明等者解法非也謂唱相比丘心中不明得彼標相分齊或唱不着等作法暗托者唱相既不明了雖秉法結結冥然不就亦無善法生起由彼不明無所托附故云暗托玄云如暗中托物者非也呵不止者謂知法人恐法不成心同故呵彼不止住是法非也標相及躰等者解事非也唱相之所據名曰標羯摩所牒處曰相作法之地處曰躰今不識此之三分齊故是混乱也不知彼此二界錯涉者不知大界內相為此戒塲外相為彼中間不留自然之地故云不知彼此也既無自然隔之二界自成錯涉也重結交互者前人已結後人不知更於上再結故成重結兩界相銜名為交互遙結之類者在戒塲上坐遙唱大界內外相秉法結也下句都結上非故云並不成就餘非例知者三雙一合例解也云八至前者白四所被有眾多今承受戒一種弁也受者遮難者解人非也有解云沙彌為受者身上有輕遮重難故受不得今難云若約沙彌有難等却屬事非所標也今依玄記約教授師不明教相不識遮難等相不解分別非令他帶此而受不獲戒躰此非無從教授師身上起即人非捧也故下文云若問而不解終為非問等界中不集者且據大界內受時說僧數有缺者中不滿十邊不滿五人雖五百者此且縱詞聊舉五百五十法簡之不中者謂前足數篇諸門中料簡六十餘人今除第四門中少分不足且頭前之兩門所列人數五十有餘也通非正數者謂上諸人總不足正僧數也受前進止等者解法非也八種條理者謂受前具八法一請師二安置受人立處三差教授師四出眾問五召入眾六乞戒七戒師白和八戒師問難此八並屬受前故云受前進止等云云及論正受謂受中有二人先且教彼緣立心次秉受法正躰此二不開前八之事也執文無差者依文謹誦某甲之詞曾不加改也界相不明等者解事非也界相與前白二科中解同衣鉢非己者假借別人云者類是流預但是事非也總在此収也餘非例前者可委云餘至也者通結指歸也餘外也除適來單白白二白四云外故着餘字也正法即羯磨之法也乃至心念者越却中間對首當法自成不相通練者謂橫前開八位就緣約相一百八十四人法事等各各自別故云當法自成交互不可即不明通練別眾一法多或通之者多謂多分或題不定謂於八位之中除但心念一位餘七位若界有人便是別眾廣張也義抄者律文七非之相文義交羅羯磨疏引彼廣陳抄為接機故略不說前來八位隨義明非且依見論云文與律意旨不別去記對此別七非數令移在前門首說了云次釋羯磨正文者鏡水大德云前分科處云由解羯摩今此但云次釋正文二言何異答但製作變通語勢更無別理大德又云雖爾亦須對此略消前科所言曲解羯磨者謂分外義也就一百八十四種總呼為法其心念對首文相易顯不更說然僧法羯磨剛骨緣本難明是以分外更說令人知委故云曲解消前科了今云次釋者次謂次第釋謂解釋正文者即單白白四云文於此文中一一調理白數等云云云令至雷同者科令知綱要者古說云綱即是要不正也玄云羯磨骨名綱其間牒緣本所名要只如單白中初三故五十四今字為綱二四兩句緣本為要羯磨三十一字是綱三中間為要大德僧聽下誰諸長老忍前為一中間誰請長老忍後者嘿然已前為二中間僧已忍後竟字前為第三中間也謂法無緣本即是無用雖有緣本若無躰骨之相被事不成故知一十四字三十一字實為緣本云綱中間緣本雖殊乃是綱家之要有人云綱與骨有別者不然綱即是骨頭緣本邊即綱約法躰中名骨二名不異也識解通塞者了別無疑曰識凋明義理曰解一百三十四白綱骨今今總同是通百三十四中間事緣各各有異是塞單白既爾羯磨准知若不具明者具足曉明也謂若不具足曉明躰骨緣本答異見增减一字不問緣中將為便成非法也然其非相准在一字者然是也謂是非相不必全句脫漏便號落非但一字參差即名非法然須知處所者此可然字作縱奪意解也謂上縱云成非唯在一字今若奪之即此一字須着處所居躰骨中一向不許於緣本中不傷理處即得傷大理處一字不開故須知所處也不得雷同者寶云似雷之聲天下同聞是一例義今不得同此須究其原也云或至乱者或依文謹誦曾不改張有無者此且通相以辨不能改張成非也律木羯磨中有其事今日不具不能改有而令無也律文羯磨中無今日且有此事不能改彼云無而令有之或第二第三亦隨略說者謂約不解結略非也律明白四羯磨翻譯人廣出一番了乃於下結云第二第三亦如是說但從頭更秉兩遍即得若更列其文句慮在繁詞今此一類古人行事之時秉一番說亦隨律文之語云第二三等云云或無文稱事者羯磨無文稱今日事如受日羯磨律文但牒三寶之緣為出法方軌今日受日自為看病等別緣即合除却三寶着今看病等緣亦一向依於律文即成非也有文無事者羯磨有文今日無事如賞勞看病人律文具有三衣六物之詞今日亡者身貧只有二衣之類亦依文直成更不除改也俱有者律文有鬪諍相言事為呵責事有鬪淨人智慧盧那為呵責人是俱有今日因戲哢為呵責事道法慧達即是其人便令依今日之事人古德亦依律文牒當時之事俱無者律文無聖制不學為呵責之事亦無不學教人為呵責之人故曰俱無今日忽有不學之人及未學之事合與呵責古德亦不解加益故鈔下文云然此治法不必大罪但聖所制學愚暗自纏皆合此罸未能增減者律文無未能增律有有未能減減則反釋上來俱有增反解上句俱無如是有無並不增減也致使二字躡上而生因由前來不明及乎臨被事時被解法之士譏呵令加減文句遂乃更增昏謬乱也已上三段各釋竟若依搜玄科第一段為標後二段為釋將後二段共釋前文恐不然也今觀文勢三段並是釋文但總別稱異鈔中各着或字隔之不可妄為科節失意甚思云云或至責者受領名心納藏為府心為納物之義呈白露現對眾執文高唱即其事也豈非不以等者謂受戒來不學故得上犯吉羅事全根本不識羯磨合誦今但白讀更增無知提伊者是也云自受是不學無知之罪責也云亦至罸者愚教詐為明了故云轉去呼哢精神法則羯磨綱骨初三後五不得加減今此類見緣本中事繁處刪除一字不損大理處詐現明閑之㒵便呵云不成等故云觀事乃同法也人事兩緣冥逾夢海者人謂能秉法僧事即所為之事今於此二冥然不知過於夢海夢謂夜夢所見不實海即眇漠不惻波瀾皆是不真不惻之義上一類愚教亦言於羯磨法及中間緣更後過於夢海也玄記云日中觀海尚自不知淺深况夜間夢見寧知邊際等非也量時取法全是師心者忽欲行不能持得增伽梨去量此時宜乃作離衣羯摩都不論人病衣重等如此取法全出自己之心照教教稱不成者將此無病衣輕之事照於律教教稱不成要須人病衣重始得結罪罪當深罸者如是取法不應教法得吉羅𠎝作法既不成又得離衣之墮已上二罪且是根本上復加不學無知故云深罸也云是至誡者二人曰伴四人曰儔極而誡慎勸學流通意也云若至合者證上須是明閑之人若闇教不明律部之人不得故云已外不合也云今至解者且者未盡之談也謂單白有三十九白四有三十八今辨綱要句釋不可一一別論就單白中且承說戒一番來辨餘三十八例此又白四中且舉受戒一番具辨餘三十七例然也云就至知者分五者謂約句有五第一句大德僧聽者綱骨也戒疏云出家四果乃是真僧無學道高故云大也今出家人雖未證聖果修行也應證得且因中說果亦得稱大或可約三寶中僧田極大等德者戒疏云有所得也以得善居身修戒習慧等僧者戒疏云唐言和合謂人法二和身口意屬於人和戒見利是法和也聽者戒疏云專心靜察聽我所陳也告眾勑聽等者鈔云解釋也聲塵外舉耳識內發應僧三業和同名同法也第二句今白月十五日眾僧說戒者緣本雙牒也戒疏云今十五日是其時緣眾僧說戒是其宗本正宣情事已下鈔自解也適來白眾勑聽只為此云二種令眾委知等第三句若僧時到僧忍聽者綱骨也戒疏云若者不定之譚到由至也一人到大沙門入二時到十五日布薩至也上懸引疏解抄文自釋云心和了集事須法應心和謂忍許堂頭法事身集即自赴堂既無別眾名為事順戒見又同即是應法僧忍聽者抄文標舉也勸令情利聽可勿事乖舛違背即是釋上忍聽義也第四句布薩說戒者略緣牒本也略却白月等時緣單牒說戒之宗本鈔文解云重牒第二根本乃至忍可所為即忍許即可所為之事也第五句白如是者綱骨也事既和辨已下鈔釋易知云次至也者次者次第就者向也羯磨中明者謂明其綱要也且約受戒白內者且謂未盡也白四羯磨眾多今舉受戒盛行之法此受法在白四三十八番之數內也有人科內字在下句者未為雅當也難曰前來眾法中有三謂單白白二白四今解釋綱要之理何不見明其白二耶法寶云但廣解白四羯磨以辨是非就白四中除却兩審便成白二若更別說其文復繁體骨既同秉說無用也思之上已明白者今詳文勢似結前文兼是指略謂受戒白四即一番白三番羯磨其單白已如前來舉說戒辨了故云上已明白也向適來既已明於單白今此與彼不殊鈔中何得再說可引文答云恐新學未悟略復述之意云若頭綱骨句數不別即不在重言今抄為接初機猶疑後人未能契會略復述之復由重也各有其志也進退更解也志者意也謂此雖更論其意各別前文單白意為眾僧說戒今此單白意為沙彌受戒體骨白法雖同所為意旨全別云白至可解者白中還五者還與說戒單白據句有五也第一句大德僧聽者綱骨也解義如抄云云第二句是沙彌某甲乃至令眾量宜者此某甲從和尚某甲者鏡水大德但喚作親緣有云緣中緣亦通求受具足戒大德云此是緣中本此某甲今從僧乞受具足戒某甲為和尚某甲自說清淨無諸難事年滿二十三衣鉢具者緣本雙牒也大德云已名眾僧字具足戒和尚名是本難事秊二十衣鉢等字是疎緣上是定緣本句也次解義者鈔云此同上牒其緣兆等兆者表也既牒衣鉢全具遮難並無等緣即是得戒之先表也正宣情事者正是宣說情懷中所為之事故令眾量宜者謂合僧眾僉量宜應與戒等第三句若僧時到僧忍聽者綱骨也釋文如鈔同上等者與前說戒單白是同忍可所為之類云云第四句授某甲具足戒某甲為和上略除前緣單標根本釋文如鈔忍可所為決判根本即受戒是所為根本也第五句白如是者綱骨也抄釋也云表眾令知與前白結告歸不別也次下科簡云此之白文者指受戒也前單白者說戒也文義略同者白中五句三句骨為綱兩句事緣為要是文同初勑令聽乃至第五表眾令知解義不異是義同彼為說戒此為受戒其事不全相似故號略同依之可解者依此一番辨之學者即可解了例餘一切皆爾次至上文者次第解釋也就中分二者就受戒羯磨中約體用大段分二也初正決根本者明正體一十七字綱骨二僧已忍下結成上文一十四字綱骨也云前中有三者就正決根本名前中就被事邊事邊大略分為三若就句亦合分五段也第一段從初字至緣字已來初者三句之首也大德僧聽者綱骨也鈔文釋曰告眾重聽對前單白得重名也事既非小者受戒之事不並常途此是聖道根本四輩良善禍曰豈是小也諦緣聲相等者令眾審實聽此陳苦決判之緣也第二段從二字至不字已來此某甲從和上某甲者大德云但呼為親緣亦有云緣中之本也求受具足戒此某甲今從僧乞受具足戒某甲為和上某甲自說清淨無諸難事秊滿二十三衣鉢具僧今授某甲具足戒某甲為和上大德云此是緣本雙牒上句是疎緣從僧今授下是本有云上句是緣中句緣僧今下是緣中本然不乖其理大意不失即得誰諸長老忍者此體骨句也若東塔疏忍字屬下句緣本中捧只有三十字綱骨又准淮南順正記將下句僧字勤向上句為綱骨應云誰請長老忍僧即有三十二字綱骨也大德云俱不應理知云已上且懸辨緣本句了雖則平書羯磨文稍繁貴在子細諸記中製述但標舉前後初學難明今此雖繁盖是急要也次解判者抄白釋云正辨牒緣及以根本者前來羯磨文從此某甲直至三衣鉢具已來是正牒緣令從僧乞受戒等即是根本也量其可不者令僧審量可為受不可為受故云可不第三段中僧今與某甲受具足戒某甲為和上者此是本也者嘿然誰不忍者說此綱骨白也單牒根本決判成就者謂此但云僧今與某受戒之本更不述衣鉢遮准等云緣故云單牒等也第二第三亦如是說者結略文也可知外難曰此中三番并白號為白四被他受戒等事者何不更增為其五何不更減至一耶可引抄答云一則事不成辨多則法有濫非等意云若一番被他前事未得成濟若至五六七八又濫他十誦無准云非軌尅令定限至於此者正立不多不少之理也猶如印信恒須一定軌則尅定不可參差殷重之心故立三法以與軌尅也第二段結勸云二至體者僧已忍者骨也與某甲受具足戒某甲為和上亦是略緣單牒根本也竟僧忍哩然故至持字骨也從僧已忍下都計十四字是綱骨亦有將竟字成戒安字下應云與甲受具足戒竟任情並得不傷大理今時不識法者多有呵止却成自己之非也鈔云釋云此直付結歸不關正體者問適來十七个字是羯磨綱骨何得言不關正體耶大德云此且對前三番以言謂第三至說字時沙彌納體成辨既非歸結文中得戒豈非不關正體非為結歸十四字不屬羯磨中攝或有對此舉判印喻及闇與物等喻可知云就至非者開科也云初至准者初中二字是增減料簡也寶云但約單白以說若白中有第二句即是增除此一句曰減增乃對減得名非謂新添詞句也輕小無緣起等者如滅諍法簡集智人單白第三句僧今集智慧者謂平斷事白如是闕第二句也有緣起者如說戒日月即是緣行壽告令即是事緣令牒時緣及說戒事本攝僧大教事非輕小故白中五句也乃至白二類例除之者越却單白有五句者故云乃至白二類例單白中若事微小無有緣起乞詞亦四句成白如受日一切差人白二是也事非輕小若有緣起及與乞詞白中五句如結界眾同之本事非輕小唱相是緣起白亦五句也餘則一准者玄記呼白四為餘謂上所論者准單白白二白餘未論是白四也白四之中事雖通大小盡有緣起及乞詞一定五句無改故云一准也此解猶局若依法寶解云有三个一准一於無緣起單白之外有緣起者皆五句成如說戒等二白二中若有緣起等白中皆五句成如結界等白三一切白四皆事非輕小須依本五句成白即未第三一准也此解甚為雅當云二明通塞者綱骨十四字三十一字為通緣本之事白塞也云單至一切者第一是初句大德僧聽四字也第三即若僧時到等七字也第五即後五白如是三字也文義通一百三十四更無增減者釋上通義也謂上一十四字體骨一切單白並同更不可加減若不軌尅一定即被事不得也第二第四句者謂大德僧聽後若僧時到之前此約句是第二緣本雙牒也從若僧時到之後白如是之前此約白是第四略緣牒本也由各隨事等者釋上塞義也謂隨結說之事一一不同稱緣而牒者稱可前緣而牒入此二四中間之內文隨事顯故限局者如說戒云今白月十五日是緣是本受戒即云此其申從某甲受具戒衣鈔具足乃至僧今授某甲具戒等緣本雙牒如是例通一切羯磨緣本俱然也第四句中略除緣單牒本不得緣本雙牒何以得知所被之事而顯一一不同是限局也義存告眾通一切者文雖是局告眾之義次斷成就道理不殊故通一切單白也云就至可解者辨羯磨通塞義也僧已忍兼取付囑結歸三十一字文義通白二白四兩種羯磨也中間牒緣牒事等者中間有三大德僧聽後誰諸長老忍前為第一句中間長老忍後者哩然前為二中間說字後結歸前為第三中間牒緣牒事隨機不同者謂隨前所被機要不同文局義通可解者隨緣牒事各別是文局又雖是局告眾量宜決判成就義通白二五十七白四三十八都九十五番故曰義通可類前單白通局不殊故云可解也搜玄於此更別疏辨諸羯磨緣本恐太繁也外難羯磨文中前後並云僧聽僧忍中間何故但云長老長老二字屬於別人何以有斯僧別差異玄云事遂在僧成不在別別須語哩僧准六和假用彰名還從別舉故云長老忍也云若至亦失者鏡由明也明得此綱骨之義得前所被被緣作羯磨不須更者羯磨之文若於此法暗述謹誦在心臨機亦失也云三是非者依而無失得成四是反此名非下自廣釋云白至不成者白中文義俱通三句者今解之應云白中三句文義俱通大德僧聽為初句若僧時到為三句及第五句如是為三句一百三十四總皆不別是文通告眾勑聽乃至白告等是義通羯磨之中文通者大德僧聽誰諸長老者哩然不忍者說乃至持字已來文義通九十五翻頭尾一言不可增減者玄云單白中大字為頭是字為末羯磨大字為頭持字為末或云一句之中自有頭尾如白中大字為頭聽字為末乃至羯磨例知兩解俱得一言者玄云一言也單白十四字中不得更增為十五字不得減更為十三字等必須通誦缺剩即不成剩即是增缺便是減被前事不得成就也此解為正或依乾素闍梨釋一句為一言如儒書云詩篇三百一言敝之曰思無邪也謂毛詩有三百篇故云詩篇三百一言敝之者敝者當去聲也一言者思無邪即是一言謂顯於正意云君子所思皆正既言思無邪三字為一言今可配白如是一句亦一言也大德云三字一句任配或四字五字為句如何無又錯解他俗書云義彼云思無邪雖是三字為一句然但為顯於正之一字豈非還以一字為一言又如令時製詩或云五言七言亦是五字七字不可五言便有五句七句耶故知非解今時恐有依承之者故此述之云餘至正法者餘者外也除單白羯磨十四字三十一字綱骨之外曰餘文局義通者隨機不定是文局文雖是局正宣情事量宜等義不別是義通但令順事合宜者如受戒身無遮難衣鉢具全此皆名為事此事順於戒法故云順事也自有求戒之意僧與戒之心即是合宜片無乖降者片少也乖違降謂差降上既一一如法更無少許乖違差降即事成辨也且舉受戒餘並例知云云增繁減略者增即乘減即略如言求受具足戒即是增繁若言具戒雖不著足字便成減略又如眾僧亦增繁或單言僧即減略詁訓不同者解上繁略字也詁則文略訓則文繁如爾雅上卷有詁訓二章各釋一个眾字詁章中云師者眾也文詞即略訓章中云薨薨眾也文詞重疊即繁故知將訓釋繁將話釋略即上羯磨中云眾僧具足戒文詞多名增繁但云僧具戒言詞少是減略文義不失等者或繁或略雖有加減多少不同且不失羯磨中正理並成正法正法即羯磨也云類至也者欲釋文先難曰何以得知增繁減略詁訓不同總成正法可引鈔答云類准諸部等云云謂類例准於諸部羯磨牒事繁略如五分結界白中無第四牒本但有第三緣本雙牒又羯磨中又闕第二中間尚乃被事得成今此單白第間緣本雙陳第二中間略緣牒本羯磨二中間並皆周足或減一字又非骨中不傷文義於理何失故云及論義意亦無有少也至如翻譯梵漢音義全乖者梵是天竺之言漢是此土之語音義乖者如云梵語布薩亦云褒洒陀漢翻為說戒此是音乖布薩懺已起罪說戒防未起非已未二義全異復是義乖今時若取梵語單白文中乃云今十四日眾僧布薩或云褒洒陀若取漢言即云眾僧說戒至第四單牒本亦爾如此梵漢音義全乖秉法尚許得成鈔躡上句云詁訓所傳非無兩得故例成也意云我今羯磨文中或減或增准上二例不無兩得故例成耳搜玄解上二段二例之文頗至繁廣今不備錄也云問至不者此間意者謂律文雖有一百三十四番僧法羯磨文圓義足然對機行事之時不知為要通謂為復執文讀之然三藏教中並無說處此即是文義俱闕也古人行事見教文義俱無遂執文讀之以被前務今或有此類未審被事得成以不云答至之者不成是定者令師且直答執文白讀決定不得云不成是定也問夫判不成前事者須有教文說處違教故作住評不成今三藏之內文義全無鈔主約何論量乃云不成是定可引鈔答云雖無明决可以義求等云云羯磨戒本作法相似者正釋上來義求之理也謂律中若不誦戒羯磨盡形不離依止以俱是作持之法豈合不誦耶此且制誦相似也又說戒及與作羯磨時皆須鳴鐘集僧簡眾與欲問答和合之類此作法時又相似故云作法相似下白正破云戒本必令誦之羯磨豈得白讀誦當宗及外部戒文總不許讀必制令誦可例羯磨亦須誦也問如何得知當宗外部戒文制誦可行鈔文為證故四分僧祇半月無人誦戒等云云不得重說者戒疏云正法軌摸理有常准重誦例說則聽者浮昧故不許也已上疏文問或有重誦者如何答違於制約自成非法戒文既爾羯磨例同亦不得重秉若再秉即成重秉非也有人云今時不許重秉羯磨三十篇中總不見有說處者未詳教相中事意也但說法誦經而已者問本制半月誦戒今既無能說人即止何煩說法誦經答戒疏云以三學資人戒為教本故前制之必無能誦方聽說法誦經而已上疏准此已下今師據文重斥前來白讀羯磨之非也意云若許讀戒人皆識別文字但展卷次第讀之即成何須作如是諸多方法良由不許讀之戒文既爾羯磨俱是作持家法制誦相似作時和集復同何得白讀此即相顯之意也云又至人者俗中呪術等謂俗中符錄世間法術簡佛往持呪也讀文不成就者如俗法加持口中誦之手中捻決便能除邪之類也但以與審等者釋上不讀之義也但以世間之法貴在心中與正審定存想不亂加持前事易得誠驗必臨文數字等者若執文讀心則不能與一多生散亂被事不得上且舉俗也故佛法中誦呪者如今時課五部真言此皆是佛法呪術也持此呪時動經億非之數方有靈異若但一期念得尚乃無切未聞讀呪而能被得前事羯磨聖教佛制誦持況於呪術者謂呪術是易易既讀之不成羯磨是難難必不就律序自顯者律而云神仙五通人比佛造設於呪術比佛制教法且呪術是神仙所造尚令誦之羯磨是佛親宣豈得白讀終身附人者受持法中云五歲不誦戒羯磨如法治先誦後忘學必根鈍誦不得盡形不得離依止也云余至此法者余者我也中者五天之別稱國者聚落之通名以法簡人故彰三藏京是天子所都之處輦是帝王所乘之寶車音居如僧會登吳主之車道安昇秦主之輦傳教之人不少故曰翻經諸師白佛滅後已來未曾見此白讀羯磨之法也云問至通者僧尼互作幾法者謂僧為尼作義法尼為僧作法如何俱是羯磨之文是以此中須委答律中十誦者謂四分與十誦合標也先解四分玄云此律尼法中因迦留陀夷向尼詭語惱亂尼眾佛令為僧作不禮羯磨也羯磨疏云四分但有此一若准十誦尼為僧作不禮不共語不恭敬三種也即十誦有三四分但一總是白四法也此羯磨不須現前自言者謂但遙作不假對比丘前亦不須取彼自言等也僧為尼亦三法者十誦四十云時有比丘為尼作羯磨尼不喜白佛佛言比丘不應為尼作羯磨除受戒摩耶埵出罪也餘不互通者羯磨疏云三番白四自外不行其教損自恣非無互差互往然是各行眾法彼此二部無對面作不同前三兩部通秉云問至故者問意云如今時作法得對尼式叉沙彌沙彌尼及俗男女作不下直答云不得也次引證律令至不見聞處方得作羯磨外難曰白衣前不得作以秘勝故非彼聞之又彼愚劣不堪持戒下三眾前不得見恐我賊住難受具不得且大尼已受大戒了何故不聽答律文初緣亦許復為六群犯罪即告六群尼言若見僧舉我汝為我遮後因說戒時僧舉六群罪尼遂遮諸比丘比丘白佛佛制不許在尼前作若對作結罪是不應吉也除所為人者本法受戒及出罪尼也外一向不合因說除所為人今時受戒行事時秉法者問未受具戒者出答法者云此中無未受具戒者有人呵曰既云此無現在沙彌及本法尼豈是大戒既未受具莫須出去不此是無知之輩設此虗言也比來作羯磨法持為此人即是所為之者文中分明已除何得更生疑惑今斯問者但恐除此人外別更有餘未受戒者耳故前文云法不孤起必有所為若更過去遙作應成今時行事若欲稽古答法人但云除所為人餘無未受具戒者一又順文二免疑妨尼眾出罪准此有人不許云除所為人且本來作法與為此人今若除之為誰作法但直答此無未受具戒者若據此破且清深思但依前釋為正上且約尼等四人是所為人已外更有未受具戒人一向不合今多見尼受戒時不是十尼大德數亦在旁看受戒或尼作本法時大僧往彼看他秉法俱是愚教云徒彼既不會不知壇上解法之人亦合發違往往有時壇大德自由不會此事絕多蓋是草創不曾依明師學習致此昏閟並是一期行事急處切須明取故此繁說思之除萍沙王等者前且一往依例而說不得對白衣今此後開上有許者十伽云比丘半月常集一處王心中疑作何事不許俗耳佛令開於王前說戒除疑即是心淨如梁帝撰出要律儀亦是開王看讀戒律可以例也云問至中者問意云如白二白四或受日受戒治罰等一羯磨中被得多少人若不同也者謂臨時約前所為之事多少亦不定故四不同若諫喻和諫得加多少者正釋上不同之義也如提婆達多不領徒眾者五百人破僧僧秉一法諫之並得又如一群僧諍或百人五十人等四人秉法諫之亦得故云得加多少也至於治舉乞為等者治訶呵責等四舉謂三舉等三乞謂乞受持乞懺罪為者受日差違不得至四極至三人少及一二也若至於四者治舉即成僧舉僧乞為便成僧秉僧故問諸餘為大戒比丘秉法若至四人纔秉法時即是僧秉僧不疑且如與沙彌受戒既未是大僧約何義邊亦言僧秉僧邪鏡水大德云初秉法時未成僧直至第三番羯磨至說字時四分沙彌已成僧體至僧已忍下一十四字結歸之時即正是僧秉僧也更難只恐不成僧今既納體成僧何以不許答以違制故秉結歸不成也今但相承云恐有僧秉僧之過總未知其中義理及與分齊思之四分難事二三人者無難一人為一引有難方開二三人五分等者彼通一切羯磨總不得至四無四分開文毗尼母等者有四五伴可諫者表自部成僧彼治罸不得獨一不須者自己成却遭變害豈非苦惱應作哩然雖心中不忍口且不說等十五種哩大同於此如眾網中者准四分五十三卷雜揵中明十五種也相部云所以須哩者凡論眾法和合為先僧若作非謂非理等應令呵詰但能呵者必為須知進不今列十五種三五而說初五者名非法哩一見作如法羯磨而謂非法言堪鑒物合可而哩二見作如法羯磨而謂非法得善伴合呵而哩三見小罪用羯磨滅合呵而哩四見界內有不集者合呵而哩五見在戒場上作說恣合呵而哩次五如法哩者一見作非法言不鑒物故哩二見非法無善伴故哩三見重罪用羯磨滅故哩四見思內無不集者故哩五見在大界內作說恣故哩後五如法哩一如法應和合二哩然住之三如法應與欲四從可信人聞五先在眾中哩住如法眾網中者彼云見眾集作非法應呵若無善伴說欲了去又不得者應語兩邊人云引非法開六十三步內或有大山或土鹽等山外鹽外雖是六十三步既有隔用集否又六十三步內有道行界用集彼否又六十三步內有水界要集否看有山及大墻等淮南云不要集是隔礙故大德云須集一則同是陸地二又在分齊內不集成別若道行界亦須集以聚落界強攝彼故若水界在六十三步內至水即止各不相攝無強弱理已外蘭若道界水界並互不相攝此皆據羯磨疏辨之或兩邊不是善人但哩然與護心相應如失火燒舍之例云云如彼說云問至鈔者其文何所者意云羯磨辨得前事成遂之時其文至何處所是竟時節答解多途者羯磨疏引智論有三解一師云至說字時為竟處所也心論云一剎那頃作及無作是根本業二師云至竟字是得戒處所也三師云直至持字方為究竟此三解中第三師解大成過分不取初云說字者今師破云比前二度似是住處引後通前則未為竟至不忍說尋有人呵便不成就也今以一法為定者同第二解也鈔自釋云謂第三說已云云不同前解者不取初師義也律云忍者乃至呵破者引文證也既令他說彼忽說其不忍之事如何得成便是破也法寶云初師反救云若未至說字法本未成若至說字其法已成呵終不破令師破云名其忍哩不忍便說尋聲即說安有法成寶云謂約呵聲與說字聲同時即被呵破了法寶云此之集法謂約聚落相大僧坊相小即成標狹界寬依界集不論僧坊相成與不成皆須依聚落集以強稱約弱故或此聚落中有水穿從內過者無橋但齊水集若有橋即通集之或水上有僧亦不須集水異陸地二界別故若有道行界集彼以聚落攝彼界也必其忍哩下今師或依初解即約無呵至說字時不妨成就是得戒處任意兩得者鏡水大德云有聲尋至說字時呵者理必不成即取竟字方為的當若說字聲絕而彼方呵或一向無呵即說字時法亦成就一切臨時兩句雙取故云任意兩得廣如義抄者明其三師解判互有是非徹難道理等如適來所引羯磨疏等抄慮繁不錄故指廣文如彼說也玄記約三性料簡者不當文意思之收科等不一一也已上總是所秉法篇已竟次釋秉法處結界篇大分為二初牒篇名二依文釋初云結至六者先辨來意上來能秉法人既成所秉之法又就然其秉法必托界生前未論量故此辨也次釋名者准明了論具足梵音云四梵摩失此云別住謂此處作法與餘處各不相通不須取欲所云別住今云結界者蓋是隨方之語也作法限約稱結各有分齊名界故律云何名界現前謂作法唱制限者是也方軌法謂法則即竪標唱之類篇者章段之名第六者如常所解次依篇釋中有二初總意二開章諸小科不具列也今總章中云結至隔者結界二字同上說也原始者原字或從水即水本曰源今單作取高平曰原法寶訓本也始由初也究其結界本初意旨只為秉法故律云非作法地不得行僧事等玄記云原者恕也心通窮結界之初為秉法故此解亦得由羯磨僧宗綱要者非謂羯磨是僧宗謂淨戒是僧宗僧以戒為宗主故羯磨是僧宗家之綱要僧戒若淨秉初三五之綱被二四之要能辦一切事也迬救佛法者迬正也救助也羯磨能正助佛法秉法受戒懺洗往𠎝豈非正助像運任持功歸於此者像者像法運由致也於像法之時運致任持佛法不墮者功歸於羯磨羯磨既有此勝德秉御之時道理宜須東西南北四維上下同共遵奉不許有乖違阻隔故云理宜十方同遵等云云云但至馳者但者篇局之詞為者所為瞻浮洲境者瞻字本合從炎作刀避國諱今相秉作此瞻以再反鏡水大德將以𣫍反二呼並得亦云閻浮或云瞻部皆梵語賖切不定此因樹林或從菓以立號問此樹在何處今准俱舍云此瞻部洲從中向北三處各有三重里山有大雪山在里山北雪山北有香醉山此山有香𭊴便醉有云人食便醉也雪山北香山南於此二山中間有大池水名無熱惱池縱廣正等五十踰繕那其中水具八功德常充滿故流出四大河一殑伽河從池東面出遶池一迊方入東海二信度河從池南面出遶池迊方入南海三徒多河從池北面出遶池一迊方入北海此方盂津河是四縛羅河從池西面出遶池一迊方入西海此池有此功用非得通者無由能至於此池側有瞻浮樹此樹高一百由旬生菓如八石瓮大其味甘美此樹影透入月中今時看月之中有樹即此樹影也若時俗呼為桂樹等蓋是凡俗淺近之談耳今此南洲因樹立號故云南瞻部浮等有抄記中解云梵語剡浮此翻為樹大德破云且剡浮樹西天有此方無節五種不香譯中當其無故不翻此土本無不可正譯又闕相似之者不可義翻若將樹以翻剡浮者非之甚也又准法寶云此樹在雪山頂其山在無熱惱池邊其菓落池中多時乃化為金金在水中有光炎起浮於水上故曰剡餘𣫍反浮也洲者水中可居曰洲諸字如今時砂灘之類即須彌南面洲也境者域也國土之名彌亘既寬者彌大也亘廣也此會意字上一表天下一表地中間有日光遍天下曰一且也既寬者初依俱舍辨此洲量故頌曰南剡部如車三邊各二千無邊有三年解云於外海中大洲有四謂於四面對妙高山南剡部洲北廣南狹三邊量等其相如車此言車者約西國車彼國車形前狹後闊如人面也若就北方車說即兩頭相似故不可也三邊各二千者東西北三也各二千踰繕那一踰繕那十六里二千計三萬二千里三邊即九萬六千里南邊有三半者南邊極狹但有三踰繕那半又成五十六里如是因迊總計九萬六千五十六里上並依論述也次依南山住法圖贊准諸經論說共明南洲三邊各二十八萬里南邊一半來東西八萬里至南漸狹故問同辨南洲之量何故俱舍數少諸經論中數多數既有於少多其量廣狹亦成不定請為和會答一解云每州有二大中州大州北廣南狹中州在南南廣北狹相添故闊此解不正不勞破也今依法寶云俱舍九萬六千五十六里如車之說者據五印土境而論圖贊引諸經論所明通約一大州以說凡是大唐新羅等諸邊國等總在數也故西域記云五印云境周九萬餘里證知不謬每一集僧期要難尅者謂每一度說戒集僧期要共來一處極難尅會謂初緣佛在西土之日五印境通是一自然之地每至說戒之時不定故說戒法聚云世尊聽集一處說戒或在仙人所住山里石處相待或在七棄炭相待或塚間溫泉水邊迦蘭陀竹園耆山乃至河邊樹下軟草處相待謂處既彌寬至期不可齊致難尅會故曰期要難尅也上依律文初緣加以損功廢道垣事奔馳者第二緣也先敘緣起謂適來比丘既說戒時至相待極難遂以事白佛佛言從今已去聽諸比丘集一處立說戒堂准說戒法中云先於耆山立戒堂後於羅閱祇城立說戒堂令諸方遠近至此說晨同赴於此堂內玄記云戒堂白二結之開結堂意者但眾集時至即得說戒縱三五人不集無別眾過不要待也若法寶云戒堂但白二法指定處所其地無是自然所貴同集一處揩定無要期極難之惱若不來者總皆有過必唱相結成者其地即是作法界律中並不見有唱相之文至後隨境結時方有標相故知此段由是自然不得言結任情凡捨次消鈔云加以二字者加謂增加也以者由也由前來要期尚難今更有奔馳之惱故云加以也諸方遠集即損功夫癈修定慧之能名為癈道恒由常也奔者赴也馳者驅馳謂雖定於一處立此戒堂然遠國之中比丘特奔赴說戒後却歸本處未得從容半月又到准前須赴如是只了往反途路奔馳更不能修集定慧學故云加以等云云問佛在日諸弟子皆有神通至說戒日現通不難何故奔馳生惱菀陵座主釋云雖獲神通據多分說其中亦有無神通者或可雖有得通之人佛不許現於通聖准律文但除疑得現通降茲已外為名利及聽法毗尼皆須步涉縱有神力不許現之況復來證之者云大聖至此者第三緣也謂前雖有戒堂未免奔馳生惱故律云諸比丘白佛佛言從今已去隨所住處若村若邑境界處說戒聽白二結當如是作唱界坊相若空處若樹下若山若谷等有十九相又云自今後聽結人法二不同之界東方有山稱山有壍稱壍乃至神祝令等餘方亦爾引皆是佛開此別住之益故云大聖慜其頓極故開隨處局結也作法分隔者作白二唱云相分其分限以界隔之互無別眾也同界等者謂上來初開隨境而結即同界易得崇遵說戒之事三學功成一切羯磨事遂後開結人法二同者一為慜其頓極二開隨處分隔分於限域三同界崇遵知其說處四三學功成五說戒羯磨事遂釋上別住之益故云總意如此也已上三緣若依搜玄前一自然後二作法前一總須來要期赴集後二中戒堂結了不來者亦無過第三隨境結各有分限不來亦無過若法寶於上三中前二並是自然不來總有過第三隨處結竟同界小來即有過外界無罪至第三緣別別而結方有自然界起自然依作法法依自然反顯前來戒堂實非唱相結作也開章中云就中至相者就中分四即此篇中大段分四別一列數定量者列大界數定大界量二依位作法者依大戒場等位立標唱相羯磨結成三法起有無者結了有善無表起名為法起今師云有古師云無如下自述罪法失相失界相也云初至分二者且於四科之內於列數定量之中故云初中大論界法者大約論量也總列三種者如文中列也待衣界局人指二衣篇攝食界為雜過故指藥法中攝僧界為即人法二同法食二同法同食別小三界等並是攝僧在引篇明也就中分二者自然為一作法為二也云至中者未制法前緣通自然者謂未制隨方結法已前五印土境總有是一片自然之地也或空有不同水陸差別者玄云空則鷲山鹿菀有則聚落王域水則溫眾浴池陸則遊行途路雖有此四未各攝僧總通一自然而集後因難集等者後因諸比丘一處說戒奔馳相待疲勞癈業損功故開隨境而結作法也有於限節故云各有分限也問何名為自然界耶可引抄釋云人所至處任運界起故曰自然也此釋自然得名既云人所至處即一比丘隨所至於何處任運有界隨身喻如月暈或至可分別聚落遍一城或至不可分別六十三步乃至水界十三步等不假人工造作方生任運自有故云自然界也約處有四種不同者聚蘭道水也定量分六相者聚中分出不可分別蘭中分出有難為六廣如第二篇說了云二者至三者釋作法界也由自然限約未可遂心者謂前來四處六相自然限約未可遂今時隨機結界僧眾之心也凡擬結界或有立標寬狹不同致有難依自然限約設有大小教文已定者謂上四處六相之量廣狹教之已定如可分別依十誦盡一羅城之量不可分別六十三步第用則不可者且如僧祇避難界以三由旬為量或時聚落小並須依三句由標內集若還依聚落集僧之教而明用即恐不可所以然者謂標極寬其標內有人不來元成別眾故不可也問用既不可捨之得不鈔文答云捨則非制鏡水大德云若捨却六相限約之文便成非法不依佛制若不依六相限量之制如何分得他集僧約分齊上且一解更一解云不依此量佛又不許我捨今若捨之即是不依佛制與前解意亦同玄記云大小既定非適我意用即不可嫌大就小教聽非制非者不也即是不制恐有有理思之問適來既云隨處有自然界起便是攝僧何假結成作法耶鈔文答云或作大法地弱不勝等云云或者不定之譚大法者白四等法即簡對首心念謂於大法中唯結界一類白二之法既能勝之已外羯磨地弱必定不得也曲順物情者佛大慈悲接於物機順人心情隨處結者隨在四處而結也楷式軌定者結時先依六相集僧是楷模準式軌則令定任情改轉者結界處所大小一任人情即不得一向不依六相此則對上捨則非制等立此段文也使成羯磨等者對上大法地弱不勝今既結成即秉白四等法成就也弘濟大功者弘揚濟拔也受戒等總是生善弘揚也懺罪除𠎝等並是拔濟也如此弘濟之功熏若不是作法之地不可得就故云非引作法等云云就中分三者就法界中也大界場三小界為三也云初至者初言大界者標也僧常所行者謂是人法二同界也法食二同者其餘三界也今欲明大谷量總以大界名收一切大界故總出云謂僧常所行即人法二同也別舉其餘大界即法食等也一界量定餘者例之故南山住羯磨云界有三種謂人法二同法食二同法同食別初准本制即僧常所行後隨緣別開乃是其餘三界向下加法別食同唱和之法至結文後云餘有三蘊界佛置開結末代之事此法殆盡既云殆盡反顯今時僧常所行即是人法二同也已上正義發正記破鈔文不合標法食二同為僧常所行南山全未知僧常所行是人法二同之界若知何以不舉人法二同耶寶云此虗設也但觀前注羯磨等文其理自曉不勞別破也云明至取者先辨大界量也文中等者說戒揵度也不得受欲者謂十四日說戒十三日去四分宿欲不被所為也准強百里者上既云十三日先往今師且約義准則一日之程百里有出也上列當部律文毗尼母等者彼亦是定大界量同布薩界極遠者舉極大界量也一日往還者大德云一日往一日還非謂一日中得往反論文語似不了上列母論文雖有二文未明里數者今師決判也前律文後論文但云十四日說十三往反一日往還未知定是幾里由未決了也故僧祇五分善見並云由旬者二律一論定量雖未有里數且有由旬之數了論令角量取者謂適來言三由旬令向角而量即四維無餘也亦不知由旬大小者律論雖云由旬由旬前有大小里數今但通言三由旬復是未了問何故得知由旬有大小昇降抄引智論云由旬三別等云云所言由旬者西天本音云踰繕那今云由旬訛略也此無正翻乃是輪王巡狩一停之舍由似此間舘驛不殊不局量數大約而言三十里一驛也問論中何故有此三般由旬可引鈔答云引謂中邊山川不同致行李不等寶云好王治化巡狩之時感海水退多在平地正中而行名中若惡王治化巡狩之時海水汎湧不得平坦處多近山巖邊際而行故云邊此皆約山川以說中邊義也更有謬釋者多不敘致行李不等者若中道而行途路平正易故由旬即長故八十六十若山巖嶮處邊道而行難故由旬亦短但三十里故不等也李字本合作里數字今作桃李字由本桃李華開多人看華踏成徑道時人云桃李不言自成蹊徑自後相傳用此李字至今不改四分衣法中等玄云律三十云瑠璃王釋種釋種中有能射者放箭射王或言五十里中王邊或六十七十或云一由旬既不言八十里而言一由旬明知一由旬替八十里處也此據上品為言者今師云律文一由旬八十里此據智論三品中是上品由旬也通用所歸者謂三眾由旬通大界量用者即所歸下品也准律文意者准四分律文前來既云十四日說十三日先去准此文意不健不羸人一日之中可行百二十里故取智論下品由旬為定前來即在文雖具於義有為定此是今師以義定之即前來五分等律論中辨大界量三由旬即一百二十里也不得更廣即非量故云薩婆多等者因便辨尼大界量也一拘盧舍者多論解十誦律取六百步為量問何故尼大界量不廣但六百步羯磨疏云恐以遠陰易陵辱故不得極遠上疏文必有難等者准僧界量結取亦得云二後結辨戒場量也律云等者緣起也謂律開結戒場緣中時有諸比丘須四人眾起次至五人次十人鈔越二文故云乃至也令僧疲極故佛曲開之不言大小者未辨量之闊狹善見等者正引論明量也二十一人約一眾懺殘二十人是能秉一人是所為羯磨疏云此標極小為言二十人出罪兼所為者若兼二眾即如二分容四十一人約眾懺罪說也問戒場更大結容兩百人得不答得謂戒場剩狹不制廣謂極狹須依論容二十一人更小不得也若廣則不制廣不制狹謂極廣三由旬文廣不得若已下並不制故羯磨疏云大界大則須制小則隨情戒場小則須制大則隨情證知不謬大德云雖爾亦須料簡且戒場絕大終不得越他大界量大界極小亦不得更減於戒場量今時有人作戒場結一小功德堂殿只容得十數人坐總是非法亦須看他大界大小臨時取便亦不必絕大亦不得減量文中大約且如此說耳知知之江西記問云戒場律名小界既不制大如何得小名大界本制大今既小亦隨人情云何得大名答律文大小據用為言不約體量論大小也大界功用大縱量小亦得大界名戒場功用小但許受懺等量設大但得名小界此釋有意餘如後結者指依位作法文中也云三至相者辨三小界量也三明小界者標三種都名也此並已下略引開結小界緣也皆然惡比丘作別眾留難若在大界內終不開結必須避難出野外結之並無正量者不定制量也隨人坐處等者現集人多其量稍大現集若少其量亦小一切隨人坐位身量以定大小也云一至坐者舊准戒場身外有界者法寶云古人見此三小界與上戒場小名是同便立標相今依文取義等者依文者依律結三小界之文也故律受戒文云疾一處集知無異外說戒文云今有爾許比丘集自恣文云齊坐結之知坐外無界也又受戒中云界外不成呵已上並是依文也取義者取結三小界義也謂此三小界本為惡比丘留難故文云不同意者未出界疾結之若身外有地不免呵人同界別眾取此義者亦無外相文義雙明全無外相也如正加中者指下依位作法科中正結三小界處彼更說之云此至止者此三無外量等者今師正釋三小界身外所以不立相者由是難開若許有外相即惡比丘來身外相內無不免別眾之失文云等者引教證無外相也此說戒法聚文爾許者知數也止取現集之僧坐處有地依地而結或現集有十人二十人等據現到人多少依地結之齊坐位是界體已下並是自然縱惡人來倚背呵亦不破也若事作已即制令解者羯磨疏云暫時一廗無有二會不應不解不同前二者大界及場此是文固作法之處大界則人所依止也問縱今不解終無再會眾僧既總有捨心其界自解何要秉法解耶大德云雖眾人知是一廗之法必無再會有捨界心要經宿其界界方捨若爾只恐經宿不捨必明相出時既任運捨何故制之令解答亦可恐當日內更有人來此作法重結不成累他事不就故佛制作已僧眾未起便須解之云二至解者謂依作法之位別別明其解結之方法也位則有三如上所列者如上來明量中所列即大界為一場為二小界為三也若有戒場先須結之者科文云定先後也法寶云謂戒場須在大界中若結有場大界時先結戒場後結大界即場充界後不得顛倒今且等者此中且約結無傷大界之法故此釋順文又乃易會不同玄記徒自周遮如彼廣論此不敘述云云云就至結解者此時是四位總科也四位者一無場大界二有場大界三三小界四法食二同之界今云就中者寶云就此四位中分二初出緣成四位總有緣成後明結解四位總有結解須如是科分即為楷定若一期順鈔觀於文勢似但科無戒場大界中分二先出無戒場大界緣成後明無場大界結解既云後明結解於結無戒場大界後且不見有解文直到總結四種界了方一時明三種解法故云今先四位總科後依科解釋即血脉不絕若依適來順抄但科無場一位緣成結解全不相當也思之云初至欲法者於四位中且解第一位無場大界故曰初中也有三者如鈔列也云云云初中者於此三中且料簡是非也云問至取者大界有村得令結不者謂今時欲結大界僧坊內少有俗人住舍或時有者如淨人家人院之類為復唱出為一時結取答中五分諸白衣新作堂舍等者西國諸居士新造舍宅成就為去呼得吉利請僧於宅內布薩既云布薩必須結戒或為平呼為由被也被鬼神嬈惱亦請僧說戒夫念戒先結大界後亦不解貴圖惡鬼入界不得致免惱害故問何以得知答准南山戒壇經云惡鬼被圍不得出界極苦惱故佛令解使得出謂解了方得出即反顯結定不得入也薩婆多等者彼論結大界界內有村一切聽結論中自微云凡結大界所以通聚落者論自釋云以界威力等云云意道界法不思議常有善神守護既有守護惡鬼如何入得有此利益是故為檀越通結取之又羯磨疏云僧德所重作業圓成善根所勳善神衛護證知不謬也四分文中等者大德云令可迴文取義云四分文中亦結取村也謂結衣界中云除村村外界明知大界有村僧界在先衣界後起也第二云問至也者界中有水得令結不謂僧坊中有一條水來審為唱出為令結取答可除常有橋船梁得結謂約深水如今時河低等在坊內但常有橋梁或有渡船之類即任結之若駛流者不得謂疾流急水之類亦不得結上是律文必有橋梁等者今師准道理釋成也必有橋梁顯駛流不得淺水無橋二俱非難問何故有水無橋及駛流等制不許結耶答羯磨疏云以水難不恒卒增障集既無橋度結必不成也上疏文大德云若不要結河水行事時須遶河傍序唱內相河內即非作法界已後堂頭作諸法事之時河內船中忽有比丘自不為別眾以非異也有說云若不取河水但牒出云此河水或潤水不結為法異並不論量唱內相者頗為愚士也故尼律半等者尼獨渡界褰衣異陸威儀獨渡即犯不論界內外水即顯界內水得結乃界今准此淺水不壞威儀得結證前淺水無橋亦得深水有橋船過亦得卒集無障也第三云問至為之者一標作兩相得不者謂但有一標分為兩个界相即二相共此標得不答中一肘已上准得者一肘是尺八已上可知將此為標分其兩相也明了論疏如一大山等者真諦疏云一大山為標東西各結別住山東為一界山西為界即兩界相共此一山作標又云二繩別住者謂一繩亦分得兩相此亦為暗破古師義也古人見前一肘已上作者即得遂固執云一標作兩相教文即許若明其標須闕尺八或已上乃至一大山即得若尺八已下必不得也今師云不然出法方軌且云一肘已上或依了疏如一大山之類縱尺八已下亦得為標約同二繩得分便罷古德若言尺八已下不得了疏之中何故一繩分為兩相耶今師意即不執或大或小但分得二相便體何論尺八為破古師故引二繩別住也已上且略消文說古今大意訖然此二繩別住行事結法方軌如何因有多解初有一家依搜玄解云若城邑先結別住後欲於旁結界前人不許緣兩寺相近只隔一墻兩寺俱面南寺門東寺結界了西寺未結界今始擬結東寺比丘不肯汝若結界我即作別眾留難然被寺先結界元是即標即體墻頭便是界體墻外界相彼既不肯今將一條繩齊彼墻邊四面遶轉引出外以結之繩下四面周迴轉皆是自然地繩外是彼寺大界外相繩內是此寺大界外相意取一標作兩相也鏡水大德破云據斯一解有多少不了處今一一點出取悞於人適來但言若城邑為是可分別城邑為不可分別是一不了又云先結別住後欲於旁結界便約兩寺相近東寺結了西寺未結此是錯引地了論疏文既云東寺先曾結別住了已成作法界西寺未結即是自然自然弱作法強不可自然更要集他作法界上僧又南山集僧法中明其自然界體云若四面四維無別界者此自然界體定圓若有別界則尖邪不定今既東寺是作法界至彼便止不集無別眾過何要引繩出界假使彼人作留難或恐他作法時出彼界入我自然界中作障礙者待彼夜靜關閇寺門後作法亦得何勞出界是二不了又行事時但云引繩頭出外相接等不知齊義許是住處總不言半由旬等是三不了又云繩下是自然界者夫作法界須依地起猶如今時傍地獄唱相雖傍地獄法元依地而起今既繩下是自然元來唱時從繩上唱其法不可緣繩而起若云繩不是自然者恐違南山羯磨疏文彼云二繩別住繩下即法體是四不了未敢依承也二准南順正記云此約不可分別聚落說繩以還依前來遶相已至寺門外雙牽兩繩頭出六十三步外結之中間須闊尺八繩下即界體大德破云明了疏中既令出廓邑外半由旬結之今言引繩出六十三步外由是城邑內也其間義理且置而未論日驗違文誠為不可三江西後堂記云繩須闊尺八繩下是界體繩外是自然相同熨斗柄結了從寺門前掘作一道溝直至廓外兼作法處總須掘至水恐已復界中作法彼處有人成別眾也覽即知非不勞更斥四嘉禾記與搜云大意同不繁敘錄也今准法寶大師正釋先且定處所此城邑本是可分別聚落羅城悉已周迊凡結時集人亦須盡一城內總集今此邑內有二僧伽藍東西相近俱未結界西寺比丘欲先結有戒場大界東寺人既不肯或作法時同在自然彼心不集結界不成即須作此方便先布置戒場先於四角頭每角打一个杙子都四杙將條繩遶轉相接擊著也大德又云此且出法約無別相以說若別有相如佛殿講堂為戒場等即臨時看以繩遶轉即休亦不必須釘杙子別將一條繩當中擊著引此一繩出部外半由旬二十里彼處還依適來布置於四角頭打四个杙子還將一繩遶四杙子轉相接擊著了却將適來引出繩頭來當中擊著次釋於郭中寺內戒場空地外還向四角都打四杙子以繩遶之至戒場前面離戒場繩子外分寸間兩邊施兩杙以繩遶之直引出至寺門外且住此是大界內相繩戒場自然外相繩也次將一繩於伽藍墻外遶轉直出到寺門頭是大界外相繩却將適來大界內相繩擊著外相繩了一時直引出郭外半由旬彼處四角還釘四杙子前面又打兩杙子以繩遶轉一周訖兩頭相接結著次於最裏繩外面還於四角施四杙子又於前面最裏繩分寸外兩邊施兩杙以繩遶轉出外此此子還擊著最外繩也且布置行相竟次依善見論七盤陀量集僧四面且約無諸界說並取五十八步四尺八寸內有人須集已外無過既集僧已併入小界中先解戒場恐古往結了此中解時彼處亦解更一比丘遶繩先唱戒場相三周訖更一比丘結之此中戒場法起彼處亦起也次於大界上准前集僧訖先解不失衣界次解攝食界後解人法二同界亦恐古來曾結若疑須解當此間界解之時廓邑中大界亦解不起于座差一人遶繩先唱大界內相圓圓而轉亦從東南角為首三周訖次遶繩唱外相三周大德又云唱時須傍繩子外唱不得穿繩恐與體相合謂此三條繩下總是作法界體中心繩下是戒場體兩邊繩下是大界體繩外兩畔置是自然此之三繩一一分其兩相如是唱了一人秉法結之此中界法起時廓邑寺中大界上就結竟除繩其野外僧坐處須掘至水際或種棘㓨恐已後寺內作法此內有人成別眾若路上即不用掘問作法處此處立莫犯別眾不答繩小足大縱在此立全身終不在作法體上故知路上三繩若依諸家闊尺八等容得人立不免成別眾大德云上之所說置依了論疏𦘕圖在靈感寺壇場文復寫出二繩別住之圖不同諸記中錯引行用問所以名為二繩別住者謂處有二一是廓邑內僧坊一是廓外半由旬處此之二處以繩連之故號二繩也別住即大界之名字此界非彼界等有人云二繩者戒場二條繩大界兩繩兩了雙繩引出野外故云二繩更有人云法寶圖中三條繩違他二繩之義須依搜玄四條繩方為雅當如此見知實為取災也云云准此大墻等類者大墻為一標東西分兩相亦得類者類例也可分別皆得為之者可分別堪為標者皆得為之今師意云一繩至小尚分得兩相降茲已外不但一繩凡可為標分得兩相者置許即反顯古人定須尺八及尺八已上即得已下不得之義全非此中亦有破句讀文將上句類字安下句之首者非也第四云問至知者謂今時或將石木為相為取內邊為取外面答中玄云有三意初示圓物二失邪下辨不定物三應示尺寸下示其如非於圓物中復有二初約生樹取內中央二或取下約圓柱石取其外畔謂若將生樹為標其樹有生長義恐界無定限故取內中央心處為其分限使相兩邊標分相似後縱樹長界相不移也問下句云不得通指今何得取內中央答既云中央即是樹心非通指也問下文結有戒場大界中不得入大院墻唱之恐不見其相故此中指內中央亦有何可見答此防樹長取內中央使標分相當界無增減下文元約體外之相入墻內即無分齊不可例也或取外畔者謂圓柱石無生長義界相常定取外畔得內畔亦然餘他物准此者上論其圓光邪等物降斯已下皆准此或內或外也第五云問至也者謂標相體此三如何分之答中先別明三種不同如鈔列也二或標已下約唱相不同致標體一異而相不異或標即體據標外唱相標下之地便是界體或標異體從內唱相在標內故以標頭體標即異體也相必體外者以相頭體不問內唱外唱二相俱在體外也臨時分處等者臨作時一一分明處判亦約而言若有戒場大界多從外唱無場大界內外由人標體相三如前已說也第六云問至重者問意云於先來大界體上不解舊界更結界得不答中不得二界相接者謂戒場不得接於大界不留中間若問自然即非相接也謂二界相接尚乃不許必無重結之理律云已下證不開重云二竪標唱相者上來既廣料簡是非今則竪標依標唱相云初至用者四分界相不定是非者准說戒犍度結界文中有三段列相初聽結說戒處列十九相所謂空處樹下若山若谷若巖若路地若草𧂐若近園若塚間若不𧂐音疏所若樹杌若荊棘邊若汪水若渠側若池若糞聚若村界已上律文第二段聽結人法二同界中且舉東西列十二相東方有山稱山二壍三村四城五壃畔六園七林八池九樹十石十一垣墻十二神祠舍已上律文東面既餘方列然第三聽結戒場中列三相安杙若石若壃畔作分齊已上律文三段文共列三十四種相也今言不定是非者玄云律文雖列諸相不解釋堪作相不堪作相等之是非也更有別釋不正不敘東方有山稱山有壍稱壍者是律第二段聽結人二同界中文也草𧂐汪水空處所路地是第一段聽結說戒處文也打杙一相是第三段聽結戒場文也汪水者說文云水深廣濶無極也准此立法誠所不可者誠由實也准於適來律文如此立標相之法實所不可且標破也凡論六相已上正釋不可之義謂竪立界相只為令人了知分齊限約久遠堅固作法集眾護夏護衣護食等前既但云東方有山等不識分齊或作法集僧有不來者即成別眾不知界限明出即成破夏依界結衣界不免離衣不委淨地不免宿煑也若將空處為相空則無相可指者鈔文偏破空之一相法寶云離色之外總是虗空無有邊際今若將此為相則無可指的必有其事隨時准行者謂離於前來久固作法集眾之外忽別有緣事即隨此時准律空處作標相而行也問上既破云空則無相可指今此又云隨時准行何故云不定可引鈔答云或是一廗之法聊知空礙兩分等或顯不定之譚一席者更無再會聊略也宛陵座主將道行念戒以釋蓋是一席之法略知空礙兩分或行誦戒依標結界且指前顯空有分齊遙指山石空地等雖然道漫貴在一期法事得成必誦文纔徹解了而去非久固也去記約三小界釋僧坐已外曰空自然也齊僧身相多得作法任情思取必作久固等者山壍汪水此是本宗通其他部此是久固可得為相若准他部漫石不得應別安石以為准的此即須准山畔尺寸分齊為准的即是通用也又如打杙雖非久固若傍久固物邊應言石東頭杙准此石東頭之言亦知界之分齊也云善見至知者謂此論有八種界相初山相論云大者如須彌山小者如象也三十秤者論云大者如牛小者三十秤漫石不得別安石者玄云平漫之石無有處所可作標相也草竹不得等者竹藂密亦得稱林但為竹空草又不堅不得為相大林者大至百由旬小林下至四樹相接也樹相者論云不得以枯樹大如閻浮樹小者高八寸形如針大准南記云形如修鞋錐者錯改他論中文字也路相者論云田路向河取水路窮路放牛採薪路等並不得以不久遠故大道車馬之路即得極短乃至經三四村行意取久固也江相者論云好王治化一音一雨不得為相要四月不雨常有水深二尺者得為相也蟻封者蟻運立村所居穴也論云大如山小高八寸皆得作相玄云謂此蟻封體堅實由似城墻與三月一後漸漸如山高無人毀必不壞者方可也水相者論云自然池水得作若通別處水來或入田水或堈盛水並不得作善見論中八種之相一一牒名解說得不得之道理也准論徵律等者今師云准上見論一一牒解不堪為界相者今意用此論徵釋四分律文城壍等緣即知得不得也等字謂等取律文三段三十四種准論釋意得為相者即有山巖石𧂐汪水池樹垣墻等並是久固難壞可得為相故云城壍等緣成相可知反顯草𧂐荊棘糞聚等必不得為相云既至疑者相為結本標相是結界之根本也界家所依者界法是能依相是所依結已牓示等者玄記云何不向作法後出此一段文答良有深意謂牓示名在顯處令至客知委護夏衣等不疑古來多有平寫羯磨文於牒上沙彌俗人見讀了悞他受戒不得便是難捧是以今師未秉法前但抄唱相文於上免有書羯磨之文故此標相後出也餘非急不述云次至中者前鈔中者羯磨疏云隨方曲角悉並得成善見五相一方二圓三皷形四半月形五三角了論有十七別住一長圓別住兩頭地形圓中間長二四角別住地形方三水波別住地曲似水細波四一山別住隨山形結五一巖別住如下文說六半月別住地形如半月七自性蘭若處也八圍輪亦如下說九一門一邊開可得出十方云隨廓邑方土而結也十一四廂地形如四廂屋十二二繩如前文說十三比丘尼於僧界上結約他來僧中作法時說十四優婆塞僧為結之優婆塞於中受利十五籬墻以為限域十六圓滿地形如鏡面依結之十七顛狂別住同界作法比丘得罪狂人無過故須結之已上雖繁所貴講時周備具列不要更看義圖之類也云二明唱相者上既辨得標相是非今即明其唱法故先標舉也云今至曲者謂前文所引別住有於多途今時結之大要不出二種當世現行也即如鈔列云云云先至之者開兩章也先須識過謂一一了別非相二避過者棄非從是依法而唱云謂至述者先學未達者古往先德之人於此唱相規則未能究達也後進者近代今時未有承稟皆是師心及論唱相之時多分泛濫而述也云如至齊者鈔文有兩意初標過生二棄過生所以也以界限者結界齊限也門限者門閫也牆限內者牆分齊也謂緣墻外面直過唱相門限在中限外有墻齊墻兩頭外面去限二尺許他是界內也餘云可知云若從院內至之者文亦二意初標過生二釋過生所以也從門直過則限內是界外者鏡水大德云此亦須約墻內邊厚說若墻內面與門限平等亦不可雷同謂墻兩頭極厚或與門閫相去三尺四尺不定今從內唱依墻一直過也至門處並不曲迴取門域唱也即限內齊墻頭出處如許地總是自然地屬界外捧因茲便有別眾破夏離衣等諸過生焉鈔自分明解之不在更繁述也云蘭至負者亦有斯過者亦者亦前之義前既有別眾破夏等過生今此與前不別妄指山谷等者正明過起之由也一何自負者結界不成於半說戒作法並不得雖作還與不作一般是自負也云故至矣者水波別別住等者飾宗云非謂地形高下如水波謂約界之邊畔出入凹凸似於水波也一丈五尺等者隨波深淺以石次第安布砌之周迊安石了依石唱相即表分齊揩定深淺不更參差也善見漫石不得令別安石亦恐不分分限也自陷陷人者令他受戒不得釋上陷人未來還逢此界釋上自陷引大集經通證也云次明唱法者標也云律中至之者直指相當者始從東南角標乃至東北角從東北角直指東南角標故曰相當也至角曲迴等者從東北角曲會至正東面山城壍池即不知何處是初發分齊以東南山城無別指的故不分也云若至紕謬者又有三節初唱前儀式二大德下正明唱詞三若臨事下誡勸無謬三說者三周唱也問為復教制定須三唱為一唱亦得答羯磨疏云唱相三遍律無定約但今僧中行事乞唱總是三因僧別乃殊三遍無爽若臨事別相等者前來出法且言棗樹桑榆或行事時別有樹即依現前色木牒於名字若一向依文即知紕謬紕踈謬濫也云若至相者文亦三節初略指前緣二正明唱法三若有下示隔障唱法前緣如上者被差者即具儀起禮三拜了立唱大德僧聽我比丘為僧唱四方大界相等云云云三集僧欲法者問前來已訖集僧欲之法今何再論有解云因便故明恐無理也今准宛陵云前篇但明四處六相依自然界集僧若標寬界狹依標集人未曾明述故此辨之若與欲者即據結界時不許傳欲之義不類前篇廣明緣法也云初至准者必先盡自然界內者謂作法標狹自然界寬諸界集僧總約自然集若標與界等亦依界集已上兩集今古不殊若標寬界狹依標集之者今師所立古師不許僧祇等者今准祇文比丘安居竟有官王難及水陸多虫來往不自在恐破夏聽齊三由旬百二十里結之初結時集僧還須盡標而集不然即令他暫出三由旬外而結之故彼文云並令呼來或可出界今況擬二日不須盡集已上今師義也有師已下敘古也有三義第一義云但盡自然等古云縱使標寬標內自然在我六十三步外故不要集又未加法等者第二義也古云既未加法羯磨未作成白之時由是自然未成法界若作羯磨未至說字亦未成作法之地若至說字後是作法界已成就竟何論自然故不要集若羯磨結成後有僧方要集若不集者定成別眾也僧祗所明等者第三義也古云不得引他祇文為例且僧祇所明為有難事故盡標集之此非難緣故不可也大德云新章與古解同鈔依首疏文也准理不然等者今師破古也彼既立三義斥之今亦須以三法一一集破也前來古人云但盡自然標內不用集者今破云定成別眾故疏云通結標內擬成二同唱時結別眾在內破古一義竟前來古云標內非自然又未加法故無別眾者今破云如秉白二至說字時標中總成作法界更秉結歸一十四字之時標內地上有僧豈非別眾破古三義竟前來古云祇律據有難事即須依標集人此是閑後無於難緣故不要集者今破云彼中難緣急切由尚依標集之此非難緣閑豫之時豈可不集耶急尚由集却不可不集無此道理破古三義竟故云准理不然並集為要也無正教可准者謂今師依標集即准祇文古師但盡自然並無教可據也上消文了今古多釋前僧祇避難是惡比丘留難者錯也大德云曾撿彼云有比丘前安居已過有難事起若賊若王若奪命若破戒若水多虫漉不淨欲至餘精舍避去者三由旬內彼有比丘呼來若出界已應結已上僧祗律正文若言惡比丘者縱在內呼他終不肯來豈更令他出界了結恐人迷意今重釋云講時引向前文說亦得云若標內至例者依今集僧也寶云標內有二一標內自然內村二標內自然外村若標內界內村中僧必須集若標內界外村中僧為深防故亦須集之以在標中總是自然地也村內比丘不須外集者此約結後說也正敘正義竟次敘諸記中解云若標內自然六十三步內有村村中比丘必須要集以行事從急故若標內自然外村村內比丘不須集也雖則同在一自然以唱出了又村相同故無別眾過法寶難云若爾且如標狹界寬處標外亦是自然由尚集之今此標寬界狹處界外標內村亦是自然何得不集又若初結界時不集者如何名為今師依標集僧故知初唱結時總須集來遶村唱了作法結成顯法起時村非界內已故若已後別有法事村內比丘不須外集諸家不領此意謂是初結之時村內有人不要集也今准時江淮講人多依此解故廣錄之更有江西約二處村村相周即二處初結時並不用集村強故也若兩處村四相不因結時有人即須並集以村相弱也今抄且約標內自然外村及自然內村二處相並周故云不須外集廣在此文不勞採拾恐有依此說者惑亂人情故略點出知之若相內有尼等者為僧尼相頭並不相捧不集無過也若有作法僧界等者雖在我六十三步內或界外標內結法之時不用集他以彼是作法界不可自然集他法界上僧但在界內莫出寺門入我自然界中即得先遶彼界唱內相了通結取云如圍輪別住者恐人不明舉例說也似鐵圍山遶四大洲將三由旬大界例鐵圍山將四大洲例同四个作法別住可解也云不至集者眾同本者謂先有說戒法後有諸羯磨法說戒是根本已外是枝條故云眾同本也不勝羯磨者寶云自然地弱不勝欲羯磨非謂白二白四也如傳欲時詞句云大德大僧聽今既是自然不秉僧法何得更有欲詞故不勝也何以得知准羯磨疏問曰前言受欲入對首法所收其對首約處通二界今何不通自然答法有通塞故曰楷摸結界白二局在自然說欲對首專唯作法以初雖對首且據因名究竟以論終成僧事故自然不合上疏文云二正加聖法者上既依標唱竟今即加於羯磨白二之法此法聖人所製故云聖法玄記對此略料簡云唱相人不得秉羯磨羯磨人不得唱相由秉法時牒唱相人入法雖不標名且云此住處比丘為僧唱四方相等不可自牒己身耶又唱相時不得稱名羯磨中亦不牒名表無別為莫非為僧若五分律稱名四祇二律總不稱名字寶云鈔中往往有唱人名蓋出法耳臨時除却不得執文云上至磨者謂唱相人復本位了問事宗依常行事云云云當至白如是者廣辨綱要具在前篇不在繁述也云二至者者此明結有戒場大界方法也所言戒場者先釋名字羯磨疏云戒者通收正行場者簡擇精麤似世諸場莫非聚結次辨元典者鏡水大德引別傳云佛在祇樹園中樓至比丘諸佛立壇為結界受戒佛許己於祇桓創於三壇佛院門東名佛為比丘結戒壇佛院門西名佛為比丘尼結戒壇外院東門南置僧為比丘尼受戒壇其東壇是大梵天王造西壇是魔王波旬造已上據西土壇場典由也若論東廈創立戒壇元者梁僧傳云宋元嘉七秊四剡賓沙門求那䟦摩於揚都南林寺立壇令受戒者發壇而受東晉汰法又於瓦官寺立壇梁朝僧祐立四壇一在雲居寺二栖霞寺三歸善寺四敬愛寺已外山東河北劒南等通計三百餘所至今遺風不墜故使江表佛法相續不虧三寶典隆由戒場矣已上略依戒壇經錄之廣文如彼云先至之者戒場外相者有人云戒場若有內相即要著外字簡之今既無內不合云外但言戒場相即得此委斥鈔文未知本意且請思之餘不勞解云但至事者文中二意初顯圖示有益二舉非誡初如文可委圖相大德云先且示四方次辨外圓中方小方等臨講略點示次注文辨集遠近問前已有集僧篇今何更明寶云蓋為繁文以顯事用也又問何不長行書而作注文耶宛陵云貴𡞞繁故亦無別理云此外至也者此外朱圓自然界相者指外圓圓如月暈者此是結大界時自然六十三步也若在戒場內集僧亦四面集者謂指圖中小朱方戒場體處初結場時先於此處集僧亦是六十三步與大界集僧不別也即令更𦘕一个圓圓之相今何故不見有耶可引文答云圖中所列等云云謂隱戒場集增自然界也問准前文中戒壇容二十一人或依外宗四十一人今時諸方結戒場置皆如此既云先於此中四面集僧或有兩百人集來場內坐不足如何處判答有兩釋一依汝州闍梨云所集之僧若多坐既不足且令他出六十三步外即免別眾二依淮南闍梨云且隨多少盡坐若結法但隨小唱已外諸僧縱在場外六十三步內不犯別眾莫不總為集故來法寶云兩解各有理設今行事准於初釋亦不可抑奪思之云其至此者此圖伽藍狹自然界寬今師謂不可分別聚落藍小自然准祇六十三步集僧藍寬自然用祇避難之文盡標集也其北朱院外僧者正約異眾相頭以釋中僧頭其南北各六十三步南北日中有百二十六步文列三眾共之一圖縱廣百二十六也若至遠近者隨相標者約作法了說隨其界相之標遠近集之不用依初結時自然也且云至述者可知也次料簡圖中差別云此至必有別界者謂作法僧界水界等齊彼便止亦耶曲不定今且據四面總無別界各盡得六十三步所以界體圓圓而已也云其至相者鈔文從其內朱方至號曰自然已來且通指示自然也東北二邊乃至自然界已來有六行鈔文辨自然相也小牆下上者謂當小牆子下及地面向上並是自然也有解云小牆下及牆頭上故云下上者非說也斜去二尺許者法寶云二尺二寸二分依筭法定之故著許字即餘也打三杙已者謂適來戒場東南角一杙西南角一杙西北角一杙此都計之故云打三杙已有人云正西今去大牆尺八許自打三杙且清細意尋抄莫輙臆說行時若作二法竟者戒場為一大界為二也玄云謂此南西二邊大界牆內戒場繩外中間尺八許地自然空地有僧不妨大界及戒場中兩處事故云不妨二處云其至故者若明外相必在外唱者謂既有戒場帖著大牆今唱大界外相要須從牆外唱若從內唱便與大界內相合也又不得入大院牆唱等者此約土牆極闊或六七尺已上等恐人巧情若在牆內即與內相相合今牆既厚穿從中心過應得不鈔文奪云以不見相故凡言相者須有表彰今既在牆中間如何得見良不可也云上至不得者界者約略未盡之詞寄托也四處六相至多今且舉不可分別西南角結界場一緣也未必依圖者未必戒場定在西南未必東北二面有小牆子西南二邊打杙等或如今時結講堂佛殿等在寺中央一切臨時制度今且出法令人解生若不依此推求餘處亦不明練也云今明結法分三者謂正明結戒場大界之法有三先後為一唱相為二秉法為三也云初緣先後者戒場最初結然後大界也云五分至言者彼律受戒法云比丘故界內別眾受戒佛言非法自今後聽向界外結小界受即戒場也後因諸比丘將受者往彼路逢劫賊奪衣鉢等佛言聽於僧坊內作之若僧坊中先結大界竟別無自然地結戒場如何鈔引律云若先結大界者當捨已更前結之然後唱相結大界法寶云當捨已者謂解却舊時大界即並是自然之地更前結之者謂前結戒場也先教一比丘唱戒場相一比丘結次即唱大界內外相一比丘白二結但恐向舊日本界體上結戒場即成重結故制令解之責在於自然地上結之免有重結之過耳諸家解此段總錯也毗尼等者彼第二結界法中亦令先小後大今猶有人等者斥古之非也古云此律無正文今結時但先大後小必得所以爾者謂佛聽大界內安戒場又結戒場文中云此住處故又戒場是故開故具茲三義故界先場後也此不讀聖教等者今師斥破也若言律無正文等此未曾讀五分母論之文彼佛制先小後大故又詞句中云住處者約為四儀一時之住非開先有大界了而言此住處也云問至倖者先結大界戒場成不者反問上文設使今時新結界處依他古來先結大界後結場得成不答中分所明應捨已更結等者謂五分文中癈界外戒場令移歸界內結時豈不制令捨却舊日大界向自然地上先結壇場後以大界圍遶但本意只恐有重結之失適來古人結界之法行事之時先豫留自然地待結大界了却結界場雖前後有乖且是自然地上而結不犯重結之過下句遂即定云故知成也謂約無重結邊故得成也若爾何故前來斥古唯信意言耶下即奪云但不成後法等法寶云以是違教結處非法於上受懺等恐不成就故須解也准此呼受懺以為後法躡跡引五百問論證之既云恐無所獲恐者不定之詞疑恐不獲獲由得也且戒場是作法之本既結時違教於上作法疑恐不成又云下重釋得成五分雖制先小後大今但見四分先結大界後方開結戒場不知五分後制今可同於未制先小後大之時於此場上作法應得成就僥倖者非分遇福也五分已制今若故心違結即應不成若實不知同於未制之前於此場上作法必得已上正義了若准云記將五分律為後法謂不成五分先小後大次第之法也或依京中瑞聖所解將戒場為後法彼釋云問詞即問戒場答中將大界反答前文云故知成也引即定大界得成但不成後法戒場不就舉例由如捨戒法附中問尼何不許再來答中却將大僧來一反答此亦如然鏡水大德云已上兩解俱不正也若將戒場及五分為後法者下行五百問論一段之文全成無用固請詳之若不信更思之云今至就者廣列非也云科為四初不集總唱其加非二界內通唱非三大界上遙唱戒場非四不唱大界內相非也界內不集者謂戒場中不盡自然六十三步集人人非也總唱三相者事非也具加大界戒場二種羯磨法非也總唱三相者謂將五六人往塲中約其大界戒場猶如大界內外相總一時唱名總唱也先唱戒場外相一遍次唱大界內相一遍又唱大界外相一遍然後總令此是戒場外相彼是大界內外一周訖此是總唱三相也或界內通唱三相界內者不同前不集隨界加法異前也具如通唱者先唱戒場三遍訖次唱大界內相三遍後唱大界外相三遍名為通唱此即法如人事非也三謂先結大界於大界內便遙結戒場了後於大界內唱大界時唯唱外相不唱內相不留空地即兩界相接也此等已下今師都結不成隨界唱結方為如法云二至已者唱法可知云羯磨至法者羯磨無可解也餘亦如文易委云次大界法者標也云先至之者前別唱中應云此為內相彼為外相此是大界內外相三周訖即總結合云文至訖者唱相文讀過便是云眾至處者唯足內之一字者問據文足內外兩字何言但足內之一字一解云足內一字自簡得外字不正次依玄解云准光律師羯磨全牒唱相為緣若結無場大界時唱相云此是大界外相一周訖羯磨文中云僧今於此四方外相內結大界至第二結有戒場大界羯磨亦牒唱相為緣唱云此是大界內外相一周羯磨文中云僧今於此內外相內結大界等今以後雖前可不是但足之一字耶必若但依律文羯磨理實添兩字也若據律文亦不加字等者今師意云但依律本並不加添理亦不失今時有結戒場大界處也羯磨文無內字便呵者此無知類也問前結無場大界中便向唱相後結云牒示顯處恐人寫羯磨於桿上此結有場大界中何故作法後出此段耶玄解云此中無羯磨後指如上或有難云雖云無大界羯磨前來戒場豈不是羯磨今但製作取便類前可知云結三小界三門分之者集僧為一不竪方相為二結法為三也云初至見者對此四分無異者律說戒法云不同意者未出本界本界應同意者出界疾疾結之彼見論云不同意者未入我七盤陀界故二十八肘外作法與此不別故云無異法寶云律據未出他本界論約未入我界既出入條別不合言同今雖彼此俱是留難故不異也並謂蘭若等者准律受戒小界文云無村阿蘭若說戒小界文云無村曠野中自恐小界文云非村阿練若故知定是蘭若必在聚落不開者謂墻壁隱𦞻故惡比丘忽來不覺今蘭若無墻院隱覆空逈之間來難易見也文中難字一解作平聲呼謂惡比丘從彼來極是難設來亦易見二云難去呼不同意人來為我作唱留難既是逈露波者來時易見也兩解俱得云二不竪云相者謂不竪立四方標相也云大至體者釋不立方相之理也大界及場是久固之法大界即僧常居止戒場即作諸受懺等要各知分域故立三重標相顯示主客令知此三小界等由難曲開暫時一篇纔了便解何假立相但隨人多少即為界體云比至相者法願律師受戒立相彼云受戒須問遮難是以一邊立相由如熨斗柄也說戒直坐開無眾具維那秉白總無既不行事但一直坐坐外並無相自恣圓圓而坐五德在中取自恣故若直坐及藂坐等行事不便也云此至相者今師總破也既三種俱是約難曲開何故受戒獨留相若留相者不免呵人也今師云並無外相皆取僧坐處為界內相也云故至相者證無外相也初云者受戒文也中云者說戒文也爾許即知人數臨時即須言十人二十人等出法且道爾許也後云者自恣文也餘可解言云若至也者祇第八云若比丘有過十日衣當請諸比丘出界外若無戒場應結小界羯磨文云僧今於此齊坐處外一尋內此則明文有開同前戒場之法非開小界彼律據大界內集僧難故出外結戒場喚作小界此因惡比丘留難出外不得例他無難但為古人迷小之一字錯認其名致有斯失今師云若不信祇呼場為小界者即四分戒場法中亦詺戒場為小界不可是小界立相耶云若至中者適來古人受戒小界一邊立相相內問難今師癈不許之未知作法時今師何處問遮難鈔引律文云准律界外問也法寶云雖然文中令界外間遮等沙彌即在眾僧背後是界外也教授師不用出界外但略迴身者外喚沙彌近來即得非謂一向離僧並出外去知之若至乞受之時等者謂沙彌未入眾時現在十人且藂坐貴在面前並無空地若至乞戒受戒之時諸人一時𣫍膝為開中間令空足客得一人禮拜䠒跪之分即得故羯磨疏云十人融通開間納受問或二人三人為引面前迮狹不得融通又如何寶云諸僧一時移向後一半在自然地上亦得若爾有何教據可引鈔若云必半身外界亦准十誦善見之文足成僧數按十誦見論若一比丘一處坐足四處僧數尚乃開成我今半身在外有何不可此是義者羯磨疏云內准佛教外約凡可僧有授法之功前無虗受之願故是定義也必依昔用等者明古人行事留相者當初結時便不成更不論作非法是非也義抄者疏中廣有問答非急要不敘說也云若論至張者今師准律明也自恣是古人之義也此人加用未必如此者今師云自恣未必一定圓坐說戒未必一向直坐亦隨緣改張或地多蕀刺或處多泥濕不可圓坐但得直坐或藂坐說戒亦准此一切臨事制儀改張坐法等靈山記云說戒開無眾具即臨時改張得若自恣直坐等五德何處行事不可既一例直坐人前後總是界外不可向界外取自恣若面前留相又不免呵故須依古圓坐也今衣不然其二五德相間而坐行事之時不須更起但略迴身左右遂近而取自恣有何不得云次至也者謂理今書羯磨文但為時希故恐繁帋墨故削略也白云大德僧聽僧集此處結小界若僧時到僧忍聽結小界白如是羯磨例解云云問結三小界為直爾秉羯磨結成為亦須唱相南山羯磨疏不見商量此事若依相部並須唱相雖不別立四標亦據比丘集處身外邊依常唱之東南為首等或依東塔云不用但加法便結成也天台所稟座主云東塔為正律文並不令唱相羯磨文中又不牒唱相不合妄穿鑿思之云餘至不許出界者餘有三種界別者餘外也除人法二同界外曰餘也三種者鈔文自列也一別說別利欲同說同利者法寶云謂律緣中有二住處一住處但有法而無食一住處雖有食而無法彼此互缺有食處悕須於法濟神有法處欲求食以濟身佛言各解自界同集一處白二結云不得傳欲先唱云相後加法也已上律文疏文不更繁引也玄記說義理不出但空引疏文如何令後會解二別說別利欲同說別利者律中亦約二住處說一住處法食俱有一住處但有食無法其無法處欲同此界共說佛言各解共白二結之羯磨疏云彼此一住無法出家慧命修迎法義成立依因此也上疏文三別說別利欲同利別說者律云謂二住處一即法食俱有一即有法無食今欲須食資形若法本界自有佛言聽白二結之彼此同食有人云引界亦須各解同結號曰食同法別者此釋猛浪必計未曾尋究律文律中佛言聽白二結不言各解同結亦不云唱相但加白二結二住處何得妄解聖言既二界各自攝僧別之說戒不犯破羯磨僧及別眾之罪唯食供共同不得云各解本界故羯磨疏中名為單食同也又疏云此僧制也本非結界因前同別故有事來四方僧資屬處已定若作僧法云聽用之上疏文鈔自釋云為守護住處唱和法也東塔與鈔疏意不別思之佛並已下結文也殆危也鄭玄云畿也幾由近也合寺有緣等者合寺者合一寺徒眾有濟乏緣亦須作法不得直爾若不和輙與僧別同是盜攝也玄記更有一釋合寺是前二也有緣濟乏是後一此不及前云次明解法者標也謂前來辨四位緣成已知然四位總有解法未委故次辨也明知前未開章處鈔云就中分二即就四位中分二先明四位緣成後說四位結解今此豈非第二段解法耶此是鈔文血脉不斷處須如此委知云先至持者如文可知云若至場者先解大界者玄記舉脫著衣服喻可委也云云云此至解者一一隨有單牒者以解大界戒場不得雙答應一問答待後向戒場中更斬新問答不同受戒同一界故一法得作多法今此中隔自然等同前者作羯磨法指同前來解無場大界文句一准也云次至順者舊羯磨者魏朝光師抑羯磨也羯磨疏云光師所出羯磨文別注云此一羯磨通解二界隨其大小更無偏局戒塲不許說戒等者謂古人將解大界文解戒場且大界文云持一住處今場不許僧住及說戒何得將彼文解之今師將小界翻結成界今戒場准此亦翻結為界故曰理通又無住處之詞順於戒場之文故云文順也云文至持者如文也云善至方得者戒場不得立房者謂證上來戒場不許僧住也縱使王立者謂比丘是國王門師所重者東寺西寺住王與向場上造房院也有慙剔壞者易字他歷反樀也知比丘三諫不肯者白王王又不許即別壞劫餘材草送住寺比丘者法寶云迴文解反應云送比丘住寺或東寺住即返往彼西寺准同也唯置佛殿等大德引戒壇經云此是法住之處非之所居之宅兩位別也寶云戒場合在大界內適來何以約東西寺比丘於上立房剔壞了材草返比丘所住之寺耶可引鈔答云外固戒場多在露地等云云西天戒場多在野外露處無屋字蓋之下舉例云如世祭壇郊祀之所春秋後語云城外七里曰郊二七里曰坰三七里曰林四七里城南之壇祭天神城北之壇祭地祗令此似彼故為例也故律中或名戒壇者問壇與場何別寶云平坦曰場如戰塲毬塲之類高曰壇於地面上築基漫上如今時宮觀內道流作法處相似也五百問論等證上戒場多在露地因便相從明結前後可知言三至界者如文搜玄於此顯辨靈感壇場形相慮繁不錄云三明法起有無者法謂不思議善無表也起者生起未審唱結竟有其無表法生起現行不若生起即有不生起即無兩師解說不定今且標起故云法起有無也云有至及者有言法起者首律師解也今師宗他由作善法者正釋也謂秉宣白二之法故云善法即發善無作者謂從眾僧心中發得善無作問心有於四種今發善無作何心攝耶文中釋云屬行陰攝也即善行心有造作義故此善法與處相應等者謂眾僧起能緣善行心緣他標相處所緣境眾心緣彼標相唱人口中一一分明牒唱心中又乃遍緣秉法竟時遍標內並有善無表生起也問准論說無表法須依有情表業引起今地是非情何得有無表依此生起法寶釋云人是有情秉法專意只為加此非情其處雖是非情良由我有情心上引起如法持衣衣亦是非情比丘加法成就只為此三衣從對首之後一生已來此衣上恒有善無表法後得相續此亦如然豈非高例外難曰且持衣之法人死衣法亦無今結界法既與彼是同結界比丘若命終其界法亦應須謝不答不然持衣但為自己己身既謝其法不在結界為僧僧遍法界而無有盡作法之人雖滅為僧之義不無所以法在搜玄諸記並意同也雖有此釋未免有妨只如劫火起時壞有情世間此時法界內既已盡其結界處無表謝不若言法謝即違後文若言不謝即乖前義有人救云此界雖則無人他方聖人遙任持故不失此解未有理也今云原結界時標心為僧僧通現未至於劫大壞盡雖見在無僧相續然未來僧義不無既不作法及與捨心其法冥然不謝思之受隨為宗有漸頓失三光師止惡為宗結有心惡莫有止善否四遠師教行為宗有濫餘二藏故五首師因果為宗亦相違故六通師並不立宗無所歸故七礪師戒學為宗八南山以戒為宗九素師戒行為宗問前來既云善法與處相應遍標相內有法起者且地是無記即善法元來與無記地相連可引也答釋云非謂善法與無記他連如去其土界法儼然即知不與無記地連也更難若不相連此法與地應不相及鈔答云非不相及如却填土即界也大德舉喻如明孔中月影在地面上若人掘連掘除土時其法便失若言不及地填了不合更存故知不可尅定也云善至疑者依相者依標相也失相者不知分齊處所也如古往結界處今人不知無桿牓記錄等其相雖失法不壞也掘至水際亦不失於上起三重屋雖是樓臺並同一作法界文中且言三重據理而論不限多少總是一界故若有石山上廣下狹等者此是山巖界也諸釋不同今且依法寶申於正解上廣下狹者如上面廣五丈下狹但二丈今僧在山上面廣處作法界者一切臨時制量上面廣處總要結取五丈亦得或但結三丈並得若下二丈狹處即須依准不得咸之山巖下僧不妨上法謂上面雖廣下有比丘不妨無別眾過是界外也界是色法隨處廣狹者恐人疑云山既廣五丈其相如出生盤下狹二丈由似生臺之柱今比丘既在山下上面既闊覆於地下應有別眾是以釋云界是色法隨彼形質不是從上懸空而下何得別眾下入地者下狹二丈隨下狹處直入地際二丈總是有法之地也法體又引義鈔問云如巖身裏空或比丘在中別眾不答是別非足更問或雖在內運通在空中別眾不答亦成別已上正解因便問答或依淮南記約三面懸一面連山上廣三丈依上三丈下漸漸小亦依下小處入地也此解亦得乾素闍梨云上廣三丈下二丈縱是上廣處亦只尅取二丈已下面齊等若依上面廣處者界法不可懸空而下若隨山下者至地應大地也大德云據此說恐未審得文意夫唱法隨人心所巡歷處大小一切隨心緣持何處至地總遍大地無此道理思之故云等者通證法起也若無法起空中竪閣閣上作法應不合得耶云云云昔至是者昔云無法起者古師云結界了標相內地上無善起故文云下古師自引證無也滅諍揵度云何名界現前謂在內作羯磨唱制限是也意道但是秉法唱此以為制限處有何法依地起耶云此至也者今師云適來引文律為據即云無法起者自是未達文二日耳此律文中且說加法之所未論量法起有無不可引此為證引薩婆多意亦是證有法起若言無善神亦無所護也如五分明者指前文白衣新作堂舍請僧布薩或為非人惱等上為證有法也小法滅盡經者玄云在疑偽收大德云不然若是疑偽鈔主不引也土臺者地行夜叉於地中行如鳥飛空不礙若至曾結界處不能得進如破墻壁礙之即知至金剛際有法有法起或有斥云小法滅盡天地未然大劫壞時天地皆盡何有土臺玄記通云經名小劫說大劫事縱大火起天地凋然結界之地不焚何恠若依淮南約由漸說金剛界若未壞土臺可存若壞金剛土臺亦壞設土臺壞無表在空不可言壞故戒壇經天竺印土咸有聖蹤並經多劫于今現在至如八字捨身之地布髮掩泥之遺緒乃至舍衛祇桓之地九十一劫常有佛遊身子覩蟻窟而典悲事可知矣云四至相者開兩章也云初至界者初中二字且於結處非法中也餘非相外說具在前文今更重舉不更廣說略談便是云失不者失謂失法不即不失云一至有界者十誦三十七波離問佛諸比丘捨僧坊去作念不復還名捨界不佛言是名捨界然須於界內起心若界外作念遙捨不得猶似白二捨界外亦不得例知智論一宿棄捨者智論二十六舍利弗與五百比丘遊行至空寺宿說戒日不知內外界分白佛佛言一宿棄捨則無也大德云前律文雖標心捨若當日還由未失須依此論經宿明相出捨也准此具三緣一有捨心二在界體上念三明相出鈔意引論共明方得周足也云問至在者並言者前善見證法起兼四分小法經故言並也掘至水際水蕩成坑金剛土臺等總無比丘尚乃不失今但一宿暫空便失何以相違答意也鈔易知四分治故伽藍等者玄云准藥揵度有兩節文云比丘不知何處是淨地佛言若疑應捨已結之第二節治故伽藍得作淨地不佛言得作只為不失大界得結淨地依大界故又云已下引律廣上不失淨地之夫鈔迴互律文前後致有妄解者不少云若至捨者衣食二界依人界起根本不存枝條安在云至種者羯磨疏中加異見互結邪正互結合此四五成一六此無被二開四成五云一非至處者非法惡心等者准藥法云時有比丘嫌彼惡心解淨地令彼得不淨食諸比丘白佛言解者不成得吉不解者淨二者准見論十七云若比丘結界於比丘尼非界比丘尼於比丘上界上得結界等問尼於僧界上結界何妨而言不失若尼欲結時先解界尼雖解但解他自界僧界不解四如善見中掘至水際亦不失界五百問云如四分治故伽藍不失淨地盡無人故為空本處云五至又者許重結之相不淨涉恐出僧界外不成同法義謂尼受懺須二部中若雖界叉互恐受者在僧界不在尼界不名二部故有人云如今時僧戒場上尼來亦須結戒場還依僧更結大界唱內外相法事即成若僧戒場上尼來但結大界者不得此是相叉也無知也思之鈔中叉字謂記中總約差互解即令作此差字相承如此別應無理也吳越國天長寺長講律臨壇崇福普濟戒光大德賜紫志貞寫此一部丁巳歲記焉
