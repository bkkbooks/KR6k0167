body:
  text: 吳越國長講律臨壇賜紫清凉大師景霄纂第二判釋科條廣辨教之文義於中分二初略辨科分二依文廣解初中大凡一切聖教大科有三謂序正流通諸餘小科皆從此出若據西域親光菩薩造佛地論解佛地經已科三分若論此土從後漢佛法初來未有科要因秦王請講楞伽經義諸德促平甲解判王乃問言朕聞佛教幽微至理玄奧適觀所講科目全無者何諸德遭問各鄙耻龍顏時東晉道安法師遙聞此言憤悱心口遂科一切教文總為三段即序正流通也其時雖即懸科未有憑准後因佛地論流至此方彼論之中果有斯說故彼云於此經中總有三分一者教起因緣分即序分也二聖教所說分御正宗也三依教奉行分即流通也語別意同故知安法師冥狀聖旨故青龍疏歎云妙理潛通慧心懸合彌天之構豈虗言哉所言教起因緣分者謂明教起及教起處說教因由即是教起所因所緣二正顯聖教所說法門品類差別名聖教所說分三者顯彼時眾聞法獲益歡喜奉行名依教奉行分自後凡是教文皆依此判也已上略述科判因由今則正明科判者先科律本後科鈔文就律本中初聖科後凡科且聖科者謂部主分宗時科有四大段即大僧戒本為初分尼律下為第二分安居犍度下為第三分房舍犍度下為第四分此且據四分所宗律本以科分若約大藏毗尼佛在日及結集時所非承也二約凡判者謂安法師科也先科律文後科鈔文且律本者初從稽首乃至知時已來為序分二從世尊在毗舍離一為正宗三從五百結集下至末文為流通分所言序分者顯宗由致發起之端稱為序分也正宗者正明犯不犯輕重等相被時之益救流通者法傳季世流而不壅故科律文次科鈔文者右今章記所判不同若准後堂順正等記以總別兩序為序分標宗已下二十九篇為正宗諸部別行一篇為勸學流通其理不然廣如別破或依搜玄將三十篇為正宗即無流通今依顯正科為三段前二與玄同第三將後批文為付囑流通分此准法華慈恩玄贊亦將後批文為流通也故彼云基以譚遊之際途次博陵道俗課靈命講斯曲等足為高例云云問此後批如何得流通答夫流通有二一者勸學流通隱在諸篇之中不別科出促隨明行事之處䇿勵後人令其習學如下文方幸敬而行之或云違法毗尼當如是學又云不知鏡不思之等此皆勸學之意也二付屬流通者述其製作時處因由令後人披覽時代顯然今此流通乃當付囑也問總序自題云序此則有憑十問既不題序名阿得亦科為序答前是別題通收兩序故皆得名序分不同顯正解所問律教唯被具戒是其正修沙彌既非具位何故沙彌篇在正宗中攝答有說一者如來所制皆通五眾戒下文皆結三眾罪又沙彌得聞吉羅之名二者此篇廣明大僧攝受方法是以亦得在正宗中攝也問道俗一篇所明既非內眾如何得入正宗答若望所化境非正宗然僧為能化之人故得入正宗攝故下文云幸細覽而告傳等云云問諸部別行篇既與四分全別如何得在正宗所收答雖不同於四分乃是他部正宗彼此雖殊行事正宗是一或有他宗事起請我四分律師處判須善他宗故下文云博學為濟貧此言誠驗等又別序第三門中不得輙將己所學者判他持犯又輕重儀云約之受體紛諍自銷今既判三十篇齊號正宗須分兩意前二十九篇是四分律師行四分之事正宗第三十篇是四分律師行他部之事正宗賓主二途條然分曉也問夫講解者先合釋於名題然後科判今題名未解何故直爾分科答科之由著前著述文勢若著述是通題下自注云并序此通一部之文便須先釋題後科判今緣此鈔是別題准收二序故先分科後向序中始釋題目又於正宗之首更有名題故此先科然後解釋上來略辨科分因便問答分別次依文廣解即分為三云云就序中分二初釋序之通題二依序別釋前二初正釋所撰之法題二京地下辨能作人之名號前二初正釋法題二注簡異初法題有十一字分二初解四分律三字舉本宗之都目次解刪繁下八字標今作者之別名今且解都目三字者以三問料簡初總別相對與科簡二離開別釋三結歸六釋初門總別料簡者四分二字是別五部中之一名也律之一字是總五部之都目如是兩名不可闕一若無四分別名難以顯其通科故初開標四分開卷識宗便知是四分家之律非餘五分十誦等若闕律之總號無以收其別名故後標律字若促云四分即四分之名隨轉不定為四分經論紀傳等令向下標其律字即簡非餘也又若據次第先後律合居先佛在之時便有四分理合居後百載方興今迴四分在先唯為簡異他部也上來惣別料簡竟二離開別分二初解四分二字次解律之一字初言四分者梵語折埵理或云只埵理此云四者分四者數也分者段也因也因部主支離大藏毗尼以為四段故云四分即大僧戒本二十卷為初分尼律下十五卷為第二分安居下一十四卷為第三分房舍下一十一卷為第四分問此之四分名目起自何時答有兩解一正釋二辨非且正釋者遠自如來金口懸記近因部主分宗且遠自如來金口者准大集經聲聞品佛告憍陳如我滅度後有諸弟子受持如來十二部經書寫讀誦顛倒解義顛倒說法以倒說故覆隱法藏名曇摩鞠多已上經文此是佛在日懸記已後合有此律流行於世佛既滅後迦葉結集五聖任持如水傳器過百年末第五師鞠多傳法之日正當育王化世大集商量佛法因有乖諍遂分大藏毗尼為五典其中一部名曇摩鞠多遠想如來懸記之言乃執四分之號部主自言我欲說無先說有欲談有先即是顛倒解義況我復號曇摩鞠多名字既同我所執法合明四分遂即四度傳文盡所詮相念出四段之文應彼四分之說已上略申正解次敘非者按南海寄歸內法傳義靜三藏作如是說四分之名因梵筴立號謂梵筴有四每筴翻出一分四筴翻成四分彼却難前解云若言因誦立名者其理不然且波離大羅漢當初結集尚八十度昇座誦終不可曇無德四度傳文念終律藏今依發正記破云縱使梵筴有四每筴翻云一分因得四分之名若爾四分之秤無來起自此方未審在西土之時一千年中以何標目次奪破者謂此律文元無梵筴至此其時覺明三藏促口誦筴文秦主恐誦文訛濫遂將羗於羊反籍藥五萬餘言以誠之二日念終執文覆之不遺一字秦主深信方許翻初當既梵筴到於此方何故解云因筴立號前言差藉者秦主姚萇本是西羗人領軍降前符堅為龍襲將軍後都長安為後秦其部類多是羗人故云籍也藥方即易知云云彼適難云波離尚八十度誦曇無德豈四度念終者初結集時文句散落故難致八十度分部時已詮上文墨竟易故所以四度誦也故智論云摩偷羅國毗尼有八十部罽賓毗尼促取要用者作十部言八十部者彼自解云八十誦也十部者謂十誦也至於五分亦然引此證之故知因筴立名全成靈委上來四分兩字竟次釋律之一字分二初翻名次釋義且翻名者戒疏云據其能所都有三名一梵語毗奈耶毗那耶泥迦並翻為律即能詮教也二梵語尸羅此翻為戒謂所詮行也三梵語波羅提木叉此云別解脫所感果也因教起行行不徒然必有感果故解脫絕縛最在其終戒疏又問既有三名何故前標律秤答律則據教能生行解五眾依茲奉持德故名為戒因戒尅剪業或斯亡故名解脫是則果兩行皆由教生故先舉教用攝斯二或可三皆一化始終不可具須故具標律今云四分律不云四分戒解脫也問毗尼翻律為正翻義翻耶答乃是義翻非正譯故諸家相承引唐三藏譯經有翻者有不翻者且不翻有五一生善故不翻如佛陀云覺菩提薩埵此云道有情等今皆存梵名意在生善故二秘密不翻如陀羅尼等總持之教若依梵語諷念加持即有感微若翻此土之言全無靈驗故三含多義故不翻如薄伽梵一名具含六義一自在不永繫屬二種生死故二熾盛智火猛熖燒煩惱薪三端嚴相好具足所莊嚴故四名稱有大名聞遍十方故五吉祥一切時中常吉利故如二龍主水七步生蓮也六尊貴出世間所尊重故今若翻一便失餘五故存梵名四順古不翻如阿耨菩提從漢至唐例皆不譯五無故不翻如閻浮樹影透月中生子八斛瓮大此間既無不可翻也除茲已外並皆翻譯就翻譯中復有二種一正翻二義翻若東西兩土俱有促呼喚不同即將此言用翻彼語梵如梵語莽茶利迦此云白蓮華又如梵語斫摳此翻為眼等皆號正翻也若有一物西土即有此土全無然有一類之物微似彼物即將此者用譯彼言如梵云尼拘律陀樹此樹西土其形絕大能蔭五百乘車其子如油麻四分之一此間雖無其樹然柳樹稍積似故以翻之又如三衣翻臥具等並是云云今此毗尼翻彼律蓋是義翻以佛在西土出興說此毗尼之典此方本無佛化世故無正翻然後彼佛說毗尼詮五犯聚禁約五眾不許有違此方俗詮於五形亦為制御萬民令無全起過義類相似防非又同故將此土律名翻彼毗尼之號古來更有多般慮煩不敘上翻名竟次釋義者分三初律二戒三解脫令初釋律義如下文律者法也詮量輕重犯不犯法並律所明即律詮也又戒疏云律者法也從教立名斷割輕重開遮持犯非法不定故俗有九添法居其一故世付法皆約形科道與俗違形名乃異至於處斷並依常法已上疏文謂道俗居處刑法相貌各各不同然其有犯之徒處形法斷須依常法又律者筆也此律字彳旁從聿聿者取筆聲亦訓於筆也如此方本是秦𫎇恬所造說文中用以文也楚時謂之聿吳時謂之律燕時謂之弗秦時謂之筆令律害訓筆者取割裁量之義也戒疏云處効胡德反唐韵云推勘罪人之㒵也決正非筆不定筆不定筆即法家之眾也又律者分也如律呂之分氣又俗中有三種律一者陰律二應律三格律後一如下自明今且明上二者謂十二月中隻為律屬陽偶為呂屬陰正月姑洗太蔟三月姑洗蘇曲反五月𮒂賓七月夷則九月無射十一月黃此六名律也二月夾鐘四月仲呂六月林鐘八月南呂十月應鐘十二月大呂此六名呂也即陰陽呂之二應律者月令云用斤為律管其管各有寸數恐繁不引云云即用葭音加灰即慮花灰實之於管十二月中氣至灰動應於節候軌尅不改故云應律故戒疏云陰陽雖無形假以律管籚灰用分節候藉此分之令內教亦然順體分成二持違體分成二犯非律不明亦同律呂之氣也戒疏又問律以法訓施造有儀與餘兩藏復有何別答不同也餘藏明理之在靈通隨達一門皆符道觀五百身因無非正說商那定現鞠多不測其涯意在去滯何局文言律則不爾輕重開遮楷摸不定亂常敗續功業也必據科治由此而言法義彌顯已上疏文准斯意道律教偏有裁斷揩定之功餘二無功能故偏訓法也疏又云律雖義約形斷全乖科據有方呂斥相似故且當譯見意便上已上疏文言呂斥相似者約五種治罸階降不殊重者重治輕者輕罸即無別也疏又云律者法也始終有儀於佛教可成此義故篇聚之設三世同遵乃適化殊性戒常定律則不爾代有㳂革古用肉形形者戒也一毀其肉終身永定不可復也准斯意者如俗格律有其新舊準或有於格品故也舊五刑者是秦相公孫鞅於兩反封為商君所制也一墨謂以刀鑿額作賊字後以墨染使青也二劓魚器反截鼻也三躬男女不以禮交者男則去勢分女則填宮也四割謂耳也五則則足也其過最重蓋隨前犯准上治定後漢相蕭何尅為䣠昨何反信製新五形以定三千金科玉條代於古法一笞刃之反者小杖曰笞笞耻也如𮑱鞭等耻此有五等一十二十三十四十五十笞令青色以像東方甲乙木屬青二杖者大笞曰杖杖者長木也亦五等六十七十八十九十一百杖令見面其色赤以像南方丙丁火屬赤三徒者奴也苦處駈使夜即禁白日徒有日暮之功其色白以像西方庚辛金屬白四流者散也三等二千里二千五百里三千里似水之東流更無西返其色黑以像北方壬癸水屬黑五死者盡也二等一絞二斬人死魂魄歸於上天骨肉下埋於土以像中方戊己土屬黃已新舊五刑雖別莫不背為控制萬民不令起過懼於刑罸也西土法王之律亦復如然常作堤防令非不起故已上釋律義竟二釋戒義者戒疏云戒警也警䇿三業遠離緣非明其因也又戒者禁也以善禁惡等云云三釋解脫義者已離障染永出塵勞業惑期云故云解脫解脫不同有二種一因時解脫二果時解脫言因時解脫者對境防惡暫伏過非望不起染邊得解脫二果時解脫亦有二一別解脫二究竟解脫言別解脫者人天果是若約人天果未免輪迴未令得彰解脫今且望不入三途中得名解脫也二究竟解脫者因謂或淨定慧發生故經云或淨有智慧便得第一道又或疏云道或名解脫事戒名別解脫又云或鄣有二初則業非二則煩或淨鄣業或待智云分望斷除故名解脫後智除或乃稱究竟上解脫義竟上來正辨能詮律義因便明所詮戒及解脫義總是翻釋義竟上來有二收科云云第三結歸唯釋者問何故有此問來答上之所明四分是四段之文律是儀從四段文下而出於中體用能依所依勝劣異同無想濫故須簡異是以須明也又西天凡是文字有兩字已上有體用者皆須約釋簡之時或雖有兩字且無體用不可一例也就引文中便分為二初汎明二結歸所屬初中梵語沙吒多此云六煞三摩娑此云離合釋六謂舉數先離後合釋者解釋已上通名次別列者頌曰持業依主并有財隣近相違及帶數初持業者寶法師云持謂任持業謂業用體能持用故如云眼根是清淨四大所造之色是體根者有增上發識之能名用此眼即根又如藏識識即是體藏即含藏是用先用後體攝用歸體此藏即識所以不云識藏者恐濫前諸識不能含藏故上且約單持業更有同依持業謂約多用同一體故如言分段生死身生與死是二同依一體又如變化身身是體變化是用於此身上有能轉換本質并無而歘有之用故變化即身亦有四用同依一體如云變易生死身變麤身為細色易短命為長年無漏力初資曰生勢分將盡時名死此之四用俱依一身也二依主釋者依謂憑依主謂主宰寶法師云能依所依俱於中有二一依主二依士若舉勝顯劣名依主如云眼識眼謂眼根是所依勝識謂了別是能依即劣今云眼之識依主也或舉劣顯勝如云擇滅無為本是有為因此擇所證故今云擇滅之無為是依士釋又云倒令依主者非也三有財者謂對無立名財謂世間財寶有故曰有財寶法師云能有所有俱於中有二一全有財如呼護法神為金剛金剛本是杵號梵語䟦折羅此云金剛狀有三陵如喬麥子能摧萬物取此杵名以彰神號又如菩提薩埵上求菩提下化薩埵故離此聖人體外有彼菩提薩埵也二分有財者如云金神或云富兒半月於人名故四隣近者寶法師云竪隣橫並俱以多法相近一處促舉一近者立名如云四念住謂觀身受心法時雖是慧力簡擇又須假念力明記今慧隣近於念故云念住也五相違者寶法師云諸法名等殊如云持犯上作大小等云云六帶數者寶法師云謂諸法名等數如云一乘二諦三身四智五眼六通七覺八正道九有情居十遍一切處等上來汎相王竟次結所屬者問今四分律之三字於上只釋中具幾釋答若依諸記具二釋一帶數持業二帶數依主今准承稟云具三釋一帶數謂律是法法上有四分之數豈非帶數有云若准明四分二字即成帶數者未詳也二持業謂四分是四段能證詮之文以聲聞句文為體即是體律是律儀即所詮之行有斷割持犯揩摸輕重之功用今四分之體能持此用攝體歸用四分即律三依主律是能依四分是所依四段能詮文是色唯有漏即劣所詮律儀通漏無即勝今舉上劣四分顯下之勝律即四分之律依士釋不湏云倒合依主已上三門總是釋初三字都目竟二刪繁下八字標今作者之別名之此對昔來未曾有也釋此八字分五初釋刪繁二字二辨補闕二字三明行事二字四辨鈔之一字五解序之一字今且釋刪繁二字者刪者聲類云定也廣雅云削也三蒼云除也仲尼刪詩定禮今師刪定或律此之刪字冊旁刀乃會意字也如俗中通明文字有六一像形像物之形如日月等字二會意如止戈為武人言為信等三形聲或左形右聲或如補闕律等字四指事如上下字等五假借如長乞樂皆去聲呼六轉注如老可叵孝等今刪字上六中是會意字也良以古來無紙凡綴文章皆書簡牘以熟韋編之故夫子讀易韋編三絕即其意也故刪字堅之四盡表於簡牘橫之兩盡以像熟韋古來刀筆當者留之不當以刀削去故刪字安刀即除段之㒵也後漢蔡倫造紙以替簡牘之文亦今者從冊安刀猶是會古之意也長也濫也惡也敏下安系覔音亦會意也字上略訓釋今廣解者東吳所立非正不敘西明新規有其四種唯據當宗以說一繁廣繁如律中僧尼二部戒本緣起六百餘條廣明國土犯有人呵責等事皆是當初一期制戒翻譯依其本有六錄在文中至于末代所准要知其持犯故於釋相篇中唯明滿足戒本尺持犯兩相其餘閑後皆悉不明故下文云貴在得其本詮誠難竅其條緒等又如長衣戒得不得章都有八門各有轉降十章四十六句甚為繁廣今鈔侶云一日得衣二日不得乃至十一日通皆不犯唯有一行來鈔文攝得數行律文也又如滅諍事律自一犍度今鈔但云七滅諍中罪亦滅有但為竟於四諍彼此未知乃至徒勞宣釋終未窮盡故略不述等律文既繁古人章疏亦廣今於此中一時刪削故下文云常恨前代諸師所留遺記等二繁長繁者此全非今所要名長如律明善來等四受並是往前之事鈔中皆略不明唯存羯磨一途當世盛行之法更有破僧和僧等事悉是剩長之文兼章疏解律繁辭亦同刪削三繁濫繁者是非相混曰濫如律結界法中東方有山稱山等是一期出法之語今若立標相須知限齊又須委標相及體三種分齊分明方可加法不同一席之法聊知空礙兩分等又古人見律有知淨之言濫引向打鐘上用又古見律結界云各一拘盧舍字便執自然界體定方七十三步集僧一夏唯開三度受日等皆是蕪穢濫於真宗純金雜於砂礫今並刪之故下文云濫述必剪用成通意等四繁惡繁此非律有促從濫中流出如古人見律文治罸弟子斷食奪衣日中五等倣此遂行鞭杖以作訓治委引偽經三百福罸及真經三字之喻或立非法制限罸錢及米伏地吹灰有過之徒罸令除草等悉為鄙惡惡並刪之故下文云今故刪其繁惡等除此四繁之外其餘要當皆列文中如下諸篇所引律云四分文云等並是上釋刪繁二字竟二辨補闕者補謂裨補左形右聲也闕者謂欠闕闕少上形下聲謂全約佗部三藏之文以說謂上既於四分刪除四繁餘有的當之文其文絕少對教行事實未周旋故引佗部流類之文鴻稗未足故云補闕於中有二若事法全無名闕分無名缺今舉全無之闕以攝分無之缺下諸部別行篇云若四分缺於事法等即舉分無之缺攝金全無之闕也今依西明大要有二謂文補及義補也展聞即成五補經律論記傳并義補也若處中唯三三合為一補記傳為義補為三今引且明三補初三藏補就三中從親至疎且引佗部律流類相似者如下所引僧祇十誦五分等若律部無文即大小乘經有者須引如下引華嚴涅槃楞伽思益阿含遺教目連善生等或經中無文論中有者亦須引用即下引瑜伽唯識智證論莊嚴成實婆沙明了多新等是已上三藏為一補竟若三中有闕記傳有文流類相當亦須引用如下引高僧名僧僧史錄凡聖行集布薩軌儀法苑未林師資傳等為第二文記補也若作玄記將古人章疏意文補者非也已上諸文有則可引或時有事復是現世惡行三藏記傳之中全無說處不可無文便止今師以義決通如下第五門中四句以為唯的若文義俱闕舉一例諸等知上來解闕補二字已竟三明行事二字者行者左彳刃戟反右于玉刃反左右足遞進之貌今促取流行義也事者一云人法事也二云眾自共三行之事也於三中自有人法事三故此釋勝前謂上既已刪補鈔體周圓究竟理之由但為流行律文三行之事故云行事即鈔文之用也四辨鈔之一字此有二種若從手作但訓略即文約義豐今從金者便具三義略義如前准下文云固令撮略正文包括諸意也二久固義如世真金促革不改百練不變久埋不生又如世中於國有功之臣賜以鐵券以表其人子子孫孫榮不絕此鈔亦爾永用無其廢時也三利用義如金有濟貧之用此鈔亦然對事施行濟機斯是故下文云庶令臨機有用即事即行等是五解序之一字考功記云舒也舒展一部文之大意又毛詩云述一部之由致廣雅云次明一部文之次第又禮云東庠西序郭璞云注序別內外即東西墻謂之序此墻居中門內客欲入時先於此處整𣫍冠排地儀禮後方入見尊主故詺此墻為序今於卷首置序意在披尋者不失文中之意故故序也又序者緒也即頭緒如答然頭曰緒今此在一部文之首故又序者敘也敘一部之文由致發起之端名序也上來三字都目八字別名惣是正釋法題竟次注文簡異云作者無標名顯別有兩釋此一一簡上法題欲釋此文應先問我起今師依於所學撰四分律鈔即得何要標那補之名所以注文答云作者云云意道於所學自宗古制作鈔疏蓋多故云作者非無今標刪補之名簡異古來未曾有也故云標名顯別中卷注云著述者名立多名立名標異下卷云注撰非少立名標顯三卷之昔注語雖殊義意無別據斯處解即三卷之首注文並是今師自注第二解云簡異名題是相部疏讚述之語也此鈔初時著述並不顯制作人名後有一本流到相疏主得之實惜用為的當促不委誰人所造至貞觀年中鈔主四出求異行到相疏主相見因敘問律宗之事乃云近收得本一行事鈔甚被時機即未審何人制作南山云餘之所作疏主驚異遂請題名鈔主乃於三卷首皆書京兆崇義寺等云云疏主遂於法題之下名題之上中間空處背洷八字讚美之詞三卷之初並如是也上之兩釋各是一途今據稟承決取初解縱蒿本無作者名亦未可為良證思之次辨能作人號名言京兆至述者初略明次廣解初中京兆者天子所部之處也崇義寺乃僧坊之別名沙門者出家人之通秤釋者能人之性族某甲者鈔之別法名撰即撰古遺文述謂述而不作次廣解分六初言京兆者京者大也兆者城也又積數之多十億曰兆十兆曰京數之名也今云京兆者乃天子所都之地也亦云京師師者眾也白虎通云千里之色四方千里如是眾名不出天子所都大眾所聚之處史記云漢祖都於長安人民眾多秦地廣遠乃立三部以輔京師名扶風即鳳朝在長安城西也右翊即同氵在長安城東中京兆即雍洲今云長安者取地名也問今云府字題中何無答史記云開元元年改雍州為京兆府洛州為河南府開元十一年改并州為太原府鈔夫是武德年中制故不合有府字也二崇義寺者鈔主本住旦日寺隋朝改觀為玄壇改寺為道場故鈔主神州記自序云余本住日道場此是煬帝取長于瑞像及育王舍利入京造此寺安置舍利鈔主初在此寺依慧顧和尚出家至唐初武德七年高祖廢之僧徒散亂配餘寺鈔主與師徺七人同崇義寺此寺在左衛長壽坊又准西京塔寺記云此寺本隋朝延壽公子詮宅唐武德二秊高祖賜與桂陽公主駙馬趙慈景為宅趙景已後公主捨宅為寺以妻為夫造恩深義重勑名崇義鈔主七年配住九秊入終南製作今取本係名寺以標名故云崇義也寺者梵云僧伽摩藍略云言伽藍此翻眾園五眾所居之園也義云精舍新梵云毗訶羅此云遊止或云遊履處也今云寺者乃此方之號也寺者司也司由嗣讀不絕之義寺下安寸即士人方寸之理也如國家九司名九寺一太常主禮樂郊廣也二光祿主御厨三衛尉主器械惟幕也四宗正主皇家枝葉九挨也五太僕主馬駕監收等六太理主天下利法七鴻臚主外國賓客八司農主食餚斛斗也九太府主貢員獻兩市也後漢騰膝蘭到此既是外國之僧且今在鴻臚寺安下後於壅門外別造僧坊取駄經白馬名從鴻臚司分出故云白馬寺即漢地寺之祖也故今僧尼住處皆名為寺三辨沙門二字者亦云桑門皆存略也具合沙門那此云息心故瑞應經云三等介號擾六趣號昏息心達本原故號為沙彌門或云息惡能息生空智所息是煩惱故論云福積聚捨諸非此世他世智無惱一切生死除滅故證得此者名沙門釋曰生空理智名為福德此之理智非少時之間極速三生遲即六十劫彼名積聚也捨者棄背義諸非即根隨煩惱也此世者即分段生死身他世者變易生死身也一切生死除滅者且約分段中一切未論變易證得此者名沙門者結示也上略釋名字已竟問未審沙門以何為性果體是何果位差別復有幾種答俱舍頌淨道沙門性有為無為果此有八十九解脫道及滅釋曰諸無漏道生空理智離染煩惱名為淨道此之淨道是沙門之體性懷此道者名曰沙門有為無為果者謂有為無為是沙門果體有為即解脫無為即擇滅此有八十九解脫道及滅者斯約斷惑品位以列數也此有八十九解脫道是有為果復有八十九品所證擇滅是無為果謂斷見惑有八無間即八思八解脫即八智斷九地修惑有八十一無間道八十一解脫道見修合說有八十九又無間道唯沙門性解脫道亦性亦果息惡義邊是沙門性與無間道為等流果邊是沙門果一擇滅唯是無為沙門果體謂無道是沙門性擇滅是彼證名沙門果離繫士用果外主士用也若准斯解理實證聖號曰沙門今唐凡位煩惱具全未合標沙門字然具約因中談果故亦得也又古來更有通相通凡人也今此是通相沙門也四辨釋釋一字具足合云釋迦出家人性族也今存略故但釋標字問上言沙門下復揀釋豈不重耶答為簡濫故亦有出家人性是沙門非釋種故以性簡之唯大乘基法師以四句料簡一是沙門非釋謂西域外道是律云沙門施食時等二是釋非沙門即西域諸釋種是三亦沙門亦釋即今出家者是四俱非即俗流是又仙教傳此之後過秦晉之前皆稱俗姓或依師姓如生法師本姓魏出家後隨師性竺法護本姓支木竺法師乃依師姓等從東晉安大師方可改轍也安云我曾無尊釋氏皆合與釋姓命之後增一阿含經西來果然契合故彼云四河歸海無復本名四姓出家咸稱釋氏又四分說戒揵度云猶如四河悉歸於海如是目連於我法中出家學道咸稱釋子此皆今從佛姓也我今僧尼既尊釋氏須知得性無由若不委之如孫不識祖名似子不知諱此亦道俗同耻此約此方南朝四姓未張顧陸北朝四姓季鄭崔盧更有諸多或因處或因封爵等得姓廣開元定譜錄中慮繁不引也今准西土四姓亦殊故西域記云夫種族殊異有四流焉一剎那帝利即王種弈世君臨仁恕為志二婆羅門此云淨志守道堅唄潔白其操三吠舍此云商賈貿遷有無逐利遠近四首陀或云戍達此云農夫肆力疇隴勤勞稼穡斯之四姓清濁殊途婚娶不通飛伏異路餘之三姓如別所論今但敘剎帝利性者以釋迦姓從其流出是故此姓最為高貴故俱舍論云劫初如色天後漸增貪味猶惰貯賊起雇之令守田釋論曰劫初時此南剡部洲人民皆如色界諸天缺形色端嚴身帶光明騰空自在飲食喜樂長命久住如是類地味倮便生甘美其香郁馥時有一人稟性躭味遂取食之諸人効彼竟皆取食此名劫初段食既食其故身遂堅重光明隱沒黑闇便生日月眾星從茲出現由漸躭味地味便隱沒從茲便有地餅而生競躭食之地餅又隱遂有林騰林騰又隱香稻自生眾共取之以竟取食前三是細段食遍入支體如油沃沙但有垢汗第四麤故殘穢在身意欲蠲除便分二道因茲便有男女根生由二根殊形相亦別宿習力故便相瞻視因此遂生非理作意欲貪鬼魅惑亂身心失意猖狂行非梵行人中欲見初發此時爾時諸人遂取香稻初無貯積後有一人稟性懶惰長去聲取香稻貯擬後食餘人効之漸多停貯由斯稻生我所心多收無厭後隨收處不復再出遂共分田慮防遠畫各自興功耕犁種殖於己田分生護惜心於他田分有懷侵奪劫盜過始於此時為欲遮妨共取詳議僉置內一有德人各以所收六分之一雇令防護封為田主由斯故立剎帝利名大眾欽恩流率土故復名為大三末多此云共許自後諸王此王為首後時有王貪恡財寶不能均給國土人民貧有乏者多行賊盜王為禁止行輕重罸殺害之業起自此時後有罪人心怖形隱藏其罪勘窮取實異想發言盧誑之詞此時為首其大三末多王子孫相承有十九轉輪王最後名大須彌王此王子孫相承有一十七萬三千二百八十四小轉輪王其中粟散王不知數也最後名魚王此王子孫相承一百四十三粟散王最後名大茆草王其王無子乃將國位委付大臣西國之法繼於二種二者仙種此王念曰我既無子乍令王種斷不令佛種絕逐入山修道時有侍者從王到山欲求所學要恐吉後有人侵陵乃以竹籠盛之掛於樹上有獵者觀之見籠謂菓見王頓見王頭白在中謂鶴遂彎弧審射箭中王心命從茲殞射時有二渧血隨地生二莖甘蔗日炙割開左生同童男右生童女男名善生女名善賢耆舊大臣乃立善生為王善賢為妃却治國位西土不昏異姓也善生王有子名摩王五分云皷摩王也有二夫人第一夫人有一子名曰長生頑愚醜陋人皆惡污音之第二夫人有四子一名照目二名聽目三名調伏象四名尼樓此四子聰明神武有大威德其夫人竊作是念我子雖長大不及物承繼大業必為陵奪彼之四子並有威德國祚所歸必種彼子當設何計固子基業遂初以情求次理感於後一時王至夫人處夫人白王我有除愛等云云願王殯黜我情乃安王曰四子孝友於國無𠎝云何殯棄夫人情求既不遂以次理感有作感字呼即或亂也亦得夫人曰我今除愛實兼家國非為此子彼之四子悉皆神武民各懷歸王萬歲之後皆欲為君誰肯為臣必互相殄滅大國所歸飜為佗有願今從之勿思一子徵言若元戒有餘歡如不見從今當盡矣王曰汝言是也我自知時後於一日勑四子曰汝得罪於吾不忍汝死今可出國尅己圖生慎勿窺瑜難懲後悔四子自知無咎遂結束行裝與所生母同生姉妹耆舊大臣咸願隨從王悉聽之於是出城北門而去路徑險阻度婆耆河至雪山北近念舍夷林乃見其地東西遐迫南北廣長眾鳥名云地多全壤遂止息其中即於此處築營城邑歸者如雲從者如市不久之間為大國立最小尼樓為王三兄為臣佐元追念問諸大臣有知者奏王具陳上事王召彼子歸宮四子確不從命父王遂遙三歎曰我子釋迦我子釋迦因立釋姓此翻能人尼樓有子名為馬頭羅馬頭羅有子名名尼休羅尼休羅有四子一名淨飯二名白飯三名斛飯四名甘露飯淨飯王有一子名悉達白飯王有二子一名阿難二名調達斛飯王有二子一名摩訶男二名阿那律甘露飯王有二子一名䟦提二名婆敷悉達有子名羅云從尼樓王至佛身得引姓來凡經六代今之僧尼是羅云同學尼當樓王第七代孫也已上解釋字已竟五解名諱者講解相承有釋不釋若依俗禮諱之然亦有開處臨文不諱詩書不諱廟中不諱等若准內教過去諸佛名字勸人稱念今須効之鈔主法名道宣也道者法也宣者遍也顯揚弘演遍示有情也大師三生持律第一生在齊朝法名僧護住越洲剡懸石城山隱樂寺其山石壁峭峻高數十丈中有似佛焰光之形每於經行常聞天樂異香之瑞遂發願造十丈彌勒以擬當來千尺之身使凡厥有緣並願同登三會建武年中起手僅至一年方成向獲過疾而終春秋一百二十臨終誓曰本不期一生願第二生必就至梁天監六年有台洲始豐縣令今改為唐興也陸咸罷邑皈京路經剡漢止宿夜夢見三梵僧語云建安殿下感患未瘳若能修聖石城聖像成就獲痊差陸令歸京並忘此事後經歲年有一僧來宅寄宿因話云剡後所囑何不施行陸令既戀前夢此僧去後思審方乃語之此僧正是夢處中見第三之者即以事啟建安王以事聞奏勅下修之諂僧祐律師專任修像也天監十二年興功過十五年畢坐軀高五丈立形十丈改為石城寺也僧祐律師即第二生身俗姓俞氏其先祖彭城下人也皮音又因官唐於建業祐年七歲因入建初寺不肯還家至年長大欲為婚娶遂即迴避投鐘山定林寺法達和尚求受具戒學精律部祐為姓巧麗國內凡有修飾皆蒙勑委王持梁天監十七年終於本寺廣如僧傳中云云第三生即今身也生隋朝俗始錢氏諸記中皆云胡州長城人行狀文亦同表云准錢氏譜說祖父即長城人大師在京兆生也彼云曾祖是陳朝駙馬都尉祖為陳留太守父名士申有作由字者錯也即吏部尚書陳被隋所收其錢申此時與陳後主一時收獲入長安陳王後遭隋賊車却免傷害過隋開皇十六年方產大師大師即申二息之長據此所說即大師是京兆生長明矣母性姚氏夢見有月貫懷又夢梵僧語云仁者所懷即梁朝僧祐律師宜縱出家大弘佛教凡在胎十二月隋開皇十六年丙辰四月八日誕生齠生之日使異常童十歲遍覽群書十二善閑文藻十五喟然歎曰世間榮祿難可常保於是弃竹馬臥釰歸心於釋門事日嚴寺慧頵法師十六念經兩旬之間念花經部一十七落鬘至大業十一年年滿二十天降鴻恩依首和尚受具頂戴寶函遶塔行道感舍利降函方崇法事受具已後依首律大師聽習律藏一遍入神俗便欲歸山宴寂被受業師呵曰夫適遐自爾因徵知章修捨有期功須滿不宜去律抑令更聽其間僧事自代為之依位披尋滿二十遍時值隋唐交禪講歸權停武德四年方遂再聽首大師令命覆講自知文句缺然未是心證遂不取受辭不獲已方乃覆文至武德九年過唐高祖沙汰僧尼遂遁跡終南製此事鈔貞觀八年顯於洲益詞谷重修并製羯磨戒心兩疏莫不龍天歸敬奉獻香花或緇素諮詞皆蒙預記三衣准布繒纊不兼常坐一食始終無改行促涉蚤虱任遊德望既高名振天竺故得賓頭羅漢語話周施長眉梵僧讚述增壇事唐朝三藏翻譯眾經即命大師親同典教而著迷法門文記凡二百三十餘卷並行於代至高宗乾封二年仲春月冥感天人與師言論云今歲當遷神生彌勒宮并留香一褁云是棘林香天眾常燒者言說而去至十月三日設無遮大會午時道俗咸聞天樂異香於是𣫍容而化春秋七十二僧臈五十二初定於擅谷至三年勅問所右時有豐德寺寺主僧正倫具事奏聞請依西國法荼毗得舍利立塔三所一在豐德寺一在安豐坊一在靈感寺咸通四年并安豐坊舍利入靈感寺同起一塔雖年代遷移而遺風不墜去咸通十五年諮宗皇帝思諮下臨追曩日之嘉猷諡名澄照記平生之德行塔號淨光澄照彰律鏡不昏淨光顯戒殊不耀教宗興盛良在於茲上解名諱二字已竟六解撰述二字者諸釋盖多今存正解撰者錄也即撰云遺文屬於布置二序三十篇行事次第國文等述者屬在引用三藏教文非師心自說如夫子述而不作但述古事今此亦然但述古來文章及諸聖教等問述與作何別答真諦云如佛經是作菩薩造論直述佛意但得稱述若爾何故前來注云作者非無答菩薩造論解釋佛語次比成於論文亦得稱作今古疏鈔撰錄聖教次比成文例此何妨亦得稱作問何故撰述双標答若述而不撰謂鈔無才若撰而不述即類師心無於稽古故仲尼云太夫則史太質則野文質彬彬然後君子准此意云著述若絕文筆即同史體飾說事意若太質又成朴野不堪披尋今則半質半文彬和暢不史君子之風是以撰述質標闕一不可上辨能作人名號竟上來收科云云總釋序通題已竟吳越真身寺傳律沙門靖安照遠丁巳歲重終天福三年歲次戊戌四月二十八日於湖洲資聖寺聽過比丘故記
