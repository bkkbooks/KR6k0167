body:
  text: 吳越國長講律臨壇賜紫清涼大師景霄纂三十捨墮大門第四篇分二初總標指略依今直明次依戒釋初云三十至相種者三十捨墮者總標也對此略分為二初標釋名廢立二前後所以初懺法如後者指略也大德云此亦旁破古非謂古師隨一一戒下便出懺法極繁今即不然自有一篇如下所述直明相種者依今直明也既不依古出懺法但明具緣成犯闕緣不犯之相也種謂種類即三十因財而生並是貪之種類故言尼薩耆者西梵之語也東土譯之為捨如多論云有三種捨一捨財二捨相續心三捨罪波逸提如前篇番墮故云三十捨墮若論九十二拔理亦合名捨然不因財單悔本墮故名捨也二辨先後者據其罪體義者合同篇聚良由財事取納乖方損生壞道欲洗心悔必須上境方乃絶滅相續貪心之事既捨障業須遣故次明罪作法是難故須前列九十捨懺在別但斷後犯便成洗悔作法是易故次明之欲使學者先識於難後及於易若約遮性而分唯回僧物一戒是性餘二十九俱是遮收也依戒釋中三十不同即三十段今當第一云初長衣過限戒者釋名者戒疏云限分之餘名長越於分齊名為過限此是所防云云云多至故者壞道功德財者謂無貪等三能生萬善功德此之功德能資養法身慧命喻之財今貪俗利即萬善無由得生豈非壞也餘如文云具六緣者總標犯緣也云一至説淨者問何以此戒只總標緣不更別列與諸戒為果大德云諸戒是隨難解釋此中初一離明後五合辨亦是製作家變通自在更無別理一是己長衣者鈔下自釋云謂三衣之外財也三衣非長衣之物故簡異之有作己字謂是自己長衣即犯者錯呼也四分等者辨長衣量也鈔約周尺以論此今唐尺長一尺三寸四分弱廣六寸六分強也若長廣互過減皆不結犯要二俱過者謂律文有九句四句犯五句不犯言九句者三三而作也先將過為顯成三句次將如為顯成三句後將減為顯成三句且初三句者一長中過廣中過犯二長中過廣中如犯三長中過廣中減不犯次三句者一長中如廣中過犯二長中如廣中如犯三長中如廣中減不犯後三句者一長中減廣中過不犯二長中減廣中如不犯三長中減廣中減不犯已上九句今古不同古人見律九句四句犯五句不犯便妄執云要須俱如及俱過始犯若互過即不犯今師云不然律云不犯者且約不犯提非無吉準此上來九句四句提五句犯吉下引多論談上五句律文不犯處雖無提二準論有吉下遂結云故須俱説古記云律制俱如二犯何故鈔文要俱過若爾俱如無成不犯若不犯者豈非違律文耶大德云不然但舉俱過自攝俱如鈔慮繁故不能重言非不委也以三衣無長可防者謂有三衣望餘衣即有淨法防長今無三衣即當體更無依長可防淨法即失故若捨即須説淨以體體長故有緣得褻指作三衣等者此謂有失奪等緣有人得端褻未能製造得衣受持恐過日犯長且指三衣即免長過搜玄約令色如法之褻今云不然但明端褻即依何論染了未染等三肘五肘外有長説淨者大德云餘有長者截下説淨玄云連指衣體外説淨二解並正云問至耳者引此月望衣難前得褻指作三衣則免長過何以月望割簪縫日過犯長簪者細破竹叺簪刺僧㲲也線綴曰縫答文鈔云云云以至故者此顯正科恐違戒疏今先依此消文後別申解判以上諸文等者寶云此是明白八分明知是己長之衣過日不説即犯鼻奈耶一日成者是初緣也彼文云長衣一日成五條二日成七條四日成大衣五日成長衣易故一日成也二雖知是長者謂雖知是己長之衣三衣體外財帛若忘等緣無罪者寶云此約迷忘説也以心迷故雖違限不説是不可學不制罪故上且依科釋鈔竟大德云恐違戒疏故彼云雖知是長若有迷忘或未知屬己示無長罪所以須知屬己定彼無二字鈔文加也若準此理從二雖知是長此是第二科顯今不合勒問第一料內説縱使約迷不犯下恐自有迷忘一門別開不犯何得於此預明未為雅當大德又云今可作結上生下意從以上請文直至一日所成故此且結成上文第一緣竟從二雖知是長若忘等緣則無有罪故二明屬己定齊此已來是生下恐第二緣也若依此釋可改科文從別釋下分二初離釋第一二雖下合辨後五可不順鈔免違疏文注文綿毛之類體非衣攝者戒疏云今通書長體但是布帛毛綿量可限約者則為衣相自餘未成尺寸不定如毛束綿成長本非衣故何得應量故不合説也餘文可知云多至罪者應量不應量衣者應量謂尺六八寸不應量尺六八寸已下也即説淨益善者才得衣入手來便説最善不如事須十日滿故至十日無咎者未違限也若不作淨至十一日地了時等者文云得齊十日若過結犯搜玄云何故至十一日地了時方犯彼釋云十日明出是齊十日若言過者亦一約明相為過今十一日從旦至夜明未出前未是過位故不犯也猶如同室宿者不得過二夜至三夜者恐約第三夜明相為過也大德云若準此釋既云從十一日清且至明相未出前未犯即十二日朝方是犯位此令不達教意致此妄潭又引同宿戒來例之不等今但第十日從旦至明未現時未犯才至明現地了分明是十一日限即犯何得致迷若一處傳束一罪者如衆多衣一處收束但得一罪若散在諸處隨物處一一別犯所言明相者律花開鳥鳴時也今師云或冬月無花或處無鳥鳴等難以為準若據多論云明有相一日照閻浮樹身則黑色若照葉則青若照空則白三色並並明家之相上言地了即地色了了分明三相之中是白相也今定持犯取為的云問至一染者能染應量所染云何此問恐無謂能染是應量長衣至十一日犯提恐無所染中或一應量或不應量若應量犯捨不疑設有尺六八寸已下之者為復犯提為復但犯吉準此偏問所染中不應量衣答前應不應者謂所染中通應量衣及不應衣二俱犯提也問所染若是應量犯提任許或不應量本合犯吉何言犯提答謂隨能染判故恐犯捨也如是食竟正不正俱犯是者今師以例釋成也且如朝來喫正食竟雖未過中或更喫飯𪌏等正食本分定犯設使喫細磨不正食齊犯是也今將足食竟洲能染是應量更喫正不正洲所染中應量不應量並犯也能是不應量等者此却問能染是不應量染所染中應量染不答意大小雖殊者應量為大不應量為小皆須捨懺故云義一律結大應量得提論結小不應量得吉故皆一染不同云記意𪣘不敘云僧祇至數者善毗尼人為衆作淨不犯者此約多人共物一人且與代説餘人免犯外難曰前句若二人共物不分過日不説尚乃不犯今此多人共物何要一人代説耶可引注文答云引是共活人等祇律自難云共畜衣財多人共犯一人代説諸人不犯亦可多人共犯罪一人代懺多人罪滅否答作假屬他一人代之衆免長過懺除己罪一人設懺餘人不滅律中邊方開五事者法寶云長衣開解有三節大德云有四節初阿那律一日作衣不成因開一日不犯二夏竟持糞掃衣比丘佛開受五利有衣開五月不説淨無衣開一月三因迦旃延弟子億耳在阿梨提國郡度大戒邊方少僧三年方守得十人受於大戒後往禮覲如來迦旃延令億耳持五事白佛開聽一邊方小僧請開五人持律者受大戒二沙多開重著草履三寒開皮為臥具四塵多數數洗浴五少僧遊行長衣入手十日方説如來依此曲開雖邊方開十日若中國此時不開第四節因阿難有衣欲奉迦葉迦葉白佛問彼幾時遂答十日應還佛因開十日此之一開通一切處準此餘方者謂將邊方開又望中國為餘方也未必手提始犯者鈔謂邊方僧少長衣要開手提數滿十日方犯準此中國僧多不但要手提或膝上或肩上眼前及非眼前身上但作己有想日滿即犯下引伽了論等者證上餘方未必手提也伽論有四種得衣相如文明了有四句一眼至得等者戒疏云如人施衣蘇至比丘前目不觸作屬己意不説淨隨日算取罪藥七衣十也入算數者隨得衣日數作日數名入算第二句有物有身至得非眼至得戒疏云如暗中施者彼人口云某甲施比丘暗故不見以身觸著彼物作屬己意不説淨入算數滿犯三有眼身至得等者眼見觸觸三至得非算數者雖受其衣不屬比丘非算數限何也謂前入雖與不許比丘自受與用置比丘邊擬施三寶四有非二至得者戒疏云如暗中施眼不見身不觸但作己有想隨得物日即入算數云四分至十日者此約得不得門明不犯但取不得衣日無可相染名不犯也四分初日得衣二日不得乃至十一日通皆不犯之者此文兩解初衣搜玄云一日得衣者舉第二章第一日也二日不得者舉第二章第二日也謂第二章第二日是最初不得衣日乃至舉後第十章十一日故云乃至十一日通皆不犯若第一章始從一日得二日得乃至十日得此章既總犯故置之不論也鈔越此章便取第二章作已上證文次依古來解唯取第十章作也一日得衣者舉第十章第一日也此日得衣為染至十一日出決定是犯二日不得者舉第十章第二日也乃至十一日通皆不犯者據理合言三日不得四日五日六七八九十並不得鈔意存略故著乃至之詞十一日者謂前未第二日已去中旬九日並得衣至十一日明相出時所染中是不犯故云通皆不犯通者總也九日無衣總不犯故非謂能染不犯若能染不犯者使違律文也又云一日得衣尼薩已上斐申兩釋若諸講士皆依初解破第二釋不合唯約第十章作之則收上諸章不盡也今法寶却扶第二解雖乍觀似局然究理還通既於第十章九日所染無衣總皆不犯便及顯第一章十日總得衣一日為能染下九日為所染並是犯也文反顯中間八章有犯不犯舉後懾前斯為盡理今鈔正約此第十章作也若依搜玄却成收義不盡既越第一章從第二章作未成思之此中更有轉降倒釣超間作句非急不敘如是等類者如是得不得十章等類也具有八門通不相染者第二日不得衣則無可染第二日有説淨法故不相染餘六門或與人或忘等緣亦不相染餘無法緣是犯者謂上得衣無不得緣是犯又初日得衣不淨施是無淨施之法緣下六門無與人等緣故皆犯也二中間淨施者即第二門乃至第八門也初日得衣不淨施二日得衣淨施恐有十章三遣與人者初日得衣不遣與人準上而作亦有十章乃至第八忘去亦爾不具列也臨文略然注文中字廠立反曉也餘文可解云律至爾者此是當部長衣文也若與財去等者古人將犯長衣貪得新衣衣體誰去畜心不斷染著後衣入手即犯捨墮吉者是著用吉也今師標破云論中不爾謂多論中不如是也云多至羅者準此後衣無染者既云此衣不懺懺先提罪當知畜心不染後衣也二衣不捨已入淨者此謂資得二衣既不被染何須用捨故云不捨既無有過體是清淨故云已人淨也云上至等者此文有二初申正義二引律證成吉羅謂前衣雖去罪由未懺故有墮罪犯捨衣不應不捨而貨違佛語故得吉不同古人云著用吉也云不至犯者十日內者正是開位故無犯若轉淨淨施者作法故不犯若送與人者非己物故若賊奪等者戒疏云財在想去無故不犯如十誦後見本財更開十日以義曰新得故注文更得十日説淨更受持之者謂上引律離衣文有四緣失受無罪今此不然若遇四緣後却得時如日新得十日説淨若三衣并得更受持之非謂長衣受持也思之取著者戒疏云由前受持三衣遇緣奪失既無三衣有長衣在即將受持故云取著衣即無過直懺前所犯之罪也下引伽論意證知犯長衣得作三衣衣不犯也何故前云犯捨不得作三衣者正欲通疑難也謂前引律文尼薩耆衣不應與人乃至作三衣今此何故得作三衣衣無犯捨耶答此據等者謂如此之言據有本衣故云此據也得著五大色者謂約不如法色法依佛制不著今為失衣故開暫著人見比丘著此衣時即知遭賊僧祗借俗人衣受持者衣恐約暫著被借安仞受之以相同三衣故也律云他與作被不犯者戒疏云以財是重物不合加淨雖過日限不入長也注文未見正開者引文多釋搜玄云若他與作被此物被相未成猶是匹段即合説淨為作重故被故不須説今云未見正開比丘得畜被謂西國冬到將三衣而蓋身下引十談上僧及一人亦得受更有一釋云被相未成猶是匹段亦須説淨下引十律談僧及一人得受不言畜已上具申三解任情思擇云云付衣遠行者謂此比丘受得已將付前人收舉其受付者藏在匱中遠行不在過其十日不犯猶是隔礙非情過故北陸道斷亦爾云離三衣宿戒二者釋名者人衣異處名之為離違其分限約明相故名宿此是所防云云云具至犯者衣人異礙者所以不言異界者答以界中有礙雖是周界不免失衣故不言界又礙寬攝得界也不捨會者既不得會又不遑捨無因緣者謂衣重礙法及迦提月等云三至本疏者三衣五衣得波逸提者問何不無尼薩耆答約衣邊即有捨今據人邊結罪故不言也餘衣突吉羅者外也三衣之外即是長衣恐不令離離即結吉遂行例云一百是佛聽離宿故犯吉長衣佛亦聽如何不犯吉鈔云非謂畜長之衣等者今師云上言餘衣者正是百一供身之服雖則開聽佛令受持今違故吉長衣雖同是開淨施別入不開自畜又不受持離有何罪不同昔人所解又三衣是制等者謂佛親制作事通三品人今違正制故得重罪百一是開非制但違受持故輕長則下類者下品之人佛開方便別施他人自無貯畜之心故全無罪餘如戒疏者彼問云三衣百一內是受持何以三衣離宿失受得提百一離宿不失受但吉答三衣正制受通三品今若離宿違制罪重而失受法百一之衣開於中下有違但吉而不失受若爾鉢亦是制離宿何故但吉不失受法答衣資用寬許無暫離故得提失受鉢但一用復有時限故輕不失受法云二至中者如文云三至也者上之三礙通界並有者謂染隔情三不論作法及自然若有此三皆是失限故云通云云若論界礙彼此不通者謂自然作法彼此成礙故不通也就自然中有十五種謂僧伽藍界等各各不相通若作法中戒場小界等彼此亦別僧伽藍裏有若干界者具如藍相周匝若無俗來但出家人遍藍無別界是名一界若女等入藍即多界起故云若干界也注云無上三礙者五分云一界者而於其中得自在往反謂無三礙故也云初至隨身者謂律疏中比丘留衣在村往取衣時帶解比丘形露乃至慙恥因此白佛佛言自今已去不得置衣在村若欲結衣界即須除村已上律文大德云村無體但約男女往來不定故不許此處著及後若村去即許仍舊又準多論村有五義一村界不定衣界是定二止誹謗故三除鬪諍故四護梵行故五除淫疑故鈔中出三義餘二在等字中收也性相乖忤者説文云忤者迹也謂比丘受持禁戒為性女人以情欲為性二性相違故曰性乖比丘以禁防身口為相女人以縱放身口為相故云相忤也同室等者並如九十中明之云二至衣澀難者寶云謂有八難來蹇澀非情過故開其不犯捨墮但失口法後見衣取更相受加也不提戶鑰者等門閇無戶鈎得入與衣隔絶即失衣也若提戶鈎往會非隔故不失無十二柷梯者彼云比丘安衣閣上比丘下宿有梯蹬道上下者不失以僧祇無勢分故云三至失衣者情礙者謂情意有阻故名為礙當部律中皆約己情礙彼恐奪衣惡獸損命等僧祇等者彼約兄弟分齊處此名家界彼文云家內界者若兄弟二人共家處於中別作分齊兄不許弟入弟不與兄入若比丘在兄所宿衣在弟處是名失衣若是兄弟語比丘言俗人自雖情阻於僧不礙任意彼此爾時隨意置衣並不失也多論等者彼約王幻等即據也情礙彼故論云王來入界施帳幕住近王左右作飲食處大小行處盡非衣界及作約等亦如王法者樂人入寺近彼左右得置衣如王不別故云亦如王法問樂幻等人不妨比丘往來會衣何名情礙答不妨來往為其樂幻等人多令比丘蕩逸情懷亦得名為情礙云曰至同界者謂衣在自然身在作法衣身異處名為界礙此但約自然舍樹多種身衣二處並名界礙通界失衣者謂上三礙入作法界通引法界內失衣若自然界通自然隨界失衣也通得護衣者謂無三礙入二界內二界各自通界護衣此言通者約當界説非謂令論思之下引五分證是名別界非同衣界同上之三礙入此二界通失衣者此乃是染隔情來礙於界何故却名界礙答有此三事來礙於界令界不得自在護衣則衆多界起故名界礙若無上三礙入界通一界護不名界礙也云若至之者法謂作結攝衣界指下二衣篇説云今至十五界者四分十一他部有曰廣如下列云云云四至也者一僧伽藍界者梵語僧伽藍摩今存略故二村界者村聚界也各有四種者如文具列云此至爾者此等諸相不同乃至若干界者敘古也謂律文云不失衣者僧伽藍裏有一界失衣者僧伽藍裏有若干界古師妄釋云此等諸相不周謂四面無墻及離柵等即藍相壞也樹車等界藂生等者藍相既壞其中有樹便名樹界或有車等亦名車界故云若干也此是別界不名僧村二所者今師破也意道若伽藍相周樹車諸界則改名不顯必藍相壞則無伽藍界相其間有車界等但號樹車等界各自衣別名何處更云僧伽藍裏有若干界若周則失別不周則失總二不得俱故知非也戒疏示云若缺非藍乎曰宜野今言等者鈔主自擇也謂約藍中有此三礙比丘不得自在往返故云藍裏有若干界也乃至屋令道界等亦爾者示準上藍有三礙則失衣無則不失亦如是也云三樹至犯者與人等者起不礙須也足蔭覆等者足得蔭晚覆身也此但明小相者齊此陀舉最小之相若滅此即不可不相接樹者四面枝葉不連也取日正中等者辨護衣戒體也文相可知有人解曰樹若當道若依此樹護衣衣須挂向枝上不得在下地上謂樹界劣道界強故失也此全未見理妄曆茲言但依文中十誦所解樹影覆處護衣即得若相接樹等者玄云不相接樹是樹界若相接是亦界一俱盧舍正辨界體也云善見至失者偏長等者只是一樹於中或有一枝稍長此枝雖長諸枝一丈二丈由是此樹界也有人來往者有女人等即非衣界云上至也者上是大林又復無難拘盧舍也勢非廣及者曰樹之勢所覆不廣約無難説云僧至故者蔓無歎反枷者謂蒲桃是蔓草生苽瓡亦爾謂於架中央四面各取二十五肘為自然衣界體謂此蒲桃等架猶若小林勢非廣及故於內約肘數也明了論解等者了疏云波闍延多樓此云勝德是帝釋樓高一千由旬剡浮樹高一百由旬此之樓樹取雨渧所及處是界所以衣在上身在下界內宿不失衣所以爾者一者以上落下故二不為人偷故若身在上反前二義故不可也引此文意釋成上之樹架等身衣上下也云四至處者村外空靜處者謂若在村內即沒名不彰若論護衣即隨場大小是也云五車至犯者並俱在陸者此約住車也若車船回轉者正辨護衣界也謂衣在車船中身在但住回轉內外不失十誦車等者謂此人乘車御牛盡不騎中但車上坐以杖打牛今約此杖有衆多車前後共行或身在前車衣在前後車但車車相望牛杖相及名為一界不限多少縱人衣互隔千車但使中間無難皆名衣界也又須知是一家車若張王等異主即不可畜同載船中水等者準祗第八云比丘與外道同船別有住處外道住處堅窂持衣寄彼宿不有外道聽自在往返者不會不犯謂情不礙今上江船有多房尸置衣犯不準此量也云七至得者四分無相者律中但有全界之名與不釋護衣云相此謂村外別令者今師約文以明此舍今在村外若在內者即村強舍弱沒名何顯故云村外既辨村外曰舍因此辨村與聚同異指後廣明故云後當廣説僧祇樓閣梯𨁹道外二十五肘等者彼云重舍即樓閣也從梯根外曰向各取二十五肘為界體不論樓閣大小及梯在內外也庫倉界明內為言鈔準四分庫倉界即據明內為衣戒體明內則壁內也兩無任得者謂四分舍界但有其名無他僧祇二十五肘護衣之相又無倉庫界明內之言闕此二量故曰兩無今於二中住取一種為此舍界護衣之體故云任得更有非解不録云對至落者前文云村聚相後廣説正指此文也謂上明舍界四分但有其名不辨舍之所在今師以義判云村外別舍與朱知村聚之相同異云何因此便明聚落差別也云四分至也者四分村界者標舉也律中但有村名不辨如何得名為村何者不名村等下引外部辨相也元市名村有市名聚者見論解也彼云四相院落周備謂之村人民共居復呼為聚也落者還約雕落得名即知村與聚外相無別所言市者説文曰雜性共聚交易之處既知聚已於其聚中更有其家兩異次引多論相對得名若不相對沒名不顯一是聚非家者得聚落名不得家名即內釋曰如二聚落各有一家東西二聚相對即得聚落名一聚之內各有一家更無別家相對家即無由得顯謂東聚之內但有一張更無王李等家兩聚之內準有一王家更無崖鄭等家遂沒家名顯於聚落此宜辨家聚之相並未説護衣之義二是家非聚者謂有崖虗李鄭等多家相形與得家名以無異聚相對故不名聚三亦具二界等者以有兩聚相對與得聚名兩聚之中各有多家多家相形復得稱第四句可知云聚落至界者通與言之但約人民共住得聚落名反顯前善見論文約有市無以論全成狹局若約家者唯局一姓父子孫姓同董共居如前明也云言至界者謂前雅名明家聚兩別然護衣之相未知須知同別二途次當辨也別界者標也雞飛不及等者謂顯此界正體也盡外別有界皆名別界雞是家舍屬人飛不及處即屬別人之界也若護衣者人衣不得互離此雞飛之外即失衣也云同至故者同界者標也四邊聚落各有一家者此約四聚相延雞飛及內是同界也彼論更有二邊聚落鈔略不明或可但舉四聚辨內自舍二聚例之可車梯回轉等者一釋曰車回轉相及梯曰向到墻上得炎出入自在梯下車上服不失衣無滿礙故二釋曰梯下有軸可以回轉名曰車梯若準僧祇但之車於此曰界上住車扼及後左右輪各在一界置衣在車前後宿等日先未沒時去至明相出時尼薩耆聚落止有一家者以衣在家內身在家外車上梯下臥不失衣若無車梯不得往來自在故失衣也注文以無別家可對者既言一聚止有一家即無別家可對論其車梯回轉相及但明持炎出入即不失也若自然衣界等者謂曰聚內或一聚內是自然衣界外箭射雞飛及處是一同一界人衣互內外皆不失以同一界無隔礙故若衆家下謂前約曰聚但各一家今若有多家設有車梯失衣以有情礙故云家至失衣者就家界中自論同別一家兄弟未分同一事業名一界分張畢食業者名別界又名族者祖禰也苦內今別望承遂祖之同名挨就此挨中自有同別已分房舍住處名為一界厨井等衆共同處名為別界身衣互在二處皆失衣故云僧祇至失者此文大意前來引十多二文已約聚落內外分別竟若準聚落外曰界相接身衣在此曰相接界中失不之相未曾明委今別僧祇曰筒聚落外界相接於曰外身衣異處失不之相又引十多二界上臥類同上義上建大旨次銷鈔文四聚相接者謂四面有四聚落中旬有空地各是四聚同界之內而相連接比丘於中須枕車臥彼律離衣或云若四聚落界相接比丘須枕在一界兩手各在一界腳在一界衣在頭底衣離頭者尼薩耆若夜中手腳暫到衣所者不犯已上律文謂引律是通夜護衣乃言夜中手腳至衣所不犯也問名何通夜今師云謂通夜分隨於何時手足暫至即無犯也古師即約從初夜時便在衣所至明相出並不得去名無通彼律更急曰分但護明相猶是寬也此全不達教意妄致斯解今引戒疏四句初云一日光未沒去明相出竟來諸律總犯二暗去明來唯僧祇不犯三暗去暗來曰明去暗來諸律同皆不犯準此第二句云暗去明來僧祇不犯豈非初夜分會衣了去直去明相出後來無過何曾制於一夜須在衣所故知非也外難曰彼律既是通夜護衣鈔文何故言明相出衣離頭犯答古今諸記皆云雖取他部之文限約無依曰分又準別序第四門云四分判文有限則事不可通行還用他部之文以成他部之事是以鈔文依本限約故加明相之語也圭斬一解蓋未善自他宗也今衣大德云鈔中明相之語正約祇文結犯分齋非曰關分限約之文謂彼律通夜護衣結罪無依明相若衣若夜分曾會衣竟明相現時來則不犯若夜分不到衣所者當時未結離衣之罪亦須明相出時方結犯也故彼文云日光未沒時去明相出時尼薩耆又準戒疏引祗二句一食界比丘初夜入中即犯二衣界若夜不至衣夜未結罪明出方犯故知彼衣寬食急食即當下結之衣乃明相始犯今鈔文有明相字者是依彼宗釋結罪時節諸家不達此義但見明相二字錯認為四分限約非之矣又難曰祇文既是通夜護衣手足暫到衣所明出尚猶無過何以一夜枕臥明出頭離衣成犯耶搜玄云若準依曰分雖一夜非明相若離故是犯位若準他宗通夜會義初旦出法云頭枕衣其實未犯至明不枕則是離衣若也曾枕無來無犯今至此解二俱非理本為明於他部通夜之義何得却將四分明相以通必若約彼他宗既曾一夜枕頭何得明出成犯又云其實未枕者語下相違律文分明將衣枕頭今及為他理便言未枕此解誤於後學或有釋云謂雖身衣同處而無護心手腳不暫到衣所故明出犯也今云大會衣者一須有心二必手提方成今雖以頭枕衣作意然手腳全不暫到是以明出犯也下文自釋曰若手腳至衣所不犯證知不謬同日是身分何故手足至衣即不犯大德云手腳有執捉之頭無執捉之能又引十多例成同義清依此解不在疑壞所釋文徒昏鈔意也外道者九十六種等是門屋一等者正辨分齋也同見者謂有一類外道同是空見或同有見亦有亦無非有非無於此同中但同一見是名同見同論者有一分外道同是言論等名為同論若依約作樂人等來往遊行經營住處於中即有同別界如前者指同挨界中別堆共住樂同一部樂而衣食別聚處等等取造食及大小便處也作食別取水故即是別界人衣異處所以失衣若同屬一主者謂戲笑人部黨雖多與同屬一主衣食並同隨所置衣不失謂上失者是情礙也屬主若多情必不一故有礙故多論重舍者謂是樓閣也辨相可知云上至元者問上來如許衣界總是同分文中何故此言四分無文答四分雖具有名然於辨相是無皆引外部類例而釋以為允當故知此言無文者是無辨相之文也若一向全無即同向下四界通依外部故思之云八至餘者多敝露者謂一面有壁三面無壁是多此二據西天若此土即不爾也若此堂內護衣後面有壁齋壁即是界若前面及兩頭無壁即齋詹際雨滴內中影覆處為界庫界者約明內以辨衣界體也十一阿練若界等者蘭若無界者然謂逈空野無有樹林若有樹處自成樹界若爾何故律文約八樹中間等耶可引注文釋通云假以樹量大小也八樹中間者今釋空處不知幾許為界假用樹量實非有樹也七十有餘者明此律衣界八樹七間計有五十八步四尺八寸兼勢分十三步合有七十一步四尺八寸故曰有餘也云次至用者道州井水此曰當律名相俱無全引他意共成行事也云十二至不失衣者十誦弟子為師持三衣在道行前後去師遂即值明相恐失衣白佛佛問相去幾許今量之得四十九尋佛言不失過是則失僧祇道中臥等者亦準前文例解玄記至此二錯善見等者此謂衣在界內疑心謂在界外不慮失體故不失受法也律云失想界外為言者鈔主簡異謂律開緣失受無罪夫中衣實現在忘起想心謂賊持去出於界外決謂失體作在外心所以失受今則不失疑心恐在界外不慮失體衣在界內冥然不失明出不犯若弟子夏未滿者寶云未滿五夏不離依止非謂安居未滿謂此弟子本無離師之心以貪法味以法如師故開無離師罪師衣在界外故得離衣罪也明了論等者論云善解三衣六憐愍諸比丘故有六因緣離三衣而不得失衣罪一僧羯磨所作此有二種一迦絺那衣僧和合所作二為遠行及病人僧和合所作此二並由和合作羯磨雖離衣無罪今合此二為憐愍二依他所作如布薩界有二種羯磨光結布薩界後結攝衣界極大三由旬令用量也三不離所作者以波闍延樓及剡浮樹樓高千由旬雨水滴所及處是樓樹界以此例餘樓樹亦爾四垣墻所作謂伽藍及舍中轉車方便所顯如後釋之五露地所作如比丘行路四十九與度處相對覆地直身申臂斜衣各攝一角各相及許不離衣兩人相逐一人擔衣或在前後忽覺夜曉看前後擔衣人相去遠心疑未知失不即語持衣人令住自亦住令持衣人倚處一尋一亦弓以弓量度地四十九弓地齊此為限更取三衣最長者斜牽兩角彼時覆地直身以腳際向弓頭所及處向此人人亦覆如前人若相及不失衣住處時節所作處度謂阿練若時謂夏安居中住處又恐失衣佛令以衣寄餘處亦夜得離衣宿不失轉車者當第曰垣墻憐愍也了疏云言轉車方便者比丘出界值明恐衣行至寺門數步不知如何佛憐愍故方便開之令取一杖以隨伽藍用何等為四相或塹或籬墻等隨其高處將此杖量之伽藍若以塹為相者其塹必有大小深淺若廣與淺量廣為量若狹與深取深為量若籬墻為相取最高處量之若四向總佉淺即隨界邊有樹等取極高者用杖量與取高處為量乃將此杖一頭量車中央一頭出車外置明相出時身至之處寺門邊相去之間回轉此車若杖頭及墻院令此人住昨日處所倚便轉車若杖頭撥著此人則不失衣不及此人即失衣也於第六中後有二一大小便難二他加行難不失鈔文自引了疏解甚分明覺者可委也云十三至等者州界者即誦也水中可居曰州即今水中沙洲之類十四肘者正辨護衣界體計曰步一尺二寸有人來往者王及作樂人女人等是礙即失衣故水界者謂約淺水以辨也鈔初引見論據水為言與陸地別衣在岸上身入水即失次引祇文正明淺水在此水中不妨行李故前後相去得二十五肘不失衣是護衣界體計有七步半也若船上入水即捨者衣在船內身入水中即失此亦據深水以説也井界者或置衣在井欄傍四面各取二十五肘計七步半以為界體或井內但齊內面為體四面更無二十五肘也要須澠連方免其失例之內外可委也教倉也云此至是者結也大小如上者謂上十五種皆據護衣界之正體如僧村二界以四相為體樹界取日中影蔭及雨時水不及處為體乃至井界取二十五肘或井內為體如是大小並如上文所説若準四分加勢分者謂隨上來自然體外不論大小一例加浮勢分鈔引律文是也即曰面各十三步云諸部無勢分者謂四分釋僧界即無勢分自然衣界總有勢分準此文獨有若外宗衣界並無勢分但齊戒體體外即失如祇文寺門外不提戶釣即失衣等可不例解云善至會衣者同既云諸部無勢分見論之中何得有耶可引鈔釋云差見中無也若爾何故彼云約不健不羸人擲石落處等豈非勢分更引鈔答云彼有擲石之文別為除事等謂擲石雖同所為事別彼文明盜戒處所謂蘭若聚落俱是盜處其中有物盜取即犯云何聚落界謂取不健不羸人盡力擲石所及處取石落處不取石勢轉處齋此是聚落四分中但言擲石落處不云不取轉處等文非明了故不取之見論雖為餘事與文決了故取為準也諸師評云等往古諸先德咸共評論可有十三步也十五自然通著者謂此將一十三步通向前十五界體四面而著雖人衣互出在體外猶是十三步勢分內亦未失衣必在十三步外即成失也準不通法界者謂擇衣界即不通勢分但心於界體必須入須手分即成會衣若但在外亦即不得也所以爾者首疏云有法故無無法故有相疏云開不重開本結衣界猶是一開若加勢分大成疏慢故不可也云僧祇至易重者此文為談上來法界無勢分也準祇云比丘著上下衣入聚落有女人語比丘言今夜欲供養形像當助我料理比丘助日沒故欲還殷勤百宿餘如鈔文以門屋梁界內者謂既不得入但住門下以手提梁即不失衣以門有南北梁連於門下與衣同界因作四句一捨衣不得罪謂至異處宿遠捨衣借衣時故無罪二不捨衣得罪至他處宿但借衣持不捨本受者明出後還他衣不捨受法却受是衣得壞威儀者三亦捨衣亦得罪離宿犯者以輕易重四不捨衣不得罪衣不離身今鈔文前段當初句後段當第三句思之云若準至犯捨者謂雖作此投梁內手門孔中約內無礙方得若有三礙不免失衣外護不成若有三礙衣隨身也及界外事者水陸道斷急難等緣名界外事故開怒捨若不作上三事者一謂無三礙須至擲石及處二有情染二礙須手捉衣三若有隔礙要須遙捨也云上至中者戒疏云僧村四相周是強樹車共界體約不立餘十三界各不相擇故云諸界相望不論強初然其蘭若一界最弱儻有樹車來此言處果若之名亦不顯矣若將僧村二界互相望者玄云強村僧弱何以得知故結衣界云除村村外界若無村時現結怒除若現有村現除怒結故知村強也已上取文淮南亦云村強僧弱彼擇曰若三五僧在俗家中但名村界僧界不起才有俗人男女入來伽藍中住便有村界起所以律文令除村也與前解意同法寶云上之二説俱非雅當且如俗人入伽藍中露地住時有何四相名為村界今約義明但為結人男女在藍障礙取衣不得自在非是別有村生律文假令除村亦是除其妨難何處有其村體以此而量故知僧村二界相望並無強弱思之樹下有車界等者乍觀此文似有強弱以樹下有車界占即車界強車外有樹被樹界占即車弱今鈔意但取不礙義邊是無強弱此釋有理又樹下有車車界雖生而無勢分以在樹內故不妨其樹却有勢分若車外是樹出車屬樹更無車之勢分若出樹至車亦無樹之勢分若僧村二界下明伽藍勢分中若有樹車等界則衣樹車界護衣於樹車界外去藍邊有空地即平分勢分故云中去呼分勢分餘皆例此可委若堂庫有車船等者謂堂庫四面有障假有車船等在中但名堂界以強收弱故若爾前來樹下有車何故樹不能擇他車界可引鈔通之不同樹車等謂車在樹下及場上時揚四面且無障清收摴是以兩不相礙如淨地不周等者引例成上義如伽藍四相周便有攝食義即須結淨地若不結者有宿煮過藍相不周段食在內亦無失以無收攝之義不可類解若互錯涉等者謂庫堂是強能持車船若餘樹車等不能相枝雖有文涉但自是列界也餘如戒疏者彼云未顯兩相相接通成護衣所以第三明於彼此不相收持文云此藍非彼藍乃至此樹非彼樹等雖互錯涉別界所收也云第至種者謂上具列六緣此當除五緣也有緣浮列七種者泛廣也云一至羅者或對首心念者或者不定也有人對首無人心念住文以輕易重者非謂非法開離衣一向無罪今易離宿重提但有缺衣之輕吉也四分老病比丘者文云時有一比丘有乾痟病冀掃僧伽梨重此比丘有因緣欲人間遊行以此緣即顯衣病互有不成也注文三十已去名老者玄云多論文也或準俗年三十為一世一世既過當老位大德曰今約夏論即俗年五十可當老位不取初解離衣法如疏者是首疏彼問云離衣得幾月卷曰隨乞長短或乞一月極至九月中間延捉一任當時若中途病差及衣輕限滿等則不許離若準四分得一月離五分得前安居人至來年四月十六九箇月後安人得八月所以爾者以夏中不許遊行若準具論但以病差為限又上所離衣是僧伽梨非下二衣準此四分若依五分多論開離七條由入聚落須大食故五條常彼一向不許同離衣為約得法日以論為約離日以數答但從離日而數也餘如文云就至會通者前三得曰法離者謂第一別人作法對首心念二對僧老病等三對處結不失衣界是也後三無法離者第五王路隔塞六賞勞七五分僧俗六夜蘭若何可知得罪分別等者初判一向無罪二重明第五失衣不失衣謂難忽生隔不得會既不得會心即忘却會衣法式不得往持即斷故失不失如後者恆懷頂受念念不斷思靜即會即不失衣故指後開緣中也明初在一向無罪中辨者據其難緣縱使忘斷失受非情過故一向無罪問不料簡第一緣答第一一向是罪以輕易重故不料簡也對僧作法有緣時在者病在衣重迦絺那衣未捨是有緣一八九五月是時在也限滿者假使有緣為時限滿故失衣得罪餘一一準思者除第五三二文中明忘在外三緣是餘一一進退皆準於此思也知而會通者思與若知通舍前之三種餘不繁録云律至諸部別辨不犯也此謂失體者四分五分失相無罪謂決心作賊持去之想失其衣體然衣實界內想心謂失即失受法即是捨心無情過故衣不犯捨善見言不失者師主疑心恐在界外不慮失體故云此謂失體也不同見論之中體法二俱不失以弟子將衣先入界故前言失受事隔不知等者却牒料簡門中五中隔塞或忘斷故失衣文也既彼示同此難何故言失鈔通云事隔不知知正辨所以也事謂難事彼此事隔不知思會經明失受由是雖故不犯捨也此即恆思會護但取會無由雖則經明不失受法前指不失如後正是此文進退者律文之中前明犯相後明不犯進向於後即是不犯退却向前即是犯也前無非攝護之人比類二礙退就犯位失衣犯捨若恆懷攝護之人北其二礙進就不犯失衣無罪又有不立染礙等者敘古也古云據其初緣置衣在俗女處往取形露招譏豈非情礙此不通諸部者破古也十誦文中具有染礙之義故云問至之者如文云且至之者廣如注疏者彼問云如或開緣何分勤惰答諸界相開並為奉者必有惰學根本非是通開羯磨疏中衣食二緣廣有成敬自餘物略僅知與已云月至三者釋名者開齊三旬悕望得之名為月望此是所防云云云此至界者但三衣是上根人也畜長下根不在此例故云不須此戒云亦至犯者列緣也一故壞三衣者新衣不開二財少不足者若衣財足亦更不開三為換三衣者初戒不開一月明須為作三衣以貿故者四不説淨者若説淨無過五無犯者無緣注云同長衣即失奪燒漂也六過限外犯末過無失如下廣列云此至長過者初十日隨得作成若不成衣至十一日犯故住或云若十日中同衣足者截割不者至十一日隨衣多少並犯捨同衣者布與布同絹與絹同等第二位從十一日後隨日得足須成不成足者明出犯捨若未足無過第三位第三十日一向限之者戒疏云無論得衣俱同説持明日已後更不開也既云俱同説持足則加法受持不足且持諍説不同順正約不得説淨名一句限之也僧祇等者謂點淨也庶行尺庚反急竟者即疏疏行針貴在急了或云粗行戶明反隱竟即粗陳作行位也今取上解約當日須成是急義故此律下可知云若至也者明三俱故欲換三衣各開一月即將九十日分為三位有通求別求若通求云隨得衣財足即作者初十日常開如上二從十一日至八十九日為第二位隨得足日成受持不者明出犯捨兼染餘未足衣亦犯若全未足許向後求三第九十日若得作成受持不作至明犯捨同前一向限之也若別求者標心乞布作五條紬作七條絹作大衣亦如上作三作云云同體未無犯若足便須作成若不作成兼染餘財亦犯云云如上非正替者恐人疑云此是三衣財體無長可防何以犯耶今云現有三衣在此未作衣成未能替故衣若不作成衣受持即為長物故云餘同長衣開者淨施遣與人失奪五相心及迦提等八緣開不犯也云取至四者釋名者虗心送與領納屬己名之為取離七世族故曰非親尼者簡下二衆衣者唯五衣也此是所防云云云具五緣者總標犯緣也云一至無犯者如文云五至俗者虗心送與領納屬己名之為取離尼自與使人受二使與自受三使與使受四自與自受四句皆犯也既云與人何簡道俗者破古人也古云尼五衣外有長衣得施下三泉不得與僧施受俱犯今破云既云等云云但使大僧先無求心得受又據或是受持五衣今此所施後是長物有何不許云律至不犯者注文一高祖者七代最尊故曰高去身四代高祖姊妹即高祖姑女即曾祖姑二曾祖者去身三代曾祖姊妹即禰祖姑女即祖姑三稱祖者父厲曰禰法寶引俗禮云祖已後為立庿以栗木長尺二狀似書筒於上提官銜號為木主是在庿中四時饗今翁之姊妹即姑婆女即兒姑四父五己身父之姊妹即師姑女即己之姊妹六七可知問夫論世代合據男辨所以約女以明答凡明世代合約男辨今辨戒緣須依女説此皆親尼不犯也餘可知云使至五者釋名者驅外尼曰使非親洗濯穢服曰浣故衣此是所防云云云律至提者問浣染打等三各別合分三戒何但制一可引鈔釋通云浣染打實是三戒此明離意同猶一衣生者此今意也謂相由致犯用浣故染由染有打也此戒業重者重互兩解一一上聲呼如下鈔云即今弟子因交致染故二云平聲呼如下引律院染打於一衣上結三尼薩耆即重重犯故僧正云五至戒者如是互作五句皆墮者一令非親浣而親洗二令非親浣而親非親共浣三令親非親共浣而親自院四令親非親共浣而非親自浣五令親非親共浣而親非親共浣五句並犯或有畜尼弟子者是檀須弟子非謂依止以尼通依僧故餘如文云三至吉羅者自與使與四句皆犯者一自與尼使人受二使與自受三自與自受四使與使受四句雖殊皆尼目浣故結也準此無重犯者古云一衣之上無浣染打三尼薩耆所以爾者謂才浣竟此衣即是以犯捨也假使尼更染打亦但結吉若於三衣之上即有三罪謂準十誦多論之文無重犯故一衣無過有重犯者今師釋也今云此本是清淨無犯之衣比丘將付尼時使語彼云與浣浣了恐色脫即與染染竟必致即以打如是一時落彼彼作未竟衣未結犯不成過衣三事畢時三罪頓得若令作三但為作二決心罷者衣得二罪後忽更打只得吉也若但令染與不染打此得一罪後重染時成有過衣亦但吉也使尼湔者子先反説文曰半洗也文音淺謂使尼湔處有罪餘不湔處雖無罪不可割破且將合捨言五至羅者比丘尼薩耆吉羅者謂先令浣故提未淨重使浣故吉云不犯等者如文云從非親至六者釋名者以非七世故曰非親未入道衆稱之為俗彼不請召但自求不見故號無衣此是所防云云云多論至彌者制意也是好非好者謂持戒破戒也實好犯墮是自代其功不好云好是誑委他得物犯重注文無戒沙彌者謂無十戒也以十戒中亦不許捉寶故云具六緣者總標犯緣也云一至犯捨者非謂迦提月中開從他乞者釋疑故來恐入疑云迦提賞勞用乞何故要須失奪燒漂方開鈔文簡濫故云非謂也必是無少交不濟冬者謂約貧乏總無長財即開迦提月中乞衣若有長財亦不開許隨量乞衣者隨三夜量夜量外不得更多貯畜即是貪故順正記十三各隨重乞不準波句通違篇本四肘者七尺二寸姬尺已上可知寒暑相者冬月著生等方便説法者規前利故緣中一條者衣曰緣中一修也云五至中者如法治者玄云通輕重也此是僧物雖開暫用今不還僧須衣夷法治之非吉羅也如雜法中者諸雜篇中彼有通賊方法等云律不犯至罪者通前五緣者四分開通中奪失燒漂曰更添五分衣壞一緣成五也非法求施施非法求二俱犯罪者謂邪命乞求是非法求施俗人知是非法故與因結施物成他業果若俗不與僧但有心未成果也亦要此解記中引七百結集文太繁不敘云過至七者釋名者失三受三名為過分從彼與受乃曰取衣此是所防云云云六至知足者五過知是者古人失三受三即是知足失三受四日是過知足今師師失三受二失二受一除則別求失一不得受今失三受三等即過知足也尼五衣例此六領受犯未受無過云律至別處乞者如文云四分至交犯者前戒為他不犯等者簡濫也前戒自為己即不得若為他不犯此或自受得衣與他故犯由情諂故若爾既與前人何故自犯答假是為他要自受了方與故入手時即制與犯不犯者鈔文存略若知足若減知足若依細薄不窂二三重作不為失故施一切不犯云勸增至八者釋名者數遣答縷名曰勸增隨縷與直故云衣價此是所防云云云論至犯者虗心辨價者靈喜之心不從他乞也餘如文云四至指墮者戒疏問云勸增戒中一縷便犯乞衣戒中四肘方犯何故不同答本施主無心乞肘任其多少惱義是微故曰肘犯勸增之中虗心限約不定今乃嫌少索多惱之情最重不問多少同犯罪也云律不犯等者如文云勸二家至九者釋名如前云制緣至得者制緣同前者制犯六緣同前云云勸令二家為異者謂前但一家今二家勸令共作一衣異前也除殘文義如戒疏述之云過限至十者釋名者越三六制名為過限通迫淨主故云念切索衣此是所防云云五至犯者四過分索者若準律文三語六默未犯過即犯又見論云純語往索齊六不犯過六方犯純默十二未犯十三方犯語默相參九反未犯十反方犯如是類知五語二默七反未犯曰語四默八反未犯三語六默九反未犯二語八默十反未犯一語十默十一反未犯全默十二未犯十三方犯以一語破二默也問默然索者可住幾時答祇云如人入庫取者著店上頃又如褁幞物頃便須去也見論又云默者不得語喚坐不得坐與飯不受若請説法問義總不得答彼若問何故至此答居士自合知之云律至不犯者即相布施者約本施主説非謂淨主作此言思之應以侍者隨淨主所期之時也波利迦羅此云助衣身也或有難云忩切索衣戒中有淨生生者且淨主因畜寶始有此既未制寶戒何故有淨主耶答此戒理合在畜寶後但為結集家或翻譯者安布錯也思之云乞至十一者釋名者梵云高耶僧悉呾利此云野蠶臥具綿損命求作法衣此是所防云云云多至故者制意也如文鈔闕具緣戒疏具五如別具列云四分至自入者若雜以毳者字林云細軟羊毛又尚書云鳥獸皆有三種一大毛謂之羽二毛管謂之拔坮肉小毛謂毳也劫貝者樹花也戒疏云若據前緣至養蠶家乞綿看曝招譏今論雜作純野蠶以疏説親俱令斬捨憍奢耶為絲中誦者之名是綿名養蠶所得也如秦地養蠶法者如此土養蠶所得彼無絲綿兩異但總名綿準如此間則有兩別乞之皆犯捨故下文乞縷是其事也臥具等者多論云三衣總名臥具古人云此相難識今師實相此是袈裟但以三衣總號此土先無聞説以綿作僧伽梨此既本無不知何物而廣長有相因被於教故以翻之為臥具也或云敷具者三衣名也多論六年臥具正是三衣若非三衣云何乞法黑白臥具並同此也外國亦得作三衣只為乞得故犯捨若他與離煞者手即得雜一毛便等者取憍奢耶如一毛長雜餘物作即便犯也若用憍奢耶衣體作紉處揲垢膩處是羊毛細揲是憍奢耶乃至經紬交迦穿雜並是犯也非悲不破戒者雖離煞者之手元是損生之命也若受之四等之中闕其悲愍衆生之心被非煞者不乞自施故不破戒也今有一方禪泉者續高僧傳説衡嶽思大師徒衆在山皆不著綿細搗然夫以為絮將布衭之用疑寒也云以至吉羅者乞繭自作綿無罪者謂是幾了熟繭此家無蠶不是自藏了者比丘乞得自作綿不犯為責有蟲吉者蟲雖已死招譏結吉故云律中至羅者如文云不犯至疏者若得已成者謂前人蠶家乞得作成施我我不自乞作無罪仍斬也餘如戒疏者彼云若得已成者亦須齊斬此言甚切云何可通如五分他施已成亦犯捨十誦若得已成受用不犯有釋云但是部列不同十分誦五若得已成者下列滅無開文但道斬壞如何捨制與用他開疏又問既云非法受持成不答如律通制但云五大上色不成受持至於財體並無得不之判今準央堀經文僧綿成施持或人莫受設受非悲不破戒據此斟酌滅有餘義非急不録云黑毛至十二者釋名者乞黑羊毛作三法服此是所防云云云此至等者此四臥具者綿黑日六年四臥或並是三衣總號昔人疑之至今未決者義淨三藏云敷具者謂是臥褥一則織成二則布體織成者氍氀之類布貯者乃是𣒰褥之流昔人聞此言之至今疑情不決相疏云此相難識也僧祇已下引文證也謂四分文中不了但云臥具不言袈裟致此疑懷不決今引祇文栴僧伽梨迦多羅僧安多舍尼師壇亦云臥具鈔越中間故云乃至用除疑故外難云此四並是臥具何不同前戒首之戒不然則在後昔戒之而於此戒中定之玄云古師見律乞為臥具謂是臥褥前或是綿疑稍薄後二是毛不異於此故於此中定境後乃同收前衣名同相從總述更有異解不正云四緣至如且者一純黑毛者非黑毛是闕緣也僧祇云謂此毛大貴一兩直二三全錢其體細軟觸人眼精皆不淚出甚為難得出四大國一毗舍離二弗迦羅三剎尸羅四難提跋陀國時人往彼求此毛或得還或死不返諸比丘多求令彼家破招世譏也二作袈裟諸比丘求此作三衣坐具準除漉囊是開緣也如上者如上或自作敬他作成犯捨不成者自為他作犯吉等云不至犯者若得已成者戒疏云不同前或假得已成猶令斬壞此開故無文令壞若截割壞者注文自釋云無作割謂本作時擬壞故若本無心壞作成即犯也若細薄疊作兩量者注文自釋云無意後得戒疏云細薄重披謂初雖是細貴擬後作粗賤者相揲重疊與披即非純黑不犯準此即是元意待後付得故者初作純黑未為犯也攝熱巾者謂食器熱以巾褁手捉也云白毛至十三者釋名者白毛三衣是所防云云云因至犯者因緣者黑白雖殊俱非應法譏呵義等故曰同前也佛制參作者諸比丘亦見前戒不得黑故便以白毛作之因制三毛參也不依敬參是以犯故云五至犯者列緣也一三毛參作者外難曰此列犯緣今既依教參何得却犯耶法寶為通此難云據理三毛參作是不犯緣今可加不以兩字即成犯故外難曰既不以三參作將何而作若純黑犯前戒若純白犯此戒初緣若純尨即無犯今云依制參作理非可犯因制參故便有拒違向下自有增好滅惡一緣即違教犯今須存此正是犯緣不須加添不以二字思之四增好減惡下至一兩者欲明增減先敘相參如戒下文云應用黑半毛三分白四尨也假如四十兩毛用分為四言二分黑者二十兩黑毛也三分白者十兩白毛四分尨者十兩尨毛此謂四分澤津之人語少不了今準五分云應用二分純黑羊毛第三一分白第四一分尨證知前來二十兩黑毛白尨各十兩也今不依此參致有增好減惡謂黑色增一兩犯提約體貴重故白毛增一兩犯吉體稍殘故尨毛增之全不犯此耳腳上短毛體極賤故問三毛俱參黑既體貴何故制以二分其數却多答戒疏云就同制或故黑多也又黑色雖貴順法服相白是結服所以不多尨毛粗短多即無用餘文可知云減至十四者釋名者作三法衣制有年限不得違越減於六年此是所防云云云六緣至犯者如文云僧祇至不成者未滿六年不得更作者謂外三律中但未滿六年假捨故者亦犯捨四分不爾如下開緣中明之白羯磨衆一一不成者謂作白不成作羯磨不成衆僧假和合亦不成故云一一不成也云四分至一切得者別開不犯可知云不揲至十五者釋名者標名即是云云云五緣至犯者若有心以故者揲作成亦未犯若無無揲心作成即犯也云此至不須揲者後二俱句準知謂作故如量兩戒俱持作新過量不揲兩戒俱犯隨十種衣通得者謂憍奢耶劫具欲婆羅等隨一皆得云津不犯已下如文云持羊毛至十六者釋名牒鈔云云云四緣者總標犯緣也云一至第四者此戒犯緣具四今依戒疏科分二初前二別明次後兩合釋云云一是好羊毛至第二己物此前二別明也今釋中二初前標後舉依他部略明二四分下廣行當宗辨三由旬及過犯之相此依搜玄科鈔文也自持至第四者此謂前標三自持也後舉第四中間僧祗略消二緣上半是三由旬重擔俱犯即是過限故云云齊九者三人各持三總計九未犯重擔即過犯第四緣也已上正釋竟或依法寶科為前三令辨二第四下別釋第四所以注第四兩字者一為簡下四分二為解上僧祗此釋違疏文益失鈔意云四分至亦吉者不得助持者自擔三由旬竟使他持於限外更助他得吉若五分但聽持不許須戴背負也若持餘衣者恂遮羅葉草餘物者戒疏云帽巾等吉也云若至不犯者毳裝去呼者字林云細羊毛作也雨中披行古來天子大夫服之巡行國毳繩者以毛為也除處毛即耳腳上毛也準此亦是未擔之前若曾擔毛三由旬竟更持上諸物亦犯吉也云使至十七者釋名牒鈔云云云制至中者犯緣具五一是比丘尼二是非親里三是己故毛四自己院染劈五竟犯餘如疏中者首疏廣明姨母女人來至佛所但亦不坐恐招譏等云云如彼云畜錢至十八者釋名貯用屬己名畜情所珍玩為寶錢有八種下文自須此是所防云云云多至故者制意如文云寶至罪者八不淨財者標意也且因等列數也云初中至經北者次如上不出佛經者謂經律論文雖則通云八不淨財須其過患不應受畜無其一二之次第今上所列初則田宅園林最後及諸重物引是古來先德如是安排前後故云不出佛經也云二明至正解中者玄云釋迦一化凡所制戒不對俗明唯斯一戒對俗人制佛告大臣若見受畜如此物者當非我弟豫沙門四患即此戒是者經謂涅槃等律乃諸律佛造大臣日月有患曰不明不淨不能有所照亦無威神何等為日謂阿修羅煙雲塵露是日月大患沙門亦有四患不明不淨不能有所照亦無威神云何為四謂不捨淫欲不捨金寶不捨飲酒不捨邪命自活是名四大患也所以大患準曰者莊嚴論云酒為放逸本淫為生死原金銀生患重邪命斷善根今此四中是其一患故云即此戒是也云二明至開畜者禁重如後所明如此文後引涅槃十餘處文皆極數破不令畜等律中事在小機等者住著小機名為事在未能無苦故號小機先須安身然後進道是意狹也容有開文意攝劣故云第一至得受者別人不開者即顯僧得受也向下引文證成一口小房有資道要容身小舍別人許之為有資身長道之要也云二至説者如雜法中指下諸雜篇中僧地上種果業得一然之類也云三貯積數帛者標也云昔至㴼者舉世夢傳者舉遍也夢虗也餘文可知云僧祗至法者安囊服內者意證上文三十六碩是虛説也云四至畜諸童僕者增一至哉者欲過羅剎等者經曰梵志將女施佛佛不受之語梵云已受汝意但吾以離欲故不習欲法時老比丘搖扇扇佛勸佛受與我佛呵之告老比丘言汝過去世曾為羅剎女或今更被此女所迷譬如有人取羅剎女納為其婦其羅剎女生得子是還自食之食子既盡復食其夫愛女亦爾煞慧命故終墮地獄也餘文如鈔云僧祗至如是施者彼云萍沙王來見尊者自泥房因施民二百不受至於聚落內百姓情欲供給要持五戒終身即受善持五戒自然得免淫欲故守足園寺五百人者彼云佛在王舍城萍沙王往彼精舍禮佛因問大迦葉今何所在諸比丘答云在耆闍崛山上踏泥王遂往問何故自作答曰誰當為我作第二度來亦如是問迦葉云王頻有此言但不見與時王慙耻遂問左右先有此言否答有王問是何時左右云經今五百日也王遂下山時有捕得五百群賊到王問其罪至何臣言其罪至死王問賊汝能隨我語不賊言能王遂令與諸比丘作使大臣白言此是賊能偷比丘衣鉢王言我有方便多給田宅倍與飲食彼必不比丘也離竹園寺不遠立為淨人聚落等施非法語者即行主排説之詞花言艷語之類也云五畜生畜生者標也云律中至爾者如文云涅槃至同者剎利居士皆入阿鼻者謂不能齋食常住物故善滿五人得受者謂五人能辨自恣并邊方受戒佛法根本令三寶不斷也大集亦同者彼云若一村一林有法師等如僧網篇説之云四分至得者如瞻病法者彼引僧祗道逢病比丘應求車乘馱載令歸若病篤無所分別不問牸牛草馬等故知病輕能分別者即不許也無病不合者遺教經云比丘騎乘車馬一日除五百日齊含利弗問何以故佛言比丘違禁法律人見生謗令他獲罪老病即開開船上不犯也云六至解者末利夫人施僧布薩餞等者十誦云佛在舍衛城時末利夫人為聽法故到祗洹中問諸比丘此有幾僧答不知以此白佛佛令行舍羅數知數故後即施餞比丘不受佛言應受準聽受義應付淨主也雜含等者律文如鈔云云古云此是資要無過故聽受寶但不應自為身受若反前自為身即不得鈔鈔意不然此云得受者謂得受竹木非謂錢寶等注文者若疑四分言中不了上有雜含經文亦自分明須木直黨木乃至須舍亦人若得為房舍受舍錢者何須言其直黨餘如正解者指下解戒本中明也云七至得受者重物者或體用俱重如床等二體輕用重如被褥等氍數三肘五肘淨施畜者此約者有袈裟量故過量厚重者即不開淨施銅拻過反可知云八至主者若得金寶咒願已還主者三解一云呪願施主已還付淨主此説今非二搜玄云還反本施主為貿淨物非為永還法寶云還反施主須得不還不得令他貿淨衣物以文中一向不開故任情取捨云涅槃至依者説輕為重者謂豐時禁約説重為輕者謂儉時開聽觀知我等弟子下但明一衣是説輕為重義也鈔文從若諸已下至依止已來此明四依也初據有人供給則不聽畜二無人供給飢饉時即聽豐時不得三雖則飢饉能護法者則聽不護法亦不許四雖護法淨施則聽不淨施不許如是四法下結也我為肉眼説者以肉眼不分別邪心今為此輩説此四依今驗邪正若有慧眼即月解分別何須用説若有三藏等者謂毗奈耶等云云云又至要者此汶鈔文是和會二經相違文也十輪云破戒比丘亦須禮敬涅槃經文制令不許禮敬二俱是大乘教文因何相違鈔文滅云十輪據不知持犯者説反顯涅槃約知故不禮也亦不相違又涅槃尊者再釋也以此經窮盡法厚終極之教令不禮敬破戒之徒可以依義用不亦得者謂不用依十輪經文據不知持犯者説亦不因十輪亦是經正翻實録何故不用依之亦得可引鈔釋云以護法故小小非要意道涅槃文以護佛法故是大事若比丘受畜不淨之物自壞壞他必沈惡道大事今若折拌令彼不作是護法也十輪經文但以袈裟因緣故令禮敬是小小之事非要依也非由不也云三至了者如文云四至無罪者受貿輕重者標也若以此八貿衣犯捨者鈔文全依首疏辨也彼云若以八不淨物貿十種衣犯捨墮故搜玄對此廣明古解與鈔全乖略不敘之或有於此便論今義亦未要預述至下文自釋以衣得亦綿氀亦捨者首疏云以十種衣貿八中六七即殘及氍氀犯捨餘六但吉若以衣寶相易墮皆以衣貿寶寶貿衣得墮若將衣寶貿餘六種吉羅約此六種自相夫貿得吉若以此六貿衣寶二種亦犯捨也此謂與俗爭價等者正明結罪之由也謂指適來提吉二罪皆約比丘亦不合與俗人爭價增減以結此合師正解也問八種俱是爭價增減何故結犯有於重輕答田園奴婢畜生等不應捨法體又微但吉二寶應於捨法體復貴重故不犯提也若五衆但吉亦據爭價説此釋不違鈔文不同古記繁雜思之多論等者玄云此文因便故有謂犯捨錢寶貿得新衣不知此衣犯不故引多論説淨錢寶與犯捨錢寶貿得新衣作三衣百一物並不須説淨月百一外成衣不成衣並説淨新得過無若犯罪悔僧中者畜錢迦吉對首懺先畜寶迦違淨法提應僧中悔已貿財作百一物不須復捨已入淨故若百一物外法衣一切説淨云正解戒本者是上義門今當正解云此至便犯者文言手捉別時意者古師云此戒為畜故提後九十中約直爾提是別時意也今云此戒準約畜後九十中但據提不論為畜及爾提等此戒文中言提者自是犯後九十中捉寶戒云別時意也列犯緣如文云此至濫者準此失戒者玄云失受體也謂順敬即是佛子今違教即捨法佛既非師則捨佛乖六和義則捨僧既捨三寶身則無戒此持大過分也今云失者戒者但據一戒無表不清舉例如畜貓狗一衆無戒不可衆僧盡捨受體耶思之佛告大臣等者雜含云時有珠髻大臣問佛言前日王集諸大臣共議沙門釋子受金銀等為是淨為是不淨於中有言沙門不應受畜有言應受畜我時聞已生疑不知此事云何佛言若沙門釋子受畜金銀得名清淨者五欲功德應清淨也準此文意謂世間五欲之境眼意色耳意聲等此五因貪故生本是煩惱結意不為清淨不名功德今若沙門受畜金寶為清淨者上之五欲亦是清淨五欲既非清淨反顯沙門畜寶實為不淨理非功德也梵志書述者增一云昔有梵志名畜苦從梵志師受學既學通達師為改名超術受學既久思報師恩欲詣聚落乞物偶諸逢婆羅門大禮論義若得勝者賞金錢五百金杖一枚金瓶一口端正女人一牛千頭超術自思云諸物不要若論得此金錢之類報師恩德不亦好乎即往衆中有婆門多有皆慧超術先以一問問中合五百改義舉衆了無知者遂將上件諸物以賞之超術云諸物不須唯五百金錢金瓶杖等報師恩也持物路行逢人忩忩定光佛出世超術自思佛甚難值我今卒可持此物獻又乃思惟我先有書名為禮記彼書中云若如來者必不受寶今貿蓮花以上於佛并解髮布泥如來授記等云云云佛至除思者劇者甚也行商坐賈才見少利便博易之沙門貯畜要侍商價更甚於彼也信佛法煙雲者謂信知畜寶是佛法之一患如日月之患患在煙雲也矜恃者孔安國云自修曰矜也出此無貪無罪之言排其法律即是輕撥大聖也一分平呼之利尚計者謂分毫之利心亦計之舉少況多也不及俗士高逸者漢末魏初青州管宰鋤圃見金揮鋤與瓦石不異王夷甫一生不言錢等儒士尚爾豈況高僧而耽俗利蟷蜋拒輪等者莊子云蟷蜋怒臂以當車轍寧免破質於輪問飛蛾雖有投火之能之能反遭明之表體法令可知云涅槃至油漬者如文云四分至緣者八種者一金二銀三銅四鐵五鉛六白鑞七木八胡膝也云僧祇至羅者生色者天生自然金不假因緣名生色也似色者似猶像似金之類則生似是梵言金銀是漢語或云金銀生緣者梵漢雙舉也捉得提者亦是犯捉寶也七山者標也七舉數寶珍美也一金者説文云金有五色黃為其長百練不變久埋不生從芊不改西方所出也二銀者白金謂之銀摩尼者謂如意珠也亦云無價廣如卷初真珠者亦云赤珠謂赤蟲所出即蚌蛛是也珊瑚者紅赤色説文云石脂似樹形出海中車渠者青白間色也馬腦者此寶形似馬腦亦云玉石上之所引依多論若準諸經論説七寶大同小異第三是琉璃碧色寶第四頗梨即水玉是五種取者如下文五種受即是也四分是中等者戒疏云明捨錢方便付淨主也鈔文稍難曉須細尋之從若彼人取還直至掌之齊此已來據彼人不會比丘之意謂言將物與他不取順受却還比丘彼既內心不解即乖淨施之法故律云即作彼人迷故所以不成物既現在即作他物收取令淨人常護也鈔云若彼人已下乃至受持之齊此已來此約彼人心中却順解前來比丘之意再來取此物即令淨人持與貿易衣鉢受持之鈔云若彼優婆塞乃至持之者此約彼人為比丘持物貿易得衣鉢將來比丘即將新貿之衣依法加受也不作淨語得者云僧至之者褁眼三施者繞也欲令彼迷方不記處故以餘文可知云若施至須者如文云多至彌者僧中次第行者謂如今時齋家行錢即須言此不淨財等正明捨懺法則可委餘寶説淨有二者若內衣持錢寶來與比丘比丘但言此不淨物我不應畜若淨當受即是淨法若白衣不言此比丘不語取犯也云僧祇至儔者祇云佛在舍衛國時目連將專須沙彌食後到阿耨池上坐禪時沙彌見河邊金砂便作念今當盛取此沙著滲灌下目連從禪覺已運通擬還沙彌為非人所持目連回顧喚沙彌來答云我不能往目連問曰汝有所持耶答曰身有金砂告云汝應捨棄棄已遂騰言者也乃至老比丘等者祇云有比丘將一沙彌看親里路經曠野中道有非人化作龍右達沙彌以花散上讚言善哉大得善利捨家不捉金銀及錢比丘到親里家相看已欲還時親里言汝今還去道中之食可持錢去市易所須沙彌受已緊著不帶而去至中道而非人見沙彌在比丘後行又化作龍來左繞沙彌以土坌之言汝失善利出家修道與捉錢行沙彌便啼比丘顧問具述上緣師令除錢非仍舊右繞以此緣白佛言自今不聽沙彌持金銀錢用此文證上故不許捨與沙彌也此猶譏類者謂此沙彌捉寶罪輕猶可治救故貢致責令其捨之罪重根除神亦置而不責也池神者祇云昔有比丘至一池邊見蓮花不取手捉恐壞生故而但𭊴之心中賞愛池神呵責比丘偷我花𭊴須臾忽有野象來入池中皆折碎池神默然比丘語神曰我暫𭊴香即見呵責象今壞損何不厝言神曰汝是沙門出家之士合知法律是以責之畜類無知何可為怪也顯戮者如暫𭊴香尚致神責況當違制覆罪不陳清罪委知無任同法故云顯戮也頰腫之債者百喻經下卷云昔有癡女聟至妻家羞不食後為飢逼盜食生米其頰鼓起婦謂之頰腫之患問其因由因報不語妻乃白父父召醫人以火鑽烙頰穿米出法合可委云云云律不犯已下別開不犯如文云貿至十九者釋名者貴物相易名為貿寶此是所防云云云多至異者玄云此律不云求利但言出家人不應故古師云多論與律不同律貿得寶入手即犯若用寶時則得不應寶體既無將何以捨故疏破云昔人不立以財無再捨罪不雙結今不同之見金以錢買金而畜初易貿後畜緣相是異何不雙結五種不同等者疏云貿寶七衆俱犯衣唯二衆俗犯二貿寶月作教人為己同犯除為三寶貿衣使人不犯三寶寶一制不開自為衣則開蘇油相易四捨法不同寶捨俗衣捨道五還財不同衣捨懺還本衣寶捨懺後易淨物也但無衣食為異者謂此戒但論金銀錢已下販賣戒衣食相易為異云五緣至前者一是錢寶者金銀各三錢唯一品金有三種一已成金二未成金三已成未成金已成金者叉釧等也未成者金梃是不同有云金礦也已成未成者鑄寫作器未治者銀亦三品例此可知錢若據理亦令有三未成據未有文象者以説既未具足世所不行即非貴物故唯一種不同金銀三品俱貴世所用也思之二互相易者互結成句則四十九隨一為須皆得七句初已成金易已成金二已成金易未成金三已成金易已成未成金四已成金易已成銀五已成金易未成銀六已成金易已成未成銀七已成金易錢餘亦例此可解云律不犯已下如文云販至二十者釋名者為利賣買稱之曰販此是所防云云云多至故者制意如文云論犯至受者列緣可知云律至重結者準餘部雙開者據四分此戒準約教淨人易貿是一開若準僧祗十誦俱開日貿反與淨人但作知淨語當於價直即道俗雙開又下四分衣法亦開無淨人時自貿等衣藥交貿者謂四分律文但有四藥及衣相貿六餘物也準此有二十五句初有之句一時藥易時藥二時藥易非時藥三時藥易七日藥四時藥易盡形藥五時藥易波迦羅衣以將非時為頭亦準此所解問既云準約衣藥於易已外應無犯若無犯者何故文中言種種販責答只向適來句數之中亦得名為種種何必約一切物為種種也數數上下者增賣者本賤賣貴買亦如是本貴買賤本增直五錢減買言直三錢重減買者本直五錢言直一錢等餘文可解云五百至不犯者如文云僧祇至罪者相似貿相似者玄云謂瓶犯墮此名相似也若鉢貿瓶亦墮名不相似也若可食噉口吉者外難十誦多論同是一宗何故十誦噉口口吉前多論咽提答多論為利故販責得提此十誦將上犯捨物金未不為利故新易物來知降違法食體無捨故口口吉衣違捨法故提四分販責買三但為利俱墮者舉價金高曰責抑價令低曰買買已規利更賣曰販此三事但爭價上下不作知淨語各得提也十誦據一物為語者謂一物上販賣訖方結一罪故彼文云若比丘為利故買而不賣吉若為利故賣而不買吉若為利故買買還已責提約第三句責買二業故云據一物為語也四分又不了者謂上多論約僧中悔不應還十誦約別人私責買聽七日當部但云若悔聽還無斯兩判故云不了也共僧貿易應陪者準五分云時有比丘有拘執衣四方僧有僧伽梨欲貿之諸比丘不與白佛佛言聽易若拘執價多應治與比丘若僧伽梨價多應治與僧若貧無物即如文中所説餘一切物並準此也云僧祇至準前者四藥隨物重物等者祇有八物一時藥二夜分藥三七日藥四盡形藥五隨物謂三衣六物也六重物謂木床褥等七不淨物謂錢金銀等八淨不淨物謂真珠等得觸名淨不得著名不淨此八相貿語時越得物提食錢持博蘇油等者此約自乞向食非常住鉢中之餘也更有釋不正餘如文云多至也者謂是方便有罪果頭無罪之物要須物捨與僧斷相續心更不取作懺已還來方聽僧作福等用不爾直施自得不應僧不合受云律至不犯者不得與餘人貿者謂白衣外道也若蘇油相貿無犯者外難何故前來引律文以七日易七日犯提此更開無過答戒疏云蘇油相易不犯者開外資也前言犯得內資説也準上衣法等者謂上四分文云貴價衣令淨人貿據有淨人言之若無淨人開比丘自貿準此文意不得與餘貿若無淨人理亦開許十誦三度者謂三度當價作淨語等餘如律本及鈔云畜至二十一者釋名者受持之外名畜長鉢越於分齊故云過限此是所防云云云五緣至犯者如法鉢者一體如二量如三色如等非油者即燒而不勳油即燒後用荏子油之並不應教也云餘如長衣戒者長衣開十日具有八今指同彼戒疏問白色衣過限犯白色鉢何不犯答衣染必成壞色故犯鉢再熏多損壞故所以不犯問衣過滅成受持盔過減何不成受持答衣可截漬故成盔無此義故不許疏中減有數重問答恐繁不録也云乞鉢二十二者釋名牒鈔云云云六至中者如疏中者彼云須在當界好奪入僧中厨為本寺故不同乞衣資用寬故須回本主不用入僧云律不犯已下如文云自乞至二十三者釋名牒鈔云多至故者制意可知云四至犯者如文云十誦至吉羅者戒疏云十誦乞縷犯古豈非防道四分開親以離指謗之緣也看織作繀一切吉者律云若看織若自織若自作繀者引云津子以管澆熊也趙魏間謂之歷庶方言不同可既云自作等非出家人之儀犯者若爾下不犯文中何言自織不犯答上據織作三衣故自亦犯下約小小物故不犯也云不犯已下如文云勸至二十四者釋名牒鈔云云云論至吉羅者六順受犯者問前戒何以織成便犯此戒順受方犯答前戒道回織師作成即犯此戒自求順受始終問前後兩戒皆由織師如何取別答有四不同一前戒損織師自得縷故此損縷主二前戒損織師不與價犯此損縷主與償便犯三前戒親不犯後戒俱犯損義通故四前是己物成即犯此本屬他入手方犯云不犯已下如文云奪衣戒二十五者釋名牒鈔云云云五緣至屬己者甄下衆者戒疏云簡下四衆本非同行伴類假奪但者三不定與前人決定取者正犯此戒戒疏云生爭故犯本作得心今奪生惱也四句中二句者因此一句便作四句簡之戒疏云義加四句初是向列四句之中有二句犯重標出初受與俱決之至重也疏云此二則犯重罪由初決捨屬他已定故文云施已還取是重攝故四嗔奪者戒疏云自奪使人祗中自與使奪四句皆墮謂三衣也若減量衣但犯吉五得屬己者僧祗四句初合與別奪謂一時與三衣後隨衣奪犯三提餘準知也不藏者猶面現前不藏舉未犯但不對面移物即犯不假載舉戒疏云謂對面奪也未藏情疑屬己不顯故約藏相結成墮罪文云若著樹上者謂非對面隨舉離處則犯正罪以無人可爭故結已上疏文云畜至二十六者釋名者貯用屬己之名為簡餘三故標七日療患有功稱之為藥越日期分故言過限此是所防云云云辨至犯者初一行鈔文是相略意也次列犯緣中五無緣者律云送與人若失若故壞若等是緣也云律不犯至也者此約過七日犯捨與僧後處判依教不犯若過七日者戒疏云初日過限具兼諸失主不合受故與俗人第七日者疏云既無宿觸口法尚存聽與僧食若未滿七日者疏云限法不過明日白二還主理合説淨已越七日無眼義制身外用文中約第八日時三種處分若至九日捨者初二日是過七日藥次一滿正七日後四未滿者若至十日捨者初三日是過七日藥第四日是正滿七日後三是未滿者若至十一日作法者初四日是過七日藥初五日是滿七日者後二日是未滿者若至十二日捨者初五是過七日藥第六日正滿者第七日是未滿者上皆三種處分若至十三日捨者前六日是過七日藥後一日正滿者但二種處分若至十四日捨者於七日中得者總名過七日藥準一種處分文中無戶誓者三蒼云北面窗名誓戶臼中鳴以蘇油除除不鳴誓窗泯周塗令明也云過前至二十七者釋名者佛開浴服預乞前用此是所防云云注文者若據理過前求雨衣是一戒過前用是二戒然是一衣復同過前故合一也云過至犯者一是雨衣者此衣狀似漫安陀會也二時中得者三月十六日已去得者皆名時中也要是時中得方有犯過前用若非時得如三月十五日前求後若過前用但犯吉以衣無再捨此戒言一衣上重犯者無重犯墮也三過前受者謂未至四月一日即加法然又非過前求也但是過前用而受也云四分至幕者十種衣者辨衣體即憍奢耶等如前文説之三月十六日求者戒本云春殘一月在應求雨浴衣即三月十六日已後至四月十六日是春殘一月也四月一日用者戒文云半月應用結即四月初一日至夏初正月半月開用也舍勒者是𭣋身衣鼻奈耶云半泥洹僧也更有異説不正云諸師至洗者今云如三衣披用則不同古人言是戲圖也下引祇文證上披用垢液者謂浴未了其雨則止垢液未盡更得著亦著入河中浴也上言不得著入河池者為無此緣則不許也云多論至故者彼論從三月十六日至盡應求作若得成衣四月一日應畜若不成衣四月十五日聽求作若前安居人至四月十六日應加法若同三月要後三月求作若同四月則前四月應用今同得百二十日彼同安居日受也若準四分四月一日畜用不同十六日若求未得應用此文也畜法如文云僧祇至唱者若至八月十五日限滿不作餘三衣淨施者謂捨了須説淨也注文準此捨時通唱之文初受之亦應通唱今僧受雨衣不須對首秉也云律不犯至者者若捨作餘用者謂時中求捨作餘三衣等雜用不犯過前用若著時中求衣時中浴有何犯失浣舉者謂時中求而用時未至浣舉不犯過前用也云過前至二十八者釋名者十誦云今日不取明日則無是名急施七月六日已前受者名曰過前至八月十五若不淨施故云過後畜此是所防云云注文者戒疏云此亦兩戒共制非是一衣不同雨衣一事生二也前一衣上有受用二罪今此兩衣合為一戒若有過前取則無過後畜若有過後畜定無過前受謂前是順受故生後是違淨故犯云過至犯者三過前者七月五日已前是也四無緣者謂失奪燒漂等緣也後五緣者標過後畜五緣犯也三是十日內者如七月六日受衣不便説淨至八月十五日即須説不説至十六日是過後畜也乃至十五日受衣八月二十四日須説不説至二十五日是過後畜中間比知文中正是指此十日內也云事希至法者急施衣事是希其法亦隱上之所列且約大途戒疏文中廣辨時非時法者疏問云何以非時受衣一月五月外更增九日時中受衣所以不增者此約七月六日受急施衣對時中受衣論也答曰此中本是時衣以急緣故開非時受所以時外開之餘衣本無時限隨受隨説故也問如長衣七月十六日受十五日前開位十六日接是時分何為不同急施衣答受長無時節隨受名非時急施必接取所以前後開相疏亦云長衣不與時衣相接者但有前開是以便犯急施衣十日受者前開入十六日須是後開兩開相接越此分齊是以無罪又戒疏云七月十五日長衣時內九日足須説淨更有餘義非急不敘云有難至二十九者釋名恐怖逈遠名有難蘭若開寄法服故曰離衣此是所防云云云六至犯者冬分非時者從八月十六日後即是冬分又非迦提月時名非時何以得知故律云諸比丘夏安居竟後迦提一月滿在阿蘭若處住有賊劫奪衣鉢坐具等諸比丘畏賊皆來趣祇洹住謂夏中不許離衣迦提一月任運許之又復滿已今從冬分起首至明年四月十六日已前並是非時蘭若有難並開離也故云冬分非時五無因緣者同前失奪等緣也云四分至一衣者如文云明兩緣者對古師但亦一緣故今標兩緣也古云蘭若六夜許離衣者只為恐怖之緣今云準外部五分明了之文別緣亦許又準戒本語勢云諸比丘有緣離衣宿乃至六夜既曰有緣凡是因緣總開六夜何為恐怖難緣獨開所以鈔亦兩緣一是恐怖不作日限二者別緣開六夜別緣鈔文同説云僧祇至夜者謂祇五見三文皆不作日限然祇許夏內離衣五分不許前言冬分非時即同五分制令十日一度結者與今見論少異祇律比丘蘭若處安居出外乞食被採薪人偷衣去且聽寄衣不作日限五分佛在舍衛城八月賊常伺捕人祀失欲煞比丘怖皆逃走賊中知比丘法者云沙門不離衣必歸因茲遭難由此佛聽寄白衣家初不作日限被蟲濕損因制往看又數往招譏因制十日見論六夜一看衣亦爾上來諸部等者結前第一緣必有已下明第二緣也云四分至執者聚落起過者鏡水大德云此言似倒涉於聚落一宿戒今可回又蘭若比丘寄衣在聚落中起過準戒疏及鈔意謂制緣許蘭若置衣村中不作日限後因蘭若比丘別事寄衣聚落一寄不還因茲起過更約緣開至六夜古師所釋與鈔全乖不更敘也不顯緣相致令妄執者謂四分文中但云寄衣在聚落不還並不説是何等緣不顯此之緣相致使古人云是恐怖制六夜故云今至許者謂四分別雖無此諸緣今準諸部而用故云有緣皆開不同古師唯執四分恐怖開於六夜故戒疏引僧祇因往斷事衣重故開六夜五分塔僧和尚及他事者皆聽六夜留衣俗家故今鈔文引五了論皆有六夜別緣證其四分雖不顯緣相可同諸部有緣皆開云律不犯至説者擲石及處者謂入勢分由則不失也若有情染二礙必須手捉衣若捨者謂不會開對首心念遙捨餘同離衣戒説謂失奪燒漂四想不捨衣不捉不至擲石及處不犯若船濟不通道路險難盜賊惡獸河水瀑長強力所執禁命二難等同前云回至三十者釋名牒舉鈔文云云云具至犯者問何以但言回僧而不言回佛法物答或云許僧物者於己有濫回容稱心喜為制重佛法之物濫義是希雖回制輕也云律至也者初已許僧者決非屬己定僧為作衆多別少心未決故回犯墮也二為僧故未許僧者雖非屬己衆別未分若回犯吉三已許僧者定屬有主回犯重罪以同盜常住也云僧至用者我已施僧今施尊者者謂能施者自是非法受施者無過如從賊受施之例但不得乞乞成回僧物也云四分至重者並為未決定者物雖行僧由未定屬自回入己得提回與他得吉若決別施屬主已定若回此物望損於他隨前犯重回畜物者且約畜結回此自恣僧物與彼應還作吉悔者此屬已定回即犯重何言吉悔謂勸回與彼即得吉也而物實未與彼若物與彼即是不還此僧便成重故彼此一人決屬故回即犯重準此一人是定屬無別相對辨其未分有僧次來當次之人亦是定屬而回與他望損此人應得不得故成重也云律至不犯者許惡勸與好者即持戒為好破戒為惡也已上二母段不同總是釋第四篇竟次明九十單提中分二初總標次別釋初云九十戒云小妄語至一者釋名者言非稱實為妄彰在於口為語簡異於大故標小名此是所防云云云此至一切墮者謂凡在制戒在篇者皆從恚犯居故此徵云恚犯為先因由何事故牒起云引戒人多恚犯者良由已下正明所以也謂無始時來習妄語業熏成種子積在藏識之中故云妄業薰積也此妄種子服伏藏識不少故云尤左多故隨塵境者謂此依種而起現行故云隨塵染等境動則虗妄搆架而造惡業也不思反流之始者古云謂不思反生死流之始歸真如之原今謂初受戒日則誓斷一切惡今是志誠時實語時皆是反流之初今不思量但順其業種恆事妄語𮨇必洛形也以此安生者以此虗搆妄業安於一生要當至死方住故云為要當死若如是者不能排蕩藏識之中妄業種子出家順生死業信此可令人悲故云良可悲矣嗟歎意也上依搜玄約句釋竟或依法寶科鈔句云以此安生為要是上句也當死定非排業是一句意道用此妄語之業以安生之身為其要妙當至死時定不能排蕩此業此解亦是一途加以等者前來妄業薰修動便成妄故意為之今重由約境之虗實但違想心便結故云加以也犯無定境者境通有無之無定也但使違內想心者如實不見張人想心謂是見張人後有問者答云不見便是遠內想心何論外緣虗實謂不見是實想心是虗見則反之餘例知也云六緣至解者如文云多論至業道者四句初一如鈔云云第二是兩舌非妄語惡口傳他此語向彼説作分離心故是兩舌如實説故非妄語柔軟説故非惡口第三句是惡説非妄語兩舌傳他此語向彼説庶橫説故是惡口如實故非妄語不作分離説故非兩舌第四句俱得三罪也濟語者非時語無義語皆戲調心名濟語也餘曰三業或合或離濟語一種不得相離也釋云餘曰三業者妄語兩舌惡口也此三心通有濟語故云不相離也只如妄語説不稱時若妄語者必是無義或時妄語為調戲心凡是妄語與兩舌惡口皆合濟語一種也一時作二三四者一時作二者妄語即有濟語三者兩舌四者更加惡罵十業之中越其意二故云乃至八事何不至十以意地中貪等三心不一時故貪嗔二心相違不同時也若據自作二事教他為六一時戒故得有八若但令他唯得為六即口四過并煞盜身二也淫要假於自身一支并為無業道屬癡成八於一時中八業成就也云四分至吉羅者四分五分法師比丘者四分因象力釋子五分因沙蘭比丘各聰明才辨一切四衆外道沙門婆羅門無能及者遂以非為是以是為非知言不知不知言知恆以巧辨勝人時諸比丘莫不歎伏問言汝論義時意謂為是為非耶答言我實知非耻墮負處故妄語比丘舉過白佛因制也僧中妄語等者玄云是五分文彼因慈地謗沓婆故佛語慈地若於堅信比丘前妄語罪重於煞無數衆生於一堅法比丘所妄語獲罪過百堅信如是展轉於僧前妄語罪重於百羅漢前也謂四人謂前誑罪重也何以故凡僧受誑生信故重聖人識非不信故輕也前言堅信謂是內凡已去得四不壞信故堅法者謂得無漏法苦忍初心已去此法堅固難可破壞故名堅法常令推寄有本者謂若有所能推屬於師或推聖教則無過失縱有乃屬前人也不爾斧在口中者故多論云凡人生世間斧在於口中謂出語傷人猶似刀斧儒宗云一語傷人猶如釰戟等律云見聞觸知者薩婆多云若境由眼識所識名所見謂是色也具五緣一清淨眼二色境三假空四須明五作發識意若境由耳識所識名為所聞謂是聲具四緣能聞於前五中但除明緣也若境由鼻舌身三識所證名所覺謂取香味觸具三緣一三根不壞二有觸塵到根三作發識意若境由意識所證名為所知謂意知一切法謂法境是但具二緣一意根二發識意問何以鼻舌身三合為觸耶答以內取境故要須三境逼根方能取得然須隔越此子鼻根隔三分極微舌根隔二分身根隔一雖爾總名合中知謂此四是違順之本故八句皆犯謂不聞觸知言見聞觸成四或見聞觸知却云不見聞觸知成八初約不外聞觸知誑他有二十四句先約不見有六句一本實不見無想心誑他言見此心境俱違句二實不見有想心曾見今誑他言不見此境順心違句三實不見內心生疑誑他言實見無疑此心境俱違句四實不見內心曾生疑誑他云不見無疑此境順心違句五實不見無橫疑誑他云我疑見此心境俱違句六實不見無橫疑誑他云我疑不見此境順心違句餘不聞不觸不知例此各六成草四句次就實見聞觸知亦二十四句番上可解乃至所見異等者律文更有六句所見異者戒疏云定行心中見惡像言好像及被人問答他異本所見故云所見異也所忍異者細違安苦名之為忍語他樂更同作羯磨不忍言忍所想異者怨想言親也又有三時等者前後根本三也唯有八句四提三吉一句無罪律云作時知是妄語之時知是妄語竟亦知具三時知得提二初中知後不知三中後知初不知四正妄語時知初後不知此四句皆提次三句吉者一初後知中間不知二初知中後不知三初中不知後即知此三吉第八一句三時無心不犯若僧説戒等者默妄邊結吉也云善見至墮者有疑心者如見前人行過實疑謂是張為是王有問言已誰便定答云是王等若問不問者不論前人來問不來問但誑他即犯異本音者音聲也異本所説聲如本是漢兒子誑胡音或作新羅等語意欲或他令前人不解皆成妄語也不大見聞者今時云不多見不多聞破相説者如人執有我人今破云並無無覆地者謂稱實而説也異音者前人不解也顛倒者此土先能後所今先所後能即犯如問聞聲不答他欲不聲聞又發大聲答他又作不了語若有下結上文也應令看指甲者大德云謂是畜生蹄迹之甲非謂令他自看手指甲也彼問比丘見畜去處不若實見答云不見又成妄語若答見又是示處今但令他自看指甲俱免二失上正釋竟或有引僧祗律注解云指甲是胡音此云不見雖出祇文免違鈔今鈔自注釋云方便引接令畜遠去作是法也必知已遠縱逐不得然後方可語彼從此路去若直爾便語夫處即是示處違於鈔文云四分至中者別明不犯如文云罵戒二者釋名牒鈔云云云智論至世者按智論云菩薩淨身口意三業為後淨國土因自身齊淨亦淨他人何以故但一人生國中皆共作因緣內法與外法作因緣若善若不差多惡口業故地生荊棘餘如鈔文準論意由內有差惡心因故即內法感外世界有土淨穢也如唯識論共業所感外器不同四句料簡一共中共謂一切並用阿賴耶識共變引器世間共受用故二共中不共謂人與畜生等以共變故名共受用不因復是不共如魚水為舍宅諸天見水琉璃寶地獄餓鬼見水變成猛火人見清冷水是不共也三不共中共男女身根種子各變是名不共與摩觸細滑受用則為共也四不共中不共如人五根各種故名不共於五根中利鈍明暗各各不同又是不共今文中云共作因緣者四句之中當初句也乃至畜生聞毀慚愧等者律云時婆羅門有牛極北而折一角共長者牛捔力牽車賭金千兩正捔力時而婆羅門於衆人前呼言折角好牽角牛生慚恥力不能出令彼長者獲金千兩牛主輸金即語牛言我常餧飼於汝愛惜捫摸何故令我失金牛答云不合於衆中毀罵於我令力不出可改前言倍更賭金二千兩後時捔力之次婆羅門對衆讚云勝金端嚴如法牽車中聞心喜勇勵力出獲二千金畜生尚然呪今人類而興毀呰云六緣至知者如文云十誦至吉者六諍本者如文列也或因嗔悵毀呰於他乃至邪見而毀前境也四分惡法種毀呰者惡法簡善法也種種謂種姓不同類者於上種中各有其類也毀呰者正行罵也六品者前三約外就姓業伎術為言後三內報就身心犯過以説也一卑姓者旃陀羅種除糞種皮師皮師種等姓者謂湊拘尸婆羅墮等行業亦卑者販賣豬羊作賊知獄人等伎術者鍛金作木作瓦作簸師等若言犯是過者從波羅夷乃至惡説等前人若實犯以此呰他亦犯故住也五多結使者謂嗔恚等煩惱也六盲瞎者及禿跛躄聾啞等也有三行罵法者將此六相分為三品罵故初面罵者因對面説言喻罵者比類而説也言比罵者我非是某人等二善罵者標也亦有三者謂同惡法分三也汝是業若乃至坐禪者律文初引阿蘭若乞食補納坐禪今云乃至越中間也但是善法罵皆吉餘二罵皆喻比二也例之可解問善法是好罵者是惡罵如何結犯戒疏云以罵者心欲相屠割微見小失便張廣大汝是疏居如何猶著無學尚搆瓶衣故以微緣潛相扇作情過非重故結輕也已上疏文云僧祇至故者準彼律毀呰有七一種姓二業三相貌四病五罪六罵七結使前三人各有上中下三品下四唯下品無中上今云上惡法者却將第三下品惡甚者轉為上惡法也下種姓者云汝是旃陀羅種等汝是湊拘尸婆羅墮姓也下業者屠獵師等下相貌者瞎眼蟲頭等持此下三法毀餘比丘及父母者父母得提以親生色身對比丘毀之受辱同於己故結提也和上闍梨能生法身由如父母但為種姓業相於己不同降之一階但約業罪同師道支種性更疏故但吉也餘有中下惡法等者中為中容即首陀等是中種性賣花紛生店肆等是中業太白太黑太青等是中相貌若以此罵父母業和上闍梨重吉同友輕吉下惡者汝是剎利婆羅門種是上種姓汝是蹤金師業等上業汝有三十二相等是上相貌以此罵父母重吉和尚等次吉同友最輕吉謂中品無提下品無蘭故云遞減一等也面比罵外等者注文自解易知地有金藏好令人鬪者準祇文惡姓戒明闡陀過去曾為長者奴名曰阿摩由打他婆羅門從人諸婆羅門語令莫打打故不上乃吉摩由摩由主得天眼觀見鬪處地下有金藏令人屈之果得其金又彼律云王殿前有金藏人在上立即云我欲索王女王怪遣別處立即不敢言後來舊處仍前之語遂屈之亦獲金也諸記中雖相承引此文然並未知鈔意大德云前引十誦六諍本全約內心不關外境今引祇律縱內心能差則諍不合生良由外境牽之使他令諍謂地有金藏薄福之者在上不銷致其凶惡因茲諍也思之迦葉舉造房僧過等者準律十三戒中或有比丘造大房聚落乞求人皆生猒迦葉入村乞食居士走避追問因由長者具答迦葉以事白佛佛令汝今夜出界外宿者其夜復有非人以事白佛佛令汝今夜出界外宿者其夜復有非人來白佛比丘伐樹傷於我子支體我以信心不被加割害願佛知之佛明旦集僧呵造房比丘直云昨夜非人來白不云迦葉以護造房比丘之心恐恨迦葉舉他之過因茲毀呰迦葉若舉罪人必不敢毀聖人尚護人心凡夫比丘而相毀等餘類者玄云即如龍鳥乞珠翅翼之例以下況且也今云不知引解有何意請思之云不至世者莫嗔諍相言者十誦云自恣時有比丘説他比丘罪云見聞疑諸比丘知舉罪人自身不淨能作淫盜乃至壞生飲酒等不應信此之人言即語云長老莫鬪諍莫相言莫遮他自恣等準鈔意者衆僧雖知舉罪之人身業不淨亦不得出言語彼云汝破戒不淨因何舉他過若發此言便成毀呰但云莫鬪諍相言即不傷道理也云兩舌戒三者戒疏云二邊傳言破云兩舌此是所防若準唐三藏翻為離間語戒今云兩舌頗為質陋也云具至知者説鄙惡事者即除糞種置籠之類等是云律至一切吉羅者彼此鬪亂令他破者傳此語令分離也某甲説汝是者謂是旃陀羅除糞種獄子皮師賣粉人等也無有上中下法者祇中七種罵法上三則有上中下只至於犯罪亦有升降今斯兩舌傳他之罵不論上中下法但作分離向己之心不問前人離不離俱一品提更無蘭吉之降也有人破鈔句知之更説墮者傳他語來重重向前人説重重犯提云律不犯已下如文云共女至四者釋名牒鈔云五緣至墮者如文云律中至犯者人女有知者即簡非人及畜女無犯者有知則簡小女未有所解命根不斷即簡死女也注文中準論不合者即多見二論下文自顯前敞無壁者準似今明廳屋下亦犯三雖覆而不遍者謂周匝障兩頭覆中央不覆也四雖覆遍而有開處者上開天井取明是也前室多開此室但有明孔為異也若亞臥者邪倚也但不正身臥或倚東西壁繩床等皆名亞臥故戒疏云或側有所憑倚即名為宿更有不正解不敘十誦乃至羅漢等者彼云佛告般律汝雖羅漢不應與女同宿如熟飲食人之所貪女人欲男亦復如是此律羅漢亦那律也比丘被適非空女方悔過無學尚被陵染何況凡夫不得強云不畏拒抗佛之所制也云多至吉羅者前來鈔文注云準論不合正是此文也注云并部等者即大原諸洲多作斯屋上不起棟平作盡以土覆中間開請泄水極長十間五間中不隔塞共同一戶餘如文云十誦至不犯者有明者雖有多人不可暗坐若有燈明復不睡不犯若臥不睡亦犯注文不但簏床者諸記中並不消釋大德曰此謂防人污情故來恐有以簏幕等圍繞於床謂言不犯故注簡之諸部男子自伴者即下引五分有知男子自伴不睡也云不犯已下有覆無障都有九句室相不成事同露地故開不犯可尋文即見意也云共至五者釋名牒鈔云五至犯者餘義如別者古人列緣中但云未受具人男簡去女子所以爾者古云佛制不得與女同宿一夜尚乃不開登得有過三夜之失故伽論云與女續至三夜但有同宿罪無過三夜罪此文非鈔所宗不更具録故指如別也今師云然以通男女故戒疏云昔云男犯非女犯以制隨宿義無三夜開今解二俱犯故伽論云曾前與男二夜宿第三夜宿隨臥轉側二波逸提準此今師約相續犯故是以列緣中云男女也古今各引論文取釋意別更有餘義非急如大記中述之二三四緣同前戒者二室相成三同宿四知同宿也五過三夜犯者第三夜明相未出前是過二夜明相才出三夜是過犯即也云律至吉羅者注文準此不云吉羅者此是提家方便吉也若明相未出不避得方便吉即知明相出時得過二至三果提之罪若明未出前避去無吉明出犯提縱繞第三明未出避去至第四宿必定不開故令自去或使彼去見論又云明相未出不避者亦不犯謂不犯非無也注文初夜即坐不成開者搜玄云謂第四夜初夜即坐者亦不得故云不成開謂第三夜已開其坐不犯開不重開故不成要須遣去自去等下引五分長坐不犯明知前二夜臥至第四夜不成開已是記文準此語第四夜不臥為初夜也大德不許此解既從第四初夜便坐到明脅不著席未審何時是結犯時節故不正也今依法寶云從第一夜至第四夜便坐至明即不犯故云初夜即坐不成開大德又曰準此不成開謂不成與未受具人同宿開犯之理以不臥故也下引五分長坐及互坐臥本分不犯證成上義也又注文皆四夜通夜不臥者此顯一夜通夜不臥亦不名一宿也轉長罪者若未懺雖經多日更共宿脅脅著提隨轉側提重重得罪故云轉長罪也無二夜開者釋上義也謂此比丘與沙彌宿犯未懺悔雖隔多日由罪未除無無罪隔合夜脅著罪則重重何有更開二夜共未受具人宿耶別房宿更得二夜者謂悔其過不得當日同宿當別房一宿了乃可更得二夜多論四句等者謂此戒但約未受具者為言不簡人之與宿同異四句雖殊過三並犯云同緣同上者同上不知及非室相命梵等緣一切不犯云與未受具人至六夜者釋名牒鈔云五緣至犯者二字句味者出教體也字謂名字句謂章句味即是文新云名句文舊云字句味梵云那上聲摩庚此云名名者想也想有二義一取像名想即心所中大地法二契約名想謂諸賢聖共相契約立色等名如云深廣無涯名海等今以契約之想用釋於名舊呼為字句者章句梵云縛迦此云章梵語鉢陀義翻為句俗書中章多句少內教中章即是句但約詮義究竟邊名句如言諸行是名無常是句也文者梵云便膳那言文是能顯義近顯名句遠顯於義且近顯名句者唯識論云名詮自性句詮差別文即是字為二所依謂名句二法依於文字文字是依聲建立故對法論引織錦喻先依文交錯織成龍鳳後合為錦窠然依絲文而起法合可委遠顯於義者如西天風俗呼扇鹽醋皆云便膳那亦是能顯義扇能顯風鹽醋能顯食中味是以古來譯為味者翻之謬也謂若於此名句等同誦表教體不圓鈔奪前言故犯也云律中至多少者口受者謂無經本口中授與同聲而誦故犯也書授者一釋云執本授也玄不許此解雖執本亦須口言還成口受今準下不犯中一人誦竟一人書不犯今誦未竟便書恐句義不圓故是犯也大德破云前云口受但據暗中不執經本今云口授據有經文所執道理自明何勞疑惑今決取初解為勝也注云決回分不了文者謂四句但云聲聞天仙等説不言為佛印可成經者同誦有罪今引祇文決也不簡文句多少者亦是不了上引十誦隨其章段故得墮方為決了云多論至儀者二人俱經利者相並而誦名句文全教體不闕則非犯相消息不失威儀者謂但自消息莫失僧儀即得也云律不犯已下如文云向至七者釋名牒鈔文云云云多論至墮者謂破塔壞像但能自損不能損他他猶於塔敬而獲論説他粗罪自壞壞他令一切人於此枝説比丘傳持正法即不信受以不信受法故豈不同壞法身云七至知者四無僧法者如調達破僧佛令衆僧白二差舍利弗往告白衣調達非法等云五至有者若已作法人問者謂已作羯磨法差人説也問作法正法應説何故倒問答夫得説者須是被差之人有法在身即得今非被差不合擅説故須倒問故云亦某處聞也因俗女等者謂女是犯殘比丘知識因問其故難陀語云汝阿闍梨小兒時戲猶故未除女云我阿闍梨尚爾遂入房掩戶而説此偈等鈔云律云至墮者上二篇者謂粗故犯提下篇故不能破壞故吉自説己罪輕者以希少也説名字者謂於衆中説某比丘犯某罪種姓者李比丘等衣服者著乾陀色衣比丘犯也房舍者從東第一房等相貌者眼白面黑比丘犯也云不犯中不知者玄約不學數人説今恐是了教之徒據説時心迷不知有犯也粗作非粗罪想者亦據心迷雖説前人所犯之事我心且不粗惡之想故不犯也云實至八者釋名如常云云鈔闕列緣今依戒疏具五緣一內實得道除增上慢二自言己證三向未具人説四言了五聞解鈔為希故略明不也云問至也者制聖遮凡聖實得道向俗人説犯提即是制聖聖人奉制然雖無犯今由有戒者為遮於凡若後見説便知非聖以聖人奉戒終無犯故為護大妄語者凡夫若言得聖即犯大妄今制聖遮凡聖既不説説即是凡故令凡人亦不犯故可不是今時所要不可不述云與至九者釋名牒云云戒本緣起中云姑前與兒婦耳語説法者大德引爾雅釋親中云夫之母曰姑在則言君姑沒則曰先姑夫之父曰舅在則言君舅也有人錯解今破明之云六緣至犯者如文云若至墮者五六語得者解彼云有婦女應風發比丘不為説法日日風發因此白佛佛問比丘幾語得解比丘言五六語得解佛深歎之因即制也又僧祇毗舍佉母病聞阿難説五六語便得差也使汝速盡苦者既説五陰六入竟更語言汝斷諸漏盡諸苦得提以過限也云律至羅者出家不得以事同者謂出家人過五六犯其事同犯不得為證要須得俗人兼解好惡言義之者餘如大疏中者首疏云如祇説五六語竟送出門禮別若言安樂住無犯若言使汝速盡苦原證菩提果若無淨人門面路路引不斷或在門上人遙見聞等不犯反上即犯中含云等者搜玄云凡有人請問者兼約男女也思律中者若是女請當思律中過五六語不犯若不請問自為説過五六語即犯不了吉羅者五六語未了便止得吉是方便罪了即犯提已上正釋更有解云鈔文從中含云乃至當思此是經文律中已下是四分律文也此是妄釋注自分明云不犯等者除男除請皆是開緣戒本略明一開不云除請但云除有知男子授五戒者三歸體也五戒法者謂説相也八關齋者八戒也閇掩根門也及説齋法者亦説相也八聖道者語業命見思勤念定也十不善者謂身三口四意三也或女人於適來所説未會若問更與廣説一切不犯云掘地戒十者釋名牒鈔云云云多論至大護者制意如文云五緣至墮者如文云戒緣至哉者緣即如前僥幸者謂掘地招罪妄營為福故傷之也云律中至吉羅者若已掘地者簡未掘地也即天然之地故今就已掘地中復有二種若經四月隨觸便犯此不論雨也二被雨漬者謂乍掘遇雨即與本同故祇云井池瀆水瓶器著地死土被雨漬使淨人知自取犯墮還如本者謂四月約時被雨約緣地有生相故云如本若用等者钁俱縛反録盧對反手耕具也掐口冷反扴吉點反若不教言看是等者失法得吉若被隨語而掘得提除為僧塔作摸者僧伽藍模樣塔亦爾向泥上作摸開無吉也蜀本多論者準大周經目中先有八卷失譯釋九十盡至六十八戒後即闕也首師疑文不盡常廣求訪後值蜀僧字寶雲到京首疏主借問云不委蜀中多論有幾卷彼云有九卷其第九卷從壞生戒釋直至末文首律師懇求令歸御後抄取附來後經一年方附到因茲號為蜀國多論首律師自制序具敘因由云云論中約天然生地辨生非生四月八月者謂此兩月是雨時縱使不雨地下潤勢相掩令地面潤並名生地除此二時是無雨時日炙地面乾燥風吹土起名為非生餘文可委云僧祇至取者轉石等者謂有心令地乎故犯土塊一人不勝者謂一人擔不起即下任運與地潤相連生分多故破者犯提若撤者直列反發也摘涉草反手取也兩三行戶郎反者謂就地壘土塹為壁故雨三行塹也抒者徐呂反説文云泄水也以雨能生地者祇云若新雨後比丘不得自抒井應使淨人若淨人小先令撓後自抑之云四分至不了者當宗為護住處俱得也餘如諸部者即三千威儀云若火來水風王賊等召沙彌等有打鐘方法前約有人若蘭若無人如五分注云四分文中不了者以文中列屈內土即自解云此死浮土也若使除屈內土即得掘內地僧祇露處死土屈中自掘中藏物者得即是決四分文也云律不犯已下如文云壞生至十一者釋名牒鈔文云云云具緣如上者一生草木二生草相三自壞使人四不知淨語五傷便犯云四分至鏡者非人是者謂但異於人類總是非人一切草木是者謂斫神樹即為戒本所門詺草木為村十誦云蚊蟻諸蟲以之為舍四分神依止故如世聚落故云村也注文恐無知濫行者破古也初有古師云鬼神村者即今神廟是也次有古師云以戒緣斫神樹非廟屈但約極大樹是非人所依即名村也若小小草木及諸種子之類壞即不犯今簡斯濫故引諸部通解不謬也初引十誦既云諸蟲為舍則何簡大小次僧祇壞種子破鬼村亦何假大樹及與廣窟注文相同明鏡者引上二律和會釋通相狀如鏡鑒照分曉不須妄執也云律至吉羅者首疏云雖有五義今合為三一根生二枝生三種子生就根種中分二根中不假節生者作根種之名即芋薑蘿蔔是若根中假節生者作覆羅之稱蘆蓽芹蓼等亦名雜種謂假根假節生也就枝種亦分二初枝中不假節生作枝種之名如柳榴之類若枝中假節生者作節種之目如耳茲藕皆屬覆羅攝子子種中當體立一子還生子故始末差別離成有五釜中炒以釘釘樹等並犯云僧祇至吉羅者謂前辨五種已知然則淨法未委故次明也前五生種名有淨法芽因者在土芽出土曰目心種者要也如根種中要根要節合始成種故謂此種為心種也蘿勒者蘭香也以後趙主勒故以避之十七種穀者祇云一稻二赤稻三小麥四穔麥五小豆六胡豆七大豆八豌豆九粟十黍十一麻子十二薑勺十三闍豆十四波羅陀十五莠子十六指耶十七俱陀婆是名十七種火淨通五種者謂五種若火淨通得食核五果中者標也下文自辨相果核種者注文約生熱二棗熱者謂在樹上熱今時日成乾棗亦須火淨二膚果三殼果四糩果五角果如文糩者苦會反也準此蒿草者鈔意義準前糩果既云有子火淨今蒿草有子亦須令相看火淨也寺主穀倉乃至餘事類知者引此火淨穀事為證前蒿草等含子但令相著火淨並得也雨後舉木越等者玄云前戒引祇舉木博瓦等經雨若自取墮據壞地性邊結令據壞生氣分故越注文者鈔意謂四分開舉石木今祇舉木犯越二文所以相違者即引注文通之朝菌者渠殖反注爾雅云木耳也或云桑䓴而兗反生相不久但得吉也云善見至取者如文云律至時者可解云五分至相者此律一業壞多種隨多少結者謂如比丘將一把豆一時煮隨粒多少一一結提十誦文中通結一罪若壞五生種方得五罪也乃至前戒等者因便以論謂前掘地不作淨語隨掘多少一一結提若僧祇文取掘住持方結一罪故知壞生掘地當部甚急他部並寬宜須誡世也柳榴之類就地離地壞皆墮者就地即在樹上也離地即非在樹也既已離地不合犯提但為此樹神亦得活有生長義故犯墮也離地槐櫰榆柏者準爾雅中有三種葉小而青曰槐葉大而黑曰櫰夜合盡開曰宮櫰此等樹者若已離地其色又萎壞之不犯謂無生長義也若與地連即是未離有生相故墮若雖離地色未改者但有壞相吉也云不犯已下如文云身口綺戒十二者釋名如常云云云四至便犯者口綺者異語也身綺者觸慳也謂不應理名之為綺云四至吉羅者汝向離説為論何事者緣起因闡陀犯罪諸比丘問汝自知犯不彼云將事報言汝向誰説等餘如口綺法者亦是未白前依得吉白竟提也云不犯至未文者文有三意初開口綺二若欲作下開身綺三惡心下雜約心事辨非並如文具委也云嫌罵至十三者釋名牒鈔云云云六緣至闍者如文云五分至吉羅者餘人者一二三人差曰餘人也正拜人者是羯磨所差也此蓋翻譯人取意故言拜如今時策某人為宰相便云拜相也倩者是正拜人自倩倩人更倩展轉三人罵俱犯提也因説大莫等者祇云佛在跋祇園人間遊行與諸比丘衆至一故河邊見捕魚人提大網沈石浮瓠順水而上岸邊各二百五十人叫喚牽網向岸爾時衆魚皆墮網中有大魚有百頭百頭各異象馬牛羊之類佛見已喚之便應又問汝母今在何處答在闍音清關中為蟲諸比丘問佛佛言此大魚是迦葉佛時三藏比丘好惡口故受難類頭報其母受他供給不消利養皆是施物作廁中蟲佛説是因緣時二百五十人皆止網業出家學道成阿羅漢故知口業須大填之云不犯已下如文云露敷至十四者釋名可知云六緣至犯者如文云五分至吉羅者曝蒲木反僧臥具不得禪眠恐雨來不覺得吉也手觸不舉墮者既曾經手觸即共自敷不別春月者即四月有雨月也去時聚已當去者舉小況大也通表有慚之人不屬諸房遊行者亦恐暴雨不覺故與吉也云四分至吉羅者若即時還者問列緣中出門即犯今此聽往者何答前出門結據未返為言今據暫行開茲方便也方便悔者律云一足在內一足在外欲去又應去還悔者一切吉二俱墮者律云若二人共繩床並坐下座應收下座便作此意準擬上座收上座不收下座得提復有非威儀吉上座意中謂言下座收而不收上座提若二人不前不後俱不收二俱提空床九衣表裏損壞易修故但吉入房思惟文才恐雨不覺亦與吉也云不犯已下如文云覆至十五者釋名牒鈔云云云五緣至犯者或出界或過三宿犯者或者不定也若作永去心出門便犯若作暫去意過三宿如犯付囑等緣一同前戒云律中至墮者如文云強敷戒十六者釋名牒鈔云律至墮者謂隨作前事合他不樂即結也云律中至不犯者如文云牽他至十七者釋名牒鈔云云云四至犯者一春分者西國三時分房若春冬分房己雖受得分後見上座來應避與上座故知不屬己若牽他出即犯墮夏房不爾一分竟後上座來不應避屬己己定牽去出犯吉也云律中至吉羅者若呵叱赤質反稍重呼惠鼾眠者作意惱他吉今約無心但為好鼾睡恐惱他故令起經行或屏處等鼾字胡旦反臥息聲不喜人來者或衣垢或無威儀等云律不犯至也者隨次出者謂僧房內人多人知一夜出宿前是俗處者前戒約俗家非僧住處不簡染淨此戒是僧房惡人無分驅出不犯云坐脫腳十八者釋名牒鈔云云云三至犯者若依戒疏四緣二是薄覆鈔闕此也三在上坐臥犯者謂若未制戒前即約床腳脫方制今據制了但使是脫腳繩床坐便犯也云用至十九者釋名牒鈔云云云四分至犯者如文云律云至漉者一一提者戒疏云此不就損命中制但深防與制若彼命斷自依畜生正得一墮也十分之一者大德引俗書云陸地蟲極細不過蟟蟲向蚊子眼睫中為窠水中極細莫越雞蟲若非天眼莫之能見也百千萬由延者亦引偽書辨陸地大魚過騏麟水中大不越鯨魚俗説曰騏麟鬪與月蝕鯨魚死與彗星現又經中目連令弟子觀往業曾作大魚骨似七金山高等日日諦觀者諸記中皆引遠大師流水偈云諦觀清水猶疑有蟲是須淨漉揚茲道風自行桂錫化物隨願為用雖少在益難窮如人闕此忍渴而終肉眼所見者多論云時舍利弗以淨天眼觀空有蟲如水邊砂如器中塵無邊無量見已斷食三日佛敕令食凡制有蟲水者齊肉眼所見漉囊所得不制天眼見凡用水法應取上好細氎縱廣一肘作漉囊令一比丘持戒多聞深信罪福安詳審悉肉眼清淨者令其知水如法流水置一器中足一日用明日更看若有蟲者應更好漉以淨器盛水向日諦觀若故有蟲應二重作若故有蟲不應住此若無漉囊不得半由旬若更無者用衣角漉以顯所為大故大德曰上言三重漉者約三度漉有云三重絹作漉囊即得厚緻者非也云律至不犯者無蟲想者據迷一切無犯若轉想結前心吉猶有犯故云覆屋至二十者釋名牒鈔云云云曰至犯者多論云此是三十中大房用三萬錢作成即崩施主生慳比丘為説房之功德此房未倒之之時佛曾到此便是無上福田等復有一新受戒比丘於此房經一宿持戒暫時受用功德如須彌山房今雖崩功德已成就了第三節未竟不去見聞處者所言三節即三重覆但約一重為節故多論中作房三品上中下也此三品房各有覆之齊限若中房用上法覆以重故勝戴不起隨用草等一一皆提下房例爾今云三節未竟不去見聞處是犯若互離得吉俱離無過準律文也四至節竟犯者謂二節未犯至第三竟時結墮如與未受具同宿不別至第三宿明相才現即犯有人云過三節至四方犯以戒本云過者波逸提今既未過正齊三節未合結犯此未達文意幸請思之云輒教尼至二十一者釋名牒鈔以對此待消戒本竟略料簡結下四衆罪相狀此稍難知不類諸戒所以爾者若僧不差輒住教誡結提即不疑且如下衆何得有輒教誡之理便結他吉今故明之尼據僧不差輒往僧寺求教誡尼下二衆不白大尼輒往僧寺禮拜求請説法等僧沙彌理合禮大尼今不白僧輒往尼寺禮拜問許等已上並結吉故云下四衆吉羅也表又云引戒理合在教誡日暮戒後諸記中並不見評論親曾撿多論文來方噧是譯律之家訛濫失於次第櫢彼論云初時比丘尼盡往僧寺中求教誡後為人識乃輪差五人來僧寺中亦不免譏嫌遂差盤特比丘往教授但為盤特根鈍諸尼總知至於迎逆並不殷重引比丘雖根鈍已於如來言下證果竟觀是諸女有輕心遂現神通諸尼並皆悔過此第一緣其次差至六辟六辟至彼遂説世俗法并戲調之言不合根機是第二緣時愛道尼白佛佛令白差一比丘須具十德者遂差難陀説法教授竟默然與住尼又重請説至日暮尼𭗵祇洹而歸城門已閉諸尼總在城濠中宿明日守門人見遂述上緣因為譏責是第三緣後六辟見白二差難陀既不差他乃輒往彼教誡以此量之故知引戒定合在後學者要知莫塧繁廣之恐思之云四緣至便犯者如文云律至磨者僧不差説法八敬俱墮者律云若僧不差或非教授日而往與説八不可越法吉羅若僧不差而往與説法者提已上律文古師云若僧不差説八敬吉若不差説法得提所以然者八敬生定慧義狹故輕吉也説法寬故邪正難辨恐壞尼心行故結重提若日非説二同犯吉故戒疏云昔人解云日非八敬同犯吉羅不差説法俱犯提罪即二提二吉今解不然説法八敬無別輕重故戒本云教授者提廣説法者提故知義一文云俱墮據不差以言所結罪約曰非説也曰非吉羅者四分無文引僧祇釋前三吉者注文自辨是經説戒十五日後即十六十七十八是也後二者注亦自辨二十九三十日引約黑月説大德云謂西天黑月有初順鈔文須先明黑月前三即初一二三後二即十四十五除却前三後二無間黑白中間十日恆往餘日為非也又祇中前三白月中初一二三黑月十六七八此名時未至後二白月十四五黑月二十九三十日祇中名為過時彼廣列八法繁而不述如刪補羯磨者彼云具十德者頌云持聞頌決説姓貝堪家滿持謂堅持戒只聞謂多聞誦謂二部戒律決謂決斷無疑説謂能善説法姓謂高門大姓貌謂端嚴殊異堪謂任説法家謂出家不犯重戒者謂滿二十夏已上然於十四堪之與善不無相濫疏云雖能善説未必稱機故也云與尼至二十二者釋名牒舉鈔文銷戒本後結下四衆吉類前可解思之云六至犯者教誡説法者義一也云律中至吉羅者除教授者謂除此犯提外受經已下但吉除尼者俗女但吉也云不犯乃至未文者餘人者除婦女犯外更有俗男曰餘不犯也云譏教至二十三者釋名牒鈔云云銷戒本竟結下四衆罪者大德云尼譏大僧吉尼二衆譏當衆吉沙彌譏大僧吉云六緣至聞知吉易解云不犯等者其事實爾者實是為食故不犯若問者以心疑故乃問脫人汝莫是為餘食不無嫉不雖如此問不犯也云與非至二十四者釋名牒鈔文云四分至犯吉如文云律中至不犯者除貿易者謂律許五衆貿易不通俗也云與至二十五者釋名可知云律至羅者安緣索線皆得吉云不犯已下可知云獨至二十六者釋名牒舉鈔云四緣至犯者一是比丘尼者據光律明犯緣也若據五分多論尼三衆同犯譏染不殊俗女不犯二聻第三人者引戒第三人須是白衣三屏露二處者若本緣起中在露地坐戒本釋相俱明屏露古戒本云屏露處坐者波逸提云十誦至吉羅者我欲起者比丘共尼坐恐犯獨坐前尼益食去時應吉坐尼言佛不聽我與尼同坐我今欲起者先作如是方便若不先告直爾便起坐尼心疑將謂比丘起作非法故云莫令彼疑作非法也更有別解不正云不犯至者如文云與尼至二十七者釋名牒鈔云云云五緣至犯者無緣者無命難恐畏之緣五度界者從一村至一村隨結提故祇云若經一聚落一提若無聚落即一㸸慮舍犯也云律不犯至徑者大伴行者戒疏中約多比丘一尼亦犯要待多伴方開據理合是多尼為大伴或有約俗伴男女共行名大伴亦得疑恐怖者行途多難故開疑怖云與女同船至二十八者釋名可知云四至犯者三同乘上下者今師戒疏將此分為兩緣一同乘一船不犯二依順流上下意除直渡也入船犯者律云雙足捉一足在岸吉云律中至不犯者失濟者風驚浪急吹船上下不犯云食尼至二十九者釋名可知云四至墮者如文云律中至不犯者律明歎境先舉十二頭陀從乞食至持三衣中間越却十頭陀故云乃至食者從是至中戒疏云故知大小二食皆犯餘襯衣等者所以衣輕者財重難捨又希施故除舊檀越者即顯非因難德與食可常乞去呼食者言輕故不犯云律中至不犯者如文云與尼至三十者釋名牒鈔云云云具至吉羅者同前與尼期行五緣犯幾者音其近也村內一界者未越分齊故吉若越即提乃至越多村界多提空逈處十里一提云不犯至者者可知吳越國天長寺長講律臨壇崇福普濟戒光大德賜紫志貞寫此一部丁巳歲記
