body:
  text: 吳越國長講律臨壇賜紫清涼大師景霄纂云次對七眾發戒多少者羯磨疏云戒不可分隨人分四近事五戒三眾十戒僧尼具戒等云云云准至戒者一一眾生皆得四戒者謂身三口一發四支也以無貪嗔癡故各得發三三四成十二也謂貪等三於此非情酒上發得三戒設酒滅盡羅漢入𧣇者縱饒酒竭一切眾生修行總證羅漢羅漢復入涅槃灰身滅智無境可慳而戒不失由心煩惱在故雖無所防之境能防之心未謝故不失也准以義推者鈔約義明發我也女十八者謂婬處三并盜煞妄成六三毒歷之故成十八也男十五者謂婬處有二并盜煞妄成五三毒歷之成十五也非情三戒者謂非不分但有三戒羯磨疏問云煞盜隨境各准一戒婬分三境者何答隨境行婬皆有染故若爾死有四處亦應一身立四煞戒不答隨煞一處諸根並死不同婬戒設犯一處諸猶存故不分也云八至五者眾生同上者五戒身三口一亦發四支也非情得五者一不飲酒二不坐高廣大床三不著花鬘瓔珞香油塗身四不歌舞倡妓故往觀聽五不得過中食若爾則成九戒如何云八答經論不同若准俱舍及報恩經則不過中食為齋體餘八為戒是其枝條助成齋體故云八齋不得言凡若不斷過中元不合受八戒若准增一阿含經即不過中食為第六支便合華鬘猖妓為一非時即入不貪中非情但四今鈔云非情得五便開華鬘倡妓為二與根本合說為九故多論云八今是戒第九是齋齋戒合論故云有九也亦合准上女人非處有男子有二女人三十三戒男子三十准上可解云十至解者同大僧發者戒體同大僧無作前別序第九門略辨了今此明發戒情境一切總發四分等者此是大小持戒揵度中沙彌得戒具列七支故善生云五戒八戒無無義語兩舌是事不然我今受持淨口業故俱得七支智論亦爾佛法貴如實語故以不妄為先自餘通攝不得言及自餘諸論但發四支戒也戒戒下文等者則僧尼戒本戒戒之下皆結三眾吉羅故知同大僧發也若爾者領解前意了下句難云何故文中但列十戒意道若同大僧發者亦合有二百五十如何但列十條戒相此但示根本等者此約憙犯之者令其早知已外隨中和上由教云云三歸羯磨等者謂三歸明十戒羯磨明受具戒二種文中不列戒數說相文中方說十戒反以四重故云方列十四兩種類解者相比類也沙彌三皈無戒數發七支戒相但說十類如比丘羯摩亦無數發七支戒說相但明四重云若至雪者多論僧尼俱發七支戒各以貪等三毒而起三七成二十一也今義准張三毒互起二三分應有七門者鏡水大德云欲解此文先須認取宗旨不得混乱若依多論心王心所同剎那俱時起若成實宗前後起今引鈔文正依成論也今義准者今師以義准之張者開也鈔意開前三毒成其七門三毒互起者初單起為三句二三者謂二二互起成其三句等分者三毒合起為其一句故成七門也癡惱他八種九處亦不起餘二已上名曰三單或如一剎那起貪復一剎那起嗔相續惱他八處九處更不起癡此為第一二雙也或一剎那起嗔一剎那起癡相續慳他八處九處更不起貪此云第二雙或一剎那起癡或一剎那起貪相續惱他八處九處更不起嗔此為第三雙或一剎那起貪一剎那相續起貪嗔一剎那相續起癡惱他八處九處此為一合謂此宗必約前後剎那而起就中進退稍難分折若約一剎那間便起二或為双反一剎那頓起三或為一合即恐違宗若前後剎那別別而起後何名雙及與一合耶如此兩途俱成防故然彼宗剎那雖前後不同今取相續邊說其雙并一合義也多有不達此文意者錯將多宗文義約一剎那說者非之甚也女九處者開婬支為三也男八處者開婬支為二也六十三戒者一處起七毒心七九六十三也約具足以說五十六戒者八處每一有七七八五十六戒也非情戒境各得七戒者還將七毒歷之又得七戒也以此例餘等者謂以此一女一男及一無情以明發戒降斯已外一一有情無情類此皆然即無量無邊六十三戒即無量無邊五十六戒無量無邊七戒並女是也又鈔約婆沙四師義立今略彼意初師共一切有情共發一七支戒若於一个有情上犯煞支於一切有情處煞支戒斷餘六猶轉第二師於一切眾生上各各發七支後若犯一眾生上煞支戒但有此眾生上煞支斷餘六及餘類眾生七支俱轉第三師意云將三毒三双一合七毒於一切有情上共發一無表若貪犯一眾生煞戒了於一切眾生身上貪煞俱不發餘者仍轉第四師意亦將七毒於一切眾生身上各各發得七支戒後若犯一眾生身上嗔煞竟但於一切眾生嗔煞支斷餘六并餘眾生身上七支戒俱轉鈔約此四師義故以七毒歷其七支義開婬支故於一女子身上九處發六十三男子發五十六也餘如文云問至不者此總問新發七支攝十業道舊戒及佛在日所制一切戒得盡不云答至說者初答云盡也誤以制身三支揀婬盜煞以口四攝妄語綺語兩舌惡口又於煞支中攝九十中煞畜一戒又口四中攝九十中小妄語一戒成九故且云盡也若爾縱依適來於諸戒中但収九戒何得直言盡耶可引鈔答設有已下云云謂云防義未盡故云設有不盡攝入七中謂正七支攝十業中前七業道通於佛制中攝得九戒已外二百四十一戒並是枝條攝皈根本如但打不煞但觸不婬但藏不盜等是因非果皆皈七中如配戒種類也准多論配戒種相者下四篇亦防根本四重故制如觸麤同引生等是愛染種類屬初戒如二房奪依等是損財種類屬盜戒如煞污家打搏是煞戒類屬煞戒如二謗小妄語是妄語種類屬妄語戒今亦如是如漏失觸麤等婬支攝二房還僧物藏衣等是盜支攝污家中自種花果等飲用虫水兜羅綿打搏等煞支攝作分離意即兩舌攝二謗妄語支攝罵謗知事罵支攝為不恭敬說法綺語之攝亦如配戒種類也云又至攝者謂古人云成果皆是七支在因如配戒種類者有二種過一者罪性不同煞罪性重打搏性輕二者能防体異煞防今斷打防惱他首疏更添因果兩別打因煞果故攝不盡了論亦云打搏比丘非煞攝摩觸女人非婬攝等又准善生經業品云除十善業及十惡業善惡戒已更有業戒所不攝者所謂善惡法也已上經文十善十惡業者根本十業道也古人云舊戒不由佛制而常有故善戒惡戒即善惡律儀假無貪等為三因於一切境上發得七支即善戒也惡戒反此古云客戒准此新戒七支於五篇中准攝九戒降此已外更有業戒謂善惡法此是十善十惡之種類非是根本十也故知者許可之詞非盜等七屬七支收自餘業戒即種類攝問此種類即是戒本中種類為復別有耶若此據善惡法自有種類故菩薩戒云煞因即心煞緣刀仗等煞法方便打擊悅指等具煞業貪等三毒造身業等今除七外餘貪等三心及除枝條並稱為業戒亦名善惡法等皆入貪等種類中智論云不飲酒非時食攝入不貪中不加杖眾生攝入真顯中此後三業道菩薩戒中名戒聲聞戒中但為同小乘不制意地故今除九戒外餘戒攝入三業道中因茲致有四句如鈔云云云宜至記者善非戒者如十善中後三謂無貪嗔癡但得名善而為戒因不得名戒戒是業防警祭然佛不制故聲聞意地單心犯者故非戒也疏云但制意地非所持故總制此三為戒生因從一切得非是所持也戒而不善者謂屠兒以惡禁其善法則名為戒故非善也即惡律儀者以惡簡之由戒名通善惡故亦善亦戒者疏云前七隨分修行名善要須普周名戒俱非者謂身口等業恒無記故非善惡戒云問至儀者謂上明發戒相攝云義已知然於文中有處云戒或云持律儀不知戒與律儀有何同異故致斯問也答中衍者說文云達也謂通達情境無有邊際名為律儀也玄又云衍字謂行中有水即小行之㒵隨其屈曲乃至於海無不閏及然此律儀之体於情非情無不周遍故無涯也謂無邊畔然戒與律儀其体不異總別有殊故分二也若望受中總斷惡邊名為律儀望隨中對境一一別斷名戒儀也望餘通類有生皆罪等者謂既愛惡戒通望四生雖未加煞皆名惡律儀皆有惡無作之罪故善生云凡有二種一者惡戒二者無惡戒惡戒之人雖煞一羊及不煞時當得煞罪何以故由先發誓故無惡戒之人雖煞千口煞時得罪不煞時無罪何以故先不發誓願故善戒反此云云已上總是第二大段戒体門竟以大門第三戒行中云三至行者三明戒行者牒名也謂受隨二戒等者謂防身口不妨內心故曰遮約外非謂此受隨俱以遮約外非方得善成故名戒行也云然至至者要期思願者以要期一形之心發四弘願隨是稱願者謂下壇之後盡於一形修行與當初發心誓願相稱也譬如等者疏云夫受者願也依隨奉持行去呼如受而不知持此有願而無行何異指空為有盡餅死飢等也先立院墻者兩解初云北人造宅與江東不同必先立院墻然後架屋於墻上也六解云觀如文意須約外院墻說也下句云後便隨處營搆即喻對境防非是隨行也此解好空院是願者若但空有四周墻院而內中不隨處營造屋宇不免寒露即喻行人但空有受体無隨行不免三途之苦也但有隨者謂若不受戒直爾修行此但名善得不稱戒身既無戒乃隨流生死雖則修善不能遍緣法界情與非情要期斷惡是𢩁下周也穿窬者穿破也窬欲朱反三蒼云門邊小寶也說文云門旁穿小戶又四空也謂雖有屋宇且無院墻不免賊之穿入所有皆空則喻有隨室字無受体院墻雖有其行無戒防護易被六共之賊穿入盜於善法云財悉空竭故必須等者有受有隨能生定慧至於佛果也云問至述者問意云且受戒能遠招佛果近獲人天為受功能是誰答中謂雖受隨相資受是緣助即踈隨行是其親因要假行修而成聖位故云不親受体也流入行心三善為体者約四心中第四行心通善惡故今能持之行要是善行離貪等三毒故云三善也反為戒欺者謂本要期思願趣佛菩提今無隨行護持凡所施為違本受体却入地獄長切輪廻受於苦報即是反為戒欺為由被也是故行者牒觀修行之士也明須善知識者謂須明解識達也業性灼然者分㒵也非為濫述者非不也為是也讚者汎讚述謂敘述顯一一依於教文不失取覽敘述有人破鈔問故此科心也第四戒相中云四明戒相者牒名也云語至領者有境斯是者以初受要期遍情非情而發斯由此也今論戒相但有境皆是此之戒相綿遠也持犯非濫者約其戒本人並誦得以常誦習所以文相易明准律對緣而釋故持犯非濫自餘方境豈得漏言者謂戒本但列二百五十餘之戒境境亘玄沙可得脫漏不明也准例相承等者准上古人皆於二百五十戒本釋持犯相我今准古今網體例相附釋亦得薄知以為萬境之綱領也或有云准二百五十戒流例故云准例者非也從此科戒本若准玄記便依鈔文解初戒等至一百眾學似米周足今寶引南山戒疏從證信序次第解判乃至戒經即一卷戒文始終條貫對此理合敘戒本科并解五字偈序等並如別顯也搜玄於初戒前此疏義門料簡大科為二初義門料簡二釋十局義今不同之若十句義須於初戒緣起中引未合預明義門解判即須向廣教序中至得故妄語罪對此處敘哩妄義也意道故妄語未審是何罪為因為果輕重云何乃依戒疏之文五門分別初定輕重二明通塞三對問緣四就罪辨五約人論初定輕重者如昔解云序中嘿妄但是方便何以得知嘿坐表淨誑僧未彰故是方便今則不然隨作結成何方便但為嘿妄故結吉羅也二通塞者如昔解云序中問通篇聚但有犯者不合同戒是以序中通問令其發露知何可如前論八篇問前既有實犯說已方問豈不違教今解上通義不容爾隨有九位問皆通下若爾七滅諍後無戒可說何要更問答罪相如塵細看細見憶識之心前後紛擾隨有解悟即須發露靜則對人眾則心念尼件法聚七佛略教其相如此何得不無故文云若更有餘佛法應當學如何不攝三對問緣得罪多少如昔解云雖經三問共成一法故今嘿者但犯一罪如請乞詞乃至白四雖多皆成一法今解不然既有三問隨問覆還得三罪如白四諫共成一法隨白羯磨法四偷蘭莫不對問對諫俱有心非拒故結多罪四約罪者問今或犯多罪既違序問為幾罪答嘿淨誑僧但得一罪今不同之若犯十罪隨其三九皆有嘿淨則犯二百七十吉羅又如一人而被三舉隨受供給皆獲三罪如是類知五就人結罪者既犯十罪欲令眾人知我行淨我若露者知我行乖無人涉錄是以故妄今望多人還得多罪如妄語法一言誑多隨其人人皆同得罪已上義門料簡竟次依文釋中戒文八收抄分七科云云云初篇者居七之首四初四戒共成此章四篇對此准戒疏十門分別今且分七門初三由發毒二起由身口三自作教人四犯分三趣五分自他六教興意七明次第若准戒疏第六明錯悞第七尅漫第十三眾任運第六七二門如持犯方軌中自述第十非急要故不明是以且分七段初三毒者婬因三毒成必在貪故善生云若為樂故即屬貪怨根眷屬故屬嗔非所生母屬癡盜戒者善生云若為己身及諸眷屬而取他物是貪若盜怨物是嗔劫下性物是癡煞戒者善生云愛他財故害是貪怨故煞是嗔或見父母病畏苦痛故煞是癡大妄語者本為利己是貪怨他故慎謂無罪是癡有人言思貪名利意了即結暢思事竟則嗔癡二發由三業者通約四戒用分二業前三身犯第四口犯若就互造婬在形交故望局身口非犯義由無語故煞盜二戒身口互造兩得相成妄語一戒本希名利非言不成亦有身現無疑成重仙人起嗔煞那羅國意造身業如哩妄等意造口業三自作教他者婬自作成重教人為非樂染非我盜煞兩重大妄者自說成重教人稱聖名利擁彼於我無潤由三趣者初人犯四唯夷一品對非人犯四則夷蘭二品對畜生犯四則多種婬則犯夷盜誑皆吉煞則犯提婬三趣犯夷盜戒人重非畜兩趣但制蘭提煞人得夷非畜而境但制蘭提妄語人重餘輕顯招名利人多信奉報別非餘縱有問徵故但輕也五自他始終者初明自他有三一自造他境二他造自境三自造自境配四戒者婬約三例犯同夷盜三例者自造他物重餘二無罪煞三例者煞他他煞自此二可解自煞自者准善生經無有罪失不起他想無嗔心故若依五分結前方便命斷偷蘭妄語三例可以意解上約自他次約始終者婬始侵境則重煞據命斷盜妄據中財雖離他由未得用妄雖言了未得名利可以准知六教興者原佛制戒本為止惡業之所興要離三毒故文云孔冠婆羅門尊者阿難等云云七先後次第者有人言對毒立戒貪既在初故婬第一如僧祇中成佛道後五秊冬分第五半月十二月中後一人半影為耶舍犯故制即當此土十月七日也第二戒者六秊冬分第二半月十日食後二人半影制即當此土九月十日也第三戒者同是六秊冬分第二半月九日食前一人半影制即當引土九月二十四日第四戒者六秊冬分第四半月十三日食後三人半影制即當此土十月十三日若如上制從犯次第文相甚明也已上義門料簡竟第一婬戒云婬戒者謂一戒皆令有四段然古安設不同若玄記初且緣起二釋戒名三述制意若明戒本待消抄文意方乃科云似違文也且抄文本為解釋戒本若將在後全成顛倒未成法軌今依京師供奉先制意二釋名三緣起四戒本然後解鈔然制意或鈔文引論自辨若文中無即引羯磨戒心兩疏明之今意恐繁不敘亦得四段今初理合制意鈔文自辨也次釋名者婬者蕩逸也躭著也謂色境蕩逸情壞躭染不離故名婬也是所防之境戒是能治之行能所通舉故云婬戒三緣起四戒本并十句義廣如注戒中述之云以至中者玄云抄意離繁但科云段遍下諸戒約文節義足可稟承等云云略知持犯廣如下篇者此但約境母持雙犯故曰略知正申文意若明心境想疑即如下持犯篇也餘義如戒疏者指廣文如彼也云初至故者可畏之甚者謂能劫人功善財故云可畏祇云劫初無人上界天來下食膏食膏既盡次食自然粳米身漸麤重不能飛行即有女人生眾人唱云此中有惡物生即女人也尼眾反之即云男子云云敗正毀德者謂販其正念正行毀其自共云德如俗已家破國自古如然也婬欲雖不惱眾生者如煞盜妄惱於前境婬則共和而作是不惱也心心繫縛者但以繫縛人心躭染難捨繫縛當更結於戒𠎝故云大罪也且三義故名大一能發業二能潤生三是黑業今世取涅槃者智論云婬是障道之原若犯不得涅槃之果聲聞之戒制在初也言四至齊者三趣者問犯境既六今何言三答人畜兩境不攝自分非人趣攝天子修羅鬼神地獄雖則不言亦是鬼趣攝也戒疏云此四趣神用齊故合為一非人趣也以門律合為三趣論開為六道者論據善惡故分此律據舉用故合並約三趣以解釋也約報男女二形者以二分五人女人婦人童女二形人男黃門非畜亦爾據女三男二此等婬處是所犯境也於上十五種境皆有學睡等四種境也毛頭者舉犯云分齊相㒵小徵尚犯何況餘者波羅夷者所犯罪名也如前分別云云律文自造他境有六百二十四句怨逼有三千七百四十四句都計四千三百六十八句並犯但略知大數不在繁敘也莫問心懷想疑者此律婬戒不開想疑但使是正道縱作非道想疑皆犯夷也犯之分齊者彼云波離問佛佛言大便道過彼小便道過節口過齒皆夷為分齊也云然至出者結正者謂是究竟果罪不是方便生類生恠者謂同道此是佛說便致疑云愛染心說增嫌生恠佛是世間尊尚之王何得說此麤惡之言等云云法師者論主也若佛不說戒等今日云何得知波羅夷罪有笑駈也者若講法者以扇遮面慎勿露齒笑若有笑者駈出何以故佛怜愍眾生金口所說汝等應生慚愧心而諦聽何生笑有斯緣故所以駈也也云次成犯相者次第也成就也犯謂所犯相謂相狀未知自造他及怨逼等各具幾緣而犯成相故次辨也云有二緣者一自造他二是怨逼緣也云一至犯者自有婬心者簡非怨逼我身分也裏隔者防人污故未恐人云我今有隔應無犯故是以言也具緣如鈔云云闕緣者初緣非道想及疑得二蘭闕二三兩緣無犯闕第四緣有二偷蘭遠近二方便蘭也云二至相者或將至第境者即自造他境也或就其身者即他造自境注云不問自他者是前二遍也自將正境入他正道他將正境入己正道闕緣如前比知也善見下明不染之相也云問至無開者此云不通戲笑也小兒根口中弄者律文有乞食比丘見小兒根舉著自口中白佛言夷若刺者五分云時有比丘以男根刺他比丘口中後俱生疑佛言若戲者偷蘭非戲者夷過齒者彼律波離問佛佛言節過齒得夷餘二無開者謂不開戲但入毛頭即犯也云四分至也者律文有多句法非急不敘如前論說者蛇口火中是不犯相如律蓮華色尼為人所逼佛問樂相答言如熱鉄入身佛言不犯云律至重者骨中蘭者律中有女人犯罪於王令剝女根肉有比丘欲心於骨間行不淨行佛言蘭骨中非正道也若爾既非正境何不犯殘答若作憙樂出精意即殘由無作殘意故但蘭此則非道道想故得蘭也如戒疏說者彼問云死屍半壞境行染得何罪答有二緣若唯重婬心入便偷蘭縱出不淨不犯僧殘若欲作憙樂意者如十誦五分乃至骨間出不淨殘不出蘭此是大婬戒不就僧殘結以不作出精意故餘如彼說云云次引見論證上文但是正道義也雖𩒐中未壞亦是境也云律至羅者此明僧尼相教及下三眾自相教得罪分齊能教蘭者謂受樂非已教者但蘭雖教他不作能教犯吉此約能教人若作滅殯為異者此約所教者作謂樂在己故滅殯乃至從夷越却中間諸篇至吉下為篇謂下三眾犯五篇罪同得吉羅唯初篇滅為異也云三至不犯者戒疏云通括有五一作事無違說為不犯如痴狂等二說犯為不犯如最初人違略起非無廣可犯三說不犯為不犯如律一切無婬意正念攝心故四開前禁後不犯如怨逼等三時無染等是五當戒別開不犯如睡等無覺知故抄中怨逼有二初怨逼向己二不受下被逼向他一切無有婬心者戒疏云開自身造境既無有心亦無有境也已上釋初戒竟云第二盜戒者標也文亦四分初制意者戒疏資財形命然就戒文中詞句安布次第不定今師刪定戒文中煞最在後謂依西國瓶沙王遠祖治賊但令栴陀羅拘頭捉手名之四捉次令以灰囲之名縛火王引駈出法沙王登作斷指闍王引戮名煞今依此次第故大德云新章云南山不合迴互聖言前後顛倒此不達意妄致斯也消戒本時如此略說要人知委也釋中云性至之者性戒含輕重者此通下諸篇如煞畜打搏等亦是性戒望初篇四戒下篇則輕初篇則重性重之中盜是難護者謂只就初篇四戒俱重之中盜戒復是微細難以防護如燒壞等非分損失總名為盜等故諸部明述等者顯此難護如諸律中其餘戒相大途約略總括述之及論此戒三卷五卷者淮南云十誦三卷或四卷僧祗五卷善見三卷謂難護持是以委細致卷軸多也善加披括者勸令披尋撿括識達無疑也方免斯過患也有人別標用入私鈔者古來失德別自纂錄盜戒之抄常在左右私屏恒看貴記持用意等抑亦誡勸之意者抑由按也今師云按此亦是古德誡勸後人之意也須終遍覽者謂盡理言之終須遍尋披覧諸部律教不准此之私抄也故銓次列者銓手則權衡衝也如世之秤分銖斤兩輕重不差今師准依諸部教又銓手次第行列於下文中亦復如是使拄重揩定分毫不差也云初至便者六塵即色聲香味觸法污坌根識如塵也六大即地水火風空識此六寬廣故名為大此之大皆是盜境下文自述緣差者欲盜彼物即值異人恐事影露也或有餘緣來差此心不遂盜事但結前心人物上蘭也境奪者本盜人物後無主物境來替人物處心中常作有主想取得無罪但有人物境上前心蘭也心想疑轉者謂本是無主物作人物盜想中間轉作非畜想此元想轉也疑轉者謂本是無主物作人物想取中疑轉為是非人物為是畜物既是無主及以己物且非盜境也云問至損者向意躡前而生前云己物其相易知未審無主相㒵如何似故生斯問也答中子作惡事父母逐其者為子既不肖父母瞋之以水灌頂遣後父母死名無主物然且據西國法式若此方雖無子息亦有官家為主不可輙取二國中間兩邊封相等者如五天之外二國分壃中間有隔或河或山或林或樹此處有物不屬兩邊是名無主此亦西天之事也國破王走後王統等者前王已去無我所心後王未統未為正主於其中間是物無主即如俗令等者南山指此方俗律山澤是國內不合占獲其間住取猶名無主反顯前文二國中間故成無主也差先加功力者更進退解可知云二至犯者總緣其六者若准戒疏唯五不五與方便問前後諸戒犯緣皆須何以此戒不五答損財明盜成重不假方便恐涉濫故縱有方便亦俱不明但未舉離已前並方便攝玄記對此廣辨闕緣義今恐繁故不敘云今至釋者依前列緣次第釋於相狀也云初至別者初中二字牒初門先後兩段開二章門依章釋中云所以至大罪者所以兩字徵意謂本明盜三寶物有何所以先辨知事人是非耶若不精識藏者釋也謂於能詮不明也若善通用與於所詮壅滯師心不師於教便成盜損於相如後說者如互用中說也寶梁大集等者寶梁是大乘律大集是大集經經約聖凡分判律約凡夫持戒以論准大集護法品云時頻婆娑羅王問佛何等人堪為知事守護僧物佛言僧物難掌佛法無主我聽二種堪知僧事守護僧物一阿羅漢二須陀洹也佛法無主者寶云佛久涅槃法是非情無正主故問上言二種人一是第四果二是初果何不見列二三果人蜀川云親撿彼文初果至三為一阿羅漢為二今鈔但舉初後意攝中間亦盡也所以爾者徵也有何所以約此二人已外不許耶戒不具足心不平等者釋也謂凡夫持戒但防身口未得無漏動思心念微細有缺名是不具足又凡人心有愛憎故不平等初果人已斷三界見道煩惱故無愛憎分得無漏故平等也更復二種者玄云是寶梁文也彼久迦葉白佛言云何比丘營於眾事佛言聽二種比丘營於眾事一能淨持戒二畏後世罪復有二種一識知業報二有諸慚愧及以悔心後有二種一阿羅漢二修八背捨戒聽如是二種比丘營於僧事自無瘡疣護他人意等今鈔合四為二又將羅漢同大集經也不平等心名為瘡疣能齊與食不能齊者示於因果知非為怪名護他人意若不如是令他便罪長輪苦海此事不易故曰甚難也注文冥犯大罪者冥然犯於盜重不以無知故免也云今至法者如文云初中者就盜用科中也云盜佛物者盜是盜心佛物是所盜境能所俱彰故云云正至攝者對此先敘三宗結罪不同次依宗消鈔初相疏云若盜佛物成波羅夷重舉例云如盜畜生物境劣故得吉若盜人物境優故得重既人物尚猶結重佛境最強何不得重又將佛物人僧尚結夷𠎝自盜豈不成重法寶難云天猶勝人理合更重何結偷蘭又將佛物入僧得重者自約互用邊結與此令乖二例俱非不可依准二東塔云佛在日自為正主盜即成重涅槃後唯有福田無正主故同非情攝只合得蘭今難云若爾縱使在日結重即佛應有我所心耶又將入滅後佛判同非良為不可今南山曰不論在世及與滅後若盜此物俱犯偷蘭斯為定義上且敘左今判非不定次消文者正望佛邊無盜罪者此段正約無施護二主佛物境上成犯之相如久遠之物雖無施護之至以其物體且屬佛故若有二主望二主結下自有文先須簡此犯境問故何望佛邊無盜罪耶下句答云由佛於物無我所心無惱害故謂佛理平等得失一如於物無心失不為惱如十誦云盜北單越人物尚不結罪彼人無我所心豈況三界之至於物有恡若據佛邊一罪不得今言但得偷蘭者東陽幽釋云望盜人心上結也以進趣作盜佛物之心舉離之時自結蘭罪約境無犯如涅槃經惡心斬截死屍以境上無可惱理合無罪但起惡心亦得偷蘭所以為例已上正解竟次辨諸家解者一玄記望善神邊結也佛雖無心神攝此物故鈔釋云以同非人物攝今難云本明更有煞母偷盜佛物罪若望善神邊結之却成盜非人物也況神護法攝於物不可依承二淮南記云望斷施主福得蘭以施主將供養佛無作續生今既盜除無作不起故結蘭也今難云現有施主可然或經久遠施主亦無又望誰結況復斷福犯重下自有文不合委解更有解云鈔文所結蘭罪此據佛在世時正望色身佛結今文涅槃此蘭也縱今寺內殿中形像皆有施護二至望主結之今難云如婆沙云以佛懸攝未來冥然屬佛如何會通恐無理也已上解因便敘之若五釋文初義為定思之以同非人物攝者謂三義故同非人物一犯緣因盜非人物具六緣一非人物二作非人物想三有盜心四重物五興方便六舉離處今佛物六緣亦爾二望境同盜非人物時若有守護主結之無守護主即正望非人境結今此亦然三罪體因盜非人物是中只果蘭今此亦爾故云心同非人物攝也豈同東塔將佛類於非人又不比搜玄約神為於護主名非人物攝等次引證云故至蘭者彼律第十六云盜天神像衣及以花鬘佛言得偷蘭及證上文佛物蘭與此罪體同也云涅槃至蘭者引此收文證上盜佛物決定犯蘭有教為據不同西塔云犯盜重仝是師心也准彼經第七云迦葉問佛何名大乘偷蘭遮佛答云有諸居士建立佛寺用珠花鬘供養世尊比丘見花貫中縷不問輙取犯偷蘭遮不問輙取者釋盜相也不問施護二主也若知不知者玄記引山法師釋云謂比丘明白心中知是佛物或冥然不知是佛物並犯蘭大乘中不論知不知也若小乘知是佛故心而盜即犯若不知或作物無主等想無盜佛物之心即不犯若據法寶不許此釋若知即約明閑之人識知教相不知即據不學人不知教相並皆是犯若既明練如是故違雖於教不明不知有犯然不以無知便得解脫也若犯罪結根本更增無知罪今恐不然鈔所引者大乘經文適說義却作等乘律解既經律混然如何分得大乘偷蘭莫違他經文否請思之已上諸文總是明無主佛物結非之相不論在世及滅後並結蘭也次明有主云佛結犯相中云若至罪者謂望知事人是守護主望此主結罪若無護主望斷絕本施人無作福邊結重云故至用者此文證上斷福結義也謂因施幡蓋得生天今既盜之斷他施福得罪也塔上云者是施主物穢地棄之亦損他福云摩至別者此文證上約守護人結義也人廟中物者謂如古來忠臣於國有功置廟等也守護主即知廟之人今比丘盜此物未約正主且望護主計直者滿五夷善生中守塔人者示護主也不望佛邊者謂有護主故不望正主而結所以約守物人者徵也如盜人物中分別別者釋也謂下文盜人物科中有償護損失主為他償錄即是守護或有人盜此物為望止主為望護主下文斷曰若護主勤是守護而被賊比丘公白劫奪或私竊穿窬而盜去者非是護主禁約之限正主得令彼慎還若徵覔他錢財財主却犯重罪即盜人望正主結罪不望守護人若護主為性慢緩不為他償錄致遭去失即須填他若不填之護主犯重即盜人但望守護邊結犯不望正主也人物既通此二三寶亦然且佛為正主知事人為護主盜相類例可知今引此文莫非為護守護結罪犯之相也思之云必至無犯者此約佛像舍利也自作念者是盜人作念彼人佛亦是師我今佛亦是師也前約盜佛供養嚴飾等物說此改正約盜佛身或銅像旗子之類也云摩至盜者多論為轉賣者引此一句證上伽論約他轉賣佛像舍利得五錢犯重不滿犯輕若論舍利有何價直鳥死者鴿等此在佛塔中死便合屬佛也餘物者所稟云謂遺落之物前人已作捨心者物既在此即屬佛也或可伏藏之類古德而有即無正主先既不知死人守護又闕護主既在佛塔內理合屬佛為正主後忽攝得不可餘用答餘用者即犯盜也已上諸文總是明盜佛物已竟次盜法中云盜至犯重者法是非情無正主結律文犯者望護主論也久云等者釋成上義也此是餘斷盜經得重文也首疏云若據佛在時未有經卷不妨小小記錄亦得名為經卷不得口吹經上塵等者謂恐口氣損色又屬輕心如將塔云棄向不淨處亦損施主福若燒故經得重者玄云此是業罪五逆之重非謂夷重也如燒父母者經是佛母解從此生今燒故雖同燒父母云逆戒疏云有人無識燒毀故經我今火淨謂言得福此妄思度半偈捨身著在明典兩字除惑亦列正經何得焚燒失事在福已上疏文十誦借經不還者即借不送來覔又不與經主疑云為更還我為不還耶前人生此心時比丘結蘭此由心未絕者釋結輕所以也答經主決心作定不還想比丘得犯重秘方者藥方要呪術等例謂此秘方有其價直盜寫得重佛語無價但約帋墨書功以論故不類也云問至罪者問意云前來多論盜舍利淨心供養不犯經亦合同如何一向結犯答中佛得遙心禮敬者雖舍利形像被盜將別處本主不妨送心敬禮亦有福報法須執文者經卷須執捉披讀必若盜將本主無可執捉也地持云大大供養者彼云若於如來及支提現前供養得大大功德謂現前即覩相興福但對一佛一塔之境得大功德若不現前即不覩妙色發心通供養法身約法身性非唯一佛此則獲無量無邊福勝故云大大引此證上文中佛像舍利通於遙供養也若欲互舉者此文一向恐通局以明犯不之相不望境也可知已上諸文物明盜法已竟次盜僧物中次盜至重者此段文為破古師義也古師所判望十方僧無滿五理得輕若有護主望守即重今師不然若有護主望主結重如護主自盜准善見論知事人將僧物為佛法兩用佛言波羅夷此望十方僧通為一並滿五結重也云然僧有四種者今師五四種常住也四名如下具列云云東塔踟不許南山立於四種彼破云強加階級合為二一是十方常住二是十方現前常住不用常住常住及現前現前二也法寶反破彼云云必若但分二者今將眾具田園等與十方僧共分應得今謂此物一局此界二假使十方大地僧總集亦不得分名為常住常住若不立此何位攝之又將現前現前常住攝歸十方現前者且如有人將物直施此界現前僧今更通十方僧分得否今謂此物現到是物現前人數有限是人現前若將此物通十方僧望現在人應得不得合犯何罪如斯處斷暗託甚矣西塔疏並至此一節更不最許量但云此是隨根之教等今師特立四名收攝方為盡理初云至攝者常住常住者體局當處不通餘界故名常住二則但許受用不許分賣復名常住故而言之抄云花果者須分別也大德云若成熟之菓已摘落者十碩五碩此即屬十方常住謂物體通十方故不可不分今此中花果不可分者且約在樹未取之前不得十樹五樹分入於己也抄中來論量米麵等戒疏內加之如米麵百碩五十碩在庫倉中此屬常住常住若作及餅等即入十方常住收鹽醬醋等在庫內是此科收隨日料云在供床者即十方常住攝此依疏文分之誠非臆說也謂十方常住從常住常住中離云故或有不許在樹菓子及米麵鹽醋等是常住常住收總判作十方常住攝便妄解云菓子米麵等堪喫之物必至須分以此物體通於十方但是十方常住也今難云且如田稻未收割時律云是常住常住此之米稻亦應作食供僧既體通十方即與樹果子倉中米麵有何差異又今師輕重儀中亦有此意彼云若將生米等為十方常住者鐘聲纔動可將盆鉢來請米麵可以分之云云如彼廣敘總望眾僧如論斷重者謂生常自盜則望十方僧為一主得重若餘人盜望護主結如上見論斷重文也又引祇文為證前通望一切僧為一至義假使集盡亦不得分也云二至偷蘭者十方常住者體通法界僧用故與十方之名亦局害界之中復言常住既許分食故單言之僧家供僧常食者戒疏云如餅飯等現熟之食也體通十方者釋上下方二字也唯局本處者解上常住二字也望主結重謂據別人盜此熟食望守護人滿五結重同共盜罪應得輕罪者玄云此順古師義也古云無問生熟也一切食具盜者得蘭望十方僧無滿五義故今云謂生食等物佛不許分通望十方僧皆得為主故結重也若熟食鳴鐘分食即無盜罪若一眾僧不鳴鐘食名同共盜損既許分食不望一人皆有食分約盜無滿五義望僧結輕以僧分業無滿五故下引祇文將僧長食等者玄云僧食若長江是分外合返還僧今既不還如何非盜謂食若食若長還屬十方證前同盜損應得輕罪謂望僧不滿五故已上正義也或依准淮南記云是常住引長之食合得明曰食知事人自盜犯蘭鉢中是己分食將返不犯此不正解也善見等者此約知事人取僧物行用如自己之物與人也注文准共盜僧食者謂得蘭引前半句准論意證同共盜損應得輕也若盜心取是名第五大賊等者論第十一云佛告諸比丘世有五種大賊何謂五一者若比丘犯五篇罪而受利養不修道業二者從他智人聞法人問從誰聞乃答云我自解因此得利養等三者四果聖人或凡夫持戒而增疾他自稱己名是謗賢聖四者將僧園地竹木一切重物以怖望心餉致白衣五者取僧物如己物無異行用與人得蘭註文准似有主者謂盜熟食互合結蘭論文既云隨直多少結多是滿五義得重少即犯輕此言應證有守護主望主結也毗尼母亦爾者與上見論文同薩婆多等者二論若有斯文注文准此如上偷蘭者謂准上文將謂僧如己物引用得蘭既云盜取隨直多少准上見論合犯重為見空等無人守護所以注言蘭也云三至結者謂一物是現前謂奉施等二人現前謂現前僧奉施等物即屬此僧故重言也必盜此物主結重者此約施主雖捨未付與僧盜者猶望本主結重也若多人共物等者此約付捨了盜亦望本受施僧結若未分付且付一人掌錄盜者亦望此守護人結也云四至罪者戒疏曰此物通有僧皆得故曰十方作法界用約隨現集者皆有其分故曰現前現前如亡人輕物者戒疏云如僧得施及五眾亡物之物體屬十方也善生經等者此約未作法前說也注文計人五不滿五犯蘭者抄依佛語諸謂未羯磨物屬十方盜望滿十方盜望十方無滿五義即結蘭罪更有不正義不敘之若已羯磨等者註文自釋云云所與人邊結罪者此約云人囑此物與某甲即亡人為能與彼為所與盜者望彼結也云四至陳者四分房舍犍度云時世尊與五百弟子人間遊行至羇連國有僧伽藍時比丘在彼上住一阿濕卑二迦留陀夷三馬宿四滿宿彼聞說佛與身子目連來此遂生心云佛是龍中龍諸弟子又是賢德名聞若到此間久住我等必失名利遂選一口上房留與佛餘者分作四分遂將僧伽藍等為一與第一比丘瓶盆等物為二分與弟子二比丘木床等為三分與第三比丘草華等為四分與第四比丘貴圖客比丘來無物受用不得久住故後時佛與諸比丘到此國伽藍已佛告身子目連汝可語舊住人敷設臥具彼答云佛是法王我先留上房供養已外分為四分也身子具此白佛佛言此是四方僧物若僧若眾多人若一人不應分賣不得入己犯偷蘭遮引此律文立為宗竟因即有人言等者古師云六群當時既分僧物佛令身子往奪故知前來雖分為四分入己不成盜也必成盜者身子知法之人亦不合更奪以此例知今有盜僧物者亦不成盜奪取無罪上且敘古此未見諸部等者今師破古解也謂古人未明諸律教有明文若奪盜者之物亦犯盜罪以賊奪財物故也若爾何故引前四分律文六群分作四分入己身子奪耶可引鈔答云四分暫礙僧用等云云謂前文約標心暫分所貴客不久住無分入己意是暫礙僧用故犯蘭輕若有心作分入己攝即成盜重亦不許奪也如善見文中主掌盜物望僧通為一主犯重故云同善見斷重大集罪同五逆者玄云謂破僧逆也今十方眾僧依食而住假食為緣而得修道今既盜損僧無所依修道斷絕故同逆罪我在僧數者謂顯上文望十方聖凡一一結罪也日藏分者謂佛對日藏菩薩說諸龍受苦一分經文彼皆云憶昔出家備造諸惡噉僧花果食人信施不消受種種苦僧護傳者從人立名也僧護比丘隨商人入海採寶見有五十二地獄五十僧尼獄一是沙彌一是俗人為人寺作非法故入此獄等云云如彼云五百至云云者三藏還債者五百問上卷云佛涅槃後有一比丘精進聰明有一婆羅門見比丘聰明以女奉施為尼學道比丘受之其女端正比丘失念共行非法乃用佛法僧物各一千錢此比丘聰明解說法自思懺罪便欲還債往瞻彼國求乞大得財物至還時中路被七步虵螫釋音比丘知行七步必死乃於六步內便處分弟子將物還債我在此立住待汝其弟子奉師處分向彼還債却來報師師遂進行一步命終墮地獄謂是溫室便大舉聲誦經呪願有數千人聞經呪聲並皆得脫獄卒嗔比丘遂舉鉄叉打之命終生三十三天等已上諸文是明用竟云二至互者如文云就至御者祇云若比丘作摩摩帝佛塔無物眾僧有物便作是念僧蒙佛恩但供養佛即是供養僧便將僧物修治佛塔得夷重若塔有物眾僧無物便作是念供養僧者佛在僧中便塔物供養眾僧得夷摩摩帝者梵語也此翻為經營人等問今時諸處寺院中有彌勒像有人得施利如何決判淮南闍梨斷供僧用以彌勒位是菩薩菩薩屬僧攝也舉例由如泗洲僧伽和尚是觀音菩薩化身所獲施利盡入於僧今此亦爾揚洲孝感寺有一鐵彌勒像人施物絕多從南闍梨總判令供僧也大德云彌勒如今因中位是菩薩即住縱爭奈他施主作佛相故施不同泗洲和尚現是僧儀舉例不齊全成愚執此因便說亦是急事學人要知云寶至故者寶梁等經者等取大集也寶梁上卷云若如來塔或有所須或有敗壞若常住物若招提物多營事比丘應集僧行籌取欲作如是言佛塔破壞今有所須此常住僧物多若招提僧物二今用修治佛塔若僧和合者便用若不和允即勸俗修往在家人處求及錢物等即反顯佛法二物無正主無可諧皃向不合也餘如鈔文云云云若至也者若准此義者謂准上文不得互用義也佛堂之內而設僧廗者此即妨他佛家之事僧房之內安經像者此即妨於僧家之事也豈非互用此約久永以說若暫時即如鈔開許云云不得安佛下房等者若有樓閣處樓上為上樓下為下若但尋常房院但取好房為上麤壞者為下引此文意證前暫取總得反顯前來若將僧房長時安佛及經闕鏁不與僧住即是互用也思之云問至物者此段文意謂前文中云常住招提互所須和僧得用未審常住與招提二僧如何分判故興此問也阿難受別房者謂諸居士於伽藍內起房堂四事供給與阿難阿難轉施作招提色菴婆女薗施佛為首等者謂瓶沙王以金瓶行水白佛言毗舍離國城所有園苑我園最勝今奉世尊唯願納受佛言可施佛為首及招提僧文中不了者鈔主意謂經文不了據理房舍等是招提物故羯磨疏云招提僧房者或是七眾為招提僧於坊寺中別置房宇有來入住別有供養故律云幾房有福饒即檀越造者即常住房今抄中云房宇是招提物即定華菓等是僧鬘物是引古義喚華菓作僧鬘常住物若准戒疏抄主親問大唐三藏三藏云梵語僧鬘此云對面施四種僧中是現前現前僧物故涅槃云不犯僧鬘物當生不動國抄云依古呼為常住物由未曉了戒疏之中方為決定但為鈔已流行不可更有勾改今依疏為元也三藏又云若據梵語應云招鬪提奢此云四方僧物譯家存略除却鬪奢二字今亦合云招提後人抄寫濫傳錯書招字迄今不改招提也又准五分毗舍佉母以貴寶施四方僧白舍利弗云可招提僧堂佛聽受之准此即四方僧房但為常住名通一切並是招提名局唯約房堂並四事供設若互有所須聽和僧用等云五至重者僧障隔不犯者玄云則敬儀雖同室中亦非互也由佛在日亦與弟子同宿者大德云最初羅云二是億耳三是目連舍利弗也次引十誦文謂僧坊佛圖既有各使人乃至六畜故不合互使也又引薩婆多文僧中分行得已者謂僧物雖不得通佛法互用今若別人依時堂頭分行得者便是已分物也將供養佛法者任得華多無限者謂無所直故隨意供養又須知不是結子之華若結果者損他僧利亦不可也無可問白者謂後來比丘不委先日三寶分齊若和隨意處分若干與佛若干法僧等屬塔水者此約本來是佛塔地中水屬佛塔不可別用或雖是塔地僧曾用功修治造得當計功勞取水若過直五錢犯重此約無水時說也云十誦至罪者僧園林華等者彼律云從今日後僧園中樹華應取用供養佛塔及羅漢等樹皮葉隨用者此約多根木處僧家不用故得隨意釜鑊瓶盆等並據新者又非常用者若曾經用便有惡觸也毗尼母己處分房地種樹不須白僧者玄云地已處分樹木隨地故不須白也外難云凡乞處分之地纔乞法竟便須造房不許越秊今何有樹堪修房舍一解云舊時有故今難云乞處分地平如皷面何容於樹良不可也寶云此是種得謂本擬造如量房今為材木未辦且造小夫頭容身之屬四邊空地種得此樹堪為木用或後時治房不要治房白僧已是己分地上木也僧祗院內樹薪等者祇云有客比丘斫乾草木房前積燃乞食比丘還見呵責白佛佛言然薪法則爾許供溫室爾許供厨下爾許浴堂爾許別房當分應從限不得過平呼取若多隨意取不得斫活樹等應取乾者謂寒雪國多有溫室也施主不許者謂西天俗人多於寺中造院雖與僧受用猶屬施主所以作此方便也灰汁者謂取調莧灰汁先傷皮破洗之即死田宅轉易謂僧田等假使一切僧集不許賣此是木末施主捨之仍須却語本主合他為轉易也善見伏藏等者彼第九云得伏藏物作得想云為三寶齊講等用無罪此但取於標心通為隨作無互用罪不論伏藏別有所屬望主結犯等義思之云上至焉者財法皆同者同一利養是財同亦說戒是法同廣如前經中者如前大集僧護等經云盜僧物者我不能救等又如傳云等者齊州靈巖寺有僧暴死死後見觀音菩薩為舉一石函函內並是文書為記眾僧罪籍並是取僧家樹葉等染作雜用身皆入地獄受苦此僧再蘇具說此事斯由戒不清淨故不合取也自隱參取者上言別人得用僧人得家樹葉要是持戒而方得應當私自隱側為持為破如是參詳然後而用也云二當分互用當分互用者謂佛中自互法中自互僧中自互故云當分與前三寶互有異也云謂至也者本造釋迦改作彌陀者此於佛當分中互也大品涅槃者此於法中當分互也僧房車乘者此於僧當分中互也皆望前境理義可通者總釋上十三雖復少異於理及義具足可通以釋迦彌陀並是佛六德十號俱圓滿故又涅槃大集亦俱是大乘之教生福齊等僧房車乘同僧用故如此理以義可通融不合名互今結他互用之罪據何判抄下句釋云但違施心得互用罪但結不應吉非謂同前得夷罪也知之現前堂等直等者引此律文證上違施結吉也尼律二十四云有眾比丘尼於露地說戒有居士見問云阿姨何故露地說戒尼答云我無說堂居士因施堂直令造尼既得物入手遂生念言其說戒半月一度但隨得一處所便得衣服難得無時不須可迴此錢物作五衣受持後招俗譏嫌因茲制也尼犯提僧犯吉也此由是施現前僧堂迴作依即犯提吉合施四方僧尼作戒堂若迴作定結盜重也云若至故者謂本施寫經後却寫論故曰本經末論已上正解或云謂經為論本菩薩造論解經今將論望經即是末也此釋違抄情理俱違者以人情道理二俱違故因果全乖者菩薩是因佛身是果師弟有異此非當分此且一解又有釋云約真經正錄是出世因果偽經雜錄非出世因果此之因果則全乖也此釋亦通福無福別者若造真經正錄有福偽經雜錄無福故云別也邪正雜故者此解雜錄並非當分互恐人迷意故此簡出也有主不合無主通用者謂同一佛但東西二龕異也若施主在以心局於彼此即不合若無施主並是比丘自經營雖二龕有殊通無互也元通師徒等者師是佛徒是弟子菩薩聖僧等眾是也眾具則樹林池沼華菓臺座靈禽異鳥乃至金剛神天龍八部等謂本擬𦘕彌陀變相便合有如許眾具道理得作也非義等者謂男女非法之形像也餘文可知云善見至重者若施主本擬施園菓迴分食結重者玄記兩解一云此四事供現前僧受用既盜分食違施本心計直成重二云約施四方貧僧衣藥今既盜心食盡令他後時應得不得故重表云此二解苦未有理若約四方僧說不合犯重今但據施主施此寺內現前三五十人若迴此物召十方僧食盡却望現在人應得不得邊故結犯也此蓋望境非謂約心思之若迴作僧房等得蘭者謂房舍受用無有別屬通望四方僧故結輕也若住處乞少食粮等者謂見論施園將供依服而迴食犯重今既乏少欲散即開和僧得用僧房和賣等賊亂隨身者此是臥具輕物得且隨身亂靜却後本處欲供此像等者彼此俱是像其體不殊據理無過但結越處不應結也曰衣投比丘者彼論問曰白衣投身為道未受戒得食僧食否答曰須白僧僧聽許方得食不白犯墮若汎爾俗人不得白僧與食今此是欲出家者身雖是俗心已為道故開白與食也論文下卷又問云為僧乞在於道路得食僧食否答曰若去時先白僧僧聽者好若去時不白還來白亦好若去時雖白不聽還來須償不者犯重玄云此道道俗互也論上卷又問供僧齋米僧去後齋主得用供後僧否後人得食否答打犍槌得食若不打一飽犯重上且引論此謂施主將米供十方僧僧已去將來供後僧為米屬十方已定若後僧無盜心但打鐘普召集十方共食不犯若作盜心不鳴鐘食一飽犯重玄云此三重者是偷蘭也又准上多見二文不作相犯盜鈔亦准是偷蘭云准上至者羅者准上在道白僧方得不白不得也雖復打鐘不免盜者謂將出界便犯非以界外打鐘便得免也若為僧差等者上來善見守寺和僧得用四方僧物今為僧使亦得和僧將食出界亦不須作相為表無和僧說若寺莊等者謂寺家莊令處即但作相復不償之謂莊與寺通一家故若引至外等者雖僧家人畜亦犯吉故戒疏云聲鐘告集是僧皆飯未知他寺奴畜合否答若合僧具六和諸處皆是人畜別屬義非通使使即是局食亦如之問何犯重答以俱是常住物故如上十誦將僧物與餘寺同是常住但不合生盜心故犯吉也此亦同之云三至也者謂住持是像即形像塔庿帋索竹帛剃髮染衣三也理是三寶者謂真如一體三寶也云薩至大分者謂佛在日受利同僧但得一人分滅後一大分者為受一定分獨當眾僧如今平施三寶物分為三分僧十子法十阡佛便攝十阡之類云答至故者謂佛在世時供養色身滅後供養法身勝於僧寶故於三分中取一分也置爪髮塔中者謂佛成道已後所有剃髮剪爪並令起塔供養故若施法等多論云若言施三寶者應分三分與佛寶一分與法寶應懸安佛塔中不得佛經用與法誦經人一分與僧寶僧不得取此物應還付施主應著塔中供養第一義諦僧等問此論文不言施法分為二分今抄文何故輙分答論言法寶令著塔中不與說法誦經人若但言施法者令分為二分一分與經法一分與說人也故戒疏云准多論有施法者法師說法誦經人亦得取其分謂法須人弘也今時轉經得錢須准此法則合分半望益僧邊七人轉經分為八分將此一分入法猶為表敬若都不與不合分也若施僧寶等者第一義諦謂理無違淨體當起和合亦名勝義也以言無當者謂不時當言與聖與凡但施僧僧通凡聖故云准至失者謂上真俗寶異凡聖途殊受施之時差知通塞物施三寶施為通唯局佛寶塞又施住持佛像為通若彌佛寶為塞法者若言施法通分二分為通施法寶者為塞僧者若言施眾僧凡聖俱取為通若云僧寶為塞應須分別窮問令使分明彼此無濫者免有互用之咎也云四至互者上來明像與寶互說此下明當像下隨有事於之物亦自互也云先約佛物有四種者標舉數也釋中云一至中者謂若是佛受用物一向不合移易等云云如前寶梁說者彼云佛塔有物乃至錢以施重心故捨諸天及人於此物中常生佛相等可知不得賣佛身上繒為佛作衣者大德云謂西天俗家蚕了乃作繒來施佛此體純是綿作似六釋床子大或有方者今時盡人𦘕佛通肩披漫衣者此依勝蘭尊者將來之樣此即是僧也又西天三藏此表著皆号為離垢僧相狀似被綿多染作紫赤之色等今時講人問著總不識知之今總有人將來施佛比丘見剩長便將貨賣却買絹帛為佛作袈裟等良不可也佛園坐具皆是塔等者問且如園井田地堂以屬佛之物而同坐具受用攝耶答如律云瓶沙王捨竹園施佛立精舍佛告王言汝今持此佛竹園施佛及四方僧何以故若如來有園物房舍物衣鉢等即是其塔諸天世人所不敢用已上律文玄曰此言園者即所受用伽藍之園非謂寺外餘井園也云二至大罪者施屬佛物者此物施佛即屬於佛也佛物得買取供養具者戒疏云此屬物所以得也由本施主通擬佛用故得貨易不同前科曾為勝想故令一定也佛物不得移犯棄者謂施主心局此處違他心故犯重比丘容作佛像書經等者大德云比丘作佛書經無過但不許取錢謂此錢本是經佛錢比丘為書故取一向不合若俗人自為施不為此事取亦不犯有云比丘一向不合寫經若爾結集場中抄上貝葉莫須令白衣書否云三至也者不變本質者或將多幡蓋縫合為帳或接小幡作大幡或造佛床等用並得猶不斷施主福故若折破之即壞本質福田斷絕也如大論云等即者智論也彼云如𦘕作佛像一人似像不好故壞一人以惡心故壞其好心者獲福惡心者得罪引此論文釋成以不好故壞令其嚴好則不變像本質准此迴改不違施心故無罪有福也云四至經者首疏云獻佛物與供養佛物如何分之答供養佛物永屬於佛獻者暫時却歸本主故有別也鈔引律文治塔人得食又引論文侍佛比丘得食此二並約有功勞故若不屬佛不應與人也故知此中據暫獻故准此俗家佛盤等者謂准上文獻飯不永屬佛但屬本主即今時白衣舍設齋了主人自收無犯不將錢屬等有言屬者是偽經也佛槃既爾餘二同然皆返歸主也云次至知者法受用者戒疏云紙素竹帛木上書經像或箱函器墣曾經盛貯尅定永施不許改轉此則一定故同聖教皆滅理之所依故若有損益並望涅槃而生罪福也餘三得不籌者屬法物供養法物獻法物此三同上佛物隨緣進不故曰准上可知云三明至罪者二種常住局處定者謂常住故云二也皆不許輙將出界故曰局處定也二種互用通知得等者玄曰准上見論守寺之文彼云乏少食粮者即是十方常住物少聽和用園田房舍常住常住之物賣而充食即入十方常住也准經罪重者准涅槃梵網經買賣奴婢牛馬畜生犯輕垢罪等可以意知祇云若云我施奴婢不聽受若言我施園民奴婢若施僧奴若僧使人並不應受若言施供給僧男淨人聽受謂經文則結罪律之云不聽不聽之言意即可見莫恐有賣買之過也若論二種現前等者古記如別今但取盜僧物中現前現前十方現前來此明互用也如己五眾物本是十方現前今不作法直入現前共分得無數蘭此是互也若本是現前現前之物如施前安居人衣等今却十方現前普召十方共分亦是互也次則別損若滿五重不滿五輕此之二罪容有互故指上文成互中說也就輕重者如亡人物斷重入輕則損常住結夷斷輕入重得無數蘭此則斷割交互也雙結二罪者玄記但取前輕重為二罪也今難曰如斷輕入重時但蘭又斷重入輕時只犯重此則互有一罪單結不名雙結二罪也今云斷重入輕時本結夷重於此罪上更加無知豈非二罪雙結斷輕入重反之可知諸記中相承對此辨盜賓盧物有兩說一解云謂賓盧是第一義諦僧受佛教勅現在於世今若盜此物望他自為主犯重縱施主將物擬親上座雖未攝受冥然屬彼已定謂施主決心了若盜餘圓寂僧物但有業罪以非親為主故更飾宗所解非而不錄已上諸文總是明互用已竟云三至戒者貸字兩用若出物與人即去呼若從借物曰貸入聲呼也券記者如今時分支契是也讀疏者即帳目出入數等是違結犯者不應吉也計直輸還塔僧者有則相當還無則交絡還等云云十倍還者善生云出家菩薩若畜出家弟子先當教誡令莫放逸若貧乏有所須或病時當為求覓若自無貸三寶物差已依俗十陪還之與律不同者謂此經文與上十誦律不同律云別人開貸令計輸直還不云倍數等疑是俗中二眾文似出家五眾者謂若令十倍還之於義太急疑是俗人貸三寶物文云差已依俗十倍還之若據經文又云畜出家弟子又似出家五眾今抄引文意若也不滿慎莫貸之若病貸之依律還直也如畜寶戒者文云有軍器令打破不許賣恐為惡用比丘之法應勸斷惡也樂器得賣不得用也已上諸文釋出貸竟云第四至法者如文云四至給者律明憂波離至一住處不瞻待即日出諸比丘白佛言若知法等應半由旬迎等若不爾者如法治所言知法者善修多羅知律者善毗尼知磨夷者善阿毗曇也准與知通人者謂律中羯磨賞沓婆庠羅衣即是十方現前僧物今時供給知法人等亦准此也替我處者謂人弘教與佛不別云五至說者五分中初時凡有食都不與白衣彼遂譏言沙門且解受人物不解行施於他以此白佛佛言應與客食諸比丘乃著手中不將器與彼又慊言者比丘以小兒意看我佛應將器貯食與之諸比丘又將麤破器與又生嫌佛言與好器此是游游之人覓僧過耳在家二眾者受五八戒者識達俗士雖不受戒亦信知佛法有於鑒識之類如眾網中者與說法示因果等云云十誦供給國王大臣等者彼文云時有王臣數詣竹園精舍遊戲若來時索食薪火然燭灯諸比丘欲與畏犯不與懼損不知云何白佛佛言自今後聽立處分不白眾僧得用十九錢供給若更須者白僧與之十九錢者是古大銅錢當小錢十六文都計三百四文也惡賊來至等者十誦云有賊從知食比丘索不與言為僧辨此食不為汝等便搥比丘手脚折兼腰斷諸比丘白佛言若有如是怖畏處少乞少與半乞半與多乞多與都乞總與莫與此緣招於損命等能損益者祇云損益俱聽與食損謂賊來詣寺索種種飲食若不與者或便燒却寺等云云益者若治僧坊匠工𦘕人及料理眾僧物者應與前食後食及非時漿等若王及大勢者應與飲食不名為盜也多論有益不合者與祇不同即是污家者如下污家戒引多論云以信施物與白衣故即破前平等之心又是倒亂佛法等云云若彼此知法亦得者道俗相望為彼此道俗知懷妊女人及信心檀越在獄中等得與也俗知法者謂知我不合得他師僧之物奈何窮尼比丘將來蓋事不獲已且受或可後倍更填償等廣如二篇下說者指隨相污家戒後開之文即如適來所引是也云十至中者十律云時有居士辨種種藥謂蘇油蜜薑椒㮿撥等送往竹園精舍時六群遂早起出門邊立見送此寺藥來問此是何物答云某藥六群告曰我欲遠行先與我藥分遂簡却好藥蘇石蜜等唯留塵者將入寺中諸比丘以此白佛佛言自今已後應立分藥人平等而分若有貴價藥來應舉賣若病比丘索者應與兩錢半價若多索應就覓價直所言兩錢半者據古大銅錢當今小錢四十文也下番不與者謂無功勞也長使者有功故制也餘文易委不勞繁述也已上諸文總是第一大段盜三寶物竟云大門至中者大門謂隔諸小科得名云由至主也謂由是人故有主非正則護今盜此物望二結故下列名字一正二護也云就至結者一有我所心守護計物是我所有也我自守護掌是有守護抄下自舉物境如櫃中綿等云云二有我所心無守護者如張王家田各計此田是我所有俱無守護也鈔亦自解云云伏藏者玄記引俗僧二律三藏斷之一准十見若三寶地中得約地為主斷二若是百姓地者准律藏刀刃異器合屬國家若金銀等即屬百姓縱有古人名字亦不合屬銘為主三若空山野澤中是我所心無守護正是無主物取之無犯今無心無守護者非是第三無主之物是其前二有主地上約前人埋藏其人已死是無我所心後人不知是無守護主也就守護主二句等者如現前可分物謂是夏竟賞勞衣等人人各計有分故云有我所心且令一人掌故曰別守護若比丘盜此物望護主結重如關頭奪得禁物等者謂為違勑非法之物本主於此物已斷心是無我所心關官掌錄名別守護又如比丘失物心斷故亦名無我所心官從賊邊奪得掌錄名別守護今盜此物皆望守護人結重引約心斷邊說名無我所心也古記不達妄非鈔文云今至種種者將守護二至雜開七種廣辨盜相也云一至結犯者賞護損失主者賞字大德云飜譯時錯書為賞字今作掌字即掌錄守護也若准玄記云償常音式掌反有二義一目瞻曰賞以目瞻護於物二酬功曰賞謂作事有功以物賞睞今二中是初義也善見等有兩段文前段約守護人懃懃為守不意被賊比丘穿墻孔穴竊之或可對面奪持杖劫奪固非守護之限即前盜者却望正主邊重不望守護人又正主不合徵他守護人物填備以非情過故若徵他物入手本主犯重第二段即據守護人不勤掌護致被偷盜盜者望守護人結犯不望正主其守護人須依教填償若不填他守護人犯重文中償字音上又相疏云已上二主若望正則不望護若望護則不望正主不得通二主結犯以財無二屬罪不雙結也知之云二至重者寄附損失鈔文作付字者大德云此亦是飜譯時抄寫錯也十誦等者鈔文具出十誦四句比丘寄比丘物與比丘二比丘寄居士物與比丘三比丘寄居士物與居士四居士寄比丘物與比丘據十誦二十七緣中六群比丘與比丘為友是比丘寄一鉢與六群其人於路實勤掌護偶悞打破後見六群具說本緣六群言汝鉢破否答我鉢不破六群苦就彼徵償彼徵償彼以白佛佛言悞打破不須償若惡心破取釋初句了第二應索可知若寄居士物者謂比丘將物寄此居士與餘居士也如上二說者謂好心不須償是一說惡心須償是二說若借入聲他物理合償他不管好惡二心也餘如文云三至位者十誦等者彼文云六群誘他弟子去佛言犯吉因六群各說誓言我若誘汝弟子者作佛呪法呪僧呪佛從今後比丘不得自呪不得呪他犯吉後文即云爾時六群失衣鉢當共作投竄時諸比丘白佛佛言自今日以後不得自投竄亦不得教他投竄若自作者吉何以故呪與投竄一種已上律文所言投竄者使賊投物現於一處而竄其形令人不知故也今即眾主作法欲取賊物當失物處若干人於一衣問各至乓空房中若盜者將物故中至明日朝於中得物亦不知是誰但意在物不要知人也佛言不得誦呪者惡呪賊詞非沙門法不合行也新添探油一法如別所明義張一位者玄云此是古來願師之義鈔引用也下文自引云一至取者物主護心義弱等者謂物在別處不對比丘面前盜之此約取者心決徹失者不知都無追物之心即護心義弱未作失意是主於物有心謂在庫中心本未捨後別處見此物即不得奪取此物離地彼已結正屬賊之義已成也祇中有比丘衣被賊不知失物即即不對面盜又律調部云時有比丘他盜取物而奪彼盜者物疑佛言波羅夷第二引證中祇律有四句初明主不捨賊未作得想二反上二下主捨賊作得想三縱自心下主不捨賊作得想四若無捨下主捨賊未作得想初句云本主不捨奪者未作得想已上兩處取捨未成奪取不犯反上下二緣者主已捨賊已作得心一向不合奪也第三句盜者已作得物心成不得奪也故彼律第三句不現前盜四句之中能盜比丘並結夷重文云有客比丘晨發出遺忘衣鉢時四住人按行房舍見此衣鉢便生盜心移向一處覆藏此既有盜心又舉離本處即結夷也更有異比丘尋至見此衣鉢又生盜心復移安別處亦結夷重等已上律也今准此意若未屬賊云何結夷文既結夷故知前人是決定取何假物主生於捨意故云縱自心不捨等云云祇律後文云時彼衣物主行至前程忽然憶得還反取物取得無罪已上律文古記多引此句非於抄文既云前人決取已結夷定不用物主作捨心後見此物亦不合奪今此律文衣主亦不作捨心返來將去並皆不犯何得有遠今和會者然律據遺忘之物再來取收未有一念之心知有人盜取但作自己物將去有何犯耶鈔據自藏舉物人盜取後物至知是賊盜已作得想定結夷𠎝縱自心不捨亦不合奪鈔引此意以為行事判盜之文不可引文緣之難於抄義思之第四句者謂有賊比丘物將去比丘心絕賊於前路或被哧或為人趁捉放物而去物至與賊二人於物二俱無心此物冥然是無主境後仁收得此物舉離於地即屬後取之人本主比丘於後人邊奪取正成犯重故不許也云二至奪者謂賊對面而劫奪去故云對面現前奪也由護守義強者等謂物直有心守護此物故曰義強奪物之者既對直奪雖得物入手心中猶豫恐後却被奪等是以未作決徹得相本主物被奪去半作得心而未全捨故云心弱未捨若如此心亦得奪也第二引證中義分為二初律三句之文證成二如上總結三句想心得不得之相初中僧祇等者彼云時有比丘在道行被賊劫諸比丘自相謂曰今此賊少我等人多當共本併力還取本物便捉塼石逐賊比丘遙罵弊賊我等雖剃除鬚髮汝今將謂我兩手也剃却耶時賊恐怖便放衣鉢各自散去彼比丘既未作失想還取本物無罪若已作失想而還取者便成賊奪賊物今抄將己作失想向後總結三句也又闇逐賊等者第二句也有比丘道行為賊所劫失衣鉢已入林中藏時賊思惟我伴儻多其物又少寧可更求相添分也即藏衣鉢覆著一處爾時比丘見已伺彼去後便取衣鉢是比丘若元心不作捨意得取無犯若作絕心即不合取若取亦成賊奪賊物滿五成重也文中言闇者謂隱於身不令賊見非謂夜黑名闇也又賊至告人者第三句也有比丘道行為賊所劫衣鉢時賊順道而去比丘隨後遙望追之不止漸近村落賊便分物比丘語言我出家人只仰他活汝可乞我衣鉢等賊言弊惡沙門我與汝命由是望豈合便覓衣比丘言今近村落汝害我命亦不可得村落中大臣長者並是等眷屬門徒我向彼說汝汝必被損等如此恐怖賊放物去比丘取得不犯賊若嗔責任汝告人我終不懼不還汝物比丘方便語聚落主慰喻得物不犯若告人令煞害等即不可也已上三句並約物主未作捨心奪取無犯如上諸句等者謂前祇律句句皆結鈔意恐繁但對此一時總結上三句也謂直作失想不論奪者決定不決定不得奪此作捨心賊意決定也决取無畏抄主據前比丘盜物明其重罪今此決取畏無亦約屬賊義成縱不失想亦不合取也云毗至重者謂毗柰耶中既言官奪得還取無犯故知官奪義強賊獲心弱以強奪弱比丘却望官為主取即不犯也面不現前盜者准毗奈耶以強奪弱之義則知賊心決徹賊義則強比丘守護心弱奪強則不得也雖知藏處亦不合取比丘為賊所獲等者戒疏云弟子已屬賊是強奪故重也弟子體是正報賊約力用則弱走時強報相逐弱用隨來故不犯也云四至用者十誦等者戒疏云據理成受以物非定屬隨後作主如似世錢可定屬隨人隨處隨用隨定隨損隨結也莫從賊無者恐前人因乞故盜即比丘屬能教也若賊邊置得等者謂從彼買得衣後衣見雖知是己物不直奪應還直不還直奪計錢犯也今或偷三寶物等者謂本若知是佛物還將作佛用僧亦然不得互若冥然一不知即不論也云五至之者祇云時有大臣犯王法財物合入官官遣人守門時難陀尼乞食次到其家婦人語尼言阿梨耶我家犯罪罪應至死財物入官願寄少寶嚴飾之具若我得脫當相雇直我若死者即持相施比丘尼與鉢盛山覆已而出時守門人見已問言鉢中何物而尼不示之又復咄喚畏而示之比丘白佛佛言從此已去不得覆寶物若犯王法人未被收錄寄者得取若已收錄寄者語云世尊制戒不許受之若云施塔得取不得覆藏但顯路將去若有問者當言塔物等若聽將去善不聽者即還准緣中是尼鈔云比丘者僧尼同戒也若官未收望本主若已收望護主云六至取者伽論問曰狂人邊得取衣否答或得不得云何得若比丘不知父母兄弟姉妹等所在因持物施比丘得取此望正主也云何不可取若父母等可知不自手與不可取此望護主也云七至也者見論云法師曰我欲現偷人無罪云何無罪答無主人故無罪也若人兒落度徒各反父母以水灌頂遣去或父母死亡比丘取如是人無罪若負他債比丘將去不犯已上論文玄云准上論意兒不屬國王但屬父母既父母遣或父母死事因無主故今比丘將去不犯又兒先負債今但將人去不將債去注文准此私度類彼偷兒不輸王稅有福無罪故薩遮尼犍云不輸王課非盜攝也外難曰鈔文本明守視義何故說偷人無罪耶答視者明非正主但是守物瞻視之人今偷人者望其父母已遣亦非正主如守視人因偷人故來視義若負債人者但欠其財身不繫彼守視其人知其所在亦名守視盜奴犯重者此為因偷人故來非守視義亦是見論文也彼云若他奴比丘語云汝在此辛苦何不叛去若至彼處必獲安樂奴聞此語初發心欲去吉舉一足蘭二足重若奴已叛催令疾去隨語得重或云此儉彼豐奴即叛去不教不犯或聞豐樂逐比丘便逢難喚追皆不犯唯此但無方便心令伊背主等一切不犯守邏人與衣等者即守視也但呼召別耳彼律云守邏與比丘衣不取受以非正主疑故白佛佛言隨施者處分下文守視人及賊與比丘佉闍尼比丘意言此非彼食不受佛言此即是檀越食聽洗手受不合從乞者謂記知物不屬他今從乞便是教他盜物故不合也云了論至判者盜義極多者戒疏云通情非情攝也俱舍云若比丘約眼耳鼻舌身心因緣於爾所塵起不如法行或犯重輕等云云若人食毒或為虵螫者大德云螫字有二義小者為螫音釋哲音哲謂虵闊開口牙邊有褁子毒水此水霑人肉裏可知大者謂之螫螫音如嶺南多有大虵開口吐毒氣著人便死子曰劉者吐毒氣害人也犯如此罪者謂盜罪也此約十二人判盜謂能盜是眼等六根所盜謂色等六塵之境行與律有違故云不如法行犯如此罪因彼食毒及被虵螫故偷看色等犯上重輕之罪故云犯如此罪也若人偷地水火風等此約六界判罪皆從盜戒收之云解至也者此引真諦疏解也盜六塵者如內六根盜外六塵約為四位一盜色二若誦下盜聲三偷𭊴下盜香味觸四若秘方下盜法有諸仙人者阿嵐那也𮌎行虵者謂一切虵無足皆用𮌎松地而行也毒藥可知或有人為此虵螫或時被毒藥但𦘕作仙人或書心上作一字此字是呪語彼被毒之人若得見者其毒即攝病皆除差但隨仙人立價今偷看得愈不與價直滿五重不滿輕故文云或犯重或犯輕等云云注文秘書疏等不許人傳偷看亦爾此明盜色若誦等者謂有人解誦呪術治病此是秘法欲學須直今比丘竊聽計直犯罪此明盜聲倫𭊴甞觸亦如是知者疏云有師能作藥病人若𭊴便愈比丘偷𭊴計直犯罪此明盜虫或有妙藥甞則差病比丘偷甞計直犯罪此明盜味或有人好藥術觸能差病比丘偷觸計直犯罪此明盜觸秘方要術等者此明心盜法比丘受法就師心緣得差看就他師邊受他法不與直成盜也云次至知者前三所知者地水火也地者謂侵他界分也水者亦約旱時一桶水五錢今不與價或雖非旱時井中有好水堪煎茶等用須者一桶五文今來盜此水即犯火者如冬月房中有炭火伺他不在盜去即隨貴殘處結犯大德云又如太原冬月作市寒甚更有人作糯房暫入中者須直又東都作市處有人賣火炙手今不與直總成犯也云有至直者玄云論疏中但云呪扇行風觸身其病而差比丘偷搖計直犯罪是盜風鈔准律文加藥塗字戒疏云律中有呪扇藥塗比丘搖不與價直明盜風也云若至空者臨他空界等者據此文約屋簷滴水說也大德又云如太原界買地便有六誌上至青天下至黃泉彼人向地中起屋住上著鹹土封之今或有向他上面起閣停客等逐夜計錢下作地室之類豈非盜也云論至用者論云等者謂鈔據上了論本又但云偷地水火風空等今等取於識界也注云盜智用者戒疏云謂識不可言盜以無形質故但可從緣盜智用也云自至說者指略也戒疏廣引真諦疏解今鈔不錄已上諸文總當明盜人物云大至物者非人畜生也云初至也者望護主結者謂今諸庿等是護主今望此主結重也說文曰祭神說詞此人為之故立名也下引五分證上望守護人結夷也如文隨境結之謂無護人望神為正主結蘭故云隨境也下引十誦等證上望正結輕也可知善見取鬼神物者鬼者歸也魂魄歸於冥寞等神者陰陽不測變通自在曰神也及人繫樹物者謂此大樹有神依附多有於此祭祠祀求福所有幡綵等不更將迴又無人守護取此物不犯問雖無人為護主還樹神自為正主何得得輙取耶注云釋文非人亦不護也五錢重蘭四錢輕蘭者此唯據非人正主邊不論多少並犯犯蘭但輕重有異此約無人守護也據理得不如上者謂有護望護結無護望正結若二主俱無即不犯或將如上二字安下句者錯也今鈔於正主內若恐神道窈冥難測得不乃令擲卜而知捨恡也反顯前段注文必正主不恡方聽將去若神護即不合也已上諸文明盜非人物云盜至吉羅者有人斷同大重等者律文云時有伽藍去胡桃園不遠鼠盜此胡桃在藍中積成大聚六群比丘盜心取食心生疑豫佛言波羅夷律文如此有二古師解判不同初云若今比丘盜畜生物同人結重故鼻奈耶云盖師子殘下直五錢重虗等皆重明知不謬也次有師云非望畜生還望本主以鼠盜疑豫未決望人還是本主故就人結也此釋分二段結界罪所歸二以鼠盜下釋望人結所以然者謂六群知是人物又知鼠盜疑豫豫心取食以鼠盜來六群疑豫未決為就人結為就鼠結所以白佛佛言夷者謂六群既知是人物望人猶是本主還約人結犯若發足便作人想或便作鼠想則夷吉自分何須白佛但為有此疑豫所以白也下引十誦文證盜畜生物犯吉多論亦云取一切畜獸殘吉師子殘不犯等已上明盜畜生物竟上來有三初三寶二人物上非畜物三文總是第一緣云二至中者謂雖是有主物若作無主想始終不轉並不犯前後互轉互得輕重者先作有主想後轉作無主想犯前蘭稍輕若先作無主想後轉作有主想犯夷重廣如持犯中者指方軌持犯篇也已上第二緣竟云三至示者然此一門者指盜戒一門也實德之人未免者持戒人也由尚不免此盜故盜由心結者謂但以成盜要由有盜心此心亦不論好惡若心闇教非理損財縱是心好便入盜限不望境是非者如無主物橫作有主想亦犯蘭實有主物逆作無主想却不結犯故知由心不約境是有主無主也僧祇好心者謂知事人見僧事不辨或佛法事不辨即好互取錢物相濟而用但使成辨前務元是好心然且與教相違不免盜攝抄主恐人迷故下解云謂愚痴犯也且佛法二物無所盜白愚其教相痴心謂佛在僧中等故具鈔示者抄下十誦四分云文示之亦是生起下文之意也云十至心者苦切取者謂苦言切勒非理罵辱意在於物相謝也輕慢取者既居尊位特己陵他要不就借輕他直用以他名字者既自無道業得他財但將他名聞向外取物入己也解突取者注文自釋下引四分亦更明之受寄取亦同四分第七寄物取下文自述除出息者謂對面斷當兩情和允依俗收利而非盜攝若減利宜亦成盜也摩得伽強奪者不與強將去軟語者以諂下之心意規他物也施已還取者兩說一云將物與他後悔却奪二云有心施他他雖未得後悔不與住文可知五分諂心者強相親附不𮨇正理隨言順意望他施物故阿毗曇心論云覆藏己性曲順時宜名之為諂也曲心者不隨正理而相黨曲情取物或云一切不直心總名曲也瞋心者下文自釋恐怖者強說妖祥心悕彼利云四至情者此是四分增五文中出此二五前五明心後五明取戒疏云文言盜心取者明心應境也欲明盜者心業必兼兩緣以成一盜故合為十云云生可學迷者三寶互用隨直成重邪心者邪命也解下自解云云曲戾心者曲約不正戾則恨戾恐怯者律云謂不善心今改為恐怯即異諸心所作恐怖令心怯弱得彼物也逼喝者謂口中出聲理威也或說法恐怖者取或說地獄惡報或說王臣勢力而得財也或自懷疑怖者謂自懷疑事疑怖他人捨慳布施說慳受餓鬼貧窮等報自說我疑亦恐不免方便擊動前人得財恒懷規奪者是常有盜心得物止六決定取者戒疏云又變此心為五種取取是其業對境行事如空處盜物是決定取也寄物取者謂因光寄物後便解突全不肯還或言我往時且領得汝一段物以少還他也恐怯取者張舉怒目口云便打恐哧令怖而取彼物也見便便取者謂伺他慢藏陽作陰伏之類因利求利者謂貪心規利為財說法也為彼說法令彼斷惡是利因此悕他財物是求利也倚托取者倚他威勢假托親友而取物也浮華者說事過實也異望者令他別眼看我約或者非法說法也群情者眾人之懷也玄記引經云說法之人心不清淨為他說法得罪深重假煞三千大千世界一一眾生其罪尚輕若身自證法心無疑悔我聽此人高座說法又雖是凡夫而能持戒不貪名利多聞廣識自利利他我聽此人說法反上不可云以至境者謂以十伽五四諸文證明有心成其盜業雖未亘塵沙境據此說其相略明也垣墻者如世間坦墻防於賊盜今依諸教識達盜心足得防擬其心不妄趣境也已上釋第三緣竟云四至物者五錢者即五體也若直五錢等謂餘財帛准錢法也猶似唐律隨有犯者皆約絹佔以從釋犬方定刑名也云薩至是者問意者四分盜五錢成重文甚分明且錢有多解不同未審以何色目錢為定故生此問也答有三解者都有三師義釋取意各殊初云至限者敘第一師解也此准佛在王舍國結戒佛問頻婆娑王國盜幾合死王言盜五錢死佛乃依此制戒比丘盜五結重罪也此是古大銅錢准今八十文也二至為限者敘第二師解也謂論中有八種之錢謂金銀銅鉄竹木鍚獦胡膠等此師意云此八中亦不定指但隨有佛法流行之處用何等錢即以此錢為限亦未必依王舍制戒之時錢也三又至為限者敘第三師解也此師意云無佛制戒五錢成重蓋為取王舍國法瓶沙斷盜之理今但隨國法盜幾得死罪即以為限只如唐國強平呼盜滿釋則是極刑竊盜至五十釋罪方便至死等已上敘三師竟論師以後義應是今師結歸取捨之理也上之三釋十律取初解南山意宗第二師薩婆多論師自許第三解故云後義應是玄記亦云若據彼論三師之中最許後義也有云指第二解為後義謂此鈔依中間釋故云論云論師以後義是此全未見理也問何以得知抄宗承第二師不取初後兩說答戒疏云如多論中盜相通𧮤初解本錢何由可脫准此下取初師後隨國現斷入死言亦汎𧮤准此破第三師若准四分但云五錢錢則八種並同一制即如多論中間一釋隨國川錢准五為限則諍論自息准此尅取第二師義也云然至允者是也是上五錢之義准律互釋不同者律是十誦僧祇論是多論所解取意各異故曰不同也欲釋前句抄文先且難止如四分五錢戒重文已分明然於八種錢中未論色目遂引多論中間一解隨有佛法處用何等錢以此為限何假更引論初後二說并十祇二律之文豈非混雜耶可引抄答云制罪宜通攝從須急謂教文所制盜罪學者宜應通知向下諸部篇中不更解判若但行當部五錢成盜取隨國所用之錢即不通委外部文中斷盜寬急之意也錯判字也若更急從而說不但四五錢乃至草葉之類亦不合盜故云攝護從急上是正義玄云忽有已犯欲判其罪須取通文即依十誦八十小錢若未犯時護持須依急教草葉不許此釋未為雜妙幸請思也今諸師盛行乃至八十文者謂弘表多行十誦彼取論中初解五今古大銅錢當今小錢八十文犯重也隨其盜處所用五錢入重者此是鈔宗承多論第二解也僧祇王無定法斷盜不定者謂關內多依僧祇乃取四錢三角以結重也故祇云佛問沙王治國盜幾至死王言一个罽利沙盤分為四分若盜一分為四分即犯極刑罽利沙盤是梵語此乎九錢既云四分一四正是四錢三角也四分但云錢者謂不言是古大銅錢亦不說云金銀鉄木叉無隨國幾錢得無之斷故歸宗五錢也准此癈上律論者謂癈上十誦多論初後二師及僧祇律等以後義為勝者謂是印定今師盛行隨其盜處所用五錢入重之判是其後勝更有非解不鏐也問十多前後文寬不取一任癈除既云戒律急護為失即僧祇四錢三角更於四分五錢之說鈔何不取可引文答云縱四錢三角善見解之亦同五錢順正云僧祇十九錢為一罽利沙盤分為四分若盜一分即四分是四錢三角也善見論中將二十錢為一迦利沙盤亦分為四分盜一分亦重即一分是五錢也謂罽利加利十九二十雖殊然俱分但五錢與四錢三角少別然祇盜時女持五錢去准此挍量與四分不別也思之善見等者論師二解初師云離堈口得夷若在堈口中猶是其處出口方名離處二師云但舉物離處即犯不要出堈口也法師曰謂論主也戒律從急者取後解為正問此文是第四緣但明重物適引離處義是第六緣莫成雜亂不答抄引此文為證前來宜從是急護顯四分五錢為急不取諸餘律論也又觀五事者一處二時三新四故等取第五輕重也初明觀處者論云比丘有黃衣置肩上行路中遂失便作捨心後有比丘來盜心取取後生悔來問律師周羅周羅遣覔失物主主來至律師所律問云此是汝依不彼云是何處失彼云某處失又問汝失後作捨心不答已作捨心了又問盜物比丘汝何處取彼云其處律師云汝若無盜心一罪不得汝既生盜心犯吉然後語物主比丘汝衣已捨心絕便與此人彼云爾盜比丘聞律師言心懷憙是名觀處也二時者謂此衣有時輕有時重若輕時取輕依輕時斷若重時今引事證論云有一比丘得那子盤常持飲水置海中寺往支帝耶山後有一比丘往海中寺而見子揶殻盜心收取後亦往帝耶山中用此含粥主見問曰汝何處得彼曰我海中寺得物主言此是我物汝何偷之乃捉到僧中請判此事有一阿毗曇師名瞿標多問此比丘何處取答我海寺取又問彼價直多少比丘言彼國噉飲其計餘殻拋棄或然為薪都無所直復問物主此殿直幾答亦堪磨沙迦即一錢論師言若爾不滿五不犯重眾人聞之歎曰善哉法師抄取此文蜜意證前四分五錢為允也新故者謂有物新貴後賤如新鉄鉢害淨後忽麤破隨時手直若比丘偷他物應問主若未用貴已用賤汝等應知是為五處也若據標結並云五事釋中但列於四種何耶養論中無等字鈔文有等字意等取第二觀時之中有輕重則成五也以此文證為允者以此時中滿五磨沙迦犯重文證五錢而為允當也云次以義門等者前明五事尚未周全今引六句義門方為盡理釋中即分六段今都為一科云云一至輕者十誦波離問佛頗有盜三文犯夷不佛言有約貴時說大德云如三國時吳主孫權鑄一大錢當五百文次更大者錢一千蜀主劉備鑄一大錢當一百文周宣帝時鑄永通萬國錢以一當千唐初又鑄開通元寶錢乾封秊中又鑄乾封泉寶錢亦有將常小錢十文換一如此即俱盜一便犯重罪何況盜三云云波離又問頗有盜五錢不犯重佛言有約賤時說百千犯輕如鉛錫泥錢百千時既不用有何所直但犯偷蘭等云云二至價者此約處判輕重也律云時有眾多比丘方便共遣一人取他物彼往取減五錢來至此得五錢彼作是念我等今既獲五錢莫犯夷不疑心白佛佛言依本處犯蘭五分見論意亦同也三至也者謂上三句中皆約貴時盜賤貨望本處得重今若反之則是賤時貨即得輕故云降降下也輕即蘭也四至等者斷心者由本無心只取四錢決罷更不擬取也若無心更擬後取即不在此例五至類者此有二義一約眾多人遣一人往盜五六分二者共往盜五各分雖然一人不得五文入已初往盜時滿五業也亦犯重也盜眾多未分物者此約十方不滿五得輕也六至知者師徒四人盜相者順正記云准彼論文四人之中一人得免三人定犯今且依論說者師教弟子云彼有六錢汝三弟子各取一錢已上是能教不滿五但犯蘭我自取三錢此是自業不滿五亦但犯蘭據理二蘭也徒弟有三人弟子云彼有六文和上取三兩師弟各取一文已上能教滿犯夷了我自取一文是自業不合犯蘭豈非一夷一蘭其第二弟子及最小者亦同上說並得二罪今抄文約師徒四人並犯夷蘭即換教他業滿五以說也思之已上諸文總是釋第四犯緣已竟第五與方便前列緣中即有釋中即除戒疏云如借他物不還打他物破不償此不假方便亦成犯重恐濫涉故所以除之或可縱有方便上俱不明但舉未離處之前並方便攝也云五至處者牒名也云四至重者隨作一事方便即上不成離處罪得蘭也云離處十句分之者道理難明十句方盡釋中十段但作一科今且分十一至重者如律師斷割重物入輕理合得重此亦約他有情所為而不依教若他依教或可心迷不在此例非法用僧物者知事人處分將常住物媒嫁等綱維同判判了結重引見論文證上書未竟即重彼據定地界故二至重者發言為教此言纔立便結犯也准論昌言齊爾許是我地地主生疑為是我地為比丘地此時得蘭若地主決作失想得夷若來問僧答同皆重者地主聞唱云是僧地心生疑未問大眾云咸同情答云是僧地隨僧多少皆結重也違理判與者此明比丘曲判與也違理判得者此明求人約違道理判得此物餘可知云云三至爾者准彼論文若但有二標舉一得蘭舉二得重若有三標舉一標吉二標蘭舉三標重若有眾多標但取最末後兩標舉一蘭舉二重前者隨多少皆吉今鈔舉初二標故云乃至一髮一麥皆重地深無價故直到金輪故深無價也注文者鈔意謂將竹弓手執量也繩彈取他地初一繩置一頭蘭置兩頭夷也四至者也者如文五至故者此約氍氀或是華氈之上謂錢元在樹葉上今盜心移心來樹根上異彼安置色處纔異本色即犯重也或錢元在樹根今移來葉上等准說玄記云若氈褥及錢總是一家者此是同主來犯必須錢自是一主氈等是一主既屬二人是異主方犯也宛陵不許此釋比為明於舉離之義不論同主異主但使有盜心並犯六至羅者是雙陸頭反碁子等謂將象牙齒骨等作故云轉齒樗𮑱者老子卜法今人為戲下引五分比丘不合得吉若於中更欺胃他計直重也七至罪者祇云若比丘盜馬欲往東方去其馬便西北去雖離本處不稱我心未名離處若向東去方名離處若漫心盜隨方即去纔舉四足即是牛等准此八至重者空靜之處既總無人盜無不遂雖未離處動即成重也九至等者謂田宅等不可移動但攻擊有損便結也十至疏者旋風吹衣上虗空中比丘盜心向前捉一一得吉若衣動蘭離本處夷即空離本處是異處也盜鳥者比丘盜孔云云空中欲飛當前立遮孔見比丘不能飛也舒翅而住比丘得吉舉手觸亦吉若標動蘭捉尾牽離頭處夷牽左翅過右翅亦夷若籠中貯鳥兒子比丘盜鳥離竹籠即犯若本無心取籠雖和籠將去未犯牽鳥出籠外犯曲材者謂壁上衣釣龍牙杙是也論云盜壁上曲釣中物離壁離橛重若離壁未離橛蘭又十律云取衣不取架持架去未犯後衣離架時是犯斷流者四分但言若以方便壞池及取水而不明所損分齊若准祇云溉灌流水或一宿直一錢乃至四錢五錢比丘為佛法僧或後盜破陂渠得越入田蘭滿五夷善見云眾共一池水涇田比丘盜心斷他田水令注己田時結蘭若他田苗萎死犯重也水注者祇云若將竹筒就孔中飲滿者重若漸漸飲數止咽咽蘭若器先塞拔塞時越注入器蘭注斷滿者重若注未斷便悔畏重以水倒寫向本器中蘭雖注斷未離處云云未斷注俱蘭等之一字等取蘇油蜜等仍同也廣如戒疏者抄雖不具錄之上之所引並是依疏述也言然至也者心懷優劣者無平等心也倒想未傾者有彼此親疎未傾我倒初果無學者舉初後攝中間二三也餘如文已上諸文六種總是犯緣竟次別開不犯云三至之者已有想者謂實是他物意謂己物無他想故糞掃者實是有主意謂無主作糞掃想暫取想者雖知是他物著用非人暫取無失律中具七法名親厚意者佛告阿難有於七法人若能行是名親友何等為七文中具列一難作能作者為於一事難以作之今便能作是名親友如儒書云昔六國時有羊角哀者燕郡人也與佐伯挑為友聞說楚王賢明二人契約往彼求仕行至梁山路中值天降雪經旬不止粮食乏少去楚千里計不全達伯挑乃併粮與角哀自入枯樹之內藏身忍飢而卒角哀得達仕楚為相乃白楚王如斯之事楚王慜之遣迎伯挑尸靈以九卿之禮葬緣墓近楚將荊軻將軍乃晝夜被他駈遂侘夢以告角哀云羈魂幸蒙禮葬具述荊將軍之事云云角哀睡悟已遍體汗流遂白楚王清兵鳴鼓拔釰往載荊軻但幽冥有隔難明勝負哀遂自刎而死吾於地下以助伯挑等二難與者雷義舉茂才讓於陳重㓨使不聽義遂佯狂不應今也難忍者管仲鮑叔分財是也書云二人同心其利斷金同心之言其臭如蘭也五易知六不捨者荀巨伯看友之病值胡賊入境巨伯不忍去賊至郡已具郡俱空准巨伯獨在觀問所因彼具此答寧可併命不可拋棄賊知賢良却迴軍也不輕者郄超所交皆一時秀美雖寒門後進亦拔而交之故戒疏云情若琴瑟財何有別如古有食必兼人有衣必通被故衣字從二人食字亦爾准此量之者抄結也謂將前七法以驗自心心若如此互用無𠎝必非類不可妄用思之更為迎開可委已上諸文總當明盜戒已竟云第三至戒者標也初制意者戒疏云人趣報勝善因所招形心俱是受道之器出家之人應懷四等慈濟物命今內忿斷彼相續慈慳他損官既深是以制也次釋名梵云沙奴末䟦陀此云煞人此是所防等三四如別釋名緣起戒本制意並具如戒本中云云犯至斷者具犯緣也闕緣義非急不敘云初至之者初緣人者戒疏云立志存育為先故稱為仁律云初識至後識者此與婆沙第二解同也彼論有兩師義初云息風名生斷令不續名煞第二師難曰如墮胎破卵未有息風應不名煞第二師自許云命根名生斷之不續名煞謂以惡心斷他命根乃至一念應生不生此名為煞若爾涅槃經中王問佛何名為煞佛言斷息風名煞答此對俗王約麤相說律文據細以論也注文初識在胎猶自凝滑者謂初識托陰只是疑滑不清淨男女赤白二物相和即是初識所依也乃至命終最後一念等者謂最後執持之識即第八也臨終時一念有愞氣是後識也命終者謂此身報假之維持於一形壽所因本故謂命根是識所依住故如雜心云命者非色非心為體是有情往業之所尅期連持不絕故曰命根今言死者氣已斷絕隨有煙處識居其中即識住處為命根攝然今煞者根非色故何由可識本既無形煞亦不得今隨相說斷其依處命根不續識無所依故云斷命問眾生屬於三世今煞何世答婆沙云應知煞於未來過去已滅現在不住不可言煞但遮未來體不相續故名煞也第二解云或可據體唯是未來若論衰現亦通薀無勢用故問有情五陰虗假成身今未審煞於何陰於彼得罪俱舍云五蘊中唯色蘊可煞有於質礙可加刀杖餘四是心不可言煞第二解曰五蘊總可煞雖四蘊是心不可觸動然心依色轉色蘊既壞四蘊不續喻瓶中窚乳瓶破乳亦不存故知五蘊俱可煞世煞有二種者戒疏云所行煞相相分為二初自煞有八百煞二現身相三口說四身口俱五坑陷六倚撥七與藥八安煞具教他煞中有十一初遣使二往來使三重使四展轉使五求人六教求持刀八教求九遣書十教遣十一遣使歡抄闕第七第八也自煞者謂四分中煞有二種一自二教初若身若伏隨死皆是也或以大聲恐唱令死身口俱者即如世中猒身或投火墜巖等云云二教者合掌唱善或扶接接登山或為辨繩等云云坑陷者知彼行常從此道過故設坑𡩘令他墮內而死也倚撥者謂知其人常倚某處常撥某處而於其處而設機開令後來倚著撥著機開便發因而致死安煞具者如世中行刑法處比丘往著施其繩索令彼死者與藥可知教煞者或可教他死死方便鈔言隨其前使也若教歎者遣人語彼人令語所煞者在轉增過罪不如早死等教遣使者指示所煞在某方而往害也往來使者受語往彼還來此報等重使者本命一往煞恐煞不得尋更重重使人乃至百千彼死之時本末二人得重謂本是能教末是所教中間諸人但得蘭罪謂非能教復非所教不得夷重也展轉使者謂初教張人住煞即張人是所教也張不能自去又遣王人即張是能王人是所如展轉直至多人相望互為能所但前境命斷時百千同重若更細辨隨多人中最初唯能而非所末後一人准所而非能中間亦能亦所也求男子者謂發言造告眾云眾中誰是伏夫解行煞無怖心等教求者謂教人為我求一人解行煞者遣書者自不親對但自作書也教遣書者自不作教前作書煞前境也等者等取七求持刀八教求也並任方便等者戒疏云非謂如上所列而言相盡者更餘方便律雖不載但依而結者皆是故三性之中能教犯重者謂朝來教他往煞前人等自於午時或睡嗔作善等隨住何性但前境命過之時此能教犯重也餘如後篇者指第四持犯通塞自作教人門也不取古記錯指云十至輕重者准律不得傷形明知不得自煞也舒者展於腰脚病人不欲強與按摩致死並是好心固非惡意不犯重也餘亦易知二波羅夷者約比丘說也例同者優婆塞亦得煞盜二罪不云夷畜死蘭者此結人家境夷蘭人死吉者結畜家境差吉隨境輕重者人死夷非人蘭畜生提由本不簡列別云薩至便者為一人讚死者如對王人前口讚歎說勸令早死等此人不解邊人解者謂王人不領當前語旁有張人却解遂用此法死者不犯以於張人無心故如律本重者謂歎譽死快皆重相從牽人者謂如今時有比丘犯王法臨刑之時或有同學小師及主持公務人等是也繪子就此人覔手巾等作煞具與者命斷時重也自煞犯蘭者前方便罪自安布繩刀等命終之時戒謝無犯重義也已上諸文明犯相竟次不犯中俗律云過失煞人以贖論者准格律中有臨空造閣窓格墜地傷煞人命皆為本主不勤撿挍皮繩爛增致使墜地名為過失然非故意不合償命促將財物以贖於命如此論量故云以贖論也即從彼人初死理葬等供給取口之非謂將百千五十貫納官贖命也注文可知已上總是第三戒竟云第至戒者標也初制意者戒疏云然至無為聖道非凡所證由未得故冐假虗談惑亂群心意招利養過中之甚是以制也二釋名者體乖實錄名妄過重不輕曰大業彰在言名語此是所防云云云具至解者列犯緣也如文現身相者謂眾僧並坐有人唱云眾中誰是四果人若是即起彼比丘自知是凡欺誑眾人便即起立意表我是四果也前人信即重疑即蘭甘露初門者謂涅槃初基也一切聖人並皆遊履名云為門故不合妄說也自稱是佛天人師偷蘭者以少人信謂者合是佛出世時故但犯輕若言不淨觀羅漢果等人多信故是以重也餘如疏者如上料簡是依疏文也亦有於此科中及破塔非急不敘不犯如文第二僧殘篇云僧殘篇中者總標也對此或以八門料簡今且敘五門初起由三毒二配於身口三自作教人四以遮性分別五初篇種類五段今初起由三毒者初有七戒因三事起貪染心成次有二戒因嗔而起次有二戒因三事起痴慢心成次有二戒嗔痴而戒二配身口者謂初二局身次二麤二謗四練八戒口為正犯身為助成二房身為正犯口為助業次媒嫁一戒身口正犯三自作教人者分三初有五戒一麤二歎三媒及二房自作定犯教人即不定若作此五有國已即同犯殘若汎若教人於己無閏但蘭次有二戒謂二謗自作教人為己不為己慳境處齊彼我同犯三有六戒一漏二觸自作即犯教他但蘭以無閏已下之四戒即四諫自作正犯教他違諫亦蘭四遮性者媒及二房是遮餘十為性五種類者見論分四初有五戒是愛染氣分即婬之種類二房戒是盜種類污家惡行是煞種類餘之五戒是妄種類已上義門料簡竟次列釋中十三戒不同即分十三段今當第一戒分二初標次釋云故至一者方便動轉標心究竟名之為故體分盈流名失精此是所防云云從此已下鈔有制意即如文自明若文無者亦不引疏恐繁不說以非急要也云此至施者此明制意也初之兩句述先後之意也問曰十三戒僧殘何故此戒最居其首為復據犯戒次第安設為復約三毒種類排之可引抄答云此戒人之憙犯故在初也憙者數也但據比丘頻犯之邊故在初列令正法久住者謂自行虧失豈能維持故使佛法速滅今制此戒自行永潔眾仰迬持故使正法不滅即久住義也止誹謗者世人外道常言沙門作不淨行與俗不異等欲生天龍信敬心者謂若作事雖然私屏天龍善神無所不見今若不作彼則生信四部律中即四五十祇同此呵責也云具至犯者列緣也注文依律明六境一內色者下自釋云謂受色也心能領納名受此色與受相應名為受色即令人身有識持者二外色者下釋云謂不受色即非情色非心心所法領納名不受也三內外色者謂衣是無情身是有情於中作境界也若據五分云內色己身外色他身似有異也風中者乃至口吹等乃至餘境者謂一切萬境皆為犯境故下篇云如漏失戒觸緣斯犯何須境想也云五至也者開夢不犯者既位在下凡未能無夢故律開也此言開者謂不犯殘非無小罪下文列五過失結五吉羅豈非是罪惡夢者夢見煞等謂若持戒攝念即常有善夢如上卷說今不攝念致有惡夢也又夢通三性夢禮佛誦經是善行煞等惡青黃赤白等無記諸天不護者意亂攀緣龍天既知並捨去也心不入法者不能入於覺觀等法等憙出精者精謂精髓遍在身中是持身之寶若無此任持即便枯瘁也律中有七種青黃黑赤白酪酪漿也青者輪王黃者輪王太子黑者王大臣赤者犯女色多白者負重人酪者初果人漿者二果也五分五吉羅者結犯也若爾何不犯殘鈔答以夢故不犯也次不犯中如文第二戒初標云摩至二者標身相捫摸曰摩二境交對曰觸此是所防云多至故者制意也飄然無依止者謂宛陵云如浮萍隨風不定無其所止也比丘之法亦然去住隨緣無所故戀滯著等者今制此戒伴者謂良伴有琢磨之益今戒伴能制禁行人不造諸過問抄今云制此戒作伴為是二百五十戒總為伴唯局此戒答然二百五十戒總是行人伴今言作伴者故智論云俗妻子奴婢人民等是入惡道之伴沙門用戒是趣涅槃之真伴有所依怙者大德云如毛詩中說無父曰無怙無母曰無恃既無父母即無可恃怙今制此戒亦共有𭒅父在世不殊即有依怙也諍竸根本者謂比丘若觸他妻女而令彼夫主父母兄弟聞之不忍必與比丘諍競也疑者猶預不決也為作大惡了為始摩觸等嫌者云沙門釋子合修梵行今觸女人與我何異不可敬重為良田也餘文可知云具至犯者列緣也四身相觸者約二俱無衣說也即簡互有衣蘭俱為衣吉云初至心者四種如婬戒中者一覺女二睡女三新死四少分壞若觸此四境是犯殘除此四外即半壞多壞犯輕也愛污心者戒疏云心本性淨由愛生染今言愛者謂婬欲染污之愛即非淨也云身至吉羅者舉於上下以攝中間俱名身分也相觸有三種者今依戒疏科抄初從比丘往觸無衣覺女乃至並據二俱無衣以言為一種從若互有衣等為二種從若二俱有衣已來為三種也不取古記諸科三種正釋三種也就初段中自分三句初約比丘往觸女二約女來觸比丘三先有染心於前女等且往觸者即第一段中第一句也無睡眠新死少壞者舉四犯境也不問受樂不受樂皆殘者破古解也古云受樂方犯不受樂不犯今云但觸著便犯不論樂不樂也二女來觸比丘者此是第一段中第二句也不必須婬心者謂前女或因送物取與等時觸著比丘並無婬心而比丘要須動身受樂犯殘者故律云女作女想以手捫摸比丘動身婬意染著受於觸樂僧殘也此律文不了者四分中但云女作女想身相觸欲心深著不受樂動身偷蘭二欲心深著受樂不動身偷蘭不言犯僧殘是不了也若爾前來抄言動身受樂犯殘是何律文下句釋云今准十誦言犯僧殘寶云四分中自有義了今但引十誦文釋也若不動身受樂此律吉羅者指十誦文也四分即蘭如上引之若先有染心於前女等者即初段中第三句也謂比丘先於前女生於染心後女來觸比丘者謂後時此女來觸著比丘非謂別有第二女為後女也犯相如鈔自明之如上並據二俱無衣者總結前來三句之文總是第一科竟若互有衣犯蘭者引是前三種中第二段文也或比丘無衣必有衣等不定謂律文但一向言犯蘭不分別開輕重罪體若准今師意亦須分於蘭之輕重所以然者謂身動不動心有樂身不樂只如前文比丘往觸女女來觸比丘尚分動身不動身受樂不受樂此中不可雷同今據上文即此偷蘭體合輕重若不分之亦成未了二俱有衣犯吉者此前三中第三段文也律促通云吉羅據理須分比丘往觸女女來觸比丘動身不動受樂重即重吉輕亦輕吉等例同可解云若至本境者此人律文不了者四分但言觸二形蘭不分男女兩異故不了也下引伽論方為決了謂一身佩於二境觸意既別須分蘭殘也善見髮髮相觸等者此文釋疑故來恐有疑曰投手身髮肉有暢適示細滑髮是身分之餘無其覺觸何故亦結耶四分不分相故論云髮髮相著爪爪相觸悉得偷蘭俱無覺故若互觸理亦僧亦僧殘莫非據染污心而成前犯四句分別者一覺觸不覺殘二不覺觸覺蘭准戒疏文三不覺觸不覺蘭准見論結四覺觸覺殘准此二殘二蘭雖是不覺以是一身分故不同衣鉢雖有染心且非身分故但犯吉也爪齒毛瘡者上二是不覺境瘡是壞相雖觸染樂心徵故輕無肉骨者玄云齒也大德與許此說上文已有了今云二肘二膝頭是無肉骨以上諸境而觸彼女於比丘成其不覺得蘭若比丘身觸他女人髮等即殘為蘭此異引十誦也四分中提手捉髮者謂以覺觸不覺也人女亦爾者亦吉也此是祇文外難曰既是人女理合結殘何言犯吉抄下釋云謂無婬心偶爾觸著等類不能女男俱蘭者此十誦文也不能女者即前女也不能男者即比丘身非謂別為不能男子謂今時比丘觸他能女即殘不能女即蘭若不能男比丘縱觸他能女之身亦但蘭也大德云親曾撿彼律文以彼宗開不能男有比丘用故所以觸得蘭也僧祇意謂男子黃門而是女人觸僧殘者彼云女作黃子想疑觸殘人女作黃門想疑觸亦殘謂祇文性惡罪上不開想疑但從境制定也謂前有方便心後搆本境者南山意也戒疏云聖制有以文少不了豈有智人堅持不觸因事悟觸可結殘耶今須據他先有方便之心擬觸此女舉手之時乃生男子黃門之想及疑若約後心邊說合犯吉羅今但與前方便相當而境人實女所以犯殘也謂律不了今故決之非理南山不知律性戒不開之謂為人不達此文妄非鈔義云善至提者彼云舍利弗問波離相觸得幾罪答五罪如文所列一夷者約比丘尼殘者約比丘也蘭者據互有衣吉者謂二俱有衣指挃他比丘得提是名五罪此觸既通五篇故制以之為伴云不犯至蘭者戲笑大不以婬心也此但開殘相解者見彼為賊繫縛解繩放之或比丘被縛女人為解亦爾非不犯餘罪者上言開者但不犯殘非無吉也若為水溺開比丘捉等者十誦云諸女向阿脂羅阿洗浴河水卒長諸女被溺比丘見不取救女言大德慈悲怜慜何處沙門釋子見為水漂而不救捉諸比丘以此緣白佛佛言聽救諸比丘便捉女忽婬心生還放諸女言莫放待到岸佛言雖婬心生但捉一處莫放不犯到岸後不應更觸等云僧祇至由此者須知後急意者實是死苦即須救是急苦等彼自得脫不至於死亦不得救是緩也過習積增莫不由此者過患染習積貯增長莫不由此女人之境也第三戒云與至三者標名也婬欲鄙惡名分庶今說其相言彰於口曰語此是所防云云云七至解者列緣如文云伽至也者往好麤語偷蘭者謂迦留陀夷立性好作麤語不論染心故犯蘭也有所解了者戒疏云異於觸境彼通死治昏睡孩童此唯覺境又有智慧名為解了云麤至亦同者非梵行者釋麤惡相也說二道好惡以明欲相等未必言聲相有麤惡者謂此言麤語亦未必高聲現相談其猥惡之事方為麤語也不妨涉於善事等者謂口中發言其言開涉善事相麤惡而內心表於穢事即是麤也故律云若復作餘語者正語起麤語律文也餘語謂不妨涉於善事意表於穢號曰餘語如律云因消蘇著赤衣者消蘇是女人之名也著赤衣即別有一女新染衣作赤色此即兩事鈔合標之古記不達將為因消蘇著赤色衣但作一女說者非也文云比丘往白衣家有女人消蘇形露比丘見了乃語女云汝消蘇而前女有智慧解比丘之意遂答云我消蘇比丘嘿然生疑白佛佛言若情不相解但偷蘭必解了僧殘今抄引當部文且顯相領解結根本罪也若不解者謂比丘雖意表於非女人謂言是其善語即鈔引僧祇文也彼云有乞食比丘至家中見一女人著新染衣坐不正形露比丘見了有欲心生乃發言姉妹大赤好准此意亦詺他女根也其女不領解乃答云阿闍梨此衣新染故比丘疑心白佛佛遣一比丘依前而問女亦約舊佛言解義不解味蘭解義味不解義亦蘭義味俱解殘俱不解越毗尼今鈔引此文為顯上不領解也律文總相而說其罪都有四階即知前文引四分情相領當是義味俱解犯殘後文是解味不解義但蘭首云昧者是語屬能詮文義者見理屬所詮旨也此促論染心向女麤語者此四分宗促比丘有染心向女說前女領解即殘不解即蘭也五分具有彼此互向麤語犯者准彼律云比丘問女女問比丘即是彼此互向麤語若比丘問女女解義味比丘殘女向比丘即約比丘隨順出語一語一殘也歎身戒同者謂互歎身易知次不犯中云律中至無犯者九瘡等是不淨可污欲顯此觀行之法要假言述者名為露觀也餘如文四戒云問至四者標也言多坊偽美己之善意專在欲言現清淨逸蕩其情此是所防云云云論至戒前者列緣如文云律至色者戒疏云言好顏色歎其豐味以調前女也云大姓者明種高貴如西國剎利婆羅門最為高貴此土南北二朝四姓等舉斯二歎或亂前女女人性弱貪附此二也云出至前戒者修梵行者舉善法也戒疏云既修梵行不合行非何得素欲答若實行欲素者偷蘭是婬家方便今本不行口言其相妄用婬門用擬通適故犯殘也十二頭陀者謂一衣三衣等云云等者等取六種法也疏云一謂頭陀節撿法二唄匿稱歎法三多聞廣見法四舉說明智法五持律奉行法六坐禪尅道法鈔有第五及第一也餘如鈔不犯如抄五戒云媒至五者標名也戒疏云為彼男女往反相謀以成婚娶故曰媒人此是所防云云云六至犯者列緣也受語往還報者明三時也若據戒疏八緣六受語七往說八還報抄合三為一故但立六也云律至蘭者要三時具者釋第六緣也如鈔自列亦有雖具三緣時不犯謂賊將去等不得和合也若言癩病等此病容有好時向後由得和合亦犯媒餘身分者玄云謂口是餘身分山云曲肘處是餘也五分不許而報偷蘭者謂四分促有賊將去等不言不許故引五分文也不能男者黃門也不能女者二道合也一道者祇云若眾生一道從是處食是處大小便石女者根小也云此至蘭者四分條部中諸比丘白二媒嫁若僧同和一一僧各犯殘若用僧物具並犯重也僧祇求好馬種蘭者問一等畜類餘即犯吉此便犯蘭鏡水大德曰良馬識親疎餘畜無簡別按相馬經曰良馬識親不頻餘群時有母驤泥駒便不識交時忽認是母立地即死更有一類駮馬不別好惡衣冠仕浪不合騎之指腹為媒者問子既未座何得知男女兩異而為媒禮若得知者須是聖人答雖非聖人筭計亦得知也法寶約有宮除大凡女人秊四十九生產即止今若筭者即先下四十九筭子乃除母秊足胎月如母秊二十五即除二十五个筭子若有胎得五月又下五个生筭子然後除之天一除一地二除二三才除三四時除四五行除五六律除六七皇除七八節除八九宮除九剉者看之隻即男雙即女等云云以事猶奢遠故結蘭也自媒者大德曰如今時比丘自罷道入他舍尼眾亦然不更別覓人作媒禮也諸家云是方便蘭今恐是果罪思之云四至偷蘭律中有四種一語二書三指印四現相今鈔所列欠一相也戒疏曰語書二種言中自了指印者以指印知許不許玄云指上文廣橫竪有異若示橫文凶竪文吉便知女家許不許等寶云指環上書得不得字名為相印恐未反初解現相者祇云若見我著弊垢衣持空坐早座說賤語即是不得之相反上即相准此須預情相領當也參互作句皆犯者若計總大數即四萬四千八百句今且依文作六十四句如何配屬謂語書指印現相互作頭每一得十六句故成六十四今具將語為頭作十六句一遍應云自受男家語自持語報女家自持語報男成一自受男家語自持語報女家遣使持語報男成二自受男家語遣使持語報女自持語報男成三自受男家語報女遣使持語報男成四自受男家語自持書報男成五自受男家語自持書報女遣使持書報男成六自受男家語遣使持書報女自持書報男成七自受男家語遣使持報女遣使持書報男成八自受男家語自持指印報女自持指印報男成九自受男家語自持指印報女遣使持指印報男成十自受男家語遣使持指印報女自持指印男十一自受男家語遣使指印報女遣使持指印報男十二自受男家語自持現相報女自持現相報男十三自受男家語自持現相報女遣使持現相報男十四自受男家語遣使持現相報女自持現相報男十五自受男家語遣使持現相報女遣使持現相報男十六語既成十六句餘例可知勸歸婦還者祇云謂婦還本家比丘到舍便勸早還畏夫主瞋不得種和合故結蘭宛陵云此亦是媒之流類云律至不犯婦禮已斷而和合得殘義同新媒也餘如文六戒云無至六者標釋名者戒疏云身獨運造故言無主專任自由不蒙指授名僧不處分越於限分故云過量此是所防云云云具至故者二趣者人謂居士見比丘避之非人者斫彼神樹損他子臂也樹神白佛佛說偈云若人起嗔心譬如車奔逸車去能制之不足以為難人能制嗔心此事最為難樹神聞已乃證初果佛因立制云云云六至犯者列緣如文云薩至用者未後二團泥未竟輕蘭者表事未成未結根本也大德云此之輕重二蘭皆據用第一團泥時結也如將初團泥於屋上正擁時結輕蘭攞了結重蘭何以得知故下句云餘一團在即第二團泥全未曾用必决罷心者同上見論殘也此文亦是防人污情謂恐人云若未後二團泥盡用即結殘我今留最後者顯事未竟應免僧殘文中云決罷心者殘謂既無心將第二團覆之只此初團纔竟隨決心斷處便犯殘也自身受用吉者入結吉以非法房不合入中故犯吉也餘可知云律中至手者戒疏云羯磨所因在于妨難必有作法得罪不成故須先定基後方從乞可信來乞僧為處分不可信者未得處分僧應往看故云一切往也善見等者有二意初辨量知狹不用乞法二四分下正頭如量須乞法彼論謂長六廣四已下無主不須乞處分不犯彼問何以故非房量故既言已下不用明知已上須乞四分廣長正是如量乞法之位減則不須抄引論意取已不須非謂如量不乞今約律准論但使長六廣四已下不須也與後有主房同之過此乞法亦犯過量無不乞處分罪古記不正不敘云然至鉾楯者然者是也是佛搩手諸律論互辨量大小不等中人三搩手者即三尺也一肘半者二尺七寸也上明尺寸不定者牒起前教文辨量何故不同申翻經有南北二國者僧祇五分翻在南朝即江寧也彼多約姬周小尺十誦四分翻在北朝即洛陽也多明大尺即一尺二寸是魏尺三藏生處不同者西國生長來至此方翻經不委此方之大小隨翻經處即用也牟楯者相違之言也韓子云有宋人賣楯於市有買矛者便云此矛極神所擬無不陷也有買楯者便云此楯堅一切無能陷者有人詰之將子矛㓨之楯彼即無對自此相傳促言有違便云矛楯今此尺量互陳不定其義亦爾云今至代者佛在人倍人者謂佛生西土故曰在人是之搩手長於一尺佛長二尺故曰倍人手既倍之身量同手故同爾震旦等者戒疏云無魏撥亂文籍焚除無可依憑但隨時而用故云隨俗不同而用律曆定勘等者謂用周時律曆揩定撿勘至今所用則姬周尺斗為定也姬姓也周國號也周有兩種以姓簡之尺斗為定者尺是姬尺即今小尺也斗是今時小斗也通古共導等者從秦漢魏並不改張昔代南遷斯法亦定故云通古云云故隨煬帝者姓揚名廣隨是朝號謂帝未登位時曾留守隨州後取為國號也煬是諡號崩後表生前之德煬帝愽通經史廣評尺秤故云立尺秤斗也准古立樣者謂七秦時焚毀儒典自後隨處用釋斗等未成揩准煬帝再審評論准古姬周立樣不取諸餘尺寸抄主生在隋朝親見故云余親見之唐朝御宇者唐是朝號謂高祖未登位時曾留守太原地名唐地後受禪位立此號也天地上下曰宇今登位已能制師天下萬物不局大小故云御宇也住世兩用不違古典者謂住世人兩般用尺即今時要依小尺或准大尺俱通行用又唐尺只於姬尺上添二寸故云不違古典斗秤二種例准增加者於姬斗上加二斗成唐斗一斗於姬周小秤上加二兩成一大兩准論以言者謂准多論也以此為率者戒疏云率者音律也轉訓法謂以佛倍人之理定於手之法也當律無文可以用之者四分促云搩手無釋量數今五分既云二釋可以謹依也不達道俗二制者寶去道則一搩手合依五分二釋推其所起極微為先故俱舍云極微微金水兔羊毛牛隟塵蟻虱麥指節此後增七倍等云云俗制則姬周釋斗於此未能曉了隨言即行豈非混亂文軌無二者文謂詩書典籍軌者戒疏云至於分度量次律量衡平藥石分銖祠祭舛合准古如上文軌則無二也五種不同者一唐尺長姬尺二寸二姬周即今小尺三山東尺長唐尺二寸四羅柯尺即路州長山東二寸五南美婭尺二寸雖有五種必以姬周釋秤以定官市量者釋則刻漏分於軌度秤則秤校賢良市則尺用量度返帛秤則憑其斤兩衝者秤上橫木量則舛斗尺寸官市用此三種無事不平此之小斗小釋一南浮部通用非促只是漢地姬周獨有下引鉢量成證故知西國亦用也六尺為步者謂約姬周六尺為一步也忽絲為先者筭經云此度之所起於怱怱者蚕口初出名為忽絲謂忽有忽無忽見不見也十忽為絲十絲為毫十毫為釐十釐為分十分為寸十寸為尺十尺為丈十丈為引十引為疋如是之數以忽為先皆積成姬周尺也關輔者關則關內京師東州早有潼關東北蒲州有蒲津關龍門關也輔則三輔東扶風東西准翊中中京兆等云云云今至尺者五分尺寸者即一搩尺是二尺又於五種尺中是姬周尺率者法也用此為故廣二丈四尺長一丈二尺者正辨縱廣之量也問戒本文云長佛十二搩手廣七搩手即合言長二丈四尺廣一丈四尺抄中何故却云廣二丈四尺與戒文有違答有多釋一玄曰四分長是五分廣五分廣是四分長此全不應理也次准南云西天呼此立長為廣亦半成解今依寶云西國以東為上伽藍門多分面東房舍亦爾豈非東西為長即十二搩手二丈四尺從前步柱至後步柱南北為廣即七搩手一丈四尺從南棟柱至此棟柱即戒文之中長十二廣七正約西土以說今鈔文廣二丈四者據此土以言也謂神州以南為上伽藍房舍多分面南從前步柱至後步柱理合應言長二丈四廣一丈四今順西土呼南北為廣東西為長不更段也若准此說但迴尺量不改廣長斯為定義若將唐尺以計則長二丈廣一丈一尺六寸六分八𨤲弱也明內為言者見論第十三云謂從前後簷下柱當中墨分內外已外有三尺二尺簷下為外不在限也謂取內為明內戶限外為明外此約明闇之明邊壁高一丈二尺者玄曰鈔依二尺為搩手計之若據僧祇二丈四尺四寸為搩手但高一丈謂所用一尺當二尺也云若至主者如文云難至處者王誌護處者玄云如今國家苑園陵處是也不通十二桄梯者謂梯有十二桄桄間相去拳一肘肘有尺八通計十二桄有二丈一尺六寸若四周不通此梯橫朱往返草車迴轉是妨處也下引十誦一尋意明若無寬處許取他部四分無文故多論云妨處者是舍四邊一尋內有塔地乃至深沆等作處分法皆不成律中互有尚乃不成何況俱有若初處分時無已後忽有妨難而全前法不失云明了至亦犯者樹空者戒疏云謂大樹中空堪作住處山岸石陰者謂岸下有窟亦堪作住處山林向下免曰免兩名為石陰堪作住處必須隔斷者若依此山岸窟等處住其中若寬闊斷理費功故須隔作齊限又須僧羯羯處分聽許若過量及不先治地亦得尼薩耆罪若不依量用功多癈道業故故知僧私二地並須乞作者破古師也古云僧地恐妨僧受用故須乞云必私己地何用乞法今云然僧私二地總須乞也下引祇文廣明相狀鈔有三意初無人羯磨口處分法二雖能羯磨住處稍遠既有此緣但得差人往處分三有四種下明依法不成就前二段如文分別第三段中越秊者謂去秊乞法今秊始造此人難定及與懈怠不應與他指授二異界者謂既是外界僧不知此界妨難等事三作私房多者若僧中一人不作房乃至二三人不作餘並作房亦不名指授謂作房既多惱亂二趣故不聽也若妨難處是難處住人不名指授謂自住妨難自慳於他不能令他無慳故不聽也即此律云可信者看明知如上之人既非可信之者並不合處分也薩婆多等者問云此處分為與人相應與處相應答與處相應故論云處分地得作餘處不得若爾既與處相應餘人就上作房何以不許答乞處分時稱此人名不稱彼人別有所屬是以餘人就上作房不得若房主聽即任謂就他房上作非是地故也次引見論長中減廣中長互減過皆僧殘者抄舉論二句總犯故曰皆殘戒疏云然此互過是兩口房廣長俱過是一口房俱一業結一殘也玄曰律有九句不同今對衣戒三三分之初三句者一長中過廣中過房殘衣提二長中過廣中如房殘衣提三長中過廣中減房殘衣不犯次三句者一長中如廣中過房殘衣提二長中如廣中如房不犯衣犯提三長中如廣中減房衣二俱不犯後三句者一長中減廣中過房殘衣不犯二長中減廣中如二俱無犯三長中減廣中減二俱不犯又來明衣不犯者律文且據不犯提若依論文非無吉羅知之若作未成行容成者謂一人自作有過量義今行容為成者即二人共作人無一口房分但有半口房分以小故不犯若段段計人分滿亦犯者其房既大雖多人共造計人多少人人本分之外猶有長者人人犯殘也云問至罪者問意曰長衣俱過方犯房即互過亦犯何以不同若據衣俱如亦犯今抄具舉俱過以難也答意云房是自造惱亂處深故互過亦犯衣體非自造但由貪畜過相稍輕要須俱過方犯也若爾房既互過亦犯衣何俱如亦犯答房是過平呼中制互過即結衣是滿中制所以俱如亦犯受教過量犯者玄云是律最後四句中第二教人一句也其四句非急不錄問何故但言犯不定罪之名字者何相疏云為欲一言通結二罪故直言犯是以下句云若房主得殘污師得蘭若定言犯殘即不攝污師蘭也若定言犯蘭又不收房主之殘也今但云犯字即臨時制宜蘭殘不定若房主是作房之正主自過量犯殘並房主絣量尺量如法受教者不依而過量者即受教者犯蘭也又須知巧師受教者若是共他造房而過量亦須犯殘為於己有國亦是主故若巧師自無房分但為他造作過量者但犯蘭以非是主即無國己也所言巧師者即僧中有人會於巧作能造房舍號曰巧師即有斯犯若俗人工匠之類即不在此論量不同淮南云是俗人曾受五八戒者犯蘭此即全成愚教也妨離二處等者若准律文有三四一十二句此是最初具足一句餘十一句並是少降也律曰若不被僧處分過量有難有妨二僧殘二突吉羅其第二句上則准前但於妨難中互減有難無妨第三句有妨無難此二並二殘一吉下三三句妨難互滅及俱如前唯僧不處分不過量互減第二三句僧不處分不過量作頭將妨難俱互有無僧三句第三三句僧處分過量依頭得三句第四三句僧處分不過量作頭亦爾今鈔但舉初三句中一具足句攝下諸互句並盡云律至者者別明不犯如文云有至七者初釋名有主為造專住自由妨難二處不乞處此是所防戒是能治云云戒疏問既有主為造何須斫樹答取下地擬施基也餘如前云制意同前者與無主房不異也云成至犯者長六廣四已上房者反顯已下不犯云此至之者玄云此並多論文也僧不許賣房僧得罪者謂房是自己眾僧報彼不許賣即眾僧總得吉也有人云房僧得罪謂得賣此之罪者此不成解兼有破句之失云律至罪者正約得罪輕重也律云僧不指授有難妨一殘二吉有難無妨無難有妨皆一吉僧不處分無難妨但一殘云開至得者別明不犯也注文謂無過量者釋疑故來前戒制其過量容身屋小故不犯此戒本來不制量何用論其大小答雖無過量若長六廣四即須乞法此明小故不用乞法不犯故也言無至八者初釋名戒疏云內無三實故曰無根重事加𧭗名之為謗此是所防戒是能治云云餘如別述云多至故者為護自行令法久住者玄云謗他自犯僧殘即壞自行以壞行故不能秉法今若不謗反上二義也云問至疏者問意云夫言謗者莫非虗妄若既不虗即不名謗今末委謗他之時為但有謗罪為更有妄語之罪答中引見論云無別提罪謂但有謗罪更別無妄語提也以妄假虗成如者智論云旃遮婆羅門女繫木盆作腹謗佛佛共我通故使有娠佛言我有十力四無畏豈有此事舍利弗以神力化為鼠齒繩斷盆墜地等以此明之故知謗假虗成也今以義通者今師以義意釋通也若無意專謗者謂假虗而成貴在毀謗前境別無餘心但有一罪若兼僧者謂標心有此二意故結二罪望前謗境上得殘望誑僧邊結墮如煞父羅漢妄語兩舌互說者此舉例釋成二罪也法寶云謂於父作羅漢想煞結二逆罪論云昔有國王秊老將位付與太子入山修行證得羅漢果太子登位之後不行正化𮒒臣入山請父王歸諫太子太子知已令人逆路煞王王被煞時告云汝向太子說煞若得二罪以斷息養及福田故若細論之都有三罪作人想邊犯夷恩養得逆蘭壞福田又得逆若但作人想不知是羅漢但得夷知是父不知得果但得一逆已上依十誦正文今且隱人想正重之罪故云二罪大德對此引戒疏四句一是息養是福田謂父出家得果煞得二逆一夷二是恩養非福田但煞父非證果者得一逆一重三是福田非恩養但煞羅漢不是父得二罪一逆一夷四非恩養非福田即汎爾常人但得夷罪也妄語兩舌者謂本擬分離意所以望語得二罪若但有意誑他無分離心但有一罪廣如小妄語戒述今引上二事通證前文得殘提二罪也餘如疏者彼有安重問答與抄大途不異故略不出也云具至犯者一是大比丘及尼者問何故謗尼同僧犯殘打尼但吉答戒疏云打據位卑謗約行修故結不定也除下三眾者疏云謗惱情微不癈修行又所犯名輕結謗非重故但吉也二想心謂淨者破古也古曰謗淨境方犯今云夫論眾法准取見聞但作淨想謗之皆犯故抄云不妨實不淨故律云彼人不清淨不見彼犯謗故成殘戒疏自難曰若於不淨境作淨想謗得殘者若迷非人作人想煞應得夷否答謗就心虗為義煞就心境俱實故不結夷如打破戒犯墮者引何成也故文云等遮揵度文也遮是舉義無根謂無三根無餘謂是四重作是曾犯雖實且無三根則不成舉所舉既虗故治謗也二作大比丘想者大德云此是今師重列第二緣也所以重列者謂前古人立緣不了故更明之但作大比丘想即成謗罪不論淨與不淨若作下三眾想即犯吉也三內有嗔心者志恨之心也四無三根者一見根謂自見從他見二聞有自聞從他聞三疑有見後疑聞後准律六心句有七章初實不清淨無三根次三根往謗有六句者一彼人不清淨無三根以三根往謗無想不忘心二彼心不清淨無三根曾生三根想後望此想心言我見聞有想忘想心三彼人不清淨無三根曾起疑心後言我實見聞疑有疑不忘心四彼人不清淨無三根曾起疑心後言我實見聞疑有疑忘疑心五彼人不清淨無三根亦無三根亦無疑心後忘此無疑便言我實見聞疑無疑忘疑心第二無見根以聞疑往謗第三無聞根以見疑二根往謗第四無疑根以見聞二根往謗第五無見聞根二但以疑根往謗第六無聞疑根但以見根往謗第七無見根但以聞根往謗皆有六句如上來明此成四十二句若實清淨無三根以三根往謗亦四十二句翻上明之云云五下至對一比丘說者此據四分謗他時須對境或多人乃至最一人下引祇文即彼律約能謗對所謗者隨語結犯即須對面謗也六七八緣可知言善至之者心懦者乃臥反又奴亂並訓弱也餘如文云律至同者明不犯相也一真實者謂前人實犯罪人見他作此煞盜等二相實者謂前人雖實不犯我心謂彼實犯不是虗謗此據正說時有想耳實於前人作犯罪想若違此相便成謗也三事實煞王還道煞王者謂見彼煞王人今亦云煞王人即事實若云煞張即成謗又十誦云煞父云母亦殘也四三根不互實者見聞言見等不互名實若見言聞等成互即虗也餘如文云假至九者戒疏云此戒與前名因種別此戒假異事上有見根相即此見根將以加謗故成假根此是所防云此至二者戒此分折不同之相也問沓婆羅漢何因緣故而被此謗答准多論云昔有陀驃毗召反比丘過去迦葉佛時作知食人時有一練若比丘是阿羅漢形容端正路而行時有女人見生染愛隨觀不捨時知食人見已謂此比丘先與彼女有通遂生譏毀為謗賢聖墮地獄中罪畢得出由本善業值佛得道殘業力故受此謗言准此量之即為大誡云犯緣同上者同無根謗戒八緣臨時改轉不更列也云律至似者異趣者人畜兩列也異罪者六聚不同也異人者有同名姓等彼人犯罪彼人犯罪以謗此人異時者在家時犯便云他出家後犯或去手犯乃至云今手等假嚮者謂於山谷之中高聲自語叫嚮謂言彼亦有人如此說等異分者鈔引論文自釋可知云餘相可知者開不犯緣異同前戒云破至十者釋名者邪法改真分眾異軌稱為破僧故固執不捨破故名違諫云云俱舍問云破僧是虗誑語何故名破僧答有兩師解初云因受果名誑語是因破僧是果因誑語故僧方破也二云此云誑語能破僧故從用彰名云此至耳者此違諫等戒者此字屬正破僧戒等取助破污家惡性三也逮于下篇者逮及也于於也下篇謂單提中一不受屏諫二利吒違屏諫三輕人受訓導戒或事希法隱者如注中謗僧拒僧等事希少也所以然者且如今時有惡比丘口去欲不障道緣無有僧如律諫勸既無設諫拒謗之事何生拒謗既無結謗之法不顯故云希隱也當世寡用者謂末代中比丘作惡雖多若於治罸都無故云寡也或但終不辨果者謂此破之事當今無佛競化令僧眾不和乃是其因既無破僧之事則闕違諫之殘故不辨果局佛在世滅後無者注文自指也因言今時無破法輪僧便以五門分別一辨破僧體二能破戒時處三具緣四破二僧差別五今時無破法輪僧初中俱舍云僧破體是不和合於和合上非得為體若僧未破眾共和合許有聖道得入僧既已破名不和合非得為體四心中行心攝三性無覆無記性收難曰既是無記豈成無間答論云如是破僧因誑語生誑是無間故既破僧是無間果非無間體因受果名故說無間名破僧也又此破僧無記非能破者成唯是所破僧眾所成故上八體竟二能破成時處者謂能破僧提婆達多成破僧罪誑語為性此必墮無間大地獄中一劫受苦餘廣如論述三具緣破僧者頌云苾蒭見淨行破異處愚夫忍異師道時名破不經宿言苾蒭者要大苾蒭方能破僧必非在家及苾蒭尼等見淨行者淨謂見人非犯戒愛行者謂持戒非破戒無威儀破異處者要在異處非對佛也以如來言詞威肅對必不能故異處即象頭山中調達在彼破僧即鷲峯北可三四里愚夫者兩釋一云初證法性故二云得忍亦不可破准此前解據得聖名愚夫修說未得西忍名愚夫頌曰愚夫含斯二義忍異師導者忍之謂信信師異佛信異佛說於此時中名破法輪提婆達多作如是言我是大師非沙門喬答摩我所說五法是道非喬答摩所說八支是道愚夫苾蒭三聞達多等諦信提婆多是我大師五法是出離道正起此信即破法輪五法如抄列緣中明四破二僧差別者頌云瞻部州九等方破法輪僧唯破羯磨僧通三州八等言瞻部州者簡餘處所也唯此有佛故九等者九是九人謂八苾蒭分為二眾所破四為正義四是邪眾能破第九故極少猶須九人多即無數也通三州八者謂破羯通在三州有聖法故極少八人多亦無限謂一界中僧分二部作羯磨也第五明今時無破法輪僧頌曰初後皰雙前佛滅未結界於如是六位無破法輪僧言初者謂佛轉法未久後者臨般槃時此二時中僧一味故不可說破皰雙前者皰謂瘡皰於正戒上生邪戒正見上生邪見名為皰也皰未起時名前要二皰生方破五法是邪戒謗八支聖道是邪見雙前者目連及舍利弗雙賢弟子也目連神通第一舍利弗智慧第一未有神智弟子前也雙前也佛滅未結界者佛滅後無真大師可歒對故未結界者無一界中僧分二故上來五段不同總當義門料簡竟如此眾戒已下結略意也污家殯謗者謂因污家僧遂殯出聚落既遭駈殯乃反謗僧僧因設諫諫而不受故結僧殘今既不行義同於癈也不妨惡行行寔網生者謂雖癈諫謗污家惡行然今時多有不可略而不論故云不妨也今既惡雖無設諫所行之羅其教網而生於罪故今須明也或辨相者顯下戒中污家惡行之犯相也事通行者此污家惡行之事通今時人共行下戒述之命其識相行護故或開緣乃當時要者律開通文中開為三寶種華或為檀越開持書往我壞妊獄囚病人父母等與食不犯豈非當今時中要也以神補神用者謂鴻裨補益新學之人神恩行用也云就至犯者理非可犯者謂大師晦跡競化開緣既無此事故就道理不可有犯也問今既是無即同於癈合刪除不用何故下文又列具緣明於犯相可引抄答云必須具列庶新學知其教相庶由望也其意可知一先意邪三寶者戒疏去諫不虗設必有所為是以第一立邪三寶作破僧事邪三寶者調達自稱為佛替正佛處寶說五邪法替四依八正處五邪法者一盡形乞食二盡形著糞掃衣三盡形露地坐四盡形不食蘇鹽五盡形不食魚肉前三相似法似佛四依後二妄語彼云蘇鹽味重魚肉損生佛寶不斷假言斷也三聞達多等四替身子目連等僧寶處二行化於時者戒疏云邪三雖立若不行化無容設諫以如來法輪化被三千說通道俗是以調達唱五法是說四依非與佛競化乃至地神唱告能令三千大千世界法輪不轉禪誦不行天地翻覆於其中間無悟道者三如法僧設諫者戒疏云化而不諫不成無罪故須第三如法設諫四固執不捨者雖僧設諫聞諫順從亦無其咎是以須立第四不捨五三羯磨竟犯者雖執不捨未竟未犯要三法竟方結根本也云違至疏者違僧諫果罪也蘭者是破法輪僧果蘭也所以破僧是果蘭者謂調達本心規奪佛位壞僧斷法今既破得僧徒歸從所規事畢思心得暢是究竟也違人諫者戒疏云若於屏諫不問僧尼具不具位道俗多少通制成諫僧用自四屏用餘言種種方便得止便罷鈔言殘蘭提者皆據果論若兼其因即有多罪云云如別廣如戒本疏者彼云納僧屏二諫有其十門明因果不同復有十門繁而不錄云律至不犯者別開不犯也作無住處者駈遣出寺不與此住也餘文易知云助破至十一者釋名戒疏云僧眾作法諫主之時四伴影嚮助成破僧僧尋設諫拒而不受此是所防云云云具至便結者一明有人等即提婆達多也三四伴助破者一名三聞達多二名騫荼達婆三名俱婆離四名迦留羅鞮當愛反舍餘可知云污至十二者釋名者坌淨信心名為污家舉過顯眾目之為殯無罪橫加稱謗以理喻彼不受名違僧諫此是所防云云云具至犯者非理謗僧者戒疏云由僧治殯迹涉愛增以有不平致彼言謗即如戒文云今僧有愛恚痴等是謂六人同犯其三聞達多摩醯沙達多走入王宮聚落身不現前不得治殯相同有怖迦留陀夷闡陀二人逆路改過無罪可治相同有愛阿濕卑富那婆䠨二人現在不走又不悔過僧乃殯之相同有恚今反前意依法治之何痴之有餘文易知云污至也者污家非戒者謂犯污家但犯吉非犯此戒本緣謗僧是者此戒由本因謗僧僧因諫喻彼不受諫三法竟時犯也云四至也者所得之處聞之不憙者失他前人深厚福田也所與之處思當報恩者破其前人平等心也二緣俱污餘文可知云行至笑者溉古礙反今但作記音半繞也灌倡伎者說文云作樂也排說者行主權排向前說事取笑也云僧祇至家望故餘如文云若至見者謂者如文云多至身者無為無欲者由作也欲者悕望也今即無所造作及悕望故餘如文云若至息者謂約一向能損減不能益即是不信之流故開與之遺免難也云律至無犯者別開污家惡行不犯之緣如文云惡性至十三者釋名者嗔恨忿戾名為惡性眾同和喻觝突僧命名為拒僧違諫此是所防云具至犯者不受諫自恃陵他者多論云闡陀不受諸比丘教語諸比丘言汝不應教我我應教汝何以故佛是我家佛故我與佛入山修道不見諸長老一人侍從佛得道已而轉法輪是故法亦是家法問不言我家僧答本與僧鬪諍故不言我家僧上闡陀者車匿是也本是佛家使人也云此至之者正釋令諫之意無執略教云多至違者此是多論自指七佛略教經文即指十誦惡性拒僧戒文故兩含也云答至同者謂其根機時宜而制戒戒略數云但自觀身行律令展轉相教二文雖別言乖意則俱令離惡趣向五分法身故云趣合也六種不同者舉數如下自解云一至等者此之六段上半雖不受下半須受出言無補者此補字訓益也為現法樂者通相而言為得聖道名現法樂列相說者四根本定名現法樂能諫之人為此法樂但欲自攝如經文也餘上下文易知云律至不犯者汝和尚闍梨亦爾者此約無智人呵云汝莫坐禪誦經應為僧家鋤示雜作之類即可反語彼云語和尚等亦坐禪誦經何不語令為僧雜使等若其事實爾者大德曰此中爾字訓是也自己所作之事實是不違教文前人謬諫於我不受無犯或錯說違諫之語一切不犯二不定云二至故者二不定中者都標也文疏文列在戒本解者謂自古文疏不同久列在戒疏解今略不說略述大意者生下文且明具緣成犯之意抄雖不明今以三門分別初來意二釋名出體三僧尼有無初來意者所以置二篇下三篇上者若就通論五篇治行有防非之功悉名為戒故云文最初犯戒又云與諸比丘結戒等若據身口進止各有法式名曰威儀故文云最初犯又云非威儀等若就別判前二所防過麤能治稱戒下三犯細能治滅威儀今以犯相難知生疑似若犯初篇理宜永棄二篇次死須用僧治若壞威儀坌僧是濫故須撿問須清行業開答差互事須治罸若置在初犯法未顯依何等法以辨疑似若向後列殊乖勢分於二篇下三篇上有此二不定來二釋名辨體者先釋名古立屏三露二為不定體今云不然三二罪體名種各別如何束之以為一戒今師云房室私禮俗所常行比丘無侶獨一女人同處麤語於三罪中令他疑恠犯相難明故使生疑責其情過吉羅為體三僧尼有無者所以尼無二不定者今師云由比丘與女生譏處坐大主不信或時駈出為患處深故制僧有尼尼雖與男子獨坐生譏且夫無屬婦之義過微不結也多論等者明制意也玄對此問云諸戒多先列緣後方制意此何故先制意後列緣耶大德云此是製記家意悞也前諸戒皆是先制意後列緣未曾有具緣後制意也今應問云前後諸戒皆先列戒名後方制意今此何故未標初不定戒名便申制意答若向初戒下明制意但今於通標中明雙收二戒皆盡所以與諸戒有異亦收一戒是制作稍異意也思之云初不定中者釋名如前也云四至犯者列緣如文云四分至篇者如文云後至異者第二戒可知
