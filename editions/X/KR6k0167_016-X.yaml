body:
  text: 吳越國長講律臨壇賜紫清凉大師景霄纂下卷平批通號如前已述列卷首分篇目約共行以通收謂僧別共行故云共行也又十四篇目皆今在此卷目首列之雖後人開誠四軸之子科節不可籍改三牒篇科云二衣至十七者先來意謂中卷已明自行雖成理合靜緣進修道業以若依之質要籍資持資要之先勿過衣服故於自行四篇篇後共行十四篇初廣辨外資故先頒列也向衣食二種俱是資緣何故先說二衣後明四藥篇醜形外露衣則常須食是內資復有時節故約稀數之邊安布前後也釋名者制聽為二障蔽名衣制聽乃是總名三衣六物只因百一長財俗施已人物等一一不同故名為別篇者章品之住號十七者增數之詞故首題云二衣云云第二內資四藥篇文分為二初牒名二釋初云四至十八此來意者玄云夫道假身修身藉緣立醜形須障先辨二衣段食無飲後明四藥故次辨也釋名者時等體殊名四療病除災名藥手承心領四受離過除𠎝曰淨軌模楷式稱法篇如常解云云依之釋中開科云云總意中云報至受者辨總意也有人云初兩句是總意從藥名乃通下是釋四藥之名也報謂是報即酬往因因有善惡果亦差別亦名異熟即因與果別異時而熟故因通善惡果唯無記命者命根壽𤏙識三為體此報與命由昔因成能招今果欲令住世須假支濟任持長養根種接氣充虗故勿過藥也有人云支持有取身上曰支恐不然也藥名乃通者凡療患之功總名為藥故云通也約時限不同故云要分為四從且至中者鈔准多論許也事順法應者俗人作食時求乞易得不生譏慳名事順中前而食應三世佛處中之法依教聽服名法應也非時等者謂午後其明漸劣名曰非時甘蔗等八釋午後許服名時外未過明相名為限分也七日約能就法者准成論服之七日堅病得消今約此藥消病之功能就其教法受服開至七日以為分限用療諸疾利益深故盡壽藥等者皆是苦澁之物若比前三此力稍微久服方能除患形有三種下釋盡形之名明了論下證盡形義也如文開章中云就之別者可知初中下列章也一就四藥明者牒也此就時辨四藥釋中云時至是者有二者只不正也初正食如文中列之戒疏云此之五種名食一口是足是正是皆是別也五種佉闍者此不正食也亦如文列戒疏云反上非足非正非皆別也僧祇蘿菁根者寶云北地種即有根狀如胡羅蔔根江浙種之唯長苗無根但名菘菜舉例如江將淮薑芋向北地種亦但有菜無根也粉汁者此謂舂粉了多著水𣷽北地大官飯後多飲之今比丘中後不合也云諸至說者破魚肉之非也癈前教者律在前涅槃經在後經是能癈在後律是所癈在前故云癈前也觀察如子肉想者經說譬如夫妻二人共携一子同行曠野險難粮盡煞子而食垂淚而噉不得滋味比丘如爾斷大慈種者遠疏云地上為慈據漸滿說地前為種約種性論直至佛果方得名大今并初發心救度眾生求於佛果若食肉者如此地位並皆絕分故向前諸律文皆許食肉縱依初緣已曾食竟莫非有罪否抄引經科云前全食肉謂非四生但現化耳謂不是胎卵濕化之實報四生但是菩薩慈悲接機化現為度凡小眾生故經云為度眾生而現食肉雖現食之其實不食等楞伽經等者彼第八有遮不食肉品略述十事常為六親者父母兄弟姉妹眷屬輪迴六道展轉互生不相記故今觀食肉皆是親眷但作親想自煞不食也不淨氣分生者父每赤白不淨和合而生凡愚所習等者反顯三乘有智之人不食也醒羶即臰穢奪命而得即非善名見形起識者由受食肉故見獐虎猪鷄等形便起識心擬屠煞也諸天所棄多惡夢者天龍不護惡鬼所嬈故反顯持戒不食肉人常得善夢虎狼聞香者身有肉氣多為虎狼飡斑足王經說者諸記之中多引賢愚經說彼云昔波羅奈國王名摩羅達目猶遊獵至山憩自時有一牸師子欲心近王遂乃有通生子人形足斑其師子送上王王知已收養名為斑足後紹王位此王常供養一仙人日日食時飛來王宮後因有患斷食不來有一天祀神詐作仙人來覔肉食語厨者言自後日日須如此後本仙人未還將肉與食仙人云何故相輕王言昨日食肉今又不食何得虗誑無有實錄仙人云吾昨有患不來誰就汝謂肉仙人呪云令汝於後十二年中常噉人肉言訖乃去永不來也於後厨人辨饌闕肉求得自死小兒以死王食王覺味殊乃向厨者彼不敢諱具述前緣王因勅云每日常須此肉後煞害漸多國人怨恨眾欲煞王王立誓曰不由修善今得為王所有供養仙人功德迴令今日變作非行羅剎言說而變由此十二年中常食人肉緣起甚廣今略引云云為證前來食肉之失也云今至遠者凡愚多嗜示音輕呼諸肉者反顯聖人有智終不食也此戒約之意僧祇云引證也與中國大乘僧同者玄云欲出此方學大乘語人喫酒肉之過非謂中國學小乘人猶食魚肉之類用酒肉為行解者云不是大乘人不食酒肉內無分別無執礙是大乘行既未達性空口中所談是學大乘之語撿其行解大不收以未喫證故小不攝以違戒故二途既不收之則入屠兒行內也閻羅將更者如午頭夜叉等常食肉血前煑大罪人今此輩亦爾四分下准律見聞疑為我煞不應食謂此人長作十惡業此家有肉不得食若持十善彼必不為我斷眾生命有肉應食大祀處者如國家拜郊大禮此辨於肉意雖不專為我一人今既屠煞亦普為一切食肉之者若食自亦是他所為之一數故不許也依教無肉可食者謂依上律教無聞疑三種淨肉方許食者此肉既希即漸漸制斷故云正斷食肉也毗尼母大同者彼云若人欲祀天時作意其有來者應與食無分別心所煞眾生待一切來者比丘若知如此肉不應食也鳥殘獲罪者謂律通明一切鳥獸殘取得吉以不斷後望故唯師子殘得取無犯以斷望也准此須是親自見死方得食之以決定知不是鳥獸殘故若收得殘者猶未免疑知是何獸殘也楞伽經者謂五辛之類尚不許甞之豈況進噉亦是舉緩以況急俗中已下舉俗況以道酤市晡不食者書曰酤酒市晡不祭先祖以不專心為先靈故又恐於身有患故俗護色身尚然豈況出家之人法身慧命不可不護以食肉之比丘情壞足可見也二途者若不附口美則貪飡驗知非消治病去無漏道全遠也云非至提者辨非時藥體也除四分外見引五本教文不卓破者說文云卓謂高也艮煑麥時兩頭起延㒵反不得令破況有時食氣故石蜜者西土甘蔗汁搗米着中合成黑色狀砂糖今此方五有作者如越地進貢等十四種漿者僧祇等三云一菴婆羅二狗梨三安石榴四顛多梨五桃六婆樓沙七撻楗籌八芭蕉九𦋺伽提十劫頗羅十一婆籠準十二甘蔗十三呵梨陀十四呿波梨漿蒲陶不以大淨者不壞種也汁不以水淨者不壞味也互不淨者但火淨不水淨但水不火淨並不許服先火淨後水淨故云但淨得飲准此通四藥者業疏云文雖在漿義通四藥如衣須揲為壞色故草履令淨人著為壞好故食須水淨為壞味故同之變苦酒不得飲食者謂無記識其體既變失本受法酒雨已成者此是時俗方言不同此人呼味為兩若甞酒有氣味即言有酒雨今上既體變失受若服便飲酒故不合也粆米令燋黑者董白猶是時藥收故𮒂菓者北地多有狀似櫻珠其色帶赤黑甚甘美也次引四分證開眼昔有人欲禮覲佛自作念云不可空往今有八種漿是古昔死欲仙人所飲可持上佛佛得已為說法又將施僧僧不敢受佛聽受若能醉人良不許飲鈔闕閻浮及婆樓伽二種以此土無故餘如文中伽論下總明上來諸漿須澄清不雜時食也云七至飲者辨七日藥體也當藥者准律藥法中云佛在舍衛國諸比丘秋月得病顏色燋悴佛言我今當聽諸比丘食何等藥遂作念云有五種藥是世間用者是人皆識所謂蘇油生蘇蜜石蜜令諸比丘服之當食當藥如食飯乾飯不令麤現已上律文玄云有資益義故當食也有療患之切故當藥也不得滿鉢而飡故云如食等少少而喫故云不令麤現伽論糖漿者此是甘蔗糖也未捨自性受法既失故不許服必未失體性即許服也僧祇加脂一種者謂祇七日藥中許服脂一種也四分等者准舍利弗患風醫教服五種脂如文所列諸比丘不噉遂白佛佛聽聽之故文云時受時漉時煑如油法服若非時受非時漉非時煑不應服若服如法治謂肉是時食非時受不成故古師見律非時受不成非時漉煑得罪便言脂一種是時藥收不開七日服今引祇正文七日藥中加脂一種也僧祇此藥已下觀文勢似證前七日藥也四百四病者經云一大不調百一病惱四大成身故有四百四病雜病者三病相兼也用上三藥治者謂將上來三藥相雜治之佛言作法應爾者彼云那律見作石蜜搗米著中生疑不敢作七日藥服佛言作法如此食之無犯也和水飲者准彼文云憍薩羅國無處水白衣施水并石蜜六群往彼但喫石蜜不飲水同招譏白佛佛言自今後開五般人噉石蜜前四如鈔今此句當第五故五分下可知云僧祇至成者此約轉變明之動作即攢作也記識文云此時食中有非時七日藥淨物生我當受若中前加不記識過中雖變為蘇不許服即名不淨若悞忌不受者謂雖記識後得淨蘇忌不對人加受及不說淨亦名不淨故知記識後得蘇須加受法非時受甘蔗不成者謂含時食受不成既受不成作記識法亦不就時內並成者受與記識俱成故著並字也云然至云云者彊力劫掠者謂人力強於蜂虫白而取故佛受獼猴無蜂熟蜜者祇二十八云昔有獼猴行見樹空之中有無蜂熟蜜來取佛鉢諸比丘遮不與取鉢佛言莫遮此無惡意彼將至樹滿盛一鉢蜜來奉佛佛知未淨不受獼猴不能佛意將謂有虫乃看四邊見有流蜜及將往水邊洗之水潛入鉢即成淨故將來奉佛佛乃至死後生忉利天後出家成羅漢道也准此水灒已壞味竟即不長貪既曰無蜂即非劫掠上言無蜂熟蜜者有兩說一云大蜂來喫蜜傷損此蜜蜂蜂子畏之遂拋而去故二解云冬月蜂子有便穢在窠中無人與除即生虫如指大此虫食蜜并蜂乃捨去也今取此者故曰無蜂熟蜜四盡形云盡至飯者甘是甘草人恭苓等善見下據文中有四句一一切樹木等不任為食者是盡形二若堪食是時藥三根是時藥莖是盡形四莖是時藥根是盡形戒疏更有生熟四句一生熟俱是時藥如米麥等二生熟俱盡形如薑樹等三生是時藥熟是盡形如梅蔗等四生是盡熟是時藥杏仁芋等是也但令堪食等者總釋前來根莖等一切草木無數無邊不可一一標名指示但為食者不問根莖枝葉時藥所收不任者盡形攝也一切臨境看之不局一二也隨病為量者謂約法雖云七日若服至五三病可即於以無緣故法謝惑病雖未可法藥亦失若無病不飢等過中一粒入口並犯正罪油蜜膏亦爾同上來隨病為量等論中舉蘇等者指了論中且舉蘇以為出法方軌餘皆例解終身藥不爾者以力微故是病是身有身心有病故許盡形不同七日藥勢稍微病苦須捨若無客病者無四大違反之疾也又不飢渴者寶云此名主病惑云舊疾故論云病有二種一客病四大無違二主病飢渴所惱玄記云三毒結使名為舊病也十誦淨苦酒得飲者謂上但別鹹苦辛甘未明酸味今引明之以苦酒味酸人不貪愛故開飲也云上至世者結也隨事辨體者簡不約法也若約法論三聚之中是色聚攝假八塵所成能造四大所造四塵於三色中即可見及不可見有對色攝四食之中是段食也雖假八塵所成若取資益義邊即尅取香味觸三為體但是不可見有對色也今有已下辨非也愚夫即迷教之類杏子湯等即所飲之物也出在自心者自己貪心也妄憑聖教者虗妄憑記開病之聖教不如噉飲者中後已去人見噉者必知非法少有効之今此杏湯之類據體即是盡形藥攝有病便開今既無緣不合檀飲引悞後學展轉相承違教招𠎝永無出離故曰罪流長世也云次六味定者首疏云一苦二酸三甘四辛五醎六淡也定者將此六味定五種藥量也云明了至種者五種量乃至大開等者標五量名也一依時量即時藥二依更量即非時藥三七日量即七日藥四一期量即盡形藥五大開量即大小便灰土水此於盡形中分出世間一切療患通得藥名但以此五攝之無不盡矣故知攝一切物皆盡疏云藥有五者真諦疏也五種如前說之云甘至不得食者甘草是盡形酸中阿摩勒菓汁亦是盡形辛中薑等是盡形苦味即一切苦澁是終身藥問前云六味今何云不見明醎淡耶答醎局是鹽唯盡形淡通四藥故不論也餘文可知云一切至用者晝夜各分五時者謂晝五與夜五諦遷向後從平旦至二更唯得一更盡服過則不得服者至二更須捨也如是輪轉乃至五更者即平旦受至二更盡辰時至二更午時至三更未時至四更申時至五更據文但至五更不勞別解也此簡漬在智反飯為漿者如漿水之類此局時漿故簡出也七日一期如文可委大開量者鈔中自釋云此時中不問晝夜得服要即自取不生過失故曰大開是世人所棄非所受情也注必無人准用者謂約空迴無淨人處直爾自取故三轉變云三至形者且約體論若據見論藥體既轉即不合飲也餘如文云四至之者相和辨體也若准四分於四藥中時藥最強盡形最劣若多論即據藥分多者為強少者為弱今先明四分五句一時藥和時藥非時和時藥七日和時藥盡形和時藥皆作時藥服即此從時強也二非時和非時藥七日和非時藥盡形和非時藥皆作非時藥受三以七日藥及盡形和七日作七日藥受服四盡形但自作盡形受服也今鈔之引論約多分諸強據藥分相須明也律取滋味將下就上為言從若以時下先明七日相和由七日下釋成也如以下顯相也辨盡形藥亦爾如文可知若以終身下明助成時藥分相可知若分數俱等下約勢分相似隨首標名如紫苑瓦柴胡飲子薰青白木丸散之類如文第二大段淨地處所云二至門者牒名舉數可知云一至也者正明制結淨之意分衛即乞食如下文說也因因餓死方開者玄云准律藥法中云有比丘服吐藥以伽藍內無淨地故皆不貯食此病人夜飢困欲死守待天明外乞食來病者已死因茲白佛故開結同界別處者在藍內故是同界邊房靜處結作即是別處古今諸記皆問云結淨地免幾過患答若不結淨同界而宿有內宿過又於界中煑食是內煑過今若結竟離此二過也又問為但約界有斯二過伽藍亦有答解說不定一師云界有宿煑約藍則無以文云不得大界同宿及煑也二師云約藍則有約界則無以文云伽藍內結淨地也已上兩釋俱非正義今云藍界俱有亦不局藍亦不局界以律文云不得大界內宿煑此約院周之界不局作法結成之者縱徒作法結成若無院相不成儲畜無於過識院雖周迊未結攝僧單是伽藍亦是宿攝能生過故准下文云多無籬障都無籬障並不攝食故知藍相周成即有攝食如也釋淨名已下正釋名也業是穢因者由同處長貪違教有宿煑過為因當招惡果之報是以詺此食為不淨也此從緣說淨等者傍破古非也古云淨者對翻穢以立名今云牒此淨地之緣入於羯磨法內結成已後免於宿煑之過即名為淨不是對翻穢食令得淨潔以彰名也二列數中標如文云一至相者注文厨舍狐立有院同之者謂伽藍院相雖不周而厨屋四面院相周迊比丘在此厨內與食同宿亦同有遇垣墻壍柵亦如是是謂此等相若周比丘在內同宿皆有其過故云如是隨共成相者謂不必要須四面皆墻皆籬惑一面墻一邊籬兩邊柵等但便四相圓合即有煑宿之過便成周義也二檀越淨云二至淨者即施主也如下篇自釋食具足他物者此句據食是施主者處屬於僧俗人將米麵等物來幾中寄常住處修設既不付僧俗自為主縱共宿無犯律云下引證可知二處所是他物者此句約處所屬俗其中食具屬僧由似今時施主為僧製造小私邑伽藍雖標意為僧作成四面院相周迊而未決微永捨此則屬他檀越其內有食比丘共宿亦無過也故云已下引證可知三食處俱是此句易解此三已下結釋也今多托胃等者破古師也古云寺是俗造據本屬他名他物淨今師難云若爾一切僧坊俱非道有總合名他物淨何用別結淨厨故知已施僧便屬僧物上言他物且據未決施僧開無犯也次引文證中來分應上等者謂王捨用與僧作粥米未全與比丘且令比丘管運得稻上於場上比丘共宿恐犯生疑白佛佛言若未分應上以未全屬僧是施主物故不犯分竟不應上者謂既分判若干稻米與僧即屬僧攝非他物也若在場上同宿即犯內宿吉羅故王崩等者謂前施屬萍沙王雖未判是王為主今王崩即無施主比丘共宿不知犯不佛言闍王替沙王處即是施主不犯注文准此例餘皆犯者謂若實未全施僧即不犯若已施僧決定便乃假冐妄言即自誑自負上且舉稻米為言准此諸物例上但使虗妄並犯以引僧祇婆羅門等者此段文約施主夜持食具等送來付僧決心已捨俗不為主即屬於僧若與共宿即是內宿於此處煑又是內煑故知物處二俱屬僧即同僧法也三處淨云三處分至之者若經營比丘者謂施主委任比丘勾當起造寺宇名為經營也即此伽藍成就竟令一知法比丘或施主臨時指揮三五間舍為安食處即名淨厨故云處分淨也次引僧祇文者謂前四分但云作伽藍時處分未明有僧住即處分不成今引祇文未曾有人住即得若經住已即處分不成也准彼律云時有支尼梵志為僧作僧坊令波離先為僧作淨屋謂制僧未住初夜即得作處分若住過初夜但名僧住處不名淨也注文四分經明相者簡濫也謂四分護衣及食皆約明相為犯之分齊此即判文有限若依他僧祇初夜之文即成他部之事太急故不取故此注簡之五分作新住處已下即顯五分僧住未經明相處分亦成若已經明相即不可也與四分計同反顯僧祇初夜太急問五分約明與四分相似可以依行故此引來僧祇太急不依何假錄安抄內答有兩說初依諸記中解為簡異持衣彼律初夜成護為優處分淨過初夜為急一等初夜衣食緩急兩緣不同雖不依行要須引示以依蜀川解云抄引祗文有取捨意若夜初結犯分齊即不依行彼有以繩量度分齊爾許僧住爾許淨屋之文五分無此故亦須取但改初夜之言為明相之語即得任情思審次引見論初竪柱時者彼云比丘棒柱云此處為僧作淨屋三說一柱既然餘柱皆爾若不能一一處分只隨於一柱上處分亦得若已成者謂是現成屋宇即依前文處之法也聚落老宿者俗中耆年之者若不解比丘教之以處分通七眾羯磨唯局僧也四白二淨中云四至地者不問住之久近者謂此白二所結不簡有僧住年月近遠要結即得不同處分必須新處後來有人住經明等除去比丘者律云諸比丘作念比丘房應結作淨地不白佛言應作除去比丘比丘尼式叉乃至沙彌尼房亦如是若鬼神廟亦如得作淨地律文如此因茲古師解判不定初云結淨地已比丘不得在淨厨內宿故云除去也二云非謂除比丘此是波難領解之語謂前言除比丘我已之知未審除比丘房已外更有餘房乃至鬼神廟屋得作淨地不今師存初釋不取後義如諸記中廣破恐繁不敘業疏問云既結淨了比丘不得在中同宿與不結何殊答若不結者通界宿皆犯今若結竟大界內宿不犯豈非利益引此疏文故知除去比丘不得在淨地上共宿斯為定說也四分因餓死比丘者重舉開結緣起也邊房靜處結作者業疏云以道貴法修食緣繁染俗中節士尚遠庖厨況出世高僧奄蒙庸僕成不可也制在邊鄙又居幽靜意可知也注文必在作法等者謂白二結淨也必須在人法二同界上結之若直爾自然地上結不得不同處分淨即許向自然地上結恐人濫行故簡異也五分下明結處彼律食楗度文云欲羯磨一房內次一房齊淄處次中𨓍次房一角或半房次重屋及通結或通結坊內作淨地佛皆聽之先出一房白二法後通結僧坊內作淨地且初一房白二法者文云大德僧聽今以其房作安淨食處若僧時到僧忍聽白如是次通結者文云大德僧聽此住處共住共布薩共得施僧今結作淨地除某處今抄中略引緣本一句故云除某處問除某處未審是何處耶故下注云僧住行來等是所除之處也遍界中菓菜無過者以總是淨地故明出在舍下者比丘即須在本注房舍之下莫出向他淨地中以通坊結成牒除之外總是淨地必一處有人餘皆通犯故須在舍下也或有異解者未詳故不錄此言通結者寶云但約多分是淨地少分是不淨地羯磨詞中牒除僧住行來是不淨地即顯不牒處雖不一一標名並是淨地故若別結即約少分是淨地多分是不淨地羯磨緣中牒結不牒除若是淨地即牒名在羯磨緣中反顯不牒處總是不淨地故今抄意存別結以通結難護也知之若准搜玄記中說其通結者不論僧住行來遍藍之內總皆結取名為通結遂舉攝衣界為例謂遍大略皆是衣界並有法起但此處有村之時不許著衣村若去者仍得通護今此亦爾牒其二同遍藍皆有法起是則現結未來施僧住房不得安食是懸除今時僧住房中不得安食又是現除未來僧者房空還得安食後是懸結不由僧來去人之食界有增減但結除障礙也今云雖舉此例其理不齊覧即知非廣如別破云但依前釋為正思之必依地起不在架屋者彼云不得羯磨机架及重屋車乘上依淨厨以界是色法依地而起但結下為淨地其棧閣上自攝得食以下有僧還成內宿若結閣上則不枰地以引僧祗一覆別隔者同一大堂下有兩房戶也通隔別覆者多屋無別壁通用隔也通覆通溝者如一大堂四周壁也別覆別隔者別別屋也一二三邊者隨其一堂取一角三角任意也隔道兩邊者如一屋內取兩邊作留中間作行路如此一切隨比丘意但分得觸淨即得故云如此一切並得也今觀文勢謂四分但云隨處作淨或溫室食厨神祀舍五眾房等而通別及上下中邊淨不淨相故引他文共成用准此已下結文可知云云三加法中標名可知云四至也者注如上明之者謂指前來不周及檀越二種無法可作上已明訖處分一法別人指示等者通七眾中隨一人口處分上之二淨壇越一種通於二二界處分淨通於諸界但未有比丘住經明相即得羯磨結在僧界內者簡不在自然准局作法界上結作先示處所者即約別結三處五處如厨屋屋倉坊庫院等牒人羯磨令人識知也懸指結取者謂遙結之不同大界戒場於相內體上坐結也所以不得坐中結者徵所以也古師等者即魏朝慧光大師也以食望僧者以淨地中食望僧身也是攝者淨地但攝得食是障者障僧不許入中宿也注文在中相雜者恐與結界相中混雜謂結大界本為攝人同處同法所以文云僧今於此四方相內結大界既得在中止中故現在中坐結遙即不成今淨地本為攝食不為安僧若許在中坐結謂言得在中住所以文云結某處作淨地既不云內故知懸結也以僧望僧者以外僧望淨地中僧也非攝非障者若大界中作法事有僧在淨地上淨地既本不攝僧名非攝也僧雖淨厨中不能障大界中僧令不犯別眾故云非障下注文自顯也云云律令唱處所者藥揵度文云應唱房若溫室若經行處等一一唱此字須知分齊護宿煑過不可不唱也方法如抄文云云云次至外者羯磨詞中云僧今於某處結等是遙指結也業疏問云淨地亦假僧戒文中何不稱此住處答僧衣兩攝莫不用攝人衣同處答論淨地無結攝食障人故不合稱於本住也上依疏文或有問云如結三處五處淨地同一番白二法被云得不搜玄云須別別而結一番白二只被一處處既各別法亦別故若依天台所稟亦許得或處雖有別一一牒名入法秉法竟時隨其多少皆有法起舉例由如一番白四被三人受戒三人雖別一一牒名顯法竟時皆納法體若言不得者如結十處作淨須秉十番白二如此行事恐不為妙已上雙敘二解隨意置用也又搜玄記中對此依四分倣五分出通結淨地白二羯磨牒其二同文云大德僧聽此住處同一住處同一說戒若僧時到僧忍聽僧今結作淨地除僧住處及行來白如是羯磨亦爾近有兩紙記文成立其理所以爾者謂搜玄於前來通結文中輙舉衣界為例許遍藍結名為通結其理不齊今至此別結文中傍出通結羯磨故牒其二同約義有虧不可秉用但依抄中出法文自明矣知之不得䊩敷表反也說文云米甘汁也江北名甘江南名䊩所以不許流出著恐招俗譏謂僧與食同處也或有解云恐有觸染之過者非也次解中云有緣至持者謂約移厨改易故曰有緣律但有結文無於解法今鈔准三小界翻結成解如文列也表云然解淨地各依本法若白二結即白二解處分淨亦處分解檀越淨施入僧時解不周淨周即解料簡中云四至煑同宿煑無過者謂檀越物屬他故不周淨不生譏過是以此二淨比丘在中宿則無犯也但不得觸者恐有觸者恐有觸染之過通比丘在內檢挍者此是白二結淨或日中及夜間在淨地上撿校看煑等無犯但明相出時身不在淨厨即得唯壞食具等者玄云欲明淨地不失結法故著唯字但壞食并食具由有人同宿有染觸之過所以須翻若治故處下行相如文可委云云曰問至犯者問意者因前來文中許比丘在淨地中撿校看煑等唯不得經明相故有斯問也且不經明相即免內宿理不在疑既在中看煑何得無於內煑耶答中煑是隨處者謂內煑約大界不淨地即有故云隨處也大界無人亦犯者若將食大界內令淨人煑縱界內無一比丘亦成內煑以非煑食處故犯也即顯淨地中煑食時比丘在內無過以淨厨本是煑食之處也宿是逐人者因便明內宿約人成犯有比丘與食共宿即犯以逐人故二界無人不犯者大界內有食無人同宿不犯淨厨中亦爾故云二界也即顯內宿是隨人故護淨中牒名列位可知釋中云初至不淨者一通凡聖僧路者既護淨如法凡聖俱持戒故俱得同飡故云通也順本壞者三世諸佛立教皆令護淨今既依教即順佛意故貪染叵離不也即貪染之心不離恒人所耻者俗中云君子不臨厨何況等者舉俗況道脫經儉難者脫忽也儉即八事也難即淨人傾例比丘為扶助皆是難緣開無犯也後若無緣拱手者謂豐時及非傾例之緣則不許觸染故云拱手仍事觸宿者仍而也觸是惡觸宿是內宿心初無悔者謂無上緣不能護淨共宿觸污由如有難之初緣既犯不懺故云無悔也不信此心須為師匠者謂凡夫外道以心為師皆被心使造作眾惡今佛弟子不得信任此心以心無定須為心作師故云師匠欲依聖語番穢者謂佛及僧所言皆稱聖語也列四種如文云言至翻者合辨前後三緣不須翻也問前列名中緣不淨在第三體不淨在第四今釋文中體不淨却在第三緣不淨移安第四者何答謂取前三並不用番故一時明若緣不淨由須翻穢故廣解釋移安後也是以文云上三句並是正經文遍如鈔等前列科中據相番說前二是淨後二是不淨更有別釋不正不容膩器者謂銅鐵等不受膩者准僧祇許安水燃火也並是正經者即十誦僧祇等又遍如鈔者如上下文一一具引也云緣至者者有將牒名百別科不用亦得從本是淨器已下釋不不淨之所由也五分等者明翻器物令淨之相㒵也次引僧祇停須臾名不淨者謂被鉢中食膩染致令僧器不淨故若是銅器等者亦是翻淨相㒵如文易解也餘有不盡者今觀文勢上來但明僧家多有食具遇緣成觸翻之令淨然此翻淨義由未盡又復上文雖辨能盛之具未所盛之食設爾觸染亦許翻之如此兩義未周更欲引文廣釋故生起云餘有不盡者唯以未麵等者正辨翻淨也雖此是麵鹽醬有染觸之過今將往尼等六眾邊迴互一石搜一石等雖得本物入手兩相捨者如先得一石與比丘尼今更將一石就迴換彼却將比丘先得所者將來即成淨也謂先付與他時此作永捨之心彼作永得之意今雖轉易將來事同新得故也准此展轉翻穢成證者謂准前來所引善見大僧沙彌易食翻穢之文證上六眾更互轉換得成淨也此約所成之人良前文未說今故明之次能盛之具前文亦未盡理今更重明若瓫瓫等已下鈔文是也行相可知注文謂非常服用者釋上四分戶鈎等物此屬常住是閑不用者即得執捉若家人常捉者亦不得捉即是膩勢相連故也云問至知者如楞伽十誦所述證上五教通大小乘故楞伽經云寺舍煙不斷常作種種食故為人所作是名不淨食如實修行者不應食此食出第卷九十誦云若有僧伽藍烟火常不斷如實修行者不應嗔此食出第四卷護淨經等者彼云佛共阿難行遇一池水東西南北深皆四十里中有細虫形如蝌蚪色黑如墨佛言此是十方世界眾僧嗔不淨食墮此臰穢糞尿池中後報如鈔所引云云因說知事等者護淨經云有一比丘新證羅漢有結業身而有便痢闇中上廁見一比丘廁邊呻吟羅漢問之云本是比丘為知事觸僧淨食以不淨食與僧今生此處五百餘秊不聞漿水欲趣廁取不淨彼廁鬼打不能向前羅漢為集僧呪願方得糞食云云智論等者緣起大同也大集經中諸龍以佛神力故得宿命通知過去或與僧為親或因聽法因緣入寺食於僧食今受惡報僧護等經說受蛇形在樹中止為火燒樹受於苦痛等通而言之者今師戒勸也五百問下緣起大意如前怪涉栗反撞觸之㒵也二護淨中前護惡觸者謂出世高僧不許營作身既不作手豈念觸觸得吉羅招報是惡由觸得惡故名惡觸又若不受直爾自捉亦名惡觸也云十至之者初引十誦非觸非惡約不淨器及食過與似惡觸相但為與時一心與他後淨洗著僧器中即無惡觸也注文准此等者准此上文一心過與即無惡觸之理即今器下椀底有殘飯食及茶湯若未作決罷之心更希將來者即須放安床上令淨人將去若親過與他即名惡觸矣次引五分是觸非惡比丘受已行之者既無淨人比丘為受故觸而無犯故非惡也次引僧祇是惡是觸淨人持不淨手者注文轉釋上義也上座一人得不淨者以淨人初把淨食時染著手中舊捉惡觸食氣故上座人名惡觸餘人名淨者以惡觸氣分盡故若淨人下約食與器淨穢相投名惡觸相抖揀一切不淨者謂上約不動若扟師巾反簡也取中央今由抖揀傾動故雜亂即一切不淨也注文准此諸扟食相可別者謂識知了別觸淨淨則留之觸則除去若混然相雜不了觸淨即一時總換也當脚處使人扟者此是因緣非緣成觸但除是處已外非觸故若難事急等者謂被惡人趁捉惡獸所逼走避雖蹈上過不成觸以無心故後是緣難一切不犯天雨忘覆食器等亦是約緣不成惡觸故諸蘇油瓶者即淨蘇油及七日蘇油瓶同在一處安置也甘蔗竹葦來者甘蔗作石蜜用竹葦要作盛食器亦同置淨厨內也甘蔗竹葦置而未論且說蘇油成觸不成觸之相狀悞提淨油瓶來者謂七日油瓶是加法了者內淨地中比丘要即自取若淨油瓶是未加法者但得淨人提比丘不合若捉成觸今比丘本提取七日油瓶而意悞持淨油瓶將來也餘人見來不得即語者謂比丘見不得便語他云汝何故錯將淨油來往至已問彼云是七日油者即知他錯悞令乃置地方語彼云此是淨油瓶不得名去呼字者謂若未置地由在手中之時未得語彼云是淨油便成惡觸故還得七日受者注文自釋以悞取不成惡觸已後更加法作七日受得成也若令取淨油俗人不解者謂淨油既未加法即令淨人取比丘不得捉捉成觸故今俗人往淨屋中錯持七日油來亦如上法者指同前法式也注文口法失者謂此七日油本不合令俗人捉捉成觸今既是迷悞雖觸無犯然置地後不可更觸比丘從淨人手受已更對人加法以前法失故然勢力但續前日也甘蔗竹𥯤者前未曾明今須略解謂蔗與𥯤相似本意令比丘往取竹𥯤來今乃錯將甘蔗到法式亦同前文其蔗雖觸以悞不犯也玄記中云竹𥯤可作盛物器比丘悞捉後作器不成惡觸者今詳此釋大悞思之自餘已下雜辨可委云云云器淨者此有五種一菜二盤三床四船五車盤約緣卷者有攝食義也車船二種無牛在地一定故成器若觸器即是觸食注文由有緣開坐者謂在道食時兼無別坐處曲開在上坐若問若動便成觸也棧士限棚閣也文相可知十七種數者名字如別云云如船中進不者船離水名器今車離牛亦爾名器也注文不得以牛在故淨者恐人見牛不離車謂言非器得觸今云不得以不行故縱牛在亦名器動便成觸也云十至淨者初引十誦約擔食相染以辨有浮囊者度水沙彌淨爾佛言使淨人著囊上度到岸已更莫觸還令淨人捉若為水漂聽比丘為捉同僧祇得食者謂同上祇文若著淨在不淨器中得扟取中央得食即同此中著鉢者弃也飯粥已下約佐助雖觸不犯或是緣淨或是體淨文甚分明也云四至取者又雜辨也惡人者謂破戒比丘惡心令僧得不淨食也自散種子等者以變動故無觸也上坂者說文云險危處也扶捉等不犯十誦負淨取者證上扶捉助之皆得自手觸吉羅者約無緣故觸犯吉也服有過藥者諸記中但云以有患故開服避譏嫌恐相効故令屏處而顯其藥體致有釋云是過限蘇油之類者非也今鏡水大德云藥法文中比丘病聽服有過藥謂是韮蒜䓗薤也令屏處服并汙隨順法七日內不上眾僧厨不入眾不誦經呪等籴朱待賓者簡非自食注文顯不自畜也云二至等者護自煑也注文准十誦等者前云比丘與沙彌擔食乃至還與比丘者先不同要即得反此不得今亦如然一心與他他食不盡者即得若初要期我為汝作汝食若剩即與我飡後有餘故不許食也僧器有膩不合燃火者謂器有食膩比丘燒火即成自煑誡填也更不得觸者玄云不唯不得觸米亦不得觸火即成自煑故使淨人煑沸下明既變生相訖許自重溫即不犯故文相可知云三至犯者護內宿也謂人與食同處經明相名內宿也初引五分約淨人持食來不淨地經明相次引四分約比丘持食來覓淨地未得明出已上二種俱非故作偶爾經明皆開不犯內宿也云四至食者護內煑也界中煑故名為內煑元為他煑者指俗人淨人為他若指別比丘為他他豈令食同是比丘俱犯內煑也故文云一人有過食一切沙門受大戒者俱不合食也三通塞中牒名舉數生罪為通不生罪為塞若對約時就人約藥辨者如下對文自述釋中云初至正文者時藥定有宿煑者以無口法近時之義同宿即是內宿界內煑即是內煑若自為之兼有自煑若重過即得餘三藥者七日非時盡形不加法一同時藥者亦有宿煑等過也若為病加法有通局者隨其藥體長短分齊內則無宿煑之過是局若過限並有過罪生即是通非時藥明未出服用皆得者此名局也以無犯故若明相出等者有諸過生名通也七日藥加法了內淨厨中等者是局以開無犯故八日旦起具罪如後者如下文說有時殘宿惡觸犯長等過生名通也必是熟無生相如椒薑呵子之類並開宿煑自煑等不犯次引僧祇下通外難也應難曰四分既通自煑何故祇中自煑薑湯亦犯鈔通云謂有生分故必是熟死淨了者四分開自煑不犯注文准之唯開三罪七日不合者約上盡形料簡七日不開同宿律云比丘念言盡形藥得界內共宿共煑自煑不乃問佛佛言得准此開三者謂隨身療病貯畜過微故不同七日非時也若准古師許七日藥同宿若不開共宿用犯法何為今師云加法但要近時本不為於同宿以此藥味甘美貪貯情深故准前僧祇若厨屋中有諸蘇油瓶等明知七日藥在淨厨內若爾何以十誦中石蜜漿舉宿開飲耶鈔通云應是難緣許在房中同宿不是尋常七日藥也又引四分既令將殘宿蘇油灌鼻即知同宿有過不合加法十誦正文者波離問佛是三種藥舉宿及惡捉得口受不佛言不得又問是三藥手口二受不病得服不佛言不得以此證之同宿有過也二將此四過對法明初牒可知先明下引過相也云初至過者三種人者先明制宿人也比丘即一人約自己與食同宿犯也二種僧者如四分云今日受已至明日一切沙門釋子受大界者皆不清淨此通僧也學沙彌者懺重比丘也此人行違體順相同故染也注文或無沙彌尼故開者謂四分中式叉得與大尼過食十誦中式叉不得與食共宿據四分既許過食同宿理合不犯十誦制犯即知四分是開未委約何義邊開他過食所以注文釋通或無沙彌尼不可大尼直爾自捉故開從式叉邊受故反顯若有尼沙彌即不合也結淨地與坊內共宿者正辨內宿謂既結淨已只合安在淨地中人在大界內宿即不犯今還將食在界內共宿名內宿也注文都不言等者為破古也古云結淨已比丘在淨地上宿無內宿今云淨地只攝食不攝人今若有人共宿還或內宿也何以知之故十誦但云結淨地已僧坊內共食宿是內宿何處見說淨地有比丘不犯內宿之文以淨地無不合有人故內熟者即內煑也結淨地已等者既有淨地理合在中煑食今乃向界內煑故是犯也自熟者即自煑也此不論淨不淨地比丘並不合自手煑食三種人不食者比丘及僧學沙彌如上來說之俱成不淨也惡捉者即惡觸也注文中先受惡捉者應是約先受已被淨人觸床之類即成先受比丘又捉即成惡捉也次引薩婆多三句初受不自捉二自捉不受三不受不捉文相甚曉尋之可知若他人食不犯指餘六眾也二對人辨標如文云初至如上者不通他物不周者約處辨也他物屬俗故不周藍相不成二處無內宿也處分及白二者此二處約藍相周縱是大界亦須是有院相大界於此二即有內宿過也就時者可知就人比丘三人者如上說也知有犯者謂明白心知界內有食與食同宿若不知無心違教雖與共宿即不犯律中已下引文證前不知無違逆意不犯也尼通四人者三人如上更加式叉就食者如文對四藥論如上者如前文說盡形無內宿餘三皆有可知云二至煑者淨地並塞者四種淨皆無犯為塞對時通晝夜但使在界內不問日夜皆犯也就人通七眾者但在藍周大界中七眾為比丘煑名內煑不得食約食如文四藥而言者可知次引僧祇者彼云舍衛城居士請佛及僧佛不去阿難遂往請食歸疑生冷乃持火往寺門外重煑時佛因行見故問阿難具述佛言善作自今後若食冷皆聽重溫若生須更淨了煑此上律文今引此既將出寺門外重溫明知不許界內恐成內煑也云三至合者辨自煑不論淨地但比丘自變生為熟即是自煑被淨藥得自合者約有生相之者以火作淨了自合不犯云四至熟者初約處不簡淨不淨地次約時不問晝夜但觸著便成惡觸也皆犯也就人大僧多種者有五句辨也一往不受經捉觸者謂約本未曾受而自經捉成觸也二膩勢相連者注文自辨據食巾上有昨日食膩不淨洗將今日淨食於上即被染污成觸也三任運失受者約時過故任運失受若不觸非惡觸今失受已又觸遂成惡觸故注文四藥不加法中後俱失受時藥本分失餘三藥無口法近時故中後亦失也若加法三藥者謂非時七日盡形加口法者各隨限失者謂未過限即未失若限滿任運自失七日藥至八日非時藥過明相盡形藥命終時失受故文云盡形藥若命未斷一切比丘得食若斷失受諸比丘不得食問七日非時過限失受有惡觸生即不疑此盡形藥比丘已死但有失受亦如文何更有惡觸玄記答云為論三藥俱有過限失受若約惡觸盡形即無也四過緣等者玄云此元為辨惡觸今但言失受謂因失受後捉成觸也五決意等者謂作永不食心後因捉時成惡觸得吉若食得不受食捉沙彌有膩觸者彼沙彌自捉師膩器後更捉僧家器具即是膩觸故不成觸中注文僧俗兩執不成觸者謂淨人過食與比丘時比丘捉淨人手由未放豈非兩執此為受而捉不成觸惡也鉢中故食亦爾者謂比丘鉢底先有殘食淨人持食來授等雖觸著鉢內餘食亦不成觸為受故爾鉢中故食亦爾者其鉢中食亦不失受謂僧手執故二遇緣失受中注文淨人觸失者正釋遇緣也如法莫觸者謂此食已被他觸失受法比丘若觸亦即成惡觸亦受不成今既不觸此食無過名為如法也洗手更受者即同新受故須洗手淨心故淨人不須洗手者無觸惡故不須也三持戒悞四破戒故觸可知更以三句分別者標也初句觸而非惡等者前一悞忘無其情過故開非惡若見淨人應置地者謂前迷悞今見淨人方憶未受便即置地無犯洗手更受者義同於新亦表心淨或可恐前悞觸之時所捉食菓有膩氣故是以洗手第二句惡而非觸者謂約破戒人惡心故作而諸善比丘雖食開無觸罪也佛言不觸者淨者即持戒比丘不故心觸不犯者名淨觸者不淨吉羅者謂破戒比丘惡心觸故後自得此食喫即成惡觸犯吉也上來是惡非獨義故第三句亦觸亦惡等者懈怠者懈慢佛教怠墮不奉得便捉不論觸淨捉菓試看生熟者此亦怠墮之心不遵故犯就食通生熟者生如米麥等熟即餅菓等是云四至律者互覆墮者此段文須分開說先明互覆次說互墮初互覆者謂樹在淨不淨地枝葉互覆二地若於上安食具及菓等皆從根判也故業疏云依其本地有淨不淨不依所覆有淨不淨以互墮者謂子菓互落二地即約義別論律云時有樹根在不淨地枝葉覆淨地菓墮淨地諸比丘不知淨不淨佛言若無人觸自落者淨又風吹雨打落獼猴諸鳥觸墮佛言若不作意使墮名淨又云若樹在淨地菓落不淨地佛言已上律文鈔辨為不了者謂前不淨地菓墮淨地中何得有過而用論之今所論者約菓墮不淨地中中有比丘恐成內宿要須論也所言不作意墮者謂無心貯畜任運自墮非情過也又律文不云不知又不云經明成宿是不了處又文中但一向從根斷淨不淨不言長足不長足隨經明相知不知義者不了也今師云若未長足又未離地重生不住在不淨非犯若雖長足離地已經明相不知長足不長足淨地不淨地成宿不成宿者亦不犯以無心貯畜又不知故得食五分下引證文也謂前已淨四分為非今引外宗證成不濫所云樹根在淨不淨地比丘亦在淨不淨地者觀其文意須約菓樹半在淨地半在不淨地比丘身亦半在淨地半在不淨地菓墮其中謂還墮淨不淨地也菓墮其中者謂墮淨不淨兩種地中也非比丘所為是一緣見果落非淨地使淨人捨聚又是一緣經宿白佛佛言因制若不知淨與不淨聽食若知不得食證前兩段菓菜長足在淨不淨地比丘同處知不知義也僧祇下四句一若不淨地生菓蔭覆淨地菓落淨地二若淨地生菓還覆淨地菓落淨地此之二句墮何時取無內宿也三若淨地生菓覆不淨地菓落不淨四若不淨地生菓還覆不淨地菓落不淨地此二句應及時內淨屋中鈔文但引兩句釋成前義也隨何時取者既落淨地不限時節任三日五日不取並不犯故云隨何時也有錯解義者云云應及時內淨厨中者准文合及初夜時過此即不淨今鈔雖引來限約須依四分及明相未出時內淨地中即得引此文為釋前不淨地菓落淨地上本分不犯何須料簡又𦬔瓠等者此是長足𦬔瓠顯後段未長足在不淨地非犯又運致等者謂若運致糓米豆等在不淨地准前五分知不知說注文大同此律者謂四分受戒法中知和尚犯戒等四句約不知故開得戒知即不得五分淨地約知不知有犯無犯若望事境雖殊約知即不得不知即得無別故曰大同也云第五至知者標名可知四分下引緣起也准藥法文云佛在波羅奈國時世飢饉乞食難得諸比丘持食著路地為賊持去比丘生念云佛若聽界內著食亦免此事遂將此白佛佛言若儉世聽界內共宿此是開內宿緣也二開內煑三開自煑四開不受皆為被地持去開緣並同上也五僧食六俗食七水菓八陸菓已上四合為並不作餘食法水菓謂菱蓮藕等陸菓即梨栗胡桃之類此四各有開緣如律所述云云此皆儉故開之也若定罪者古但有五謂內宿內煑自煑不受足食也鈔言八罪者今師云既開自煑義有惡觸并文無也又准十誦許持殘食去留明日食豈非開殘宿四分亦無又加壞生罪陸菓聽自取故持殘食去語施主知者玄云夫應供本施其一飽縱有分外不合將歸今既是儉時許持殘去恐施主疑恠但告令知准此律文豈非正開殘宿四分無文故引用也第四淨生種法初牒章列名如文云制至說者餘如壞生戒者如上制不掘地壞生三益免被王臣駈伇得靜緣修道等云第四至食者明作淨處及人也四句中前二句約義明後二句依十誦出人菓俱不淨地成淨不合食者注文自解餘四眾食者比丘尼式叉沙彌尼也或有釋云除沙彌尼取學悔添成四者具依前解次火刀作淨成淨不得食者謂火入淨有內熟過同前第二句也刀淨雖非內熟且在不淨地中作淨以非處故亦不合食若果在淨地下是如法淨也如文又須知此作淨法通種相若淨種必須淨地若淨相亦通不淨地也三種法標如文云僧至人處者刀瘡鳥淨去子食者謂但壞相也不中種下都食者壞種訖并子食不犯皮剝㓟皮者剝據少分㓟約全除淤者汁淤下流𤍜者時乾𤍜也又云水洗連根菜即名淨者此是律後段別文也時諸比丘洗連根菜已更作淨佛言不用更淨即是淨也玄云連根菜即初生芹蓼等是未有節且從根種判洗即成淨若有節方從火淨也准五分淨根種者謂若准五分根種亦須火淨以文不同故僧祇等者有五種一柔𫝽淨二摘牙目三脫皮四爪掐五火淨僧祇文有此五也四分火淨通五種者謂只一火淨便通五種謂根枝節覆羅子子種五也與僧祇文不同故毗尼母下明淨色相也論云水所漂者塵所坌者此皆壞相不可壞種注文准此者准甘蔗有葉相間即不得合束淨者今蒿子連枝帶葉子既散落隔不相著故不成淨故云無淨法也粳米注文一說云是糙米二斛是白米如十誦等證亦淨亦須問上言十七糓脫皮成淨今既是米何要更淨答若本為淨故脫皮皮脫即成淨若不為淨故脫皮皮脫之時不名淨種之可生故須更淨也注文四字據有淨人比丘不合自作非法故云若無人至准此者約無人比丘自作也自加行所作者若據彼文淨菓都有四句一自加行所作謂自火淨乃至爪淨二他加行所作即俗人與比丘淨食三自他加行所作即自捉菓與俗人共淨四非自他加行所作即虫傷鳥啄瘡乃至淤𤍜等直爾得食也今鈔文當初句也疏解等者真諦疏也一一吉羅者壞相吉也一一提者壞生種罪也今火一觸止得一吉者釋上利益也十誦火涅槃者上勝不觸著菓故熱灰火及炭者新死熱炭也並不成淨注火所觸者釋上比丘不應食此一顆被火觸了者成自熟故非謂全不得食刀爪淨者雖觸無過且非自熟約處又是淨地故開食五分根莖二種以火為淨者謂五分根種及莖亦須火淨四分水洗即是淨前來已引也僧祇野火所燒者約樹被燒其菓落地即名淨若雖燒不落地不成淨以根在地故灰團糓聚者玄云拘隣提國作糓聚畏非人偷以熱灰火遶之起識即名淨也此須灰中有火觸著糓即成反此不得餘文易曉不勞繁解云云云問至相者草木七種色者青黃赤白黑紫縹敷沼反也色說文云青黃色也根種有五者根莖枝子子等如前說之云云云第五至相者略取要務為八門者謂古來疏鈔廣辨成不足相今師約但略取要妙引來此中作八門解釋判也云初至之者隨相者指不受食戒比丘共外行不上樹搖菓等云云口受乃至限滿者非時漿至明相七日藥至第八日明相盡形至病形差時又防多罪者防殘宿內宿等牟受但防二者一不受二不受而捉惡觸也如下明者下文防罪科中明也云二至得眼者二受通四藥不者謂手口二受為總通四藥以不或將不字安下句者錯科也手受通四藥為防盜相者釋手受通意也除時藥者謂時藥但有手受無口受以局中前不用口法是故除之亦有口受等者約緣辨也謂不憙沙門火燒鳥舍金銀器物貯食來等准僧祇祇口加三受即贊手受也雖是口法亦只局中前無久近義故云唯局中前也餘三藥手受亦爾者非時七日盡形三也若但手受不加口法但至午前過午失受以口法近時故云亦爾若加口法通時非時者謂時中手受三藥即加口法不局時中通非時中並得服用十誦等者引證也時分者以菓是時藥清汁是非時今取清汁是時藥之一分故名時分也注文和會部別呼喚之意也必有病非舉宿等者謂此藥體須淨即加法得成若是曾與人同宿惡觸之藥加法不得以帶患故云三所授至也者辨過藥人并對首者止食有三者謂不要名止也或搖頭向兩畔或口云不用或動眼作不要之相即不授與也中間文義抄文自顯云云云四至受者明受法也錯受不成者欲受蘇而受油等注中抄者謂向淨人手中撮取撥謂於彼手中或手或筋撥取並名非法反顯上文仰手承之方為如法故就中分四者舉數也云時至論者如不受食戒辨食器相對身心相對單心無對三段之文對施即下篇修觀門處辨也此但已下約三藥以辨正立斯意也云初至法者標受非時藥也問前云所授即是淨人今言能授亦是淨人何故二文能所不定答前對能受是比丘淨人即是所授也今云能授是淨人即對所受之藥故不定也云初至等者藥體無八患者如文列也注文初甜後酢後即失本性也下文亦有明八患處指此段文也云二至來者如文云三至之者前漿類別流類差別也記識者如前廣述也注文料簡不許一列也云四至字者如是云七日藥四法同上者玄云既言同上即科為牒不合云標也云初至同上者改第八者此無變動義以餘比丘犯長七日藥為第八也問此與前第五殘宿何別答前約自殘宿藥今此是他者不唯殘宿兼有惡觸非時等罪也云至二當者如文云三至二者牒也初自無五過者舉數也云一至受者相續畜者約七日已來相續畜次引僧祇文證也問答意道前藥所污名相染非是過也文相分明若得異藥者如同是蘇即不得若為別病更受蜜等並許也二相續畜已者此正約日過相染也過日者為能染旋入手為所染也三曾服他犯長第七日所染藥今所受藥與彼藥味同不合加法故僧祇如此牒示他宗也四相續受者由未服用故不犯長但為誡貪心須間隔一日許更受之五相續犯者謂說淨藥藥恒服至第八日雖無長罪若更服者以後續前名相續犯若別藥即開也結文可委云二至之者約自己作四法也注文若離時食不須此言者謂合時藥恐中後失受故須記識今既無者不要記也四展轉受中注文亦得自煑者約無淨人也二種煑已者有淨人令彼煑無即自煑非謂兩煑也不名惡觸者謂正煑之時味由未轉口法尚在不名惡觸纔味轉失受後不得更觸故不名惡觸若觸即成惡觸也餘可知四加法中餘隨對治如前類准者者此文且舉風病加油之法或熱或冷服蜜等藥類前受法牒病緣及藥名字為異也云盡形四種者牒名舉數可知云一至說者指前文已列此不舉也二能授人中注文謂含時食等藥者謂此藥中或䲻頭未麥即含時食與非時七日別也云三至合受者若單不須者謂單是一味無變動者不要記識也分體分者如有甘味藥其中必隨一味名為某丸即是藥體其餘相位者名藥分者別來別受者約其藥體分前來前受後到後受若一時來一時受故曰總來合受也云四加法至限者如前分別者如上出體中取分數多者為藥主若買藥中辨先後別受相也易知若往市買下明市買誡勸之文不得置地等者恐停須臾失受故云今至意者抑挫者抑遏不依佛語即是挫折今奉法順教而抑挫貪心以藥資形念之為道即鏡大意也云五至異者辨七日藥須說淨其三義故如抄列云云防護明相正出時畜長非時等過故手受但局中前反須臾故云時少也餘三不具者時藥具初後二義非時具後一盡形具前二皆互有闕不具前義不須說淨淨法如衣促段為服用隨因緣也云云云六至說者明手口受寬狹手受准不受食戒及七日藥戒一人受已通一切人是寬口受亦爾者有兩解此初解也即與手受通義不別故云亦爾若據已下第二解即不通也所以然者對病別故彼病非此病又題名別故某甲比丘名字不同也莫非下却明通義也所以爾者謂口法加二通之藥注文自辨謂藥未失法與餘比丘服得即是寬故於前人受法不失正釋寬義何以知者徵問道理也四分下引律證也餘如義鈔及疏說者大疏義鈔也大疏云論其口法稱己名受於己有法未捨與人得就我食不失受法若決捨與他二受即失故善見云藥未滿七日若捨與人即失受法不應更食也云七重加至得消者初明手受重加可知口法者標起也初引多論約日重正從法說戒疏云多論兩斷此是初解不從藥勢二日但從法論作七日受得二日服舉例如夏中受七日法也次引僧祇下據其相接准藥勢論彼律以藥經宿不得服故日日求淨人疲苦佛問醫言比丘幾日畜藥得安隱答藥勢相接七日可知因茲聽七日畜引此文證前相接得七日也悞觸七日油等者如上護淨中淨人悞捉七日油注云准口法有失明知更許受又引成論又為證相接七日也八雜明中牒如文云薩至受者從比丘口受等者准論若有淨人即令收掌日從彼受不要對比丘加法必無淨人收掌即須加口法己若要時即自取之若作口法下重引多論也作法加已從一日至第五日已來被觸失許再作七日受若六日已去觸者不許重加以將滿位故問此段文從一至五觸失更加二受復得七日服豈非從重受日更數取七日前段文中但約藥勢相接取七日不從法論同是多論一文何得前後侔楯答中初依搜玄和會云雖同多論二師意殊前師恐於律教從急故相接七日以言後師意在接機稍似寬緩二執不定事隨依已上略彼大意也鏡水大德云諸記家雖釋此文並未知前後引用之意前重加進不科中單約觸失以辨重受義竟若約將餘未受藥來雜王受之藥亦成觸失重加受失分齊日數如何是以向此第八科中名為雜相也若不作此分開即前後兩文皆明重加受法前既述了後文論量可不重疊此且分抄前後文意也若解義者搜玄釋由未了今解云若但觸而失受即還他前段文收必若重加但相接取其七日也若以餘未受藥來投此受了之藥觸失即須分強弱必受了舊藥多未受新藥少來觸失者雖再加七日法據藥勢相接亦但至七日或舊抄少新多重加受法即隨所觸日更斬新數滿七日正屬此文之意如斯解判亦准論文誡非濫說思之若藥眾多下明重受如文云問等者易知云答至故者正答防罪數時藥手受正防不受義兼惡觸以不受便捉有惡觸故口受亦爾不防餘者午後即失故無二宿及非時以現受食故不防二煑四藥手受防二罪亦同也非時口防二者過午一瞬恐失故過午失受便任運有惡觸今口能防下二藥惡觸義同此說不防餘四者但得四明相故無二宿況是熟藥或生飲者無二煑也七日防三者上二同前更防殘宿以受經夜今有此罪今口法能防昔云防內宿下大疏云若還置淨厨者用結何為鈔注云此無律文等者藥法中波離問佛佛盡形藥得內宿內煑不佛言得既不對七日為問證知七日不開也盡形口防六者或有內煑若合成丸散則無若湯等界內煑煎之則有內煑故能防得亦防自煑者以變湯生成熟故亦能防二生罪者謂因二受失受之後却有罪生也云時至二吉者時藥生二過午失受惡觸經夜坐殘宿生惡觸不異前也口受同之四藥手受皆同此例非時口生三罪殘宿惡觸如上更加非時七日口受生五者可解問答中意道雖有不受罪且非是因口法生是本來有故不言也不同諸罪因口法而生故云盡至明者別辨盡形生六罪一失受二惡觸三殘宿四內宿五內煑六自煑更添無病而服得吉亦有者不定義也謂乾藥即無二煑故餘如等者非時食戒云無緣服得吉不受食戒中有決意失受及遇緣失受等殘宿戒亦明殘宿罪已上六罪由決意失受及遇緣觸失本受不重加法故有此罪也第二問答意可知三云問至輕者且約時藥七罪若非時漿坐飲但五罪無二煑也若變生或具七日藥至八日服更加犯捨捉盡形藥作法加者病差後但得一吉若不加法者亦同時藥問前明非時受不成今何故云淨人過受免不受罪答前約持戒午後不食故受不成今約嗔等者受亦成故免於罪犯也上來內資辨四藥篇已竟今當辨所受外器中分二牒初牒篇言鉢器至附者來意玄云上明累形須蔽法式已彰次辨段食竟靈廣論受淨既曉所盛之藥須有能盛之器故次明也釋名者若具足梵名鉢多羅此曰應器今但云鉢存略梵也又解鉢是道具之別名器是盛貯之通號鉢准正畜立次制名餘約緣開故加德稱篇如常解注文者金木水火土此五是造眾具之本人所流用故號為行此五攝盡調度即是作具總號濟形所須故云養生附此聽門而出也依篇釋中分二初總意二開章釋初言養至後者養育生靈所須不少故云眾具殷盛也湊聚也繁多也隨報開聽者謂隨上根畜一鉢中器十六枚器一切所須皆是隨報開聽意在事資希於道立在緣廣被者謂資道之緣廣被末代法據有准者而所作法體量色受用加法皆處制聽之教一一有憑准也違則斯制者若於教有違斯由此也即此制與罪犯則無赦者若有所犯此犯終無赦免之斯不類俗中遭赦得脫其罪必須洗滌方應清淨故既混其體貌者混乱也體即本合泥鉄而成今用漆木銅石等其㒵本合如孔青黑等色今用素丸白䥫等豈非體之與㒵相雜混乱也故分條格者故者因由上來混雜繁乱致分別制聽兩種條流使其格正略言來意者結前也別舒如後即生下制聽二文之意如下對文自辨已上四菓篇竟釋南山行事鈔記盡諸雜要行竟次下第三器篇分二初標名二依篇釋言至附者先來意前明累形須敝法式已彰後辨段食竟靈次明四藥既有所盛之食理有能盛之器故於罪四藥之後有此器篇來釋云者梵語多羅此云器應器皆存略名是道具之別名器乃盛貯之通號准正畜故云制名餘後緣開故加聽號即下法附是開聽也篇等可知云云若依輕重儀釋是制教器屬聽門尊如彼述言五行者金木水火土造眾具之本人所流用故號為行如此五名通釋萬物故附此篇後二依篇釋中初總意言養至後者養育生靈資身所須不一故云眾具殷盛也湊聚也謂其物盛聚數曰繁雜即多名也隨報開聽者隨上中下根報有殊也如上根唯一中根許十六枚器下一切開畜意在事資望其道立也雖在緣等者雖在資道之緣廣被末代然其所作須具三如受用加持須憑教典故云法據有准也違則斯制者謂若有違此教則制之與罪犯則無赦者既有違犯終無赦免之期不同俗中有過之徒天恩放赦則免罪也既混其體㒵者混亂也體合土䥫今乃漆木金銀等㒵謂也㒵合是孔咽鴿色或黑或青今乃掍鋧素瓦之非豈無雜亂也故分制聽二種條流使其格正此且略明下文廣述次開章中二初分章如文次牒等如文言初至器者出家人器等者遠大師云袈裟無領非朝宗之服盃無足非廊廟之器故知非所宜也標法志標表示也認也知是佛弟子故外道所無資生無有因者謂持乞食以資身命無有莊因店肆興販為養生因故見論云乞食者皆是善人之行捨家學道弃因業俗務而行乞食資生無有也四海以為家居家者以隨到處即止住無繫戀心乞食資形乞法資神故故號比丘云云二辨體中言二至之者有要有二者寶云准律雜法中聽畜六種鉢即䥫鉢蘇摩鉢憂伽羅鉢憂伽賖鉢黑鉢赤鉢成六也此總而言不出二種一䥫二瓦故云大要故業疏云雜寶為器濫在家人木鉢外道石鉢唯佛比丘俱離但用泥䥫由離諸濫省事易得也佛自作鉢坏以為後式者五分云佛在蘇摩國自作鉢坏令窰師燒開𥧄口窺視之皆是成其金鉢窰師怖懼自作念云此是沙門神力若王聞知謂我多有金寶遂將埋之有記云佛言王若知者謂我能作金鉢遂令窰師埋藏也未詳云云次又作一𥧄燒成銀鉢亦生怖畏如上埋之後作燒成䥫鉢色青如閻浮樹送上比丘不敢受佛言此名如法令比丘用之故佛言從今已後聽畜三種鉢泥鉢及蘇摩鉢也表云蘇摩是國名約鉢即鐵鉢但在彼燒成故名蘇摩鉢從處標目也打成者若蘇摩即燒成元亦但是一鉢十誦木石等鉢四分亦爾者准四分雜法聚瓶沙王施僧木鉢比丘白佛言不得畜此外道法若畜如法治次以石鉢施佛佛言此是如來法不應畜若畜得偷蘭金銀瑠璃雜寶等鉢並云不得畜畜即如法治也五分木者是栴檀木佛言此外道彯詰畜得偷蘭謂能受膩等問諸非法故不開畜石既如法佛尚自畜自受如四天王所獻四合為一而用何故比丘畜得罪耶答佛畜者准智論說一是四王四山頭自然而生二此石細滑三如來乳哺力強歒百香象不以為重今若開比丘畜者既無自然必須求作妨癈道業又石麤受膩及無力能持却生疲惱故不許也又問其時四王所獻四何故合為一耶答若受此不受彼恐違平等之心又若俱受四以無多用故累於左手之中重重而着右手按之合成一表利濟無私准見論賈人施時無受所以四天王献也綊紵者脫空布漆所作也掍瓦者以石磨瓦上用土脂掍使燒更不薰瓷者今瓷瓦器是也三辨色中言三至同者僧祇有三種色二如抄文三如迦陵伽鳥色即赤色也如鴿即灰青色孔明即項上深碧色也素瓦者即今瓦器白䥫掍鋧堅硯反燒成後入火中鋧令牢而不熏似今䥫作家鋧物也但掍不磨者凡作先須磨上簾土次掍後方入籠熏今不先磨但掍便薰也善見下明熏遍數多少四分明作法先作爐種種泥塗以杏子麻子泥褁以灰平地作熏場安友以於上爐覆上灰壅四邊令堅次以巨摩壅四邊燒之等言入籠者籠也以䥫作內安竟以籠籠內塗麻油以牛糞火燒之得內油烟上上也四辨量中言四至舛者先依四分注中因增法名者筭經云量以起於粟六粟為圭玄記云十粟為圭恐錯十圭為抄十抄為撮十撮為勺十勺為合十合為舛十舛為斗十斗為斛故曰因增之法准唐斗者十舛大斗計與小斗三斗其義不殊也言十誦至舛者斗量同四分者彼律更有他之言而不辨他大小也注准僧祇四舛者玄云若計此律下似大除餘可食物亦有六舛雖此注之簡除不取但引多論解之有記中云祇下有八舛故成大也言薩至造者謂彼論師多有異說解判然論中自以一義為正謂他受十五兩飯寶云十五兩是西五秤也秦秤三十兩者玄云是姬周所用秤也天竺粳米釜飯者似今埯飯也簡非北地水漬粟米濕飯故彼論第五云鉢有三種上者受三他飯一他羮餘可食半下者受一他飯半他羮餘可半食物上下中間是名中若過若滅不名為也時人共議者西土人也三盋他飯可秦斗二斗下今師計會也三他飯可秦斗二斗一他羮飯可食物半半他也此一他半又是一斗即上受秦斗三斗律師云無餘可食物者多論云律師作此斷也直言上鉢受三飯一他羮更無餘可食物是留食上空處也令指不觸着飯中下二可以准知亦是除餘食物但令食上空處令指不觸也玄曰文中餘可食物者應是蔬等類也問四分自有三品量即當部自是何須更引十多答當部雖有正文然諸部大小不定古人多引通文隨其大小通得故今師廣引十四多母等教和會取多分為限皆是三斗一斗半為量又約人有三品食量不同應彼根機方名應器故重引他部也見一肆上等者亦是論文圓如珠三分除一又如鳥卵三分去一彼羅漢律師皆知此緣起如文明也言毗至持者雖無一指者諸部不同也五分上三他飯除羮菜下受一他飯除羮菜十多母等如上已明也言通減者謂量復而食之言通於增減若論量須依正文非法長者不須說淨唯一不用受持以不合畜故言五至也者注四分無文者羯磨疏云以覺明論主誦本東傳至於番時隨出便寫責成部袂無暇覆疎尋復返西故多缺也余問于闐國僧彼既大弘四分何以律無論諸受受日等持法答此無但脫略耳已上疏文受法詞句如文善見下明心念受注文似獨住比丘者破古也古云是無不不說淨人有長更互受捨如衣法今注但為無人對故令捨故受新即是恒常說淨之者問復有人要重加法否答直爾心念永成以是嚴制故不同長衣是聽教許開十日得人今無人且權心念後若有人仍須再說此是制教纔得不持即犯故許獨許受得成也獨六失法言六至受者如文次問答中亦如文又准疏中問曰若有二俱未加法何者犯長答前來者不犯以約鉢是制收令受持故後得是長合淨施故今若不說即名犯也若一時得者好不犯惡者若無好惡隨一不用者犯長也七行護法言七至罪者歠粥器者謂口向食呼吸曰歠器即淺闊䥫瓦鉢也文中苦字去聲呼音庫患也有抄中段作若字非也踞蹲也僂身亦得簡其直立正三洗者以是皂莢汁或水三遍洗之律出即肥膩也言四分至色者准玄記科為二初明守護法二四分下雜辨非法初又分二初正明守護二引祇證足令破者謂所安處但使得破便不合也惡心破蘭者輕果蘭二人悔也好心者為他洗悞破故無犯不得纏四邊若口纏邊應留一分孔多開總漫也俠和頰反口向外道者一解云不得礙肘此非釋也二云以比丘口向外倒地緣損身骨折因制不許也覆壁上者如北地用墻作壁析梁之邊墻頭長一尺許於此空處不得安處以危險故二聽一牒如文言四至也者十六枚器二釜大小也四分瓦觸淨上下用二瓶一在房內一在房外盖兩个盖釜兩个盖瓶四物四瓫各有用一物此之十六居須說淨僧得直畜排囊者囊鑰得風也錯者此人所呼南人言鑪也器者規車也銅作家轉軸裁器也火術者謂出火具通名火子律云須鑽火子聽作等大義須者鈔意若斗半已上三斗已下應量大義須說淨今律既云不作淨施應是三斗已上過量大聽畜用不許說淨受持若是應量不令非用理須須施恐人濫將應量大不說淨故此簡之云云言四至秤者約能所作器用之輦天子所乘也自秦已前輦舉不分並一名也秦李斯分二天子所乘名輦若施僧得畜如晉恒帝施已違大師至今由存等云云輦轅者舉是人擔之輦有轅人牽也除牸牛草馬者此據比丘說也皮繩生虫髮繩法也裂疊即雜帛為之捉麈尾者鹿之大者曰塵犯墮者為損虫命故也毛𣭱所交反鞭頭𣭱也㓟刀開瘡用銚徒帛反無足上有銅襻土釜者即耳鍋玄云合藥用之以赤膠泥以赤馬尾剉之合丹用也及三種瓶亦是銅䥫土也簁所綺反蘿也瑠璃椑者以其滑故故能治眼膜也灌鼻筒者以蘇等藥置筒中而注鼻中也烟筒者燈籠上引烟出也把步苽反用犯火也澍水筒者引水入瓫釜中也供澡槃者洗手面承水槃也餘如文言四分至之者明養生物䥫箸者桃燈杖也䥫炷者以䥫為棬上安鵶觜用秉燈心免燒燈盞也若生壞者謂刀生秀也毳者細毛衣也劫貝者樹花衣也亦云草花織成衣撈力到反破土用之江東呼為把山東名撈關內名磨空中杖律云比丘執空杖外道故刀釰於內白王比丘有惡意王檢得煞比丘故佛制也鹽𣫍合是匲字底平如函也木欓他朗反有記中作樘字他朗反竹器短於桶相也𠨬音移說文云圓器也受四舛已匙也言增一至之者引他部明造浴室初引增一明功德次引十誦明處所僧祇下明揩磨法毗尼母下上座誡勑法如文禪杖者准祇三十五諸比丘坐禪互睡佛言從今已後應行禪杖法用以若𥯤長八肘令下座執己巡行有睡者不得卒喚應柱令覺覺已杖將付之彼受得已亦執巡行亦如前法也禪毱者如毛毬遙擲睡者令覺准十誦五法一為怜愍二不為惱他三為睡四頭倚壁五舒脚禪鎮者如笏在頂上作孔施紉串耳上昏睡時即墮地佛言一墮聽舒一足二墮申二足三墮應起經行骨人論云更與骨人令觀觀行也好師好照者自能入其正觀物我一如名好師令如此師好教照弟子名好照也繩籤七亷反釘橛也欄楯者縱曰欄橫為楯若通言之皆邊作者皆名欄楯也言增一至住者明作房法也招提僧施者為四方僧作來住者施主自供須也治寺門者彼律云佛在阿羅毗國見寺一楣損問阿難一楣壞何不修阿難云木師任運不得作佛令阿難求作具來佛自手修治修治已語比丘從今聽畜一切木作具比丘自修治之四分不得同者房舍法中不得作男女合像同祇文也不應文繡裝校者謂不得盡作文繡綵也雜含獸文也盡作龍虵丘馬等像也不起還僧地者以在僧地上造房有客來應避與住不合永占僧祇入己故白二與之者一別與僧治房一則與白衣令治意云先須和僧方與皆題云某甲房者以多施主為僧造房故題記之不得奪一與一者但隨其位者供給不得隨情與奪也一時住者一年有時一時即四月也上來多段不同總是盋器篇竟第四對施篇文二初牒名次釋言對至二十者初來意上衣食事足房舍器周實得資形以修道業若受納乖式即箸趣遄流故對資緣應須作觀故次辨也釋名能受名對所與名施因施作觀故號興治篇已下如常說依篇釋中初篇序總意言夫至也者明受施知足也福出淨由者寶云夫有漏福假二種田一悲二敬悲謂悲慜如國家置養病坊等云云二敬田即聲聞四果下至凡夫出家五眾嚴持戒品之者敬心供養即生其福如世良美之田能生嘉苗等今淨田是斯意也道起小欲者修行之人於此淨田專心慇重傾財惠施也玄云經說輕心有施但感邊地之福故唯少唯節者受施之人知前施物難消唯自節量𡞞少而受也多供無猒者明作福合如此也少受等者明受施之人理合順教信行者起深信心依佛四依少欲之教也故莊嚴論云若能展手施此手名嚴勝受者能縮手嚴勝復過彼言但至裁者傷不知足之非也善應於法者護持禁戒常起言三善行心應於清淨沙門教法則能施犯獲福可受能消不為施墮名無瑕也必於事下規者規摸寄由托也內空腐爛外現臰淨之人於施不消反成過罪使福兩道規成無所托如能下省音省律云食知止足亦不貪味以養其身亦不貢高憍慢趣得支身令無過患使得修行故苦消滅新苦不生無有增減有力無事已上律文從食知足文身明有力從令無下明無事也道緣義立者衣食是修道之緣行從此生者既得此資緣三業道行因而生也何者下微上意也情着者謂情懷之樂着即起心自節者若自節約即無染着也非味起迷者如菖蒲雖臭周文王以為美饍出呂氏春秋瘡痂極穢劉邕貪之謂劉邕為南康令典吏二百餘人不論有過無𠎝每日鞭打責瘡痂供饌出洗約宋書中也美饍生猒者古未高僧凡所食物皆以水添不貪其味即美膳生猒也方寸者心之異名沇墜昇勝皆由心也不思時緣者時即日夜六百三十八萬剎那念念衰謝如是之時為身遷變之緣何不思審脫漏者脫去也漏落也教判入於天三途是深網也謂貪心受畜之人身命終必落於此無出期也言然受至焉者愛渴等者如海吞於萬流其海終不言滿也裁之以法者裁量以無染之法也何患而不息九流者漢土云一道流陳堯舜之德也二儒流明五常之教也三名流正萬物之名也四法流明賞罰等法也五墨流明祭記等事六縱橫流有詞辨言說等七陰陽流明九宮八卦等八農流田夫等九雜流於前雜雜解也子俗者黃老慧文莊列等是尚鄙耻衣食者書云子展食不貳味居不重席家語云晏子一狐裘以終三十載論語憲問耻有道糓無道糓耻糓祿也韻因單食瓢飲等又荷衣蓋形不多事朱紫松為食不事甘膳俗子尚然呪於釋侶也餘文可委開章中標如文言初至受者盜用者破戒之人財法並亡今受施物即是盜也負債用者身雖有戒若受他施應先作念衣為障暑慙耻食為飢渴疾病而受若不作者名負債也親有困者謂七學人受施如子用父物故云親友也玄云三果四向為七學人不取諸記釋也主用者羅漢之人三界或盡方堪應供如己不異名主用也二俱為施墮者施破戒人不消即墜惡道能施得福微少不免輪迴還墮三惡或可知他無德施他今也墜因施物故施主亦有𠎝也若淨僧得成佛福是無漏當生有佛之世不溺三塗故矣云施不淨田果報減少或可無報也智論四句一施者淨受者不淨二施者不淨受淨三俱淨四俱不淨唯第三句名檀波羅蜜也不合受者如寶梁經受持或人禮得八輕法等如抄下云云二猒治方便牒如文言大至也者先引大集明作觀興猒止欲起之貪因先衣次食後舍如文若能下明益謂能觀四大五蘊俱空便獲人空即成阿羅漢田有法報未除或依大我觀外既空能觀內心得四如實智法也言四至就者立願增修遮未生之苦果准律增文佛在抅薩羅國與諸比丘遊行具大火聚熾燃問諸比丘見不可觸之不若有捉剎利等女禮橫於此二事何者為善比丘云能觸女人為善佛言能觸此火現壞身免於來業云云文中却有六段從何以故下總明其意也夫出家者人求沙門果若能持戒必獲四果故云亦得成就佛說此時六十比丘沸面從面門出六十比丘還家六十比丘得解脫果等言若明至之者明報也僧護是西土僧商人情入海未至寶處龍從海出從商人索之云若不見與即便沈沒商人作念為護一家寧捨一人為護一村寧捨一家為護一國寧捨一村為護己身寧捨財寶念已及放僧護入水龍宮將至宮令教四舍一閇目受有見毒故一皆面受有氣毒故一遠坐受有觸毒故一嘿然受百聲毒故教已送出遇商人迴時却還船上後於陸路行至於宿處明旦商人同發僧護趁之不及乃目遊行至一山間聞獲揵搥聲問人云有伽藍開浴集儒僧眾遂尋聲往彼見其浴具一切如常彼僧入中皆成猛火恠而問之彼曰南閻浮提人難信可歸問佛因乃出來又入處凡經五十六所云云此皆人間孤獨地獄受苦之處並迦葉佛時多用俗水睡污僧地壁上釘橛等今受斯報也言三至說者如文四觀食法牒如文言然至也者立意也彼世隨情者施者隨遂人情於我好者與之非捨慳意受者順己貪心無有猒足縱逸任性偏約受人明之賢聖問非者非法求施施非法求聖人皆非此二也引證如文利養等同者衣食房藥四事同是利養發有希數者衣一作數年藥有病方服房舍一修卒於一世是是希食每日常須為數受之既數整理循無貪觀法亦難操志也謂改其貪求之志莫令味着貪若起貪故固世鄙俗無別成論者玄云彼論明受生者隨貪愛心生所以得知如現見眾生多生廁中不生盤石等當知貪着香味等於中生也問地獄中既無人貪應不合生答眾生以癈力故顛倒心生命將終時逢見地獄謂是花池以貪着故則生其中如經說若人渴死生水虫中若凍死無生熱地獄若熱死者生寒氷地獄若貪婬欲生鳥中食欲者屎虫中也言今至之者明了論但明後二觀故論疏云出家人受食竟欲食時要先觀食後方得噉觀有三種一應離觀即此第二正事觀同此第四門三正事功德觀同此第五門餘二論但義論引智母二論明之言一至之者私音云𧞤和郭反蹂耳由反踐者引祇遺落食戒俗呵云謂言此食無錢作耶我奪妻子之分為福故施等云云言二至食者無三業者玄云坐禪是心業誦經是口業營事即身業若無上三即非三業如上律文者上引四分云內空腐爛等云云言三至知者不許於他者身心既壯我慢貢高不以他人為好也不分心眼者謂不好不惡食起中庸心生其癡捨不起貪着又不生嗔名不分心眼也初貪重並入地獄者玄云對上四過為並不同下二墮鬼畜也生三善道者天人修羅也生諸天中者玄記云生欲界諸天也下二可知者無嗔生色界無癡生無色界恐此釋似局也古來釋云無貪生三界諸天無嗔生人無痴生修羅也以六道相對前三是善道後三是惡道故思之言四至味者謂種蒲闇尼名為正事能療飢渴名良藥也問正事須觀餘者云何答玄云文中且據正食以論亦臨事興觀何不須他也若爾餘非正食詞句如何答若花果細磨即云不正良藥粥即云此粥良藥或但言不叵亦得非時即云非時良藥七日等例然又文偏約食論理實一切皆須作觀或有釋云不論正食非正食非時七日皆通云正事良藥以簡四邪五邪所得名正事皆能療病多良藥也此亦自是一途之意初喻膏去呼車但恐難轉不簡美惡次喻食子必無貪味言五至著者不除我倒者佛為持世菩薩說五陰之法是滅虗妄令觀修出世法若人貪著非我弟子乃至如此人我亦不聽受一杯之水等佛藏亦爾者彼云佛告舍利弗若有人說我人眾生假名乃至少法計有得者皆違逆佛並入邪見外道非佛弟子我不聽受一杯之水等故云亦爾五隨名治牒如文言花至說者為法供養者謂法身菩薩能將一食普霑一切皆得飢飽足今凡夫雖未有實食散施聖賢且將一之飯運心通供養諸佛等作斯供養時名為法供養如是之人志在佛道故謂遮簡不求人天上福意存涅槃也淨名經云以一食施佛及眾賢聖然後乃食與此無殊不同諸家約了心性空以釋也餘如下說者部請中明受食法先飡受飯後受羮菓合和而食等言四至奪雜寶藏云佛在時有一國王名為惡生為事暴惡邪見熾盛無人能化佛遣迦栴延往化以迦栴延是彼婆羅門國種故使還化彼國其人到國纔見王王便欲煞迦栴延曰我有所𠎝而便見煞王曰汝剃頭人見為不吉迦栴延曰不吉在於我身不在王也何以故王雖見我都無損減我見於王王欲煞之即知不吉在我悟王依其言刀放遂蜜遣二人尋逐見其乞食得已於樹下坐將食分與二人已後食殘者寫着河中使人報王王令人與麤食遣人問云得適意否答曰食之勢力便以饒足後遣與上味細食問之亦如前答後王喚來自問我所設食不問麤細皆然饒足此事如何迦栴延曰夫身口者如竈栴檀糞穢皆燒身口亦爾無論麤細飽足為限即說偈等云云後王又將二食試外道便生嗔喜王乃於迦栴延生信不依外道法也中含下於受生位求活命中極下至邊謂行乞食經洛須菩提迦葉等為族姓子猶捨富榮而行乞食極是下事彼經云若比丘不能如是者則持戒極寬懈怠失念不修沙門行如以墨洗墨以血洗血以垢濁塗垢濁轉增其穢從冥入暗等云云隨得隨失者隨一口得一口失者謂食若好即為貪奪食麤嗔為奪處中為痴奪難得不失也上來諸段不同總當對施與治篇竟第五頭陀篇文二初牒名次釋言頭至二十一者來意者上之對食與觀離染為先依教進修頭陀為上故次辨之釋名者梵語頭陀此云科棟科棟煩惱故施造名行合法名儀篇下如常解云云依篇釋中二今分初總意言夫至云云者謂異熟果報之力若堅強則能修上行內能起智斷惑外能嚴淨尸羅故名清潔也故能高超眾累也者如中下根人須百一長財房舍臥具多生罪累今行頭陀之勝行依佛四依免此過𠎝即是逈超眾累之上竦拔不群者外既於戒無犯依聖人之行便引定慧斷惑證真不同常類也盛稱斯德者謂釋迦出世一期化儀皆是大眾之中讚述頭陀之德行凡所制並為多貪者如律結戒皆為六群等跡貪於財色而制先揚此行者佛凡於一處說法皆歎少欲為先即十二頭陀行也欲使下兩句記玄記重釋上來凡開教中先揚此行意欲誘進疲極意墮之人未得佛果菩提皆名為客自念佛道長遠擬欲退還念令其勵志修行趣首慢嚴之大定如三百由旬權設化城引彼疲從令歸寶所故筞染塵下兩句重釋上凡所制者並為多貪也欲進筞染着六塵之凡夫令其作觀對治離於貪著即能高登尸羅之階陛也引證中而聽餘事者或欲入塔寺看病聽法等緣要捨頭陀之行皆聽許之不同外人一向制也次開章釋中二初如文言善至陀者謂頭陀是總名十二是別行漢無正譯約義翻為抖擻謂抖擻煩惱者又唐三藏云西梵本音杜多此云搖動亦云洗浣即搖動滯著洗浣三毒等義也復有釋云小乘頭陀抖擻房臥具等大乘頭陀抖擻煩惱也如諸經說之三界六入一一別論者欲色無色三也色聲香味觸法為六也六根為能入六境為所入如於上妙好色起貪中色起痴下色起嗔餘五皆爾即成十八一界十八三界計都五十四故曰別論如此皆應離著不取不捨者具智慧故不盡有為名不捨大慈悲故不住無為名不取知諸法空熾然而不修不此空為證名不著能如是證入即能為人宣說故云以人能說頭陀也次頭德言增一至中者若毀議頭陀同佛無別似佛常讚故頭陀依戒行即令法久住失頭陁者既毀戒不能抖擻違佛制故名逆非我滅者非是如來滅此行佛佛皆作此說不獨釋迦不得入清淨頭陁眾華手經等者彼云迦葉在事提可山帝釋石室與五百比丘俱止其中皆行十二頭陁等行大迦葉於石室中忽然不現來至佛所世尊遙見告諸比丘汝等觀大迦葉此人常行阿練若行佛命善來就此半座佛移身時大千振動迦葉合掌白言我是弟子不敢從命也雜含等者佛在耆園諸比丘見迦葉未起慢佛知心念即告善來迦葉於此半座誰先汝者諸比丘恐怖更相告言奇哉尊者有於大德力等四分等者衣法云時世尊在舍衛住處多比丘等佛告比丘我欲三月靜坐思惟無令外人入唯除一供養人時諸比丘自立制限佛三月靜坐不許外人入來若有違者作提懺也時有長老和先與六十比丘盡是阿練若乞食十二頭陁等來詣精舍欲得禮佛諸人具述上事云云和先不順其制云我是阿蘭若隨意問訊供養遂往見佛佛慰問已先云和先汝等盡是阿練若持三衣等聽隨意問訊正是供養人也善見云所以佛三月中靜坐者以遍觀有情於三月中無得道者是以靜坐不說法也十住等者彼明練若比丘樂靜有十利不應捨此行也若有因緣等者聽入塔寺不同外道一制無開不許入城常居蘭若有十緣聽捨一供給病人二為病人求藥三為病者求看病人四為病人說法五為餘人說法六聽教化七為供養大德八為供給聖眾九為讀誦經十教他讀誦經有上諸緣佛聽至入塔寺也言頭陁至行者辨通局也玄云料簡也暄即城邑靜謂山間可知二列數明躰牒文如文言初至坐者先衣者納衣為對着檀越施衣人三衣對畜長衣者次食中乞食對食僧食人不作餘食法對作法人一坐食大小二食人一揣食對多受食人三處者蘭若塚間對聚落居人樹下露坐對畜房舍人隨坐對用畜臥具人若草若石等並是助緣者是坐威儀之緣緣一正是其行佛坐菩提樹下等次列釋十二中第一言初至身者此上行之人着之表云只唯一細又不揲相唯前文中若入聚落便施鈎欄也迦葉為初迄今無墜問此與第二三衣何別答淮南云即將割截三衣併為一納貴輕𡞝故今謂不然三衣對畜長衣人納衣對著檀越施故若將三衣合為一納者即違教文也乾素云三衣各成一納乃至五條亦是納作若爾與下三衣何別答下是割截此納有殊又下是檀越施衣此是糞掃衣也今恐不然未曾見有納衣各為一也如迦葉但是一衣若總畜三即是重滯雖有此數難以依承也今但據前科以言之納衣是此科三衣屬後科也思之四分捨檀越施物難消収十世人所辨也一慙愧者慙檀越衣難消故捨愧糞掃衣無事故着猒離心者猒名衣染此服不貪好故隨順寂滅者心不動搖是寂滅法今納衣賤物不起貪心即心不動也非為熾然者不着外境故有惡易見者遺教經云當自摩頭以捨飾好着壞色衣執持應器以乞自活自見如是若起憍慢當疾滅之當精行道者着此衣非懈怠也周那沙彌等者彼經下卷糞掃衣品云佛告迦葉若有比丘着糞衣無所貪着能離慢心能捨重擔以知足故諸天常樂欲見釋梵四天合掌作禮況餘小天佛告周那沙彌捨不淨糞掃衣至阿耨池洗諸天皆遶作禮取其浣汁自沐浴身以知其人持戒禪定有智慧威德也表云周那羅漢也今云沙彌是果中談因洗衣之時已受戒了非謂沙彌羅漢思之須䟦陀梵志着好色衣欲至阿耨池諸天四面遮止不許近池恐污池水是故迦葉誰問此事於聖法中不動修學言二至行者細戒行者不以諸長物令此人為犯戒故餘文可知言三至法者乞食三世諸佛皆同又得死飢長迫又福利施主兼倣効聖人規模也薩婆多下明受僧食之過急不安者看他顏色取他意故但恐停厨云云受檀越下明受俗請之過可解又眾食下結乞食益隨處乞求無有窮盡表云眾者諸也亦不局僧食為眾知之言四至也者示乞食相也第一一即第一家乃至第七家也玄云然乞食之於諸教不同若依五分或至一家得食足者善若不足許至餘家足即止也今文中至第一相一至第七一相似至第七家為足也先敢熟者謂熟藏在下生藏在上也不屬他者自乞而活命故令住三寶者令住三寶境界中不為邪魔可惑也當生悲心者能拔苦救一切故易滿易養者食知止足即易滿不擇善惡即易養無見頂善根者頂者極頭之義也由行乞食捨我慢故後成道得無見頂相此相因乞食而生故號善根表云如無邊身菩薩聞釋迦長丈六乃運通來看頂相及至到來了不可得見其頂也此且約報以釋玄記或約法身解恐疎也不與男女者明受請有此過也分衛者寶云若梵云邠茶夜或賓伽耶此云乞食也今云分衛者分破眾人口分分衛護於我一身令修道有益故或依僧祗明乞得食已轉施僧尼即分我已分衛護他身故云分衛也云僧至忘智論因說不寐夜長等者論云佛成道後父王令五百人隨佛出家初至舍婆提城令身子目連教之初夜後夜精勤皆得道果後佛將還本國住迦毘羅城五十里是舊云遊翫之處修行時初夜後不睡以夜為長今往來乞食以路為長佛因為非說法路反夜長思疲頓故愚生死長者有一婆羅門至佛所佛言此人毘婆尸佛時曾見佛說法時大眾貪聞法故不共語言便罵辱僧云畜生無別由於九十一劫墮師子中此人爾時應得道果以愚痴故致生死遠長也增一云目連被執杖梵志團打還至精舍見舍利弗具述前事舍利弗問云汝其時何不現通避之目連答云我本造行極為深重要當受執也舍利弗先入滅為患重也謂目連當初擬先入滅舍利弗告云汝且小停先不滅為順過去諸佛上足弟子常住皆先涅槃遂往辞佛歸於本村滅度以其舍利弗為風病絕患重故諸天墮淚者問無色有情因何有淚答准大乘雖無麁色而有細色若准婆沙無業果色而有定果色從定而起色身有淚但斷總報者修苦至忍位便免地獄總報今目連即受別報明今乞食是佛勝行不得辞勞若嫌即是嫌法同彼愚痴輩也言四至等者小食是粥中食即業後食即餘食池也養馬要力養猪要肉今不同之言五至人者十住婆沙論云更不復食者文勢似約處不重受若捨此處札餘處更受即乖一坐食也准下十利中云無求第二食疲苦即別處亦不許再食也又三千云不得數數食等可為證也無求第二食疲苦者若食小食即要求第二食人一坐便止故無求第二食也無有所用疲苦者既一度受食無有所用食器數珠疲苦也食前無疲苦者謂一坐食未食之前無有求不食等疲苦細戒行者若數食與俗不殊名為麁行今一坐食便止名細行也餘如文言六至許者謂和合一處斟量得足方食盡廿標者即斟量取足也廣有對治者糞掃對治居士施衣三衣對治畜長衣者乞食對治受他請者節量對治貪恣也樹下坐對治住房舍塚間坐對治餘勝處常坐對治眠睡者如經說者玄云智論自指不出經名於秦人可十口者謂彼是乾釜飯此是溫飯半是水故彼五六當此十口計引此足之次水釋成上文斟量取足更不受益也言七至等者蘭若處也若千里者玄記云一弓四肘肘長尺八四八三十二此一弓成七尺二寸十弓有七丈二尺以步法步之一步六尺十步六丈二六十二一丈二尺又得兩步足前成十二步十弓十二步百弓一百二十步五百弓成六百步為一里則成一里二百四十步也有記中筭云一弓四肘七尺二寸百百弓成三千六百尺合成六百步即成二里也云云虎吼者佛在舍衛有虎食鹿肉殘比丘収得虎來尋之遶祇桓吼叫因制不得取虎殘也引此證在城外十誦云去城三里餘僧衣二蘭若僧界無難五里衣界如隨相護衣戒中明之餘如文言八至畏者隨順猒離心者本猒世間不可樂想今既在死人中住隨順此心也離一切所愛人即六親等又在塚間常悲一切悉皆歸此此心常得也在塚間常起悲心有何戲調又見死屍骨肉狼藉臰穢故心常猒離此不淨身也又怖畏之中無過於死今能塚間更有何怖也言九至等者如佛生時等者生在無憂樹下成道菩提樹下轉法輪吉祥樹下入滅娑羅樹下論者亦是十住論也十利者一房舍二臥具三所愛四受用疲苦及隨四依樹下是四中第三也九易得無過隨即生也十無眾閙者不同房舍有多人住故言十至住者初引智論明露坐空易成可知增一下爾所空之法昔有比丘持鉢乞食女人送食二皆染心比丘受食欲心平振棄食鉢外女人見笑中齒露比丘見已憶念佛言人身有若干骨等如文中述之因茲證果又為女說法亦得道果言論至云云者引證也少調戲者樹下猶聚人共相戲調露地反此七不得音聲荊棘所㓨者多聚眾鳥及風飄樹皆有音聲壞人耳根如棘㓨今在露地無此過也無眾閙行處者人行依道此露地非行處也大畏林者亦名恐畏林亦云寒亦號屍陁林林在王城西北十里來人死皆送此處也言十一至用者有人解云入眾之時隨得位便坐不簡夏臈大小如下文云隨得坐處不令他起又云不惱上座不令下生愁惱也表不許此解大小二乘並依夏臈坐如梵網經等若言不依次第隨處便坐豈名頭陁故名不可也今但約隨得房舍便止住隨作臥具便坐臥並不擇精麁而以下文無求好精舍住及無求好臥具疲苦文相甚明云云言十二至說者常坐即兩足於交如結名跏趺坐也言十住至席者脇着席苦者久臥却痛苦生今常坐無此苦也不隨身欲者不取自身穩便或縮或申仰覆等也如後說者如沙彌篇辯觀引等三諸部牒如文言毘至前者引六本教久明之嗔後方食者自調嗔心也玄云不作餘食法頭陁唯四分有諸教無餘十一即大同小異今母論無不作餘食法頭陁以此添之亦成十二也中後不飲漿者恐心不專一也更不觀於實理只有緣漿之心今不飲之免茲失矣智論無餘色法亦以此成十二也寶雲經中乞白者玄記云割字呼今作盖子音也十住等者彼有二頭陁異於諸部一着毳衣二食後不受非時飯食飯食者飲即漿食謂七日蘇等藥食也解脫道論加不飲漿同前智論十住也亦有飯食法更添次第乞及不飯漿為十三也言上至之者上依四分諸戒明其十二經論如前所辨依之抖擻頓惱性空即是正行既成心觀顯現即定慧因而立之四雜法中言四至失者初供給同行淨地無草處者寶云迴施餓鬼須在淨地若與畜生須無草處恐不見也無虫水中者若安食着有虫水中恐水壞損虫也有賊來下供賊法也問答有失者五分蘭若比丘別星宿賊寄宿失時故被収獲因制之屏處用火珠者恐賊疑是寶物故善見下明賞勞法也如文上來多段不同總是頭陀篇竟第六僧像篇文二初牒名次依文釋初言至僧附者先來意前明頭陁之儀能修之行已具至於僧像之法所教之境未彰欲使五眾識其尊卑二俗知其趣向又欲繕造須依軌摸前既未明故次辨也釋名者僧存略梵性相具全像者素盡泥龕倣其真跡廣明設禮故彰致敬之名篇如常釋注文可委問像是所依勝僧是能依劣何故先標耶答此不望能依所依勝劣以論但取能弘生善之邊僧為信首也如騰蘭初達現以僧儀馬勝化緣亦是僧於等篇釋中初總意二開章別釋初言法至學者法軌被時景作斯立者法者教法軌謂軌儀被及於正像之時追思如來光景眾生瞻仰因茲教法軌儀而立有釋云遠論起於周代示跡現生而成正覺若明像教即上天圖寫栴檀像以為標准若近明此直即後漢明帝迦竺二尊者傳至此方等今祥之未成通義云云謙恭𣫍敬等者謙難暴推讓曰敬既壞謙恭自然攝𣫍推敬也九疏俗士命名茲敬在於禮章即五常之一也又曲禮云無不敬也自卑曰遜推智曰恪苦各反軌度曰儀既自卑推智故攝𣫍敬儀三乘道人凡所施為皆以敬儀列乎宗始故律序云稽首禮諸佛等云云豈以下倨傲憍慢不存禮敬故曰無知不以形相異儒乖於禮式也良田段下革也明其敬式依教有方能清其身章彼無知之失者故增一下引證涅槃云著自名慚羞他名愧又云羞天曰慚羞人曰愧有此二法能眾生識別尊卑禮樂也言比至誠者傷歎今時禮敬顛倒也謂時遷入像末名之為移人漸倨傲無知故云情淡也禮義云已者於讓曰義今時並失故曰云已也鄙惡也末下也創入佛法觸事不明名為小僧令彼死其僧首主綰提綱故云妄參眾首即如經中王夢獼猴身無威德眾立為王云云眉壽之大德奄就下行者謂耆年宿德眉有長毫謂之秀眉表其壽永奄忽也下行即用靜之處不用其言無指揮之分也央彥者英者美質也俗中說才兼十人曰豪百人曰英千人曰俊萬人曰傑倍萬曰聖彥者美玉也並足秀匙美之嘉名今此小僧但抗此文華以為英彥不依律教處斷是非也故略下明正篇意具依諸教致此一篇以明教相故次開章釋中初開列章一可知二釋中言初至許者先約理事相敬意智論明須菩提在室中行空三昧佛從忉利天下人間時眾喻迎佛彼念言佛常說若人以智慧眼觀佛法身為先見佛又念云此一期盛事悉是無常用此觀之悉知諸法皆空作此念已但在窟不出也蓮華尼等者彼尼心念欲先見佛乃化作轉輪王千子部從眾人見之皆為開路得先見佛却後本身先禮於佛佛告尼言汝非先見我彼須菩提最初見我以觀空故見法身名真供養也准此意云尼取相見佛化身轉王乃是慢心須菩提不取相即離慢也四分下房舍注中佛從王城至毗舍離時六群先到彼得安止處及與和尚等取好房院住後身子目連來皆無住處明旦白佛佛問諸比丘汝謂誰應受第一等如抄明之三鳥獸者佛說此緣昔有三獸共依尼𤘽律陀樹住所謂象獼猴鵽負括反鳥初約身形相敬象大猴次鳥最卑也後相語曰可推手大小憶事多時為長但以此樹為證猴鳥共問象云汝見樹來近遠象云我初到此行樹觸我臍鳥象共問猴云汝見此樹近遠猴曰我憶小時舉手攀及此樹象猴共問鳥云見此樹為得幾時鳥曰我憶昔雪山中食此樹子來此便出生之即知鵽鳥憶事最多於是象載獼猴於頂猴以鳥於肩上人問遊行也寶云准十誦云佛告比丘今時鵽即我身是獼猴舍利弗也象者目連也過去相敬故言大至等者佛初成道時祥河息浪寶樹低枝至於滅時雙林變白等皆感非情也增一云彼經以一比丘向佛舒脚仰睡佛言此人五百世中常作龍身今暫得人身却墮於彼故無敬心於佛也言智論至起云云者三道即三果至凡夫斷惑未盡故餘如文言四至篇者先明不合禮故文無涕涶處者經云佛告迦葉若有比丘非沙門自言沙門非梵行言梵行於此大地乃至無有涕涶之處況舉足去來屈身等次過去大王持此大地與持戒德業人於中行道破戒不消故餘如上篇者如上引四分內空腐爛外現見淨等云云言二至也者無上所列諸緣名無緣即須依次相敬也餘如後說者大小相敬中也相嗔不合禮者恐轉令他嗔故屏處不見眾閙處等不合禮屏處不合禮若聞而不見雖禮前人不見故若見而不聞即口中陳寒暄等前人不聞也著一衣者謂但著涅槃僧也闇中雖不隔障等前人不見亦成屏也已上三十餘緣並不合禮云云言三立敬中牒等如文言若至中者梵云塔婆或云偷婆此云高勝處今言塔者存略名也新云卒都婆者此云高顯處謂封殯舍利處也廟貌也安形像處支提亦是塔廟之異名生處訖法處苦行處等皆置立支提也云云又增一下如文言智至故者正示禮儀口禮即今問訊玄云既云不審理合尊體動止萬福單言不審亦非敬儀寶云如北地人喫茶飯了去云但云謝亦非禮儀也二屈膝者長跪禮名中禮也三頭至地將貴頂頭禮前卑足敬之極故為頂禮如論云頂禮佛足哀世尊也五輪者五者數身有五處也圓滿如輪輪即摧破義推破心中輕慢煩惱也有釋儒宗九拜出自太祝之官一稽手二頓首三振動五凶拜六吉祥七奇八褒九肅拜今此五輪即初拜也又准西域記致敬之式其儀有九一發言慰問二府手示敬三舉高揖四合掌手供五屈膝六長跪七手膝倨地八五輪俱屈九五體投地今當第九也注文不相亂者先下者後起後下者先起智論下六義中具三業尊重是意業恭敬是身業讚歎是口業至佛無盡者至成佛時功德不盡也由智勝者一由佛智勝二由人心智勝為求菩提而施故無盡也言毗尼至禮者寒雪處開靴等即入塔非慢心念佛恩者有將太字在上句者亦通謂三祗劫修行垂六道化導有情令其出離也念經戒者依此能詮求所詮義能識邪正修行故同學恩者謂能互相率勵琢磨有道之益故舍利弗辭佛等者不欲見佛入涅槃故歸本村先入滅也却行者即背前面後退行也二明教相言佛至遵者至真齊觀者表云平聲呼之今作去似順也敬泥像如真不殊也今流俗下辨非也不信法身廓周法界觀其云盡見是非真不生敬意即虧於大節也或在下正明不敬之相也攘臂者玄云攘者却也謂將臂向後却也不正今云攘者宜臂上衣露至肘遍也指聖儀者謂指尊像此好此惡等凡情下若縱任凡情多行非法遵崇聖教免見乖儀也言比至禮者明此土非相也敬人尚自被責者玄云如拜官人身居床上豈不被責耶不正今准表釋謂鈔主遊於魏府彼僧相承床上禮佛鈔主觀此非法意欲改之見彼僧時乃上床上設禮彼遂責及等云云三千下彼經有三自在高處上座下處二座在前在己背後三自在座上禮於座下俱非也言十至盤者代和上禮者謂弟子遊行語云若見彼某人大德等與我設禮其師便禮弟子弟子得受師三拜以表受寄也雖受師禮不失敬儀若准俗中傳拜即不得具受纔一拜了至第二拜初便避之等俗人清結華等者俗使僧為之亦為供養佛故開作大論下證上為利益接引故通許也言僧至滅者越得道及轉法輪二時也過三月已入涅槃者謂魔王是十一月十五日來請佛言待過三月證知定是二月十五日也舍婆提即舍衛城彼三億家見佛聞法三億家但聞有佛名更三億家不聞不見佛在彼處得二十五年由有眾生見聞不等況今遠代何辨定時盖是眾生情慢業重輕機悟非一故准鈔文意只如此已誠斷訖不要別解或有依遠疏云佛卯月八日生寶法師云蓋是建正不定故到二四之別也夏時建寅為正月故二月中卯也因時建子為正月四月為卯也今取此為定也又二月八日成道八月八日轉法輪定者准四分成道後五十六日梵王方請轉法輪經四月調根故又二月十五日涅槃者准涅槃經佛言二月是陽春之月江河盈滿百獸孚乳草木森榮一切眾生多生常相又破此故取二月也又謂二種法身十五日者月無虧盈也上依疏抄錄之何妨便委知云言初至之者敬僧法也亦無有違者若十二十雖成僧立在師前安然大坐不乖敬儀即弟子之僧立奉敬師故為僧設禮等者師若有犯未悔之時普集僧徒皆是弟子和尚禮僧求悔之時即師禮弟子之僧也三大小相敬中牒名可知言毗至第者尊者約相為言位尊於己命者據性為號以慧為命也六塔者第一第二皆云前是小沙彌尼後是小僧沙彌約其所禮境皆合有六有鈔本第二句但云五塔恐是寫錯耳其第三禮四第四禮三第五禮二並如文五百問等者答據文戒矢然其身骨曾加勝妙之法約是所加之處由可致禮還如來生處及得道處起塔供養此可例之言問至也者未具總名雖男女位殊具未圓具戒但約大小也言四至說者約身口明也可知言毗至命者就位別釋約夏分三等如文僧祇下辨比丘同坐法式也勿使動恐乖敬儀非謂防觸失也草地不動搖無不失禮之過也伽論下明與未受具人坐法也既是地敷女無搖動免觸失過故許也薩婆多下明與女連接坐法也但許同一行鋪床非約同床也仍須中間廗槃有異以避嫌疑也餘文可委上來多段不同總是僧像正篇文已竟次造像寺法有二初牒名次釋中云云言初至也者生身說法謂丈六之身或有見聞便獲道果也二為未來者謂涅槃之後或有一類有情等正像末之時一瞻一禮稱歎讀誦一句一偈次種善根至彌勒佛時先蒙度脫故曰超昇離生免受輪轉等言恐至體者先儀也謂佛生後七日摩耶夫人便即命終遷於忉利天上為帝釋夫人也如來成道之後思報母恩乃上天宮為母說法恐母不識還七日嬰孩之相然後却復本體一夏在彼天宮安居說法准此中天一夏人間亦是一夏准造像經云爾時憂填王若准西域記鄔陀衍那王唐言出愛舊云優填王訛也思念如來不已乃情目連運神通力接引三十二工匠以栴檀木於天宮各圖一相如是主三方得相好具足准此番經者不了不合云各圖一相且妙音聲如何圖之不妨將三十二人往於天中以表佛有三十二相未必各圖一相今抄文但云躬將匠工亦不言等躬者親也云云是時如來意說法畢却辭天界還下人間帝釋乃縱神力作三道寶街中黃金右水精左白銀地神作一半接之若准西域記左水精右白銀如來爾時起善法堂履中街而下諸天壅從大梵王執白狒履銀街而右侍天帝釋持寶蓋蹈水精街而侍左天眾凌空散華讚歎時優填王持此刻栴檀像至寶街前其像自行七步以申禮拜世尊慰云教化勞耶又摩頂授記汝於未世間導有情大作佛事等准西域記云此堦是中印度劫彼此他國或云劫毗羅城舊云僧伽舍國今此云寶堦陷沒已盡諸國君王悲慨不遇疊以珍寶於其故基擬借寶堦如真無異三藏親見之有說以塼石擬之者未詳也次注文辨像來處有二初依鈔銷文次准感通傳說初中注文中國僧將來者准栴檀瑞像閣記及隋朝祕書即虞世南奉勅造栴檀瑞像文皆言是羅什將來也謂什是鳩摩羅琰之子琰是西天輔相之子捨榮入道欲將瑞像到於此方路經四國皆被留本至龜茲國中又遭國王見琰端正抑令還俗以妹嫁之事不獲免乃無王命其先將來之像因在龜茲不經歲餘其妻懷妊未產而失患忽甚重垂死之時告妻曰汝後生子若是男可捨出家弘於佛教妻後而生果是男即鳩摩羅什之身也遂令出家聰明多智端正無比明閑教法乃將父在日所賣之像來至長安即當後秦姚興之時也秦有三主一萇二興三泓登位之後南朝宋孝武帝伐破姚泓乃西入咸陽躬親禮敬駕以文軒旋于江左止龍光寺因號龍光瑞像至隋朝移揚州於江北安置淮南有僧智曉秦請歸長樂寺安置後改為開元今指揚州即新揚州上俵抄注釋竟鈔主雖依傳記如此解判然常有疑心以什來秦之時路中值難不少謂前秦府竪差呂光往龜茲迎取羅什及至到此已是後秦呂光便住西凉自為一繞至姚興弘始三秊冬方破得西凉取什歸西凉長安豈能負像至于此地後因冥告方除疑也故感通傳云天人示曰此是宗孝武帝征破扶南獲茲像也彼云佛涅槃後三百年北天竺國有一羅漢名憂樓質多那以神通力加其工力鑿大石山為五龕室請彌勒指授高三百尺若准聖跡記云高八丈唐三藏云高百尺三處所說不定也安置形像第一重安栴檀像二安午頭像三安金像四安玉像五安銅像至佛涅槃後六百秊時有一羅漢名佛奈遮生已母已彼羅漢思報母恩觀母生處知在扶南遂以神力往大間山取栴檀像送往扶南與母供養其母又終生陽州後於新興寺出家為尼獲證三果冥孝感宋孝武帝代破扶南得於瑞像至於陽州龍光寺安置餘如前述天人云非羅什將來或非寫之本即是當初真也言今人至也者釋非也各生奇薄者謂各隨自情出於奇妙不案教也競封世染者爭競封執隨世之情而生染著皆不追本實真儀所以下明西天之像也注文干者感通傳云干是地之長隴為干寺逼長隴之側故曰長干此寺在上元縣准冥祥記說東晉朝第三成帝咸和四年𧙕陵尹高悝苦迴反因下朝從張侯槁過望見浦中五色神光令澇漉得一軀金像可長三尺光足並無乃以所采之車欲載歸宅路經長干寺前過車乃不行加之人力亦無奈何任牛所之便牽入寺後經歲餘有臨海郡人張係世補魚次見有神光迴船漉得一蓮花趺進上成帝帝勅於像所與本製同後五梵僧詣高尸宅云我於天竺得一軀育像欲將來此土路經險阻埋在黃河邊清寧之後求之不見我等五人同得一夢云在江南故來相訪高尸遂與梵僧同至長干像所云云五人因而住此寺常自侍奉像也後經四十二秊至第八簡文帝時有交州合浦珠師董宗之於水中忽見神光乃迴船漉之得一圓光進於簡文帝帝勅送長干像所形合雅製脚趺下有梵字是古梵云無能辨識後有求那三藏云此是阿育王第四女作從晉至陳經于五代皆在至隋朝取長干像并育王舍利入京送興善寺供養傳云每至六業日常放光明眾人皆覩也仿髴入真者謂漢晉兩朝所作之者情亦存如來往日光景瞻仰慇懃猶多靈異今隨下辨今時但隨世作情巧夫真故致偷竊冶鑄也由此像形經教令人生信故曰有諸信首也反自輕侮者比丘覩此像儀自生不敬云何發他善心違皆世出世法者盜經焚經違於王教名背世法如上盜戒當墮地獄有何出期名背出世法也言若至釋者注文近見者即前育王像在興善寺傳云王女自恨容醜乃圖佛形於好異佛還如自身成已發願佛之相好挺特於人如何同我以此苦切彌經歲月乃感佛現忽異昔形父母問之述其所願京師大德以其形醜故在前佛佛殿西北安之明旦却歸前坐初謂是人移改後方委神異云云後有九賊入殿欲盜之不知出處明旦殿僧入見具述本情如文至久觀元年佛殿為火所焚眾人皆見昇空而去也右牙帝釋處者案荼毗經說四牙一在忉利天一為羅剎盜餘二不載根本律亦說四牙一在忉利天一在海龍王宮一在健陀羅國一在揭陵伽國今京都現有五牙者右衛莊嚴寺者宋元徽二年金陵種山定林寺法獻三藏往西求法至于闐已西逢一僧從烏纏國來股中藏一佛牙授與獻得迦毗羅神衛護献將歸此土是齊朝還居定林十五年密自供養後因竟陵五感夢見寺有貴寶因乃出現也梁普通三年有七人乍至寺宣王令云臨川殿下有如逃走於此搜之寺僧住他入殿撿括彼乃禮拜開函取牙而去也至隋朝內史王棟栖破棟於栖霞寺佛頂中取得進上文帝勅令東禪定寺安置今莊嚴寺搜云此本是獻將歸者中間被盜藏佛頂中云云二興福寺一牙文成公主從蕃中附來三崇聖寺一牙澄照大師顯慶五年於京西明寺本院行道趺足墜階神人扶接問之云是南天王下使者捷疾師曰恨生居像季止在邊方不覩如來真身舍利因從請佛牙非人令建道場七日之間果得後付文剛律師大師因居宗聖為上座云云四右衛薦福寺一牙玄宗朝開元年毗那遮三藏將來并菩提葉等五安國寺一牙會昌二年菩提勝三藏從那爛陀寺將來在千福寺後因沙汰牙在義宣坊戴家庿乾符二秊放光因而出現勅送安國寺供養今文中帝釋處牙或被羅剎盜者云云缺盆骨者項下橫骨也善見云佛涅槃後二百三十六秊佛法流通至師子國王信佛法欲起塔庿未有舍利有一羅漢沙彌名修摩那為王往忉利天就帝釋乞得骨舍利歸國其王自持蓋出迎種種供養王弟名無畏與三萬人問出家修道云云增一優填王以午頭栴檀作佛形像高五尺波斯匿王以紫摩金作佛像亦高五尺鈔引斯意以顯遺形所在皆是勝方帝造形像無非真寶表其敬心殷重反斥今之賤薄歎有威靈也次辨造塔法言離心至孝者先且釋名或云浮圖新立卒覩波此云高顯處立塔三意一表人勝二令他信三為報恩也番名等如文中述增一下辨報彼云四事一初起偷婆二補治故寺三僧破已却令和合四請佛轉法輪皆受梵福言梵福者初盡南閻浮提眾生所有功德正可與一輪王功德等也次盡一南州及輪王功德與西瞿耶尼一人功德正等次盡西州不如東弗婆提一人功德盡前三州不如北俱盧一人功德盡前四州人功德不如四天王天一身功德盡四天功德不如忉利天中一天功德盡三十三天不如帝釋功德如是展轉盡六欲天及初禪福不及一梵王之福如上所修四種功德得四梵福鈔文具前二種故云並受梵福也言四分至說者辨形相也准西域記說佛初成道後受長者蜜時為說人天之福初開五戒十善之名諸佛髮爪欲將本國佛為說起塔樣以僧迦胝方牒布下次七條次僧却崎次覆盈後竪錫杖於上也安香華下明供養之式注密跡者善神名也智論云四天王受佛付屬各領鬼神在冥密道中潛護故云密跡也金剛從杵立名也本體是群勇王法意太子之身也搜玄云若約本身是樓至佛化身為力士者非也如前已述金寶器盛之者如舍利弗於本村入滅村人欲供養為用何器白佛佛言以寶器盛之以死後失戒也手輪像者如佛手足中千輻輪形也僧祇下明起塔處中土上東又次東北風多故在風也神州者震旦通名也以賢聖同遊故若局說其中心即洛陽也老君周穆皆登崐崙賢聖同遊多神異故名神州也言善生至別者初通勸贊歎供養自有功德力者謂自身有福德勢力能廣為也若見塔庿下明隨事別名供養之法也蛇鼠孔穴等者雜寶藏云有一比丘遇婆羅門相之却後七日當死其比丘因見伽藍壁有孔乃以泥修補得延壽命七日後不死又但相者恠而問之具述前事意道小小供養修補猶得延命況大改乎云云若人能以下校量勝劣也言無垢至若之寶云鈔引經文北方東圓西半月南人面謂行因似其世之形後生還生彼世界故若准俱舍云西瞿陀尼州其相圓無缺東毗提訶州其相如半月今引經文西半月東正圓者與論云乖違疑翻經家筆悞耳又准經文云若人信佛作人面形塗塔地等供養後生閻浮提命終生三十三天抄文欠此一段也後結云無垢當知此塗塔地教化燒香所有善因果報如是修四梵行者慈悲喜捨四無量心也智論下明香貴物殷重心供養不成犯戒十輪下明破心重感恩非輕如文二造寺法下言有至也者法師即靈裕法師身有德業光世故稱感得或作威解亦得祇桓圖樣者玄云是三藏西域傳記云有十卷說祇陀太子共給孤長者最初造精舍舍利弗為指授之圖樣也寶云大師亦自製一卷圖經并護持迬眾等者兼明教護三衣迬正眾僧之法網等離尼寺者避譏疑者離市傍者恐貪心也府側避涉近宮史令比丘承接等佛殿極令清潔表弟子有尊重心長他人信敬意也趣得事者即自居之處表少欲知足故既尊卑相既尊卑相殊久固不壞也亦有用羯磨法者玄云如結大界護衣淨地戒場等羯磨之法也限外無儀式表相令人知者謂無牓示云此是大界外於攝衣攝食界於此是戒場外相此日即溫室等令他知處今無如此儀式也四故祗桓並有所者謂彼圖中都有六十一院大巷南三門左右二十四院遶佛中院乃外有九院正中佛院內有九十八院內有十八所大小乘三賢十聖各有院宇凡夫三學天龍士母僧尼戒壇醫藥衣服經行痛患無常浴室廁並別立院宇也並有所表者如無常院居西北角日光沒處表剎令迷津者望剎而歸石者表堅固之心不動土者能生萬善功德宇者表遮寒雨露之弊中院蓮池表外道天魔等入中洗除內心之垢池內蓮花表其心淨覺意花開重閣樓臺表三十七品漸登而高出等餘廣如圖述之影覆邪術者准西域記云有一精舍高六十尺中有佛像面東如坐如來在昔於此與諸外道論義次東有天祠量等精舍日且流光天祠之影不蔽精舍日將落照精舍之陰遂覆天祠故影日覆也諸天引法顯傳皆云外道天祠名曰影覆者恐不然也知之禽獸畏威者時有外道白王欲奪精舍時石柱上石師子哮吼軍士皆散也又准別傳云西天有一精舍漢時質子造埋金寶在神王脚下擬後修補王知令人取時神王上假鸚鵡鳥奮翼飛騰驚人皆走也儀形隱膜者天寺中香燈夜間轉移住佛寺像前婆羅門謂是沙門盜也中夜伺之乃見是所事神送往佛寺遶佛行道供養外道方知佛法殊勝皆捨邪歸正等但歷代下傷今無式也厝舉旨意者謂後人不能討尋先得軌範但務令高顯勝負心不存造寺之故也言故至乎者證也得信已後者此王先造逆害不信三寶忽患甚重佛放慈光月受三昧照之病金遂生敬信也言因至慢者因便明也文侯敬干木者六國時魏主干木姓改晉人也少而貧賤鋤刈為業草廬而居不求名官因遊西河事子夏養德不言心通六藝文侯敬其才德欲慕官之忽於一日嚴駕往造其廬干木踰墻而避僕曰干木布衣之士陛下萬乘之君被其不𮨇何不罪乎文侯曰干木不移世利而標大道隱居陋巷聲馳萬里行依相德寡人光相世干木光於德寡人富於財干木富於義蓋聞世不如德尊財不如義重吾敢不尊賢重道也後時召干木曰子欲官可宰相要祿可萬鍾能助寡人治國否木曰既授吾官又責吾禮屈身事主不亦為難乎欲治國者但正信敦行其國自治何要吾耶文侯納言不更相逼時人歌曰吾君好政干木之敬吾君好忠干木之隆於後秦欲興兵伐魏司馬康諫曰段干木賢士魏五禮之天下無不文也且有禮之國不可加兵秦伯受諫乃止時人云干木處魏秦人罷兵云云劉氏重孔明者三國時蜀主劉備也孔明即諸葛亮之字也襄陽人也為蜀主之所重自三往召之方出次亮為丞相備常云寡人得孔明如魚得水後令孔明領兵伐魏因得病垂死語諸軍曰主弱將強為彼可難若知若知吾死必遭彼伐可將盛土安吾足下取鏡照吾面言訖而終置相營內依語為之至半夜抽軍歸蜀經月餘日魏王有將司馬仲達善卜卜云未死何以踏土照鏡故知在也不敢進兵至後方委卒時人曰死諸葛亮怖生仲達此舉俗賢反况於道聖也大道鎮之次道者如賓頭見國王不起迎奉等例上來多段不同總是僧像致敬篇已竟次下第七訃諸篇分二初牒名二依文釋言訃至三者前明崇敬尊容內行雖畢忽有外緣請召亦須軌範合儀故次明也應命而往名為訃請陳置法儀名為設則篇如下如常云云二依篇釋中先明總意言夫昏者制者昏俗多務昏迷也暗也迷理滯事為俗也上為官𮃻中為田農次為工巧下為商賈終日駈駈無時暫息故云多務也不能靜攝是慧觀難修制營福分等者且令彼布施求有漏人天福報皆多設食供者謂施通四事餘三稍稀施食者眾也每於下明往訃失儀自他俱損令他輕侮即損他內長痴慢即自損彼施望福此受道緣既損自他兩邊墮負即返招苦趣也故撮略下立篇之意謂撮取諸經論律訓導道俗之法來此為訃請之儀試論如下十門之別也分章云云言初至爾者寺護者謂監護寺中法事請處請人等能令眾喜亦名悅眾訪問者明日設供早晨預令一人先去借訪為是實否及留難者恐假諸緣作命梵二種留難及作衰損之難或可恐施主家有留難未逐設食等為未來比丘者恐人云佛在日請情段重故設未來請者心輕故失此衣譏諸比丘戒德不全故受也或可恐未來比丘學佛踏之損福故也儼頭者點頭也問何不出言許之答多論云嘿有三意一表貪習已盡故不發言二止外道謗言瞿曇多貪三為現大人相故嘿也不了還願者謂還願不了應須三遍云云鬼子母食者亦云九子母也表王准經說本有百子九十一子在天上九子在人間其母覓食供之喉噉小兒血肉等佛為化彼云云我勅諸弟子齋時出一分食與汝兼與受不煞戒便獲初果發願護此眾僧辨俗人保願今若有人供此母食許比丘呪願取食以先有願護僧兼情好行惠施故言五至羅者慊者犯墮即本受諸人得提也借他物念依期限還他即是廉素之人不念還償足不識羞耻者今此細碎亦爾也寶云鈔是唐初制文宗未具全今若從言却是哀訃字良不可也不白先入墮者惱同諸僧故結也直報同學者意在知處也言善至故者過餘處食悔過者是祗提舍尼戒名蘭若受食因有此文合是提舍尼罪有釋云違六念故須悔過是吉羅者非也不請自來得吉者恐惱施主故若准五百問作相召集便同於諸去即無罪二文隨用故言二至去者如文言三至請字者法牒名可知言若至座者請賓頭盧法經兩紙世高譯字賓頭盧姓頗羅墮因為向樹提長者前現神通取佛制不金涅槃為三洲四部眾作福田若欲請時應焚香面向天竺摩利支山自稱香貫姓氏等請云大德賓頭盧頗羅墮受佛教勅為末法人作福田願受我請於此處食然後自陳密意等至於洗浴時亦合如是云云未見其可者未見有可於聖教處也勝緣者指佛僧二座為勝也言僧至士者引長含經意明安佛位在中間左僧右士意為證尼不合同處也四就座命客言彼至論者先明就座儀式上座八尼等者本是尼單提戒令僧但例此勞問者意在他歡喜也不應故在後往者恐惱於僧也制笑離非威儀義准下避譏責也言五至也者命不請之僧為客也如隨相別眾食戒說云云五言觀至去者應語長壽者勸令與食能濟他命即是施食自得長命之果也問經說不然為長壽因今言何施食為因答不煞是正因施食為緣如生養二母之喻也六行香呪願牒如文言四至順者類同邪命者恐涉要施物故虵施金等者彼住第七七金瓶緣起也彼云波羅奈國有一人好修家業性愛畜金如是貯積得七瓶金埋安家內後無子孫不知彼以慳惜之心後作虵於此守護經於多歲後忽思作福時虵見有一人從道傍過乃喚之云可近我來人云汝是毒虵爭敢親近虵云汝設不近我亦損其人恐畏乃近虵處虵語人云吾有金一瓶欲用作福汝能為我辦之否人云能乃引人至金所出金與之又告云設食之日可將一阿先提此云草籠來取於我其將金至寺尅設日定乃來取虵蛇入籠中擔至僧前其人代與行香眾僧食了為虵說法倍生歡喜餘有六瓶金在喚維那一時往取並施與僧虵後命終承茲福力生三十三天佛告阿難時持虵人者即我身也虵者舍利弗也富那奇者是大羅漢此云滿願有兄名美那奇為商人入海採寶遇毒龍難遂念弟富那奇富那奇天耳遙聞化為金翅鳥往海龍遂沒身船得免難安穩歸家弟化兄為佛位一栴檀堂閣又欲請佛及僧設食乃共兄各持香爐登高樓上遙望祇桓請佛唯願明日降臨鄙國發願後訖香煙如意乘空至佛上如蓋又以水遙洗佛足其水徑如釰股亦至佛足阿難問佛因緣佛言放盈國中富那奇化兄請我及僧明日設食故有斯瑞因勅眾僧至於沙彌各各變現往彼云云明日往受食了佛為說法字中並證初果也不得立受香者是三千威儀文緣起如鈔制令坐也寶云今准十誦云因起慢故却令立受鈔文由依第二緣也思之多有唄匿比丘者律云天帝執爐引佛而歌讚佛三身功德故經云梵音深妙令人樂聞又准法苑云此方梵音起於魏陳思王曹子建名植是武帝第四子聰明第一每讀佛經以為至道之宗極轉乃制讀四聲因游魚山感空中梵嚮思王記得音韻乃教諸比丘安師置於上也梵者西土之音此云淨也既息諸緣令心淨故言四至裁者總辨如非也應歎布施者有相之心布施得人天果無住相布施獲佛等也為歎檀越法者為說福分敬護三寶受歸戒等餘如文云云比世下辨非也凡者凡誦竪者竪子小奴之秤也褒讚揚顯也昇者夏時鑄九隔表九州分野正朝天子殿前以物於中煑之若一隔先熟已表此一州豐熟若齊熟表天下太平若一隔先沸表草將此食賜三公九卿大夫已上方得故名鼎食今歎貧有過於此也言今至中者正辨隨機也中含中偈呪願現前行施人也五分下明佛初成道受五百賈人蜜故有此呪願文也可無四辨者一法無礙辨二義無礙辨三詞無礙辨四樂說無礙辨也叟老也意云佛雖具四辨但讚實事止出前言況今老叟不合分外也言雜至說者辨須知時也彼第六云舍衛城中有一長者入海獲寶歸來彼國時王分賜聚落封為長者妻產一子復是其男諸度大集請僧設食舍利為上座在長者前敷小床座坐已為呪願云如鈔也十力者一處非處力二業異熟三靜慮解脫等持等至四種種根五種種勝解六種種界七遍趣行八宿住生死九天眼智十漏盡解釋廣如經中時舍利弗得二端㲲也摩訶羅此云無知見得端㲲心甚不悅歸寺內就舍利乞文彼不與恐不解時宜又苦求不獲已授之彼常誦習得了後至一家得為上座其人死亡失財又遭官事摩訶羅仍本念之長者聞之嗔忿駈打推出內外一也錯入王田踏損胡麻又遭守園人加打二也又復前行值於麥蘇左遶而過又遭區擊呵云何不左遶呪云多入三也又復前行逢埋葬右遶呪願云多入云云復被打之沙門不生悲心見我埋葬不解呪願云從今更莫如此更云多入是何言歟四也又復前行遇人迎婦遂近於前呪願云從今更莫如是又遭打之汝見我吉事應須走過何得徐行出無利之言五也又乃狂走值人樹雁觸他網羅驚雁飛走又被獵者提來打之沙門何得麤橫行步但合徐徐制訇而近也六也即被此呵乃匍訇而過遇浣衣者謂來姿衣又遭搥打七也經茲七度方達祇桓具述前緣比丘舉過白佛佛因呵制云云七受食法牒如文言四羅者辨意長者經一卷彼明受食前呪願因果經亦爾如今施食呪願是也防眾戒者免惡觸失受等過也四竪脚者足根著地足頭反竪也五交足者兩脚交加不直踏地七翹者舉足向前直踏空地也累脚者將一足押向一足上也累䏶者者一䏶搭一䏶上也平足著地方名踞坐如經云踞師子床寶机承足也言二至也者出生法也經論無文者謂無出生先後之文非謂無出生文也今約理凡是得物皆先起施心後然方自食又准前頭陀篇中列寶雲經四分之一食者一分與同梵行人一分與貧下乞人第三分與諸鬼神第四分自充身食據茲文勢必合在前為妙也傳云者晉朝釋法猛游於西國撰歷國傳送三處食餘比丘不出者謂賓頭盧廟伽藍神廟護法神也三曠野鬼廟也若依搜玄將曠野鬼與鬼子母合為一也今准表云鬼子母緣起如鬼子母經說前已略辨了若曠野鬼神如涅槃經說亦為愛喫人家男女佛為化彼眾鬼待彼鬼王暫不在佛便偷身向伊鬼王坐位上坐化作大身更過於彼彼從外歸見乃生怖懼奔走悶絕佛慈悲故却喚伊轉而復佛形乃為說法彼遂歸命發願更不食人男女佛因勅比丘出生飯與之父曾披西域記三藏說此伏鬼處至今獨存在中印土境婆羅痆女照反斯國建大石柱高餘二丈作師子像刻記伏鬼之事證知不謬雖二經緣起各別然並制出生今時藍界中或有鬼子母廟送食了比丘不要更出生若無鬼子母廟有曠野鬼廟亦爾若二廟總置即更加一分便成四也理合如然入處餓鬼中者古云入處足中陰報處是餓鬼今依離含經云佛在王舍城有一梵志白佛言我有親族甚至愛重忽爾命終今欲為彼設食未審彼得食否佛言若生地獄餘趣即不得食以彼自有活命食然餓鬼趣中有一處名曰入處餓鬼若汝親族生入處餓鬼中者即得梵志又云若不生此中我所施食誰應食之佛言汝諸知識生此中者亦得此食梵志又云若我總無知識生此中者又復如何佛言雖無生者施者自獲其福又問如何是自得其福佛言若汝自死之後忽生象馬中以曾施故亦得受此福報若生人天道中由前行施坐受其報是名施者行施果報不失梵志聞已歡喜奉行餘如文言僧至之者明行食等供法也澡者一說云蕩云也如此方河北律學之流臨受食時更以水蕩器故有說即預執為蕩也恐滯他行食故半菓經云育王經說王被臣佐及子奪位閇在室內時有大臣先與王情通姿得半奄羅菓與王王念言我唯於此自在食之然食亦不免死可迴供僧乃持送與耶舍尊者尊者得與研汁水八萬羅漢共飲為王念誦也不得令一粒落地者恐招白衣嫌疑故言四至處者雜明也於口飲處寫棄之者待與人同器飲以說也㗘㗱食者如猪等有聲餘如文可知八食竟法如文九達嚫亦云大嚫並是呪願布施之云也言五至開者立意也在家行財施者准智論施食得色力施衣得端正威儀施房舍得七寶宮殿施井得無渴施橋得車馬出家行法施者為說修多羅等三藏一切善言利益前人皆名法施言五至說者簡人也諸根具足者佛說云美食盛穢器等云云半唄者如勝鬘經有兩偈讚三身初一偈讚化身次一偈讚報身下半偈歎法身若但誦一身不全即名半唄也或三中讚一或二全不具亦名半唄如來妙色身者謂佛有三十二相八十種好莊嚴圓滿故云妙世間無與等者天上天下如佛即是無與等也無比不思議者非喻能比不可議非心計度不可思是故今敬禮結成禮敬意也次半偈歎報身如來色無盡是虗空遍法界而無極處故云智慧亦復然者四智無盡功德亦無有盡故一切法常住法身不生不滅無去無來湛然常住遍於法界是故我歸依結成敬意也玄云此是食前唄也若食後即處世界唄是也侈尺氏反奢也如前云丘人賤讚昇食等第十段中八人約成大眾如前律文恐日時過但使八人依次位坐餘人隨坐今出請家還令上座八人相待以表不失尊卑次第故餘如常說上來多段總是訃請篇文竟第八道俗篇分二初牒名次依解言尊至四者前明計請受供俗人財施已周出家利物為懷須行法施故次辨也釋名左傳云引物使通曰導表云准字樣道下安示不合安寸知之俗者習也土地不生名習習已成風而成俗也又滯事迷理曰終即常俗時俗等化者教也依教誘化方謂方法篇已下可知或有作道字解通物四道屬能化人出家五眾俗是所化境在家二眾今能所通舉故云道俗等不取此說釋中初總意言道至乎者道終相資有逾影嚮者先明相假為化誘之因也資益也藉也道假藉俗人財物以資身俗假道法以資神逾過也越也影嚮者子云有人惡跡畏影走而避之畏影者走逾駃而影逾疾避跡者轉急而跡轉多不知處陰而休影居靜以息跡有時闕之義今云有逾影嚮者影假形而生嚮假聲而有此則影嚮自假形聲形聲不假影嚮今道俗相假即不如然俗假道法資神道假俗財濟身二彼相藉無時暫離故曰有逾也外難曰道俗形乖法四有異何得似影嚮之親鈔通云雖形法等云云僧即剃染俗乃返之是形別俗修福分五八等戒道修智分志求菩提雖發是處似殊而趣極是一莫非皆為求菩提涅槃故曰假同也攸者說文云所至也無相修福分名檀波羅蜜至彼岸義菩提亦是彼岸故知所至處是同也又俗之所修名云俗諦道之所修名第一義諦不異俗而即真不異真而即俗故肇論云形服雖殊妙期不二故所至處同也是故下明外護相資所以如文故得下不結成有益之相若求衣食便無心附法修行得果似正法滅也今若有外護凡有所要一切供養給修行獲果還如正法故曰隱而重流僧既以法濟他歸信非一能引令出家獲益即僧徒滅而更立故涅槃云一有知法沙門二有外護檀越佛法千載不墜故言而至悟者洗蕩未劣生劣少心識非一故曰寔多知輕知重辨識時宜有數也心者淺近𮌎臆之見也將人望教故積為彼凡夫施化不依聖教詮述或為白衣作使或見非弟子不解教照等言成訛濫者即前之人或讚八不淨物或為衣食為人說法或以勝負心說互求長短之類證文可知箴誨者箴誡也誨示也未聞令聞光益於教玄記中作懺悔字數釋段惡之稱恐不然也二開章分科云云問諸篇皆云就中此篇何故但標初明兩字表云還是向肉內懸科出與安居篇開章門處相理亦無別理釋中六段今且第一言大至在者佛說大集經時八部王臣皆欲護法令法不滅佛讚善哉檀越等亭歷子者表云有二名一曰二曰亭歷三日㺃𦾩子葉如芥菜葉如油麻更細今舉此者表極小之物以況大段也云云滓者佛法中滓穢人也典者非真實正直也幻者非實沙門賊者盜受利故醉者迷失本沙門性栴陀羅斷佛法慧命故准經一一皆言畜八不淨物等名沙門中滓沙門中曲等今欲人生慢心者以俗昌欲心生輕慢也言三至止者如文四言毗尼至中者五分謂五陰也彼論通引三科十二因緣云念處觀及寂滅法等今文略也文義云句者唯識論云名詮自性句詮差別文即是字為二所依也男女之音者如云優婆塞鄔婆索迦迦多衍那子並並男音優婆夷鄔波私迦迦多衍尼子並是女音也又應除貪心者不求名利也不自輕心者謂佛法尚不可聞何況能自解說生慶幸意也說猒患法者猒生老病死及身不淨等遠離法者求於解脫得涅槃樂出生死等餘如文云云言涅槃至所者彰非顯德也因便說三種僧相貌一雜惡僧二愚痴僧三清淨僧等如鈔自辨云云非律不證者若見有人讚說受畜八不淨財為是此非戒律所證也若有學戒者此即是律應證也善解一字即律字以訓法也持犯開遮輕重悉能知故至非法至處者如淨名居士入諸婬舍酒肆等是非法處須為教化因緣於自身無損惱方得若小乘人未全斷惡不許為之有問命終等者長含經阿難唯靜思帷此那陀村有十二居士命終為生何處佛言此十二人已斷五下分結命終生天於彼涅槃不更還出也所言五下分結者一身見二戒取三疑四貪欲五瞋迷也又問五十人命終生何處佛言薄婬怒癡得第二果若准鈔意有問命終者生處但驗現在修因便知死後生處善惡以凡眼又不見縱答亦不信受所以徒勞設問也若欲離生死但思十二因緣輪迴不絕應當覺悟違佛語等者祇云比丘與白衣口中行非比丘得夷白衣如之何此文意道白衣不受佛戒違佛不制故經云受戒者罪輕若試問即不合答也言三至義者明入房向經略文顯義反向出戶者面看師表不背故餘如文毗尼母下與四分說戒法文大同十二部經者十二者舉數也部類也有十二類差別故新故新云十二分教即分段義也一修多羅此云契經謂一切長行文是二祇夜此云應誦分亦云重誦雖前長行說事恐後人未聞更牒前文為偈故三和伽耶此云記莂分亦授記為諸弟子記當來受果之事四伽佗此云諷誦分即孤然而起如容顏甚奇妙諸行無常等是五優陀那此云自說分如彌陀經等問以何不待請而自說耶答顯揚論云有二義故一為眾人不知不解請二或可雖知不敢輙請若不自說無由得聞佛為接機所以自說也六尼陀那此云緣起分亦云因緣顯揚論云因緣有三一因請為緣二因犯為緣如制戒因六群等三因事為緣如舍衛國大夫捕鳥還放佛便說偈莫輕小罪等是七阿婆那此云譬喻分經中凡說喻處如涅槃有八百大喻法華有七喻等是八伊越多伽此云本事佛為諸弟子說宿世事也九闍陀伽此云本生謂佛自說宿世因緣是十毗佛略呂加反此云方廣謂明菩薩行廣大行及記大乘義理等是十一浮陀摩此云希有如寶樹低枝祥河息浪獼猴獻蜜瑞像趍迎等是十二優婆提舍此云論義分即問答往還研窮理趣等是謂三藏雖廣至多不離十二分收之並盡然於中其缺為少即不定也莫非時者或悟時至未或貪欲時無心聽法時不得為說大乘寶法師因說悟時未至便引佛在時有一白衣輕心請佛說法佛為說四念處便云不用說我當聞之等云云非處者非說法處也輕心者自生慢也輕佗自歎者自褒揚我能輕侮佗不解等莫隨處說者令人不敬重故滅佛法說者互示長短也熾然世法者示世名利心也一眼施者慈眼視於父母師長等當得天眼成佛時便是佛眼二色者和顏悅色不嚬當得端正身成佛得金色身也三言詞者善言軟語當來得言詞辨了成佛得四無礙辨也四身者起迎禮拜等當來及成佛得長大果報也五心者謂善好心施當來得不狂亂心成佛得一切智心果也六床座施者當來得七寶床成佛得師子法座七房舍施者當來得自然宮殿成佛得禪室舍宅果報此之七種又不損財而獲大果故也言大集至云云者明法多門化人雜相四真諦謂苦集滅道小乘中有各四行相云云大乘入見道唯觀滅諦此一既非一念所證法故佛為說八萬法門云云如市易法者欲求反報也更無餘念者謂於六塵之境不生著心如履險時心生怖故爾時如來以手揮空告諸比丘入聚落時無礙亦應如是餘如文言十至羅者明慈心說法受施開聽也莫論議者莫將世俗言詞相雜不得將世俗等教化者四分六群尼教白衣莫向日月及神祀厝大小便等今是某宿星好種作示財等為俗可因制也受淀汁者智論第八云佛夏竟與諸比丘遊行到婆羅門城王知佛欲來念言彼若來時誰當樂我乃立制云若與佛食聽佛語者輸金錢五百後佛入城與阿難持𥁊國人各各閇戶更不敢出時有一老母持瓦器盛臰淀汁出門欲棄忽見佛空𥁊而念行言此人相好合食天厨今何降身行乞女是大慈悲人佛若慈悲我持此弊食奉之女合受矣佛便申𥁊受之受已出光現笑阿難問佛因緣佛言此老姥十五劫中天上人間受大富樂後得男身出家成緣覺果時有一婆羅門聞已問云汝是淨飯王太子何故為食作此妄語時佛出舌覆面上至髮際語云汝是此舌而妄語耶時婆羅門作是思惟若人舌覆鼻尚不妄語何況覆面兼髮際便發信心彼復白言我不解其施報多少請佛與說佛言汝頗曾見希有事否婆羅門言我曾見尼𤘽律陀樹枝葉覆五百乘車佛即問彼樹之種子大小彼云如芥子三分之一佛告彼言誰當信汝婆羅門云此是實事因驗可見固非虗妄佛即語言我見淨心施佛得大果報亦如此樹因少果多時婆羅門心開意解向佛懺悔佛為說法得須陀洹果遂發大聲遍告一切甘露門開如何不出諸人聞已皆情願送五百金錢上王迎佛供養即破制限王與臣民亦歸依佛佛為說法皆得淨信也億耳羮殘等者智論云沙門億耳以好羮上佛佛喫已轉度與頻婆娑羅王此表佛亦自行施一彰施福大故二顯道俗不二也言地至壽者明慈心慰問能離譏嫌也見功德者歎施戒者見造功德之人須為歎布施持戒之福令其心悅不生退屈故方便喻遣者喻莫生怨心若善好信心知沙門慈悲故看不敬信恐謂合得駈使也言僧至事者二家生者毗婆及釋迦是剎利家生餘五及慈氏皆婆羅門家也法力二輪者謂僧有法輪能摧煩惱王有力輪今出家人賴彼力輪外護不被惡人侵擾乃得修行安樂得食輪已轉法輪者謂佛初成道後在樹下坐未有食力身心疲劣得賈人蜜已方趣鹿苑轉四諦法故知食能摧飢虗之患亦得為輪也應譽實事者謂見外道應隨時歎譽汝能捨父母眷屬恩愛出家等云云二受戒法中分科云云言二至三者若通明三歸有五於中具戒三歸佛在日便癈十戒三歸如下卷沙彌篇自辨今此任說香邪及五八戒三歸言初至簡者如文言初至鈔者謂未歸佛法僧時繫屬四魔境界今既歸投三寶永離魔怨故也名一義異者涅槃云善男子有法名一義異者佛常法常比丘僧常此名一也又云佛即是法法即眾又佛法僧並稱為寶故云名一也義異者佛是覺義法是軌持不覺義僧即和合義名為義異也說三為一者一體三寶也說為三者別相三寶也如上名義同異或三或一為三此之境界唯佛能知非二義大聖而測度也金翅鳥者經中本喻死王如鳥今此明三歸力也餘如義鈔者如羯磨疏云門分別一辨體二歸依意三境寬狹四真偽五作法不同云約趣分別且第一明業體者謂能歸依語表為體即聲唯色蘊棟若兼眷屬具五蘊性所歸境者俱舍云歸依成佛僧無學二種法及涅槃擇滅是說具三歸且歸依佛者有部師云唯取佛身中無學法以此法能成佛故不歸依身次身共我無別故若准世親論師亦歸依身以是勝法所依處故如惡心出生身佛血歸罪以色身是法身氣故反顯歸依亦得福也二歸依法者唯擇滅涅槃法也三歸依僧者謂歸依僧身中學無學二種勝法亦以此二法能成僧故第一門竟二歸依意者以救護歸投為義也如人犯於王投向他國欲求救護彼國王言汝欲無畏莫出我境莫違我教我境者四念處他境者五欲樂我教者以心為師佗教謂心師也如昔一鴿為鷹所逐初心入佛影泰然安樂故後向舍利弗影中戰恐如初以習未盡故也問若審能護者提婆出家何以墮地獄答以歸三寶心不真故常樂名利自號為佛與佛競化故又調達雖在阿鼻以本歸心受苦亦輕如闍王雖造逆以歸深信轉阿鼻罪為黑繩雖處黑繩如在人間七日受盡亦是歸依之力也第二門竟三境寬狹者論云通歸三世佛不唯於釋迦以同法身故僧法亦爾第三門竟四約境真偽者唯真非偽也五作法不同有總有別言總者一時三說後方三結別者一說後旋結也六對趣者五趣皆得受三歸輕繫地獄亦得二言二至用者至無處者由歸三寶漸漸修行得至無住處涅槃也作法中有三初正明三歸次結法三示得戒之心謂三歸竟時便發得處中善不取結歸東塔行事皆取三結竟時得善乃至五戒亦爾蓋是知分齊也四科簡中善護者准七佛神呪經說三歸各有三神所護也餘趣無受戒法者問何故經中說龍女受一日戒答准多論無知之人尚不許況是畜生此約變為人形解人言議故容許可五戒法中初牒名舉數者五戒據隨中條數以言之如常所辨言初至受者簡人也世間戒者謂五戒也謂上列人若受具戒不發若受五戒許得律儀更受不得者據未懺者論云若已懺者應得故業疏云准此有過如文不開必懺蕩已二教無違但業重鄣深又發具也疏又問云前番邪何不簡人答番邪皆邪初心難拔歎然迴向宜即引歸若更覆疎容還舊跡五戒不爾先已歸正心性調柔堪忍我例故須略簡方入道門五體有虧三乘無訖也上是疏文隨受一分者此同成字也二言二至道者正明受法也寶云若准律文並無三尊號亦不稱佛號或依灌頂經及雜心論加三尊號鈔依律本並無今縱加號亦是歎美之詞無失如來不舉三號問前既歸三寶何更舉號耶答三寶名通九十六種外道故後顯正表非簡濫也如來者義如實道來成正覺至真者體悟無邪也等正覺者道通三世也此實我歸餘非敬者前之三說正發戒體後之三結示戒所歸即結文也如白四法四說得戒後方一結可以例解說相中即五條戒相要須解說令彼識知方能防護如人識怨不被怨害等就五種中邪婬一相相狀難識准俱舍通而言之邪行有四一他人妻女等彼父母夫主所護故二自妻餘二道三非處謂露支提及修梵行之處四時非自妻有胎時菩薩受律儀時總名邪行攝問何故於餘律儀離非梵行唯於近事一律儀但制離欲邪行答論云邪行最可呵易離得不作准此有三意一侵他妻等惱處不輕感惡趣故二遠離故若在家人躭染欲境令彼全離即難若離邪行則易三諸聖人欲於邪行決定不得不作律儀經生聖者性戒成就等論又問云先受近律儀後娶妻妾於彼妻妾受戒之時得律儀不答理實應得若爾云何後非犯戒答論頌云得律儀如誓非總於相續謂本受誓而得律儀本受誓云我於一切有情誓斷欲邪行罪也非總於相續者且不言我誓總於一切有情相續離非梵行故於有情得離邪行戒不得離非梵行戒故後娶妻妾所以不成犯戒故遮中唯酒者論頌云遮中唯離酒為護餘律儀意道遮罪雖多飲酒罪重心多放逸必更犯別律儀為護諸餘律儀故制不飲酒也年三者正五九也業鏡輪轉如正月照南州二月照西州三月照北四月照東五月又照南一年三匝也月六者論頌云月八十四五黑白月皆然律云白月八日十四十五黑月二十三二十九三十日也又准經律異相引長含第二十卷云北方毗沙門天王有五大鬼恒隨其側半月三齋八日十四日十五日四天王常以八日勅諸使者汝等接行世間觀察人民孝養父母恭敬沙門受持齋戒布施否使者奉教具啟善惡天王聞惡不悅言善便喜十四四天常遣太子接行天下十五日四王躬自履歷然後詣善法堂具啟旁釋帝釋聞惡便憂聞善斯喜說偈歎之若受齋戒之人與我同行也大智論樓炭經並云與此大同黑月可知更有十齋日頌云一八四五八上中旬也三料簡中言三至涅槃者依成宗許漸受亦開重如末利夫人第二第三重受五戒即其證也餘如文言問至明者答意以佛法貴如實既淨口業不妄語必不作餘三也故舉十善為例是二百五十戒之總相不離此十故又云下如前罵戒已引云云如善生七卷中者彼五戒品云優婆塞戒有無量功德能壞無量弊惡之法眾生無邊受苦亦爾難得人身雖得人身諸根難具等三明八戒者標名也此亦據條數以言也餘如常說業疏云詺戒為齋為關者眾名乃異莫不攝淨歸心八是所防之境戒是能治之業齋者齊也言薩至得者心念受也從五眾者業疏云皆是弘法之人故俱舍云近住於晨旦下座從師受晨旦者謂日出時要經一晝夜若有緣礙齋後亦得二須下座在座前或蹲或跪曲躬合掌除有病三從師受謂必從師不可自受已後若遇諸犯戒緣由媿戒師張不違犯准成智二論若無人時亦開自受暫接佸故表大德云唯八戒開自受五戒定不以無教文也言次至竟者言淨行優婆塞者以自妻亦斷不同五戒也不言如來等正覺者以五戒初離邪緣故以正隔之今於五上重增故不言也縱依前加理亦不失思之言次至懺者准智論受在前懺則在後今依增云若受八齋戒先懺悔罪後受戒也言次至道者列相中有九者業疏准多論以齋為體八事照明故成齋體若不持齋不合受此八戒齋戒通言故成九也准業疏分為三位前四名戒分離性多惡故次一名齋不放逸分由飲酒擾動諸戒故餘三名修分若不受下二分者因飲酒失念有諸過也文言我某甲者即令其口說此相也若依今作法但為說了問彼能持不答能皆得也相中高大床者阿含中八種床謂金銀牙角等不著花香薰等者西方以此為華飾故制今但依常裝飾皆許也不歌儛等者說文云先歌曰倡謂在歌之前即行主戲笑等類恐心蕩逸故不過中食者中天但有斷食之方義同此土齋齊之訓如家國欲祭神祇先令祭官請身入齋室不行杖棰之事今當番經之家取一分請身之義故曰齋也八難者三塗為三第四北州五長壽天六佛前後七世智辨聰八諸根不具足教說四輪能摧八難一願生善處摧前五二願值善人摧第六三深種善根摧第七四深發正念摧第八故頌云三塗北長壽前後諸根智薩云若者此云一切智具如鈔疏者業疏云願為前道示行即後隨如鳥二翼如車二輪方能淩空致遠闕一不可言僧至也者雜明也受布薩法者清淨共住義即八戒法也為說深法等者一真諦理依教彼行自菩提涅槃名正道撥無因果名邪道應說知見即開示悟入也十號者一如來倣同先跡號二應平聲供堪為福田號三正遍知達偽知真號四明行足因果圓滿號五善逝妙往菩提號六世間解窮盡法原號七無上士調御丈夫降生成道號八天人師應根說法號九佛覺悟圓明號十世尊世出世間號解此一號如經論中今此因便不勞繁述功德與無漏人等者論云受八戒人天王福報亦不及帝釋說偈云若人持八齋其福與我等佛止之曰若漏盡人應說此偈偈云六齋神足日奉持於八戒此人獲果報則為與我等准此帝釋說前偈佛止不聽故知受八戒人福過天帝與無漏人等也不得多唯獨受者此約戒師說五眾之中隨一人為受不得二三人為他受恐言詞雜亂互說不同若能受人不簡多少寶作授字呼今鈔恐錯書受字成就八法等者准五分諸優婆塞以小小事嗔嫌比丘佛言不得以小小事嗔責比丘及不敬信若比丘成就八法然後不應敬信言八法者毀呰三寶為三戒為四欲不利諸優婆塞住處為五與優婆塞惡名聲為六欲奪優婆塞住處為七以非為是欺誑優婆塞為八餘如文二生緣奉訊牒名可知言五至等者五分衣法中畢陵伽父母貪欲利養供給不敢乃以白佛佛許之如鈔述也得重罪者謂違恩養逆也父如沙彌無異一切皆得者一說云已受五八戒後一切恣意供給也有人約洗浴得觸父身故云一切得反顯母即不許未詳啟悟父母者啟開也謂如佛常法常僧常開道示父母七世令心信樂自學如是開悟父母及七世轉教餘人亦如是法則典盛名護法也得長壽者涅槃第三云迦葉既悟解三寶常住願自學化人為修無常者作霜雹佛乃讚之如此護法不欺乃至得增長壽命等阿難請受愛道戒者緣起如常云云淨信者小乘初果也言雜寶至等者經中有長者子名慈童女其父耳喪錢財用盡力賣薪日得兩錢奉於老母生計轉盛日得四錢以供於母後漸勝故日得八錢供養於母後又得十六文錢奉給於母眾人見其行孝勸云汝父在同採寶為業汝何不効之彼聞已却歸問母母云父在同採寶為業不虗其子白母我欲効父之業可否母見子孝養將謂不拋遠去乃戲許之子謂是實遂向外召伴契約總定歸家辭母母聞已悲號懊惱乃告子曰待我死後一任汝去兒言母已先發言許之我今約伴一切決定人有誠信不可乖志也母遂抱投子號哭子便掣手乃拔母敷花髮落母畏子得罪即便放去子既獲去乃與諸伴共入大海達於寶所大獲珍寶却欲迴歸發時有兩路一水二陸眾人議云所陸路去即漸前行路多盜賊兩土之法若賊劫物之時慜得商主物便屬賊若不得商主即物却還入賊已以此因由慈童長者既是商主恐遭賊害乃每到宿處便即營出別處止宿明日臨發時商眾來迎取後於宿時消之處夜遇風雨辛起明朝商眾俱發忘却往迎商主慈童既不及伴不委路逕遙見一大山便往至彼復見一大城紺瑠璃色長者飢渴疲困疾疾中向爾時城內有四玉女落意珠歌唱來迎入於城中經四萬歲受於快樂爾時自然猒離心生便擬捨去諸女言南剡部州人何太無情共我生活得四萬歲云何一旦捨我而去彼又前前乃見一頗梨城城內有八玉女擎八如意珠來迎入城經八萬歲在中受樂後猒心生又捨而去復見一白銀城城中有十六玉女擎十六如意珠如前來迎入中十六萬歲受於快樂後厭心生又復捨去前行遙望見黃金城城內有三十二玉女擎三十二如意珠如前來迎入中三十二萬歲受快樂後猒心生擬捨此去諸女告云前來所捨後得好處今若捨此不得好處也長者不信又復行遙望見一大鐵城長者念曰外雖是鐵內女更好漸漸近之亦不見玉女來迎長者思惟此城之中貪受快樂不及來迎我也遂漸近城乃見一人頭戴火輪捨著長者頭上即便出城去也長者問卒云我此火輪何時得脫彼云若世間人有人作罪及福一如汝者來替於汝方免其事長者又問未委我先曾作何罪福獄卒便述前事云云長者聞已又問獄卒此城罪人數有幾許卒云不知數量長者念云我今此苦未有脫期寧使此獄之中所有一切受苦之人罪業總願併集我身我代受之諸皆得脫纔生此念火輪即落長者遂問獄卒汝適云此輪未有落時今何墮地卒遂嗔怒以鐵杈擊之因而命終得生覩史陀天佛言爾時慈童長者豈異人乎即我身是告諸比丘當知於父母所小作不善獲大苦果少興供養得無量福應當一心供養父母也鸚鵡孝養盲父母者雜寶藏中佛言過去即雪山之中有鸚鵡父母盲病常採花菓等供養爾時有一田主初種糓時而作是言所種之糓要與眾生共噉此時鸚鵡聞已於後糓熟時常來由中採取是時田主按行見苗稼狼藉心生嗔忿乃布羅網捕得鸚鵡鸚鵡告長者云汝初種時已有善心今何反悔但由者如母種子如父實語如子田主如王擁護田已作是語是田主歡喜問鸚鵡言汝取此糓更復誰為答為父母田主感之告彼云汝從今後但恒來取勿疑難也佛言爾時鸚鵡者即我身是時田主者舍利弗是時盲父母者淨飯王摩耶夫人是也一生補處功德一等者謂覩史陀天如彌勒次補當來成佛今在彼天宮名補處也不可得報恩者謂教父母修善如此報恩不可得也言僧祇至也者經文未到此方之前安師已曾改轍後經本到果與懸同也言若至要者愛道無常者增一云毗舍離國有大愛道與高臺寺五百比丘尼皆是羅漢聞說如來過三月後當般涅槃乃生悲戀不忍見佛入滅又不忍阿難入滅我宜先取滅度遂來白佛佛嘿許之愛道又云今曰違辭聖顏永不覩見言說遶佛七匝又遶阿難七匝又遶諸比丘眾却行而出還歸本寺語諸尼曰我今欲入涅槃所以爾者謂佛不久當取滅度汝等各自知時五百比丘尼聞已亦往佛處各辭如來並擬入滅佛既許已各還本房時大愛道開講堂擊犍槌敷坐其騰身虗空作十八變已還歸本坐而正身繫念即入初禪乃至非想非非想處即於其處至四禪中而取涅槃爾時大地振動其五百弟子比丘尼亦復如是佛告阿難汝速往告耶輸提大將令速辨五百床五百瓶蘇五百瓶油五百譽華香五百車薪阿難問佛用此物何為佛言大愛道及五百尼入涅槃我要供養彼舍利阿難聞已悲泣交集不能自勝乃往大將處陳佛教勅時耶輸提大將一一依辨備說爾時如來共諸比丘往愛道入滅處令阿難羅云舉愛道身我當躬自供養時帝釋菩薩三十天梵及四天王等前白佛言唯願如來勿自勞神我等當為供養佛言止止非汝所作謂慈母生子多有所益長養恩重乳哺情深要自報恩過去諸佛亦得如是爾時北方門天王勅五百鬼往栴檀山取香薪送安曠野是時如來躬自舉床一角羅云阿難各舉床一脚飛在空中往到塚間其諸四眾舉五百比丘尼屍至大塚處佛造取栴檀香木各付與諸天乃者維之佛復以栴檀木安愛道身上即說偈云一切行無常生者皆歸死不生即不滅此病最為樂爾時人天雲集火滅之後佛勅大將收取五百比丘尼舍利起塔供養長夜受樂福德無量也淨飯王等者准涅槃經第一佛在舍衛國者周堀山為眾說法之次時大王在空中得疾困重無能救者時王淚下思憶如來告諸人曰我命不久恨不見悉達及難陀等用此以為歎恨又曰吾沒見子命亦不濟但為未離生死不以為苦諸人聞之無不涕泣乃告王曰佛在鷲峰此去五十由旬今王轉增困憊縱遣使報道途既遙來必應晚願王莫愁諸子也王即答言我諸子等有大慈悲恒以神通天眼徹見來亦不難爾時佛在靈山天耳遙聞迦維衛大城之中父王憶念之聲又以天眼觀之見王病困命將終乃告羅云阿難難陀具述父王所思念事等即以神力由如雁王踊身虗空忽然不見至迦維衛放大光明國中人民遙見如來舉聲號哭哽咽而言大王命將不久唯願如來宜時速往佛告之曰無常離別今古皆然汝應知之生死是苦唯道是真爾時如來欲入王宮先放淨光照王身體患苦得安王知佛還甚生快樂不覺起坐佛既入宮至王寢處王見如來預兩手作接足之意而告如來願以手觸我身令我安穩我於今日是最後見佛佛告王言唯願大王莫復愁惱佛自申金色臂狀似紅蓮以手著王額頭而慰喻言王是清淨戒行之人心垢已離今應歡悅不宜煩惱當諦思惟諸經法義時王即以手捉佛手婆心上仰瞻於佛目不暫捨而告佛言佛是我子慈悲接遇我於臥中合掌心禮如來足下從今取別言說氣絕時諸釋子號悲大叫不息憶身乃將香汁浴王身體纏以劫貝白㲲而以棺殮七寶莊嚴舉棺置師子之座散花燒香佛共難陀在喪前肅恭而立阿難羅云在喪後是時阿難陀乃長跪白佛父母養我恩深願聽擔於棺也阿難羅云亦同此說佛恐後人不孝父母故聽許之留於末代以為禮法是時如來亦自擔之三千大千世界云反振動一切諸山岥峨踊沒如船在水上無異爾時四天王變身令小各代佛擔之佛亦聽許佛自執香爐前行引導又勅一千羅漢往大海上取栴檀香薪而積之舉棺置上放火燒之一切大眾見大熾然號悲大喚舉身自樸佛告眾人曰世皆無常苦空無有堅固汝等諸人但見此火便以為熱諸欲之火復過此也是故勤求離生死苦乃得安樂其火既滅各收舍利成置金函起塔供養時諸大眾同聲發言來委淨飯王從此命終當生何處願佛為說佛告大眾父王淨飯清淨之人生五淨居大眾聞之皆生歡喜禮佛而退也三明士女入寺法牒文如文言先至哉者息心靜默者謂指伽藍本是息心之人所居止處也非喧亂處集者謂俗隨事生心故多喧亂豈漏慢所踐者此是施法處訓之處豈可人有漏之心多著我慢情懷染欲意無恭敬而所踐也且心栖相表者謂冥心無相也形異世儀者剃髮染衣也歸奉憑趣者歸依奉敬憑托趣向道理合存法則低頭下意曰俯瞻敬躬趍曰仰也履其金剛淨剎請法佛資神行敬三尊希福備體即識其履也行次辨入寺法言今至過者祗桓圖中出士民入寺今鈔依圖明也注文僧中亦不可識者謂凡聖相混不可了別非常人可知也或有形儀疎野而心冥至理或雖有威儀而常緣俗事或三乘示現凡聖同居共事似俗𨵗者一釋云如儒禮中父坐子立佛法不爾和尚弟子俱皆跏趺大坐也撿意則殊者以師資位雖殊而俱是福田故現斯相矣又釋云僧見俗不起故云有𨵗以釋撿意非謂我慢但鎮之以道現大人相知則殊也皆僧取異者謂不從僧教曰背撿佗過患名取異也又釋不生恭敬訓請名為背僧却求過失名取異也別經為證解判可知順佛者謂西方以右遶為吉恒想佛在我右豈不是施遶行也頭表心地表身低頭著地以心觀身是成佛之地我慢為高見取為視高視馳散馳散則浮生死海也見地有虫者信佛語故我自身與一切眾自性清淨皆己佛不異只為業報所纏未獲解脫然總是佛因故見有虫勿得傷害也若不慜者是長命因不唾僧地者以地能生萬物以俗人童子是僧之本名為地也當歌唄等者謂歌讚等表心愛敬及願樂尊重若僧有過喻若穢草糞土心無見過之想而喻自手除之法則與僧情過者如毗舍佉母若聞僧有惡名便能掩滅等是也言若至者辨有緣在寺宿法經中者玄云是寶印經也望當圖剎者撲者輕打曰撲又云連打曰撲神何可滅若身死神滅則惡不可懼以身心俱滅無受苦人也今身雖死神識常存既不可滅故於惡道受於苦報以此祥之宜應畏也經是涅槃經蒺䔧者北地多有江東無入藥分有角判謂敬僧能獲福故號良田嫌僧能獲罪故是蒺䔧園也當知下結釋可知言清信至行者由佗而辨者謂三從也勿以位小而不加敬者智論曰四事雖小而不可輕太子雖小當作國王是不可輕虵子雖小毒能害人亦不可輕小火雖微能燒山野又不可輕沙彌雖小得聖神通最不可輕智論云昔有一長者設會但請老宿不要沙彌時諸沙彌皆是羅漢自變其身皆成老年向施主家見之歡喜請坐坐已須臾却變為年少長者驚訝乃戲問云汝等服還年藥了耶諸沙彌說偈曰汝莫生疑畏我等非人爾汝欲評量僧是事甚可傷我等相怜慜故現如是化汝當深識之聖眾不可量而以欲俗少歲稱量諸大德大小生於智不在於老少有智勤精進雖少而是老懈怠無智慧雖老而是少汝今評量僧是事為大失如此下結勸易知言所為至糞著如文言所至受者結示也言餘至告者修道緣者天龍鬼等有冥護之功人有護施資給之要因此方獲修道望彼為緣之四輩供養者於道者望僧為生善境界者幽顯者人為顯餘三為幽謂令比丘常須護持若有所失縱顯不知幽無不見矣必有出要之期者謂當來慈氏如來出世之時先度釋者遺法弟子第一會度九十三億人第二會度九十六億人第三會度九十九億人如是龍華三會度人悉是遺法種福之人或三寶中興供養者燒香然灯禮拜之類尚乃得度豈況受戒在身如得度脫也用法之儔者二人為伴四人為儔儔即類也傳告者謂覧前文傳示告報斯皆歡學令流布也上來諸義不同總是道俗篇竟第九主客篇文有二初牒名二依文釋初言主至五者此篇來意者前篇士女入寺化儀可觀今有道俗新來舊住理須接待故次辨也釋名主目舊居客標新至主有奉賓之軌客遵投正之儀賓主互為故云相待篇如常說四儀法附如後云云依文釋中初總意言沙門至云之者沙門謂出家人通稱釋謂牟尼姓族如序已廣述之侶謂伴侶也三界之賓者貴客四賓即出家人是情求出離本非久住故逆旅之況者說文云逆者迎也關東曰逆關西曰迎旅謂羇旅客之別號也況者意趣也頗能也如今邊洛作舍意為待賓倚泊亦此篇相待之意不異故曰頗存於此也故律曰雜揵度文也初緣有客到便自入房因地墮故制云云若望三界釋侶盡屬於賓今向賓中引立先住之者為主故云曲制也接奉之法少故云雜行云云言就中分四者就此正篇中分為四段也言初至等者如文言二至眠者房衣者房中鋪設用者非謂房衣是二種不得眠者疑佗是盜賊或處迮等言三至正者第四上座者約四人成僧說也思惟者思文義也不得禮者不必苦待佗一人但隨次第一一禮去也言四至所者同受利者嘉示作問字解今云同字為定僧家制限者不得著五條郭下等云云客伴已發者玄云不得向佗云汝伴已去也將謂方便發遣畏佗住耳應且留連等囑累行伴者謂別覔得伴了主人發時委囑佗令好相待有病相看視等習俗者謂此方有俗惡訛語等況不知也避譸者謂縣官及尊宿名諱等某事可食者指最好食令食表不慳惜也禁忌者官中禁約語事等盜賊者恐佗失衣也次辨四儀法言夫至云云者觀其文勢有三節初兩句標善心發教相𤆄憑次兩句釋發必有由致也憑教相心發者憑托也教是能詮文相謂威儀形假茲二方發善念也寘因顯果者古來解者多途既非正義並不敘錄今所盛行莫先兩說初依搜玄約阿為身子說法之時不說道諦是因是冥因但說出世之果是顯果上且一解又據寶云身子夙殖善本是冥因冥昧也自不記持今生得果照然是顯果必須假其覩相聞法方得以此為宗故曰假形儀而立宗也是以阿說身子者梵云按或云阿阿說此云馬勝梵語舍利弗提羅此云身子亦云鶖鷺子准大智論云目連與舍利弗才智相比行則俱游住則同心後修梵志同侍梵志師那闍王耶亦云珊闍夜或云即若耶其師得疾甚至困重舍利弗於師頭側目連在師足邊其師命將終忻然而笑二人同白師云師有何所笑師云世俗無眼被愚痴所侵我見金地國王死眾人以火葬第一夫人悲感不已乃自投身火中願同一處我故笑之二人受語欲以驗之後有金地國商人到來問之果如師語撫然歎恨不知和尚是聖師沒後方悟二人因立誓約若先得甘露法味必同沾洒如律所明後時善根將熟乃遇按比丘說法准智論云按欲入城乞食佛預知之乃語彼曰今日若入城乞食路逢非常人不得廣說法爾時按威儀整肅形服標奇身子見已乃作念曰引人容儀既異必有殊勝之法遂問曰汝師是誰說何等法阿乃說偈曰諸法因緣生是法從緣滅我師文聖主常作如是說准次上句是苦諦下句是集滅二諦餘二句結示也問四諦之中何以但說三諦不談道諦耶答說所證果必有能治故隱而不說欲令他自來問佛也其時身子聞已悟道往目連處目連恠其威儀改常必得妙法乃顧問云身子還以上之處聞而答之目連目連聞已亦悟道同往佛處如是之理具足須在昔日經中故曰具列昔經也傳法軌摸亦題方冊者玄記取阿說法與身子是傳法軌摸也淮南約身子還將上法傳與目連云傳法也釋並未應理今准寶云謂不但當初佛在西土之日以傳儀化物具引律論二文只似滅後教法流至此方之初亦假僧儀化物如騰蘭至漢僧會來吳豈不以僧相儀方生物信然後建立形像大行佛教如此物在吳云漢銀之中故曰亦題虫冊也直敘下結略可知言五至臥者而作大明者謂既四儀不如法則無照世之益也依狩王法者謂師子是獸王動止有法每於晨朝日初出時從穴而出則頻呻哮吼一切猛獸聞之無不歸伏比丘亦爾手且著衣持乞食每以四儀令佗眾生見而獲益也頭向衣架者表敬衣也餘如上者係想明相後夜速起等言毗至相者如隨相中者相覆處敷僧物成也白和上等者表不自專也若過十臈等者謂自是師位設不許自往亦無過以有益故為衰者於我身有益名為利於佗有損名為衰也為避亂心者一心著地免更攀緣不退菩薩相者玄云八地已上也或依諸經處說初地菩薩名行不退七地已去名證不退今不妨約初地已去通名不退菩薩者妙也言僧祇至業者駱駝坐者謂屈兩膝兩手枕床如駱駝也應跏趺坐者兩足左右交盤相結名結跏趺也六念者見論云眠時須念三寶戒施天等六也各有所立者尼但得長跪不得互跪由緣起有過故制一定也僧則互跪故業疏云律中為身耎弱互跪倒地佛令立儀與僧異也故云各立跪坐中睡兩足交互非法雙竪兩足足跟著地足指向上也兩手向背托床名却踞也屈膝以一足著地更與一足累前膝上直申即是支柱一足中一足也不上足者謂踞坐人蹋地若上足便觸衣也十誦上座不應起者文云聽法處見上來若自起若上座教起俱吉若和尚闍梨來恭敬故起不犯不得令餘人起即犯也下座起吉者即結自起之罪也以違制故大吒者說文云歎息聲也本起者圓明之性湛然寂靜良由自生虗妄究其原由本從何起當自思責也當遺上坐處者遺訓留者留上座位待來故髮𤍜者文云謂睡時當起聽洗浴若更睡即預生念云頭髮𤍜我當起即顯多時也看星月光即等者睡時當望星月等預生念云月至某處或星至某處我便起也如前說者如前行法中引經文依狩王法右脇著地而臥上來有二云云總是主客相待篇竟第十瞻病送終篇文有二初牒名二依文釋初言瞻至二十六者先來意者玄曰上明賓主直論康健之人經中既曰是病是身病起理須接待忽若閻浮報盡埋送亦須合儀前所未論故次辨也釋名者應奉說疾稱為瞻病送終殯驗葬故曰送終第已下如常解次依文釋中分二初舉故列門二初瞻病下依門釋初言就至別者如門分別者一瞻病二送終細尋顯正科欠上舉數列門一段今依玄記科出耳問諸篇皆有總意此篇何無答一說云題中二事不可合為一意故先分科也二依表解云制作家取自在故迴總意作制意非謂全無故下云乃至送終意同斯述非謂二事不可合為一意也此蓋寸水不見底言制至述者有待之形者謂業身也嬰累者嬰纏也患累也即煩惱舊病是四大互返者謂地水火風成其體故冷熱不調是以致疾成新病也六府者六者數也府謂納總之處記聚也白虎通云一小膓為心府二大膓為肺腑三𦝩是𦝩腑四膽為肝腑五牓胱為腎府六三焦合為一府三焦者從上至心為上從心至腰為中從腰至下為下焦眤女栗反爾雅云近也健則相親近病則捐捨也知善未崇惡必相遵者謂看病是善世人未必崇重棄捨是惡多倣効故律中等者此律衣法文也文云時有比丘病來日久臥尿屎中時諸比丘受請去後佛遂按行房舍見此病人乃與阿難洗浣衣服身體極令清淨以香薰之置如法處乃為說法遂問彼云汝健時曾看佗病不彼云不曾見佛言汝不看佗汝病有何人看也因此云制云云乃至送終意同斯述者謂世人壯健時則相親死後即不相顧今須始終如一與前不殊故云意同斯述也言問至歎者謂上律文若有供養我者應供養病人故生斯問也答文意者謂看病者等佛慈行亦得成佛故言故令供養也又論云者是成論文姨母親手自織金縷袈裟思佛還宮用以持伏佛言云此是恩愛之心布施無多功德今但善施僧則具三歸今此取隨順佛語為證以佛令看病今既看即是隨順佛語也僧祇等者爾時南方有二比丘共來問訊一比丘遇病未得去一比丘不能待乃先往見佛佛知而顧問彼具述前緣云云佛呵責已汝等同出家修梵行汝不相看誰當看汝汝可速還等云云為佛歎者八福田中第一也賢愚經說五種施得福無量一遠來二遠去三病人四飢時五知法人又俱舍云父母病法師最後身菩薩設非證聖者施果亦無量二簡人中言二簡至述者開彼衣鉢雇人闍維者謂亡後衣鉢合屬十方此約無尼僧即得攝今言彼者由指本人恐僧盡收不為處分故云用彼無者故令捨去玄曰通會四分謂比丘得衣作法屬己已後即將雇人亦有何過餘三眾者若於路見之亦准上之儀式也次明供養法牒名可知言五分至法者初引五分據蘭若無淨人說次引寶梁經者被云乞食比丘或是有病無人看視不能乞食應當如是調伏其心我獨無伴孤然一身法是我伴我今一心念法依佛正教善自思惟等次引僧祇辨橫死法有九如文可知言十誦至等者善好名聞者多人送供養就乞易得福得者衣鉢極多就乞不生惱也佛僧不淨殘宿惡提等者外難云僧有殘宿惡觸可爾佛何有耶若許佛有殘宿等佛應犯戒答雖是佛食謂比丘觸著故是惡觸若爾下文有佛臈食比丘亦觸了已後若贖得何以許食答又不同彼彼正供養佛時由屬施主故後乃與佛贖得無犯今是己觸佛食故成殘觸也餘如文三安置門云三至者之即事而求專心念法者玄曰既覩日光屢設又觀返者絕稀以此而求活門焉能得矣故須專心念無常敗壞之法也佛垂忍土者若據梵語娑婆此云雜惡又梵語薩訶此云堪忍何名堪忍初依真諦解云忍是此界梵王之名由能堪忍他人勝事不生嫉忌之心故從主以立處名也次引悲華經世界眾生忍受三毒及諸煩惱名忍者三衣解深蜜經說菩薩行利樂時實堪忍故佛自受用土與凡域異今為化物但要化度為善不以穢污生嫌心也四說法𣫍念牒名如文言十至之者為說深法者真實之相名為深法也言若至之者捨座捨衣者佛見迦葉來分半座與坐後將所著僧伽梨易迦葉糞掃衣如頭陀篇說言若至等者鸚鵡四聞諦等者賢愚第十三云時佛在舍衛長者須達敬信佛法一切所須悉皆供給時諸比丘隨意所須日日來往其家有二鸚鵡一名律提二名賖律提稟性默慧能解人語僧若到門每令傳語後阿難往到其家而語之曰我今教汝妙法鸚鵡聞已歡喜而受阿難乃授四諦法教令誦集偈四豆佉苦諦三牟尼提耶集諦尼樓陀滅諦未伽道諦須達門前有一樹二鳥聞法喜踊誦習飛向樹上次第上下經於七返同聲合誦受四諦妙法於夜宿樹為野狸所飡阿難問佛此二鳥生於何處佛告阿難由汝授法喜心受持命終之後便生四天王天命盡生第二忉利天乃至生第六天從彼捨壽還生第乃至生四天王天如是七返生六欲天自恣受福無有中夭阿難又問六天命盡復生何處佛言生閻浮提為人出家學道成辟支佛果一名曇摩二名修曇摩也大品有經耳品者彼經第三十云釋提桓因作念若善男子善女人得聞波羅蜜二經耳根是人已於前世佛所作諸功德等善知識相隨何況受持讀誦等涅槃常住二字者常是法身住是報身經云若有眾生聞涅槃經終顯佛性不生不滅說常樂我淨之法即是常住之法却後命終不墮惡道言若至緣者如文言若至力者可知言若至之者成聖因者經云性空即是佛不可思議故知坐禪者是正因也言若佐至云者與聖同儔者下引沓婆迦葉等羅漢皆營眾事也謂沓婆王種捨羅漢身求堅固法律云沓婆自作此念不知何者是堅固法乃為僧知事是堅固也迦葉踏泥造五精舍玄云淮師資傳迦葉不憚疲苦常自營造五所伽藍也一在耆闍堀山二在毗羅䟦首山三在薩波燒持山四在多般那舊山五在竹園田此五緣共為一衣戒無離衣罪迄于承用等云云又准多論迦葉自治僧坊自手泥壁雖是大阿羅漢不求福報但為報恩長養佛法對治凡夫作少福田便生我慢折伏弟子憍恣之心發起當來眾生福業故祇夜破薪者准雜蜜藏云南天竺有二比丘聞彼尊者名稱特來罽賓禮拜到已見尊者身羸瘦在厨內鑊前燒火不識乃問汝知祇夜在何處止住彼云在第三窟中二比丘到已果見適來燒火之僧疑恠問之等云云身子掃地者玄云未詳出處目連然燃者雜要行中說也凡愚不知等者意道僧是福聚凡愚不自學知所以聖人各捨自業佐事助眾事為導引凡愚令知也有人妄解不正思之言注者至天上者淨名經也憶所修福者什法師云外國之法從生已來至於臨終之時所修福業皆記錄之至臨終時旁人為讀令其心喜不生怖畏故肇法師云恐新學菩薩為病亂故勸憶福以悅其情也念於淨命者什曰正命也自念從生至今嘗行正命必趣善道吾何畏哉傳者亦是中國本傳也如文智論等者彼二十四分引別業經佛告阿難行惡之人好處生行善之人惡處生阿難問佛是事云何佛言惡人今世惡未熟善業已熟以是因緣今雖作惡而好處生也善生返說云云言問至要者此亦是論中自問也答中約猛利強盛說如人入陳不惜身命名健士也必須下誡勸之意愛衣如前說指對施中餘如文言其至也者西方十念成就便得往生或兜率天者彌勒經故修善如六事齊修二因兼積等類也妄自生我者經云凡夫不知內空無我橫生計著而實無我也實自唐無者若望俗諦似有約真諦定無唯有一清淨識心更無外境可得故知並是妄也或說唯識無境唯情妄見者謂三界之境唯識所變本無有實故云無境唯情妄報遍計所起也四分等者衣法文也文云彼病比丘作如是念我當受不好三衣恐瞻病人得故佛言不應生如是心文云時病人擔衣鉢送養徐處恐看病後病好無可看佛言不應作如是意今鈔略彼二意故云受不好衣及送與他也面王比丘者賢愚雜含皆云此人如以過去世曾將自疊施辟支佛承此因緣五百生中常於母胎中自然疊褁後出家時變成法衣等云云往昔國王為寶所誑者此是大莊嚴論自引經文彼云昔有國王名曰難陀積聚珍寶擬至後世嘿而思惟今可聚集一國珍寶使外無餘貪聚財故將自己女置高樓上出勅曰若有人持寶來者我即與汝女交通如是撿集一國內珍寶總聚王處時有一人見王女端正愛著家內無寶乃感結成病其母知之語其子曰國中一切寶總歸王所無處可求我憶汝又死之時口中有一金錢汝可塚取之子依母言果獲金錢送上於王王問云國內寶物總盡汝何處更得此錢彼乃具實答王王遣人驗之以事不虗方生信也王復自思惟我先積集一切財寶望至後世彼又一錢尚不能得況復多耶因茲總將作福故知無一隨己可不實乎言如是至磬者隨命長短作者謂未死之前於其中間隨其延促於中示導故故也打無常磬者玄曰據命未終前根識未壞時打今氣絕後為之則於事無益也二送終法牒名如文言然至善者此蓋立送終意非謂制意已同前述了遶存出離者謂本心所期出離生死凡設儀式少欲遠離俗風也厚者華飾也葬土者埋藏也去泰者離奢侈不彩舉慎衢去約者不露屍而去也今取中當務令善生也言就至法者如文言初中至耻者四分尼搥𦚾者此是尼單提中尼共他爭事不直便搥𦚾哭招譏白佛佛言一搥一提一渧淚落地亦提僧犯吉已上制緣中也至開緣中云不餘不犯既不制死哭之罪故知今時師亡弟子哭無過反顯五百問論不犯也若准已下明有緣不犯之文故五百結集文曰諸未離欲者舉身投地悲泣哽咽良久乃蘇等云云栖心獨居世表高節自然拔群一受行若霜天即是由來清潔父母亡而不哭俗禮不容二師死而不哀律儀未許故曰道俗同耻也言彼至所者辨吊慰法池執弟子手者是亡人之小師也荒迷故所以執之然後至師處依法吊問等若准俗禮五服三之制五服者謂斬縗齊縗大功小功緦床也三者從十九至十六為長十五至十二為中十一至八歲為下七歲已下三十九服之以日月服有三種一正二義三降今僧尼皆是降服喪儀云和上位尊同於父母三師七證例彼舛無降此緣情唯達者進不俗中服布麤細五等俗有冠經僧尼以頭巾替之杖用扶力僧尼亦同若未殮前但在苫己之位吊者哭也亦無佗詞三曰成後之後方申儀禮若奔喪者明其在外時若附哀信須通別人為其舉發後疾疾歸見星而行見星而舍若已安厝即先至墳處展哀情若未還山直歸本處展哀在慰一如常儀也以衣覆根者五分初緣比丘露形去招譏佛令以安多食覆若露屍去犯吉謂現前者吉也白蓋者表雙林變白也周圍表不露形也四人擎之表不編邪香烟引導表善業如香一寺相送表猒無常令觀察也二明葬法牒名可知言中至爾者火葬者十誦云比丘疑身中有虫燒之犯煞佛言不犯人死虫亦死也林中葬棄之林野者俗中莊子將死諸弟子厚欲葬莊子曰吾以天地為棺柳子曰恐為鵰之所食莊子曰在上為烏鵰所食下又為螻蟻之所食奪彼與此何其偏乎俗人喻事君子尚然塵外高僧寧容厚葬十誦鳥腹破等者彼云有比丘病有錢畏眾僧得遂持安羮中喫之死後鳥來破膓出錢鈔引此文為證前林葬也然則殘屍雇人展轉准得者此謂商略火葬此方准用得意道火葬一法然則殘害師師遺骸弟子看之不忍若不忍看者准涅槃經雇人展轉教他亦得也言四分至時者五眾得起塔者如前僧像篇六種塔也搜玄引十二因緣經八種塔有露盤如來塔八露盤菩薩七緣覺六曰果五三果四二果三初果二輪王及未得果人一露盤今有一家記中云佛七已上也乃至者得果人及輪王未得露盤但有火珠舊葉耳與上經文不同量機衰時者送是親送即無失若非親恐污佗平等心即不合也上來總是瞻病篇竟次下一篇總辨諸雜要行分二今牒名言諸至二十七者來意已上諸篇已隨事辨相然雜務繁總量乃塵沙若不備明行相難曉故次辨也釋名以事非一名諸𤨏碎共明秤雜動必須之曰要所以依用曰行餘如常說云云有本中有注文於顯目下此有無總得總意中言森至識者森謂多㒵也以受戒時總緣法盡萬境皆發得戒今於隨行則一一境上盡須護持也忽略不行等者謂若略而不行冥然招其罪失故曰奄遭悲責謂於一一事上皆須識知持犯故曰理須明識也言若至別者由途相攝具上諸門者古解如別今云由從也途道也謂上諸篇凡明一事正引諸部相當或相從引其異說聚在一處顯四分行事途道此則諸部由途相攝由明大僧一事途道尼沙曰眾事同大僧相狀少異相從引之攝在大僧途道之下此諸尼沙事同相異由途相攝如此具在上二十六篇故曰具在諸門也別類緣收者上則約部相當或別相從故引及尼沙事同大僧相狀少異者說今則唯局別者諸部異計尼沙大僧不同之事辨也沙彌及尼三眾諸部行相不同事各有類故稱別類統由通也隨類通攝故曰統收即尼沙彌諸律三種部類不同今通收羅列故云羅下三部也以外等者謂上諸門不攝下三部此不收者名為以外即除前相攝去後別類其餘繁類斷續雜務紛綸碎亂𤨏文合作此篇明也眾境不少名為繁類事不連環故云斷續事既非一難可次比頭緒故曰雜紛綸繁類為碎紛綸是亂如此無非玉屑相綴故云鎻文合成此篇與上不同故稱為別問據茲所解尼沙二部應不用行答尼沙二部與大僧雜行不殊故不言也若爾既云不殊何不在由途相攝之例前約事𨳵相狀少異故有相攝之言此篇五眾通行故無相攝之語又同此篇何不在後明答此雜明者並是諸篇篇餘上收由途下攝三部故處中間倣律雜揵度亦在中也言其至焉者正辨此篇來由也謂戒是涅槃初門將雜行而軌導倣塵不犯故曰具修諸佛所行名為聖行莫論後世者出纏證果之益當今遊論方域而無怯懦之心焉開章中言十至病者如文言智至故者盡等者謂晨朝午時晡時也良以無始時來多有破戒等故須懺悔多嫉妬故須行隨喜多謗法故須行勸勵請轉於法輪若准經中更有向為除狹劣之心發願除懈怠罪等有人於此廣說四時禮文等今恐繁而不述不得瓔珞等著佛身上者謂著身上非尊重故不合也不得花著飲食上者多論不許為異白衣西土白衣飲酒之時相承著花教於酒器之內故佛臈食者謂七月十五夏滿食也臈接也新舊相接亦是祭名俗法十二月終新舊交接之時臈取禽獸祭先祖今出家人亦爾若終七月十五日供養佛食名佛臈食以此食屬供養佛人比丘雖先提受佛檀越後與無惡觸過也言十誦至法寶者教沙彌使人亦爾者謂教示佗令修治塔次四方四事亦如上作念也攝在惡逆眾生上品治之者謂入五逆中上品治之者是重偷蘭也以佛塔惡懷之者以好心得福反顯惡心獲罪也法寶者以法假人弘其人既能說法若供之即供養法寶故言十誦遮至者與一剪者約再生物為言如苦苣等類若非再生但量功取也故祇三十三云有比丘於地上種菴羅菓長養成樹自取不令他取論比丘白佛此種有功力聽與一年若樹大不欲併取者聽每年取一枝乃至瓜瓠與一番取等花菓不詐賣者玄云此是僧家要用者必不得賣於僧地餘者亦得賣也四分僧物賣分犯蘭者約暫礙僧用若求已如前可知言祇至報者轉法輪日者多論第二曰八月八日轉法輪佛與拘隣等五人前三即安居已至八月八日得入至見道成初果爾時始名轉法輪也卒風雨等既有風雨佛制令收不論德行也餘如文言二至等者僧通凡聖行涉麤細者玄云細行是聖麤行是凡意顯入集時通敬通重也如拭塵巾者古云然巾攬穢歸己顯物令淨入眾之人亦爾收過向己推直於池俯仰得時者見上須起見下不起也師子座者智論自問云為是化師子為是實師子答非化亦非實也但是佛所坐者皆名師子座譬如國王所坐之處亦師子床以師子是獸王無畏故不得有重響者古云令眾不和故維那口陳其緣者謂或布施呪願及唱等供等不得打為事用者謂口中不陳苦事空打搥除為眾亂等者但打一下雖不陳詞即此搥聲人聞便靜即是事用也三別人自行標名可知言十誦至亦爾者五分初緣讀外書居士譏呵後與外道論不如白佛佛開為伏外道故聽之言五分至學者除無人難緣者此是尼單提中半月不剃髮者提若過半月此名髮長若無人解剃髮若強力難緣所逼不犯言四分至一者或至死者謂犯初篇也若次死者犯第二篇也多作業者謂多作白衣業也財物慳者可知當招貧乏報也法慳者於十二部經義故秘不說向人當招鈍滯之報也家慳者謂我與此檀越為門師不欲別人來他舍也因說須達家㺃云云住處慳者當招不如意處也讚歎慳當招惡名稱也言四分至也者羅漢射事不中等者搜玄云十誦第三曰目連乞食次居士婦懷任問目連為男為女答云是男後生下是女招佗譏呵僧欲棄目連佛言不開目連之事非是妄說以彼胎內轉根故更有天旱問雨入涅槃經記犢子等云云不得離餘地獄者謂設呪誓我若如是願我入地獄等若恐怖念如來者以怖畏自滅也畫地作相者令當中行不徧也言僧祇至處者不聽口吹者表釋云恐捐喫火虫命也又舉喫熱茶湯之喻云云以本無言念齊限者約白衣不令夜燭日中滅之也目連知日直滅灯者准賢愚經說佛在舍衛國有一女子名曰難陀貧乏求乞自活見一切人供佛及僧乃自思惟我雖遇福田無有種子感傷自責便行乞匂竟夕夕得一文持詣油家買得少油持往精舍燭於佛前眾灯之內自發誓願我今貧窮然此小燈供養於佛以斯功德令我來世得智慧燈除滅一切眾生垢闇發願已而去及至竟夜諸灯盡滅唯此獨然是時目連次當直日察天已收曉灯併燭當見此燭明好如同新燭便舉手扇扇其𦦨如故又將衣拂其明轉盛佛告目連非汝聲聞之所能滅假使注四大海水注之亦不能滅又假使毗嵐猛風亦不能滅何以故此是發大菩提心人所施之燈佛說是語未竟難陀女子又來詣佛頭面禮足佛為授記汝於當來二阿僧祇百劫之中當得成佛名曰燈光十號具足等餘如文言四共行同法者凡聖共行名為共行僧尼同此故云同法言所至多者神用莫准者謂若一同契理即神驗無方如金剛強若受持一四句偈勝日捨三恒河沙身命布施當得成佛其餘何可為比也互有強弱者下文云有念極多於義不了或少聞見而多解義味等貴如說行不貴多誦者增一云盤特比丘根鈍等緣因掃而悟解云云由道有根本者即勝鬘經及如來藏經是大道本也行別止作者戒本是心持羯磨是持此二是別止作本者戒是顯非同體也佛法根本及心作二持即是通攝佛法剛要多聞增智慧即能匡轉心行及廣解理相見菩薩修行即助於道業得無退修心不馳教故曰得無罷教雖不依文生見者謂讀俗書雖不依俗文生於邪見然要覧中多明節梀亦可足比於內道固免隨事躭染保言犯也若多聞多義此號生而知之上以學而知之次矣言三千至也者或可受苦因者約不修三乘為施所欺故說法無慈心者但求利益也若師田在等者但隱師學不可競化年別應受等者溫故而知新也五夏以前等者經文亦制五夏也顯德有二等者一為名利二為佛法上一佛不許如賓頭盧𦔾之類律中餘疑即十誦律如盤特教誡之事故現通等即許云云五出家要業者標可知言道至遂者別知其通房者道修智分俗修福分是局若二兼修即通非謂下出通局所以也必准兩通者道俗俱修福慧也若偏而不兼即如智論兄弟二人之得失也必能反遂者可知言今至業者今且兩言者若力所不及俗且修福道且修智故也僧有法能造者即僧指示陀也俗有事能作者金木石等也終日相由者僧由俗資俗假僧法也執據恒別福慧別也乖法雜亂者如僧却修福之例也學三佛行者過現未也雖形事相交者造佛書經起菩薩僧欲皆自親為之是相交也俗則以金石木為佛等云云如此比挍天地懸遠故言上至別者始終兩修者初受戒時結勸文中但令觀化作福供養眾僧等云云六遇惡賊標如文言四至不犯者如文言毗至行者方便怖賊法也石下者十誦云時有賊遶寺比丘閇門上高樓作大音怖怖令去若不去即擲石下煞之時二比丘擲石下煞一人自相問云二人不知誰犯煞乃白佛佛言二人並無犯以擲石時唱言石下故也七大小便法者標可知言四至便者廁外彈指令內人知也准五分廁內人亦須作聲等不爾二俱犯吉也廁草長不過一尺令非人知者若不彈指廁神不知而相衝也應別處洗穢者初綠就水器中洗係比丘污之佛言不應耳應留殘水者五分云上廁用水盡應更取水留之無有急事令得足一人用也勿令有聲者彼用水時有聲餘比丘聞惡之佛言不應如是也以弊物拭者彼洗水污衣佛言應用弊物拭之若臰用土者玄曰據經中說洗淨手當用土次灰從澡豆等若先用灰即臰氣人皮肉中不歇故五分倮形上廁廁神為緣起故佛制不許也言八至不犯者如文言九至去者五百問行路寄鬼神屋宿等者約不得令佗慳也今既不觸即是不慳也以泥團者謂將泥團掩著虫身虫被泥綴不動然後將出弃之有呪虵法者准五分云我慈諸龍王天上及人間以我此慈心得滅諸患毒我以智慧取用心煞此毒味毒無味毒破滅入地去佛言比丘以此呪自護不為毒所害也十雜治病法釋中兩投一一如文科云云已上諸雜要行篇已竟上來有二初十篇烈釋次一篇總結云云音檽靈音傍音吳越國天長寺長講律臨壇崇福普濟戒光大德賜紫志貞寫此記一部記焉旹清泰元年歲次甲午十二月二十日齋時寫過此本僧志謙故記之耳也
