body:
  text: 吳越國長講律臨壇賜紫清凉大師景霄纂第二依文別收即分兩序也大科恐繁不引云云夫兩序者准諸聖教或具不具且如多論佛涅槃後造發智論二序全無又阿毗曇心論但有發起無證信又雜心論唯有證信無發起今四分律二序具全鈔既宗四分二序亦具然則安布與律不同若約總別以說即同謂律文五字偈為總序從爾時世尊在俱蘇摩國下為別序今鈔亦然前明總序後明十門各別也若就證信發教起說鈔與律則異律雖先明總序總序却名證謂部主分宗之時先歸敬三寶證之令信後明別序別序却名發起今鈔不然先明總序名為發起後十門別序名為證信所以有此不同者謂部主將弘律本意令久遠流行必先證之而令信也然後方甲發起今師製鈔先辨發起之由恐行事有妨後作十門證信為有由致云云從此依文敘諸小科不具列云云初言夫至像者法喻總歎也問古今製作雖弘聖教恐有魔事皆先歸依三寶請求加護欲令其教久永流行如唯識云稽首唯識性滿分清淨者又俱舍云敬禮如是如理師等又百法疏云惟至理杳冥又慈恩疏云蓋聞至覺權真等皆是歸敬之詞今鈔何不歸依而直歎戒德答多解初云夫歸敬有二一冥二顯今鈔欲著述時已冥心歸敬了不更顯歸敬也次搜玄云鈔宗四分律律本之中云稽首禮諸佛等既安歸敬是以鈔文承律文更不重述或有釋云但隨著述人懷有無總得已上並非能繁云云今依順正說云夫歸依者三業為體如跪禮是身業歸依佛有天眼能見發言讚歎是口業佛有天耳遙聞意中歸依佛有他心遙知今既入文歎戒乃是口業歸命法身法身自食三寶廣引下事證對講明之此解雅當次銷文夫者兩解一云發端之語如云竊聞恭聞等例云云二云蘊深旨曰夫謂此戒德難思是深旨也今欲仰歎故稱曰夫世單言戒者簡於定慧乃是遮詮合言戒德難思即是持體德復是表詮今此戒字儒釋兩解初儒解者周易云以此齋戒韓康伯注云洗心曰齋防患曰戒齋者齊也齊整身心令不放恣如國家欲差官寮祭祀天神地祇先七日致齋三日不行鞭杖清潔身心以祭神祇用希福祐今釋教不過中食為齋取一分清身之義故曰洗心曰齋也戒謂警也警察五常恭之在心恐患身故恒須防擬故口防患云戒此謂儒道立身之本也次依內教解者諸釋蓋多莫先禁義之中但取善禁惡令不起過名為善戒又於善戒中有定散差別今此乃是有漏散善非定善無漏也故下文云依因此戒德有定慧等德者亦兩解初依老子音義云德者得也謂有所得又字統云內德於己外德於人常無所失此則內有德可以聞己外有德可以五人如顏回有德故居四科之首等云云次內依教者德謂功德且戒因名德是果稱一有漏德人天果是故戒經云明人能護戒等二無漏德即菩提涅槃故戒經云戒淨有智慧等云云斯之二德之果皆藉戒因而生故是戒家之德約釋分別戒之德依主難思者難者不易之談思謂思量測度謂此戒之勝得非口所宣非心測度超不思議之境故曰難思故下文云下為六道福田上作三田種乃至功德不可思議豈准言論能盡今顯斯相略分四稱故俱舍頌云離犯戒及遮名戒各有二非犯戒因壞依治滅諍等故曰謂身口四諸不善色是名性罪故言犯戒言遮罪者非時食等離犯及遮俱說名戒也為有二者此遮性二為有表無表也上且云釋名次明四德一非犯戒壞即離犯難思二不為犯戒因壞因即貪等煩惱即離煩惱難思三依治者四念住等對持前犯彼因故即對治難思四滅淨者回向菩提非勝生故即涅槃難思也又頌中言淨者謂具上四德戒名清淨與此相違名不淨也頌中等字者有師說故知戒淨由具五因一根本淨離惡根本二眷屬淨離方便三非尋害離惡也四念揀受念三寶也五迴向寂滅求涅槃也上且依俱舍明之或依扶主記中別引六種恐繁此不敘也冠超眾像者冠者慧地超者過越也眾者諸也像者物像也上略別敘次廣解者周禮云未在首曰冠平聲在首曰冠者去聲禮記云男子二十四冠之父母為立名而召體朋友為作字以彰德又莊因云冠圓以像天天能覆於萬物冠持髮以為首飾自後不改其制也又儀服記云冠者蟬冠古來皆戴之謂蟬虫飲吸於露而體清今戴此冠表男子有清恒之得後制頭用褁冠上唐朝高祖賜巾子用替其冠迄今不改更有武士冠學冠等又易云冠雖賤而不可以處下屨雖貴不可以居上此既最尊高超過諸服之上故曰冠超眾像上喻竟次下法合別腕之戒最為高貴猶若於冠為萬善之因基一切定慧從茲立故所以超也古云嚴色身之儀服冠最居首飾法身之功德戒最為先二種相當故將譬収科云云言為至唱者舉迅事別歎也鈔文都有四段一軌導五業方運載三寶功德定慧四住持息唱初言五乘之軌導者此唯歎所詮行也為由作也五者數也智論云一人二天三聲聞四緣覺五菩薩也乘者涅槃遠疏云運載義運障令盡運理令顯運行令滿運心令圓之者助語之詞也軌謂軌則導謂引導左傳云引物令通曰導以表此戒能作五乘軌則導引故曰為云云上來略消今更廣辨如一類有情受戒之後嚴潔護持從始至終不令毀犯為求當來生於人中後必依願即此戒能為人乘之軌導又有一類眾生亦持此戒願生諸天亦隨其意即能為天乘之軌導復有一類眾生堅持此戒不犯觀四諦理伏斷煩惱證四沙門果即此戒能為聲聞之軌導復有一類人堅持不犯觀十二緣證辟支迦果此戒即為緣覺乘之軌導復有人堅持此戒無犯修六波羅蜜誓求涅槃之果此戒即能為菩薩乘之軌導上之五種果報皆以別解脫戒為因方能運載行人到於前所故曰為五乘導也已上舉僧尼所受別脫戒以論但為持人心邊有五差別已外五八十二亦二背能為五乘之因例此列妄若依諸家記中使持五八乃至三聚淨別夕配句五乘果上却成絞局不為雅當也寔三寶之舟航者運戴三寶得也寔由寔也三寶如下明舟航者字云單船曰舟雙船曰航又解渡水曰航不渡水曰舟舟是體航是用今鈔文體雙彰也又周易云刳木曰舟割木曰檝內空曰刳外削曰刮置舟檝有濟凡之用此是喻況今法合者謂今僧尼剃髮染衣受持禁戒入僧之位即住持僧寶又能書寫十二分教即住持法寶又能建立形像塔廟即是住持佛寶豈非住持三寶之舟航又地持云三十二相無差別因皆由持戒所感即是佛寶既成佛已演四諦教即是法寶度五比丘即是僧寶此則戒為化相三寶之舟航又智論云先持淨戒後證五分法身是佛寶又得擇滅無為是法寶復得無學功德是僧寶此則戒為理體三寶之舟航已上三種三寶雖殊皆用戒能運載故曰寔云云古今相承以義門料簡略四別一釋名二差別三辨體四所以先後初釋名中復先辨三種別名次釋寶之通局初中梵語佛陀即此翻為覺謂覺察覺悟也又自覺覺佗覺行圓滿等云云今但云佛存其略梵以生善也二梵語達摩耶此翻為法法有二義一軌生物解如言無常則令人生無常之解故二住持自性謂能持色二十等當體故三梵語僧伽耶此翻為眾約體四人同六和義次辨寶之通號者寶性論云真寶世希有明淨及勢力能能莊嚴世間㝡勝不變等所言希有者世寶貧窮且無三寶福薄不遇故經云諸佛興出世懸遠值遇難二明淨義世寶體無瑕垢三寶絕離諸漏三威勢義世寶除貧去毒三寶六通難思四莊嚴義世寶能莊嚴色身三寶能莊嚴法身五最勝義世寶諸物中勝三寶得無過上六不變義世寶練磨不練變三寶八法不傾謂利譽稱樂四順也衰毀譏苦四違也已上六義雖殊莫不同訓珍美約釋分別即帶數第二差別者准諸經論總有六種小乘三種大乘三種者一理體三寶戒疏云五分法身為佛寶滅理無為是法寶聲聞學無學功德為僧寶二化相三寶者釋迦道王三千界為佛寶演四諦教為法寶度五比丘為僧寶三住持者形像塔廟為佛寶舊云泥合龍塑像也紙素竹帛有漏卷軸為法寶舊云黃卷赤軸受持禁戒剃髮染衣為僧寶次大乘三種者一同一體三寶並於真如建立真如身上有覺義為佛寶真如身上有軌持義為法寶真如上有和合義為僧寶故涅槃云若能覺三寶常住同真性此則佛是佛㝡上之誓願二真實三寶者唯佛二空真如無漏法為真寶故謂取法身并自受用報身為佛寶下取他化無漏本質教為法寶十地菩薩為僧寶戒疏中無真實三寶今依諸經論敘錄之二別相三寶者三身如來為佛寶大乘教理行果為法寶地前地上為僧寶三辨體者例上分二別明小乘者理三寶並為五分法身為體二化相者佛寶有兩宗初薩婆多唯取佛身中無漏法為體即心所法也通大地有十受想思觸欲念慧作意勝解三摩地大善十地信不放逸輕安捨慙愧無貪無嗔不害勤及同時心王生住異滅無表已上諸法具五蘊性次經部宗無漏法如前并取佛色身通漏無漏也法寶以本後二智為體或可以聲名句文僧寶用五蘊為體三住持三僧寶並以真如為體故唐三藏云三寶之體不離真如二真實三寶類前差別中可解莫非俱是無漏法也三列相者佛寶中法身以無垢真如為體自受用報身以無漏寔智為體他化二身以化五蘊為體二法寶以教理行果為體三僧寶以出家真行人五蘊為體已上大乘出體竟四所已先後者且明所以不多不少正立三寶者何答有三義故一則三世諸佛常法須三二對部三寶以立而翻彼故是以經言歸依佛更不歸依大自在天故云云三約喻立三如世間人有四大病欲治此病先求醫人次須良藥後須看病之人要具此三方得除愈今一切有情煩惱之病亦復如是故智論云佛如醫王法如良藥僧如看病之人要具此三即有情煩惱病也多則無用少則不足今五三種正處其中並所已竟次先後者若論一一體亦無先後隨所總得今總義分三種先後初約勝劣者佛是能覺之人為方有所覺之法隨覺修學名為僧故律受戒法文云如來成道號佛佛演四諦名法後度五比丘名僧化儀次第不可乖矣二約師資明者法㝡居先故涅槃云諸佛所師所謂法也以法常故諸佛亦常即法先也次佛後僧先者三約信已明者僧㝡居先如舍利弗見阿比丘容心寂靜乃生善心次為說法後當見佛故戒疏云所以僧初佛後者道假人弘世途法爾故迦竺初達現僧儀相述五乘為善因明三途為惡果現法儀也斯法遠大非凡小之所開故表𦘕像於凉臺推其所說現佛儀也上來有四云云惣當明三寶章也依教建修定慧之功莫等者此明行勝也依謂依憑教謂律教亦云約三藏也建建立修謂進修定則經之所詮慧論之詮旨功謂功能莫由無等者覺等意顯出家僧尼依憑律教建立修行則功高定慧故云莫等問何故不等答據勝劣以說定能證心慧能斷惑㝡為殊勝故俱舍云若離擇法定無為能滅諸惑勝方便准此即戒不如慧今言莫等且約始入佛法依法修行三學之中戒居其首斷惑證理由戒慧如縛而生故戒經云戒淨有智慧便得第一道又尸羅清淨三昧現前又成實云戒如捉賊定慧如殺賊戒且不如今元由須戒捉此中捋弘律教故偏歡尸羅欲使行人遵崇此教上言依教即舉律能詮下言定慧舉二所詮盖是影略之意不同諸家溫亂慧云住持佛群籍於茲息唱者此明教勝也眾法住持於群籍也謂住持由行此行教詮行既住持中強詮文自然殊勝前則舉教顯教下所詮今則舉行顯詮行之教二處互舉能所自分也教鈔文住謂久住也持謂任持久住任持世尊教法故曰住持佛法也群籍息唱者群者眾也籍謂典籍經論既多故云群籍息者休也唱者說也律久住持一明佛法於像季之中伽藍置設訓導俗四僧羯磨治罸擯駈輕重七非萬二千年真規不墜此皆假律所施行餘二於此之時且須休說故云於茲息唱双科云云次約法就時辨其興替上既歎所詮戒得顯能詮文優強未翻此文弘演是以約斯教法而就於時用辨其興隆兼明替癈生制作之遠意故就中分二開科云云言自至典者此文二意一為戒有勝德故佛偏弘二又須知教典即是佛之親說也自大師在世者自由從也大者簡小也三界中尊德無過上故論中具四義一者因大誓度群生二果大證大菩提三所證理大真如廓周沙界四能證智大圓鏡等四智三界二果受名之曰師在者住也世者間也俗云世世代子繼父為一代三十年為世內教云世為謂世間殺那無常非久固義名世住其中故名間世間有二一以極微為體可遷流被壞故云世住中故間也二有情世間以五蘊為體亦可遷流名世住其中故名間也釋名字竟今更略明行相者且器世間成住壞空輪環不盡成了即住住了又壞壞訖復空如是經二十劫共成八十劫也有多種如別處明今此所論是增減劫謂此世間被三灾所壞火灾欲界并初禪水壞二禪風壞三禪若四禪不為灾壞餘二灾如別所明今且說火壞欲界初禪者委何時壞耶且如今是住劫二十中當第九減劫人壽百歲時牟尼出現入滅已後百年減一年如是減至十歲有一小三灾起即刀兵疾飢饉損害眾生從十歲後却入增劫百年一增一年劫章云子年倍父增阿舍經亦如是增至八萬四千歲即當第九減劫又減到八萬歲時慈氏出世又減又增至第十五減劫時九十五佛相次而出如是至第二十劫唯增不減此增八萬四千歲時住劫已滿於此之中須以三句料簡初一劫唯減不增後一劫唯不增後一劫唯增不減中間十八劫一增一减今時世界將壞壞法有二初一十九劫壞有情次一劫壞非情於有情中先壞下三趣後壞人天就下三中先壞地獄故論云壞從獄不生謂此世界將壞之時阿鼻等獄更無新生有情便當壞劫始也若受罪業滿之者轉趣二禪若受業未圓并新受業者且移向他方世界地獄內也准此先壞阿鼻地獄次壞上七熱地獄又壞八寒諸有情也次壞修羅餓鬼畜生等皆生人中次又壞人天於人四洲先壞南洲欲壞之時有百億飛行夜叉巡空唱云此劫將時有百億人聞此聲心生猒怖初有一人無師法爾坐得禪定從定起出已唱言定喜樂甚靜餘皆効之坐得初禪定從此命終皆初禪也東西洲亦爾北洲先生欲天此壞人趣後壞六欲天其中天子皆生初禪壞欲界有情竟次壞初禪初禪有一有情無師爾坐得二禪定從定起已唱言定生喜樂甚樂甚靜餘皆効之從定出已唱言定生喜樂樂靜餘皆効之從定出已命終皆生二禪也已上且據大災從欲界壞至色界初禪以說若論水壞二禪風壞三禪一切有情皆生四禪四禪不為三災所壞故佛說四禪名不動地喻密室燈廣如論述已上從地獄有情壞至初禪有情如是凡經一十九劫名壞有情世間也次一劫壞器者謂雖壞有情無人空有有止住處所如同空宅一般今欲壞此之時日加四倍之位河池之內乾枯草木樵壞次有二三日出諸江河等悉皆枯竭大海水三分減一又四五日出海眾頓竭㝡後六七日現一切山石皆融大海須彌一時火起如燃蘇木無有遺餘婆沙論師有兩解一云於此世界成時有七日輪持雙山下且放一出照燈世間令至劫壞時更放餘六出二云唯此一日倍常七日之極江海乾竭眾山洞燃洲諸三輪悉皆焚爇所以論云壞從獄不生至器都盡問一等是壞何故有情用十九劫非情但要一劫答論云有情是別業難轉故多非情是共業易轉故少已上火災二十劫壞六種世間也次經二十劫上下猶如黑此空二十劫次辨二十劫初一劫成器世間次十九劫成有情世間初一劫成器世間者故俱舍云成劫從風起謂從二禪下有微風起經下初禪舊時梵王住處遂立梵王宮殿并梵輔眾天等此成初禪三天竟也又微風至欲界置空居四天住處次有猛風盤旋至欲界下本着風輪處結成風輪為世界底其輪四面量合六千界上下百六十億由旬形盤緣仰周旁布持水不散其輪堅硬縱使諾健那神執金剛杵擊之亦無損也風輪既成第二禪有光音天布金藏雲其雲密如藏色金故云金藏也既布雲遍三千界乃降其雨滴瀝如車軸住風輪上而成水輪厚十一億二萬由旬又於此水輪數內取三億二萬由旬如享乳一盤凝為金輪餘八億由旬是水輪既金輪已光音天又布雨向金輪上以為海水有情業减感巧風皷擊成妙高山以四密處成故云東白銀西牛頗胝南瑠璃北黃金也出水八万由旬入水亦爾也於山頂置三十三天宮殿又於半腹四層級間置四天王居處又於妙高山外置七重金山一持雙山双留瀧通故云二若持軸山山有諸峰形如車軸三擔木山山有穴樹形如檐木四善見山山松秀異見者生喜五馬耳山山形如馬耳六象鼻山有神形如人頭如象其山似彼神鼻故七魚觜山山形如魚觜又此七山之內各有香海又於七金山外置大䥫圍山遶之䥫圍山有醎海於醎海中置四大洲人趣居處有情業感土石而成一南剡部因樹立名二西瞿陀尼此翻牛貨彼處以牛為貨三東弗婆提此翻婆勝身身形勝南洲故也四北單越此翻處或云勝生已上成人趣四洲竟又於大海邊置修羅餓鬼傍生居處又於南洲地下安置炎魔王宮并二八地獄住處如是一劫成器世間雖有處門未有情喻似今時造宅雖成無人居住如此經一增一減劫也上明器世間已竟次一十九劫成有情世間者論云爾時二禪有一天子順後業故生向初禪作大梵王雖為梵王而無眷屬但獨住故經云一增一減遂生念曰無有一人與我同分梵王纔作念上界之中有諸天子順後報業來生初禪為其眷屬即梵輔梵眾王曰我始生念汝便生來是我之子彼亦云我因梵王念故得來此是我之父又漸生六欲四洲漸漸多故或人中造業之者生修羅鬼於趣畜生後有一有情造無間業墮地獄當知爾時成劫已滿故論云成從風起至地獄初生已上都二十劫成二種世間竟也成後又住後又壞竟復空如似轆轤終無窮盡今則正當住劫來明第九減中牟尼出興世間為化有情故曰大師在世也有於此八相成道全不當文意知之偏弘斯典者偏謂偏頗不平也弘為揚也斯此典謂教典謂佛在日偏頗弘楊此律教典具五義故所以偏弘一金口親說二同界盡集三准半月四須法界五准具戒得聞經論反之故偏弘矣收科云云二約時辨典贊中開科云云言爰替者此及反意道上明佛在之日偏自弘持既受請涅槃金河息唱未知後更須誰人弘宣教文疏之末代故有四依菩薩繼跡猶典故有此段也爰者爾雅云于也今借訓及及者於四依盖取相接之義也四者數也依者依止謂有三種四依能與世人作於憑止住故言三種者一人二行三法初人四依者准涅槃經云善男子有四種人能護正法建立正法能多利益憐愍世間為世間依止安樂何等為四有人出家具煩惱性奉持禁戒威儀具足能為他人分別宣說八大人覺為初依准此是外凡位也八大人覺即二十故寂靜正念正定精進曾媿正思是也斯須二果為第二依阿那含果為第三依阿羅漢果為第四依問四依菩薩為約大乘約小乘若是小乘不能弘持若是大乘何故上來將小乘四果等配屬答夫降世弘揚摧邪顯正必是大權菩薩傳演流通若實聲聞不能攝化文雖舉四果且等相為言如迦葉阿難當成佛位故經云內秘菩薩行外現是聲聞若將大乘行位配之即地前三十心為初依登地至七地為第二依八九二地為第三依十地已去為第四依已上辨人四依竟不同諸家所釋雜亂又不同搜玄取五師中前四師為人四依也二行四依行者夫四依出世須行四依正行故次辨行四依故律云三乘行者通所資用一者糞掃衣以蔽形故二長乞食故以無飢故三樹下坐以形覆故四腐藥以治患故此亦且約制論然各有開通不類提婆所立也三法四依者准歸敬儀云始終初賢終乎極聖人資無漏法體性空據此依永理無邪倒故立法依顯成揩定一依法不依人謂法性涅槃之法不依聲聞之法二依義不依語謂依覺了之義不依倚飾名二之語也三依智不依識者謂識智性滅智當住也四依了義經不依不了義經謂無上大乘之典是了義二乘教文名不了義也已上三種四依雖別皆是一人所行必具此三方堪弘教今二十四員菩薩一一是之相續傳燈明明不絕故曰爰及四依遺風無替者遺餘也風教也無者對有彰名替者癈問所以將風訓教者答如世風有美靡草之能也故儒書云風者是陰陽之器相擊相而成又云因虎嘯而有東風謂之谷風春風也谷者養也谷養万物故南風謂之凱風夏風也凱者長也長養万物成五故西風謂之凉風秋風也凉者薄也衰薄万物故也北風謂之風冬風卷者終也万物成熟曰終所以此四方風各異者東即喧氣初生南即皷萬物而成西則金颫熟物北即陰氣凉別萬物凋枯四時既殊是以春生夏長秋凋冬落世間風由爾教亦如斯能令行人五五五分法身初生次長述華結果不夫於時皆從教而生故謂佛在日其風廣扇涅槃之後四依菩薩副續典縱分五部等殊亦名未名為訛替以有四依為住持與佛在時更無差別故云遺風無替也收科云云二像末住持訛替中分三初通明時移教替二所以下別明此土傳持有失言逮于至事者此段文通西土像末之時教法訛替偏說此方故移在三失之前與顯正有異也逮由及也于由於也像似也季者末謂通明佛法總有三時一正法時有一千年正者聖也具有教理行果四法即真如之體凡聖所依從茲流出十二分教皆有所詮之行依教修行必獲果證與佛在日不別故云正法也二像法時亦有一千年但有上三少有果證似像擇正故云像法也三末法有一萬年去聖時遙眾生無智有教典不肯修行望於正像將為漸未但有上二全無行果故云末法又於第二像法一千年中前五百猶有果證後五百年但有上三今鈔制作去佛滅後已一千五百七十四年即像中之末故云像季也古來多約末法以釋者非也時轉澆訛者時謂時代轉謂移轉像不如正時像末不如像初故云時轉者澆者薄也訛者謬濫也如世有物不方不圓又無稜角曰訛今人弘法不如正及像初故云訛也爭鋒脣舌之間者爭者競也鋒者刃也說文云刀端謂世有三端辨士舌端文士筆端武士刀端上之三端甚利如鋒刀筆二鋒但損生身若論舌鋒生法二身俱損謂出言害物故如鋒也劉子云口含鋒刃動則傷人今此爭鋒是舌鋒也又所之事淺近故云脣舌之間也皷論不形之事者皷謂皷動論謂量皷動論量皆非典據形者成也凡是論量皆是胸臆所談不成典據上且一解又解形者身形謂毗尼軌事是比丘身之所行名為形事今非法自立條制無其典章不是比丘身所行事故曰不形之事故下文凡厥化止出應於彼正教都無詮述事起非法言成訛濫等此搜玄解亦通更有別解非正此于文約一五百年後西土不依教相但自憑虗大小二乘牙相非斥之例云云二別明此云傳持有失開科云云言所以至而已者所以兩字𧿟上詞謂上明西土像季闕四依菩薩典隆繼嗣方當訛替之時若約此方聞之久矣故標所以字也震者國名嶺者山號梵云震旦或云真丹栴丹指那指難皆梵音輕重此總翻為漢地若依婆沙論立二音一云指那此云聞物國謂此國多出異物為諸國之所聞也或作天字者或云武國恐非也即讚歎之詞二云指難此云邊鄙國即毀呰之詞也又西域記云摩訶指那此云大漢國今言震者是略梵也古記皆云震是東震以西國望此為震宮旦謂朝旦以日初出照於東隅其如丹亦云其丹等此非故也盖為震聲與此方震宮音同既翻未名不合就梵音釋義也嶺者葱嶺以嶺多葱故所以嶺國雙標者為簡濫也葱嶺已東六精胡國佛曾行有法流通今此所傳皆嶺西土境佛法從彼而來過此嶺故簡非六精胡國法也傳教者傳謂流傳教謂教法後漢第二明帝即位永平五年感夢金人緣起四十卷中也此來勞敘說知也七秊發使十秊即騰蘭入洛陽十一年造寺十四覺誠佛法其時釋教大行出家之甚眾故云傳教也九代聞之者九者數也代謂帝代若約此方帝代從開闢之後三皇五帝直至閏秦前漢自此以已前佛法未行此土並皆不論但從後漢明帝已後至今九代也一後漢劉代都洛十四主凡一百十五年二魏曹代都洛陽五主共四十五年三西晉司馬代都洛陽四主共五十二年被前趙滅有五子渡江南於靈地瑯瑘王秉制立為東晉土主都建業共得一百三十年也四宋劉代都業八主共五十九年五齊蕭代都業七主共二百十三年也六梁蕭代亦都業四主共得五十四年七陳陳亦都建業四主共三十三年八隋揚代三主効文帝者長安次揚帝都准南後恭帝亦都長安共得三十八年九巨唐秊代經今一十九業從武得初至景福初年凡一百七十餘年也然於九代之中亦有不定南取陳元數北取周為數即後周宇文覺等四大受元魏位魏即枯䟦代後從性為元也陳梁位今此九代必須數陳謂周與陳同時南北有別然周起陳二年既陳起在先即合數之不取周也有周為釋者盖未究其內思之夫九疋繞不過五法一五行相生如漢火魏土晉金宋水齊木梁火已上相生陳後歸隋隋是大德王主呼土不生大隋後周禪是木木生火周受元魏位魏是水水能生木故唐受隋禪位唐是土德王去呼火生土故二傳國王音從此秦始皇取藍田譬方四寸小缺一角蛟螭為細上有盤龍隱鳳求相李斯小菉兩面各有八字面文曰受命于天既壽永昌又上面盤處文曰受天之命皇帝壽昌秦傳漢漢傳魏晉宋齊至梁為侯景作亂竊之於栖霞寺為僧永收得永已後付弟子並曰智智遂獻陳陳傳于唐也三相禪去呼位與也讓也如唐受隋禪位等四居中土如洛陽九洲之中五童謠如晉時云五馬浮渡江小者化成龍又唐時云密密作唐唐得皆是也又於此五中亦未必總具或四三二皆降茲已外更有旁統不收如曹魏時有南吳西蜀西晉有前趙後蜀前梁東晉時有後趙前秦後秦後凉等諸國同時不永甲子並名覇主廣如別說此不繁云也拔萃出類者拔萃者是拔謂逈拔萃病醉反者聚集也穴草藂生曰萃中有一莖逈出於上故云拔萃出類者人也出者超也類者流類人藂曰類眾人之中一人智德過於眾者故云出類此中人草對論也智述而已者情智法述也此段明漢地九代之中古人不依律文但准典俗行持住於情智法術皆是臆見憑虗如有過犯之徒罸外及米鋤于收刈苦使周年並是師心行斯法術故云智述而已也更有釋云術者神術謂大智閑閑小智艱艱大智若道小智若術如古來有吞針噉䥫上釰樹登刀梯皆是一期約化若將此藝軌事化人即此淮南記解也言欲至評之者都有六句上五是別下一句是通解釋之時將欲之一字遍向五句之首又將者之一字通遍着五句之下又將可得詳而評之一句各向五句下結之云云初言欲明楊顯行儀者可得詳而評之欲者希須也明者顯也彰也楊者弘也行謂眾自共三世行也儀者儀軌也意道若欲顯彰楊其三行軌橫儀範者須是明律閑相者即可得詳而評支抦反之顯上來拔萃智術之人不在中論說可得者是明律也詳者審評評者論也下四句皆爾反顯智術不可得二欲匡攝像教者匡者正也攝持像是法教謂詮意道像法將末之時須人匡正攝持若是精明律相者即可得詳而評之若智術之流即不可得在此中之數也三欲埀尋範訓未學垂者從上覆下之貌也故經靉靆二十去呼也埀布等尋由常也毗尼常典千佛傳範者法也毗尼之法是其諸佛所常法故訓者誨也從言作川即言如大川有國濟義後進之徒名為未學意道今欲將其教法下訓末流者須明閑教相即可得詳而評之若如上來智術之徒在評論之限四欲紐既絕之玄綱者紐續也既已也絕者斷也玄者妙也綱網也毗尼是玄妙之綱今已斷絕像末之隆誰更續之若明解者可得詳而評之若上智述之流不在此言限也五欲樹已顛之大表者樹立也顛者墜也倒也大表是喻也如世津浦山川嶮徑樹立表剎者欲令陸行人見表知有橋道等水行見表知有是浦濟駐泊處所等今詔此律以為大表意顯能示五業之正路修行之者望表不迷今像末時其表已倒未審誰人再樹立之若明解即可評之拔萃之流不在詳審之限已上五句一一皆是及顯憑虗之類不可云云言豈非至矣豈可也非不也憑虗者不依教也易以形聲者形者身也聲者教不論量足別是以形不辨七非之相是易以聲軌事難為為露潔者矣者軌則事者事相難為非易也露潔者在天日霧露在地日泉源謂露從天降可不清潔爾軌範毗尼事相以六十法簡人於羯磨緣本則骨初三後五二四中間頭尾一言不許增略如是軌事如彼露珠之清實不易也故戰國䇿云如世人盡鬼魅者易為巧合上鈔文憑虗易寫犬馬難為工合上鈔文軌事難文次明晉宋已後七代之犯執有失開科云云言然至濫者此文約東晉後秦雖律本來古德聽習不精致愚教有失並未論章疏也然則二字躡上生下之詞然是也前修者一釋云南山已前依律進修諸古德也此解恐稍通漫也今但取北齊末製疏一類古德名前修也挓於律藏者此類古人確執律文不許加減指事披文而用用之者謂指前事披讀律文如作看病人賞勞羯磨不問前三衣六物具報皆牒六物之詞在文信於實錄者古師道此羯磨法是文金口親言固非濫說傳到此土是正翻但依文誦之信為實錄不可增略也而寄緣者今行非也寄托也緣即所為之緣二三中間是也良多也依文謹誦曰繁被事不成為濫上且舉此釋詣例所可知也第二段言加以至多者謂僧迦也者由也由前托執自是一重之非今複有添臆說故云加以也學者習學非由不也精為精通博者廣博故輕重儀云博通諸部精練是非於當部不能精於他宗不能博即古人矣並開二緣能也臆謂音臆古德不精不博凡論說二事斷割是非並是師心不開典據雖則未製疏抄依律用錯引不少欲故云尤多尤甚也如律云三衣須受持若疑應捨已更受有而不受吉羅應合加法詞句之文但翻譯家欠少古德不體此意便云不離身宿即名受持何勞詞句並不用也又一夏唯許三度受日不得重受又云自然界體定方等例皆成臆說云云言類至集者明取文下類非也此文大意前來古人不解引用他部唯執四分一文此雖解用外宗又乃引文下類亦成非也取謂採取類者流類寡少也薄也討謂尋論謂量也即採取事法之文緩急重輕與我四分並非流類也舉事釋者如古人見四分無持衣文遂引僧祇文來補之以僧祇是通夜護衣與四分明相流類寬急不等故羯磨疏云有人用僧祇受衣此迷教也彼律通夜此護明相緩急不等何得妄行今用十誦持衣可為相類上也疏文生常異計斯集者謂受戒後於佛法中名真生也常者上下安力訓恒也如俗云六尺為尋曰常即習俗生常不思㳂革故異計者文外之意曰計計與文差為異斯者此也集者聚也其人一生已來雖未著述鈔疏行及至被事之時常習異計之談不解取同計之說故云斯集集第二辨所詮輕重有失言致全至別者致令兩字躡上之詞由上來不曉能詮之文是以於所詮決判有失故云致令也辨別也折如挊也重罪釁輕罪曰戾輕翻成重重翻為輕故云倍分也釁戾是罪輕重是事名有倍分初約罪者如盜僧物合犯夷夷重古師云得蘭此判重為輕之失也如盜無主物佛物但得蘭及盜畜物合結吉古來並判重此判輕為重失也次約事者如亡五眾物中古人見律不許看五大色衣乃判其緋等入重黃白入輕如下二衣篇白色佛制不著扁判布絹入輕例於黃清赤等亦應分也古判入重即約輕入重之失也又古人見律判氍氀長五肘黃三肘相同三衣者入輕遂判被亦入輕攝以同三衣量故今云被是重物不可例之必在重攝以不合畜故古判入輕即時重入輕之失也如是罪之與事輕重一倍而分故曰輕重倍分眾網維持者謂受說安恣等並是僧維持法網也同異區別者但由古得於教不明所以於眾網維持之中將異作同作異一倍區分差別也今舉事解如蘭若處有僧坊僧坊藍墻既周但可准聚落依院相集僧古人亦依五里集此即灯同作異之失也又古人結受戒小界外一邊留相遂引僧祇捨衣小界彼亦立相今云此迷教矣僧祇不為留難但眾多難集佛令往界外作小界捨之元無界場之法為詺小界猶如四分界塲法中亦呼為小界立相耶許留一面相者則網呵今人即並無外相古人准祇文立相者此將異作周之失也已上准搜玄所教釋甚為雅當思之若繼宗記躡前段及釋也如第一段托執律文非中舉舉賞勞一事東寺解稱緣而牒是同西寺依文謹誦不取加減是異第二段臆非中舉持衣事東寺僧當部無持衣文見即解取他十誦來補受持三衣得成是同西寺不解引文直爾手持而已落非名異第三段取文不類中東寺解取十誦同計持衣與四分相類持衣得成是同西寺比丘不解取文輙引僧祇異計流類不等落非中名異但稱教為同不稱教邊即是區別名異如云君子千里同風小人隣墻有異即思義也已上記之雖有此解其理不然今應曰難此段鈔意唯辨所詮決斷行事有乖若還將前之三段文及釋之猶是能詮有已說了何假重明可謂能所不分昏迷後學決不取也玄記難云前三既能詮之文與適來所詮決斷有失舉事解釋似有相濫如何分之若前則用文被事有失故約能詮後則行事違文故約所說以未有教而無行未有行而無教教行雖則相修能所條然自別也若明得此意能所同分益為闡述致發妄釋也第二廣學云非彰是宀言自至歟者自從也非不也意道自非此人若不是此爭能洞曉統他宗反由通也總也教是能詮意即所旨也癈典者總說如諸律中將魚肉為正意接小機況此魚肉復是化權非實四生之肉此明典意也涅槃楞伽經文皆令癈除意遮未來惡比丘殺害有情之命故不許食如下文云夫食肉者斷大慈種水陸空行有命者怨此癈亦有意也次別有者只於律文中自有典癈如四分許謌聲念戒貴在生善以南洲音聲為佛事此典意也五分不許歌詠但直音念之恐比緣着聲塵起躭染故此癈亦九意又四分開淨地為救命難是典十誦為恐譏嫌故癈如是典之與癈各有意旨分明若非統教意癈典之人爭能曉會已上准披前所解甚為正義若准繼宗云此段既是結文不可別說事意還須向前三段文中以釋但稱教即名典不稱教處即癈例前可知云云今恐不然此文本說三藏教中於一事上典之與癈有何意旨若廣見之者可以洞明寡學之人焉能尋究據上所釋却將古人行持落非之處以辨癈典者殊乖文旨也考諸說之虗實者考謂窮考也研覈之意教文不少名為諸其中不了處為虗謂翻譯家傳來失聖意故若文義周備審的無疑名實實即文中具引依用虗即不可准行自非廣學之人爭能𦒱其虗實搜玄所教今依此也繼宗亦據上來以辨虗謂古人憑虗也實者托執律文并取文不類落在非中若望教文是且正翻實錄故名實也此全元意不取孰能闢重疑者孰字有二若單作但訓誰若不安火訓成也今鈔單作也准有四句第一闢重疑闢者開也重者於一事上二意不決故號重疑玄云能詮教上重重生疑所詮輕上重重疑且能詮也者如四分闢道行集僧之多論文中即有有彼云比丘遊行時隨所住處縱廣有拘盧舍界而不辨拘廬舍云大小諸部中各有其文了論云一皷聲聞十誦云六一日步各有其量何故或大或小不同此非於一事上致此二疑今若闢之乃云大小難雖殊約用有別了論蘭若集僧事用極遠不過一皷聲間更遠難集十誦約事輕少不勞遠集促六百步即據教相應今師云多論解十誦文必取六百步為物盧舍量也更舉賞勞羯磨說亦通盧繁不敘上約能詮釋辨已竟次對所詮辨者如己五眾有多代力筆為重攝為在輕收於一事上有此輕重疑情不決也今若闢者今師云若本為利貯畜即在重收若斷在輕即成也若本畜抄鴈聖教記錄等合在輕取若斷入重又成非也已上正解已竟也若繼宗記一解云謂能詮教文不了是一重疑次所詮行事不了須是一重疑有此二疑故曰重疑又解或可是上托執律文寬學臆說取文文類有此三疑故曰重疑更有多釋皆非意並不也第二遺累者遣除也通總也累罪也謂古來於能詮詮生疑又於所詮行事上重生疑唯律於一事上皆結不文無知此罪遍通法界境上名為通累若非統教意癈典考諸說虗實之人即不能遣此通累解者通而際之不解通而結也三括部執者括者搜也撿也部謂諸部執謂計若搜撿與與四分同者如十誦文持之父流類相應若不同者即如僧祇通夜護衣之例若明解之搜撿即委若別異同非是此人無由辨別也四詮行相者歟詮謂能之文行即所詮之行若欲向能詮教典曉明兼辨所詮行事大意者亦須是前二種之人若非此人必不可也者歟兩字送句人詞云云第三製造章疏非開秘云云言常恨至本者愥在壞長時不已故云常恨也前代者即元魏已後至隋朝已來章疏諸師者覆律師雲輝影等古德不少也雖已住制作文卷在世流行名所留遺記遺者餘也諸師是能遺人章疏是所遺之者表云章疏通乎為記亦名代新疏題云開四分律宗我等有人不凍忌趣疑情也止論文疏等者此明所根之事也止者只也論量謂量也文者倚飾詞業疏者誇多卷軸也立者癈立五受立十受等又如安居八十一百二十種皆是也問答者廣典賓主問答多重如古疏中問二不定戒誰有誰無答云有僧尼無新章亦爾如此閑繁問答便有數重不濟機宜徒盈卷抽要抄者皆云所述並是要妙的當之抄此蓋是古德各自誇陳之意也更有釋云古來章疏多將句法勒為偈頌撮要省略後學難明故立抄也恐未及前解也至於等者至於兩字指此及彼也顯明也行用也即當今時要也事謂三行之行事方曰法也軌者則來者後來學此文道若將此顯行律宗三行之事以追後來學根機者下句斥云百無一本舉多況少也若據疏抄從首疏也前但有一十四本今云百本中無一本者且約大蓋之言文家屬對如云西土有千部論師此方有百本疏主之例云云第二別明失之相中開科也言時至義集者有二解一云約九代中有修撰羯磨者在義加門中故此釋踈也今依第二釋但是鈔主同時制作諸師也與章疏並皆相見即簡前代古人但都疏文不見能遺一人故所以標有兩字也銳利也聰也懷者情懷也文在義集者正行文隱也如相部疏集僧行事之文隱在房戒義門之下又如受欲結界事亦隱在說戒義門之中忽有事難為尋討太穩故也言或復多列游辭等者行文繁失也或顯不定之談列者行列游者浮游字今從水即浮游之辭准周易中不善之所述曰游辭字凡在聲說所稱即云言詞若淺簡即云文詞總合從言而作司也今鈔從受新者曹娥文有用此辤字按會稽內典云古有孝女名曹娥上虞人也父為巫稅能歌漢元嘉二年五月五日溺江而卒不獲其屍娥其時年十二乃向江邊號泣七日七夜而聲不絕遂投江而死經三日後娥乃抱父屍而俱出岸旁眾人悲感收葬時縣宰度尚為立於江上𡻰邑聞之來看此值夜乃以手摸之便知文章華麗明日命筆書八字於上讚之云黃絹約婦外孫虀臼此是謎其語不胰也後有一人性揚名修修是魏王曹操主薄共題俱至江南共看上八字曹操不練其語乃曰揚脩卿會不修云會也操又告云卿是具說待我思之行經三十里便悟却修曰卿先修云所言黃絹者色絲傍絲即絕字幻婦者少女也女邊作少妙字外孫者是女之子也從女作子即好字臼者是受辛之處即辤字意讚文是絕辤妙好也操聞之大災告云卿說實如係意所以文中用茲辤字若爾古來文疏莫應是絕好妙辤不答既游辤即反顯非其絕妙故逗機未足者羯磨疏云依本綴疏廣列游舜至於行事未見其婦撫事壞人實勞相如斯之類何足逗機章言或至事者文略失也單題者謂依律直爾單書一百三十四番羯磨也成相莫宣者謂不辨集僧緣成之相并七非緣兆成敗骨等相莫者不也宣者語也如此相狀並皆不說相部疏同此非若依此古文行用之時即不能辨得受說當今現行之事也故曰依文用也不辨前事言並至悉者結上三失也隱繁略三日並言詞章句碎𬍽碎雜亂未可於中枝尋撿括也問雖然碎亂亦可細意搜求何得行他為失鈔正釋云所以下是也若非積年習學久置功勞者元因得知非精通博練者難領會學意即如自首窮一經業積年已老方究體也云云又此結文但據結前三段如上所釋有人將此通結前文所留遺記者全乖意也前已自結云百無一本等不可重結思之收科云云言余至優劣者重審前非也此文大意欲依今製作再觀覽古來章疏若堪濟世行持亦不更典者述只為逗機不可是以更製鈔文故科為重審前非也余者我也我約字說人下安未自謙意也耳飡芳音曰聽心取妙義為採此二𨵗時曰暇也迴視曰顧斜瞻曰音麵去呼之今多有緬昔非之也古來章疏不少故曰群篇也通者總也非由不也屬者當也意指也今師云所不當佛意二又不當我意且佛本觀機演教除病為先如愚根樂三故談蘊處界義等我意欲令出處處者自行速成法秉施行無其滯結古來章疏即非要當闕在隨機違佛在本懷又乖我意故曰通非屬意也下句正明所以云俱懷優劣俱皆也盡也優強也劣弱也如前代止論文疏等是優百無一本是劣又近代銳壞行事似優文在義集為劣或多列游辤似優逗機未足為劣或單題羯磨是優成相莫宣為劣以此因故生制述之心也繼宗記云優長也短古人章疏中有長處堪行事有短不堪行事今師意云若一本之中始終俱長即可依用亦不更造此鈔召為於中有短有長始終不等前發百無一一本謂無一本始終諸長故曰壞優劣是以生以生起制作之意故也言斐然作命直筆具錄者先案本宗也斐然者分別文章之㒵也儒書云夫子在魯魯人不敬遂過衛衛人惡首污之乃削跡又過宋宋惡之代樹後遊陳至彼又絕根如是跉跰七十餘國在陳既被絕根却思歸魯無由得去遂假托事端也故言云歸歟歸歟吾黨之小子狂簡斐然成章不知所以裁之矣別言歸歟者謂歸去也吾我也黨者鄉黨也小子者呼諸弟子也意道魯國有小子作文草不當集取大道我今擬移彼裁刺之此則夫子分別弟子文章㒵也今師之意前來再審古人章抄無要當行持云所以顧群篇不當其意自然癈我製作之心此則今師分別古人文章也躬云心憤憤口悱悱故若爾不合作此文字寵盖不完理也作命者作者作口起也命者意也謂因分別古來文章即起章故又釋作命者謂無人命作斐然便即作命也如相疏斐令為諸主新章是正挍書為主也又如賈侍郎請圓暉座主製俱舍略疏等此莫非皆中裏全人起請不今鈔不然俱是斐然作命也直筆具舒者一解云於當律之中除却四繁之外唯存的當云文具足舒張安布二十九篇之內也又釋不事亂文名為直筆謂文言醫理不顯事宗故此不論故云直筆也次補闕中立記科兩對初涅槃部眾經對也言苞至說者即律經也謂依四分行事未圓須引外部文補也苞者苞羅與四分有殊故云異部誠由實也正翻實錄的當之文雖是外宗然其行事流類且與四分後急輕重相似者即引用也如下引十誦僧祇五分等是括眾經隨說者括撿也眾諸也大小乘經不一隨此大小乘經中凡有說戒律處與四分相應亦乃則用如下引華嚴涅槃楞伽善生阿含遺教並等是也及西土賢聖所遺者及者連帶之詞也有作相違意釋者非也西土者五天之通號也賢聖者儒書云應五百年間氣曰賢應一千正氣曰聖聖即君賢即臣今內教者賢謂賢和聖者正也大小二乘各有賢聖且小乘俱舍去賢加行七位俗修名賢見道已去四向四果八人真修為聖也若大乘地前菩薩為三賢登地至十地為十聖也所遺者謂上諸大小乘賢聖所著述論文是也不引婆沙成實智度唯識等云云此方先德文記者此方方即九洲之統也先德者從漢至唐緇素不同也文紀即不是古人章疏但不正解經律者總芳為紀錄也如下所引普照安二大師出家布薩儀道整正禪師凡聖行集梁武帝出要律儀等云云已上四段都引一百七十本教文皆補闕攝也問如五百問論并真諦疏是何補中收答是第三論補中攝若爾五百問法并及真諦疏並此方造何得在論補西土賢聖所遺中收答能造之人是西土故如卑摩羅叉三藏是西域人已證初果到於此土答慧觀法師五百條問集為兩卷又真諦三藏是優禪國人已證三果到此造疏羅明了論雖著述之教在於此方今但約能遺之人是西國故所以在第三西土賢聖遺中收也上之四句於五補中已收四補於三補中收二補於二補中但明文補其義補別序方明此中本出鈔體須有正文可憑必三藏等俱無今師以義決故此未出也思之次結上文那補意言搜至意者此文大意謂上所說用教多少不同第一段云斐然作命直筆具舒意顯二十九篇之內具立四那下之四句明諸篇中引用補闕如是先那後補鈔體已圓今須結上二文共成一意也搜駮搜即謂搜求駮者班駮也古記云㬵者除也不取引用乃除之若爾應合用此制今鈔文用此駮字者說云六駮獸也形如馬頭有一角食虎狗身有六般色故從上立名今師意顯搜求撿括三藏不一例次比取文若義勢相當即班駮而取眾向下到文自見云云同異者諸解蓋多今先由正釋謂於諸部文中搜於班駮所取事法與四分流類明當者為同也即如下篇之內四分但言三衣應持且無加法詞句今十誦持衣文來與四分相當同護明相故此例甚多不能遍舉如此總名搜駮同入二十九篇中行用也次搜駮異者有二類也一者雖與四分殊異然且見解須長不可抑之亦須引用即如下篇之內四分判澡不論大小大一向入重若准十誦便分斗量若過量減量即在重收若應重者堪𬽵道故宜從輕攝今師取此全准他文雖異本宗然且見解長故又如四分判被單入重若准五分凡在單毀衣者總入輕收今師云被單雖是從被可准他部單毀入輕此豈不而四分有殊然且是長見故亦依例用其例類多不能遍舉此是搜駮異亦入二十九中也二者與四分全異又非長見不可准行但是他宗自所執計今師云雖與我本宗有異然亦要廣旨襟博學濟貧不可委遂引安諸部篇內以被外宗所貴上之所引或異或同欲取之時不便麤心書安鈔內一一老覈研覈故云云長見必錄者謂於同中見解長處必錄安二十九篇之中如下十誦持衣文若非長即不敘錄即如僧祇通衣之說也又異中長見亦必錄安二十九篇之中如十誦應量淨地入輕五分被單亦在輕攝等例若一向全異又非長見者雖不入二十九篇之內亦錄安第三十篇中向下對文一一分別也問未審如此搜駮同異錄安三十篇中如是安排意為何事鈔自釋曰以輔博知以者用也輔謂輔弼博者廣也謂用輔弼後來行事之者依於本宗兼明他部廣博委知無於疑滯故已上結補問文竟也濫述必剪用成通意者結繁也濫訛濫也如律東方有山稱山等四繁之說恐濫後來是以鈔不錄之故云必剪總成四分一宗行事通問意故曰用成必剪此段鈔文古今諸記並隢了皆是虗談今綱群論俱依此釋即文生疑滯也思之已上雖中正義足可依永今因便敘諸家所解不無雜亂然要通知所貴取捨有憑足非條別一宗繼記有兩釋初云搜駮同者謂是四分本宗也異者謂多外部也謂先向本宗之內搜研研覈今時要用事法見解長處必抄錄安三十篇為行事本宗若闕少之時即任引他部流類相似文說而成補闕以輔助此鈔廣博而知也濫述必剪用成通意者此雙上同異也同即那繁累即補闕今引用云時本宗中濫述必剪若宗不足引用他部時但取流類相應之者若不相應即不取亦是濫必剪而成通同行事矣已上記文今詳此釋有二失一則不合將濫述必剪兩句雙結刪補鈔意唯結刪繁耳若論補闕鈔從搜駮同異至直以輔博知已自結竟此蓋不體鈔文賓主結合文勢也二者不合於補闕結文中將搜駮同約四分本宗說若約本宗除却四繁留其要當事法為行事體骨前文已釋了即斐然作命直筆具舒是也不可於補闕中更結刪繁豈非混亂已上敘破第一釋非也第二釋分此段為三節初從搜駮同異至以輔博知已來結補闕也二濫述必剪一句結刪繁二用成通意一句都結刪補今祥此科文一科結補闕即可爾第三都結刪補者殊無理也鈔意將濫述必剪用成通意唯結刪繁不合輙分出刪繁一句結文重結補之意又於釋義之內違於鈔文廣在彼中慮繁不述已上略敘破第二解近又一家釋云他部律文同中長見必錄在前二十九篇之中補四分行事異中長見亦錄在三十篇中雖非四分本宗且是他部行事已上記文今恐不然若言異中長見錄安第三十篇中即前二十九篇中豈無異中長若言無者如應法淨瓶及臥單置判入輕此全准他部處量既與四分輕重不同因何得入二十九篇以被四分律師行事此釋未可依也云云若准主記將二十六篇由途相攝為同別類統收三篇為異又將同異合為諸雜一篇已上記文今破云鈔文本為明所取事法據體內以言若向三十篇中如此判全約外面以說即眇同河漢矣云云次辨鈔用中分二初正用次四兼用初正用中玄記科為對初繁文指略對二義連徵問對也言或至問者一繁顯事用者或者不定之詞也繁文者多也廣也如受戒法中三處引遮難相第一節文依律先釋相白答彼此無疑二教授師出眾同時依於儀式或又列一遍三引入眾戒師對眾又依文列一遍此皆是繁文又如盜戒別眾食戒等各有多紙釋此亦是繁文如此文為顯今時事用如受戒大事為世良田若帶難及遮即空無所獲故須廣引方委無由又盜戒非今損財難已防遏亦須一一委細而論餘可解已上雖繁為顯行事之大用即不同古人多列游辤逗機未足之繁也二或略指以類相從類者例也相從者如雲從龍等各有其類如集僧篇但明兩界僧來處分齊不辨此二界元由指在下文結界中說此是將前指後乃至結界篇中但明結界之事不知欲結時如何集劫指云約處有四種不同定量分六相差別如集僧中此乃相將後指前也如離衣戒但明十五種自然護衣並不說作法界分齊指云若論作法下卷明然之乃將前指後也乃至二衣篇中但明作法成衣界又不說然自如隨相中即將後指前也又只向當篇之內亦有如羯磨篇辨七非義但束百八十四法為八位每一法上皆有七非初就但心念法上辨七非至下七法但解三單非其三雙八位一合例前可委不在重述也又如僧法羯磨文中但約說戒單白及受戒白四具解四文餘則例爾其例他多恐繁不述三或文斷而以義連者古今多釋初搜玄云三藏教中令無事法名文斷今師義決為義連二衣順正記但據當部律中雖有事法其文不續為文斷今約義攢聚一處為義連且如律本受戒法處三段之文皆但論難事並不說諸遮此則問遮文斷及至教授乃戒師正法時但問諸遮不可明難事此則問難文斷今師准上律本三重之義律云先問難事疏云先問即將十三難向十六遮前教授師屏處問時及戒師對眾問時皆須先問十三難後問十六遮故下文云今就義准着向遮之前等此是上卷文斷義連也中卷者如懺捨墮法在律文三十戒條中懺僧殘法在人犍度中是文斷今師約六聚次第文義以連乃作懺六聚一篇也下卷者如三衣在律文衣法中漉水帒在大僧戒本九十中坐具亦在九十中是斷今師約制教次第作二衣篇先明制衣三衣六物等是義連也三准顯正但取八今法付以釋也如足數篇下有別眾法文足數者須足人四僧數別眾乃不足僧數足文斷然因足數方論別眾即是義連不可別立一篇但帶附此篇之末名附法也餘七例之云云上敘三家所釋義意各殊然今諸講人互取不定或但取後解或約依搜玄今意通三取釋所歸莫不俱成一義若壞取捨即偏執隅細而詳之各有理也四或徵詞而假來問者謂凡欲釋通義理准論有六問二答三徵四釋五難六通故下問有答徵下釋難下有通徵因問起為顯行事周圓不同古來止論問答如受欲篇後問云與欲已事訖不來化別否問不犯以情和倒僧而不將欲緣為羯磨事文云若事休應往不往如法治不云法不成就次徵云若爾受日出界事休法謝者答受日文中牒事故前緣癈法謝受欲法不牒事故緣謝法成也此是鈔文此微詞前問詞問而起也但謹依此說不得更解釋知又如持犯篇中歷位分別問止時不可學九句後問云如殺盜等人非人想有主無主想律結無罪亦有判化者多何答或緣罪境人非人故便結心犯或緣非罪境主無主故然彼迷心不結正罪莫非緣罪故有無不同又不同前此前叟此事法俱識故是可學有不識皆制罪也上是鈔文因徵云若爾後緣法中亦有相轉如不處處分想及疑亦是不犯重何為制罪已上各鈔文也此如徵同前問詞而起者顯義理幽玄皆是闕疑情免生滯結故已上正明四用竟第二結前四言如是至出如是始終交映者如者法之詞是者是即可之義始者初也終末也交者互也映照也或將終映或將始映終隱顯互出者前隱後顯或後隱前顯與始終交映亦同盖文家囑對耳繁文顯事用中始終交映者如受戒法中解遮相處釋非畜難中云此上二難若依本形是人皆識恐變形而來故須問云脫有高達俗士來此受戒問云汝非畜生否者忽聞此言一可恠應方便轉問如下所陳此即將終映始亦是前隱而後顯也至下正問中方出方便問詞云汝非諸龍畜等能變為人來受戒否要由前釋方解後問此即將始映終亦是後隱釋詞而前顯也結初用竟次略指相從中始終交映者如集僧篇中但明來處遠近不論界起之由遂指下云如結界中說此即將始映終亦是前隱後顯也至結界法中但明界之來意結之元本若集僧遠近却指在集僧中此即將終映始也又是後隱而前顯也諸如此例第二用竟次文斷義連中始終交映者且約八今法附以結如受戒篇中但明受戒事不辨隨中六念及捨戒法即將始映終前隱後顯也至法附中但明隨六念不明受體但明捨戒之義不明初受之法即將終映始後隱前顯餘皆例結第三用竟次徵詞假來問中始終交映等者問詞中但申問意不顯徵詞即將映終前隱後顯至徵中但顯徵詞不言因問而起即將終映始後隱前顯也結第四五問文已竟也言并至雜法者謂此約前四正用之外更加此四句故曰兼并舉例如三藏亦有麤詮正詮又僧俗所為皆有正麤等云云現行羯磨者謂下諸篇中要秉羯磨處即寫羯磨文安其鈔內如結界篇寫結羯磨安文內僧網篇寫七九羯磨安文中受戒篇寫受戒羯磨說戒篇寫說戒羯磨安居篇寫受日羯磨自恣篇寫自恣羯磨安文內也中下二卷准下已上皆是今時當用之者即書向文中便可依行若諸諫二房結集等不當今現行者必不錄問羯磨本是律宗合明之事何名兼并答謂文中已有第五羯磨篇且述一百八十四番成敗如非之相諸篇不合更明今重向諸篇書出羯磨平文不辨緣成之相為接初機現可行用所以却成兼并用也諸務是非者有解多引諸部別行篇者恐不理當玄記約諸雜要行篇十問安設皆為僧尼要行故知更作一篇兼并而用也此解為正或有約諸篇對辨古合今處名諸務也今釋為是古解即非云云廣述亦自是一途之意導俗正儀者即道俗化方篇道者引俗純事為六塵所得於理全乖今與受五八戒及教其入寺軌儀去是非之心不見僧過等是佛正教名曰正儀此雖非五眾所行然假僧尼為能化之人一一明閑方能化引所化之境故下文云幸細覧而得傳告等是并用也出家雜法者即沙彌篇發心離煩惱火宅名為出家廣引度人經等明出家儀或名為雜法若欲度人出家須以七門明出家本意次置道場諸師剃髮受十戒六念五德十數之儀此亦須眾一一明閑乃可化度故須兼濟也已上尺四并用竟次結言並至焉者通收上四曰並也皆俱也盡也攬者束也總束前四用為此四分鈔宗分一見問攬并本意為何鈔答云用濟新學之費功焉謂忽有事生可准行用免更向文討尋徒費功也從此第三釋繁略之過分四云云初言然同至獲已者此文大意恐後有人斥非云題中那繁鈔又不許古來疏多游辭及自著述又更繁多豈不相違恐有斯言故預分疎道理也然其我擊其大節者然者縱奪之詞同者和同擊者揚也節解也大謂簡小為義即知音唱和之詞如巳㚶彈絃漢女擊節又如百樂彈琴唯鍾子期善知音韻後子期身亡牙遂罷於琴謂無知音唱和也鈔主意云與我情和同之者即唱和云此鈔三十篇文堪行用甚被時機終無汎濫閑詞始終並皆如法也盖此是擊大節繼宗記中舉相副當詞者盖忰非來例良不可也異說則斥其文繁者情見不同名為異說非斥嫌此鈔文太成繁廣如遮難小事三處出文盜戒離衣等各是數帒此非知音故相非斥猶如陽春白雪之歌和者甚稀若也㚶下理之詞和者數萬良猶曲高而和寡上非斥者亦復如然蓋不委其由而非節擊也文繁誰所樂之下示不欲繁意也鈔意實不樂繁蓋為要今行事周足故云事不獲已獲者得也已者止也說謂未了不得止住不類古來繁也言何至諱者二字是徵意道有何事不獲已須繁耶若略下四句釋也前二句釋事不獲已不得略所以後之二句釋不樂繁所以略者約略也減省也梗概即粗魯之言意道若約略減少粗魯而書即被今時人行事未足如受戒大事盜戒難明等故必廣也必橫下明不樂繁之意也橫去聲傍求也評者論量評者通平去二音也意道如受戒法橫論五受之文四受非今所要今既錄此繁詞即乖於撮略之義便成所諱也次開省約三文言今至三卷者標今異昔也𠷰者謀也又思也度音鐸比度有鈔中作圖書從音壽解云筆𦘕曰圖疋量曰度此非釋也但依上解𠷰謀比度也取中著去呼即中當也於同文同同義之中不多少也廣處雖廣亦不絕廣略雖略各亦不令略或作中去呼字解亦通繼宗記中不許此釋彼云鈔文以顯事用或指略以類相從此既有繁有略何得言不廣不略今之繁繁即中略如受戒遮難并一日得衣等己意謂不然却成別序第問門竟兼省約者謂心營曰務鈔玄以心營運所取事法故省少要約凡明事或教中多處有文今但取一本的當之文於中又更削除困餘文字釋急備卒者一新本學急知謂作入法流未明得廣律事相且依此鈔學知足得准永行用二備舊人之卒要謂先日雖曾學知多時或可癈忘忽有事起不可更廣撿律之文但將此鈔展開便可行事也勒成三卷者勒者束也為上二緣束為三軸此但明所為之意未說分三卷所以意問古來卷多少也繼宗記云三卷束成上中下報新學急知成中卷備硯潓卒要成上下共二行者此釋非之甚也言若思至後者此段文有科為對事謙詞若第十內中即對教謙陳今云別序中謙詞即可爾若將此鈔主自謙者恐無理也此但恐新學未瞻前謀指事恐廣陳於後此顯正科若者如也思去呼者神思也贍者賙贍也時事者即今時所行因緣不急之事也如毗尼殄四諍事又十三章內判重事又非之事如是等事律本廣明今師意恐初學之人情思未能周贍故云若惡不贍云也固有闕於行詮者固者實也闕者欠少也實有闕於能詮文并所詮行即顯下篇文中不錄若汝即是隨時所行事鈔不明之莫逗機不足否答略標括趣以廣捨後意道若有茲欠少處鈔且略標待後別制戒本羯磨兩疏及輕重儀廣述也如羯磨篇中辨法分齊後便合明其七非遂指云義鈔意如學人令文顯而易見故不事義章一一分對進否此略猶略標起也必欲通明須看義鈔此是廣於後也又如二衣篇中判輕重物科中但約現畜多者且作七內餘者指云且如判詮重中亦須類知而解也即指在輕重儀說又如隨相中略標二百五十戒辨成持犯之相若緣起及諸義等即指在戒疏中明之但是下文中指如戒疏義鈔等總之此云意也已上正解竟或依繼宗更有一釋謂約新學之剏今法事中且先學鈔中三行急要之事待精磪會解已後更須廣說諸文故云廣於後今恐不然此文本向制作文書上次詳後據所釋全約習學之人身上明以殊卒文勢也次釋分卷所以言然至位者標也謂上制作鈔文救急備卒勒成三卷未委據何理不二否耶鈔釋云然一部之文義張三位張展也約詮眾行義故展成上卷位約詮自行義故展成中卷位約詮共行義成故展成下卷位也即顯約義分成三文非是就師心紙黑說言上卷至起者正列三卷位也攝者収攝也眾者四人已上僧法務者事務謂大欲秉法先須有能秉僧以戒為體以和為義依體起用即須集僧簡眾與欲乃至恣之事如是軌義皆是上卷文中辨也中卷導於戒體者導仰也承也出家僧尼須護本受體知持識犯有過懺除皆是導於戒體中卷明也下卷隨機要行者謂隨前機宜上中下別上行唯三衣一鉢中則百一資持下類之徒長衣重物乃至諸部一文皆是隨機之事具在下卷明也言並如文具委想無紊亂者結也諸多眾自共行曰並也如是三卷中悉周備故學音門者亂曰紊即蚕口初出之絲未條理者為紊絲也今此三卷文中所明三行之義二有緒條理分明後學依行想計必雜亂故曰想無紊亂次立篇目意言但至名首者此文大意謂前雖約分文然於三行文中事境由多文雜更須五篇目收之則討尋者易顯故有此文也都有四句上二句辨難下二句正約類分篇目初言但境事寔者但者偏局之詞境者即所對事也即情非情等其類甚眾故曰寔繁良難科擬者良者實也科合比擬也意通三行事境既繁今欲作篇名分科比擬極不易故上述意難竟次取類分判今取物類相從以標名首者物者謂諸事法也類者流類也可便相從聚於一處如世之物類亦爾故易云水從濕火從燥雲從龍風從虎聖人作而萬物覩必如要攬十篇亦以物類相從標名首彼曰同聲相召同氣相求物以群分亦以類聚幸立篇而命旨應聚類以從篇故如鈔文以類分篇者准正易文傍憑要攬如欲作標篇目謂比丘所宗莫過淨戒戒有多別不可盡頌但作一標宗篇標名首亦自収攝一切戒也又如集僧篇如打相鋪疑座席四處六相自然作法總是集僧今但以集僧篇以標名首乃至自恣亦爾其中下兩卷四篇十四篇類此可委恐繁不具問依但上文作約行分成三軸已自分明何要逐卷更立題目不用得否答不得舉例如俗中切韻雖有四聲然只平聲意中自有多平聲字餘三亦然猶難披撿今更傾別立韻頭則易為尋撿今鈔亦爾雖義分成上中下三別然於其內事法尤多今立篇名臨機易委意在茲矣次生起十門意言至於至詮此文意謂上約物類相從以標名目即二三卷文內更立三十篇以収之即許五篇即合平列於此然三十篇內有十條大意名曰十門別序別序述十種大綱未曾生起且南山著述文同鉤鏁結引萬端義若連環始終不斷必須於此生起下文若也孤然即文勢有絕勢所以未列篇名且作一段生後之文意也至於統其大綱此文多釋一云至字屬此序於字偏屬屬三十篇也今恐不然此本為生起十門之由若將於字屬三十篇却成生下三十篇意也次准繼宗記初解云至於統其大綱是結前總序也謂上總序至極者明得著述大綱次下恐條流未委即生起十門也若作法上生下意釋即合言上也統其大潤既之至於恐乖文意殊無理今依表云此文全是生下別序意不說結前也至於兩字以彼及此至屬此於屬彼此屬總序彼屬別序統由通也綱謂綱宗是喻三十篇事法如網十條大意似綱且夫教典必有所為合有三種五種等如此十條大綱前來未說若便作諸篇對文行事未免生疑故曰恐條流未委既恐未委便須條流若欲條如何即得下句云更以十門等云云更者重也以由用也十門即下別序例類例括者撿方由始也鏡由明也曉會也遠詮即三十篇也謂以十門類例撿括始明得三十篇文行事大意問此有四名為異答有二說初云大綱十門此二屬別序條流遠詮二種屬三十篇謂三十篇是三十條流謂所條流也遠詮即三十篇中行持事法故云二解云四名雖殊皆目別序也二釋俱通隨情任得上來釋科云云次列三十篇名目出當部二十犍度及諸部文等但平列篇未要約行分別思之古來多於別序之前列篇目者全非文旨故合於此列云云上來總序竟從此第二十門別序陳綱要分二開科不及具列今當第一門分二初標二釋言第至意者此門來意謂明三種五種教興三種者一如來在日慈心興教二涅槃後對餘言之說立結集教興三百年將末對五師異執有分宗教興若未興起者諸門無以從生所以先序教興引下九門故在初也次釋名者第者居也如王侯之第宅曰居一者數之始也序者述也教者能詮興者起也意謂意旨謂三種之教興起乃至五種皆有所因近則因事而興遠則為求泥曰今此門序述斯意旨故云第一序教興意問前總序後生起云更以十門例括今引但云意何無門字耶答有二解一云據理合云序教興意門夫門者通物為義凡所遊履非門不通今之十條皆履其門此不言者蓋存略也二云或是影略互舉前約能詮教故立門名今約教下所詮但標其意意亦不離門也釋中言夫至授者夫字如常說至人者至極也人者仁也依字而解二人同處能忍名人又能慈育於物名人今准內教釋是六趣中一數也如來理實非人非天但約在人中成道且呼為人也興世者興起也謂從法身不動之地宿悲願力為地前菩薩及二乘異生而起化用王宮現生故云興也世者若依俗解即代也孔安國注尚書云子繼父為一代約字解三十云為一世今准內教釋俱舍云世者世間一器世間即山河大地二有情世間一切有情是即剎那無常非久固義名世住其中故名間又涅槃經遠疏云世者時也間者中也所化有情不出時中今佛出興世間為化有情世間故云至人云云益物有方者益者利益物即所化之機方由法也即三乘教法又方者方便也如來說法方便多方便故經云尋念過去佛所行方便力我今所得道亦應說三乘等已上正解或云方者方所謂佛出世有於方處三界之中唯欲界六趣中唯人趣四洲中准南洲於南洲唯中印土以其處有金剛座等今詳此釋與文似違下之句既云隨機設教即不合是方處也未取依所也隨機設教理無虗授者隨者隨逐機謂根機設施謂施設教謂教法隨逐所化之機大小根性不同施設三乘教法咸皆獲益故經云為求聲聞者說應四諦法為求辟支佛者說應十二因緣為求菩薩者說六波羅蜜此即隨三乘根性不同施設三乘教法已上通明如來出世一期說法教化有情理無虗授若局就律教明者謂隨六群十七群等根機施設八十誦毗尼法藥凡欲說法逗機須離三過一識機不識法過謂雖解觀機不知所授法藥如世醫人善閑脉候不識藥性二識法不識機過但閑教法不解觀機如識藥人不閑脉候三機法俱不識過可知今佛說法離茲三過知其根性多種不同如大醫王善療眾病應病與藥令得服行其所見聞無不蒙益此唯佛方能為之若小聖之從容有虗授如涅槃經說舍利弗畜二弟子一鍛金子令修不淨觀二浣衣子令作數息觀修行經久都無果證後時佛為改之便速證果故知佛所說法深逗根機即無虗授故云云次引證言論至尼者證上無虗受也論者一云是十住婆沙龍樹造羅什譯二云是毗婆沙論僧伽難提造今恐二論各有其文故不定標名目也今且依十住論釋故云佛於四無量心中以大慈心曲授秘授秘方賜諸內眾如修多羅依力等流故說毗尼依大慈等流故說阿毗達磨依無畏等流故說餘二如別所明今且約毗尼依大慈等流者論云謂佛具四無量心即慈悲喜捨也慈謂慈善悲謂悲慜喜謂喜悅捨謂平等此四並以慧為體所以名無量者瑜伽論云此四無量於諸有情為所所緣故境既無邊心緣彼起故名無量又俱舍云能引無量禪福感無量果問四為佛獨有二乘亦有故顯揚論云二乘所得但名無量不親能拔苦與樂唯佛所得名大慈大悲等即簡二乘也所以名大者俱舍云一資粮大福德智慧所成辨故二行相大能於三苦境作行相故三緣境大三界有情為所緣境四平等大普利樂有情五上品大更無餘慈能齊此故二乘交之故不名大也慈有三種一緣眾生慈願與其樂二法緣慈諸生見父母妻子親屬以見一切法所緣故三無緣慈謂於如來不住法相及眾生想非如二乘緣法起縛名不住法相非如外道眾生起結名不住眾生相是無緣慈今云依大慈門者三種之中即當第一緣眾生慈也又論中通明三藏今但略引一節偏證毗尼說在慈心不論別義言故律云等者引四分律增一文也彼云時在䟦闍國池水邊告諸比丘汝謂我為衣服飲食醫藥床敷臥具而說法耶諸比丘言我等不敢作如是意佛言汝以何心而為說法諸比丘言世尊慈念眾生故而為說法佛言汝等若實有如是心我所覺悟證知之法四念四勤神足根力覺道應勤修覺諸記之中皆云引此文亦為轉證前來大慈心中而興律藏准此即引律文證上論文也今更一釋前引論藏為證律教說在慈門後引律文欲明內眾之心知佛慈而興此教細觀文旨其理皎然思之次辨結集教興言二至戒者此文來意謂佛在日隨機說法益物為懷既受請入般涅槃未審教文何得流傳今日故有此文若准結集通含三藏今鈔所宗唯局律藏也知之言二為對外道無法自居者謂見解乖真名外冥心空閑曰道即西土諸外道五師三計等無法者約外道謗讟之說即沙門法律如煙自居者約惡比丘自慶得脫欲作便作等廣如玄譚中今亦略敘准四分下文云如來入滅七日迦葉不知偶將徒眾欲禮觀佛行經中路逢一外道執持天華而來迦遂問彼云汝從何來答從拘尸那城來入又問佛在等云云又䟦難陀自慶云云又外道謗法如煙等上是下居之慶下即無法之言迦葉之倍加不悅乃將從眾往到拘尸冠殮如來闍維既畢乃告眾人說上無法自居之事如來舍利自有王臣長者樂福者為之非干我事我曹宜應結集法藏報佛深恩莫令外人以致餘言之謗等引乃結集之由也或有非解恐繁不敘顯佛法人尊道高者鈔雖一句今分為六一顯佛尊者凡結一戒諸羅漢等雖具三明六通及八解脫不敢自裁遞而相問為是佛制為非佛制又為誰制在何處制等一一揩定方可錄上貝葉若有一人不許須再詳論為顯佛尊也二顯法尊者迦葉秉一番單白差往王城諸聖眾雖具通明皆不敢違越三顯人尊者迦葉欲擬集法阿難雖則多聞然且未證無學被遭貶黜為顯人尊四顯佛道高者煩惱所知二障俱盡積功累德證大菩提若不因結集無由知委五顯法道高者戒定慧三法一切賢聖無不因此而生依此三法修行方獲聖道不因結集如何得知六顯人高者凡出家人皆以禁戒為性戒德在身位高人天下為六道福田上則三乘因種不因結集無由委知今為息前二謗顯佛法人尊道高而興結集也故制斯戒者斯此也戒律也今不言律即隱能詮但顯所詮謂八十誦大毗尼佛在之時隨事而制但波離記憶不忘未詮具文今涅槃後五百聖人同共次比輕重持犯聚於一處僧尼二部戒本二十揵度上於貝葉今指此律之所詮故云斯戒若具足應合云故制斯戒律不同順正將迦葉罸阿難七事名制戒律也次結成上意言觀至術者觀者察也攬也下律即第四分五百結集文也鈔主即能觀人下律是所觀教凡者諸也並懷異術者並懷兩字屬五百羅漢之心懷不取諸家悞解也異術兩字屬彼外道及惡比丘自慶如煙之術當初迦葉聞斯異術遂興結集之心今師觀覽下久五百聖人情懷莫非並為對上二謗之詞而興興教矣故五百結集文云我今可共論法毗尼勿令外道以致餘言譏嫌沙門瞿曇法律如烟上是本文今鈔引文迴互名言意在易解也上申正釋竟搜玄記云迦葉結集竟有富那羅比丘將五百徒眾到白迦葉言我聞已結集法藏當時不預斯會今欲聞之迦葉遂命波離重為念彼云諸皆忍可唯其八事佛已曾開今不合制我親記持至今不忘然富那羅但見前開不聞後制名為異術因茲迦葉立制云若佛先所不制不應制等以其異術故立斯制證須結集已上記文今依京承破云此文本為證結集教興若約不忍可八事為異術者結集後事也全成顛倒證義不成也三分宗教興言三至別者異宗者謂前明佛在日慈心興教涅槃後結集教興百載之內五聖任持百載之餘因有乖諍五部聿盛宗計各殊五分十誦等文故云異宗也宗則有其多別者顯正云藁本初云宗則有其十八後段為多別意唯五部也言且至准者且者約略之詞就五部內四部已到此方除婆麤富羅律本未至又於四內解脫律但有戒本餘三有廣律文就五部中僧祇是根本遍順五見不生偏執又須除之又於二部之中五分當世少見行若論盛行不越十誦今將此部對我四以辨優劣意在歸宗也薩婆多者舉部主之名字也戒本繁略者謂十誦著三衣內衣戒各有六條不得太高太下象鼻多羅參差複皺等其文太便唯一戒但云不得立大小便至於塔廟形儀理須虔敬彼宗全無塔戒也並是太略此是一劣指體未圓者准南記云指謂意指即教體也以聲名句文為體前文戒本既有繁略即是教體未得周圓也已上申正釋搜玄記約戒體未圓以彼二戒俱以色為體廣如彼述或有約果體未圓以薩婆以多宗是執計小乘極位但證阿羅漢故已上解覽即知非不能繁破也又此三段之劣番於四分亦有三段若將戒本繁略自作段釋者便成四段至下將四分翻時即全成剩長矣思之接俗揩定於時數者接引也誘也俗謂在家二眾塵聾滯事之者揩者准也決定也如為俗人受五戒須盡形八戒唯一日夜清足而受縱有緣礙雖開齊後至明晨即謝此並是揩定時也又五八之戒俱須具受即揩定數彼云以佛制定故又五戒感人身故若爾何故經中有一分二分乃至滿分優婆塞耶答曰此約此隨中或持一分二分等不論受時若有人於彼宗求受一二等戒不開則於接俗走之益是二劣故御法例通於無準者御謂秉御法即羯磨將所秉法例同能秉僧也謂彼意道如能秉僧結界說戒但要四人今集僧或有百千萬人唯多無過若減四人即不得也今法亦爾本秉單白今作白二本作白四乃至剩十番唯多即善減即不許又開黃門為和尚和尚或在千人數外等此三劣也二述讚當部之優言今至約者翻前三劣成三優也曇無德是部主之名舉人收法也人法有序者此正翻前句御法例通於無准且人有序者四人五人十人二十人更加一人二人三人皆能辨事並須清淨乃至百千人說戒等犯者不許聽戒故瞻波中一一簡擇等又於受戒時和尚在十人內不類彼將破戒人為師又在十人之外此皆有序也又單白白二白四等皆不許增減故文云如白作白如羯磨法作羯磨又下鈔云羯磨亦漏是非而乖違號為非法又心念不許作對首對首不得作心此皆法有序也軌用多方者軌儀用解多般方法如能秉僧七種隨事用時各有區別是人軌用多方所秉法八般但心念至白四所辦事各別是法軌用多方此段共翻前文第三劣為一優也提誘唯存生善者提謂携誘謂接唯者專也存在也誘接俗人意在生善不可限局如有求受一分二分或盡形或一年半秊五月三月或一日半日皆隨他心並聽受也故經云半分滿分等皆約受得故如薄俱羅受持一不煞戒感五不死果故知隨其多少皆得利益此段翻前第二劣為二優也立教意居顯約者教謂能詮也意即意旨也顯者多也四分敬塔制於多戒謂佛塔聖境理合導仰一興供養千返生天故有二十六條戒不同彼宗全無即太成疎略也約者要即少也如四分著衣小事但言齊整著內衣以齊整之言通收諸戒不同彼宗列十二條極成繁也此翻前第一劣為三優也故戒疏云四部之文無越斯律名不虗稱見重於今也次別明當部教興者結上也謂通明一大律藏三種教興下句生後局辨四分一律教興之意謂前文中明佛隨機說法雜通該三藏及至引論但明律藏說在慈門也又於結集教興之中云故制斯戒亦是偏明律藏又於第三分宗教興中唯明各律部亦是偏明律藏又將四分一律對十誦辨優劣意在歸宗唯明四分一律是據當宗以辨若准古記之中相承云永通明即約三藏教興下云當宗即律藏八十誦也此非解問若言當宗唯約四分者何以向下開制例中引五分律文又下云五部異執豈不然耶此豈非通明五部教興答不然若引五分但為證於當部隨方教興非說五分教興又引五部異執者但即成機悟不同之例亦非通說五部教興今鈔意歸宗唯明四分一律教文興也言夫不孤起者謂教不獨興要因緣感如舍利弗唯先請制廣教佛但許之未肯便制謂未有起過之人也起必因人者後有須提那檀尼迦六群十七群等相次而起漏洹因茲制戒防過也人既不同同等者六群十七群等起過既各不同立教亦有多別喻似病多故藥眾便有一人犯多戒謂跋難陀迦留陀夷或多人犯一戒謂助破僧違諫是或一人犯一戒即須提那是或多人犯多戒六群十七群等是因茲遂有僧尼二部戒本安恐二十楗度等廣教興焉言故攝下釋成多義也謂攝受誘進弘揚濟拔軌儀用解其數非一故曰實多今未說諸餘且舉制戒一事釋者皆先有能犯過人次俗呵僧呵白佛佛問彼取其自言的實已乃呵汝非沙門非釋種子何故最初犯乃以十句義為諸比丘結戒又須心境相當方犯若心不當境境不稱心亦不犯因茲便有通別二稱種闕緣更有初制重制又對五眾犯有輕重所對之機既多佛所立戒亦廣也二明今略不多中初言貴至緒者通標貴得本詮也謂若據教興所為本意為人今但約教本詮為人之意即得如律遮性開制機報事法之本各詮緩急之義今但要如此本詮大意於制戒緣由國主犯人親厚等並是枝條頭緒不用一一研覈考窮如得魚忘筌得兔忘得忘言之喻故曰誠難覈其條緒也言所以至過者驗教興所為也所以兩字躡上而生謂上明起過之人既多對機設教非少窮其本詮之意開之與制皆是為人如儉開八事為存色身豐時還制為葢法身成就並是為人又如斷草無緣則制止俗免謗僧之過僧復免違制之𠎝若野火燒寺則開意據護於住處亦是為人也顯持犯諒者云亮者信也信持一戒能招生十利近得人天之果遠證三乘并令人厭犯忻持意在無過信知犯一一戒為因如目連問罪經因六欲天歲數於地獄受報今其厭怖不造惡因亦意在無無過也或有解云諒者相也即一部文中顯持犯兩相人離犯成持若此馳知亦可求其興意此解亦通言今束至也者標也今者指法之談束者收束束略也一律藏者四分律也以由用也例者類例也謂對機所說能證之教文相雖多下所詮意旨不過於五也用茲五例往律藏中徵求教興之意可得是一見也二別釋中言一以遮性往分者謂一部律中僧尼二部戒本三十卷文對境制戒雖多不離遮性二種凡對有情境上制者名性對非情境上制者名遮今以此例往律藏中分別遮性以一性字例收一切遮明其興意釋中言性惡至起者且釋性遮二字性遮惡者體性是惡故十惡業道不由佛制而有佛未出時輪王化世之日以將十善化人不令作此十惡若作有違得業道罪此通化教佛成道後日諸比丘起過於此十中重䇿前七名戒僧尼若犯更加違制之罪此通制教故戒疏云如十不善體是違理無論大聖制若作違行感得惡果故言性惡是故如來制戒防約又智論云十善十惡名為舊戒亦云主戒五篇七聚名為客戒亦云新戒今僧尼於此前七若犯得兩重罪一業道道二違制設依篇聚懺除違制之𠎝猶有業道之罪後三意業小乘不制以佛慈悲接外凡夫恐舉心動念皆成犯戒也遮戒因過便起者解遮名也此戒佛未出世時及初成道後未制戒昨並無此戒目俗流外道見草木等春生夏長執有命根沙門行慈不合斷命有此謗僧故招當來惡果佛為遮彼人情制令不斷草木堀地等若作有違但有一重違制之罪欲云因過云云言然至急急者釋性戒例也文中許得作為文緩開中更有一重制限名急如作前事時狂亂無心許作無罪是文緩若一念心了知是比丘即犯是義急怨逼之緣許與境合是文緩三時須無深心是義急請戒例此云或有記中將違戒通別二緣於此釋者恐乖文勢也言謂至逸者釋成緩急義也隨諸重戒者指二百五十中所有性戒名為重戒也非謂獨稱初篇四戒並有開文者謂戒戒之下皆有通開別開如顛犯心亂痛惱所纏是通開怨逼及睡眠無所覺知是別如盜戒開作無主想煞戒開作杭木想忘語開作非聖法想及戲笑錯悞等戒戒各有別開例此委知云文雖是開者縱也謂律中雖有開文然於開作事時心與教不相應不免放逸故云開實結犯設使成順教無違實當不易故云縱成持也持之寔難下舉戒條釋云如婬則三時無樂者如初戒怨逼己身雖許與境合應須三時中無一念深樂方開也毀呰慈投者舉罵戒也毀罵也呰呵也初罵曰始罵了曰終如文中開慈心毀呰弟子不犯者約有慈濟人之心念改惡從善內壞慈育外現成威嚴方名不犯也既是等者釋成難持也相也謂初戒三時不能制染樂心是根本貪毀呰始終無慈救心是根本嗔謂諸有情無始時來慣習已久遇境相應發言纔呵必先嗔恨故下文云火內發先自焚身如此貪嗔對境之時何能楚心令無逸也如毗尼母云凡夫著水益薪足火全筌不沸者無是處也身如筌煩惱如火外境如薪今若能滅煩惱火去外境薪即心水不沸也言故至也者結也如律云下至草葉不盜又云過死不犯證知護持須急也所以偏舉此二戒者謂此二戒別約三時以明但舉斯二收諸性戒俱盡矣言遮至失者辨遮戒例也此遮開制以性不同性戒開迷忘制明白遮戒迷忘本分是開兼開明白又性戒制定遮戒開制不定云云一往制止者一往謂已前也謂俗人計草木有根見比丘斫伐謂有損命之致此譏呵一往且制若壞生者結提也有益便開者謂若有野火燒寺等緣開斷草斫伐護守任處是昔制今開也開後若譏毀過興無緣依前又制即昔開今制也後忽更有緣事又更重開即昔制今開如是重重重制云云言豈非下釋成也豈可也非不也存在也觀其開制不定者可不是佛為存教化俗人分無謗僧之言陷墜抂坑之過抂抗即地獄也草木實無命彼言有命謗云損生名抂因此墮地獄名曰抂坑也故攝論云由誹謗正法無底抂坑故次一段故大慈設教意唯撿失者專也謂佛施設其教意專撿校俗人謗僧之罪失故言故毗尼至也者引證也論第七云犯罪有三一緣須提那等二制謂用犯也三重制初唯制人後目林中與畜生行非重制云乃至共畜生皆犯是急若餘厭戒心生欲捨戒還家後若重來許其七返名緩又三處各有緩急一緣中最初未制戒前作者不犯二制者最初作人不犯三重制中若強力逼迫緣不受樂不受犯皆名緩反上是急也今尋之等者尋此緩急二儀通望一切戒皆有緩急也如盜戒作無相親友想不犯是緩若心境相當下至草葉不盜是急煞戒作木想不犯緩若明白心了知初識是人有殺心皆犯是急忘忌語戒向同意比丘說或戲笑等不是緩若為名利自稱得聖皆犯是急也遮中若有野火燒寺緣許斷草掘地等可知云云二開制例中言二以至也者謂前約遮性已明然佛立教對機更有開遮兩別今更以此例往律藏中徵求教興之意問上遮性例中云隨諸重戒並有闕文是開也開實結犯是制也又云遮戒一性制止是制有益便開既前科已明今何重述答前約性緩急以辨開制今據教文非但佛在世開制亦通未來皆有開制與前別也教則通於二世者謂現在及未來也約斯二世開制即是本詮謂佛在日同是一事又同時此處則制或彼處開此處制名現在世教也或同一處今秊制或明秊開後秊制此名未來教也故知律中開制之教不唯西國及諸方不准佛在世時柔通末代今以此例往律中徵求教興意也言故文至也者引五百結文集明未來世教也文當第四分故曰下文彼云迦葉結集竟有長老富那羅共五百比丘至王舍城迦葉所白云我聞大德與諸羅漢集法毗尼我亦欲開時迦葉遂今波離登座為彼重念富那比丘言若前後諸事皆悉可唯除事我親從佛憶持不忘儉開八事悉皆得食迦葉告曰誠如所說以糓貴時人民相食佛慈愍暫開後豐熟時又却制故長老唯見前開不聞後制富那羅曰佛是一切智人何得制已更開開已還制迦葉云只緣佛是一切智人故制已更開開已還制今文中是迦葉答詞今引其文證佛在日立教不唯現在比丘至於像末已來亦同開制故曰未來教也此是上下竪說名時毗尼教於此時中亦有方毗尼教謂今秊此處豐制八事明秊彼若豐還制此若儉還開名方毗尼教也四分雖有文非巧勝故引五分證之言如五分至也者明現在此教也此但引五分證成方毗尼教非謂說五分教興故著如字也准五分二十六卷食犍度文云雖我所制等者五分律疏云雖我所制手揣食若至餘方不生善則不應用也今云手揣食是西土風俗如然不由佛制不可依也更有解約大揣小揣等分別亦不用也今且舉三時分房以釋謂佛理平等無有主客三時分房本是佛制若此土依王法永係名額住持不依三時分即不應制雖非我所制者如用匙筯著襪等本非佛制今順此方須行故云不得不行諸如此例斯乃約時無別處所不同傍去橫論名方毗尼教亦名現在世教也此言現在者但通約現在論亦不局佛在日也謂通萬二千年中同一日一時皆名現在次會通彼此言二教相融互兼彼此者方毗尼時毗尼為二非謂四分五分也相融者謂相和融會也今時中有方方中有時也且時中有方者諸解雖多不無雜亂今依鏡云如儉開八事本是竪說為時毗尼今將橫論隨方開制如同是今日西土典即制八事東土儉便開八事東西不同豈非時中有方二方中有時反上可解隨舉一事餘皆例之言三以至同者第三例也上雖知開制之教被於未來世然於所被之機報有男女差別對其設教亦有多般前既未明故次當辨也釋名者酬因曰報男報優強女報劣弱男即志性堅強女即稟性惋順所以強弱不定也教亦重上君呼聽者謂佛隨機說教女報弱故能詮之教即重如捨戒不許重來夏中有緣但開受七日十六牧器須說畜等僧報強故清淨捨戒開七返重來夏中有緣皆開三種受日十六牧器大須說淨等教意即開聽也文中重字或平聲呼亦通僧即約重重開聽以強故尼不許重重以弱故上申正解竟顯正集中約僧報強故制四重尼弱故制八重又上根人果報強中下根人即報強意恐不然若約僧尼制戒是約制說與此文不相應若約上中下根以解又是機悟不同科中意也不取就制深防限分者玄云如摩觸戒尼深防中制與夷罪以順煩惱重故既受觸身恐成大惡僧但得殘限分中制以大夫綱強未必成大惡故尼八事亦深防中制僧或提吉限分中制也或有釋約飲用虫水并打摶戒為深防限分者非也約行山世不同者玄云此約所行之行也山謂山問蘭若世則聚落城湟僧許居蘭若有六夜離衣及不作日限離衣及過量不乞造方殘等尼不許居蘭若無前諸戒設作有違但得蘭吉猶其報有不同故已上正釋竟若准繼宗記云上根之人居蘭若佛為說塚間樹下頭陀等下根居聚落佛說造房舍等已上記文乍觀所爾細觀文勢却落第二制教輕重門第七約行彰異喧靜科中非此段文意也四以機悟為先者標機悟為本詮也謂前雖以男女強弱例往收然於律中約所被機根有利樂鈍對其立教亦有不同前所未明故次辨也機者根機悟者悟入也為先者佛先觀機後方稱機說法故教門輕重致隔者由前所被之機多別故能詮之教亦輕重多般如律中問是事有輕重差殊且就資身具中便有六別故戒疏云如上士面王比丘胎衣隨身及將入法誓不服餘衣如來隨機教門制一也二者堪耐寒苦大聖量機故制三衣三者雖制畜三手足猶露如來量機故開百一記識受持也第四心用非利待時待處須煙須如方能進業故開畜長隨施而受也五者要假重物安身進道故開被褥不令淨施六須眾實方字方遂心安佛開受用一宿得道已上疏文於此六中前前重後後輕只向資身具上既有六般豈非輕重致隔佛先觀機而制教或有機聞說重則厭離心生悟入道門佛為說重重或有機聞說輕則生厭佛則為說輕由機有殊故教多別也五部異執等者引證即成上義也然是也意道佛涅槃後百歲之餘分成異部亦是根機悟解不同如曇無德部師執結淨地歌聲念戒五錢成重護明相三品受日等彌沙塞部師執直聲念戒薩婆多師執癈淨地八十小錢成重等皆由機悟不同以此證前四分機悟亦別非謂通明五部教興也言五至失者謂前雖四例以辨教興然於律中有羯磨法并所被事是比丘之葉前既未說故此明焉言事者即所被事也法者能被之法今以事對法并於通局也法唯楷式者如單白三句大德僧聽若僧時到僧忍聽白如是十四字羯磨五句大德僧聽誰諸長老忍者默然不忍者說等三十一字如是十四字並須楷定缺剩不成若乖文意指即中間所被之事亦不成也事通情性者即二四三中間所被之事通情非情并一合事懺治舉受日等是情事二房結諸界等是非情事離衣杖等是合事隨境制得失者但隨前境應教如法如沙彌無遮難結界唱相標限明二房無妨難衣重人病等為如法名反得上名失也或記三性之緣者就有情事中更約三性分別如受戒懺罪受日等是善性治舉呵諫等是不善性顛狂羯磨是無記性也或隨世譏而起者起如學家羯磨目比丘往學家受施令他竭盡招世譏嫌乃作羯磨遮令不往此法因世人譏嫌而起也遮不至白衣家法然今明此一例者下文云頭尾一言不得增減故衣教秉法披事方成准此以為大綱也言且略引等者結前五例也且者未盡之詞束五略例名諸條薄知者粗魯之意方者所也詣至也且約大途引斯五例教興之意亦得薄知總撮包舉即為求菩提也上申正解也或有記中釋云且將此五向律藏中收教興意然於五中皆有輕重此由未明至等二所方作七例辨釋今且約五例明之故薄知方諸也今意不然若作此解似生下第二輕重門意念拋却三種五種興意為求泥曰之門去而不取言總撮至矣者謂上明三種五種教興未審興此教文究竟怖求何事故立此門通明興意總者通也撮略也包者包羅舉者起也覽上三種五種教興名為總撮莫由無也非由不也極濟也接引也凡即凡夫庸者常也今包羅舉起教興之意皆為極濟接誘凡夫庸常之流令依教進修斷惑證理是本意也泥曰泥洹涅槃梵皆是梵語此云不去不來不生不滅也新云波利泥嚩喃此云圓寂圓者周遍義簡異有為諸法自相非如地水火風各附本體寂者寂靜簡異有為法共相非如生住異滅雖遍不寂對此作四料簡一圓而不寂即細四相二寂而不圓即前五無為三亦圓亦寂即此涅槃四非圓非寂即因位色心今鈔存舊語但云泥曰也釋此不同三門分別一列數釋名二出體三辨得人初列數有四一自性清淨二有餘依三無餘依四無住處釋名者一自性清淨涅槃自性者本體義也清淨者不染義也謂此涅槃本性已來二障不染一切有皆有一雲之性如雲中月無諸染污故云清淨有圓常寂靜之用名為涅槃攝用歸體自性清淨即涅槃持業釋二有餘依涅槃有即對無立名餘依即二乘無學五蘊身是謂無始已來被煩惱障於餘殘所依今二乘無學能依煩惱雖無所依之身且在於此身上證得涅槃故名有餘依涅槃有即餘涅槃有是體體上有所餘之用有餘依即涅槃持業釋有餘依之涅槃依士釋問無色界第四果人無色身何名有餘依答雖無色身而有四蘊在亦得名有餘更有三餘八依等廣如論述三無餘依涅槃者無者對有彰名謂無學人化火焚身已後無此五蘊餘依向此餘殘依滅盡處顯得此涅槃故號無餘依無餘即依持業釋無餘之依依士釋四無住處涅槃謂菩提證法空理時不住生死及涅槃故凡夫無智樂住涅槃菩提證法空理時有大智故簡異凡夫不住生死有悲故簡異二乘不住涅槃由斯二利悲智兩槃無其定止故名無住處涅槃無住處即涅槃持業釋上例數釋名竟二出體者初自性清淨涅槃真如為體六真如中即實相真如也有十義解真如非此求述廣在論說也二有餘涅槃用出煩惱障真如為體故論云謂即真如出煩惱障問前三果人所證真如亦出煩惱障應名有餘依涅槃否答出盡故彼所依身不號餘依問苦依身在餘依未滅何故證得涅槃答苦依身雖在而煩惱並無所證真如得名涅槃故論云雖有微苦未滅而彰永寂故號涅槃也第三無餘依涅槃用出生死苦真如為體故論云謂即真如出生死苦煩惱既盡餘依亦無眾苦永寂故名涅槃第四無住處涅槃用出所知障真如為體謂因證法空真如故令根本智斷障不住生死後得智起悲利生不住涅槃故論云謂即真如出所知障大悲般若之所輔翼由斯不住生死涅槃盡未來際用而常寂出界竟三辨得人者意道凡聖之中為復盡具為有不具者故論云一切有情皆有初一二乘無學容有前三唯我如來可言具四言一切有情皆有初一者謂一切三乘五性見道前見道後前三果人皆但有自性清淨涅槃二乘無學容有前三者容有是不定義就此便分二類一定性二不定性定性者有前三除無住處不定性有二自性及有餘依也問定性之人身智既在云何證得無餘依耶答證有餘依也體無差別俱是一生空真如故若爾此二涅槃既同一體云何簡異答體雖是一約顯有殊望出煩惱障顯即號有餘望出生死苦顯即名無餘問不定性證有餘依時亦得無餘依何得不具三答若定性後時化大焚身決定顯得故其不定性雖證得無餘涅槃而迴心入變易不化火故所以不顯但具二也聲聞既爾緣覺例之可知次約大乘者地前頓悟菩薩但初一若漸悟者有學迴心加有餘依若登地已上頓悟有三際無餘依漸悟者若有學迴心有二加有餘依若無學迴心有三加無住處也唯我如來可言具四者當體是自性清淨得自受用心是有餘依捨變易生死得無餘依斷所知障得無住處問云何善逝得有餘依涅槃此問意道若佛位得有餘依涅槃涅槃可如來得有分段苦依身也答有兩說一約變化身解二約實報身解初約化身者論云雖無實依而示現有不同二乘有苦依身苦身若說佛位實分段身名有餘依理實即無若約示現邊說何如亦有示同二乘苦諦之身斷煩惱障證有餘依涅槃故次約實報身辨者論云或苦依盡說有餘依非苦依在說有餘依謂觸脫道時捨有漏五蘊變易苦依得無漏五蘊實報樂依故經云捨無常色獲得常也受想行識亦復如是即餘樂依名有餘依涅槃也更有多義廣在論文若也繁云恐非急要今鈔意者上諸興意雖即三五不同無只為行人心壞此果即是教起之事意也次下引證言故文至故者是律增三文也彼云佛語諸比丘增戒學增心學增慧學學此三學得須陀洹斯陀含阿羅漢是故當學爾時阿難在波羅奈城鷄園中有孔冠波羅門至阿難所問瞿沙門何故為諸比丘制增戒學阿難答曰為調入貪欲嗔恚愚癡令盡故制增戒學又問云何為學答為求須陀洹等四果故今鈔中迴改律文詞句也問斷惑由慧云何言戒答能為遠因故先須戒為首定慧方生故論云戒防麤非定除細亂慧剪性結慧不孤起必依於定定生有原功由淨戒從本立稱言戒能調也鈔文之中有四果字雖是引證然屬小乘次漸修行必略不明却成疎脫廣如義圖寄在臨文別抄解釋云云言下諸門中至焉者玄云諸門者指下九門也所述制意者即所敘述制於九門之意也止隨前事者謂隨輕重等九條之事更不重述涅槃之果令後進修之人尋下九條皆知不離為求泥曰是其意此解解局不取今依顯正云指三十篇門本意在此應先難曰此門明下諸篇興意為盡未若盡不得名大綱若總盡何故下篇更別有來意可引鈔答下諸門中寺云云諸門者三十篇也謂下篇維明來意但各敘本篇之意不通明一切教興如標宗但述標宗來意集僧但述集僧來故曰止隨前事今此一門通明一切興教令後學人尋此一門之條知下諸篇教興之本皆在此門之內即本也上來第一門竟
