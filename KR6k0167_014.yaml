body:
  text: 吳越國長講律臨壇賜紫清凉大師景霄纂第七雜料簡文二初牒名二分五下釋言七至中者先辨來意謂六門辨其四行各據一義而明但論根本今此門於四行根本罪上雜雜而辨第一向四行上辨不學無知二罪有無之相第二明根本之上方便因罪有無之相第三約根本之上具闕犯之有無輕重之相四約根本之上境想句法有無輕重之相第五約根本上尅漫等六門以明犯不犯相故稱雜也言分至別者如文釋中即五今當第一言初不學無知者初是五門之首不學者謂受戒後起懈怠心違本受影於三藏教文止心不學得不學吉無知者謂於事法緣而不了結無知罪今將此二罪歷四行位對可學不可學二九句約學二人辨二罪有無多少輕重分學也問前標言歷位分別今牒起但云不學無知不言歷位二字者何答有二解一寶云近上廣標故下略牒也二玄云前標中具足云不學無知歷位分別今此釋中先解不學無知未說歷位分別何以知之故鈔文從其相微隱已下等並是明不可學無知有無之相從第二段抄云既略結敘須配位法等已下方可別明歷位分別之相也故知近下廣解故上略牒耳言其相微隱者總歎此門相貌微妙隱蜜難知非積學之人難見今依法寶收今古之義四種難知一約人結不結難知二約可學迷不可學迷結不結難知三約教文明開不開及輕重難知四約分二九結罪難知今初約人結不結者准律約教對根有上中下三人若將根對教即六人學教三人不學教且不學教三人者一學了教三人如抄云謂受戒已來懃學三藏等此人事法但了無二罪此通上中根人二學半知半未知人於解處無二罪於不解處亦無二罪以學故學無不未知故無無知此亦通上中根人第三初學人以學故無不學罪未知故無無知及鈍根學不了者以不離依止故無不學罪學終不了無無知𠎝此通三根人已上辨一向不結罪次對不學教三人一由來不學人故鈔云若由來不學事法無知等是此通上中根人若上根不學始終二罪若中根人不學五夏前結不學五夏後方結無知二中間止不學人於先解處無二罪有疑不識處結二罪亦通上中根人三鈍根人不學人始終不學唯有不學罪非力分故不結無知已上正義敘述六人已竟第二約可學述不可學述不結難知者若明白心中緣於事法有疑不識名不可學述若先解知後迷心緣而不了是不可學迷若學教人於一切事法明白緣不了時是可學事上生不可學迷皆放二罪若不學人於此生迷便結二罪若學教人於解處迷忘心生即是可學事上生不可學迷亦放二罪若不學人若由來不學人明白心中尚由不知即無迷忘若中間止心不學人於先解處亦有迷心亦同放罪若准古人事上疑不識即放犯法上有疑不識即結歷代皆然今師一切皆開可謂微隱也第二門彰三約教文辨開不開及輕重難知者若學教人於事法上明白心中先曾識知後忽迷忘准律境想第二三句開無根本今師例此兼放枝條故下文云隨想境想具之若不學教人於事法上明白心中緣不了者即是可學迷准律作犯文隨所作結根本更增無知罪上且約教次辨輕重者古云不學無知皆是吉羅今云不學吉羅無知有二若疑未了准律先誦後忘戒是吉羅答全根本不識即准不攝耳聽戒重增無知波逸提自古不分可謂微隱第三門竟四約分二九句結罪難知者可學九句四一成品上品一句無罪中品四句上半無罪下半有八罪下品四句有十六罪若學教人於此事犯有疑不識處放二十四止犯成三十六作持若不學教人結二十四止犯罪若學不可九三三成品上品一句無罪中品上半無罪下品上下俱有廣如下文若准今師將學人對此九句事犯識處是明白心無罪有疑不識處是迷忘心放二十四罪若中間止不學人對此九句於事犯有疑不識皆是迷心亦同放罪若准古師上半事上即放下半犯上有疑不識處由結歷代相遵皆爾今師於止持門後難開可謂微隱第四門竟上來略搜大旨廣在下文第二科判中言初至開者兩章也敘謂敘致結謂結屬先敘懃學之人受戒已來懃學三藏後若迷忘心緣而不了依律境想事罪之上開無二罪結屬此人次又敘致不學之人由來不學觸事違犯依律作犯文結根本更增無知法結屬此人此但約略之談若也盡理而論合有六人隱在二人之下故云且也然後例開者謂上既敘致學不學之二人今即配四行上例開為二九句不學人配可學九句結二十四止犯若學人配不可學九句全無有犯一戒既爾餘二百四十九戒皆然故下文云且據一事以通餘戒即一切戒上皆有四行一一行上皆例開為二九句故云然後例開且順抄解設有別釋不無雜亂不敘釋中言言其犯相者牒也謂既敘致學不學二人結與不結今云犯相者即敘致懃學之人無不學無知之犯相又敘致不學之人有不學無知之犯相也理實合言持犯相今不云持且約造趣前事之時故單言犯相也言謂至之者此敘學教人也此人從受戒後懃學三藏教法明如指掌後對境時迷忘忽生於境或疑或不識故云於境迷忘境謂制聽二教中三重惡事法是止持作犯境兩重善事法是作持止犯境今先於此境止已曾委練後忽忘迷等或疑不識也遇緣而造者造謂造作前事前境是人迷為非畜杌木等想造作煞事也隨相境想具之者正辨開迷意也謂律文中牒釋戒本隨戒釋相後具明境想五句之文具於制止煞戒事上立之言五句者一人作人相煞結夷二人作非人疑結蘭三人非人想上同四非人人想亦蘭五非人人疑同上已上五句初一是明白結根本下四句迷忘皆得蘭望不犯根本邊成持今學教人迷忘心生雖遇緣造作正准境想後四句之文開無根本兼無不學無知此即迷心不迷教故開也言若至罪者此謂敘不學人迷教不迷心故結罪謂此人從受戒後於三藏教文一切善惡事法作不學意致令不識兼疑觸目對境成於違犯故曰若由來不學等隨所作結根本等者准作犯文隨五篇結罪也更增無知罪者古准作犯文約疑心說是吉今約不攝耳聽戒更增無知罪問既言隨所作結根本便屬作犯何開止犯答引文相從故有犯根本之言今唯取不學無知止犯言既略者結敘須配作法者結上生下也謂將學不學二人配四行位止作其句法也言今至戒者今立者異於昔人也兩人九句者一學九二不可學九可學九者配前不學之人於前九句中有三識犯三藏事事犯共有六个識每一識上成二作持六个識通計十二作持餘有十二半句於明白心中疑事犯及不識事犯此疑不識由先上不學故共結二十四枝條止犯罪故前文云若由來不學人事法無知觸便違犯佛言隨所作結根本更增無知罪故知可學九句唯配不學教人若是學教人明白心中有疑不識此是學而未知開無罪犯不可學九配前勤學之人學知之後對境迷忘有疑不識於十二半句翻成二十四作持餘有六个半句識事犯上又成十二作持并前都成三十六个作持也不同古來惡事為不可學緣不了時無犯若於犯法是可學緣不了時結十二罪今師據迷心不論事犯俱放故前文云謂前受戒已來勤學三藏於境迷忘遇緣而犯隨相境想具之故知不可學九唯配學教之人也問上立二九句有何意耶鈔答云為持犯方軌謂立此可學不可學二九句法為二持二犯四行之上方法軌則也且據一事以通餘戒者一事謂對人二事古人二事之上方立二九先於制門制止惡事上立不可學一九又制作門中於衣鉢善事上立可學一九自古皆爾今師事文之上便立二九且如制止惡事上明白心內俱須學知立可學一九學知之後迷忘互生緣而不了設作前事皆開無犯即成不可學九故云且據一事以通餘戒者二百五十三百四十八戒皆然並有可學不可學也不要向妄語及諸要法上以釋也故下文云隨指一戒達之類通法界言先至齊者謂總標其二九句明不可學無知有無輕重多少等義且初可學九句辨者上品一句識事犯及中品四句上半兩个識事兩个識犯是無罪分齊中品四句下半及下品四个全句於犯上共有六疑六不識是有罪分齊就有罪中疑事疑犯句唯吉無提是罪分齊不識事不識犯句有提兼吉提是重罪分齊吉是輕罪分齊也後不可學九句上半事九句中全無罪及下半犯上第四第七亦無罪起無罪分齊餘之六句下半犯上疑犯不識犯是有罪分齊就有罪中疑犯得吉是輕罪分齊不識犯得提是重罪分齊此依今師提吉兩分則有輕重若古人並判為吉則無輕重又此九句犯上結罪者猶順古若依今事犯俱迷則事犯俱不結罪九句總是無罪分齊次約位別釋中言初明可學事者謂明白心中於一切境皆須學知是可學事今對學人及不學人明白心中辨今抄文先明可學事者與首疏文同也彼亦先辨可學次辨不可學不同體狀門先明不可學次辨可學繼宗記中意悞妄陳古今先後言作九句分三品者謂約句法辨罪多少若准戒本疏可學一九唯配不學教人都有九句每句配一人即約九个不學教人說非謂是搜玄九人多見說知之謂此九人各修一个止持之行於前煞境止而不作根本持行雖成且明白心緣前可學境不了遂成可學九句除事犯止六識自成十二作持餘有十二疑及不識句都計二十四枝條不學無知止犯罪若學教人配之便成三十六作持一此依戒疏配此九人若准慈和記約一人說前後自成九句者非也宗破云若言一人者且第一度既識事識犯便是明練若再緣時有疑不識便同迷妄自成不可學何更有犯耶故約九人方為妙也對此須知今古作句不同相疏可學不可學二九皆依境想三句上作之首疏不可學九便依境想三句三三為品而作若可學一九即不依律文作之便以四成品也今抄之文依首疏作之然於下品四句稍異於首疏今先作不可學九句後作可學九取悞於人問何故先作不可學九答謂可學九本從不可學中來欲明可學故先明不可學又欲明不可學先且敘境想句法所以爾者謂不可學從律境想中來故須先說言境想句法者且依煞戒列五句一人作人想是識事心二人非人疑是疑事心三人非人想是不識事心四非人人想亦不識事五非人人疑是疑事心今取上之三句橫布作識事疑事不識事三句作事上三心若論犯上即約覆麤罪戒境想言五句者且如煞人得波羅夷名麤罪麤罪作麤罪覆是識犯心二麤罪作非麤罪疑是疑犯心三麤罪作非麤罪想不識犯心四非麤罪作麤罪想亦不識犯心五非麤罪麤罪疑是疑犯心今取上三句作識犯疑犯不識犯三句橫布於三事之下且將識事一句歷犯上三句成上品三句一識事識犯二識事疑犯三識事不識犯次將疑事一句為頭歷犯上三句成中品三句一疑事識犯二疑事疑犯三疑事不識犯次將不識事為頭歷犯上三句成下品三句一不識事識犯二不識事疑犯三不識事不識犯便成不可學九句竟次明可學九句者無將境想中不識事心歷其事犯合成上品一句者即識事識犯是也次還將識事心歷犯上疑及不識次又將第一識犯心歷事上疑及不識成中品四句應云一識事疑犯二識事不識犯三識犯疑事四識犯不識事次下品四句者即於事犯上除却第一識心取事上疑及不識二心歷犯上疑及不應便成下品四句今先將疑事心歷犯上疑及不識次又將不識事心歷犯上疑及不識者應云一疑事疑犯二疑事不識犯三不識事疑犯四不識事不識犯已上歷成可學九句此之九句以四一成品九句中與前三三九句大同小異唯於第二品第三第四兩句則異餘句不別今且將上品一句及中品一二三兩句是前九句中上品三句次中品三四兩句是前九句中中品頭句及下品頭句今抽折前九中下二品頭句將來安置向後九句中中品第三第四迴轉識犯向上欲令上半無罪下半有罪故下品四句一二兩句是前九中品二疑事三四兩句是前九下品兩不識事也謂鈔主一依大疏可學以四一為品上中二品與彼無殊但品於下品四句一依境想次第與首疏別也若疏中下品不依境想文立故彼云不識事不識罪二不識事疑罪三不識罪疑事四不識罪不識事此便闕境想第二疑事為頭也問古人因何不依境想次第答古人意道約義而明於制門中衣鉢等善事上辨可學止持則事罪並是可學約心緣境不定前後皆約緣之是故不依律文次第也不同不可學中對其惡事止而不作兼對迷心辨其具闕要依律文境想次第開其事上不學無知不開罪也已上辨古今句法差別竟次依數列句中言上品至犯者此之九句古今皆有明義不同古師唯局作持進修事法明白心內必須知釋可學一九若不習學皆制二罪若論制止惡事不許造脩明白之心緣而不了皆不制罪不成可學今師不爾一切心境並制學知何局善境一向可學與昔全乖故通萬境已上古今大旨問既言善惡通該何故講者承皆約煞戒惡事以𨩈抄文九句耶答准若今意隨舉一釋不簡善惡但為對於古執偏舉惡事釋之若依鉢今古既同故不舉也又須知此九句准戒疏意正配九个不學教人傍配學教九人也言上品一句識犯者識事煞即知初後識是人又知結波羅夷名識犯於事犯既識學不學二人並無二罪問學教人無二罪任從不學教人何得識事識犯若言明識與學教人何殊答諸記解釋皆殊既非正義不煩敘破今意謂利根中間止心不學人既且如利根之人從受戒從後曾依講學於事法多分識知忽於中間止不學意隨止心日結不學罪變成不學人收已後對境之時於所對事法且識之識處蓋是昔日學來雖中間止心不學自屬不學教人收據今日明識之處且無二罪鈔文正約此句不論其餘豈因搜玄約生而知之不預繼宗偶然如會言中品四句者牒也謂此四句每句配一人須是四个不學教人問此之四人若為配屬答約四个中根中間止心不學人以論問據何義理配中間止心不學人答緣謂中品四句有帶釋處故須此說且如一類中根之人受戒之後亦曾習學於其中事法粗會少多或於中間作不學意隨起心念便結止犯吉羅變成不學人攝然對境之時粗有識知是先日解之處望此識邊且無二罪若疑不識隨境結之配此四人相同明鏡思之言識事者同上解也疑犯者猶預不決煞初後識定結何罪學人番戒持不學人二吉一不學二無知言二識事者准上解不識犯者謂言煞人全無罪故學人准前不學人二罪不學吉無知擬言三識犯者決知煞人結夷罪疑事者疑初後識有命無命學人准前不學人二吉言四識犯者如上解不識事者不知初後識是人等學教可知不學人一提一吉言下品四句者標也亦配四个不學教人問此四人與中品四人何別答前約中根止心不學人說此約中根及利根由來不學人說有異問何故將此四句配由來不學人答謂此四句全無識處唯是疑兼不識明知全未習學是以四配此四人言疑事疑犯者不勞煩說學人准前不學人四吉言二疑事不識犯者學教同前不學人三吉一無知提罪也言三不識事疑犯者學教人准前不學人三吉一提也言四不識事不識犯者學人同上不學人四罪二吉二提也上來三品九句准戒疏意配屬九人收前漸頓門中學不學方為盡理問前漸頓門將根對教豈非三人一利根二中根三鈍根上之所配但見據利根及中以論全不配鈍根人何意答鈍根不學唯有不學罪無無知非力分故是以不入句法也次解釋中者標也向下釋句法正解中但解中下二品於事法共有六疑句六不識句若上品一句二識中品四識都成六也既是明識之位更不解也言上品至解者上言不識者雙牒事犯各三不識句合成六个不識句中品有二事一犯下品有四二事二犯言犯謂不犯者釋三不識事也迷輕議重者解三不識犯也謂初識胎中是人煞得夷重今謂言無命煞全無罪故云犯謂不犯又煞非人胎本結偷蘭今迷此蘭謂同人得重畜生准說故云迷輕謂重若學教人於六識成十二作持若不學人結六吉六提都十二罪已上依今師消文若古師於此九句中本不通於制止惡事為可學義若作古人持犯句法便須約制作衣鉢事聽作房衣事說言犯謂不犯者如三衣鉢體量色三種必須如法今此三衣是生疎五大色又不應量等鉢即漆木綊紵所成色量並不應教合是犯門所收命以迷心謂言不犯房衣准說亦得故云犯謂不犯迷輕謂重者離三衣宿本得吉今迷離鉢吉羅之輕將同謂同三衣得波逸提之重故云迷輕謂重略要知古今意不煩廣敘也言疑至也者謂解六个疑句中品二疑事二疑犯下品四疑二疑事二疑犯計六疑句與前事犯相同故云亦爾疑有疑無者謂釋三疑事也如初釋薄落明白心內疑此薄酪為有命為無命又不知煞此薄酪為有犯為無犯等疑故云疑有疑無疑輕疑重者釋三疑犯也謂煞初識有罪為殘為蘭等也故云疑輕疑重學教人開成十二作持不學人結十二止犯吉也已上今師正義銷抄若約古釋准前衣鉢上解之即局成古義也云云言上至罪者謂此句識事識犯俱以明解上下二識並無不學無知罪學不學二人各成四作持行故戒疏云事法明了無疑可謂上品持律也已上疏文問但配學教人明識之句不要配不學教人得不答不得不可見此識於事犯便將單配學人恐違戒疏且戒疏之內中品四句上半識事處下半疑及不識亦全配不學教人且不簡出識處配學人疑不識處方配不學人既不甄簡故知上品一句准學雙配也問既將不可學配學人放罪可學九句配不學人結罪何必於可學九中輙明學教人放罪豈非雜亂耶答深有由致謂學人之中有學而未知者於明白心中緣於事法有疑不識生可學迷與不學人相似同是可學迷故須於可學九句內傍配學人律不結罪翻犯成持也准此意者明白疑與不識非是迷故不得入後九句中此若傍配之以明放枝條罪即別更無攝處也問不可學九句正配學教人莫須傍配不學人不答不學人明白心中上由不識有何迷義何要雙配若明白心中有於識處還同放罪也已上兩重問答實謂膜古奪今言中至知者所言帶識者四句之內各上半帶識下半帶疑及不識初二兩句各帶識事第三四句各有識犯故云中品帶識一二兩句於罪生疑不識第三四句於事生疑不識故云於事生疑不識言八罪者兩疑兩不識共成四單句每句下二罪便成八罪言下品四句十六罪者每句四罪四句共論成十六罪多於中品此約不學人二十四止犯於中還有識處如上品一句事犯俱識翻四止犯成四作持中品兩識事兩識犯八止犯翻成八止持并上品成十二作持行餘疑不識及下品一向疑與不識作持全無但成二十四犯也若傍配學人三品九句對於九人人戒四持四九豈非三十六也言此至羅者謂中品八罪下品十六罪通二十四俱是止犯六波逸提者謂中下品共論有三不識事三不識犯已上六不識每一不識結無知提也十八吉羅者於中十二个是不學吉六是疑句家無知吉通上十八吉羅注文簡出相狀可知言並不犯根本名止持者應先問云既言愚教便是犯門所收有何等義在止持攝可引抄文答並不犯根本名止持意道上來二十四止犯雖從根本句位上立並有護戒方便止煞之心不進趣造作邊亦成止持之行九人之內初之一人行成之時識犯全無止犯後之八人行成之時於前事犯或可疑或可不識隨相多少各結不學無知共成二十四止犯是愚教攝今且據不犯根本得名止持不論餘義也言上至品者釋成三品意也上品一人俱識全無止犯持行最勝名上品止持中品四人止犯之行雖成心緣上半雖識下半有疑不識劣於上品又罪少於下品正處中間故名中品止持下品四人止惡不作亦成止持心緣事犯疑兼不識全無識處更劣於前罪最多故故名下品此是持門解義無罪為上品少罪為中品多罪為下品若犯門解義多罪為上品少罪為中品無罪為下品也皆止於一事者結歸一事也此有兩釋繼宗云上來三品九人初人俱識中品四人帶識下品四人俱無識處雖則對境有昇降差殊若論止持之事無來是一此解為正或有解云謂對古師二事上立二九今師只於一制止事上自成二九此解未有理也更問上之九句緣事又緣犯便是兩境何言皆止於一事答且據止持門中單得事為體止惡事上得成止持若疑兼不識便成止犯今且據根本不說枝條也上來辨可學一九句已竟次辨不可學言次對不可學事以明止持九句者此文大意謂明學教之人既已明了如觀指掌於後對境忘迷却乃有疑不識迷人作非畜想等既是迷心聖不制犯無根本作犯兼放枝條止犯亦約九人各緣事犯悟忘有殊遂分九品以辨止持優劣故云次對不可學等云云言緣事緣罪各三心者謂欲作此九句先明句法出處既約迷心為不可學故偏就心論緣事三心者如煞戒境想前三句人作人想煞是識事心人作非人疑是疑事心人作非人想是不識事心緣罪三心者如覆麤罪戒境想前三句麤罪作麤罪想是識罪心麤罪麤罪疑是疑罪心麤罪作非麤罪想覆是不識罪心也今將識事一心歷下緣罪三心為上品三句一識事識犯二識疑犯三識事不識犯次將疑事一心為歷緣罪三心為中品三句一疑事識犯二疑事疑犯三疑事不識犯次將不識事一心歷緣罪三心為下品三句一不識事疑犯二不識事疑犯三不識事不識犯並約能緣事罪心於所緣事境罪境上心有迷妄為不可學也言初至犯初有三句者標也舉識事心為頭歷犯上三心作上品三句上半三識事者謂如初後識是人心中又作人想止而不煞此是上品三个止持家識事於事既識不迷並無犯也下半識犯者識四種犯法不迷此是悟人亦無罪故也不識犯可知若准今師意於犯法具已學知於後忘迷並開無罪今文中猶結者順古結也古云惡事不可學今明白心中若緣惡事不了不結不學無知若於罪是可學明白心中既緣不了皆是先不學故若有疑兼不識結二罪今師約迷為不可學事上疑兼不識並開無犯又若據事上開罪邊說今師古同開若約義全別如前說若犯上疑不識古今皆約明白結罪問古師明白心緣犯不了結罪之意具知未審今師亦是明白心緣犯不了結罪有何別耶答戒疏云後九句三品各三不識事境非可學能了不妨於犯是可學致列其相事總而罪別已上疏文對此問文鈔文何不於此作迷忘同事上放罪由順古結答謂此止持單得惡事為體故於事上間迷立得止持之行若犯法是進修門中自屬作持止犯家境作即成持止便成犯待到作持止犯門中辨開迷放罪今此止持門中未合預前放他作持之家犯法若爾何故此門引來答此權借彼犯法來相成句法即非宗途故下文云且據止持約事為言也不要云留古人病反顯今師是深非抄文意也思之次列中品言二至犯者舉疑事為頭歷犯上三心成中品三句上半三疑事者謂先已曾學知今忽迷心人作非人疑於人非二境心生猶預不了名疑非學能了聖不制犯疑犯不識犯者若依今順古並是明白心中疑及不識各結二罪若棄古從今說即迷心因事上放罪也次明下品言三至犯者舉未識事為頭歷上犯三心成下品三句上半三不識事者謂先曾學已今暫心迷緣人作非畜想雖造前事望無根本成止持又開無不學無智二罪下半犯上三心類前可解古今大意亦如前述言此至罪者謂此九句三品之中每品下半除却第一犯句取第二疑犯句及第三不識犯句故曰此三三句中下二句疑及不識也別各有不學無知二罪合十二罪者謂上三品每品之下有疑及不識兩句一品兩句三品六句每句有不學無知二罪成十二罪也亦不要分輕重此是順古引文十二罪全是吉也言亦望不犯根本名止持者欲釋此文應先難曰既有十二罪合成止犯如何却名止持可引鈔文答亦望不犯根本亦者亦前可學中也謂前可學中雖結二十四止犯罪無約不犯根本得稱止持此亦不根本夷罪雖有十二止犯枝條望無根本作犯亦名止持也言但至犯者此段鈔文與首疏全異首疏云但事是不學雖緣不了聖不制罪罪是可學法故若疑不識迷並制罪今師於此古人文中除却不字便成今義故云但事是可學謂無論制止制作一切善惡明白心中皆須學知也後忽對境有疑不識並是迷忘並無二罪故云想疑忘生等也此則全異古人將惡事為不可學罪是可學者今師未便言之且向事止開迷不結後將法例事亦有迷心亦皆放罪第二約異境俱迷有罪無罪難其不識何得全開分二初問次答言問至何者此問意從不可學下品中來謂此品中三不識事依境想第三句立開迷無罪得成止持義者猶有疑有疑心未決故生此問且如煞盜二戒境想第三句約本迷說如盜戒有主無主想律不結罪此則止持之義極成且煞戒境想第三句人作非人想煞亦制吉羅罪此既結罪便成作犯若爾則境想第三句有罪無罪元來不定何得將下品三不識事總開無罪為不可學止持耶言答至同者謂煞盜二戒境想第三句後心緣其情非情兩境各別故制罪有無不定也或緣罪境者謂非人是有罪境今人作非人想煞非人既是有情雖無非人之境且有煞非人之心亦結起煞非人心吉羅故云或緣罪境人非人故便結心犯等也或緣非罪境無主物故者謂盜戒境想第三句有主物迷作無情即後心緣著無主物邊無罪故問盜戒緣著無主物無罪即前下品三不識事中止持之義得成且煞戒後心緣著非人還結吉羅成其作犯即下品三不識事如何得成不可學止持鈔文答云然彼迷心不結正罪意道迷人作非人想時但結明白心邊非人異境上後心吉此吉自是明白吉從他作犯行中收今此但取本境人上不結正夷罪邊是止持行既無正罪翻作犯成止持故制下品三不識事得成不可學止持之義也問煞盜二戒同是境想第三本迷不識何故結罪有無不同鈔答云莫非緣罪故有無不同莫由無也非由不也無非不是緣著有情境故有罪也無非不是緣非情境故無罪也更不繁述問止但論得境想第三句迷心得成下品不可學止持且中品三疑事還從境想第二句亦有轉想本迷亦結轉想本迷蘭吉等罪何不言之答今論境想第三句約本境迷心無罪得成下品止持即反顯境第二句於人本境上既無正罪例其下品亦得名中品止持其方便轉想本迷蘭吉等自是明白心中結還他作犯收今但據本境上迷心不結夷重成止持例其下品一般更不言也言又至也者應難云此後九句事止開迷疑及不識皆不結罪者前九句中事止亦是疑及不識何故結罪謂前文云但事是可學以想疑忘生雖緣不了聖不制罪正從此文生斯外難謂事止迷心是一何得前結後開便引鈔答云又不同前段等意道後段不識等是迷心不迷教故聖開無罪名不可學故開若前段疑兼不識是迷教不迷心是可學故結也若爾後緣法中亦有想轉者若爾二字領會前旨既云前段可學九句明白心中緣事法有疑不識結罪後段不可學九迷忘有疑不識放罪故云若爾也向下躡跡便舉犯法亦是迷心與事何別便向犯法上結十二罪耶鈔云後緣法中亦有想轉等是正難也後緣法中者謂不可學緣罪法三心在緣事三心之後又就緣罪三心中疑及不識二心復在第一識罪之後且如麤罪想是識犯心此句置而不論只如第二麤罪作非麤罪疑第三麤罪作非麤罪想此之二心正是後緣法中亦有想轉此犯法上想轉即是迷心與事上想轉疑及不識有何別事上想轉既開迷放罪犯法上何故仍舊結之故云後緣法中亦有想轉也不同諸家亂釋也次下引彼房迷作持唯局可學難言如至罪者謂後作持聽門中造房處分法上亦有想轉如不處分作處分想當境想第三不識法句也及疑即不疑當境想第三不識法句也及疑即不疑當境想第二疑法句也已上二句律文並不結僧殘罪故云亦是不犯重也何為制罪者結前徵意也道處分法上既不結根本僧殘便反顯犯法上轉想亦合放罪何得止持不可學九句事上轉想即放犯上轉想便結言答至也者抄意謂且據止持得惡事不得惡法是以且向上持本分事上辨開迷之義若犯是作持家法直須到作持位中方可辨之今此止持既未合說故且結之無妨若論開迷事犯並開今但止持攝他犯法不得故云且據止持約事為言也必如所引者謂許引處分之法迷想及疑既不結僧殘必若引此以為例理實對作持法上亦合有兩个九句一可學九二不可學九故云對法亦有二九也後作持中更為辨者止持既空得事且本分向事上立二九若於法上但要委開迷道理若放罪待到本位放之故下文云不可學法迷亦有九句如前段後九句說之未要引戒疏意在後明之次明作犯言次就作犯中者止持翻成作犯一持一犯相翻意圖釋句法稍易別亦無義不勞亂釋思之釋名解義並在前文訖今向此門中亦立九句辨罪多少有無輕重等可學法事如初九句者法謂犯法也事謂煞事上品一句無罪還約利根中間止不學人說更有學了教人傍配之中品四句下半有八罪約中根中間止不學人說學教人即約學半知半未知人以傍配之下品四句有十六罪即約中根反利根由來不學人說學教人中即據初學人以傍配之鈍根非力分既無無知不入句位已上九人配於句九結二十四罪學人門成三十六持理合於此廣烈遍今不烈者但謂句法與前不殊無勞敘致遂指略之故云如初九句等但依上消文莫更多語不可學者如後九句者謂前門於事上先已學知後忽忘迷非學能了名不可學約境想三句三三成品每品之中於犯上疑不識順古結十二罪也與前並同者結歸四一三三結罪兼難古犯上十二罪引房迷等道理與止持不殊無勞再說也但犯根本為別者謂止持門中止惡不作成止持此門必約造作成作犯既是作犯便有根本九句犯九个夷𠎝與前止持九句不犯為別也又於不可學九句中初品犯三波羅夷中品轉想犯三蘭不品或蘭吉或全不犯與前止持後九句一向不犯為別也故戒疏云結罪多少輕重皆同但犯根本為別耳已上疏文言就中者就不可學九句中根本者明根本作犯罪不識事中者明下品三不識事當境想第三句也或無犯者或者不定詞也若本迷人作非畜有罪境煞得後心吉若本迷人作杌木想即無罪故云或也所以無罪者謂始終無心故問始終無心其相如何抄答云如悞煞人等謂始終迷人作杌木想其心一向不轉便是無始終想㒵也問既云始終無心何得言作犯答雖即無心約作前煞事亦名作犯然則三時不作人想人境無夷杌無吉也除婬酒戒者謂此二戒約境而制縱使道作非道想酒作非酒想本迷轉想皆得止罪故須除之若據隨相中酒戒亦開迷約有方便心方犯等云云言中間至便者謂前境是人初起心時作人想煞進步向半轉作非人疑當境想第二句成中品三疑事或進步向半轉作非人想當境第三句釋下品三不識事故云若中間轉想疑事不識事也由心差故是方便者謂初起心時人作非人想煞此則有方便煞人心也行至中途轉作非人疑或作非人想由此疑想二心差本期之人想壅結方便想差蘭罪故云由心差故是方便也即中品三疑得三蘭下品三不識亦得三蘭也言若不至事者此釋上品三識事當境想第一句謂前境是人起心作人想煞始終不轉煞人命斷之時得根本波羅夷罪故云若不差結根本也即上品三句結三夷或不造前事者謂前或境強煞不得或好心息或懈怠息或緣差並結方便蘭罪已上並約本境根本及前心有無若異境後心律並不論也言此後至故者謂約前罪之有無輕重辨三品優劣識事三句以人作人想煞心境相當得三根本夷罪謂犯門解義罪多為上品也故云識事三句為上品作犯言疑中三句為中品者謂初作人想中途轉作非人疑本人境雖不移但疑心差本期故得想差三蘭為中品作犯言不識三句為下品者謂人作非人想是不識事前境是人初作人想中途轉作非人想亦結想差方便三蘭此三輕於中品為下品作犯或無罪者若本迷非人境得異境吉是本迷有罪若本迷人作杌木想即無罪約始終不轉於此本迷不定故云或也言對法類可知者謂下半犯法也意道上之三段但釋上半事上半事上根本罪之有無未明下半犯法若對下半法上要知罪之有無類取上半事中義理可解此解方為所當搜玄不無雜亂正義如上非說亦多若不錄之何顯前修之失順正記約五邪七非法以說謂上且約煞事為制止若五邪七非之惡法此法通於可學又是止持此解不可夫言相類須前段曾明後不更述即言類解五邪七非抄並從前未明將何類解故無理之甚也若准素記云准前止持門後生起作持不可學九今亦生起止犯中不可學九句也若據此說開迷之邊全落枝條罪上與抄有違抄約根本事上為言何故妄生此是思之近依繼宗記引大妄語戒釋彼云應先問曰如歷位門初敘學人受戒已來懃學三藏於境境迷妄次敘不學人由來不學事法無知事法即善惡事法善法即在作持止犯門中明惡事惡法便合在止持作犯門中說上所解但見舉煞戒惡事廣辨二九何不見論惡法耶可引抄答云對法類如可解便云大忘惡是根諸餘是枝條等記文絕廣云云如彼此解自是一途今意未敢依也已上略敘諸家義也二明分二九句中二初明事犯分成二九句數不同二若論下別解不可學九句犯上不開所以言所以至也者所以者徵詞二九何以四一三三不同耶且徵可學九句中何故上品唯有一句更將所以別自徵之以事法下答也以由也由於事犯皆識全無不學無知故云未可論罪獨立為上品也中下二品四句合在三三句中辨也或可但舉上品一句辨事法俱識下八句有疑不識合結罪不言可解亦得言後九句等者徵後三三九句也莫非下答也准文准釋三三九句今借此語雙釋二九非由不也無由一煞事生明白心疑不識成可學今迷忘疑成不可學也容兼疑不識者容許有也兼帶有也且可學中品四句第一第二上半是識事兼帶下半疑犯不識犯句第三第四上半是識犯兼帶下半疑事不識事句即識事與疑犯不識犯交絡疑事不識事與識犯交絡則上半四識不疑下半二疑帶二不識下品四句第一第二上半疑事兼帶下半疑犯不識犯句第三第四上半是不識事兼帶下半疑犯不識句即疑事與疑犯不識犯交絡不識事與疑犯交絡也故戒疏云中下各四由緣一事帶疑不識交絡互明出其犯相即斯義也次釋後九句容兼疑不識者謂於煞事先以識知後忽生迷約其境想容許有疑兼帶不識故三三為品且上品上半總列三識事中品上半列三疑事下品上半列三不識事三品下半各容兼疑犯不識犯句故戒疏云致列其相事總而罪別也言結罪易明故分二九者正分二九意也謂結不學教人明白心中有疑不識得不學無知罪故所以分成前可學九句也為開懃學之人迷心不結罪所以分成不可學九句也又前九句上品全無罪中品下半帶有下品上下俱有後九句上半事全無不學無知下半疑犯不識犯順古即結故事總居上犯在下也言若至罪者謂獨明不可學九句三品之中緣其犯法各有三心每品各除識犯心取下疑犯及不識犯二心共結四罪一品有四三品十二故云今十二罪也皆犯究竟者准此古人所結十二罪皆是果吉羅罪不是諸篇方便因吉也以罪是可學等者正辨不開所以也古師意云若煞盜等惡事明白心中不可學作是不可學雖明心緣而不了亦無二罪今此波羅夷罪法屬教法故理合進修今緣不了致令有疑兼不識也須結二罪也次引人犍度律文證彼云六群作法了便言不知佛言不以無知故得脫若犯罪者隨六聚結如法治結不學知更增無知法者隨緣不了處更增無知吉也言無知及疑皆是究竟者牒前十二罪是疑犯不識犯上果吉也若不疑等者不疑反上疑句及識反無知不識句此皆是識犯句一向無罪前言無罪等者重辨上識處無罪便云一向之言何下遂釋云謂無不學無知名為一向若作根本事成自有根本果罪也故首疏云上言一向無罪者謂無不學無知非謂無根本罪已上疏文鈔文改他上字為前字也此順古引文十二罪並吉不須分輕重若依今師於前止持門後難開即此亦須同放顯知此義全是古文已上先呈五義已竟次敘兩家之非謂匠者之思審繼宗記云一向無罪者謂既不疑及識全無枝條止犯又無根本果罪可趣故云一向無罪無果可趣此謂簡其事上識心雖無不學無知猶有根本果罪可趣也問若言事上有根本罪者何故前可學中言上品一句以事法俱了未可論罪耶便引鈔文答云前言無罪者謂無不學無知非謂無根本也即却指可學中上品一句雖無不學無知且有事上根作犯果罪可趣不同犯上識了一向無罪已上記文今意不然此一段鈔蓋是收順古引文全依首疏首疏自解一向無罪但無不學無知非無根本何得妄說根本俱無名為一向不得見文中一向文詞便於文外異計若爾何故文云無果可趣答斯言無果其理顯然請近者更可審思仍速改輙或有人云是今師結也謂事是五俱意識所取之境容有明闇若疑不識事上則開若犯法要先學知後准意能緣不假餘五識若疑不識是學未知理非迷忘故法上不開也和尚破云若爾律文覆麤戒及房境想何得開迷此麤罪及白二法豈非唯意緣耶文准前文但迷非學了故佛一切開既云一切開即此還須放今猶結者順古人耳第二局就根本止犯相從建立二九句所以分二初約止犯相從以明二又解下對根本罪有無以辨前三初作犯無罪難亦有云根本無罪難亦得二止犯相從答或云異境生罪答者非也且人為本境杌木為異境既約本迷異境全無吉罪何得言異境生罪答耶二有罪非宗難相從造事答三識犯唯八難句法相從答言問至故者所以生此門者謂因前來廣解之中根本不識文中鈔約或無犯謂始終無心今除此下品三句只得六句有罪所以下品三句無罪者約本迷也當境想第三句迷人作杌木想人境無夷杌境無吉即下品三不識全無罪中品三疑疑杌邊雖無罪且有半心疑人邊得三吉上品三不識得三夷罪今除下三位有中上六句有罪何得言作犯九句耶問竟答中有二順問唯六答二申前問意答初約就根本實唯六句可知言然等者申前問意答也然者是也亦云縱奪也上若縱之則唯六句若也奪之還成九句也上三句下者是上來所問三不識句之下也即此三句下有不識犯疑犯亦有不學無知罪還成九句即第九句有不識犯第八句有疑犯若第七句且通在內未言有無今將八九二句疑及不識有止犯罪相添亦成九句也二有罪非宗難相從造事答分二初徵次答言若至句者若爾者徵也謂徵上來既將三句下不識與疑亦有犯便相添成九句者恐不然也且此不識犯及疑犯所結不學元知元是止犯之罪今將止犯來添作犯成九句者豈非違作犯之宗耶徵竟答中有二初依古以末從根釋二又必下今師助造前事釋言從根本故得名者謂作煞事是作犯根本緣煞波羅夷犯法疑及不識即結不學無知此罪由根本煞人事上有攝末從根本名亦作犯也又必由下助答首疏無文且如迷人謂杌始終不移煞命斷時由迷無過且作煞事是作犯之流非謂本無煞夷蓋是曲放然且名作犯攝也繼宗記中不成解也第三識犯唯八難句法相從答言若至從者此正難第七一句謂八九句下有不學無知罪容得入九句之數且第七一句上半不識事開迷無根本又無枝條此即枝條並放下半識犯又無枝條上下並空今若除之即但有八何得有九鈔答云如前已解謂從根本故得名由造前事得作犯名也句法相從者凡作句法從識至疑從疑至不識次第合然若無第七即八九無生也言又至本者謂前煞盜等惡事皆是可學之境若由來不學之人明白心中緣前事犯不了名可學迷即四一成品共成九句上品一句雖無不學無知且行煞故得作犯根本夷罪中下二品共有八句謂於事犯疑及不識都結二十四不學無知止犯罪每句各犯一个根本夷罪三品九句都犯九根本故言莫不犯根本也只要依今師正義如此釋鴻記對此廣依古解恐違鈔文不更敘錄也言若可學至罪者約懃學之人先已學知如觀指掌後對前境迷忘心生非學能了有疑不識名不可學迷也准六句者即三三為品約本迷說上品識事得三夷中品三疑疑杌木邊無罪疑人心邊結本境上三吉上中二品共論故云唯六句有罪除下品者謂本迷人作杌木想成下品三不識事心本異二境並無罪故須除也若轉想結蘭前心得有九句者謂結本人境上未轉想時前心蘭也故云並方便罪也謂三識事心得三夷罪為上品作犯三疑事心約轉想結前心三蘭為下品作犯鴻記對此亦廣明古解此不繁敘次對異境中言若迷至故者謂約本迷說也本迷有二若迷著無罪境便除下品故成六句若迷著有罪境却收下品便成九句且迷想約非罪境唯六者鈔舉盜戒境想第三句說有主作無主想以無罪故如盜戒有主有主想即識事三心得三夷罪二有主無主疑即疑事三心得三吉第三有主作無主想即不識事三心全無罪故今除之唯六句也次言或九等者鈔舉煞戒境想第三句說且煞戒第一句人作人想煞即識事三心得三夷罪二人作非人疑即疑事三心心緣兩境繼宗記義結六吉如本迷疑人心邊三吉又一半疑非人邊三吉也三人非人想即不識事三心三吉故云後心吉羅生罪緣故成九句也言若至九者此段文重明上二六句以止犯相從謂成八九所以謂前迷本境唯六句後迷無罪異境亦唯六句皆除下品若沗下半疑不識犯上止犯罪即成八句句法相從及造前事亦成九句也此明二兼以八九江西五兼即太多也言極至之者鏡由明也謂前辨據今古義古師將二事以辨二九句今師一事上以辨二九如是今古相駈極為分明不委後人於此明未勸審思之已上作犯門竟第三作持二初牒名舉數二若從下解釋言次至者者謂抄玄於作持中理實立二九句一可學二不可學若古師向作持中唯立可學一九無不可學今抄文雖向下別立不可學一九今標中未便異古是故且言九句者也釋中言若至句者從謂相從自古相從於作持門通對二教事法兩種事即制作衣鉢及聽作房衣法即教行法聽門說淨處分法理實合先將事對犯立一九句四一成品次便將法對犯立一九亦四一成品故云若從對等云云但明用差別者事則房衣等事法謂羯磨教行等法上法用也階降不異者四一為階多罪少罪無罪為降事法二九階降同故合為一九也言唯至異者唯對可學以辨者古於此門無不可學以皆進修故不同婬盜煞等惡事明白心中一向一不可學故云唯對等云云今且列句者標也謂列可學一九四一成品如前止持可學事中更不別也言所以等者謂九句之中辨不學無知有無輕重分齊如止持亦不別鴻云有無輕重名所以也有謂有罪無謂無罪輕謂吉羅重謂提罪更有犯謂不犯迷輕謂重疑有疑無疑輕疑重如是所以便有二十四罪六提十八吉羅並止同止持可學中說竟言此但順教作事等者謂引作持中順教作衣鉢造房舍長衣等事名作持與前止持息惡離過守戒為別首疏作持門竟二今師別立句法初標云就中分三者立此句法有二意一古師將法就事相合而明又指在止持中說其文太略今師更於法上別明可學九句也二者但向法出句不向事上明者意道約事與止持不殊若約法立者人由未見今故於處分法上作之也次依品列句言初至犯者此段鈔文今師別立非關古文但依今師銷釋鈔文九句四一成品亦准戒疏約九不學教人配屬每一句配一人又須約九學人傍配之且上品一句正配利根中間止不學人旁配學之教一人中品四句正配中根中間止不學四人旁配學半知半未知四人下品四句正配利根或中根由來不學等人旁配初學全未知人若鈍根學教人盡形依止二罪全無鈍根不學人但有不學無無知罪非力少故已上二人准漸頓門不入句法之內又此三品九句上品一句學不學二人全無罪中品四句有疑不識不學人八罪二提六吉學教人明疑不識全放下品四句一向疑兼不識不學人十六罪四提十二吉學教人明白心中雖疑不識全放若更約上中下挍之上品一句作持行成法犯並明練無二罪學不學二人是上品作持行中品四句持行雖成於法犯上帶疑不識學人雖不結罪然亦有疑等不明不學人有疑由結八罪是中品作持也下品四句持行雖成於法犯上一向疑不識學人雖無犯以學未知不學人結十六罪是下品作持也故戒疏云並乞法造房同號作持由於犯法迷而不學故各有罪已上疏文第二今師別立不可學九中言不可學法迷亦有九句者謂作持門中事法理實俱有不可學九亦成二九今但立不可學一九唯向法上論者一釋云亦但明用差別階降不異將事合法只作一九或可但向法上立不可學迷若事上迷疑於止犯門後約事上立不可學意在翻止犯成持即作持事上亦有不可學九又止犯門但約事立未約法論意道作持已向法上立了翻作持成止犯止犯中法上亦有迷忘一九此制作家巧用文勢亦是略指以類相從始終交略義所以法上迷心一九但向作持中出前二行不說由結十二罪者謂止持作犯非本位故雖今師廣引徵難房迷道理者動犯上所結之罪意許放之然且未合懸放故順古且結遂指此改云對法有二九後作持中更為辨也前既指後後遂立之正明放罪故云不可學法迷亦有九句也如前段後九句說之者謂前既云作持合立不可學九便合廣列句法今慮文繁指同止持不可學九三三成品無異也然於句法少有不同前云緣事緣罪各三心此段云緣法犯各三心緣法即約處分法有識疑不識三心緣犯即約僧殘犯亦有識疑不識或有云法即約造房戒境想犯即約覆麤罪境想各有三心互相雙歷作句亦得也今且依初解歷成句者應云識法識犯識法疑犯識法不識犯上品三句次疑為頭歷應云疑犯疑法疑犯疑法不識犯成中品三句也不識為頭應云不識法識犯不識法疑犯不識法不識犯成下品三句也此既今師別立但於法犯不識有疑皆是迷心同放罪也如此互歷依前段後九句述之反顯正持作犯二門法上十二罪並放矣第四止犯門初標云次明止犯或九或八者次謂次第論謂論量或者顯不定也通明止犯總有三種一制聽教中事上止犯二事上法家止犯此二皆九句如止不乞處分法是若對制教約不學進修前事止法而生則有八句所以爾者謂既不學便無識法識犯故但有八此一九八唯通可學猶順古師若准今師更加不可學也今既順昔故云或九或八也言或九句者牒前或九也謂約聽門止不乞法犯根本僧殘便成九句也次列句分三初列上品四句次列中品四句後列下品一句言上品四句有十六罪者四句者便是前來作持中下品四句今移來犯門便取罪多轉宛上品既有四句亦配四个由來不學人通上中根如前已說已上四人不乞法犯四根本明白中緣於處分事等有疑不識又結不學無知枝條十六罪四提十二吉約學教四人亦同前述言中品四句有八罪者句法請依作持中品列也還約四个中根中間止不學人說犯四根本已更有枝條不學無知八罪二提六吉學人准配下品一句但犯根本一僧殘學不學二人全無二罪也已上且約九人以配九句各得一殘犯九殘已更有二十四不學無知問九句何必配九人答准戒緣須配之故戒緣云今以句法用收教相九人造房中有迷悟一人識達犯法無疑不結不學無知餘之八人隨相多少已上疏文已上鈔文約九殘僧一依首疏立也相疏不許此義彼破首疏云准文驗九上品應是四蘭次品二殘二蘭下品一殘文既僧殘蘭偷何以九句皆犯僧殘若無文起孤義成虗搆若依境想又乖文指進退窮審似當穿鑿也東塔與鈔意同却破相疏云等徑知昔義事罪識等並約進修非關制教破者不究斯旨謂依境想又遂約境想廣辨其非此謂不了他宗立意破不相當虗名示顯據斯一部自反三隅況所立中繁雜牟楯云云如彼今引東塔反斥非者意文道鈔全依首疏首義若破鈔亦同非故引彼文即鈔內九殘定立也云云次辨顛倒句法言所以顛倒前句不同者所以者徵也前句者即作中下品四句若在作持中即最下品今來止犯中便轉為上品又識法諳犯一句在作持中即為上品今來此中却為下品豈非移前向後移後著前非顛倒何謂注文徵竟言犯門等者釋顛倒之所以也意云犯門解義罪多却轉作上品緣四句得四殘罪又加十六枝條豈非多耶識法犯句但有僧殘並無餘罪即為下品不同持門也中品無異若爾作犯門中亦同犯位何不取罪多為上品和尚解曰理合如然但為作犯句法指同止持門辨並不論量上中下等必若立之亦應上四下一又約古文罪多為上等若據今師不用亦得故戒疏云犯門解義罪為上翻前持中可以知也順持解義何為不得恐多語久自昏覺慧故倒動之心若明了亂亦芳如鳥群飛自分牡牡已上疏文若准鴻記此句出自齊朝道覆律師彼亦不分可學不可學但就初篇說作犯一九今南山第二九句託第二篇說作持一九即此初九是止持若止犯並在九中明然今先明止持即初九是若止犯一八此中教行一八是後至首疏始分可學為一九於所營事上止犯嚮他進修八句法上止犯作之作犯之中既自離出可學九句便無可嚮也今時相取此釋言言至句者八句者標也對教行者教謂律藏行謂對治今於此教行法上作不學意便結止犯吉羅此止犯是前三行上及此門之初根本止犯上枝條止犯罪既此門自辨多少識法識犯根條並無全成作持不同前造房止不乞法雖識法犯由有根本僧殘為其罪體亦成九句今此約教行法以論全無罪體故不立之但存八句上品四句一疑法疑法疑犯二疑法不識犯三不識法疑犯四不識法不識犯結不學人十六罪四提十二吉中品四句一識法疑犯二識法不識犯三疑法識犯四不識法識犯結不學人八罪二提六吉首疏止犯門已竟於此抄文且順古但立一八未為究竟故戒疏云有人解云止犯位中對教行不學則唯八句除法犯俱識已上疏文准此語勢既稱有人解明知不許若論今師不蘭事法皆立九句也問設欲依今添古止犯一八亦成九句如何添之答約句法相從以說亦成九句或有解云據不學人止不學時有吉羅罪為體亦成九句者任情思審次今師別立言若至述者今師新建者謂上順昔唯約所營法上出止犯一九進修教行法上立一八若於事上全未曾明恐人疑云將謂事上無不可學不結犯故更立之又前作持對事立句順古唯明可學未有不可學今依止犯事上別立二九翻成作持事上亦有二九句意在四行事法皆通二九次消抄文言對事者對聽教中長衣尺六八寸事對制教中自犯及他犯約制止事上所犯之罪制令發露於此事上今須學知皆名可學愚教不了名可學迷若先解知後緣不了即不可學迷也言如至學者指事釋也如不說淨者且明可學九四一成品上品一句識事識犯謂尺六八寸知自他所犯事是識事若知不說淨得提不發露他罪得提是識犯雖皆識知望止不說等犯根本提無不學無知罪中品四句疑不識處結不學人八無知罪四根本提下品四句結十六罪兼四根本若學人但結根本無枝條也上辨可學竟言若迷等者釋不可學亦緣事緣罪各三心三三成句依今師義事罪之上疑不識處皆是迷心放二十四罪上品結三根本提中品三吉下品轉想亦三吉根本或有或無等問若全無罪何名止犯答雖則開迷望止不順教作邊止犯從根本得問此不說淨及發露等是法何得云事答望長衣鉢及覆所犯事邊名事不同諸家思之已上既二九翻就作持亦立二九已上止犯意也言如是已下等者謂上之四行隨指一戒達之類通法界且指一戒令通四行者如止煞不作是止持有可學不可學二九句觀行成時是作持亦通二九止不修觀是止犯二九若作前事是作犯准上一戒既爾萬境皆然但明白成可學迷忘不可學也對此略明今古句數覆律師立三九一八句前三行都三九止犯一行但一八願律師五九一八句止持作犯各有二九作持唯可學九若論止犯唯立一八句首疏立六九一八於前五九一八外更加止犯一九也南山大師約文止持二九作犯二九作持順古事上一九成五新建法上二九成十九句止犯法順古一九一八成八九一八句依今對事別明二九成十九一八句若更於古人止犯一八上約句法相從不論有罪無罪不要除之添成九句便成十一个九句然不離二九諸境通該已上第一內已竟第二方便趣果門初牒名言二至者者謂前作止二犯根本罪上不學無知罪相已知然根本之罪要籍他成故立此門具辨也梵語漚和俱舍羅此云善權方便新云加行即加功用行謂此方便能趣果本故云趣果也釋中言然至為者夫造境成犯必有三時謂加行根本後起且初制加行時者意令上上智士不犯此一吉二蘭次制根本時者意令中品智士不犯後制後起時者意令下下智士不犯吉羅即令三品智人專志不作又就加行復分三時初制起心時制斯身口吉意令上智之人不犯此吉次制進趣時意令中智不犯輕蘭後制境所時欲令下智之人不犯重蘭雖犯此三由未至根本故名智士也言略如上引者指優劣門引善生經三時四位以明輕重及有心無心並是言何者前方便者徵名也言總論諸聚者謂一一唯戒通約五篇六聚以辨也問既言諸聚偷蘭遮聚何不見明三方便耶答准薩婆多中亦有因蘭成果蘭如盜四錢及非人重物豈無方便抄不言者承上制作不述亦可鈔約諸聚自含偷蘭也言明了至便者初二篇立三方便二吉一蘭第三四篇立二方便皆吉第五篇中不定若不要期偶然便犯即無方便若起身口思亦有二吉如前運心欲於其時不齊整著衣及上樹等先結遠吉後至樹所攀枝欲上舛齊三衣是近吉若過人頭反衣不齊整結根本吉言律之者謂律不於蘭中分輕重但云不成者偷蘭如卷者謂篇聚中引十誦偷蘭分輕重明了論中唯結一品是會釋中言今通會輕重者今約四分不成偷蘭通其十誦輕重兩蘭會取十誦兩吉一蘭於初篇立一吉二蘭成三方便以了論吉體不異十誦輕蘭會彼了論重吉則無別也以此會通共成四分行事言約至羅者謂初起心欲作前事身未行口未說是未現得吉此據正起心時結非謂息心結有人錯解知之次引證者四分但云發心心念證上可知言若至別者謂前既言發心心念便犯者律不制單心今言犯莫同大乘單意犯不言答至乘者謂此起心是要期身口欲作前事之心故得吉羅若單心制限大乘非此所說也列證如文言二至蘭者明次方便亦約下床進步等動用時結非謂息意方結可知言三至蘭者釋近方便相狀可知已下至准者輕重多少不同者初二篇下次近方便得蘭是重下三篇方便皆吉為輕上二篇立三方便為多下三篇立二方便為少雖或輕或重或少或多皆約初起心欲作為遠進步至中為次到境所以為重大途相狀可准上婬戒上方便說也言何至本釋名也三緣者一吉二蘭也將至果者將者欲也欲至果本假上三罪而成或為七緣通來隔不至果所故號前三方便七緣義如後說者具緣中七緣是也非為闕緣境強等七也次辨根本言本至便者共成一果者簡五分了論攬因成果後更有本時方便僧祇四分攬因為果後但有根本即無方便然於攬因之時即有不定有說三罪具足有之有說起心犯吉若進步者攬吉成輕蘭更至境所攬輕蘭成重蘭或交形舉離攬重蘭成果本等或有記中作放箭喻說即未敢依承思之無理後方便言何至羅者也造業成發心喜悅又結吉羅通諸戒並有此方便故云通得吉羅上且一解名有釋云若起暢快之心結重吉若不起喜悅心又未改悔亦結輕吉謂此吉體食輕重故云通得吉羅亦得問自古不收後心吉羅為後方便今師立之未委馮於何教答准善生經文有後起罪又四分小妄語三時有心等立之自古不知可謂微隱之相也已上第二內竟次解第三具緣義言三至者者謂前通明五篇根本上方便之罪未審犯根本罪要假幾緣故立此門辨通緣相若准繼宗記云前云若七緣阻礙即成方便遂注云七緣義如後說然未委知故有此門來若准申釋但因前文注方致具緣義恐成大扁釋名可知釋中言先至便者意業不自成者謂持犯兩業不自然成就或假修造者必假籍修營造作方可成就諸緣和具方結罪福者約通別二緣和合具足方成罪福罪即犯福即持具如婬戒通別都計十一別緣有四方犯波羅夷持衣等事例准可解必片乖阻擁結方便者片者少也似也通緣少似乖阻別緣中少似乖阻結蘭吉方便持行亦爾言故至別者謂律中約能犯心為因造趣前境方便為緣因緣兩成方可名犯若闕不成為罪居聚等者具緣入五篇收闕者居六聚攝法亦爾言不至制者謂化教但有業道除結正罪外無別違制之𠎝制教則兩種次第初吉次輕蘭近重蘭後根本舛後心吉若違此制具緣犯根本依篇懺若不具或蘭或吉不定更有非說不錄言今至緣者謂二百五十三百四十八一一戒上皆具通別二緣通緣即如此門別緣如隨相逐戒說也第二文二初敘昔說二今師釋言有至知者謂願律師立五緣一大比丘二有所對境三有心四心境相當五事成究竟將此五緣貫通諸戒故也非無此義者諸戒將此五緣解無不其理後進未知者如婬酒二戒不必有心及心境相當事成究竟謂此二戒俱約境制又婬戒至犯即重何有究竟夫立通緣遍通諸戒只於此二便成不了故云後進未知上且一解或有釋云五緣之內第一云大比丘若爾餘三眾應無過又五緣內不說命梵二難俱成不了亦是後進未知通上二解方成一義相部疏主立三緣一若人已受大比丘戒二如來已制廣教三若人不至痴法飾宗云若爾今時比丘總皆是犯更加隨所作犯今亦不取此為通緣也二今師自釋言今至不同者南山立七緣用解諸戒方可通收如下列也言一是五眾出家人者異古人古云下三眾律剩結也今云戒戒通收便云五眾言蘭至作者受戒不得者但有餘緣障戒不生身既無戒亦無犯義言或至違者雖是五眾遇四捨緣或被他煞等亦無犯義餘文易知言二至犯者如律諸戒皆開此緣若心了知隨作皆犯也言三至境者若期心不當境通不犯諸戒釋中有二意初通簡非唯對境無心二約對境無心亦犯所以言非謂至犯者此今師意也非由不也不謂對境無心一向不犯若先作方便後入無記睡眠而對前境作前事時亦犯不同古師一向故有非謂之言或迷謬者除婬酒戒不假心當境也境有錯悞者由心有迷謬於境有錯悞也錯是境差是心謬是心取境差非是境來差人廣如戒疏中說或無記餘緣者如扶持木石失手煞人如睡眠不學或睡中動轉致損傷是心不當境並不正犯言若至重者既先安煞具欲煞人後入善惡無記三性並結夷罪豈非心不對境亦犯十誦伽論等者謂先語典刑與母一刀令教快死後自睡眠入無記性前人用語命終此得逆及重以違恩養故得逆蘭及作人想得夷重言阿至耳者羅漢無記犯者如長衣忘說淨數數別眾食不白入聚落未睡遣未受具人出房睡後偷入覺已即須悔過凡夫須准者准羅漢覺悔過也不為夢眠者目食曰眠神遊曰夢並是第六意識食令前五識歸種不行長養諸根大種今羅漢已斷惑則無五蓋之睡眠但止息四大若依身應有食息息名之為睡故智論云睡有二者睡而復夢二者眠而不夢今即第二句也言四無命難者難也釋中言謂至戒者如文言若至犯者謂煞妄二戒命難亦不開唯婬戒怨逼即開須三時不染方開餘一切性戒更無開文也第二文初可知言道至論者謂專持淨戒修定習慧於無漏道少分有力至死不犯此人遮戒亦不開之言草繫者約事立號也論第二云有諸比丘壙野為賊恐比丘告人皆欲煞之賊中一人知比丘法勸以艸繫而去諸比丘為蚊䗈日炙於中上座告眾曰人命無常如河駛流縱處天堂不久磨滅況人間命而可保乎如何為命而毀禁戒諸人當知人身難得等諸比丘聞已各正身心因國王遊獦見已遂說偈問曰觀時似無病肥壯足氣力如何被艸繁晝夜不轉側比丘說偈答曰此艸甚危脆毀之不復難但為佛世尊金剛戒所制王聞已令人解放說偈曰善哉能堅持釋師子所說寧捨己身命護法不毀犯我今亦歸命牟尼解脫尊堅持禁戒者我今亦歸依言海板者論第八云有諸比丘隨商人入海遇風船破墮海下座收得一片板上座沒水說偈索云佛制敬上座云何故留板下座答言我不思佛言為命故留板今奉志誠勅奉板遺身命便授板與上座自沒水中于時海神感其精誠接諸比丘并商人於岸上海神說偈歎云南無大信士致命能奉戒以汝專志力發我勇猛心接汝昇同伴俱昇安穩處由此信敬故必得解脫果等者取鵝珠比丘緣起寄之說者不妨引之證前性戒言餘至者但道力未成遇命難緣開下三篇中遮戒若爾第二篇中遮戒莫不開不答亦不開如媒嫁令生婬欲婬欲是障道之原流浪根本二房損財兼妨修道業亦不開之言五至難者梵者淨也恐壞於淨行故聽有犯言謂至去者童女寡婦為不婬戒難伏藏為不盜戒難水陸多細虫為不煞戒難惡伴口過多為不妄留難也文云等者安居法聚文也有上諸緣聽破安居去無罪言唯至戒者准上文云破安去者但開三篇中遮戒提吉等若打搏飲用等性一向不開言就至知者遮惡者斫伐艸木掘地等遮俗謗故有難便開也事輕者如眾學戒中或有二難開覆頭走不白入聚落等以輕遮重者性等四礙不得會衣則開遙捨但得輕吉免犯大提也反上可知者非上三類諸重遮如飲酒等則不開也或可有難如上來即開無難即不許也更有非說如鴻記中言毗尼至師者證上善識開遮相也一緣起過者二制則初制三重制則林中與畜生行非梵行制滿足戒緩者聽捨戒還家後得重來受戒急則制畜同人也三處決斷者一緣起二戒本三廣解是證前性戒不開是急遮戒許開是緩無難不開又急如此決斷是名律師等第六稱本境中標言六六稱本境者問稱本境與前期心當境何別答不同前約想心差此約前境差也若稱本境通犯一切戒不稱本境則通不犯根本但有闕緣蘭吉言謂至也非道作道想者舉初戒釋也且婬戒正境有四一覺女二睡女三新死女四少分壞女已上並是正道境若往造皆結夷罪若半境女或多分壞女屬非道攝若往造犯殘且如前境本是少分壞女無是正境明白心中又作正道想行造行至中間前境已變作半壞或多壞也即屬正正境今於彼非正道境恒作正道境想與境合時當著非道不犯根本夷重但得二蘭罪行至中途境變之時結一境差蘭從境變後於不正境亦作正境想與境合時無當非道非道差本心又得一蘭說記中但云一蘭者莽鹵也無至有主想者此句亦雖明謂約有遺物在自己地分之上失物主未決捨此物境便同有主今見此物作有主想向前盜之行到中間前失主已作捨心此物境冥然是無主今於無主境上常作有主想舉離處不結夷罪准有中途變為無主物時境差蘭從物變後虗起有主想舉離時亦有起有主心邊吉羅不類婬戒結蘭故下文云婬夷轉想及迷並得夷蘭也唯婬外漏失戒結蘭諸後心俱吉也知之言非人人想者謂前境是人又作人想煞至中間被非人來替處於彼非人上恒作於人想下刀煞時煞著非人非人命斷時不結夷罪但有前心境差蘭約中間換境時從換境後虗生煞人之心但得吉此吉亦約人境差者若非人異境全無罪何以謂全無心故也各非已下通結如婬戒正道是本境非道是異境盜戒有主是正境無主是異境煞戒人為本境非人為異境已上三戒並為異境來替但結方便境差蘭罪也此門境差之義最為相深止依一家廣明是可豕為龜鏡思之第七門言七至分者雖具前六若未進趣至果未犯故立此緣若中間住便是闕緣也問未委住止相㒵如何鈔答云相有四分去聲呼謂闕緣之相有四般分齊言一由至用者謂諸諫戒未至第三練時隨被法隔即止不至果用若白竟便捨雖無蘭罪亦有方便吉故律云白未竟吉羅也尋諸記文未曾有此說思之有理言二至心者懈慢怠墮不遂前事緣壞者如安煞具後忽失或壞刀斷弓折等離阻者被餘緣來差不至果位如欲煞人恐事彰露等強盛即約彼境強盛害之不得等心便停止不肯再為名慢怠也言三至也者好善心即心也戒疏云如欲造罪身口雖發未至究竟忽起善心便止前業雍礙不則暢但居方便問此是善心生何得却云息答約善心生能息惡今從所息處彰名言四至也不同想心等者勵云如本境是人今想心當人時想心決徹至成果時人想煞心二俱不息而得究竟夷罪若對本境起疑心時疑緣兩境恐煞非人遂便停止但結方便自古章疏相承於此約第六境差兼第七好心息疑心境強息等作境差蘭義首疏十八蘭相疏三十八蘭東塔八蘭具如義圖中此不在敘錄南山七蘭具在鈔文七緣是也將此七緣用通一切第三通結言上至出者兩明二犯者通緣中犯別緣中犯已上鴻解或可通緣別緣共明作犯通緣別緣共明上犯若兩緣中明作犯如鈔所論若兩緣共明止犯如不乞法造房亦須假通別故云兩明二犯此釋亦通也二緣有闕是因非果二緣若具是果非因至果便重在因則輕如是委知方可入懺若不明因果重輕悔罪通漫也已上第三門竟第四境想門中初牒言四境想等者來意者故云前約根本罪上已辨具闕兩緣然根本罪上例有境想之義須明若略不論則罪相悠漫故次辨也更有非說不錄釋名者境謂犯境想謂內心取像夫持犯二業必託境關心故名境也所以唯標境想不言境疑者一解云夫對境要且先取像內心不決方號境疑故不標顯亦可合標境疑文中人非人疑非人人疑今存略故不可具頒也此門異古人境想道理皆於隨相煞戒下廣明今抄主移來持犯中說者意欲圖一切戒上凡有境想皆寄此辨或有有者或有無者或道理不合有或律文內略無或少或多或輕或重等云云言制至耳者謂有何所以制於境想答若不制境想尅定於罪則無由得知有無輕重罪之分齊由制此境想句法便知輕重有無謂律五句之文初一句夷下四句各蘭前前罪重後後罪輕就五句中下四句各有方便無根本或約本迷如煞戒第三句迷着非畜有罪境則有吉羅若迷杌木無罪境全無罪等因此境想方可得知也故諸戒未佛並具張者列也二百五十一一戒下並列五句境之文若爾何故今律本內二十六戒即有餘戒並無鈔答云縱有缺文但多是略耳謂今律文所有無境想句法處不是本來無但是翻釋家恐繁故刪之或是部主見繁不列也言二至罪者汎者廣也欲明犯相先辨境界總有五般略收將盡後於此境上約律以辨有無言內報者謂有情名內酬彼往因名報非字收鬼獄修羅也初戒四境名犯以約境制故餘則不定煞盜妄對人境俱重為昇對非畜俱輕為降可知言又至等者於前四中但約人趣自有道俗販賣戒與九十中強坐戒等唯對俗人為犯境大小二謗戒覆麤戒說麤戒打搏比丘戒疑惱戒藏他衣鉢戒此唯局道眾犯二宿者一與女同宿二與未受具人過三宿戒婬即婬戒觸即摩觸戒二麤語者一是麤語二是歎身此通道俗並犯言然至兩者簡除俗眾唯約道論中自有內道外道外局衣食者謂僧自手與外道食犯尼同僧犯躬記不正不敘內如毀兩者毀是毀呰兩是兩舌此唯局內言又至年者局內眾中約大小論也謗奪者謗戒奪衣鉢戒唯對大比丘犯與減年受具戒結和尚提准對沙彌犯言又至知者就具戒中約僧尼形報辨隨順被舉比丘得此罪唯對比丘為犯境不通尼者以僧尼無共羯磨止宿言語等同路即同道行戒乘船即同乘船戒與尼作衣戒受尼讚食戒雖對尼為犯境也如謗覆說義該兩眾者鴻釋云謂約僧尼互為犯境尼戒本中無別緣起直列出之故知大小二謗俱互殘提說麤俱互得提若覆麤尼覆四重犯夷尼八重結提若覆殘已下俱互得提相承中解今解意別謂此謗覆說二眾通是我犯境非謂互也如覆謗說大比丘俱提望大比丘是我犯境若謗覆說大比丘尼亦犯提望大比丘尼是我犯境意道此三上戒通二眾犯故云義說兩眾若互論者約一邊為境恐與鈔相違思之有意餘通可者除上三戒外為餘也更有通該二眾為犯境不盡標列故云可知也思之鴻記云如煞盜婬等通二眾以尼戒本中無別緣起直列戒本同犯易識故曰可知此應不正言又形至別者上據形報即一切情之形皆是異熟今熟形報之中更約色約心以論犯境如婬至寬者約色也謂五蘊之中唯色一蘊為婬犯境死屍是色猶犯根本但使正道不論想疑皆犯此通人天非畜以此證不假心之四蘊也文言道道想亦是證色為犯漏失同然者然是也謂漏失戒同是為犯境境仍是寬者謂上婬戒雖約色猶狹此漏失更廣內色外色空中水中風中逆順等並是犯境言自至食者自有約心者蘭色取心以自己能犯心望他人心是所犯境也如觀許等者觀謂發四許戒許謂迴僧物戒已上約他心為境且如眾僧如法滅諍之心比丘作善觀想後更發舉望眾僧有善觀滅諍心邊結提故文云觀作觀想提若許雖滅眾僧猶作不善觀滅心比丘縱作觀想更發者但得方便吉羅便闕眾僧善觀滅心之境也許作許想前人許僧物已決定比丘復作許想若迴犯想若許僧心未決定縱為許想迴者不犯謂闕前人許心之境故染心衣食者約尼知男子有染心於己而與衣食心境相當取便犯若男子為福故施無染心縱使作染心亦不犯謂闕染心之境大略須知更不具分者前文始從四趣終乎色心大途約略包羅亦盡已外更有不可子細其分判也已上解內報竟次約外事言二至者此段一向約非情名外事亦可等者謂衣鉢過十日犯理合約時為犯境今取衣鉢為外事引在此明故鈔文有亦可之詞也若爾殘宿亦約於時何無亦可之語答此約食殘宿為境不約成殘宿體通內外者盜戒約主是內財物是外奪衣衣是外比丘是內躬記不正虫是內水是外此則內報外事合為犯境第三約法文二初牒舉如文釋中言一至等者一自所稱者謂比丘口中自說之法為境如媒嫁麤語等是二他所作者望僧所秉法為他如處分法是三治者知他舉治法在身今隨順望彼身中舉治法為犯境四法相者名數之法並是法相於此法上辨邪正道理佛說九正調達說九邪破僧起諫觀此十八法則知邪正道理相違知彼比丘是法語非法語等今若學此非法破正法即因法相止生犯以為犯境也第四約時者言四至等者日暮為教尼非時即非時食戒夏歲者夏不安居犯吉不依第五律師犯提或可偷夏唱大受利亦得歲者未滿五歲離依止及度人或釋云二歲學六法與受大戒尼提僧吉二三宿者一與未受具人過三宿二軍中過三宿殘宿內宿皆約明相為犯境等即等取離衣長衣藥盆等也第五言第至等者如覆麤戒及麤戒等取覆尼八重亦得提尼自覆八麤覆僧四亦重並約罪為犯覆也第三有無門言三至無者謂上約犯境有其五句境想今據律文僧尼戒本或有境想或無境故次明之餘者略無者或是理無或定略無釋中言謂至戒者約四戒可知二篇六者摩觸二麤媒二房也三十中一者迴僧物戒九十中十五者一說麤罪二堀地三壞生四用虫水五教尼日暮六食尼讚食七自足食八勸足食九殘宿食十非時食十一不受食十二飲酒十三飲虫水十四覆麤罪十五發四諍已上二十六戒現定律文具有境想問婬戒不通境想疑何故有此句法答防巧情故謂言作非道想不犯故須簡也次約對辨中言對至也若謂上約二十六戒現在句法於二十六中更有重境想共成三十五也二房含七者七重境想句法也無主房有四一不處分二過量三難處四妨處故律文云一僧不處分不處分想二僧不處分處分疑三不處分處分想四處分作不處分想五處分不處分疑初句殘四句蘭過量五句亦爾云云難處五句難處難處想二難處難處疑三難處非難想四非難處難處想五非難處難處疑妨處五句亦爾云云有主房除過量餘三准上作之云云無主四重有主三重并前成七本二外剩得五重也盜戒二重者一人物人物想等云云二有主有主想等云云媒嫁二者一人女人女想等云云二媒嫁媒嫁想等云云二麤語二者一人女人女想等二麤語麤語想等云云壞生二者一種子種子想等云云二生艸木生艸木想等云云已上四戒各剩出得一重成四兼前五成九九對二十六正成三十五也不同記云三十五對又云想與疑為對也言尼至述謂尼對僧二十六戒中十戒無境想謂婬觸麤語歎身二房讚食日暮足食勸足此十既與僧殊故無境想餘十戒與六大僧同可知麤摩觸染心衣食別有境想成十八戒有故云非無鈔欲離繁故且削略之如前云縱有缺文但多是略耳故云如初述言次至五者謂前五位明其犯境今據律中除二十六戒外餘皆無句法今還對前道理辨無或道理無或部主及譯者略却釋中言或至位者如漏失戒對一切情非情等境皆犯何要句法蘭之故理略無也次略無中言或至略者謂前漏失戒合有境想言非道作非道想若疑但得蘭罪者謂雙約本異二境說方可子細非道是本境分多半分壞女是也是僧殘家境故正道為異境少壞女等是波羅夷境今前境是非道初往造時明白亦作非道想行至中途轉作少分壞女正道之想或可正道疑之時且結非道家想差方便蘭從轉想了作正道想疑與境合時無是非道虗起正道想邊又結蘭罪明知漏失合有境想文無是略若准鴻記非道想疑但是初戒闕緣蘭不犯殘者但收得後心虗起正道蘭全未論本境上罪應云一非道非道想殘二非道作道疑前心本境蘭後心本異二境各蘭並謂有半心故雙結也三非道作道想前心本境蘭後心異境蘭四道非道想前心異境蘭後心本境亦蘭異境上得夷五道非道疑前心異境蘭後心本境亦蘭謂虗起疑心故異境上便結夷罪謂此漏失以非道為本境正道是異境也理合但約本境前心說前一得殘後得四蘭若本異雙說本境一殘七蘭異境兩蘭兩夷不得單約異境異境思之有理次引證可知言二至略者局此境犯者如謗大比丘及尼得殘奪比丘衣兩舌毀呰比丘嫌罵白二差者得提若對餘眾得吉應合蘭之文無者是略耳二外事言二至等者屏露兩敗僧物是便犯應云僧臥具僧臥具等作非僧物想即不犯露地燃火即犯覆處不犯藏大比丘衣即犯下三眾但吉並合有之文無是略耳第三文二標可如釋中言理至等者如煞盜二戒但命斷離處即犯不約法論故對法理無也若爾如教人煞盜豈非是法答正口教時未成犯故待彼身業作時方犯亦非法也云云略無中言至等者大小二妄既約言了結罪即合有法境想謂聖法聖法想妄語妄語想等合有略無也諸諫者謂四違諫隨舉即隨順被比丘及沙彌並約他所作法為犯境謂諫作諫想舉作舉想等合有境想文無略耳問大妄語據律己有想境前文亦云初篇四戒今何言無答前約事對所誑人以論如人作人想誑若於法上全未曾說故重明也次引證言如至也者二隨者一被舉比丘四句僧祇十八云一舉作不舉想隨順無罪二不舉作舉想隨順吉羅三舉作舉想隨順提罪四不舉不舉想隨順無罪隨順被舉沙彌亦四句一駈作不駈想隨順無罪二不駈作駈想吉羅三駈作駈想提罪四不駈不駈想無罪但祇無疑句唯有想句鈔引此文彼既有證此文無但是略耳言媒至想者謂律中媒嫁麤語今有法想今文無者定是略也言亦可至也謂律發四諍戒是他所作具有法想謂發之人作如法想即觀作視想發舉得提謂眾僧善觀滅諍自又作善觀相發舉既得提即證諸諫亦是他所作法眾僧如法諫我我又作如法諫想故心違者方結殘或提故云亦可等云云非法等者謂若眾僧如法滅諍比丘不善觀想等亦不犯根本但方便吉即證諸違諫眾僧雖作如法羯磨諫我但謂非法諫想等亦應同彼不犯根本但方便吉此則將彼諫戒他所作法既有句法例此諸諫同是他所作法理合有之文無略耳第四言時等者如十五日外為時十五日先曾浴了今更浴是非時應云非時非時想等云云或有云熱時等亦得二入聚者一非時入聚落二食前後入聚落亦合約時明境想應云非時非時想云云食前食後等云云文無者略耳略罪無中言如尼覆戒者鴻云謂此戒有麤罪麤罪想麤非麤疑等合有境想文無亦略也言餘戒理無以不對罪故者鴻云除却覆麤說麤二戒有境想餘戒道理實無謂無罪可對不同此二以罪為犯境故云不以對罪故躬釋云尼覆他重罪唯此一戒有餘理無以不對罪故若准此說意云覆罪與本罪重名為對罪餘戒僧尼俱有得罪為犯要且不相對故故云以不對罪故也恐未似前解思之也問何故但舉尼覆戒不約僧耶答本謂尼覆罪無境想故偏舉之若僧覆戒文中自有何勞更述第四多少門中言第至五者五句境想是多四句為少問前云定互此但云多少不着者定互者何答若依鴻解前標互者約古人標釋中通今師如古人約輕重相望定五犯立不犯相形或五便言定互今師輕重門及犯不犯門二位之中並有四五故無定互若依此解者今難云且今師輕重犯不犯二位之中並立三位一者定五二或四三或五煞盜二戒五即齊五四即齊四若要煞四盜五亦得要令煞五盜四亦通非如古人煞定五盜定四謂二對理齊文中互說煞五盜四此豈非今師定互多少之義何故妄說古人即有定互今師但云多少耶今意不然但云近上廣標故下略牒制作存略無別理也若欲謬釋請依諸家釋中言恐至此者具依煞戒者婬不通境想盜律文但四句唯煞戒具足有五句今依釋之又此五句境想或約一人說但前後五度造趣或約五人說每句配一人亦得初句人作人想心境相當者謂前境是人又作人想即心境想當故律云人作人想煞波羅夷此一是果無方便第二句注云境定心疑者律云人疑偷蘭遮亦無非字謂本疑煞人至彼人邊疑是非人以前境實是人名境定本期心轉疑是非人名為疑心結本人境上方便三至差者謂前是人名境定本期煞人行至中途轉作非人想差本人想之心名心差已上三句本境並在四至想者謂本疑煞人非人來替處心緣非人為是於人便作人想煞心不改名心定被非人來替境故云境差亦結本境闕緣蘭五非至二緣者具足應云非人人疑謂本疑然人被非人來替處即是闕境名闕二緣故下文云非人闕緣境疑心闕本期此亦約境差心轉轉時結本境上蘭已上二句緣異為本境五句之內一果四因並是本境罪五句如此者結示令知是依文中煞戒具列五句之相如此也言所至五者謂徵五句中故何盜戒但四煞戒具五何以或多或少不定耶答但由第三句人非人想此句不定且五句前後四句決定有罪唯第三句有無不定不要約前三人說亦好只如煞戒謂轉想有前心蘭及本迷着非畜有罪境者亦吉羅即成或五若本迷杌木無罪境此句無罪體不立但成或四致令不定此是約今師但向一戒上釋成多少義一戒既爾萬境皆然不同古人向二戒上辨多少定執律文煞五盜四也言所以爾者徵也意道有何所以第三句不定便有或四或五耶答中初敘昔人說非二又下顯今師說是言昔解者謂雲暉願之所解也古人約輕重相對唯立一位定有第三句如婬正道為重非道為輕如煞人為重非畜為輕將此輕重二境相對約本迷轉想俱有第三便成定五但立一位若犯不犯相對本迷據不犯有四轉想據有犯便五只立二位又須知犯不犯輕重義人非畜杌木四境前三是犯後一不犯又前三中人境是重下二則輕就前三中重輕相對定有第三成於五句若犯不犯相對第三不定便成或四五也如下廣述言若輕重至五階者且如煞戒辨輕重相對者約人非人說人是重境迷作非人是輕境即此二境生罪不同為輕重也輕重雖殊俱是罪緣定有第三此一既立故成五句故云若輕重等云云如婬夷轉想及迷並得夷蘭者謂婬約境制轉想本迷二俱結罪第三立定五句且約轉想論者謂本期正道臨至境所起非道想與彼合時還當正道攬前方便結一夷𠎝望中間起非道想時得一想差蘭故雙結二罪若約本迷說本迷作非道想時得闕緣蘭合正道時從境得夷與轉想一種故云並結夷蘭已上大途相承釋竟若准繼宗記中似有異也謂本期正道行至中途起非道想與境合時還當正道結一夷兩蘭謂正道故得夷言兩蘭者前如初作道正想中間轉作非道想正轉想時結正道家想差一蘭後心虗起非道想邊又結非道家想差一蘭此且約轉想說也若約本迷正道作非道想與非道台還當正道正道得夷本迷非道邊虗起非道想闕蘭也與轉想一種並得蘭也今祥中釋亦是一途也若煞忘等者且約煞戒轉想說如本擬煞人亦作人想臨至境所轉作非人想結本境前心蘭緣非人想時有差吉中約轉想說本迷亦吉者但於異境上虗起心吉餘忘等例解也若依繼宗記云後心虗起非人想又得非人家境差吉不許轉作想差吉也此約轉想若約本迷說始終作非人想不轉本境無作但緣非人想邊亦是非人家境差吉也此解應有理可知思之也已上自各是家所解注文是繼宗所陳解陳任情取捨言欲須第三以成五階者結成五句意也謂據轉想本迷對非畜等有罪境約轉想辨或蘭或吉並有第三以成五句也已上敘古人輕重義竟言若至也者謂約犯不犯境想對作境想便成或四五二位不乞處分造房戒及盜以明四五言盜至想者謂盜戒即四句第三句有主無主想不犯以本迷故全落開通唯成四句有主有主想夷二本迷有主無主疑吉三本迷無主有主想吉四本迷無主有主疑吉不處分具五者謂第三句不處分處分想有犯謂轉想結前心蘭此句既立亦成五句一不處分不處分想殘二不處分處分疑前心蘭後心吉三不處處分想前心蘭後心無罪四處分作不處分想前心蘭後心吉此句難會章記不明今略辨之如造房時本無心乞法臨成之日却發心從僧乞處分處分竟却轉作不處分想致有前心蘭後心吉下句例此說此是細處少有人明五處分作不處分疑前心蘭後心吉五句如此言五至故者謂不處分理合結根本僧殘今作處分想開無根本但結前心想差方便四約本迷第三句無犯名不犯二境全無罪者謂盜戒四句約本異二境全不犯一有主物迷作無主想於有主物邊一境無夷又作無主想又無吉羅望境有本迷是一故云二境全無罪也已上敘古人犯不犯義竟次總結二位言以至五者結輕重及犯不犯也謂以重輕相對義故五更借此兩字應云以此犯不犯義或四或五二門之中方立三位次敘今師義言又解者今師重釋也謂上古德所立於輕重中立一定五如犯不犯便立或四或五二門共立三位未為盡理是故今師只向古人輕重門中自立三位約轉想立定五本迷或四或五俱成三位又於古人犯不犯門古師本約轉想即犯便成或五本迷即不犯以成或四今師退就犯中轉想本迷俱犯即成定五亦成三位全異古也別釋也言重輕至種者謂如煞戒人境即重非畜即輕今於輕重中總標三種轉想定五迷或四五不同古師一向定五今師三位俱通故輕重之中位有三種言若轉想定五者謂人非人想煞臨至境所轉作非畜杌木想猶得前心方便想差蘭罪第三既立便成定五即如婬夷轉想及迷並結夷蘭古人同之定五如煞妄摩觸等轉想結前心蘭今師約此轉想決定有罪定五未論迷心迷心有無未定以所定五之中未說言迷或四五者總標兩位也別釋中言云何或四五者微也且煞戒律文轉想自有五句古師局執約轉想本迷輕重想對唯立定五無或四五今師便於輕重門中更立或四五者未審約何義立故先徵云云何或四五也言至五者謂約第三句說如前境是人本迷作非畜想於人境上雖無罪且有煞非畜心邊吉羅第三句立便成或五也言想至四者謂煞戒第三句本迷人作杌木想煞人境無夷杌不無吉此本異二境全無罪故此句不立但成或四本迷四句前一是夷下三唯吉如前說言似覆說類前亦爾者謂破古人將覆說在犯不犯或四或五中明今將來輕重門中類前煞戒轉想定五本迷或四五今覆說亦爾若轉想有前心吉即成定五本迷有二若迷作下三篇覆說者由有吉羅便成或五若迷全謂非罪而覆說即第三句全無罪便成或四與前煞戒三位不殊故云亦爾言若對至至無犯者應先問曰覆說三位類前煞戒者初轉想定五易知若或四五其如何鈔答云對下三輕重應五等者意道若對下三篇覆說猶有吉羅第三句立則具五也若迷上二篇麤罪全作非五篇罪想而覆說者此則落間通中全無犯第三句不立但成或四故云然是本迷等云云第二犯不犯文三標釋結言若至別者謂上覆說二戒本是犯不犯今引來輕重中約義類其煞戒同有三位之義今將古人所執犯不犯門中如煞戒等亦合有境想定五本迷或四五之三位也言如至者者謂如上煞戒人境重非畜輕古人約此輕重相對轉想本迷皆有罪故作定五故云如上重輕應本定五進就不犯者謂煞境有四一人二非人三畜生四杌木前三犯後一不犯今就人境上作非畜二趣犯境起迷猶有吉羅故成或五今更進就最後杌木不犯境起迷想者全無罪故便成或四今師向古人輕重門中據本迷說得成四五二位今雙牒來以為成例故云即成四五者輕重門中既爾今約古師盜戒犯不犯對轉想即五本迷即四今還就犯中轉想本迷俱五也二正釋中言今犯至俱五者謂盜戒律文有主想是犯無主想是不犯轉想即五本迷唯四今犯不犯以盜戒本中或四五今退就犯中成定五也謂却從後不犯境退向前犯境也律釋相中本盜人物轉為非畜想有前心蘭故成五若迷作非畜物想猶有吉羅亦成五位也作想轉是轉想五作想迷是本迷五故云俱五言亦成三位者謂犯不犯門古師本立或四五今師通加定五亦與前轉重門中不殊故云亦成三位也次總結言此至也者結二門之意也上輕重并犯不犯俱有三位故云二對理齊若爾何故律中云煞五盜四鈔答云文中綺說但律文之內綺互而說盜則偏約本迷煞則偏約轉想至於道理二對三位實齊古德不究律文影略之語遂執一隅煞定五盜定四二門共立今向二對理齊中煞盜二戒各三位者轉想定五本迷五本迷五本迷或四取悞於後且轉想定五者一人作人想煞夷二人非人疑前心蘭後心二吉三人非人想前心蘭後心吉四非人作人想前心蘭後心吉五非人作人疑前心蘭後心二吉已上一夷四蘭六吉都十一罪是轉想定五二本迷或五者一人作人想夷二人非人疑結本異二境双結有二吉三人非人想異境一吉本境不犯四非人人想本境無犯異境吉羅五非人人疑本異二吉三本迷或四者一人作人想煞夷二人作杌木疑本境一吉異境無罪三杌木作人想本境一吉異境無罪四杌木用人疑本境一吉異境無罪次約盜戒三位一轉想定五一有主有主想夷二有主無疑前心蘭後心吉三有主無主想前心蘭後心吉四無主有主想前心蘭後吉就中此句前心蘭稍難更指事釋如人遺物在己地分物主心未捨則是有主比丘明白心中作有主想盜行至中途物主作捨心境却變為無主比丘作者主想心不改舉離處時但有後心吉無根前心蘭是境差蘭也鴻記但云前心蘭不明來處故不了也五無主有主疑前心蘭後心吉都八罪一夷四蘭三吉是轉想定五二本迷或五者一人物人物想夷二人物非人物疑二吉本異雙結也三人物非人物想唯有異境一吉四非人物人物想唯有本境二吉五非人物人物疑二吉本異益結第三本迷或四者一有主有主想夷二有主無主疑本境吉異境全無罪三無主有主想准本境一吉也四無主有主疑本境一吉異境無犯已上煞盜二戒轉想本迷定五或五或四並成三位結罪多少更無昇降但文中影略互舉煞五盜四故也言又且至可知者謂重覆釋前文犯中有輕重義故成三位如煞盜等戒有輕重故成三位若掘地等者諸戒於所對境中無輕重義若轉想或五本迷或四無定五位如生地作非生地想轉想則有心吉本迷一向無罪成四餘准可知者餘一切戒無輕重者皆但成四五位如學家受食高下着衣例上無別故曰可知如上所明約當部律順古以明若依今師戒疏例取諸部律論即掘地非時亦具三位如見論掘砂多土少地無罪若半砂半土亦得吉今本迷生地作半破地想亦得吉還成定五也又如伽論掘燒壞地得吉今若本迷生地作燒壞地想亦得吉又論云日正中時名時非時食得吉羅今迷午後為日正中亦得吉羅即成定五言又復至句者謂重牒上來古今句位若今師於輕重門犯不犯門各立三位若古人於前二門共立三位古今如此釋者通約本異二境雙說如第三句本迷人作非畜想本境無犯但結非畜異境家吉餘四句約本境本心吉即本異二境合為三位故云定五或四或五也不說異境後心吉但有轉想定五本迷但四即無或五言唯至說者謂轉想本境有罪本迷無罪故云若唯就本境犯之有無四則齊四謂本迷者如前境是人本迷謂杌本境無罪除婬酒戒餘一切但成四句五則俱五謂轉想者謂一切戒轉想皆有本境上因罪以是俱五律文中煞五盜四者鈔答云文中互說所以煞戒准五此律文且據一邊說煞據轉想便五盜據本迷故四今約盜戒轉想亦五煞據本迷但四豈非互邪此相既深古人不練言用斯至罪者用由以也斯由此也謂以此轉想犯等故五則一切戒轉想俱成五句皆據本境想上結罪前一犯根本後四是因罪又以此本迷皆成四句四句結罪亦據本境本想結前一犯根本後三因罪也今且約煞盜二戒說者以此轉想二戒俱五五句之罪並據本人境人想結也前一犯夷本境果罪後四犯蘭本境因罪若以此本迷對煞盜者二戒齊四四句之罪亦據本境本想結之故云用斯犯者等云云若異境罪者謂非人為異境望後緣非人之時名曰後心律中不結異境後心吉還據本境本想明之前人往非人心上吉者是自古無德約義結意云出家人亦不合於非人境上起煞盜心故結吉也注文言如至羅者蘭出本異二境蘭吉相狀如非人疑想偷蘭等者標二三兩句皆是本境上方便想心蘭若論其蘭四句皆是本境本想蘭今但解此二句下二易不知更述也後作非人疑想之時但得吉羅者双釋第二第三兩句異境後心吉也是義結吉言具足五緣至吉羅者釋第四句非人作人想吉應先問云據律文煞非人得偷蘭云何言吉可引抄答云云五緣者一非人二非人想三者煞心四典方便五命斷具五緣即犯一緣不具亦不犯今第四句於五緣中闕第二作非人想又闕第三煞非人心既闕二緣但結本境人想心邊吉謂非人來替處從授境後於非人上虗起煞人想之邊結吉此由是本境後心吉若異境非人雖然命斷無心緣故全無罪也問第五後心非人作人疑何故不解答此後心双緣二境合結二吉此不明之言故至犯者謂且約煞盜等戒略以銓平敘述三位得知境想二對理齊又約犯中無輕重及唯據本境本想但成二位之義均平之理既知是可對一切戒上類此多少一門以說理齊持犯第五釋輕重言五至文者謂前雖知多少之義約理銓平然於五句之中輕重全未曾說故次辨之五者數也次謂次第釋者解釋次第解釋境想五句之文辨於輕重亦異古人也五階之位如前所列也謂罪有輕重昇降故名階也如前門約煞戒列五句是也言以犯至誤故者謂犯不孤然自起必須詫境開心方結身口業也境有優劣是非者且約煞戒人境即優非畜境即劣本擬煞人於人為是望非畜杌非心有濃澹錯悞者如對怨境生濁重心為濃見他受句生慈心令與早死起此心即淡亦可人作人想煞是濃人非人想等為淡境不稱心者名錯緣彼為此是悞戒疏云錯就境差悞約心謬所以爾者現緣兩境相別歷然及至造趣事成有殊二境交涉者名錯悞等云云言或至均者謂人作人想煞名心相境當盜妄類之皆結夷罪故曰犯齊一品約違制說業有輕重八品未均者猶上心有濃淡故令業有重輕如前優劣中辨云云言或至不犯者明闕緣也心不當境者即境定心差二三兩句闕心不闕境故云或心不當境注文可知或境不稱心者釋四五兩句也謂本是人被非人來替處於彼非人上常作於人想人想是心定境換是境差非人境不稱人想心也無主主想亦爾境犯心不犯重釋上心不當境句境定故是境犯心差故名心不犯注引掘地境想亦同之心犯境不犯者重釋上境不稱心句心定故是心犯境差故是境不犯注文同上可會言有至須者謂有此五位差別階降不同須得境想分別辨於輕重言業位既定者結前也謂上明差降夷蘭業定約位亦定初句得夷業位已定心不當境疑想二蘭業定境不稱心想疑二蘭業定心犯境不犯即四五兩句想疑業定境犯心不犯即二三兩句疑想業定已上鴻釋通結五句或有解業位既定唯初句結夷業定然下四句中有蘭罪前二想差後二境差本異想疑各有輕重今若解釋不可唯明四句兼前一句亦要通明故云亦須分判五位生下文意五位即五句也不得將五位字在下科即失理也思之言於上至闕者指前多少門中五句為階初句心境相當是一具下四是闕二句闕心二句闕境言初至竟者人作人想句業有輕重八品不同並得夷定可知言二至故者將第二句對第五句辨也本緣人心不捨者謂五十步前有煞人心五十步後迷作非人疑由有半心緣本人境煞又是本人故重後疑輕者前本是人初作人想五十步後非人來替處於此異境上但作人疑煞時又非本境故輕也言三至故者將第三句對前第四句辨前想重者謂本作人想臨煞時雖無心且是本人境故心境相當者謂此煞境與本方便人想心想心想當也後想輕者本緣人作人想五十步後非人來替處於彼非人上常作人想煞時空有心無本境故輕也第二分途中言又更重明者謂本境疑想自辨輕重及異想疑自辨輕重言本至輕者疑重者以作本人想臨煞時有半心所煞又是本境故重想輕者以煞時全無心故言後至期者想重者雖被非人來替處以煞時起心以本方便要期心不別故重疑輕者境差心轉故謂本擬煞人後非人來替處即闕人境緣被非人上却生人疑之心猶豫是心轉也餘可知言故至心者兩位者本異二疑二想為一位本境疑想與異境想疑為一位雖成二位分其四處輕重各別所結蘭罪皆屬本想之上人想心邊結也言且解者結釋指歸也謂上一具心境相應通犯究竟闕則兩想疑對辨輕重又約本境想疑異境疑想以辨由未論異想疑後心之罪故云且也已上第四門立竟第五雜相中言五至中者前之所明但論方軌今更約尅漫錯悞等故稱為雜若爾與第七門雜何別答前對上六門立名六門不雜唯第七是雜今此雜對前四段立名於第七門自分為五上四不雜此一是雜言但至歸者謂前所明持犯之義諺通法界情及非情皆為對境是非非可舉一事一法一義便包羅得盡故引諸門者即前六門及歷位等四門於此愽通明縛亦可略知旨趣言此至鑄者即此第五門也眾多持犯相廣愽難知不可一一張羅解釋但列七種名目故云試列眾名陶鑄者範土曰陶融金曰鑄謂任後學自於其中尋討也言或至同者尅漫者戒疏云本情專注一境名尅通涉無准為漫一專尅對大漫如煞張人名專尅通對四趣為大漫二者就尅辨漫煞人蘭非畜是尅於人中不簡張王等復是漫且配四戒婬犯無尅漫盜煞尅心相當便成重罪心境或違但結方便妄語若二境俱現內知歷然即犯無尅心通境隨犯三趣不現隨尅隨犯二錯悞者戒疏云凡言錯悞皆是舛謬不當之位若逐事思尋相則難分若隨名尅定位容有別錯就境差悞換心謬所以然者現緣二境相別歷然及至造趣事成有舛二境反涉者為錯若緣此謂彼稱之為悞若對婬戒錯悞俱犯由患起內心但是正境適悅不殊若以悞對三戒三戒俱重悞無兩緣心通前後故並不得云無心故若以錯對三戒三戒並不犯以望餘境無心故若以錯悞對妄語所稱法俱不犯言隨自他者戒疏云有三一曰造他二他造自三自造自對婬戒三句並犯餘三戒但初句犯耳四隨身口者婬唯心犯身決形交非身不辨口不犯也盜煞二戒身業正犯口有助犯如呪物過關教他行煞妄語一戒口業正犯顯己得聖非言不宣身有助成如作色現相等此約成論身口互造五教人自成等者教人業不與自業相合故曰各分如婬自作成重教為之樂屬前人適非我已能教得蘭煞盜二戒患通損益自作教人損境無別故俱得重妄語自作得重教人不同若規求利令他稱聖得財雍己犯夷若無閏已但犯蘭也亦有能教重所教輕如調達破僧教言莫捨得殘六多人通使等者謂百千人展轉相使共行煞事名為通使或刀或棒即是緣別但使命斷同得夷罪如律中展轉使初一為能教後一為所教中間百千並通能所刀棒緣雖有別但令命斷皆夷不言重使者不同業也初能後所夷中間但蘭是不同也言如至約者釋刪略意也上六不同名為諸例義意既廣雖為具陳抄為逗機前六門難知故且刪略必要通明廣在戒疏所述已上釋雜相門竟舟丘末釋晧光書記吳越國天長寺長講律臨壇崇福普濟戒光大德賜紫志貞寫此一部丁巳歲記
