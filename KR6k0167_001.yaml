body:
  text: 吳越國長講律臨壇賜紫清凉大師景霄纂蓋聞事鈔玄䆳功用寔深是律府之樞開乃行持之鉗鍵爰自巨唐貞觀之後製造章記四十餘家而條貫極繁篇軸兼盛欲遍披討難究源流但景肖夙飲化緣功承稟訓輙簡諸多正義編集成之庶後學徒俾其福用云爾將解一部鈔文大分為二初且立章料簡略知教之所歸次乃判釋科條廣辨教之文義兩段就初四又分四別初明能說教主依大小乘以辨三身二明所說教藏即經律論之差別第三結集住持離分部別第四翻譯時代制作之由四段今初且能說教主者謂我本師釋迦佛也於中分二初釋總名次解別名兩文初也具足梵語釋迦牟尼佛陀耶此翻為能仁寂默覺釋迦兩字是姓此翻能仁起自尼樓因父王之三歎從德立姓下文廣述也悉達多是名梵音訛也具足應云薩縛曷剌他悉陀唐言一切義成謂成就有為無為之義故亦可成就三乘聖道故曰義成也牟尼或云文尼是字此云寂嘿對暄爭以明謂諸有情身中各有根本十惑所謂貪嗔癡慢疑身見邊見見取邪見戒禁取此十煩惱體性乖違故稱為爭且如貪緣順情境起嗔向違情境生痴謂不了因果慢則高舉為性疑則猶預不决身見執我我所邊見執斷執常邪見撥無因果見取執劣為勝戒禁取非因計因此十煩惱在有情身中觸動善品惱害自他閏業招生常為喧諍今佛不同我輩有之後於金剛座上以三十四心並皆斷盡故云寂嘿又於三十四心中前三十三心未沾此號至第三十四心方得此名故俱舍論云無學身語業即意三牛尼云云佛陀者號也號有十種今且論一即於十中當其第九覺悟圓明號也此翻為覺故攝論云覺謂覺察覺察煩惱彰如睡夢覺覺謂覺悟所知彰如蓮華開又覺具三義一自覺覺心簡凡夫凡夫未能自覺故二覺他謂覺他異二乘二乘但能自覺是覺心既不覺他即未覺他三覺滿色心俱泯對菩薩次菩薩雖覺色覺心然色心未能雙泯唯佛三義足故猶彰於覺也故多論云覺了一切法相故復次一切眾生長泯三界道眼既開自覺覺他覺行圓滿故名佛也上來解總名竟次別名者謂佛有三身法報化別故今且依小乘辨者即分三也云云初言五分法身者五者舉數分者分段法者軌持身者體依聚也以五分之法蘊積在於無學身中故云五分也一戒蘊防非止惡曰戒故婆沙云無學身語律儀及以正命名為戒蘊謂無學身業為正業無學口業為正語無學乞求為正命離四邪五邪等八支聖道中此三名戒蘊即道俱無表戒謂無漏淨慧與同時思現行有防發之功能故名戒也二定蘊息慮外緣名定故婆沙云無願三摩地為定蘊即三解脫中有無願解脫此依八地無漏定上發生即於定位作無願行相對治前境名無願三摩地躰即是定故取為定蘊此亦無漏慧與同時思現行有防發之功能也三慧蘊觀達有無名慧也故婆沙云正見正智名慧蘊推求名見決斷名智見智雖殊體皆是別境中無漏慧故取為慧蘊也四解脫蘊累盡清淨不滯有無名為解脫故婆沙云盡智無生智相應勝解名解脫蘊即通大地中勝解此之勝解能即持四真諦境如苦我已知集我已斷滅我已證道我已修於無學位中即持得自在故名為解脫也問解脫與勝解何別答因中即境強名勝解果中斷煩惱名解脫准此因果有異也五解脫知見蘊謂於自他解脫並皆顯了名解脫知見故婆沙云盡無生智相應現前名解脫知見蘊即約金剛心後解脫道中慧作是解我已知苦不復更知我已斷集不復更斷我已證滅不復更證我已修道不復更修此之二智總名解脫知見問解脫與解脫知見何別答勝劣有異解脫起勝解緣四諦解脫知見緣涅槃也已上五分之法蘊積在身復有普熏之義亦號五分法身香也上解五分法身竟第二報身者果起酬因曰報也身義如前謂酬昔因故招今果感巍巍之相好紫磨金軀住世方八十廣演三乘教法釋此不同略以六門分別初明三阿僧祇所逢佛二明六波羅蜜修習圓滿時分三於百劫修妙相因四生處人中成佛意五㝡後身出家修有漏道斷惑六菩提樹下修無漏觀斷惑六段今初也具足梵語阿僧企耶劫洛波此翻為無數時分今略云阿僧祇翻為無數問既云無數何故言三答俱舍云此謂劫名非是不知數量也又問未審積何數量為一無數劫答准婆沙論云時中極少莫越剎那極長即阿僧祇謂一百二十剎那為怛剎那六十怛剎那為臈縛三十臈縛為一須臾三十須臾為一晝夜三十晝夜為一月十二月為年積此年至八萬四千歲後經百年減一秊如是減到十歲已又百年增一秊還到八萬四千歲此名一增減如是二十增減名一住劫住既二十劫成壞空各二十共成八十劫如是八十劫始為一大劫從此至一十一十為百十百為千十千為萬十萬為洛叉十洛叉為一度洛叉十度洛叉為一俱胝十俱胝為一末陀十末陀為阿庾多十阿庾多為一大阿庾多十大阿庾多為一那庾乃至第五十二數名阿僧祇引云無數如是至三故曰無數劫也所逢佛者謂明三僧祇劫中未審值遇多少佛故俱舍頌曰於三無數劫各供養七萬又如次供養五六七千佛所言各供養七萬者第一二三各是七萬又如次供養五六七千佛如第一劫供養七萬佛又供養五千第二劫中供養七萬了又供養七千第三劫中供養七萬了又供養七千若計數者三七成二十一萬又五六七千復成一萬八千并上都二十二萬八千佛也此亦且約小乘宗旨以言若據大乘四依供養二十六恒河沙佛如涅槃經說六度亂修是地前為初依供養五恒河沙佛初地至七地為第二依供養六恒河沙佛八九二地為第三依供養七恒河沙佛十地等覺已去為第四依供養八恒河沙佛又准金剛經云我於燃燈佛所得值八百四千萬億那由他諸佛悉皆供養無空過者問三祇劫內所逢諸佛供養數量已知然未審其間佛名何答佛數既多不可具述今依論文但舉初後故俱舍頌曰三無數劫滿逆次逢勝觀燃燈寶髻佛初釋迦牟尼謂總舉三劫滿時㝡後佛故云三無數劫滿逆次者顯非順也如第三無數劫供養七萬七千佛最劫末時佛名勝觀第二無數劫供養七萬六千佛最劫末時佛名燃燈第一無數劫供養七萬五千佛最劫末時佛名寶髻也初釋迦牟尼者謂第一劫初所逢佛名釋迦牟尼即古釋迦佛也謂菩薩因中曾作窰師之子遇此釋迦如來遂發善心要期弘願願我當來成佛一似如今世尊是以現在所度有情等皆同往聖云云上來明三僧祇劫所逢佛已竟也第二明六波羅蜜修習圓滿時分者故俱舍云但由悲普施披桁身無忿讚歎底沙佛次無上菩提已上頌文且第一布施波羅蜜者謂佛因中常以金銀等外財惠施又復捨頭目髓腦等內財如求偈捨身悲心飼虎等故婆沙云若時菩薩但以悲心能施一切身命乃至都無少許戀着之心非謂怖求勝生差別齊此名布施波羅蜜多修習圓滿時分第二時戒忍辱者謂菩薩因中曾為仙人獨處山間修道時世有王名為哥利新云羯利唐言鬪爭時王與嬪妃等入山遊戲王少有疲倦暫時憩息時諸女等遂乃前行偶到仙人止住之處仙人廣與說法彼貪聞法遂乃忘歸王後覺時令推覓故既知彼等在仙者龕中王生忿怒之心謂是仙人誘引我之眷屬即以利刀割截仙者支節分散作斯事與乃却還宮到中行逢忽覩天地黑闇走石飛沙前進不得王自念言此必是仙人所為宜令懺悔乃迴到彼求哀悔過忽聞空中告曰大王當知我是求大菩提之人王椎割截我身我都無一念怨恨王又白言誰當信汝此語仙人告王曰王若不信我言聽立誓願我若有心嫌恨我之故體永不完全我必無怨恨之心願此故身平復如本言訖其身仍舊此名持戒忍辱二波羅蜜多以無嗔忿之心又不思其加報也故婆沙云若時菩薩彼解支節乃至無少許雖未離欲貪然心無忿恚齊此名持戒忍辱二波羅蜜多修習圓滿時分第三精進者婆沙云若時菩薩勇猛精進時底沙如來有二弟子一名釋迦二名慈氏謂此二弟子中慈氏理合先成佛但為釋迦是悲增菩薩樂修利他行所化機先熟慈氏是智增菩薩樂修自利行所化機未熟彼佛思惟釋迦雖成佛合在後爭奈所化境已熟不可抑遏令向後耶慈氏雖成佛合在先然所化境未熟縱成道何益今寧可迴又就多人不可迴多就一也遂設方便告釋迦菩薩曰吾欲入山汝亦應去爾時菩薩奉命乃持彼佛尼師壇安肩上從隨而往時佛既到山中忽然示現遂隱其身於吠瑠璃寶龕之中入定跏趺而坐入火界三昧其釋迦菩薩忽失本師處處求覓並皆不得後忽見在寶龕之中入定威光熾盛更異於常遂翹足經七日七夜起無怠之淨心以妙伽陀讚彼佛曰舊云天上天下無如佛等新俱舍頌云天地此界多聞室逝宮天處十方無丈夫牛王大沙門尋地山林邊無等解云天地者天上地下此界者此三千也北方毗沙門宮此云多聞室以信敬名聞滿彼十方故逝宮即大梵王宮外道執彼為常佛為破之為逝宮故逝由往也天處非但逝宮等無似佛十方世界亦無似佛也有智慧相好莊嚴名為丈夫行步端祥有大力故號曰牛王息惡義邊名沙門也尋山林遍無與佛齊等也論中問曰近佛菩薩名句巧妙何故七日七夜但念一偈答思願勝故若假名句恐心不專故故唯一偈也爾時菩薩說此偈已頓起九劫先成佛道齊此名為精進波羅蜜多修習圓滿時分第四位婆沙云若時菩薩處金剛座住金剛喻定齊此名為定慧二波羅蜜多修習圓滿時分此六波羅蜜四位修成故俱舍云六波羅蜜多於是四位一二又一二如是修圓滿又准諸經中明此六波羅蜜為對治六相違障故一多貪令修布施二毀禁令持戒三多貪嗔令忍辱四懈怠令精進五多思令禪定六愚痴令修智慧故六立也又此六種所以先後次第何耶答准大乘論六由於前前引發後後及由後後持淨前前前前麤後後細易難修習次第如是廣解如是或有廣述大乘六度章門一非宗承二繁新覓第三百劫修妙相因者謂上三祇劫滿六度修圓正覺將登須憑妙相若斯之義故次明之所言百劫者一解云是轆轤劫二云是水火劫也謂菩薩三僧祇祇劫修行圓滿足據理須臾經於百劫修妙相因但為前來翹足讚歎底沙如來七日精勤超於九劫今但九十一劫相好即圓也此亦且據小乘以言若准大乘說超四十劫也布髮掩泥超八劫緣起如四分律中翹足讚佛超九劫如俱舍論中述薩埵王子捨身超十一劫緣如金光明述雪山求半偈超十二劫如涅槃經說也已上通大小乘都計四十劫也問大乘說超四十劫未審更用幾劫修妙相因答有解云若但約俱舍超九劫即須九十一劫修成若通諸教文既四十劫超今但要六十劫修相也今謂不然縱所說超四十劫者亦須臾經九十一劫修妙相也所以爾者翹足讚佛九劫大小二乘同許是百劫內超餘之苦行三十一劫大乘之中元約僧祇劫中超水火劫不合將他三祇劫外百劫內數以共增添引據慈恩基法師解思之問其妙相相狀云何答俱舍云佛思之所成各百福莊嚴飾所言百福者百人善思號為百福即身三口四意三十業道也今於身三口四且約煞犮說者便是五也唯如自行不殺思不但自行兼勸他人合行不殺名勸導思見他不殺發隨喜心名隨喜思見他不殺發言讚歎名讚歎思將此四種迴向菩提名迴向思一業道上既具五思十業道上合成五十也如修眉間白毫一相之時先起五十思淨治身器次起一思引彼妙相後起五十思用以莊嚴實而言之百一思也一相既爾餘例可知喻如農夫先治畦壠次下種子後以水溉灌又經言諸佛身金色百福相莊嚴爾時菩薩既修相已次入修道位名為住定菩薩捨六劣事號得六勝事號為六等至也一捨諸惡趣常生人天善趣若未修相或生不善趣等云云二捨下劣家常生貴族家若未修相或生下賤家今修相已常生剎利婆羅門家三捨不具根常得具足根若未得修相前或六根有缺今修相已決定不缺也四捨非男身常得男身未修相前或作女根及二根等今修相已決定常得男根五捨忘失念常得自性念未修相前所作之事容多忘失今修相已決定無忘六捨諸退屈常得堅固定未修相前凡修善事容退屈故今修相已決定堅固前四離四惡後二得二功德也故俱舍云從修妙相業菩薩得定名生善趣貴家具男念堅固此頌文反收前義由茲六種之定故得真實住定之名若未修相好與定相違故不得名為住定菩薩問相是何義菩薩所修答曰相標幟義祥瑞義問何故佛身須得相好答欲與無上菩提作所依器殊勝功德決定依止殊勝之身故須三十二相具足圓滿也上來第三門竟第四生處人中成佛意者謂菩薩既修相已應須示現人天成等正覺故有門來婆沙云爾時菩薩當賢劫初人壽二萬歲時號曰護明菩薩於波羅奈國鹿野苑中得迦葉如來受于記莂汝於來世當得作佛號釋迦牟尼既授記已乃生覩史陀天為一生補處菩薩也彼天具壽四千歲將人間四百年為彼天一晝夜計此州五十七億八萬歲在彼天說法教化後於賢劫中當第九減劫人壽百歲時從彼天下降現白象瑞相降生中印土境迦維衛國迦毗羅城淨飯王宮記質於摩耶夫人胎即當此土周朝第四主招王二十三年七月十五日夜既託胎已亦同我輩凡夫十月滿足而生即當此昭王二十四年甲寅歲四月八日於嵐毗園內無憂樹下右脇而生生已梵釋雨香九龍吐水沐浴其身地湧七莖蓮華乘足以表七覺支花而於四方各行七步為除外道自尊必墮惡道覺手現相指於天地以表獨尊父王愛之群臣皆敬即為太子以嗣東宮游四門悟老病死後覩沙門儀相忻仰情濃即當此昭王四十二秊太子時秊十九遂於二月八日夜半踰城出家往伽耶山中精勤苦行誓求佛道已上正門本意竟次下問答除妨問補處菩薩何故於欲界六天之中准生覩史陀天不生上二菩薩下三天答婆沙云若上若下俱亦生疑然生彼天不違法相所言若上若下上謂樂變化及他化自在也下謂夜摩忉利及四天王天也言俱亦生疑者謂若上生二天者人生疑云菩薩何不向下三天中生若生下三天者人又疑云菩薩何不生上二天耶如是上下並未免人生疑然生覩史陀天且不違諸佛常法以過去諸佛常法為補處尊皆生覩史陀天也又說彼天是小千界天趣之中猶如臍法以正處中故又上天根鈍下三天放逸唯覩史陀天離二過失故又說彼天名為知足晝夜時中知欲樂足故又若生樂變化具壽一萬六千歲他化自在天具壽八千歲若待此天壽盡時下生人間眾生根熟之時已過無人教化却墮三途若生下三天天壽盡時下降人間眾生根機未熟空出無益唯覩史陀天天壽盡時下生人中眾生根機正熟猒苦心切生死苦樂是已知故具上多義是以唯生覩史陀天又問何故不生色無色界答無色無形不得說法色界雖有形而貪着禪味不利益眾生故不生上二界問何故菩薩唯從天沒不從人來婆沙云於諸趣中天趣勝故又從天而來人所重故從天而來有神變故從人趣來無如是事是以菩薩從天而來若爾何不便向天中成道而來人間答婆沙云隨諸佛常法故謂過去殑伽沙數諸佛世尊皆於人中而成正覺現在亦然又復次天身非無上菩提所依止器人趣根性猛利多分堪受如來教法又乃人趣有二事故有佛出世一有猒離心二有猛利心諸天雖有猛利心而無猒離心謂染着樂故三途雖有猒離心且無猛利心唯人趣有茲二事所以有佛出世也問人趣有四洲何故菩薩但生南洲答以南洲人覺慧利故餘洲不爾問人通四生化生趣勝何故菩薩唯受胎生答以俱舍云見受胎生有大利益故一為引導諸大釋種親屬相因令入正法二欲引諸類令知菩薩是輪王種因得捨邪而歸正法三為令所化者生增上心彼既是人能成大事我曹亦爾何不為之因發正勤專修正法若不爾者族姓難知四為遮疑謗恐疑幻化為天為鬼又外道謗曰過百劫後當有大幻出現世間故受胎生息諸疑謗或可為留身界故受胎生令無量人及諸異類一興供養千返生天及證解脫若受生無外種故身纔殞逝無復遺餘如滅燈光即無所見也上來第四門竟第五最後身出家修有漏道斷惑者俱舍云王宮所生住最後有又經云我生胎分盡名最末後身云云有漏道者簡無漏也斷惑者謂伏斷下八地惑也爾菩薩年登十九當此周昭王四十二年二月八日夜踰城出家入伽耶山苦行林中而修佛道淨居天子奉刀落髮授與法衣父王既知深當不悅遂召內族三人一阿濕婆二摩訶並解飯王太子三䟦提甘露飯王太子又召外族二人一憍陳那二十力迦葉並是佛兩姨阿舅王告此五人言我子捨家修道處在深山今汝曹常相隨逐五人銜命不敢拒違乃入山中侍奉太子云云與彼五人同諸外道日飡麻麥以近身命於是五人自商議曰道為樂證為由苦證內族三人曰我久處深山宮恒受快樂若道由樂證故知快樂用為真道不須執苦也此依基法師解若准後代製記諸家相承云內族執樂外族執苦者悞也謂此五人見解自有參差所計不同致生乖諍爾時外族二人既執樂是道見太子曰飡麻麥計為非道遂捨而去往鹿苑中是時太子初往阿藍伽藍處習無所有處定次往頭子藍處學非非相處定以有漏道斷下八地見修二惑既是凡夫不分理事但一時合斷也夫有漏道斷惑者作六行事觀也六者數也行諸行相事謂麤淺觀謂觀察即忻上淨妙離猒下苦麤鄣又忻猒時每一品下有一無間一解脫諸無間道緣下地諸有漏法作麤苦鄣三行相也麤者不寂靜故苦者非妙美故鄣者非出離故諸解脫道緣上地諸有漏法作淨妙離三行相也淨者以寂靜故妙者以美妙故離者是出離故作此行相時必須上下相對如猒下界作麤行相時解脫道忻上界即作淨行相時忻上界須作妙行相若猒下作障行相時欣上界須作離行相劣不可雜亂如是忻上猒下次第橙梯斷下八地煩惱乃至非非想處唯有頂一地有漏力劣不能斷故是以論云有頂唯無漏不通有漏至此地時以無上地可欣故下地可猒也上來第五門已竟第六菩提樹下修無漏觀斷惑者謂上明菩薩雖以世道斷下八地煩惱猶是凡夫未免輪迴豈能證聖故須第六起無漏觀也所言菩提樹下者西域記云中印土境摩竭陀國王舍城西二百餘里有畢鉢羅樹一切諸佛皆於此處證大菩提故曰菩提樹也無漏觀者簡有漏也斷惑者永斷一切煩惱也婆沙論云爾時菩薩苦行已滿形貌燋悴恐同自餓外道招彼謗詞欲驗苦非真遂受乳糜表非餓故准大莊嚴經說淨居天子報牧牛家姉妹二人一名難陀二名䟦羅曰悉達太子將欲成道汝何不熟香蜜乳糜而供養之時女聞之心生歡喜遂熟香乳煑糜以其金鉢盛之躬將往詣菩薩之所跪而献之菩薩受已持往尼連河側軟艸處結跏趺坐思惟過去諸佛受食常法淨衣裙坐而食也餘如彼說云云爾時內族三人從前執苦為道今見菩薩受乳糜飡心生退屈自相謂曰此乃失意猖狂非真正道遂捨太子去也還至鹿林見外族二人共談太子之失乃相契約悉達今既販道虧志後必此來若見彼我五人並不要迎奉也爾時菩薩廣因既修大果必祈遂往尼連河中洗浴感得寶樹低枝菩薩覺枝上岸地乃傾搖時淨居天子指亦菩薩成道之處此去不遠有一寶座金剛所成周百餘步上窮地際下及金輪世界初成與天地俱起賢劫千佛皆登此座成道菩薩往彼又及思惟過去諸佛成道法爾淨香茆今何處得時有吉祥長者施香茆草有處說淨居諸天應菩薩念化作負草人從菩薩前過菩薩就彼求乞彼以淨茆躬送上於菩薩既受草已敷安坐下以三十四心成等正覺先斷見惑有十六心八忍八智次起修道十八心九無間九解脫通前三十四心也且見惑十六者心據諦現觀中說若約見位但十五心八忍七智至第十六剎那屬修道故今且辨見道諦現觀中一十六心斷惑行者俱舍頌云世第一無間即緣欲界苦生無漏法忍次往法智謂從加行第四善根位離同類因者謂世第一善根是有漏若有漏同類因能感有漏等流果今既入無漏諦理故須離前有漏剎那也作等無間緣者謂心法四緣生色法二緣起也等謂齊等間謂間隔謂前六識等無間緣通三世前念無漏心心所齊等與後念心心所為緣若前念為過去後念為未來中間為現在前念不滅現在不起現在不滅未來不生如是三世更無間隔但離有漏因入於見道故云世第一無間也即緣欲界苦者謂起能緣緣於欲界苦聖諦境有無漏法生名苦法忍所以頌云生無漏法忍言苦法忍者苦法即苦諦家法三苦五苦等是忍謂忍許謂無始時來被身見等諸煩惱蓋覆此四真諦理不了是苦妄計為樂今既修行功成引得見道無漏智起現前許斷此苦計下十个煩惱此第一剎那心名無間道斷煩惱故忍次生法智者謂從法忍後還緣欲苦有無漏法生名苦法智謂起智緣於苦法名苦法智證下真如之理此第二剎那心名解脫道證釋滅故也次緣上界有無漏法生名類第三剎那心也頓斷上界苦諦下煩惱故也次一剎那名苦類智第四剎那心證苦下真如之理故又却觀欲界集諦有無漏法生名集法忍第五剎那心斷此諦下煩惱故次一剎那名集法智第六剎那心證擇滅真如理也次觀上界集諦有無漏法生名集類忍第七剎那心斷此諦下煩惱故次一剎那名集類智第八心也證真如理故又却觀欲界滅諦有無漏法生名滅法忍第九剎那心斷此諦下煩惱也次一剎那名滅法第十心證此諦下真如理故次觀上界滅諦有無漏法名滅法忍第十一剎那斷此諦下煩惱故次一剎那名滅智第十二心證真如理故又却觀欲界道諦有無漏法生名道法忍第十三剎那心斷此諦下煩惱次一剎那名道法智第十四諦真如理故次觀上界道有無漏法生名道類忍第十五剎那心也至此心時一切分別迷理無不盡次一剎那名道類智第十六心當此心時證第三果也已上都十六心八忍名無間皆斷惑故八智名解脫皆證理故廣在論中釋也問菩薩至第十六心時何故不證初二果直證第三果耶答欲界迷事惑有九品前六品障第二果七八九三品能障三果今緣菩薩於凡位時起有漏道今斷下八地迷理迷事皆盡於二三果不能為障所以真證第三果故又須知此十六心八智本不斷惑一向證滅但八忍斷惑又向八忍中四个法忍亦無惑可斷以凡位時曾起世道以斷故今唯重起印證道再遊歷過唯四个類忍斷惑此四類忍據理通斷八地煩惱今剋體說唯斷非非想處一地見惑下之七地亦曾斷訖今且通而言之八忍斷惑也上明見道斷證行相竟次辨修惑十八心者准薩婆多云至道類智時既證第三果已不出觀門一坐又斷非非想處一地修惑有三貪癡慢將此三惑分之九品即上上品乃至下下等云云每斷一品時有一無間一解脫先起下下品心斷無始時來上上品惑無間道斷解脫道證如是乃至第九起上上品心斷無始時來下下品惑至無間道時當第十七心此時與金剛喻定相應一切微細煩惱悉皆斷盡是第四果向次一剎那解脫道時與盡智相應證佛果也即第十八心并前十六成三十三心是有學心第三十四心是佛無學初心也已上十九出家三十成道即當此立周穆王即位二年二月八日矣爾時地神報空神空神報天神須臾三界悉知如來成道世尊是時遂觀三界眾苦所逼難可久住便擬涅槃爾時梵王下請佛轉法輪而說偈曰摩竭雜垢穢而佛從中生願開甘露門為眾生說法如來嘿然許之遂觀一切有情何者根熟可度遂作念言我昔曾於頭藍子處學非想處定彼既於我有恩可先往度也淨居天子空中報云彼命終經來于七日如來歎之薄福不遇又念曰阿藍迦藍我曾於彼學無有處定今可往度之空天報曰死經五日佛又深歎也又乃思惟內族外族五人昔曾侍於我我今可往度之遂從覺樹而起趣鹿苑中威儀寂靜神光晃耀毫含玉彩身瑩金也安祥前進時彼五人遙見佛已互相謂曰一切義成彼來者是歲月淹久都無果證心思屢及故尋我曹宜共嘿然不須迎奉如來漸近威光所逼五人不覺趣迎世尊世尊告曰汝等痴人自立其制不能堅守還自破之五人問云悉達何處成道佛答云我於菩提樹下金剛座上成等正覺已得甘露法味為度汝故是以此來五人心中猶未生信遂經一夏調根先為陳如三轉四諦十二行轉言三轉者謂三周轉也一示相轉云此是苦三界逼迫為果義邊名之為苦三苦五苦八苦直至諸天快樂五衰相現亦是壞苦此是集招生死因名之為集此是滅煩惱盡處所證涅槃名滅此是道聖智之因名道當此轉時陳如入見道第二勸修轉者語云此是苦汝應知此是集汝應斷此是滅汝應證此是道汝應修當此轉時陳如入修道第三引證轉者語云此是苦我已知引是集我已斷此是滅我已證此是道我已修當此轉時陳如入無學道故如是三周所轉故云三轉四諦也言十二行輪者十二者數也每一轉時皆具四法即眼智明覺故婆沙云於見道中法忍名眼法智名智類忍為明類智為覺一可觀見明眼決斷名智照了為明警䇿名覺又復苦下自有三轉示相勸修引證即是十二餘集滅道亦爾理實言之三十八行今約數同且標十二非謂三轉四諦都唯十二也輪者若准有宗所計唯此四諦教法便是真輪今依經部四諦非真輪但是家方便今取八支聖道是真法輪也言八聖道者正語正業正命正見正思惟正念正勤正定為八也問何故將此八支聖道為輪答從喻立也世間車輪具糓輻輞三有摧轉義初㝡裏軸為糓次外十八條湊輪上者名輻㝡外遶輪轉者輞六片能收十八輻每片管三條三六十八若無輞收糓輻無由成輪糓有所依義輻有能依義輞有收攝義此三是全方能轉載今此八支聖道亦復如然語業命三為糓是所依尸羅不清淨三昧不現前萬行皆依止戒故見思勤念是慧為輻即能依謂依戒生故正定為輪輞有收攝義能採亂婦真也此八支聖道陳如身中本有猶似大乘說真如以不從外來但被煩惱蓋覆不顯現故今既蒙如來宣四諦法聞法已後自能起智摧輾身中煩惱證得聖果名轉法輪輪有三義一圓滿義具糓輻輞三二不定義從見道轉至修道從修道轉至無學道自得此已轉為他說安布聖道於他身中此依經部也若准有部所計法輪唯局見道彼云寧知法輪唯局見道答陳如等見道生時地空天神唱云如來已轉法輪既云已轉明知唯約見道經部不然三道皆通於他相續見道生時已至轉初故名已轉也三摧輾義如螗螂拒轍輪能摧之聖道在懷能摧煩惱等云云轉者動也顯也運也起也基法師云動宣言教顯揚妙理運聖道於前聲起真智於言後圓摧障惱名轉法輪若依大乘辨輪自性輪因輪果輪方便眷屬如彼說爾時世尊既為陳如轉四諦法已乃問陳如解未陳如㝡初答解於是地神亦證陳如已解是以名曰解憍陳如㝡先悟道莫越此也是時陳如既證果已求佛出家佛以金口親名云蓋來比丘於我法中快修梵行速盡苦原於此言下感戒在身鬚髮自落袈裟擐體猶如五夏比丘無別既具僧儀乃辭佛入城乞食餘之四人其時由在四善根位次為阿濕卑摩訶男二人說布施生天福樂等事二人即證初果後為婆提婆敷二人說法證初果善來告召各得戒品在身成其僧相入城乞食今銘此五人為五俱輪輪者倫也謂約五人倫次得道故或俱隣以鄰者親也五人皆是王親故爾時如來既轉正法輪已地神報空神空神報天神乃至梵宮悉知如來法輪已轉故上來菩提樹下成等正覺是佛寶之初鹿苑輪四諦是法寶之首度五比丘僧寶之始於是化相三寶已周圓即當周第五主穆王即位二年八月八日轉法輪矣上來第六門竟前來有六收科云云是第二辨報身竟第三化身者化謂變化轉換本質名變無而欻有有已還無曰化唯此南洲王宮所生三十四心成道是實身十方諸立示形說法至於六趣或小皆變化故問今律藏三身之中是何身說答是報身說也上來有三云云總是依小乘宗辨三身竟從此依大乘略辨者若依唯識百法等多以十二門分別如彼自明今此非宗但要知同異粗分三別一釋名二出體三說法不說法三門初也言清淨法身毗盧遮那佛者清淨法身是唐言毗盧舍那是梵語清淨者不為二彰所染也法身者法謂軌持義軌謂軌則令物生解即法身是所緣之境令根本智生證之解持謂任持不捨自體即當體能持凝然不動是寂靜義身者體依積聚義用無垢真如為體是體義與塵沙萬德及報化二身為依止故依義具常樂我淨及名句文是聚義雖非體積聚還有義積聚也言毗盧遮那是梵語此云遍一切寂遍謂周遍簡異有為諸法自相非如地水火風等各附本體不名為遍寂謂寂靜簡異有為諸法共相非如生住異滅其相煩喧法身雖則昔周常住湛然寂靜佛者覺也如前廣釋云云約釋分別身是無垢真如為體法是軌生物解之用今言法身無用後體攝用歸體法即身持業釋二圓滿報身盧舍那佛圓滿報身是唐言盧舍那是梵語圓者遍也於一切法已遍脩習故為簡二業之人未遍修也滿者足也已修足故為簡菩薩雖則遍修未足故報者酬因之稱也一自受報即酬三無數劫自利利他萬德俱圓二障永盡有妙淨云逈出世間住止其中現大法樂恒自受用也身者亦是體依聚義以實無漏五蘊為體是體義以不共塵沙功德為依止是義依義既具五蘊是體聚義約釋分別自受用報即身或自受用報之身通持業依主二釋二他受用者應十地菩薩故名他為彼說法斷疑名為受用也身如前解既以化五蘊為體是體聚義約釋分別他受即身持業收言盧舍那是梵語此云光明遍照遍照有二若自受用身上起根本智時內照真理名內遍照苦後得智起三種化身并十重他受用身名外遍照也三千百億化身釋迦牟尼佛者千百億化身是唐言釋迦牟尼是梵語言百千億者舉數也即所化之境也佛即能化之身應物之摧本無今有身者亦體依聚義也以化五蘊中實五塵為體義與資加二乘為依止故依義假相好實五塵是聚義問前他受用身以化五蘊為體今化身亦以化五蘊為體若為取別答三義別故一麤細別化身麤他受用身細二居立別他受用身居純淨土為登地菩薩現大神通示樂相說法若化身居穢土為化二乘異生等示有妻奴苦樂之事三所變別他受用第七識平等性智上變若化身前五識成所作智上變由茲三義有異也然變化身有三種一大化身身長千丈示化身釋迦身長丈六當來慈氏身長千尺三隨類即不定如瞿師長者三尺以發心五百婆羅門見灰身而起信無邊身菩薩窮上界有餘諸小位之凡夫觀丈六而無盡等已上三種雖別並化身所收約釋分別云處化即身持業釋釋迦牟尼是梵語如前廣解云云三明三身說法不說法者有兩宗不同初依龍軍無性三身但不說彼云佛身無為不墮三邊非蘊界處所攝又云久離戲論曾不說法從今間者是佛利他本願緣力眾生識上文義相生此文義聚集之時假名佛說又涅槃經云我於金剛座上乃至鶴林於其中間不說一字又金剛經云若人言如來有所說法即為謗佛又淨名云夫說法者無說無示其聽法者無聞無得二依護法光宗三身俱說法且法身說法者取生解義邊名說法謂根本智證真如時作不生不滅之解即名身說法其間心所便為聽眾又如四知證涅槃理時能令三智所管心所會解之時六十心所如同聽眾約此道理即法身說法也若自受用身對諸佛說法他受用身對十地菩薩說十波羅蜜法若論化身者大化身為四加行菩薩說大乘法若小化身說三乘法隨類化身說隨根法故契經中世尊入身手林中取少樹葉問迦葉云手中葉多林中多迦葉云手中葉少林中葉多佛言我已說法如手中葉未說之法如林中葉等又經云尋念過去佛所行方便力我今所得道亦雖應說三乘問今此律藏三身之中何身所說答小化身說大小二乘宗計雖別然皆取王宮丈六之身為說律藏教主也上來有二初依小乘二依大乘兩文總是第一能說教主竟第二所說教藏者謂上既有能說之人降世不可徒然必有所說教主故次辨也於中分二初通舉三藏二就教別釋兩文今初又分為二初辨三藏名體二明三藏次第初中又分二初釋名二出體初分二初釋三種別名二辨藏之通號兩文今初且釋名者原佛出世雖物隨機說八萬餘法門對煩惱之障染總撮大趣莫越三名即毗尼等是初言毗尼者或云毗奈耶云毗那耶並梵音不定此總番之為律戒疏云律者法也詮量輕重處判是非持犯皎然必無疑濫故二筆義凡言決斷非筆不定筆即法家之象也云云三分義似於陰陽分其律呂等今順違持犯亦然廣如疏述第二素呾覽舊云修多羅或云修妬露此翻為線線者貫串採持義如線貫華使不散失今以佛聖教貫所詮理攝持不散亦復如然若舊翻為經經者經去呼也如經緯之經此亦取貫攝義也或可逕路之遙能示人要道等又是常義舌古共尊百王不易曰常又雜心論五義解經即湧泉等如常可委云云若素呾覽是新語此翻契經語謂契合即能詮教契可詮理合有情機故名為契貫串攝持所應知義目之為逕也第三阿毗達摩者舊云毗曇此云無比法謂慧中勝故更無有法勝此於法故云比法今新云阿毗達磨此云對法對有二義一者對向謂無漏慧對向涅槃二者對觀謂無漏慧對觀四諦前言觀向以因對果因即淨慧果是涅槃後言對觀以心對境心謂淨慧境即四諦具茲二故目之曰對也軌持義故名之為法軌謂軌則令物生解如色法可軌可則能生質礙之解受想等例之也云云二能持自性故如色法以變礙為性能持此性故名為法餘亦例之然法有二種一勝義法二法相法勝義法者諸即涅槃是善是常故名為勝有實體故名義勝義即法持業釋也二法相法通四聖諦相者性也望自體說即名為性望他緣邊名之曰相此四諦法是法相故名法相法法相即法亦持業釋也更有六種對即自性等廣如別說問既翻對法今何標論答隨方之號也梵云奢薩哩羅此云論梵語摩哩理迦此云本母母謂能生妙慧妙慧依論而生故摩哩理迦義稱為論也斯之對法論藏差別不同依俱舍論有於二種一勝義二世俗言勝義對法者無漏名勝實體稱義有深遠殊勝義故名勝義也即無漏淨慧是勝義對法離縛名淨簡擇名慧更麤淨慧眷屬即慧相應心及受想等諸心所法乃至道共無表此等是慧眷屬如是淨慧及眷屬通攝五蘊名勝義對法言世俗者一則諸慧二則諸論言諸慧者即有漏四慧也一生得慧生便得故二聞慧三思慧四修慧如常解也言諸論者六足論也一集異門足論二法蘊足論三施設足論此三是佛在日諸大阿羅漢造四品類足論五界身足論六發智論此三論是佛涅槃後請羅漢所造此之慧論是有漏法其理麤淺易可知故名為世俗前無漏淨慧依此論諸諸慧而得也對法既爾餘之兩藏亦然謂無定能契實理是勝勝義契經有漏定及諸經教是世俗經無漏律儀真實調伏藏名勝義毗尼諸律教并有漏尸羅是世俗毗尼也已上惣解三種別名竟次總釋藏號梵云比摘迦惑吒迦此翻藏也謂取包攝持業義故猶如庫櫃等能包含攝持及所依故又攝論云何緣名藏猶能攝持一切所應如義不令散失尊對三藏攝持並依主釋上來右二收科云云第二出體者上既釋名以召體故次辨也於中例上釋名亦分為二一勝義二世俗初勝義出體者分三初勝義毗尼剋性而論從苦忍初心已去齊金剛喻定已來便有七支無漏色為體八聖道中語業命三所標五蘊中色蘊收十二處中法處攝十八界中法界收若兼眷屬一聚善心心所同時相應亦通五蘊十二處中通法意十八界中意識界收也二勝義契經剋性是無漏定即心所中通大地中三摩地為體五蘊中行蘊收十二入中法入攝十八界中法界收若并眷屬大同前說三勝義阿毗達磨尅性以無漏慧為體即心所法通大地中慧唯是行蘊法處法界攝若兼眷屬與前無別已上勝義出體竟第二世俗出體於中分二初約能詮二就所詮初中能詮之體小乘二十部不同搜其大綱莫越六般執計今於六內餘五如別所明今且依婆沙正義有兩師所說一語業師以聲為體二名句師以名句文為體故婆沙問云如是佛教以何為體為是語業為是名句答應作是說有以語業為體語即聲也論文既着有以二字明知未便歸取二名句師難彼語業師云若爾復說名句文長行偈頌次第行列乃至次第連合當云何通語業師答云後文為顯佛之作用名句師不許此說所以爾者聲是無說無可詮表如何為體須假名句義理方顯問上二師何者為正答今按順正理論宗兩師並取故正理抄云今詳二釋各有旨歸諸論皆有兩師未聞決判若望以詮求旨非名句文無以表彰若望以教合機非聲無以表彰若望以教合機非聲無以可聽兩天傳法本有兩師具乃亐虧少則不足所以爾者聲為業體名句是用體用雙存教體方備如或闕一詮表不成是以此中總以聲名文句四法為體上辨能詮教體竟次辨所詮理體有三云云一別解脫戒有兩宗不同有部表無表俱以色為體若經部作戒色心為體無作非心為體若靜慮戒以色為體也二有漏定三摩地為體三有漏慧以四慧為體已上所詮理體竟前來有二云云總當解三藏名體已竟第二辨三藏次第分二初正明次第二釋所以初中有三云云初約常途辨者先經次律後論所以爾者有四義故一依說以明次第者謂佛成道後便往鹿苑為陳那宣四諦法此則契經為初既聞法已善來召命鬚髮自落納戒在身順處中行即毗尼為第二既越起行已廣為分別五蘊無我是阿毗達磨最居後也二約化辨次第者婆沙云未種善根者令種善根是契經已種善根者令成就即毗尼已成就令得解脫是阿毗達磨也三據結集辨次第者准教有兩說四分律善見論如別所明今此且依大乘出耀經知論當初屈內先經集素怛覽藏也四約根本辨次第者經是本故先明戒從此生慧方起故具茲四義是以契經藏最在初也第二舉律以明者先經後論亦具四義一約法住者毗尼是佛法壽命毗尼藏經佛法方住是以律最在初也二約起行者凡是起行之源戒最為首依教起行律藏在初故經云戒者行根面首集眾善法等三據制者毗尼藏勝佛親例之餘二無能故在後也又律云毀毗犯提毀餘二犯吉四約所被內眾是以先明餘二不然故在後也第三就勝劣以辨次第者謂先論次經後律謂阿毗達磨詮於慧學種智之原定能澄心因慧而起戒伏身口由定能防勝劣既殊故在初也上來有三云云惣當是第一明三藏次第已竟次辨三藏所以於中分二初正明所以二問答分別兩文初也諸佛出皆說三藏而不增減者於此此中便分三別謂對所化生信起行見法不同故立三也謂未入法者引令入法不令於彼種法中起猶預故為對治此立契經藏已入法者勸撥二邊謂在家人貪愛欲樂外道徒自苦形二邊乖中不能起聖為離二邊故立毗奈耶藏道跡既現諸見永士即除邪人六十二見為除二見為除二見立阿毗達磨藏故攝論云復由何緣建立三藏為對疑惑心立契經藏為對治二邊五毗尼為對自見取執立阿毗達磨已上已辨所云云次問答分別問如此三藏有差別答婆沙云或有差別或無差別且無差別者謂佛觀機演教教乃極多若以三藏收之不盡也故彼論云諸佛出世皆說三藏等無差別所以然者謂一切法從一切智海之所生故從一覺他之所流出十力四無畏攝故同從大悲起故以斯文證故無差別也次有差別者隨義雖三有四不同一能詮名有差別謂素呾覽等三名不同二所詮有差別謂素呾覽詮增上心學毗奈耶詮增上戒學阿毗達磨詮增上慧學也三所顯有差別素呾覽中顯次第求故謂此品無間宣說彼品彼品無間宣說此品等毗尼中緣起所顯謂佛於何緣起制立學處等阿毗達磨中性相所顯謂求諸法真實相故四等流有差別素呾覽依力等流毗尼依大悲等流阿毗達磨依無畏等流也問准此三藏能詮所詮既異即三藏互不相攝今諸律中雜詮定慧豈非餘二藏故耶又經中中一雜詮戒慧論中中一雜詮戒定如何前言有差別耶答約宗所詮唯局於戒定慧二種相從故明婆沙云從增勝說毗尼詮戒增勝縱明定慧劣而非勝經論二藏例此可知又問既云三攝義皆盡云何諸文說有雜藏故分別功德論云或佛說或弟子說或非人說或諸天贊頌或說宿世因緣文義非一說兼理事故曰雜藏又僧祇云或辟支佛說或阿羅漢說自說本行因緣是名雜藏斯之雜藏未審三藏攝不若言即層三藏所攝即不合更有雜藏之名若言藏此雜不層前之三藏何以前言三藏義皆盡答局約所詮不得名藏理實三藏不攝雜藏若也通說何得不收但為理事兼明得彰為雜據實以說不離三藏又問既不離三藏未審何藏收答故婆沙云種種雜說名素呾覽又律云四含并雜藏是素呾覧攝言四含者長含增一中阿含雜阿含故云四含也雜藏者雜餘經等名為雜藏故攝入三中但明三藏而已或更汎論依諸經論亦說三藏一聲聞二菩薩又分別功德經說有四藏一素呾覽二毗奈耶三阿毗達磨四雜藏又成論有五藏四種如前又加菩薩藏又雜集論有六藏就前聲聞菩薩二藏中各經律論成六也又胎藏經有八藏亦就聲聞菩薩藏中有經律論更各添雜藏成八也又普耀經有九藏謂於三藏之中各有經律論也已上通約諸教或少或多究竟而論並不出三藏但開合有異耳上來有二云云惣當通舉三藏已竟第二就教別釋者謂前來通舉蓋一期佛法今於上三之中除却餘二唯就律教別釋於此文中文分二別初明藏攝二辨乘收兩文就初又分二初明律本興由二約藏所攝初律本興由者謂佛成道已後十二年前未說深因唯談略教十二年後方興廣教言略教者戒經云善護於口言等一偈是也言廣教者四分律云爾時世尊在俱蘇摩國毗蘭若處時舍利弗於靜處作念何佛等正覺修梵行法得久住何佛等正覺修梵行法不久住作是念已從靜處起整衣服至世尊所頭面禮足而白如來靜處所思之事乃至願為開示佛告舍利弗毗婆尸式棄拘留孫迦葉此四佛法得久住毗葉羅拘那含此二佛法不久住舍利白言何故佛言此二佛外為弟子談廣教但說略教彼佛在世法乃留行涅槃已後種種過起疾滅正法喻如種種好華散置案上風吹便散以無線貫串上之四佛反此可知舍利尋請如來便為諸比丘制於廣教佛言且止我自知時謂諸比丘未獲利養名聞未生漏過若得利養名稱即有漏過既生漏過方為結戒爾時世尊在毗舍離國須提那子歸本村與故二行不淨行時有行頭陀樂學戒知慚愧者白佛佛集諸比丘已種種呵責何故最初犯等云云乃立十句義制第一戒次檀尼迦盜王材木又制第二戒乃至隨犯隨制滿足毗尼喻如衣全未納藥待病施漏過聿興篇聚方著輕重因茲而定位持犯藉此已成科故有大藏毗尼教文興起也上明律本興由已竟次約藏所攝者藏有三別如上已明更不重述今此所宗是毗奈那藏攝次辨乘收者乘有三乘今且通明次辨收攝初中先解三種別名次釋乘之總號初言聲聞者聲謂音聲聞謂聽聞即所化有情發識聽受由聞佛教信受奉行出離三有即世尊初轉四諦法時陳如等於四諦聲下便證勝果此謂因聲悟道故號聲聞此約初緣立名若對今時但依聲教修行證四沙門果亦號聲聞也二緣覺者梵云辟支迦此云緣覺緣謂所緣即所觀之境謂十二因緣覺即能觀之智此人能體緣悟道故曰緣覺今存略梵但言辟支此有二種一者獨覺辟支出無佛世但見世間草木春生夏長秋彫冬落自然悟道不假於教故瑜伽論云常樂寂靜不欲雜居但修加行滿足無佛自悟故名獨覺或名麟角謂如麟一角無二並生依喻彰也今若呼為獨覺即覺悟之覺若呼麟角即頭角之角也二者部行辟支有多部黨或三十五十一時出現出有佛世聞佛說十二因緣修行證得緣覺果三菩提者具足梵云菩提薩埵菩提云覺薩埵云有情故攝論云菩提是所緣境即所求果薩埵是能求人其人廣發誓願求大菩提故曰菩提薩埵約釋分別菩提之薩埵依主釋也又云菩提是所求果薩埵是所化有情謂起大智故上求菩提起大悲故下化有情若如此說即全不聞修行人事但是全取他名有財釋也若約行位大乘五十二位從十信十住十行十迴向初地至十地并等妙二覺皆名菩薩若小乘三祇劫滿百劫修妙相名住定菩薩得前佛授記生覩史陀天名補處菩薩從天下降於人間未成佛前名最後身菩薩也若約形相身嚴瓔珞頭載花冠等上釋三種別名竟次解乘之通號多解一華嚴疏云乘者教也謂三種之教又青龍疏云性也三性之人又涅槃疏云乘者運載之義也運三種之也至三種果故若論大小唯有二別一大乘二小乘收前三乘皆盡今之律藏三乘之內聲聞乘收二乘之中小乘此旦通大毗尼教以論之若唯約四分別論即分通大乘等上來辨乘收竟前竟所說教藏已竟二云云總當第三結集任持離分部別者謂上廣辨三藏名義等皆約世尊在日金口宣揚既示滅提何掩歸圓寂未委已後何人結集詮上具業得對今時夜是何人弘持嗣續又因何事乖諍紛然五部二部之殊至于二十部別前未既委故次明之就此之中便分三段初結集三藏二五師任持三離分部別初中結集三藏者結謂撰結撰佛遺言集謂聚集謂隨事類各聚一處故云結集於中分二初明結集意二正明結集初明意者謂如來成道已後住世四十九年所度有情皆已度訖遂受魔王所請入般涅槃即當此周穆王五十二年二月十五日入滅春秋七十有九莫不世間眼滅不善增長聖凡嗟歎愚惡餘言迦葉思念當何報恩應須結集如來法眼總有三意一為令正法久住故二為止惡比丘自度得脫三為息外道如烟之謗所以興於結集上略明意也二正明結集於中分二初明結集時處二明結集軌儀兩文今初又分為二初明時二明處初言時者准付法藏傳云世尊化緣將畢欲入涅槃受持正法委付迦葉汝今當知我於無量阿僧祇劫為眾生故勤行苦行一心專求無上菩提如我昔願今已滿足涅槃時對此深妙法用囑累汝汝當於後廣宣流布莫令斷絕迦葉答云善哉受持正法唯願如來不以為慮於是迦葉即辭如來膝行百迊往祇闍堀山賓鉢羅窟經行禪寂宣揚妙法度諸眾生佛後垂涅槃時放大光明大地振動迦葉念言將知如來欲入涅槃故現斯相即入三昧天眼觀見如來在尼連河娑羅林間全身捨壽作是觀已慘然不悅乃將徒眾來至佛所欲詣佛所行經道中逢一外道名憂波柯手持一枝天華中含云天花者曼陀羅花也今多云蓮花盖是錯悞歌舞而行迦葉問云汝從何來彼云從𤘽尸那城來又問汝見吾師世尊在否答滅度已經七日人天供養欲擬闍維我所持花從彼而得迦葉聞之不悅時諸比丘皆大啼泣淚流如雨律云時䟦難陀惡釋子在眾中語諸比丘言長老且止莫大啼泣我於摩訶羅邊已得解脫彼人在日戒法嚴峻禁制我等不得自由今既涅槃並皆自在此自慶之詞也復有外道謗言瞿量沙門在日教法如火今既入滅教法如煙薪盡火滅煗能幾時迦葉聞之倍生不悅遂諸徒眾共住𤘽尸那城雙林間遶棺三迊稽首作禮是時如來於金棺後現雙足輪意令履踐如來所行之跡爾時迦葉爾以千里白㲲萬片兜羅香木蘇油闍維供養收其碎身舍利八斛四斗國王大臣各自收之我今宜應結集教法作是念已乃告眾曰我先在道行時逢外道及惡比丘餘言自慶等彼既懷於異術今此可共論法毗尼勿令外道致餘言也即涅槃後七日而興結集此且據四分五百羅漢結集之文或更通諸教文即所說不定恐繁不述也上來正明結集時竟次明時處者准育王經云尊者將諸徒眾往見闍王而白王言我今擬集如來法眼唯願大王為我檀越王言願尊者及諸比丘終身受我四事供養爾時尊者初往大竹林中欲興結集後嫌妨閙却往賓鉢羅窟結集若准四分結集文中當於何處論法毗尼飲食無乏後云准王舍城房舍眾具可得無乏爾時大迦葉便作單白律云大德僧聽引處比丘為僧所差若僧時到僧忍聽僧今往王舍城論法毗尼白如是問上引育王經在賓鉢羅窟結集下又引四分律在王舍城何故相違答城是總號窟是別名律據總以論經據別以說亦不相違也故西域記云摩竭陀國正中古先王所都之處地多泉濕出勝上香茆崇山四周以為外郭西通峽逕北關山門東西長而南北狹外城周一百五十里內城周四十里餘羯尼迦樹處處成林花開榮四時不絕山成北門更行一里餘至迦蘭陀竹林林中有大石室即迦葉結集處也引此證前不相違義結集處竟上來二收科云云惣當結集時處已竟次辨結集軌儀者西域記云爾時迦葉即往須彌山頂鐹銅揵槌唱如是言今王舍城將有法事諸證果人宜時速集而說偈言佛諸弟子若念於佛恩當報佛恩莫入涅槃當得吉羅罪也時楗槌聲傳迦葉語遍三千界諸得神通并未得者並皆雲集猶是四方輪湊萬里星馳莫賢必萃督聖成集諸來大眾皆隨教住集王舍城中此時迦葉告大眾曰如來入滅世界虗空當集法藏用報恩也既將集法務從寂靜豈得群居不成勝業乃以三法簡之第一簡去凡夫唯留聖眾聖眾由多第二於聖眾中簡去有學三果四向唯留無學無學尚多第三度簡須是三明六通具八解脫內閑三藏外達五明如此之流方堪集會其時選留五百人阿難且在數內又准南山戒壇經說迦葉臨欲結集先於戒壇上集僧白四羯磨罸賓頭盧次又罸阿難七顯有七吉今懺悔之言七事者一不食請佛度女人二為佛作僧伽梨足躡而縫三不請佛住世四不與佛水五不問雜碎戒六如來三請汝作供養人不肯作七不遮女人淚令污佛足阿難言此七非我故作今且分疎第一請佛度女人者謂姨母於佛有恩又過去諸佛皆有四眾故又女人亦有得果之分故二足躡佛衣者其時無人佐助我故三不請佛住者魔蔽我心故四不與水者謂有五百乘車又大龍從恒河水中度撓水濁故恐損如來所以不與五不問碎雜戒者將涅槃我心憂悶故六不肯作供養者謂供養者謂供養人難作有名利故恐涉譏嫌也七不遮女人淚令污佛足者女人心軟發狂泣淚而禮手污佛足非我不能遮故如我意中於此七事並不見犯合依大德語不散拒違悉皆懺悔也又准智論云迦葉定觀於大眾誰未漏盡唯見阿難由居學地迦葉語彼汝可出去汝未盡結不應住此若得漏盡然後入來既駈出已爾時迦葉將諸徒眾住賓鉢羅窟阿難深生慚耻自作念言我二十五年侍佛左右不曾受若此耻非我懈怠不耻果證我緣侍佛故留殘結不取無學遂乃精勤斷殘結少有疲倦欲以亞臥頭未至枕廓然大悟如日破闇三明六通具八解脫今准大乘論說阿難此時起上品心頓斷三界俱生惑也却之付法藏傳云阿難得道已飛至賓鉢羅窟在門外立而說偈言多聞辨才給侍正覺瞿曇阿難今在門外說偈已良久未開又再說偈曰多聞具辨才給侍世尊者已捨諸重擔今在門外立迦葉窟內聞已說偈答曰汝若盡眾苦弃捨煩惱擔宜應現神力令眾咸證知爾時阿難即運神通從石壁中入若准唐三藏別傳云從戶鑰中入入已遍禮僧足已隨次而坐滿五百人善見云時大迦葉問諸大眾今當先結集何藏諸羅漢咸皆答言先結集毗尼謂毗尼是佛法壽命毗尼藏住故法方住故須先結又准南山西明住法圖贊云當初窟內立三高座一迦葉問二波離阿難答三抄上貝葉准四分下文云時大迦葉先秉單白和僧然後令波離結集律藏見論云波離亦秉單白已整衣向大德僧作禮已登座坐已取象扇執之迦葉問第一戒何處制如是乃至調部增一毗尼波離隨問一一而答便抄上貝葉已放扇下座向大德比丘作禮却復本位今時說法准此軌儀又四分云迦葉次秉單白和僧已令阿難結集餘之兩藏阿難亦秉單白竟禮僧已登座取象扇執之迦葉問梵網經增一世界成敗乃至法花維摩等集為一修多藏次問諸論等集為一阿毗達磨藏若依宗輪論疏并長耳三藏傳所說與上不同恐繁不錄也又准唐三藏別傳云王舍城西二十里大竹林中一千無學結集者即是當初三遍簡退者共在竹林中自相謂曰佛在之日同一師學佛纔入滅簡弃我曾彼既結集教文我曹不可拱手亦須撰集報深恩莫不凡聖同會結集教文次第詳論以成五藏一素呾覧二毗奈耶三阿毗達磨四雜藏五禁呪藏凡聖同集故名大眾若窟內五百羅漢結集三藏是上座部西天二部至今俱盛上來結集軌儀竟上來二收科云云惣是第一段結集三義已竟第二五師任持者來意如常云云於此五師便分為五一迦葉二阿難三末田地四商那和修五優波鞠多五段今初言迦葉者梵音略也具足應云摩訶迦葉彼此翻為大飲光准俱舍云大者具二義一種性大婆羅門種二富大其家巨富更無過彼也飲光亦具二義一從祖立名二從己彰號初從祖者謂成劫之初有一仙人在山修道經無量時不喫飲食身真金色吞飲眾光今尊者是彼苗𧜟也二從己立名者准付法藏傳云昔過去九十一劫毗婆尸佛入滅之後四部弟子咸生悲戀各起塔供養時代既久形像金色多分剝落時有一貧女遊行乞得一顆金珠見像面懷欲薄像面迦葉爾時作鍛金師女即持往請令修造金師聞福生歡喜心遂作治之用補像面因共立願願我二人常為夫婦世世之中身真金色恒受快樂常修梵行從是已來九十一劫身真金色生人天中快樂無極最後在生第七梵天時中印土摩竭陀國有婆羅門名尼俱律陀過去修福聰明多智巨富無量金銀七寶出宅牛羊奴婢車乘金犁有千具恐與萍沙王齊復除一具有六十篇金粟每篅有二百三十斛金氎最下者猶直百千兩金以釘釘之入地七尺㲲不穿破如本不異以福德力財富如是且無子息於其舍側有一福神樹夫婦遂往祈請祭祀求乞有子兩年無應嗔忿語曰今更七日盡心奉事若後無驗必當燒剪神樹愁怖乃告四王王又為轉告帝釋帝釋遍觀閻浮提人無堪彼子轉告梵王如斯之事梵王以天眼觀見一梵王天子將欲命終歡往生梵彼天王告曰婆羅門法多惡邪見我今不敢為其作子梵王語彼曰此婆羅門有大威德南剡部州之人薄福無堪為彼子也汝必須生彼吾相擁護終不令汝生邪見也梵天曰爾敬承聖旨不敢違越於是梵王語帝釋知帝釋具向樹神說如斯事樹神歡喜便往其家語婆羅門汝更莫復起恨於我却後七日當滿卿願至七日外婦覺有身滿足十月生一男兒覩㒵端正身真金色光明赫奕四十里相師占曰此兒宿福深厚必當出家父母聞之懇壞憂惱夫婦相語曰當設何計斷絕其意復自思惟世所躭著唯有美色當為娉其端正好女用斷其情至年十五欲為娶妻彼既知之深生不悅語父母言我志淨不須也父母不聽兒知難免遂設方計白父母曰若世有女身紫金色還如我者我須之父母即置筵會廣召諸親婆羅門等遍行求娉諸婆羅門共設方計鑄金神端正奇異舉行聚落高聲唱告若有女子得見金神禮拜之者後出娉時必獲好夫身金色者諸女聞之並奔出舍唯有一女身體金色端正殊特即是因中貧女之身以昔勝緣感此身體志樂清淨獨不肯出諸女強將共見金神其女既至金色光明照奪朗練婆羅門即為娉之既至夫家夫婦相對各皆清潔了無染心共立要契各住一房父母知之毀除一房令其同舍安置一床夫語婦曰我若睡時汝則經行汝若睡時我便行道後時妻臥垂手床前毒虵入室取螫其手其夫見已將衣褁手舉安床上妻便睡覺而責夫曰云何丈夫無其志操竊舉我臂夫指床前毒虵之事妻始悟也夫婦二人各自厭世遂求出家父母聽許便作沙門清真守素無為無欲在於空閑勤修苦行於是迦葉作是誓言世界所有成阿羅漢者我悉歸依作是語已出家威儀所有諸戒悉皆具足准此自誓上法得戒世尊即為說法得三明六通具八解脫其妻金色女後時禮見如來亦成聖果又迦葉常共如來對坐說法未來成佛號曰光明法華經中佛為受記佛欲涅槃之時所有教法悉付迦葉佛涅槃後結集三藏竟遂入願智三昧觀無闕少乃將徒眾往謝闍王闍王告尊者曰如來入滅我不獲見尊者已後若入涅槃願垂相告迦曰善哉遂於王舍城廣宣流布化度有情大作佛事化緣將畢乃自思惟今我年邁身為老朽誰樂是身我今涅槃時至便詣阿難所作是言長老當知昔佛世尊以法付我我今年邁將欲涅槃世間勝眼今將付汝汝可精勤守護又恐阿難後無付法處乃記之曰王舍城中有一長者名商那和修汝可度之付彼法眼阿難言爾迦葉遂遍禮如來舍利乃塔又如鴈王飛到大海婆伽羅龍宮禮敬佛牙又如壯士屈申臂頃至忉利天供養佛髮從彼天下還至王城阿難恒相隨逐未曾捨離恐涅槃不見復後於一朝迦葉語阿難曰汝先入城乞食我亦當往阿難奉教先往迦葉念云闍王與我有要遂乃辭王至門下守門人云王今正睡若驚王睡國法非輕不敢啟白也迦葉語守門人曰王若睡覺為白王言迦葉欲入涅槃時來辭王不見爾時尊者著佛聖衣持自己鉢乞食食已入鷄足山梵語屈吒盤陀唐言鷄足謂其山有三峯如仰鷄足尊者入中結跏趺坐三誓願一願我身并及衣鉢久住不壞直至慈氏下生大作佛事二願此山三峯合一掩蔽我身三願阿難共闍王若來其山自開令彼得入去後還合發願既了三峯合一掩蔽尊者大地振動諸天感戀爾時闍王於睡中夢屋梁折表佛法梁棟折也王便驚竟遍體汗流深生怖懼守門人云迦葉涅槃適來辭王不見王聞語已悶絕良久乃蘇遂到阿難所悲號涕泣乃共阿難同赴鷄足王既到山其山開闢王與阿難入中見迦葉跏趺而坐全身不散又見天華覆身王禮拜已舉聲號哭種種供養却還本國山合如初西域記云其山在摩竭陀國多論云迦葉非直入滅但入滅盡定定力任持於身待慈氏下降若准婆沙餘師云留骨璅或身依俱舍宗直入滅也但以願力持身耳今詳教旨前文既發誓願後入寂定不妨應是定願二力所共住持待慈氏下生從此山過見於迦葉說少欲結集滅法藏時諸弟子念其迦葉卑陋若是釋迦如來身量如何彌勒言迦葉僧伽梨是釋迦佛姨母織成金縷袈裟今付於我今度四部遺法弟子彌勒即就彼取之爾時迦葉既付衣已踊身空中作十八變悉除慢心佛為說法並成聖果迦葉其時化分段身示相火焚入無餘依界見者莫不咸生悲變也上來第一師竟第二阿難此云慶喜智論云佛成道夜生爾時魔王見佛成道心憎嫉來嬈惱之皆被佛神用變化不如遂來王曰悉達作夜於金剛座上已死大王聞之憂愁不已須臾魔退淨居天空中報曰悉達太子於金剛座上成等正覺大王聞之頓生喜悅慶慰無已又王弟白飯同於此朝奉白王曰臣於昨夜生一男兒王曰貴弟生子我心歡喜今日大吉所生之子應字阿難即慶喜也或名歡喜謂其人世世修於忍辱復生身端正父王歡喜因此立字也又觀佛三昧經云佛告阿難汝名歡喜依不定實又增一經云阿難有四希有一嘿然至大眾中人見歡喜二若有所說聞者歡喜三者四眾之人興敬仰心觀之無猒四若有所說聽亦無厭以是因緣號為歡喜也後年漸長大隨佛出家而為侍者其人聰慧多聞第一總持法藏誦八萬四千及諸羅漢所說悉能受持無忘失故更有乞食緣起數數聞之恐繁不敘佛涅槃後結集之時戒壇經云迦葉作三千八百問一一答之與佛無異又付法藏傳云受迦葉付囑已禮謝受法竟往見闍王闍王告阿難曰長老及迦葉入滅我皆不覩長老已後入若夷願垂相告阿難答云爾於是宣揚妙法化度有情為世間凡二十年後於一日林中見一比丘聞彼念法句曰若人生百年不見水老鸖不如生一日而覩得見之搜玄云不見水澇涸者非也今准住法圖贊是鶴字即水中老白鶴也思之阿難聞之不悅喟然歎曰世間眼滅何其速哉違返聖言無有智慧乃語彼曰汝所念者非佛說也不可修行又准付法藏傳云阿難復告彼曰有二惡人名為謗法一雖多聞而生邪見二不解深義顛倒妄說有此二法為自毀傷不能令他離三惡道汝今當聽我演佛偈若人生百年百解生滅法不如生一日而得解了之此比丘乃依而誦後向本師說本師言阿難老朽智慧衰劣言多錯謬不可信也汝今仍舊但念前偈阿難後聞林中比丘還念前偈乃問因由彼答阿難本師之語阿難已乃自思念彼輕我耶遂入三昧推永聖德未見更有一人能迴彼比丘本師之意便作是念異哉無常甚大雄猛邪見熾盛不蓋增長誹謗如來斷飽正法念今此比丘我為說法反納邪言世間眾苦難可久住我於今日宜速涅槃又准育王經說阿難先往商那和修處告之曰佛以法付迦葉迦葉付我我欲涅槃今將付汝汝可守護又恐和修已後無人白法遂告彼云世尊昔遊摩突羅國說彼國中有長者子名優波鞠多於禪法中最為第一雖無相好化度如我可以度之付於法藏和修言爾又付法藏傳云阿難欲入涅槃自念闍王與我有要遂往辭王守門人云王今正睡不敢驚覺阿難曰若覺時為報曰阿難入般涅槃特來辭王不見時王於睡中夢見傘蓋柄折而爾不墜遂乃驚覺守門人具陳上事王聞已悶絕良久乃蘇而自歎曰如來入滅之後上足弟子迦葉有大名稱以補佛處又乃入滅法漸衰弱次有阿難總持法藏瞻仰尊重猶如日月今又涅槃更何恃怙蓋法漸盡諸惡熾盛即問守門人云阿難今在何處宗輪疏云時有國神白王言阿難已往毗舍離國入滅王遂嚴駕四兵往恒河側見阿難乘船在恒河中流王稽首白言三界明燈已棄我去今相憑仗勿入涅槃縱入涅槃顛歸我國時毗舍離城復有天神報王阿難在恒河中流而欲涅槃王復嚴駕四兵往恒河側復請阿難向我國中入般涅槃忉利諸天又請歸於帝釋宮入城滅娑伽羅龍龍王又請歸龍宮入滅既四處皆請不可偏向一處遂於恒河中流而取滅度是時大地振動時雪山中有五百仙人覩斯相已乃自思惟如來出世我等貪著禪味不求解脫迦葉入滅我又不知今阿難入滅曹若更不求解脫無有是處遂相勸勵請求度脫既乃一時飛空到阿難所固請求哀出家阿難默許之即化恒河水為金地為仙人說法准付藏傳云阿難為彼如應說法鬢髮自落成羅漢不言感戒若依育王經阿難秉羯磨為受戒單白時得初果白二得二果白三得三果白四時得第四果既得果已悉欲涅槃最後一人名末田地阿難獨不許入涅槃令持法藏往罽賓國流通教化彼答云爾阿難即踊身虗空作十八變入奮迅三昧分身作四分一分與忉利天一分與大海娑伽羅龍王一分與毗舍離王一分與阿闍世王四處各起塔供養上來第二師竟第三末田地或云末田底迦亦云金他即是前來五百仙人中最末後者受阿難付法也傳記云其時阿難告彼曰昔佛遊烏長那國降惡神迴從彼國龍池上過迴顧語我云我涅槃後有末田底伽於此池上建立伽藍大作佛事爾時末田聞佛懸記心生歡喜遂往地印土罽賓國雜云迦濕彌羅國初往彼國並無人民唯有一大龍池西域記云其池周迊七千餘里四境負山山極消峻末田到彼初往大山頂上宴坐作大神變振動龍池龍王深信化作人作鬚髮皓首容色慈悲尊者亦知是龍而為說法等後感法味思報其恩遂問末田欲須何事末田答曰我唯要一住持之處龍王又問未委住持要幾多地末田曰唯悕須一坐具地龍王言多即不可一坐具地阿難大德見我此池否是我所居住處爾時龍王遂以業通之力縮此池水與末田地龍王漸縮水末田漸展坐具如是縮一千里坐具未遍直到七千里縮水離盡坐具未周自龍念言我實許他一坐具地豈得返悔於是龍屬皆上岸上龍王返來就末田乞地末田遂於西比角留一小池周一百里與彼居止龍王又告尊者言今雖且施池法滅還收也爾時末田既得地已遂運神力造五百伽藍於諸異國買粥鬲賤人供僧使從如是廣興化等導流行教法其末田之化緣既畢終於此國不別付法謂商那在世故尊者滅已諸多賤人自立君長隣國鄙其賤種不與交通梵云乞栗多此云置得亦云賤人國唐三藏貞觀中往彼見水多陸地少將知教法衰劣不久也問阿難先付法與和修後付末田地今何以末田却在前答准育王經和修在第三末田居第四今緣取和修傳法與鞠多故抽末田居第三也若據行化文同時亦無先後以末田在滅度不別傳法故也上來第三師竟第四商那和修者訓也若正梵音商諾迦縛縒此翻草衣或云胎衣謂此尊者往昔曾為商人逢一辟支迦佛身著草衣商人遂將一端白㲲奉施以是因緣感五百生中衣與俱生冬為狐裘夏為絺縒最後出家變成法服受阿難付囑已遂乃廣宣流布化度有情為世間眼後時化緣將畢遂付法與鞠多而告彼曰昔佛世尊以法付迦葉迦葉付五師阿難阿難以法付我我欲涅槃世間聖眼今將付汝汝可精勤守護又恐鞠多已後無人付法遂告云摩偷羅國有人當生名絺徵柯汝可度之以法付彼鞠多云爾商那既付法已遂入山中不久入滅一萬八千羅漢弟子收其舍利起塔供養上來第四師竟第五優波鞠多或云烏波堀多此云近護謂親近守護法藏故其時商那和修雖受阿難付囑令度鞠多此時但有鞠多之父未有優波鞠多之身遂顧往摩突羅國訪其父舍初將百人十五人往次將三十二十人往乃至最後單己而往長者恠問之曰尊者初來從弟𫃠多今何單己更無給侍和修答云僧家以義聚也所以多少有無不定長者言我若後時有子必相捨與尊者言爾不經歲餘果生一子名阿失波鞠多時和修知已遂往求乞長者云我始有子要紹家業不可捨之後更有時必能相奉後經歲餘又生一子名為難陀鞠多和修又往教化長者云家有二子一紹內一紹外正處其中後更有時必定捨之後又產一子即優波鞠多智慧聰明顏㒵端正和修觀前二子非其法器亦不苦求此之一子真成法器遂往求乞長者此云此子聰利內外雙紹前之二子容可捨之若此一子決定不可和修知根機未熟亦懇求後時鞠多年漸長大遂令市肆之內經求和修遂往漸漸化導遂問鞠多云汝在此何為鞠多云我經紀和修問曰汝淨心不淨心多云我不解之請為分別修云若利他損己名曰淨心若損他益己即名不淨心多云我經求覔利本貴益身皆是損他有何淨也修曰從今日後自調練心立兩頞石子一黑百若損他時下一自里若損己時一白子多依此教初唯黑次半白後純白修知根熟乃為說法言下便證初果後於城中見女人犯王法被斷支體因往看之作無常觀成又證第三果遂自求出家不由父母修為剃髮受戒白四竟時證羅漢果教化有情度人無數醍醐山有一石室高一丈六縱廣亦爾此依付法藏傳辨若准唐三藏別傳云高二十餘尺釋迦方誌云高二丈廣二丈三尺或有說云長十八肘廣十二肘所辨數量各不定也發願凡所度人若夫妻二人捨家入道俱證羅漢當下一籌籌長四寸安其室內此室籌滿我即涅槃若一得一不得并前三果四向及童男童女出家證羅漢並不在數如斯立願遂得石室籌盈時人號為先無相好佛鞠多念曰未委如來在日化度與今何殊時有一老比丘尼是波斯匿王姉名蓮華色年百二十歲在醍醐山間唯有此尼見佛在時化度之事當往問尼遂先令人報尼尼入定觀之鞠多此來所為何事乃見欲問佛行化之事從定出已即滿鉢盛油安門扇後尊者雖是羅漢若不定觀察散心不知遂即推門不覺傾油數渧尼問訊請坐已問云佛在日教化有情何似我之今日尼曰大德曾聞佛在之日有六群比丘不多云此人最暴何足為言尼曰修雖麤暴佛在之日數入此房不傾油一渧明知今日無學成儀不及佛在日麤暴之輩鞠多聞言深生慙恥尼安慰何用感傷世尊初日入滅二日不如三日已後轉復卑劣況乎今日百有餘年去聖時遙何足為鞠多於後度弟子名絺徵柯亦名提多迦也羯磨言下證羅漢果多將入滅遂往告云佛以法付迦葉迦葉付阿難阿難付吾師和修和修以法付我我今付汝汝當守護彼答言爾鞠多却後七日踊身虗空作大神變入般涅槃以石室籌用為闍維人天悲泣收其舍利起塔供養已上第五師竟上來始從迦葉終至鞠多名竪五師通傳三藏更無替癈一百年內如水傳器若准西明圖贊更有一十九師并上都二十四其第二十四師子比丘往罽賓國國王不敬遂損師子之命因絕付法也即當一千五百中今但州前五師者據未分部略明從第五師後分宗即成異見故不敘也上來第二明五師任持已竟第三橫論五師離分部別者謂佛在同對機設教本是一文涅槃已後波離結集名八十誦與佛在時無別但以鞠多末化僧懷異見悟解不同各為楷則人以情競法逐時移遂分散文以為多別毗尼母云一百年後分為五部二白年後分十二部文殊問經有二十部二舍利弗問經二十部謂窟內外室重添經集時根本也今總會之莫過三別初明分五部二明分二部三明分二十部故注戒本及羯磨序云經分夢㲲之殊律有折金之明喻初則五部二部之殊中則五百十八之異所言經分夢㲲者一即闍王夢見白㲲從天降下分為五段王憂問佛佛言非闍王事此是我涅槃後諸弟子分毗尼為五部也二即吉栗枳王十夢經也故婆沙云人壽二萬歲時有佛出世名為迦葉其佛父王名吉栗枳或云訖利巳此翻作事也其王夜得十夢謂是不祥旦集群臣共占十夢言十夢者俱舍頌云大象一及井二三栴檀四妙園林五小象六二獼猴七八廣𣻹衣九鬪諍十是時無有一人能以王解王遂詣等問佛具述上緣佛言非關於王此是未來百歲之時釋迦牟尼佛出化於世涅槃已後諸弟子所作事也一夢見大象被關在一室更無門戶唯有一窓其象方便將身於牖內出其尾被礙却不得出佛言此表釋迦遺法弟子捨家出家如象方便將身於牖中出出家之後却被名利所拘如尾出不得也二夢渴人并一口井其中有水具八功德此中遂渴人是渴人終不飲之人問其故答云水是好水其井不堪所以不堪所以不飲言此表釋迦遺法弟子將其教法與道俗說令不信受人問其故答云法是好法說人惡弱我不聽也三夢見一人將真珠愽一升佛言此表釋迦遺法弟子將佛教法為道俗說而博衣食故四夢一人將栴檀香木博於瓦木佛言此表釋迦遺法弟子將佛真淨之教博外道典籍也五夢一園林華果茂盛而被杉風忽然壞盡佛言此表釋迦遺法弟子廣滅如來正法園林六夢諸小象駈逐大象殯令出群佛言此表釋迦遺法弟子結搆惡黨殯棄有德比丘七夢一獼猴身塗糞穢衝突眾人眾人見來悉皆迴避佛言此表釋迦遺法弟子自無戒德以諸惡事謗賢賢毀良良見之悉皆迴避八夢一獼猴身無威德眾共狀捧以海水灌頂立之為王佛言此表釋迦遺法弟子結搆惡黨舉破之人以為僧肯九夢一張白㲲堅而又廣有二十人各執少分劉挽㲲終不破佛言此表釋迦遺法弟子分佛教法為二十部雖分多別然皆佛法終不破壞十夢多人共聚而相殘害死亡者多佛言此表釋迦遺法弟子各有門徒所執不同牙相鬪諍善法滅已前云夢㲲者當斷第九也言杖金者謂百載之後雖分五部乃至四百年初分二十部猶若分於金杖而作五段二十段故雖無杖相段段皆是真金也初則五部二部之殊者五部謂曇無德等二部即上座大天也有云二部五部之殊恐似例也中則十八五百之異者謂於二十部內除根本二餘枝條有十八也五百者智論云佛滅度後五百異部王畢竟空如刀傷心故分初明分五部者一曇無德云云然就如來本一毗尼教中元來通含五部故今五部輕重持犯有別未分之前總含在一藏內故舍利弗問經羅旬乞食不得佛令以五種律衣更互著之便大得飲食明知聖制本有五意若爾佛在之日何不便分答謂能化主是所被根器未有五般見解所以不分故基法師異部宗輪疏云佛有五德任持故所以不分一不可化者皆能化之故人無異執如那提三迦葉等云云二能斷疑網有疑皆決故經云諸求三乘人若有疑悔者佛當為除斷令盡無有餘故法無異執三人天崇敬眾德所導寧生異執四說法必益但便聞法盡出塵勞故無別執五能伏邪論天魔外道悉能伏之故人無異見法無異執廣而彼說一百年內諸聖弟子任持故人無異見法無異執也一百年後有此五種根機故於聖教之中有斯五見起也今釋此五部有兩說一依大集經本有六二派約諸傳記但有五部初中依大集經六部者一曇無德部經云我涅槃後有諸弟子受持如來十二部經書寫讀誦顛倒解義顛倒說法以倒說故覆陰法藏人名曇摩鞠多此云法密亦云法藏言倒說者取化儀次第又說無第皆先星後日又欲說有名倒也從法立名即四分律也二薩婆多者經云雖復讀誦書寫外典受有三世及以內外破壞外道善能論義說一切性悉得受戒凡所問難悉能答對是故名為婆帝婆言受有三世者謂執三世皆有實體即名一切有說一切性者善惡無記皆許得戒故餘文可委云云從法立名即十誦律也三彌沙塞者經云不作相地水火風相虗空識相是故名彌沙塞地水火風空識此之六界皆是空故云不作地水等此云不着有無觀也從法立名即五分律也四迦葉遺部者經云說無有我及以受者轉諸煩惱由如死屍是故名為迦葉遺或名迦葉毗也謂外道執有實我受用塵境名為受者今此師說無有我并及塵境即簡也人所執非也轉者捨也捨煩惱如死屍故此舉喻顯此翻為重空觀也云云也從法立名即解脫律也五婆麤富羅部者經云皆說有我不說空相由如小兒是故名婆麤富羅亦云婆結富羅此師說一切有情實体與五蘊不一不異非斷非常也若言蘊一蘊若滅我亦隨滅便成斷見若言蘊異蘊若滅我合在即成常見故知此我與五蘊法不一不異非斷非常故曰皆說有我不說空相也如小兒者愚痴之㒵也此云犢子古有外道染牛而生部主是彼苗𧜟律本未到未知法名云云已上杖條五部竟六根本摩訶僧祇者經云廣博通覽五部經書是故名為摩訶僧祇此云大眾已上經也次勸結云善男子如是五部雖異而不妨諸佛法界及大涅槃云云問經文列六部何故結勸但云五部首疏云總別有六僧祇是總以引部眾僧行解虗通不生偏執遍照五見以通行故明知前五是別各壞異見從彼流出若僧祇是根本部人皆奉信後五是別恐人不信故偏勸之故下別序中鈔自注解云僧祇是根本餘是五部此正依大集分別也又問僧祇既是根本卷軸今多因何但四十卷耶答五師捃拾情見之文各為一見餘外事法攢聚一處不多故但四十卷也雖爾且是根本故譬如一樹傍出五枝中間雖小猶名身也四面縱大亦號枝條又此四十卷僧祇無歸應序證知是根本又鈔主釋云僧祇是根本大眾所傳非是百載五家生也斯為正義或依狹言將此四十卷僧祇為大天部者非也廣如別破云云次依佛本行集僧及僧祇後譯私記但有五部彼云如來滅後一百年滿第五祖師鞠多之後五人於上座部中一時頓起但分五部餘四如前第五婆麤富羅是祇律今如何分答非敢苟分大集明異若今婆麤經不應言遍覽五部已上疏文今但依大集分別以為正義今猶有人妄執盖不究厚故也已上分五部竟次明分二部者即大眾上座也問夫論分部理合從少至多今何從多却少耶答前雖分五部似多猶是聖人理和同是上座一宗之內今即對大天凡眾人法處三一時分故致有二焉若前但有五部亦名未顯上座之號至二部時始有上座部也問何因緣故分其二部答由其摩訶提婆此云大天未出家時造其三逆出家已後又造五緣有此乖張故分二也今依宗輪論疏略述緣起昔末土羅國有一商主娉少妻室生一男子顏容端正字曰大天不經多時其父廣將財物經營他國因緣阻礙經久不還於是大天年漸長大遂染其母後聞父還心生怖懼與母設計遂煞其父既造一無間業已事漸彰露住止不安乃將其母展轉逃隱至波吒釐城到彼又忽遇見本所供養無學苾芻又恐事彰遂設方計煞彼無學既造第二無間業已轉懷憂怖後復見母共餘人有通心生嗔忿云我為此故造二重罪流移他國跉不安今復我更共他人如此椙穢何堪容忍於是方便復煞其母既造第三無間業已由不斷善根深生憂悔即自思惟作何方計命滅此罪我曾傳聞沙門釋子有滅罪法遂詣鷄園於其門外見一苾芻徐步經行誦伽陀曰若人造重罪修善以滅除彼能照世間如日出雪翳時大天聞已歡喜踊躍知歸佛教必當滅罪乃往一苾芻處本是窟外僧投彼出家不審撿問遂便與度受戒之後還名大天聰明未久之間便能誦持三藏文義言辭清切善能說法波吒釐城無不歸仰時無憂王聞已數請入宮供養請令說法乃誑王曰我是羅漢入王宮多見嬪妃夜出僧坊夢遺不淨而令弟子浣所污衣弟子白言我聞羅漢諸漏已盡師何更有斯事大天答云天魔所為非我故作汝不應恠然則漏失略有二也一者煩惱漏失二者不淨漏失若煩惱漏失羅漢已無若不淨漏失羅漢由有且如佛在日諸羅漢等煩惱雖盡豈無便痢涕唾耶又諸天魔常於佛法中而生憎嫉見修善者便生壞之縱阿羅漢亦為彼嬈問如此說有何過答漏失實有二種若煩惱漏失即是五部下煩惱貪愛等不淨漏失與便痢一般今大天夢失不淨正見煩惱弟子本意問之反將不淨漏失而答斯成誑惑結第一妄語緣也又彼大天欲命弟子歡喜附近矯方計次第授四沙門果後時弟子看諸聖教說云羅漢應自知如何我等都不自知大天告曰然所洪亦有無知汝不應恠然諸無知略有二種一染污無知二淨不染汙無知若染汙無知羅漢即無不淨染汙無知羅漢猶有是以汝輩不自證知問如此說有何過答然則無知實有二種染汙無知即四諦不煩惱也不淨染汙無知以劣慧為體未成佛前據理皆有然今弟子所問之者正是染汙無知反將不淨無知而答斯謂誑也結第二緣後時弟子於四諦中有懷疑惑遂白師言我聞羅漢已斷煩惱疑由分別入見即除如何我等於四諦中甚懷疑惑大天告曰疑有二種一隨眠疑二處疑若隨眠疑羅漢實無處非處疑羅漢由有也問如此說有何過答然疑實有二若於四諦中不了知苦集等是隨眠疑言不稱理名非處稱理名非處於此二處不了名之為疑今弟子意正問隨眠疑却反將處非處疑而答斯成誑也又結第三緣後諸弟子因披讀聖教說阿羅漢應自證知如我等但由師語不自覺悟大天告曰然有羅漢亦由他悟不自證知汝豈不見經中說舍利弗目連等佛若未授記當來作佛等彼且不自知由記莂後方自知也汝今不應於此窮詰問此說何過答弟子正問無漏聖法都不自知今却反將他身上功能行解而答斯為誑妄又結第四妄語緣然彼大天雖造諸惡而且不斷善根於中夜時忽自思惟我未出家時曾造三逆本授佛法貴在滅除今出家後又造妄緣違於教網不知死後何處受報憂惶所逼數唱苦哉時近弟子聞之深生驚諫晨起問訊云師夜來安樂否大天云吾甚安也弟子白師云昨夜何故數唱於苦大天告曰我呼聖道汝不應恠謂苦聖諦若不殷勤喚召終不生起猶如孩子不號母終不抱也問此說何過答凡言證聖諦須自修行持戒修慧入於加行漸觀諦理乃至見修斷惑證滅方見諦故今此大天煩惱具足都未斷除豈可稱苦便得聖道生起斯成誑妄又結第五妄語緣後時大天將斯之習見成頌曰餘所誘無知猶預他令入聖道不起假聲呼此是如來真淨教文詞似異義意無殊於鷄園寺中上座苾蒭多皆滅度半月念戒次當大天遂將自撰偈詞安七滅諍之後時彼座下無學多聞修靜慮者聞此偈詞無不驚恠遂即呵止咄哉愚人寧作是說此於三藏曾所未聞或即對之翻彼頌曰前三句如上云云段最後句云此言非佛教於是竟夜鬪諍紛然乃至終朝朋黨轉盛時王聞已亦自生疑尋白大天就是非我今當據何朋大天告王曰教有明文若欲殄諍依多人語此僻用律文文中三種行籌若和上老宿在如法朋中即顯露行若和上老宿在非法朋中即耳語行若非法人多即須作亂起之法今既非法人多合作亂起去今令依多人語行籌豈非僻用律故爾時無憂王令僧兩朋別住行籌於是聖眾朋中耆宿雖多僧數稍少大天朋內耆年雖少人數猶多執非法籌既多王遂從多依大天語呵伏餘眾事訖還宮爾時鷄園諍由未息後隨異見便分二部一上座婆沙云是窟內五百結集者取迦葉上座立部名二大天部謂大天本師是窟外僧人留𧜟大林中結集凡聖共集名大眾今取茲三部名故其時雖分二部亦且同在鷄園時諸聖眾欲捨鷄園趣於他國時無憂王聞已遂生嗔忿載以破般赴殑伽河擬溺諸聖眾聖聚竊知遽相告報此是命難宜各運通攝未得通亦令自在猶如鴈王凌空西地而去至迦濕彌羅國棲山隱谷王聞已深生慙恨遣人召之令歸本國諸聖眾𥗫不從命也後於彼國廣造五百所伽藍種種供養王勅大天段經不復如本而不離鷄寺其大天後遇一相師云此釋子却後七日必當命終弟子告師師云我知分矣遂令遍告王臣過七日後入般涅槃聞者悲戀過七日外果遂命終士庶備辨香油柴薪欲共闍維供養以火爇隨至隨滅又遇此相者到來語諸人曰此不勝消此香油之類宜用糞穢之物涵之乃用其語當時炎熾焚燒並盡暴風隨起飄散無餘分部之由因茲敘述西天二部至今俱盛上來明分二部已竟第三分二十部者謂就前二部中分也大眾部中曲分九部上座部內分十一部又於二十中皆含五部名或偏執等不定今欲分之先勒成頌曰佛滅百年餘真部云一百一十年也二部本初破謂上座大眾二部奉經侵四百分二十部終大眾部二百年間上座三百年初分真侵到四百年二十部皆竟於中初大眾於二部中大眾初分四破從成八大眾部前後四度都分成八部枝條初後各三宗第一為初第四度為後如是初後各分出三部三部也二三皆唯一第二度第三度皆但分出一部故云第本部成九謂根本大眾部并八枝條合成九也分從二百年謂二百年末三百年初也上座時分七前後部七遍分從三四部分謂從第三犢子部中分中四部一時頓分也餘單五六宗除第三犢子部頓分四部外前後六遍破每遍但分出一部故云餘單也本末成十一上座部是根本其餘枝條名末都十一如下云云初分破已各擅一方行已上略引偈文竟又宗輪疏云如是傳聞佛薄伽梵般涅槃後百有餘年即真諦云一百千年後分云也去聖時淹如日久沒佛在日如太陽赫日無幽不燭既入般涅槃如日隱西山故云也摩竭陀國拘蘇摩城王號無憂纔攝剡部感一白蓋化合人神亦有作治字也是時佛法大眾初破謂佛滅後一百年中王號無憂力䣫鐵輪雖無輪現感一白蓋常在於空以表王之治化德也當此之時最初分部問何故大眾先分答基法師云大眾部中凡多聖少上座部內凡少聖多所以二中大眾先破也論云至二百年初大眾部初破流出三部一一說部此部主說一切法皆無實體但有假名名即是說亦不簡有漏等皆無實体唯有能詮假名於能詮不無兩詮實体既乖本有故忘此名二說出世部此部主說世間有漏法皆從顛倒起顛倒不實但有假名若出世法非顛起則有實體故云說出世部也三鷄胤部婆羅門姓也梵語矯短胠此云鷄胤上祖是仙人染鷄而生部主是彼苗裔唯弘論不傳經律也前頌云初後各三宗此是初三宿也次二百年中從大眾部中復出一部名多聞部謂此部主廣閑三藏深悟佛言從德立稱又佛在世時直無學名祀皮衣未出家前曾作仙人在山苦行常披樹皮祭祀天神故出家已後聞佛所說深法記持不妄乃於雪山入定不覺佛入涅槃從定而出已是二百年見大眾部中唯弘淺法此師乃誦出佛在日深法中有同處因乖諍故分也次二百年中從大眾部中分出一部名說假部此部主所說世出世法皆遍假實故三名也次二百年滿有一外道捨邪歸正亦字大天於大眾部中出家名聞精進住制多山與彼部師重詳五事因有乖諍分出三部一制多山部此云靈廟處此山多有靈跡塔廟部主先住此處便以為部名也二西山住部在制多山西也三北山住部制多山北已上是後三宗如是四破成九部初分三宗後分三宗二三兩宗成八并根本九也上分大眾部已竟其上座部聖多凡小二百年內和合一味至三百年初有小乖諍分為二部一說一切有部謂部主不簡有漏無漏世出世過現未來三世皆有實體至於龜毛兔角亦是實有此傍執前十誦宗二上座部轉名雪山部謂有部起時多弘論藏能伏上座上座劣弱移入雪山雜爾無是根本不可言分今且據移入雪山義用分故是以為二也次三百二十年從一切有部分出一部名犢子部此云律主姓也上古有仙染牛而生故今是彼苗裔因立名也次三百三十年後從犢子部中分出四部一法上部即部主名也有法可超眾法之上故也二賢胄部賢謂賢和胄者胄族苗裔之稱故也三正量部謂權衛刊定名量量無疑謬名正部主自言我法無邪謬此明了論宗也四蜜林山部部主住近山林密故從居處立名次三百八十年從化地部中流出一部名法藏部或云法蜜部謂生含容正法如藏之密此師自言我襲採菽氏為師謂日連也採拾也菽者眾苢也上古有仙拾眾苢而飡得道目連是苗裔也此傍執前四分宗因有人云四分從五分中流出也謂前法藏部是四分元從化地部流來以化地部是五分律故今詳斯解未究根由前化地部但是偏執五分之宗非是五分律法藏亦然名同發別四分一律始終不分可以思之也次三百年末從一切有部分出一部名飲光部或名善歲言飲光是迦葉波姓上古有身真金色部主是彼裔言善歲者部主小名歲便有賢德故德以彰名故也此傍執前解脫律宗次四百年初從一切有部分出一部名經量部亦云說轉部部主依經為量自言我以慶喜為師今小乘中經部是此也言說轉者部主說一種子現在相續轉至後世此成論宗四分依此假名許有種子義也如是上座七破或八破本末別說成十一也今四分律五部之內曇無德部所收二部之中上座部攝二十部內與法藏部名同即非二十中律也又准續高僧傳云上座大眾剏分結集之場五部十八流宗百載之後僧祇是根本大眾所傳非是百載五宗生也統敘五部支分此方已獲其四若據攝末從本此方獲其一自餘群部多是西土賢聖贊述行事其中聚類自有區分辨扸不可備述上來收科云云總是分部竟第四譯翻時代製作之由者謂前之三段多約以明未審教傳此方初是何人翻其字譯彼梵音初以弘揚是誰為首製撰義疏起自何時造鈔興由復為何事如斯道理全未論量故作此門略中解判於中分二初明翻譯年代次辨製作之由兩段初也若據通論自漢永平十一年佛法東傳騰蘭初譯四十二章經佛本行經十地斷經等直至巨唐乾寧二載乙卯凡經八百五十四年中間緇素翻傳聖教二百九十餘或是西土賢聖傳至此方或是土高人往彼求請所譯教文五千四十餘卷不可具敘今且據四分一律以明翻譯者若據飾宗及搜玄並云四分有兩譯廣引傳記蓋是不究根原覽即知非不勞具錄云云如彼今依正解准高僧傳并諸經目錄但云覺明三藏後秦弘始十二年歲在丁未即當東晉義熈五年時有佛陀耶舍此云覺明是罽賓國人婆羅門種也來到長安先誦曇無德律校尉姚爽聞秦請誦梵本秦主姚興親迎別立新省於逍遙園內四事供養悉皆不受至時分衛一食而已耶舍髭赤善毗婆沙時人號為赤髭論主口誦梵本到於秦地與凍明沙門竺佛念對譯秦言沙門道含筆授至弘始十五年壬戌畢軸三十五卷後分成六十卷秦主賜絹萬疋悉皆不受道含佛念各千疋其三藏資具滿三間屋並不關心秦主乃為貨之於城南造寺一所即今草堂寺後辭還西國至罽賓國附得虗空藏經一卷與凉明諸僧後不知所終文只如此並無兩譯之說從姚秦弘始十二年丁卯歲至今乾寧二年乙卯凡四百八十八年矣次製之由者謂此律本雖已翻譯全未流行時有元魏法聰律師本講僧祇後自考身中得戒本因四分遂罷唱僧祇剏弘四分手披講解未有文疏後因北齊道覆律師即聰之門人隨聽隨記乃纂疏六卷即四分律疏之始也乃至隋末唐初近十八家其間卷軸多小不定莫非並依律文次第消釋也云云問前代既有疏抄不小南山何故更製鈔文莫是政乎異端強生穿鑿否答但為古來疏抄文繁隱略未可逗機致使今師斐然起意貴臨機有用行事無疑卷約行分篇隨類聚言過二十餘萬隨撿依行廣在下文總序中述時即唐高祖武德九年丙戌六日起手入十年正月一日改貞觀元年處即終南山豐德精舍苧麻蘭若也再修時處者大宗貞觀八年甲午歲何中府隰州益詞谷因游虗跡暫道幽巖栖禪寂定觀前述作審定文辭遂乃重修并出注戒本羯磨跡等今所講解者是後修之本也從貞觀八載至今乾寧二年乙卯凡二百六十二年矣上來辨製作之由竟上來二𠬧科云云惣當三章料簡玄談竟開平五年辛未凡二百七十四年矣
