body:
  text: 吳越國長講律臨壇賜紫清涼大師景霄纂背請戒緣中辨施粥諸記多説不著今依大德引僧祇律都有四人一佛初成道時難陀跋羅二女施香蜜乳粥二在阿那頻國沙䨲長者施稠粥三毗舍佉母四難陀母四緣中上二未有呪願文第三毗舍佉母施粥時佛便説偈也偈云持戒清淨人所奉此明所施田諍堪消物供也恭敬隨時以粥施此明能施心淨十利饒益於行者此總標數也色一力二壽三樂四詞清辨五宿食六風除七飢八渴消九更有大小便通適略而不説成十也上依法寶科此十利若搜玄將色力合為一却將詞清辨分為二便云一者詞清二者辨説無理甚矣未可依承或有云色力開為二依法寶詞清辨分為二依搜玄若爾并大小便即有十一利也違戒疏文思之是名為藥佛所説結前行施能益於他若生人天長受樂明來報也應者已下結勸施僧云施至三十一者釋名牒舉鈔文云云云五緣至也者無因緣者引律解也無病及請緣也然病人苦惱去則增劇住則有益施主體之不生譏故開之律中不問正食不正食俱結也云不犯等者若請居士請大住我當與食我等為沙門釋子故設此宿處食若不得沙門釋子亦當與餘人也此即諸檀越共請住也若次第請者即是各各請也律云若兒女姊妹及婦次第請食無犯此謂一家多人為次第請一家尚開多家理得云展轉至三十二者釋名牒鈔云云云十誦至者四分名展轉食展前家轉至後家十誦名數數食僧祇云處處食也總一判為背請戒者謂皆前向後故大德又釋今云背請準戒疏意有二義故一則道俗通知二則攝義得盡答云展轉處處隨名則局也云五緣至犯者無因緣者謂病施衣功德月等五隨咽犯者不待飽也戒疏背請有四句初前後俱正提二前正後不正吉三前不正後正不犯四前後俱不正不犯云律中至大同四分者戒疏云既列二請俱有背罪若受請已自食或食僧食彼生惱微不犯背罪先許後違但犯吉也注稠粥亦是者下文自釋也僧祇等者彼云有二比丘各各別受一家長請第一比丘語第二比丘言長老今日共到我檀越家食云其第二比丘應白自檀越若不白輒往得二罪一不白請家二犯背請大同四分者彼不白請家得提四分不白同請人得提故云大同也其詞曰大德一心念我某甲先受某甲請今有某緣事欲入某聚落至某家白大德知云又至家者戒疏云所以開病者病人苦惱施主體之苦也不形命難濟既非情願不作時限施衣時者有二利故一為濟比丘待形施時不取後須難得恐非理乞損業煩他二謂益施主衣食兩利俱得反報又多論云前家食請後家衣食聽背無罪二前家食請後家衣請取衣向前家不犯向前家竟曰不食違信結吉三前後俱食背前犯提又有三句前後不食請聽背不犯二前家食衣後家單衣如前第二句説三前家衣食後家單食皆前犯提若一日受衆多請等者此律要須實捨與人不令施主有虗設費若準祇五二律即開心念假設方便開防背罪五百問等者若主人慊代此約別請若僧不請即代得也不得隨病食者隨其所病宜喫不得何食或食冷或食熱或食兼惡非病所宜聽背前向後所便處食也不得至第四家者多十二文開病者背不至第四家此律但言開病者不堪一坐食乃至既非情欲不作時限並不論數多少今引他宗不至第四恐乖節儉之行兼涉無窮之過云律不犯等者不正食華果細磨等食少不足是殿乾飯少而不飽無請者既無請處食今犯何或食已更得食者古解云受前家食已更受後家食或容犯足不犯別衆此非解也玄云或一處有前後食既同一主異食亦無背罪必不壞威儀亦不犯足案斯一釋猶可下言不壞威儀亦不犯足者此時未制足食戒何畏犯足思之云別衆食戒三十三者釋名者戒疏云但以能別之人食處成衆以衆別他不與同味故衆處得罪若爾所別之處豈無衆耶答所別之中一人亦犯若犯約所別名衆者則𧮤他能別非衆亦犯今律據能別之人故云別衆若據理合云衆別食今從本意故云云此是所防云然至不集者先引律中別請次引初緣謂今師先於律文中搜求有幾種犯境七處所明皆約別請乃兼緣起別乞只有二種又乃文繁難以尋是以鈔主先永求初緣貴在易知後方引也謂律初緣因調達害佛後教闍王煞父惡名流布利養斷絶遂則通己五人家乞食故制戒制戒之後諸比丘病乃至沙門施食七種別請皆語請者云但請三人我等不得別衆明知此律只有二也所以不論不集者既言但請三人明知戒內更有多人但不滿四食處不成衆即不犯都不論集與不集也難調人即調達是多論明界內不集等者約其多論若界有人不集即成別衆亦名別請別乞四分之中體是別衆不論集與不集多論於此二中有其集犯謂僧並坐亦名不集犯若作遮心界內無人亦犯故鈔云亦有別請別乞不集僧次即約有容來遮即成不集別衆無人不遮不犯故云亦有不集者云今至別者開兩章也今分三相者約其當宗他陪分為三相一僧次二別乞三別請也各明犯緣者上三各有別衆故云各明引證據別者引其多見二論證據三前各有集不集別相也云初至犯者謂上來三相各有犯緣今但列僧次七緣別請別乞亦有七緣例取此七所解但改別請別乞之名為異也云多至次者二處設食者謂於僧界內別向二處院中設食此二處須向布薩處請一人表請同或送一分食表味同其布薩處不用請送餘二院以常住處本無別衆也自處不須展轉者二院之中彼此相望不用互送互及請若聚落界者謂自然界中亦有僧次別衆謂二施主同一自然界中各設食即打槌以表不隔作法同故若不爾互請一人又不爾者互送一分表味同故不作此三即是別衆又於此三不必具足隨一便得故首疏云於三事中但作一事即得更有異比丘入等者謂入作法自然二界也更須如前作三相中一相也或先僧次等者謂無是僧次請來而上二界外更有清淨比丘入來未曾食遮不許集即此僧次變作別請別請體是別衆若不遮等者先雖別請由無遮約變成僧次以僧次體非別衆今既不遮無別衆過即成僧次也如上等者謂如上二界互送互請辨其作相如是立法明其僧次無界內不集之別衆也云別乞至故者四句如下引證中廣説也同一主故同時受食犯者先出論意謂或四人同時乞或各各別乞各不相知雖先後而至前家為受食同一主故犯多論無犯者約散乞一處聚食不犯律據一家併乞共食便犯云若別請至犯者應令作法者恐此唱令名為作法如下自述若準此言等者謂準界內無人亦犯之言也未假界內不集者謂若作遮意未假界內不集方犯設使盡集亦犯次第並坐者證前別請雖則同集還成別衆如有施主別請四人共在堂中食施主但供四人不與僧同味亦犯別也若欲無過且喫僧家食一口後食施主食但成益食不成別衆也下廣證中更明云準此至俱結者準僧中並坐成犯之言僧次一種唯局不集者謂僧次請來要須界內有人不集始犯別衆必無人不犯別乞別請體是別衆衆不問界內有人無人若集不集但食處成衆皆犯也云今至常有者約緣者約七種緣也隨相者隨三種相也通而辨之故曰總明大德又解據理僧次別乞別請每一相中皆具此七三七合二十一緣今鈔慮繁但向此總科不更列故曰總別問約緣隨相如此總明意為何事鈔釋云令人已下具也云初至上卷者可知云二至種前標中云總明今此即是總意也云先明至中者能別僧體也此體未論四人但據自行以説也即是僧次者體淨之僧有別此僧即應去呼僧次顯惡戒非別不應僧次以羅漢法請人者是羅漢知我明日設會即降不更一一標名也云多論至得罪者長請日限即二請也隨意請人明是別請大善無過者既不別請一切無遮凡聖普心何善大也不能無遮者謂施為限不能不遮門師比丘勸化施主令唱作法勸六十臘表是上座一夏及沙彌表極下座從上至下但得一人此別請及遮變成僧次無遮盡施主請期並無過也不作二法者玄云初日無遮是一法唱六十夏入是二法不清淨罪者謂提罪也設有續供即前唱法不須更唱者大德云此據從初日相續不斷以説唱法即許不失若中間暫停十日半月即須已後更唱前法已壞也僧房臥具者謂僧物有限不許更過理須唱召來者共用也此謂施主於僧寺中別請別院而供養者故有此文若在俗家則無此事知之云若施主至之者謂一大界一施設食堂小坐不足出外坐者無犯處雖有異以食味同故二處僧祇者玄云是法同食別界雖二處食別仍同一説戒以布薩處是衆同之本無過不布薩處別彼布薩處即有過生須請僧次一人不然即送一分食若不爾者此僧犯別衆罪若施主別請僧次四人等者前來且約一界二處僧祇以論今或有施主外請僧次四人入僧布薩處此謂人從外來食在當界也或將食入界別請比丘者此謂食從外來僧在當界也約此二處正食之時界內有僧不集俱犯別衆人適來文中云別請僧次比丘者是別請僧次四人非謂標名請一人也故文云別請僧次四人之例若爾既是四人成衆何故文中言別請比丘耶答經論文中多約比丘以為衆也或可為簡尼等四衆故標比丘若是一人即何須作法人多迷此思之應布薩處請僧次一人等者此謂設法離過也若道界遠者此約一作法界三由旬即道路遙遠故先取次第行者以表先食僧食一口後行此之食義同添益故耳云若至不者聚落界內者謂可分別不可分別集僧分齊説也無僧界者無作法界一向是自然於二處食者二檀越舍並六十三步內也應打犍捶已下設法也可知應好隱悉知聚落有無者應須作是隱悉若聚落自然界四相周匝即等聚落若自然四相不周縱廣六十三步已上二處或有比丘在內是別在外非別不集無失或有人妄解即成惑亂知之云或至等者僧次若遮變成別請別請不阻變為僧次乃至唱一人等則上作法請僧次一人也斯約兩請互明轉變也云善見至犯者別乞四句者總標也或四人一時乞者謂四比丘一時行乞共見一檀越語云與我四人飯檀越即許或別別乞各不相知者謂四比丘前後行俱就一檀越別乞與我一人飯如是四人各不知是一檀越而同一主一時往受食犯者通釋上二句也或四人一時乞檀越既許四人一時往受食或別別乞雖乞時各不相知然然檀越既許前後至來雖異而受食時亦同也辨初句竟二各去一時受各處食者謂四比丘共乞檀越許許四人遂各各去檀越家己一時受食還歸各食四分不犯墮者謂四分約食處成衆即犯今既各食非衆故不犯也論但據同時受食即犯不論食時成衆不成衆也三各去各食不犯者謂四人共乞如四人各去檀越家各受各食律論並不犯食處不成衆故約律不犯又不一時受準無過四別乞別去一時受犯者謂四人前後行俱就一檀越別乞與我一人飯檀各許各許前許者前去至檀越家後許者後去至檀家雖前後至時有殊而一時受食故犯已上四句準論中三句犯準第三句不犯若依律文初後二句犯中間二句不犯外難初句中別別乞一時往受食犯第四句亦是別別乞一時受食犯若為取異初句便在施主家而食第四句將還別處四人同食也此段鈔文甚難曉之上所解判並依法寶若依玄將別請別乞通為四句頗至周遮況此文勢但引別乞未論請既不遵用不更敘録且據正義如前云義云至別衆者謂本是僧次請來體別衆由遮門外比丘不許他入此僧次乃變成別請此別請體是別衆也後食時不論門外有人無人俱犯也寶云若定名者此由名僧次別衆若門外僧已下今師準此僧次已變成別請之義若門外僧雖在六十三步外但食時有遮心若定名者此乃呼為別請別衆也多論但云僧次界內不集成別衆不論界外六十三步外有僧是以鈔主約義明之成其別請別衆也或有解云此言外者望家內僧得外名非謂六十三步外若在自然外有何犯耶此釋全不見竟云四食處成衆者牒舉犯緣也云善見至比丘者餘三竟者待三人食竟後一人食即表不成衆多論四句鈔引三句更有三比丘在地一在空也殯已下釋成不別之義云多論至也或共一處食不犯者各持己食共處而餐若四人各自乞共處食亦無犯若爾律文何結犯耶鈔引律云據一家併乞四人一時受食犯必如論中即無失也云人有至墮者食一處二味同無犯界內有人遮不與食二處俱犯此謂露地者解上文也在露地者須申手內若在外者即是食別同第四句故須簡之局成第三句要令處一取此四人並時露地須申手內也覆處不假相接自然成其一處也云五界內不集者牒舉犯緣也云五分至故者五衆往者莫非皆是為解脫出家故僧結界者作法僧界也聚落界者自然可分不可分也家界者亦約人家六十三步説也曠野者五里也一拘盧舍者道行六百步也注文上沙彌等非別衆者準論狂殯沙彌三人非別古來有破鈔者云不與沙彌及殯人食是盜僧祇不與殯元非犯也以財法俱已故云除惡戒等玄云鈔總相而言此文偏據沙彌請來免四比丘已上別衆上之狂殯且約添成非別耳云四分至得食者別請別乞論並同故云如律但加不集僧次請來同界不集如前列也故注云如上所列善見五種足四不犯者注文此請狂癡者簡濫故下開緣中腳跟躃病體具足自身雖開餘三是犯今則不爾也問曰前文列緣具七戒犯今此隨釋之中何故但解五緣闕五正食狂時中及第七咽咽犯緣耶大德云咽咽犯者皆緣所食之物是五正食則犯若非五正亦亦無咽咽犯故所以將此兩緣通在前五之中解竟尋文自曉不可更重列釋思之不因記家云鈔文省略也云律中不犯開七緣者如戒中是也云一至是者施衣時者通十二月中隨有衣施處總得道行為四船行為五次途中多難正行則開暫停亦制何以得知故十誦云昨日來今日食提即日行別食不犯船行亦爾人多迷此意知之云六大衆至也者戒疏準留陪尼律中不白大衆知廣釋文中云大衆者謂四人若過也食足四人長一人為患等者此緣兩家聚落東限與四人食西家限與一人食彼此二家施心限局各不能通融既是儉時諸處乞食復是難得若不開者西家一人與東家四人作患由是患故開令不患患字訓犯如是乃至百千人長一人為患者但使食是難得悉開不犯是名大衆集時注文可委已上且衣戒疏申於此解更有釋者慮繁廣在大記京者天子所都之處訓大也輦者帝王所乘之寶車謂不能舉其上尊之但指所乘之物如云陛下亦指所坐陛之下等今此亦是也鄙俗者鄙惡聾俗漢子之人秦坊酒肆之中餐噉由自命客均分飯食𣫍迹者勸莫行此事也廣如訃請中者指下卷就座命客法白施主令入乃至指示某僧坊中有僧食等云云七沙門施食等者謂西土九十六種外道皆名沙門今此即準律文是萍沙王姊往尼犍處出家學道欲詣伽藍設食比丘不敢遂乃白佛佛開沙門施食聽受也此且開受緣又準五分萍沙王第二是外道沙門請衆食而力不能廣乃衆人憂愁白佛佛開聽沙門施食時別衆食云又準至等者僧次不犯者體非是別又乃不遮故五分衣時者彼文云通十二月作下二衣非謂五月一月也都合九緣者四分七并外宗二也此乃皆是開緣增一等者佛在羅閲祇城有師子長者至舍利弗所禮拜白言願受我請又至目連迦葉羅云等處請五百上首大設供養佛後問羅云今日幾人誰為上座答云我和尚舍利弗為上首及諸神德五百人佛問羅云彼長者獲福多不羅云答曰得福無限若人設一羅漢尚得福不可量豈況五百佛言不如僧次請一沙門比丘十萬億俗不可為喻餘文如鈔云云賢愚經等者彼云時姨母手自紡續作一端金色氎待佛還宮以用持上佛言可以施僧得福無量遂次第僧中行之無敢受者到彌勒前便乃受之著已入城乞食衆人皆看金色袈裟無有猒足云律至吉羅者自益者謂自己有利益也注中益他或別者此中益字訓傳也鈔文有緣白入無緣白入出所以出入須白者入謂護家內比丘出謂護檀越莫不俱為於人心況生疑怪也若不白違制邊犯吉更有別解不正云不犯如上開者九緣皆開也可知云取歸婦至三十四者釋名牒舉云云犯者上二緣者一歸婦二估客也無緣者病時開也今無病緣過三鉢者多論有三品鉢上鉢取一不犯二則犯中鉢取二不犯三即犯下鉢取三不犯四即犯今云過三鉢者是下鉢也若一人取過三鉢犯若四人取過三鉢前三人不犯以不過限故後一人犯以過故云足食戒三十五者釋名等云云云五緣至犯者如文云律至咽咽墮者此五本非具緣自是律文廣釋之中波離問佛有幾處應足食佛答云有五處約知成足更食即犯鈔與戒疏並呼為緣知持來緣乃至第五知捨威儀緣等云僧祇至不成遮者四不復受益者鉢中之食既可飽足更不擬再受益也注中少一口已者據食欲了只欠一口故云已也便言不作斷心者戒疏云有人解云境飽足者謂我飽食足我食未飽雖起重坐得食無過此非正量者準理門論量有三種現量比量聖言量各有似正今既乖文則非聖教正言之量食無飽期者若任凡心待飽何時飽足也斷此四句分別一食足境不足謂不正雖飽未犯二境足食不足是正食少三食境俱足是正食多食一口亦犯四俱不足不正食又少開飲漿者謂漿以非純正開飲滿足糒者音備説文云乾飰也輔篇云取乾飯炒之然後磨以篩之為末十滿中愛作糒也餘同四分者謂飰魚肉也者大德云將麥蒸蒸了鎧之以水浸浸了却炒似麥飰也有人不會即妄説云將麥炒了舂磨為名之為錯也𢇲者靡皮反謂關西荊州呼為𢇲若北人冀州等喚作穄此間亦名為穄又於粟米許䵃麥者大麥也莠子者稗子錯麥迦師者錯麥是此土之言即小麥迦師是西梵之語蓋雙舉也一根者一切草根也五果者第五是果子也僧祇五正同此者謂五正名體大同四分祇無乾飯也五雜正者祇中喚不正為雜正即如四分枝葉等即非正食處處食之無犯足又無別衆説正名不正名者若云米粥是正即遮但云葉粥不正即不遮也云義至遮者約境立名不論飽足時有等者謂有年少見上座來不起犯罪故須陳意也尼不恭敬僧戒中者謂尼行八敬見新受戒人亦須起來今為一坐食雖見不起便陳情言我不作餘食法白已即不違敬法也僧祇八遮者一自恣足檀越自恣與五正食及雜正等自恣勸食比丘言我已飽足如是起離坐不作殘食法提二少欲足檀越與正食比丘動手現少欲相如是離坐不作殘食法提三穢污足行食時淨人手有瘡疥與及身衣不淨比丘惡之言不用過去如是離坐己不作法同前四雜足者淨人持乳酪器成飯行比丘見惡之語云不用五不便足淨人行食比丘問云是何食耶答比丘云發風我不便過去六諂曲足淨人行五正食雜正等比丘搖頭宿鉢作不食相七停住足淨行人五正食比丘言莫先行飯且行餅果之類八自己足比丘先有寄在檀越家從檀越素水擬和白衣問云須不比丘意謂越與我水白衣却將比丘囊授與比丘見是自己者心中愛惜乃言置地以我不須如是捨威儀己不作殘食犯提舉急況緩意者四分約受得已入手食一口已號名境足祇文並未入手及食但口中説等便遮於後故也云四分至加法者僧俗二食俱得加法者律云時有比丘早起受得僧食也置入村彼受請還餘比丘邊作餘食彼或分食或都食盡此僧食緣也時有比丘往檀越家乞得食不知得作法不佛言得今鈔準此故云俱得也云若作至律文者覆藏食者粗覆與者上恐對首人食之云五分至不成者尼具有殘食法者破古云尼是女類食不消化故無食足犯今云不然尼律開通文自明也又五分廣辨僧殘食法竟則云比丘亦如是也此依戒疏釋云義云至戒者約期作法為食一口準如他部若都不食云是我殘得者準此義今食未竟不須作法真云我殘與汝得成此據前人欲得食若知前不欲強勸犯得戒也云律至犯者不受作餘食法者此約一向不受謂從旦米未曾受食餘如文云勸至三十六者釋名云云云五緣至犯者消文竟依戒疏云此與前足食戒何異而分為兩答前戒自己犯此戒自他同犯又有四義故開為二一前戒是身犯此戒是口犯二前戒病緣乃開此戒無開三前戒是貪心犯此戒通三心四前戒是自食犯此戒他咽食以空犯故云非時至三十七者釋名所知云智論至故者彼第一因解如是我聞一時義破蕩時相不可得故因即問云若法無時等此約真諦發問也意道真如理性本無時節云何約時而制遮非時食為戒耶問竟答中我已説世界至不應難者論意我先來已説俗諦世界假有時名字法雖有而非實汝今不應將真諦來難我俗諦也亦是毗尼中等者謂毗尼結戒約世法故為衆生許時為實時即不可非時譏責如迦留陀夷即是其事如以來遮非時而結戒以護人心也亦欲護佛法等者謂佛結戒令正法久住見論亦云毗尼藏但佛法方住等定佛弟子禮法者謂外書制禮是俗中禮法今佛制時食軌儀是佛弟子禮儀法則也上依玄釋也寶云要定受戒時分夏臘三時入師房求教誡等此解局也故世尊等者謂佛結戒防譏不應求世間名字與真如理性辨相應不相應也若爾等者領解前旨也實時不説者釋也謂理本時毗尼教中不得混亂若白衣外道聞説真諦無時即生邪見也又真如理性小聖尚不能世界時分多人共解故曰以通多分故云今至故是毗羅三昧經萍沙王問佛何故日中食佛言早起諸天食等今制日中斷六趣因故又表是中道七佛所行也並如文可委云多論至及之者又云等者謂前據粗相而論今更細辨且西天有三時亦約十二月分之從十二月十六至四月十五為春從四月十六至八月十五為夏從八月十六至十二月十五為冬今此土四時亦約十二月辨但加秋也於此四時日月晝夜長短不定夏至日日極長夜極短冬至日日極短夜長春分秋分二日晝夜平等降茲已外延促不定今若辨時非時鈔云晝夜各分九時而同須臾者意將多論晝夜各有九時同於僧祇俱舍三十須臾也今先明須臾者故俱舍云百二十剎那為一怛剎那十怛剎那為一臘縛三十臘縛為一須臾三十須臾為一晝夜今春分秋分二日晝夜平等各有十五須臾從旦至中七須臾半是時過中已後七須臾半并夜十五須臾都二十一須臾半俱號非時今多論有九時從旦至中四時半名時過中已去更有四時半并夜九時都十三時半俱號非時也夏至日極長俱舍有十八須臾於中九須臾名時過中後九須臾并夜十二須臾都亦二十一須臾名非時冬至日反説即是云云中間諸日促不定可以準知多論日夜十八時亦類此多少問多論晝夜共有十八時僧祗俱舍晝夜共有三十須臾其數不等何故鈔文將多論十八時同他俱舍三十須臾請為和會大德釋云俱舍中三十箇臘縛為一三十須臾為一晝夜且一須臾既有三十臘縛十須臾即三百臘縛三十須臾都九百臘縛若準多論一時即有五十臘縛十時五百又有八時五八四十即四百并前都計九百臘縛雖則十八時與三十須臾似有參差然彼此總是九百臘縛不異故云事同須臾也諸記中並未委此義但是誦語消文或有云約冬至夏至日極長極短時如僧及俱舍須臾不別此解未恐未了玄意別不更釋之日下近地等者約日行南道近氷山上過同於近地熱漸退寒漸增非謂也下日在須彌半腹平轉故且天上有一百八十道夏至日在此第一道行行此後一日向南行一道越四十五道是立秋更過四十五道是秋分又過四十五道是立冬又過四十五道是冬至在南第一道上日有十二夜有十八從此却向北行經四十五道是立春又四十五道是春分又四十五是立夏又四十五是夏至此日有十八夜有十二也夏中熱者蓋以日行北道近須彌及七金山金性熱又去人近又南州北面闊攝日光多故冬寒反此正法念又云冬日極南海有氷山此日近氷山山之地故二十四半月之相者謂一年十二月分為半月即二十四也準俗二十四氣量之者俗中有二十四氣一氣亦是半月日二十四半月即成二十四氣也若作腳影事同上經準腳影之步身為度且如正月一日至十五是一半此十五日準氣合為用步身影長九腳半為時步身影長七腳少三指為非時從十六日至三十日是第二氣此十五日九腳為時六腳少三指為非時如是例之不能繁録若作尅漏者戒疏云唐國漏分為百尅出家時節晝夜分百尅夏至極長晝六十夜四十冬至夏之極長晝十八夜十二者約夏至日也長夜夏之者大德回文云夜長反之即夜十八晝有十二約冬至日説也云四緣至墮者如文云律至墮者四天下亦爾者謂四天下皆以午前而齊也今時日月則一日一夜匝四天下如南州日出東則日沒北則夜半如是遷移比對可知若有神通者於此方食竟更往西方食不犯如是一日中得四度食不犯由是午前故也日正中時名非時者謂僧祇律自有一須臾名曰時非時於此中食犯吉也有人破鈔句云日正中時名時為一句非時若食得吉以彼不同四分非時食犯提此全未達意非時漿等者戒疏云口手二受明相未出受法不失名之為時明出失法得罪不應服名非時也蘇油口法未失名時八日時過失法名非時盡形藥有病加服名時無病輒服名非時注文以曾加口法無病不許服者通釋三藥謂上三藥有法時在無病不得服犯有輕重者謂此三藥總名非時若更服用二藥並結非時墮罪唯盡形一藥結非時吉故云犯有輕重也若不加口法至墮者凡非時七日盡形三藥皆為病開若加口法即知為病文中牒其病緣時過病盡故不合服若但手受恐無病濫服若病服四藥並犯墮故戒本除水楊枝者此引不食戒彼明不受楊枝及水得入口中由不受故而不合咽此中引用其意即別若是非時水及楊枝為洗口故得入口中雖許入口以非時不病故不得咽也有人不體錯非鈔文得嘗食者彼律緣中諸比丘雇作人為比丘煮食或淡酸等諸比丘慊貴彼云我不能為比丘煮得以此白佛佛開煮時為嘗引此文勢釋上楊枝水等入口但不合咽與非時不病服四藥同故次引十誦至二俱犯墮者若約他宗已上所列能所俱提若四分非時殘宿能教但吉今鈔意取同犯云戒嚴制不作抑亦誡勸也不者墮者五百問文中食了須用灰等若不用恐口中有餘食味咽即犯也云中律至墮者吐下藥者吐上吐下下即痢也煮麥頭不破者麥是時藥煮不破故開喉中還咽不犯若出喉如見論也云食殘至三十八者釋名牒舉鈔云云云三犯者如文云律中至宿者玄云此有三意初正釋殘宿名二於一切下釋成不淨三四藥下通辨四藥一一如文云問至也者鈔文先對殘宿作四句後將內宿作四句為簡濫故尋文易曉然前四句中第三句與後四句中第三句如何取異故須簡之前約食安界外明日食得單提後據安界內明日食得提兼吉也有云淨地無內宿者古人云結淨竟或有比丘在淨地內共食同宿不犯若不免犯用結何為今云若不結者遍界總犯今結了界中不犯豈非是益文中除去比丘者今引律文淨地之內不許有人故云除去也故知有也者審定之詞既有比丘在中決定有內宿成犯故云律中至哉者坐禪比丘為緣起者難曰夫犯戒者皆約惡心今坐禪比丘但為者緣是節儉故因何制戒可引文答云為防未來已下釋通也忌倚道業者謂忌心謂忌心倚於真如至理本來無相便輕侮於聖戒三乘不輕戒者菩薩持息世戒與性重無別等云十誦至受者不淨殘宿鹽食吉羅者謂醎苦故體是盡形雖殘宿但制吉順正記云鹽體淨不受膩本不合有殘宿但為能顯食中味故人常須之故制殘宿若食犯吉此釋妙得文旨注文者律藥法中六群比丘以鹽苦宿不應食既云不應同是吉也不得燃火者防自煮也不得吹撓者防惡觸也注文義準者準上易淨心斷之義也應從沙彌受者玄云恐有食膩故必無膩雖觸不受理通云十誦至食者捽去者所中反説文云從上取也如單越者是無我所心之理故云僧祇至無犯者謂過中及過須臾為二時故祗云時中受者過髮瞬食者提停置過須臾者犯二提謂非時及停食此約停置若合藥過須臾不犯注文可知淨巾無過者謂不曾盛果又日別洗之曰淨也若乞食作念為沙彌者謂有未受物落中相混比丘手執便是惡提故作方便也云律至不犯者好呼亞反説文云裂痕云不受食至三十九者釋名牒鈔云云云十門至解者總列名數未勞解判云初至盡者制意緣起如文云二至故者此文有三段一明自性二求得三在此處受食即度等言此處通一切處下文明明若破戒下非能受人也並如文易會云三所對至不成者除自己者謂不得自右手過食者左手中不成受及同類者同類是大比丘不得自度與餘比丘也餘三類衆生者人非人畜生也被交者謂教他始解也本為證明若在人中餘二趣劣不能作證故牛上受食者祗云有比丘欲遠行從他借淨人發時告云我無淨人有牛若須者當取使淨人長囊盛糧食等方法如文中云云人天畜生飛鳥皆成者大德引見論云畜生準約牛及獼猴飛鳥約鸚鵡迦葉從帝釋受食者大德引五分云帝釋見小五衰相現生怖下來間問佛佛令求福施新出定僧飯帝釋欲施迦葉食乃觀見迦葉捨富從貧初從定起遍行乞食帝釋遂化作貧里織師以飯也後持歸伽藍中餐噉覺有天味遂入定觀見是帝釋施飯迦葉恐受不成白佛佛言成受引此證從天受食義也獼猴邊受蜜者祇云佛在黎耆河邊時有獼猴行忽見樹空中有無蜂熟蜜遂來取佛鉢諸比丘遮佛言莫遮此非惡意獼猴便持鉢取蜜奉佛佛不受謂未淨故獼猴不解佛意將謂有蟲乃轉四面局之見鉢中有流蜜遂持往水邊洗之水灒鉢中持還上佛佛即受之謂己水淨壞味故受今引此證上畜生成受義也輕繫地獄者十誦云目連槾陀耆池邊受食又億耳見人間日苦夜樂謂大海邊及諸山畔諸小地獄受苦不重曰輕繫也若八寒八熱大獄等即不成也餘文結釋可見云四至變者牒第四之名開泛明及想轉變兩章也云初中至互受者五種塵鈔文具列今師注云恐是細者不可見故所以不用受若粗可見者即顯須受也餘不犯者謂塵大可除餘雖被塵觸而不失故云不犯細者更受者謂有細塵猶不可除連綴於食故須更受難云前十誦中五種塵不須受鈔主釋云應是細者今此論文何故細塵亦須受耶可引下注文答通云云迸入鉢中成受者謂比丘並坐彼比丘受得食已餘食迸入己鉢中故成受若本淨人手中迸入鉢者則不成受僧尼互淨互受者玄云僧有殘觸於尼成淨尼亦反此互手遇受皆成受食形執別故順正記約當疏更洗手重從淨人受名互受非也云善見至未取者一搦者如革反取也大澤者謂空向死人處也未取者回文應言先淨取米也云僧祇至好者以臂汗流入手即當受者幽釋云額頭以離身故須受臂汗流入手以不離身才入手時即當受也注云準此等者準臂汗流入手成受額汗作意亦成也準僧祇好者謂若咽汁受方是好云二至等者生互不失受者謂薑受淨已於後生牙牙處割落更令淨非生牙處雖連生相不失受法謂先已作淨法本為防生故若爾牙家何用更淨答新有生相異本質故本防之處不失新生之處必須受也此且一釋更有解云生牙之處令淨人大一觸由手按故不失受法如人觸食促手按器則不失也可以例之此釋亦正注四分亦爾者阿難為佛祇桓門外溫飯是也記中前記識者謂酪食不盡即記識言此中有淨物生我當作非時七日藥如酪出蘇甘蔗成石蜜等雖變不失云五受食至説者地及水中者受食不過此二處若身在空中受食此二處若身在空中受食此處不成受由空無所依故如前受中者此更引論疏略同第二能受門中已述云六至諸者牒名可知云一至得者至物邊者令比丘申手自至物邊也餘文易知云二至成受者文有四句身非心者疏云比丘申鉢心緣別事投食於中不緣所受由前有心故得成也第二句中有三意初明句義二毗尼下引教證三若準下令加諸疏云若人送比丘食心攝屬心攝屬己施主置食而去除不手受此食亦成受母論云毗舍離國穀貴乞求難得神足比丘往外道國乞食外人慊其不淨以食置地捨去諸比丘白佛佛言將來著前即是與竟成受身心平等者了疏云由手授領心不緣餘名平等也曾經足名非所遮已足成遮則不成受非身心者疏文如鈔身心不關者當下食時身心與食不相關涉是非心亦成受故云三單心至淨人者單心無對者單有受心不用身手對受彼食故邪見人不與比丘食者僧祇云有登瞿國是邊地邪見惡烏故反比丘故不授食與當作滿荼邏規此云壇規地作相説文云規圓也以規地作其相全置食安中若葉蔽鉢者或以樹葉敝掩於地作相成以鉢置一家作相並得成受不相解同之者別國之人不可言語不肯授食與比丘亦如前云受受是同也火燒馬屋相五分時有販馬人請佛及僧行水已及人報來火燒馬屋彼語比丘言可自取食言已便去佛言若無淨人聽以施主語為受禪眠等者謂僧祇若比丘床上坐禪若眠淨人持食來著壞中若覺者即是受若不覺者欲食時當令人更受若不欲食當自捉與淨人等云四連絆觸礙者以物相連不得自在名為連計遙擲至物中間解上然後方落故云觸礙云僧祇至處受受者謂僧祇若比丘乞食時店肆家以斗盛與比丘斗鎖連詣計或五升四升相連比丘爾時應語施主解後諸斗已授我若鎖不可得解者即盛之授與比丘其餘升斗鎖連仍在俗世手中是名器物相連不斷或受非威儀乃至已下彼律有十門越取觸礙故云乃至也祇云淨人上樹食果比丘言與果淨搖即樹果落墮比丘器中名受非威儀若下果時觸枝葉者果下中間著枝葉淨人及比丘二心各驚故失前法應生心受受成也以無口加故者見論無口加法成受但得非威儀四分中間不觸礙成無祇更加口法也僧祇井上懸食下等者祇云蘭若比丘無淨人自抒井水食時無暇出恐水還滿令繩連食下下時并腹中有草木應避井底比丘一手挽繩一手承食口言受受但云避草木不云觸著成受不成受此是連解中觸礙也故鈔云勿突生果木者恐更觸礙淨人及比丘二心各驚故遠本下食授食之心又須準前樹上下果觸礙熏入生心口云受受不爾不成故云勿突也若屋上者扞寒旦反説文云以手扞取謂手約繩而作受取意也彼律云阿練若比丘一手把繩上頭淨人置食挂時比丘一手扞繩作其受意口云受受云十誦至受二者彼云白衣捉蘇油瓶注比丘鉢中不斷比丘生疑白佛佛言是注下流非上流不破受法此是連畔注文中國行道人者即修行道人也淨衣踞坐者謂西土之人例皆跪足足上有泥恐污三衣為淨衣故令其踞坐雙足踏地名為踞坐前施食案者即土埵埵上布草置鉢如是食也若食著葉草小停不落稱本受心成受此名觸礙受若即落者與受心違故不成也稍稍受我者漸漸授我也如一籮飯謂前舉一邊授與比丘次舉一邊授與比丘為漸漸也此謂一邊互離地由與地連絆受雖腳躡水若下鑊時要須口加云受受受此是觸礙受謂觸著所踏水上礙不至地稱本受心故得成也云五心境至中者淨人三法一知是食非二有施三如法授與比丘以三法者一比丘與淨人所授相應二為食非餘三法手授食無七過者一內宿二內煮三自煮四惡觸上四是吉五非殘宿六非販賣七非犯竟殘藥之身肥恍也五觀廣解如對施篇中也一切文句縱廣道應知者了疏中詺律為縱廣道行此道得至一切義中故名廣道律中廣明此義故曰應知解云已下是了疏解餘一切文句者謂除律五篇正制已外所餘防護正戒文句廣其正制名縱廣道即前列五句觀食法是也故制令應知疏解出家人受食等是律正制不受得提先須觀門然後餐噉望正制戒本此觀即為縱廣道也云八正受至得者如文云凡至法者牒名也云一至污者鈔文都六段過時法滿更無有受等者如後第十依文解中非時七日過限亦隨等文也謂時已過法期又滿此中更有口手二受也此謂時中記識者會前祇文若不記識轉變即失受也注文非謂有污者古師云淨水恐手上有穢污膩觸也今云但表淨心如瓶沙王女施園金瓶行水何處手中有污云十依文解者牒名也正依戒文解故鈔闕具緣今依戒疏具緣犯一是四藥二輒自取不受三食咽犯云四至吉羅者謂無前病緣不受而食得吉何不犯提以有受法在故不犯提為無病與無受之緣不相當故不應也云不犯已下如文索美食四十者釋牒鈔云云云四緣至犯者美食者多論云以價貴難得能愈病故有四句一美是食非美藥乳酪是二是美藥非美食生蘇油是三二美食二美藥肉晡冥是四非美食非美藥訶梨勒是云祇至重者謂肉汁堪煎作脂能治風病喜往乞也八種乳酪者祇云無病不得往得作蘇家色乞蘇押油家採蜜家筆笮甘蔗家乞石蜜養牛家乞乳作酪捕魚家乞魚屠兒家乞肉犯重者五百問喚提作重也云律不犯至一切得者如文云與外道至四十一者云五緣至犯者一是外道者戒疏云是出家外道以在家者但犯小罪由出家名同真偽難別生人惑倒故重三自與食者律開親里父母恩重若據祇中尚乃不開縱與須使淨人若慊責但答云出家人不得佛已制戒若不食亦隨意非置地使人者以食味是通理共獨食置地使人不生惑倒故開云五分至與者無見人者空見人也此人不分別勝負好惡彼此不取僧過也云不囑至四十二者釋名牒鈔云云云五緣至犯者食前後者謂大食小食後若大食入聚如下戒條非此犯也四無緣者謂迦提月施衣作衣白已去皆因緣云僧祗至白施主者二墮者如上背請戒一不白請家二是背無請得二提也義準者今師約一人之義無同請者即準背請戒中若乞食在諸家即自白施豆若在寺內即白淨人施主後來問其淨人即知去處祇云有二比丘各各別受一家長請若一比丘語第二比丘言長老今日共到我檀越家食去此即是請第二比丘應白本檀越已不犯不者提第二比丘亦應如是例準云四分至入門墮者準此與時經同者彼經約二十四半月辨時非時且正月一日至十五日約腳步身影九腳半為時正是食時此經即約中前通論都有九腳半影四分約中前分食前後兩時食前時者二腳半三指影為食時從明相出至小食時也食後者七腳少三指為非時從十食後至日中前也鈔通取四分食前後二時都有九腳半與經通論故曰與時經食時同也不同非時者謂非時入聚隨有比丘或路上見白並得此要須囑同受請者成覓即知處不惱於人其白詞句云長老憶念我某甲雜同食行至餘家答云爾祇文云不犯經下卷者多敷坐具者戒疏云多家同會處處待僧隨至何處皆是請處不囑不犯明日沒供先往提者惱施主也如訃請篇中述大德云此戒云同利者謂同僧受檀越之利今諸方寺院斂嚫錢等百錢抽十名為同利此非法也有或問出在何文即三藏中並無説處云食家至四十三者釋名牒鈔云云云四食至也者四食者於中分二先泛明次釋鈔且泛明者故俱舍云如契經言世尊在人天衆中作如是語我於菩提樹下成等正覺誠悟於一法謂一切有情皆依飲食而住外道聞之撫掌大笑一切有情依仰飲食誰不知之何假菩提樹下唯佛得悟世尊反問問汝既知一切有情依食住者汝因何自餓汝又知食有幾種三界有無如何分別有漏無漏義復云何於是外人莫能酬對故佛一一為彼解説食今此準論疏略分五門一釋名二出體三界繫四有漏無漏五明廢立初中有總有別問曰食是何義答是資益義謂能資益諸根大種故次別名者一段二觸三思四識言段食者四塵所成形質名段古云摶食可摶握故攝義未周新云段食有分段故於中有二一細段食謂諸天及劫初時及嬰兒食全無便穢如油沃沙散入支體故二粗段食即今所食物也又光影炎涼於人有益亦名為食今人所見但是食具未能資益由如樂具故正理論云食者非在手中器中可成食事要須進度咽喉牙齒咀嚼墮生藏中攝益諸中方成食事二觸食者根境識三和合名觸三思食者悕求受境想念名思四識食者為諸識蘊了別名識二出體者段食雖具八事成但以香味觸三為體不取色故俱舍云非色不能益自根解脫故如眠見色時不能資益且自根大種尚不能資持何況資益諸根大種又不能益於諸解脫者解脫謂第三果人及羅漢雖斷欲貪見色無益須得食物二觸食以心所中觸為體非色觸為鉢體三思食者故正理云思食者準與意識相應四識食即是識蘊三界繫者段食準欲界餘三通三界問段食何不通上二耶答要離段食貪方能生上故四有漏無漏者段食唯有漏餘三雖通無漏今為食者唯取有漏門何不通取無漏答食者資益義無漏觸思識破壞三有不能資益故論引經云食者能令部多有情安住及能資益諸求生者部多謂已生五趣求生謂中有身常嘉尋求當生處故以香為食無漏觸思識無此義故不取五明廢主者問諸有漏法皆有資益三有之義何故世并尊唯説四食答約增勝説四無失問其勝者何答頌云前二益此世所依及能依此明前二食勝也前二者段觸也所依者謂有情身根段食於彼能資益故能依者謂心心所觸食於彼能為資益此云二食於已生有資益功能最為殊勝故云此世所依及能依後之二食者頌云後二於當有引及起如此於當有身為資益義謂思業能引當為思力引已識種子力能趣當為由業所熏識種子力當為力方便起故此二食能益當來最為殊勝前二如養母已生身故後二如生母生未生故若準論中四句分別一是段非食謂所飲噉為緣損壞諸根大種二是食非段謂觸等三食三亦段亦食謂所飲噉為緣資益諸大種第四句者為除前相觸等三食皆為此四句然就中是觸等而非食者謂無漏觸為緣損壞諸根大種餘四可知問五趣四生皆具此四食不答並具若爾如何地獄有段食耶答吞熱丸飲洋銅汁雖能損壞亦能暫時消除飢渴得食相故亦為食又孤獨地獄飲食如人故五趣中俱有四食已上五門總多泛四食義竟次結歸鈔意者文云四食之中是觸食家眼根對色故名觸食故律云女以男為食男以女為食此觸即心所誠法界女所欲由似食故云四至也者以著寶衣等此是多勸義若第二義以男女為寶夫人未以餘衣覆身名未藏寶也不犯相略而不説律云舒手及戶處坐若二比丘為伴乃至難緣等不犯云與女坐至四十四者釋名牒鈔云云云四緣至犯者如文云多論至不犯者如文云律不犯至開者如文云獨與至四十五者釋名牒鈔云云云四至犯者注云淨人見聞屏處者準二不定中明見聞牙離吉俱離提云十至吉羅者前食家不犯等者謂釋前強坐戒互受一日戒不犯者謂不犯者提如前已明今後兩戒縱互受戒亦犯提以招譏故由夫主不在又前戒隱此吉至此方顯文勢似難尋之易解云軀他至四十六者釋名牒舉云四至犯者無諸緣礙者如下病無威儀等是遣去犯者律約離見聞即犯云律至慊者如文云過受四月至四十七者釋名牒鈔云六緣至犯者一是藥諸者事鏡云四藥中過受三藥犯提準伽論云受時食亦犯提七日盡形此律下文醫所教服藥故知是犯若非時藥賤又療患義劣過受義希但犯吉故十誦云過四月已更索蘇等七日及終身椒薑等犯提若索阿羅勒毗醘勒漿但吉云僧祇至過者春夏分若過皆犯者謂此律緣起是夏四月請今準祇文春分亦犯但是過限不論三時半月一月等云律至吉羅者除四緣如戒本者一常請者施主云我常施藥更請者斷已後續分請者自持到伽藍中分作分好與比丘五分名為自送請盡形請者我當盡形壽與藥戒疏問常請與盡形何別答但就能所自分也或為云盡二人形故名盡形也過藥限墮過夜限吉者律文四句料簡藥之與夜夜時節日月分齊藥即參苓味敷分二果初句云夜有限齊定四月當分請藥無限齊謂與種種之藥第二句夜無限齊當常請是藥有限齊與參不與苓也第三俱有第四俱無可知準律四句不分輕重今鈔分輕重者據制戒義也本為索藥過限故結提若四月止夜齊非索藥過限故結提若四月止夜分非索藥相即不應索故犯吉也思之云觀至四十八者釋可知云多至故者制意如文云四至犯者一是軍陳者戒疏車幕長聚稱軍行列相對曰陳大德云象軍用四人馬軍用八人車用十六人步軍三十二人不同今時二十五人為一旗百人為一隊也云四分至不犯者天王者天子也若出即為軍陳遮從也云有緣軍中至四十九者釋名云云云四至犯者無上沙門果者阿羅漢三果等欲令前人獲此果故聽往曾經二宿等者謂前人懇請事獲已即往其事才訖便反若未了應一宿又不了再宿若又不了至第三宿明未出須去若不去明現犯云觀至五十者釋名云至四犯者祇云若在城中住賊來圍城至令比丘盡出城現多人相不故著不犯方便著即提云飲酒五十一者釋名牒鈔云云云三至犯者一是酒者一是唐三藏有三名一梵云窣羅此云米酒二云迷耶此云根莖華果酒三云末陀引云蒲桃酒大德引疏云是毒水能昏泛人兼諸放逸從水作酉日入酉即漸昏黑不能升舉也二無緣者病開也云律至故者酒為十過者一損顏色二少力三目視不明四現嗔恚相五壞福田業失資生相六增衆疾七益鬪訟八無好名稱九智慧減少十命終墮惡道五分降親龍得酒等者彼云佛從狗睒彌往跋陀越邑彼有一毒龍常雨大震壞人田苗居士常念誰有威力能降此毒龍忽聞佛與千二百弟子來歡喜出迎禮敬白佛願降此龍時娑竭陀在佛後搖扇佛乃回顧敕往降之彼奉佛命禮謝而去向彼龍宮却坐一面便先出煙比丘亦出煙龍又舉火燈比丘亦舉火燈龍出五色火比丘亦出五色火於是化龍身小如箸內鉢中持來白佛白佛敕送向世界中間如壯士屈伸臂頃持送賊既了不久却還居士甚喜願受我請默而受之此比丘在俗時喜飲酒往長者家飲黑酒極多還狗睒彌彌僧坊外醉臥坐唾狼藉衣鉢縱橫便接鈔文云云乃至漸斷酒制應回文云漸制斷酒自佛制後不敢更飲然此比丘宿習力故若不得酒諸病皆發飲食不銷不知云何以此白佛佛令𭊴酒氣𭊴又不差佛令以酒煮羮由不差佛聽以少酒與之得已方差佛言既差漸漸斷之除破僧者以醉故稱天人師必無人信也云四分至開之者但使酒乃至草木作者律中有梨汁酒閻浮果酒及蒲桃酒等無酒色香味者律有四句一是酒有酒色香味二是酒無酒色香有香味三是酒無酒色香有酒味四是酒無酒色香味四句皆提從境制定也鈔云無酒色香味者舉第四句反以前三句若非酒等者律亦有四句一非酒有酒色香味二非酒無酒色有香味三非酒無色香有味四非酒無酒色香味鈔云非酒有色香味四句中舉初句攝後三句也準四句文非酒四句但言不應飲不云得罪今準五分結吉二俱有罪故法文云並不合飲甜酒者僧祇云和釀訖始變生甜也酢者味變壞成酢也糟醫者用見反謂澄酒下滓也注文非取境犯者古人義也謂先有方便心者今師釋也古人見中酒戒五句境想三句皆約是酒縱使比丘作非酒疑或作非酒相迷心亦犯墮者即云莫不約境而犯不就心論今師云豈有智人一生不𭊴酒氣欲酒飲水誤而咽之可結他提今律文疑想迷心結正重者據先有方便之心欲飲此酒或舉盞時却生非酒想疑約從心邊但合犯吉緣為前有方便心冥然契合故結墮罪若無前心直爾想疑終不結重已上取戒疏意解之想宗學者破南山云酒戒律自分明約境今便臆課從心無教可據法寶云當宗不了不可依承酒戒從心非戒約境是以鈔主下引十酒證成上義如上開之者若知非而誤飲如上來第二句無酒想即開不犯又必是酒又無色香味容有誤義或可約舌不別味鼻根壞等此是明文有開固非臆説也云律不犯者蘖者儀哲反説文云是米芽也此能蘗消米將蘖作酒噉此多令人醉故云水中戲者五十二者釋名牒舉云多至念者制意如文云三至犯者列緣可知云律中至羅者如文云不犯已下如文云繫櫪至五十三者釋名牒鈔云云云四至犯者列緣可知云僧祇至吉羅者指指比丘祇律九十中名相指戒與此相似彼緣起中因尼坐不正十六群見了以手遙指而笑故制也差會以指指者彼月直知事人差次食以指指言某甲去犯云不犯至開者如文云不受至五十四者牒舉可知云五緣至提者隨作根本者五篇之中隨犯何罪達諫提者隨作五篇下一一皆有也云謂至也者謂根本違諫二罪同時結也後作六聚通結墮者既不受諫隨前作夷殘蘭提吉等六皆結連諫提也故知此罪要作前事方結違諫罪若正諫不受但得吉羅問前違僧諫竟即犯不待作前事今此得作方犯何以不同答前有僧法可違諫竟即犯此是屏諫無信法違故作前事方犯云不犯至之者謂指惡性不受諫戒彼云若無智人來諫報云汝可問汝師學知諫法然後來諫於我若非法諫不受等一切不犯云怖至五十五者牒鈔云云云五緣至吉羅者六塵事一一等説者謂將色等六塵示人令見即云我見惡蟲獸等文雖廣列六塵而怖相不顯今鈔引祇文釋彼云色怖者謂暗地悚耳皺面反眼吐舌乃至曰一指喡喡作怖相等聲者或長引聲短聲乃至作鐘鼓聲等怖香者或言蛇香軍耶鬼香等味者或問今日噉何味或云若噉此味必死癩病等觸者或以極重物押語云壁倒或輕衣覆語言口雲墮或將華觸云是百足蛇等法者為説怖他言汝生草中大小便墮地獄餓鬼畜生也一一相現者謂六塵中隨一一相現有解云二相現謂身相口相身樂口相此亦為對古人但有示怖而無説怖今此俱有此解示得不問怖者戒疏云欲明輕怖極聖尚遭況餘下類義須滅疏文顯佛無怖心但屬能怖結犯也云不犯等者如文云半月至五十六者釋名牒鈔云五至犯者如文云四分至不犯者眷後四十五日者謂從三月初一日至四月半是夏初一日從四月十六日至五月半是合上二部七十五日此據西天説也今東土極晚亦可移時故多論云隨國土早晚極用此限洗也要著僧竭支者諸記相傳云是僧祇支也大德不許此解不可祇支洗浴此是泥洹僧亦云舍勒即今行裙子是亦非䏶褌之類喜生欲者準多論云昔有羅漢比丘洗浴有一比丘後入見羅漢身體鮮淨細耎便生染心不久男子根墮落即生女根遂休道為俗生子後還遇見即便識之知本所因即請歸舍求哀懺悔用心純志還得男根故知今時不得露形浴也云僧祇至下卷者一切僧次第入者玄云古人據祇文得用常住僧物供浴所須既明打木次第入之故知是僧物也餘如下卷者指諸雜篇廣明浴有利益及方法等云露地至五十七者釋名牒鈔云云云四至犯者如文云五分至生地者炎高四指者謂前列緣依四分但云有焰不説高促故取五分四指便犯亦是人指挋尺四寸隨作事者謂隨後添薪益木或炙身煮物整頓前火聚斂等皆犯提旋火作輪者謂以手持此等之火而旋為輪亦犯若壞若生等約義合有若在生地即犯故引祇證之云律不犯如文云藏五十八者釋名可知云三緣至開者注文五大色非佛開者謂是非法不開貯畜故結小罪未熏鉢雖非正物佛開畜之不遮故得提也準此文勢是和會之竟也云律至羅者注文應不犯持罪者謂不犯闕持衣之罪也玄云罪官急不許或著俗服三衣收藏一家應不犯不持衣罪法寶約沙汰僧尼以釋亦可也云真實至五十九者釋名牒鈔云云云四至俱得者戒本列五衆者戒疏云真法兩部不合更互而作何故戒文通列耶答欲明五衆俱有犯相雖輕重有異而淨施義同故通列名至於淨法自從當衆故辨相文中云今為淨故與長老作真實淨驗知唯局因同類不犯在懷疑若準善見展轉通五衆也展轉問不問俱得者謂作法時對別人故物不付彼後用此物不假更問本施主云著至六十者釋名牒鈔云云四緣至犯者如文云善至衣者遭賊緣等等取燒漂也初得故亦名新者謂初得他故不如法色亦號新衣不染壞色俱犯提也云四至不見者謂被褥等并及俗衣不點淨吉輕衣者謂三衣已外自餘衣不點淨畜並吉注文準此等者今師約此染淨二義準於諸部釋也古云三衣不染今云三衣長衣並須染更點淨不染得提不淨犯吉也三種記者五分中比丘與外道俱為賊剝衣守邏人捉得令各自認取本物遂被外道先來總選將好衣服去以此白佛因此制三種色青黑木蘭隨一一認不作著著得罪復有云三種者一染二點三割縷即異俗人并外道也云多論至也者落沙者此云性性血也又僧亮注涅槃經曰落沙從鉢羅奢華中出出時煞蟲可用染也若點著吉此犯墮者此五大色若準多論不點而著憍奢耶者幽中最細也欽婆羅者此云細毛衣亦云雜碎衣好衣二種淨一謂割縷淨二點淨所言割者謂割三五縷也以染汁粗且令二種作淨若著終須染也餘衣加一法謂除上二細耎衣外即須染也青者銅器覆苦酒者祇云青為三種一銅青如文二長養青即藍澱青三石青即硿青是不持下二青作淨也黑者祇云名字泥不名字泥且名字泥者即呵梨勒醯勒呵摩勒令鐵器中是名字泥也不名字泥者謂實也泥即池泥井泥如是等一切泥也木蘭者呵梨勒等三果汁置生鐵上磨持作點淨即是青銅等為青色果汁泥等為黑色木蘭赤色此如法三色也猶同四分木果皮者箋色字合縱木也玄云似蜀地木蘭色以四分是北地翻修正將蜀地木蘭為正木果色也云五分至作淨者細揲亦爾祇云趣一角作淨若一條條補者亦作淨一切衣乃至細揲亦作淨謂新物細揲成衣細揲物雅衆多為却刺故但趣一角作淨不須段段別作故云亦爾也云奪至六十一者釋名牒鈔云云云多至戒者五緣者一是畜生二畜生想三為煞心四興方便五命斷云飲至六十二者釋名牒鈔云云云前至斷者謂前戒是限分中制要須斷命此是深防中制為養物命但知為蟲飲用結罪不待命斷斷即屬前戒收之云五緣至犯者第四飲用第五隨咽不待中死云鼻奈耶至身者彼云有二比丘深山中住未曾見佛便欲禮覲春後火熱路經廣野水少蟲多其一比丘語一比丘言所飲此水度茲廣澤得覲於佛一伴答言我受佛戒如何壞耶即不飲因此命終生三十三天戴百寶冠來見佛已頭面禮足在一面住佛與説法便得見諦其飲蟲水者在後方至佛遙見來脫憂多羅示黃金體汝是癡人飲如鈔引云僧祇至得者用樹葉拭者謂是乾枯之葉生者不合舍利弗以淨天眼等者謂尊者以淨天眼見空中蟲如水邊沙等無處不有遂斷食三日佛言知已語令食凡制蟲水齊肉眼所見漉囊所得不制天眼更有細蟲天眼不見唯佛見眼如微塵十分之一極為細矣云僧祇至用者不得猒課看者此是此人時俗語也今此間即云影嚮看俱是不子細之貌事不得已心中甚猒身但強收故云猒課也如大象戴竹木車一回之傾者祇云不得太速不得太久當如大象一回頃無蟲方用若有蟲者應漉用之不得語莫傷煞蟲者祇云若不可信者應自灑蟲不得語令灑莫煞傷蟲恐前人邪見或性好煞生若聞勸莫煞便故故煞也七日不消者蟲生七日一變故令安七日不消水中無煞生罪也不得持器繩借人者恐同教他煞也不得唱此水有蟲者祇云於注水池中若見有蟲不得唱告長老其水有蟲令他生疑不樂他若不知或作無蟲想猶免其罪今若告他知了即決定有蟲想故是以勸令自著云此至中者彼文因説漉袋乃廣彰用水方軌等云疑至六十三者釋名牒鈔云云云五緣至知一是比丘者多論云十三難癲狂比丘但犯吉學悔六夜別住四羯磨並是提也前人聞知者若未聞知未犯外難曰戒文中云約他須臾不樂始犯今何才聞知即犯豈不相違答非約他人不樂而犯蓋熟能惱人之意欲令前境少時不樂故也此依戒疏解云律至開者六事慳者舉數總標也初中舉受為疑慳下二舉隨為疑慳若以生時者汝非爾許時生等約俗年以惱若年歲者汝未爾許歲等約夏臘慳也若受戒語云汝年不滿界內別衆約人衆惱也若羯磨者汝受時作白羯磨不成約七非慳也若犯六聚者語云汝犯夷乃至吉通約六聚慳也若犯聖法者語云汝所門者則犯波羅夷非比丘等此別約大妄語慳也故祇云若比丘臨受具足時若羯磨不成應彈指語云長老汝羯磨不成就若臨受持不語者後不得令疑悔注文若即用語者女律開者如此彼二律俱開無疑惱罪也云律不犯者其事實爾者謂前人實有此事復非實心利益彼意不欲為慳也語令知還本處受者謂律文上第三第四事皆令還本處受故注解云佛令還本處期問得戒不得戒也以受戒託緣非相難識若於事諸有疑須還本處受戒處詳審知遇方可受之則於後無濫問既曾聞羯磨即是偷法便屬難收何得再受答為許聞故非是偷也不成難收得再受也為性疏不知言語者前人立性疏慢不識言改善輕重恐出言犯遇人法便得向云汝所説者犯其聖法意在前人改革不是故有惱意等並不犯云覆至六十四釋名牒鈔云五緣至明相如文云善至一切吉羅者百千共覆者謂百千同知一時共覆故各結提罪非展轉覆下引十誦注文云向一人説不犯故知展轉不成覆也若犯人凶惡等者謂凶暴惡若依王力大臣力凶惡人力或致奪命因緣毀傷梵行與護根相應者自守其根不管他事前人雖犯我心猶預不説非覆也除粗者除夷殘是粗覆得提也覆餘罪者下三篇得吉也問或覆蘭得何罪大德云準多論覆二逆得對首蘭與提罪鉢不異法説並不鉢家論也自覆罪者戒疏云自造七自覆七得一促各得一吉無提除尼者謂比丘覆尼亦犯提故言除也尼若覆僧罪得蘭外難覆既犯蘭必須發露若發露罪莫成舉大比丘違於八敬法不大德云不然但在當衆中發露不往大僧中不名舉也思之餘人者下三衆得吉也云不犯至開者無人向説者唯伽論云有比丘犯殘晝在比丘處夜在無比丘處夜在無比丘處若夜無比丘處終身不發露不犯露他罪若發心向説者玄據無人處為言或有約始知方欲向説明相即出故開無犯也云與年至六十五者釋名牒鈔云云云四緣至犯者和上犯提餘犯輕也云多至無損者上卷則受戒篇下卷則沙彌篇俱明所度年歲大小等鉾楯者多論六十已上不得僧祇七十已上不堪造事者許度之故是相違之貌也二情兩通無損者多論六十已上不許意道不堪持戒以志弱也僧祇七十已上受者即據志性耐強堪持戒也若論堪者堪二文俱許若志劣者二文俱遮云律中至吉羅者律問五節一先不知二信受者語三傍人證四父母言五數胎因也復有三位一計胎年二數潤月三約布薩若論父母語者祇云父母不知者生年又無者觀顏貌富樂家子形大年小當觀手足成就復不知者當問何王何歲國土豐儉旱潦時節生等開和上墮餘人吉者既計胎潤得戒不疑和尚免提衆僧無吉若據成犯相中約和尚四句僧知不知等有十六句得罪差別一知二謂三疑四不知和上了了知年不滿故曰知未滿滿想但觀其相作滿意名之為謂猶預不決曰疑都無所了名曰不知餘衆僧緣彼前境四心亦爾以衆僧四心對和上知心作四句一和上知衆僧知二和上知衆僧謂三和上知衆僧疑四和上知衆僧不知和上四提衆僧二吉初句第三句犯吉也次衆僧四心對和上謂亦四句一和上謂衆僧知等例解此曰和上合無罪衆僧同前次衆僧四心對和上謂亦四句一和上疑衆僧知等和上四提衆僧同前次衆僧四心對和上不知心亦四句一和上不知衆僧知等和上合無罪衆僧同前問和上疑心既輕何以犯提答夫與人受戒理合撿問安詳審諦然後受之既若懷疑即不合受誤他不得慳處不輕雖是疑心亦犯提也云令至解者諸部會通者十誦僧祇不滿得戒五分母見二論分開三種次第得戒將十祇二文會通四五二律亦同年月不滿通皆得戒也勘餘曆術者此則依俗以文比校為勘陰陽律呂遍涉支干故謂之曆作法數其近促故稱為術即唐國六七家曆法等是也今並比勘此依諸家所解竟法寶云堪餘也堪謂人姓餘乃人名古有堪餘算法今鈔依之後人抄寫錯書勘字也總括明練者搜求並盡故云總括無細不委謂之明練如此之文指在首疏故云如大疏也促通略舉一句者以今望古謂之通古人舉極小沙彌年滿月不滿者許依律三種開數得戒今師舉極小沙彌若依律三種開數得戒今舉極小沙彌若依律三種開文縱使年月俱不滿亦獲戒舉此極小沙彌一句今古雖同若許律三種開文數數何論年月不滿向下舉之以定昔人要年月不滿得戒之謬解也故戒疏云如昔解受者俗年日月俱少不開胎閏本俗年滿日月不滿方開今解但數胎月得滿二十俗年不滿開無所犯上是疏文云謂至也者戒疏云今且約極小沙彌臘月三十日生年滿二十正朝受具計實年始十八二日欠二十三月二十八日未滿二十故且同古人通舉極小之位於上次開法增年於下也便以胎閏增之等者對此受後開算律文但有三位古德據此方曆術更添頻大即成四位言四位者一胎內五位二閏餘三頻大四約一切十四日布薩初胎內者簡胎外也婆沙俱舍胎外亦有五位嬰兒童子中年盛年第五衰老胎內者謂胎亦不定如西天羅云六年在胎生死苦比丘六十年在胎此方老子八十年在胎或有十二月在胎更八月九月等今約多分以言例是九月在胎也五王經云一七日如薄酪二七日如稠酪三七日如凝蘇四七日如軟肉團五七日如堅肉團六七日五皰開張六情完具七七日成人上之五位前之四位位各七日唯第五位有三十四今七日并前三十八七日三七二十一成二百一十日七八又五十六添前二百十日都二百六十六日此諸日中並與母同氣欲趣産門與母分氣又得四日母入氣子出氣并前都二百七十日今將日勒成月得九月此九月中四月大又抽取四月又生受二日并前六日即沙彌年十八九月六日也約閏餘者此位諸家算法不同今且依一家而算頗為雅妙戒疏夫日月有三謂天上日月人間日月陰陽日月上二不定後一是定今將陰陽日月以定人間日月應天四時故置餘也又固文昌觀國詩及南山歸敬儀云天體右行日月左轉朝起扶桑暮入濛記日夜遊於十二神相去三十度十六分度七之周十二神總計三百六十五度四分度之一始周一天形日月各歸本為位今一年有十二月每月有三十二分以月初日及月末日此二日行周天等足三十二分中間二十八日以日行疾每日但有三十一分半一月中既除初後兩日中間二十八日各剩半分即一月出得十四分十月出一百四十分又二月二十八分一年計得百六十八分即用三十二分為日將一百六十分為五日已外猶剩八分此八是小分即四大分中之一數故言四分度之一一也即一年出得五日并八小分又一年有十二日且約六大六小於六大月中抽取六日并前成十一日及八小分今將前十八年九月六日沙彌通計六閏奇二十七日且一年出得十一日并八小分其八小分置而未論且計日數一年出得十一日十年出一百一十日又八年出得八十八日并前成一百九十八日將此勒為日三十日為一月且將一百八十日為六月已外剩十八日又前來每年有八小分適來未論今即將來計算既每年下剩八分今將四年下所剩四八即三十二分為一日八年為二日十二年為三日十六年為四日已外二年下二八十六分勒成半日并前四日半將此四日半添前十八日成二十二日半又前來更有胎內九月六日未論今於九月中出得九十分又四九三十六并前成一百二十六分又六日出得三分都一百二十九分用四日除之三四十二一百二十分又二四如八并前一百二十八分勒為四日猶剩一分今將四日添前二十二日半成二十六日半又將一分添前半日為一日以強收弱故此位算出六閏奇二十七日今將三個閏月添前十八年外零九月為一年已外剩三月二十七日在將前六日中三日添二十七日為一月并前成四月猶剩三日即沙彌年十九四月三日抄寫細詳之三頻大者三月連大也必死三月連小故不合為頻小今時設有者即日月參差也謂橫前十九年四月開且十年一百二十月九十月又二九十八成一百八月并前二百二十八日又零奇四月都二百三十二月勒四十九月為一章得四章餘三十六月欠十五月不成一章且第一章從初一月至十六月為一頻大又從第十七月亦依前數至十六月後得一頻大又從初至十七月後得一頻大一章抽得三日四章得十二日三十六月不成一章抽取二日故戒疏云頻大之法四十九月而成一章章有三頻大初兩十六月後一十七月各一頻大如是周與後始則前用一百九十六月為四章章有三月總得十二日已外三十六日約兩頻大足成十四日添前沙彌十九四月三日成十七日也此依疏文為準諸記中皆錯計也四約一切十四日布薩者謂且據不閏以説一年十二月六大六小大月黑白各抽二日都得十二日小月但於白月中抽一日都得六日計一年抽得十八日十年一百八十日九年九十日又八九七十二都三百四十二日前四月中又抽六日都計三百四十八日今勒二十八日為一月三百三十六日為一年餘剩十二日在并前十七日成二十九日還勒二十八日為一月餘剩一日在豈非五月一日並是虗年約一切十四日布薩已上並是古師年滿月沙彌四位算了尚剩五月一日今師不然此既虗年已滿少受前開算故戒疏云為受前開計受後開計受後開計答感戒白四時生不由後計方得據此以明虗年既滿得受無疑前開何損若爾何者是受後生疑答此約年月二俱不滿者但於前古人小沙彌上退除剩日便是年十九也已上準古四位算竟云此長至戒者此謂立今一句定昔時謬解此長去聲指適來所剩五月一日並是於布薩位抽得兼是含虗二十八日成月今須約實一依常途二大三小準戒疏於五月中前白半月還他五日後半還二日成七於五月一日抽除七日將一日除第五月一日於第四月中除後六日但成四月二十三日此約實也次退滅者於虗年正月一日上退除此四月二十三日先將一日退受戒一日次將四月退十九年後之四月又將二十二日退第八月中後二十二日便至八月八日即當虗年十九八月八日受戒生疑故開此算和上衆僧並無提吉沙彌得戒云然至所述六七家曆法者自皇帝至開元曆總有二十四家明其曆法並有增減則李淳風一行禪師大衍劉歆周髀等今鈔言一家者諸記皆云依麟德笇法如上略述猶長五月一日更有王弼作易緯笇法不能再述故云更不重申法寶釋云鈔依一家是堪餘所笇等如前已辨也諸部不滿得戒如疏者戒疏云十誦云若不滿二十或忘不知僧問滿不答滿得戒僧祇若不滿等謂言已滿二十得戒更有見論五分各有開文繁而不敘之云發至六十六者釋名牒舉云云云五至結者若餘私淨者簡餘鬪諍不能陷僧若自身四諍滅已更發犯吉以希故輕若發他諍數故重也此戒僧尼互發皆提二僧如法滅者謂如法毗尼如佛所教識病識藥名如法滅三知者謂知法滅已更發者提若不知非犯故下文觀作不觀想亦不犯觀謂深達藥病起滅之方今發淨者不知如法滅謂非法滅所以輒發不犯四輒發起者準律三句發起皆提一不善觀不成觀者疏解云道僧不識四諍體相起之因本促是暗心斷理故云不善觀觀謂觀察若作如是觀不成觀也二不善解不成解者疏云道僧不達七藥體相差別之義名不善解解者決了若作如是解者以無終益不成正解故也三不善滅不滅成滅者疏云道僧不識藥病相對除滅之方軌違理判淨故不善滅者不能究竟消殄故云不成滅也此皆犯提云與至六十七者釋名牒舉云云云六至吉羅者負債人者欠債不償是賊家氣分期行結吉也云惡至六十八者釋名牒鈔云云云五至提者説欲不障道者多論云利此是外道弟子聰利甚故擬人佛法中行於倒亂其人不久通達三藏故倒説欲盡其智辨不能令成云隨舉至六十九者釋名牒鈔云云云四至結者隨順同事者律文供給所須中有法謂教習定慧學問誦經等則為衣服飲食床敷臥具醫藥等皆一一結提五分云雖捨惡見僧未解羯磨亦提提云隨殯至七十者釋名牒云云云犯至也者四緣犯一是被殯沙彌二知是三同事止宿四隨順結犯云拒至七十一者牒鈔云五至結者外難前不受屏間諫戒正不受時促犯吉要須待後造作前事方所隨六聚結違諫提今亦違屏諫何得言詞了即結提答前諫作犯要作方結此諫止犯故言了犯上依戒疏解也云十至中者四事者即四重也言我不學所以結提五人不為説毗尼者下諸雖篇引十誦云一試問二無疑問三不為悔所犯問四不受語問五結問並不須答反上即答云毀至七十二者釋名牒鈔云云云多至碎者一偈者略教試也即善護於身口言是五篇雜碎者廣也以犯不少種類實多名為雜碎也云五至住者鈔總標五促列三緣次第四發言毀五言了結此依疏添也云五分至羅者令人遠離等者此釋第三作滅法意也隨經律者隨經文中有説戒律處如涅槃經等而毀亦提若通呵者何用此戒一提若誦序文非戒條何故亦犯鈔答云説二百五十戒義等云云又若呵序序中既總説二百五十戒義即是通呵但犯一罪毀毗曇契經吉者約勝劣論也云不犯至開者如文云恐舉至七十三者釋名者戒疏云有師名為乍驚張戒若是不攝耳者何故言我今始知又不攝耳在他心內何得證他曾聞若是不攝耳應開重聽上敘古義今師難云若爾便是妄語誑僧我今始聞也今立二名因時名不攝耳果時名恐舉先言由其實不攝耳是以不知今既始知恐被舉治乃先首過此是所防云云云四至結犯者如文云祇至聽者四三二衆如初句者如初句云不能誦一部當誦五衆戒今若依次第即合云不能誦五衆當誦四衆三衆二衆一衆及偈等衆者篇也喚五篇為五衆故不得坐禪者恐不專聽也云同羯磨至七十四者釋名牒鈔云云云四至犯者一是僧物者十誦五祇並云施現前應分物非是常住物也故十律云時陀驃衣壞居士多與現前僧應分物衆僧乃將賞他四分促云有人施僧貴價衣不言常住現前亦不了也二同賞他者多云凡僧和合不問羯磨不羯磨呵者並犯云不與欲七十五者牒鈔云云云五至結者如法僧事者戒疏云此唯約斷四諍事不與欲犯提餘法事但吉四諍不滅容破僧故雙腳出戶者若方便欲去或一腳出戶皆吉也云五分至吉羅者應去呼三羯磨者單白白二白四屋下隨出一提者五分云隨幾過出一一提隨出一一已還出隨數結犯今師約此義傳欲入僧未説而出為離衆失僧祇等者彼有兩緣一者説法毗尼二作折伏羯磨乃至別住羯磨等若有緣欲去須白及與欲説法毗尼者應白不白者越中間止作餘語者謂聽他人受誦經竟作其餘言語去時不白不犯沙彌在中若起亦吉者五分云若僧不羯磨斷事及私斷沙彌得在中比丘起者犯吉非謂沙彌輒吉得吉也云律至開者如文云與欲至七十六者云云云四緣至結者如文云多至吉羅者如文云屏至七十七者云云云五緣至説者聞便犯者戒疏云聽此語未向彼説提但聞即犯若待向説自屬兩舌戒收若爾何故戒疏文云聽此語向彼説者提答此約能聽人心聽此淨事有意向彼陳説非謂往彼説時犯也問何故兩舌須向彼説始犯此才聞便結答前是未有諍待説方有諍起故説時結今此先有諍豈待向説故聞便犯云律中至羅者祇云若二比丘在堂比丘欲入彈指動腳作聲若堂中比丘聞有人聲即默住不語者前比丘却須退若故語不止者即入無犯云不至開者如文云嗔打至七十八者云云云四至犯者如文云律至吉羅者由先得戒人雖犯重打亦提若十三難本受不得戒者打但吉義同於結一把砂一一隨者約豆數結罪也非隨著人數結云律至等者智論律中等者彼論中因辨供養真佛及化佛得無限福若惡心毀真化二佛俱得達罪若爾毗尼中何故煞化人不犯可引鈔釋云律中結戒為世間事等云云假名者於諸五蘊上假立人畜等名即於人畜上約世譏謙結戒輕重不觀後世得罪多少者約業罪説也如鞭打牛羊等者正釋上文結業輕重意也云搏至七十九者云云犯具四緣一大比丘舌二嗔心三作意四舉手便犯舒文略無今依疏列云前至提者前是限分中制打著方犯此是深防中制手擬便犯須定罪相若本為打不搏但犯吉即是打家方便若標心本為搏不打動心時即是搏之方便擬之即犯根本祇云六群以側掌為力用擬於人故號為搏若舉手向多人隨境數犯也云無根至八十者釋名牒鈔云云云略至別者指第二無根謗戒八緣犯等云如彼云突入至八十一者云云云四至犯者一是剎利王者準祇四句一是王非剎利入者無犯二是王是剎利非灌頂入亦不犯三是王是剎利是灌頂無國土分入無罪四分文中此三句皆吉四是王是剎利是灌頂有國土分入者提四分亦爾所言灌頂者即四分戒文云澆頭是也即受職之法律云取白牛右角盛四大海水及一切種子置金輦上使諸小王舉之王與第一夫人共在輦上婆羅門以水灌頂立之為王故云剎利王種也若婆羅毗舍首陀種以水灌頂作如此立亦得名為剎利灌頂種也以水洗種子者取滋閏反發生義以表王養萬民右甬者取吉祥義云律中至羅者如文云捉至八十二者釋名牒鈔云云云此至語者多論明文者準論云若捉金銀等七寶及寶器等皆提若提自他説淨寶皆提今引此欲破昔義故不用舊語者道疏云此名捉遺落寶戒若非遺落捉犯等罪今云不然雖以捨遺之寶為緣從制戒後但捉即犯何論遺與不遺也云具至犯者戒疏四緣一是寶物二非塔者莊具三非餘緣四捉便犯掌依此四足可稟承鈔文不合開為初二開緣也思之一重寶等即異古首疏云一是遺落寶也通自他者戒疏云問佛制寶物自捉不合何得使他亦犯答審是非法自他同犯多論云使人亦犯必有所開自執無罪及裝飾具者謂銅鐵鉛錫白鑞等諸寶裝嚴也非住及宿處者非此二處即犯在此二開之住處者開僧伽藍毗舍佉母入祇桓見佛遺却瓔珞故開及宿處者開寄巧師處捉金也四無心盜者若有盜心捉離犯夷非此我攝云多論至放者不得後放者不得在淨人後放捉時應淨人在前放時應比丘在先即是佐助若先捉後放即是正捉非佐助也云多至墮者除矛牟侔反矟所角反準論矛矟皆提故除也云四分至墮者謂非伽藍并及宿處皆名餘處云僧祇至上者停二三年者表久無人來取是無主物雖有性名時既久違亦是無主進退如上者如上盜戒中明指得伏藏處説也或有指畜寶中等云成論至物者給孤獨者即須達長者好給孤獨之人因此立稱長者欲買祇陀園布金不遍思惟當取何藏金足此是取伏藏也須達是二果人尚取此物故知不屬王若屬於王則當時亦不合取餘如文云非時至八十三者釋名牒鈔云云云五緣至結者注文即寺內淨人院多有迷意云不是村故今注出也云十誦至不合者四分日中已去名曰非時十誦無比丘等者其文似倒理合云無比丘者路中見應白又無者見尼三衆應白又無者發心已去今注出也祇文約食以論雖食早竟了便是非時作白長老等者正陳詞也所以須白者有二義一為不障僧法中恐作羯磨不知所至令僧生惱二欲令前人不得自在入白衣家也左右旋者即顯非直遇之相同入聚故結五分等者若俗所經從村聚中至日暮須往宿處為至八難等不白簡擇此事者謂簡所對比丘也論自釋言謂白同戒觀察正行威儀帶僧伽梨等此人可白餘不知法不可白故云不合云律至如上者如文云過量至八十四者釋名牒鈔云云云五至犯者二僧床及己者鈔準祇文僧受用邊犯戒疏唯約己界床則依四分結也云本至八指者不截方犯者此謂本來作時擬截成時未犯不截便犯若標心本不擬截作成即犯一尺三寸強四分者寶云以周尺一尺二寸為唐一尺又以三寸六分為唐三寸更有周四分在即是強字收四分也思之或鈔中作弱字者錯也更有云四分五分者非也上之四分平聲是尺餘量下五分即是律名知之隨坐一一墮者若終一坐一墮己有分故若他床坐者越非己分故但不應坐此非法之床也水筒盛腳埋等者怨速爛壞也當部約業道邊祇文約受用邊用不指量何耶答諸國用法不等俗情又異但唯佛為定以茲常量則永無乖也用人指量者約佛倍人即八寸高支床離地也四等分之者十誦疏作此解也以四八三十二成三尺二寸今將二八寸為腳第三八寸入梐第四八寸截除還用支腳準此驗知上濕下處開用人指也降四歲共坐者降減也四人相望得減四歲者共坐若滿五即是闍梨位不合共坐床指不過八指也云四分至無犯如文云兜至八十五者釋名牒鈔云云云五至悔者蒱臺者即冬月蒱華也先辨後悔者先辨此褥不得與人方悔罪也云骨至八十六者釋名牒鈔云云云五緣至棄者既云同上但改兜罪等即是應云一骨牙角二針筒三為己四自作使人五成使犯又應欲故者要先打破後悔罪反還主不受者持意為作還主無用故不受之主生惱者示為某作今却與他既是非法僧又不用故令辨置也外難此因財生犯何不入三十中答以小故不入也若爾如野蠶綿亦是小物斬壞又同何故三十中收答彼雖壞竟猶得塗壞是以不同云律至一切不犯者錫杖頭標䂎者諸記云錫杖頭上標此層級與作即纂準此全於上尺大德云義淨三藏解錫杖都有三分上一分是錫中一分是木下一分或牙骨及角等不定今云標纂即最頭邊猶如此間纂杖無別傘蓋子者散者作此蓋以仰風雨也子者蓋下莊飾具也斗頭鏢者匹燒反説文云釰鎖下飾也此謂蓋下有斗是此斗飾具也纏蓋斗者繞褁爾蓋斗口飾也此依諸家解崿記云律文無此三字抄文添云即是傘上曼上方板子也玦者杜預云玦如鐶而不相連者是鐶內小見子寶云猶似俗中寶腰帶鳥玦不異此間師僧即無西大皆有若著裙子時以條繩繫定玦在繩頭然後作攝等鈎衣鈏者胡八反説文云是橫物也礙鉤謂袈裟鉤子鈏者狀若此方賓楖子異繫向條子上鈎於䩙耳也眼將者眼患熱用此椑故𮢏汗刀者身有汗以此刮之摘齒物者如今揚枝頭利去齒中不淨物也桃耳椑者耳中結𦡲之類用以挑之禪鎮者坐禪時安頂上狀似毬子薰鼻筒者鼻中有疾引煙而入療之已上諸色既非針筒是故不犯云過量至八十七者釋名牒鈔云云云五至便犯者如文云律至吉羅者互減互過皆墮者上扁房戒九句則有如有減有過今此戒準律但過不過然則不過便是如也又下不犯中有其減文取共成句理亦無失一長中過廣廣中不過二廣中過長中不過三俱過皆捉鈔言互減過者且長廣減長減廣過即皆犯也自他作成者自則為己作他謂令他為己作戒皆提若不成者即自為己作不成及令他為己作不成及為他作成不戒皆吉也云不犯至法者準律有四開緣一應量二減量三得過割截四若作兩重上三易知不解第四言作兩重者律云若㲲作兩重也意道若無作一重過量即犯今意無擬作兩重意雖過未犯也注文通量者通長五尺廣四尺於長中通作一緣不取初量截斷施緣若不更增廣長各半搩手等諸部不許者僧祇云更增者對頭却刺互減過提十誦作不蓋縷邊淨者謂依初制不更增大故云淨又尺不益縷邊是過量作只可説淨不堪受持故云淨也恐不如前解伽論不接頭者四分七百結集不許者彼跋闍云得畜不截坐具鈔主云是跋闍檀行十事已集閻浮僧斷了故云不許截却外者未審為是初量為是增量耶下注文初量外等者謂初量過故須截却也謂初制長佛二搩手廣一搩手半則𤄃三尺長四尺更增廣長各半搩手又各一尺則長五尺廣四尺作坐具時合先準初制四周安緣都長四尺廣三尺此是初量後更向長邊廣邊各增一尺刺著初制量緣外是如法坐具今過量作者且取一邊一頭七寸來緣為其增者此增由各合有三寸來在又須準初量亦合有緣今不截安緣據此一頭一邊亦是不截今將引初量一頭一邊之緣及增者三寸通在初量而不截斷約合截此一頭一邊及增者各三寸淨許一段長五尺一段長三尺落故云截初量也非是增者古來云截却增量外也若是初量猶尚未過何須截却增者但有七寸已來豈是減不可言截也此義不正今師簡之故云非是增者餘説淨者所截除者若是應量固宜須説縱非應量準論亦須若已過十日等者制令捨之應量作提悔不應量作吉懺也云覆至八十八者釋名牒舉云云云律至也者如文云不犯至墮者略同前戒者己為他他為己得已成者乃至疊作兩重等並開如前坐具戒應量減量俱不犯差後過十日結墮者緣身患瘡故佛開之為護涅槃僧故不用淨施今既差緣謝故十日內須説即犯云雨衣八十九者釋名牒鈔云云云文相至知者指雨衣戒也云與至九十者釋名牒鈔云云緣起中難陀短佛四指諸比丘遙見謂是佛等後制難陀著黑衣為簡異故諸比丘即與佛衣色並同也六群意云我曾既衣色與佛並同亦量亦合齊等遂即與佛等量或過量作故制也云多至知者常人半之即八尺也戒疏問云餘之三戒定制量限三衣一戒不定量者答餘三非是沙門道明正儀隨其大小皆得受用故出定量此三法衣道服標戒若定出量人有長短不稱威儀隨其身分不出定量故有與佛等過作也上來尺九十單提已竟大段第六辨四提捨尼戒文二初四字總標二初戒下列標初云四提舍尼者若據記中引戒疏以七門分別今恐文繁義非急要略而不敘但釋名也具足應云波羅提提舍尼此六字連呼不得析開也此翻向彼悔今云可呵法者亦從對治得名也云初至也釋名也準理合云在俗家從非親尼取食戒第一也云五至結者如文云四分至如此者不論自他二食者若尼自己食或尼從他檀越乞得食也約緣通之者約緣通皆成犯故祇云尼有大福德日乞食供五百比丘明他食也五分卷中等彼緣白佛佛制不得從街巷中受受者犯也四分制在村內犯村外不犯今五分巷中當四分村外此蓋緣起部行別不同故云緣起如此也云律至得者所以簡親者戒疏云俗家人情相委親非譏過故聽病人苦惱譏醜不生濟令亦開置地使人敬相無抱所以復開也云在至戒者釋名牒舉可知云四至結者如文云五分至爾者若二處者彼有三節初云二部僧食隨一部呵亦名可竟若別坐別食別出者是中入檀越門比丘應向出門比丘有何教檀越與比丘食答言某尼應問約勑未答已約勑了是入門比丘亦名約勑又有出城門者應向出者如上亦得後坐人亦爾者亦問前坐人約勑尼未等云律至者須待食竟者謂待食遍故言竟也若尼自為聲平檀越者自作施主偏則無犯問何不開親及與病者答既是衆中偏心授食招過無殊故不開親病緣合開文存略也云學家過受戒者釋名牒舉云云鈔欠列緣戒疏具五一見諦學家二僧作法制三無因緣四白取置地使人五食犯云事至明斷者鈔意為事希略與不出也上言見諦是證三果猶在學地故曰學家也準此自約者準此無度受施全其俗家因福故窮困自息貪求是明斷也云有難至四者釋名牒舉云云云五至犯者如文已上尺提舍尼戒已竟也大門第七衆學戒文分三段初總牒名二衣戒列釋三自下通結初云衆學戒疏五門非要不敘今略釋名者唯以此篇不列定數但云衆學者何答威儀微細量等河沙有何數目故總標之目為衆學今此一百且就喜犯以標之若據梵語或叉迦羅尼此云應當學西天語倒即云學應當今取文順故也向六聚總制學之名為學處何局此篇云應當學答餘則易持難犯此戒易毀難護故前文云專玩在心乃名守戒等若就所防影名即云衆突吉羅今隱所防就能治行故云衆學云威儀至敘者威儀之要具在諸門者威儀則是非威儀身口所犯不應之罪具在上下諸篇之中約略收攝將盡也今撮摘數十者生起此篇吉羅釋相之意緝七入反續也敘者次也緝續其文次第解釋更有異説非正不敘次列釋中云初至者釋名者梵云涅槃僧或云泥洹僧引翻為方衣即今僧尼所著裙也西國諸人所有內衣直將橫疊背後前遮手張兩角左右掩掖仍以長繩四匝纏腰抽拔使正安四攝而已若繩斷解裙便墮地今引方僧著裙例加腰帶紉結實有整齊緣若垂地亦乖法律今言齊整者多論去踝一搩手五分云一時已上母論齊踝上三指鈔意取此成齊整相也云律至此犯者褰者縮也應懺吉者根本罪也對首一説悔以故為故又犯非威儀吉責心滅也若不故作者即是誤為則無非威儀但有根本一吉責心悔諸戒並列同此云不犯已下如文云二至知者垂前一角者下垂一角謂偏披時角垂左肘之中也多羅葉者垂前兩角此謂通披時兩角前垂也故祇云披衣時不得如纏軸應當通肩披著紐齊兩角右手捉時不得手中出角如羊耳攝已安緣者謂身寬緣急也三反抄等者祇云不得反抄衣兩肩上若值風兩得抄一邊偏袒右肩得抄左邊通肩披者得抄右邊不現肘也長老比丘即還下之後戒坐異前也云已後至可知者從此上來四戒已後盡此篇來少約存略而解其戒文中一條之事皆有兩戒如云衣纏頭入白衣舍及白衣舍坐自下但解衣纏頭入白衣舍更不釋其坐也又下敬佛諸戒甚多但舉二三故云約略也不復記數者更不記五六七八乃至一百等數不能一一記之但大途云涅槃五十六十標舉故曰可知云律至開者衣纏頭者下自釋云總以三衣用纏頭非是餘衣開緣如上者謂同上內衣戒患瘡開主覆頭者光律師解云不得以妄想覆真如頭入三界白衣舍此本過分今尺如抄不犯如文跳行者大德云跳行與跳行坐兩戒若為分之今應作此解雙腳從床上跳來這邊坐又跳去那邊坐故云跳行白衣舍坐也諸記中不評量故迷此相絶多故也開緣如鈔蹲坐并相及開緣如文叉腰匡肘者應師云橫舉肘叉腰也開緣如纏頭戒者有病協下生瘡及作時等搖身者應師師覆身也又云典覆也掉臂者此云乘臂前却也乘臂向前又向後即是掉也十誦云白衣呵言如種穀人不異也覆身等者如文顧視者村落中回顧瞻視處處看也不犯可知靜默等者辨相開緣如文戲笑者祇律在師前不得露齒而笑事忍之起無常苦空無不想也不犯如文用意受食等者五分云左手一心擎鉢右手扶鉢緣也非辨羮飯者違失之非今既一心即不辨也開緣如文平鉢受食等者注戒疏云言不平鉢者謂離偏邪鉢過也羮飯俱者緣起中飯至羮盡羮來飯盡惱施主故若須羮等者或只要羮或須飯隨偏食盡不犯以次食者謂鉢中處處食不著次第取飯覆羮中若請食者文云請食羮時有比丘食羮汙手鉢污衣手巾有疑不敢以飯覆羮佛言聽請食無犯比坐者五分初緣直制不得視比坐鉢中多少後因五百比丘在一家食食已共相語言希有此食於中有不得者下座比丘言若佛聽我等視他鉢者便知誰得誰不得不得者教與也佛告比丘聽視比坐但莫生慊心即得繫想鉢食者祇云端心觀鉢得放鉢在前共比坐語者若有緣須語須看左右者須手扶緣等也張口待者五分諸比丘飯至口猶不敢開佛言不近不遠便聽開口也含食語者祗云和上闍梨問能便聲不異者聽答不然咽已方答若恐慊者應述口有食不得答五分白衣益食問須不須比丘不答使譏言憍慢不共人語佛言聽導須不須遺落食者此律六群揣飯嚙半半在手中披呵而制祗云團飯令段段可口食果等不犯今時有人滿匙挑飯於口不容半落鉢中與上緣同也頰食者不得口中回食從一頰回至一頰當從一邊嚼即明也不嚼飯作聲者祗云不得㗘㗱聲此律呵云唼唼如豬食不上音子入異吸飯者許入反祇云薄粥乳酪羮飯不得吸作聲當徐徐咽十誦因摩訶男自手下飯與乳諸比丘吸食作聲於中有一比丘先是伎樂兒聞聲便起作儛諸比丘大笑口中飯粒而出有從鼻中出俗人譏之佛問彼比丘汝以何心而儛不欲出諸比丘吸食及戲笑罪過佛言不得大吸飯食應學不舐食者祇云月有監食人欲知生熟醎酢聽著手掌內舌舐也除此外不評振手者食粘手振之污傍人也把散飯食者蒲巴反此律六群手把散飯食居士譏之如似雞鳥故合是平聲呼也開如前戒者同振手食戒也不污手捉食器者西天以手喫飯食之手名曰污手祇開以菜拭膩洗鉢水者十祇皆以水雜飯棄俗舍居士譏言紫妻子言分布施為福一粒計百工比丘不合棄也生草上等者祇云夏月生草茂無空缺處當在牛馬行處若無即轉石上又無在乾菜上又當以木承之無犯水中不便睡者如文不立大小便如文已上總是敬僧威儀竟次敬法威儀中云不生者以都有八條戒鈔文約略解之故通言不恭敬説法中也覆頭者以衣等覆也褁頭者大德云隨方而説也西天俗人不褁頭若以物包褁即是不敬也此間褁幞頭即表敬露頭却不敬然於本分幞頭之上更別將餘物重褁又是不敬何妨有此道理有人云約正褁頭時與説法者非也餘文易知已上敬法竟第三敬佛威儀中云不至通開者都有二十六戒鈔文約略而解除堅牢者此約三寶物為堅牢不現狼藉相者得著革屣入塔者亦約西天表不敬也塔下留食除一坐食等者若非一坐食及不作殘食法比丘若餘人隨食中草得即旋逆以淨處故少時亦不許停死尸者臰氣護塔神嗔也三開亦爾者如上擔死尸戒有病須此道汗強力呼去三種開也云携至法者為在通法者開萍沙王前説戒除王疑心而令佛法不壅也黔梨者秦始皇時謂民曰黔黎也黔者説文云黑首也梨者衆也謂黑有不少也無再開法者初為除疑故開後既無疑却制故無開法也已上第二列料竟三通結云自至用者威儀決正法中者此論兩卷儼禪師撰也決解尼二部律僧相如下卷衣法中引云決正二部律論等是也抄恐文繁故指廣文如彼流通要用已上第七衆學竟前來有七始從四棄俗乎衆學七段之文總當料竟更有七滅諍當第八段及七佛略教明反人戒經並具在講本注戒彼引戒疏粗解大綱今順鈔消文不更廣述固非疏略也吳越國天長寺長講律臨壇崇福普濟戒光大德賜紫志貞寫此一部丁巳歲記焉
