body:
  text: 吳越國長講律壇賜紫清涼大師景霄纂今當第二正宗文中分三初上卷一十二篇名衆行二中卷四篇名自行三下卷十四篇名共行今當第一文中又分三別初標攝上卷之通題二標列所撰之篇目三牒篇釋三文今初通號者言四分至卷上都十二字若望中下二卷此即却是別題今且據總收上卷一十二篇文名通題也又釋上之十一字三卷共用即名為通但上中下三字不同名為別也所云四分乃離中之別科律者五部之總名總別雙彰故云四分刪者削也繁者多也芡夷紊亂勦截駢柯去濫傳真義豐言行補者益也闕者少也博採真實桾拾義珠還發光瀉裨未足行者現行事謂事相架略樞要故彰抄名卷者卷舒為義從前向後曰舒從後向前為卷此據紙墨為言上對下中立號故總題云四分云云次標列篇目言標宗至附者謂題此卷十二篇中事法是衆所攝隨機要於何事依而行之此行僧衆所行故彰衆行三牒篇釋中文分為四初有四篇明能秉僧二羯磨一篇明所秉法三結界一篇明秉法處僧綱下六篇明所為事四段就初又分為二初有一篇標戒為宗以辨僧體次下三篇約集是非以明僧用今當初文云標宗等者先來意者謂佛法創興戒最先說三學相因以戒為本斷惑次第戒捉定縛慧殺五分法身戒亦居首今撰事鈔統收三行以戒為宗是故此篇最居其首次釋名者標者舉也總舉一部鈔文所尊宗者主也戒是諸行之主故下文云發趣萬行戒為宗主因明諸師立宗不同一願師以止作為宗相違之失二暉師云云顯德者既標具宗即須題德非德無以立宗德謂從果彰名以能持戒萬德從主若非此宗無以顯斯德也篇者戒疏云字從竹作乃是簡名自漢已前本無其紙例用竹木兼之紈素而用圖録後漢蔡倫造紙用易簡素古書簡冊可有一章以熟韋編早連反之號為一篇故宣尼讀書韋編三絶第者居也如王侯之宅曰第此篇居初故云第一注文云言初出宗體者謂廣明法體行相之義正顯其宗言後引文成德者謂廣引化制二文證成戒德乃至顯德也從此開稱不及繁列云夫至限者法喻雙舉盡貫三科即法喻合也夫字一是發語之端二乃下蘊深旨律者法也詮量輕重犯不犯法海者喻也利潤無比如世間海旁通無際曰冲竪難究底曰深津潤通達物類俱沿其數既多故云萬象萬者一數之極故華嚴十定品云四大海水悉能潛闊四天下中山林萬象而令春生夏長吐花法實而不失時律海具爾橫遍諸界為冲竪等虗空曰深有解脫味謂之津遍十方界謂元通能令五分法身初生次長吐五乘之果皆不失時問既言津通萬象即是包含無外莫應宿死尸否鈔答云雖包含無外而不宿死尸謂世海雖復寬廣無所不容然不宿死尸於內今之律海亦爾雖然至廣至深而不容於犯重戒者故云不宿死尸故律序云譬如有死尸大海不容受為疾風所飄棄之於岸上譬如有死尸者此釋自行絶也大海不容受者釋衆法絶也為疾風所飄者作法除棄也棄之於岸上者穢不在淨也其次合云諸作惡行者猶如彼死尸此兩句合前初句又云衆所不客受合前偈文下之三句後云以是當持戒此句勸持騰嶽波雲而潮不過限者騰者奔起之貌也嶽者山嶽也謂佉之浪小者如山大者如嶽浪激白氣紛飛如雲號波雲晝夜二時之潮不過限律海具爾制戒緣起為騰五篇七聚嚴峻高低小者提吉如山大者夷殘似嶽故云騰嶽然五篇七聚之上要起止作二時白業喻若波雲諸弟子於制不敢有違喻晝夜二時潮不過限不過限者鈔引五分說戒法文條有八不思議法文詞稍顯當部但云不失潮法不及五分之文今將鈔中六句取彼八句謂世海有八般之德律海有八事初云律海冲深取彼第一德謂世海漸深漸入津海如來漸制漸學二津通萬德取彼第七德彼云世海大身衆生居其中律海四果四向等止住三雖包含無外收彼第四五六八日德彼云百川來會無復本名律海雜姓出家皆稱釋氏二世海不失潮二律海不違戒三世海不宿死尸三律海有犯不容四世海四河共𨈡而沒本名四律海四姓出家咸稱釋氏五世海無增無減五律海入無餘涅槃是無增減六世海出種種珍寶六律津海出種種法寶即三十七道品也七世海大身衆生居七律海四果四向同住八世海同一醎味八律海同一解味云故至德者故者躡上起下之詞謂上津通萬象不宿死尸而潮不過限故前玄門戒須清禁也凡請也廁居也預在也玄妙也戒為諸行之所歸故喻於門也者之一字牒在玄門之人也下句勸持尅剪緣非請禁身不造三邪之惡事禁口不作四過之惡法身口既淨無容更得過非生焉沐心等者謂由戒淨三昧現前故云沐心道水洗身曰浴洗手曰𣹉洗足曰洗洗頭曰沐身最居上謂之頭心既主之尊喻如頭故云沐心水能滌垢由戒淨故無生智起妄垢皆除喻智如水也者之一字牒上沐心道水之人也心能離念則能出要自然不染六塵之境也故能得益於時者明現世之益也淨持禁戒嘉聲外逸能生物善秉法被時千載不墜也此明身口之益跡超塵網者智所照處名為跡以無生智起普照萬境五欲不能拘六塵不能染此跡自然超越此明心益良由非法無以其義者良善也謂善由戒法清禁身口四儀自然承潔非此戒不敢先住持千歲之義非道無以顯其德者非無生智道不能顯跡超豈網之德故知此德由戒淨而生已云而澆末至趣者澆薄末下也淺識之徒膚者諸記中有兩解一云作膚字呼唐下安肉甫無反皮上曰膚膚內為皮二解云作𢩌字呼餘封反音容也但訓常即𢩌常之見今觀文意上既言淺識即是見解不深之人不合更作皮膚字解文似重也思之雖名參緇服者謂黑色之衣名緇服也雖名字參雜在緇裳之中而不委教文中事也學非輕違者學謂習學非由不也經歷也綿遠也所學之事不積功夫但心一期而已既非廣見何精明此上二句明學不專志也行不依律何善之有者此之二句明所行之行非也謂戒是萬行之基三乘因種今所行既不依律即萬善從何而有故云何善之有也情既疏野寧究真要者情為情懷上既學行俱永即情懷之中於教則疏於行則野故溫室經耆域自傷歎因云雖得生世為人疏野義淨法師解云心游理外曰疏形落俗中曰野引此意者覆於上文將心游理外一句覆上學非經遠將形落俗一句覆上行不依律等封懷守株走他通望者今釋云上聞喻下句法封者執也閇也懷即情懷也守株是喻韓子云宋人有耕者田中有株兔走軍株折頸而死因獲之後乃釋耕守株是為宋人笑時語曰守株待兔愚之甚矣上既舉喻法合云何鈔自解云走絶通望謂情意之中於教疏於行野更不求趣修行道果通達大望如待兔釋耕不殊但爭利名進道無日也玄云身無學解如樹無枝喻同枝杌無異恐違文旨局之心首而言無詣者局執也所執之事皆是師心曰局之心首所出之言言不關典無其實録故云而言無詣詣實也意雖論道不異於俗者情意之中雖論量三乘之道而所行不異於俗俗則耽染五塵利名所繫今具如是豈得異耶與世同流事乖真趣者上句反釋上文不異於俗之道理則與俗同於流類下句結歸則與真詮意趣有於乘別故曰事乖真趣也玄記將非法僧制釋上句與七九之諸有乖釋下句者似涉能詮衆行也思之云研習至解之者此段四句上二句舉學下二句況不學研習積年猶迷暗托者舉學窮者習學也積於歲年長時用心於教文中也猶迷暗托者不明之㒵也只如諸古德依四分宗中研窮習學經歷多時至於著述疏章猶迷教旨錯誤引用處斷重輕不少全無托附下句云況談世論熟能體之況前來不學之人終日談於世間言論孰能體會之宗助語之詞諸家記中云如上淺識之人設使精研習學於歲年猶迷事相如暗中托物或著不著況談疏野庸常之言談爭能體之此解非也云是至存者是以客致濫委以亂法司者客至也致舉也謂若客受致舉上來庸常之人濫委付以為僧首者下句云以亂法司法司者即伽藍寺宇之異名也如俗九司今借號以為法司若令此人為方之主寺院之中混亂無其軌範也玄云司者主也主者聚也三藏之人聚在一處令此淺見之人主持則有亂也此解似有繁研肆意縱奪專行暴尅者肆者故也縱情取捨而異與奪於己親有罪亦怒為縱於己疏者無過加罰曰奪儒書云不教而殺曰暴又論語云尅代怨欲不行焉可謂人矣即專行暴事欲勝於人也上非俗節所許者舉俗也書云罪宜惟輕功宜唯重又尚書云不以親而不賞賞彼有功俗節既然上之暴尅何得許也何有道儀得存者此句況道也道則無生智等道四為懷儀則三千威儀利物為本身心既行縱奪尅暴儀之與道何得存焉云致至耶者此段明人虧正法示所損境也致令二字躡上而生創入法流號為新學困者弊也盤石者大石也周易中有困卦兌下坎六爻辭云困于盤石石者不受物也若卜得此卦者即陰陽閇塞不通之㒵也今非法衆生抑遏後學亦然進則踐於蒺梨退則困於盤石令他學解不通五分法身豈更生長亦是閇塞之㒵故云困於盤石也律要絶於羈䩛者此句明斷法也在身曰羇羇絆也在口曰轡音祕今從革者皮必乃是專束也今二持持行是律之要止持如羈結束比丘身口七支不至作犯之境作持如䩛收束比丘三行不至止犯之境今非法衆生不與施行此律要二持豈非斷絶也於時正法玄綱等者於非法衆主抑遏之時如來正法玄妙綱宗寧不煩覆墜失故云故知至乎者雙結典替無也故知兩字印可之詞典降替廢皆在於人儒書亦云人能知道等深崇護法復何患者深心崇重守護教法復何患也今准書中患字訓憂也借此何患二字向下句結之應云何患佛日不再耀何患法輪不再轉謂佛智如日昔時已耀今僧尼護戒使定慧發生豈非再耀八支聖道具轂輻網三名真法輪佛在之日已轉今僧尼戒淨起智斷惑豈非再轉若是深崇護法之人何憂佛日及與法輪不再轉耀云今略至託者顯略指也謂約能詮教下所詮之戒以之為宗夫出家五衆就其行教以戒為宗故戒疏云律列戒為行事正宗欲知宗義宗是主義尊義法體行相顯宗家之受隨非受隨無以顯戒故下別舉法體行相以顯之非戒無以收於受隨故法體行相之前皆標戒字故知戒是行事之正宗若於受前名為戒法領納在心名戒體依體起用名戒行行成外彰名戒相今於立宗之故略指宗體行相也問指此四種所為於何鈔答云令後進者興建有託謂令後來依四分律修進之人知戒為行事之宗聽於往日自受戒時實納得法否若定納法即有體順體即有行可修可離既離二犯修二持美德外彰即秉法住持有於託附若也反之則全無託也云夫至滯者夫戒以隨器為功者夫戒者三個字且舉宗明不受之法以由用也隨逐也器者根器也功者功所能也但隨逐受人根器上中下別似水入器隨器方圓淺深戒亦如是故多論云隨以上中下得三品律儀玄云上品根器容受如來菩薩戒中品根器容受聲聞緣覺戒下品根器容受人天之戒此解稍疏也行者似願納為趣者行者二字舉起能領納之人也似者用也想像在懷曰領得法在身曰納心向於戒曰趣也而能善淨身心者跪禮陳詞乞法是善身緣於法界境上遍斷惡修善是善心無輕遮重難是淨身專志攝慮是淨心故云善淨身心也稱緣而受者人僧界法成就衣鉢具全稱於此增上之緣方納具戒故也方剋相應之道者方則也剋獲也因緣契合則獲相應即戒與器相應領納與戒相應善身善心與戒相應衣鉢人界與教相應當此之時即應得戒若情無遠趣之等者情是受納之心趣向也遠者遍法界境悉是戒境於是境上不作斷惡修善之心求菩提涅槃之趣又只擬有受無持既無此遠遠趣向之心即不得戒問為從初登壇之時乃至白四羯磨之時情中無遠趣便不納戒為復幾時鈔答云差之毫微也毫是毛中最細微是塵中最小但使受戒之人差之如毫毛之眗息便不得戒或有釋云受人身有遮難結界不如法秉羯磨落非如毫微許即受不得怨不及初解徒染法流等者空也染者習也法三行之法流者類也空染習在三法行人之流類也將何以為道之淨器者謂無漏淨道所依須假其器有戒則三乘菩提無漏之道為所依若無戒即不依也故婆沙云功德所依名器也為世良田等者謂身須珮戒德方堪為世良田今既戒體本無即為田之義安得存在是為凡欲清身行徒尊者夫欲入淨身三行之人徒侶遠遠悕求三德涅槃圓常之果者抄文牒勸云無宜妄造謂須專心不宜妄造取前事也必須專志攝慮者念念相續領納戒心名為專志無其間斷攀緣故云攝慮心既契會於法法亦隨心名為契入由前專志攝慮無其間隔戒法納心豈有於滯或有解云戒非塵大色又非緣慮心既非色非心無有礙故云契入無滯云故經云等者引證也涅槃第六云無作非色非心是無形而能遍在色心中十二入中法入攝六識之中意識得故可護持證誠上文有戒可得故云斯文明矣云何至相者二字是徵上既略指宗之受隨為典建之本乃知戒從緣得以戒為宗未知所受名何又既不屬色心如何為典建之本將欲釋之且先徵起故云何者但戒相多途者如成論有七善儀只於有漏木叉之中自有五八十具二百五十尼三百三十八乃至八萬四千之相狀故云多途非唯一軼徒結反轍也千車萬轍故玄云軼者跡義萬車同轍是一義今戒不爾有於多種也心有分限取之不同者上中下品分限各別故云不同住境彰名乃有無量者任從也境即所緣情非情二種境者上至如來下至螻蟻有令境者大如須彌山小如微塵其數非一故云無量今若向此境上彰名即不可且據樞要等者寶云門扇兩頭之也故雜犍度云戶樞不轉以皮褁之若依玄記是門臼也臼是門之要故雖廣大樞能管轄開閇目自在戒亦如然盡虗空遍法界雖廣多但以四種收之無盡矣將一法字收一切法乃至將一相字收一切相等前二是受後二為隨受雖殊莫先四種也牒釋之中有四今初云戒法者牒名也云語至此者語法而談不局凡聖者謂言義而說故云語法又此戒不簡凡夫及與聖人故云不局凡聖故下文云三乘聖人要珮戒印此約聖人又云佛為五滓衆生制於禁戒此即凡夫謂佛大慈心中典此毗尼凡聖受者通有故也直明此法者要約而說故曰直明簡異不廣說受前八法九法七我門之類恐有繁總也如能軌成出離之道者軌生物解謂成三菩提出謂出於三界離謂離於二鄣故經云戒淨有智慧便得第一道要令受者信知有此者謂要令受者發深信心知有茲玄妙之戒法能出離三有證五分法身之理也云雖至法者應先問云既言凡聖道有若在凡夫身中名為何法為約已成立名為約未成立名可引抄答云雖復凡聖通有此法等云云雖字縱奪之詞也謂凡聖二類皆有此法如前又云不局凡聖今所受者就已成而言名為聖法如沓婆摩等三乘聖人受得此法便證聖果等偏彰聖法之名也或有別解恐非文意不取云但至也者反彼生死者問常聞生死為此涅槃為彼今何故云反彼生死答心體離念本無生死但由對境纏附生死過典今善淨身心於彼境上作斷惡修善之意反於往星死過心故云彼也仰廁僧徒者仰羡者廁次也僧謂徒侶建志要期者典心修善即是建志誓受佛戒自度度他即要期也高栖纍外者超三界之上故曰高栖出二障之表名為纍外必預長養者師須早訓示其發心不待臨時故云預長養也使隨人成就者隨能受人要期上品之心即納得上品之戒必定成就也玄云據行人隨求何乘之戒而剋獲也此釋稍疏乃可栖聖法在懷者納體也習聖行居體者起行也故得名為隨法之行者隨惡斯戒法之心而起其行故云隨法行也外難云此科鈔文但為明戒法既云柄法在懷是體習行居體是行莫不雜亂否答此懸說向後受時之事令人信知此法方可納體起行未便柄之及起用等亦是因中說果也云二明戒體者牒名也云若至體者通論者通律之論即成實論也所發業體者約作無作以辨業體以發身口業故戒疏云成就業辨即作無作此即約其身口業為能發體所發第三羯磨竟時發得此無作業體非一蘊色非四蘊等云今至法者今就正顯直陳能領之心相者簡不是上來論文所發之業體但正顯能受之人納體之心陳斯相狀也問此何不據業體以說但陳能領之心耶答就戒定於宗明行事體要有所得方可典達住持故約行人領納之心乃知有戒若但明業體業體從何而生須先有領納心方有其體准下文云知身身心懷佩聖法等即斯意也以己要期施造方便者斷惡修善求戒之心名曰要期壇場乞戒即是施造方便善淨心器者善心淨心善身淨身即是身器也惻思明慧冥會前法者惻謂惻度思謂思量明慧即善慧也謂惻度思量塵沙二諦境上本來無惡良由有情心有惡念今既思惟性空惡從何起良由妄起當此之時知境無惡妄念無生如是思惟發生明慧境既無惡惡心不生當此之時冥然與會也云以此至體者以此要期之心者牒上斷惡心也以用也由此要期斷惡求戒之心是要期之心與彼妙法相應者牒上塵沙二諦等法謂體無善惡心能發彼無善惡體能發善心隔凡成聖名為妙法如前契會故曰相應此鈔文是重牒前語也於彼法上有緣起之義者謂此戒是依他起性因緣生法只如羯磨受者祈心立誓等是因緣人僧界法衣鉢等是增上緣二緣和合至白四竟方得發生名為緣起領納在心名為戒體者將受戒人能領納心相狀為戒體不是業思之云三言戒行者牒名也云既至行者既受得此戒秉之在心也牒起前來體也必須廣修方便者正明起行也修習也方便即不淨慈悲少欲等觀行也撿察身口威儀之行者身口七支粗相既撿察四儀之行亦然也高慕前聖者望上而學也謂前聖之人與我同為凡夫彼能修行成於聖道我曹亦爾何不為之因發正心專修正業等儒書亦云見賢思齊意亦同此持心後起義順於前者持是受後防誰之心故云後起今起此持心正與初受之時相順故云義順於前也故云戒行者結也次引證云故至矣者涅槃第十六文也雖非觸對者謂無作戒不是色不可觸對不顏眼根所對之色無作不是心不可觸對不同識等能領之心若修方便起對治行令此戒體便得清淨故云戒行以此證之驗知有行故云文成驗矣云四明戒相者牒名也科文但作一段似有缺少今准前三段皆有牒標也云威儀至相者威儀行成者謂牒舉上文威儀戒行已成就故動則稱法美德光顯者舉動施為稱於軌則美德外彰相狀清潔生於物善故云戒相問行與相何別答行據內心相約外狀故分二也問此中法體行相與中矣隨相篇法體行相若為取別答此戒法即據軌成出離之道彼約體通出離之道此戒體直陳能領之心彼說所發之業體戒行上下並同之若論戒相引約威儀無顯之相彼據二百五十具期闕二持兩犯之相狀云此至盡者此之四條者指前文法體行相前二受後二隨如是受隨皆宗於戒也並出道者之本依者四種為並也謂此戒能引生三乘之道即詺為戒本以此四法為道所依成果之宗極也諸佛如來得菩提涅槃成無漏果皆宗於戒其極處故經云如過去諸佛現在諸世尊皆共尊敬戒也於標故標於抄表者戒既有此勝能是故標舉於三十篇之首故云鈔表也問標於鈔表有何意也下文答云令寄心有在寄託也僧尼之人心託於戒知戒是有在我身中懷珮戒印故云懷佩聖法也下為六道福田者謂既佩戒印方有為田之義所言六道者智論云三善天人修羅三惡地獄餓鬼畜生也問今或云五趣者何答攝却修羅一趣也寶云准俱舍論修羅本是師子種攝歸畜趣若依瑜伽云是質多羅天苗𧜟天趣攝也又唯伽經云修羅居住七金山間合是鬼趣攝諸教解說不定隨依一種攝之但成五也上則三乘因種者佛緣覺聲聞三也自餘紹隆等者除三乘六道之外曰餘也紹嗣興隆佛之種子如三十七品之例皆因戒生如種生互不別興建法幢即住持佛法高顯如幢功德不可思議者功勤德能非心所思非言所議也豈唯言論能盡者豈可也可將世之言語論量說此功勤德能而盡矣云直至諸者直引聖說者簡不録根緒之文持法高士者持戒之人名為持法也高者清高也士者約字釋十下安一即會意字也一是數之始十是小數之終始終如一號之為士論語亦云有始有卒其唯聖人乎今法具然初受日始隨行為終受隨如一故云高士詳而鏡諸者詳察鏡明謂不一也竟令對境詳察洞明一一作斷惡修善之意故云就至業者就中分二者就此篇中大科兩段初明順戒等者遠約四沙門果名為辨比丘事近約說恣受懺等為比丘事如此辨事皆先戒淨也二違戒等者苦業即三途惡報皆由不持戒故所致問順戒能辨事即顯戒家勝德既違戒招於苦業何名顯德答只為有戒在身違體犯非有戒可破便招惡果若無戒體持犯不成亦是顯戒之德又雖破戒一期招於惡果反士亦賴戒餘解脫也云但至略者但諸經論歎戒文多者謂欲引三藏教文顯戒之德謂大小二乘經論贊述戒處極多隨部具舒亦難盡者謂若隨他經論部袟凡有贊戒處便引來鈔中者相亦難盡相謂狀至於三兩卷文列亦不足今通括一化所說正文者謂始從成道終手鶴林為一化也所說八萬法藏攝略而說不過經律論三名為正文也且引數條餘便存略者且者顯未盡之詞也引用也謂諸經論中贊戒之文不少今約略引用不具書之如大小乘經中略引三五本教二論之中亦略引三五本教諸不一一具引之故云存略問下亦引諸律文顯成戒德此何不說但云經論耶答律即屬經所攝因不在疑云初至門者初中分二者就順戒科中分二也前約化教者經論二文讚戒德也後就制文者謂是律本及依律論等顯戒之德也云初又分四於化教中又分四種即二經二論也云一至經者標也云如至示者順正云此是兩卷成文者上卷說諸釋種鬪戰之事下卷明佛涅槃之事今此引者是下卷文也謂佛化緣既畢遂受魔王所請入滅諸比丘涕泣爾時阿難問佛云如來在旦切人皆以佛為師世尊既入涅槃我等諸人誰為師主佛答云若能奉持波羅提木叉即與我在世無異於是遺教等經亦固斯示者遺教法律經更等取諸經文並同此前來指示也云能至也者發趣萬行戒為宗主者發生趣向也萬行即一切定慧功德依戒而生乙宗主也故經云等者善生經也若欲生天等者等取三乘無漏果也護戒足者義淨三藏云梵本合言跡謂梵云樹荷此翻為足若云阿符陀翻為跡謂前佛學此戒得聖後人尋前跡亦得果也又如大地能生成萬物者謂世間大地能生長萬物及成就結實今此戒地亦爾能生三十七道品成就五分法身故經云等者遺教經文引證可委又云依因此戒得有定慧者謂尸羅清淨三昧現前則定慧成就又經云等者亦是遺教經也行根者住持萬行喻如根也彼經云戒是菩薩道初根本地名為戒如是戒者亦名初地平等地慈地悲地佛跡等廣而如彼說即喻如地能生成住持者總結也是生長義成是成就義住持是久住任持義也云二乘論者標標云如至羸者如成實云者彼論序云佛滅後八百九十年罽賓小乘學者所宗鳩摩羅陀上足弟子訶梨跋摩之所造二十卷成文羅什譯也文理雙標以教為成以理為實此論釋小兼分通大乘道品樓觀者由於三十七法成菩提道也品者類也道之品類故云依此道賢聖躋攀舉升喻如機觀所云三十七者三四二五單七隻八一四念處觀身不淨乃至觀法無我引在外凡位增至無學二四正勤謂二善二惡從加行燸位至無學三四神足謂欲勤心觀四也欲即欲定勤謂精進心謂念定觀謂慧定定果名神所生尊持名足神是用足是體神即足攝用歸體持業釋也此從頂位生至無學已上名為三四二五者一五根信進念定慧婆沙云能生善故名根如樹生根不別此從忍位生至無學二五力者轉前信等五根即名五不可屈伏之義為力若行人至此位時不更退屈故信既如此餘四亦然此從世第一位生不無學也已上名為二五單七者謂七覺支也七者數也謂念擇法精進喜輕安定捨覺支者由此心必至大覺故亦云七菩提分菩提是梵語此翻為覺分者分齊由此七種必至菩提故號七菩提分也若據有部在修道位增今准經部在見道攝也言隻八者八聖道也八者舉數語業命此三是戒見思勤念此四是慧正定屬定所以詺此八為聖道者何聖者正也謂對外道而修故立八支聖道若據有宗見道位增今准經部修道攝也故云道品樓觀也以戒為柱者如世間起造須假其柱方成立得舍屋今戒亦爾喻之如柱故禪定心城以戒為廓者禪定屬內心故喻如城戒為身口屬於相故喻如廓也入善人衆要佩戒印者善人即三乘賢聖賢聖不一名之為衆印信也若欲入此善人衆中要須帶佩戒之印信是故已下結勸可知解脫道論等者彼論第一有戒品種種讚美恐廣引文成繁須者如彼則令人持心勇勵不羸羸是毀破之義也云毗婆至器者一尸羅二行三守信四器此毗舉論標且讀文過未可預解也云尸至故者重牒起前標中尸羅二字也此中九義一冷二夢三習四定五池六瓔珞七鏡八威勢九頭義九段之文都是一科也尸羅言冷音靈謂冷然清涼之㒵也若言冷即對熱立號無破戒熱者具含因果中能燒熱心持戒則身心清冷及三惡道熱者果也持戒則得人天之報冷然清凉也亦名善夢尊者謂持戒則諸天衛護常得善夢夢見佛菩薩羅漢聖人共相言論也亦名為習等者謂能習戒法納在身中亦名為定等者持戒不喧噪妄思覺故心常注一境之性也亦名為地等者謂世間池能與世人洗浴滌身上垢今戒池即三乘聖人所欲故云群聖所浴也彼論引佛說偈云法泉戒水池清淨無瑕穢聖浴身不濕必到於彼岸外難曰聖人無煩惱何故要於戒耶答雖無煩惱而心恆遊履於戒也故經云布以七淨華浴此無垢人或名瓔珞老少中年服常好者如世間瓔珞三種人若服飾之並皆如法今此戒瓔珞亦爾賢聖服之皆好聖人為老凡夫為少七方便為中也亦名如鏡等者世間鏡若明淨能鑒向象分別止今戒鏡亦爾彼論云戒鏡若明淨無我之像於中顯現謂尸羅清淨三昧現前又云戒淨有智慧便得第一道定則空寂慧則無生空寂無生誰云有亦象於戒鏡中現也又名威儀等者謂尸羅有大威德勢佛在日凡是有者威力皆是尸羅之力也餘如驅龍等者引教中事證成大智論云昔迦濕彌羅國有一毒龍名無怯懼為性暴惡多有損害有毗訶羅聚落數數被此龍嬈惱時有五百羅漢共議入定欲遣此龍盡其神力亦不能遣有一客羅漢名娑伽陀從外而至舊住人具述上緣彼遂往龍所彈指已語云賢面遠去龍聞其聲便出遠處時諸羅漢怪問之云汝遣此龍是惡定力答云我非定力亦非神通但護尸羅故有此力守護輕戒如防重禁故使惡龍驚怖而去此乙威勢義也又戒名為頭者若准彼論法喻並是鈔文但頭法隱喻今先說喻者如人有頭具六根故眼見色耳聞聲鼻𭊴香舌嘗味身覺觸意緣法次法合者今行人有戒頭亦爾能見四真諦色如眼能聞未曾有聲如耳能𭊴覺意華香如鼻能嘗三菩提味如舌能覺禪定解脫等觸如身能知三世等法如意抄文但舉初後故著乃至之詞也等取受想行識四陰并十二入十八界五停心總別相念過現未來三世諸法總在等字中水收也云能至也者彼論云若人能守護戒故名守信也謂佛語守護淨戒此句重牒釋前標中守信也至涅槃故言行者彼云如有足行至餘方有戒足者能行至涅槃城故此句重牒釋前標中行字功德所依名器者萬善功德皆依於戒乙所依住處名為器也此亦重牒解前標中器字也云尊者至涅槃者重釋尸羅也瞿沙者人名也彼論云五十二師外有尊者所解最長有五百人之師若准薩婆多師資傳云從迦葉至達磨多羅有五十二人其瞿沙尊者即一數似與前少異傳云大師名瞿沙博綜強識善能說法以感衆心時一集會五百人各付一器然後說法衆會感悟涕淚交流以器成淚併安一處有一王子兩目生盲尊者立誓云我若必當成無上道利益盲冥無慧眼者今以此淚洗此人眼眼即當開既以淚洗兩眼乃開於乙四輩無不崇重也云三大乘經者標也云華嚴至身者謂舊譯華嚴三復次文也初後次云教化衆生發菩提心令佛寶不斷起求佛願開示甚深諸妙法藏令法寂不斷此表法也具足受持威儀教法令僧寂不斷勸行方便抄引此句二復次贊嘆一切大願令佛寶不斷贊起行令修分別解說十二因緣令法寶不斷此理法也行六和敬令僧寶不斷行成不乖鈔引此句三復次云下佛種子於衆生田中生正覺芽令佛寶不斷化成行種護持法藏不惜身命令法寶不斷此行法也善御大衆心無憂悔令僧寶不斷德孰攝他鈔引此句所以三復次中但抽取僧寶於文中餘二不録者鈔意云但使僧寶不墜餘二自然又住故知由於僧也比並三世佛所說正能具足行六和敬即不違此教三寶不斷也大集云者彼經第十九卷護法品作如是說爾時有十方世界諸大菩薩從他方來論道說義諸菩薩白言諸如來為五滓衆生制於禁戒唯願如來為法久住後制禁戒所謂身口意戒不得更畜一切惡物等所言五滓衆生此娑婆名為五濁濁即滓穢義也劫初之時衆生煩惱輕諸見少壽長遠身端嚴考慈敬信名浮劫末反之號之為濁也劫濁減劫時小三灾起論云刀兵疫飢饉經云持一不殺戒不逢刀兵施一丸藥不逢疫施一摶食不逢飢饉二見濁邪見增上法說非法破壞正見三煩惱濁三毒熾盛造業及造惡見等四衆生濁五陰和合假名衆生皆思忘義不敬三寶不行十善廣造五逆五命濁劫多盜殺減至十歲短身形小命亦如然或胎內終或出胎後少夭中夭之類以乙因緣號為五滓也如餘佛土等者即如諸佛土也有作王字解者非也佛言且止我自知時後方制也薩遮尼犍子云等者彼經云時有薩遮尼犍子遊行諸國教化衆生次至闍延城爾時有國王名曰嚴熾其王敬重從其受學其人廣為人說法次為說沙門瞿曇多種功德王問如此法身從何而得尼犍答云此戒為始大王當知以戒淨故不斷三寶種以戒淨故功德無量若不持戒乃至不得疥癩野干身何況當得功德之身王聞乙語發菩提心也云月燈至士者雖有色族及多聞者色謂端正顏色族謂高門大姓多聞即善四圍陀妙五明論等若無戒智猶禽獸者經云譬如況尸著金瓔珞多聞破戒亦復如是猶如異類不別也雖處卑下少聞見者反前文也或是卑即貧窮鄙陋且能持戒下句結云從淨持戒名勝士涅槃云等者謂一切衆生皆有佛性被煩惑蓋覆不顯今若欲見此性先除煩惱欲除煩惱且須持戒煩惑盡處自然見也若見此惱即名證大涅槃也若持是經而毀淨戒者謂毀破此戒下句云是魔眷屬非佛子也佛亦不許受持此經以違佛空持無益故華嚴偈言等者此中所引明戒是菩薩根本勸以持之佛歎當來之益也以戒淨故當得菩提也重引之者以今望前後三次僧寶之文是重引也令誦心首者勸常記持故云誦也心是主身之尊最為上首勸令記憶常在於心故云心首也云四大乘論者標也云智論至畏者若求大利者佛果菩提名大利求此果者先持淨戒也此標初義一切諸德之根者此標第二義出家之要第三義也如惜重寶善法住處已來且釋第二根義也謂世寶人皆愛惜今護戒亦爾如護身命者一切有情皆惜壽命今令護戒准此以戒是一切善法住處者不善皆依戒住是其根義也又如無足欲行乃至空無所得已來釋前第三要義無足不可故知以足為要無翅欲飛者衆鳥升空須假於翅翼無翅不可飛舉故知翅為要也無船欲度者夫過江海到彼岸者須假船而載渡若無船即不可渡也故知船為要妙下句法合云若無戒者欲求好果亦不可得謂無戒足乃至無戒渡是不可得也若棄此戒等者棄謂棄捨也雖山居苦行由如外道自餓之徒但名邪行空無所獲故雖貧賤乃至未文此釋前標中利義所願皆得者謂人天三乘隨心所願剋獲有此利也風刀解身者俱舍云人身有百處異支節名末摩此云死節欲死之時三大解身火大解時火燒筋節令心躁悶不久命終水大解時先令筋爛不久命終風大解時令筋碎壞不覺不知問地大何不解身答俱舍云以象外三灾外有水火風內還水火風既外無地界灾故內無地界患此准人間有若天中死時但有五衰一衣染垢汗二頭上華萎三腋下汗出四𭊴氣入身五不樂本座此五若現必死今持戒之人臨終之時風刀解身縱令筋脉斷絶心無怖畏論中解曰或見好相自知持戒清淨故無怖心由是持戒得斯利也言地持至說者三十二相者今依般若經列足善平輪相指纖足相圓手足軟鵝王足趺端鹿王峯藏身滿足上靡生一毛右旋及金色常光庸細滑七處身洪直上身肩髆圓摩膝師子願四十齒齊密鮮最上味舌長目紺清𮌟相烏瑟尼白毫梵音相解此偈文恐繫不敘但為引證戒德耳又自持戒堅固又不令他犯戒得初足下平滿相如奩音簾底乃至不兩舌得四十齒相問相是何義答婆沙云標幟義殊勝義祥瑞義也問輪王相好與佛何別答俱舍頌云相不正圓明故與佛非等謂不正不圓不明也謂上來所列三十二相雖殊並是持戒為因更無差別故云無差別因等若不持戒即如文中所說云云十住等者彼第十四有二品初贊戒品云略贊尸羅少分尸羅是梵行之本尸羅是功德寶𧂐又是功德住處能越生死海等次戒報品云菩薩能淨持尸羅得離垢即第二地也當作轉輪王十善化人七寶自恣得如是報廣如彼說云第二制教中分兩者制即律教也律本為一依律論為二也云先明律本者標也云僧祇至五利者三不欲有疑悔請問他人者玄云既秉持識達聖教不假問他或有釋云謂自不有疑悔設有不決便咨問他此不及前五游化等者十方佛法教理無別若不明教主處多怖若順教而行者心怖無恐是為篤信已下結也云四分至等者雖有五句約義分三初一自行次三匡衆之行二若行成便能秉法被時千載不墜是故末後興建正法行也一戒品窂固者謂念智捨三令戒清淨不被緣壞故曰窂固也二善勝諸怨者玄云持與破二義相違如怨今內心清淨趣於彼也三於衆中決斷無畏者既瑕舋處衆斷量理無懼憚也四有疑悔能開解者曉了持犯能決人疑情五善持毗尼等者任持戒律令法不贊名為久住又得十利如攝取於僧者但略舉初一也一攝取於僧二令僧歡喜三令僧安樂四未信者令信五已信令增長六難調七慚愧令安樂八斷現在有漏九斷未來有漏十令正法久住云十至亦爾者彼律三十七問云過去佛法幾時住世佛答云隨清淨比丘說戒法不壞名法住世也現在未來佛亦作是說故云三世亦爾也云二依律論者標也問前已引小乘論了何故此又明之答前是一味小乘執計之論此中是依律本或宗於四分如善見等是或解釋十誦如多論等是或釋二十部中律即明了解正量部等總屬制教攝與前殊也云明了至於彼者本音毗奈耶此言毗尼者此略言毗尼也一能種種勝利者鈔文自解云引生世出世善也引生有二一能引生四萬二千功德正法二能引生不晦之心乃至解脫智論云若得人天果為世善若得三乘果為出世善二能教等者疏解云能遮身口不令起惡即是能教義不為或濁不染故云身口清淨不為見濁所染故名直清淨故名向善道正直故向涅槃三能滅罪者疏解云有二種滅方便二滅正罪謂得擇滅涅槃由戒能遮諸罪障故云滅方便由鄣不生故得罪滅此二俱尊稱為毗尼四能引等者疏云能引在家人出家引未離欲令得梵住從聖得有餘涅槃後轉勝故名引勝義乃至到梵住者論中說住有八一境界住謂如來依十六大國二依止住謂住祇桓僧伽藍三四儀住謂行住坐臥四不捨壽住謂八十年前住五分法身五天住謂佛常遊四禪大梵住謂修四無量定開梵天道七聖住住三三昧即空無相無願為三三昧也八住無所住謂住無餘依戒而般涅槃鈔闕前五故著乃至之詞也五勝人等者勝謂殊勝人是佛次獨覺聲聞皆行其中者即戒也若凡夫解行者亦號勝入若非勝妙之人何能持戒今既持之非勝何謂薩婆多等者一切衆生由戒而有者人天等之果皆由持戒而有故此但約善道為一切也故記云破戒入三惡趣亦由戒而有者屬違戒科中攝也思之功德於彼者指經論二文為彼經是定慧是論即定慧無此功能故除上下文可知云云云善至也者五人持律者據住持僧寶說也大集經云林一村五法師集四方僧是名衆僧如法住大功德海若無量人破戒但但使五人清淨秉法住持則令法滅也四乃至二十人出罪者初從一人懺悔說至餘罪故云乃至身既清淨秉法住持則令法久住不滅也住世五千年者彼論第十八有二五千年初五千年前一千年得三達智次一千年得第四果無三達也次一千年得第三果無第四果次一千年得第二果無第三次一千年得初果無二果此是前五千年後五千年學不得道果萬歲經盡滅沒但剃髮染衣耳若准佛法住世得果是前五千年若論但有佛法住世無果證是後五千年今抄所引列是後五千也五百等者據理合云佛若在世以佛為師等今闕此言故言乃至也若持五戒即見法身者持戒即戒淨因戒生定慧即得知見故持五戒即見法身若護法下喻雙明也謂離法無佛離水無蟲若護法即護佛護水即是護蟲飲水便是殺蟲破戒即是損佛故云飲水殺蟲之喻也緣起如下文說云薩婆多至也者初據結集時說石室內五百羅漢異口同音皆云先集毗尼毗尼是佛法根本故契經不擇時處等者反釋上祕義也不必須半月說故不擇時不要在法界故不擇處菩薩聲聞天仙等說但佛印可便名為經故不擇人律則不爾者反上文也云云分別功德論者彼云二部僧尼說二百五十戒事非外官俗人所行非沙彌士女聞見也又引大莊嚴論者轉釋上文不今俗人見聞之義謂愚癡劣薄不堪守護持於此戒也玄云三乘聖人有智故勝敬重戒得三菩薩下愚之輩癡而又劣輕戒故墮三惡道也若准大莊嚴論是大乘論合在前化教中明今但約文勢於從故在此引古來不體妄非鈔文云二違戒至明還約二教雜明者化制為二也非如前科大乘小乘及制教經論各有科目次第而條別今雖還引化制二文或前或後文勢相從處即引更不作科目次第故云雜明也云十誦至亂者小得心已便謂己聖者但解五停心觀總別相念等名為小得心已已由止也便謂四果之人與我不別故云己聖二白衣生天等者羯磨疏云俗人無法在身但專信故得生天也出家有法為世福田乃反毀犯妄受信施開諸過門令多有情習效故入惡道三有人捨世間業等者如吉栗枳王經云王夢大象在一室中其象方便將身於窗牖中出得其尾却礙出不得佛言此表釋迦遺法弟子捨家出家貪名逐利破於佛戒四破戒人多人佐助者如經云經云王夢獼猴身無威德衆生以四大海水灌頂立之為王此表釋迦遺法弟子立破戒比丘為僧首共相佐助即此意也乃至羅漢亦被打罵者玄云律文在打字也不自修身戒心慧等者與涅槃弟子二十九卷同今取意解經云若比丘不觀身無常不淨名不修身若不觀戒戒是一切善法梯橙名不修戒若不觀心慧𮜒動制調伏之名修心若不觀智慧有大勢力等名不修慧也二畜沙彌三與他依止此二種約師不教訓致此沙彌及新受戒者造作惡業故不知三相者遣他淨人握地不作淨語云知是看是直言為我掘地即不淨語也斷草亦爾溉水者古礙反澆灌之時不作漉紙今但作溉音呼餘文易知云四分至正法者持法者修多羅師持律者毗奈耶師持摩夷者阿毗達摩師摩夷者蓋音訛也應云摩怛理迦此云本母阿毗達磨之異也謂不教出家五衆及在家人等便命約無人結續是法滅也云十誦至故者彼三十四云諸比丘廢學毗尼便讀誦經論世尊呵責遂對面讚雜持毗尼最為勝妙第一諸比丘作是念佛讚毗尼我何不學戒時有上座長老却從彼離學律也引雜含經經云長老上座中年者總束為四位初夏至九夏名少年十夏至十九夏名中年二十夏至四十九夏名上座從五十夏已上名為耆年長老謂初不樂戒初見樂戒者不歎美非謂一向不學後還習學我不讚嘆者下自徵釋云何以故餘人同其見長夜受苦故謂律中先制五夏專於律法令既受後不受樂違佛制得吉如四王天劫數長遠墮地獄受不饒益苦也前段文中約一向廢學即云呵責移段據初不學移仍舊學但云不讚歎與前為異思之云中含至相者准下畜寶戒引涅槃經云我諸弟子無人供給為護正法便即聽畜令付篤信檀越今云不聽者約不持戒者說也摩耶經等者彼云八百歲後諸比丘樂好衣服縱違嬉戲九百歲後奴比丘婢為比丘尼一千歲後不樂不淨觀一千一百歲後毀謗毗尼千二百歲後作非梵行生男為比丘生女為比丘尼抄闕此句千三百歲後袈裟變白不受染色千四百歲後好樂殺生貪賣三寶物上且引經今師製鈔唐初武德九年已經千四百餘若前後諸過皆已見之其中袈裟白未曾目覩鈔主意謂西天有事反問彼梵僧又云佛涅槃後未曾見有白之事古今諸記所釋有殊初解云謂不持戒不染法味名為變白今破云經文既約事變不合於法上也解玄記准大集經云王大施諸比丘已問比丘法王言師等在此住我等當養活為我說法我當志心聽諸比丘默然無有說者王再諸亦然無有說者王白諸比丘不知法耶語之袈裟變白染色不復現皆從床墮落宛轉在地今破云此雖約事變白有教為憑然摩耶經約佛滅後一千三百年說上來所引大集猶是佛在之時似於違也順正記云今時僧尼不依法而染但作淺責葱之色約略變於白色耳今破云既染作淺色即與經文不受染色義全乖今依法寶申於正解唯付囑儀亦云佛付法儀龍朔二年有那提三藏將至京與鈔主同翻譯六卷成文後文云佛欲涅槃之時敕文殊菩薩將佛僧伽梨住須彌山頂起塔供養又勑帝釋諸天雨花散於衣上又勑風神王吹去萎花更雨新者又勑觀音普賢菩薩於閻浮提收萎花起塔時會生疑時有小舍利弗問佛佛言我涅槃後千三百年袈裟變白今賴預前攘之直至法盡亦不變白也欺為定義問鈔何不明答鈔是武德年製付囑儀是龍朔年在後也又問感通傳何不敘答傳是顯度年製亦在後故云云云智論至持戒者此是論第十五卷文寶云彼論皆引喻合法今多將喻向上致有破句之失請細尋抄意如冢者死尸居處也破戒人身中法身慧命已死故枯樹者謂無枝葉花果破戒人萬善花果不生空有堂堂六尺之體由如枯樹不別也羅剎者食人身肉惡心轉熾破戒人害法身惡心不息由如羅剎也大病人者謂臰穢人不近破戒有二犯臰清淨聖人不熹親近毒蛇者害人身肉破戒能害法身也雖復等者著法衣行非法必感䥫葉纏身體非法受用食人飲食心感洋銅器又破戒既不消他衣食等物受施如賊死後必入地獄也如是以下誡勸易知云問至中者論十五卷中因釋般若義有斯問也罪不可得等者若人捨惡行善是為持戒云何言罪不罪不可得耶答中有三意初理觀難稱二若肉下舉喻顯非三今誦下疏出簡濫論云非謂邪見粗心言不可得行空三昧者心與理冥性相寂即罪福俱無故勝鬘云我心既心罪福無主可言罪不可得與牛羊無異者牛羊有眼但見於相不見無相今人無慧眼但肉眼見者准見色異於空不見色空不異故與牛羊無異也玄云彼但云肉眼所見名為非見無牛羊等語誦下鈔簡濫也疏出者疏疏也疏決疏通為義也云四分至道者謂身戒淨即同說戒羯磨二種僧住才破一戒棄在衆外豈非自害凡破一戒為俗呵僧責舉陳佛又種種呵罵故云智者所呵四悔不持戒之恨自破戒也云十誦至畏者彼第二十八增五文也抄合二五為十法彼離問佛有幾法令法滅沒佛言有五何等為五一有比丘至正受二又不能令他解了三不能令至威儀四有說法者不能如法教鬪爭相言鈔闕此句故云乃至五不樂阿蘭若處鈔改作法字也又不隨法教已下是次五文也一鈔闕下羊隨非法教二不隨忍法鈔闕此句三不敬上座無有威儀抄無有字足者字解云不敬即無威儀非謂上座無威儀也亦可深防恐不敬無威儀上座四上座不以法教授上座說法時愁慳令後生不得受學修多毗尼阿毗曇鈔闕修多羅及阿毗曇意在毗尼也五上座命修已後比丘放逸集於非法失諸善法是名滅法反此不滅也好作文頌已下此是別文非關五數今為鈔除第二以此充五謂末代好樂世法如此非出家者所行是隨不思法三乘聖法出家所行今不肯修學是不隨思法律總相明鈔指事說也集僧篇分二初標名二釋云集至二者先來意次釋名初中前篇標戒為宗指於法體行相既知身佩聖法興建有依必秉法住持須憑作法作法之要先須集僧僧有遠近不同故次辨其通局二釋名初云集僧者集謂能集即作相等七種僧是所集即盡界而聚等若據多論有五種僧一群羊僧愚癡者二無慚僧破戒者三別衆僧不同者四清淨僧持戒者五第一義諦僧聖人也又見論有四一者有慚持戒者二無慚破戒者三群羊愚癡者四真實聖人也又十論經四種僧此通凡聖緇素不同聖乃至四果四向素謂在家證果亦號第一義諦僧今言集者法寶云五種四種皆集將來後篇方簡玄記中有兩解一義與上同二解云五中但集後二四中准集初後者今且依上解次解通局者寶云可分別尼聚落集是通不可分別六十三步是局蘭若無難五里集是通有難七盤陀量集為局道行六百步是通水界灑及處是局此約自然辨通局也有戒場大界四處集是滅無戒場大界二處集是局三小界不立相直指坐處此准局此約非法界辨也或有釋云自然作法標界分齊內有人集來並是滅分齊外不要來並無別衆過為局任情思之若約僧說者四人是僧體秉得三羯磨為通隨事不同為局只如四人但作結說等法事是通邊方受戒等不得又是局五人邊方受戒是通被中國不得為局十人能辨中國受戒是通懺僧殘不得又局二十人懺罪等並得一向為通前中狂望有滅有局篇者章品嘉號第者不亂之詞二者增加之數故總標云云云第二依篇釋中諸小科不更列也初云僧至位者僧者以和為義者此句亦為破古人云梵語僧伽耶翻為和合衆約體四人辨結說等事法故云和合衆也今云衆字有濫如三人亦名衆未能辨羯磨等法應不名衆若云四人辨說戒等云名和合者即一二三人元無六和之用有二重之過是以鈔文直言僧者以和合為義但標僧字是存略梵便收得三人二人一人總號為僧但言以和為義即一人亦須具六和豈獨四人方名和合今此和合但是僧家義用故云以和為義也六和者戒見利身口意可知對此略辨僧體羯磨疏云約律准論所成實意攬指成舉攬陰成人人假為體今還以四人陰本為體又云僧寶之體要假法成永法則百千非用等若不齊集相有乖離者於六和中後三不和也即人非攝四儀皆別是乖隱沒隔障等是離以人不集秉法不成被事亦非具三非也云故至通局者開二章也云四至打者准律卅四說戒法中文也羯磨疏云所以先敷座後打楗捶者由聲告即集床座未施停侍拪惶非成將務制定座良在茲焉此則總明集僧之軌度也五分等者彼二十二云布薩時不肯集廢坐禪行道以事白佛佛言應唱時至若打楗捶等不知雖應打佛言令沙彌守園人打初客沙彌打不知處失時節佛言使舊住沙彌淨人打便多佛言應打三通三通如下說不知何木作之除漆毒樹咬人手不堪為之餘木銅䥫瓦鳴者聽作寶云文中是瓦字撿彼律文云餘瓦木銅䥫鳴者聽作即瓦字在上分抄回互在下也有錯書凡字者非也二時者大小二食時也云十誦至也者此是提舍尼戒中比丘在蘭若處逆食女人也引此證俗人得作相也增一阿含等者彼云夏竟以欲受歲令阿難擊揵捶集僧阿難往講堂手執揵捶作如是說我今擊此如來信鼓諸弟子盡皆普集即詺此鐘聲召集為信也動物之心名鼓引此文亦為證前比丘得作也云十誦至也者此文有二意初正明二聲論下轉釋維那義引文本意令立維那唱至時及打揵捶也灑掃塗治者謂西土食當處多立土埵一即於上坐一即安食其坐時謂裙坐埀足踏著地不得懸亦如此土繩床上坐垂腳平踏地相似面前一土埵號為食按敷淨茆草然後安食於上如是淨衣裾坐防於惡觸然其土埵之類仍須修飾塗治等此方雖即無土埵又不裾坐亦有床橙薦席之徒准合灑掃修治令如法也淨果菜者准彼文云無人交淨果菜無人看苦酒中蟲飲食時無人行水衆亂語時無人彈指以事白佛佛令立維那也或云羯磨檀那梵音不定若云維那准智論云翻為寺護若云羯磨檀那此云授事又准十誦三十四云白二法差之今但白衆口差也聲論翻為次第者謂五明論之一數也所言五明者一內明謂諸佛語言顯示正因果相二因明因謂立論者言明謂敵論者智三聲明善解一切語言音聲等四醫方明善窮病根知病來處五工巧明善間一切工巧好藝等今即是第三聲明也餘文可解云若至鐘者若准文中七種集法者引四分集僧法也量影者以一尺木日中取影為則破竹作聲者謂將一丈許竹破開一頭全一頭手執全處搖之作烟者如今時軍家烽火相無別吹貝者說文云海介殼吹之可發聲即今亦號蠡也打鼓打揵捶下文釋之若唱諸大德布薩時到者本非四分七種之數謂七中有打地一相似涉濫非故鈔除之乃將此唱令替之還成七也羯磨疏云召僧七相不離色聲量影望烟是色餘五是聲又此七相皆約僧衆大家預皆通知有此契約方為集法也亦不言比丘為之者謂上諸部經律並云比丘亦得作如增一阿難揵捶等十誦令維那打等此界不言比丘為之令師意顯取於諸教比丘得作羯磨疏云如律令舊住淨人下位打者此召僧法制非具道所為必無二人方聽兼助舉彼證此足知鈔文前舉諸部後准當律臨時詳用抄引出要律儀翻揵捶名者犍字有聲無字令借此字以巨寒反捶者本地音經中亦號犍稚稚地相近錯書為捶字皆是抄寫錯漏故餘如文也云上至投者結上生下文也云凡至中者然後准文鳴鐘具如集僧法中者指軌度圖經明也准大唐區宗記云後周武帝段二教後集僧道中簡取有名行者於內置通道觀安之鑄鐘一口在觀懸掛每至下朝之後集僧道論優劣後周帝崩隨文帝登位移舊長安於龍首原置斷長安城東西兩市一百二十坊遂以一坊置寺寺名興善一坊置觀觀號玄都以通道賜鐘與玄都觀被興善寺僧普廣請歸興善後因淨人不解打鐘致有擊因請大師製此圖軌彼云念三寶存五衆各八輩以四十下乘之三道即百二十下為節今則量時約衆最少二十七下為量八節各三成二十四更加三下總集三乘中則四十多則百二十具列三法今此指彼故云集僧法中也云雖至用之者雖人並為之多無揩式者謂打法人皆作之多分無揩摸准式大有科要多少節解之注者科分也要約也多少節解者打數不定也彼云集比丘打四下集沙彌打三下優婆塞二下集淨人打一下但時所同廢者今行事打法多不依經本故云同廢雖易而難者一解云廢上經文雖易立今打法是難二解云謂經中集大僧打四下乃至一下雖易然界中廣闊難聞且依初解今滅立一法總成大准者標今異昔也滅立一法謂立百二十下為其一法總成大綱准式此乃生起下文三下三十長打四十𣫍捶四十都百二十下之由漸也不同諸記中說思之謂約僧多少等者釋上大准之義也界中百千萬人為多下至三五人為極少也就事緩急約對前事有緩急故量時用之者配量時節早晚或有緣難等而用之且如僧多難集即多打人少易集即少打或雖人多日時欲過及事緣稍急亦少日時由早又無難緣等亦多打一切臨事看時酌度而行用之然大綱不出一百礙下為其間近促即有約僧多少緩急量時或四十八十等不定也云尋常至也者此段明三下也尋常者大小食等生捶之始者初舉杵擬鐘虗揩十下似聞十一下已去漸稀漸大直至三十七下待此聲絶加一下集聲聞聲絶又如一下集緣覺聲絶又加一下集菩薩詺此三捶為三下也佛在時但有此三下故五分云打三通等一下為一通也云後至者者明長打也他請者曰剡膩吒王請也緣起如下文此但略舉未要廣說之其生起長打之初亦同三下者此有八十下初四十下生起如初三下時不時不別也中間四捶聲盡方打者至第十八下聲絶打一下救地獄苦又一下救餓鬼又一下救畜生又下救修羅謂詺此十九二十二十一二十二此之四捶為長打也若准三千威儀經集比丘四下比丘若來餘衆皆集不妨救苦又是集僧兩用通得如是漸漸𣫍捶漸概漸小乃至微末者從第二十三下之後漸概居致也稠也密也漸小即聲小也乃至微末謂從三十下向後直至第四十下似聞不聞名微末也方復生捶同前三下者此段明後四十下也初亦如打三下時至三十五聲絶又一下三十六又一三十七也聲絶又打一下三十八已上三捶𣫍前三下時三乘人也三十九四十此二下連打號曰息捶參挍者前後二段是五分中間曰捶是經文文居中名為參挍律但通明集法說打數不同古師共五斯義可以依而行之從始發聲乃至微等是今師義設亦有請衆盡此鐘樣於臺閣上故云鐘所也云然至息者謂約今時打鐘之人建心標為發殷重意等焚香禮拜其鐘臺上合有形像等讀文便是無義可解云故至云云者脫文文後因他請即是王之所請也准傳傳佛涅槃後六百年中玄記也中錯書一字𦋺膩吒王與安息國王戰獲勝殺彼九百億人最後殺兩賢信人其罪除重一人臨殺時稱南無佛一人稱南無二字之時被殺未知歸向何者為佛菩薩聲聞等既已被殺只當去聲半人既殺此二罪重時有馬鳴尊者而愍於王恐入惡道乃化為地獄王生怖懼遂與說法懺悔惡業其罪得滅時王又嚴駕四兵罰三海軍罰二海了准北海未罰王所乘馬屈足不行王語馬曰若更得北海我永不乘汝也王尋患𤷡諸人惡音汙之坐王頭上因此命終於大海中作千頭魚釰輪在空隨斫隨生須臾頭通於海近海有一伽藍維那打鐘應海釰輪暫住王遂遣信白令為我長打因此釰輪自滅王得脫苦已上依傳中敘録准南南千頭魚者魚身在水中人面在水非謂千個魚頭今時所說及壁畫皆作魚頭故知錯也又文中云遣信者遣何人為信卷傳中不言傳信之人今即未知何人與白羅漢或有云遺商人有云託夢之類者蓋是意況而談終未開典思之此並因緣相召自然之理不妄者凡業有定不定受苦有止不止若作業定諸佛威神亦不能救若不定業不遇緣即受若遇強緣便不受今此是過去善為因打鐘人發願為緣故得聲傳共滅自然感應道理不已已由無也有說打鐘人願心為因鐘為緣雖有救苦之心若不假他鐘聲為增之上緣且不得又雖打鐘若不標志又無感應如此因緣二彼相召方能救苦引解亦有理也余親承下引事證也續高僧傳云西京東禪定寺今莊嚴寺是時有智興律師俗姓宋氏洛陽人也依首律師學隋大業五年仲冬月次當維那常自打鐘有同寺僧法名三果有俗兄隨從煬帝南達江都中路已沒初無凶告後通夢語妻曰從駕達於彭城不達病死生於地獄被於五苦辛酸叵言誰知吾者賴得今日初蒙禪定寺智興律師鳴鐘發聲響振地獄同受苦者一時解脫今生示處思報其恩具絹十匹奉上并陳吾意妻驚覺說夢之由初無信者尋又得夢至於師巫咸同前說更經旬餘凶書奄至恰與夢同遂奉與之而與自陳無德並於大衆大衆咸問何緣感此典師答曰余見付法藏傳罽膩吒王釰輪停事增一阿含聲鐘功德敬導此徹苦力行之每至登樓寒風切骨露手捉杵肉烈血凝致敬度誠勵意無怠初則願諸賢聖同入道場後乃願諸惡趣俱時離苦不意徹誠遂能達感衆伏其言以貞觀六年三日卒莊嚴寺春秋四十有五云世至捨者簡濫也文有三意初標知淨之語二不通俗僧共為之事三勸捨之四分云打揵捶阿含經云擊揵捶智論云撾銅犍捶故云打擊撾等謂俗人與僧同得作者不用作淨語故云不滅於俗及與自為若俗得作僧不得作者則要知淨語故羯磨疏云今有人云知鐘者云是淨打鐘者是不淨夫知淨自不能為令他他作之故言知淨鐘則不爾自他通用何得避之早廢捨者疏云知鐘之語雖非巨害知法之人可以為忌故勸早捨也上集僧軌度已竟云二至局者來處通局者通標所集之僧行來處所有通有局通是廣義寬義局是狹義迮義也初明處之分齊者謂約自然作法處所分覺自然如可分別盡城墻為分齊不可分別六十二步為分齊乃至水界水灑及處十三步是分齊作法界如有戒賜大界四處為分齊乃至三小界指坐處為分齊也二用之通局者約僧說也四人僧辨得一切羯磨是通隨前事時區分五十二十等及一人乃至二十為局也又分齊與通局不別下文用僧中云二明用僧分齊故知一般但製作家回互名言似異耳云初至說者彼云結界原始本欲秉法乃至總意如此是來意又未制作法以脫說通自然是制後因難集便隨境攝約四處有四不同定量分六相差別是開也已上自然開制若論作法或作大法地弱不勝是制如來曲順物情聽隨處結是開此是作法開制也如此開制不同並指下說云今至別者謂今此中直明自然作法二種之數作法有幾種自然有幾等云若作法界三別者一有場大界二無場大界三三小界為小別也云有至集者有戒場大界四處各集不相妨礙者亦據餘法事若大界內作說恣不論內外通須集來故羯磨疏云若作其餘羯磨則隨界分局人即如今抄文四處各得行事若無場大戒二度如文中可知故疏云若論無場大界二處別集以界之內外咸有制約可從集故除前戒場及空地也小界等者疏云以界局在身今坐外無法隨人集結故無外也若許有界別納呵人今於此三位中說通局者若作說恣法內外總須集是通或作諸餘羯磨隨界自攝為局上依疏解也問說恣二法場上有僧須來餘法何不要集答羯磨疏云此二攝取僧法住居行淨之人故制界之內外並通集故羯磨餘法所被多途無局於時多緣別務若制通集還復於勞雖有前開終無後益所以文中同說戒也戒場中亦有兩集依制是局或有難等開於上說戒為通若論小界無通准局疏云無制簡人雖有不集次辨自然云若至用者此段鈔有四節初總標二謂下別列三皆不為下釋名四當律下指用他部皆不為物造者夫有戒之類皆假人物造作如成此之四界不用人力施為方有隨人所居即有分局謂隨比丘所到處任運有界起如月暈隨月也各有分局比丘若在可分別即依可分別為局乃至水界水灑及處十三步為分局等故號自然之界也鈔文既云隨人所居但約一比丘隨此六相之中所居便隨此界有自然分局不同順正須約四人方有自然界者非之甚矣問此四種自然四分有為依他宗答文如鈔可分別依十誦不可分別依僧祇乃至水界依五分等云云初聚落中有二者四中居首曰初也村住曰聚鄰里落可分別為一不可分別二羯磨疏云一則院相可分別二僧在無易委不可分亦二以村聚散落無有恆墻二僧雜閙往返難究今以四句分別一人可分別處不可分別二處可分別人不可分別三俱可分四俱不可分上四句中准第三句依聚落院相集餘三句皆依六十三步集亦有錯解者知之云可至衆者若可分別者謂四句中第三句也人處二俱可分別又須從前未有作法界處方准此集此集也如漢明之時騰蘭初到造白馬寺及南朝僧會來時吳主與造建初寺等此二皆得名為人處二俱可分別也引十誦等者彼二十二云諸比丘於無僧坊聚落中初作僧坊未結界爾時界應幾許問也佛言隨聚落界是僧坊界落也不論僧坊周與不周但依周匝聚落集以聚落相強故注文等者此指十誦四十七增文也波離問佛聚落中初造僧坊齊幾許作界佛言隨聚齊行來已上律文謂十誦有兩節之文前白文所引即二十二卷今注文指下文者即四十七卷文也言行事處者謂聚落城墻外邊行路來往處所也此制分齊者彼云謂箭射所及雞飛及處慚愧人大小行處制此處以為集僧分齊可有十三步已來也若僧坊結界集僧之時此聚落外分齊內有人仍須盡集四分聚落界取院相者當部聚落界但齊院相內故律使若城壃畔若園林池樹石垣墻神祀舍等鈔意云四分既約院相內今若集僧但依十誦第一節二十二文隨聚落界即僧坊界此內不許別衆則義勢相關若依第二節四十七文集他院相外分齊內僧者即與當律限約不等恐人迷此故注簡濫也若爾既云四分無文何有依院相之說答四分雖有聚落界相別為餘事不為集僧無亦是無文也已上正解竟若准玄記中作勢分解見文中有分齊之言錯認以為勢分便云彼四十七云雞飛所及處等古人評云應有百步即聚落體外更有百步勢分勢分內有人須集鈔意云四分僧界無勢分衣界有勢分寶云彼律兩節律兩節之文雖殊然俱是界體無勢分之說前據院相內體下據院相外分齊內亦是界體今但簡不取外體准依院相內體集人抄既不云勢分何得妄釋況乃外部僧衣二界並無勢分何言十誦下文僧界有勢分耶無理思之云問至僧者問意者謂蘭若處僧坊院相不周即依蘭若五里集僧為定不在疑情今或僧坊墻院四畔並周匝為復還依五里為約僧坊集人云答至人者此文意道准十誦云隨聚落即僧坊界今若蘭若處僧坊周匝即同聚落不別文中云分者即是不別也不要依五里集只此僧坊便同可分別聚落後堂記中蘭若中僧坊不論周與不周皆須依五里集猶如聚落中有僧坊不問周不周皆依聚落集者今破云聚落中僧坊雖有院相以聚落強能攝劣故所以須依聚落集今蘭若處僧坊相周蘭若相便被攝却不可更五里也云故至界者文有兩意初引蘭若文反顯二故知下即成村義引十誦五十三文彼云若比丘無聚落阿蘭若處始起僧坊未結界是中齊幾名為界佛言一拘盧舍既言無聚若蘭若始欲作僧坊故知未有院相由是蘭若空逈欲句此起僧坊先結戒也明知先有僧坊院相才周即同村界不是蘭若云律至僧二意初辨四相不殊二結歸蘭若若准此律盜戒中釋村界四相一周匝垣墻二周匝柵籬三籬墻不周四四周有屋至下離衣戒中解僧伽藍四相指同前盜戒中說既將藍指村相當知二界不別引此文證但使蘭若四相周匝便同村相須依四相而集或蘭若相壞亦依五里集人自得無知之罪必院相不周乃依五里云云云若至立者此明不可分別聚落集僧分齊也若聚落有僧不可者知此標人不可分別也僧祇中若城邑聚落界分不可知者此標處不可分別也即是前第四俱句用五肘弓等者准祇第八明菴婆羅樹界也爾時佛在舍衛國有婆羅門問佛我欲種樹如何令其根莖端直枝葉婆佛答彼云用五肘弓七弓種一樹時彼既去尋即波離來問佛不可分別處集增分齊佛便將前種樹方法以七樹六間答之因號菴婆羅樹界也云七樹六間一間有七弓一弓五肘八尺五肘九尺七弓為一間一間即六十三步六尺為步以計之便得十步半六間即六十三步也云不同前解下破古執也古人七樹有七間今云如衣界八樹即有七間便有六間何處有七間即剩十步半界也古云樹根兩頭各有半間勢分今破云僧界既不可有勢分何得妄加古又云圓圓種樹兩頭相就便成一間今破云縱使圓圓而轉亦非六十三步如善見云圍三經一若圍有七十三步半者經過只有二十四步半也故羯磨疏云斯非界愛穿鑿大甚何處有樹即以樹量律約世情假以相顯如上所說立今破昔廣在疏文故云如義抄廢立也云二明蘭若具足梵云阿蘭若亦云練若阿之言無蘭若云事即間靜無事處云統至明者統他綿反通也多種者此律有六種如鈔列名數也頭陀者極小近三里能遠益善二寄衣者謂不作日限六夜寄衣三盜戒者文云蘭若靜處盜物即盜戒蘭若四僧界者即大界五里集僧五衣界者即下蘭若護衣八樹七間六難事者即提舍尼中逈遠恐怖畏難即蘭若受食戒也且明僧界者六中抽取僧界蘭若此中明之餘下隨明者頭陀如下卷說之寄衣如中卷三十中說盜戒亦如中卷隨相中衣界如中卷三十中明難事亦如中卷隨相故云餘下隨明也云蘭至定者蘭若一界諸部不定也多言僧界晝一拘盧舍者十律二十二云諸比丘於空野處初作僧坊未結界爾時齊幾為界佛言云一拘盧舍是中不得別作布薩羯磨僧祇亦云一拘盧舍俱舍了論雜寶藏並云一拘盧舍若爾既諸文中皆云一拘盧舍元來是定何故前言諸部不定耶答辨量不定也故羯磨疏云諸部皆云一拘盧舍不定大小如僧祇云二千弓弓長五肘十誦云五百弓弓長四肘此乃祇文太遠十誦大近俱舍二里半亦近了論疏一鼓聲間者疏云鼓亦大小不定不可為准引雜寶藏五里不近不遠方成行事集僧方齊也可知云若至八寸者有惡比丘作別衆留難也大界內作法不得以事白佛佛言於無村阿練若處結小界受但使前人未入界七盤陀界陀應同意者疾疾結之初結之時即准見論如鈔所引也盤陀者大德云西天量之通稱也一盤陀二十八肘七盤陀二七十四百四十肘更有七八成五十六肘并前百四十豈非九十六肘肘各尺八總有五十八步四尺八寸者一肘尺八十肘成三步百肘三十步九十肘二十七步六肘又成十尺八寸即是五十八步四尺八寸也云三道行至舍者大德云行界有行法住作法二種分齊各殊今抄所列者且約住作法也多云比丘遊行時隨所住處等明知據住作法集僧分齊彼論第七云縱廣抅盧舍界在此界中不得別衆食及別作羯磨亦不明大小者論中但云拘盧舍界不定量之大小也此論中但云拘盧舍界不定量之大小也此論已下今師和會多論解釋十誦律文律中云拘盧舍者長五百弓弓長七尺二寸如是以步率之便有六百步也若至布薩時住作法者結界大小一切臨時自著若初集僧之時縱廣六百步內有人須集問四分道行時開別衆食今文中云何不許別衆食耶答准彼正行之時疲乏之時是有緣諸教同開若暫住雖在道中亦非正緣故不開今言不得別食者約暫住時說也思之玄云若行來困乏俱開今約集僧分齊邊故制已上依鈔消文據住作法竟次於文外懸辨行作法者准僧祇二十八云道行界若比丘共商人行至說戒日有恐怖難商人不能待得即須行誦戒羯磨先籌量齊幾許得誦戒竟隨指山石通結取引乃標寬界狹依標集人欲結界時道中申手相及處坐已唱相秉法結成即起行誦戒亦須相及申手內誦竟准前坐已解之此是一廗之法聊知空礙兩分身耳云四至者大德云於中亦有住作法及行作法今鈔所明亦且據住作法也准五分十八云佛告諸比丘一切湖池一切海皆不得結作法界若有水界中行以衆中有力人水酒及處為自然界有解約中客有力之人不健不羸酒水即十三步稍定若隨衆中取最有力人即不定引善見論者准彼十七云一切江河不得結作法界若擲水若擲砂已外若有比丘不妨也取水常流處深淺皆得作自然潮水不得以乍溢故若在船上若崩岸有大樹根在水中不得擊著水內有樹根應斫去若不斫去與陸地界相連若水中有大石或浮木總是水界攝已上律文謂離地者此約離陸地不是離水底地羯磨疏云問云上水中石木及碇等既與底地連何故判得答舉例云如比丘安居患熱衣服岸入水浴明相出失衣此比丘腳豈不著地由是水中與陸地異故失衣今引此例故知鈔文離陸地也問律論二文並言水中不許結作法界復云布薩秉僧大教僧祇云地弱不勝不知如何答羯磨疏云唯五百問論得結無疑此律論不許者以水虗浮體相難識今則約岸分標義亦可得如僧祇有洲五處標結兩邊水內取三由旬恐持欲度標出界故又如四分江河而結即為明證故五百問云水中住船得結等今若擬住船作法者依文中先下碇石令船一定次即四面准文集僧後乃傍船緣唱相結之縱船內有白衣等且令上岸或不肯上即但齊有比丘處唱之反顯有白衣處是界外也不得傍岸唱相結法思之已上鈔據住作法標狹界寬依戒集人因便明之結法相㒵也未知行作法如何准僧祇文通結取界即標寬界狹依標集也若准此義就上六相盡有依標集僧故羯磨疏云六種自然相中結者標狹相寬盡依自然集若標寬相狹盡依標集云已上疏文問准莫成七相否答寶云六相各別互不相通依標立法一且通六相六相是本依標是未標未歸相本標依相起故不成七如此分明如今由有未知者諸細思之云今更總論二界之體者上明三種作法四種自然一一別釋已知今總更明作法自然之體故云今更云云云答三至隅者謂有場大界無場大界三小界為三也隨處結之不定體之方圓也云若至不定者總舉自然體不定也若分別聚落相為自然體隨彼所在不定方圓不可分別自然之體四面四維若有別界尖邪不定若無別界此界定圓若論蘭若無難五里之內若有別界災邪不定有難亦然道行界者遇水或樹則不定水界近岸亦爾故云若論自然則有不定云若至圓者謂一切依聚落處所故不定也云若可分別人解不同者玄云都有三種一約身四面定量不同二約秉法廣狹不同三約自然界體方圓不同有師云身四面各取六十三步有師云四面各取三十一步半引約身面不同也二者有師言一面各取六十三步兩衆百二十六步有師云各取三十一步半兩衆都六十三步此約秉法廣狹解判不同也三者有師云定方有云不定方圓故云人解不同今觀文勢似不相應下兩段中各自有標起今若於此總說至後消文便成繁雜今言不可分別人解不同者准據當科約身面定量以說不同諸思之云問至耶者引約集僧取最外邊人身面向外而問也云答至相者謂比丘身四面向外各取六十三步未論量作法之時節故彼文云已下引證異衆相見彼此相望只六十三步故云七樹之間而不犯別不論界相者若約自然界相身一面准有三十一步半今言六十三步者且約二衆相望倍說也第二云問至狹者此問意道上且通約二衆相望以明今約二衆各作法各自然之量云何廣狹云答諸說不同者有說六十三步餘僧在外不妨有說六十三步為我界勢分彼衆亦有六十三步須在我界外都百二十六步又秉法時即有此自然不秉法時不合有故云不同云云云今至也者今師云從此處比丘身數取三十一步半從彼處比丘身亦數三十一步半通就彼此二衆都計六十三步注文者破古也古云秉法則有不秉時無今云既號自然不同秉法不秉法常有一定故故僧祇引證可知云今至事者異界自然明彼衆自然亦三十一步半在此衆三十一步半外即無錯涉兩字相望共有六十三步若減則有錯涉過也云今至界者且如東西兩面二衆作法東西二處取最外邊僧相去都有六十三步西僧三十一步半限分自然是東僧限分是西僧深防若除却深防尅體取實西邊各有六十三步半引多論證一邊只有三十一步半身南身北曰縱身東身西曰廣既六十三步約身一面只得三十一步半也第三云問至耶者此正問界體方圓云答至然者古師云文中云方一拘廬舍明知界體定方也今解不然者略斥其非也云若定者雙釋今是古非也羅有餘無教可准者斥他古師若云方六十三步者若角頭量即不常口有六十三步故俱舍云方五邪七圍三直一謂若有物界方五寸邪量即有七寸也圍若三寸頭闊一寸引此證破古師若云方六十三步從角頭量則有餘剩也今言已下鈔自申正解也別界者水界或作法大界今自然逼著他界即災邪不定也云故至也者證古迷名之失也汝古人執教文云方一拘盧舍便望解云自然界體界方今師引彼律文為古解判云十許方一拘盧舍者舉起律文也次即解判云謂約身面所向之方非謂界形界方也次引弟子隨師之文者准十誦律弟子為師持三衣在道行前後師遠明相出恐失衣白佛佛問相去多少令量之得四十九尋佛言齊爾許處不失衣過是則失衣多論解云縱廣亦得四十九尋不失衣過是則失衣多論解云縱假廣二亦得四十九二得不失衣此是弟子身面所向之方雖言其方可亦不得四維行耶即言界形界方也云五分至廢證方須廢也合角量取者意道界形雖三由旬令向角頭邪量取三由旬者即非尼方之義也大德云論文是令字蒿本中亦爾今錯書合字也云二明用僧分齊者前開章時即云用之通局今牒舉時便云分齊明知分齊通局也抄下自辨分齊四種七種不勞更述云此宗四種論僧者此曇無德宗四種論量僧之分齊謂四五十二十也唯瞻波犍度云四人僧者除自恣受人大戒出罪餘一切如法羯磨應作是中五僧者在中國除受人大戒出罪餘一切法應作是中十人僧者除出罪一切如法羯磨應作是中二十人者一切羯磨應作是中二十人者一切羯磨應作況復過二十已上律文云泛至別鈔者泛字一訓廣一訓不委細之稱今取第二說也羯磨疏云有人云但取四人為體三人已下不名為僧故文云大衆者四人若過若今師意一二三人總號為僧明知古來泛爾論僧義猶未盡也狂亂者顛狂由心無記謂狂人亂心人病壞心人各有三種常憶常來為一人不憶不來為二人互憶忘及來不來為三人也睡眠者昏重曰睡攝心離覺曰眠所為之人者如受人懺罪㤸名入法為僧所量也通及能所者諸記中皆云如自恣五德及教授師為差時是所秉約他正秉法時為能秉也若依鏡水大德云能自是所自是所據二人說不合於一人身上辨能所也相有乖越者以威儀中有差互故如隱沒離見聞等並收在此故云不入僧數也通而辨僧則有七種者由前故人泛明未盡今師更通而辨之則有七種故羯磨疏之若互約別衆兩法互有塞非俱盡辨應不名僧然則不爾當分辨號知法者何得不名秉法之僧古人迷名謂僧異數今翻為衆止是僧收四人已上其量不窮故約衆名總攝僧體則有七種始從一人乃至二十對心念法立一人僧對首立二人僧對展轉立衆多人僧四於衆法立四人僧如說戒等五者五人僧如自恣等六者十人僧如受戒七者二十人僧於僧殘罪也各有成敗等者如上七人應體者為成不應者為敗故疏云如心念者以自唱為體若對首告淨即以前證者為體或能所俱體如說戒等法云初至也者祇二十四云四人羯磨布薩一切四人得作若自恣邊地受戒一切尼薩耆五人得作是五人羯磨也當宗律文四人僧中但言除自恣受大戒出僧殘罪且不說除尼薩耆即是不了故引僧祇為明決也鈔上下鈔文易知不解也云前至別者謂上四人本是僧體秉一百三十四番名為實辨一切羯磨隨事三別者羯磨疏云自恣治罪舉證須五人中國多僧善心浮雜故制十人二篇悔治位緣方濟故加二十也云又至故者此約成僧體以明一向須淨若穢不成僧故云云云若至二別者說戒為一受戒為二就此二中則有進否如下自述云為至也者今引文云犯者不得聞戒說戒及向犯者懺悔是說戒揵度文也羯磨疏云有犯不得說戒者戒法體淨擬勑將犯今自沉溺何能拯救有犯不得聞者疏云說序之時文言懺悔淨者默然今心停罪端然應淨欺誑聖賢甚自負責不得向犯者懺者以罪積思除引證對自心前既有瑕無由遣纍犯者不得受他解罪者懺名上起前證染污何能生他後斷之本云若至中者犯戒和上但令不知等者謂衆人不知無有三根但令相淨便堪應法問犯戒和上未審犯何戒耶律文但言犯戒若據今師下之文意至於吉罪亦不得或引犯戒四句約受人知不知等下文廣說餘文易解不子細釋也足數篇第三大分為二初標名二釋初中云足至三者先明來意前篇鳴鐘作相召集僧徒僧有遠近不同次乃辨於通局然則僧通真僞染淨混而難分若不以法蘭之秉務無由成遂故次辨也釋名者緣體相應名為足數事順無乖說名僧相篇者章段之號第者居也三者僧數故總題云足數云云依篇釋中大分二別初總意次開章不更一一分別云云云上至法者結上生下也上已明其來集結上謂七相召集等而用僧須知應法者生下也鈔文解不勞廣敘云託至上與者說無三根之事外章在衆之時相形如法不自言陳等雖體冥然非僧約此不知之邊儀形相順却得足數即第三門中人也必於緣等者謂作法時睡定隱沒雖見聞等儀相乖違號為差脫也不妨清淨者戒體如法雖則體如相既非順却不足數故云入非僧攝也即初門中人是以此二途等者淨穢二種途路合足不合足故須料揀使是非兩異取捨自分者淨僧若相順得足數為是若於緣差脫如隱沒等不足數即非又體穢之人不自言無三根衆人不知相形又順得足數為是必有三根外顯縱在僧中形相無乖亦不足數即非也如此是非便成兩異是即名取非乃名捨三途中並有取捨即自分焉云就中至不足者就中者一解云此正篇之中玄記云就二途之中今取初解好例四者類例合有四門也有作列字錯也初體是應法於事有違者謂清淨應比丘之法然作法之時相儀乖角故於事有違如是當宗外部都計會便有三十餘人下文當更結數也二體境俱非假緣亦不足數者如尼等本不是僧十三難無戒三舉二滅體壞號為體非又自言及三根外鄣有人委知名為境非假作如法之相向衆中坐無乖違等亦不足數也如是之類有二十二人更兼外宗一人都二十三人亦如下列三體非僧用於緣成足此據前來之人體雖不是僧用待人未知將謂清淨又作法時儀相無乖成於足數四約緣有礙不妙成法少不足故謂身有法被治或可犯罪正行行法等名為有礙足別法事一切總得名不妨成法若當法之中即不足數故云少分不足如此之類當部他宗都十一人如下廣料簡也云初至一足者牒章也云四分至六人者若准四分瞻波不足數法中都有二十八人不足數是文圖義足故頌云餘舉滅難為神隱離別場餘謂餘之四衆比丘尼式叉沙彌沙彌尼也舉者三舉也滅謂二滅也難謂十三難也神謂神足在空隱謂隱沒離見聞處別謂別住場謂戒場豈非二十八人若爾既有二十八人文義具全何得此中云六人文圓義足答就二十八人中袖得此之六人一向體淨之者但相中有乖故不足已外二十二人或本不是僧體或壞體等流類於似既無淨體此門不似寄在第二門中列出也已上四分六人且標列名數未得解釋知之云餘至成者欲解此文應先問曰前來據四分不足法中淨穢都有二十八人今師袖得體淨六人來此第一門中出更有二十二人即寄在第二門明二十二且置而不論今於此門依四分所列體淨六人文圓義足僧數者為復只有此六人不足除此六外更有淨體之人不足鈔答云餘者非無此義餘者外也者之一字助語詞也非由不也無者對有彰名此義者即不足義也簡異無不足之文意六人之外更有體淨之人亦不足數但有義且無文何故得知下引捨戒法中顛狂啞聾等亦是體淨然𨵗根識無記等對他捨戒不成元來不足我對首之數若得足數捨戒合成豈非有義然瞻波中無此諸人不足之文即是無文今師引他部分明之文來證成如是類人定是不足故鈔云今取他部明文證成即生起用諸部文意也如此消抄不違文旨有解云二十八人外曰餘亦是一途又有云六人外更有二十二人為餘者非甚也云十誦至中者准十誦五十四云波離問佛若衆睡眠儐一比丘得名儐否答詞如抄引也問既云十二種人何故但列十一答彼律有白衣一人引中未出寄在第二門中何以得將白衣一人充此數耶答准羯磨疏通列十誦不定數有十五人四位列人初列三覆藏人二列睡等四人三列啞聾具二等三人四列後之五人後文云十四樹上十五白衣證知不謬問何得此標而後列答此門本明淨僧白衣是本受戒不得人既非僧體合在下科流類相似今此標者且顯是彼宗都數故其餘人等下文一一釋之唯有樹上比丘易知下不更說今略辨也所言樹上者寶云須約衆中樹若於衆外樹明知不足問樹上不足則知未審有別衆否答羯磨疏云若樹在界內枝蔭界外比丘在枝上是別非足以從根斷故若枝連界外地比丘地比丘在外枝上即非別也若樹在界外枝蔭界內比丘在界內枝上亦非別從根斷故若枝連界內比丘在上亦成別衆云義加至攝者義加醉人者夫秉法足數非所言教須會解是非今此極醉之人口中出言自不能解緣本與骨前後顛倒異於聖言前人何得明委故云前人不練今師據十誦亂語人不足數道理義加此之一人也不解之人是不足攝者大德云辨不學人也謂初學之者未能洞達是非名為不解今師准伽論癡鈍之人不足數道理加此一人亦合不足玄記釋此二人分為兩段初明醉人不足之相二前人下別辨不解之人不足者妄科抄文義勢斷也思之次都計數者四分六人十誦十一人伽論三人僧祇九人義加二人下解釋中更加露地隔障一人總來三十二人在此初門攝玄記次露地隔障一人但三十一也云就至柝者標也就不足數中相狀隱密難知者隨前標列中次第一一解判分柝也云初至用者所為羯磨者即僧為於他僧是能為彼是所為也以此人是乞法之者正釋也謂就僧乞羯磨法等為僧所量不入僧限者僧量他前人合與法等自身不入僧之正數故若將等者謂若將此乞法之人足四人數者即僧不滿四以所牒人即乞法者不入僧用也次徵難云若至故者若爾二字領前旨也意道若所為人不得足數者今領解云若爾也向下正難云四日受日四僧不列亦應得成謂律文於四人法中但除三事謂受戒自恣出罪既不列除受日明知爾時將受日所為之人足前三人成四人道理應得可引鈔答云一人所為三非僧故不能秉法謂一人是所為牒彼比丘名字入羯磨時即任運不足已外三人非僧何能秉御得聖法耶今更難曰上言一人所為三非僧故秉法不得必定能所須五者何故得律文不列除受日鈔答云文不列者事同五人並是所為故四人僧者直取能秉意道律文但據能秉四人列除三事自恣受戒出罪其受日事同五人非正五人僧作玄云事同五人與自恣事相似不論乞法不乞法並是所為故此解自是一途也又難云說戒四人戒師在內結界四人唱明比丘在內何故得足數耶答文如鈔可解云初至故者神足在空等者母論第六云若比丘用神通力在空中住欲受戒者師及衆僧在地若師在空受戒者反衆僧在地乃至師弟皆在空不得受戒何以如此下句釋云空中無分齊等謂不可結界故又准彼文但離地四指取人指即四寸便與陸地別也隱沒等者謂入井窖說文云地室也在界內是別衆極中有乖是不足也離見聞者標也僧祇中謂同覆處離見聞者即舍屋之下上面有覆總是同覆處在此處作法不得離見聞即不足也其相如室宿中說者准下隨相中與女同宿戒辨室相有四種一四周有障上有覆謂如今房堂等是二前故無壁謂如長廊下或聽屋處是三雖覆而不遍謂四面並周匝上亦通覆但開中央即如今時明堂等是四雖覆遍而有開處謂少開明孔等是寶云室相四種指在下文今但據上面通覆遍即成同覆處在下作法即不得離見縱在申手外無過玄記云室相若成在室內作法不得離見聞若室相不成須在申手內者此非解也此謂已下料簡但約此坐之人展轉離見聞不取說戒師等見聞也如義抄者疏問為俱離互離答俱離則不足謂不見比坐人面不聞比坐常語聲故若互則無過也別住者標也昔云等者古師解別住義也今破云一界不集來但是別衆收不名別住也今謂下鈔主據作法之時三人在大界體上一人坐自然界以大界內雖他自然地上自然地上比丘即成界外不足數故此更約作法處相近說也問既知彼之比丘身坐自然是其外界何不呼召入來法界之中鈔答云非謂眼見在外界等云云此約前人法界後來不委知分齊謂言同是一界但此比丘坐在自然不論知與不知冥然作法不熟故云不足戒場上者標也由前已下釋也謂前來三人在界內一人坐自然既是界外即不定數我今戒場在大界內既非界外其戒場後是作法地非其自然今或作法處近他戒場將此場上一人足我大界上三人之數得否鈔云引二界下釋不得也二界者大界為一戒場為二也同在自然等者後堂云一人在戒場上是中間自然內也三人在大界上是中間自然外雖則戒場在大界內由中隔自然成其兩相亦是別界攝如何成足固不可也玄記云戒場外一重自然大界外自然所包故云同在自然非正也此中但論戒場及大界隔中間自然不同一相是別界故何用論他大界自然今取初解云睡眠至說者睡眠者神昏四睡目食曰睡亦云離覺曰眠准此重輕別也亂語者說文云亂者擾也以事擾舌名亂語也憤閙者多思謂之憒古對反閙入定者謂若入有心定別有靜慮所持若入無心滅心所心至於忍哩不同僧和雖在衆中不可為足也由無心同果秉法故者總釋上三種之人不足之理可知十誦已下引證也律中因六群證他受戒事佛問彼彼云並不知遂立制云不得睡定莫餘思覺等准此僧數多等者謂若作法處僧多如十人受戒是正數今有十五人等於中或有一二人睡定等亦許成就法事但正數周足即得若作受戒和上必定不得睡定以是得戒根本故不開也縱在房內等者因便說無別衆之過記云睡醉無知失比丘用猶如狂等失用亦爾開無別衆餘同羯磨法中說者寶云准疏云始終睡醉即無別衆中間若覺亦成別衆也玄記亦列疏彼云見聞又絶不名別衆即將足別作四句等引此一段似不相應更有古今妄解鈔文恐繁不録云啞至事者一啞二聾三等者具二也羯磨疏云此等三人根壞非證也並闕二能者謂闕聽能說能也下引伽論料簡可知云狂至三者狂等三人者一狂人二亂心人三病壞心人由心無記等者釋不足之理也既不憶身非善非惡無記也若准律中等者謂十誦但有狂人不足數文且無輕重只類今師却依四分捨戒法中明三品故云若准律中云云問好人亦常憶常來此何故名狂答好人若知緣事不說即不來此狂不論說與不說至半月即到來不知增減等不憶不來者此一向重不憶半月說戒等一向不來也互憶忘及來不來者或時輕或時重不定前半月憶後半月忘忘時重憶時輕故云互憶忘也及來不來者有時憶即來有時憶且不來若妄時不來即無過今憶而不來即成別衆故須以法隔之若得法隔乃至病差未解法者亦通皆不足也痛惱心亂例同狂三者明後二人也皆有此三品之相若一向輕如狂中常憶常來一向重如狂中不憶不來或輕或重如狂中互憶忘及來不來人例前易委故指同狂也問此三人如何簡異江西記云身口心俱狂即狂人收心狂身口不狂即亂心人攝身心狂而口不狂即病壞心人攝也云重至乖者重病等者謂其病重不察是非心既昏沉無情緣法故不足也邊地等者梵漢語異不領解也必後相知二通相足癡鈍等者謂不知能詮之名言不解所詮之奧義不識二持之相則未了是不識二犯之相則未了非如此之人則非處重斷割之匠也必言解等重料簡也謂於白三十番中但解受戒白四一番故云齊文而已便足受戒僧數若餘番未解即不足餘法事數也此且一解玄云齊其法事人界之文不解其餘律藏名齊文而已又約無人方開他足數引解稍疏問此癡鈍與義加不解人何別答疏云引人雖各各而不知根鈍難明律制盡形依止前義加者但准不學或學未知名為不解故有別也興欲等者送心達增名心同身在房中號身乖羯磨疏云堂中作法遂收欲者以入現數故名非足云隔至內者寶云此有五人抄言謂同覆處而別隔等者此解覆處隔障一人也且如三間堂內以物障隔三人在兩間內一人在彼一間內即成不足或言露地等者此義加一人也今師准前祇中覆處隔障既乃不足或時路地作法有障隔豈可成足雖申手內有障亦不足也玄記中不曉此義加一人但科為反釋上文也半覆中間下列餘二人也謂半僧簷等下釋上半覆中間障半在階下釋半路或復無障下解半覆申手不及也並非同住下通結也露地下釋露地申手不及是第五人也此言相顯者兩說一云相平呼謂露地申手不及相㒵顯現易知露地無覆攝僧義弱故須申手相及不同覆處二解云相平呼顯故作是說為反顯於露處故二釋各有理今且存初解餘文可知云二由具二非假緣不足者一體非本無戒故或非僧體或壞僧體二境非三根外彰故云由具二非也假饒在衆儀相如法之緣亦不足數也云四至種者准律文若為比丘作羯磨以比丘尼足數乃至若為比丘作羯磨以應滅殯人足數並不成也鈔文存略故問於十三難中破僧一難為受前破僧為受紋破僧若云受前破者既未受具如何破僧准文中須是大比丘故若受後破者但得逆蘭初受時既納得體成清淨人身在僧中儀相無乖理合數具足數何成難收答正破僧時理是受後但得逆罪戒體如法今但據再受不得便成難收既無戒體何成僧用故不足也古記不練輒妄敘云律中有十二難破僧之者體是清淨有何不足此未知文意也思之云問至足者問意可解云答解了途者古來製作十五六師解此一文莫過三說一師云此二十二人尼等非僧體十三難人無體三舉二滅體壞律文但手列此二十二人云不足數亦不說自言及與知不知等明知約體冥然不足也相部釋此解二師云此二十二人不約體論唯據用辨於用中須具二種方成不足一須自言我是如上等人也如衆中有不淨比丘佛令聽與自言治等二又須人知如律云聽以肉知他惡法等具斯二種方成不足若衆中雖有人知彼未自言或彼雖自言無人知委由成僧用也東塔快此解三師云於上二中但隨具一即不足也或自言不假人知或三根外顯為人所知即不假自言准律中有說自言處即不更說人知有說知處即不更明自言故知不要二種兼具有斯三解故曰多途玄記三義中闕一師義也云今至等者鈔云於前三師中扶第二解也而東塔疏同計此等二字指二十二人體既非僧者僧者體非也若僧同知者境非也反上成足如與欲中者引彼失欲文義來證之如與欲中自言即失欲不自言失例此自言即不足不自言得足外難曰前門中所列三十二人如神隱別住等縱僧不知冥然不足引何故知即不足不知成足可引鈔答云不同前門知不知等意道前是體淨相儀有違今是體穢須自言說後方不足故不持戒和上四句等者此受戒犍度未文也阿難問起此事若和上十三難有一一事第授弟子具足戒第一句從不持戒和上受戒約有疑問佛汝知和上犯戒不弟子云不知佛言得名受具足戒第二句雖知和上犯戒不知不應從此人受佛言亦得戒第三句亦知和上犯戒亦知不合從如是人受不知從此人受不得戒佛言亦得戒第四句亦知雖受不得戒佛言如此具知不得戒也例於前來知不知得足不足亦是如也所以文中及十誦等者文中即四分失欲文也一一難下皆云我是十三難人等不成持欲又十誦三十云犯重罪人賊住邊罪一一若先有是過作法不成反上成也引上諸文為證前人一須自言二須人知方為不足羯磨疏云人雖體非相有僧用各不相知理開成足云昔至故者文有四意初敘古解二破三徵四釋非也昔人以體不合等者謂准五分中和上若在十人數內不名受具僧祗十誦亦然今准此例故將在十人之外也引非正解者破也謂四分制十人僧和上在內故知前來非正義也何者二字徵起古人之非下遂釋云若不知犯則不得輒用他部等今師云若明自心中知前人有犯縱在十外亦落非中即羯磨文中不許牒故若先不知即在十人之內亦得何故輒將他安於十外進退皆成妨礙云十誦加一白衣亦不入數者謂是初門引彼律十二人中之一數也前門簡退寄在此門今欲解判之故且標起云上至義者此明古師通辨境濫也先釋二十二人次釋白衣一人上明僧相形同出家者指前來二十二人並是大僧儀相身形與出家人同等相有濫故得共法事者相㒵與善好比丘相濫雖則體非衆人不知他犯又乃威儀齊整是以得同法事足於前數如著俗服等者此釋前來十誦白衣一人也古師云此雖是淨戒比丘然著俗人之衣相形分明了了衆人皆謂是俗即無同法之義不足數也云十誦白衣至衆者前來古人辨二十二人境濫成足道理極成若言白衣是淨戒比丘著白衣服不足數者此非解也既不可准故更釋之十誦白衣謂本受戒不得者今師解也約他登壇之時不解發心沇緣諸善或可師僧秉法落非冥然不納戒體還如不受一般故取本來之號詺為白衣也亦有受後難緣等者反破古師所立之義也謂有比丘受戒之後戒體清淨然有難緣暫改形服亦須集他不來成別故羯磨疏云有人言先雖具戒有緣須著俗服者亦不足數以無威儀故今不同之不以滅儀定僧體狀內具戒見財法應僧外虧道相為有緣難如五大色不令受持為難服用豈不同秉可以例也餘文如鈔云三至中者謂上三舉人也羯磨疏云既本無信故作重治弃在衆外義無聞法信行俱壞律簡此色同於犯重治法如衆網中既有法在身故不定也滅殯者羯磨疏云為非既重加覆既染心故作法治出海岸也應滅殯等者有三意初舉來未加法羯磨疏云根本已壞去僧彌遠將欲殯遣逢難且散二若雖下三二人為別三或下衆內一人知也並者結三種之位也今觀文意前釋約舉來僧中以釋即局後二約別人知以釋即通雖通局有殊然俱名應滅殯也云第三至用者體雖非僧者三根未彰又未自言托緣成用者據四儀無有違逆得成足也云即至事者此約體非境如三根未顯又不自陳故足數相中無違者無隱沒等狀相便得辨事云故至等者引證可解云十誦至就者賊詐者玄云十誦二十一云舍衛中有一居士妻子亡紋家計貧虗自念沙門安樂遂剃落成僧相故諸比丘問幾夏皆不知又再被詰問遂自言我是賊住諸比丘白佛佛言若未自言已前得足數自言已後一切不足本白衣時破戒十誦三十七云若先言我破戒後作法亦不成先作羯磨後自言亦得成就云薩至說者如文易知云自至類者顯自言之相也玄云上文為有並安若言此出自言之相故問此之自言為告當衆即不足為五中隨告一衆便不足答講者相承有兩解一云唯告當衆舉例猶如發露亦須對同衆又據前文云而別人內知又衆內一人知即不足等二云五中隨告即不足也不類發露准前文云不持戒和上四句但受人不知即得知即不成可以為例任情思之云四至事者牒草也丶云四分至呵者解義如僧綱中說之問此上四人為一切羯磨皆得足數為除其本法答除其本法今文中一切之言亦據本法外說也玄云此四對此羯磨體是不足故知不謬有釋云一切羯磨并本法總得足數但為奪三十五事不得呵秉法人故云少分不足此犯稍輕却無白停之義此非解也問若爾四分瞻波不足數二十八人中何不見列此四人答既足得諸羯磨數故不列也問此四人足得覆等羯磨否答不得以俱是被治故對此引羯磨疏四句一得滿不得呵即此中四人也有人云既得滿數要伴證法或秉法落非不敢言呵何用足數答但約不得高聲呵止若軟語咨陳有何不可思之二不得滿得呵人疏云謂受戒者問既云受戒即是沙彌若先不解羯磨則要如何言呵若曾誦持識於剛骨豈非盜法成賊住攝請為答之一解云約聰明沙彌第二番羯磨落非說初白及第一番即未解呵止二云據比丘先清淨捨戒去今復重來以說或約增戒人說亦得二解各有理或有解云謂據所為人如受日捨懺自身不足然得呵舉難云疏中既言約受戒者說所為受日等非受戒人良不可也大德約尋常受戒沙彌壇內秉法時見師僧威儀不整或眠睡之類喚召令覺便名為呵非呵羯磨也未敢依之三得滿得呵人謂清淨等之者身參衆務常法故第四句不得滿不得呵都有六十三人四分三十二人十誦十五人伽中三人祗文九人五分背面人義加三人講時亦不在繁點名字也外難此即所列十一人其中呵責等四便初句得滿不得呵覆等七人乃入第四門不得滿不得呵中攝一等同在此門何故安排不定大德云據脫犯過人輕重有別故不定也知之云覆至事者玄云義准通前合十一人並不足此呵責等羯磨治罪同故餘不繁録對此更結都數此門十一人第二門二十三人第一門三十二人已上六十六人不足數也上來釋足數正篇竟二別衆法附云次至不者先明來意玄云足別二僧互有交涉對簡即易故附而明釋名者注文是也同一界住相中有乖等者初通明同一界者謂攝僧大界也相中有乖者謂作法時不來也次局解一界者僧中也相中有乖者儀相不如法也被事不成故云別衆問此中別衆與下隨相中別衆何異有人云此約法彼約食引說全成眼淨取笑於人也大德云能所有異別衆食戒約能別成衆所別不論多少此中據所別成衆能別不論多少請思之問未審別衆罪五篇中是何篇罪答有解云偷蘭或云吉羅俱未有教據若准隨相不與浴輒起者是提其文猶狹今此別衆文從律瞻波中來通衆中界內後通三業不順類例結提又別衆食戒亦是結情過邊提也諸記中並不評量今故繁述甚為要矣初中兩字牒舉別衆之相第一段文也云四分至集者謂約三業辨也應來者簡不應來即十三難等若清淨同住合來者今便不來是身不集身既不來不能證正羯磨是口不集心不忍可是心不集二應與欲不與欲來者清淨有緣合傳欲名身心不集身不來是身不集不送心來是心不集難曰縱有緣傳欲身亦不來何故此言身不集也耶答若傳欲來身在房中無過無不送心身在院中有別衆過故云身不集也更難既不傳欲口亦不集此何不言答設若傳欲口在院中不能正證羯磨故不論口縱在院中不與欲來口家亦無別衆之過何要論量上依搜玄正解竟或有釋云口屬心管心既不忍口不自由如火禁子之例恐不及前儀思之三得呵人呵等者簡前呵責等四不得呵今是清淨等者之心不同法口發言呵名心口不集云及至也者順相和合也一應來者來三業俱集即今起堂是二應與欲者欲來是心口集送心達僧是心集口說付他是口集難曰前來違相中第二段不與欲來是身心不集不言口今順相和合即是反前句何故却有口集答前段不言口者是證正羯磨之口身既不來口無集義故不別論此言口集自是傳詞向之口業非關他證正之口思之現前不呵者是身口集身來在僧口又不呵等又云舍利弗等者此是十五哩中初句如下自明謂見衆僧如法羯磨謂是非法而心不忍且不呵之亦名和合如法云又至人者六群者多論云一難途二跋難陀三迦留陀夷四闡陀五馬宿六滿室至說戒處衆僧坐彼便立此四儀有乖是別衆非法也五分皆說戒坐臥等者玄云背坐背臥二人云等也大德云此但論背面縱使坐臥俱是背攝不合妄分兩人若約坐臥四儀有乖下引祇文自顯也僧祗十二種人者四儀各言成十二也易知云別至數者謂約別衆淨僧對前不足遞互交羅錯涉合作四句今且分二若不到僧中名別衆若到僧中儀相有乖名不足數故云且也云然至別者寶云約寬狹料簡也若約體論不足通淨穢別衆唯淨境若約處明別衆通衆內外故寬足數唯在衆中不足通內外也四句如別者羯磨疏云上雖通列名含是非但為緣差濫通淨行故以法簡不宜混雜就分兩對初四句者一是別非足十六人一應來不來二不與欲來第一門中隱沒離見聞隔障等五第四門中僧殘行法七人二是足非別一人即善比丘身參衆侶德行昭彰故兼兩位三亦別亦足六人得呵人呵并背坐及四儀乖越人四非足非別三十九人第一門中十誦十一人伽論三人義加三人成十六人并第二門中二十三人難曰於中不解人睡人醉人狂人為有戒體為無體若云無體即是十三難攝戒是白衣若云有戒體不足可爾何故不別答有人解云在衆中故不別以不解及睡醉故不能證法不足此非解也鏡水大德云准戒壇經作業成敗門中南山自釋云夫秉法者非但一僧獨誦並須通衆其解有不解者非足非別以暗昧莫知和忍之緣熟識同別之相故非二攝不集無咎准此且釋不解人非三攝也睡眠醉狂者㠋記云睡醉無知失比丘用例於狂等失用亦爾准此例前不解之人相同明鏡思之二更將不足對別衆作四句一是不足非別衆如所為作羯磨人二是別衆非不足數同上第三句六人三亦別衆亦不足同上初句十六人四非別非不足三人神足在空別住戒場上並異界收也云若論至也者必無解法亦開秉之者玄云開說恣二法一切羯磨不得別亦無過者作法之時不集來無別衆過中間人者上不及大僧下不同十戒沙彌故云中間也云二解或不者玄云約所別之僧又約能秉法僧成別不成別故云成不更助一解上雖約四儀三業以辨是非然於五篇所犯重輕或知不知等未曾委練故次辨也云若至開者別犯下四篇是別衆攝者謂過相輕微故別犯初篇縱三根未顯衆人謂言清淨亦無別衆謂過相重故無任同住冥然不別也文云已下證前來體壞不障法事在別衆義此有法喻本文云界內實無比丘橫起有想以實無故羯磨得成既有淨想即合喚來由心不欲與彼同法犯不應吉故引喻竟法合者如前犯重體壞如無比丘約人不知今有淨比丘想即合召來由心不同得不應吉鈔文云縱謂淨想亦成法事前作想謂是不知今既已知隨意別也十三難者邊尼賊破等十三人也尼等四人者大尼式叉沙彌沙彌尼也有將學悔為數者不然也前來中間人已說了不可重述三舉謂不見等三狂謂狂人亂心人病壞心人啞聾𨵗識也或本非是僧者結釋十三難人也或中途被罰者釋三舉人也形差者謂尼等四人也三人則男女形差沙彌則大僧法差病報者釋狂等三人也緣礙開之者釋啞聾二人也或有將緣礙字聲結前來諸人者非也云凡至中者凡者諸也此等二字指前來流類人也未論足別者謂前來廣說足不足等皆據足四人僧數以論未知對首作法之時足得我別人之法已不前未論量此門方辨故云未論足別也難曰此是別衆法附何故重說足數之法答因便相從故明由如足法中因便亦說別衆之義故前文云縱在房中理亦開成亦是因便也若對首作法前境濫真者謂二人面對作法是對首也所對之人名為前境濫真者體是緣礙名濫體若應法名真例取僧中者若此等人足得四人已上僧法即得足對首若衆中三根外彰不任用故不足僧法今來足我別人對首亦不得故云例取僧中難曰對首是兩人法何用論足別答約他本是衆法為界無人故開對首今雖有此等人不堪足數不共作法無別衆故又但對首持衣說淨等雖有此等人亦不堪對首不共彼作但自作對首心念亦無別衆之過更有不正義慮繁不敘云今至順者多有別相者別衆相狀也更顯明之者更重也顯彰明舉也威儀相同已下開兩章也云言至祇者僧祗行作法事等者據相中有乖也五分病人背者謂面不看秉法人故是別衆此但論背不論四儀知之四分六群不坐亦是儀相乖也如律別衆中說如行時食者既捨威儀便犯足也僧相同穢者此約食祇據法法食雖殊四儀不異故是同也云二至列者二心虗實者玄云順為實心違是虗心准此但釋得虗實心未說得二字出處諸家解云虗為一實為二故云二心虗實恐未當文旨今作准南記云前來開兩章門鈔云衆取威相同是一章不用心順為一障初段中釋云言威儀者據理合云初言威儀者製作𡞞少不著初字今言二心虗實二字即牒章心違成虗心順為實不得見文中二字便言之心也餘文可解云若至中者此段文大意約說戒時維那秉白者理合在靜招邊鋪坐具胡跪答法云說戒羯磨其戒師未得便秉單白且待維那歸本床上坐說方作法若便作白彼在僧中行此即成別衆也若便在砧邊坐或今時直依本位答法即不在此限也廢立如義抄者至下第五篇中十緣之內亦更說之廣辨如羯磨疏述云就至說者此段鈔文大意謂前廣說相儀不順如秉法人坐餘並須坐人一不同即成別衆此且據多分為言然於坐僧之中作法之時亦有立者儀相雖乖不成別衆問是何人耶鈔遂釋云除被治人以是所為羯磨者不足僧數謂今日衆僧特為彼人作法彼既不足僧數雖然不坐亦無別衆上且清文雖則如是更須料簡其所為之人須具二法者方聽伊立無別衆邊一是所為二不足數如提婆達多之類邪衆為僧所治又不足數更有犯重滅殯者三舉人惡馬哩殯二人已上一任坐立不障法事無別衆過若論呵責等四有戒體即須坐作若立不成謂彼足得一切羯磨故不得一向雷同多有迷此一節便云凡是一切治罰皆許立者全成猛浪也餘有所為坐乞如法者九法人順情為解必須三乞不爾不成又須同僧坐不爾別衆懺夷殘等並是順情亦須坐乞尼懺殘亦三乞長跪作之老病離衣二房等例一一類知而通解也文義明說者玄云律明入衆乞法須且五胡跪合掌等是云秉至得者此文大意前來明秉法人定須坐餘有開不開已知未審秉法又立作羯磨餘人却坐成別衆不鈔文釋云除二種人一威儀師者此是僧差不得輒坐必立秉法即成若坐不就也二開立說戒者謂衆大聲小初雖制坐有緣開立亦無別衆自餘一切皆須坐秉者餘者外也自此二法之外諸羯磨法如結界自恣等必須坐作行臥不成注文云必有餘緣行臥亦得者玄云王賊難緣亦開行作法故祇律二十八云諸比丘白佛立作羯磨得不佛言得行住坐臥作布薩也且消注文更須料簡初約能秉人次約僧衆只與如賈客行今日是布薩日商人不住恐有賊盜比丘即遙指山石依標而結行念戒作單白此是僧緣行作法亦得或有碩德之人明間教相尋常被事是他秉法今衆人欲得彼人秉此聖法今有疾患久坐不得若如是者開他一人臥秉無過餘人即坐此是緣礙臥秉亦得次約衆僧以說者作法之時僧中有一人二人乃至多有病若尋常法事即許與欲此約大界傳欲不開必須赴集必若文坐其病增劇未審如何初依玄解云病人重不能坐則隨病者臥秉法人并一切僧總須一例臥若但病人臥諸人坐即成別衆也此釋非也今依法寶云病人但任情而臥秉法者及餘僧不病即坐此是有緣開病者臥餘人無緣不得然須面者佛象及秉法人若背面即不得故五分律云病人背說戒坐臥佛言非法今既不背有緣開臥道理酌然不同諸家謬傳文義思之更都計別衆人數應來不來人應與欲與不欲人現前得呵人僧祇四儀十二人五分背面人已上十六人為定玄記分五分背面為二人更并六群不坐都十八人者非也已上簡衆竟受欲篇第四分文為二云云云受欲至四者先辨來意前明體穢非足數之所收既曰淨僧義須盡集忽有緣礙制令達心則機教有憑彼我齊益若斯之義故次明之釋名受以領納為名欲以悕須為義彼納此須故云受欲應法為是不應法為非在三之下故云第四釋中云夫至辨者總意也夫字如常解事者玄云三寶病患之事外來非心所惻故云不意也法出恆情者說戒自恣等是法僧衆恆常之務由佛制故所以半月常說佛法久住不滅又如自恣舉罪七支清淨不孤獨故每年一度至時常作故云常情也故對情而順其心者謂對前來說恣恆情之法我身既有緣不得赴集遂送心達僧表無違背是順心也心順於法無失者既有正緣傳欲表無乖違免有別衆之過堂頭法事成就故云於法無失故名欲也然則情事相反者一解云應先難起既許順情傳欲得何用此篇可引鈔云然則已下云云意云說恣常情須集不意之事忽生求來不得是相反也據此消文意由未盡今更一釋情者謂是說恣常情及諸羯磨等法也謂是我不意三寶病患之事也約法及事互有是非故云相反如今日堂頭所作之法是說恣等如法之法房中身上之事又實是正緣此則與欲得成事法相稱何要更述此篇之鈔今緣堂頭法事雖則是說恣常情房內因緣且不是三寶病患之如法之緣務與欲不成得罪此是事反於法也或可有時房中之事却是正緣堂頭羯磨却是正緣堂頭羯磨却是非法則不合與欲此是法反於事如是法與之事互有是非故云相反也故立法以撿之者故者因由義也由於前來有此相反須立法則以撿括也撿則有事必明者搜撿諸律有受欲之事文必定明之若明故對門而辨者謂不可一處長途而解下遂立緣法二門對之明也云初明其緣後明欲法者准曰諸篇開科皆云就中分五或云分三等今此亦合云就中分二何故直爾分科答大德云製作不定臨時變通謂前總意中云若明故對門而辨即當去聲就中字也此中承上來語勢使云初明其緣等云云云初至非者列科可知云初至欲者辨制意也凡者諸也諸多羯磨之法事必須身心俱集者皆令赴堂也設若有緣等者謂忽有三寶等事緣求來不遂佛若不開他送心達僧表無違背故云不開心集也機教莫同者機是有緣比丘教乃如來所立之教教不被機機不稱教故云莫同也以太急故拔濟之義何在故聽傳口心者寶云可回文取義云故聽口傳心應僧前事也方能彼此俱辨者方由則也彼即僧僧事得成無別衆失此是私己私己又緣又能句當兩處成就豈非俱辨緣此故開與欲也云釋至背者釋名者前言欲之一字已是其名今但要知他名下之義也凡言欲者多以怖須為義者凡者諸也不但傳詞獨得名欲諸所愛樂總名欲也多以怖須為義者諸律經論中多處文說並云欲與怖須為義若據梵語伊車上聲翻之為欲悕求悕望字從心作即訓求也故俱舍云欲者悕求所作事業唯識云云何為欲於所樂境望為性等欲明僧作法事已下鈔自釋也謂堂頭作法我心決定擬往願聞羯磨說戒今有不意之事忽生與心相違是以口自傳心悕求之事令衆委知無其違逆故云欲也云故至法者引律論二文轉證前來多以怖須為義可知云辨至說也者辨體者前既釋名名以召體未知欲法如何為體故次明也若據羯磨疏中體有多種約法相約事初約法出體者尅性以欲之一法為體此欲是心所家法即通大地中受想思觸欲等即此欲之一法為體也次約相者色聲為體跪禮合掌是善色陳詞是善聲所稟云若據傳付他了亦是非色非心為體謂有得得連持在彼心識之上若爾與無表戒何別答有二不同一此雖是非色非心猶屬能詮體攝二此體雖非色心得連持忽遇強緣非得來贊冥然便失若無表戒是所詮體一得不失是以別也三約事辨體即此鈔文自述欲之所須有二者謂有兩種事體一衆事二別事初衆事者抄云自有僧私同須乃至若叛有罪羯磨疏云如說恣等期至必說說必在僧若不界內撿挍推覔僧便有罪必私外避出界亦犯是知僧私同須也上且一般事體自有單僧等者明別事體也單僧即是當時一期秉法被事之僧也如受戒下鈔舉事顯也僧須我和我不必須者意云彼辨事之僧十人五人須得我和赴堂傳欲我自己不必須下句釋云佛不正制謂說恣常法佛制一切同遵不論內外一人不來皆制與罪若論受懺罪此是為別人作法佛且當初不制我亦須赴堂既不正制不去無過是知彼則須我我不必須云二至故者玄云先須識制故說戒犍度中結作法僧界文云不得受欲此律明文不聽受欲故云唯除結界雖非已下釋上抄文餘並開之問律文但說戒自恣二法即有開欲之文餘羯磨並無開文何以今言餘並開之雖非已下答也律中雖無明文開餘一切羯磨云並得與欲而六群稱事與欲中佛言自今已去但言如法僧事准此如法之言義似密開即知一切羯磨皆是如法合與欲以非制故者律中則制除結界一法不得與欲已外其餘一切羯磨則無制不得與欲之處故知餘並開也云三定緣是非者標也如法緣為是不如法為非云若至成者若有犯戒事非法緣者犯戒即非法也而與欲者謂詐現清淨強送心也由事非故不合不成者寶云今可變通文勢釋之應云由事非故不合傳欲雖強傳故傳亦不成也若准至顯者謂轉欲文中有三寶緣不與欲起去戒中有塔事寺看病事緣說恣二犍度中准有病緣也故說戒法文說戒時有異比丘白佛云有病比丘不來佛言自今後令持欲來已上都有六事是緣律文正列也而六群作衣說欲者准與欲後悔戒云時六群常為徒黨相隨恐僧治罰僧擬治彼未有方便後於一時見彼作衣遂呼彼來彼云我作衣不得來僧云但令人持欲來為作衣故彼遂令一人持五人欲來問僧中說僧即作羯磨治此比丘羯磨得成律中雖不正制作衣得說欲而當時衆僧而受行之若准此文亦是以非制也今若作衣准此關欲僧祇等者彼律說戒不來者蘭若為有衣鉢王賊禁閇守房之緣是開欲也並如別顯者一解云如彼祇文外部別顯有此因緣二解云如義抄中別顯此緣之相云比至怠者比者近也慢者輕侮也斯由此也法是說戒之法不思來業者不自思量當來惡業妄行聖法虗妄行此欲法實知無病口自稱病自知不淨口言我淨心不悕須口言樂欲令他傳此妄言對僧而說全成誑語也隨僧多少三波逸提者約境結罪也不病為一不淨為二不欲為三白于可委所傳之人知而為告一一三罪者對首之人名所傳知簡不知一一人邊准上三罪准此同情妄語誑僧也問能所二人結罪分齊如何答並約僧中正說時結若所傳之人不知但結房內比丘之過若同情妄知即一時結也有人云房內比丘才傳詞與彼訖便結者非解也惡業已下鈔文誡勸也玄記至此引違大師製疏被裕律師呵恐繁不録也二欲法中云二至不者列科也云就至法者向與欲法中又分二也前明與法者謂屏處對首傳欲之中時法則二明說法者受他欲人對僧陳說之時法則也云初中者與法中也云四至正者准四分三十四說戒法聚文中但云與汝欲或云我說欲或云為我說欲若現身相若廣說若現不身相及口不說者反口四也律文但有此五種四略一廣雖號廣言又無文句故云四分文不具足也義設云者義是今師之義設謂施設也文詞如鈔若准疏中分為四句一大德一心念告前憶持二我某甲自稱己名三如法等牒僧中所為事四欲等者正陳本心也問前來云義設未審約何義耶答轉欲文中云與欲清淨後不許稱事中又云如法僧事兩處之文斷絶今師以義連持既云如法僧事即約僧中與欲清淨即據自己一說便止者簡非三說也云准至如是說者僧祇部中三說成就一說不得此是外宗之事不可承用今約四分等者當部所有一說成法者並無結略之文凡有三說成法者廣盡一遍了於下注云第二第三亦如是說今傳欲法既無廣文又無結略故知一說為定羯磨疏云律無結數三一之言一說便止云准至部者如白二羯磨及說淨等羯磨疏云一說直成更無結略今欲亦爾不須結等者古來行事多取祇文三說為准者是外宗事今勸令捨也云問至本者此問意云爾時傳欲詞中但云如法僧事與欲且如法僧事屬他堂頭既自己私房有三寶病患等緣何以不牒云比丘某甲佛事或病患因緣等解云稱者人語謂梁武帝出要律儀明欲詞中即有私己之緣不足承用也不稱正本者律文中且不見有牒私己之事文中稱字若上句必平聲呼下句平去二呼俱得若作稱去聲字解即云不稱於律文正教顯上人語為非若平聲呼即云今時不稱却依律文正本也云問至等者說不稱欲法成不者意云本來傳欲只為有緣今不牒此私己正緣未知欲法得成就不答成也者楷定得成就也上且直答未審約何道理得成鈔下釋云由羯磨中不牒此說欲之緣謂詺他對衆說欲之時為欲羯磨非謂單白白二等為羯磨也謂前人對衆傳時但云如法僧事不牒彼私緣入此詞中即反顯屏處對首之時詞中不要牒入問何以知欲羯磨中不牒三寶等事抄引律文若不記姓名等例成也謂律中一人受多人欲若不記姓送心達僧未勞陳說如忌名字但述多衆也然此兩重問答義似不異尋文全別前之一問設若不稱事緣法成就不若准疏中但合為一抄開為兩重問也云問至教如者鈔中所引欲應清淨羯磨應說戒猶是依古若准羯磨疏今師解云欲則表心無二清淨則表行無瑕若說時雙牒者古來行事者云欲應羯磨堂頭若不說戒但作諸法事傳詞中單云與欲不要著清淨二字若說戒時即雙牒也今師云欲則表心不異清淨表行無咎清淨即得應羯磨不淨亦不得若如是則不論說戒及尋常一切法事並須云與欲清淨也由文正制等者玄云准四分初緣時集與欲清淨非時集但但與欲僧祇亦然後時因諸比丘有諍起不和合停說戒後因諍息和合雖不是半月隨諍滅之曰非時僧說戒諸比丘亦依舊制但云與欲礙說戒事以此白佛佛言自今已後無論時與非時並須雙牒故云由文正制也不同僧祇等者謂將祇文望我四分四分第二制文是能廢祇是所廢也問若爾何故鈔下諸篇多處出文但云不來者與欲或云說欲已耶答製作家𡞞略此文既廣說了學者已知至下文中雖不雙牒即合准此廣文為定如此分明今時更有妄執之者不准自誤寶語後來者也云如法至障者非法不須欲者謂堂頭僧事是非法我己身房內是如法據理合傳情但為僧家事務成非我即不要與欲非法緣如衆網中者和僧媒嫁淨人用常住物立非法制枷禁罰錢米之類總是非法也問堂頭作法或是說戒自恣或受懺等不定今欲詞中何以不牒堂頭所為之緣但通而言之云如法僧事莫不漫否鈔文釋云此但言如法則令僧諸法事皆通作無障意云但如法僧事與欲一切順教羯磨皆是如法與欲並成若唯牒今日堂頭所為之緣即不遍諸僧事却成狹局故不可也又如僧祇云若作非法制應不呵令止者當說如法欲了起去既云如法僧事我與欲今日所作不是如法我心不同即不與欲免有同和之過古人云既不許稱事者如自恣與欲豈非稱事耶答前不許稱事者謂約羯磨所為之事今自恣是說忘行恣僧舉衆固非僧家之事也云上至說者謂受得他欲了比擬付堂今自或別有不意之事忽生我身猶須覔人傳詞豈能更為他說欲今我自身并前人欲一時更付他說也四分文中雖許轉欲不得齊幾反文中不說鈔引母論得列七反故彼論七相應法者受他欲與已轉與一人如是至七皆成清淨欲不同祇文轉欲便失部別不同也其詞向如鈔云云云問至不者此且總問與欲成不之相也云四至俱用者四分但有病人說欲法者簡異無說欲之廣文也而文有具缺者一廣為具四略為缺也所以有此具缺者何鈔釋云良以病有輕重故也輕則用廣重則用略文云若云我說欲一略若言與我說欲二略若言為我說欲三略若現身相四略若廣說欲為五前四唯重病人指上四略也後廣說健病俱用者指第五廣說也健謂健人病謂輕病且須廣說未勞用於略法故云健病俱用也云五分至略文者斷事中者彼律呼羯磨為斷事也故彼不欲起者戒云若有緣須說欲了者若不說輒者犯提文詞曰對一人云長老一心念今僧斷事我某甲比丘如法僧事與欲今鈔引此證不病人要須廣說四分雖云健人廣說且不出廣文今引彼祇文與此四分廣義不異故者相似又無略文者今釋云謂彼對人廣陳但一說成就又無結略之文第二第三亦如是說等語准此是無結略之云比指至者近代行事或有緣者三寶正緣也囑信受欲者云見某甲比丘為向說憑與僧中說欲有記中作授字解令人傳信便當去呼與欲陳詞也授訓與也及語沙彌者謂使沙彌傳語某人為向僧中說欲不能自到彼也或有非緣等者破戒緣也縱陳詞如法上乃不成況直爾云為我說欲二俱非也量恐不成却結上來並皆不就有解云量字錯合作此良字此即量度義也不得妄說知之四分病中等者舉病況不病也律中輕病人上須口說重病方聽相今既不病用病者法誠難定指誠實也實難定其成不指的也云問至衆者若為依者若如也為何也意云病人現身相如何依承如五分下釋也問別之相搖頭向前是同即表情無違逆若擺頭兩畔即心乖不同表不與欲雖強為傳不免別衆而取欲人須如此知之云二至對法者謂約受他欲人堂頭正傳詞之時法則也云應至令說者律云諸比丘受一人與欲清淨已疑不受二人欲清淨佛言聽受四人欲乃至多人隨能記者一時合說然今傳欲比丘或為一人乃至多人傳詞之時總標人名字竟即云如法僧事各與欲清淨或不要著各字亦得有人不達本意便云各如法僧事此是未會之徒也云若至出者外難曰前文欲詞中不稱今日私己之事若稱但是人語不可依之今此改文舉病患及僧事之緣豈稱事何以相違答為簡自他且是一期出法非謂正傳時稱此事也云若至罪者引此改文意證前來健人自來僧中說欲定得成就但不受者得罪謂既有正緣即合為受今不為彼傳說得不應吉也文相易會云問至何者此問意今時受他欲了來僧中羯磨者云不來者說欲未審於何處陳此詞句為復佛前為當本位為各各說為一時說云答至說者第一句隨人多少並須來僧前或佛前一時禮已同聲而說也第二句或隨人多少直來僧前禮已胡跪各說各說竟一時歸本位也第三句即約在床但䠒跪隨人多少一時令說第四句即下本床前一禮已䠒跪隨夏臘次第各各說也古今有茲四種行事差殊未知取何為無云據至是者據文並成者今師且大約斷適來四種行事總得成也問既云據文並成不知據何教文耶下句釋云准我與衆多欲文及故不說皆成謂律中不記姓名乃說相㒵不記相㒵但云衆多上乃得成惑故不說受他十人五人之欲事記得姓名今不一一標舉但云衆多比丘亦判得成豈況適來一一稱於名字已上縱之且言得成也若更奪之亦有不成之理鈔云若取義意者今師以意推尋前來文下之義也下句釋云律中開成由由有忘誤或復得罪意云前來文中不記姓名說相㒵之例與欲成者窮他文意無是據迷忘心邊而判得成若故心不一一標名字說但云衆多雖云得成由有違教之罪故云復得罪也故有成文者却結上來也必無正緣等者謂今明白心中既無前來迷忘不記名字之緣不可雷同通用行事也約准外宗一一說是者今師決判其理可知云五分至說者不引此文意為證前來須各各說不得一時第一節引五分為我稱名字說等次引祇文不得趣爾與欲為恐他不解傳臨時詞句不分曉即預須斟量也其受欲人又須自斟酌意恐臨時呼喚名字不真怯衆怯衆纍及前人有過也以此推之不可暗記云義至顯者今師以義評量莫非恣僧不知來與不來有於疑想是以一一標名僧即具委無疑免有乖別如此教意意亦可見也四分更相撿挍者亦為知集不集不集須召喚之此言彌顯者彌由大也顯由明也此言大明無其暗晦也已上消文了玄記中對此因便論量傳欲亦有背別如今時食堂內三行五行排床但前床說欲人背後床說欲人後人說不成即是背別也大德破云今時行事皆是依本坐位次第床前說之爭免前後相背若云別衆者元須一一來於僧前即違鈔文下座座說也今依法寶釋但正傳欲之時莫背戒師及羯磨人即得若背不成是別衆攝故羯磨疏四句中初句聞而不見引五分律背於作法者面雖說不成終為別衆斯為定義若約前後床說者今時總無說欲處也思之問今說戒時有人傳欲了或更別有法事如夏中有人受半月一月日法或有人受戒懺墮等類秉法人再和僧索欲答法人如何答之有一解云但言此無說欲及清淨者今恐此說未穩適來說戒時既有欲說者今又云無似違理也有人救前解云前將欲來應說戒今自為別事不可重取他欲所以但云無說欲及清淨者今意不然一欲應諸羯磨故欲詞中云如法僧事准此如法之言一切僧家事務俱是如法何局說戒若云前欲只被說戒即欲詞中無須牒他僧家所為之事應云說戒如法僧事與欲清淨理既不會但依前文答云說欲及清淨已若說戒時總無人說即云此無也准前抄文自釋云此但言如法前令僧諸法事皆通作無障文甚分明何得迷也問且如本來專心赴堂聽戒至維那秉向之時有急疾事來住不得一切僧總集在堂內界中別更無人若直爾便去又犯別衆為復僧中更求人對首傳欲為喚人出堂外傳詞鏡水大德云但呵維那秉向且住某甲有緣要說欲付僧但住來佛前禮拜已對佛說欲了便出若無佛像僧前禮或本床前說亦得不須更對人已是僧中也問如誦戒時誦序及單白已竟今誦至戒牒或有事要者為直爾者為傳欲了者若有人評云但直者有人云不得者須待竟兩說俱非若云直者者羯磨雖竟所被之事未竟如何得者若云待竟既有急准何能待之故不爾也大德云設有此緣且白戒師念戒暫住某有緣礙起者亦來僧佛前或本床前一禮訖說欲了出者乃至七佛戒經有緣總須說也問如此說有何據今准當宗外部斷事之時羯磨雖竟所為之事未訖不與欲輒者以惱僧故亦結情過迦提也或有解云恣說戒了別有法事是以傳欲了知若不說欲妨礙後法此非解也已上諸問答雖繁蓋是今時行事急處章記不曾見說講者又不論量或至此時莫知趣向既迷教旨豈究是非今此手盡至時依用學人審思欲失欲中云二明失法者寶云謂受他欲已在心識之上雖非心非色有得得連持今遇強緣便被非得來替故俱舍云得謂獲成就非得此相違云謂至中者約處總標也羯磨疏云初中明失即有三處謂受已中道及至僧中上是疏文玄云鈔開中道疏無病人之所鏡水大德云疏文三處並足文云受已即發足處便是病人所也却是鈔開中道今將疏家中道來添鈔文令三處周足上且定失欲處次略解者謂受欲已者即簡未受得不可言失遇緣便失者雖領受得在心若有送意不遇別緣亦不失反上成失也不簡病人之所者謂發足處約他房院門域為分齊也又文中且舉病人為出法但有緣傳欲未出彼門總是發足處也中道者離病人所未入堂門限已前總是中道也僧中者謂講食堂內也又須約鳴鐘了已有四人僧集先在彼坐方號僧中若全未有人或三二人等未可呼為僧中若露地約尋內也已上覆露二處既有四人等已上並集既到僧所不可更出即失欲法更有諸緣雖在堂內亦同失也上正解也若准會釋記云雖有四人已上白千人集須約和僧了即號僧中若未和僧但名中道今難云若取和僧了名為僧中者下離見聞四句失欲豈非和僧前耶又如向下僧中有外道衆等亦失豈可和僧後更有外道之徒此解不應理也云今統明失法者寶云對此却計會四分他宗失欲人數也統田通也通辨失法之人未審有於多少四分二十七人并義加一人僧祇十人五人八人十誦三人却計三十九人失欲也云四分有二十七種者先標當部人數問鈔標二十七人科中云二十八人何得相違答抄據律文失欲法中現列數者標數科約義加隱沒一人至下釋時方出今且依文標舉二十七人也此隱沒雖不在失欲中且是不足法中所攝不離四分是以科家云四分二十八人今將此二十八人分為三類初有十八人體壞流類三處自言失次有七人約處約時中隔俗情失後有三人異衆流類運通隱離失法寶云若准律文先列第二節人故文云若受欲比丘往病人所受欲已便命過神足在空及離見聞處不成與欲應與餘者欲今抄者主取流類多者先明故回互律文次第也前後約類以明中則就雜以辨後三大高太下太旁又此二十七人寶云失欲並通三處無不通者若據搜玄初十八人三處俱通中七後三通三及二不定未為盡理今且略知待下隨文點出云云云受至中者辨十八人三處自言失欲相也此上諸人由口自陳說前人方知即非僧用若不自陳持欲得成者如足數中者謂此上列人瞻波法中不自言其相同順即得定數自言人知即不足也今此亦然可以列解云五分至僧所者初引五分證上來自失不自言不失易知次引十誦取清淨欲人者取清淨應說戒取欲應羯磨故云取清淨欲人也始取時等者此文似難銷釋今依法寶回文解義欲釋此文先分開說初約未說詞時自言不成與欲次據受得了自言失欲且解初文應讀鈔云始取時自言白衣沙彌非比丘乃至十三人准皆名清淨欲不成始取時者謂初向病人處取欲也前人並未陳詞句此比丘便自言我是如上等人此則一向不更更對伊傳說詞句也皆名清淨欲不成者可回文云不成清淨欲也解初竟了次解第二文應讀鈔云若取竟自言我是白衣乃至十三准人皆名不到僧所若取竟者謂初不自言前人不知具儀傳詞與他了彼即自陳我是如上等人既非僧用當時便失故云不到僧所也玄記中大意雖同鈔文不便更不敘録也已上失欲俱通三處易委次釋第二段七人云又至出者又重也亦是當律不出教名但言又有七人也於中餘處行明相出其相難稍鈔文自解餘五易知文中不釋今須細論命過者此約受欲人會過非誦病人此通三處玄記亦三謂往病人所受得欲了未出院門自乃命過此是發足處失也或受訖出彼房限外未到堂中於中並名中道若命過即是中道失也僧中即須分別若未說什僧命過即是僧中失若說了命過不失謂欲法已是僧持故也罷道者古云捨戒也今師云思惟擬婦俗有此心故既隔俗情欲法失也羯磨疏云受欲已言還俗尋悔本心亦許不失但由中隔俗情無心持欲故也上疏文此通三處皆據有還俗心說玄亦逼三若入外道衆者羯磨疏云僧寺之內外道居處也上疏謂西天寺中別有外通止住處謂所見解法乖故比丘傳欲了若往彼中是以失欲玄記但局中道即有外道住舍比丘入中失欲病所僧中不通不正今云俱通三處只如初傳欲了未出房時或有外道入來比丘才與彼相喚言議即失此豈非發足處失耶中道可知僧中者據未知僧前初集之後或堂中有四人等坐訖外道偶入堂來傳欲比丘與彼言語即是僧中失也問為復外道成衆即失為一人亦失答鈔文雖云外道衆未必成僧但一人即失有云須是四個外道者非也問雖見不與語言失不答若但專注欲注不與彼語言亦不失也別部衆者羯磨疏云調達部黨五法為宗是別部也又如五十祇等亦是別部也有製記家不許將五十祇等為別部謂佛在日制教不許入別部此時未有餘部不可妄述但取調達部為定也然不無此理今師意云佛在日即據邪部門言今白季分宗後所執不同亦成別部故疏云律中同界各說兩得成就以此而明故知執法有別云不相礙今四分律中傳欲入他宗徒豈非失也通三處可准上文說玄但局中道一處戒場上者謂入異界故也玄但約中道一處病所僧中無戒場今但通三處如病人房院都門內是戒場從病人處取欲了未出大門限便入場上是發足處也中道可知僧中亦約作法處近戒場說也云餘至外者謂出大界等者今師正解也昔解已下敘非也古云受欲了便須住往堂頭不得更往諸院即失欲也相疏快同此說至今行事如此此非解者今師斥古失也自恣明文等者引證不別也謂律中兩處出文說戒法中呼為餘處行自恣法中改餘處行為出界外故知餘處即是出界出界即餘處行猶似毗尼與律二名不並可以例已古師若言兩處別者說戒法中有餘處行更合有出界外了更合有餘處行也玄局中道一處今俱通三處如藍寬界狹處病人院半是法界半是自然受欲了未出門便踏著自然即是出界外此云界外但約作法界外未必要須出寺門便是界外知之今時多有此事或有師僧房院本來並是大界內或可已後新買得俗人地通入寺內起厨屋及作菜地之類雖同一寺且是作法界外如此例解中道可委僧中亦約作法處近他自然以說請細思之云明至也者引約時遇失也玄但約中道今云通三處謂病所才受欲了未出門明相便出是發足處行至中道明相出約伽藍廣闊說僧中可知云問至事也者問意羯磨竟所為事未竟得經明相不答不得疏云僧祇畏明相出減衆各作四分恐明相出現開略戒若但局羯磨時節羯磨既了何勞開略文義可知云四至處者此列後改三人也神足為一隱沒為二離見開處為三神足在空者母論云空中無分齊不可知限約故失玄記但通三處隱沒者今師義加一人也謂失欲法中但有二十七人無隱沒人瞻波不足法中有此一人不足僧數今師意云隱沒既不足數今受欲了隱沒豈非失欲耶羯磨疏云入地也或井窖地室中等俱通三處受欲了未出房便隱沒此發足處也行至中途隱沒即中道也若至僧中更離見聞者羯磨疏云離見聞中三處俱有初在房中若受欲已必作送意雖離與者見聞不失不作送意互則不失俱離即失上是疏文此且據病人發足處說也鏡水大德云如往病人所本來標心專與他送受得欲了忽起作不送意此時未失遂離病者所雖回顧眼看由見且不聞尋常語聲此離聞處亦未失更進步回顧不見病人即是離見處見聞既俱此時方失次約中道中若論中道離伴見聞若無佛離生念處見聞即失上之疏文玄記引疏道理未盡但有望伴不說起心致招外難諸尋記文方委鏡水大德云上雖引疏文更須細解學人方曉疏云離伴見聞者如受他欲人行到中路忽起不送之心亦未失共一比丘相並行喚此同行比丘同伴自既作不送意便先行不待後伴才離聞處亦未失又回願不見名為離見方可失也准曰有伴可爾無伴如何疏云若無同伴離生念處說見聞也謂獨行之時到於中道作不送心才起心時未失進行數步准酌適來起不送心處常語此處不聞故云離聞又回𮨇不見前來起心處名曰離見此時失欲也此中道離見聞義甚准敘說時人多不明之請思請思若僧中約僧所對即遠坐離見聞云問至耶者可知云答至定者略酬二問也云故至緣者引律立理令作轉輪等者准律說戒法三十四有三節文初云衆大聲小聽立說戒第二節云由不聞應敗高座極令嚴潔坐上說之第三節云猶不聞應作轉輪座平立手及在上坐說此謂座如人平立手向上高上高也律第三節即令坐上今鈔主意若更不聞准前開立亦得所云轉輪高座者多解第一古師云是座下有輪腳令人推輪其座即轉來者自在大衆同聞未審令何人推輪有講相疏人解云令比丘推既聽立說戒不犯別衆令開比丘推於衆中亦無別衆今准曰戒師立說戒是佛曲開推輪比丘何文開許又若推座來者巡衆而轉元來大衆同聞同見何得云而不聞故知非也講新章家云不要令比丘推但輪腳處繫繩從他聽戒人次第坐地牽之此釋更非於前也今南山云轉輪者意云坐此座上轉於法輪八支聖道能得涅槃如世輪也如玄談四果中說廣了引更不敘也此見而不聞者大衆雖見戒師面全不聞聲此則聞而不見者釋上多人集時前後而坐不可一一覩戒師之面但聞念戒聲也離此二人則名失欲者謂離見聞聲二人即俱離失也必互離乃至緣者謂前文一向答云俱離即失互則不定俱失已知互失不定其理未委此文辨之故云據隔障等緣是互失也法寶引羯磨疏四句以辨一聞而不見僧祇中有隔障人不聞覆露五分雲霧中又背戒師作法者面二見而不聞例出失是三亦聞亦見空中有互與欲非法四不見不聞覆處遠坐是云前言離見聞失者正指指前第三離見聞人也通望比坐展轉離者謂不同適來約作法者見聞羯磨疏云皆望同坐展轉但取相近即非失也如五分等者引他部例前也謂雖同一一以離比坐見聞不成也已上明四分失欲都二十八也據文二十七第二引他部二十一人便分為四如科云云云僧至說者五種者玄云一覆處隔障二露地隔障三半覆半露中間隔四半覆半露申手不及五露地申手不及並失欲也云五至欲者此文兩意先辨失相次辨不失斷事者羯磨之異名也秉法斷量前事彼斷事戒云傳欲來人未說付僧持欲在身理合安坐待說付僧今未說付有緣却出名為到出出已更受入中又出不論多少隨幾過出若在屋下齊門限量露地一尋外失也若房小等者引此文證在寺內雖在簷下𨓍中不失故羯磨疏云簷下𨓍中雖不了語皆為法來並成就也更有非解不敘又有七人等者此上七人四分無文今取五分證明行事也尼中三人體不是僧沙彌一人不參衆侶當法狂等三人不記憶身並非持欲之士云僧至宗者一界外與欲疏云能所俱非二時欲出界者玄云前言餘處行即待暫出界却還此中出界外約永者是別疏云受者非令他成別三自身出界者疏云與者自非僧法成就四默然出者疏云如病人與欲了聞僧中有好名聞大德來說法毗尼自身又來坐久疲倦又者不重說欲意道我先與欲了此愚教失欲本送心今身到僧前緣即謝故須後說五持欲至僧等者疏云若暴風雨賊急火起驚者名壞衆失問至僧說竟欲是誰持答古云傳者自持若爾自說而者復是誰持少道理甚今云若未說是自持說了是僧持何以知之有一人住者不失故知僧持也復有解云夫壞衆失堂內有四人住却來即不要再取欲若一人不得者此釋據義違文又未知僧持之理思之餘文易知云云云十至人者殘中覆竟本日竟六夜竟三也正行此法奪三十五來不許智能故云上至欲者知而故違反自受罪者謂受說不成今知而故說得妄語提豈非自受也已上當宗外部都四十九人失欲法竟云三至者者牒章也云文至不到者文有三意初開成二若故不說得罪三結示處所初文准說戒犍度中先出不成與欲當更與餘者欲若至中道若至僧中亦如是受清淨欲若睡若入定若忘若不故作如是成與清淨欲羯磨疏云四分睡忘無罪者先作傳意不覺想轉故開文云不故作也若故不說得吉且是開緣中明理合得成羯磨疏云既達僧中理是開限文中故不說但獲小罪義應得成在開緣中故並謂者明在僧中若睡定若中道等則名不到云四至故者文有三節初快來二僧就病所三病多出界初快來者鈔引律云若病重者應快將輿來羯磨疏云表和達僧也二答慮增動者等疏云以法濟也謂前雖令快舉來入僧中或因此增劇致死僧猶有過僧遂往詣病人之處圍繞作法貴𠷰極濟於波也三若病者多乃至別衆者羯磨疏云濟緣既爽時不可乖故聽出作戒疏又云僧出界外以事攝也欲使僧別兩行互相資成也上疏文准此意云前文將法往濟一人可爾或十處五處病人既多僧衆又少相連不及不可就此處病人不就彼病所故云濟緣既爽半月既到申延不得必須說戒故云時不可乖僧但出界外作法是律開許以更無方便得別衆者大德云文中語似難會云既有上來二緣在界作法不免別衆今只有出界外作法免茲別衆除此之外別更無方便避得別衆之失也外難曰適來文中約重病者准前文中重病人即用四略之法若更重即不足不別今制令出界何故相違答理實此中是重病攝夫重病者多種升降須分三品一能動身現相或口中略說云為我與欲等二口不能言身不能動而心中分曉三者心亦不能覺知但有未捨執持此即極重若准疏中四句料簡中明病人不足不別即據極重病者論量若此文出界避之即約第二品人以說謂此人身口既不能動即取欲之人焉能辨得他同別之相故須出界作也何以知耶故疏云良以病有多種前說者輕堪相對語今者是重不說為別上疏文若爾既不能只說現相何得更有別衆答羯磨疏云氣力虗微故不能說神道不昧是別衆故上疏文若准此判前四句中重病人非二攝者直是極重將死之位唯有煥息即非二攝若前來雖云重病人之神通不昧心中了了分明但氣力虗說若此之徒由有別衆故須出界也此文委細至甚若不如此解扸大難分踈今時皆是敘記配文終恐心中不曉更有忘說者極多學者除察云若至不成者玄云謂律中路有惡獸不得至僧便從外來羯磨疏云此作非心隔但為事遮也法寶問云此中出界外與前來餘處行何別答前來餘處行謂無緣輒出界失欲此中有難緣曲開從界外來不失欲也有比丘無想者者謂實有故所以不成此別衆故不開也云問至不者此問意者道傳欲本為私己有緣正勾當之時是有緣不來不犯今既事了堂頭說戒未終不來莫不別衆不云答至就者不將欲緣為羯磨事者謂傳欲羯磨詞中但云如法僧事與欲且不牒房內正緣入法今緣雖謝不來無過文云等者引證也如法治者違教吉也不云法不成就者羯磨疏云以心應僧相非乖背如狂比丘得法在體病止法存不住無別云若至謝者若爾二字領解前旨也若傳欲事體法謝不來赴集不成別衆若如是者故云若爾下遂舉受心事來難只如夏中為三寶受日出界事了法謝不歸本界亦不合破夏何故下文不歸破夏云答至成者謂欲不牒房中之緣應堂頭法事私緣雖謝僧中欲法已成不來不犯受日元牒己身所為之事入羯磨法所為既謝必須反來在外不歸是以破夏有法無法既別不可例同此是徵詞假典來問也已上釋第四篇竟吳越國天長寺長講律臨壇崇福普濟戒光大德賜紫志貞寫此記故記焉丁巳歲
