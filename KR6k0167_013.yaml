body:
  text: 吳越國長講律臨壇賜紫清涼大師景霄纂持犯方軌篇欲釋此篇大分為二初牒篇名二律宗下依篇釋初又分二初正牒篇名二注文下辨此篇來意言持犯至十五者先辨相生之來意謂前之一篇隨比丘二百五十戒別歷明具闕之相得稱別義已知而於名字等七門總義全未委練故於釋相別義持犯之後有方軌總義持犯篇來釋名者順本受體名持持有二種即止作也以此二持為善因後感有為無為之樂果此二持有名字體狀等如下具明云云違禁起非名犯犯有二種即止作也以此二犯為惡因後感三途之苦果此二犯亦有名字體狀等如下具辨云云亦有釋云萬惡皆斷衆善咸修名止作二持諸惡並為萬善皆止名止作二犯也方軌者方謂方法軌謂軌則此之一篇具解持犯總是一切戒上方法軌則義也即七門皎皎搜四行以知因二九遐彰歷無知而自顯故名方軌問未審七門俱名方軌為局第七門得彰方軌答此中須分兩意若古師唯局第七門得名方軌若今師通於七門俱彰方軌如名字一門是二百五十戒塵沙萬倍戒上方法軌則等云云篇第十五者如常解也次注文辨來意分二初總別以辨意來二若取下對前後以辨來意或依素記分二初理齊重文難事義總別答二若取下前後相違難逗機隨事答初難曰如隨相篇及方軌篇俱約順體成犯順違之道理是齊前後又俱名持犯其文復重故云理齊重文也已上難竟二事義總別答言以前隨相者牒起前篇也約事乃分者謂約五篇淫盜等二百五十條事以分別辨別對一一戒上辨具闕緣如對淫事分判之時即不通於盜煞餘事故是約事別論也言至於緣明等者生此篇意也至於二字連帶之義從彼及此緣由通也總也謂若通約心境之義對一切戒總相而明如將名字一門總收諸戒四行名字等前篇並未委知精練識達故向此篇甄別之也甄者説也文云察也謂察前篇是對事別論此篇約義總説又甄者簡也簡擇前事別後義總諸記中對此立三別一總別別二事義別此段收第三難易別今云上之二別即此段收第三難易別合在後科攝也二前後相違難逗機隨事答難云既言隨相篇是別方軌篇是總者且凡明義理皆先總後別至於自古疏抄亦先總後別何故抄主製作先別而後總違他次第法式已上難竟次隨事逗機答回段素科前後意欲順抄文知之言若取由途理在前烈者此句縱之由者由來途者途路理謂道理烈者須烈意道若取由來途路道理總義持犯合在釋相篇前而頒烈也今回於後者下句奪云恣初學未了也引便隨事逗機奪破前義謂此七門幽隱四行難明若向前段烈之後學才彼望涯而退今移安後者貴接初機既別事精通總義自然明練亦是異古也上來兩文總當辨來意已竟次依篇釋文二初篇序總意次開章釋前二初舉宗顯行為述作之由二正立此篇之意前二初正難宗中之行持犯相深二非夫下約人釋成難見初言律宗至實深者文有兩意初舉宗之行次師難相深言宗律其唯持犯者謂能詮之教是律所詮淨戒謂之宗順戒起行莫越二持違戒造非莫過兩犯故下文云方便正念護本所受稱之曰持作而有違惡本所受名之曰犯此但舉律宗顯持犯行非謂將持犯為宗也其唯持犯者實云惟由重也心傍作住如伏惟之字亦表於重今此律宗重於持犯宗云獨也字從口作今從心者恐寫者錯謂六十卷律文雖多獨明二持獨明二犯故前文云詮教之文文雖浩博撮其大趣止明持犯玄云專也順戒善心專在二持違戒不善心專居兩犯如斯持犯是宗家之行律能詮之故云律宗其唯持犯今依此解持犯之相實深者仰難相深也相謂相狀實由實也深者遠也謂此七門總義諭通一部律文既浩博難治此相實為深遠昔人未見今獨委知意欲生起下文古人不見之相七門之內通有相深今且略述只如名字門中作犯行內古來但云出家僧尼不收下三衆取以然者古云下三衆律雖結吉無是剩長今師不然戒戒下文皆是實罪招機義一何得無𠎝故下文云出家五衆等引是持犯名字之相實深又如體狀門中古來能持犯以三業為體全不説心今師持能犯先須約心後約三業而為助伴又如取持犯中約制聽二教下事法古師止持作犯二行準局惡事明白心中不可學作為不學不通於法作持止犯二行即通事法明白之心準是取學今師云一切心境皆是可學何簡事法善之與惡若學知後迷忘心生聖開無犯即不可學此是持犯體狀之相實深又如第三成就門中古師立端拱止時不通久遠若於善事法上端拱不作却成止犯今師立無惡來惡以辨止持方通久因此是成就之相實深又如通塞門中四門分別於後二門古師唯通三行不通止犯今師約事上明之二門俱通四行豈非通塞之相實深又如漸頓門中古師將不學無知二罪頓結今師云不學之罪先結無知之罪待緣境不了之時方結又古云二罪並是吉羅無輕重今師云不學是吉無知有二疑則得吉不識得提又古云不學許懺悔有斷義故無故知不開懺無斷義也今師二罪皆有斷義並許懺悔此是實深優劣中古今七雜料簡中別開五段只如第一歷位中古師對四行上若止持作犯通立二九句作持止犯但立可學一九句又先止持對制止上淫盜等惡事上唯立不可學明白心中緣而不了並開無罪若於犯法唯是可學緣而不了便制十二罪若於制作衣鉢善事上唯立可學不通不可學並是持犯相淺今師於四行位上不論善惡事法並立二九可學一九結不學人二十四不學無知學人開成三十六持行若先已曾明緣於後忘迷非學能知便立不可學開迷放罪豈非實深又如方便趣果門中古來不説後心方便今師前後通收亦成深義又具緣門中古立五緣該收諸戒不盡今師通立七緣用收俱盡此並相深又如境想門中古立四門不論輕重門今立五門方顯深相又定互多少門中古約輕重相對唯立定五若於犯不犯門但云或四或五二門共立三位今師二門各立三位豈不實深謂七門之相深奧難明自古已來不見故云故云持犯之相實深也次納人釋成難見文三今當第一言非夫等者上既明其相深非造次而能委故須約人釋成難見問既云持犯相深未委何人能見鈔文答云非夫積學洞徹窮幽盡理者即斯義難見也非由不也夫者語助今借此夫字以訓於是意道不是積學洞徹幽盡理之人即持犯實深難見聽習曰深名為積學達詞旨之精妙謂之洞徹極事法之根原謂之窮幽心境無不體會謂之盡理教文非一事相千途制犯制持成作成止若非如上等人實當難見慈云欲了此相必具三緣一須聰明二須好師三須積學如世水若積使能負於龍舟風若積便能升於玄鳳學若積便能辨於深義如鈔主聽首疏經二十遍便能洞徹契盡幽玄之理對上古人不見云云次引古證成言故至違者文有二意初引古承習無異不見深相二雖下答通外難故者躡上難見之詞生下不見之意歷謂綿歷代謂世代遵謂遵承術者異術謂此七門持犯並是奇特之異術自古諸家歷代相承並同一見更無奇特之異術也且論一家無異術者如首疏於體狀止持門中云制門中事有二一者不可學事如似人非人想二者可學如似衣鉢體量等是聽門中事準可學房舍尺量長衣廣狹等是已上疏文謂如律中境想迷忘心中人非人想今明白心中不可學作若學人作非人想煞即成作犯今止不學即是止持餘惡事例説對衣鉢善事上即須學知唯明可學及聽門中房舍長衣等善事唯明可學作持門中既是進修亦唯可學翻作持成止犯止犯門中亦唯可學是則不可學唯局止持作犯制門中有如此之義自古相遵咸同一見故云歷代等云云問如首疏持犯具立八門剩有寬狹先後門相疏五門名字體狀成就通塞漸頓先後次第增徵優劣此豈非古來布置門戶多少不同又於句法之中亦有多別如道覆律師疏對初篇明作犯一九句第二篇對房上立作作持一九句若止犯並在九十中明先辨止持一九次明止犯一八便成三九一八又願律師疏約可學事不可學事就此總明止持作犯對可學不可學各有持犯便是四分九句作持止犯唯是可學作持一九止犯一八即成五九一八句又首律師疏立六九一八如上更於止犯立一九即六九一八句也此是古來句法安設不同既門戶向法或多或少不同何故前言歷代相遵更無異術可引鈔答云雖少多分遙而大旨無違上句牒其難詞下句通其難意雖者縱奪意也徑者小道也約其句法多小以釋似分徑路大疏八門釋持犯相疏五門是多少又句法或三九一八乃至六九一八又多小約此門戶句法多少似分徑路故云雖少多分徑原其大意曾取未違皆將惡事為不可學唯在止持作犯制門不通聽教及作持止犯二行善事法等又但於名字門中云出家僧尼不收下之三衆等大旨無違則顯今師四行之下制聽事法明白心中皆可學迷忘心皆不可學全異古也言但至識者謂上古德相承由未曉其深義況今新學時詣法筵研核根源實為不易故此嗟其不識也但者專也偏局之詞乍入法進修名為後進初始尋師名為新學教網未諳者教謂能詮之教下所詮持犯四行謂之網目如俗取魚之具亦名網也能於江湖之內施張漉於衆魚以置於岸今言教網能於四瀑流內施張漉人天置涅槃岸今此新學創參玄寂於此教文綱目何得語之時過學肆者市肆謂漢時有人姓張名揩住業陰縣善間藝術能吐氣成五里霧人來習學如市故書云七駢如赴華陰之市今借此市而改為肆由同店肆陳列貨物任情買之今講學肆上亦然廣申義理幽奇詞旨精妙學者任情選擇取捨隨壞在此學肆研窮積功纍德動經星祀由上難知況新學時復一過誠難曉了詎者何也始由初也未者終也律序為始盡處為末亦有約抄文説亦通意道律文始末上自不知若研竅七門總義何由可識也言然至矣者謂上片新學時過未諳教網始末何知則不能研竅持犯深義顯今洞間律相故有貫通之言事境精明指在前篇已述文相既能洞曉總義於是深通故先指事相之文後乃舉其總義然是也一部者一部律藏也二部戒本廣明上持略明作犯揵度已下廣明作持略明止犯貫通一部律文或約鈔釋前後二十八篇廣明作持略明作止犯釋相及尼衆別行引之二篇廣明止持略明作犯斯則持犯之文貫通一部鈔也或有不許約鈔文解理亦無妨能彰名已在隨相者謂就淫盜煞二百五十事境彰於具闕戒相之名已在釋相篇説竟今試約義總論者今指此篇試由用也約義簡不約事總論顯不別論指其綱要者謂此篇七門是一部律文二百五十戒之綱要且如律文所明雖廣二百五十戒境絶多然不出善惡事法若於惡事法止而不作成止持若造作之成作犯若於善事法順教進修成作持止作而不作成止犯今但以持犯之名往一律文收無有不盡故知持犯名字是律文及戒境之綱要餘門例解舉事以顯者謂此七門皆舉善惡二事以顯只如名字門止持名字舉初篇惡事以顯作持名字舉善法以顯作犯名字舉惡法為宗以顯止犯名字舉不修善法為宗以顯下六門皆爾問前言約義以明今此又舉事顯豈非相違鈔文答云今披尋者易矣謂二持二犯相狀難知若不舉事顯之終難悟解今舉事為宗以顯遂得四行歷然後學之徒手披目闕即異見也上來篇序總意已竟次開章釋二初總舉別列次釋言就至簡者前六字是總舉初知已下是別列不云七門便云諸門者謂七門雖殊皆共明持犯一事又諸者不一之義亦含於七門亦有約諸小科不一如通塞自有四門優劣十門雜料簡五門等又有説云首疏八門未能標數慮違古意已上二解俱非正也言初知持犯名字者謂夫欲解義先須識名名字既知須論體狀體既委三性四心何性何心成就既知有何通塞一行通於四行名之為通一行唯通一行曰塞既知通塞漸頓須明一念中但作一行即漸一念中能成衆多行曰頓漸頓既識優劣須知二犯二持十門優劣已上六門解釋通約根本四行以論四行上有不學無知枝條止犯方便具緣之義其理幽棄境總雜相也文更多精妙六門之後故有第七門來此略相生廣在下説第二牒釋中言初知二種持犯名字者更略廣前來意云云二種持犯者持二種即止作也犯二種亦爾名字者名以召體字以彰德如云止持者是名方便正念下釋義又是彰德作持者是名惡既已離下釋義復是彰德二犯準知故云二種持犯名字也二別釋中言先解二持者標也四中之內所以先解二持者戒疏云創發情殷故二持居先久參事慢故二犯在後亦可持順受故先犯惡恣受故後也釋文有四言止至戒者此皆依首疏也方便者梵云漚和俱舍羅此曰善權方便新云加行謂起加行離惡之心正念簡邪念也或依明了論取念智捨三釋上義亦得正念者憶所受體明記為性正智者分別前境惡則須離善則須修正捨者於其怨親心皆平等但念於戒故於非境悉皆捨也今總以此三護本受體此總對治若別説者對煞修慈悲觀對盜修少欲觀此修觀理是作持此即止中之作望離身口過不為邊成止也方止持戒者若但言止持者若約能持心止即持持業釋若約所對境即止之持依主釋即止今加戒字通有財也如初篇之類者舉事以顯也若首疏云此蓋對離惡法為宗鈔文便云初篇者亦惡法類者種類類下諸篇惡事法並是止持之境如漏失粗語歎身媒嫁是淫戒之類二房等戒是盜戒家類煞畜打搏惡性等是煞戒家類小妄及與不恭敬人説法是大妄語家種類如是二百五十戒雖多不離初篇攝盡故云如初篇之類也二作持文有四段言二至解者惡既已離者結前止持事須修善生下作持必以下正釋作義䇿勤三業者身口意也下自廣解修習戒行者首疏修習三藏諸經定慧等鈔言戒行者亦通定慧故律中何故增戒學謂增戒學增心學增慧學是名增戒學若不學三藏便成止犯今望不犯名為戒行有善起護者鴻云謂於三藏教境順教修學即善行心起護持受體有釋云上既䇿勤三業修習戒行剎那剎那隨無作戒自業之善隨起即護受體此解亦得持如前解者如前止持中解今此理合云作而無違戒體光潔順本所受稱之曰持亦合云持由作成號作持戒亦是有財釋亦合舉事顯故戒疏云如衣食四緣威儀雜行作意防義方成戒淨此對修善法為宗文皆略也第二解先後中二初徵所以二論下釋言所以先後者徵也何故止先作後若準首疏自立先後門今師移來引處只要三五句便定先後言論至第者釋也謂是百論兩卷提婆菩薩造秦羅什譯所以名百論者躬云論有百偈故彰名也論云外曰佛説何等善法相此是外道僧佉衛世師問也內曰惡止善行法即是佛弟子答也佛略説善法有二種止相息一切惡是名止相修一切善是名行相云何為止若受戒後從於今日終不復作是名為止何等為行於善法中信受修習是名為行外曰與説善行不應復説惡止何以故惡止即是善行內曰止相息行相作性相違故是故善行不攝惡止鈔躡戒為止故云戒相止行相作證止先後也又論云外曰善行應在初謂善法有妙果行者欲得妙果故先止惡應先説善行後説惡止內曰次第法故先除粗垢後染善法若行者不先止惡不能修善故抄略云惡止善行義之次第亦證止先作後義也若準論第一節文但是立二法所以未定先後第二節文方定先後今抄引來總為證先後也第二明犯中二初總舉二別釋言次釋二犯者次者次第釋謂解止作二也別釋中言初至犯者問一等釋名二持中止先作後二犯中作先止後豈不相違寶曰相翻説故亦無別理思之言出家五衆者出三界家人無為宅約近而説言出於俗舍入其僧坊也淨名居士等也五衆者僧二尼三也並約有戒體者為言居準首疏但云僧尼不收下三衆古人云下三衆無罪作犯中不收戒戒雖結吉羅元是剩長今不同之通皆有犯可引沙彌篇敘古之文以為良證玄曰古師言僧尼者據總以論今師五衆據位以説此釋定亦思之內具三毒者內心具足有貪嗔癡所以名毒者能害法身慧命損諸善根故稱毒也我倒等者諸蘊本無我橫起我心不順真理故名倒也唯識論云薩遮耶見而為上首此土我見順我即喜違我即嗔等不思對治修行恣起三毒鼓激運口四身三造諸不善名之為作諸惡望污體邊名犯也言此對至宗者既造不善必成於犯故用作惡法為宗亦有作善法而成作犯如不乞法造房及作七非羯磨若望房舍及羯磨本是善法今約不如法作邊成惡據多少宗途而説故曰為宗二止犯文三初結前生後後二言止下釋名三此下結歸宗本言惡至犯者如文言止至犯者癡心者於勝善事理合進修今怠墮懈慢不為豈非癡也言此癡者據多分説不言貪嗔或有貪嗔却成作持如折求善法是貪心或被人擊發起嗔便學却成作持故不舉此二也行違本受者受時要期立願今不如願進修違受體也勝業者三藏能詮詮於義理實為殊勝依此習學修行能斷惑證真名為勝業今於此不肯習學也及彼受願者受時願云法門無邊誓願學等今得戒後隨行之中止不修學違反心願也抄闕結文今準戒疏云犯由止成故曰止犯言此對至宗者亦準前釋且對不修善法為言或有於善境上成止犯如對煞盜等境止不修觀行望前煞盜境為惡今但取止修觀邊即不修善法也已上解名字門已竟第二體狀門分二初牒名二餘義下釋言二明體狀者上明持犯四行名字也知我於體狀全未委練且名以召體故次辨也二者標數明者顯也體謂體性狀謂相狀此門廣顯二持兩犯體性相狀故曰二明體狀一玄曰所持境約制聽二教為體四行依行有所表彰為狀能持以心為體四行依制聽二教而行有所表彰為狀此釋不然本出四行家體狀豈得還將四行為伏故不可也宗云能持以心為體身口為狀所持以二教為體教下事法有所表彰為狀此解為上諸古師例將三業為持犯體此義不正今擬除之能廢之文具在首疏此不敘録戒疏之內廣明昔義疏云如昔解云雖身三部離口四邊意地不起三不善根名止持體屈身禮拜行檀放生讚歎三寶讀誦經教意修三善對治三毒名修諸觀乃至離染淨行慈悲四弘等名作持體性起十不善名作犯體止不布施修慈乃至觀行名止犯體修不存之以非制教之所要也故疏云若不布施名犯者出在何律何聚所收如律文云佛不制者不應制也何以得知不布施不犯如智論第十云昔迦葉佛時有兄弟二人出家造業各於施戒互不修行後釋迦佛出世時弟為白象以不持戒兄獲羅漢乞食不得以不布施如何而言不施犯罪又且律中但約身口至於意他未聞戒訓如何而言不修四弘便成犯也又若犯者何曾見懺不布施罪故智論云不行十二頭陀四無量心不名犯戒但於戒闕莊嚴耳已上疏文故知口義違於律論欲明今義故先廢之正釋中言直至持者謂上既廢除昔義今依正而明故曰直論也言一就能持犯二就所持犯今但云持理含於犯如下出所持持中云持犯二種並對二教以明故知存略也言至具者正出能持體也約行者能持戒心無心不能成業以無貪等三善行心為能持體貪等三不善行心為能犯體然持犯業要假心成以心為本鼓動身口方能成業若但起心不動身口不成持犯以無心故故知身口為造善惡之具要假心助成故戒疏云身口乃是造善惡業具非善體玄云此約能持犯行心為持犯四行造作成業之體不類單心故知還是色心為體今且偏舉成業之本故約也次引證言故至解者是成實論云是三種業皆但是心離心無思無身口業謂證三業皆用心為體且身口不能自發皆因於心先了前境後起思心動身造作前事方能成業口業亦爾依心起故體不離心故知三業不能自成要由心起即如論云無心煞人不成身業無心妄語不成口業等言離心無思破多宗彼計心王起時別有心所思同時而起今云心王心所前後而起離心之外別更無思也無身口業者破外道也彼計身口二業不假於心但從對起佛教所説一切由心故俱舍云世諸妙境非真欲等即斯義也又律等者引律序文也文云夫欲造善惡備具三種業當審觀其意凡所作事皆心先知後方口説身作是備具三業若審諦觀察其意意地若忍即不起心無身口業故知皆以心為體等者等取如羅云經説一句時舍利弗與羅云分衛時有輕薄婆羅門與毒意取砂石著鉢中擊羅云頭破出血污面舍利弗告羅云曰當起慈心羅云臨水洗血而説偈言我自行分衛無事橫干我我痛須臾間奈汝長苦何此則意地忍轉證以心為體也如後更解者玄曰如下優劣門中約心三時辨輕重及方便趣果中約動身口思成業處説第二所持中言二至者者上約能持以心為體小乘所制單心未犯要須對境方結於業未審約境依何順違故須所持以辨體相也釋中言持至明者持犯二種謂止作也二教者制聽也若不約教四行難明依教護持以心為能以教為所也亦有問云所持犯境一切並是何但二教耶答對境雖多不越二教攝之皆盡心順二教成持違二教成犯也且略説大教廣在下文言制教有二者舉數也謂制作制止是釋文言一至罪者明制作也故戒疏云禁諸出家有善斯習名為制作謂三衣鉢三藏教文善事善法並令修習文中亦含二持犯一制作衣鉢等須順教作作則無𠎝名作持若止不作名止犯言二至違者如淫盜等惡制令不作今順教止成止持違教作成作犯與前不別故戒疏云禁諸出家有惡皆斷名制止也二聽教二標釋言聽至罪者此與制門有殊前制止事作則有違制作止便成犯今此聽門作與不作俱無過若作則約中下根者順於聽門不作即約上根者説故一往而言一切無罪若局對中下二根就聽門中不無其過且如百一衣服理須受持長衣房舍又須順教若如法衣方堪説淨如法房方可乞法及聽作也若犯過依財及妨難過量如乞不成是聽止也故戒疏云於此事法亦聽作必有房財理須加法故聽作也若有妨難犯過衣財不合加法故聽止也已上疏文已上如法房財聽加法是作持止不加法成止犯有過房財不加法是止持若違教作成作犯玄記中更有別解非要不敘云云次辨相須意文三徵釋結言何至者謂前辨所持體是教教有制體故今徵云何用於二也言若至勵者正釋須二教意中下絶分者辨須聽教如上行人但乞食糞掃衣樹下坐可以資身長道今令中下根人同於上士不食僧食不著檀越施衣不住房舍者而力劣不堪無由入道令彼望涯而退如天須菩提久受天樂七寶房院住經一宿便證道果若令樹下冢間無由一宿證果須聽教也上行慢求者辨須制教也若唯立聽便令上士須同中下則教不稱機却加怠慢不勤求通如胎衣迦葉等類故須制教接之言故至足者結須二教意先須制教收上根人次立聽門攝於中下是則通來皆盡不同五邪唯制攝生之義不周也第二合辨二種相攝分齊文二初總標二約位釋初言今分二教攝法分齊者宗云首疏無此標此是今約順古總標也大意謂約四行分齊二教中事法向四行中幾行攝事兼攝法幾行但事不收法望法不遍邊得名分齊若事遍四行不云攝事分齊次正依古明分齊言止持作犯唯對二教中事以明者此將止持作犯二行對二教中以事辨唯者獨也但事無法且將止持對二教辨先將止持對制止惡事上辨者應云止持中制教中制止事如淫三盜四等順教離過成止持一重二制作事如衣鉢體量對此順教如法造作離非法邊成止持也應云止持中制教中制作事衣鉢體量是順教離過是止持二重次將止持入聽教中對非法房衣辨應云止持中聽教中聽作事長衣房舍順教離過邊成止持三重次將作犯番上亦得三重如前廣述成六重事也故云止持作犯唯對二教中事以明也言作至種者前之二行便云唯得事今此二行即言通通於法先將作持對制教辨應云作持中制教中制作事明白心中成可學順教作故成作持如衣鉢體量是一重次對制作法應云作持中制教中制作法順教作之成作持如羯磨并三藏等法是二重次對聽教事者應云作持中聽教中聽作事學順教作成成作持即長衣房舍是三重次對聽門法應云作持中聽教中聽作法順教邊成作持即處分説淨法是四重作持對聽門既收四重事法次將止犯番之亦成四重云云廣敘都計八也故云作持止犯通對二教法事兩種也止持作犯二行六重事無法作持止犯二行通收事法八重四行都計一十四重事法而為分齊已上明古師持犯分齊已竟次徵釋攝不攝之所由文二先徵後釋言所以前不通法者謂止持作犯二行在作持止犯之前今更牒來辨不通法之所以故作斯徵也言法唯進修方知等者古師意道夫言法者皆是進修習學之法故在作持位中止持既非進修因何有法若如此須簡此法出還他作持止犯行中收作即持止便犯若爾法既簡却事何不除答云事但離過自攝故得明也古人云淫盜煞等惡事及非法衣鉢房舍既是惡事不要進修但離過不作便得止成持作成犯此二行中自然攝得故云事但離自攝也故得明也者結前謂約離過邊故得將事向止持作犯中明若學淫盜事令了知又屬教行法自是作持止不學知又成止犯也思之已上鈔文所釋並是成立古人之義未為妙也攝境不盡總義不成只如隨相一篇名別持犯由有媒粗二謗等惡法今稱總義豈無惡法耶若不通之五耶七非向何位攝故戒疏云如上立義止持唯事不通法者如五耶七非並非正法若作有違義須止約此法與事煞盜不殊有何等故不在止攝如昔解止但對事法於義有乖今不同彼無論事法聖制止作則通持犯下以位分體狀無別已上疏文若準此言四行之中無論事法聖制止作並通持犯故知古來前二行中不收惡法殊乖道理既已知非今依戒疏加五耶七非之法先將止持對制門制止法應曰止持中制教中制止法五邪法是一重次制作應曰止持中制教中制作法離七非是二重次對聽門者應曰止持中聽教中聽作法房衣法上離七非是三重已上三法明白心中成可學順教離過成止持止持既三番成作犯亦三便成六將此六重法添向古人前二行中不通法處今既通法即事法合論成十二重粗於後二行八重事法成二十重此二十重明白可學若知後迷妄互生成不可學翻之亦二十重豈非四十重全變為今師事法分齊也問古人四行兩行有法兩行無法望不通邊可説分齊今師既法該四行事遍四行何故亦得稱為分齊耶鏡水表闍梨解云今師難事法遍四行望不相通邊亦名分齊如止持事法非作持事法如是例餘準知問古來既於止持作犯二行不通法今師加之鈔文何不便添還順古局事者何答有兩説一玄云抄為接新學若於止持中通法者恐濫餘善法皆闕進修且順古未立戒疏持犯之內四行俱通二解依宗記云為留古師之病彰持犯相淺二解各有理任情取捨問此門何故但云分齊未名出體耶鏡水闍梨云此文但是三略未分二教是一略未分四行是二略未分所學不可學是三略但名事法分齊未得出體至下文三廣之中方始出體諸記中對此云辨體者恐違文旨又但喚四十句事法之境為體狀者良不可也有智人者請深思之又玄記中對此廣敘發正破戒疏恐繁不録如彼云云第二廣出體狀中言就前止持對二教中就前者牒前略辨分齊中且抽止持一行來此出體狀對於二教事法為境明白心成可學止持體迷妄心成不可學止持體問此門何故便廣出體答具三廣故理合出體抄文已分二教是一廣又分四行是二廣已分可學不可學是三廣即及顯前文是三略故未合也言制門中事有二者謂既抽前止持一行對二教事法境上出體今且先對制教明之只於制門便分二別一者可學事二不可學事言一至等者正出止持制止可學體欲釋此文先辨今古兩意自古諸德於止持門中先明不可學次明可學故首疏云一者不可學事如似人非人二想二者可學事如似衣鉢體量等是已上疏文謂古師意道非盜等是惡事不可明白心學將人作非人想煞有主物作無主想盜耶一向不可學無其可學若於衣鉢善事理須進修一向學作無不可學今師不論善惡先須學知名為可學若後對境迷妄心生聖不制犯名不可學故回可學在前不可學向後約義又別古今大意如此問此可學不可學與歷位中可學不可學何異答名雖同義全異此約四行根本彼約枝條也可知次銷抄文言可學制止者受戒已後須學名為可學不許造作名為制止淫通三境者一人二非人三畜生理實六趣皆是犯境今唯言三者羯磨疏云約律明緣但説為三以人畜兩趣形現易知天修鬼獄幽通難識故合四為一莫不分得五通異於人類總號非人盜分四主者一三寶物二人三非人四畜生問淫何故云通盜乃云分答非難有三境齊犯夷故名通盜約四主罪有升降故云分也等者等取一切制止事或可等取五邪法亦得若論體體狀約能持善行心對淫盜等事境制止不作離之邊順制止教為止持體於前境上有所表彰名為相狀應云止持中制教中制止事非三盜四是一重也對因辨雙持犯謂淫盜等事若約心用説並有雙持犯若望順教禁約邊成止持對門對治成作持若約教以論淫盜惡事止而不作順教成止作而有違成作犯引但成單持隻今此出體正約單持犯體也抄文至此理合出法應言可學制止法如五邪等是今未述為接初機恐濫善法不進修故或可為顯古來持犯相淺故鈔文雖然今準戒疏對此明之故疏云二者可學制止法如五邪七非體乖聖教明了共相不得依行故曰止也已上疏文今正出體者此五邪法受戒已後理合知要分邪正如四依佛制即可依行五邪非制不可依用起善行心而制止之以心順教成其止持法上體於其法上有所表彰名為相狀應曰止持中制教中制止法如五邪之法是并前二重故次辨制作事言二至等者理實應言二者可學制作如三衣鉢等謂此三衣鉢是恆沙諸佛標志一切外道所無受戒之後必須備具受持終於四捨不許離宿此佛親制作之故云制作也衣鉢體量者衣鉢即熟絁布絹蜜緻所成若薄穀輕清即非體也衣量者廣三肘長五肘為量或與佛等量即非更合約色鈔文略也青黑木蘭是如法色五方正色即非也鉢體即泥鐵二種銅石綊紵即非體也鉢量者上者三斗下者斗半若過若減俱非量也鉢色孔咽色已外即非也等者等取餘制作物如坐具漉水等才受具已便須作師學知名為可學若擬造作先且止非以心順制止教邊成止持體於前境上有所表彰名為相狀應曰止持中制教中制作事如衣鉢體量等成三重也消鈔竟問此三衣鉢順教而作便是作持何故名止答夫止持有二一者同體二者別體如擬作衣鉢先止過非即是別體止持自向非法衣鉢止成與作體別後將布絹等物為之成作持不敢違悔復是止持即二持同向三衣等鉢上成就故名同體止持問今此辨體為約同體為約別體答若論同體戒戒並具如對淫盜煞作觀亦然今此論體唯約別體離過非邊若造作邊是作持攝不合取同體止持思之次辨法鈔文至此準理合云二者可學制作法即律藏教行及三羯磨離七非是夫欲作法須離七非七非如羯磨篇説謂受戒後便須學知於此法上須離七非以心順教之邊是止持法體於前法上有所表彰名為相狀應云止持中制教中制作法羯磨離七非是成四重等者等取一切制作法次辨不可學事言二不可學至是者出迷妄不可學止持體也謂此不可學亦是前來可學事法前約明白具已委知今於解處對境却生迷妄聖開無犯名不可學也不可學事者標也由心迷倒者釋也迷者本迷倒謂轉想等隨境未了者謂隨制止淫盜煞等境不了又隨制作衣鉢事境不了是者即成止是不可學也若辨止持不可學事迷妄體狀者鏡水表闍梨云難則轉想或本迷隨前所對事境不了然且不進趣造作前淫盜煞等望不違制止之教名為止持但約迷妄不了邊是不可學體於前事上有所表彰名為相狀故戒疏云不可學事者由心迷倒隨境不了於煞盜境疑慮不分望非犯位故是止持而心不了是不可學已上疏文若依宗記即約造趣前境或盜或煞但為迷心望無違教之罪翻成止持廣説如彼今且略述大意此解亦未違鈔請思之此依抄約事辨迷竟次約法上辨迷體者抄文理合標云二不可學法由心迷妄隨境不了等但順古故不言之今前文既敘戒疏闍添今亦須辨於迷妄鏡水闍梨云具如五邪七非之法本是止境由心迷故謂是四依等法便是邪正不分然且不作調達盡形等五法亦不作七非之法望不造作名曰止持以心迷故是不可學亦約迷心未違教是迷體於前境上有所表彰名為相狀故戒疏云二者不可學法如四依五邪七非三法是非相濫望思不了雖未依行故名止持非學所知是不可學已上疏文或依宗記但約隨前境不了然且造作前惡法法理合成犯今為妄迷聖開無罪翻犯成止持此解亦未違理知之第二文二初標所廢之義二注文應辨古今言廢昔義者謂今師依律境想以心迷倒非學能了為不可學者廢昔諸師惡事明白心不可學作為不可學義也問既廢昔義立今未審同異何別注文釋通云昔以事不可學此是彰大師後至大疏於上止持制教中云制門中有二一者不可學事如似人非人想二者可學事如似衣鉢量等已上疏文謂境想第三句迷人非人想時律開無罪今若令人學人作非人想煞此則有罪便成作犯故今不得學作此事為不可學故將惡事不可學作於止持中類上境想立不可學彼由迷人作非人想煞緣而不了上無根本之𠎝今於惡事明白心中緣之不了如彼迷人作非人想義勢相似望無不學無知故於止持中立惡事為不可學但使不犯於教無違名止持也今詳此意即是將律文境想迷妄無根本例於明白不習學無枝條自古皆然恐不可也故云昔以事不可學言今以心想等正立今義也心迷是本迷妄是轉想約想疑為不可學一切心境等者重廣今師之義一切心者初起方便心次起根本心後起隨喜心無貪等三善心貪等三不善心也一切境者制止制作境聽止聽作境情非情境空諦有諦境滅理涅槃境文字卷軸境虗空識等境如是心境無問善惡皆須學知故云皆是可學今若於前所解事法迷妄忽生迷人謂是非畜杭木等造作事律文境想根本尚開今對此事緣而不了之時不學無知例皆不結故云一切開故戒疏云不可學迷非學能了乃至四果由有事迷何況下凡而能通辨故於事法無問止作皆有迷心而非罪攝又問如此生迷與愚教者復有何異答愚教之徒生來不學故隨所壞並結無知今此不爾素並明練忽生迷妄非學所知故於教相無罪可結已上疏文已上消文竟更問古人以惡事為不可學者為約不可學作名不可學為約人非人想迷名不可學若言不可學作者即應聽門過量不處分房亦不可作制作三衣上非色過量衣上亦不可作即聽門作持中亦有不可學若以迷心為不可學是則聽門處分等上亦有迷心何得無不可學又問古人善事如何唯可學彼答云一即堪進修二堪緣教生解惡事又此唯不可學若爾制作非法三衣鉢及聽門非法房衣等亦不堪進修應通不可學淫盜惡事若不緣教生解如何得知淫三盜四犯等即惡事却成可學以此而論進退皆妨故新章破云但以四義虧於正教遂使學之者滯理妄思尋之者迷文守句今南山隨於事法不論善惡皆須學知悉成可學惡事不作即成止持迷妄心生緣前善惡事法不了之時名不可學是名遍四行通二教兼事法及善惡皆有可學不可學斯為溪達之義也上來將止持行入制門中通收事法都有四重一制止淫盜事二制止五邪法三制作衣鉢事四制作羯磨法翻為迷妄亦四都成八重體狀竟次釋聽門文二初總舉次釋言就聽門中事通上二者玄云還如前來制門中可學事及不可學事無別釋中言可至也房舍尺量者謂造無主房須準教文長佛十二搩手內廣七搩手即二丈四一丈四並約姬尺須乞處分長衣大小者謂長一尺六寸廣八寸已上等應量長衣是大若尺六八寸已下等不應量衣是小並須説淨如此房衣理須學知名為可學若欲造作須上過非以善行心合聽作教是止持體於前事上有所表彰名為相狀應曰止持中聽教中聽作事長衣房舍等是一重也此中有白二法説淨法抄文理合標之但謂順古不通故不須列應言二者可學聽作法白二説淨法謂須明練是可學義作此法時須離七非以心合教是止持體於前法上有所表彰名為相狀應云止持中聽教中聽作法處分説淨離七非是二重戒疏云二明止持對聽門中事法者謂房舍尺量長衣廣狹指授白二加法説淨如此事法亦聽作聽止必有房財理須加法故聽作若有妨難犯過衣財不合加法故聽止也已上疏文二不可學中言不至述者法寶云同前制門明不可學義無別命對房財大小先已學知後忽迷心緣而不了如淫盜事上起迷不殊故指同前述故戒疏云不可學事法者謂房財大小迷妄互生作法是非昏昧雜起望未違教名為止持迷非可學故制不犯已上疏文玄記中指同可學中謂前是明白心學止過非今忽迷妄即不可學約其事體不異於前故指同前述恐不及前第二文中二初依轉想本迷立不可學二潛通難言但至違者此段古來解者蓋多既不為正並不敘録但存正義玄云迷謂本迷妄謂轉想後心不憶前心事名妄如造過量房前後俱迷不犯若前後知過量至臨時轉想謂不過量但得前心蘭若前作不過量想臨造成時知是過量者得後心殘本迷不轉據教始終無罪想轉之時忘亦不結故知迷忘非學能了正是不可學義今以此義為不可學於佛開教即是無違此之一段轉想本迷一時雙釋上指抄竟問未審立此一段本意如何答謂恐上以迷心為不可學義未立故引律境想證迷非罪是不可學如戒疏作持門中亦有此意故疏云前心欲作過量不處分之房後心轉想謂是應量處分之房已上疏文既前後轉想即結不定如此不定之罪並非迷心結前方便耳今抄止持聽教出者以房舍事一聽教亦同約離過邊是此門攝於此聽門房舍既立得不可學至下作持門中有不可學其義善成潛破古人於此聽門作持門不立不可學過也二潛通伏難先伏難云若本迷不轉始終無罪於教無違理當不可學義今忽前後轉想之時還蘭殘之罪便成於教有違何皆俱云無違難竟抄答云前後想轉故結不定謂前心境相當後轉心不當境但結前蘭後心無罪若前心不當境後轉心境相當但得根本僧殘無方便罪此約前後心當境時結罪重輕故有不定然於前後心不當境時且不結罪亦是於教無違豈非不可學義正通外難已竟故戒疏云若不結犯何故律文結偷蘭耶答望非偷蘭但結想心方便耳如前心欲作過量不處之房後心轉想謂是處分應量之房相差前因不至後果故結偷蘭可不解也已上疏文準此以明不可學義與昔全但約迷心不結罪處得為不可學也已上聽門事法兩重一者房舍事二者白二説淨法翻為迷忘亦二都四重若兼制門八重通計十二重體狀並止持也次作持門言次作持者次謂次第惡既已離事須修善名之為作也持如前解問前來分齊門中止持後明作犯今此出體止持後便明作持者何答寶云兩犯無別體翻持而成但廣出二持後略翻成犯制作家取便更無別理今或恐依名自門中次第出體合如是也謂下順古依今雙釋作持名體此下兩科與舊科異知之初言對制門中法事者雙牒事法兩種也謂作持入制聽二教通收事故先標起言法等者未審是何等法若準昔疏法謂教行教謂三藏行謂三學今抄改云教謂律藏行是何行抄之釋曰行謂對治所以與大首不同者玄云鈔據初學五夏已前漸次而明且偏舉律大疏通彰新舊二學故該三藏亦可但舉律自攝餘二藏也行謂對治者即能詮教下所詮淨戒三種對治即衆自共三也如義羯磨結説等離非就如即衆行對治修諸觀行等自行對治對首持衣諸淨加藥即共行對治故序中云此三明行無行不收也謂上能詮所詮教行之法從受戒後制令學知是可學義以無貪等三心對茲法上進趣造修順制作教以心合教是作持體於前法上有所表彰名為相狀應曰作持中制教中制作法律藏教行法是一重也言事唯可學等者問前法中何不言法唯可學答準古法是進修之法本無不可學不須簡別事通善惡惡事則有不可學唯是止持今此作持唯是善事故唯可學所以簡之今若於立不可學恐新學致迷不知何事何法為不可學故此未立又前注文已立於此不言可知故且言唯也問前止持中便分制止制作今作持中何但論制作不論制止答前據離過邊名止持若惡事上離過名制止今善事上離過依教奉行邊總名為作持故不分制止也次消文言衣鉢體量者衣謂熟絁布絹十種衣體量即五肘鉢體謂泥鐵量三斗斗半也等者等取坐具針筒漉袋及一切制作之物受戒之物受戒之後明白心中制令學作是可學義以能持心順所持教成作持體於前事上有所表彰名為相狀應曰作持中制教中制作事衣鉢體量是二重次辨聽門言亦對法事者謂將作入聽門對法事兩種亦與前制門不別也言法至等者上既云亦對法事未審是何等法復是何事抄自釋云法謂處分説淨事唯可學長衣房舍是所言處分者乞白二法指授此房地也又畜如法長衣十日內説淨也等即等取一切聽作如乞離衣枝羯磨及迦絺那衣羯磨等於此法上理合進修學作名為作持以心順教為其體也此於法上有所表彰名為相狀應云作持中聽教中聽作法白二説淨法一重言事唯可學長衣房舍者此改亦順古也古云如法房衣善事上明白心中唯是進修之境必須學知若也不學便成止犯是以但立可學無不可學今抄文順古者謂此長衣房舍明白心中必須明練且言可學等者等取聽門中一切善事如兩衣覆瘡衣等受後俱學名為可學以心順聽作教為作持體於前事上有所表彰名為相狀應曰作持中聽教中聽作事長不房舍是二重也第二難古立今文二初正難古不通不可學之所以二今師立別立不可學指後廣陳此二小科與舊科亦異若依舊者即乖義異思之言所以不通不可學者謂今師擬立迷忘心為不可學故先徵古於作持中制作聽作之內但一向云事唯可學無不可學者何耶故云所以不通不可學者鈔文雖有徵古之詞而隱古師答語戒疏方明今響彼文作古人答也故彼云作持門中事法可學無不學者非此所明以非進修聖不制學不同止持通不可學以唯離過故得明也已上疏文準古意者唯約惡事不可進修為不可學今此作持既是進修故可學已上響戒疏答意若欲作今師義者可借上徵古之詞抽却不字但云所以今師通不可學者意道自古作持門內但有可學在不可學其理未圓且今師於作持門中通不可學約何義故便引抄答由心迷忘非學能了廣如後述今師新立故戒疏云今解不然不可迷非學能了乃至四果由有事迷況於下凡而能通辨故於事法無問止作皆有忘迷而非罪攝可以明之如律長財開忘不染房舍指授亦開想疑既不結正明知不犯已上疏文今準此文則顯抄文是今師答語須於此作持立不可學謂律房戒開想疑長衣忘説淨皆不結犯即是開迷豈非不可學古人如何於此不立耶廣如後述者如下歷位分別中止持不可學九句料簡三不識事中但事是可學以想疑忘生雖緣不了聖不制犯引其境想成立今師不可學義準古於九句上半事生迷即放罪下半犯法上有疑不識即結十二罪今師難云若爾後緣法中亦有想轉又引房戒境想難之如不處分處分想及疑亦不犯罪今何結下半十二罪耶答曰此據止持中約事為言必如所引對法有二九句後作持中更為辨也至下作持門中今師對法上但可學一九句後云不可學法迷亦有九句如前段後九句説之於止犯中對事立二九意欲翻止成作作持對事亦有二九是則作持門中對事對法皆有可學九今指在後明故云廣如後述玄解繁亂不録大科第三言此至也者首疏云於此二中制聽為二但令順教造作無違皆名作持已上疏文此唯結可學耳今師於此既立不可學今借此文兼結不可學應先難曰迷心緣過量不處分房作如量處分想造非法房成合是作犯今何得在此作持門耶可引抄答此謂等也謂不可學迷非學能了聖不制犯即名順教無違亦得名作持也又此作持若明白起善心順二教以心合教為體如前分雪若迷亦約迷心不違教結不犯邊以為迷體思之已上明白成可學四重迷忘翻前亦四都成八重體狀第三作犯三初牒所翻二辨體三結言三明作犯以翻止持者謂前制聽二教豈非三重事對前事境不作順制止教成於止持今此約違教造作成作犯可以翻之言但不依戒相造作成辦翻名作犯今即翻之謂前制門中事有二種制止淫三盜四制止非法衣鉢今起三毒行心違教造作成辦名為作犯體於事上有所表彰名為相狀應曰作犯中制教中制止事作犯淫三盜四是一重作犯中制教中制作事作犯非法衣鉢體量是二重前止持中有惡法鈔未明之前既引戒疏加之今亦翻犯應云作犯中制教中制止法作犯五邪法是成三作犯中制教中制作法作犯羯磨七非是成四次就聽門翻者前止持中云一者可學事如房舍尺量長衣大小今乃起不善心違教造行成辦以不善心違於聽教是體於前境上有所表彰名為相狀應云作犯中聽教中聽作事作犯長衣舍房是一重此聽門中亦有法前既未論蓋是順古此亦暗番應云作犯中聽教中聽作法處分説淨七非是二重兼前制門中四成六重明白體狀番成迷忘亦得六重成不可學體都十二重也已上消文竟上雖辨於明白作犯今次辨迷忘作犯以何為體一解依宗記云謂約前聽門房上以説謂本是過量房初亦作過量想房成之時却轉作如量想以心迷故不結僧殘但有前心過量想時偷蘭今取此罪為迷忘作犯體今難云心前偷蘭是明白罪何得將為迷忘體恐不可也有救此義者云雖是明白然因迷心故有謂後心轉想作如量想不犯根本罪致有前蘭若不因迷還結根本遂成明白作犯可不如然今言難此扶立理亦不可重難若爾轉想有罪任許此釋本迷無犯又復如何若轉想有體本迷無體者即成不定之過不成解矣思之二解依鏡水闍梨云此不可學作犯但有名無體然必須造作前事名為作犯既是迷心聖不制罪是不可學故下鈔云又必由造作前事通名作犯攝也第四止犯文二初牒所翻二正辨體言四至是者謂上制門所學事法二種作即成作持今此亦對前事法但懈怠不學翻成止犯就聽門中亦爾如前抄云亦對法事法謂處分説淨事準可學長衣房舍明白心中對前事法作成持作今懈怠上而不學翻成止犯今將此止犯向二教中依抄文可學事法通收四重四重應曰一者可學制作法止犯謂不學教行法是一重可學制作事止犯衣鉢體量是二重聽門中可學制作法止犯處分説淨法是三重可學聽作事止犯長衣房舍是四重已上明白事法四重翻為迷忘亦四成八重也其迷忘止犯但有名義無體知之成作犯亦十二成二十四作持八重翻止犯亦八成十六通前二十四成四十重體狀此且方軌若達之類通法界矣已上第二門竟第三成就門文二初牒名二先約下開章釋言三至所者牒也名體既知未審四行何性心中成就故次明之成就者俱舍云得獲謂成就謂獲得法體在身總名成就若別論者法體創至生相名獲名得流至現在名為成就成就時不名獲得已成就故獲得時不名成就未成就故此則得獲與成就別也今但論得法在身名為成就釋中言先約心辨者玄云謂五蘊成身四蘊心一蘊是也今除色單約四蘊心辨也言止持有二者謂唯辨止持一行自有二種一約識受想三無惡來污有止持二約行心對治得有止持餘之三行唯在行心無二別故今先辨止持也言一至分二者無惡來污者古云端拱止持從受戒後端拱不為善惡邊成止持也今破云若端拱不修諸善成端拱止犯即不通餘行今云無惡來污者從受戒後至四捨來於其中間不起惡心望戒無污染邊得名止持不局初受也行前三心等者謂受得戒體在心無惡相污雖入無記未違受體得名持也此三非業者識想受也識心創起但了總相次起想心了境即有苦樂捨怨親等想次起受心見怨作苦受見親作樂受見中庸人作捨受此時之心由是無記未能成業流入行心者謂至第四行心能生三毒方能造作對怨境起嗔行煞對好起貪成淫盜對中庸境起癡成妄語行能成二犯也二持反説無貪成不淫行無嗔成不煞行無癡成不妄語行至此行心方能成業也問諸列五陰色受想行識次第皆同今何識居第一答約觀行次第應觀色如觀不淨等次受想行識今此列者約業以明故先明識也又準成論生起次第亦識居先識即心王餘三心所百論云心王了其總相心所了其別相如識創起但緣青等總相次第境像即相心次領納前境即受心次貪等煩惱造作即行心問識想受三已是行心如何言入行心答行有二義一遷流解者一切有為皆是行即識等三亦名行二造作解者能發身口業能為別因名行即第四心偏名行也故分二者識想受三為一行心為一也言由至持者出成持之所以也準大疏應先難云行前三心有止持者為是記業為無記業若是記業三心非行何得成業若是無記不應名持今文云由本受等答也雖在無記心中望無犯邊戒體清淨得名持也若爾行前三心不修諸善應成止犯答惡既本不受得無善來改不名止犯言受至也者應先難云行前三心是無記無記三心有止持止持既在三心中止持應當是無記云受體應當是無記鈔答云受體是記等謂初受戒善行心中成其受體即是有記三心非善惡是無記今有記止持向無記三心中行也故涅槃經云其心雖在惡無記中本所受戒不名漏失猶名持戒問何名無記答於善不善義中不可記茢亦可無當果可記不同善不善有當來順益違損可記也問無記有幾種答有四故俱舍云異熟威儀工巧變化言異熟者因果性別名異果起酬因名熟如第八識能招業因性是善惡所感第八唯無記六識分別者異屬因熟果依主釋也若異熟俱屬果持業釋也言威儀者謂行住坐臥取捨屈伸有可軌則名曰威儀也言工巧者長短方圓等是言變化者改轉本質名變無而歘有曰化也廣如論述問今鈔約三心名無記者於上四無記中是何無記答是初異熟也以此三是不染污故第二對治通辨四行中初言止至無者謂從前三心後至第四剎那心能對治防護名之為行行者造作義謂苦樂等三境現行先起識心了別次起想心取像次起受心領納上三無記後起行心造作方感苦樂等果故知行心是業前三非業此約成宗以辨前後而起故有此次第若依多宗心王心所起必同時即無此次第言善性便有者三性分別也三者數也性是體性皆有三也亦是類義謂世出世法有斯三類名三性也今言善性者別名也善者順益為義順於正理益於自他故云善性今二持是順正理功益自他故唯善也此之三性不異四心但門別耳可知次約二犯中言止至心者此約不善行心造作成犯注文簡濫可知也局不善性者亦三性分別不善者是違損義違於正理損於自他故號不善也今止作二犯既違正理損於自他故唯局此言若至也者上約前後心一持犯亦一今此約前後心別持犯亦別或前起嗔心欲起行煞即成作犯行後起善心止煞却成止持或前對境起無嗔等心離煞等成持行後起嗔心行煞成犯行約事前後生約心前後異持犯亦不同故云有別持犯前則通約善惡行心以辨今別約三善三毒前後起以明別持別犯雖殊皆是行心理非難練故曰可知也第二約三業辨中標文可會釋中初身二持如文合辨犯中反上可解云云次單意業言單至犯者以未動身口故下調部文云時有比丘念欲解他豕子及見恆沙水中流船念欲盜取不動身手等皆疑問佛佛言不犯要動身口方結成業以聲聞不制意地罪故善見云凡人恆緣欲境聖若制心戒無有得脫之期言若至之者謂動身口思欲向彼作如是事便結遠方便罪也後更説之者如後趣果門約初戒內心淫意身口未現名遠方便等可知已上成就門竟今當第四通塞門文二標釋上既約心約性明四行成業處所已知然於通塞兩殊未曾委練故次明之釋名者四者舉數明者顯彰也一行中與餘行齊成名通若一行中唯成一行號塞釋中言四門分之者謂通塞之相幽隱而難明非但一二門而能分別故須四門釋之第一門就作業唯塞不通第二門亦通亦塞第三門唯通非塞第四門亦塞亦通若持犯通處無作即多持犯塞處無作即而意欲令人識業多少離犯成持也言一至也者謂以一心對一境今單言心不云境者恐濫下兩境門故唯就作業者謂正離煞一剎那間成業之時但成止持更不能緣餘三行故四行皆爾心無並慮者一心不兩緣故正起心緣離煞時不能緣餘説淨等境不頓現者以止持境正現在前不得作持境雙現此唯約作業一剎那説也若對淫盜作觀行等屬後門收此門不攝第二門文二標釋言二至塞者謂約一心望於二境如起一善行心通望止作二境又約起一不善行心通望止作二犯境此門正約同體雙持犯義如心望境之時時犯當分雙成由通二持成時無二犯等名塞故曰有通有塞言塞至有者持中無犯犯中無持持是善犯是惡不相有故言持犯自相通者即止持中有作持作持亦通止持犯反上説謂雙持雙犯當各相通次廣解中言如至持者持犯自相通如止煞事是止持作於觀行是作持如作如法衣鉢是作持止非體量是止持言二犯亦爾反説便是如不乞法造房是止犯違教成是作犯即止中有作也如作非法衣鉢是作犯止如量邊是止犯即作中有止也料簡中初徵可知言答至漫者正辨相收之義如止煞是止持有作觀是作持此則作持為傍因止持是正宗收作持傍因成止持之正定即收作成止也作中亦爾者如作如法衣之時作持有止非體量之止持止持為傍因作持是正宗收止持傍因成作持之正宗即收止成作但名作持二犯亦爾反説可知舉宗歷然者分明之貌也通漫者不分之貌也又闊水平流曰漫今不如此故云豈是通漫次四句簡異答者上雖舉宗收成未委心境相對有何差別故作四句分之言一止作持心別者如造房止過量心是止持心後順造是作持心二止作持境別者如止不過量造三止心對作境者如上不過量房是止持境如量房是作持境四作心對止境者欲如法造房是作持心專擬對過量房之止持境或有將止煞事釋亦得前二則心境不同後二則心對境別謂止作二持雖然相有差別歷然二犯反説即是次指事釋言若至也者作二觀是對治離後望對境不作煞盜即果行離先作對治是作治後離煞盜是止持即番作成止也言若止至也者先止外緣望離粗過名止是對治離善行成時名作即果行離也先止外緣玄云釋誦戒離粗過釋羯磨羯磨五十餘法簡人但離粗過便得若論誦戒細過吉羅尚須發露不論粗細悉不得説如無過者須息外緣即惡比丘為外緣知彼十四日來十三日説等是諸家皆依此説亦得或依鏡水闍梨準首疏自釋曰先止粗緣慘動之心寂靜方得成就望離粗過名止持後業行成名作持此解的當言作至類者如人作惡是作犯先不學善是止犯即作中有止也此言邊者玄云二犯相有隨舉中邊皆得亦無別理或有解云邊異中也止犯在前作犯在後此止心在作心外邊故云邊也若爾前作持中云先止外緣是止持後善行成名作持此止持亦在作持心外邊何不言之故不爾也後有釋云謂此作犯或有止犯若不學教人造罪即此作犯中定有止犯應云作犯心中有止犯若學教人造罪即此作犯中定無止犯應云作犯心中無止犯故抄文云等類也者謂取學教人造罪無止犯此言無者但無教行止犯非謂無事止犯如首疏二犯行皆有邊字故彼文云作犯心邊有止犯者若望不學解止犯止犯中不得有作犯若對修行以明止犯止犯中有作犯如人造房不乞處分畜衣過日不説淨是止犯心邊有作犯已上疏文彼約教行解第四止犯即無作犯故云邊鈔約事上解止犯定有作犯故云中即明第三作犯犯成時於教行止犯有無不定故言邊也四止犯文二初準前修行辨二犯相通二若望下許其不學止犯非無後習言止至是者謂畜長衣止不説淨是止犯十一日經於明相即惡行成名作犯即止中有作收作成止也又如造房止不從僧乞處分是止犯後作非法房成是惡行成名作犯即止中有作收作成止也言若望不學止犯無作犯者此句抄文是首疏義古人意道不學教法以説止犯即此止犯中定無作犯且如今日才起不學心此時便結止犯然且未對境造作五篇之罪故未有作犯既未結犯即止犯中不通作犯説通義不得故須簡之言不即相承非無後習者今師解也謂如今日止心不學但有不學罪無作犯者然不無此理約其久遠任運習成亦成通義今舉事釋如今止心不學得止犯罪後對淫盜等造作過非隨所作結根本罪此根本亦由昔時止不學來致對境不識若先結不學止犯罪且置而未論但據對境犯時有無知罪若全根本無知犯提疑則結吉亦是止犯與作犯一時習成豈非通義故曰非無後習若欲妄釋任取諸家第三門言三至通者此段文大意者謂先教人作四事然後自身修於四行隨入何行心中教人四行同時業成説為通義也必有前後即非通義言四句者謂約前後自修四行一自修止持或作持或作犯或止犯此自修四行為四句四句之中各通教人四行一時成就故云自作教人四句皆通即每句中有教人四行四四十六行兼自作四行都二十行也釋中言如主持者前心者謂前方便心也假如日午之時自身擬修止持行行未成前預為方便假令四比丘各修一行先令一比丘與我至日午時漉水防護蟲命是止持理實止持行成須待正漉水時今雖未漉且是止持方便心由如因中説果也次令一比丘持欲僧中説是作持也又令一比丘與我煞生或怨境等是作犯又令一比丘為造房不要乞法是止犯已上四事雖未施造且總是方便心也四比丘既各領意了故云作四事已此言已者亦是約四比丘領意訖非謂作四事竟時言已也然後於日午時自修一止持行故云後心作意離諸過罪也正修此行成時前心所教四行各修一事並皆動轉第一比丘午時正漉水成止持果行第二比丘正説欲成作持行第三比丘煞前境正命斷成作犯行第四比丘造房不乞法成止犯行即能教比丘後心作意離過止持通有所教四行具足應曰止持中有止持有作持有作犯有止犯鈔存略故但舉一行例通餘三句解次釋三行通言乃至至法者謂此越却作持犯兩行直取止犯一行以論通相乃至止犯心中亦具二持犯若所教四行方便如止持中不別故云如前遣人作四相已然後自身修一止犯行成故云後便止不學善法也能教比丘正止不學善法止犯行成時前來所教四行恰與能教止犯心中一時成就即止犯中亦通四行即止犯中有止犯等也第四門文二舉數釋言四至通者謂前自作四行方便怖其後果後復自心隨入一行前四方便後果遂時與後心自作一行一時成就故曰前後自業相成也約後一行通其四行曰通但成前一行為塞也釋中言塞者易解者只如前自作漉囊擬後漉水是止持之因漉囊既成後心自執漉水是止持果此後心果行成時還由前心因行而立斯則前後自業相成獨有止持一行更無餘三即是塞義又如前心自作煞具是作犯之因後執煞生是作犯果此果業成還由前心因行而立如是但成一行不通餘行此義不難故云易解又此門不類第一門一心不異緣為塞又不同第二門持中無犯曰塞但約前後自業皆是一行説為塞也思之言通至別者謂前心中自修四行之因方便布置説於後心中更別後四行隨入何心中前之四行一時成就名之為通後心四行一一行中皆通前心四行一行有四四行可知故云通須方便等也如前無異者大同自作教人門中也訖相少別者玄云謂前門使人作四行方便此門自修四行方便與前少別或依發正云前門持欲僧中説是作持方便相此門禁閇沙彌明作持方便相前門令人不乞處分造房明止犯方便相此門閇戶現相明止犯相四種之相有二不同故云詫相少別亦得次釋通義言如至持者如前自安漉具者如前之方便心也謂於朝來自安漉具是止持方便故云自安漉具等又自畜養沙彌若不教誡恐成止犯遂禁約之令誦經等是作持方便故云禁閇沙彌等又或見人及畜常從此過遂張設煞具即是作犯方便故云安煞具等又決知今日堂頭作諸羯磨意中不忍又不與欲遂閇戶現於不在之相即是止犯方便故云閇戶等也此四作已後修止持者正辨通義謂前心作四種方便已至日午時怨境到來後心作意修慈悲等觀離諸過罪便成止持之行此離煞止持行成時前之四相一時動轉謂井頭有人漉水合著前方便心止持行成房內沙彌正念經等成作持安煞具處生命恰斷成作犯堂頭正作羯磨閇戶現相成止犯行此上四行恰與後心作意離諸過罪止持之行一時成就即成通義即止持中有止作二持止作二犯四行俱通鈔文存略也言乃至止犯者謂前心布置方便且説止持一行通四行訖餘之三行一一行中準上止持一行前心方便四相辨通不別更合三度辨通鈔意𡞞略但略標後心三行就三行中更略作持作犯只標止犯略中更略故云乃至止犯存其少許以表不無也上來四段總當釋竟第二重料簡後兩段止犯言此至犯者此後二門者謂指第三自作教人門及第四前後自業相成門也並對事修造等者依首疏破古義也首疏以前諸古德未曾對事明唯向法上約不學止犯説但有三行不通止犯故是塞義古云且如第三門中無止犯者如朝來令一比丘汝至辨時莫學三藏教法前人用語起不學意此時結止犯吉羅了此止犯罪又屬前所教之人是故此門無不學止犯又第四自業相成門無者如朝來起不學心要期午時不學法隨起心時又便結止犯無容待得日午之時與餘三行一齊成就是故此門之中亦不通也今首疏説其通者不約不學止犯説並於事上布置待得餘行一時成就只如不乞法遣人造房及閇戶現相不與欲前心方便未結直待房成及堂頭作法時方結止犯此事上止犯則客預待得餘三行向後心中一時成就前二門中通事上止犯亦有法故前文云後便不學善法等是上來第四通塞門竟第五漸頓門文二牒名釋言五明漸頓者牒也玄云上明通塞雖知然於漸頓之理未練故次辨也釋名者約行一一而成曰漸就心總辨為頓問漸頓與通塞何別答漸與塞稍同頓與通全異且如一行中準成一行更不通餘行為漸與前門塞必稍同若頓與通全別者一行中有餘行是前門通義一行之中但成自己衆多一行是此門頓義即四行相望橫竪不同通塞即四行相望橫論漸頓即約每行自相望竪説亦須細思之釋中言初至頓者此準約心明以心力無礙隨起緣境時有頓也言若至頓者玄云謂初受時擬斷諸惡今若悉斷是順受體名止持心頓若作心並造諸惡則違受體名作犯心頓餘可準思言若論心漸以類可知者謂止心單離一惡是止持心漸若準作一善是作持心漸若欲且作一惡是作犯心漸若息修一善止犯心漸鈔云類可知故不指事也言莫非至分者辨持犯兩分也應先難云夫成持犯要假將心對境方成今全未對境起心如何戒持犯耶鈔莫非下答也謂先有受體今但約起心順受體即成持違受體即成犯也此中四句分別一順中之順如作心總斷惡修善是二持心頓二順中之違如作心分斷惡修善是二持心漸三違中之順如起心分作惡止善是二犯心漸四違中之違如起心總作惡止善是二犯心頓故下文云以初受時皆發得故今違願體頓得多罪二對行中言二至頓者謂對境作業名行約行不得兩修故準漸也言以一至也者且如持三衣時三種作持各成不可言頓況於餘也言止至也者如怨境不煞成止持非離盜等止持也作犯文二初約義隨明二指事曲釋初如文言且至説者且者未盡之詞煞通六趣今未説餘五但就人以論又於人中含男女二別今唯約男子以説男子復有衆乃今準約一個男子身以説故云且也七心者貪嗔癡三單及貪嗔癡嗔癡三雙及三心共聚為一合成七毒心也如於一男子境本有七支問淫支為二成八初受戒時將七毒歷彼得五十六戒今起貪心單犯一不煞戒更有餘六不煞戒及餘四十九戒全不犯五十六戒者淮南順正説云約餘男子以論意道一男子上犯由不盡何況諸無量無邊未犯男子一男既有五十六戒即無量無邊五十六戒並不犯等者等取女境本有七支開淫為三成九以七毒心歷之成六十三戒今以貪單犯一不煞餘六十二戒且全不犯何況諸多女子一一皆具六十三戒即無量無邊六十三戒並皆不犯故知是漸並如前説者如篇聚又發戒中説此解為定思之若準案記云四十九戒者約一男子説五十六戒約一如子説若一男一女以犯一貪煞餘六不煞全不犯若將六添男子四十九成五十五戒將六添女子五十六成六十二戒此解恐違抄文玄記云第五十六戒亦約一男子次第釋也諸家不取思之言三至之者謂此止犯一行有二若事上止犯及事上法家止犯唯是漸成與前三行不別此不重論若約教中不學止犯即通漸頓故此別明言一不至故者此段文將不學對無知辨漸頓者玄云不學是頓無知準漸若唯明不學不學即通漸頓如下自明所以將二罪相望説者異古也古云二罪並約頓結以不學時結不學罪不容緣境不了便結無知是以二罪雙結俱成頓也今師云結不學時未結無知須待五夏後緣教不了方結無知此約得罪先後以明漸頓不學先起是頓無知後生故漸此中不學頓義但約起心之結為頓與向下緣教境時頓義亦不相𧮤知之有記中不許此説者却請思量引論文佛問諸比丘誦戒羯磨不答言不誦因制五夏誦戒羯磨不者如法治等云云第二段中別解者謂將此二罪離開各自別論漸頓不定標如文釋言如至罪者如要心者是要期之心可學境上者約一切萬境皆是可學也作不學意者即是約心皆不修學於一一法上頓得多罪者約境多少齊如許境頓得衆多罪引宗約境約心頓得多罪不同光願準約境結今難云若無止犯之心如何得結止犯之罪又不同東塔偏就心明故彼疏云不學約心無知從境若緣三藏總止但得一罪若隨別起亦通心結不同古人於一一境緣不了處亦結不學然不學罪非境緣生如何一一境中皆結不學之罪已上疏文今難云若通於三藏止心不學但得一罪者若漸止一藏不學應得一分罪耶故如結罪之時須將心望境得罪多少如境之數也言以至罪者玄云辨頓得多罪之所以也應先問云如何於可學境上作不學意頓得多罪可引抄答以初時於佛所説三藏皆願學之因引願心方發得戒今止心不學違其願體故頓得多罪釋漸中二初問可知言若至漸者答若要心不學羯磨者於一百八十四法中我今不學説戒單白一翻羯磨非謂通望一切羯磨但有一罪思之於餘悉學者餘者外也除説戒單白外一百八十三翻為餘即由習學也望羯磨邊犯一止罪者謂望一番羯磨邊要心不學犯一止犯為漸也次別解無知文二初定宗二釋言若至者者謂對事法緣而不了方結故非頓也言謂至漸者夫無知者皆對境緣而不了即結無知此約色境説若論法塵但約所思即是其故以凡人之心無時暫息隨緣不了便得無知緣境之時心無並慮境不頓現故唯漸也問罪輕重中初雙問如文言答至罪者初古云準受戒法結勸云汝當學問結云若不學如法治引此文證不學是吉也二無知者如律下文先誦今悉忘制令如法治兩處皆言如法治定吉羅也二今師文二初不學問古師如鈔次辨無知言無至也者若全根本不識依今準況舉先言戒得提故律緣中有比丘先犯罪恐被清淨比丘舉先向清淨所告言我今始知是戒經等佛呵言云何恐清淨比丘舉即言始知既云我始知明知先已結無知又律釋相云不善意思惟一心聽法無知故重與波逸提又戒疏云根本罪上緣而不了復結無知故曰重增下誡約中以無知波逸提已上疏文若疑未了無知即同是吉故戒疏云先知迷疑則輕重由學緣事有明暗也故境想中疑則準重今迷不識正是墮取已上疏文第三分齊中言三至別者謂以不學無知二罪就教行從根三種之中明其結罪前後分齊言言至結者釋也就律教辨結罪之時節始終者初受為始盡一形為終律令盡形學今隨何時不學即結不學罪無知五夏結者謂引無知罪唯終非始以五夏前學亦未了至五夏後方結問何故無知必約五夏後結答玄云具三義故一合是知位以勤學之人學之得解今既不知故結二合離依止謂五夏前未知教相制令依止今既自行未立故結三合階四種師位今既未明教相未得為師故結五夏已前及此三種故不結二對行中言對行者前明五夏約教説之今約行明從凡至聖同戒生於定慧加功用行法身方立故今對行以辨罪之分齊言恐至降者謂三藏聖教理須學知斷惑修證今滿五夏而不依止恐心逸蕩而生懈慢但解五停心觀將謂與羅漢同儔以羅漢亦解此觀故故制以劣從優以凡依聖而住言文至止者證優劣相降之相律受戒法文謂五歲比丘行解仍劣雖滿五夏須依止十夏智慧比丘以十夏行解勝前五歲如是以強攝劣以劣依優乃至多夏及於聖位五分法身者婆沙三十二云無學身語律儀及以正命名為戒蘊無願三摩地名為定蘊正見正智名為慧蘊盡無生智相應勝解名解脫蘊於境自在立解脫名非謂擇滅無為解脫盡智無生智名解脫知見蘊至羅漢果時五分身成立方離依止也三從根言約根者前雖約行已知今更約利鈍根人以辨言若至也者謂利根之輩寶曰如古來有不聽泰半遍清豈要五夏但隨一事始終即得二罪始終初受迄至命終於其中間隨何時止心不學即結不學罪若緣不了便結無知次鈍根言若立故者謂此根鈍設學終不解故制此人盡形依他而住若不依他學者但得不學罪非智力故無無知也律云等者引證可知玄云引舉極鈍之人一生學並不得者説若中容者隨其力分解時結罪謂十年二十年學得知解者初不學得不學吉十年二十年滿已結無知罪第四可懺中言第至懺者謂此不學無知止犯之罪可懺悔得滅不言二俱可懺者今師直答二俱開懺即破古非古人云若不學罪即許懺無知罪不可懺所以爾者古云只如先日止心不學結不學罪訖今日發意更學便是斷昔日不學相續之心既有斷義故許懺悔若論無知假令今日更重學之學亦未練豈有斷義必若已後明練無疑即是達教亦不在懺是故無知無斷義不可懺已上疏文釋中言如至可懺者謂今師欲明無知有斷義可懺且先敘結罪之由且如未滿五夏前曾止心不學滿五夏後對前事法緣而不了皆由先止不學來故結無知罪故云如息意不學等後至六夏更發心學從發心後對事法有疑不識以是學教人故難未曉了且對境不結無知故云若作心學而未知等若如是者不學從心更學即斷無知約學今學未練不結無知既也不結明知有斷也不學有斷既許懺無知例不學亦爾可知上來第五漸頓門已竟第六優劣門文二標釋文言六至劣者來意可知優者強也劣者弱也此門與前門四行別別明漸頓今持犯自辨優劣也先明二持十門者創發情段故在先矣優劣難委須分十門令學者棄劣從優以護受體也言一至同者謂約四種戒法及行護之法論其二持勝劣故云約法而言四種不同也言一至戒者威儀即今別解脫或唯居散位但護身口七支相對彰過名曰威儀亦名轉不隨心或謂依思種子上建立不隨三性四心而轉故護根者護即防護根謂六根四善根人多居定位防護六根不令起染名護根或婆沙云聲聞根律儀始從習業終至無學方得圓滿言定共戒者謂身居下界坐得四禪四無色等有防惡身口七支同時而起故名定共或曰定俱無表與定俱有此無漏定不可表示於他故云無表亦號靜慮律儀靜謂寂靜慮者思慮一切所緣故律儀即止惡防非之義故知禪定能防非邊得名戒也若總相説四禪根本四空處理名定共戒若據別以論偏約四空無色為定戒若色界四禪但名禪戒今抄通收之或名隨心轉戒謂在定即有防非義若在散心即闕上義謂此戒依思現行上建立不同別脫依思種上建立也問種子無緣慮可説為無表現行有緣慮何故名無表答理寶實而言具表無表有緣慮自知故名有表無形質不可表示於他亦名無表問大少二乘皆有定戒若為取別答小乘唯是有漏大乘通無漏又小乘定心之時準能防身口七支不起惡故名戒且不能發善身口七支令生若大乘定心時能防惡身口七支兼能發善身口七支故經云又見菩薩安禪合掌以千萬偈讚諸法王等餘如別處説言道共戒者謂從苦法忍已去至金剛喻定已來隨得無漏道時有道俱七支無表與無漏道相應故云道供或言道俱無表謂此無漏慧不可表示於他此唯局無漏不通有漏問大小二乘俱有此戒云何取別答亦有少別若小乘即四禪根本初禪未至并下三無色名八等至諸無漏戒除非相處以大梵王故居邊表名道俱無表若大乘説四禪四無色根本近分無漏定俱是慧慧總名道共又大乘説有道俱無表時必有定俱無表時不必有道俱無表定寬通漏無漏道俱狹唯無漏又此戒亦是思現行上建立也餘不繁述次歷位配屬中都有三位言初至戒者初即四法之中第一威儀戒配外凡位持未觀諦理名外未得無漏名凡謂前三方便人五停心觀總別相念是謂此位未得無漏真實理和但得事和假有僧用故云假名僧戒中二等者護根定共二戒配內凡位持謂己觀諦理為內未得無漏為凡即燸頂忍世第一四善根位分與諦理相應名和合僧若無燸等縱得四禪亦非內凡如外道等是今就得者為言也後一等者即指第四道共戒唯屬聖人位謂四果聖人與無漏道合更無變異名真實僧或初果斷三界見惑二果兼斷前六品修惑三果兼斷欲界九品修惑盡四果三界見修惑盡得名真實僧也次定優劣文二初標如文二持下正辨言持至勝者威儀戒護氷身口易故劣護根戒護心稍優定共戒從定發故次優道共是無漏最勝文定共故云乃至言二至弱者前即約法論故舉人以顯法今文約位者有學無學內凡位以明無學最勝以三界惑盡所作已辦得二解脫得滅盡定名心解脫斷盡諸漏名慧解脫德圓者斷德智德皆圓滿故戒行為勝三果企求者企去智反望也初果希望二果二果望三果三果望四果以煩惱未盡有後果可望故內凡外凡相望漸弱者內凡望初果即劣望外凡又勝於內凡四位外凡三位自相望説優劣思之不同諸記云云言三至勝者就人明也此約凡夫道俗七衆以辨在家女人五或最劣男子次優沙彌尼不如沙彌沙彌不如式叉尼式叉尼不如比丘尼比丘尼不如比丘滿足故無願者以本心求戒今得具足願心已息故名無願又四方二千學處日夜常流更無願求故勝也言四就行者就止作二時辨也言止至望者此約所治罪之輕重以辨也以止持離淫盜等重過為優作持離提吉等輕過為劣言若至勝者此約能治難易以辨離輕過難故為優離重過易故為劣言五至三者對善不善無犯三心辨也言一至也者若斷惡修善上求佛果是善心止不受樂謂修離染無貪善根為清淨行以貪等三毒能為生死源今不起此心不作諸惡以求出離是善心也對根本惡下指事釋也如文言二不至也者明不善心也為求名利及生人天世間之報以持戒未出界繫是不善心故涅槃云有四種事獲得惡果一為勝他二為名利三為眷屬四為世報也言三無至等者無記心也癡狂眠等雖作前事為聖所開猶為持戒是下品心最劣也言若以至等者前列三心約止持説今約作持校其三心亦有三品如作成佛善心持三衣鉢此心最勝若為名利等是中品心狂眠等是下品心也言若望至心者通疑濫也應先難云如為名利得名中品可爾如無記狂眠等作前惡事及不如法持三衣等何名持戒耶鈔答曰若望順教但於教無違總名持戒即不分三心今分三心者要定優劣故第六約所求中言六至種者約持戒心有希望名為所求辨優劣也釋中言一賊分齊等者唯持戒唯求名利起不善心損功德財故名賊與餘心別名為分齊持戒本合求佛果菩提今諂媚邪命求勝他人以徼名利損咸正求菩提之心是不善心或可諂心持戒魅彼前人邪意求財望資身命或嚴肅外相意欲識他或專事威儀以招名利並為非法也二罪分齊可知三福分齊見或經云死得生天上及欲得生天上常當護戒足等天是有漏樂中最勝今悕此果遂乃護持此又勝前也四道分齊等者戒淨有智慧便得第一道除結無罣礙由縛著此解等縛即煩惱著謂我人今求斷或持戒修行尅成道果此心最勝也言至弱者約方所明持也南州人煩惱垢重又厭苦心猛利故能一日一夜修行勝東西洲五十小劫東西相望漸次可知不約北方以彼無佛法八難收故第八言八至也者約持明也以佛在日有情根利能受能持便得果證故勝末代根鈍雖持無得道者故劣正像末三時相望前後優劣可知鞠多緣起以常聞故寄之説者第九言九弱者約制明也若望體重輕邊持性則強遮則弱若望護難易邊遮強性弱故云互持強弱第十言十至弱者約諸聚辨也初篇是行本所防過重持則強下篇之罪所防過輕故弱若約若約難易説後後者強前前者弱可解第二明二犯中二初標名舉數如文次釋分十今初分二初標言約位分者凡聖學無學辨也言無至重者將無學望三果辨也無學煩惱既無但有誤心犯或就所犯中唯是遮戒如睡時有人舉著高床上或女人盜人房宿與未受具人二夜宿已後盜人宿或長衣忘不説淨等是三果斷惑未盡容有故心犯戒所犯亦遮戒以斷欲惑盡故若斯須二果有犯性義如僧祇云斯須二果尼被逼有失念受樂等以斷欲惑未盡故又但有失念終無造他以不造新業故此則煩惱輕也言三至重者將三果望內凡位辨三果聖人得無漏道資雖有故犯定不入三惡道故輕內凡雖霑理水未得無漏故重乃至等者將內凡對外凡位辨也以外凡全未見諦故所犯俱重故俱舍論云愚智所犯輕重不同愚作罪小亦墮惡智為罪大亦脫苦如團鐵小亦沉水為鉢鐵大亦能浮言二至輕者此約壞行辨也作犯對初篇故重止犯對二篇下故輕如不乞法造房等是言亦可者或不論止作但故犯便重誤便作皆輕言三至之者約善惡無記三性辨也如前篇聚中明不善心則亦犯重善無記則輕問前無記便開成持今亦是無記何成於犯答前無記是狂亂睡眠無所覺故開成二持今此無記意非善惡不攝威儀故不可例之言四戒至知者約威儀戒辨也犯前三戒分則重犯後四威儀分別輕於五篇六聚皆前前重後後輕言五至説者約遮性辨犯遮輕性重雖懺違制業道猶存如智論云犯十善戒雖懺三惡道罪不除如比丘煞畜罪報由在調達破僧令於僧中悔過尚墮阿鼻一切不救此破性戒也六至解者約時辨也佛在日二犯輕滅後二犯重以垢重故如前可解第七言將心望境者謂將能犯心對於所犯境辨優劣言如至也夫成於犯必詫前境開涉內心方能成業對優境起心增強如煞人是對劣境起心徵弱如煞非人畜是也言戒至想者初句境相當結夷故重戒境重下境優心劣當境想第三句蘭輕心不當境也或境輕下境劣心優當境想第四句蘭輕境不稱心也言論至戒者且約一煞或以明餘戒例爾故云通一切也次指事釋第一淫中重同報異者同得夷罪是重同望境優劣開心結業輕重不定是報異也畜境輕人境重在家劣出家勝可以比知第二盜者盜分四主僧物業道最重故大集云犯四重者我亦能救盜僧物者我所不救第三煞中引六足者是成論邪見品文自引六足者準部執宗輪有七發智論為身餘六為足一集異門足一萬二千頌舍利子造唐三藏譯二法蘊足論六千頌大目連造唐三藏譯三施設足論一萬八千頌大迦多衍那子造未譯上三並是佛在日造四識身足七千頌提婆設應於佛涅槃後一百年中造五品類足六千頌代蘇蜜多佛滅後三百年初造六界身足六千頌亦是代蘇蜜多造後三本唐三藏譯至三百年末迦多衍尼子造發智論二萬五千頌雖在後明一切有部義廣後代諸師以發智為身餘六為足也彼論説云不信有三寶及父母羅漢等不信有因果四諦等故名邪見以不信罪福惡業果報名斷善根決定當墮阿鼻地獄也四向出家人説輕者如律云若實得道向同意比丘説得吉以知出家人不信無損減義向彼妄説開心結業則輕在家人易信令其易解故得重也第八言八至重者將佛制戒罪名望來報業之罪相對辨輕重也言如至當者謂制重報輕也謀嫁有主無主房三戒由喜作故制與殘名既是遮戒當來受報不重引論云結戒法異者以結戒法就稀而制事雖輕遮數故重此結戒法異於輕遮而結得罪法異今日結惑法即化今日輕遮之因得報故云因果相當言戒至當者明制輕報重也打搏等雖是性戒以稀作故制與輕提以是性罪違理業重故招報亦重引論證反前可會因是性戒既重果時受報亦重故曰因果相當辨後二句中言或至等者漏失二謗違諫三觸等因與果俱重也如百衆學戒等忘誤心偶爾或犯即因果皆輕也慚愧心者如慚己無德愧彼有德心懷敬重便曲躬承仰衣曳地者是也等者等取餘誤心犯也言此至故者指犯俱輕俱重二句也制與報輕重不異亦是因果相當也第九言九至重者前則將心望境明今唯約心以辨故曰單心三時者謂方便根本後起言如至別者引善生經局就煞戒為句以辨餘者例之故云且也四別者束八為四位也言初至心者第一位也方便者新經論云加行成已即後起也初方便舉濁重妬害心欲行煞正煞時起誤暢心煞了不思改悔更生歡喜心也下皆例爾言第至輕者第二位也即八句中第二第三第四句皆二時重一時初句云方便根本重者謂方便起疣害心根本起疣快心故重成己輕者玄曰後心改悔是以輕也宗記不許此解彼破云若後心改悔合反成持今既云輕明知有罪也彼自解云但謂行煞盜了不起濁重之心亦未生改悔也心因既輕吉罪亦稍輕此説有理中云者謂當位三句中也方便輕者謂不起濁重心怨來逼我事不獲已向前煞彼心因既輕所犯亦輕根本成已重者根本起濁重心成已起暢快之心故重後云者是當位第三句最末後也方便成已重者謂方便起濁重心成已起隨喜心故重根本輕者謂正煞時無濁重心雖得夷罪結業且輕也言第至輕者第三即四位中第三位也三句者即八句中第五第六第七之三句也一重二輕者謂每句中一時重二時輕初者當位中三句之首也根本重者謂根本起濁重心故重初後輕者謂方便不起濁重心是初輕成己不起隨喜心是後輕言中云方便重後輕者謂方便起濁重心根本不起疣害心成己不起隨喜心也言成己重初中輕者謂成己起隨喜心故重方便根本並不起濁重心言第至等者第四即第四位一句即八句中第八一句三時俱輕者初中無濁重疣害心然後無隨喜心故輕次舉事證言摩訶羅者梵語也此云愚癡人不知戒相語典形人此人可怒與其快死若用語成重若不用語吉尋又用語得蘭證三時俱輕次善生經可會同上證也三通結指歸言律至人者應先問云八業既異何故更無升降並結夷𠎝鈔文答云律據人想八業皆重結前文也意道雖然起心有輕重不同律文但據明白心中人作人想煞以違制故犯波羅夷問既結罪俱齊何故前言前優後劣抄答云業隨心故牽報不同謂制罪一般心業輕重有異也次引論證可解第十約心就時言十至對者謂約三時中有心無心相對以辨言八至前者謂有八句以四位束之以辨如前單心句法不別言初一句三時有心者謂方便根本後起三時並有心也謂且指初篇四戒説皆結根本夷罪故重言次至吉者謂此三句中前中二句四戒皆重謂根本時有心故後之一句言犯初重者即淫戒犯重謂中間住時雖無心受樂以入出時有受樂心故犯重下三戒蘭吉者即煞盜妄之三戒也謂初起心吉次方便并近方便兩蘭正作根本時有主作無主想盜人作杌木想煞妄語作非妄語想誑夷可狂癡心亂病惱所纏無根本罪三戒謝後始知煞人盜於有主物知是妄等亦未改悔且約知邊結一吉準論兼律一戒合有二吉兩蘭罪四以名同故合言蘭吉若依玄解即據三戒謝後知是煞等起隨喜心結吉也前且準宗記但約知邊結吉未論餘義此吉此吉稍輕必更起隨喜心理更結重吉也幸請思之任情取捨言後至吉者第三位三句皆一時有心二時無心初句四戒皆犯根本故云犯四重第二句淫戒獨犯故云犯初重也言餘三戒或蘭吉者玄曰餘三戒約初有心是其方便或至吉者或有至蘭也且如煞戒初動身思即犯吉也若遠方便犯蘭若近方便犯重蘭若但期身口即止不為只犯吉若至遠方便住犯吉兼蘭若至近方便犯吉兼輕重二蘭三戒隨住不定約處得罪不同故云或蘭若也更有別解下文當説今此依上解為定矣言上二無心者謂方便根本二時無心也淫戒犯重以出時樂約別開怨逼而論前後淫戒皆爾若非此緣至犯位似毛頭便犯不論受樂不受樂也餘三犯吉者盜煞妄三後心犯吉如煞戒迷人謂杌正煞之時亦謂是杌煞竟方委是人起隨喜心犯吉妄語例可解宗記云就中盜戒約物現前與煞妄有殊且初見物境是有主便迷無主正舉離處亦作無主前中二時並無罪犯得物已後乃知是有主約正知是有主之邊犯吉若起隨喜心決屬己意不還他必犯重也若便還即不犯也今抄且據知是有主物心邊全不論諸義玄云起隨喜心即犯吉也物既得已知非己物還他不犯今作不還意故犯吉今恐此解成妨既云起隨喜心作不還意理須結重不可言吉宗約知邊且得吉罪未論別義深有意也請思之言次一至犯者淫戒準前據怨逼説三時無染不犯餘戒亦爾言故律至之者謂引律證成立有心無心句位謂律小妄語戒中約方便根本後起三時立有心無心成其四位八句三時無心不成妄語今抄文亦約三時辨有心無亦成八句四位三時無心例彼不犯故律云本作是念我當妄語方便有心正妄語時自知是妄語根本有心妄語竟自知是妄語後起有心波逸提二云本作是念我當妄語方便有心正妄語時自知是妄語根本有心妄語竟不知是語後起無心亦波逸提三云本不作是念我當妄語方便無心正妄語時自知妄根本有心妄語竟知是妄語後起有心波逸提四云本不作是念我當妄語方便無心妄語時自知是妄語根本有心妄語竟不知是妄語後起無心波逸提已上四句莫非俱是根本有心皆結妄罪更合有四句前三句正妄語時不知是妄語根本無心不犯但犯吉前後有心故後一句三時全無心並不犯今引此文意道彼戒既爾例今八句亦然第三通結指歸言後至心者先難之云前來單心八句四位亦約三時便俱犯重此門八句四位亦分三時何故便有犯亦有不犯耶抄答云後之八句由心有無故犯不犯別不同前八莫不有心意道此之八句雖亦三時就三時中或一時二時等無心故犯不犯有別有心即犯無心不犯若前八句四位雖分三時於三時內輕心重心雖異莫非俱是明白有心故一向階其犯位也更難未審後八句無心相貌如何答文如抄約通別二開淫別緣謂三時不染盜別緣有主無主煞妄可解若通緣顛狂等類無心憶知通一切戒並無犯也已上第六門竟時龍德二年七月中旬於竹林寺心地大德講下寫遇比丘志端記耳吳越國天長寺長講律臨壇崇福普濟戒光大德賜紫志貞寫此一部丁巳歲記焉
