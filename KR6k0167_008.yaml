body:
  text: 吳越國長講律臨壇賜紫清凉大師景霄纂次約法辨事說戒篇中大分為二初牒名二依篇釋初言說戒至十者先辨來意前來師資之行既成理合䇿修道業道業住持之本勿過說戒為先故立此篇次明法則釋名者宣傳聖旨目之為說警禁身口名之曰戒廣由軌度故號正儀軌則規模稱之為法餘如常解云云注文分兩科云云初云布至和合也者布薩此云淨住古外難曰標篇云說戒下注云布薩其意云何答大意為破古也古云布薩與說戒分別謂說戒防未起非布薩除已起罪是次一問執布薩為淨住淨住者懺條義也今云不然布薩盖是梵音說戒是此方之語唐梵語殊義味不異若論布薩義不唯淨住更有多種不妨含於淨住不可偏局也所以注云布薩反顯即是說戒其體元一此云淨住者謂清淨共住便顯有犯者未懺洗不合共住出要律儀者梁帝准律撰集律中要務以為今師行事之儀也是憍薩羅國語者蜀云有二憍薩羅一南二北今此指南憍薩羅也謂出要儀中指上來布薩既是西上之者即彼國語也六卷泥洹者准南云所以標六卷者為此經有二卷成文者有六卷成部者今恐有監故將卷數以簡之長養二義者謂數上布薩是長養義也下自釋云一清淨戒住者釋上來養義謂已生之善不污不失名清淨戒住能資養法身慧命二增長增長功德者釋上來長義謂未生之善由體淨故無作功德續續而生即是長養雜食等者布薩陀婆亦是梵語也正本音優補陀婆謂且中天正梵故故云正本音也下自釋云優言斷者一切諸惡皆止斷令不污體也補陀婆言增長者謂惡既已離事須修善令善法功德生故外難云前言布薩或云布薩薩陀又云優補陀婆何得不定耶可引下注文答云國語不同謂上梵音廣略奢切蓋是五天陀國之語呼召不同也亦呼集有二種一者眾僧共集一處二集諸功德為知者亦有二義一則識知五篇戒相輕重二識知己身有罪無罪為宜者亦有二種一此布薩法半月一說是比丘所宜二無八難緣宜為廣說有難因緣宜令略說為同者亦具二一則十方凡聖共遵曰同二受體是同為共住相者亦有二一或有犯則非共住二戒淨故可與共住為轉者亦二一者轉惡即是迴穢二轉勝以淨法故乃至涅槃為常相者亦二一則三世諸佛不改此法為常二半月說我無容改易也三千威儀等者秦言淨住謂秦朝呼為淨住也義言長養者同前解也和合者僧具六和也次會說戒布薩不殊玄記更科為二初約所受之法會名不殊二律云下約能詮文會名無異云俱至也者俱舍云舊俱舍論也名云呼八戒云布薩護者八戒者八種戒也彼云波羅提木叉護有八種一比丘戒二比丘尼戒三式叉戒四沙彌戒五沙彌尼戒六優婆塞七優婆夷戒八優婆波娑戒即八關戒是上之八種皆詺為布薩護也明了論多者反釋上布薩護也謂適來雖云布薩護未委二義云何故引了論解說也在心名護者解上護義也謂但護者地未起名護亦號為根律儀等在身口名戒者解布薩義也謂流到身口七支制令不至犯位名戒既將戒以解上布薩故知布薩即是戒但東西二土呼召別耳又護與布薩總號為戒即彼文中呼名此八為布薩護者是八種戒也律云等者是四分五百結集文也彼云集比丘事在一處名比丘律乃至集一切布薩法一處名布薩揵度意顯說戒便是布薩如毗尼與律二名不並文如五分說戒單白中但云布薩不言說戒即存梵言也又律云身口意清淨爾乃應布薩又云清淨出家和合布薩心豈可身口意清淨又言懺罪耶若子何相律云布薩曰說戒答布薩本是外道會坐說法之名准律王請諸比丘集會說法佛許之乃日日說戒未免疲勞佛令布薩曰說戒謂八日十四十五日本是外道半月三受布薩日令取前二為俗說法受歸後一為僧說戒故知布薩仍是本名故羯磨疏云外道但得其事未隨法相而行佛隨後制乃窮理本是知布薩即說戒不妨含於懺罪但破吉師定執故云云次依篇釋中初總意者云說戒至矣者說戒儀軌者如來清禁半月恒宣名說戒也僧眾集香水舍羅偈唄告令並是儀軌佛法大綱者謂此說戒是佛法壽命根本故曰大綱也攝持正像等者攝護也持謂任持正謂正法像是像法匡者正也維者持也此明正像之時欲匡正僧務佼維持不斷者又由說戒故也然凡情易滿等者然字多訓是也今云相違意也上明戒法功高即令遵崇仰重今却猒患是相違義故云然也凡下之情一門便是故云易滿義是佛法壽命凡情不作此是故曰見無深重希作欽貴數為賤薄者謂今僧尼若一年中一二度作說戒由似貴重若半月常為便乃惡賤淡薄也比雖行此法者比丘也近代今時雖事不獲已行此說戒之法多生慢怠者無略說為慢有不說曰怠良由曰染屢聞等者良者實也由謂因曲染者染習謂日日染於六塵便隨此染習之心輕昧說戒之法也以此論情情可知者以此論量忻惡猒善之情應是自知行違於戒聞僧熱惱只應如此不欲聞之故云情可知矣云昔至益者齊文宣王者齊謂南齊亦云竟陵王即蕭子良也其王夜夢見天王如來令修布薩之事故立名淨住子二十卷明在家布薩儀普照沙門道安開士尊相普照是人沙門是出家通號道安是人開士是號謂本號道上即修道之上後被黃巾竊此名稱出家者惡之乃棄而不認時前秦主符堅別賜號曰開士即開闕之士也此二大德撰出家人布薩法也並行於世者在家出家二種儀軌雙在世間行用故但意解不同心相各別者在家布薩誦菩薩戒出家人誦聲聞戒名為不同也又菩薩是大乘戒防護於心聲聞是小乘戒約身口之相故云各別已上依宛陵解也諸記中並不釋此事致多妄說直得承用者謂上普安二師出家布薩之儀直爾便得依承行用也若子今鈔何故更著此篇明出家布薩法耶下句集云之據莫憑謂昔人所製述之時經論來此方束足行事無於憑據如下鈔文行事一一引經論香水淨水受等等方為有據今求以經意者標今異也求謂搜經文意者也恭以所聞者參雜也參雜普照道妄布薩之所聞粗重撰次者粗略也重再也以今望者為重撰求次第也備如後列者備者周備如後十科一一行列然生居像末等有是也像謂像法也末法將益也法寶鈔云文製作是唐武德九秊以甲子推之得一千五百七十四秊矣玄記云一千七百餘秊者非也又有人云像是像法未是末法此令不達意致此謬解也澆薄也漓但也情不敦重對遇此法即無益也云故先引至證者結上生下意也可云云善至義者說戒法不壞者玄云猶比丘行成故戒法不壞也捨諸惡不善法者捨謂棄背也諸惡即十不善是也及諸煩惱有愛者折中記云彼論第十六卷明其有愛無愛愛謂結謂也捨諸煩惱有愛既盡漏原即成無愛若準玄記作受字釋謂除煩及與業障不向三有受生又彼科鈔句破也今時講者相承云及諸煩惱為一句將有受二字在下句頭全無道理思之證得白言究竟等者所云白法為對里法得名也然里法亦通善惡未必一向是惡便彰里法之稱今依法寶廣引分別若相而論俗人名為黑業出家人號為白法此則道俗相望也若就俗中五逆十惡名為黑業士農工商號為雜業唯佛法中禪定無漏得名白業俱舍中如此釋又於佛法中約小乘中自分別者一黑法即七方便人二白法從初果至阿羅漢是或於大乘中分黑白者地前爪心為黑法初地至十地為白法已上總約道俗大小以論今伽論中云證白莫非取禪無漏近至四果遠趣涅槃方成究竟梵行也若捨惡不善名黑法即唯取俗中十惡逆根為隨煩惱說為黑法應須棄捨若小乘七方便大乘地前雖於當體分別云是黑法今對俗及惡業邊總白法攝也思之如是細說方為雅當若依華嚴記取精專不化為第一白法犯已能悔第二白法然不無此理但恐違文更有古解不正不敘又云半月半月者輔篇記云一月之中含其黑白半月故重言之問何以尅取黑白兩半月說戒耶答白月十五日已圓滿故表善法備足作持成就黑月是月盡之日表諸惡法滅盡即止持行成就故佛世尊制令半月半月為之即顯上依兩行成就也律文中如此說有意也餘如文云云云就至別者開兩章門也云初至法者如文一時節不同者於四科內第一時節中故云初中又分四節莫非並是說戒時也云前至故者前三出十誦者謂十四五六三日食前後及晝夜三也四分如上列者准說戒法中日則有三謂八日十四十五此三本是外道三受布薩日也萍沙王諸佛同外道布薩故制同處道三日前二為俗說法受歸後一為道眾淨心說戒與此稍別今文云如上列者如何耶謂四分增三中有此三日十四五六與十誦同故指如上也又云布薩日應說等者又云等者亦說戒法中文也佛聽諸比丘說戒不知何日說佛言聽布薩日說此布薩者由是外道聚會之本名也王請已後佛用則別下引五分文是也八及十四說法十五布薩者即是說戒為佛已制不同外道也不得晨起布薩等者僧祇制其太早不制食前彼云聚落有比丘晨起布薩有客來語舊住人長老共作布薩答云我已作了以此白佛佛言應婦塔院具香水等待客比丘來若早起布薩得越毗尼等云云晝夜者此二時諸部當宗無妨故不釋也云四分至不說者增減者向後曰增向前名減十四日來十三日說等者故律遮法中云時有鬪諍比丘來取十四說令聞他來乃十三日說本十五日說聞來十四日說此化釋向前名滅也入俗者惡比丘既已到來入界乃告語云大德行來身體垢穢可洗浴不具人用語若入俗僧即疾疾出界外結小界說也若不得者謂前比丘不用語不肯入浴即別無方便乃白僧後十五日當說又不去更增等者此但釋後為增也強和合說者鏡水大德云謂勸喻彼令同不得作留難雖前人不肯應須強勸令和合故古來解云既云強和合者眾坐彼立即不和合今令有力之人抑令他坐即得和合故云強也此解非甚但云二度不云三度等有古人云若三度不說佛法即滅是以須強和合不許更近於後也今云說戒更由後增至四五理實亦得今不許者恐自恣家執此為例說戒既許由近我今自恣亦得若至八月十六日便入冬分今說戒若不許更增即自恣亦不敢取例處以但云二度至三心強和合說也亦無三度不說法滅等者反行古人所立全非也律云俱睒彌門等者彼云諸比丘鬪爭口如刀釰既不和合六法滅等者反斥古人所立全非也律云俱睒彌諸比丘鬪爭口如刀釰既不和合六秊不說此時由佛在世故妨一國鬪爭等者玄曰此謂救上法滅之言謂上不說戒法滅者不妨應是鬪爭不得道果名法滅耳阿難疑高勝等者律云時高勝比丘與長者為一師長者有寶藏臨已之日即委高勝我有二子待後長大好者將付高勝後時付第二子大者不得便生怨慊至伽藍中在阿難前啼哭言高勝將我大物併與一人阿難聞了即咡高勝經大布薩不同說戒時高勝與羅云有友羅云遣姨母將小兒住阿難前小兒若啼必遣汝將去以阿難不耐故汝即告云大德若與高勝語我即將兒者阿難慈心即云高勝汝滅云何高勝其所說火所囑長子不省我故不與阿難言汝去乃至不犯突吉羅罪我意謂汝犯盜六个布薩不集將來同移法滅不成雜化還如不作法由不滅等云云相慊二十秊不說戒者祗云弗迦羅聚落比丘共集同一布薩時蘭若比丘有大名稱聚落比丘比丘生嫉妬心時蘭若比丘十四日來語聚落比丘言長老共作布薩聚落比丘言小五日當作蘭比丘便去去後聚落比丘即說戒至明日來欲共布薩答言已作了聚落比丘却語蘭若比丘言汝叛布薩我不復與汝共法食從是已後蘭若比丘每至十四十五日便來如是經二十秊不得布薩時有一善神敬重蘭若比丘往波提山中樹提婆陀比丘所具陳上事尊者樹提聞已即列聚落善神還白蘭若比丘樹提今在聚落可往問許已尊者問云汝叛布薩答云我二十秊十四日布薩十四日來十五日布薩十五日來為是叛不樹提言汝順佛法但聚落比丘二十秊所作羯羯不成耳上來所引亦是為破古執也云四分至故者鬪爭來久者律云爾時俱睒彌國眾僧破為二部諸比丘欲移舍衛和合佛言自今已去聽作白然後和白云大德僧聽所由爭事令僧鬪爭彼此不和彼人犯罪為作舉已還為解罪僧塵已滅若傳時到僧忍聽僧今和合白如是白已作和合隨何日爭滅即日和說者謂隨黑白月中是何日爭滅即於此日作白和了便說不須至十五日也鏡水大德云然三宗行事於單白中增減不定如白月三日四日已去或黑月一日二三日已去等作白依南山加黑白字如初三日爭滅便說戒即須言今白月三日或四日等黑月例知若准新舊兩疏不許加黑白字但云三日四日等大德破云且如十六十七已去不著黑月但云一日二日三日云何簡監少道理也今依南崇一一須添黑白二字知之餘如文云二明雜法眾具者玄云前來序中云文據莫憑即顯教文未足又云今求以經意參以所聞即准教為據此中所引一一憑也大德又云此一全是今師持並有人云此門說其雖法眾具了第三門又說一遍莫是剩長不此求達意也謂前云求以經意等正生起此第二門此則廣別經論等敘述一期之事各有準憑至第三正說儀軌門中但一向平立行事不更一一引教名也舉例由如懺篇中先引成文即准教為憑後顯格義但一向平立懺儀行事之式此亦然鈔雖分明見意殊少思之云五至中者如文云十誦至故者彼律云諸白衣為問說戒時幾人諸比丘不知數慚耻佛言聽數上聲猶復忘佛言當令行籌沙彌亦爾云四至他者為受供通沙彌者玄云約曾受十戒沙彌也又是證上五分五沙彌亦得云文也若未受十戒等約未曾受沙彌戒者以說亦得受施下引涅槃經釋上證文義也云五分至處分者並五指者據佛五指指闊二寸即長一尺非謂人五指也一肘者尺八也准此姖非餘四也出家者出三界家擬求泥曰簡異在家人和合者表背別也舍羅者西天單名也四分惡行舍羅即將此章為籌蓋存梵語十誦五分並云籌有是此方言也五分白衣散華佛開之者初比丘不敢受白衣譏言不解受人供養以此白佛因開云比丘不得者律緣中比丘散華於高坐上白衣譏言如王大臣不異佛言比丘不得等云云無苦者即無罪也云詣毗尼時雜碎文句數難持等者准僧祇二十七布薩法中佛語波離汝誦毗尼不答言雜碎文句難持佛言當作籌數之後又問汝作籌數誦比尼不答云雜碎文句雖籌數猶難佛言自今後作二種一者五百二者七百也已上律文注文以通僧尼戒本者今師釋也此段古今取解不同今且依一家正說者謂適來律文既云作二種籌一五百二七百未委因何作此二數是以今師釋云以通僧尼戒本謂佛本意令波離憶持毗尼大藏記其數目恒知科要有欠遺此蓋是閑禎之時亦非半月高坐正說之時也作二種數也者記僧尼二部戒律制重制事條不少五百說尼律制數七百記大僧制數目也作斯二數各置一處若僧有犯制戒竟隨制烻於僧犯籌數之內撿增其數後或憶持誦時烻撿已犯者籌數過及至誦了便知遺忘數目尼亦准之若不作此籌數者懸記是雖都緣末上貝葉文墨之上致有遺失問尼制數多籌亦合多何得却少僧制戒少籌何故多答據理尼籌數合多今但五百者但記與僧不同處若同者在僧律數中攝也故知注文通字含其兩位五百以通尼戒七百以通僧戒本故上且申一解竟或依玄記中解云五百約尼律以七百據僧尼律通說又云若言通者尼五百戒僧二百五十都七百五十今但云七百欠五十者大約通舉未必依戒條數也今人多依此任解情酌量外難曰准律初緣據未上文墨恐波離記憶稍難是以作此二種籌又是尋常誦習非關半月高座念時今佛涅槃後既結集於上貝文終遺欠縱座上遺忘亦同指授即何用明之今南山更引彼文四繁之中莫不全成繁長不答有人通云恐新受戒者屏處誦時要記遍數若四重十三戒文難記即七百籌三篇已下易故但五百此不成解今釋云謂前文已明籌之長短大小然於多少全未論之故引此來定其籌數如今僧中雖有三千五千人集不越七百之籌若尼中亦不出五百必更向上恐有無窮之過今師密意唯在於茲迷旨既多致有妄解之思誰應呪耶者即今唱白維那也故五分云白衣布薩合維那呪願等上坐處分者四分中初緣並是上座自辨後因疲極故令處分年少為之等言僧祇至錯謬者為未受且說五篇名得罪者謂分別言是波羅夷六友吉羅名犯吉也以彼起中固為白衣說五篇名彼遂輕云此是波羅姨比丘等准四分得語一切犯者吉羅者即顯祇文由是未了四分戒之下皆結吉羅但不說說上四篇名也然亦更須分別若對在家白衣即五篇名總說若約出家人中下三眾但不得說上四篇名也若諸緣起等者受戒日等是也此諸羯磨並在說戒前作准五分比丘先說戒後作羯磨六群說戒了便去不僧和合因此制前也云云應直說戒不得歌聲者大德云此是相從引文非謂取易行事霅水仲平座主云五分是能癈四分是所癈取後為定若爾即同第四師背宗永異豈非失即若有緣難參取不妨必是閑預之時不可全依部也知布薩供養者即戒說也以無佛時等者釋所以也云云云三至十種者正明說儀者即一席行事之儀也准律不具者玄云四分中無聞鐘偈及清淨妙偈等今通取祇律及阿含華嚴經等如下自述云云刪補者刪當部說戒法不急之文補即引諸經律論共成行事也十種者標舉數也云一至量法者理須準承等者須唯西土說戒堂彼以草遍布此則背須席地也中國有用繩床類者玄云類謂上埵及小床子等多以草布地者多分將草布地也此間古為床者上據西土以言今就此方古來多分是席地也雖則為床大夫以上有官位即得登之已下總皆席地東晉之後等者謂晉時尚書省定考堂中有八行胡郎反床即五品已上夫及州牧得坐又云堂有八床名名八座即六尚書二僕射至東晉已後直至唐代已來一例北坐於座無昇降尊卑也今寺所設率多者設者安設率由例也一例多是床座如今講食堂中並是亦得雙用者謂床前席地即行事者往來僧在床坐是雙用也然於本行事多不便者玄云然者應也應於西國本事以草布地此方行事之時多有不穩也此方講食二堂例是長連床座必依西國有草每至半月皆須出移此是不便又西土草皆是淨香茆絕虫等類此今非淨草蒭多患虫却損物命復是不便又淨敷坐具於上眾禮不可若觸敷者行事著履又違佛制具上諸緣故不便也隨處量法者隨其處所量宜作之若堂內無床可以准承若為長床不必移改但雙用也云二至辨者如文云三至中者眾網中北眾主點撿健病乃至誘喻等云云云四至事北沙彌有緣依法與欲者有多數初依玄記云沙彌說欲詞與大僧少異應云諸大德餘詞並同也今難云縱有欲詞是何時說且如戒師遣未受具人出了方問不來北與欲沙彌既隨次出後不可再入堂內傳詞殊無理也二依法寶云但約沙彌囑大僧與受等謂西土每至布薩時有俗人施物故今云欲者非關欲詞也准此但釋得受籌之意未明得欲之道理今准東陽悲闍梨解云彌理合僧赴堂聽五字僧序及明人戒經等但為有緣不遂憐欲故囑大僧與受一籌雖則初緣為受供行籌今囑受之以表悕須義也何妨分得欲名故下文次沙彌籌時令唱白人僧中遍告恐有時沙彌欲來等鈔甚分曉也猶有聞疑之相等者見有衣盔或門戶開有人語聲便須喚召故律云見相便求之等云云應說聞鐘偈者此偈理合打三通時說也有云初聞鐘時即太早復有云𣫍鐘聲時即太遲也下引阿含經明詞句如文就中云露地擊揵槌者大德云西土鐘臺多在露處准祗桓有樓屋覆之本今據多分為言也有云迦葉結集時將銅揵搥往須彌頂上擊之是露地今准此意故此解非也雲集此者有解云火界內為此或云堂內為此並是偏局也今云此者通而言之不局堂中及堂外也知之次入堂說偈等者法寶云或在僧前或佛後說偈後方往本坐但今時便於本位床前說亦得也極教所遺等者佛令滅度阿難問佛如來在日以佛為師乃至我不滅度半月一來等云云攝僧根本者說戒是本有說戒法方有餘羯磨法典餘是枝條望前為根本也諸餘法事即受懺等是云五至觀者槃奇竟檠反盛花貯香水淨水三器五器等餘文可委云六至事者正明一席行事法也云應至叟者今時行事多不依法故略明之其鐘聲纔斷維那秉白者即依本坐或佛僧前䠒跪亦得即唱云時眾已集眾人聞此一時本床前各各䠒跪已又唱云各乞歡喜上座即說偈偈中初句云大眾憶念我某甲不須言大德一心念多有此類知之如是三人說了即唱云大眾一時各乞歡喜或云一時各乞喜歡亦得餘如常云云唱此白時維那合在位床前䠒跪也年少三五人各修威儀者或依江西行事三五人相助者依次第一時來佛前席上禮三拜了然後行水巾等或兩淅即不承指但合維那自從本位具儀佛前禮三拜竟却來淨香水處洗掌了往佛前取籌其相助人只從本位上經來取瓶行水等已上兩般行事各是一途隨時量用不失大理羅漢聖僧集等者玄云謂維那唱時眾僧亦須隨維那口法聲說此偈詞也若不爾者如何云各說偈耶所云羅漢者舉極果之人集也謂此說戒凡聖同遵豈唯凡夫須集問何故今時但是凡人集不見聖人來答聖眾來時隱顯難測何以得知大德引續高僧傳隋朝洛陽融覺寺曇無㝡法師往邯鄲崇尊寺講坐列子僧每至半月法師親登座誦戒至日數籌疑多遂將數之別六十人及問四隣遠處背見有異僧遠遠而來或有問其因由答云我往邯鄲看曇而最法師說戒等故知不謬也淨水偈中八功德水者准華嚴經說阿耨達池有八功德水言八者一輕二耎三清四冷五香六美七不臭八飲之無患也言功德者功勤是因德者德能是果因合說又解此水但有八功之能非是功德後人加功字耳餘如常云云行巾法中左手執巾上右手持下者其行巾人將淨巾中去聲攝竟以手把兩頭各出五六寸已上急捉莫令寬左手執巾上右手持下行之其眾僧將巾拭手須知觸淨但得拭手掌今人并手背一時拭全不分染淨也河北行巾法由縒為繩了行之等云云香水偈中五分充者婆沙云謂死漏五薀即戒定慧是充足也般若圓照等者謂摩訶般若二智圓明解脫法身三德圓滿廓周法界皆是一如也愚叟者齊魯之間以老者為叟以年老無智號愚叟也云其至薩者槌柄亦須香水淨者以恐手執時觸故淨水不用淨槌柄也品中者指下卷諸雜篇也眾中誰小小者收護三說者三遍並須廣說今時相承將三廣說作二廣一略至第三遍但云小者收護法寶云此全非也并供養收籌者古來今時兩京行事如此也鈔意云上來既云小者收護言包已盡不須更唱云并供養收籌之語是以注云唯上文中已具等外有清淨大沙門入三說者亦三遍廣說今時至第三遍但云大沙門入者非也有解大沙門賓頭盧也古人所解專召聖人故准律已下等者今師釋也但恐有別眾不來使互相撿挍非局賓頭聖人也故曰不局賢聖有云前加一白等者謂古來行事增加一白云未受具戒者出又云及不清淨者於以不淨人不合聞戒與未受具人同出也以戒本自唱令出者今師意也以四分與他部不同說戒師自唱云未受具者出若五祗十律皆維那唱出不須道及不清淨等者今師云若簡穢者當宗他宗俱不須道處以爾者戒師說時序中自述云有犯者應懺悔又有三問是等清淨不等若至此時由開心念發露即得聞戒何須別唱出也又白云此眾小者已收護外有清淨大沙門已入無為字不合加此是結文三說者從願上中下座便須三遍廣說今亦二廣一略者非也便至上座前䠒跪者至三人也其收籌者亦唯此有云一床若有十人二十人總須一一䠒跪等恐非也復有處行籌兼著憍陳如上座手中乃至香湯淨水亦洗泥上座手中此是無知不可言恠也受籌偈中金剛無畏解脫等者此籌堅固喻若金剛也佛有四無畏不生怯懼故云無畏此依發正記數若搜玄作礙字解意云金剛解碎壞一切諸物更無障礙大德云然礙字與畏字相濫抄寫錯悞致令妄解今依前說為正也如今果者謂布薩是淨住儀即當解脫得預僧籌是難逢遇而今得故言今果也以此難遇之籌宜須敬重故云頂戴等云云亦同威儀者謂收籌䠒跪等與行籌人威儀不異故云同也還偈中堅固喜捨者見戒清淨其心喜歡心常遠離諸破戒垢故云捨也云云又白次行沙彌籌北行沙彌籌北時無大德僧聽大為俗問行施籌數之續前白故不合也今多有寶亦愚叟三說北三廣說也今時至第三遍不著次行二字亦非也各清淨和合布薩者此依鈔宗直誦不可增加若相疏云各於佛法中清淨出彼云為簡濫故外道亦名出家亦有布薩今加佛法中即知非外道也今破云下句既知上順佛教亦自分明何須添足良不可也上順佛教者佛制半月半月布薩也中報四恩者經云一國王二父母三師僧四施主清淨妙偈等者准祇二十七調達破僧向伽耶城別布薩自恣羯磨我等已作布薩竟阿難云知言奇哉已破僧了以此白佛佛告阿難言非法人已布薩如法人應說戒說戒時念此偈等云云云若沙彌至別法者指沙彌別行篇也云七至昇座者具修威儀合掌白者但躬身次口白不合作禮准五百問論對佛禮人犯提等復有解云論中犯提約常途以說今請念戒替補如來便同新佛同故不許今東陽闍梨舉例由如新王入舊王廟之中不合受拜以所敬別故引彼證此理顯也今或但䠒跪不禮道理由通然直依文合掌而請方為雅當大德慈悲為僧說戒者或云上座慈悲等並得但依文中即成不得將朝來白眾之詞今黑月十四日眾僧和合足語添安於此即非法事也今多有之蓋未究其意此說戒事任當某甲者諸家云任者合也依也從也並皆不正也大德云蒿本中是位字意云位當某甲後人抄錯云為任字全無理也亦不須云坐君僧首自代其功也又不得云戒文生澁違聖旨也依文即得不在增減思之令次座說者若依五分但令上座若不能者直至能說人處今令次座是祇文也自文中僧差律師某甲誦律者舉能捨也若云戒師某甲誦戒舉所捨也今時改為說戒者大德云說字九避國諱戒字即舉所詮向下戒師說偈一切准此迴改今行事時云大眾此輕脫也或云差比丘相全是不達意也高座者今師簡卑座也大凡所坐者總得名座今說戒即登於高坐新章但云昇座無高字相疏亦然似有濫也如前已說又初讀戒師及梵㕨人時先請戒師至彼坐前合掌躬身云僧差說戒然後却來讀作梵人今時先請梵師後請戒師又請時總不陳詞返生調棄等非法也誡之然後文白之如上述也云八至法者標也云若至也者梵唄作之相法寶云梵者從處彰名以五天同是梵地故謂生彼之人並從梵天來故聲相加法凡所讚詠呼為梵貝也此國語者勑上唄一匿二字是西土國梵語也番就此方云止斷也唄番為止匿番為斷斷諸惡慮又云止息等者凡欲聽戒佛令攝耳一心緣於唄一匿之聲外緣自然止息故經云梵音深妙令人樂聞等大德云此土梵元因永平十四年騰蘭二尊者與五嶽道士捔試得勝遂乃湧身空中作大神變乃以梵音說偈云孤非師子類等云云亦號嵩山梵今時作者少得其本玄記中約魚山梵以明者錯也魚山梵國此土魏時陳思王曹植字子遠土步成章夜因在魚山宿聞空中神仙作梵音聲遂乃記得解節法式後傳於諸德諸德乃准經律立法即今云何波離梵偈等是也云彼至本位者香湯及香華亦同水法者謂僧前左右洒留中間行路名空處也緣有中間是別留處使及初洒左右兩邊行香偈中不言慧香戒定自攝也不言解脫知見即為光明雲臺也又此五分法身能離諸縛垢穢故稱香也餘文易知不更繁述云九問答法者標也云彼至耳者當准上法誦之者准戒本上誦文云和合僧集會未受大戒者出戒疏云先和合者將欲廣說情事相違儀須先和方應後集故云和合僧集會廣說和白非僧不行前雖送和未成僧法必須戒見聞利三名表圓成之相故云僧集僧以先行籌表和集竟今但云和合僧集會專意為簡沙彌如今念戒以僧集居初和合在後違戒疏也儀式如別法者五幾德十數之儀如沙彌篇顯答言無說欲者鈔存略也問時須云不來諸比丘說欲及清淨答時亦准此双答但云說欲者失法之𠎝也以無別德可明玄云教誡尼總具十德今此人縱具上之九德然未滿二十夏亦不可也此第十德於十中別是一德下座未滿即無此別德可明是故不過下座也何啻音施也者謂總能教誡良由惜自業等此亦是漿善之詞也注文云示相去呼帖合者五祇二律是兩文五分標其無人僧祇出其略教二文相當合聚一處帖合共成行事餘並有明據等者上但明尼來僧中請教誡僧領意為請自餘尼歸本寺傳僧略教乃至彼尼鳴鐘集僧等事傳上座語如此餘文當律雖無准僧祇文故云並為明據此全未論至尼別法方顯故讀此一部上下練也餘如文云說至云云者注文云以言通用不了彼此相戒疏云或有答云布薩說戒者布薩西音說戒東語二名體一不可重言羯磨名通說戒事別故陳此二則表眾儀盡謂双標布薩說戒之言用之則不了布薩此彼西梵之音說戒是此東土之語故云了不了彼此維那復本座等者此約維那敷座具在槌邊答法以說今時例在位即不然也餘文可知云十至禮敬者若至略敬口者謂誦七佛戒經竟當鳴鐘等者堂中先打磬樓上即鳴鐘沙彌聞鐘聲便集堂中聽明人戒經也問今或無沙彌莫不須打磬鳴鐘不答有解云不用者今恐不然雖無沙彌赴堂規則元須揩定不得不用或有云說戒夜即須打鐘便當初夜若早竟即不用此總非說不可依之作神仙五通等者其偈詞中是於字有改云造說諸呪術者錯也作此二番梵唄本意何可同鈔答云為令說者縱容具儀辭遜等云云顯商來神仙梵詞同是律席文也眾僧各說自慶偈者此是俱全偈也舊論文云快新云樂鏡水大德云此偈詞本合在戒師說辭了各於床上說今時唱三歸竟在地前念者全無揩式故下注云便作禮散請觀文勢思之云就中雜相者謂雜相料簡前戒之中未了事等云云云若至等者界外來者謂持來赴說戒也經至說處者便往戒堂中不得更向私院等縱使堂頭正康秉法比丘入界亦不犯別眾以一心為聞戒故也來誦序清淨等戒師未誦廣教序亦未作第一三問但依夏便坐更不告淨若清淨後來者謂念廣教序並作三問竟方從外來也戒師見來即須止住者不得更誦且暫經少時待彼告淨不肯住呵令住相謂戒師不會即上座呵止令戒師且住待坐竟䠒跪告淨等云云若外界比丘乃至如法治者准說戒法中主客相望有同日異日若異日主客互相望即有強弱若同日主客相望即無強弱今且明異日者分二位初以客望主二以主望客初中客十四日外戒曾說戒了來別此界此界主人十五日方說即有三句一客來少從主十五日更說二客來等亦從主十五日更說三客來多主應求客說若順至十五日更說益善客不肯重說主自出外說第二位以主望客者主十四日已說客十五日方列客說未曾布薩亦有三句一客來少求主十五日再說主不肯客自出外說二客來等亦求主十五日更說主不肯客亦出外自說三客來多主應從客十五日更說已上約十四日十五日分二位其十五十六日亦爾可以例之二約同日者同是十四日或十五十六也亦分二位初主已說二容己說今且明主已說三句一容來少告清淨二客等主更說三客多主更說第二位客已說三句一主少告清淨二主等客重說三主多客重說律文有此同異二位今鈔闕於異日多少等句但出同日句法是以鈔云若多等縱說等竟皆令重說不者如法治此即主客相望更無強弱但等多總須再說若不說不論主客並犯告鈔正約此說也毗尼母等者約淨穢料簡也如文云若主意者各列寺尼號名者即云某寺某寺等僧差比丘尼比比丘等後便總結請意者即云半月半月頂禮等是云若至子者注云如阿含中者玄是中含也阿難答迦葉言一偈之中便日三十七品何者是耶即諸惡莫作是戒學諸善奉行是定學自淨其意是慧字是諸佛教總結屬人即九十六種外道無此法也並是佛之累囑者於事階降重重名為累囑即如上文初令誦經又無誦者令說一偈又不能者但云莫放逸如是階降重重即累囑也住寺輕是教網者按僧傳云有法師僧雲時大小儀在于上坐夏初說戒乃白眾曰戒本防非人非非念得何勞煩眾今一夏內暫停說戒可論義等至七月十五日將欲自恣忽失雲師四乃求之於數里外古塚間尋見遍體血流人問其故彼云有一丈夫執三尺大刀勵也嗔雲改變布薩以刀膾身苦痛難忍輕說戒教網現世得報也故違不說者不半月寅傳也染污淨識者初受時無犯名淨隨中有犯是染污也大法者戒法也此是無上菩薩之本名為大也餘如文云若至露者可知云四明略說雜法者舉標也云四分至戒者王難者軍馬寺行胡郎反也賊難者暴賊突入聞戒比丘止住便加損害水難者能飄蕩也火者性能焚爇也病人者戒師忽患也非人者惡鬼神也䖝者虵蝎等也人難鈔文自辨云云餘緣者除八難外有總號餘緣也眾多病者聽戒人多分病久坐不得布薩多夜已久者注文自解問此既許布薩是懺罪儀前文何故破之答不妨含於懺罪儀今師不定執古人一向執前文破者只為破他定執也思之云十至莫絕者引諸部文也共伴行者宛陵云彼約隨商人行為伴故廣說者謂商人住即念廣戒略說約暫呂即略戒此是緣也此二並據結界秉單白小說也三語說者謂商客亦不暫住比丘行不法不秉單白但三五說也雖有多人但互陳詞作別法故彼約不結法界以論也知之五分等者彼律云蘭若處說戒有賊來比丘見來便上賊問何故如是嘿然答云我所說者不得白衣聞賊嗔比丘故乃奪衣盔以此白佛佛言自今已去賊來應連聲誦經等云云云若至說者小事囑授即是傳欲小小之事不是正緣也顯露處者簡隱處以客來不見云第至類者一略取八篇題首者標其從急向緩十五日略也二略却隨篇種類者標其從緩向急七略一直也鏡水大德云若准新章舊疏局前略取即十五略為餘緣不通八難後略却即土略一直為八難不通餘緣今南山不然如此二種俱通緣難故羯磨含注疏云八難餘緣五分僧祇並皆略說但隨緣難有移兼緩廣略說之已上疏文若言前略約緣後略約難即恐逗機不定思之云說至法者量事後急等即量度八難餘緣之事緩急也觀情進不者觀察人情緩為進兼為不說前方便如廣說法者秉白行事一切如常即不可略也若未秉白未戒說戒但入增減中不名為略云至序至也者序至竟者謂誦廣教序竟問清淨已者第一度序後三問也應言諸大德乃至僧常聞者此段正明八難餘緣稍閑後者略取中間諸篇題首兩類須廣即是五十略戒也法寶云今唯鈔文但舉初五略中第一略中頭至第三五中第五略來中間十三略即越却故著乃至字也寶又云此十五略據容有說須約一十五遍誦戒非謂一遍念時有斯十五也律文既約三五以論今且敘其方軌云云初五略者謂說戒日預知有緣難眾僧共評章云今夜念戒只可到廣教序後登座念時正到序竟有人報難緣欲至便略取四種乃至眾學八篇題首此是初五中第一略也二略者本意今夜說戒擬至序戒師誦徹難由遠更誦四重四重竟難欲至便略十三已下七篇題首等云云三略者本意今夜念戒只到序序竟難緣由奢更念四重四重竟難由未更念十三十三竟難欲至便略取二不定已下六篇題首云云四略本意今夜念戒只到序序竟難由未更念四重十三念了難亦未更念二不定二不定徹難近便略取三十已下五篇題首云云五略本意念序序竟難未至更念四重十三二不定難亦未至更念三十三十竟難近便略取九十已下四篇題首等今時略戒是此略也第二五略者至說戒夜眾僧共評量恐有難緣不得廣說但可至於四重後至登座誦至四重難來近寺便略取十三已下七篇題首等此謂為一略也二略者本意今夜念戒只到四重四重竟難未至更念十三十三竟難近寺便略取二不定已下六篇題首云云三略者本意念欲至四重四重竟難未至更念十三十三竟難亦未更誦二不定二不定徹難近寺便略取三十已下五篇題首云云四略者本意欲念至四重四重竟難未至更念十三二不定難由未更念三十至三十徹難近寺便略取九十已下四篇題首今時略戒是此一略也五略者本意欲念至四重四重竟難未至更念十三二不定三十由未至念九十九十竟徹難近寺便略取四提舍尼已下三篇題首也第三五略者至說戒夜眾僧商量恐難緣至不得廣取說只可誦至十三後戒師登座念至十三其難將至便略取二不定已下五篇題首此為一略二略者本意今夜欲念至十三十三竟難由未至卑念二不定二不定徹難近寺便略取三十已下四篇題首三略者本欲念戒至十三十三竟難未至更念二不定難亦未更念三十竟難近便略取九十已下三篇題首今時略戒是此一略也四略者意欲念至十三十三竟難未至更念二不定及三十由未至更念九十九十徹難近寺便略取四提舍下二篇題首五略者本意欲念至三十三十竟難未至更念二不定及三十九十由未至更念四提舍尼徹將難至便略取眾學一篇題首已上名為十五略皆名略取並是從急向緩也諸記中並不作此次第略法人皆迷意者今雖廣云不妨稍繁方顯得從急至緩道理思之外難此三五略何不至眾學耶法寶云戒有五篇若誦眾學即不名略也一一各題通結者玄記中申兩釋一云舉起諸篇名目是各題末後都著一个僧常聞是通結二解云隨諸篇首各各著僧常聞今言通者但望僧常聞語是通也法寶云尅取後解初釋略戒定非不成略戒今此通字即約七處共成用名通何勞妄說今時更有人都標一諸大德下便列諸篇首亦成非法今應各各標諸大德各各著僧常聞方為允當此行事急處故繁述之七滅諍下廣說必不許略也外難七滅諍何故必廣說而不許略耶答古今不同大德云首疏及相部並云略之亦得但不及相承耳今南山及東塔並不許略然二家雖同判不得略及至解儀即又不同東塔云謂七毗尼能殄四諍僧免七吉尼免七提是以不許大德難云若爾眾學一百條戒百个吉難何不廣誦故無理也今師云但為律文只有十五略始從四棄終至眾學略唯至於眾學不收七諍若許略者便成十六略即違他律文自然非法故制廣誦也諸記中並不見敘述此最急儀學人知之四分不了者律文具有三五略說隨緣遠近文非明了適來所說依母論文如此分明也云若至去者此段文明一略一直從緩向急號為略却前來略取從前向後今云略却從後向前也謂本擬廣誦今不意之事忽生先既不知纔有水火盜賊急難緣來不可久停法席隨念到何篇所所隨其四重及三毒種類之戒條便直散去不能更取得篇目之徒也若難緣九十至者標急不意之事也至說序已云餘者僧常聞者此七略中舉第七略也若不得說序已下但誡勅詞句一時散也此舉一直也上且依一家釋竟并據諸記中云若難緣九十為土句也至說處已去餘者共意云於五篇中念至何處隨此處所難別便略却向下也鈔文多作處字作情思之上略消文今更明行相謂今是半月並不知有緣難蓋依常規欲念廣戒戒師登座念至提舍尼忽有難排一即云餘者僧常聞此為一略二誦至九十難來三誦至此難至四誦至二不定難起五誦到十三難到六誦至四重有難七誦廣序了難起鈔引此一句一直未說序但誡勅了便去也已上七略既云從緩至急度一標心皆擬廣誦是緣但為中間有難不得名如廣名急須約前後七通非謂一度便有此七略等大德云通許前來總有二十二略若兼一直二十三遍約大僧說也尼眾無二不定於前略取中只有二五略一是序二是八重三是十七僧殘四是三十捨墮五是單提二五略者一是序及八重二是殘三是三十四是單提五是八提舍尼若論略却但有六略一直易知今時多有人云尼眾亦有十五略取者未曾看律文總是臆說也云上至之者一事有違者若難違緣餘但言餘者僧常聞則非急卒即違毗尼母論文也並結正罪不應吉也並可准前者可准前來母論法式不得之已說也並通治罪者既有略緣與他略說今全不說舉眾皆有違教之罪故云並通云云云二至法者以上即二三人也別法即簡僧也云律至來者如文云若至三說者羯磨疏云僧說戒者一人秉說餘皆嘿坐至下對首皆各表淨何以不同答僧法強成辨少別人少弱但表內淨上是疏文云若至法者文相易也云若至斷者或云發露者律云有一比丘於罪有疑及識不得聞戒佛言應發露得聞戒或云待人者律云應對一清淨比丘聽發露也律無明斷者意道今忽有獨住之人為但心念發露了念戒為復要待人對首發露無此分明決斷之文故云律無明斷也云今本家謂今師准五百內論通四分律共而解釋律云發露對清淨比丘論云先向四方僧懺悔准此二文故云通解必須先心念發露也疏云若無容者作念若得清淨比丘罪如法除作念已當心念口言三說布薩此即向四方僧發露次引五百問論即表內淨偈誦戒也已上說戒戒篇竟次釋約界對人辨事安居篇大分二初牒名釋初云安至附者先辨來意玄云上既宣傳戒本識犯從持理宜托處精修䇿進三業偏制憂者息世譏嫉前所未論故此方辨釋名者羯磨疏云形心靜攝曰安要期此住曰居警覺三業為䇿力進四勤為修篇如常解云受曰法附來意釋名如後例也依篇釋中總意中云夫至業者靜處思微者靜者寂靜也處者充呂反謂息諸緣名者為靜處思謂惟微謂微妙外緣既靜即內心思惟微妙真理故也道之正軌者軌則也寂靜思惟是修道之正則理須假日等者道理非一朝一夕之功故要假藉積日追遂功夫也䇿進心行者勤勤不墮名曰䇿修定習慧謂之進心戒學逾堅自為䇿行隨緣托處志准上益者隨緣即假資養之緣抂處即夜閑靜之處志者意也准者專也尚益即增上聖果是利益更無過者名為上益不許馳散等者隨順而逝謂之身馳外事于情全心散亂即不能修道妨於上業也云故律至坐者通制三時者安居犍度文中制春夏冬三時無事不許遊行犯吉意存據道者意令行人據於道業故外難曰律既三時總令安居何故文中但云夏安居不見說春冬耶可引鈔答云夫偏約夏月情在三過也云云一無事等者謂說出家僧尼是三界貴客擬取七大若不修出家之業促事遊行故曰妨修出業二損傷等者謂初受時於一切眾生上立誓要期離於煞害今若損傷物命違本慈心不少故曰寔深三所為既非等者准律緣中六群夏月遊行踏煞生命請居士等咸六譏何沙門釋子不知慚愧踏生草木斷他命根諸外道法尚乃三月安居至於虫鳥皆有巢窟以吒白佛佛制安居又夏外道俗人謂草木有命根見比丘踐傷皆云與煞生不別等然諸義不無者然是也是春冬安居不無直制與罪指歸損命者今於三時中偏制夏者謂約亦夏中所歸損命也故夏中方尺地者正明夏內多虫制令偏護正法念經等者玄云准西域高人坐夏之法食唯一乞坐則方周故知唯除大小便也云故至云者必反聖言者不順律文結夏是反聖言也罪在不請者違制之罪可依篇懺之煞害性罪不可懺除故云罪在不請故經云唯有宿殃不請耳結業自纏者結煞害之業以自業纏永流苦海者永長也踐傷物命制與提罪復有業道夏不安居又他吉罪生泥梨何時見出故云永海苦海極誡等者今師結勸也言初至非者初中分五者外難曰前後諸篇開章皆云就中何故此篇獨言初中分五法寶云良有深旨謂諸篇中但有一大段縱有法附者亦二大段今此篇有三大段一安居二受日三雜料簡所以剩有料簡門者謂安居通自然作法受日即不定若僧法受日即唯局作法若對首受日通於二界是以更立第三門簡上二門安居受日通局之意今於此科之中下二未至且向安居正篇之中故曰初中自有五段之文故云分五也如文具列又須和諸篇中有法附處皆於篇題下分出此篇先明總意了將受日法附於篇內科之故知列諸記中並未委此意搜玄淮南兼錯科第三大段勒為子科如下對文自破也云初至促者如文云初中至安居者樹上者准律緣中比丘樹上安居以大小便澆瀆樹神欲斷命白佛佛言不得樹上安居乃至不得遶樹左右大小便若乾枯樹聽在上無罪時諸比丘欲樹下安居白佛佛聽起不礙頭枝葉足蔭一坐即得乃至欲向小屋小窟中安居皆聽但不得頭頭勝等即得也足障水雨者玄云此謂足得免其水兩處非謂手足之定也若依放牛等者四分安居諸比丘依牧牛人斫材人押油人船上安居佛皆許之中間移徙隨處去應去又諸比丘依聚落安居若聚落分作二分隨處供給所須具足處住安居移徙隨處去處去律文如此律文不了者謂望五分有二義故不了一者四分但云得依放牛人等安居且不說先任意二者於移徙中但云隨處去處去不說得夏不隨得夏及信樂豐足等下列五分文決之方曉了注云不言先夏者彼亦是安居法文時有估客營住諸比丘欲依安居白佛佛言聽依估客安居居內忽有緣須玄諸比丘不知云何白佛佛言聽隨去又諸估客分作二部比丘不知云何佛言一部信樂所須豐足隨去若依放牛人作竹桿筏人等亦如是鈔既注云不言失夏理亦應得也若在無護處等者彼云時有比丘在無護處安居為賊劫奪下更引無投處為露地安居被脫等是也云明至大同此論者有覆者謂有屋宇若無含宇即不可住夏初十六成前後安居日者謂前夏初是四月十六後夏初是五月十六日也若東方等者彼律文即不如此促是古人製疏有茲異說要須令十五日夜在安居處宿明日加法結之得成若夜不及界至十六日明相已後方始來者結不成也今師云十五日由是春分未屬夏分春夏各別何須預來全成妄述今鈔云東方赤者牒起了論也謂十五日夜分盡即東方赤者是十六日限引了疏自釋也謂真諦造疏解於了論疏去東方赤明知是十六日得成安居也即破十誦疏家義故諸記中並未委此意搜玄淮南兼錯科第三大段勒為子科如下對文自破也四若在前住起安居心者疏文自解云云五在處無五過等者玄云羯磨中具釋此五文勢相似不能具錄五無施主者身非匏依豈得不食故須食藥用濟飢虗足夕若無則不可住等云十誦至云者准彼律云憍薩羅國有一比丘深山林中偈住時有非人女來喚比丘行不淨行比丘不與作如是女言汝若不順我則為汝作衰惱比丘言隨汝所作後時比丘睡時鬼女便和納衣抱比丘著王內宮夫人邊王忽覺問汝是何人答云比丘王又問何得至此比丘具述云云王言何用向此深山為他嬈惱我敬佛法不以為事汝速出者以此此白佛佛因制約如鈔述之毗尼母大明安居方便法用者論云安居上座當問大界標相處又問攝衣食界布薩處差說戒人呪願人差營事人差僧諍人又巡房看敷具誰如法受用誰不如法應不教利喜等文廣不具敘錄乃安居上座等者上座應安慰云大眾覺察無常日月遄邁無常潛至可勤修道生死可畏無宜放逸如此上座號僧父母亦號僧師等云云者蓋是未盡之詞也言二結至羅者問安居修道何時不須何故父中偏約於夏可引鈔答云由夏中已下是也春冬過少者壞行招譏之過稍劣無事不依同結告者若三時無事遊行大僧通得吉尼不後安居得提云問至成者何為但結三月者為者故也意云夏有四月何故律文聽三月安居耶一生死待形等者形是身形待者業之形也開後一月或供身衣服者謂迦提月是也則四月十六日得成者釋上文若四月總結為夏者唯局四月十六日即成安居若有差脫不得者或有緣差忽不遂加法結即明日已去並不成故教法太急等者寶云若四月總結者安居自恣俱楷定故今於四月中但結三月留後一月不結忽於前三月內不及前安居即有中後可望相續結成故云曲順物情乃至續結今成等云云云上至時者上總三時分別者結前文也上文約一秊有春夏冬三時皆制安居無緣遊行並得吉也就中多過偏制夏中適來已說今故結前今但就夏亦有三時者標今異昔也今師只於夏安居內自分前中後三種差別即生下之意也云初至後法中者四月十六是前安居者唯局一日十七已去至五月十五中間二十九日名中安居五月十六口亦局此一日名後安居此是今師立三也故律云等增三文也證上三種不謬前安居住前三月等者此是安居揵度文也據此文中但有二種故古師或立二或立三者據增三文也又者古師云決定有二不許有三所以爾者古人引犍度文云時舍利弗目連欲共世尊安居四月十五日從所住處往十七日至彼不知云何佛言聽結後安居若云十七日已去名中安者即違他律文也今難云若爾何故增三文中有前中後三種耶若言但有二者莫違他增三文不古師通云彼是三種調心之法謂佛令比丘於安居中觀歌如哭觀儛如狂歡戲笑如小兒非謂是三種安居法也今又難云但二者增二文中何不列出彼却難云若立三有何故捷中十七日佛令作後安居又但云前安居住前三月後安居住後三月並不見說中安居住中三月耶可引鈔答通云雖不云中三月然文中具明前後日數等是今師答通成立三種道理也意云雖律中不言中三月既來前後自攝中間也於理自明者於中安之道理即自分明縱十七日到一住處佛言令作後也結文各別者結三種安居文各差別如後法中者下文舉量制上下定中間不顯而知而知已上並依法寶消文不同諸記雜亂云云云因至三十日受歲者因汎明前後者汎者廣也不取別解謂因辨三種安居即廣辨三種前後文勢相從不明可不述也一賞罸中四月十六日是前者得五利名賞也十七日已去即十八九等是後並不得利故名罸也二得中五月十五日前名前者謂四月十六日直至五月十五日一月日總名前也有緣不結無犯者有難因緣非謂怠隨名如法也未得加法結成未犯罪若無緣文中結吉十六日者即五月十六局此一日名後也緣與無緣一罪者有緣無緣並結吉罪謂只有此一日急故准除難事者即開無犯准有墮別者古德解云尼不前安居犯吉有後可望故不後安居犯墮無後可望也玄同此解今難云僧不後安居亦無後可望何故但犯今恐是根報強弱故罪有重輕耳思之三難事中從夏初有難不得結者四月十六是夏初日從此日中間累累有難事不得對人加法也不出本界者雖有難未遂加法而且不曾出外宿等至後夏來名前坐者五月十六日是後夏至此日難靜擬對人加法雖是五月十六日但作前安居說偈故云並名前坐是名三十日安居者從四月十六日至豈非三十日耶同至七月十五受歲者隨眾七月十五日得夏十六日更出界無過已上既是難事開成前也唯得一日結者釋上五月十六日豈非一日十七已去不成夏也七月半有難者謂此日受欲自恣忽有難緣不得也可隨無難日者從七月半後十六七八九乃至八月十五日已來隨其中間難靜日間即自恣也是名一日安居者詺五月十六日為一日也三十日受歲者從七月半至八月半三十日也八月十六日入冬分不成故就中此段文難見其意欲知文旨前段即約初結夏時逢難後段即據自恣時逢難若安居中逢難待難靜加法得至五月十六若自恣時過難待難靜自恣得至八月十五如是思之云三夏閏延促者有閏依之一百二十日名延不依促數九十日滿名於也云依至也者無有正文者三藏教中並無說處法寶云不准無文兼無其義即文義俱闕也比於薩婆多等者此類也謂多論受雨衣含閏而受故彼文云若有閏者從四月十六日受至七月十五於其中間一百二十日當畜已上論文彼衣開法尚依夏閏者今師反顯釋成也意云彼多論雨衣是開聽之敬尚一百二十日受畜夏是制教理宜通護者謂夏法是佛親制之教道理宜應通而防難若有閏須依也此則舉一例諸故舉彼雨衣開教是緩尚依閏受畜例今夏法是制教急故可不依而護持今夏未滿閏中出界者明古師所立也古人云如閏五月者若前五日是本分之月便須護之若後五日是閏非開正數促出界宿不在防護若閏六月亦爾故云閏非中出界也即非相續是以破者今師斥古之非也謂於閏月中出界閏是夏故設過閏已夏護無益即非相續而滿是以破夏云若至兩文者若不依閏數滿自恣者此文兩解初依諸家云謂雖知有閏比丘要心不取促數九十日滿即得出界或諸結時雖未知有閏預生要期恐後有閏我亦不依此解不成也必明白心中預知有者即洹准多論兩衣之例依閏安居不可以自要心妄數日滿出界此則定破夏也又云諸雖不知預前生心云我不依亦無此理不以預要而成結夏也次依法寶正解云謂初結夏時並不知今夏有閏月故要期九十日已定至安居了方知有閏即依文中促九十日滿便自恣出界必若預知須依多論不在此例也外難曰夫有夏閏春初即知何得前言初安居時未知結夏了方知委有閏耶可引鈔答云摩得伽云安居已依閏月等云云蜀云西土制曆日與此不同此方遂秊出曆正月便知有閏無閏等西土三時遂秊制曆故致差殊如從十二月十六至四月十五日由是春分處攝一番曆術已盡至四月十六日是夏初一日新曆未出比丘結夏此以有閏不知故數九十日異便得自恣已上依文正解竟若依霅川著座主云此據深山處所初不知有閏後方委之已要期九十日定故數日滿不依閏也此釋與鈔相違思之受迦絺那衣者五利貴勞夏竟受也此衣成受不成受等者此文多釋今依淮南准彼解方為雅當彼論之中因辨比丘受衣戒不故有此段今鈔云即此衣成受不成受是論中徵詞也意云九十日滿比丘受衣為成受為不成受下句云謂依閏不依閏者此是論中釋也謂若夏初並不知有閏已要期九十日定縱後出曆方知有閏促數九十日竟自恣已受衣即此衣成受若夏初必知有閏便合從急含閏安居百二十日住今便數九十日定自恣已受衣即此衣不成受也欲知受衣成與不成促據依閏不依閏以釋若諸記中所解並未窮論旨思之或有約一界有一半人依閏即不成受衣更一半人不依閏即成受此解亦不正知之外難云前文既言依閏安居無有正文今伽論所說豈非正文大德云伽論正明功德衣成受不成受據依閏不依閏以解若夏內有閏月安居為不要依此既不說亦是無文今人多迷此意也既二文兼具者多伽二論之文相兼具足也至時隨緣者至有閏安居時一切隨於前緣也夏初已下辨隨緣之義理若夏初知有閏月決定須含閏即准多論兩衣之例不得依伽論文若反前者謂夏初未知要心九十日結夏即准伽論是反前也此促反於知及不知非謂反他要心不要心也通二論兩文者通多論依閏文及伽論不依閏兩種論文也已上依寶解也玄云伽論之中有二種論量若安居已上作閏即數九十日滿是一種論量若夏初知有閏必須百二十日住是二種論量也解恐非取也云問至法者先辨大意後消文外難曰此是安居文何故預明受日答受日因安居安居既許含閏我今受一月之法亦准安居得含閏不此蓋因便相從致生此問也消文鈔云受一月日者如閏五月前五月一日請法攝得後五月共成六十日不答不得等者謂安居是制教在於界內䇿進修行寂靜止住利益不少答令攝閏受日是開教又出界外身馳心散以亂道業今計受日由是曲開不可更含後閏促限一月不得過也第二重問答中亦先辨大意然後消文外難去五利賞勞是下文事何得然此預明答賞勞因安居有功故開五月一月等汝安既含閏我今賞勞月中有閏亦合攝不蓋是相從因便辨也次消文云含閏二六者法寶云如無功德衣本分迦提一月利今有閏莫得二月不如有功德衣本是五月利今既有閏莫得六月不故云二六也搜玄取無衣兩月成六十日為一六有衣六月為二六此釋似周遮今促取前解約二月六月為二六妙也答中由是開奢法者謂五月之利以是開奢何得更開攝於閏月故十誦云受功德衣已官作閏月隨安居竟日數滿即不得攝閏故不閏也云今至疏鈔者進不三例者四月住名進三月住名不三例即三位也約其夏閏延促有於三位鈔文縱若閏五月乃至並四月住是一例也從若閏月二日已後乃至成正結故是二例也從若五月一日已下末文是三例也初例定四月二例多少不定三例定三月住已上且撿點三位之例竟以依三例消文其第一例如文易知莫非並是一百二十日住故第二例中若閏月二日已後者謂閏四月二日也已後即三日四日並是也漸漸轉少者謂閏月二日由得一百十九日住三日結者一百十八日住如是日數漸文也以越閏月過者謂越閏四月過五月實夏等者既過閏月即成實夏成正結也若五月一日後結等者並是三月住鈔文約數取日足故可知若閏七月等者有二意一定三月住二五月二日下定四月住五月二日結入由欠一日未滿便入閏七月蹋靈不成實數至八月二日方得滿也餘如疏鈔者疏即首疏鈔即義鈔今准羯磨疏有三句前二句約閏四月後一句約閏七月疏云或有安居隔一月自恣降一日謂前四月三十日結安居人與五月一日結安居人中間隔閏四月一个月故云安居隔一月也其四月三十日結夏人至七月三十日出界云五月一日結夏人至八月一日去故云降一日也第二句云或有安居安居隔一月自恣同時去即前人是閏四月一日結後人是五月一日結故名隔一月此二人至八月一日一時出界謂前人至八月一日百二十日滿後人九十日滿故云同時去也第三句或有安居隔一日自恣隔一月謂前人是五月一日結後人是五月二日結故云隔一日前人至閏七月一日得出界後人至八月二日方得出界故云隔一月所以爾者以入閏月蹋虗不成數五月二日結至前七月三十日始得八十九日由欠一日便須含靈閏一月竟八月方去也云二至法者凡欲安居具三義故於中修治房舍當其一數若一世不修即三世不續既開修治先須分故云云云四月持有准律日時有比丘於住處不看房舍臥具便得不好房嗔舊住人心不平等憙者與好不憙與惡以此白佛佛言自今後自住看房然後差人分之羯磨文如鈔云云云彼至之者不得住處有餘物者此約私屬身之物不得有餘若本來隨房物即不得移改先問經營房主等者祇律云自己衣錢造得房得十二秊住以營房有功故先付之若斷理故房聽六秊住若暫修治開四月住開客比丘住者恐是分房了來不合得房今既剩為何妨與住若正分房時何簡主客一例而分也餘如文云問至選者美好不同限日非促者玄云謂逐人意樂各別或有上座有事樂靜欲須邊小等房或有上座欲近食堂佛殿處等不許房之好惡或有樂修福者欲住惡房方便修補或恐廢業不能修補促惡好房不論遠近故云美好不同也夏一時長故限日非促所以住選也問至云取者此現前等分平呼通有一分去呼者此物隨於人數平等分也具二義故一永屬也二資道親緣故不類房舍也投䇿云者籌也即擲籌操鈎而取等云僧祇至去者具通二與者一受用故與二持事故與不同古記云一大僧二沙彌也不得分宋集處者即食堂茶堂等類若有別房好窟等者准律緣中諸比丘見阿練若處有好窟彼言我當於此處住後更為比丘言我當於此安居夏初十六日眾多比丘共集在窟內住處進獛多病以此白佛佛言若欲在此處安居先須依相書名字云某甲來此安居等後比丘書名占之夏了却去不除名字後人敢住佛言不應不滅名而去云此多是施主於僧地上別造房或是蘭若處作別房不是僧家房是以許預占題名若是僧房須三時分何須預占也云三至齊者設教對緣者有人對首緣無人心念緣乃至忿一切開一足忘成等緣二用法分齊者約時約人約處以辨各有分齊也云初中律判四種者於設教對緣中有四即對首等云云云初至界者此通諸界者謂自然作法作法各有眾多不同故云諸也云今至問者羯磨疏云初對首中自所依人是前對證也羯磨疏云佛亦安居而不對人以得一切智四無畏故不從他妄說成也此准多論文也已上疏文鏡水大德云今多有人云大乘安居通釋迦一化境便不護夏者此是愚教妄說也今准大乘圓覺了義經兩卷成文第二卷末廣明大乘安居有於三等一八十日二九十日三百日結道場修行除大小便之外不許暫往外行更急於小乘呪菩薩持息世譏憶與性重不別何文開許夏內遊行等云云次作法分八句一大德一心念告處對人令無餘想二我某甲簡非他人三依某伽藍者定所據處四前者簡中後五三月者除後一月開成資養也六夏者簡非春冬七安居者簡非遊行也八房舍修治者料理資具也三說者簡一說也彼人云告知者前證須答也莫放逸者誡勑詞也答受持者領解意也義加等者以夏必須有所依處故下文制依第五律師也有疑往問者善通塞也云若至也必在林野聚落俗家即無修治之語也不同昔愚等者等往昔愚流云依南閻浮提大唐國李家皇帝某州縣某卿某里聚落某伽藍等今不同之云問至吉羅者三世不續者過未現在不相續故此約一期三世也隨日結成者結成中後也制依第五等者玄云律增五文夏中不依第五律師得提春冬過少得吉云中至字者有名無法者謂增三文中有三種安居之名而不出中安居之法世中通用後安居者謂今時世中從四月十七日已去五月十六已來事用此一月為後安居法也然律列三時等者今師云是增三文中有三時分明今今顯別也准義三法不無者准此三義其中安居之法不無既明前後等者意云律文既有前後之欠中間易知是故不出注文等者舉例顯成中安也某嚴等者出法且約嚴穴也即無修治之語林野准之必用舊法應成者古人不立中安即從四月十七日已去總是後安應無妨後安居等者同前所對之法謂對首詞句與上不殊但改後之一字若在寺宇即有修治之詞必林窟山巖亦無此語云云云二明至二改者律中無所依人有呼對首比丘為所依人今無此人故開心念住處多種者謂止住之處或聚落小野不定故云多種准前對首者可准對首中臨時加改修治之詞也餘文可知云云云三至也者謂先要期此界者如夏前要心尅期來此界安居內心定心境相應者心謂能要期心境謂處所是所要之境也雖忘開成者約彼到後心中迷忘總不加法至四月十七已去方憶未曾結夏故開便成前安居也律云已下證上文也故知住人等者約不預要心說即不開必若有要者却料簡先有要期心許外來已下雖是客比丘元意不要期此界別為事故佛爾四月十六到來既忘加法十七日已去憶者不開成前夏也云四至疏者玄云准律時有比丘往餘處安房一廊入園及界便明相出如是雙脚入園及界便明相出佛言並成安居鈔文隱略也一脚入內顯有雙足入園及界有四種也餘如疏者今准羯磨疏云所言界者攝僧界也園者僧伽藍園也即給孤獨園今由取彼號也疏又問云前來一都入界明相出以忩速故無暇加法開不結成前安居我今雙是入界雙單在園入界已久容預得結未過明相應非前夏佛判十六日夜分未盡入界雖不說偈亦成前也問一足入界及故開得成或一足出界未審破夏不答必須雙足方為破夏也一足未破利益比丘也已上並依疏文出之云二明至也者分齊者四法各各不同名為分齊也上四法安法者對首心念忘成及界也約時通三位者前安居及中後也約處通二界者作法自然也約人通五眾者比丘乃至沙彌尼也准鈔所立今師有一百二十種安居如何配屬謂前安居有四對首心念忘成及界前中後各四即三四成十二將此十二配二界自然十二作法十二成二十四將引又配五眾一眾二十五眾一百更有四五二十豈非一百二十此據鈔文更通羯磨疏今師有二百一十種安居如何配屬謂一是對首二是心念三忘成四一脚及界五雙脚及界六一脚入園七雙脚入園時此七配三時前中故各三七成二十一將此又配界自然二十一作法二十一成四十二將此又配五眾一眾四十二五眾豈非二百一十云云佛制五眾安居等者相疏問云五中二眾有戒沙彌任許安居無戒之徒合安居否答出家位同機不別故律制三時不許遊行皆事五眾也外難曰適來約五眾分別皆四法只如尼眾有伴促令對首何用心念耶天台所稟云此約容有說未必尼中總開心念若有伴促令對首或為緣難伴死等開無犯獨既無所對何妨心念若不慮之備機不足也思之外人更難今師鈔內有一足及園一足及界疏有双足及園及界於作法自然二處俱過有之且如自然界上双單及園即不在疑如何得有双單及界既云及界是攝僧豈非作法所収又作法界中有双單及界即不未在疑如何得有双單及園園是僧伽藍豈非自然所攝二彼交互混乱何多有此疑情如何通妨今云此據藍界等說謂客從外來未委自然作法二種界之分齊一足纔及門藍二相既等不分雖強弱又是及園兼是及界若不互說教相不周章記諜人少見敘述除此釋外別未有理思之約法者謂約四種安居之法也對首心念始終三十一日者從四月十六日至五月十六是三十一日也六十一日者約閏四月說古今並同也忘成及界標人云者謂相疏已前人也古人所解與今不同故先舉也唯得前後二日者前是前安居後是後安居此前後二日即開忘成及界也中間二十九日者即四月十七已後至五月十五日不得用此忘成及界也後二曲開畏失前後者後二即忘成及界是也曲開者是佛望外更開以憐愍利益比丘故畏失前後者古云前安居若不開他忘成等便不獲五利後安居不開便失於一夏損處不輕是故開也中間之中已不及前何畏失後者謂中安居二十九日望前不及則已失五利何畏失後則夏歲由成進退商量故不開也上且錯鈔次明分齊此古人有一百種安居前安有四後安有四中安但二成十也約處者自然十作法十成二十也將此配人一眾二十五眾一百等云云又云者敘第二古師解也唯在後夏一日者前安及中不開唯後安開忘成及界也若不結一夏便失者以急故恐失一夏此以誦開餘隨憶作以時容預者餘者外也除安外即前中也隨憶作者隨彼比丘記憶之時便須覓人作法對首結成不得開忘也以時容預即日數長遠冤奢任運記憶隨得時即對首無人即心念上清鈔文次辨分齊此古師有八十種前安居二中安亦後安有四成八約處通二界自然八作法八成十六將此配人一眾十六五眾八十也並非聖言以意用者今師通許古義也上來二種古人為並所立之理不開典據非聖言也皆是師心臆見而用故云以意用也今依鏡水大德先破第一師者若言中間二十九不開他忘成如四月十七到便忘成加法乃至五月十六已來若憶得即喚人對首或無人則心念可爾設若五月十七已去方憶得者對首心念云何得成既是心迷不可不開成夏故知無理又古師中安居不同及界者大德云如閏七月者五月一日明相前及界若此日不開便廢一月日住豈不損減何不開耶次破第二師者若前安居不開此二失五利故惱處非輕若中安居不開即同適來所破也若依諸記破古義未盡思之云四至不者失謂不失也云初至難者開兩章也云初中者先明移夏故云初中也外難曰夏法為隨處為隨人此範發問也淮南答亦不依處亦不依人只似今日安居是法俱得緣是散心中法故無法前得若安居了或有難起已前之日是法後得若現在反已後日被非得來替處故大德不許此釋恐違鈔文如有難緣佛聽移去勤覔安身處至彼處後起安居心此夏法隨起若言被非得來替者即全無法如何續起莫須對首加法不必更作法不名移夏又下文云若得住處夏法隨身何得安致此解兼前所問俱不應理也大德又云今別申問答以除疑妨應作此問其安居夏法為與人相應為與處相應答設爾何失難曰二俱有過若與處相應即一向不得離此處何得受日出界并移往別界等理合破夏已若與人相應有緣但去不要請日亦合成夏答若無緣法即依處所以無事不許出界宿出即破夏也若有請召緣及與命梵難法便隨人處以有緣即受日有難即移夏故不破也下文云夏法隨身等此問此答妙盡其原也云至去者二難者命為一梵為二也梵行者先釋梵難法寶云西土之中若外道修行節操乃呼為梵志梵由淨也佛法中比丘修行精真守素亦呼為梵行即淨行也因於染愛或致犯重不成道果障處不輕說之為難此是因中障果也背因人來者總釋上意誘調比丘者誘引調哢故律文各有緣起如彼具述也二鬼神等者解命難也五蘊假者命根連持鬼等惡獸毒虫能斷彼命不得如意飲食者有持之命依飲食存食不如意命將不久名難也已上二緣故佛聽去云准至也准此結戒者准此二難移夏依本結成也有人妄釋云移夏更須加法以文中云准此結成等命難云既云加法呼為何等安居若作前安前已結成了何勞重加若云中安即不名移夏無理甚也若得住處夏法隨身者但起安居心即夏法續起並不見說更加法也本界無難亦不得反來者比為此界有難移往彼界今此難靜不可更迴已在彼依本結成也須有緣及法者須有生善滅惡請喚之緣即作受日之法方得再來此也云五分至夏者食不足者五分云時有比丘分麤食不足作念云我在此安居食不足以此白佛佛言聽去無罪苦樂等者樂謂眷屬聚會去處受宮等苦謂被賊遭官死亡等以此白佛皆許去也八難者若王奪住處差出家人名難賊謂失衣鉢等云云二處隨半受衣者四分衣法云有一外道弟子於佛法中出家諸外道親族言云何捨羅漢道於沙門釋子中出家者還取復作是念彼若聞之必能迯避我聞沙門釋子不破安居待夏中往取必得不疑彼知已未審如何遂乃白佛佛言聽破安居彼便從此住處往彼後分施衣不知云何佛言若住日多處應受分若二處住日平等隨半受衣也破安居人等者今師立理證上移夏聽二處受衣乃至自恣處取衣以十律中破夏人不得衣分今既聽取分故知成夏次三重問答中第一云問至返者三悔者一夏之內不得過三也准此語一夏為一座故第二云問至夏者此問與前不同也前即本擬受日遂迷忘故不受引約因事出界比擬即日迴乃值水陸道斷因而經宿不知破夏不破耶高齊十統他粿反者玄曰高謂高洋洋姓帝也齊謂北齊國也以齊號多故標姓簡異以齊主崇重佛法立十員大德號曰僧統統天下僧尼刊定佛法此時十大德共評章壞於慈濟判不失夏諸德意旨亦准受日逢難道理判得也第三云問至不得者謂本意暫出即日却還還時至門明相欲出得會夏不答中准祇護衣界以類例故然隔大墻理須入顯手足方得以表有身分故次對界料簡云若衣至出者此文總有四意初云若依大界安居乃至入中間相破夏者此謂要心依大界安居也入戒場者為隔自然故及餘小界等玄云由是攝僧大界以在圍輪大界之由望圍輪故名小此即從外向內失亦為中隔自然故第二段若依大界外伽藍乃至在後者此約藍大界小處依外藍安居總是要心處故注文者和會下文之意也故下料簡門中云若本結大界小於伽藍便依伽藍坐者以佛制依界故有者不成受日不得止得縮取於界相是鈔本文准此藍中有界不許依藍只合依界今此文何故通往彼此二界不失却許依藍莫與下文相違不是以注曰謂結夏在前結界在後也意道若先有界只得依界不許依藍今既夏初未有界但有伽藍是以許依藍護夏也法寶云此亦且依古談若據今師不局於界但一切臨時簡寬處即依也故羯磨疏中許隨藍界但據要心故無確執篇三段若依大界內藍乃至亦爾者謂作法界大伽藍小依藍安居出藍門便破夏小界亦爾者引有兩釋若依玄云是反上句也謂上界大藍小依藍安居出藍門即破夏今約界小藍大依界結出界處便破夏也即迴文取義應云界小亦爾也或依法寶謂於大界中有小攝僧界依此小界安居出小界即破夏故云亦爾此解勝也第四段若根本通依等者謂初結時不知此大界內有戒場小界等別但隨本要期處皆不失若爾何故前云入場等破夏耶鈔答云皆謂與本心相違等是也謂本心依大界今入戒場及餘小界即與本初心之心相違義張兩失者於上四句之中第一句入戒場等為一失第三句依大界內藍今出門破夏是兩失並緩依法界者結前四句中初大界二藍內大界三藍外大界四根本通依大界皆是從緩而斷也急隨房處者如三間房初要心我依中間後出兩邊便成破夏以從急故對緩立名也四分等者以律緣中有壇越請與安居後見有難欲者須自檀越求移若聽者善若不聽者應自者等云云云二至破夏者至意留者或父母病患生善滅惡等緣若苦邀留聖開且住不名破夏若汎爾人情相留即不可八難過限不還亦同於此准此等者祇云若受日依斷諍事人晨起受晡時者晡時受晨時者不得迃迴應從真道若道有難無罪至彼斷處繼時斷了欲還經時准此違時即破夏也因廻迃違時亦破夏迃迴不違時吉云五至法者如文云初至後法者前開兩章今當第一故云初中自恣後法者指功德法附處廣述或有云衣一月號曰迦提有衣五月號迦絺那者謬之甚也云次至二緣者入解有言破夏者敘古師釋也以佛令夏竟結解者古云以律中安居竟四事應作一自恣二解界三結界四受功德衣今夏未滿故又本依界安居若解本界失所依故便失夏也此妄引聖言者破古也律文令夏竟解結界者謂諸界同受功德衣令解結界非開破各捨謂各自解本界也通結為都結為一大界也同受為俱受五利共解謂受已共解也別結謂仍高各自結取大界也廣文十誦者彼云夏竟眾多僧坊共結一界受功德衣已捨是大界諸比丘皆名功德衣不答一切皆得受之又疏中者首疏也彼亦云夏中解界不破夏也新章亦同南山彼破古人云若言依界安居夏中解界失所依者如依藍安居或藍塔崩倒應破夏不古人等者將自恣來難解思也如有難緣即許減日自恣是安居未竟自恣既聽何得不許夏中解界故云文兼會二須兩相通有記中立夏中解結界是有法定不破安居故宗因云是僧法故喻如夏未竟自恣自恣是僧法自恣不破夏解結界是僧法同自恣不破夏今言無妨者羯磨疏云然安居之法不局法界隨處並得不離本要之處解界結界何得有妨情限不同故分別者若情限在於法界夏中解結大小不同故分別也若情限在於自然夏中或結作法或寬狹於情限之處故須分別無難依本處者依本情限之處有難准僧祇開者祇律第八云前安居已忽有難生欲至餘處三由旬內若彼坊寺有比丘者呼來若出界者已自二結之後欲就餘處者當捨已更結如是捨後結前等適意處故有難得三由旬也若後作法狹於本自然者即但依本自然寬狹後結若寬本自然者無難依本是一儀有難開近新結處是二緣已上釋正篇竟次明法附大分二初牒名次釋初云二明受日法者先來意然三日靜處九夏時長或有生生善滅惡之緣理須極救佛既聽許合附此明次釋名者牒彼請意𧫎告僧別納法在己稱之為受對首眾法許往有期約明相分稱之為日各軌範名之為法也外難云未審四月十六日纔結夏了有請喚緣便受日出云得不有人云不得必須經宿方得受日法寶云得律文夏中聽受今既十六日結豈非是夏不在懷疑也云夏至焉者自誑心者以非為是名自誑也虗損信施者如有施主數比丘夏臈施物受日不成其夏既破妄數為歲冐受利故為虗損善見云自長己夏受施犯重等云云故委示者生下文意委細顯示也云就至解者如文云初至同者三種者七日半月一月也有曰者對界先後相攝為日也云一至受者從五眾受者佛制五眾安居各自相對受日非謂比丘對下曰眾既互不相足何得從受今鈔文且約一期出法也云二至知者如文云三至磨者古云凡受日法先受七日次半月後一月如此次第順於律文若已受半月在前不得更至七日以長收短秉七日法亦不起也餘例由如功德衣五月攝得迦提月等上敘古也今師云不爾功德衣就時揩定又俱五利是故以長收短今此受日約緣事別緣有短長前後不定得定他先短後長不可例也今云受日三品遂緣長短若長緣先來先羯磨受戒短緣先來先對首受縱律文排次第者蓋是云法何得固執律文云問至也者問意者適來既云隨緣長短先後請日何得羯磨詞中云受過七日法若先曾受七日法用了後半月即可言過若長緣先來便先請半月等既從前未曾請七日即不合云過引是今師自為除疑故生茲問答文意者道羯磨是僧處秉勝故七日是對首別人之法劣故不如此據勝劣之邊者過非約己用七日了云過也思之羯磨疏又問云如受一月法詞中何不言受過十五日一月出界答半月一月雖長短不同莫非總是僧法白二更無勝劣不可言過不同七日法劣也疏又問云今受半月一月法者若值小月如何數之依律文也半月如法依十五日即不問大小但數取日足還及如十誦中三十九夜等若受一月依大小不得數日如律云住三月等小月攝在內也上且依疏法寶又釋云如小月十五請日接着後月即數取三十日令足此約受日時月大小也云四明至也者此門全是首疏古義稍難領解今一往依古義消文了然後略指出今師與古少別耳若准受七日用竟羯磨受隨得者寶云欲明相攝先明不相攝也若七日未用者謂有施並請七日禮念今對首請七日法了未曾往彼檀越舍故云未用也或用未盡者約請日往到其家已得四日由有三日在故云未盡也更有異緣者別為三寶緣或可請說法受歸戒緣等或是七日過者今迴文應云或是過七日緣即半月一月法是今文中且舉半月日法是羯磨受也前法謝者謂指前來七日法或全未用或可用未盡者也已落謝也由羯磨法強等者釋相攝義也羯磨能攝七日列人之劣法故不得二法相續者一身之中不可七日與半月二緣相續起耶律云已下古師自引文證也必有等者即定七日之法必定壞也若前羯磨受日等者謂先受半月或一月法在身為三寶等事今或檀越請七日禮念要須待前半月緣竟方可許受七日若半月法在己即對首請七日自然不成也比受有言乃至良不可者首疏自破古也如有事緣一月不足便羯磨受一月法又對受七日相沗成三十七日良者實也實不可故以月法在身不可更請七日自是非法也已上一向作古師義消文了若據今師一半許他古人一半即不許只似前來七日法未用或用未盡更有列緣半月法等若是同緣即成相攝同是施主禮念或可同三寶等緣不許一身二法相續理實不可此即半許也若是異緣兩不相攝前是施主請召後是三寶等緣古人若不許則無理也此則半破今師羯磨疏中舉例如患須服蘇油兩緣未差口法隨在事列受日三品不同並約眾緣不可隨受等云云准此今師但同緣不許異緣開許古人不論同異並皆不許律云不及即日還若作今師引證但證同緣不得乃至三十七日相帖今師亦約異緣相帖無爽如句三寶請一月為施主請七日何得不成若是同緣良不可也必依古釋全闕逗拭但為未達律文致斯濫述云二至八者玄云依緣受得名進若非緣受日不成為不也分八如下鈔述云云云定緣是非者三寶病患生善滅惡名是破戒求利等緣為非云凡至後同文者施犯重者如有人將物施僧不見十夏人此比丘實是九夏而言十夏望他應得不得故重也廣如後文者玄云指隨相販賣戒中云此販賣物作塔像不得向禮乃至作臥具隨轉轉墜等云云云就緣分五者一三寶乃至第五和僧護法等云云云一至罪者佛法僧事者准四分中波斯匿王為証𭛞有不信樂大臣嫉妬惡心欲鑿祇桓寺通渠比丘欲往白念路遠不及即日還佛聽受七日者此是三寶緣也五分亦爾者彼律所解大同但云俗人擬通水不言不信樂大臣也大寺者一說云諸多寺也二解云即一寺之中諸多緣事並皆許請日也前釋為正玄云今時有人為寺家相許受日得不答即如四分波斯匿王邊國人民叛乱王領軍征罰先所供養佛及僧衣飲食所須之物有不信樂大臣奪之諸比丘往欲白王自念路遠不及即日還佛言有是事聽受七日去驗此文意為佛法僧言許平之事受日總得餘可知云云云二至不應去者十誦問為護受等者此波離問佛也答云為七眾典𧚔受即七眾為請主文列二百四十二緣並是七日緣也遣使不遣使者前人來請名遣使得往縱前不來請名不遣使既是生善等緣自往亦許此是他宗如是居四分不遣使不得去中路聞死等者准十誦云比丘僧來與憶念不癡毗居尼佛言應去若中道聞彼比丘尼命終反戒入外道眾八難中隨一一難起則不應者者犯吉也云三至往者大父母養育恩重大臣有力損益雖無信樂須往若先信樂故宜去也餘俗人信樂往不信不許必有力者進退解也謂約比丘有道力能化導他今雖不信到彼後誘重令信若如此亦得往也云四至不成者安命難中說者謂移安居中五云必為我命作留難佛言聽者羯磨疏云若自病重不堪受日即是命難直者亦得失三受三等者謂隨相中失三衣戒今師云先三受二未過知足若受三犯此舉急況後也捨制取聽者制是三衣聽是長物今三衣却闕是捨制長衣絕多是取聽不依聖教之文故云未隨佛化准奪衣戒者謂隨相失奪三衣戒謂隨闕隨無不以證反也餘如文云云云五至故者和僧護法者謂和僧即是護法若不護法內成破壞外生不善損滅佛法也四分等者同界安居律有四句一云見比丘方便求欲破僧二聞比丘方便求欲破僧尼亦為二句同上並因我在此若去彼即和合佛並聽直者若准東塔疏斷此四句但移夏緣今依受日緣若依移夏之意後得處處僧作安居止縱此難靜亦不得更反即屬前文意若作暫去心後隨至處不起安居心也專待難靜却反即是此文之意云云外界律有四句一聞彼有比丘方便欲破僧二聞彼已破僧尼亦有二句同上佛並聽者彼界有此須我和之並許東塔云此四句但待難靜便須返界不及破夏也然和滅之相難知者若據古師皆云和僧大事律聽直去不言受日良由和滅分齊難知知用何法受日者得今師云然和滅之相難知然字縱奪意也縱之即直云奪之須受日故云然也約緣不妨文理者謂約和僧之緣道遠爭事大可依僧祇事說受者譬如律藏未分之前通而行用今雖分了約此用之亦未違大途道理故羯磨疏云必有和限依受聽者事無限有可准僧祇事訖文也上是疏文律無正斷者准四分文中數段破僧之文皆云即以此事者且不須受日等故羯磨疏云律且顯緣未明受也云上至也者乞麥者玄云此尼律因六群尼乞生穀麻豆米麥為世譏慊故尼制提僧犯吉並是正罪也曲命別情者謂囑俗人令蠶熟時作疏來請貧道要乞綿絹等此則非法也綿本分犯墮囑請理必不成自誑淨心徒消施物也律中諸請者或比丘沙門彌檀越等一一遣信別請云大德來為我受戒懺罪布施等要遣使來反顯囑求請命成非法也父母餘人同十誦者律云若父母信樂不信樂聽往餘人者即是前來文云汎爾俗人生福信樂聽者不信不許四分如此今鈔主意若父母及餘人即同十誦中為七眾興福間疑請者乃至遣不使遣但不為利己俱得也即顯曲命別債便是為易利良可不故云二對至也者對事離合者事謂所對之事也約緣別受為離多緣一時牒入名合今文中但明合受也應法緣者簡非法也隨為多少者隨所為緣或多或少三家兩家之類也得合受日者羯磨疏云或張王兩緣各是七日不可合為半月受也以兩个七日緣事各是別人行只得前後誦七日也如是例之上是疏文若一是三日緣一是四日緣已上兩緣都用七日即合受之如懺僧殘等者舉例釋也謂懺罪亦為離合約同篇罪說但懺一罪曰離或三罪五罪一時行覆六夜出罪等合也具銜者例也律文中具足而列出應云已出法示合請之規摸也如文已上且約鈔文據七日別法說離合意竟其僧法離合列知然鈔雖不明今亦略述只如檀越請半月禮念或為三寶境界須受半月不可兩遍秉法今既同是羯磨但都請一月之法牒兩緣人文中即得此是合意也若論一月法者大德約日夜兩般分之為三寶句刃三十日是日中為施主禮合一月是夜內都受一月法被得兩緣大德云羯磨疏中有此義也准此約緣有二不妨為合意約法元來是一謂都用一月日故云三至故者所為緣現牒事為受者或檀越請召或三寶等緣是所為也現者約緣顯現且如檀越請召今已送疏因等是也牒事為受者牒前處為事與七日半月大德云有兩種懸受且舉半月僧法釋者如施主取今月二十日起首轉念此比丘於十五日布薩時因僧集次便受半月法也雖未往訃然所為緣已現預受法在也至時方名懸受也又釋或今日受法了便欲往訃但為檀越家別有事緣未遂禮念等却來由延更過旬日等比丘既受法在身已後者時不須更受其一月及七日法准說也此義㝡急請記明今故略論用消文意思之虗搆成緣者謂其事未實懸虗搆置或言七日半月一月等或倚傍昔言者如有欲人春間汎說云我村中有一王家每至夏內常施僧物和尚劇此時可來不比丘至夏憶春中之說便欲往彼故云仿像未實者謂仿像其事未得的實便輙受日也事虗限𧭗者前事既虗今復隱約作限取法即成謬𧭗日數妄置者由前事虗限𧭗其緣未可論於長短今或受七日半月一月如是日數皆虗妄置僧別之法不相授也云四至應得者便通餘用者憶古義也首律師云本意為佛家受七日已用三日其事既畢復有餘之四日更有法及僧家緣事便將此殘日用無過所以得者准十誦文有白餘殘夜用故知得也故不得也者今師破也謂初標心之時元為佛受七日且不為餘緣今句當佛事因緣既周其法即謝設有餘日以無法故何用之是以不得必有本緣何爽通用者今師自釋也謂元訁之時通為三寶及病等緣受七日今佛事用三日了更有四日便通餘用即無爽爽由失也古人反詰云若爾何以十誦律中有白餘殘夜用耶令鈔通云十誦中白餘殘夜用謂同是一事等云云准十誦律云諸比丘受日到聚落中七夜未盡作事未竟來還白佛佛因聽受餘殘夜者云我受七夜二夜已過餘有若干夜往出界者律文如此既云所作未竟明知本緣在法不謝故白殘夜何失非謂異事者鈔重破古人不了律文云意羯磨疏云本無心受何得白行等若本並因三寶等者羯磨疏云若三寶但須經營作法之時文中合攝是俱有心法後通用也若三寶事後生等者於中更料簡也淮南云本為造釋迦佛法花經及常住云云事受七日已用四日作前事並說今或為造彌勒佛涅槃經十方常住事將前餘日用亦不可故云不是前緣三寶也雜緣者受戒禮念等也云云一家通緣准心得者進退解也謂張家太請七日不准受施兼請受戒懺悔等即受日時便有心故得也云問至故者彌是生善者彌者廣也大也不合作微小字釋也律制二請者一僧次二別請既的請受日亦得不同大乘梵網經也以非施主元心者謂檀越元心請前人今見後人來竟不悅故不許然鈔文且大約論也或施主雖元請某比丘今既不來替代亦得不生惱者理可之云五重受者於三寶中重重受也此據今師義標也云昔至局者昔云一夏開三法等者羯磨疏敘古云安居立行修道為宗緣急開三以濟時要何許重受無此理也故十誦云為破僧故聽受一七夜不得二七夜乃至聽受三十九夜盡應破安居者故知不許重也今云得重者今師所解聽許重重全異古也如疏述者首疏也今依羯磨疏云如前檀越召受七日後有三寶要須經營何得不開又如官事須二三日何能者夏制本意無事遊行今有緣來依法受往非專檀者何得不開但如法緣一切開往餘文與鈔不異云云律列二十餘緣者四分廣列二十三緣並是七日緣由事未現佛未聽者且不云不得去也且約為事信樂父母四重者爾時有信樂父母請比丘云大德我欲相見佛未聽我有如是事者遂白佛佛聽者二有信樂父母遣信喚召亦如是三爾時有母請比丘亦如上四爾時有父母請比丘亦爾如上則是四重佛一一皆言聽者況餘等者舉上父母前後尚乃得於四重豈況檀越三寶等不可限局不開重也云五至乎者五分有請無請等者引佗部也五分云優陀迎信樂佛法於安居中為僧作房設入舍食以房於比丘不受長者生慊言我用財為食比丘不受以此白佛佛聽受請也無請者比丘有疑問須出界者佛一切聽受七日往今師云豈有前疑便開往問後疑不可開十誦列多七夜者彼云波離白佛為誰受七夜佛言為七眾興福受廣列二十三緣為優婆塞列二十三乃至沙彌尼一一並是七夜皆聽者也古師反難云若爾何故十誦文中但聽一七夜不聽二七夜可引鈔通云聽一七不聽二七謂一時雙牒二七日前後重用今師云十誦不許者或約一事上不得二七豈制異事不許受耶又云不許二七夜者彼受日法但有二位一是七夜二三十九夜故於對首七夜何得重加故云不得二七夜何妨前後去者皆開古人不達文意但見云不聽二七夜便妄解云不開重受也古人更反難曰若爾既一事上開重何故和僧滅淨彼律聽破安居者可引文通云若准和僧似一事上不許重受准十誦云時有異界僧爭起請僧斷重若前安居竟應受七夜者若七夜盡應受三十九夜盡聽破安居去古人將此為憑不許一事上重受今師云似一事上不許重受既云似未必全判不得彼律意者據和滅難期故聽破安居者若可期約無亦開重搜玄廣引羯磨疏繁而錄也然彼有不請文寬於四分者彼律為七眾興福設供受戒問疑但使前人見我生善縱不遣使亦得受日四分遣使方許彼既寬於部重受不開文非明了者只為飜譯之者不解迴文語勢諸含故非明了理須通明者彼既不請之文更寬重受之文則不合急二意通練其理自顯然不可偏執一文致失諸緣重請也五百問等者文中既云滿七日已乃後重受故知許也此雖非重文且是重義也明了論等者玄云今引論疏真諦三藏自解別請七日事了還至八日出界引是異緣得重受前事已了更有別緣亦須更受既文中云更受豈不開重准此雖非重受文且是重義思之因此便今時行事此論既言前請七日事了還界內第八日更請七日出界者今人行事至七日滿歸界便請七日出界並不宿不知成不有人約義通云謂受日之法身在界內法在不失如七日用三五日其餘之日未用身歸本界更作前事本法由在不須更受法在不失今縱七日滿歸於本歸界至明出時雖然經宿殘法亦許在於重請亦帶前法故知七日纔滿歸界請之理無失也縱使了論中第八更請七日出界亦是部如不同今師但取彼證前重受不依他行事也雖有此有此解未可依幸不准論疏如然律亦有於明制故文云及七日還也又前來立義立如受七日用三五日餘日未用身歸本界便作前事者此是未滿之文不可例於已滿之事標心為滿歸寺其法經明即失不同未滿暫迴緣在法何得失今但依玄七日反界定須經宿戒律從急豈不然耶何假徒繁成立義請思之餘文知之玄記對此引論解三千界量今意在隨相中明之云餘至疏者羯磨疏中引了論釋都為九句皆是重受以破古人也疏引論云七日有難隨意行善解三種九品類釋曰三種者即七日等九品類者將期三種互而為頭歷之成九也應云初成七緣後成七日緣後成有難緣初成七日緣後成隨意緣成三第二將有難為頭云初成有難後成有難初成有難後成七日初成有難後成隨意成六第三隨意為頭云初成隨意後成隨意初成隨意後成有難初成隨意後成七日成九諸記中雖略舉名字然迷意由多今依鏡水大德引疏略釋云初成七日後成七日者解初雖請七日事證不還破安居得小罪事若未了極得六夜第七夜必須還界至八日更請七日出界宿先為師病受七日出界三宿病差便須還本處別有施主仍請得用後三日住界外若後仍未了更請七日即先後俱成七日大德釋此中開互用者由師病時施主清至故兼云也二先成七日後成有難者解云謂先為施主請七日用三日竟還於本處聞有大起之難仍往諸處也三先成七日後成隨意者解云先為施主請七日前事竟即合還來今緣住處無好件知友等多喧閙妨修道又乏食藥今不更迴別揀靜處慕好知友兼有食藥等處隨意便云若曉此三餘句例解不更繁敘也云六至日者唯二一日二日皆須七日者羯磨疏云以法収緣也律云已下證文可知外難云夏中可爾如七月十五日有緣情七日至十六日已去既不是夏又復如何鈔答云夏末一日在亦得作七日法餘云六日雖非夏限以無受一日法故問安居護明相未出外在不外犯明相出後既當十六日本是出界時何假更受日答謂明相正出時身須在界內若不得法明相出時身在界外便成破夏又如七月九日請七日出界至十五日亦須反界以十六日明相正出時身須在界內故云云云七至緣者尼律開七日不云多者謂三時遊行戒中准有口受不云多日僧祇尼三十乃羯磨受者准祇云比丘尼安居中無求聽羯磨法為僧塔等但聽受七日去比有濫同僧法者敘古儀也古云僧既開三法受日尼便准之不更領列新章扶於此解四分已下今師破也所以已下今師釋不多之道理也但開七日亦濟別緣者有三十半月之緣但七日滿已隨時更請亦被得生善滅惡之緣也云八至之者羯磨疏云有人云事訖不來亦不破夏以法在故知七日藥與欲同狂病得法病差不來等例今解不同事訖法謝以受日法牒事加之緣謝法先不與欲亦如藥法病止無用不狂解須乞法也上是疏文十誦明文不許往者一誦中有尼病清為說法中道聞死反戒皆不應去去即是往也有本錯出經字僧祇同之者祇中和僧不得迂迴至彼中前和了中後須還若停失夏十律不許往祇文不許住文少異皆恐破夏故意同也云三加法者謂加於僧別之法也云前至別法者五種人者一獨住二蘭若三遠行四長病五飢時依親里住故開心念也堪來不待者謂清淨人堪來足我對首之數今不召他此是別眾心念不成今時多有無識之徒至結夏日向佛前自說偈者愚癡甚也若待不得等者即開自心念也餘文可委云云大德云十誦中對首法既通心念半月一月眾法例此亦合通心念但今時無人敢行道理無損知之云二對首至消者詞句出法如文因說今時行事不同有人言對首比丘須是當界同安居人又須在界內為我任持此法若一時總出即不得向他邊受受即不成先須委問然後作法大德云若爾且如請半月一月法時當界無人秉法請外界人來秉法了去不教他外處僧就僧此界與我守法耶今此對首亦後但據對首作法之邊更互請日了一時去並得誰論他界內界及同去不同者等無此道理盖是意言也儀准無失者羯磨牒依對僧請日今對首心念准向文牒之請日理通有何失也若受日未受過七日用亦得等者與前懸受文意同也前則約緣辨非此中約未用分別亦不重也不同七日等者玄藥滿七日縱病未差法亦失也病精者謂病已差縱日未滿亦失故雙牒也外難既病差則任許法失若爾病住法應在鈔文自徵由佛制等者釋也以制七日揩定論云堅病消者是也玄云論是成多二文名有此說也云問至法中者此約四分請七日得兼第七夜不答中不許以律文制第七夜及界故知不兼夜也不同十誦者乍觀文勢似盡七夜至第八日明出後還據羯磨疏亦須及第七夜還界與四分不別亦護第八日明相現明故又疏云十誦七夜及七日還同於四分不兼夜也已上疏文如此分明至今尚有未知之者妄釋云十誦夜得法縱明相時身在外者日不破夏也以請日晴云七夜故四分既不言夜但得至第七日護第八明相以無法故若作此解縱依彼律亦成破夏與疏有違也外難若爾十誦與四分日夜之語雖殊防護不異今四分律師請七日法時改云七夜得不可引鈔答云又得已下是部別不同須依宗呼召也云云僧祇事訖者彼云但隨前事長短了日即還名事訖其事訖是外宗法具在諸部篇明之云三至釋者所為之緣者一三寶緣乃至第五和僧護法是也同前通用者心念對首同用此緣故云通用今但緣事稍長即用半月一月等法也不同存單等者斥破也一夏之中但存三度初單七日次單半月後單一月故云存單也遂引七日令長者玄云非謂引緣令長但用長法也受既不成破夏得罪是罸也餘同前釋者指第五重受一中解也云今至之者有四不同者第一曹魏時曇諦所出羯磨是也第二即姚秦時覺明所出羯磨鈔主云曾一度見後不逢之故云少見第三等者北齊光律師出本增加乞詞雖加乞詞准乞覆藏兩遍牒事時列已前增加乞詞忍聽已後略事而作此光師當世盛行也故彼云大德僧聽比丘某甲此處安居受過七日法十五日出界外為某事故還此中安居今從增乞受過七日法十五日羯磨若僧時列僧忍聽今與比丘某甲受過七日十五日羯磨白如是此且舉白文羯磨例准止可隨其綱網者只可隨於律文受日四句成白緣骨之綱教網也云問至失者問意可知答中雖增乞詞大宗無失者牒緣牒乞詞等但是第二第四句望羯磨宗骨無失故羯磨疏云有人定判依受破夏今解不然俱順教故僧乞滅乞各有所憑大途規献在故不失上是疏文云第四至十五日者者第四人是法願律師出文更不增加今鈔准此用也羯磨文如鈔云云准前著之者謂准著十五日處或一月日一切肴緣准而著也不得雙誦十五日者今准此意恐人不達律文依文謹誦律本云受過七日法若十五日若一月日出界外今若受十五日即不用著一月或受一月法即除却十五日不得雙牒而誦也已上釋第二文段受日法附竟大段第三料簡云三料簡雜相者都有三家此一段初依玄記於第二受日法附中就僧法受日中分三初通明長緣便斥古失二今加法下正出受法三即此雜料簡之羯磨受日是時非之處故云雜相也或依淮南順正記亦於受日中科為三初牒二釋三雜料簡若爾今此中大科三字配上義科不著已上兩家並是錯科破鈔文殊非雅當也今依法寶云准前文意去初中分五即是第一大段安居正篇也第二大段即云一明受日今此第三大段便云三雜料簡豈不應得前來初二兩字此盖是鈔主自科後人心麤不達文旨耳又此名為雜料簡者謂料簡受日與安居處相圍涉故須立此簡之若云但料簡僧法受日何以下文更說安居依藍依界等別思之釋中云若至開之者熱極者此約餘緣也同緣者同是半月一月等也二人三人者不得至四也由如受戒無緣一人為一番羯磨有緣二人三人故開也此亦如然依十誦許也云若至衣者及餘小界者還是攝僧大界今望圍輪大界得於小名謂本依外大界要心安居戒場小界不是本要云處不得於中受也後結二界者一是大界二是戒場即許受日真非已下鈔文自釋也縱入場不破夏而離衣者戒場本是我要心處入中故不破夏由中隔自然地故是以離衣此亦據結攝衣界為言若不結衣界依藍護衣亦不離衣也云若本至之者謂據初結夏時本有大界不許依藍佛制依界故有者不成者有依藍安居安居不成受日不得者謂藍中既是自然之地但作七日之別法秉羯磨受半月一月法因然不得止得縮取於界者一解云從內縮至外本界小既今更解了通結令大二解云從外縮至內即須來界上安居不得依藍而住謂界中受日三法並通也餘廣如疏者首大疏者彼敘二師立理一去安居必須依界不可依藍以佛制定故文云雙單反界也二師云藍大界小但藍依不依戒故文云依某僧伽藍等准斯二解各報一邊今鈔文從急且敘初師儀由是了若據羯磨疏中亦不定執但寬處即依也若藍寬界小依藍即與第二師同若界大藍小即令依界二文兼備至時量外難云界小藍大依藍安居今向界中請日得不答得此是藍內內界本是所要之地入不破夏受日何畏不成故前文本依伽藍後界二界隨界受日尚判得成今藍內大界豈可不得更難若爾藍界戒塲亦合得下答戒場雖在藍內即非本要入中破夏離衣失依上法即不類後結也上是儀決非文有之者有人不會鈔意乃云上是南山儀決者錯也謂本師指前來文中云由佛制依界及縮於界相者此是古師約儀决判也下句斥云非文有之謂不是律文有此說也謂界本為攝僧不為安居安居約人標心何局於界但寬處即護也更有異說云今師恐人疑云我今依藍安居不依界或受半月一月之法不可向他界上便於自然藍內秉羯磨受日此受日不成以文中釋云佛制依界故有向自然藍上秉白二法冥然不成受日固冥不得止得縮向界中受也此但是制受日依界非謂制安居依界若准此解違於疏文昏迷鈔意也思之上解第十二篇竟第四約法對人辨事即自恣篇大分為二初牒名二釋初云自恣至附者先辨來意上篇一夏安居九旬同住恐有𠎝過不自見知故須自陳三業恣僧糺舉故安居後有此篇來玄記對此列緣起恐繁不緣也釋名者自陳三法之詞恣舉七聚之罪摧黑業之宗主成白法之樞鍵欲使知必改省已增修皎潔尸羅凝清海法寶又釋宗是宗主要者要務即行草差人等是宗家之要務篇等如常云云注文來意釋名如後具例次依篇釋中篇希總意者云然至故也者然九旬修道者然者諸記中多訓是也鏡水大德作相違意解也謂夏修䇿勵身口無瑕夏滿功圓理合騰空而去以顯成果位也今令且修未許隨方却自云恐僧治罸豈非相違故云然也九旬者數也搜玄旬歷也支神有十二子丑寅卯辰巳午未申酉戌亥干神有干甲乙丙丁戊己庚辛壬癸以支十二歷干神十晝名為一旬一夏九遍歷之故曰九旬也大德不許此解若云旬歷也合作此巡字今文中是由旬旬假等字也今准法寶解云十日為旬也如國家立一百二十司每司給十日為旬九之中勾當官事中後歸舍勾當私事脫又入司勾當官若列第十日即旬假一日停諸事務歇泊也今佛制比丘九十日結夏故云九旬加行䇿勵故云修道也精練身心者警身口是練身即戒學也脩定習慧是精練心即餘二學也人多迷己等者法律三昧經云世人但見佗非多迷己過故藉糺治方得清淨故云理宜仰憑等也縱宣己罪恣僧舉過等者謂自說三根恣他陳舉內彰無私隱者我既縱宣即表不隱其罪故外顯有瑕疵者殊有損為瑕玉有頴盧對反疵文云大德長老哀慜故語我即顯外有𠎝犯也身口詑於佗人者謂七支之過全托五德糺舉也所以但云身口不言心者謂小乘不制心犯故不孤獨者犯罪不除不應僧法棄在眾外不入僧數名孤獨今懺竟仍舊名不孤獨也又解犯罪不懺當來入於惡趣名孤獨今悔除竟免招惡道即不孤也若言調伏者依法治罸名若言依教不違名調伏自喜脫者既洗條竟七支皎潔自歡喜悅樂知無有罪也云所以至自恣者將同期者說文云期者是情欲也期謂剋定也謂會也夏初情欲剋定聖會同住九旬立要等者共立要期九十日中修行趣於上果超三界也若逆相舉者若初結夏後便互糺舉即無心修道反成怨仇諍竟之本也各隨方詣者方所也詣至也障道過深者尸羅不淨三昧不顯犯吉羅罪九十千歲墜泥梨中也毗尼母下證文可知云此至行者非謂自恣為惡也破昔愚也昔人云夏中即須專志撿察不得施為作惡今夏竟即許放縱恣情造罪也今師云非謂自恣為惡此雖相顯者此自言恣舉之相狀雖則分明有此一類愚人無知監述也云就中至行有如文云初中分二於前第一段中更分二別如下列也云前至恣者若依國者國四五六月前安居人定百二十日住取七月十五日自恣中後二安則不定也不依閏至九十日自恣者但數滿也若間至自恣者非前夏則是中後人也若五月一日已前安居者至閏七月一日得去若五月二日已後至後夏結皆越閏月過至八月二日等已後數滿九十日自恣云二至中者謂如前說戒篇引四分外界鬪爭比丘來佛令增減說戒若知十四來十三說若知十五日來十四日說若已入界當令入浴比丘出界說若不肯者白僧言今不得說待後十五日當說不得過三度應強和合說今時自恣亦爾唯改說戒為異餘文並同故指如彼也向前日為減待後月為增也云三至日者准律自恣法中云時有住處眾多比丘結安居精勤行道得增上果諸比丘作念我曹今日自恣者便須移往餘處恐不得如是安樂白佛佛言若有住處有如上事應作自增益因恣白言大德僧聽若僧時到僧忍聽今不自恣四月滿當自恣白如是謂初安居人至八月半是四月滿也云然至自恣者准自恣犍度中但云十四十五兩日自恣急施衣中有十六日次第增中亦明十六日也所言急施衣者律云有王大臣為僧作安居賞勞衣夏竟擬施有緣急遠行預將施僧諸比丘念云夏未竟不敢受以此白佛佛問夏有幾日在答云十日佛言有此緣者自今日後開前十日受故云急施衣也准此即是七月六得開受若未是七月六日便名過前受犯提鈔意云既言自恣有十日在故知十六日是自恣日也次第增者大德云准律有九重增文搜玄云十重如七月六日得衣至十六日也滿十日便合說淨由迦提月落開通中不犯至八月十五日方要說也若七月七日得越迦提增得一日即八月十六日方說若八日乃至十五日衣得越迦提月增得九日名次第增也謂將後時非日添前得衣滿十日也若有功德衣過五月後增亦如是鈔引此者次第既有十重增文皆至十六日云越迦提數滿十日說淨明知十六日是自恣時也增三文中亦有三日則十四五六也上廣引律諸文有三不同未審的定何日是自恣時耶鈔云律安居竟自恣三日之中取十六日是安居竟日也外難曰既云十六日是安居竟自恣何故律文僧十四日自恣尼十五日耶鈔文牒上難詞了下遂釋通云此謂相依問罪故制異日謂尼要先來僧中自恣後還尼中自恣若先自恣後入僧中便成非法反論尼作相依問罪之法三日通用總得不必要須十五日也玄又釋云反論作自恣法三日通得約其咸論即取十四日故云通用今尅取十六日自恣為定故律云夏竟應自恣受迦絺那衣若十五日受衣不得但呼為非時衣耳故取十六日若尼來時且暫停住何必要須十五日也若有難者如文可知云二至足者如文云二明至也者即三人者法寶云即三類人也不是單三人謂初是五人已上直至百千萬等是一類人也二四人已下是一類也三一人心念別是類故云三人也云就至事者就五人已上分四者寶科為總標二種僧法章一也五人是一已上即六人乃至百千人等分四者即鈔列也云云外難曰鈔科云就五人已上分四者已上是六人乃至百千等分四可爾既五人自恣差五德之法與六人及百千人行事秉法條然不同莫須除却五人但就六人已上分四不答法寶云良有深致謂五人自恣時亦其此四門與六人及百千人不別但第二進不門中差法之時不得雙牒二人名入法與六人等稍別今但就五人便分四科前後三科並同只有第二五德進不一科有異向下路略點出異處即得若不作此科者六人百千人既分四門其五人僧法不可不具雖則第二門稍異下自明之今但就五人已上分科便收得兩種僧法亦是巧用文勢貴免周遮略指相從豈非鈔用思之云初中至明者要五人已上得白差者謂反顯四人雖成僧但作展轉對首法也處床慢相不絕者今在席地以表位卑顯身在罪大德云如以眾人有犯着白私褁帽子在席地或雖有床亦是傳脚下床亦表我身有罪也此亦如是不得在床者謂床坐也證上文故不得在地者謂不可便於地上坐也下引五分布草而坐即證上不得在地故𦼁裎表敬古順吉祥著地表卑合掌表心專一也乃至沙彌亦須赴堂者鈔云乃至則越却中間尼等在別處行自恣者鈔據有別處為言若無別處待意還來僧中對僧自恣也別法明者指沙彌篇也云二五德至法者初六人已上法者齊六人已上即百千人五德進不並皆不異也後五人法者即五德差法與上不同故此科出也餘儀如下更述云云云初中至式者如文云初中至也者一不愛者謂於眾僧無別親愛等二不恚者謂於恐不嗔吹毛覓過等三不怖者前比丘有王臣之力勢既有過罪我心不怖於佗亦須糺舉等四不癡謂解了羯磨如非等五知自恣等者知無難廣自恣知有難用略法又知善兩人即自恣十三難體壞等不合自恣等律文又差知時不以非時等者此五鈔文自釋也意令和合無爭者釋上知時不以非時也謂舉過若不知時反生爭本也有罪非謬者釋上如實不以虗妄也謂犯有三根名如實三根不樂故云非謬也欲使前懺悔乃至外難者彰釋上和益不以損減也故能勸喻等者釋上柔耎不以麤獷也勸喻即是耎言刃之便是麤獷也愍物與樂不欲非法者釋上慈心不以嗔恚也反此即是嗔恚也已上五種鈔自解之不勞別釋也不同古記云云四分文不了者自恣法中但言聽差受自恣人不云二人是一不了羯磨詞中但僧差比丘某甲無差二人處不着第二某甲字是二不了也十誦等者十誦僧祗並云差二人為佛五分差二人更差多人為法已上三律雖言二人及多人儀由未了且十誦差二人為更互作法祗亦同之五分中差多人且不言數或差十人為五對兩兩入法若困互歇息還差二人交替如鈔注文辨也並未了故三千威儀等者鈔取此文方為決了云云人人別差別者古來行事家見四分中單差一人乃秉兩番羯磨差先一人了又差一人故云人人別差也未通諸部者通者達也未達十誦五分僧祗一時差二人文也若五人自恣即要別差若至六人已上何須各各差云但一番中牒二人名字入法故餘文可委云二至持者欲詞如文就中並須言自恣今往往說云清淨者非也鈔更出文本恐迷意知之此律開與不同他部者為簡僧祗不開欲彼云初令扶來二恐增劇僧往彼作若病多僧自出界作自恣也搜玄云歡其文意由是舉罪必須現前若制達心恐叛其罪故不開也亦有通別如上者若云自恣羯磨即是通答云差受自恣人或云差五德羯磨即是別答至後五德行事秉單白時更須重和也羯磨文如鈔云云出三至從之者至上座前者今時例向佛前有人云不得違鈔文今亦可通之未傷大理也單白中羯磨文中加僧字鈔文無僧字不知成不答有即是增無即是減有無並得今時無識之者見欠僧字呵云不成此是歡事乃同於法之輩也不得通用後法者意道不得通用此和秉於後之單白法也直爾通和二法者指上通答並是自恣事已後不要更和此一度便通二羯磨法也令秊少次第行之者玄云其草莫使五德行應秊少行也大德云今多是五德自行違文甚也其五德和了且在僧前待秊少行草遍五德始要白僧也其秊少行草法至上座前三人亦須䠒跪等云云注云僧皆依唱從之者謂五德既白僧就草座僧即一一依之大德云初行草時受了且安坐具上至此時便將草安坐具下合掌各說偈云吉祥童子施耎草如來受已成正覺我等比丘効佛故坐草自恣淨三業出無量壽經上卷也玄記於行草時纔受了便令說此偈今時總如此蓋是未達教文本意行事無所表彰也云四至中者新歲經者玄云別譯五紙今且引增一經云如來於講堂內就草座已告諸比丘汝等各就草座我欲受戒歲無我咎犯於眾人乎又不犯身口意乎如是至三諸無對首者時舍利弗從坐而起白佛諸比丘眾歡於如來無身口意過所以爾者世尊今日未度者未解脫者令得解脫未涅槃者令得涅槃為盲者作眼為迷者路以此事緣而無過咎眾於人亦無身口意犯也次舍利弗白佛言我向如來自陳三業我無咎於如來及眾僧乎佛言汝今都無身口意犯所以爾者汝智慧無量總持三昧戒定慧解脫解脫智見成就所作如法未曾違理如是五百比丘各各受歲亦復如是今准此經意經佛及聲聞聖人尚爾豈况我輩凡夫仿此規模各令草坐也云次至也者注文云僧祗文者彼文云若二人作自恣者一人受上座自恣一人下座前立上座說已下座次說如是展轉但為四分文不了故取祗文一坐一立也問莫犯別眾不答此別對五德一人縱宣己罪復是法差坐立雖乖無別眾也已上正義今有人云鈔引僧祗差二人為法顯四分不了之文若行時之時並須䠒跪不得一座立若依此坐立者即用他文他部事是以今師注文簡濫故云此僧祗文若全取彼一坐立白即合言僧祗云其一五德至上座前等云云既子注出密意不取也今恐不然制表不作變通何局於注審而思之穿鑿太甚也應加提足之言羯磨疏云十律並差二人㝡上座者作五德也下座來至上座前執足口言求聽若是下座不用乖儀式也作法中鈔加一心念字律文及羯磨本中既無所以加添者鈔唯僧祗有一心念之語意道對五德別人着一心念亦有何損其詞句文分五一大德者正告前人求聽說也二眾僧今日自恣者牒僧自恣時也三我某甲亦自恣者下應上法縱陳過咎恣僧舉也四若有見聞疑乃至語我者表有三根垂慈誨示也五我若見罪乃至牒者成我自行念清淨也三說者表師囑之勤非是濫托也就第四句中云大德長老者古人云出法之詞不可雙牒若大者云大德即除長老之言若小者云長老即不用着大德若盡牒二名即是重也今師不然並須雙牒故鈔義云昔云召僧中大德者為大德小者為長老今難之云若爾上座呼誰為大德㝡下座喚誰為長老今云皆呼五德行解具足名大德秊德高遠為長老談名有異顯德亦殊故不重呼若爾何不先呼長老答若無先呼又疑云何不在後今隨言穩便皆得見論之中約大小分者且是一期之言未為盡理如經云長老舍利弗等以為良證上依義鈔正文今行事時亦有說此偈了問成不又有人云說詞了五德答云可爾者並非也隨身所安者律云時有病比丘䠒跪合掌時久病增劇白佛佛言聽病人隨身所安不必預依上座䠒跪待到坐位前說時方要䠒也注云准此等者唯上文約病曲開今或無病比丘即須依上座䠒跪待至座前說偈了復坐故云訖也有解待一切了總方可復坐名為說者此非解也即破十誦家法者彼云從上坐至下座說自恣竟二五德自相向自恣今祗不然各至本位相向自恣即與四分一一次第從上座自恣義勢相開必依十誦之文即太緩故不取也若眾僧說已事訖文也依次十誦可知云若至說者舉得六聚者鈔意令先治然後自恣若舉四重有覆與滅擯治不覆與學悔治第二篇有覆不覆令發露竟自恣三篇已下皆懺了自恣恐稽留法事皆發露了自恣別人舉者已聽許治之然後自恣也舉根不了者實犯夷言殘或聞云疑不能辨也了即治謗罪注云如眾網中者彼云若明不成者律云若不舉不作憶念不伏首罪或無犯犯不應懺罪已悔竟不現前非法別眾二十七非並非法不成也五德舉過等者文相易解云云進不如四人中說者彼云若犯提已下罪莫問自言舉來並前懺已自恣名之為進若犯四人已上偷蘭乃至殘等僧數既少無治犯罸差彼引十誦白亭後待眾滿如法治之不得㝵自恣名之為不指同於彼故云四人法中訖也云三尼請出過法者標也外難曰鈔文於第二進不門首開科云初明六人已上法次指後辨五人法適來既明六人已上五德進不之法竟依科便合辨五人法今此却標第三尼來請罪可不違於前科耶答若向六人五德行事進不門後便明五人法者况新學致迷前文標云就五人已上分四今若於其內復出五人恐有斯親也若爾前來分科何不就僧法中分二初明六人已上法次辨五人法豈不便耶何得總標就五人已上分四如此科之答若合下作此分科便有繁略之失進退不可只如就五人法中若但出差法及五德行事法更不述第一門并第三門又太略新學之人將謂五人自恣不具初一後二之三門若於五人法中更出前後三門者前六人中已辨訖今後重述又是太繁今但於六人已上法中時總出却四門了然後略辨五人之法與六人稍似異處若初一後二同者一如前文辨也是以此中不敘五人之時為此深旨不須同說戒向尼有無者玄云謂戒時向誰遣比丘尼等此制令向擬差人往教使尼眾清淨彼此有益今之自恣自是尼來請僧舉過聖不制向來與不來故不須也若尼來等者此且據同光說也量時早晚令尼還者若日早即且待僧自恣竟若日晚恐尼迴寺不得即上座勅五德且暫住待尼自恣其二五德且各歸本位今時多見在僧前者非也當命之者請令人喚召尼入於僧中也問召入後未說自恣前更要和僧今有人云不用者不達意也大德云更須重和謂前和自是為僧今此為尼豈不和也僧普有舉罪義一人不和尚由不得又如隔日尼來說三事見聞疑僧中亦須索欲問聟不例解云云外難設有傳欲欲詞中為復言自恣為重清淨大德云但云清淨此和為尼但將清淨來應前知為僧即云自恣乃至異日亦然僧已自恣不可重言也思之此謂白日法者即同日法也云今至示者餘同前示者如前云大眾良久等云云云問至故者問意云躡前文不來者索欲等此是尼說自恣不是僧法無別眾因何傳欲等答文可知云云故律云等引證也不得如廣自恣法但禮拜等不得說三事見聞疑名為廣法不同諸家釋云僧既不滿或不和尼眾亦不得歸寺中作尼自恣法只但禮拜問訊等此是錯解思之僧祇教誡中等者祇云明日尼來僧中請教誡人傳大僧中上座教勅使尼歸本寺說尼中有不來人亦令傳欲二彼俱是僧法道理是齊不可偏頗各別但唯此行用請無疑請也犯重罪者十七殘中獨行不許望下篇為重非謂波羅夷重也云四明略說雜行者牒名也云言至等者八難餘緣如戒中者指前已辨是略緣也云云者若至唱等者僧多時熱迮狹等者此餘緣開略也竊語者律中因六群竊語疾疾語自恣佛言非法雙頭者二五德各對一人時說自恣是非法也十誦應從上座自恣等者玄云此是僧祇二十七卷文鈔指十誦是筆誤也逆作次第者謂記解云從下至上顛倒為逆也大德云左轉作次第為逆也如今時食堂中東頭為上今自恣時不然緣自恣是出罪與常途有別如面南寺門在大殿前架鋪設即從殿中門東狹邊為上座位五德行事時即右遶由如禮佛行道時若依尋常排位即是左轉故云逆也行行胡郎反置人如益食法者諸記云有人十行人坐一行著一五德自恣如益食法也大德云此釋有二不了既言如有十行人者夫自恣出罪羯磨疏須兩向長鋪廗眾僧面相向坐中間一行廗不坐人留與五德行事今若十行五行排坐自是非法也此一不了又云一行著一五德者且五德只有二人何處有十人五德且二不了今准法寶云行行置人者由如食堂內坐人作十行五行前行背後行遽互背面坐也如益食法者二五德取自恣時巡諸行內如今時堂內益食不殊也超越者不依次第從第一人越過取第三人等總唱者淮南云如一行有三十人行首一人說云我比丘某甲等若干人亦自恣餘二十九人便不說偈也此不成解今依玄記云一切大德僧見聞疑自恣准彼律文抄出也等者更等取餘非法事也云四分至直爾去者不可閑緩者前來雖有緣難由緩則可對五德略今難既排門是急故不可也各各相對三說者如一百人作五十對各各人別三說文同前法詞句之文與前對五德說不別難事轉近者等作白再說或更急作白一說此有三單白一三說二再說三一說成三也此並不對五德法寶云須知此三約三遍論非謂一度因恣一時作此三白迷意者多不類前略者謂不可比類先前來對五德略也四分六種略說者初對五德有二一再說二一說二一說鈔文前來𨵗再說也二不對五德略有四一白僧對首三說二白僧對首再說三白僧對首一說四不得說應直去都成六略也第六驚急直爾去者寶云據作自恣單白了說但未說自恣難便急至即入此第六略數若五德未秉和僧單白前難至未成自恣略法之數但在增減中攝也諸記中但云難事驚急直去便是第六略並不約其單白前後者莾鹵甚也思之云二至如上者律云惡比丘作留難而且入令浴以同師善友疾疾出界等結小界作之事時希少用故鈔指略也六人僧法如上者謂六人直至百千人總具此四門無異亦是結文也云次至法者恐濫行故者謂此五人僧法自恣於前四門之中前一後二即同唯第二五德進不門差法反行事法與六人有異恐人不曉將謂六人等同故此更辨即前來第二門首開科云二指後辨五人法即是此人也餘同前法者第一僧集緣起第三尼來請罪第四雜法出諸相等並與六人中同也云二四人至也者四人已下對首法者四人未成僧法由是對首已下即三人二人也若犯四人已上偷蘭等者謂一人犯罪餘但三人即懺不得此唯十誦四人為小眾即中品蘭已上無治罸義若准四分滅爭中小眾通二三人即中品蘭小罪懺亦得今云四人已上者即上品蘭也此依玄解但入偷蘭說中者此謂犯其偷蘭罪舉來至僧未及治罸因難驚起名去呼入偷蘭說中謂犯事已彰教中說故也乃至僧殘說中等者謂越却夷罪故云乃至也以眾不足更無治義故也不應礙自恣者謂舉得重蘭僧殘等罪僧數不滿不得懺悔且向停悔罪之事既舉得罪了眾人具知類同發露便得自恣也四分說戒中等者舉例數通也說戒發露竟罪雖未悔且得聞戒自恣中舉罪雖未悔亦得自恣既俱是淨行等者說戒防未起非自恣妨已起罪防過既同故俱是淨行又說恣俱是眾法攝僧功齊約界盡集治罸功齊有犯不得聞戒有犯不得自恣等已自恣准說戒用之有何妨也理須牒其所起等者亦同說詞也二人三人自恣或舉得殘罪者應云二大德一心念我某甲比丘犯某僧殘以眾不滿未得治之餘者清淨此准說戒形勢也不同說戒嘿妄隨罪結吉者實不淨對他稱淨是故妄語前境有三便結三墜不同說戒嘿妄表淨但得吉也云若至前者不應去呼自恣者玄云重吉已上無人可對即無悔義獨自又不得發露故不應自恣約義如此餘依前者鈔意准前心念說戒中彼文云或云發露或云待人者僧祇云若無客來作念若得清淨比丘此罪如法除也念已心念心口言三說布薩犍度又引五百問論合掌向四方僧發露然後廣誦戒本彼此俱是淨行眾法攝治功齊復應牒其犯餘者清淨然後心念口言三說自恣故云三大明雜相者數重問答置是料簡前文未盡之義以決情故也云云問答中初云問至僧者問意可知答中通有治舉義者此約僧法自恣舉得夷罪即擯棄若舉得殘罪有覆即行覆藏六夜出罪等乃至惡作惡說皆得治之加法容得具足數滿二十人並得治之此一向得具足也若但有六七人出殘罪不得棄重蘭准十誦須足八人此即未足故云容有也即不定也故別人雖有治舉攝治未盡者若是提吉即得治罸若夷殘重蘭人少不可懺治未能得盡故但云清淨二云問至也者問意可知答中先說戒後自恣者彼云若五人自恣先誦木叉戒竟次一人起䠒跪合掌請為說罪主說見聞疑罪請他不見見聞疑也引即五德之異名准此論文久說戒也四分自恣即說戒者律初緣中自恣已說戒疲極佛言不應自恣後更說戒自恣即說戒也外難說戒為知戒相防未起非自恣淨身口除已起罪對治既異云何言自恣即戒說耶答已未殊雖意令清淨不別三云問至所明者如前所明者如上四人法中云諸大德一心念乃至清淨三說也四云問至還者離衣者謂前安居人約迦提五利今夏未盡置衣出界未入迦提是離衣也餘文易知五云問罪者玄云四分此處安居受日往餘處自恣亦得祇中不爾彼云此處禮安居餘處自恣越毗尼若受日若一月乃至後自恣應還亦得越罪若道有難畏失命者於彼自恣無罪六云問至也者玄云此是中時僧得施物不簡安居前後彼此之界皆施通一化僧也若僧現前物一向不合以時現前物具四義也一時定同是七月十六日二處定局此界安居人三人定局現前同住前安居人四法定不須羯磨直爾據數分之故知後安居人不合得此物也為未來受者律文以前安居人夏滿遊人因自恣時便分房舍後安居人未滿亦得分不佛知聽為未來故受望身由是坐夏不得輙受今時分冬房後安人亦得為冬分房時受望冬名未來也七云問至之者言不出唇是私竊語是非法不合雖語疾合人不解置名非法也阿難攝眾無法等者此謂僧網中引意同今但例前左者不解即是舉少何得不教云云八云問至等者謂戒中有前後安居人不知前人從後人從前義約從多為之如律中僧自恣竟更有客來多者更須自恣以少從多此亦爾也九云問至德者母論等者彼云檀越請安居安居竟比丘尼為飲食故不云檀越生厭倦以此白佛佛言安居竟過一宿提僧吉又五分尼單提中受請安居竟不去尼亦提若不局夏中謾心而請無犯又寺中巖穴等處一切無犯增一等有證上安居竟不去久住在此心有過患如文已上釋自恣正篇竟次明功德衣法附中云迦絺那衣法先辨來意由前安居進業夏坐有功自恣無𠎝美嚮遐有表裏清潔感動物心對此時中分招福施聖開五利賞德資功儒盡亦云有功賞故次辨也次注文番名釋義梵云迦絺那下引了論番為堅實也次釋堅實之義能感多衣衣無敗壞道若受此衣便五利感其眾多長衣不說淨不犯罪名無敗壞若不受此衣畜長過衣時即犯捨故名為敗壞也難活者論疏云貧人資生短闕取活為難故能抽割少物入此衣功德甚勝也如次須彌大衣聚施者謂釋上難之處以若富有之者減少許施何難但為貧人雖減少財極難以須彌之大施也佛令作此衣時偏就貧人乞求此從所勸施物處彰名也堅固者不破義也若爾與前堅實何別答前云堅實唯能感多衣衣無敗壞則約衣無犯今云堅固者約戒無犯以因衣受利而不犯五種之戒故祇云以因受衣不破五戒名堅固也蔭覆者以受此衣能覆蔭於五利故十誦中詺此為蔭覆衣也賞善罸惡者鈔自解也功德衣者亦如前文釋云云云就至相者如文云初至攝閏者四分安居竟夏功德衣者律緣中十五自恣竟十六日持糞掃衣及持新衣往見佛道逢天雨疲極以此白佛佛因集僧告云安居竟四事應作謂自恣解界結界受功德衣也前安居人七月十六受者簡濫也文云安居竟受衣亦安居前後故所以簡也齊冬四月捨者佛言不受衣則一月受衣既云齊冬四月即十二月十五日也如是乃至八月十五日日亦得受衣者引為破古非也古云唯局七月十六日已外不許何以得知故律云即日來不經宿謂七月十六日即日得衣來便受尚猶不許隔宿豈得更開七日去已耶今師云不然從七月十六日已去直至八月十五日已來於此一月之中日日開受也法寶云此言日日得受者謂約容有而說雖開一月是受衣時其衣只得一度受非謂三十日三十日得受也古人却反難云若言一月之內開其受衣爭奈律云即日來不經宿耶鈔文却牒他所執之文故文云即日來不經宿者下句為古釋云即謂得衣日即受不得經宿今師云謂律約一月之中隨於何日得衣來便受不許經宿非局七月十六日為即日也古來不達文旨致斯濫述問何故律制不許經宿耶答玄記云況成染觸作法不成由如淨地經宿不得作處分法等此亦約施僧了說若未施經宿不犯同他物淨也此釋全非不可將衣以例於食食有觸染衣即不然時人相承多依此說今依蜀云具三義也一恐有慢衣之過二損比丘五利三損施主五功德是以隨日來時便令受也思之故十誦若月一日者鈔文自注解云猶是七月十六日也此即黑月一日故得衣即受約當日說也二日三日者謂十七十八也乃至八月十五日亦爾者越却中間諸日故云乃至隨得衣日便受故云亦然此引文者轉證前來三十日開衣也五分受有三十日捨亦三十日者從七月十六日至八月十五豈非受三十日前安居人七月十六日受至十一月十五日捨若七月十七日受至十一月十六捨乃至八月十五日受十二月十五日受捨問七月十六受本合至十二月十五捨何得云十一月十五日捨鈔文答云彼但得四月利不同四分五月利若依四分五月利則至十二月半楷定謂五分四月利是以捨通後一月故又五分後安人亦得五利四分不得今此中但取他受有三十日為破古人不取他捨三十日但因便引也毗尼母等者亦證上文也過是不得者謂八月十五日去即不合受已落冬分故捨中亦齊五月者十二月十五日也十六已去任運自捨中間轉降可以比者謂極多是一百四十九日極少一百二十日中間降下即不定或一百四十八七六五共可以比類知也不得攝閏者謂開不重開也云二至成受者衣體者即此功德之體也糞掃衣中有二種案律文若是新衣若是故衣故衣以新物揲作淨院以納作淨也邪命者四邪五邪等是諂曲者心貪財利諂詐少欲曲順人情等是不以相得者冬披暑服夏著冬衣悕望人得物之類共激發者於張人前說五人得物意圖張人亦得他不捨墮者己長物也淨者應法者簡上諸類已外如法之名淨乃應此衣體也若過是條故者玄云此明衣相前云五條十隔且約下者為言准得中二衣七條大衣皆得受作榐者尼展反亦有展音也五大色者律文因六群作五大色衣佛言聽用袈裟色即青黃亦白黑名大色青黑木蘭名袈裟色此云不正色也若不割截者是攝葉不許也故爛壞者大德但據尋常多舉爛壞破衣是也覆死人衣者鈔自釋云到塚取來者大德據西土說彼云人死並無材襯但和床移往尸陀林中或與鵶鳥或土埋等去時所將衣服蓋覆屍上纔到塚所不除却迴來即施與比丘俗家忌諱不更收也已上正解竟若依搜玄將故爛壞及覆死人衣却作一收解謂此衣覆死人多時爛壞故到塚取者約改葬換尸上衣取來施比丘引非解也必若爛壞約改卜之衣亦不堪施比丘也又此十誦但據西天以論彼方亦無改葬之事思之外難曰既云覆死人衣不得作者何故前文糞掃衣許得為如法衣體可引注文通云四分糞掃衣等云云前四分糞掃約道途中人棄不用之者比丘收得後十誦據勇蓋尸者即不可也是以注文為簡斯濫故及勇受作迦絺那者謂去舉曾作了今更重作不得若揲葉衣得成者釋疑故來也前文云不割截不得恐人疑云揲葉衣亦不得故簡出也此衣連條但揲葉作隔也及故衣不成者下至一經身著名故衣也如不揲坐具戒云下至一經身坐即名為故不要揲也急施衣者若本受時擬後作功德衣者即不得今文中得者約他受時本無心故後見無即將作功德衣成受也時衣者即夏末有人施坐夏僧衣也亦約初受時無心者得有心不合未曾受用三衣者祇中據雖作了未加法受持或至此日見別無衣得作反顯前文死比丘三衣是己受用了一向不合也若貪利養故捨者謂約比丘見今秊無俗人施功德衣我便不得五利今自捨己衣與僧受作據理比丘施衣即是施主合得成受今云不成者約為利邊不合也五事皆不成者五事即五利皆者也俱一例不成也反上成者無心貪利即許成受也善見七眾衣成受證上文比丘施衣便是於主不為利總得不局白衣施主也隨受一二者意通三衣並得受作功德衣不必如十誦要須是僧伽梨下三衣不得四分編者必綿反又步殄反線次第織遶邊也鈎細即面前背上䩙細條也不著此不成也云三至人者簡人者簡擇受衣人簡選持衣人也云四至不成者注云與欲人者此人既在私房即非僧前不合得五利也有難者十三難人不合受下十誦中學沙彌尚乃不得例此可知也無僧伽梨者律緣中本為大衣重故令受功德衣獲五利今既無大衣不合下二衣闕不妨問既開正大衣今將下二衣當大衣處得成受衣不玄記云律無明決然衣通正從理文合得復有解云從衣當正衣受戒尚開今亦例此也今云不得律開下二衣替處且免一期闕衣壞威儀之失已是一重開不可更開也如有閏受日但得一月不可更含閏受亦是開不重開可不例解思之彼在界外住者前在界內與欲上乃不成況今身在界外固宜不可若住處有四比丘等者外難曰沙彌始受戒成新戒比丘未解羯磨是非何得足數受衣獲五利等法寶約舊比丘解法人教伊但齋久而已即得也一比丘四沙彌者外難曰夏初由是沙彌夏內方始受戒何故得於五利可引注文答云以沙彌等云云若住處等者據此五人並不解法得請外界人來為受但外人不合得利也十誦諸異界僧等者須知此文大意謂前來許外界僧為此界比丘秉法足數受衣唯自己不合五利以異界者不得今未審還許異處僧同受此利不所以鈔引此文亦有許之道理也唯十誦云波離問佛諸比丘安居竟眾多僧坊共諸一界受衣受已一切比丘名捨衣不答隨捨者捨不捨者依准此約後解界時若本要心捨者即解界時失五利若不要心捨者雖解界不出五利依利若依法寶約持衣人數若衣持衣人在界內不離宿眾僧即不失五利故云依利若離衣宿眾僧犯僧殘已下等如文云二至不須許之者持衣人者五德也守衣亦然呼召別知得受不得受了了分明者破安人不安人後安人無大衣人犯殘等人不得受反上成受也應受一衣者謂約一施主衣也詞一施主或三衣來作功德為簡取大衣為下二衣亦得作答十誦唯是僧伽梨下二不許受令依四分並得不局大衣也餘同輕物者玄云此據功德是時中得故輕重兩屬也重物入常住者淮南記云引約施主多𫌏及價直衣即受持錢物入常住如無衣總是錢即將錢買絹帛作衣受之已外剩錢入常住此是時中施故若七月十五日但名非時得施不合分輕重縱有金銀錢等亦須易取輕物羯磨分之若羯磨分重物即是䟦闍妄法也玄記又進退數由施主衣若言施此界前安居人即名時中現前不用羯磨四義定故一時二處三人四法如前已述也云云若言通施一切安居人不同前後者即名時中僧得故須羯磨限約輕重兩分等斷章同此說相疏不作羯磨者非也若施主言持三衣作者寶云謂施主作得三衣來意中欲得總作功德衣即合須縫著同一衣之相也更有淮南東陽釋非正不述也盡與持衣人者謂三衣盡與五德謂施主本意將三衣作功德隨施人意不可違越今既受利曰足此衣即與持衣人准羯磨疏中持衣人並不得五利故將此賞之淮南云但不得離衣餘四總得者錯釋也羯磨迦絺那衣與衣壞者此約持衣人不受即與眾僧之中僧伽梨破壞之人若眾中多人衣壞即如鈔文分別云云如此分明說衣處去有人不達妄釋云鈔文不明功德衣去處已後但作非時僧得物分之等初安居時欲受迦絺那者此約持衣人於初結夏時自僧我情願守衣不受五利僧須觀察如法即許反上為非不許持也云四至法者開二章也如文云四至出者不得說道德作難留者謂不得云彼大德是三藏郢匠莫喚他為作留住不許佗去喚故名難也若自述道德便是自代理不合一萬六千等者彼論云法師云何以於迦絺那衣如是慇勤為佛處讚故往昔有佛名蓮華如來有聲聞弟子名須闍多作迦絺那未成蓮花如來一萬六千比丘圍繞共作此衣故所為所重也云二至上者如是五綴恐有解散故合四攝五綴也玄云若五衣六衣總受者並須橫攝相連合五綴之若留置不受此衣則不生五利不名功德但名時中僧得若不便分入於非時亦須作非時僧得若但作現前分者終不達教也云二至上者如文云二至磨者大德云受衣之時鋪陳坐位與自恣時不同若自恣即五德右遶如殿前架即中門東狹作上坐位今受衣五德行衣是左遶取殿中門西狹鋪上座位也所以爾者若依右遶則行衣不便亦無別理此事最要故須委之云上至之者上座白言等者單白文鈔如云云注云某甲能持者約五德也應作羯磨等者差人白二如文云云問如自恣先白二差五德秉單白和僧今此受衣何故單白先和後方白二差遣答自恣是制作故前差後白受衣是開聽有人不受且無過咎今未審受衣為後不受是以先和後差五德也云大至持者付衣之法也於此住處持者戒疏云為彰此人不得衣利為重此衣羯磨付彼也餘如文云云云彼至竟者當受今受已受三說者准功德衣法中波離問佛為以過去三句未來三句為現在三句受功德衣佛語波離為滿足語故說九句以不以過去三句受功德衣亦不以未來三句受但以現在三句受也所以爾者過去已滅未來未至是以為現在受功德衣上云當受是未來次云今受是現在已後云已受是過去其受者已善受者相疏云此約眾僧受領為彰持衣故云已善受此中功德屬我者五利稱為功德美嚮外彰故曰名稱利不在他故云屬我答爾者持衣人發言許順也受功德衣竟者事畢端恭告竟而退即禮散也云云云五至相者牒章也捨者出也多種不同故云雜相云四至也者齊冬四月竟者十二月十五也又廣明要心失捨者玄云准揵度中有八因緣捨功德衣一去二竟三不竟四失五望斷六聞七出界八共出前六是要心後二作法捨所言要心者據初受衣時約人心久近故曰要心失此衣利故名為捨一去者謂本受衣時要心云我若住此即受利若去即捨功德衣今遂本心去時即捨也二竟者謂受衣時作念我作下二衣竟當捨功德衣今作下二衣既了已遂本心故捨三不竟者謂此人留下二衣財置界內後時出界要心云我若不作衣亦不更還所留衣處既至界外內心思惟我亦不能作衣妨修道業既絕心不作即不還來本處故云不竟捨四失者謂彼受衣時要心云我為作衣故受作功德衣我若失下二衣即捨功德衣今遂本要故名失捨五望斷者彼受衣時要心云至前家求衣若不得至後家求今至前家不得後無後家可續放失六聞者謂彼受衣已要心出界外作衣若聞眾僧作捨衣時我亦捨衣後聞僧捨遂本要心故云聞失七出界者彼受衣已出界外作衣聞僧在界內和合出衣彼在界外冥然不知亦失衣也或有釋云知即失不知不失無此理也八作法共出者共和合捨也過時不捨犯吉僧祇多種者彼律有要心捨乃至作法捨等至臈月等者明過時任運自捨八種十種者五分有八十誦亦有八事捨了論有八大同四分祇有十大同小異非急不明也云次至說者五利通塞者有多通塞若約戒辨者五條戒開是通餘戒不開是塞若據此解猶是各就一邊說也若約時者一解云有衣五月是通無衣一月是塞大德不許此解脫令云有衣五月得受利為通五月已外不得為塞無衣一月為通已外不得是塞也若約人辨者大德云受衣人得五利是通持衣人不得為塞有云後安不安破安等人不得利是塞非也法寶又云眾僧得五利不得衣是通持衣得衣不得利玄記中不解通塞義亦成不了思之是塞准此亦是據一邊說今不依之次注文釋五利者審長財者若尋常十日內說淨不說至十一日地了時犯今受衣竟一百五十日內開不說也二離衣者但離僧伽梨下二衣不得約緣如此三背請者或背前向後背後向前皆許四別眾者四人主同一處而食別他不同亦得無犯五前食後食至他家者亦開不白輙往並得各如前隨相者畜長離衣如三十中餘三戒九十中辨也其畜長十二月十五一時說淨者此約七月十六日及已後得衣至十二月十五日總須便說不得更待明日也不同急施衣次第增至後二十日恣有此迷故此明示也相疏更近十日取急施衣例不達教也縱依例亦但九日況不可也餘有時非時相攝者謂若有功德衣從七月半後至冬末來皆名時七月十六日向前十二日半已後皆號非時云相接者時自𧙕時功德衣接迦提月有三義故一同是時位二俱得五利三本末相因迦提為本功德衣是末也相因者因開一月不足更添四月共成五月非時自攝非時亦具五義一同非時位二同防長罪三本末相因十月是本一月一末也相因者因開十日不足更添二十日共成一月並以長收短故得相攝因便更明不相攝迦提一月不攝十日衣亦有三義一時非時別二寬狹別三本末相因便十日亦具三義如上寬狹者迦提寬十日唯開一長是狹並如隨相者指下三十捨墮急施衣中明也或有鈔本後引思益經文等者大德云此是後代留流妄加不可解釋若有者請除也已上法附竟已上有二不同總是釋第四約法就人辦事自恣篇竟上來有四等收科云云吳越國天長寺長講律臨壇崇福普濟戒光大德賜紫志貞寫此一部焉丁巳三月
