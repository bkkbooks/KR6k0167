body:
  text: 吳越國長講律臨壇賜紫清涼大師景霄纂別類統收三篇分三云云今初沙彌篇有二初標名次依文釋初言沙彌至二十八者先來意然四姓出家咸稱釋氏五衆階級經律具彰前篇雖有事而同遵未顯自行之別相故於大僧之後有此沙彌篇來釋名者沙彌梵語此號息慈與大僧行用全殊故有別行之篇如常行注文等者羯磨疏云沙彌西梵本音東夏翻為息慈也疏中亦有兩釋今言謂息世染之情以慈濟群生者是疏家第二義也疏云有人言初拔世表多緣慈戀故息小慈用懷大哀救拔一切也今言世染之情是多緣慈戀謂世人多慈戀著己之眷屬此是小慈今初拔世表故令息小也以慈濟群生者謂莫簡親踈並懷哀慜是大慈也第二義者疏云有人言息惡行慈是行之始謂四無量心慈行最在其始今既初入佛法即須行其初行是行慈也行慈下釋所以也謂初入佛法多存俗情今令行息除存俗之惡行也準此兩師之意前師約親疏之境大慈小慈以明後師一向約自己心行以明義全殊也問解沙門義亦云息惡行慈與此何異答言詞似同約義全異且沙門息於三界見修煩惱名為息惡證得擇滅涅槃起四無量心慈及一切名曰行慈與此全別也若準唐三藏新云室囉摩拏露迦此云勤䇿男室囉摩拏理迦此云勤䇿女為大僧大尼之所䇿勵也次依文釋總意中云言沙彌至有者沙彌二字廣如上解出俗始者謂初出家即在沙爾之位今建立此是出家之始也創染玄藉者玄妙也三藏聖教故名藉謂此沙彌得小分法故標心處遠者如松柏初萌已抱凌雲之志氣沙彌始學須懷無上之心也自可行教正用承修者謂沙彌別行別教如下五門如是教行正用遵承修學也濫迹相濟世涉多有者凡曰度人要以振侶為心非以射食事資為要雖列法食兩位然以法務為先今若無法但以衣食相資便與俗相濫故云世涉多有也言然至業者信為道原功德母者謂欲出家以信為本故經云以信得入如水清珠能清濁水經云如是我聞生信也五根五力以信為首大乘入道以信為初萬善之原因信而有以信能生無量功德喻之如母也智是出世解脫之因者若人無智不能知煩惱性豈便隨處生染不免轉回今若有正智得菩提涅槃是出世解脫因也今既無信之根本道何由生故曰內心無道也外儀無法者今既內無信智則令外身口七支四儀之中有何法則白頭謂之皓首也向墻者有何處見所以爾者良內無正信所以聖智無因得生也但務衣食養身者便是出家那知戒定慧三學出要之勝業也言故至解者開章也言初至異者如文言初中至法者初中即是出家無緣謂明出家元本之緣誰為先也有作無字釋者非也郁伽經者郁伽長者也佛為呵在家之穢復明出家之法郁伽云居家菩薩當作是念何故名為居家謂斷諸不善根諸不善行諸不善想諸不善塵垢乃至從是當為弊魔所則淫怒癡縛是名居家於是長者請出家佛告云出家菩薩當作是念於衣食等四事常知止足常念精進如大在頭等矣經等者彼十一云出家曠猶如虗空在家迫迮猶如牢獄一切煩惱從此而生也二勸出家有益者牒名可知言華至功德者準出家功德經有兩喻一以四天羅漢受供養喻二起七寶塔至忉利天喻以此二種挍量並不如出家功德所以爾者供養羅漢及以起塔並是有為有漏之福有竭盡之時若是出家修無為法乃至得無漏道解脫涅槃此福無盡故有漏福不及也言智至苦者如蓮華色尼經説者準智論第十三云若人出家破戒後得解脫優鉢華尼本生經説此尼得羅漢果入貴人宅常讚出家彼諸女言我等持戒為難或當破戒尼報言縱破戒但出家女言破戒入地獄云何而可破尼言墮即從墮諸女笑云墮地獄受苦痛云何言從墮尼言雖受苦痛遠有出期我憶本昔曾作戲女著尼袈裟以為戲笑以是因緣於迦葉佛時得作比丘尼自恃端正生憍慢故破於佛戒墮地獄中受種種苦罪畢却得為人今值釋迦出家得六通羅漢若當初不出家今亦不得聖果也醉婆羅門者佛在祇桓時有一醉婆羅門來至佛所而求出家今佛敕阿難為剃髮著衣醉醒驚怪乃却出去諸比丘問佛何故如來許度此醉人佛言此人以無量劫無出家心今因醉故暫發道心以此因緣當得出家成於道果佛因説偈言孔雖有色嚴身不如鴻鶴能飛騰白衣雖有富貴力不如出家功德勝言三至期者謂後人出家即繼嗣前人佛種不斷今障不許望不相續便是斷也猶如大海者謂海無邊際今諸善集身亦爾言四至文者業疏云據論罪本皆由事縛不思猒背師心妄造也見縛者謂諸見也利養縛者由其名利便生有漏因制諸戒為防罪業障三途謂求他過自覆己罪向諸行者知未來實苦決定現在不造因如知火燒湯爛無有內等言五至行者如文言謂至漏者但持戒不至上道者業疏云心無其道道在虗通達纍為本此而不思但持戒善自餘講解修習觀務悉為非戒道此見見取煩惱者謂但專持戒無心存道執此為道作見故名戒取見即非道計道名戒禁取謂言最勝無法能過即執劣為勝名見取煩惱此見是欲界所起故云欲界下業也非上界行者謂持戒清淨但得欲界天身散善所生若生上界要由定力助之故云非上界行也世禪者謂四禪八定是三界內業故云世禪業疏云緣色緣心雖上界業終還生死未有出期如頭藍子上極非想還沒阿鼻後作飛狸等若終無漏出期三界名出禪也故起信論云若修世間諸禪三昧多起味著依於我見繫屬三界與外道共居離善知識所護便起外道見故若出世禪者唯真三昧起味著依於我見不繫屬三界方為究竟出世論云若不修此三昧得入如來種性無有是處未成無漏者謂如上多聞布施等並是欲界有漏之法未成無漏之法言智論至大利者九重想者玄引大般若第四百二卷云一𮌨脹想二膿爛想三血塗漫四青瘀想五噉想六離散想七白骨想八焚燒九滅壞想小利則人天三界內大利則無上菩提涅槃今貪三界利樂不求菩提涅槃是失大利也六行聖道行牒名可知言但至位者要分三位者業疏云然入道經説乃多並隨機緣故藥無準要而舉之不過三種言一至性者明小乘人作性空觀觀事生滅者肇論云聲聞之人悟非常以為謂小乘人觀三科法且約五蘊明觀心至一剎那觀空至一極微分別不得處名勝義諦故俱舍云如瓶水世俗異此名勝義如世淨瓶以慧分梠成一聚極微無瓶之相今觀此身五蘊而成本無實我不可妄生我想也言二至相者謂地前小菩薩相觀空觀也前小乘人但知五蘊四大緣生之性是空未達得其相今此小菩薩觀行漸除不但知性是空於色相中亦能了知色相是空不要滅色求空即色是空故曰知無我人善惡等相謂前小乘人猒無常苦不淨之色而終於空今此菩薩達色即是空不用色外求空與前為異也言三至境者此大菩薩修唯識觀也觀事是心者以其事境皆從心變還自意緣而生分別故唯識云三界唯心等意言分別者意即真得唯識有淨識淨識亦不可得故意分別也言即加行位也此菩薩但以影像緣二取空即尋伺四如實等乃是名言為五識所得名言分別也故攝論下證也大乘五位中初資糧位修大乘順解脫分善從初發心至十回向二願樂位從修順決擇分善回向修心四善根位也初暖位依明德定修下品四尋伺觀觀所取空二頂位依明增定修上品四尋伺觀即所取空三忍位依印順定修下品四如實智觀初印境空次觀能取空復印能取空四世第一位依無間定修上品如實觀雙印二空三通達位即初地入心位四修習位從二地至金剛心此位中修十勝行要七最勝之所攝受斷十障治二十愚證十真如五究竟位從金剛心後解脫道中盡未來際唯佛獨能所作已辦二果圓極故名究竟於願樂位得作影像唯識後三位作真實唯識揀前資糧但作得相空觀也言離至別者離此無別餘法者即初依搜玄意唯結第三入在前科攝謂離此唯識無別餘法故恐乖文旨今依寶云離前三種無別餘法通結前三合在後科收也上二別者大小二乘也如唯識婆沙等入道要門如道整禪師凡聖行集中明也言七至異者謂約三業相對辨也三乘道行如上已明者謂聲聞緣覺菩薩即是三乘人也性相心即是三乘道也行即觀行之心以心見實名道為道行也準業疏云但名三心約行明也此言道行即雙舉也若約鈔論合小而離大小中合緣覺也大中即離開大小菩薩如是之義如上已明令通三乘以意正其所修也不出三學者謂大小乘各有三學即戒定慧一切聖人無不此學行而得果證也言若至途者戒緣身口犯即問心者謂聲聞緣覺之戒但制防身口七支不制意地若犯戒時佛問汝以何心犯若無心即不犯等執則障道者謂執戒為勝不修定慧則成戒取障於聖道又但得生欲界天身故云是世善法也違則障道不免三塗者即破戒人也順教執持則存近而失遠今人則違教而破則近遠俱失兼招三塗惡報也言定至如者定約名色緣者如五蘊等初一是色餘四是名十二因緣皆不離名色色心二法攝一切法盡故論云一切諸法中但有名與色若欲如實觀亦觀名色準此總約大小二乘同約名色更無一法出於名色色為禪門即白骨不淨九想等是心為禪門即觀心無常恩之歸本也以二乘人未窮真體常住故修生滅為理也二乘同觀亦無諦緣之別者謂同觀名色生滅入定不分聲四諦緣覺十二因緣之別也論云二乘之人約虗妄觀無常等相以為真如者謂其力淺未得本覺真如之性但觀無常等相以為真如也言慧至同者義別體同者謂定與慧更無別體約無動邊名定約照用邊名慧俱於一心虗起曰文別體同也舉喻如鏡鏡體是定能照物像為慧慧名雖殊其體無二也故華嚴經疏云照而常寂曰定寂而常照曰慧也言若據大乘戒分三品者約三聚淨戒是也故業疏云戒分三品約義收緣不異諸部何以明之如煞一戒具兼三位息諸煞緣攝律儀戒常行惠念即攝善法戒護前命故攝衆生戒此一既爾餘者例然言律儀至式者律儀一戒不異聲聞者若約前一律儀之戒與聲聞不異也非無二三有異者業疏云寶壁開制戒異若菩薩捉寶不犯聲聞是犯菩薩酤酒則重飲酒却輕聲聞反此有異也護心之戒更過恆式者謂約菩薩起心便犯不假動用身口此乃過於聲聞恆式也言智至戒者謂初地菩薩得真如見道證一分真如此謂菩薩名住實相雖得真見論而無所得之心故云不得一法若如是者正破戒時亦無可破不知得破戒不答意由住實相福上無可作何況更作罪以其罪福皆實相故實相上不得豈更有罪福上不作者玄云非謂不作福但不取相故雖種種因緣不破戒者謂隨機利物雖有種種因緣於戒不破也言人問至耶者問意謂地持勸令取有謂身見有不遣取空佛藏勸令取空謂斷滅是空不令取有兩言何以相違耶答意者地持勸令取空為破時人執有莫總為破病故地持云若人於色等諸法因緣分齊毀滅都無所有如此説者是為自壞世間也佛為存世法有善惡業果報故説寧起身見不惡取空何以故起身見人不謗一切所知正法不因於此墜於惡道惡取空者交壞世人信心撥無因果以是緣故墮於地獄云何名惡取空謂於彼此俱空則無利益云何名善取空若實據見有從緣故有空處見無緣滅故無是名不顛倒名善取空佛藏勸斷滅見者經云著我見人見衆生等見執此見者當墮惡道若斷滅見者多速得道據現雖非善利久後保著心少遇聖得解脫故寧起貪不起嗔者謂貪輕嗔重故云寧起也所以偏斷嗔者謂菩薩度物為心若起嗔便與物隔也故曰違生玄云古師皆説此是地前菩薩要留貪以潤生猶似穀子須以水潤菩薩亦爾假貪愛水以潤生則能隨形六道化物若登地已上乘十願力自往十方界變化而生引導群品不要令潤是以寧起此貪也若爾得起貪不者既云寧起貪不起嗔應當得起貪不此即不善行之貪故生此問也下引智論答如色界諸天若不斷欲惡者上不得生況得聖道而得起貪者欲呵起貪之人對之且云起貪理實而言二俱不可起也五蓋者俱舍云一貪欲二嗔恚三睡眠四掉舉五疑蓋五中既有貪欲上乃不得生天何況菩薩而許起貪也言攝論至不合者引證也菩薩得無分別智者謂初地菩薩得人法二空證遍行真如此真如體是智家所證之境理實真如無其分別由智能證此理故從他境以立名故曰得無分別智也一切塵不顯現者塵是境也謂此菩薩得無分別智更不妄執外諸塵境性相皆空但唯一識之所變用故云一切塵不顯現也具行煞生等者如涅槃經佛務國王見五百婆羅門邪見慜彼故煞是也又如華嚴經説無猒足王以煞盜化人等由前有利益內無染濁所以應行反此不可也準此等者謂未證真如有分別故則有染濁也又如意三昧經云有三種人得反常行化謂佛菩薩羅漢此三乘人不染世間故已外地前及前三果並不許也言涅槃至上者息世譏嫌者謂諸遮戒也以護戒之心寧死不犯與性惡之戒不別浮囊喻五篇全乞喻初篇乞半喻第二篇乞三分之一喻波逸提四分之一喻提舍尼并五突吉羅戒喻微羅剎喻五陰煩惱賊也不動地者玄云是第八地也此菩薩託無相觀相用不能動故名不動離過為名也鈔言八地已上者謂第八地名不動已上即第九地等並是已上也或可淨心地已上者一説云準無著論初地為淨心地二説云準青龍二地為淨心地第二是離垢地離破戒垢垢名為離離垢即是淨心若未離垢內既有染外雖有益物因緣亦不許鈔前準初地已上之義即取初地為淨心謂此地中見法心淨離諸垢染上約經文云不動下約證真見道不為垢染之義初地即得以有利益又無染濁之心故言若至空者小觀相空者能觀之心慧所觀相空令心不動即定謂是地前小菩薩加行位也暖頂二位觀所取空至忍位時却觀能取空此位菩薩帶相修心未得真唯識性故云小觀相空也深觀唯識者能觀是慧唯識之體是定也大菩薩即登地已上與真如合時得無分別智即真唯識性故曰深觀唯識純見空時不分別色者釋前小菩薩也此小菩薩根鈍見空之時一向著空不存於色遂説空寂不度群生以得於空不見有物可度故云不分別色也利知唯識不分別空者釋前大菩薩也謂此菩薩既修真如得唯識觀色空雙遣故云不分別空雖入空不取空為證以具大悲故常度衆生以具智慧故於有而不染故處空而常化物涉有而不迷空恆不離於二諦也言且至已者通結也相似道者謂諸外道頭藍子得非想空定寂謂為涅槃此涅槃同上道似佛教中涅槃也相似善者如調達五邪之法等似佛四依之善也又如外道投坑赴火持雞狗等戒食米齊而活命等並是相似善也上約外以論今約內辨者大乘持戒不見能持及與所持而常持戒修定習慧熾然恆觀而無得無證是真若見能持及以所持而常持戒修定習慧而有得證名相似道若不住色聲而行布施乃至經云不施等是其真善若隨情惠施著相精進等名相似善如此之事雖知難學也少而乖違即是魔業謂邪林也如十住婆沙及十地經中廣明十地論菩薩修身戒心慧方法也以因多聞得智慧等涅槃華嚴並有文也不得頓學者意令先教持戒然後修定習慧猶如大海漸漸深入也三事驗知三道者將凡夫自為二乘兼他菩薩唯為於他三事驗於行人便識三道果之分齊也若論緣事心乖事同者如修一善事事雖同起心且有三種乖別也如涅槃云下智觀十二因緣得聲聞菩提中智觀十二因緣得緣覺菩提上智觀十二因緣得無上菩提事即同望其智心即乖以果別也且知已下結束大綱之意也第二依意隨解中言就至未者可知言初至正文者不須出家者祇七歲者祇云減七歲太小過七十太老縱有所能皆一向不許若滿七歲解好惡者應與出家若不知好惡應不與度若過七十太老不聽出家若滿七十若康健能修習諸業者則許出家若減七十不堪造事臥起須人亦不許度所以太老不聽意者或大小便諸根不禁臥起須人短氣連嗽涕唾惡僧地為人所呵故涅槃亦云老無三種味準鈔過七十若能修習善業亦聽出家須跋陀羅年百二十得出家也已出家不應驅出者謂與沙彌戒也衆僧得吉不應驅出失男女相者失男女根也大乘無所以不容者以大乘中不簡老少二形等但解法師語悉受得戒皆名第一清淨也即顯小乘不許也如稠林曳曲木者非林不容木木自曲礙不能入故大乘雖言無所不容但心邪曲亦難與教理合也欲燒寺等者準見論十七云若有人欲求出家比丘問言汝父母聽汝出家否答云不聽若不聽者不得出家彼語比丘言若不度我我便燒寺若如是者聽度不犯五百問犯重者鈔釋云謂教化令棄背父母及課伇故也如論中得度已下是多論文也若曾經主費錢買得損他財故若但抄得未曾經主即度之不犯經無正文者此是論文許經即無文準出家功德經但云若放奴婢出家功德廣大不言許比丘度等故曰無正文也言僧至亦同者先説苦事者業疏云以世網辛苦多猒求樂初雖許後多退敗故經論中有現在苦未來樂者即出家人是也一食者業疏云佛教之中一食為本託緣開二不是長途西域至今常行一食也一住者一説云獨住也二常住坐也業疏云一坐跏趺周時方起自非味重何以致斯一眠者夜三時中二時坐一時眠等少食者謂節量食也多食致病苦等多學者慧心常運不許浮散須乞畜衆者玄云多不自量故欲受時先須請乞住僧籌議也具德如度人法中者謂指受戒楗度二師德有三一簡小取大謂十夏已上二簡愚取智謂明間律藏三簡惰取勤謂能勤教授若不具此三即不許有人言尼須乞畜衆僧何不見制者此未讀正律文下結僧罪故知同須也名驅烏者四分初緣中有比丘將兒出家入村乞食至市肆中見食輒取招世譏責佛言自今已去不得度減十二歲者此初緣也後阿難有檀越家死亡承盡唯有一小兒阿難憐慜欲收養之恐違佛制故不敢佛問此小兒能驅烏未答能佛言若能驅烏聽與出家作沙彌因號驅烏沙彌也應法沙彌者謂年十四至十九正合為沙彌正應沙彌之法故名字沙彌者年月既登合受大戒非沙彌位今但假號沙彌故云名字也五百問等者彼論云比丘本俗時共父母兄弟藏物出家之後家內人死盡比丘還自來取犯棄若有所親白衣可語使取作福應半與官何以故此物無主應入官不得全取鈔約不得者以初出家時一切總捨非己物故今取同盜也出家之前侶家債息亦準此判故云亦同也二作法中牒名可知言欲至二者度巧師兒者律三十四云時有巧師兒來求比丘出家比丘不審問便度之後父母來僧中問頗有如此兒子不僧皆云不見彼自尋訪得遂譏嫌舉事白佛佛言自今已去若欲於僧中剃髮者當白一切僧若不和合者亦須房房語知已乃為剃度令問答無失故注文謂剃髮及受十戒二師者剃髮和上阿闍梨及受十戒和尚闍梨也玄云依之出家和尚也準出家和尚十戒和上大戒和上一人經三或三人各一闍梨亦爾也設法中言應至經者覆地香水灑之表云火殿向東邊露地或西邊亦得但不許背佛也周匝七尺四角懸幡者解之都只要七尺地也今云一面各取七尺四角每角著一竿小竹子上留二十葉以彩繩子繞之開前一面恐妨人出入三邊皆以小幡子繫著繩子上懸之於中立一卑座擬欲出家者坐又設二勝座擬和上及剃髮師坐即先教欲出家人向佛前禮拜拜了却行下殿前鋪席拜辭父母若父母在他處亦須望本鄉拜之然後説偈等如文中也若自不解説旁人教之亦得云云云來至經者論云度沙彌時和上應説五種之法謂髮毛爪齒皮此五和合共成此身無有實法令生猒離所以説者有人前世曾修此法今髮將落便發先業得阿羅漢果是故先説如羅睺羅落髮未竟得羅漢果等餘如文言與至等者周羅者玄云是梵語也此云小結或云胎髮謂諸小兒剃頭多留頂髮故小結者如外道斷下界或盡無色界頂有少餘或名曰周羅此外道頂上留少許者謂表此一地或未盡也今亦效之剃髮表出三界業無上界或留和尚除之大哉下説偈也云三授至相者如文云初至中者一人不合者謂須得一和上一闍梨不得單有戒師遙牒和上名入法也禮僧足者以我貴頂禮彼至卑之足表敬重之甚矣互跪者身既翹仰表敬之極理須右膝右足足指三輪距地曲身前諸是本儀也合掌表心專一無二緣也捉師衣角等者玄云十誦中説目連將入定觀往業騰空而去令弟子捉袈裟角也又出要律儀云捉師衣角者未可依承若準十誦明目連將弟子觀往業遂令捉衣若受戒即不用也此蓋是十誦中古師妄行也律文似對僧所者唯律文中似對僧為受十戒謂律令集僧已作白等似對僧也五百問又云一人不合即非對僧若別處受戒即不須作單白也理須生其戒善立發戒緣應問遮難一同僧法玄云準與沙彌戒要問遮難但五逆中不要問破僧之逆餘四須問也云二至三説者羯磨疏中分之為五初某甲陳己名也二歸三境三別指所重言隨出家四親依有本即和上也彼此相攝寄法傳心五如來下恐濫餘尊非同別部調達師也結文可知説相中云盡至二彰者八指已上者即尺六已上名高床也然大約有三據相即八指已上也據體即金銀像牙角也據位即佛羅漢緣覺和上也梵漢二彰者祇云生色者金似色者銀似由像也故知生像是梵語金銀是漢言文中雙故曰二彰也言四至行者是得七支者羯磨疏云據論業體具受七支如律文中大小持戒并餘遮戒者疏云説境同僧謂情非二境何事非持等餘如文可知言次至故者懷佩道者佩謂帶持義也應法服者道俗路乖反形易性也委奇身命者謂寧死不犯也無適漠者論語云君子之於天下也無適也無漠也解云適厚也漠薄也謂君子乎視天下無厚薄故佛法亦爾四海為家誰可親愛故至求大乘者奉行極教兼濟於他斯德始終通於五衆俱堪物養人天師範故使誦持無置輕脫受體及形服也次六念中如文次十數言僧至數者列名也言準此等者明對治也云初至故者初破自餓外道者指前一切衆生依仰飲食而住也以渄粳下辨自餓之相也佛言一切有情須依飲食而住我於菩提樹下獨悟一法外道聞之撫然大笑以問如來因茲與説四食假此資神乃得聖果然則離著為本汝今不識道原便將絶食為道者非道也為對治此外道所以五第一故二為破自然外道者指前名色也此輩外道計一切皆無其因如犢子下辨所執相也佛言不爾內報外報皆有本因故立第二名色也五蘊成身四蘊心心所是名一蘊是色心不可見只可談名故在胎時三十八轉九月便生託彼胎藏可是自然耶三為破梵天為因外道者指前痛癢想也自在梵王等者正辨彼所計之相也外道執云以劫初成時梵天創下始有人物便相認作尺子豈不由梵王為因今有嗔恚還因彼天故佛言不爾故立痛癢想此蓋依古經論文也痛是苦受癢是樂受想是捨受無因三受而生不由彼上以初一念緣色之心名之為識了達染淨名之為想領納違順名之為受由二想故便生三受故便有三行故長輪歷無有了期四破無因果外道者指前四諦也如草木等者佛言不爾凡一切法有因則有果故説四諦如苦集二法是世俗因果滅道二諦是出世因果凡夫造於集因招於苦果聖人修道為因感得滅諦之果豈可無耶問此無因果外道與上自然外道何殊答前自然計一切物不為物造天然自有今無因者直是全分撥無因果義有別也五破神我外道者指前五陰也執於身中下辨所計之相也彼説大我遍虗空小我在身中如麻米許潛轉作諸事業知有冷熱行來去住皆由其我也佛言不爾故立五陰治之即涅槃云色亦非我受想行識亦復如是我在何處為在色中為在識中計此身中但有五陰計我則有五如是離合次第求之覓我不得便悟妄執獲無我理分成無漏想似聖人六破一識外道者指前六入也如一室下正辨所計之相也彼計一識遍於六根猶如獼猴窺歷六𡱈無識之人謂有六識其實一也亦似根門乃六一識通行佛言不爾若但一識豈向眼根內聞聲今説六入以對治之七為破不修外道者指前七覺支也以却順下正辨所計之相也謂此外道以得五通逆順觀過未各齊八萬劫八萬劫外冥然不見境呼為冥諦涅槃舉縷丸之喻一切衆生端拱任運至時生死自盡自證涅槃不要修道也佛言不爾須方便增修故立七覺支一念乃至第七捨覺支此七覺支簡釋正理云有至詣豈可不修而獲果證也八為破邪因外道者指前八正道也或持下正辨彼所執之也彼見雞狗牛等報盡遠業將熟生彼色天不知他是遠遠善因將謂是今修證乃效彼噉不淨之物等為戒乃至修世八禪用為涅槃邪進邪慧皆爾佛言不爾故立八支聖道語業等為聖道之因並乃資神者超世表九破色無色天計涅槃外道指前用九衆生居也以二界下正辨彼所計之相也謂無想定在色界頂非非想定無色界頂彼二天滅心心所法皆盡既若無心心並沉沒分粗心不覺便是大理故説此二號曰涅槃也佛言不爾此是妄心外人不識夫涅槃者寂寥虗曠不屬色心此乃三界九地衆生所居何名絶有之法故説九衆生居對治也所言九者四禪四空處為八更并滅受想定次第定便成九也十為破色空外道者指前十一切入也以外道下正辨彼所計相也彼六行斷惑欣上猒下欣初禪觀欲界如癰瘡毒箭等以色破欲有也又猒四禪欣空處謂空為極以空破色有也佛言不爾今立十處但是根塵相入識想分別實非涅槃也蓮用多少者如依初禪作青觀之時先觀世界一點青色漸漸廣大遍滿天下即是青遍一切處三昧餘皆例爾後却退滿初觀之處若得純熟大小自由斯皆想得依上三禪亦爾次上界漸細不以色為禪境即四空等空之與色皆是禪境不可計為涅槃若見有境便是虗妄實唯識之所變故曰實唯一識也佛言此十並是心心所法濟入之處故説十一切入非謂涅槃也無色如大海除廣不能度者如今人欲過海東者此是小海凡夫能度若是鐵圍邊大海則非凡夫能度今欲色如小海無色喻大海可知言此至等者準祇云應問彼誰是汝和上誰是汝餘師沙彌有戒應數有幾初名何等如此問之則用光正道以驗邪人也餘文可知四明隨戒相言沙至所存者自然遠近者謂沙彌在六種自然界中作法亦準大僧法則通局集沙彌僧也了論憂婆塞別界者如前結界中列十七種別住處辨也別者有施此界不施彼界一同僧界施也所對人者古師云沙彌衣鉢説淨受持安居等法皆對大僧作之今師不許但自對沙彌也兩不相足者大僧沙彌兩不互足如何作法必無沙彌即自心念也亦隨處存者又進退解也若大僧境勝無人不可下求沙彌一向非分若沙彌無當衆即苦求大僧亦應通得但勝求劣即不可劣求勝無爽故有此釋五百問論半行來又有鈔中開今云合有次明秉法類通衆別者謂類大僧衆則衆法別則對首故類通也言先至之者請二衣施主者謂真實展轉也以沙彌戒中不許捉實等正同於僧不得自畜亦須請白衣為主故若犯長等者同僧三十中皆犯捨墮不受十戒沙彌在界非別衆餘如文二明衆法通別二途者標列可知言若通至出者如文云若別至中者誦沙彌戒經謂愛道尼經者玄云觀其文勢似愛道經便是沙彌戒經若準諸經目録自有沙彌戒經一卷別復有大愛道尼經二卷故知別也今有釋云恐是鈔筆誤理合云誦沙彌戒經誦愛道尼經錯書謂字也此解應好思之云若至念者説僧自恣之文即沙彌互跪向五德説僧自恣句若沙彌別處自恣五德須往沙彌所作自恣也以犯舉兩通者謂兩衆俱有犯罪義有罪須舉故須説僧自恣文也餘文可委五雜料簡言其至罪者知淨不淨者長衣説淨未説淨等餘如文云五至行者如文上來多義不圓總是沙彌篇竟從此第二尼衆篇文二初牒篇次依文釋初言尼至二十九者來意者沙彌之法上篇統收約尼別行却未彰述但尼女多迷事須分曉若不委録機教莫同故立此篇秉為龜鑱釋名者尼僧和合名為衆與僧全異故曰別行軌範有儀稱之曰法篇如常解注文尼者女也者西土有二十四聲今尼是女聲收之今言尼者訛也若依諸記中解云尼是梵音此番為女今不言女但云尼者以女字有濫故存梵名舉例如羯磨番為業等云云河摩母等者梵語摩訶波闍此云大愛道蓋存舊語也若準新云摩訶鉢剌闍鉢底此番為大生主大是衆義一切群生皆是佛子姨母是佛母群生荷賴故又準佛本行經説姨母是遍覺長者之女長者有八女第一摩耶第八生主同事淨飯王餘六二女事斛飯王二女甘露飯王二女事白飯王今斯愛道是最小女佛親阿姨如來生後七日摩耶命終便是姨之乳養故稱為母也蓋亦敬重極故次依文釋總意中言比丘尼至也者細行衆多者謂略則八萬四千廣則無量無邊故云多也有無輕重隨事己分者且大分為言如僧有二百五十戒尼則三百四十八𠝶有九十八條唯尼有僧無如二不定輒教誡等僧有尼無又如漏失僧重尼輕如摩觸戒尼重僧輕隨其有無輕重及別行衆行等事鈔序已曾分出指在此篇所明故曰己分也今簡取唯別者正明述作此篇意也謂於有中輕重之內與僧不同是唯別者作此一篇若不簡唯別之者立為此篇臨事披撿不知處所即是浮漫今若立此篇明即不浮漫也云所以至後者釋上立篇前後意也所以在沙彌後者徵也意云已受大戒沙彌但受十戒今何故却在下明耶智論已下正辨所以也謂尼得無量律儀理合在先今在後者似儀法不便也云云次開章中言就至衆者如文云前至行者列門也初中者且於受戒中也云前明至也者尼滿十二歲者業疏云加僧二歲者顯其志弱纍年為德律文為尼愛畜弟子因制二十餘戒年年度人不能教授多違犯故隨度制畜衆法令衆量之以尼滿十二夏方聽度人違則犯墮僧滿十一夏有智即聽違便犯吉也依止式叉沙彌尼吉羅者謂大尼未滿十二受他依止等皆犯吉也搜玄云此通約畜衆亦不準受戒故一年之中唯得四也唯隔第二年復得畜四初年須法第二年畜義須重與畜衆法也二受戒言次至中者文如常引者謂尼受本法初請師乃至尼中白四羯磨之文如常引用羯磨本中略不明也更有前方便僧中受五戒了尼中受十戒等一切依常云云有人言尼受五戒當衆自為受不必僧中今多是大僧中與受者此應是尼不解受故令向僧中也意不然未曾見有教文令尼受五戒必在僧中若言尼不會者本法亦乃作得五戒豈曉耶但出非法濫相者謂今鈔文但舉非以顯是欲使識非而避過也謂本法尼與大尼相濫之相故下戒體立緣示耳此中舉其八法略題請師者欲明阿姨與僧異之所以也此學佛召愛道之號者業疏云如皇姨皇舅等國隨天子所呼也以正要急者謂以此問遮難正是學戒家要急之事故須子細恐不成問答不相領解不納戒故具依常法者俱依律文及羯磨受戒常法不得差互若互不成受也餘如前受中者指僧受戒篇八法調理等云云云初緣五分者下自列釋也云初至之者即日往大僧中等者謂今朝受本法當日內便須往大僧中無過若明日往者以經宿故犯吉也問既經宿失本法不答業疏云不失由制令捨故知在也古來妄解經宿失者非也若爾舊法既在但用即得何要捨故受新答以違佛制義有涉疑故須捨也端正難緣者五分中説此女名半尸迦先是淫女十誦云此女端正價直半尸迦國金寶後欲於佛法中出家欲往蘭若處伽藍中受戒有賊伺捉此女遂令信為他受戒等諸記中多於此處辨明三師之義章門今意不然前受戒篇中廣明十受處已敘説了此但是引證之文不令更述思之又師資傳云夫大海為王百川自到大師為匠群萌自依俗禮亦云禮聞來學不聞往教俗曲立制尚然況三寶尊高豈輒輕忽也有人就尼寺外等者鈔意商略既非尼本寺即合得戒然詳其意特為尼來僧得違教吉云問至也者本法者尼先作此法是大僧羯磨之本若無此法不得輒加餘文可知云二至乞戒者如文言三至非奪者有人不立此法者古人云尼來僧中全不秉法又尼不足大僧之數何假結界故云不立此法也然此下鈔意異古須結所以也非界無以攝人者古人若云尼不秉羯磨不要結者且大僧於僧即成作法界於尼但是自然如何攝得尼護別衆過耶雖不秉法亦須結作尼界自攝尼僧也本法尼且置自然外者此約尼來僧中結界之時其本法尼為戒未具不合得聞羯磨既亦得名比丘尼故不許在自然內所以且今出家也故業疏云此尼不同下衆全未得法故須消息中間人也下二衆者謂式叉及沙彌尼與同處即無妨亦令小遠不得聞羯磨之聲也又如尼懺僧殘下舉例成立前來須結之義也中國僧來不共非奪者謂西國傳法之僧覺明三藏真諦等並是賢聖且不云不要結界非斥其結也云四至説相者如文言五至請者準前須請者準尼中作本法須請戒師今僧中秉法準前尼中亦須請也言以外至之者體謂白四羯磨相謂八重乃至四依一如僧中行之前之四重一一喻顯並同僧故後之四重還前種類就四依中樹下依者非蘭若中尼輕易陵不行此教何妨餘樹行頭陀行如五分四依無樹下坐段為粗弊臥具也次懺罪中言二至同者覆藏全無者謂尼犯殘行悔縱覆百夜五十夜亦不要行別住以尼不許獨住故但改僧六夜制限半月二衆中行摩那埵也若行時別白白時須集二部僧一時白不得唯白一衆也如中卷列者指懺篇廣列儀則唯當部自結者謂前懺中唯明僧法今於二部中答須結界故自結界自攝并稱大姊為異耳三辨説戒儀中吉善至同者善見初緣聽往尼寺受教是未制前即日暮戒也後聽僧往尼寺者謂制後輒教授戒也四分雖無其文引上二戒辨意同也為人譏嫌如隨相中引云云言若差至已者主人者簡非客不知僧得滿缺等無病者簡有病不能赴集故有智者簡無智也及此不聽者若初不告語最先入寺看者提後入無犯不白入舉一足越二足提比丘入尼住處亦爾言至至律者如文言問至訊者要須僧尼二衆各滿和合無病乃得差請若二衆各互不滿及病不和合者並禮拜問訊也所以爾者謂差請之法須秉羯磨若一人被差餘四成衆各若不滿五人即不可也下文亦自述之若尼來欲應受者祇云誰與比丘尼取欲取尼欲人應至上座前偏袒右肩合掌作如是言比丘尼僧和合禮比丘僧足與清淨欲等不得述己道德者祇云囑授應受除五種人一僧中上座二教誡尼人三半月念戒人四守房人五病人若言我是乞食頭陀大德等得越毗尼也本疏指首疏也餘如文四辨安居法言四至通結取者請問布薩者祇云比丘教誡尼時應如女想比丘尼於教誡如佛想是名布薩問布薩法也通結取者謂來去無障不破安居也五辨自恣中言五至中者往大僧中曲身低頭謂須在上座前今多在佛前者違教也如上自恣中者前云良久默然等云云差二剿了知法者此十誦文也彼羯摩磨二人與四分有異今但取剿了簡非遲滯知法簡非愚教意證前文不取二人也言問至僧者但欲或色益壽者大愛道經云佛告阿難受具戒當由比丘僧若衆許可乃得若一人不肯亦不得所以爾者由比丘僧而得成女沙門佛言女人多欲態但知欲或色益壽畜弟子不令他學問只貪愛門徒是或色也被此色聲所或貪他供送餉遺養於身命故云益壽此蓋目前片時之事故曰須臾不知脫離生死求大菩提故制依僧云有教誡之理六辨隨相中言六隨戒相隨尼之戒解釋相狀也言尼至出者尼八重前四與僧同不更列之云摩觸戒者釋名以手捫摸名為摩觸此是為防戒是能治能所通舉故曰云云緣起者佛在舍衛國時有偷蘭難陀尼共大善鹿樂長者各有繫意長者設食請時到諸尼總去唯難陀尼不去長者知不來便疾疾往寺至尼房犯捉以手捫摸被守房小沙彌尼窺見乃至以事白佛日此制戒也制意者夫出家之人業然物外離染為懷今受彼染心觸於重境女人志劣大惡臨危大聖除防故以制也戒本六句一若比丘尼能犯之人二染污心共染污心男子明有染心三從腋已下膝已上身相觸明境犯也四若摩若牽若上摩若下摩若舉若下若捉若捺明犯相也五比丘尼波羅夷明治罰也次釋鈔言六至重者腋下腕後者前就身辨分齊後就支中辨分齊若準祗律肩已下犯通其四分腕已後者即取祗肩為分齊何獨於腋下耶餘如文云尼至罪者僧不問染淨者謂不問前所觸之境有染心無染心但使自有染心往觸著便犯也隨處得罪者重境則重境則蘭也不犯中言四至罪者四分同僧中者彼云若取與時相觸不犯若解救為難緣一切無犯染心等不犯也非無吉羅者約非威儀説也云云八事成重戒釋名者捉衣等殊名之為八鄙惡之過曰事此是所防云云緣起佛在舍衛國時難陀尼與沙樓鹿樂長者先各有染心共入屏處乃至共期招譏故制也問前戒何以繞觸著便犯此戒因何滿八方犯答前據染心厚重此約染心輕要假滿八方犯也戒本六句一能犯人若比丘尼二明染心染汙心三明知知染汙心四明犯相若捉手捉衣入屏處共立語共行或身相倚或共期五結犯是比丘尼波羅夷六明治罰不共住次釋鈔言五至犯者列緣也犯前七事未懺者謂若犯七事懺七蘭了更作第八亦不犯重今犯前七未悔續作一事便成八滿即犯重也言八至此者注文以後是重者謂簡境也若腕後即犯前戒一觸成重不須至八也今云捉手是腕已前輕也三事亦爾者四屏共立五屏處共語六屏處共行為三事也犯八捉手不成重者謂前後八度皆是八中一事未成重也若一男犯八等者此有四句初句約人第二句時一第三句時八第四句人八俱皆一重也不犯中言不至犯者謂律中若有所施與若禮拜若悔過若受法入屏處共住立語行若賊惡獸來曲身避因而相倚不作惡事一切不犯若爾何故下單提中入暗室犯提鈔通云由無所為等也覆他粗罪戒釋名者知彼犯重故意藏隱此是所防云云緣起者佛在舍衛國因難陀尼知妹尼松陀舍難犯重恐外人知覆藏不説後妹尼休道方説向諸尼諸尼舉過因制戒也制意者出家之人共修淨行見他有犯理合舉陳初有隱心後方言及過中之甚是以聖制戒本七句一能犯人若比丘尼二知知比丘尼犯波羅夷三明白心知自不發露不語衆人不白大衆四明有心若於異時彼比丘尼或死或被舉或休道或入外道衆五明緣等後作是言我先知有如是如是罪六明能犯是比丘尼波羅夷七治罰不共住次釋鈔云六至便犯者列緣也二犯四重已者若準第八多論説尼覆七波羅夷但得提若覆淫夷即結重今則不然四作覆心者此約覆他重罪之心若自犯重自覆但蘭耳言若至也者如懺罪中者如僧殘中若犯殘已無人可發露不名覆藏有八種不成覆如彼説之十誦若尼被舉等者此約知他尼犯已未得發覆便自被舉或狂等皆不成覆為舉不足他數故所發亦不成發也餘文如彼説捨心相應者謂慈心捨前人所犯之罪更緣其犯亦不作覆彼罪心得捨前二心如此相應者不犯又解但畏二難情無愛憎故名為捨也無記心亦不犯者謂約他不作覆心在無記時故不犯若擬作覆心縱在無記睡眠心中亦成覆藏者下出相狀也言若至悔者不成者謂界中無清淨人也縱不説開不犯謂非清淨者謂所對之人也若對先知二俱有過者首疏云若欲發露覔未知清淨向説者成若對先知二俱有過名須露故不成也此相稍難曉今更指事説且如張尼犯重了王尼如張尼犯便為他覆不説也向人後有李尼亦知張尼犯重便向王尼處發露者故不成也由此王尼既先來知與他覆罪自是罪人不可更受他發露此二俱有過各須發露故不成也反上不合者若不識能犯尼姓名罪種相等並無犯故云反上不合也若前人受竟者者應對一人説便止也無窮過者準祇云不作發露之心而但向他説也又轉説如此無窮雖説不免覆也故彼文云若比丘尼犯重應向人説若共行弟子依止弟子犯重師作念云若向人説尼僧必當驅出以恩愛故覆他罪自身得重是尼復向餘尼説某甲犯重彼尼聞已復作是念我若説者二人俱被驅便一向覆藏俱犯夷也乃至百千人皆重故知不作發露之心雖然口陳亦不免犯根本無過者如一尼知他犯即作覆心而不犯者早自發露竟能覆之人無犯猶根本已彰故言四分至重者如文言不犯可知八重之中後四戒鈔但解前三其第四戒時希少用故略不述然略説大意謂大比丘被僧所舉尼倚八敬隨順祇舉比丘故其已僧三諫不受故犯也言隨順有二一食二衣食問隨順被舉比丘即須設諫若隨被舉比丘尼尼僧用諫不答隨順被舉大僧即要諫若隨順被舉尼不要諫若爾一等隨順何故不同答佛制尼恭敬大僧濫故須諫尼是同類無濫故不用諫也言十七僧殘中等者此十七戒九戒初犯八至三諫犯九中前二謂媒人二謗也八中前四破僧助破汙家惡性此七同僧更有十戒不同一言人二度賊女三輒解舉四四獨五受染心衣食六教他受七自親近住八勸他親近九嗔心捨三寶十發起四諍前六戒初犯後四違三諫今文略指媒嫁二謗同大僧中當世盛行故略指出破僧等四時所不行但略舉大綱故不指也後十七內只明言人四獨蓋是當世現行種相難知反顯餘八戒種相易知及時所不行亦略不辨也言人戒者釋名手疏諸官故曰言人此是所防云云緣起有二初佛在舍衛國有尼在一處住居士為尼造一小伽藍施尼後尼捨去居士復死居士呪乃耕此地後尼却歸不許耕之彼不受尼語尼乃詣官言人官罰居士兒財物入官為俗譏呵等二因波斯匿王小婦作一小精舍施尼尼後時往人間遊行多時不回小婦又將施梵志女比丘尼後歸熟索梵志女云此施主施我尼乃詣官言之官及問尼言其事如何尼不會理妄答云地屬王處屬施主斷事人云處既屬施主施主與彼今何更覓遂判與梵志女諸尼又白佛佛語王言應還於尼先施是施後於非施王依佛語却與罰斷事人錢物入官招於譏責是以制也制意者出家之人應懷四等今內發不善往俗言人違慈既深是以制也戒本三句一能犯人若比丘尼二明業相諸俗官言居士若居士兒若奴若客作人若晝若夜若一念頃若彈指頃若須臾頃是比丘尼犯初捨三法犯僧伽已下次釋鈔言四至蘭者若斷事人下手疏者搜玄云西土別有斷事人還如此土司法及大理官不別者就此方説但隨處經官處手疏即文帖等是口説者不著文字也若被奪物就官乞護者謂尼弱被賊劫物去官自為撿勘尋逐得賊却還尼本物尼不犯若人入寺等者見論云不得奪刀斧及損壞設壞應計直還價若不還計直多少犯餘人者非斷事人也但得蘭耳四獨戒者釋名者行宿等殊為四無伴相援為獨此是所防等云云緣起者初獨渡河佛在舍衛國有尼高褰衣渡水到岸為賊所嬈也獨入村緣者佛在舍衛國差摩尼去寺不違少緣獨入村招譏也獨宿緣者佛在舍衛有尼去伽藍不遠少緣獨入村宿招譏也獨行緣者佛在舍衛有尼從俱薩羅國曠野中行常在後諸尼問云汝何故常向後行彼云我須男子諸尼舉過乃至白佛因制也制意者尼是女弱入俗招譏無伴援行易生凌染以斯多過是以聖制戒本三句一能犯人若比丘尼二明犯相獨渡水獨入村獨宿在後行犯初法應捨三法犯可知言獨至故者辨獨度戒也今準道行之戒者四分尼律中但云獨不能度又犯緣中俱言隨淺深高褰衣共度並不説寬狹淺深分年鈔準當部道行戒文但使行須褰衣脫鞋襪異陸威儀便成犯也前尼疾疾入水者準律文有兩節初是前尼自入水未度但得蘭才上岸隔水故殘後尼入水偷上岸得前尼為伴不犯上是律文今準文意謂前尼自先上岸後尼猶未入水前尼上岸了後尼方入水致有斯犯也第二節文前尼先入水後尼未入水前尼犯蘭前尼未上岸後尼已入水後尼不犯前尼不待後尼前尼先上岸蘭後尼上岸不犯已上律文準此前尼得兩蘭謂先入水先上岸俱非隔故後尼無犯者謂後尼初下水時得前尼為伴上岸時復得前尼為伴是以俱不犯但是前尼有罪耳故律云疾疾入水上岸不待得伴蘭應時入水一時上岸方無過也隨深淺褰衣者緣中只為高褰致遭觸嬈今若隨水分齊勿令身露至岸下衣即不犯也四獨度河犯者問此莫與前第二緣有濫不答乍看似濫窮旨不然第二緣中發意擬獨度雖則入水且未上岸第四緣已度水上岸了故下釋云謂後伴隔水便犯也言獨入至罪者辨獨入村也初緣有兩節一正辨相二四分下辨獨行不問界內外者界是作法界也藍是自然以律但云詣村恐人執云須是界外藍外白衣家方名為村故有此釋舉例如非時入聚落寺中諍人院亦犯等云云坊內獨行犯吉者若約此土同一坊巷內同一家大宅內離伴獨行但犯吉也又如二尼同在一家內一尼在堂前坐第二尼獨向他上房下間厨下等巡行亦犯吉以是家內故不犯殘若準祇云若到聚落城邑界時應須相去申手內若申手外一足過蘭二足殘一人中間蘭謂兩界上城邑界或二州二縣界或東西二村界或諸坊巷界是也引此文為證上四分獨行一界合是妨內或是一家內若過此界得殘也無緣者謂無二難緣也或可無伴命終之緣也隨有橫道者古來多約其橫道為界欲入村門越此橫道名為越界所以犯也諸部無文者鈔斥不許準律無界獨行一鼓聲聞離伴見聞即犯此一鼓聲間豈無橫道何曾制犯皆約村門限為分齊也若村內先有尼不犯者亦約在見聞處若離見聞處獨行一界亦犯吉也言獨宿至結者辨獨宿也俗僧兩處者謂或在俗舍及本寺中安床並不得在申手外無病又不許二人共床臥隨脅著床敷一一提又不許同被褥又不許兩床相合如俗舍雙床應須曲尺丁字安床至於蚊蟵等亦爾有人云應長速安床似今禪堂中者非也隨床一一結者若申不相及一轉一殘起而更臥亦爾言獨至蘭者辨獨行也玄云鈔有三緣初在道行二或中間下雜伴見聞處三又伴下約無緣也獨在後行者若準緣中獨在前行亦犯此約道中共行也或根本獨去者約在住處即獨捨去不論道也又伴無諸難緣者律云若一比丘尼出大小便或命終等或被賊將去或為水漂去者不犯必無此緣在後行但離見聞便犯也次開不犯中言不至犯者及諸雜難不得作伴者律云若命梵惡獸或強力持去被執縛水漂等諸雜難也準五分開緣畏男子處開獨宿之處多男子畏有凌逼故開獨宿避之今鈔引未度水明開者約水淺即無褰衣之失岸上總皆是尼又無男子可畏故合開也如前具緣中者有四第三是無緣今但反之便是不犯餘文可委懈退者偶然之貌也九十單隨中紡績戒初釋名可知緣起者佛在舍衛時六群尼自紡績居士譏嫌等云云戒本三句一能犯人若比丘尼二明犯業自手紡績者三結犯波逸提釋鈔一段如文成衣不合懺著為斷後犯之因也言餘至已者上下戒者上至夷下至提未非無種相但時不行故略不述夷申隨舉比丘戒殘中諸戒單提中一百七十九戒此但明一百一十四戒向下更有異大僧者不明並是寡用故略也七師徒相攝諸行中言尼至中者多度非法之人者謂妊身婦女受後生兒或是賊女等當求半許若過半而作法者謂尼受時尼僧少不可得令清淨之人十人之內但五人持戒若過五人等持戒清淨少犯威儀不清淨者亦得成法鈔自注云不犯重者秉法自餘可可足數者於教相可多明間於戒行可多防護故云可可也所以爾者謂此戒緣未發大戒若大戒體在大僧言下得是以開之不類大僧犯吉羅僭不應師德餘如文言次至意者準多論佛成道十四年始有女入發心出家又案四分尼法中因大愛道請出家佛止不許時愛道與舍夷女五百人遂自剃髮倚祇桓門阿難為陳三請等云云佛遙宣八敬難傳授愛道聞已咸共頂戴受持其五百釋女咸八敬受也已上曰如文若依五分唯愛道一人得戒是八敬言下餘女以愛道為和尚於大僧中白四羯磨十一衆受也故五分云摩訶波闍波提比丘尼求佛出家阿難三請佛宣八敬愛道頂受不敢有虧既得戒已乃白阿難汝更為我啓白佛我已受八法於中更乞一願願聽比丘尼依臘次大小禮比丘如何令百歲尼禮新受戒比丘足阿難為愛道再白佛佛告阿難若我法中聽尼與僧次第相禮者無有是處也因説女身有障一不得作帝釋二不許作梵王三不許作轉輪王四不許作魔王五不得作佛況不得度女出家受戒佛之正法住世千年今既度之減五百歲譬如人家男少女多其家必速破又若我法中若不得女人我涅槃後諸憂婆塞當持四事供養隨比丘後白比丘言受我供養若白衣出門見比丘便牽臂歸家白言大德於我有恩乞暫過我家坐使我獲安若比丘道行逢塵泥白衣便解髮拂塵布泥令比丘蹈上過今既度人受戒如上所説諸事悉皆殆盡阿難聞已悲恨渡流白佛言何不早語我我若預知不敢申於三請佛告阿難勿復啼泣蓋是魔弊汝心今既已度出家受戒但令隨我制不得有違正法却復千年餘如見母二論恐繁不廣述也言今列其名者謂八教別名也若依當部八不可過法五分云八不可越法十誦善見云八尊重法母論云八師法了論云八尊師法今云八敬者依僧祗文也寶云就此之中分兩初制意次釋名初中凡躰無貴賤有道則尊法式軌要出於大僧尊法重人事須致敬敬而言之觸事皆是但此八法攝尼偏要故別制之審能修行戒淨法住故論云尼行此法正法還復千年故知法假人弘其義不昧矣釋名者寶云有通有別別則如鈔自明今云八敬是通名也以敬儀雖衆約境分心離成有八於茲八法專心度奉稱之曰敬次列名中又分為三初依鈔列名二置八所以三辨罪輕重初言一至人者請令坐者謂表之勤重也大僧未坐今請令坐若僧已坐亦須請之以不違制故今時俗家齊會僧前坐定尼後來請僧坐者若解法上坐但答言僧已坐或默然亦得已上正説或有解云尼衆未敢自專擅坐是以來就僧請坐僧便處分云依次坐便是許他坐也寶舉臣子喻以破無理更有説云此是尼來謝坐如來今時父子尊卑位別父賜坐已即須謝之寶舉同處異處難之無理甚矣云云餘七敬如文二明置八所以問曰有何意何故減不至七增不至九但明八敬答法爾有八初有三敬奉僧義式謂百照寺舉是也次有二敬稟承請悔謂請安恣是也就初三中初之一敬明身業度恭旨也後之二教口業度仰罵舉也又於第二所尊法中分二初明根本謂愛戒也次辨枝條即懺罪也又初一是生善後一是滅惡又於後三敬中分二初二稟承半月請法半安居也後一請悔即自恣也就初二中分二初請法教誡也次決疑安居也或可初一請法求解二依解起行又於下二中初防未起非約專精不犯安居也次殄已起非即犯已能悔自恣也斯則敬人明三敬法立二稟悔有三被此差分便成於八多又無用少又不足不多不少正立其八也三辨八敬制罪者願云違八敬得八吉也表不許此説若約初緣説然得吉後隨緣牒入戒條即須分不合雷同於此八中百罵請安恣此五勒入單提戒中決定犯提其受戒據圖中亦是提戒條中撿則未見若懺罪不入戒條違者犯吉若舉大比丘有二若遮舉意得吉若作説過亦吉又於罵大比丘中若依實罵得提以違戒條若無罪橫加成謗犯殘若據圖中更有吉此剩也不要説之搜玄諸家不子細令故繁述之述者多也言如此下結示如文言五至也者應遣三尼來僧中自恣者謂求僧舉罪言也犯第五尊師法者中含八尊師法中彼云一從僧受戒二半月請教授三依僧安居四依僧自恣五不得輒問比丘經律論義理若許即得六不説比丘過七僧中懺罪八百夏禮初夏足此八可尊故曰八尊師法也準此八中第五與四分稍異今既不聽輒問以違教故所以犯第五也及虛實罪者若實成罵犯提若虛成謗犯殘故俱不合若親里尼下約尼有親里眷屬為僧或有不是事得方便軟語勸喻不得硬言便成罵也餘文可知次式叉法中言二至也者不別得戒者破古師也古云受六法時向舊來沙彌尼戒躰上重發得六條戒也今云式叉六法是其學宗戒躰更不重發如前序中已明今意同彼故云不別得戒先以立志者今師意也謂將此六令二年學之軌持不違則志立行成方堪受具故將此法為大戒之前緣也言四分至如常説者十八童女二歲學戒者願云若是十八即要二年學法若十九二十不用更學也蜜云不然以違制限縱過二十已上亦須學之若不學者必不發大戒問今雖受六法不依二歲莫違教不答若依河北必須滿二年不滿不許與受今則不然若全不受違教不成但受縱不滿亦無妨得不違教故雖無明文以理推之無損也加猒本事者謂既曾嫁必猒本初俗務逼迫夫聟色欲等也有胎者十誦云有居士婦名曰利羅大富多財田宅種種諸物後家活分散唯己一身先自懷妊愁故病瘦其胎不長謂言無胎兒死等後念沙門安樂乃往精舍求哀出家出家已後安樂無事其胎復長諸尼知已驅出謂彼犯淫彼具述上緣乃至佛言已後如有此色人先令二年學法等云云言此至二年者玄云具學三法者玄云具足請法皆學今云三者約法階級而言故四分三也羯磨所為者作羯磨本令其學今此學法即是羯磨家所為也染心相觸者學淫方便也盜四錢者是盜方便也斷畜生命煞方便也小妄語者是大妄語方便也非時食為第五不飲酒為第六也文列淫盜煞妄十戒而言者然根本淫盜等非正六法數説相文中舉者先為沙彌時已學通前舉之文云某甲諦聽如來無所著等正覺説六法不得犯不淨行等云云若準十誦文中將四重及摩觸八事為六法也若六中壞者更與二年若餘行法中有犯者並令作吉悔也言律至知者除自手取食授食與他者謂大尼也既非自食不用從沙彌尼受若自取食之亦制犯者謂既自取必須從入受取若也不受自取而食亦犯沙彌尼開之者約緣別開得自取食無犯有者得授與尼者謂有沙彌尼式叉亦得過食與大尼自須受取者若有沙彌尼自要食之必須從彼取食也授食與他他大尼也故尼律云式叉尼一切戒應學除自手取食授與他若無人受食者亦許自取食食有則須受過食與尼有無俱得上是注文僧祗等者彼律三十八云有比丘尼度十二歲童女與授大戒為性耎弱不能苦事威儀不具等舉事白佛佛言自今已去十八童女欲於我法中受大戒者應從僧乞二年學戒乃至尼僧應十衆具滿白四成就是名與學戒二年中隨順十八事如鈔所列十三也式叉不淨食大尼許淨者殘宿等也七八者七至布薩日八至自恣日鈔文合之云七八也後四波羅夷者獨八覆隨也即當第九十十一二也此四戒若更犯更從初與二年也十三十九僧殘已下者彼律尼有十九殘為第二篇今總為一數隨犯皆作吉悔餘如彼説者餘更有五戒隨犯日數更學滿之言五者一非時食二停食食三捉寶四飲酒五著香華將五添前十三便成十八也三沙彌尼法中言二至不合者有本中作住學寶作往字解願云法式為一句改叉字為又字寶云無理頗甚思之上來總明尼衆篇竟自下諸部別行篇文二初牒名次依文釋言諸至三十者先來意謂前二十九篇皆是當宗自義縱行外部亦為成立本宗今此一篇直敘異説用陶情路以展通衢先辨自宗後述他部故次辨也釋名者繞敘衆宗故云諸部總陳差異故曰別行篇如常述云云次依文釋中言古至驗者謂勸廣學請文則有遍知不迷教於事無滯又能遍識良由學富也古人達者無違諍既云學富自然濟貧又論語云子夏博學而篤志孔子注云廣學而厚識也言若至的者四分缺於事法者謂當部雖云結界而無可分別不可分別等六相通局差別之事此是缺於事也四分雖制令受持三衣及捨三衣且無捨受詞句之法此則缺於法也他部自有明文者如集僧六相之事可分別依十誦等是也又受持三衣準僧祇等是也理必準行者約未分同是一律藏之理必須準而行之不可無文便止也不乖二是者古來解云不乖他宗實是有事有法不乖當律實是無法此非解也若準搜玄云今引外部不違未分本一之文為一是又識當宗緩急不乖見論取文法則為二是也此且恐疏或依寶釋取他文為一是取他義為二是今詳此解亦未有理且未合論他義今解云所引諸部事法之文在他宗中成他宗行事為一是引來我當宗中又與當宗流類相當為二是也棄急從緩者四分有三羯磨如白作白頭尾一字不許增略等是急今棄此急却依他十誦秉法例通差準唯多惟善之緩也又四分受戒時須自有如法衣鉢為急今棄此急却依論借衣鉢或無之緩也又四分三品受日限定護衣唯在明相是急今棄此急却依他宗請日約事訖之文護衣取通衣之緩也捨有求無者如四分受戒須有和上有結淨地今却捨之求於他宗無和尚受戒亦得戒不須結淨屋等捐輕重之是非者捐棄也棄四分五錢成重為輕取十誦八十小錢犯夷為重此則捨輕而就重也又棄四分淫戒重犯得夷為重却用十誦再犯初篇但吉為輕此是捨重而向輕也言是非者今云依宗即是棄本為非也又搜玄云歌聲念戒為是依五分直聲為非恣乖鈔意任愚懷取捨者斥古迷情也自貽負愧者貽招也愧耻也罪豈他科者不學無知非他而與本受為宗等者別序第三門云今判持犯還約其受躰等是也若全未預法者猶是沙彌也隨一部為依持者若欲受戒五部之中要依何部即秉此部羯磨為受躰隨依此部使為隨行準的即反顯若是四分受躰豈合更依他文言然至摸者事乃方途者謂諸部之事不少有萬般途轍也尋條難反者究根條絶難及也及者極也且疏要約者且者未盡之談也疏謂疏決疏通為義也要乃樞要也約者約略示謂指示規謂規則模謂摸範也次開章中言就至別者如文初僧數多少中言初至中者和尚十人之外者謂秉法之時牒和尚名入法不許在十人之數以是所牒不入僧數故類同五人自恣中者謂五人自恣一一差之自被差時不足僧數自被差了差第二人時又得在數類上懺時單白和僧許不不得足數懺了還射之時又却是數也諸師四人捨墮者古來諸師行事四人捨墮今鈔破云第五是所為不入僧數云何得成彼救云以律列四僧中準除三事自恣受戒出罪且不説除捨墮故四人必得若準通教上解非者今師約實審定也若準僧祇懺墮五人通教如上古師引律四人僧中不言故得用者非解也故羯磨疏云如僧祇五人自恣邊受諸尼薩耆此是正量豈有懺主入四人收豈可自忍故十誦云無有自恣自作羯磨又云以懺主單白和僧之時非是自量義須他也身外須僧故五人攝也始終無妨者羯磨疏云有人言始終重作秉法人者可入僧收如邊方受戒中戒師白和便是所為後與白四又是能持今鈔例之如懺悔主初時秉白便是所為懺了有緣欲去律許當經還衣白二與之又是能秉論其終始亦無妨也中卷懺聚者具明五人法也言十誦至也者無和尚得戒者搜玄約先曾請説但正受時不來名為無非謂從前一向無也必若全無云何牒名入法何以得知次引多論攝十誦文和尚不現前者請作十戒許可已臨時不來弟子遂於闍梨處遙將彼人為和尚得名受具戒前不得戒者謂少異十戒時也謂開僧數滿不現前亦得便反顯上十誦不是全無但不現前説為無耳黃門者一云是受後變為黃門躰不告也二解云是初受時黃門受戒不得即十三難中之一數今將此人為和尚亦得戒所以然者上句無和尚猶自得戒何論受後變作伽論白衣為和尚者謂約先來如法受得戒人後忽過緣著白衣服與人作和尚亦得與白衣受者謂能受人全是白衣也下引多論解云不除望鬚髮無衣鉢者白衣也非出家人亦爾者謂約先受戒不得人説也與上著俗服白衣為和尚得戒不殊故曰亦爾若準四分下一時辨異故曰並不開之也言十誦至亦爾者男作女威儀者準十誦波離問佛或男子作女人威儀女人相女人服作女人形制已如男子法受戒得不佛言得戒衆僧獲罪又問若女人作男子威儀男子相男子服男子形制已如女人法受得不佛言得戒衆僧得罪此約男女二相互者謂有人與作留難障他出家故爾伽論不知和尚是賊住者此舉十三難人也本犯戒人者破重戒也本不和合人者今意恐是從前並不受戒也古記多約破羯磨僧人也非出家人者雖受不納戒人也前賊住人作和尚弟子不知得戒得罪下三類下與上不別故言亦爾也言十誦至具者四處展轉與欲者謂一界內四處僧為人一時秉法受戒得更互展轉與欲如東院與西院人欲西院與東院人欲南北亦爾不者成別衆也被四衆者若材木平著四界地上若床等要腳各入一界也搜玄云如一床有四腳各在一處界中各有三人各欲作説戒事一人在中間床上坐秉説戒羯磨足四處並得成羯磨法也準伽論云頗有比丘與四處人説戒作羯磨乃五處得不答得也乃至五處亦爾等八人者謂一處説戒要四今但有三成七今以一人足二處成八也十二人者謂二處作受戒各五人今只有四成八一處説戒要四今只有三并上八成十一今以一人添三處令足成十二也十五人者謂二處受戒各但有四成八二處説戒各有三并前十四今以一人添四處令足成十五也十八人者二處受戒但有四成八三處説戒各但有三并前成十七今以一人添前五處令足成十八也斯乃各須有身分及彼界方得足數若不及亦不得也此依靈峯所解將能足一人在八十二十五十八數內以説甚有理也若依古來將能足一人在八人數外説理亦不失今且依前解為妙矣沙彌犯重得出家者謂受具也壞尼淨行不得者謂不許受具永滅擯也若能改悔不作者亦許受具也準此開學悔者搜玄云鈔主準四分開學悔彼律即須永辨不開今準當宋大僧犯重皆開學悔此沙彌壞尼準僧亦合開悔也二聖法通局中言二至失者僧祗了論皆有中間羯磨也亦名求聽者謂此羯磨但向僧中求聽許作受日自恣等事也又加白羯磨等者謂白衆聞知本非求僧聽與不聽縱僧不聽白竟便成也餘三同四分者謂單白白二白四也又云中間直白等者直白是白上加白也準了論總有五種羯磨一相貌羯磨謂制限不許入城市一年半年等第二白二羯磨第三中間第四白二第五白四就中初三頭三人秉餘三四人已上秉也餘如文三重犯中言三明至亦爾者十誦初篇無重犯據未學悔前説也彼律五十一云頗有大比丘行非不犯淫夷耶答有若先破戒人是也二篇已下有重犯何以得知鈔引彼律二十二卷安居法聚文云學悔沙彌尼犯殘諸比丘為作覆藏六夜本日治出罪等已上律文玄云準文既云本日治便是有重犯覆壞六夜壞各有本日治故知下篇隨輕重各有重犯也已上依搜玄記文表破云鈔文只云請比丘來與我摩那埵出罪搜玄不合妄添覆藏律文既云學悔沙彌尼犯殘何處更有覆藏以尼不許行別住恐犯觸故但有半月摩那埵出罪等至如四分尼犯殘亦不合行覆藏也今細詳之非是搜玄錯解此義從篇聚篇中便有此説請思之玄玄祇與十同故云亦爾也第四攝事中言且至持者四分三品即寬十祇但二品是狹又四分極多但一月是狹祗事訖三十九夜攝事便寬搜玄云中間者謂單白有頭無尾文云大德僧聽時到僧忍聽等是單白頭作白未了無白如是即無尾也便變羯磨文中有尾無尾無頭有僧忍默然故是事如是即持又無大德僧聽誰諸長老忍忍者默然不忍者説僧已忍與某事竟等之頭故云中間羯磨也文云雨安居者表云謂西土安居中多雨故也願又解云雨際時安居與上解意同嘉末作兩字解謂初結安居為一有緣移至他處是二以一夏中間處安居故曰兩安居也此非之甚不可依之十誦受日有二者謂七夜及三十九夜七夜與四分是同而兼夜者若據兼夜之言似異四分約其明相是滿位與四分同就別而言四分至日入時十誦至時明相前也終是互舉如前已明然十誦一夏之中只得二法謂要須於九十日中半在本界修行不許強半在外何況全耶在外羯磨如文中云云言十誦一至更結者彼云佛在毗舍離城時諸梨昌為佛及僧具種種美膳忽非時雲起諸飲食在露地被風雨梨昌白阿難言我於今日辦備為佛及僧設食在露地天雨不知云何阿難白佛佛令阿難向一舍中應唱淨地白二結之置食於內後為外道譏之云云佛令移向坊外又被白衣來乞等云云佛令自今後並不得作淨地若作犯吉先曾結處並令捨也倉云云單單音説文云小筐器也古師執此文便云今時總不許結淨縱四分許亦不得依如序中破云第五心境中者搜玄云四分淫酒戒約境制無想疑破僧疑心結根本準減年戒疑心結和尚提自食餘諸戒疑想總開也表又釋淫戒并減年戒即可依若依準酒戒從心制是南山義方軌中且順古如此説今須分開因何製記家更平列詁人甚矣思之以疑通是非者半緣本境為是半緣異境為非猶預兩緣故從本境制結正也不論遮之與性皆然故律云是女疑殘蟲疑草木疑皆提也想是決徹境心不相當不犯者以決徹強故亦不論旨境遮性悉是心境相應結犯不相應則輕文言不犯者望別不犯根本罪為言非無方便故彼律云人作非人想煞女作男想觸皆蘭此約轉想結前心方便若約本迷全無犯故如四分破僧淫戒不同知疑者搜玄云且舉破僧揵度中四句一非法不疑破非法不疑説二非法不疑説此句疑心結根本罪三法疑破不疑破法不疑破法不疑説四法疑破法疑説律文自制三句墮阿鼻一劫第四句不犯逆罪今言不開者且約第二句説故知不開疑心犯也餘如別説僧祇等者彼宗性戒不開想疑如前境實是女今作男子及黃門想觸皆殘若遮戒即開想疑生地生草作非生草等想疑得吉也除想疑者謂前有方便心不開想疑不開轉想本迷皆根本正罪故彼律云有主物無主物想疑皆夷等更舉尼覆粗戒云云又舉摩觸戒云云若前無方便心者即具開前境遮之與性者即具開想疑或犯輕或不犯故彼云有並無主想無盜心無犯非無五三不同者謂上引五祇十等且大言約以與四分不無五三不同如淫等戒不論前有方便皆犯根本與十誦不同祗中遮戒開疑酒是遮戒四分本不開疑心四分不通且將酒戒對其遮中得二疑與想將淫戒無其想疑對五分通無疑成三更將淫酒對十誦約方便有無成五故曰不同也望祗五二律成三望十誦成五此記依玄釋第六捨懺中牒名可知言十至所者二寶者畜貨二也少永奇山野多捨與同心淨人或無淨人捨與得作四方僧臥具也餘同者此律綿褥斬壞捨過七日藥八日者捨與守園人七日油捨作塗足然燈用六日已者捨與餘比丘食并乞等一同四分也一入僧永捨者有二節初捨與僧入僧差人棄山野是永捨二為僧貿衣食是入僧本主不得用是永捨謂二寶捨與僧僧應白二差一比丘棄向山水曠野處若僧不棄等如鈔文五敷具者謂三十中從十一至十五五條戒是也一野蠶綿二黑羊毛三白羊毛四減六年五不揲坐具此一向入僧唯本主不許坐臥釋成永入義也三入俗僧者五分云若一日得藥受二日更得受七日更得受留至八日明相出皆尼薩耆波逸提應捨與僧僧與白衣沙彌若用然燈或塗足不同四分得還本主外資第七藥得與餘比丘食餘同者餘同四分乞奪好入僧厨留惡令持自餘諸犯捨已歸主更用無𠎝為二染前三成五也無盡財者謂僧寶財中也為折伏本主貪心者謂生息利物只得作僧房舍中衣僧不得分此物息利而用亦不許作食若分此物及作食本主得分及食以自資身稱本貪心還求不止若作僧房中衣即無屬己之義亦為折伏也五臥具者從雜野蠶綿至不揲坐具也一純黑蠶綿作地敷二六年不揲僧得著三白毛三衣具前二捨就中好者同前純黑蠶綿作敷二不好者同後六年不揲僧得著餘同四分者三捨七日藥四乞鉢五餘捨等足前成五也餘如文言善至遮者一轉車衣等者有二初還主二入僧轉車義如上隨相離衣宿戒中依了論疏解竟如彼具者論疏云蘇等有二種用者比丘有病欲眼蘇得三日或四日病差應捨而不捨或滿七日不捨尼薩耆應捨與僧比丘若有病更眼僧更與比丘得蘇捨與白衣白衣後捨與比丘得眼也比丘無病不眼用僧欲用者亦須先捨與白衣白衣却捨與僧得眼也謂本主比丘及僧皆服用故云二種用也受法不受法者謂戒法也非謂調達五邪之法也第七隨戒相中言七至耳者更有六人等者玄記束為三對一年高大德二多慙重病三缺衆非請並一一如鈔自顯也律子注者一云學律之子也二云律白文下注腳也今取後解廣問持律能斷之耳者是此六即罪得滅非此六不可也上來諸部別篇竟上來有三收科云云總是三十篇文釋大段正宗分已竟第三流通分言餘至焉者付屬流通也文中雖似有勸學之意從增勝説朱書云四月八日真身寺釋安書吳越真身寺傳律沙門靖安丁巳歲重修一部簡正記一十七卷永冀流通延一萬二千年佛法壽命爾四月八日持記後賢披之知余志意焉故批之爾
